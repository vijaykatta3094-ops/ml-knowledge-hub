  uf --> drift
`} />
        </VIS.Section>

        <VIS.Section id="sec-walk" title="Walking the design">
          <ol>
            <li><strong>Ingest fans out to three feature extractors in parallel.</strong> Text -&gt; k=5 <VIS.Term def="Shingle: contiguous run of k tokens. Sets of shingles capture local edit-invariance.">shingles</VIS.Term> -&gt; 256-perm <VIS.Term def="MinHash signature: vector of k minimum hash values under k random permutations. Probability two positions agree equals Jaccard similarity.">MinHash signature</VIS.Term>. Image -&gt; 64-bit <VIS.Term def="pHash: perceptual image hash via 32x32 DCT + median threshold. Hamming distance &lt; 8 ≈ visual near-dup.">pHash</VIS.Term> via DCT. Image -&gt; CLIP-style 512-d <VIS.Term def="Embedding: dense vector from a model (CLIP/DINO). Vectors close in space = semantically/visually similar.">embedding</VIS.Term>. Cheap signatures first; the deep embedder runs on all images but its index is the slowest path. <VIS.Equation tex={String.raw`T_{\text{feature}} \approx 30\,\text{ms}/\text{item}`} /></li>
            <li><strong>Three candidate-retrieval indices.</strong> <VIS.Term def="MinHash LSH: LSH banding over MinHash signatures. Two items are candidates if they agree on at least one full band; collision prob = 1-(1-s^r)^b.">MinHash LSH</VIS.Term> for medium/long text, <VIS.Term def="SimHash LSH: LSH over SimHash signed-projection signatures. Works on short text where shingle count is too low for MinHash.">SimHash LSH</VIS.Term> for short text (&lt;50 tokens), <VIS.Term def="HNSW: Hierarchical Navigable Small World graph. Multi-layer proximity graph enabling logarithmic-time approximate nearest-neighbor search.">HNSW</VIS.Term> <VIS.Term def="ANN: approximate nearest neighbor. Family (HNSW, IVF, ScaNN) trading small recall loss for big latency wins vs exact search.">ANN</VIS.Term> over deep image embeddings. Each new item queries its relevant index and emits a <em>candidate pair list</em>. See §3a, §3b.</li>
            <li><strong>Exact verifier on candidates only.</strong> For each candidate pair, recompute <VIS.Term def="Jaccard similarity: |A∩B|/|A∪B|. Set-based similarity used over shingle sets for text near-dup detection.">Jaccard</VIS.Term> (text) or full <VIS.Term def="Cosine similarity: normalized dot product of two vectors. Standard similarity metric for dense embedding comparison.">cosine</VIS.Term> (image embedding). Drop pairs below the per-modality threshold. This is where LSH's <VIS.Term def="Recall: fraction of true near-dup pairs the system catches. LSH gives high recall; verifier preserves precision.">recall</VIS.Term> meets verifier's <VIS.Term def="Precision: fraction of flagged pairs that are real near-dups. Exact verification raises precision from LSH's lossy retrieval.">precision</VIS.Term>. See §3c.</li>
            <li><strong><VIS.Term def="Union-Find: O(alpha(n)) disjoint-set data structure with path compression. Builds clusters incrementally from a stream of pair edges.">Union-Find</VIS.Term> clustering.</strong> Verified pairs are edges; clusters are connected components. Near-O(α(n)) per merge. Each cluster gets a stable id. <VIS.Equation tex={String.raw`|E_{\text{verified}}| \approx 2.8\times 10^{6}\,\text{pairs/day}`} /></li>
            <li><strong>Safe-dup <VIS.Term def="Exclusion list: allow-list of cluster types (meme templates, news quotes, lyrics) that detect as near-dup but should NOT be collapsed at serve time.">exclusion list</VIS.Term>.</strong> Meme templates, news article quotations, lyric snippets — clusters here remain uncollapsed at serve time. Without this, distinct creator posts (same meme, new caption) get falsely merged. See §3d.</li>
            <li><strong><VIS.Term def="Canonicalization: pick one representative item per cluster — usually highest resolution, earliest first-seen, or most engaged. Downstream systems index only this id.">Canonicalize</VIS.Term>.</strong> Per cluster, pick the representative: highest resolution / earliest first-seen / most engaged. Downstream search and recs index only the canonical. <VIS.Equation tex={String.raw`r^{*} = \arg\max_{i \in C} \text{score}(i)`} /></li>
            <li><strong>Propagation + <VIS.Term def="Lineage: per-cluster history (first-seen item, member join times, canonical changes). Required for legal-audit reconstruction.">lineage</VIS.Term>.</strong> Push (cluster_id, canonical_id, member_ids) to search index and recommender. Lineage tracker records first-seen + every split event for legal audit.</li>
            <li><strong>Learning loop.</strong> Verifier-confirmed pairs become positive supervision for the image embedder: <VIS.Term def="Contrastive loss: pulls positive pairs together and pushes negatives apart in embedding space. InfoNCE is the standard form.">contrastive loss</VIS.Term> pulls them together. Weekly retrain; lifts ANN recall on rotated/recolored adversarial cases. See §3h.</li>
            <li><strong>Drift monitor.</strong> Watches <VIS.Term def="Bucket-fill skew: distribution of LSH bucket sizes. A hot bucket (one signature with many items) is an adversarial signal or a viral meme.">bucket-fill skew</VIS.Term> (hot bucket = adversarial pattern or viral meme), <VIS.Term def="Cluster purity: per-cluster, fraction of items whose true class equals the most common class. Averaged across audited clusters.">cluster purity</VIS.Term> (sampled human audits), false-positive appeals rate. Triggers re-banding or threshold tune. See §3g.</li>
          </ol>
        </VIS.Section>

        <VIS.Section id="sec-math" title="Why every stage is the way it is — the math">

          <h3 style={{marginTop:14, marginBottom:6, fontSize:15, color:"#334155"}}>§3a. MinHash similarity = Jaccard</h3>
          <p>For sets A, B of shingles, define Jaccard similarity:</p>
          <VIS.Equation display={true} tex={String.raw`J(A, B) \;=\; \frac{|A \cap B|}{|A \cup B|}`} />
          <p>A MinHash signature is k independent permutations of the universe; record the minimum hash under each permutation. The probability that two signatures agree on a given position equals the Jaccard similarity:</p>
          <VIS.Equation display={true} tex={String.raw`\Pr[\,h_\pi(A) = h_\pi(B)\,] \;=\; \frac{|A \cap B|}{|A \cup B|} \;=\; J(A, B)`} />
          <p>With k=256 permutations, the fraction of agreeing positions is an unbiased estimator of J(A,B) with standard error ≈ <VIS.Equation tex={String.raw`\sqrt{J(1-J)/k} \approx 0.03`} />.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3b. LSH banding — the S-curve</h3>
          <p>Partition the 256-position MinHash signature into b bands of r rows each (b·r = 256). Two items become "candidates" iff they agree on at least one entire band. The collision probability is</p>
          <VIS.Equation display={true} tex={String.raw`P_{\text{collide}}(s) \;=\; 1 \;-\; (1 - s^{r})^{b}`} />
          <p>This is the famous S-curve. With r=5, b=51 (≈256): at similarity s=0.8 the curve gives P≈0.9999; at s=0.3, P≈0.011. The inflection point ≈ <VIS.Equation tex={String.raw`(1/b)^{1/r}`} /> is the de-facto recall/precision threshold. Tightening r raises selectivity (fewer candidates, more false negatives); raising b widens the recall band (more candidates, more compute downstream).</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3c. Candidate volume + p99 explosion</h3>
          <p>Expected candidate pairs per item at signature s:</p>
          <VIS.Equation display={true} tex={String.raw`\mathbb{E}[\,|\text{cands}(x)|\,] \;=\; \sum_{y \ne x} P_{\text{collide}}(s_{xy})`} />
          <p>At ~280M items/day in the index and a tuned (b=51, r=5) bands, expected candidates per query ≈ 50–200. But: a viral meme can produce one signature shared by 10M items — its bucket size explodes:</p>
          <VIS.Equation display={true} tex={String.raw`p99(|\text{bucket}|) \;\gg\; \mathbb{E}[\,|\text{bucket}|\,]`} />
          <p>Mitigation: bucket-size cap → spillover to coarse "viral" cluster that is verified in batch, not per-query. Without the cap, the verifier's queue length saturates and p99 latency blows past the 200ms budget.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3d. False-positive vs false-negative cost</h3>
          <p>Per-pair expected loss at verifier threshold τ:</p>
          <VIS.Equation display={true} tex={String.raw`\mathbb{E}[L(\tau)] \;=\; \pi\,(1 - \text{TPR}(\tau))\,C_{\text{FN}} \;+\; (1 - \pi)\,\text{FPR}(\tau)\,C_{\text{FP}}`} />
          <p>Asymmetry: a false-negative (real near-dup sneaks through) costs one duplicated impression; a false-positive (legit distinct content merged) costs a user complaint, an appeal queue ticket, and reputational damage. So:</p>
          <VIS.Equation display={true} tex={String.raw`C_{\text{FP}} \;\gg\; C_{\text{FN}} \;\Rightarrow\; \tau^{*} \text{ is high} \;\Rightarrow\; \text{precision-tilted operating point}`} />
          <p>Exception: legal-takedown clusters (CSAM, copyright) flip the sign — FN cost is reputational/legal, FP cost is one appeal. Per-category τ, not global.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3e. pHash Hamming distance threshold</h3>
          <p>Two 64-bit pHash signatures are declared near-duplicate when</p>
          <VIS.Equation display={true} tex={String.raw`d_H(h_1, h_2) \;=\; \sum_{i=1}^{64}\mathbb{1}[h_{1i} \ne h_{2i}] \;<\; 8`} />
          <p>Under a uniform random hash null, the probability of <VIS.Equation tex={String.raw`d_H < 8`} /> by chance is</p>
          <VIS.Equation display={true} tex={String.raw`\sum_{k=0}^{7} \binom{64}{k} 2^{-64} \;\approx\; 2.4\times 10^{-9}`} />
          <p>At 80M images/day vs an index of 10<sup>10</sup> historical hashes: expected random collisions ≈ 1.9/day. Tolerable. Lowering the threshold to <VIS.Equation tex={String.raw`d_H < 12`} /> raises recall (catches rotations) but the random-collision rate climbs to ~10<sup>3</sup>/day → verifier load explodes.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3f. ANN recall@K vs latency</h3>
          <p>HNSW gives recall@K as a function of ef (search effort):</p>
          <VIS.Equation display={true} tex={String.raw`\text{recall}@K \;\approx\; 1 \;-\; \alpha\,e^{-\beta \cdot \text{ef}/K}`} />
          <p>Empirically on 512-d CLIP at K=10: ef=50 → recall ≈ 0.92 at ~2ms; ef=200 → recall ≈ 0.98 at ~8ms. The ANN budget for the 200ms p99 leaves ≤10ms here. Choose ef so that</p>
          <VIS.Equation display={true} tex={String.raw`T_{\text{ANN}}(\text{ef}) + T_{\text{verify}} + T_{\text{cluster}} \;\le\; 200\,\text{ms}`} />

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3g. Cluster purity metrics</h3>
          <p>Sample N=1000 clusters/week; have humans label each item's true-class. Purity:</p>
          <VIS.Equation display={true} tex={String.raw`\text{purity}(C) \;=\; \frac{1}{|C|}\,\max_{c}\;|\{\,i \in C : \text{class}(i) = c\,\}|`} />
          <p>Overall:</p>
          <VIS.Equation display={true} tex={String.raw`\overline{\text{purity}} \;=\; \frac{1}{N}\sum_{j=1}^{N} \text{purity}(C_j)`} />
          <p>Alert when <VIS.Equation tex={String.raw`\overline{\text{purity}} < 0.95`} />. Bonus signal: pairwise normalized mutual information (NMI) between cluster assignments and human labels. If NMI drops while purity holds, you have over-merging on a fat-tail of large clusters.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3h. Retrain cadence + contrastive loss</h3>
          <p>Verified pairs are supervision for the embedder. Contrastive InfoNCE objective:</p>
          <VIS.Equation display={true} tex={String.raw`\mathcal{L} \;=\; -\log \frac{\exp(\,\langle z_i, z_i^{+} \rangle / \tau\,)}{\sum_{j} \exp(\,\langle z_i, z_j \rangle / \tau\,)}`} />
          <p>where <VIS.Equation tex={String.raw`(i, i^{+})`} /> are verified-near-dup pairs and j ranges over in-batch negatives. ~2.8M positive pairs/day -&gt; ~20M/week → enough fresh supervision to retrain a 512-d head weekly. Re-deploying the embedder forces a full index rebuild (HNSW does not support online weight changes); rebuild cost ≈ 6 GPU-hours.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3i. Pairwise compare is impossible</h3>
          <p>If you skipped LSH/ANN:</p>
          <VIS.Equation display={true} tex={String.raw`\binom{2.8\times 10^{8}}{2} \;\approx\; 3.9\times 10^{16}\;\text{pair comparisons/day}`} />
          <p>At 100ns per cosine on a CPU: ~3.9×10<sup>9</sup> seconds ≈ 124 CPU-years/day. This is what the LSH-then-verify topology buys: O(n) candidate retrieval instead of O(n²) compare.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3j. Cross-modal handling (image-on-text overlay)</h3>
          <p>A re-uploaded image with overlaid text ("breaking news!" caption burned in) defeats pure-pHash near-dup. Resolution: OCR the overlay text, route the extracted string through the text path (SimHash LSH) AND the image path (pHash + ANN). Cluster membership is the union of both paths' verdicts. The lineage tracker records which path fired so the legal audit can reconstruct why.</p>

        </VIS.Section>

        <VIS.Section id="sec-distractors" title="What the distractors teach">
          <ul>
            <li><strong>"Exact pairwise compare, skip LSH."</strong> 3.9×10<sup>16</sup> compares/day → 124 CPU-years/day. The whole topology exists because pairwise is unaffordable. Math: §3i.</li>
          </ul>
        </VIS.Section>

        <VIS.Section id="sec-traps" title="Trap drills — where seniors burn">
          <p style={{margin:"0 0 12px 0", fontSize:14, color:"#64748b"}}>Each problem ID maps to one of five axes: <strong>B</strong>usiness metrics, <strong>D</strong>ata collection, <strong>T</strong>raining, <strong>M</strong>onitoring, <strong>G</strong>otchas.</p>

          <VIS.TrapProblem
            id="ndup-q1"
            difficulty="hard"
            title="Choosing the north-star metric for the dedup team"
            scenario={<>PM wants one dashboard number. DS lead proposes "verified near-dup pairs per day". Staff eng pushes back and asks for a user-facing metric instead.</>}
            options={[
              {key:"a", text:"Verified-pairs per day; it scales with ingest and with detector improvements.", correct:false},
              {key:"b", text:"Daily count of clusters created; rising means the system is working harder.", correct:false},
              {key:"c", text:"Deduped impressions per active session: how many duplicate views were avoided per user.", correct:true},
              {key:"d", text:"Average verifier confidence across pairs; rising means model improvement.", correct:false},
            ]}
            trap={<>(a) is a process metric, not user impact. (b) inverts — a flood of clusters from noisy buckets is bad. (d) drifts with the threshold knob, not behavior.</>}
            lens={<>Dedup exists so users do see the same content twice in a session. Tie the metric directly to that. Detector-level counts are diagnostic, not north-star.</>}
            stretch="What goes wrong if you only optimize impression-dedup and ignore cluster purity?"
          />

          <VIS.TrapProblem
            id="ndup-q2"
            difficulty="hard"
            title="Setting the recall vs precision target"
            scenario={<>Product gives two constraints: (1) user complaints about seeing the same post twice must drop 80%, (2) creator appeals about being unfairly merged must stay within 5% of today.</>}
            options={[
              {key:"a", text:"Pick high precision; FP merges hit creators, which is the binding 5% cap.", correct:true},
              {key:"b", text:"Pick high recall; minimize misses so the louder duplicate-view complaint drops fast.", correct:false},
              {key:"c", text:"Optimize F1 across precision and recall as the standard balanced metric.", correct:false},
              {key:"d", text:"Pick the threshold that maximizes verifier confidence on the validation set.", correct:false},
            ]}
            trap={<>(b) optimizes the louder complaint but blows past constraint (2). (c) ignores asymmetric cost. (d) maximizes a model-internal score, not the business constraint.</>}
            lens={<>Constraint (2) is the binding one — a hard cap on FP-merge appeals. Set τ at the highest precision that still hits the 80% recall side goal. Asymmetric cost lives in §3d.</>}
            stretch="If creator-appeal volume IS rising, which lever do you pull first?"
          />

          <VIS.TrapProblem
            id="ndup-q3"
            difficulty="medium"
            title="Stakeholder pitch: why two text indices"
            scenario={<>VP of Infra reviews the design and asks why you run both MinHash LSH and SimHash LSH for text. Pick the most accurate single-sentence justification.</>}
            options={[
              {key:"a", text:"MinHash is the older algorithm; SimHash replaces it; we will deprecate MinHash.", correct:false},
              {key:"b", text:"MinHash is for English; SimHash handles non-English where shingling is harder.", correct:false},
              {key:"c", text:"MinHash runs on CPU and SimHash on GPU; we keep both to balance hardware load.", correct:false},
              {key:"d", text:"MinHash variance depends on shingle count; short text starves it; SimHash handles short text.", correct:true},
            ]}
            trap={<>(a) is technically wrong — SimHash predates LSH-banding popularization. (b) confuses with tokenization issues. (c) is operational gloss, not the real reason.</>}
            lens={<>The cut is statistical: MinHash variance is O(1/k_shingles) so it starves on short text where shingle count drops below ~20. SimHash is signed-projection over the term vector — works on any vector length.</>}
            stretch="At what shingle count does MinHash become unreliable?"
          />

          <VIS.TrapProblem
            id="ndup-q4"
            difficulty="hard"
            title="Choosing the right denominator for 'near-dup rate'"
            scenario={<>The team currently reports "1% of ingested items become cluster members of size ≥ 2." Director asks if this aggregate is the right reporting unit.</>}
            options={[
              {key:"a", text:"Yes; this is the canonical near-dup rate on the ingest stream.", correct:false},
              {key:"b", text:"Switch to fraction of clusters with size ≥ 10; small clusters are mostly noise.", correct:false},
              {key:"c", text:"Stratify by content type and by cluster age; aggregate hides modality and freshness skew.", correct:true},
              {key:"d", text:"Report raw verifier-pairs/day instead; cluster sizes are downstream artifacts.", correct:false},
            ]}
            trap={<>(a) hides modality skew (images are 10× denser than text). (b) drops the long tail where appeals live. (d) loses the cluster signal entirely.</>}
            lens={<>Aggregate rates hide where the system is failing. Stratification is the cheapest debugging surface — a spike in size-2 image-meme clusters is a different problem than a spike in size-200 viral-video clusters.</>}
            stretch="If overall rate is steady but size-2 cluster fraction doubles, what changed?"
          />

          <VIS.TrapProblem
            id="ndup-q5"
            difficulty="medium"
            title="Sourcing positives and negatives for the deep embedder"
            scenario={<>You need positive and negative image pairs to retrain the embedder. Four sourcing proposals are on the table.</>}
            options={[
              {key:"a", text:"Verifier-confirmed pairs as positives; random index pairs as negatives.", correct:false},
              {key:"b", text:"Verifier-confirmed pairs as positives; hard negatives mined from verifier-rejected candidates.", correct:true},
              {key:"c", text:"Crowdsource pair labels via a vendor for guaranteed gold standard.", correct:false},
              {key:"d", text:"Use perceptual-hash matches as gold positives since they are deterministic.", correct:false},
            ]}
            trap={<>(a) trains on easy negatives. (c) is slow, expensive, and biased to vendor instructions. (d) reduces the embedder to learning what pHash already does.</>}
            lens={<>Hard negatives — pairs LSH surfaced but the verifier rejected — are the embedder's signal. Random negatives let the loss collapse trivially. §3h.</>}
            stretch="What happens if you only train on positives mined from one modality?"
          />

          <VIS.TrapProblem
            id="ndup-q6"
            difficulty="hard"
            title="Building a holdout split for dedup eval"
            scenario={<>You want a clean eval set to track recall and precision over time without train-to-test leakage.</>}
            options={[
              {key:"a", text:"Sample a random 10% of ingested items as the eval set, refresh weekly.", correct:false},
              {key:"b", text:"Sample a random 10% of verified pairs as the eval set, refresh weekly.", correct:false},
              {key:"c", text:"Group-aware: hold out 10% of whole clusters; train and eval share 0 clusters.", correct:true},
              {key:"d", text:"Fixed list of canonical items selected at launch, then kept frozen forever.", correct:false},
            ]}
            trap={<>(a) and (b) leak: if cluster C has 100 members and 10 land in eval, the embedder sees the other 90 in train and trivially generalizes. (d) freezes the eval set and loses drift signal.</>}
            lens={<>Group-aware splits at the cluster boundary are the only way to measure honest generalization. Same principle as user-stratified splits in recsys.</>}
            stretch="Why does random-pair holdout still leak even if you reserve specific pairs?"
          />

          <VIS.TrapProblem
            id="ndup-q7"
            difficulty="medium"
            title="Labeling for ambiguous near-dup pairs"
            scenario={<>A meme template image with two different captions: same image, different intent. Labelers disagree on whether to call them near-dups.</>}
            options={[
              {key:"a", text:"Resolve disagreements by majority vote among labelers and store one label.", correct:false},
              {key:"b", text:"Drop ambiguous pairs from the training set when 3 of 5 labelers disagree.", correct:false},
              {key:"c", text:"Pick the label using whether the captions are also lexically similar.", correct:false},
              {key:"d", text:"Keep all labels; weight the pair by κ-agreement as a soft 0–1 target.", correct:true},
            ]}
            trap={<>(a) destroys uncertainty signal. (b) removes exactly the cases the model needs to learn from. (c) leaks the answer into the input feature.</>}
            lens={<>Inter-annotator agreement (Cohen's κ) is the model's uncertainty budget. Soft labels carry the disagreement signal through training; hard labels lose it.</>}
            stretch="What is Cohen's κ if 4 of 5 labelers agree on 80% of pairs?"
          />

          <VIS.TrapProblem
            id="ndup-q8"
            difficulty="medium"
            title="Handling meme templates in the training set"
            scenario={<>"Distracted boyfriend" meme: same base image, thousands of different captions. The exclusion list flags it as safe-dup. The embedder team asks how to use these pairs.</>}
            options={[
              {key:"a", text:"Use them as positives; they ARE visually near-identical at the pixel level.", correct:false},
              {key:"b", text:"Treat as a 3rd class: same-image distinct-intent; close in image space; flag propagator-skip.", correct:true},
              {key:"c", text:"Use them as negatives; distinct posts with different captions are different items.", correct:false},
              {key:"d", text:"Drop them entirely from training as too ambiguous to label cleanly.", correct:false},
            ]}
            trap={<>(a) trains the system to merge them at serve time. (c) teaches the embedder visually-identical images can be far apart — destroys monotonicity. (d) wastes a rich pair source.</>}
            lens={<>The detection layer and the propagation policy are separate concerns. Detect the near-dup truthfully; let the exclusion list decide whether to act on it.</>}
            stretch="What other content types should live on the exclusion list?"
          />

          <VIS.TrapProblem
            id="ndup-q9"
            difficulty="hard"
            title="Tuning LSH band parameters for the target similarity"
            scenario={<>256-perm MinHash signature, pick (b bands, r rows) with b·r ≤ 256. Product wants high recall at Jaccard ≥ 0.8 AND fewer than 200 candidates per query on average.</>}
            options={[
              {key:"a", text:"b=51, r=5 — inflection ≈0.7, recall ≈1 at s=0.8, candidate volume bounded.", correct:true},
              {key:"b", text:"b=64, r=4 — many small bands maximize recall.", correct:false},
              {key:"c", text:"b=16, r=16 — wide bands give tight precision.", correct:false},
              {key:"d", text:"b=128, r=2 — pack the index for query speed.", correct:false},
            ]}
            trap={<>(b) recall is fine but candidate volume explodes. (c) only fires when sigs match on 16 consecutive positions — recall at 0.8 drops below 50%. (d) is degenerate: r=2 collides on most pairs.</>}
            lens={<>The S-curve P=1-(1-s^r)^b has inflection at (1/b)^(1/r). Place it just below the target similarity and pick (b, r) that hits the candidate budget. §3b.</>}
            stretch="If product loosens to Jaccard ≥ 0.7, how do (b, r) shift?"
          />

          <VIS.TrapProblem
            id="ndup-q10"
            difficulty="hard"
            title="Loss function for embedder retrain"
            scenario={<>~20M weekly verified positive pairs; you want to fine-tune the CLIP-style image embedder so ANN recall on rotated/recolored cases improves.</>}
            options={[
              {key:"a", text:"L2 regression of pair-embedding distance toward 0.", correct:false},
              {key:"b", text:"Binary cross-entropy on concatenated-embedding to predict pair-or-not.", correct:false},
              {key:"c", text:"Contrastive InfoNCE with in-batch hard negatives, temperature τ ≈ 0.07.", correct:true},
              {key:"d", text:"Triplet loss with fixed margin 1.0 and random negatives.", correct:false},
            ]}
            trap={<>(a) collapses all positives to one point. (b) wastes structural signal — pair-binary loss does not preserve geometry. (d) random negatives give a useless gradient at scale; fixed margin saturates.</>}
            lens={<>InfoNCE with hard negatives is the standard for retrieval embedders (SimCLR, CLIP, DINO). Temperature controls soft-max sharpness; ≈0.07 is the published sweet point. §3h.</>}
            stretch="Why does L2-toward-0 produce a degenerate collapse?"
          />

          <VIS.TrapProblem
            id="ndup-q11"
            difficulty="medium"
            title="Modality imbalance during multimodal training"
            scenario={<>Verified-pair stream is 90% image pairs, 10% text pairs. You retrain a multimodal embedder. After the first epoch, text-side recall starts dropping.</>}
            options={[
              {key:"a", text:"Re-sample positives to 50/50 by modality so the loss sees equal text-vs-image gradient.", correct:true},
              {key:"b", text:"Keep the 90/10 distribution; it reflects production load.", correct:false},
              {key:"c", text:"Train two separate embedders and share zero parameters.", correct:false},
              {key:"d", text:"Add class-weight inverse-frequency inside the InfoNCE softmax.", correct:false},
            ]}
            trap={<>(b) is the "follow the data" intuition that fails for imbalanced multitask — text head starves. (c) sacrifices cross-modal sharing. (d) wrong tool: temperature already handles within-task scaling, class-weight kludges produce unstable gradients.</>}
            lens={<>Input-side modality re-sampling is the cleanest fix; preserves InfoNCE denominator stability while balancing gradient flow.</>}
            stretch="Why does class-reweighting inside InfoNCE specifically misbehave?"
          />

          <VIS.TrapProblem
            id="ndup-q12"
            difficulty="hard"
            title="Calibrating verifier confidence for downstream use"
            scenario={<>Verifier outputs a similarity score in [0,1]. Downstream propagator wants ≥0.9 as "act" and 0.5–0.9 as "human review". The trained model produces a bimodal distribution at 0.4 and 0.95.</>}
            options={[
              {key:"a", text:"The model is already calibrated; raw score is fine.", correct:false},
              {key:"b", text:"Take percentile rank within today's score distribution.", correct:false},
              {key:"c", text:"Switch to log-odds and use raw log-odds as the cutoff.", correct:false},
              {key:"d", text:"Platt scaling: fit logistic from score to label on a held-out set; use its output.", correct:true},
            ]}
            trap={<>(a) bimodal score is uncalibrated. (b) drifts with whatever today's pair-mix happens to be. (c) log-odds of an uncalibrated number is still uncalibrated.</>}
            lens={<>Platt (or isotonic) fits a monotonic transform from score to P(near-dup). Lets downstream consumers use thresholds as actual probabilities.</>}
            stretch="When does isotonic beat Platt for this kind of calibration?"
          />

          <VIS.TrapProblem
            id="ndup-q13"
            difficulty="medium"
            title="Regularizing the embedder against shortcut features"
            scenario={<>After retrain, two images with the same JPEG quantization table cluster together even when semantically unrelated. The embedder has learned a metadata shortcut.</>}
            options={[
              {key:"a", text:"Add an L2 weight penalty of 1e-4 on the embedder.", correct:false},
              {key:"b", text:"Re-encode each training image with JPEG quality randomized over 30–95 first.", correct:true},
              {key:"c", text:"Raise InfoNCE temperature 2x so the loss is less peaked.", correct:false},
              {key:"d", text:"Swap the architecture from CNN to ViT and retrain from scratch.", correct:false},
            ]}
            trap={<>(a) shrinks weights, not the shortcut. (c) hides the symptom in the loss landscape; model still picks the shortcut. (d) is an architectural swap unrelated to the shortcut.</>}
            lens={<>Shortcut features get removed by destroying the shortcut at the input layer — data augmentation against the specific nuisance variable.</>}
            stretch="What is the invariance principle behind this kind of augmentation?"
          />

          <VIS.TrapProblem
            id="ndup-q14"
            difficulty="hard"
            title="Diagnosing overfitting on a single viral cluster"
            scenario={<>Three weeks after retrain, ANN recall on a rotated-meme eval set drops 6 points though training loss is at a record low. That week's verified pairs were dominated by one viral video (~30% of positives).</>}
            options={[
              {key:"a", text:"Lower the learning rate by 5x and resume training.", correct:false},
              {key:"b", text:"Train for fewer epochs so the model doesn't memorize.", correct:false},
              {key:"c", text:"Cap each cluster's positives at ≤ 1% of any epoch via subsampling.", correct:true},
              {key:"d", text:"Raise batch size 4x so the gradient is smoother in expectation.", correct:false},
            ]}
            trap={<>(a) and (b) slow the symptom but ignore the cause. (d) larger batches make dominance worse — the viral cluster fills more of every batch.</>}
            lens={<>Cluster-level sampling caps prevent any single viral event from steering the embedding. Equivalent to user-level capping in recsys training.</>}
            stretch="How would you detect this overfit before recall drops?"
          />

          <VIS.TrapProblem
            id="ndup-q15"
            difficulty="medium"
            title="Picking an LR schedule for weekly embedder retrain"
            scenario={<>The embedder is retrained weekly on the past week's verified pairs, then deployed alongside an ANN index rebuild.</>}
            options={[
              {key:"a", text:"Warm-start last week's weights; small constant LR for 1 epoch; early-stop.", correct:true},
              {key:"b", text:"Train from scratch each week with a 100-epoch cosine schedule.", correct:false},
              {key:"c", text:"Warm-start, then a long 50-epoch cosine schedule down to 1e-6.", correct:false},
              {key:"d", text:"SGD with momentum 0.99 and a fixed LR of 0.1 throughout.", correct:false},
            ]}
            trap={<>(b) discards accumulated structure and forces full rebuild semantics. (c) over-trains on the most recent week. (d) is a textbook LR that is too high for fine-tuning.</>}
            lens={<>Periodic warm-start fine-tune is the standard pattern: small LR, few epochs, early stop. Preserves what the model knew and only edits it.</>}
            stretch="How do you decide between warm-start and full rebuild on a major data shift?"
          />

          <VIS.TrapProblem
            id="ndup-q16"
            difficulty="hard"
            title="Drift signal faster than weekly cluster-purity audits"
            scenario={<>Cluster purity is the gold quality signal but it requires sampled human audits — expensive and lagging by a week. You need a faster proxy.</>}
            options={[
              {key:"a", text:"Track average verifier confidence; a 5% falling mean is drift.", correct:false},
              {key:"b", text:"Track verifier service CPU utilization at the p99 tail.", correct:false},
              {key:"c", text:"Track total number of clusters per day vs last week.", correct:false},
              {key:"d", text:"Track LSH bucket-fill skew plus creator-appeal rate; both move within 1–2 hours.", correct:true},
            ]}
            trap={<>(a) is gameable by the threshold itself. (b) is hardware noise. (c) moves with traffic and detector changes, not quality.</>}
            lens={<>Bucket-fill skew is a leading indicator (an adversary hits this first); appeals are the user-side signal that real harm occurred. Two monitors with different lag profiles.</>}
            stretch="What does a sudden drop in bucket-fill variance suggest?"
          />

          <VIS.TrapProblem
            id="ndup-q17"
            difficulty="medium"
            title="Setting the alert threshold for cluster purity"
            scenario={<>You audit 1000 clusters/week, compute purity, alert when it crosses a threshold. Picking the alert level and confirmation policy.</>}
            options={[
              {key:"a", text:"Page on any purity below 1.0 immediately; every false merge matters.", correct:false},
              {key:"b", text:"Static threshold at < 0.95 with a 2-week rolling-window confirmation.", correct:true},
              {key:"c", text:"Use a 3-sigma control chart on the weekly purity time series.", correct:false},
              {key:"d", text:"Alert only on a year-over-year decline of more than 5 points.", correct:false},
            ]}
            trap={<>(a) creates a 24/7 page storm — purity is never 1.0 on 1000 samples. (c) 3-sigma is too loose; one bad week is below 3-sigma. (d) lags by a year.</>}
            lens={<>A static, business-tied threshold (0.95 because appeals become unacceptable below it) plus a window-confirmation suppresses noise without lagging.</>}
            stretch="When does a control-chart approach actually beat a static threshold?"
          />

          <VIS.TrapProblem
            id="ndup-q18"
            difficulty="hard"
            title="Train-serve skew during ANN index rebuild"
            scenario={<>Retrain ships new v2 embedder weights at 0900 UTC Tuesday. ANN index rebuild takes 6 hours. The cluster system must keep serving from 0900 to 1500.</>}
            options={[
              {key:"a", text:"Serve v2 weights against the v1 index until the v2 index is fully ready.", correct:false},
              {key:"b", text:"Pause ingest until the v2 index has been fully built and verified.", correct:false},
              {key:"c", text:"Dual-write v1/v2; serve v1; cut over when v2 builds; keep v1 readable 24h.", correct:true},
              {key:"d", text:"Serve v2 weights but skip ANN, falling back to pHash-only retrieval until v2 is up.", correct:false},
            ]}
            trap={<>(a) is the bug: v2 vectors against v1 index — recall craters. (b) drops 6h of ingest. (d) regresses the image path to the cheap signature.</>}
            lens={<>Embedder + index are a coupled system. The deploy unit is (embedder, index) atomically; dual-write + read-cutover is the standard live-migration pattern.</>}
            stretch="Why does v2-weights-against-v1-index produce wrong clusters, not just lower recall?"
          />

          <VIS.TrapProblem
            id="ndup-q19"
            difficulty="medium"
            title="Monitoring for image-on-text overlay attacks"
            scenario={<>Adversaries upload screenshots of news articles with the article text baked into pixels. OCR-then-text-path is your defense. You want a monitor for whether the defense is engaging.</>}
            options={[
              {key:"a", text:"Track the % of clusters firing on both image-path AND text-path; a 2x rise is the signal.", correct:true},
              {key:"b", text:"Track OCR service uptime, p99 latency, and request error rate per minute.", correct:false},
              {key:"c", text:"Track the average text length on the ingest stream over rolling 5-minute windows.", correct:false},
              {key:"d", text:"Track the size of the image-only ANN index and rebuild duration.", correct:false},
            ]}
            trap={<>(b) is hardware metric. (c) drifts with platform composition. (d) is a capacity signal.</>}
            lens={<>The dual-path co-fire rate directly measures how often cross-modal handling engages. A rise correlates with a coordinated overlay-attack campaign.</>}
            stretch="What does the inverse — a sudden drop in dual-path co-fire — tell you?"
          />

          <VIS.TrapProblem
            id="ndup-q20"
            difficulty="hard"
            title="Detecting an adversary stuffing one LSH bucket"
            scenario={<>An adversary uploads 10K crafted images that all hash into a single LSH bucket — to push that bucket's verifier load past saturation and degrade detection for that signature.</>}
            options={[
              {key:"a", text:"Watch the average bucket-fill across the index hourly.", correct:false},
              {key:"b", text:"Watch verifier p50 latency over a 5-minute window.", correct:false},
              {key:"c", text:"Watch the count of new pHash signatures created per minute.", correct:false},
              {key:"d", text:"Watch max bucket-fill; alert at 4-sigma above the rolling mean.", correct:true},
            ]}
            trap={<>(a) averages hide one hot bucket. (b) p50 stays fine when one bucket is sick. (c) signature-creation rate is decoupled from bucket concentration.</>}
            lens={<>Adversarial bucket-stuffing is a tail event by construction — only tail metrics on bucket-fill catch it. Cap + spillover to a viral cluster is the mitigation; the monitor is the trigger.</>}
            stretch="What is the right spillover policy once the cap fires?"
          />

          <VIS.TrapProblem
            id="ndup-q21"
            difficulty="hard"
            title="Gotcha: viral meme creates a hot key in the signature store"
            scenario={<>A viral meme produces one pHash signature shared by 50M items. Every new upload triggers an O(bucket_size) verifier scan. Throughput dies.</>}
            options={[
              {key:"a", text:"Shard the signature store by hash prefix over 256 partitions.", correct:false},
              {key:"b", text:"Cap bucket work at N; route excess to a coarse viral cluster batch-verified offline.", correct:true},
              {key:"c", text:"Reject any item whose pHash matches more than 1M peers in the index.", correct:false},
              {key:"d", text:"Increase the verifier service's CPU allocation 2x and add more pods.", correct:false},
            ]}
            trap={<>(a) sharding by hash prefix is exactly what makes the hot key hot. (c) drops the long tail of real viral content. (d) buys minutes against a 50M-item bucket.</>}
            lens={<>Asymmetric handling at the topology level: pull viral clusters off the hot path, batch-verify, serve from canonical. Same pattern as moderation's surge buffer.</>}
            stretch="What is the worst-case lag added by the batch-verify path?"
          />

          <VIS.TrapProblem
            id="ndup-q22"
            difficulty="hard"
            title="Gotcha: late-arriving items reach a propagated cluster"
            scenario={<>An item arrives 3 hours after its near-duplicates; the cluster has already been canonicalized and propagated. The new item joins; the canonical might be a worse choice than this newcomer.</>}
            options={[
              {key:"a", text:"Re-evaluate the canonical when membership changes by >X%; log a split event; re-propagate.", correct:true},
              {key:"b", text:"Keep the original canonical forever; do skip re-pick on late joins.", correct:false},
              {key:"c", text:"Re-pick the canonical on every new join; consistency is paramount.", correct:false},
              {key:"d", text:"Discard late-arriving items if their cluster is already propagated.", correct:false},
            ]}
            trap={<>(b) freezes a possibly-wrong choice. (c) generates downstream-thrash on tiny membership changes. (d) loses content silently.</>}
            lens={<>Threshold-based re-canonicalization with lineage logging gives stability + correctness. Lineage is required for legal-audit reconstruction.</>}
            stretch="What is the right X% threshold and why?"
          />

          <VIS.TrapProblem
            id="ndup-q23"
            difficulty="medium"
            title="Gotcha: pHash and embedding disagree on the same pair"
            scenario={<>A small crop produces an 8-bit pHash Hamming jump (big distance) but the deep embedder sees cosine sim 0.99 (very close). The verifier needs a verdict.</>}
            options={[
              {key:"a", text:"Trust pHash; it is the primitive signature with bit-exact semantics.", correct:false},
              {key:"b", text:"Trust the deep embedder; it captures semantic content beyond pixels.", correct:false},
              {key:"c", text:"Run the exact verifier on image bytes over either candidate path; 1 verdict wins.", correct:true},
              {key:"d", text:"Take a weighted 50/50 average of the two signature distances.", correct:false},
            ]}
            trap={<>(a) and (b) hard-code a preference rather than verifying. (d) blends apples (Hamming bits) and oranges (cosine) — meaningless number.</>}
            lens={<>Candidate-retrieval and verification are separate stages. Retrieval surfaces, verifier decides. Trust the post-verification verdict.</>}
            stretch="When would you tune the weights between pHash and embedding candidates?"
          />

          <VIS.TrapProblem
            id="ndup-q24"
            difficulty="hard"
            title="Gotcha: the exclusion list as an attack surface"
            scenario={<>Adversaries discover that posts tagged "meme template" sit on the safe-dup exclusion list. They start watermarking pirated movie clips as memes to evade collapse.</>}
            options={[
              {key:"a", text:"Trust user-applied tags; the 'meme-template' label is usually accurate.", correct:false},
              {key:"b", text:"Remove the exclusion list entirely from the propagation pipeline.", correct:false},
              {key:"c", text:"Require manual human review for every exclusion-list addition.", correct:false},
              {key:"d", text:"Make exclusion membership system-derived (visual+behavioral), audited as a feature flag.", correct:true},
            ]}
            trap={<>(a) opens the door wider. (b) re-introduces the original false-merge problem. (c) does scale; the exclusion list must update automatically and be audited.</>}
            lens={<>Any policy lever exposed to user control becomes an attack surface. Exclusion-list membership is a signal, derived by the system, audited like a feature flag.</>}
            stretch="How would you build the visual+behavioral classifier for exclusion membership?"
          />

          <VIS.TrapProblem
            id="ndup-q25"
            difficulty="hard"
            title="Gotcha: a cold path that turns hot under subpoena"
            scenario={<>Lineage tracker is sized for legal-audit reads (1–2 per cluster per year). A subpoena arrives demanding the full history of 10M clusters within 48 hours.</>}
            options={[
              {key:"a", text:"Cache the entire lineage store in memory for fast scan access.", correct:false},
              {key:"b", text:"Append-only log in cold storage with a batch-export job sized for 10M-cluster reads.", correct:true},
              {key:"c", text:"Block the subpoena pending additional engineering capacity allocation.", correct:false},
              {key:"d", text:"Throttle lineage reads to protect 99% of online traffic SLOs.", correct:false},
            ]}
            trap={<>(a) does solve a 10M-cluster read pattern at memory cost. (c) is a legal failure. (d) is operational evasion of a contractual obligation.</>}
            lens={<>Cold-path systems must handle "rare but big" reads as a first-class case. Append-only log + batch-export is the standard for compliance-grade lineage.</>}
            stretch="What other cold paths in this system have the same risk profile?"
          />

          <VIS.TrapProblem
            id="ndup-q26"
            difficulty="medium"
            title="Gotcha: propagation race with cluster mutation"
            scenario={<>Canonical changes for cluster C at T=0. Search index update lands at T=200ms. Recommender update lands at T=4s. A user query at T=2s sees inconsistent results across surfaces.</>}
            options={[
              {key:"a", text:"Accept the race; eventual consistency is acceptable for the dedup use case.", correct:false},
              {key:"b", text:"Block search and recs writes until both consumer have caught up to the new state.", correct:false},
              {key:"c", text:"Push canonical with a monotonic v_id; consumers resolve via the version table on T=2s.", correct:true},
              {key:"d", text:"Run all propagation through a single synchronous fan-out service.", correct:false},
            ]}
            trap={<>(a) is exactly the bug — user sees the same content twice. (b) couples two services that should be independent. (d) is the wrong scale of synchronization.</>}
            lens={<>Versioned canonical with consumer-side resolution is the standard data-dependency pattern (think Kafka log compaction with offsets). Bounds the race window.</>}
            stretch="What is the worst-case impression-dedup error rate under (a) vs (c)?"
          />

          <VIS.TrapProblem
            id="ndup-q27"
            difficulty="hard"
            title="Gotcha: embedder drift vs data drift"
            scenario={<>Cluster purity drops 4 points. Two hypotheses: (i) embedder has drifted, (ii) users upload a new content type (a new app generating watermarked screenshots) the system has yet to see.</>}
            options={[
              {key:"a", text:"Retrain immediately on the past 7 days of pairs; it must be embedder drift.", correct:false},
              {key:"b", text:"Compare embedding density of recent vs last month: sparse→data drift, dense→model drift.", correct:true},
              {key:"c", text:"Roll back to last week's embedder snapshot and rebuild the ANN.", correct:false},
              {key:"d", text:"Tighten the verifier threshold by 5 points across the board.", correct:false},
            ]}
            trap={<>(a) and (c) are kneejerk reactions before diagnosing. (d) papers over the symptom on either hypothesis.</>}
            lens={<>Embedding-space density of recent traffic is the cheap diagnostic. Data drift and model drift demand opposite responses.</>}
            stretch="What density estimator scales to 280M items?"
          />

          <VIS.TrapProblem
            id="ndup-q28"
            difficulty="medium"
            title="Gotcha: silent quality regression after verifier upgrade"
            scenario={<>You upgrade the verifier from cosine on 512-d embeddings to cosine on 1024-d. Throughput drops 30% (expected). Three days later, cluster purity has dropped 2 points.</>}
            options={[
              {key:"a", text:"Higher-d embeddings always improve quality; the 2-point purity drop is sampling noise.", correct:false},
              {key:"b", text:"Lower throughput meant fewer pairs got verified; nothing else changed in the system.", correct:false},
              {key:"c", text:"Roll back the verifier to the 512-d build and the prior cosine threshold.", correct:false},
              {key:"d", text:"Recalibrate the verifier threshold; distances shift between 512-d and 1024-d.", correct:true},
            ]}
            trap={<>(a) is the false-confidence trap. (b) confuses throughput with selection bias — fewer verified pairs would change cluster sizes, not purity. (c) does explain the symptom but skips the root cause.</>}
            lens={<>Distance distributions are not invariant to embedding dimensionality. Any change to the embedder or verifier requires re-calibrating against the new distribution.</>}
            stretch="How does the cosine-distance distribution change as d grows?"
          />

          <VIS.TrapProblem
            id="ndup-q29"
            difficulty="hard"
            title="Gotcha: split-brain between dedup and CDN cache"
            scenario={<>CDN caches images by URL. Two URLs serve byte-identical content. Dedup correctly clusters them and picks a canonical. CDN keeps caching the other URL because the URL key is independent of cluster.</>}
            options={[
              {key:"a", text:"On canonicalize, CDN-purge non-canonical URLs and 301-redirect to the canonical.", correct:true},
              {key:"b", text:"Wait for the 24-hour CDN cache TTL to expire naturally and re-warm.", correct:false},
              {key:"c", text:"Edit each cached CDN entry in place with new content bytes.", correct:false},
              {key:"d", text:"Reduce CDN TTL to 0 platform-wide so updates propagate.", correct:false},
            ]}
            trap={<>(b) lets stale duplicates serve for the TTL window. (c) most CDNs do support in-place edit poorly or at high cost. (d) destroys cache effectiveness platform-wide.</>}
            lens={<>Dedup must propagate to the serving layer, not just the index layer. Redirect-on-non-canonical is the standard pattern for collapsing URL diversity onto a single asset.</>}
            stretch="When does the redirect approach itself break?"
          />

          <VIS.TrapProblem
            id="ndup-q30"
            difficulty="hard"
            title="Gotcha: Friday-night latency spike after a fresh embedder deploy"
            scenario={<>You deployed a retrained embedder Friday at 1500 UTC. By 2030 UTC, p99 latency on cluster assignment crossed the 200ms budget. ANN bucket-fill is up 40%. Logs show clean.</>}
            options={[
              {key:"a", text:"Wait until Monday to investigate during business hours.", correct:false},
              {key:"b", text:"Rollback the embedder; v1+v1-index is the known-good combo.", correct:true},
              {key:"c", text:"Increase verifier service capacity.", correct:false},
              {key:"d", text:"Lower the ANN ef parameter to speed retrieval.", correct:false},
            ]}
            trap={<>(a) is the staff-eng-burnout trap. (c) adds compute against a quality symptom. (d) trades recall for latency and masks the real problem.</>}
            lens={<>An off-hours regression with a known recent change has one safe lever: roll back. v2 weights against a freshly-built v2 index that still violated budget is the bug to investigate Monday.</>}
            stretch="Which on-call signals would have caught this before the budget breach?"
          />

        </VIS.Section>

        <VIS.Section id="sec-watch" title="Watch-outs">
          <ul>
            <li><strong><VIS.Term def="LSH banding: partition signature into b bands of r rows. Two items collide if any band matches. Tunes recall/precision tradeoff via the S-curve.">LSH banding</VIS.Term> parameters are not a constant.</strong> Re-tune (b, r) when the similarity target or the candidate-budget changes. Math: §3b, §3c.</li>
            <li><strong>Verifier threshold is per-category.</strong> CSAM and copyright lean precision-low (catch everything, tolerate appeals); meme-template / news-quote lean precision-high. Math: §3d.</li>
            <li><strong>Embedder + ANN index are a single deploy unit.</strong> <VIS.Term def="Dual-write: ingest writes to both v1 and v2 indices concurrently during migration; reads cut over once v2 is fully built.">Dual-write</VIS.Term> + read-cutover are the safe pattern. Math: §3f.</li>
            <li><strong>Hot buckets are an attack surface.</strong> Cap + spillover to a viral cluster. Math: §3c.</li>
            <li><strong>Cluster purity beats verifier confidence as a quality signal.</strong> Cheap proxies (<VIS.Term def="Bucket-fill skew: tail-heaviness of the LSH bucket-size distribution. A sudden rise in max-bucket-fill is an adversarial signal.">bucket-fill skew</VIS.Term>, appeals rate) buy faster reaction. Math: §3g.</li>
            <li><strong>Cluster-aware holdout.</strong> <VIS.Term def="Group-aware split: holdout strategy that keeps all items of a cluster either fully in train or fully in eval. Prevents pair-level leakage.">Group-aware splits</VIS.Term> at the cluster boundary. Pair-level random splits leak. Math: §3h.</li>
            <li><strong>Calibrate downstream thresholds.</strong> Verifier scores fed to consumers should be passed through <VIS.Term def="Platt scaling: logistic regression from raw score to ground-truth probability on a held-out set. Produces calibrated probabilities.">Platt scaling</VIS.Term> or <VIS.Term def="Isotonic regression: monotonic non-parametric calibration. Fits a piecewise-constant non-decreasing mapping from score to probability.">isotonic regression</VIS.Term> so threshold semantics survive embedder upgrades. Math: §3d.</li>
          </ul>
        </VIS.Section>

      </React.Fragment>
    )}

      <ul>

    </VIS.Section>
  </main>
  );
};
