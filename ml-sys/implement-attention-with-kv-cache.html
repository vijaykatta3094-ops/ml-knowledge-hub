  function CodeBlock({ lang = "plaintext", children }) {
    const ref = React.useRef(null);
    React.useEffect(() => {
      _ensureHljsCss();
      let cancelled = false;
      _loadScript("https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js")
        .then(() => _loadScript(`https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/languages/${lang}.min.js`).catch(() => {}))
        .then(() => {
          if (cancelled || !ref.current) return;
          // Reset so hljs re-highlights when `children` or `lang` change
          ref.current.removeAttribute("data-highlighted");
          ref.current.className = "language-" + lang;
          ref.current.textContent = String(Array.isArray(children) ? children.join("") : children);
          window.hljs.highlightElement(ref.current);
        });
      return () => { cancelled = true; };
    }, [lang, children]);
    return h("pre", { style: { margin: "12px 0", borderRadius: 8, overflow: "auto" } },
      h("code", { ref, className: `language-${lang}` }, children));
  }

  function Callout({ kind = "info", title, children }) {
    return h("aside", { className: `vis-callout vis-callout-${kind}`, role: "note" },
      title ? h("strong", { className: "vis-callout-title" }, title) : null,
      children);
  }

  // <VIS.Term def="1-2 sentence plain-English explanation">jargon</VIS.Term>
  //
  // Wraps any technical term so a non-technical reader can hover for an
  // immediate definition. The explanation should:
  //   - assume the reader knows English but not software/your domain
  //   - fit in 1-2 short sentences (a tooltip, not a paragraph)
  //   - avoid further jargon (or wrap that too)
  //
  // The element exposes `data-rv-info` so the report-viewer overlay reuses
  // its own tooltip + double-click "explain this" feedback flow. In
  // standalone /visualize mode (no overlay), the lightweight hover handler
  // below renders the tooltip directly.
  function Term({ def, children }) {
    if (!def) return h(React.Fragment, null, children);
    return h("span", {
      className: "vis-term",
      "data-rv-info": def,
      "aria-label": def,
      tabIndex: 0,
    }, children);
  }

  // autoGloss: scan a string for terms in window.__VIS_GLOSSARY (set by exporter
  // before vis-components.js loads). Returns a React children array with each
  // matched term wrapped in the same <span class="vis-term"> the Term component
  // emits. First-mention only per call. Longest-match-first so "candidate
  // generation" beats "candidate" alone.
  let _glossPattern = null;
  let _glossLookup = null;
  function _buildGlossPattern() {
    const g = (typeof window !== "undefined" && window.__VIS_GLOSSARY) || {};
    const keys = Object.keys(g).filter(k => k && !k.startsWith("_"));
    if (!keys.length) { _glossPattern = false; return; }
    // Longest first to favor multi-word terms; escape regex metachars.
    keys.sort((a, b) => b.length - a.length);
    const escaped = keys.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"));
    // Word-boundary on each side. Allow internal hyphens/spaces; common ML terms
    // like "DP-SGD", "feature cross", "p99 latency" are all matched naturally.
    _glossPattern = new RegExp("(^|[^A-Za-z0-9_])(" + escaped.join("|") + ")(?=[^A-Za-z0-9_]|$)", "g");
    _glossLookup = g;
  }
  function autoGloss(text) {
    if (typeof text !== "string" || !text) return text;
    if (_glossPattern === null) _buildGlossPattern();
    if (_glossPattern === false) return text;
    const seen = new Set();
    const out = [];
    let lastIdx = 0;
    let m;
    _glossPattern.lastIndex = 0;
    while ((m = _glossPattern.exec(text)) !== null) {
      const before = m[1];
      const term = m[2];
      const matchStart = m.index + before.length;
      const matchEnd = matchStart + term.length;
      // Emit text BEFORE this match
      if (matchStart > lastIdx) out.push(text.slice(lastIdx, matchStart));
      // Emit wrapped term (first-mention only)
      if (seen.has(term.toLowerCase())) {
        out.push(text.slice(matchStart, matchEnd));
      } else {
        seen.add(term.toLowerCase());
        out.push(h("span", {
          key: matchStart,
          className: "vis-term",
          "data-rv-info": _glossLookup[term],
          "aria-label": _glossLookup[term],
          tabIndex: 0,
        }, term));
      }
      lastIdx = matchEnd;
    }
    if (lastIdx < text.length) out.push(text.slice(lastIdx));
    return out.length === 1 ? out[0] : out;
  }

  // Standalone hover tooltip for <VIS.Term>. If the report-viewer overlay
  // is loaded it already shows tooltips for any [data-rv-info] element, so
  // we short-circuit here to avoid double-rendering.
  (function installTermTooltip() {
    let tip = null;
    function show(el) {
      if (window.__rvReady) return;  // overlay.js owns the tooltip in report-viewer mode
      const text = el.getAttribute("data-rv-info");
      if (!text) return;
      if (!tip) {
        tip = document.createElement("div");
        tip.className = "vis-term-tip";
        document.body.appendChild(tip);
      }
      tip.textContent = text;
      const r = el.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const pad = 8;
      let left = Math.max(pad,
        Math.min(r.left, window.innerWidth - tr.width - pad));
      const above = r.top - tr.height - pad;
      const below = r.bottom + pad;
      tip.style.left = left + "px";
      tip.style.top  = (above >= pad ? above : below) + "px";
      tip.style.display = "block";
    }
    function hide() { if (tip) tip.style.display = "none"; }
    document.addEventListener("mouseover", (e) => {
      const el = e.target.closest && e.target.closest("[data-rv-info]");
      if (el) show(el); else hide();
    });
    document.addEventListener("focusin", (e) => {
      const el = e.target.closest && e.target.closest("[data-rv-info]");
      if (el) show(el);
    });
    document.addEventListener("focusout", hide);
    document.addEventListener("scroll", hide, true);
    // Touch / tap support: on a tap, toggle the tip for the tapped term.
    // Tapping anywhere else (including a different term) hides the current.
    let lastTappedTerm = null;
    document.addEventListener("click", (e) => {
      const el = e.target.closest && e.target.closest("[data-rv-info]");
      if (el) {
        if (el === lastTappedTerm) { lastTappedTerm = null; hide(); }
        else { lastTappedTerm = el; show(el); }
      } else {
        lastTappedTerm = null; hide();
      }
    });
  })();

  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."
  //   scenario={<>...JSX...</>}
  //   diagram={<VIS.Mermaid chart={...} />}
  //   options={[
  //     {key:"a", text:"...", correct:false},
  //     {key:"b", text:"...", correct:true},
  //     ...
  //   ]}
  //   trap={<>The most tempting wrong is X because...</>}
  //   lens={<>The right answer + reasoning</>}
  //   stretch="optional follow-up question"
  // />
  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          // NO autoGloss here. Glossing terms inside option text leaks the
          // answer mechanism via hover. Authors must keep options self-contained;
          // a candidate who needs a definition can scroll up to the prose where
          // the term is explicitly wrapped via <VIS.Term>.
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },

        ) : null,
        h("button", {

        }, "↺ Try again")
      ) : null

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);

    function reset() { setFills({}); setPicked(null); setRevealed(false); }

        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null

        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,

  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// implement-attention-with-kv-cache — ML coding (PyTorch)
// Canonical scaled-dot-product attention with KV cache, plus 18 trap drills
// covering cache concat order, transpose, mask broadcast, dtype, sqrt(d_k), etc.

const ATTN_KV_CODE = [
  "import math",
  "import torch",
  "import torch.nn.functional as F",
  "",
  "def attention_with_kv_cache(q, k_new, v_new, k_cache, v_cache, mask=None):",
  "    # q:        (B, H, T_q,    d_k)   — usually T_q == 1 at decode",
  "    # k_new:    (B, H, T_q,    d_k)",
  "    # v_new:    (B, H, T_q,    d_v)",
  "    # k_cache:  (B, H, T_prev, d_k)",
  "    # v_cache:  (B, H, T_prev, d_v)",
  "    # mask:     None OR broadcastable to (B, H, T_q, T_prev + T_q)",
  "",
  "    # 1. Append new K/V to cache along the SEQUENCE axis (dim=-2).",
  "    k_full = __1__",
  "    v_full = __2__",
  "",
  "    # 2. Similarity scores: shape (B, H, T_q, T_prev + T_q).",
  "    scores = __3__",
  "",
  "    # 3. Scale by sqrt(d_k) — NOT sqrt(d_model).",
  "    d_k = q.size(-1)",
  "    scores = scores / __4__",
  "",
  "    # 4. Optional mask: -inf on disallowed positions BEFORE softmax.",
  "    if mask is not None:",
  "        scores = __5__",
  "",
  "    # 5. Softmax over KEYS (last dim), in fp32 for numerical stability.",
  "    weights = __6__",
  "",
  "    # 6. Weighted sum of values → output (B, H, T_q, d_v).",
  "    out = __7__",
  "    return out, k_full, v_full",
];

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="ML Coding · Senior MLE"
      title="Implement attention_with_kv_cache() — the canonical PyTorch form"
      subtitle="Scaled-dot-product attention with a growing KV cache. Hot path of every transformer decoder at serving time. Fill in the 7 blanks, then survive 18 bug-spotting drills."
      byline={[
        {label:"Question type", value:"ML Coding"},
        {label:"Setting", value:"LLM serving, decode-step attention"},
        {label:"Difficulty", value:"Hard"},
      ]}/>

    <VIS.TLDR>
      The function is five lines of math with one stateful twist: <strong>concat new K/V into the cache on the <VIS.Term def="The axis (dim=-2) along which the cache grows by one row per token. For (B,H,T,d) tensors, sequence is the second-to-last axis.">sequence axis</VIS.Term></strong>, compute <strong><VIS.Term def="Scaled dot-product attention: softmax of (Q · K^T) / sqrt(d_k), multiplied by V. The canonical attention formula from Vaswani 2017.">softmax(QK<sup>T</sup>/√d<sub>k</sub>)V</VIS.Term></strong>, return the output plus the <strong><VIS.Term def="The K and V tensors after this step's k_new/v_new have been appended. Must be returned so the caller can rebind for the next decode step.">updated cache</VIS.Term></strong> so the next <VIS.Term def="One token of generation in a transformer LLM. Each step consumes the cached K/V from prior tokens and emits one new token.">decode step</VIS.Term> can pick up where this one left off. Almost every bug in this code lives in one <VIS.Term def="The dim argument to torch.cat, transpose, or softmax. PyTorch operations are axis-sensitive and silently produce wrong-shape outputs when the axis is wrong.">axis argument</VIS.Term> — wrong <code>dim</code> on the cat, wrong <VIS.Term def="A tensor op that swaps two axes. transpose(-2,-1) swaps the last two dims, turning K into K^T for the matmul.">transpose</VIS.Term>, wrong softmax dim, wrong scale denominator.
    </VIS.TLDR>

    <VIS.Section id="sec-setup" title="The function we are building">
      <p>
        At <VIS.Term def="The token-by-token generation phase, after the prompt is fully encoded. Each step generates one new token and re-uses the cached K/V from all prior tokens.">decode time</VIS.Term>, a <VIS.Term def="A neural network architecture based on stacked self-attention layers. Decoder-only transformers (GPT, Llama) generate one token at a time at inference.">transformer LLM</VIS.Term> produces one output token at a time. For each step, the new token's <VIS.Term def="The query vector — what the current token is 'asking' about. In code it's the q argument; one row per query position.">query</VIS.Term> <code>q</code> attends over all previously-generated <VIS.Term def="Key vectors — what each prior token is 'offering' to be matched against. Compared against q via dot product to get attention scores.">keys</VIS.Term> and <VIS.Term def="Value vectors — what each prior token contributes once it has been attended to. Combined as a weighted sum using the attention weights.">values</VIS.Term> plus this step's own <code>k_new</code>, <code>v_new</code>. Recomputing K/V for the whole <VIS.Term def="The portion of the sequence already processed before the current decode step — the user's prompt plus already-generated tokens.">prefix</VIS.Term> every step would be <VIS.Term def="O(T^2) cost in the context length. Naive attention recomputed per step is quadratic; KV caching reduces it to linear per step.">quadratic</VIS.Term>; instead we maintain a <VIS.Term def="A tensor that accumulates all past K and V tensors so we never recompute them. Grows by one row per decode step.">KV cache</VIS.Term> and append.
      </p>
      <p>
        Tensors are <VIS.Term def="A tensor with 4 axes: batch, heads, sequence, per-head feature. The canonical shape for attention inside a transformer.">4-D</VIS.Term>: <code>(B, H, T, d)</code> — <VIS.Term def="The batch dimension. Multiple independent sequences processed in parallel.">batch</VIS.Term>, <VIS.Term def="Attention heads. Multi-head attention splits the model width across H independent attention sub-modules to capture different relationships.">heads</VIS.Term>, sequence length, per-head dim. The sequence axis is <code>-2</code>; the <VIS.Term def="The last axis (-1) holds per-head features. Matmuls contract over this axis when computing QK^T.">feature axis</VIS.Term> is <code>-1</code>. Cache shape is <code>(B, H, T<sub>prev</sub>, d)</code> and grows by <code>T_q</code> rows per call. <VIS.Term def="The per-head feature dimension. For an 8-head model with d_model=512, d_k = 512/8 = 64. The scale uses d_k, not d_model.">d<sub>k</sub></VIS.Term> is what we divide by, not <VIS.Term def="The full model width — total feature dim across all heads. d_model = H * d_k. Using sqrt(d_model) for the scale is a common bug.">d<sub>model</sub></VIS.Term>. The <VIS.Term def="The softmax operation normalizes a vector so it sums to 1. In attention we softmax over keys (last axis), not over batch or heads.">softmax</VIS.Term> must run over the keys axis — the <em>last</em> dim — and is safer in <VIS.Term def="32-bit floating point. Softmax over long contexts can overflow in fp16; promoting to fp32 around the softmax is standard.">fp32</VIS.Term> even when the rest of the model runs in <VIS.Term def="16-bit floating point. Saves memory and is faster on modern GPUs but has limited dynamic range — risky inside softmax.">fp16</VIS.Term> or <VIS.Term def="Brain Floating Point 16 — same exponent range as fp32 but only 7 mantissa bits. Used in TPU and modern GPU training.">bf16</VIS.Term>.
      </p>
      <p>
        The function returns three tensors: the attention <VIS.Term def="The result of attention: a weighted sum of value vectors. Shape (B,H,T_q,d_v). Goes into the next transformer block.">output</VIS.Term>, the updated <code>k_full</code>, and the updated <code>v_full</code>. The caller rebinds its <VIS.Term def="The variable holding the K cache between decode steps. Re-assigned each step from the function's return value.">cache reference</VIS.Term> from the return values — a <VIS.Term def="A pattern where operations return new tensors rather than mutating arguments. torch.cat is functional; in-place writes into pre-allocated caches are the production optimization.">functional</VIS.Term> style. A <VIS.Term def="A mask that prevents a query at position i from attending to keys at positions j > i. Required during prefill / parallel training; implicit at pure decode.">causal mask</VIS.Term> is implicit at decode (cache holds only past tokens) but required during <VIS.Term def="The first forward pass that processes the user's prompt and fills the cache. Multiple query positions, full attention matrix, explicit causal mask required.">prefill</VIS.Term> or <VIS.Term def="An inference optimization that proposes multiple tokens at once using a smaller model, then verifies in parallel. Makes T_q > 1 during decode.">speculative decoding</VIS.Term>.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-impl" title="The 7 fill-ins">

        id="akv-impl"
        difficulty="hard"
        title="Fill in the canonical implementation"
        language="python (PyTorch)"
        code={ATTN_KV_CODE}
        options={[
          {key:"cat_k_seq",     text:"torch.cat([k_cache, k_new], dim=-2)", fills:[1]},
          {key:"cat_v_seq",     text:"torch.cat([v_cache, v_new], dim=-2)", fills:[2]},
          {key:"qkt",           text:"q @ k_full.transpose(-2, -1)",        fills:[3]},

          {key:"cat_k_feat",    text:"torch.cat([k_cache, k_new], dim=-1)"},     // wrong axis — extends feature dim

          {key:"v_swapped",     text:"v_full @ weights"},                        // shape mismatch
        ]}
        trap={<>
          Five-axis trap landscape. (1) <code>dim=0</code> or <code>dim=-1</code> on the cat — both type-check, both wrong: the first grows batch, the second grows the feature dim and the next step crashes with a shape mismatch. Sequence axis is <code>-2</code>. (2) <code>k_new, k_cache</code> in reversed order — runs fine but the cache is no longer time-ordered; positional information silently corrupts. (3) <code>k @ q.T</code> or <code>q @ k_full</code> — produces (T,T_q) instead of (T_q,T), so softmax later normalizes over the wrong axis. (4) <code>d_k</code> instead of <code>sqrt(d_k)</code>, or <code>sqrt(d_model)</code> — softmax saturates for d_k=128. (5) <code>F.softmax(scores, dim=-1)</code> without the fp32 cast — long-context decoding sees rare overflow drift.
        </>}
        lens={<>
          Reference solution:
          <pre style={{background:"#f1f5f9", padding:"10px 14px", borderRadius:6, fontSize:13, overflow:"auto"}}>{`def attention_with_kv_cache(q, k_new, v_new, k_cache, v_cache, mask=None):
    k_full = torch.cat([k_cache, k_new], dim=-2)
    v_full = torch.cat([v_cache, v_new], dim=-2)
    scores = q @ k_full.transpose(-2, -1)
    d_k = q.size(-1)
    scores = scores / math.sqrt(d_k)
    if mask is not None:
        scores = scores.masked_fill(mask == 0, float('-inf'))

    out = weights @ v_full

        </>}
        stretch={<>How does this change under <strong>multi-query attention</strong> (one K/V head shared across all Q heads)? Where does the head dim go on <code>k_cache</code>, and what's the VRAM win for a 70B model?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-q1" title="18 bug drills">
      <p>Each drill shows a one-line variant that <em>looks reasonable</em>. Pick the option that correctly describes what is wrong (or right). The traps are graded: some are silent <VIS.Term def="A bug that produces wrong output without raising an error. Hardest class to catch — only end-to-end behavioral evals find them.">semantic bugs</VIS.Term>, some are <VIS.Term def="A bug that crashes the program when tensor shapes don't line up. Loud — caught by the first test run.">shape errors</VIS.Term> that crash later, some are <VIS.Term def="Bugs where the math is right but floating-point precision fails. Often only triggered at long context, large batch, or specific dtypes.">numerical bombs</VIS.Term> that only show up in long context or large batch.</p>

      <VIS.TrapProblem
        id="akv-q1"
        difficulty="medium"
        mode="single"
        title="Cache concat axis"
        scenario={<>A teammate writes <code>k_full = torch.cat([k_cache, k_new], dim=0)</code>. <code>k_cache</code> is <code>(B, H, T_prev, d_k)</code> and <code>k_new</code> is <code>(B, H, 1, d_k)</code>. What happens?</>}
        options={[
          {key:"a", text:"Works fine — dim=0 is the sequence axis for 4-D tensors.", correct:false},
          {key:"b", text:"Grows the BATCH dim to 2B; first attention step might run, next step crashes when q has batch B.", correct:true},
          {key:"c", text:"Raises a shape error immediately because B and 1 don't match.", correct:false},
          {key:"d", text:"Silently transposes the cache.", correct:false},
        ]}
        trap={<>The sequence axis for <code>(B,H,T,d)</code> is <code>-2</code>, not <code>0</code>. <code>dim=0</code> stacks along batch — both inputs have batch B, so the cat succeeds and you get batch <code>2B</code>. Step 1 may even run (depending on broadcasting); step 2 explodes when the next <code>q</code> arrives with batch <code>B</code>.</>}
        lens={<>Always concat the cache on the sequence axis: <code>dim=-2</code>. Use named axes or shape asserts on the first call so this fails loudly.</>}
      />

      <VIS.TrapProblem
        id="akv-q2"
        difficulty="medium"
        mode="single"
        title="Cache concat order"
        scenario={<>Variant: <code>k_full = torch.cat([k_new, k_cache], dim=-2)</code>. Shapes line up perfectly. Is anything wrong?</>}
        options={[
          {key:"a", text:"Nothing — concat is commutative.", correct:false},
          {key:"b", text:"The cache is now time-reversed: position 0 of k_full is the newest token, not the oldest. Positional encoding and causal semantics break silently.", correct:true},
          {key:"c", text:"Only a problem if you also use a causal mask.", correct:false},
          {key:"d", text:"Crashes at the matmul.", correct:false},
        ]}
        trap={<>The shapes all match, the code runs, accuracy quietly degrades. Concat is NOT commutative in semantics — order encodes time. Always put cache first, new last.</>}
        lens={<>Rule of thumb: <code>cat([past, present], dim=seq_axis)</code>. Add a unit test that calls the function twice and asserts <code>k_full[:, :, -1, :] == k_new[:, :, 0, :]</code>.</>}
      />

      <VIS.TrapProblem
        id="akv-q3"
        difficulty="hard"
        mode="single"
        title="The transpose"
        scenario={<>Variant: <code>scores = q @ k_full.transpose(0, 1)</code>. <code>q</code> is <code>(B,H,1,d_k)</code>.</>}
        options={[
          {key:"a", text:"Equivalent to transpose(-2,-1) for square tensors.", correct:false},
          {key:"b", text:"Swaps batch and head dims; matmul becomes garbage or crashes.", correct:true},
          {key:"c", text:"Works because PyTorch auto-broadcasts.", correct:false},
          {key:"d", text:"Slower but correct.", correct:false},
        ]}
        trap={<>transpose(0,1) swaps BATCH and HEAD. The matmul then contracts the wrong axes; you either get a shape error or, worse on permissive shapes, a silently wrong result.</>}
        lens={<>The only correct call is <code>k_full.transpose(-2, -1)</code> — swap the last two dims so the inner contraction is over <code>d_k</code>.</>}
      />

      <VIS.TrapProblem
        id="akv-q4"
        difficulty="easy"
        mode="single"
        title="The scale denominator"
        scenario={<>Junior MLE writes <code>scores = scores / d_k</code> (no sqrt). For d_k=128, what goes wrong?</>}
        options={[
          {key:"a", text:"Softmax saturates — over-smoothed: weights become nearly uniform across keys.", correct:true},
          {key:"b", text:"Softmax saturates — over-sharpened: one key takes all weight.", correct:false},
          {key:"c", text:"Nothing — d_k vs sqrt(d_k) is a stylistic choice.", correct:false},
          {key:"d", text:"Numerical overflow in fp16.", correct:false},
        ]}
        trap={<>Dividing by <code>d_k</code> instead of <code>sqrt(d_k)</code> over-shrinks scores by another factor of <code>sqrt(d_k)</code>. For d_k=128 that is ~11×. Logits collapse toward zero; softmax becomes nearly uniform; attention loses selectivity. Vaswani et al. derive the <code>sqrt(d_k)</code> scale from the variance of QK<sup>T</sup> assuming unit-variance Q,K — that's why it's sqrt.</>}
        lens={<>Scale is <code>math.sqrt(d_k)</code> where <code>d_k = q.size(-1)</code>. Per-HEAD dim, not d_model.</>}
      />

      <VIS.TrapProblem
        id="akv-q5"
        difficulty="medium"
        mode="single"
        title="sqrt(d_k) vs sqrt(d_model)"
        scenario={<>An engineer copies the original Vaswani formula but plugs in <code>d_model=512</code> (the model width) instead of <code>d_k=64</code> (per-head). With 8 heads, what's the effect?</>}
        options={[
          {key:"a", text:"Same thing — d_model is the right scale.", correct:false},
          {key:"b", text:"Off by sqrt(8) — scores too small, softmax over-flattens.", correct:true},
          {key:"c", text:"Crash at runtime.", correct:false},
          {key:"d", text:"Better numerical stability, no semantic change.", correct:false},
        ]}
        trap={<>The scale must use the per-head feature dim (<code>q.size(-1)</code>), which already accounts for the head split. <code>sqrt(d_model)</code> = <code>sqrt(H · d_k)</code> = <code>sqrt(H)·sqrt(d_k)</code>; you'd over-shrink by <code>sqrt(H)</code>.</>}
        lens={<>Use <code>q.size(-1)</code> not the configured d_model. Saves you when head count changes.</>}
      />

      <VIS.TrapProblem
        id="akv-q6"
        difficulty="hard"
        mode="single"
        title="Operand order: q @ kᵀ vs k @ qᵀ"
        scenario={<>Variant: <code>scores = k_full @ q.transpose(-2, -1)</code>. The matmul succeeds. What's the resulting shape, and why does it matter?</>}
        options={[
          {key:"a", text:"(B,H,1,T) — same as before, just stylistic.", correct:false},
          {key:"b", text:"(B,H,T,1). When softmax(dim=-1) runs, it normalizes over a length-1 axis — every weight becomes 1.0, attention has no effect.", correct:true},
          {key:"c", text:"Crashes because q has length 1.", correct:false},
          {key:"d", text:"(B,H,T,T) — quadratic memory blow-up.", correct:false},
        ]}
        trap={<>Shape (T,1) instead of (1,T). softmax over dim=-1 (length 1) gives uniform 1.0 — the model produces attention output equal to <code>sum(V)</code>, completely degenerate. This is a silent killer; only behavioral evals catch it.</>}
        lens={<>Always <code>q @ k.transpose(-2,-1)</code>. Mnemonic: "queries on the left because rows of the result are queries."</>}
      />

      <VIS.TrapProblem
        id="akv-q7"
        difficulty="medium"
        mode="single"
        title="Softmax axis"
        scenario={<>Variant: <code>weights = F.softmax(scores.float(), dim=0)</code>. Shape of scores is (B,H,1,T). What happens?</>}
        options={[
          {key:"a", text:"Softmax normalizes over BATCH — each (h,q,k) cell sums to 1 across samples. Attention semantics destroyed.", correct:true},
          {key:"b", text:"Same as dim=-1 because of broadcasting.", correct:false},
          {key:"c", text:"Runtime error.", correct:false},
          {key:"d", text:"Correct — batch is the first non-broadcast axis.", correct:false},
        ]}
        trap={<>The softmax must normalize over the KEY axis (the last dim), not batch. Same mistake as q6 by a different door — both make the output independent of attention weights in the intended sense.</>}
        lens={<>Always <code>dim=-1</code>. Use named tensors or an assert <code>assert weights.sum(dim=-1).allclose(torch.ones_like(...))</code> in tests.</>}
      />

      <VIS.TrapProblem
        id="akv-q8"
        difficulty="hard"
        mode="single"
        title="Dtype: softmax in fp16"
        scenario={<>Model runs in fp16. Code is <code>weights = F.softmax(scores, dim=-1)</code> (no fp32 cast). The unit tests pass. What is the production failure?</>}
        options={[
          {key:"a", text:"None — fp16 softmax is fine for normal context lengths.", correct:false},
          {key:"b", text:"Long-context decoding sees rare overflow / NaN; output degenerates after thousands of tokens. Hard to reproduce, easy to ship.", correct:true},
          {key:"c", text:"Training fails immediately.", correct:false},
          {key:"d", text:"Crashes on first call.", correct:false},
        ]}
        trap={<>fp16 has only ~5 bits of exponent. For long contexts, max logit can exceed fp16 range; exp() returns inf; subsequent division produces NaN. Cast scores to float32 around the softmax and cast back: <code>F.softmax(scores.float(), dim=-1).to(q.dtype)</code>.</>}
        lens={<>Standard pattern in HF, Flash-Attention, and vLLM: softmax always runs in fp32. The compute matmuls stay in fp16/bf16.</>}
      />

      <VIS.TrapProblem
        id="akv-q9"
        difficulty="medium"
        mode="single"
        title="Mask: additive vs masked_fill"
        scenario={<>A coworker uses <code>scores = scores + mask</code> where <code>mask</code> is a boolean tensor (True = allowed). Spot the bug.</>}
        options={[
          {key:"a", text:"Works — booleans cast to 0/1 and zero is a no-op.", correct:false},
          {key:"b", text:"Adding 1 to allowed positions skews logits but is mostly harmless.", correct:false},
          {key:"c", text:"Booleans cast to 0/1, but masking REQUIRES -inf at disallowed positions; with 0/1 the mask has no effect on disallowed positions. Use masked_fill or pre-build the mask as 0/-inf floats.", correct:true},
          {key:"d", text:"Crashes because bool tensors can't be added to floats.", correct:false},
        ]}
        trap={<>The additive-mask pattern is correct only if the mask is already <code>{`{0, -inf}`}</code> floats — typically pre-built as <code>mask.masked_fill(~allowed, -inf)</code>. Boolean masks belong with <code>scores.masked_fill(mask == 0, float('-inf'))</code>.</>}
        lens={<>Pick one convention and stick to it across the codebase. The most readable is <code>masked_fill(disallowed, -inf)</code>.</>}
      />

      <VIS.TrapProblem
        id="akv-q10"
        difficulty="hard"
        mode="single"
        title="Mask broadcast shape"
        scenario={<>You build a causal mask of shape <code>(T, T)</code>. Scores are <code>(B, H, T_q, T_prev + T_q)</code>. You apply <code>scores.masked_fill(mask == 0, -inf)</code>. What goes wrong at decode (T_q=1, T_prev=99)?</>}
        options={[
          {key:"a", text:"Mask shape (T,T) broadcasts naturally to (B,H,T,T).", correct:false},
          {key:"b", text:"At decode the keys axis is T_prev+1 = 100, but mask is (T,T) where T was the training context length. Broadcast either fails or silently aligns the wrong rows of the mask.", correct:true},
          {key:"c", text:"Always works because boolean tensors broadcast freely.", correct:false},
          {key:"d", text:"Only a problem in eval mode.", correct:false},
        ]}
        trap={<>Causal masks at decode are subtle: at decode you don't actually need one if the cache only holds past tokens. If you DO pass a mask, its last two dims must match <code>(T_q, T_prev + T_q)</code> — usually a column of all-True (allow attention to every cached token + self).</>}
        lens={<>Build the mask shaped for the CURRENT step, not the training context. Or skip it at decode and only add it during prefill / speculative decode where T_q &gt; 1.</>}
      />

      <VIS.TrapProblem
        id="akv-q11"
        difficulty="medium"
        mode="single"
        title="Causal mask shape (prefill)"
        scenario={<>At prefill, T_q = T_prev + T_q = T (no cache yet). What's the correct causal mask shape for scores of shape (B,H,T,T)?</>}
        options={[
          {key:"a", text:"A lower-triangular matrix of shape (T, T), broadcast over (B, H).", correct:true},
          {key:"b", text:"An upper-triangular matrix of shape (T, T).", correct:false},
          {key:"c", text:"A vector of shape (T,) marking positions.", correct:false},
          {key:"d", text:"Identity matrix of shape (T, T).", correct:false},
        ]}
        trap={<>Lower-triangular = position i can attend to positions 0..i. Upper-triangular is the inverse — it would make tokens see only future positions. Off-by-one between <code>tril</code> and <code>triu</code> is one of the most common causal-mask bugs.</>}
        lens={<>Build with <code>torch.tril(torch.ones(T, T, dtype=torch.bool))</code> or its negation. Test by passing a known prompt and asserting attention from position 0 to position 5 is zero.</>}
      />

      <VIS.TrapProblem
        id="akv-q12"
        difficulty="medium"
        mode="single"
        title="dtype mismatch on cat"
        scenario={<><code>k_cache</code> is fp16 (came from the previous decode step); <code>k_new</code> is fp32 (forgot a <code>.half()</code> in the projection). <code>torch.cat([k_cache, k_new], dim=-2)</code> →</>}
        options={[
          {key:"a", text:"Works — PyTorch promotes silently to fp32.", correct:false},
          {key:"b", text:"Raises 'Tensors must have same dtype' or cats and silently promotes the whole cache to fp32, blowing 2× VRAM per layer.", correct:true},
          {key:"c", text:"Casts k_new to fp16 automatically (downcast wins).", correct:false},
          {key:"d", text:"Crashes the next matmul only.", correct:false},
        ]}
        trap={<>Depending on the torch version this either errors or silently promotes. Either way the cache size doubles. Always cast both to a known dtype before cat; or assert <code>k_new.dtype == k_cache.dtype</code>.</>}
        lens={<>Wrap the projection in autocast or explicitly <code>k_new = k_new.to(k_cache.dtype)</code>.</>}
      />

      <VIS.TrapProblem
        id="akv-q13"
        difficulty="medium"
        mode="single"
        title="In-place vs return-new"
        scenario={<>An optimizer writes <code>k_cache.cat_(k_new, dim=-2)</code>-style code (concat in place) to avoid allocating <code>k_full</code>. What's the catch?</>}
        options={[
          {key:"a", text:"PyTorch has no in-place concat; cat allocates. You can pre-allocate the cache at max length and write into a slice — that's the real production pattern.", correct:true},
          {key:"b", text:"Works only with contiguous tensors.", correct:false},
          {key:"c", text:"Breaks autograd.", correct:false},
          {key:"d", text:"Allowed only on GPU.", correct:false},
        ]}
        trap={<>There is no <code>torch.cat_</code>. Real serving stacks (vLLM, TensorRT-LLM) pre-allocate a max-length cache tensor and do <code>k_cache[:, :, t, :] = k_new.squeeze(-2)</code>. The "return updated cache" pattern in our function is the teaching version.</>}
        lens={<>In production: pre-allocate, write by index, track current length separately. In an interview: returning <code>k_full</code> is the expected shape.</>}
      />

      <VIS.TrapProblem
        id="akv-q14"
        difficulty="hard"
        mode="single"
        title="Memory layout — contiguous vs strided"
        scenario={<>You concat a <code>contiguous</code> cache with a <code>k_new</code> that came from a <code>view(...)</code> on a permuted projection. <code>k_full</code> is then passed to a fused attention kernel that requires <code>is_contiguous()</code>. What happens?</>}
        options={[
          {key:"a", text:"PyTorch's cat always returns contiguous output.", correct:true},
          {key:"b", text:"k_full inherits strided layout; the kernel errors or produces wrong output.", correct:false},
          {key:"c", text:"Performance hit but correctness OK.", correct:false},
          {key:"d", text:"Need to call .contiguous() explicitly.", correct:false},
        ]}
        trap={<>This one is a fact-check: <code>torch.cat</code> returns a fresh contiguous tensor. The bug pattern is when you skip cat (e.g. write into a pre-allocated cache via a transposed view) and forget to <code>.contiguous()</code> before a fused kernel.</>}
        lens={<>If you optimize past <code>torch.cat</code> into in-place writes, audit contiguity at every kernel boundary.</>}
      />

      <VIS.TrapProblem
        id="akv-q15"
        difficulty="medium"
        mode="single"
        title="Returning the cache"
        scenario={<>A coworker's version returns only <code>out</code>, not the updated cache. They argue "the cache is mutated in place by torch.cat." What's wrong?</>}
        options={[
          {key:"a", text:"Nothing — cat mutates the first argument.", correct:false},
          {key:"b", text:"torch.cat allocates a NEW tensor; the caller's k_cache reference is unchanged. The next decode step uses the stale cache and recomputes from scratch.", correct:true},
          {key:"c", text:"Memory leak only.", correct:false},
          {key:"d", text:"Works at decode, breaks at prefill.", correct:false},
        ]}
        trap={<>This is the most common "subtle bug" in homework implementations. cat is functional; the function MUST return <code>k_full, v_full</code> so the caller can rebind their cache variables.</>}
        lens={<>Signature is <code>return out, k_full, v_full</code>. The caller does <code>out, k_cache, v_cache = attention_with_kv_cache(...)</code>.</>}
      />

      <VIS.TrapProblem
        id="akv-q16"
        difficulty="medium"
        mode="single"
        title="weights @ v_full — operand order"
        scenario={<>Variant: <code>out = v_full @ weights</code> with shapes <code>weights (B,H,1,T)</code>, <code>v_full (B,H,T,d_v)</code>. What happens?</>}
        options={[
          {key:"a", text:"Crashes — inner dims don't match for that order ((d_v) vs (1)).", correct:true},
          {key:"b", text:"Returns (B,H,T,T).", correct:false},
          {key:"c", text:"Silently transposes operands.", correct:false},
          {key:"d", text:"Same result as weights @ v_full.", correct:false},
        ]}
        trap={<>The correct contraction is <code>(1,T) @ (T,d_v) → (1,d_v)</code>. Swapping operands gives <code>(T,d_v) @ (1,T)</code> — d_v doesn't match 1; runtime error. This is a "fail loudly" bug, less dangerous than the silent ones.</>}
        lens={<>Always <code>weights @ v_full</code>. Rows of weights are queries; columns of v_full are value features.</>}
      />

      <VIS.TrapProblem
        id="akv-q17"
        difficulty="hard"
        mode="single"
        title="Dropping the batch dim by accident"
        scenario={<>You squeeze <code>q</code> from <code>(B,H,1,d_k)</code> to <code>(B,H,d_k)</code> "to simplify" and then <code>q @ k_full.transpose(-2,-1)</code>. What's the result shape and is it correct?</>}
        options={[
          {key:"a", text:"(B,H,T) — same content as before just without the singleton query axis; still correct.", correct:true},
          {key:"b", text:"Crashes.", correct:false},
          {key:"c", text:"(B,T) — heads collapsed.", correct:false},
          {key:"d", text:"Subtly wrong because softmax dim=-1 now normalizes over the wrong axis.", correct:false},
        ]}
        trap={<>The math works — but you've now diverged from the canonical 4-D contract every downstream component expects. Production code keeps the explicit T_q axis even when it's 1 so prefill / speculative-decode paths share the same code.</>}
        lens={<>Keep all four dims at decode. The singleton query axis is annoying but it's a stable interface.</>}
      />

      <VIS.TrapProblem
        id="akv-q18"
        difficulty="medium"
        mode="single"
        title="Mask dtype"
        scenario={<>Mask is provided as <code>torch.bool</code>. You do <code>scores.masked_fill(mask, -inf)</code> (no <code>== 0</code>). What's the bug?</>}
        options={[
          {key:"a", text:"Inverted semantics: -inf goes on the ALLOWED positions instead of the disallowed ones.", correct:true},
          {key:"b", text:"None — masked_fill treats True as 'allow'.", correct:false},
          {key:"c", text:"Crashes — masked_fill rejects bool.", correct:false},
          {key:"d", text:"Only works if mask is float.", correct:false},
        ]}
        trap={<>Convention: <code>mask=True</code> means "this position is ALLOWED". <code>masked_fill</code> writes -inf where the predicate is True, so you'd need <code>mask == 0</code> or <code>~mask</code> as the predicate. Off-by-one-of-these is a daily bug in attention code.</>}
        lens={<>Pick a documented convention. The most readable is <code>allow_mask</code> True=allowed → <code>masked_fill(~allow_mask, -inf)</code>.</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-watch" title="Watch-outs at production scale">
      <ul>
        <li><strong><VIS.Term def="Video RAM — GPU memory. The scarce resource at inference time; KV cache is usually the dominant consumer.">VRAM</VIS.Term> growth is linear in T.</strong> Cache size = <code>2 · L · B · H · T · d_k · bytes_per_elem</code>. For <VIS.Term def="A 70-billion-parameter open-weight LLM from Meta. Standard reference point for cache-size math at production scale.">Llama-70B</VIS.Term> at fp16, B=1, T=8K that's ~1.6 GB per request just for the cache. <VIS.Term def="vLLM's paged attention: cache is allocated in fixed-size blocks like OS virtual memory, allowing efficient batching and eviction.">PagedAttention</VIS.Term> exists for a reason.</li>
        <li><strong>fp32 around softmax is non-negotiable</strong> in production; the <VIS.Term def="Matrix multiplications. The heavy compute inside attention — QK^T and weights @ V. Stay in fp16/bf16 for throughput.">matmuls</VIS.Term> stay in bf16 / fp16.</li>
        <li><strong>Don't pass a causal mask at pure decode.</strong> The cache only contains past tokens — the constraint is already encoded. Save the <VIS.Term def="A fused GPU operation. Attention kernels like FlashAttention combine matmul + softmax + matmul into one pass to reduce memory traffic.">kernel</VIS.Term> a tensor op.</li>
        <li><strong>Cache layout matters for kernels.</strong> <VIS.Term def="An attention kernel that tiles QK^T and softmax to keep intermediate scores in SRAM. Dramatically faster than naive PyTorch attention.">FlashAttention</VIS.Term>, <VIS.Term def="Meta's collection of memory-efficient attention kernels. Often the production fallback when FlashAttention is unavailable.">xFormers</VIS.Term> often want <code>(B, T, H, d_k)</code>, not <code>(B, H, T, d_k)</code>. Audit the layout once per layer, not per call.</li>
        <li><strong>Test with a 2-step decode.</strong> One-step tests miss the cache-bug class entirely.</li>
        <li><strong><VIS.Term def="Grouped-query attention: a compromise between multi-head and multi-query. Groups of Q heads share one K/V head. Used in Llama-2 70B and beyond.">Grouped-query attention (GQA)</VIS.Term></strong> changes K/V head count without changing this function — but the shape of the cache changes accordingly.</li>
      </ul>
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://arxiv.org/abs/1706.03762" target="_blank" rel="noopener">Vaswani et al. — <em>Attention Is All You Need</em> (NeurIPS 2017, paper)</a> — the original. Section 3.2.1 derives the <code>sqrt(d_k)</code> scale.</li>
        <li><a href="https://jalammar.github.io/illustrated-transformer/" target="_blank" rel="noopener">Jay Alammar — <em>The Illustrated Transformer</em> (blog)</a> — the picture book for the shape math. Read first if any of the dims feel abstract.</li>
        <li><a href="https://arxiv.org/abs/2309.06180" target="_blank" rel="noopener">Kwon et al. — <em>vLLM / PagedAttention</em> (SOSP 2023, paper)</a> — how KV cache is managed at serving scale. Read after you understand the basic cache.</li>
        <li><a href="https://arxiv.org/abs/1911.02150" target="_blank" rel="noopener">Shazeer — <em>Multi-Query Attention</em> (2019, paper)</a> — the stretch question. One K/V head shared across all Q heads, huge VRAM win.</li>
        <li><a href="https://huggingface.co/docs/transformers/llm_tutorial_optimization" target="_blank" rel="noopener">HuggingFace — <em>LLM inference optimization</em> (docs)</a> — practitioner guide to KV cache layouts, paged attention, speculative decoding.</li>
        <li><a href="https://arxiv.org/abs/2205.14135" target="_blank" rel="noopener">Dao et al. — <em>FlashAttention</em> (NeurIPS 2022, paper)</a> — kernel-fused attention. Worth knowing how your code maps onto it.</li>
      </ul>
    </VIS.Section>

  <script>
    window.addEventListener("error", function (e) {
      const pre = document.createElement("pre");
      pre.style.cssText = "position:fixed;top:0;left:0;right:0;max-height:35vh;"
        + "overflow:auto;background:#fee2e2;color:#7f1d1d;padding:8px;"
        + "margin:0;font:12px/1.4 monospace;z-index:10002;";
      pre.textContent = "[visualize] " + (e.error?.stack || e.message || e);
      document.body.appendChild(pre);
    }, true);
  </script>
</body>
</html>
