  function CodeBlock({ lang = "plaintext", children }) {
    const ref = React.useRef(null);
    React.useEffect(() => {
      _ensureHljsCss();
      let cancelled = false;
      _loadScript("https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js")
        .then(() => _loadScript(`https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/languages/${lang}.min.js`).catch(() => {}))
        .then(() => {
          if (cancelled || !ref.current) return;
          // Reset so hljs re-highlights when `children` or `lang` change
          ref.current.removeAttribute("data-highlighted");
          ref.current.className = "language-" + lang;
          ref.current.textContent = String(Array.isArray(children) ? children.join("") : children);
          window.hljs.highlightElement(ref.current);
        });
      return () => { cancelled = true; };
    }, [lang, children]);
    return h("pre", { style: { margin: "12px 0", borderRadius: 8, overflow: "auto" } },
      h("code", { ref, className: `language-${lang}` }, children));
  }

  function Callout({ kind = "info", title, children }) {
    return h("aside", { className: `vis-callout vis-callout-${kind}`, role: "note" },
      title ? h("strong", { className: "vis-callout-title" }, title) : null,
      children);
  }

  // <VIS.Term def="1-2 sentence plain-English explanation">jargon</VIS.Term>
  //
  // Wraps any technical term so a non-technical reader can hover for an
  // immediate definition. The explanation should:
  //   - assume the reader knows English but not software/your domain
  //   - fit in 1-2 short sentences (a tooltip, not a paragraph)
  //   - avoid further jargon (or wrap that too)
  //
  // The element exposes `data-rv-info` so the report-viewer overlay reuses
  // its own tooltip + double-click "explain this" feedback flow. In
  // standalone /visualize mode (no overlay), the lightweight hover handler
  // below renders the tooltip directly.
  function Term({ def, children }) {
    if (!def) return h(React.Fragment, null, children);
    return h("span", {
      className: "vis-term",
      "data-rv-info": def,
      "aria-label": def,
      tabIndex: 0,
    }, children);
  }

  // autoGloss: scan a string for terms in window.__VIS_GLOSSARY (set by exporter
  // before vis-components.js loads). Returns a React children array with each
  // matched term wrapped in the same <span class="vis-term"> the Term component
  // emits. First-mention only per call. Longest-match-first so "candidate
  // generation" beats "candidate" alone.
  let _glossPattern = null;
  let _glossLookup = null;
  function _buildGlossPattern() {
    const g = (typeof window !== "undefined" && window.__VIS_GLOSSARY) || {};
    const keys = Object.keys(g).filter(k => k && !k.startsWith("_"));
    if (!keys.length) { _glossPattern = false; return; }
    // Longest first to favor multi-word terms; escape regex metachars.
    keys.sort((a, b) => b.length - a.length);
    const escaped = keys.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"));
    // Word-boundary on each side. Allow internal hyphens/spaces; common ML terms
    // like "DP-SGD", "feature cross", "p99 latency" are all matched naturally.
    _glossPattern = new RegExp("(^|[^A-Za-z0-9_])(" + escaped.join("|") + ")(?=[^A-Za-z0-9_]|$)", "g");
    _glossLookup = g;
  }
  function autoGloss(text) {
    if (typeof text !== "string" || !text) return text;
    if (_glossPattern === null) _buildGlossPattern();
    if (_glossPattern === false) return text;
    const seen = new Set();
    const out = [];
    let lastIdx = 0;
    let m;
    _glossPattern.lastIndex = 0;
    while ((m = _glossPattern.exec(text)) !== null) {
      const before = m[1];
      const term = m[2];
      const matchStart = m.index + before.length;
      const matchEnd = matchStart + term.length;
      // Emit text BEFORE this match
      if (matchStart > lastIdx) out.push(text.slice(lastIdx, matchStart));
      // Emit wrapped term (first-mention only)
      if (seen.has(term.toLowerCase())) {
        out.push(text.slice(matchStart, matchEnd));
      } else {
        seen.add(term.toLowerCase());
        out.push(h("span", {
          key: matchStart,
          className: "vis-term",
          "data-rv-info": _glossLookup[term],
          "aria-label": _glossLookup[term],
          tabIndex: 0,
        }, term));
      }
      lastIdx = matchEnd;
    }
    if (lastIdx < text.length) out.push(text.slice(lastIdx));
    return out.length === 1 ? out[0] : out;
  }

  // Standalone hover tooltip for <VIS.Term>. If the report-viewer overlay
  // is loaded it already shows tooltips for any [data-rv-info] element, so
  // we short-circuit here to avoid double-rendering.
  (function installTermTooltip() {
    let tip = null;
    function show(el) {
      if (window.__rvReady) return;  // overlay.js owns the tooltip in report-viewer mode
      const text = el.getAttribute("data-rv-info");
      if (!text) return;
      if (!tip) {
        tip = document.createElement("div");
        tip.className = "vis-term-tip";
        document.body.appendChild(tip);
      }
      tip.textContent = text;
      const r = el.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const pad = 8;
      let left = Math.max(pad,
        Math.min(r.left, window.innerWidth - tr.width - pad));
      const above = r.top - tr.height - pad;
      const below = r.bottom + pad;
      tip.style.left = left + "px";
      tip.style.top  = (above >= pad ? above : below) + "px";
      tip.style.display = "block";
    }
    function hide() { if (tip) tip.style.display = "none"; }
    document.addEventListener("mouseover", (e) => {
      const el = e.target.closest && e.target.closest("[data-rv-info]");
      if (el) show(el); else hide();
    });
    document.addEventListener("focusin", (e) => {
      const el = e.target.closest && e.target.closest("[data-rv-info]");
      if (el) show(el);
    });
    document.addEventListener("focusout", hide);
    document.addEventListener("scroll", hide, true);
    // Touch / tap support: on a tap, toggle the tip for the tapped term.
    // Tapping anywhere else (including a different term) hides the current.
    let lastTappedTerm = null;
    document.addEventListener("click", (e) => {
      const el = e.target.closest && e.target.closest("[data-rv-info]");
      if (el) {
        if (el === lastTappedTerm) { lastTappedTerm = null; hide(); }
        else { lastTappedTerm = el; show(el); }
      } else {
        lastTappedTerm = null; hide();
      }
    });
  })();

  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."
  //   scenario={<>...JSX...</>}
  //   diagram={<VIS.Mermaid chart={...} />}
  //   options={[
  //     {key:"a", text:"...", correct:false},
  //     {key:"b", text:"...", correct:true},
  //     ...
  //   ]}
  //   trap={<>The most tempting wrong is X because...</>}
  //   lens={<>The right answer + reasoning</>}
  //   stretch="optional follow-up question"
  // />
  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          // NO autoGloss here. Glossing terms inside option text leaks the
          // answer mechanism via hover. Authors must keep options self-contained;
          // a candidate who needs a definition can scroll up to the prose where
          // the term is explicitly wrapped via <VIS.Term>.
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },

        ) : null,

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

        if (src && tgt) userEdges.push([src, tgt]);
      }
    });
    const correctPicks = placedPieces.filter((p) => expectedPieces.includes(p));
    const distractors = placedPieces.filter((p) => !expectedPieces.includes(p));
    const missingPieces = expectedPieces.filter((p) => !placedPieces.includes(p));
    const correctEdges = userEdges.filter(([s,t]) => expectedEdges.some(([es,et]) => es===s && et===t));
    const wrongEdges   = userEdges.filter(([s,t]) => !expectedEdges.some(([es,et]) => es===s && et===t));
    const missingEdges = expectedEdges.filter(([s,t]) => !userEdges.some(([us,ut]) => us===s && ut===t));
    setReport({ placedCount: placedPieces.length, correctPickCount: correctPicks.length, expectedPickCount: expectedPieces.length,
      distractors, missingPieces, edgeCount: userEdges.length, correctEdgeCount: correctEdges.length,
      expectedEdgeCount: expectedEdges.length, wrongEdges, missingEdges });
    setRevealed(true);
    if (onReveal) onReveal();
  }
  function reset() { if (api) api.updateScene({ elements: [] }); setPlacedIdMap({}); setReport(null); setRevealed(false); }
  if (!lib) return React.createElement("div", { style:{padding:24, color:"#64748b"} }, "Loading Excalidraw canvas...");
  const Excalidraw = lib.Excalidraw;

  return React.createElement("div", null,

        disabled: revealed || !!placedIdMap[p.id],

          background: placedIdMap[p.id] ? "#f1f5f9" : "#ffffff", opacity: placedIdMap[p.id] ? 0.5 : 1,

          borderRadius:6, whiteSpace:"nowrap" } }, p.label.split("\n")[0]))
    ),
    React.createElement("div", { ref: containerRef, style:{ height:600, border:"1px solid #cbd5e1", borderRadius:8, background:"#fefce8", position:"relative", overflow:"hidden", marginBottom:10 }},
      React.createElement(Excalidraw, { excalidrawAPI: (a) => setApi(a),

        UIOptions: { canvasActions: { saveToActiveFile:false, loadScene:false, export:false, toggleTheme:false } } })),
    React.createElement("div", { style:{fontSize:13, color:"#64748b", marginBottom:8}}, "Tip: click a palette piece to drop it on the canvas, drag to position, use the arrow tool to connect."),
    !revealed ? React.createElement("button", { type:"button", onClick: reveal,
      style:{background:"#2563eb", color:"#fff", border:"none", padding:"10px 18px", borderRadius:8, fontWeight:600, cursor:"pointer"} },
      Object.keys(placedIdMap).length > 0 ? "Reveal model design" : "Skip & reveal solution") : null,
    revealed && report ? React.createElement("div", { style:{marginTop:12}},

const App = () => {
  const [solutionVisible, setSolutionVisible] = React.useState(false);
  return (
  <main style={{maxWidth: 1100, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="ML Systems · Canvas · Reverse Image Search"
      title="Reverse image search: 1B+ catalog, 300ms p95, embedding-space retrieval."
      subtitle="Query upload → preprocess → backbone embedding → PQ-compressed ANN → cross-encoder re-rank → taxonomy gate → top-20 results."
      byline={[{label:"Difficulty", value:"Hard"}, {label:"Mode", value:"Build, then study"}]}
    />

    <VIS.TLDR>
      <strong>The trap is treating this as a classifier; it is a <VIS.Term def="Nearest-neighbour search in a learned vector space: encode the query as a fixed-length vector, find the K catalog vectors with smallest cosine or Euclidean distance, return them. The 'model' is the encoder; the 'database' is the index of pre-computed catalog vectors.">vector-retrieval system</VIS.Term> at billion scale.</strong> Drag the pieces, draw the arrows, then hit <em>Reveal model design</em>. The reference design composes five non-negotiable layers: a <VIS.Term def="Pretrained visual backbone trained with image-text or image-image contrastive loss (CLIP, DINOv2, SigLIP). Maps any image to a fixed-length L2-normalized vector where visual+semantic similarity corresponds to cosine similarity.">CLIP-class backbone embedder</VIS.Term> emits a 768-d vector; <VIS.Term def="Product Quantization: split each vector into M subvectors and replace each subvector with the index of its nearest codebook entry (256 per codebook). Compresses 768-d float32 (3072 B) to M bytes (typically 32-128). Trained k-means on a sample of the corpus.">PQ compression</VIS.Term> turns 3KB/vector into 32B; <VIS.Term def="Hierarchical Navigable Small World: a multi-layer proximity graph supporting log-time approximate nearest-neighbour search. Trades a tunable amount of recall for orders-of-magnitude latency reduction vs brute-force scan.">HNSW</VIS.Term> retrieves top-200 candidates in ~80ms; a <VIS.Term def="A heavier model run on the top-K ANN candidates that re-orders them. Unlike the embedder (which scores in isolation), a cross-encoder sees query and candidate together — often a transformer over concatenated patch tokens — and dramatically raises precision@10 at the cost of K extra forward passes.">cross-encoder re-ranker</VIS.Term> raises precision@10; and a <VIS.Term def="A pipeline stage that drops or demotes results based on policy: NSFW classifier, copyright-match flag, taxonomy mismatch. Lives AFTER retrieval, not before — pre-filtering by category collapses recall in the embedding space where semantic neighbours often span categories.">taxonomy + safety gate</VIS.Term> cleans the final list. Get any of these layers wrong and the math breaks at billion scale.
    </VIS.TLDR>

    <VIS.Section id="sec-brief" title="The brief">
      <p>"1B+ images in the catalog (<VIS.Term def="Visual product search: given a user photo of an item, find catalog listings of that item or visually similar items. The dominant consumer use case for reverse image search, with intent ranging from 'I want exactly this' to 'I want something like this'.">visual product search</VIS.Term> + <VIS.Term def="Copyright detection / DMCA pipeline: given a copyrighted image, find unauthorized reuses (often modified by crop, watermark, recompression). Requires a different similarity notion than consumer search — invariance to modification, not to semantic variation.">copyright-match</VIS.Term> + <VIS.Term def="Duplicate detection at catalog ingestion: identifies near-identical images already in the corpus (same product, multiple sellers, slightly cropped). Tighter similarity bar than consumer search.">duplicate-finding</VIS.Term> use cases). 300ms <VIS.Term def="p95 latency: the 95th-percentile end-to-end serving latency. 95% of queries complete within this budget. Distinct from average; the long-tail user experience is what p95 captures.">p95</VIS.Term> server budget. Query is a single image: upload, screenshot, or web crop. Return top-20 visually similar items with source links. 30M new images/day ingested. Embedding model can be <VIS.Term def="CLIP (Contrastive Language-Image Pretraining): a 2021 OpenAI model that learns image and text embeddings jointly via contrastive loss on web-scraped (image, alt-text) pairs. Produces semantically aligned image features useful for retrieval and zero-shot classification.">CLIP</VIS.Term> / <VIS.Term def="DINOv2: a 2023 Meta model trained with self-distillation on curated image data (no text). Produces strong visual features that capture local and global structure without language supervision.">DINOv2</VIS.Term> / <VIS.Term def="ResNet: convolutional architecture from 2015 with residual connections. Pretrained on ImageNet, frequently fine-tuned on retrieval tasks; the older but still-deployed backbone choice.">ResNet</VIS.Term> — your call. Vector index, refresh strategy, re-rank, and how you'd catch quality drift. Bonus: support 'find this object inside the photo' (<VIS.Term def="Region query: the user wants to find products matching a specific object inside a larger scene (e.g., 'that lamp in this living room photo'). Requires object-proposal + per-region embedding, or dense-token catalog indexing.">region query</VIS.Term>)."</p>
      <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>Why this is not a classifier</h3>
      <p>Classifiers have a fixed output head. Reverse image search has 1B+ output classes (one per catalog item), changing daily. The only tractable shape is <strong>encode-once-retrieve-many</strong>: train an encoder so similarity in <VIS.Term def="The output space of the embedder: a vector space (here 768-d, L2-normalized) where two images close in distance are 'similar' according to the encoder's training objective. The geometry of this space is what makes retrieval tractable.">embedding space</VIS.Term> matches the kind of similarity the user wants (<VIS.Term def="Semantic similarity: two images mean 'the same thing' (both are office chairs, both depict beaches). The encoder is invariant to color, crop, lighting, pose. CLIP-style training produces this.">semantic</VIS.Term> / <VIS.Term def="Near-duplicate similarity: two images are pixel-level very close (same source image, minor crop / recompression / watermark). The encoder is SENSITIVE to differences. Triplet loss on augmented pairs produces this.">near-duplicate</VIS.Term> / part-of), pre-compute every catalog vector, and at query time do a single forward pass + <VIS.Term def="Approximate nearest neighbour: a class of algorithms that finds K vectors close to a query in sub-linear time, trading a tunable amount of recall for speed. HNSW, IVF-PQ, and ScaNN are common variants.">ANN</VIS.Term> lookup.</p>
    </VIS.Section>

    <VIS.Section id="sec-design" title="Build the design">
      <p style={{margin:"0 0 10px 0", fontSize:14, color:"#64748b"}}>
        <strong>Shape legend:</strong> sharp rect = stateless service · cylinder = stateful store · dashed hachure ellipse = streaming source · dashed hachure rounded rect = queue · cross-hatched diamond = monitor/control.
      </p>
      <ExcalidrawCanvas
        pieces={PIECES}
        expectedPieces={EXPECTED_PIECES}
        expectedEdges={EXPECTED_EDGES}
        onReveal={() => setSolutionVisible(true)}
      />
    </VIS.Section>

    {solutionVisible && (
      <React.Fragment>
        <VIS.Section id="sec-reference" title="The reference design">
          <p style={{margin:"0 0 10px 0", fontSize:14, color:"#64748b"}}>
            Auto-routed Mermaid; node colors mirror the palette categories. The vertical spine is the serving path; sidecars handle refresh and monitoring.
          </p>
          <VIS.Mermaid chart={String.raw`
flowchart TD
  classDef data    fill:#bae6fd,stroke:#0369a1,color:#0c4a6e
  classDef model   fill:#ddd6fe,stroke:#6d28d9,color:#312e81
  classDef infra   fill:#fde68a,stroke:#b45309,color:#78350f
  classDef monitor fill:#bbf7d0,stroke:#15803d,color:#14532d

  q["Query upload<br/>~50M imgs/day"]:::data

  subgraph serve["Serving path — 300ms p95"]
    direction TB
    prep["Image preprocess<br/>resize + color norm"]:::model
    embed["Backbone embedder<br/>CLIP / DINOv2<br/>768-d"]:::model
    region["Region embedder<br/>(crop / object)"]:::model
    pq["PQ quantizer<br/>768-d → 32B"]:::model
    ann[("ANN index<br/>HNSW over 1B+")]:::infra
    rerank["Re-ranker<br/>cross-encoder<br/>patch-level"]:::model
    tax{{"Taxonomy gate<br/>NSFW / copyright"}}:::monitor
    out["Results assembler<br/>top-20 + dedupe"]:::model
  end

  subgraph refresh["Refresh path"]
    direction TB
    bus[/"Embedding refresh bus<br/>new + re-embed"/]:::infra
    retrain["Retrain loop<br/>contrastive<br/>on click pairs"]:::model
  end

  subgraph mon["Monitoring"]
    direction TB
    recall{{"Recall@K eval<br/>vs exact 1-NN"}}:::monitor
    drift{{"Drift monitor<br/>KL / PSI"}}:::monitor
  end

  q --> prep
  prep --> embed
  prep --> region
  embed --> pq
  region --> pq
  pq --> ann
  ann --> rerank
  rerank --> tax
  tax --> out

  bus -- "incremental insert" --> ann
  bus --> embed
  retrain -- "weekly weight push" --> embed
  retrain --> bus

  recall --> ann
  drift --> recall
  drift -- "regression → retrain" --> retrain
`} />
        </VIS.Section>

        <VIS.Section id="sec-walk" title="Walking the design">
          <ol>
            <li><strong>Preprocess strips background-pixel leakage.</strong> <VIS.Term def="EXIF orientation correction: phone cameras store orientation as metadata, not in pixels. Without correction, the same image rotated 90° gives a different embedding. Done before anything else.">Orientation</VIS.Term>, resize to 336, <VIS.Term def="Color normalization: subtract mean, divide by std on RGB channels using the backbone's training-time statistics. Aligns the query distribution with the embedder's expectations.">color-normalize</VIS.Term>, optional <VIS.Term def="Saliency crop: a small foreground-detection model identifies the salient object and crops to it. Closes much of the phone↔studio gap before the embedder runs, at ~5ms cost.">saliency crop</VIS.Term>. ~5ms. <VIS.Equation tex={String.raw`x' = \text{norm}(\text{resize}(\text{rot}(x)))`} /></li>
            <li><strong>Backbone embedder</strong> emits a 768-d <VIS.Term def="L2 normalization: divide a vector by its Euclidean norm so it lies on the unit sphere. After this, Euclidean distance and cosine similarity produce the same ordering — useful when the index (HNSW) uses one but you reason in the other.">L2-normalized</VIS.Term> vector: <VIS.Equation tex={String.raw`\phi(x') \in \mathbb{R}^{768},\;\|\phi\|_2 = 1`} />. Choice is between CLIP (semantic), DINOv2 (visual), or a ResNet fine-tuned on click data. See §3a.</li>
            <li><strong>Region embedder (optional)</strong> runs only when the query intent is "find this object". <VIS.Term def="Object proposal network: a small detection model that outputs candidate bounding boxes (5-20 typically) where objects might live. Lightweight variants: FastSAM, YOLO. Used to convert a scene query into multiple object queries.">Object-proposal network</VIS.Term> produces 5-20 regions; each is embedded separately and the top-K is the union over regions. See §3i.</li>
            <li><strong>PQ quantizer</strong> compresses the float32 768-d vector to 32 bytes (~96× compression). Trained <VIS.Term def="k-means: classic clustering algorithm that partitions vectors into k clusters by minimizing within-cluster variance. In PQ, used per-subspace to learn 256-entry codebooks that approximate the subvector distribution.">k-means codebooks</VIS.Term> on a 10M sample of catalog embeddings. See §3c.</li>
            <li><strong>HNSW ANN</strong> retrieves top-200 in ~80ms at <VIS.Term def="Recall@K: fraction of true K nearest neighbours (per exact 1-NN brute force) that appear in the ANN's top-K. The headline quality metric for ANN; HNSW typically achieves recall@10 in 0.93-0.99 range depending on ef_search.">recall@10</VIS.Term> &gt; 0.95. <VIS.Equation tex={String.raw`\text{search}(q) \to \text{top-}K_{\text{cand}}`} />. See §3b.</li>
            <li><strong>Cross-encoder re-ranker</strong> over the 200 candidates lifts <VIS.Term def="Precision@K: fraction of the top-K results that are truly relevant (ground-truth match). For consumer search, precision@10 is the headline metric — users only see the top of the page.">precision@10</VIS.Term> — sees query + candidate together (<VIS.Term def="Patch-level attention: a transformer sees both images as sequences of patches and attends across them. Captures alignment that bi-encoders (which compress each image to a single vector) cannot.">patch-level attention</VIS.Term>), unlike the embedder which scores in isolation. See §3d.</li>
            <li><strong>Taxonomy + safety gate</strong> drops <VIS.Term def="NSFW classifier: a small image classifier that flags 'not safe for work' content. Two-sided gate — query side blocks abuse, candidate side cleans the result page.">NSFW</VIS.Term>, flags copyright matches, demotes off-category. Lives <em>after</em> retrieval, not before. See §3h.</li>
            <li><strong>Refresh path</strong>: new images embed and stream into HNSW; weekly retrain pushes new backbone weights and triggers a corpus <VIS.Term def="Re-embed: when the backbone is bumped, every catalog vector must be regenerated by the new model. At 1B vectors and ~30ms/image, this is hours of GPU time and forces a blue-green index swap.">re-embed</VIS.Term>. <VIS.Equation tex={String.raw`\Delta_{\text{re-embed}} = N_{\text{corpus}} \cdot t_{\text{embed}}`} />. See §3f.</li>
            <li><strong>Recall@K eval + drift monitor</strong> close the loop: hourly held-out recall vs <VIS.Term def="Exact 1-NN (1-nearest-neighbour): brute-force compute of similarity between the query and every catalog vector. Slow but gives ground truth for recall@K of ANN. Used only on held-out gold sets, never at serve time.">exact 1-NN</VIS.Term>, daily query-distribution <VIS.Term def="PSI (Population Stability Index): a divergence measure between two histograms over the same bins. PSI > 0.25 indicates significant distribution shift. Used for drift monitoring on feature distributions or query distributions.">PSI</VIS.Term>. Regression triggers retrain or threshold-tune.</li>
          </ol>
        </VIS.Section>

        <VIS.Section id="sec-math" title="Why every stage is the way it is — the math">

          <h3 style={{marginTop:14, marginBottom:6, fontSize:15, color:"#334155"}}>§3a. Embedding-distance choice</h3>
          <p>Two embedding vectors are "similar" via one of two metrics:</p>
          <VIS.Equation display={true} tex={String.raw`\text{cos}(u, v) \;=\; \frac{u \cdot v}{\|u\|\,\|v\|}, \qquad d_2(u, v) \;=\; \|u - v\|_2`} />
          <p>For L2-normalized vectors (<VIS.Equation tex={String.raw`\|u\|=\|v\|=1`} />), the two collapse to the same ordering:</p>
          <VIS.Equation display={true} tex={String.raw`d_2(u,v)^2 \;=\; 2 - 2\,\text{cos}(u,v)`} />
          <p>So <em>normalize-then-Euclidean</em> ≡ cosine, and HNSW (which uses Euclidean internally) gets cosine semantics for free. The choice that <em>does</em> matter is what loss the encoder was trained with: <VIS.Term def="Contrastive loss (InfoNCE / NT-Xent): a loss that pulls matched (positive) pairs together and pushes unmatched (negative) pairs apart in embedding space. Temperature τ controls sharpness; large batches give more in-batch negatives. The dominant retrieval-training loss.">contrastive</VIS.Term> (CLIP-style) gives semantic similarity; <VIS.Term def="Triplet loss: classic retrieval loss with anchor, positive, negative — forces dist(anchor, positive) + margin < dist(anchor, negative). Older than InfoNCE; still used for near-duplicate work where the positive is an augmented version of the anchor.">triplet on near-duplicates</VIS.Term> gives near-dup similarity. Pick the encoder by use case, not the metric.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3b. ANN recall@K vs latency</h3>
          <p><VIS.Term def="HNSW search latency: dominated by the number of graph nodes visited, which scales roughly as log N (graph depth) times ef_search (beam width). Random RAM reads per step make memory bandwidth, not flops, the bottleneck.">HNSW search latency</VIS.Term> is <VIS.Equation tex={String.raw`O(\log N \cdot ef_{\text{search}})`} />. Recall@10 is a roughly logistic function of <VIS.Term def="ef_search: HNSW's runtime knob controlling how many graph candidates to consider during search. Larger ef_search → higher recall but more memory accesses. The canonical recall-vs-latency tradeoff dial.">ef_search</VIS.Term>:</p>
          <VIS.Equation display={true} tex={String.raw`\text{recall@10}(ef) \;\approx\; \sigma(\alpha \log ef - \beta)`} />
          <p>Empirically: <VIS.Equation tex={String.raw`ef=32 \Rightarrow 0.85, ef=64 \Rightarrow 0.93, ef=128 \Rightarrow 0.97, ef=256 \Rightarrow 0.99`} />. Latency roughly doubles each step. The knob is set by an SLO on recall@10 paired with the latency budget:</p>
          <VIS.Equation display={true} tex={String.raw`ef^{*} \;=\; \min\!\big\{ef : \text{recall@10}(ef) \ge 0.95 \;\land\; t_{\text{ann}}(ef) \le 100\,\text{ms}\big\}`} />

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3c. PQ compression ratio</h3>
          <p>For a 768-d float32 vector (3,072 bytes) split into M=32 subvectors of dimension 24 each, with 256-entry codebooks (1 byte/code):</p>
          <VIS.Equation display={true} tex={String.raw`\text{compressed} \;=\; M \cdot \log_2(256)/8 \;=\; 32\ \text{bytes}, \qquad \text{ratio} \;=\; 3072/32 \;=\; 96\times`} />
          <p>RAM footprint at 1B vectors:</p>
          <VIS.Equation display={true} tex={String.raw`1\times10^{9} \times 32\,\text{B} \;=\; 32\,\text{GB}\;\text{(vs 3.07 TB raw)}`} />
          <p>Reconstruction error is bounded by codebook quantization noise:</p>
          <VIS.Equation display={true} tex={String.raw`\mathbb{E}\|\phi - \tilde{\phi}\|_2^2 \;\approx\; \sum_{m=1}^{M} \mathrm{tr}(\Sigma_m^{(\text{within-cluster})})`} />
          <p>Loss in recall@10 from PQ is typically 1-2pp vs raw vectors at M=32. The <VIS.Term def="Codebook: in PQ, a learned table of 256 representative vectors per subspace. Each subvector is replaced by the index of its closest codebook entry. The codebooks are learned via k-means on a sample of catalog embeddings.">codebooks</VIS.Term> are retrained whenever the backbone bumps; mismatched codebooks corrupt distances.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3d. Re-ranker precision lift</h3>
          <p>Let <VIS.Equation tex={String.raw`p_{\text{embed}}(\text{rel}\mid r)`} /> be embedding-similarity precision at rank r, and <VIS.Equation tex={String.raw`p_{\text{rerank}}(\text{rel}\mid r)`} /> the cross-encoder's. Cross-encoder sees both inputs jointly so it captures alignment a bi-encoder cannot. Empirically:</p>
          <VIS.Equation display={true} tex={String.raw`\text{precision@10}_{\text{rerank}} \;-\; \text{precision@10}_{\text{embed}} \;\approx\; +0.10\text{-}0.20`} />
          <p>Cost: K extra forward passes. With K=200 and 0.25ms/pair on GPU:</p>
          <VIS.Equation display={true} tex={String.raw`t_{\text{rerank}} \;=\; 200 \times 0.25\,\text{ms} \;=\; 50\,\text{ms}`} />
          <p>That fits inside the 300ms budget alongside preprocess (5ms) + embed (30ms) + ANN (80ms) + gate (10ms) + assembler (5ms) ≈ 180ms total + network. The <VIS.Term def="Bi-encoder: two-tower architecture where query and document are encoded INDEPENDENTLY into separate vectors, then compared by cosine. Cheap at scale (catalog vectors are pre-computed) but cannot model joint query-document features.">bi-encoder</VIS.Term> handles the 1B-scale retrieval; the cross-encoder handles the precision lift on the top-200.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3e. Shard count for 1B vectors</h3>
          <p>RAM per shard caps the HNSW graph that fits in one host. With 32GB host RAM, 32B/vec PQ codes plus HNSW graph overhead (~50B/vec for neighbour lists):</p>
          <VIS.Equation display={true} tex={String.raw`N_{\text{shard}} \;\approx\; \frac{R_{\text{host}}}{B_{\text{pq}} + B_{\text{graph}}} \;=\; \frac{32\,\text{GB}}{82\,\text{B}} \;\approx\; 3.9\times 10^{8}`} />
          <p>Shard count:</p>
          <VIS.Equation display={true} tex={String.raw`S \;=\; \lceil N / N_{\text{shard}} \rceil \;=\; \lceil 10^{9}/3.9\times 10^{8} \rceil \;=\; 3`} />
          <p>Plus replicas for QPS; plus 2-3x headroom for re-embed bumps. <VIS.Term def="Sharding key: the deterministic function used to assign a vector to one of S shards. For embedding indexes, the key MUST be a random hash of an id — never a semantic feature like category or cluster — to keep load balanced and every query's recall consistent across the full corpus.">Sharding key</VIS.Term> is <em>random hash of image id</em> — never category — so every query fans out to every shard and load is balanced. <VIS.Term def="Fan-out: the pattern where one query is sent in parallel to all S shards, each returns its local top-K, and a coordinator merges into a global top-K. The cost is S × per-shard latency at p99, which is why fan-out widths are kept small (3-10).">Fan-out</VIS.Term> p99 is bounded by the slowest shard.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3f. Re-embed cost on backbone bump</h3>
          <p>Bumping the backbone (e.g., CLIP-L → CLIP-H) invalidates every catalog vector. Re-embed cost at 30ms/image on A100:</p>
          <VIS.Equation display={true} tex={String.raw`T_{\text{re-embed}} \;=\; \frac{N_{\text{corpus}} \cdot t_{\text{embed}}}{P_{\text{gpus}}} \;=\; \frac{10^{9} \cdot 30\,\text{ms}}{1000\,\text{GPUs}} \;\approx\; 8.3\ \text{hours}`} />
          <p>This forces a <strong><VIS.Term def="Blue-green deployment: stand up a new fully-built index alongside the old, validate it on shadow traffic, then atomically switch the read path. The standard pattern for replacing an embedding-space service without quality regression.">blue-green index swap</VIS.Term></strong>: build a new index on the new embedding in parallel; switch the read path atomically; do <em>not</em> mix vectors from two embedding spaces in one HNSW graph (their distances are uncalibrated).</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3g. ROC + precision-recall tradeoff</h3>
          <p>At the re-ranker output, a relevance score threshold trades off precision and recall:</p>
          <VIS.Equation display={true} tex={String.raw`\text{precision}(\tau) \;=\; \frac{\sum_i \mathbb{1}\{s_i > \tau \land \text{rel}_i\}}{\sum_i \mathbb{1}\{s_i > \tau\}}, \qquad \text{recall}(\tau) \;=\; \frac{\sum_i \mathbb{1}\{s_i > \tau \land \text{rel}_i\}}{\sum_i \mathbb{1}\{\text{rel}_i\}}`} />
          <p>For copyright-match queries: <VIS.Equation tex={String.raw`C_{\text{FN}} \gg C_{\text{FP}}`} /> (missing infringement is worse than a false flag for human review) → low τ. For consumer "find similar" queries: <VIS.Equation tex={String.raw`C_{\text{FP}} \gg C_{\text{FN}}`} /> (irrelevant results destroy trust) → high τ. The threshold is therefore per-intent, not global. The full <VIS.Term def="ROC curve: a plot of true-positive-rate vs false-positive-rate as the threshold sweeps. AUC summarizes it; the operating point is picked by the cost-of-error ratio specific to the use case.">ROC curve</VIS.Term> is generated per intent, and the operating point is picked from cost-of-error ratios.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3h. Drift detection — query distribution + recall</h3>
          <p>Population Stability Index over feature bins (intent class, image size class, locale):</p>
          <VIS.Equation display={true} tex={String.raw`\text{PSI} \;=\; \sum_i (p^{(\text{new})}_i - p^{(\text{base})}_i) \log\!\frac{p^{(\text{new})}_i}{p^{(\text{base})}_i}`} />
          <p>PSI &gt; 0.25 = significant shift. Paired with recall@K regression on a fixed gold set:</p>
          <VIS.Equation display={true} tex={String.raw`\Delta\text{recall@10}(t) \;=\; \text{recall@10}(t) - \text{recall@10}(t_0)`} />
          <p>If PSI rises <em>and</em> recall@10 drops, the corpus distribution moved and the encoder is stale → retrain. If only PSI rises, intent mix changed but the encoder still serves it → just rebalance the eval set. The pattern of <VIS.Term def="Gold set: a fixed, manually curated evaluation set with known ground-truth nearest neighbours. Used to measure recall@K hourly without label noise. Must be held out from training and refreshed periodically to avoid contamination.">gold set</VIS.Term> + drift monitor together separates distribution shift from encoder regression.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3i. Region-query math (object-in-image)</h3>
          <p>For a region query, the top-K is the union over R region embeddings:</p>
          <VIS.Equation display={true} tex={String.raw`\text{top-}K_{\text{region}} \;=\; \bigcup_{r=1}^{R} \text{top-}K(\phi(\text{region}_r))`} />
          <p>Cost grows linearly in R. Two implementation choices: (a) embed each region separately and fan out R parallel ANN queries; (b) embed each <em>catalog</em> image as a set of patch-tokens (e.g., 196 tokens for a 14×14 <VIS.Term def="ViT (Vision Transformer): a transformer architecture for images that treats 14×14 or 16×16 image patches as tokens, applies self-attention across them. Modern visual backbones (CLIP-ViT, DINOv2) are all ViTs.">ViT</VIS.Term>) and do dense-token retrieval (<VIS.Term def="ColBERT-style dense retrieval: each item is represented as a SET of token vectors rather than a single pooled vector. Retrieval scores by summing max-similarity across query tokens. More expressive, higher recall on fine-grained matches, ~10x more index cost.">ColBERT-style</VIS.Term>). Option (a) is 10× cheaper at index build; option (b) is 10× higher recall on small objects.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3j. Cold-start refresh cadence</h3>
          <p>New images arrive at rate <VIS.Equation tex={String.raw`\dot{N}`} />. Their embedding-space distribution drifts at rate <VIS.Equation tex={String.raw`\dot{D}_{\text{sem}}`} /> (measured as KL between this-week and last-week new-image embedding histograms). Retrain cadence:</p>
          <VIS.Equation display={true} tex={String.raw`\Delta t_{\text{retrain}} \;=\; \frac{D^{*}_{\text{sem}}}{\dot{D}_{\text{sem}}}`} />
          <p>For a stationary corpus, <VIS.Equation tex={String.raw`\dot{D}_{\text{sem}} \to 0`} /> and retrain frequency drops to monthly. For a fashion or news catalog with <VIS.Term def="Seasonal drift: when the input distribution changes on a predictable seasonal cycle (winter clothing in October, holiday decor in November). Forces retraining or threshold-tuning on a corresponding cycle.">seasonal drift</VIS.Term>, weekly is the equilibrium between (a) freshness, (b) re-embed compute cost, (c) <VIS.Term def="Eval-and-rollback cycle time: the total time from triggering a new model release through validation, staged rollout, and (if needed) rollback. Sets the lower bound on retrain cadence.">eval-and-rollback cycle time</VIS.Term>.</p>

        </VIS.Section>

        <VIS.Section id="sec-traps-bm" title="Trap drills — business metrics + query intent">

          <VIS.TrapProblem
            id="ris-q1"
            difficulty="hard"
            mode="single"
            title="A PM asks: 'what's the north-star for reverse image search?' Which metric anchors the scorecard?"
            scenario={<>Each option is a candidate north-star. Reverse image search powers three use cases on the same backend: consumer visual search, copyright-match (DMCA pipeline), and duplicate-finding for catalog dedup. Pick the metric that holds up across all three without optimizing one at the cost of another.</>}
            options={[
              {key:"a", text:"Click-through rate on the first result — it's the cleanest binary signal and is observable per query within the session.", correct:false},
              {key:"b", text:"NDCG@10 against a per-intent gold set with intent (consumer / copyright / dedup) determined upstream, with per-intent thresholds calibrated independently. The composite is intent-mix-weighted.", correct:true},
              {key:"c", text:"Recall@1000 on a uniform random sample of queries — captures the ceiling of what the retrieval pipeline can ever produce.", correct:false},
              {key:"d", text:"Average dwell time on the results page, since dwell correlates with the user finding something useful and is observable in real time without label lag.", correct:false},
            ]}
            trap={<>
              (a) is the click-trap: CTR on the first result rewards thumbnail aesthetics, not visual-match quality, and is meaningless for copyright queries which never produce clicks. (c) measures system ceiling, not delivered quality — high recall@1000 with terrible top-10 ordering ships nothing useful. (d) confounds: long dwell can mean great results OR confused user.<br/><br/>
              The composite NDCG@10 with per-intent gold sets handles the three workloads correctly: copyright wants recall (don't miss infringement), consumer wants precision (don't waste the top of the page), dedup wants near-duplicate accuracy. Same retrieval stack, different evaluation slices.
            </>}
            lens={<>For multi-intent retrieval systems, the north-star must be <strong>intent-stratified</strong>: a single global metric will optimize toward whichever intent dominates the query mix and silently regress the others. The interview move is to ask "what intents share this backend?" before committing to one metric.</>}
            stretch={<>Suppose copyright queries are 5% of volume but 80% of revenue. How does that change the intent-mix-weight in the composite?</>}
          />
        </VIS.Section>

        <VIS.Section id="sec-traps-bm2" title="Trap drills — query-intent disambiguation">
          <VIS.TrapProblem
            id="ris-q2"
            difficulty="hard"
            mode="single"
            title="A user uploads a photo of their living room with a small lamp visible in the corner. They want to buy that lamp. What is the right serving path?"
            scenario={<>The query image is a wide-angle scene; the object of interest is ~5% of the pixels. Pick the single best serving strategy.</>}
            options={[
              {key:"a", text:"Run the whole-image embedder and return top-20 — the model will learn to attend to salient objects.", correct:false},
              {key:"b", text:"Run an object-proposal network on the query, embed each region separately, and return top-K from the union of region searches.", correct:true},
              {key:"c", text:"Run the whole-image embedder, then text-OCR any visible labels in the image and BM25 against catalog titles.", correct:false},
              {key:"d", text:"Show a UI prompt 'tap on the item' before serving — let the user disambiguate intent.", correct:false},
            ]}
            trap={<>
              (a) fails because a whole-image embedding of a living room is dominated by sofa, walls, and lighting — the lamp signal is 1/20th of the vector. The top results will be other living rooms. (c) confuses retrieval modes — BM25 over filenames is the BM25-filename distractor from the palette, and text rarely appears in lamp photos anyway. (d) is plausible but adds latency and friction for users who can already see "find the object" affordance; modern systems do (b) by default and add the tap-UI as an explicit refinement.<br/><br/>
              (b) is the region-query pattern: object-proposal + per-region embedding gives each candidate object its own retrieval shot, then the union ranking surfaces the actual product even when it's small in the frame.
            </>}
            lens={<>Whole-image and region retrieval are different serving paths sharing one index. The router decides which to call based on the image geometry or an explicit intent signal. Senior tell: someone who knows this asks "how big is the object in the query?" before answering the design question.</>}
            stretch={<>The region embedder needs the catalog images to also be embedded at region-level for cross-comparison. What's the extra index cost?</>}
          />
        </VIS.Section>

        <VIS.Section id="sec-traps-bm3" title="Trap drills — duplicate vs semantic match">
          <VIS.TrapProblem
            id="ris-q3"
            difficulty="hard"
            mode="single"
            title="Catalog dedup needs near-duplicate detection. Visual search needs semantic similarity. Both use the same backbone embedder. What is the right way to split them?"
            scenario={<>Catalog has duplicate listings (same product, different sellers, slightly cropped or recolored images). Consumer search needs "same kind of item, not necessarily the same image". One embedding model serves both — or does it?</>}
            options={[
              {key:"a", text:"Use the same embedder and the same threshold for both — semantic similarity is a superset of near-duplicate similarity, so the harder problem subsumes the easier one.", correct:false},
              {key:"b", text:"Use the same embedder but two different similarity thresholds — dedup uses cosine > 0.95, consumer uses cosine > 0.6.", correct:false},
              {key:"c", text:"Use two heads on the same backbone: one trained with hard-negative contrastive loss (semantic), one trained with augmented-pair triplet loss on the same image (near-duplicate). Same forward pass, two output projections.", correct:true},
              {key:"d", text:"Use perceptual hashing (pHash / dHash) for dedup and CLIP for semantic, with no shared backbone.", correct:false},
            ]}
            trap={<>
              (a) is wrong because semantic similarity is rotation/color/crop invariant by design — exactly the invariances that <em>hide</em> near-duplicates (rotated copy of the same image looks "semantically identical" to the original AND to a different copy of the same product). One threshold can't tell them apart. (b) sounds right but a single embedding space cannot be simultaneously invariant and discriminating to the same transformations — high cosine in a CLIP space means "same concept", not "same image".<br/><br/>
              (d) is reasonable but wastes the shared backbone compute and creates two indexes. (c) is the production-aligned answer: shared trunk for compute, two heads each trained for its similarity notion. Same forward pass, two output projections, two indexes — but one infra path.
            </>}
            lens={<>"Same backbone, different head" is the canonical multi-task trick when the tasks share visual features but differ in invariances. The trap is assuming one similarity space serves all notions of similarity.</>}
            stretch={<>If you only had compute for one head, which task would you prioritize and how would you fall back for the other?</>}
          />
        </VIS.Section>

        <VIS.Section id="sec-traps-data" title="Trap drills — data collection + label noise">
          <VIS.TrapProblem
            id="ris-q4"
            difficulty="hard"
            mode="multi"
            title="Which training-corpus choices for the backbone retrain hold up under web-scale label noise?"
            scenario={<>The retrain corpus is mined from search-click logs and engagement data on the live system. Pick the choices that yield clean contrastive signal without baking in feedback loops.</>}
            options={[
              {key:"a", text:"Treat every (query, top-1 result, click) tuple as a positive pair for contrastive training, weighted by click rate.", correct:false},
              {key:"b", text:"Use (query, clicked-result) where dwell-time exceeds a per-intent threshold; treat shorter clicks as ambiguous and exclude them.", correct:true},
              {key:"c", text:"Mine hard negatives from the index itself: for each anchor, sample candidates that are close in embedding space but were not clicked, and use them as negatives in the contrastive loss.", correct:true},
              {key:"d", text:"Add explicit augmentation positives: same image cropped / rotated / recolored becomes a positive pair, training near-duplicate invariance directly.", correct:true},
              {key:"e", text:"Use the original CLIP web-scraped (image, alt-text) pairs as the only training data — they're pre-aligned and don't suffer from system feedback loops.", correct:false},
              {key:"f", text:"Sample negatives uniformly from the full catalog — large corpus means hard negatives are statistically rare anyway.", correct:false},
            ]}
            trap={<>
              (a) is the click-label trap: top-1 clicks are dominated by position bias (users click rank 1 even when it's wrong) and by the current model's bias (you can only click what was retrieved). (e) ignores that the live system serves a different distribution than web-scrape, so CLIP-as-is leaves quality on the table. (f) is the easy-negative trap: random negatives are trivially separable; the model never learns the hard cases.<br/><br/>
              (b) decontaminates by requiring intent-signal (dwell). (c) hard-negative mining is the highest-impact lever in retrieval training — it forces the encoder to learn the fine-grained features that distinguish near-misses. (d) augmentation positives bake in the desired invariances directly.
            </>}
            lens={<>Retrieval-training data work is dominated by two problems: <strong>position bias from click logs</strong> and <strong>negative quality</strong>. Both are addressed structurally, not by adding more data — dwell-thresholding for the first, hard-negative mining for the second.</>}
            stretch={<>How do you avoid the feedback loop where hard-negatives mined from the current index re-train the encoder to like exactly what the current index already retrieves?</>}
          />
        </VIS.Section>

        <VIS.Section id="sec-traps-data2" title="Trap drills — language-of-product-name leakage">
          <VIS.TrapProblem
            id="ris-q5"
            difficulty="hard"
            mode="single"
            title="The retrain corpus mines (query-image, catalog-image) pairs from clicks. Most catalog images have the product name embedded as a small caption or watermark. What goes wrong?"
            scenario={<>The backbone is a ViT that reads pixels. The product name is plainly visible in many catalog images.</>}
            options={[
              {key:"a", text:"Nothing — visible text is just another visual feature, the model will learn what it can.", correct:false},
              {key:"b", text:"The encoder learns to read text and uses it as a shortcut for matching, which collapses when queries are user photos that don't contain the product name.", correct:true},
              {key:"c", text:"The encoder learns the text but treats it as noise because watermark position varies, so it's auto-discounted.", correct:false},
              {key:"d", text:"Only an issue if the text is in the same language as the query — multilingual catalogs are self-correcting.", correct:false},
            ]}
            trap={<>
              (a) and (c) treat the leak as benign. The actual failure mode is more specific: a ViT that has read text in catalog images during training will use OCR-like patches as features. At inference time, user photos almost never contain the brand name in pixels, so the most informative feature the model learned is missing → quality collapses on real queries. (d) is wrong because the issue is shortcut-learning, not language overlap.<br/><br/>
              The mitigation is preprocessing: detect and inpaint over text regions in the catalog corpus before training, OR augment the catalog corpus with text-occluded versions so the model can't depend on visible text.
            </>}
            lens={<>Shortcut-learning is the silent killer of contrastive retrieval models: any feature that predicts the label in the training set but is absent at inference will corrupt the encoder. The senior diagnostic is to look at saliency maps on the trained encoder and confirm the model is attending to the product, not the watermark.</>}
            stretch={<>What if the user occasionally screenshots the catalog page (with the watermark visible)? Does that change your mitigation?</>}
          />
        </VIS.Section>

        <VIS.Section id="sec-traps-data3" title="Trap drills — distractor pixels in user photos">
          <VIS.TrapProblem
            id="ris-q6"
            difficulty="hard"
            mode="single"
            title="A user uploads a phone photo with a busy background. You want the embedder to focus on the foreground object. What is the right query-side intervention?"
            scenario={<>The catalog images are studio shots with clean backgrounds. The query is a phone photo with cluttered background. The encoder was trained on (clean, clean) pairs.</>}
            options={[
              {key:"a", text:"Run a saliency / foreground-segmentation model on the query at inference time, crop the foreground, and embed only the crop.", correct:true},
              {key:"b", text:"Retrain the encoder with stronger background augmentation so it becomes background-invariant at training time, no query-side intervention.", correct:false},
              {key:"c", text:"Both — segment-crop at inference AND background-augment at training. They tackle different parts of the same gap.", correct:false},
              {key:"d", text:"Do nothing — the cross-encoder re-ranker will handle the noise.", correct:false},
            ]}
            trap={<>
              This question hides the correct multi-answer behind a single-select frame: (a) and (b) are <em>both</em> defensible mitigations; (c) is what a thoughtful practitioner would actually ship; (d) is the lazy answer. The trap is that "both" is dressed up as the obvious senior pick, but the single-select frame is asking for the highest-leverage <em>one</em> intervention.<br/><br/>
