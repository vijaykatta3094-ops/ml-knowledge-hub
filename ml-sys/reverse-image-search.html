              (a) is the correct single answer because query-side segmentation buys you the bigger gap closure for the smaller compute spend: a frozen segmentation model adds ~10ms and reliably strips background, while retraining the encoder with background augmentation is a multi-day effort that doesn't fully close the gap (background statistics in studio photos are almost zero, so the trained-in invariance still doesn't match user-photo backgrounds).
            </>}
            lens={<>Phone↔studio domain-gap closure is the canonical reverse-image-search problem. Two mitigations exist: query-side (segmentation/crop) is cheap and high-leverage; training-side (augmentation) is expensive and incremental. Senior tell: pick the cheap intervention first, save the expensive one for the gap that remains.</>}
            stretch={<>Saliency segmentation can fail on transparent objects (water bottles) or thin objects (jewelry chains). What's the fallback?</>}
          />
        </VIS.Section>

        <VIS.Section id="sec-traps-train" title="Trap drills — training loss + hard negatives">
          <VIS.TrapProblem
            id="ris-q7"
            difficulty="hard"
            mode="multi"
            title="Which training-loop choices for the contrastive backbone are correct?"
            scenario={<>The encoder is trained with InfoNCE-style contrastive loss. Pick all the configuration choices that hold up.</>}
            options={[
              {key:"a", text:"Temperature τ around 0.07 — small temperature sharpens the softmax over negatives, emphasizing the hardest negatives in the batch.", correct:true},
              {key:"b", text:"Temperature τ around 1.0 — a flatter softmax averages over many negatives and stabilizes gradients.", correct:false},
              {key:"c", text:"In-batch negatives plus mined hard negatives from the current index, refreshed every epoch.", correct:true},
              {key:"d", text:"Batch size around 4 — small batches are easier to fit and converge faster.", correct:false},
              {key:"e", text:"Large batch size (4K-32K) with gradient accumulation if needed — more in-batch negatives directly raise the upper bound on representation quality.", correct:true},
              {key:"f", text:"Symmetric loss: include both (query → catalog) and (catalog → query) contrastive terms — without the symmetric term, the encoder can collapse the catalog tower while the query tower works fine.", correct:true},
            ]}
            trap={<>
              (b) misreads what τ does: a flat softmax doesn't stabilize, it removes the signal that distinguishes hard negatives from easy ones, and the encoder converges to a trivial solution. (d) is the small-batch trap: contrastive learning's effective signal scales with the number of in-batch negatives — small batches starve the loss.<br/><br/>
              The correct set is τ small, batches large, hard negatives mined, and the loss symmetric. These four together explain ~80% of the variance in retrieval-encoder quality across papers.
            </>}
            lens={<>Contrastive training has a small canonical recipe. Most failure modes are violations of one of: low τ, large batch, hard negatives, symmetric loss. Get all four right and you reproduce SOTA; get any one wrong and you regress 5-10pp.</>}
            stretch={<>How would you debug if your loss is decreasing nicely but recall@10 on a held-out set is flat?</>}
          />
        </VIS.Section>

        <VIS.Section id="sec-traps-train2" title="Trap drills — augmentation policy">
          <VIS.TrapProblem
            id="ris-q8"
            difficulty="hard"
            mode="multi"
            title="Which augmentation choices match the production use case?"
            scenario={<>Augmentations during contrastive training define what invariances the encoder will have at inference. Pick augmentations that match the use case (visual product search across phone↔studio domain gap).</>}
            options={[
              {key:"a", text:"Random crop + horizontal flip + color jitter — standard, captures user-photo-vs-catalog-photo style variation.", correct:true},
              {key:"b", text:"Random rotation up to 180° — phone photos can be rotated arbitrarily before EXIF correction.", correct:false},
              {key:"c", text:"Random background-replace using a segmentation mask, pasting the foreground onto a random non-studio scene.", correct:true},
              {key:"d", text:"CutMix between two random catalog images, treating the composite as a positive of either parent.", correct:false},
              {key:"e", text:"MixUp between embeddings of two catalog items, treating the linear interpolation as a positive.", correct:false},
              {key:"f", text:"Random gaussian blur and sensor noise — phone cameras introduce motion blur and low-light grain that catalog photos don't have.", correct:true},
            ]}
            trap={<>
              (b) trains in an invariance that the preprocessor already handles: EXIF orientation correction puts the image upright before the encoder sees it. Adding 180° rotation augmentation forces the encoder to be upside-down invariant, which is wrong — a flipped product photo means a flipped product. (d) and (e) are classification-style augmentations that don't make sense for retrieval: a half-and-half composite isn't a positive of either parent in any useful retrieval sense.<br/><br/>
              (a, c, f) are the production policy: standard photometric jitter, background-replace to cross the domain gap, sensor-noise to match phone-photo statistics.
            </>}
            lens={<>Augmentations should match the actual distribution gap, not be lifted from a classification paper. A senior MLE asks "what does the inference-time distribution look like that the training-time distribution doesn't?" and adds augmentations only for that gap.</>}
            stretch={<>If the segmentation mask used in (c) is itself imperfect, what's the failure mode?</>}
          />
        </VIS.Section>

        <VIS.Section id="sec-traps-train3" title="Trap drills — supervised vs self-supervised pretrain">
          <VIS.TrapProblem
            id="ris-q9"
            difficulty="medium"
            mode="single"
            title="You can warm-start the backbone from CLIP, DINOv2, or a supervised ImageNet ResNet. Which is the right default?"
            scenario={<>Same architecture (ViT-B), three different pretraining objectives. Pick the most defensible default.</>}
            options={[
              {key:"a", text:"CLIP — contrastive image-text on web-scale data, embeddings already have semantic alignment that matches consumer-search intent.", correct:true},
              {key:"b", text:"DINOv2 — self-distillation gives clean visual features without text, no alt-text label noise.", correct:false},
              {key:"c", text:"ImageNet-supervised ResNet — clean labels, well-understood baseline.", correct:false},
              {key:"d", text:"None — train from scratch on the in-domain catalog so there's no pretrain-task mismatch.", correct:false},
            ]}
            trap={<>
              (b) DINOv2 is a strong second; for pure visual similarity (near-duplicate, dedup), DINOv2 often wins. But the question says "consumer search intent", and consumer queries are heavily semantic ("show me something like this kind of thing"), where the text-aligned features from CLIP transfer better. (c) ImageNet has 1000 categories, mostly objects-in-isolation; insufficient coverage of product diversity. (d) ignores that catalog images are O(1B) but the diversity is narrow — pretrain on web-scale is strictly better than scratch.<br/><br/>
              The defensible default is CLIP for consumer search; switch to DINOv2 for dedup-heavy workloads where pure visual features beat semantic ones.
            </>}
            lens={<>Pretrain-task fit > model size, every time. The senior move is to articulate which pretraining objective produces an embedding-space topology that matches your downstream similarity notion, not to argue from leaderboards.</>}
            stretch={<>If your use case is split 60/40 between consumer-search and dedup, do you train two encoders or one?</>}
          />
        </VIS.Section>

        <VIS.Section id="sec-traps-mon" title="Trap drills — monitoring + drift detection">
          <VIS.TrapProblem
            id="ris-q10"
            difficulty="hard"
            mode="multi"
            title="Which monitoring signals would catch reverse-image-search regressing in production?"
            scenario={<>Pick the signals that detect quality regressions before users complain. Reject the ones that are just generic service-health metrics.</>}
            options={[
              {key:"a", text:"Recall@10 against a fixed gold set of 10k queries, computed hourly using both ANN and exact 1-NN as ground truth.", correct:true},
              {key:"b", text:"PSI between today's and last-week's query-image embedding distribution, bucketed into 50 histogram bins on the first principal component.", correct:true},
              {key:"c", text:"p99 server latency — if latency is fine, the system is fine.", correct:false},
              {key:"d", text:"Click-through rate on the first 3 results, broken out per intent class.", correct:true},
              {key:"e", text:"Index size in bytes — it's the most reliably observable signal about the corpus.", correct:false},
              {key:"f", text:"Per-shard load imbalance — alert if any shard's QPS deviates more than 2x from the mean for 5 consecutive minutes.", correct:true},
            ]}
            trap={<>
              (c) latency is generic service-health, not retrieval-quality. Plenty of quality regressions are latency-clean (encoder bug, stale corpus). (e) index size is a configuration signal, not a quality one — a regressed index can have any size.<br/><br/>
              The right set covers: held-out quality (a), query-distribution drift (b), engagement quality per intent (d), and capacity / sharding health (f). Together they catch quality bugs, distribution shifts, and infra regressions.
            </>}
            lens={<>For retrieval systems, the alert horizon must be short enough to act before clicks register the regression. Held-out gold sets are the only quality signal that is observable in seconds; PSI is the only distribution signal that's leading; latency is necessary but not sufficient.</>}
            stretch={<>What's the false-positive rate of PSI > 0.25 in practice, and how do you avoid alert fatigue?</>}
          />
        </VIS.Section>

        <VIS.Section id="sec-traps-mon2" title="Trap drills — latency budget breakdown">
          <VIS.TrapProblem
            id="ris-q11"
            difficulty="medium"
            mode="single"
            title="Your 300ms p95 budget is being violated. Where is the most likely culprit?"
            scenario={<>The system has been stable for months; recently p95 jumped from 240ms to 380ms. No code deploy in the last 24 hours. Pick the most likely root cause.</>}
            options={[
              {key:"a", text:"The HNSW index hit a memory threshold and started page-faulting, multiplying per-query random reads.", correct:true},
              {key:"b", text:"The backbone embedder GPU got a firmware update and is now 2x slower.", correct:false},
              {key:"c", text:"The cross-encoder re-ranker model checkpoint was silently swapped to a larger variant.", correct:false},
              {key:"d", text:"Network latency between datacenters increased.", correct:false},
            ]}
            trap={<>
              (b), (c), (d) all match "p95 jumped without a code deploy" superficially, but (b) doesn't happen without a kernel-level change, (c) implies a config change, (d) would have hit a cross-region alarm. (a) is the canonical HNSW failure mode: as the index grows or memory pressure rises (e.g., the embedding refresh bus added ~50M new vectors), the HNSW graph crosses the page-cache boundary, every query starts hitting disk for some neighbours, and latency goes nonlinear.<br/><br/>
              The diagnostic is to check page-fault rates on the index hosts and shard memory utilization, not GPU clocks or model files.
            </>}
            lens={<>HNSW is a memory-resident structure. Once it spills, performance collapses. The senior debug instinct is to suspect the index host's RAM headroom before suspecting the model, because models don't usually slow down silently, but memory pressure absolutely does.</>}
            stretch={<>What's the mitigation while you re-shard to add capacity?</>}
          />
        </VIS.Section>

        <VIS.Section id="sec-traps-mon3" title="Trap drills — recall regression after re-embed">
          <VIS.TrapProblem
            id="ris-q12"
            difficulty="hard"
            mode="single"
            title="After a backbone version bump and full re-embed, recall@10 on the held-out gold set dropped by 4pp. The new backbone scores higher offline. What's wrong?"
            scenario={<>The new backbone (CLIP-L → CLIP-H) was offline-evaluated and beats the old one by 2pp on the same gold set. After re-embedding the corpus and swapping the index, online recall drops 4pp. Pick the most likely cause.</>}
            options={[
              {key:"a", text:"The PQ codebooks were re-fit on a sample of the new embeddings, but the sample was too small and now compresses with higher reconstruction error.", correct:false},
              {key:"b", text:"Half the catalog was re-embedded on the new backbone, half is still on the old, and the HNSW graph is mixing two incompatible embedding spaces.", correct:true},
              {key:"c", text:"The ef_search parameter was retained at its old value, which is too aggressive for the new embedding distribution.", correct:false},
              {key:"d", text:"The new backbone has different output dimensionality and the index was built with the wrong vector length.", correct:false},
            ]}
            trap={<>
              (a) is plausible — small PQ training samples do regress reconstruction — but a 4pp drop is too large for codebook-only error. (c) ef_search tuning matters but rarely accounts for 4pp swings. (d) a dimensionality mismatch would crash the index build, not silently drop recall.<br/><br/>
              (b) is the canonical blue-green failure: if you mix vectors from two embedding spaces in one HNSW graph, the cosine distances between old-space and new-space vectors are uncalibrated. Even if the new backbone is better, the graph's neighbour relationships are corrupted across the boundary. The fix is to build a fully new index on a fully re-embedded corpus, then atomically swap the read path — never mix.
            </>}
            lens={<>Backbone bumps require atomic index swaps, not rolling updates. The math reason: cosine in space A is meaningless in space B. The infra implication is the blue-green deploy pattern is non-optional for embedding services.</>}
            stretch={<>You don't have 2x the RAM to build the new index alongside the old. What's the staged rollout?</>}
          />
        </VIS.Section>

        <VIS.Section id="sec-traps-mon4" title="Trap drills — query-distribution shift">
          <VIS.TrapProblem
            id="ris-q13"
            difficulty="medium"
            mode="single"
            title="Your PSI on query embeddings has been rising 0.05/week for three weeks. Recall@10 hasn't moved. What action is correct?"
            scenario={<>PSI is now at 0.20, approaching the 0.25 alert threshold. Recall@10 on the fixed gold set is stable. Pick the right action.</>}
            options={[
              {key:"a", text:"Trigger an emergency retrain — query distribution is drifting and the encoder will soon be stale.", correct:false},
              {key:"b", text:"Rebalance the gold set to match the new query distribution and re-measure recall@10. If it's still stable, the encoder is still serving the new mix correctly.", correct:true},
              {key:"c", text:"Raise the PSI threshold to 0.30 — clearly the current threshold was over-tight.", correct:false},
              {key:"d", text:"Do nothing — recall@10 is the north star and it's stable.", correct:false},
            ]}
            trap={<>
              (a) over-reacts: PSI on its own doesn't mean encoder regression — it means input distribution moved. (c) is the classic raise-the-alert anti-pattern: never tune alerts to silence them. (d) under-reacts: a stale gold set will fail to detect a regression that's happening on the actual incoming traffic.<br/><br/>
              (b) is the production-correct response: PSI rising without recall regression is the signal that the gold set is stale, not the encoder. Refresh the gold set to match the new mix, re-measure, and then decide whether action is needed.
            </>}
            lens={<>Drift detection has two failure modes: false positive (encoder is fine, distribution moved harmlessly) and false negative (gold set is stale, real regression hidden). The fix is to monitor gold-set staleness as its own signal and to re-balance routinely.</>}
            stretch={<>How often do you rebalance the gold set, and how do you avoid contaminating it with training-set queries?</>}
          />
        </VIS.Section>

        <VIS.Section id="sec-traps-mon5" title="Trap drills — re-rank quality regression">
          <VIS.TrapProblem
            id="ris-q14"
            difficulty="medium"
            mode="single"
            title="Re-ranker precision@10 dropped 3pp after a routine retrain. The ANN candidate quality is unchanged. What is the most likely cause?"
            scenario={<>Bi-encoder embedder is unchanged. Cross-encoder re-ranker was retrained on the latest week of click data. Pick the most likely cause.</>}
            options={[
              {key:"a", text:"The re-ranker training set was sampled from current ANN top-K candidates, so it can only ever re-rank candidates the current embedder already retrieves — feedback loop.", correct:true},
              {key:"b", text:"The re-ranker model architecture changed silently.", correct:false},
              {key:"c", text:"The cross-encoder is overfitting to the training set; precision@10 on training is much higher than on eval.", correct:false},
              {key:"d", text:"Click data quality dropped this week due to a bot attack.", correct:false},
            ]}
            trap={<>
              (b) would be a code-review issue, not a silent regression. (c) overfit usually shows train-eval gap; the question doesn't mention one, and a 3pp eval drop without train change typically isn't overfit. (d) bot traffic would also corrupt the embedder retrain, but the question says embedder is stable.<br/><br/>
              (a) is the feedback-loop trap specific to re-rankers: if you train the re-ranker on candidates the current embedder retrieves, you teach it to re-rank within an already-filtered set, and any improvement is invisible because the relevant candidate was never in the set to begin with. The fix is to mix the re-ranker training set with candidates from multiple retrieval policies (current, prior, random) so the re-ranker generalizes.
            </>}
            lens={<>Two-stage retrieval has compounding feedback risk: the second stage trains only on candidates the first stage chose. Senior teams break the loop by injecting diversity into the re-ranker training distribution.</>}
            stretch={<>How would you A/B test whether this is actually the cause without retraining yet?</>}
          />
        </VIS.Section>

        <VIS.Section id="sec-traps-gotcha" title="Trap drills — gotchas (NSFW + copyright + watermarks)">

          <VIS.TrapProblem
            id="ris-q15"
            difficulty="hard"
            mode="single"
            title="A copyright-match query returns a near-identical image, but the catalog image has a faint visible watermark and the query doesn't. The system marks them as not-a-match. What is the right fix?"
            scenario={<>Use case: DMCA pipeline finds infringing reuses of copyrighted images. Watermarks are a common difference between the protected original and an unauthorized reuse. Pick the right intervention.</>}
            options={[
              {key:"a", text:"Lower the cosine threshold for copyright matches so closer-but-not-identical pairs still match.", correct:false},
              {key:"b", text:"Train an additional copyright-specific head that is invariant to watermark-style modifications (watermark, crop, slight rotation, color shift).", correct:true},
              {key:"c", text:"Pre-process all catalog images to remove watermarks before embedding.", correct:false},
              {key:"d", text:"Switch to perceptual hashing (pHash) for copyright matching — it's invariant to such modifications.", correct:false},
            ]}
            trap={<>
              (a) lowering the threshold ships too many false positives — unrelated images that are merely similar will trigger DMCA actions. (c) pre-processing the catalog destroys the legal evidence trail (the catalog is the protected work; modifying it before storage corrupts provenance). (d) pHash is a real tool but is fragile to small crops and is not the production-ready answer at scale; it's a complementary signal, not a replacement.<br/><br/>
              (b) is the canonical fix: a copyright head trained with augmentations specifically matching modification-style edits (watermark add, crop, mild rotation, jpeg recompression) gives an embedding space where modified-vs-original pairs are close even though raw cosine on the consumer head is not.
            </>}
            lens={<>Copyright is a different similarity notion than consumer search. The same backbone serves both via a second head trained with the right augmentation policy. The fix is at the loss + augmentation layer, not at the threshold.</>}
            stretch={<>What's the false-positive failure mode of an over-trained copyright head?</>}
          />
        </VIS.Section>

        <VIS.Section id="sec-traps-gotcha2" title="Trap drills — NSFW gate placement">
          <VIS.TrapProblem
            id="ris-q16"
            difficulty="medium"
            mode="single"
            title="The NSFW gate currently runs on the query image before the embedder. Where should it live in the pipeline?"
            scenario={<>The NSFW model is a small classifier with ~5ms latency. It can run on the query, on the candidates, or both. Pick the right placement.</>}
            options={[
              {key:"a", text:"On the query only — blocks the request entirely if the query is unsafe.", correct:false},
              {key:"b", text:"On the candidates only, after re-ranking — drop or demote unsafe results from the final top-20.", correct:false},
              {key:"c", text:"On both query and candidates — query for abuse prevention, candidates for result quality.", correct:true},
              {key:"d", text:"On the embedder output as a small linear probe — cheaper than running a separate classifier.", correct:false},
            ]}
            trap={<>
              (a) misses the result-side: a safe query can retrieve unsafe near-neighbours from the catalog. (b) misses the query-side: an unsafe query is a policy-block at intake, not a serving-time concern. (d) a linear probe over a general-purpose embedding is too weak for the NSFW boundary, which is sharply defined and benefits from a purpose-trained classifier.<br/><br/>
              (c) is the correct two-sided gate: query-side blocks abuse (user uploading prohibited content); candidate-side cleans the result page. Same model, two call sites.
            </>}
            lens={<>Safety gates are usually two-sided: input control and output control. The same model often serves both, but the policies differ — query may be a hard block, candidate may be a soft demote.</>}
            stretch={<>What's the right action when an NSFW score is in the middle of the distribution — ambiguous?</>}
          />
        </VIS.Section>

        <VIS.Section id="sec-traps-gotcha3" title="Trap drills — false match on white background">
          <VIS.TrapProblem
            id="ris-q17"
            difficulty="medium"
            mode="single"
            title={`Catalog images are all on clean white backgrounds. The encoder consistently returns "any other product on a white background" as a top match, regardless of what the product is. What's the diagnosis?`}
            scenario={<>Recall@10 looks reasonable on the held-out gold set (which is mostly catalog-to-catalog queries), but user complaints say the top results are wrong-product-but-same-background. Pick the diagnosis.</>}
            options={[
              {key:"a", text:"The encoder learned that 'white background' is a discriminative feature for catalog images and uses it heavily; the held-out gold set masks the issue because it's catalog-to-catalog.", correct:true},
              {key:"b", text:"The ANN index is corrupted; rebuild it.", correct:false},
              {key:"c", text:"The cross-encoder re-ranker is broken.", correct:false},
              {key:"d", text:"Click data is dominated by users with weak intent, training the encoder to return generic results.", correct:false},
            ]}
            trap={<>
              (b) and (c) attack infrastructure when the issue is training-data. (d) is a click-quality narrative but doesn't explain the specific "same background" failure mode.<br/><br/>
              (a) is the shortcut-learning trap: the encoder finds the most discriminative training-time feature (white-background-vs-not) and uses it disproportionately. The gold set masks it because it shares the bias. The fix is to (i) add background-augmented negatives to training so background can't be a shortcut, and (ii) include user-photo queries (with backgrounds) in the eval gold set so the bias surfaces.
            </>}
            lens={<>Shortcut-learning is invisible on in-distribution evals. The only way to catch it is to evaluate on data that breaks the shortcut. Senior tell: ask "what feature in the training set is absent at inference time?" and run an eval specifically on that gap.</>}
            stretch={<>How would you build a "shortcut-stress" eval set programmatically rather than by user complaints?</>}
          />
        </VIS.Section>

        <VIS.Section id="sec-traps-gotcha4" title="Trap drills — cold-start for new images">
          <VIS.TrapProblem
            id="ris-q18"
            difficulty="medium"
            mode="single"
            title="A new image is ingested into the catalog at t=0. When is it discoverable by reverse-image search?"
            scenario={<>The embedding refresh pipeline can be synchronous (block on indexing before ack) or asynchronous (ack and index later). Pick the right design.</>}
            options={[
              {key:"a", text:"Synchronous — image is not ack'd to the seller until it's embedded and inserted into the ANN index, so it's discoverable immediately on success.", correct:false},
              {key:"b", text:"Asynchronous — ack the upload immediately, embed and insert into HNSW within minutes via an incremental insert path, with a daily nightly graph rebuild for HNSW health.", correct:true},
              {key:"c", text:"Asynchronous, but rebuild the full HNSW from scratch every time a new image lands so the graph stays optimal.", correct:false},
              {key:"d", text:"Asynchronous, with the embed-and-insert path deferred to the weekly retrain cycle.", correct:false},
            ]}
            trap={<>
              (a) blocks the upload on a 100ms+ operation, which is unacceptable for high-volume catalog ingestion. (c) re-building HNSW per insert is O(N log N) for the whole corpus — 1B vectors makes this impossible per insert. (d) waiting a week for new images to become searchable is too slow for any production catalog.<br/><br/>
              (b) is the incremental-insert + periodic-rebuild pattern: HNSW supports cheap insertions, but graph quality degrades slowly as inserts pile up (neighbours of new nodes aren't optimal). A nightly rebuild from scratch on the accumulated corpus restores graph health. New images are searchable in minutes; long-tail graph quality is maintained at night.
            </>}
            lens={<>HNSW has two timescales: insert (fast, slight quality cost) and rebuild (slow, optimal quality). Production pipelines mix both — incremental for freshness, periodic rebuild for health.</>}
            stretch={<>What's the failure mode if you skip the nightly rebuild for a week?</>}
          />
        </VIS.Section>

        <VIS.Section id="sec-traps-gotcha5" title="Trap drills — taxonomy gate placement (before or after retrieval)">
          <VIS.TrapProblem
            id="ris-q19"
            difficulty="hard"
            mode="single"
            title="Should the taxonomy filter (e.g., 'only return furniture results for a furniture-intent query') run BEFORE or AFTER ANN retrieval?"
            scenario={<>The taxonomy gate has access to a category-classifier output for both the query and every catalog item. Pick the right placement.</>}
            options={[
              {key:"a", text:"Before — pre-filter the ANN search space to only the taxonomy-matched subset, so retrieval is faster and cleaner.", correct:false},
              {key:"b", text:"After — let ANN retrieve over the full embedding space, then filter by taxonomy on the top-K candidates.", correct:true},
              {key:"c", text:"Both — pre-filter to the matched category for speed, then re-check on results for correctness.", correct:false},
              {key:"d", text:"Never — let the embedder learn category-awareness from data and trust the cosine ordering.", correct:false},
            ]}
            trap={<>
              (a) is the SQL-pre-filter distractor restated: pre-filtering by taxonomy collapses the retrieval space and rules out the visual neighbours that are actually similar but happen to be classified into a different category (taxonomy classifiers are noisy; a vase mis-classified as decoration won't be retrievable for a "find similar vases" query). (d) is wishful — the embedder cannot know your taxonomy unless you trained it to.<br/><br/>
              (b) is the production-correct ordering: retrieve over the full space (the cosine ordering is the authoritative signal), then filter the top-K — drop or demote results whose category disagrees with the query intent. This way recall is preserved and category-mismatch is corrected as a post-process.
            </>}
            lens={<>Category filters BEFORE retrieval damage recall; AFTER retrieval damage nothing (the dropped candidates were wrong anyway). The general principle: filters that depend on noisy classifiers should never gate the highest-recall stage.</>}
            stretch={<>If your taxonomy classifier has 5% error rate, what's the expected recall hit from pre-filtering?</>}
          />
        </VIS.Section>

        <VIS.Section id="sec-traps-gotcha6" title="Trap drills — sharding key choice">
          <VIS.TrapProblem
            id="ris-q20"
            difficulty="medium"
            mode="single"
            title="At 1B vectors, you need 3-5 ANN shards. What is the right sharding key?"
            scenario={<>Each shard holds a slice of the corpus; the query fans out to all shards in parallel and merges. Pick the sharding strategy.</>}
            options={[
              {key:"a", text:"Random hash of image id — every query fans out to every shard equally; load is balanced by construction.", correct:true},
              {key:"b", text:"Hash of category — each shard owns a category, so taxonomy-aware queries only need to hit one shard.", correct:false},
              {key:"c", text:"Hash of first PCA component of the embedding — semantically similar vectors cluster on the same shard, so most queries only hit one shard.", correct:false},
              {key:"d", text:"Time of ingestion — recent images on the hot shard, older images on the cold shard.", correct:false},
            ]}
            trap={<>
              (b) category-sharded breaks for cross-category similarity (which is most of the queries) and creates load imbalance (popular categories = hot shards). (c) embedding-sharded sounds clever but creates a query routing problem: at query time you have an embedding but you need to decide which shard owns its neighbours, which is exactly the ANN problem you're trying to solve. (d) time-sharding creates a hot recent shard and cold archive shards; QPS is wildly imbalanced.<br/><br/>
              (a) random sharding makes load balancing trivial and ensures every query gets fair recall from all parts of the corpus. The cost is fan-out across all shards, but this is what HNSW + parallel network ops are designed for.
            </>}
            lens={<>Sharding choices have to make load balancing trivial AND preserve recall. Random hash is the answer most of the time for embedding indexes; clever semantic shardings are temptations that almost always backfire.</>}
            stretch={<>If your read traffic is 100x your write traffic, what's the replica strategy on top of the 3-5 shards?</>}
          />
        </VIS.Section>

        <VIS.Section id="sec-traps-gotcha7" title="Trap drills — distractor: linear scan">
          <VIS.TrapProblem
            id="ris-q21"
            difficulty="easy"
            mode="single"
            title="Why not just brute-force scan all 1B catalog vectors at query time? GPUs are fast."
            scenario={<>An engineer proposes skipping the ANN index and doing exact 1-NN over the corpus. Pick the right reason this fails.</>}
            options={[
              {key:"a", text:"Brute-force 1-NN over 1B 768-d vectors is ~1.5 TFLOPs per query; at 100 TFLOP/s on an A100, that's ~15ms per query but only one query at a time per GPU — you cannot scale QPS.", correct:false},
              {key:"b", text:"Brute-force is ~3 PFLOPs per query at 1B vectors and 768d, which is ~30 seconds on an A100. You cannot meet a 300ms budget at any reasonable cost.", correct:true},
              {key:"c", text:"Brute-force requires the full 3TB corpus in GPU memory, which is impossible.", correct:false},
              {key:"d", text:"Brute-force is fine but the cosine similarity formula doesn't work at billion scale due to floating-point precision loss.", correct:false},
            ]}
            trap={<>
              (a) is the right order of magnitude error: 1B × 768 floats × 1 query is 7.7×10^11 multiply-adds, not 1.5 TFLOPs (which would be 1.5×10^12). Approximate is roughly right but the QPS argument is the wrong framing — the issue is per-query latency, not throughput. (c) memory residency is solvable by PQ; not the issue. (d) is fiction.<br/><br/>
              The actual math: 1B vectors × 768d × 2 flops/multiply-add = 1.5×10^12 flops ≈ 1.5 TFLOPs per query. At 100 TFLOP/s sustained on an A100, that's 15ms — IF you could perfectly saturate the GPU on a single query. In practice memory bandwidth dominates at this scale: 3TB of vectors / 1.5TB/s HBM = 2 seconds per query of pure load time. Brute force is killed by the bandwidth wall, not the compute wall.
            </>}
            lens={<>The brute-force argument is the canonical motivator for ANN. It's worth knowing the actual numbers (compute, bandwidth, memory) so you can justify the architecture quantitatively in an interview, not just gesture at "too slow".</>}
            stretch={<>At what corpus size does brute-force on a single A100 actually meet a 300ms p95?</>}
          />
        </VIS.Section>

        <VIS.Section id="sec-traps-gotcha8" title="Trap drills — distractor: BM25 on filenames">
          <VIS.TrapProblem
            id="ris-q22"
            difficulty="easy"
            mode="single"
            title="Why not BM25 over image filenames as the retrieval layer?"
            scenario={<>Filenames sometimes encode the product (red-vase-12in.jpg). An engineer proposes BM25 over filename tokens as a cheap retrieval baseline.</>}
            options={[
              {key:"a", text:"Filenames are noisy and not all images have descriptive filenames; BM25 over filenames generalizes badly.", correct:false},
              {key:"b", text:"Reverse-image search by definition has no text query — the user uploads an image, not words. BM25 needs text on both sides.", correct:true},
              {key:"c", text:"BM25 is too slow at billion scale.", correct:false},
              {key:"d", text:"Filenames are stored on a different cluster from the vector index, so the join is expensive.", correct:false},
            ]}
            trap={<>
              (a) is plausible but misses the structural problem. (c) BM25 with inverted indexes is actually very fast at scale (web search uses it). (d) is a generic infra answer, not the real reason.<br/><br/>
              (b) is the categorical reason: reverse-image search is an image-to-image retrieval problem. The query is an image. BM25 needs text-vs-text. You could in principle OCR the query or run a captioner, but at that point you've built a text-retrieval system, not reverse-image search. The whole motivation for vector retrieval over images is that there's no text on the query side.
            </>}
            lens={<>Distractor questions ("why not X?") sometimes hide a categorical mismatch behind a plausible-sounding scale or quality argument. The senior answer is to identify the categorical reason before the practical one.</>}
            stretch={<>If you DID have a text query alongside the image (multi-modal search), would BM25 reappear?</>}
          />
        </VIS.Section>

        <VIS.Section id="sec-traps-gotcha9" title="Trap drills — temperature in InfoNCE">
          <VIS.TrapProblem
            id="ris-q23"
            difficulty="medium"
            mode="single"
            title="In InfoNCE contrastive loss, what does the temperature τ control, mechanistically?"
            scenario={<>The loss is <VIS.Equation tex={String.raw`\mathcal{L} = -\log \frac{\exp(\text{sim}(q, k^+)/\tau)}{\sum_k \exp(\text{sim}(q, k)/\tau)}`} />. Pick the correct mechanistic description.</>}
            options={[
              {key:"a", text:"τ controls the learning rate effective at the contrastive head.", correct:false},
              {key:"b", text:"τ scales how sharply the softmax weighs hard negatives vs easy negatives. Smaller τ concentrates gradient on the hardest negatives.", correct:true},
              {key:"c", text:"τ controls the dimension of the projection head before the contrastive loss.", correct:false},
              {key:"d", text:"τ is the L2 regularization coefficient on the embedding norms.", correct:false},
            ]}
            trap={<>
              (a), (c), (d) confuse τ with other hyperparameters. (b) is the mechanistic answer: τ acts as an inverse-temperature on the similarity scores inside the softmax. Small τ → sharper softmax → gradient dominated by the highest-similarity negatives (hard negatives) → encoder learns to push them away. Large τ → flatter softmax → all negatives contribute roughly equally → easy negatives dilute the signal.
            </>}
            lens={<>Knowing what each hyperparameter mechanistically controls (not just "tune it") separates senior from junior. τ ≈ 0.07 is the standard default because it concentrates gradient on hard negatives while still backpropping signal from medium-similarity ones.</>}
            stretch={<>What goes wrong if τ is too small (e.g., 0.01)?</>}
          />
        </VIS.Section>

        <VIS.Section id="sec-traps-gotcha10" title="Trap drills — embedding dimensionality choice">
          <VIS.TrapProblem
            id="ris-q24"
            difficulty="medium"
            mode="single"
            title="What dimensionality should the backbone embedding be?"
            scenario={<>Pick the right embedding dimension given a 1B-vector corpus, 300ms p95 budget, 96x PQ compression, and ANN sharding.</>}
            options={[
              {key:"a", text:"128 — small enough to fit in RAM for the whole corpus, fast cosine, low ANN cost.", correct:false},
              {key:"b", text:"768 — matches standard ViT-B output, allows PQ to compress with low reconstruction error, well-studied invariants.", correct:true},
              {key:"c", text:"4096 — more dimensions means more capacity, better retrieval quality.", correct:false},
              {key:"d", text:"32 — minimal dimensionality to minimize index footprint.", correct:false},
            ]}
            trap={<>
              (a) 128d under-parameterizes the embedding for billion-scale retrieval; recall@10 drops because too many catalog items collapse to nearby vectors. (c) 4096d explodes the PQ codebook size, the HNSW graph cost, and the re-rank cost without commensurate quality gain (most of the variance lives in the first few hundred dimensions for ViT-style backbones). (d) 32d is severely under-parameterized; you lose ordering at this scale.<br/><br/>
              (b) 768d is the sweet spot for ViT-B-class backbones: it matches the trained-on dimensionality (no projection mismatch), compresses cleanly with PQ-32 to 32B per vector, and gives the discriminative capacity needed at 1B scale. ViT-L's 1024d is also defensible.
            </>}
            lens={<>Embedding dimensionality is not a free parameter — it's set by the backbone. The cost of mismatched dimensionality (added projection head) is small but the discriminative capacity at billion scale is real.</>}
            stretch={<>Could you reduce the served dimensionality via Matryoshka Representation Learning while keeping the backbone unchanged?</>}
          />
        </VIS.Section>

        <VIS.Section id="sec-traps-gotcha11" title="Trap drills — when to use IVF-PQ over HNSW">
          <VIS.TrapProblem
            id="ris-q25"
            difficulty="medium"
            mode="single"
            title="HNSW is RAM-resident and fast. IVF-PQ is disk-tier and cheaper. When is IVF-PQ the right choice?"
            scenario={<>Pick the scenario where IVF-PQ is preferred over HNSW.</>}
            options={[
              {key:"a", text:"A 1B-vector corpus where 90% of the corpus is rarely queried (long-tail catalog), and the cost of keeping all of it in RAM is prohibitive.", correct:true},
              {key:"b", text:"A 100M-vector corpus where every vector is hot.", correct:false},
              {key:"c", text:"A 100M-vector corpus where freshness matters more than recall.", correct:false},
              {key:"d", text:"Any case where recall@10 must exceed 0.99.", correct:false},
            ]}
            trap={<>
              (b) HNSW dominates here — fully in RAM, recall is highest, no benefit from IVF-PQ's disk-tier design. (c) IVF-PQ is less freshness-friendly than HNSW because the coarse quantizer centroids are trained on a sample and stale ones hurt recall. (d) high recall is HNSW's strength, not IVF-PQ's.<br/><br/>
              (a) is IVF-PQ's wheelhouse: tiered storage with hot inverted lists in RAM and cold ones on disk lets you serve a long-tail corpus at acceptable latency without paying full-RAM cost. The tradeoff is recall (typically 3-5pp lower than HNSW at similar query latency).
            </>}
            lens={<>HNSW and IVF-PQ aren't binary — they're points on a recall-latency-cost frontier. Senior teams sometimes deploy both: HNSW for the hot 10% of the corpus, IVF-PQ for the cold tail, with a unified read path.</>}
            stretch={<>What's the operational complexity cost of running two index types?</>}
          />
        </VIS.Section>

        <VIS.Section id="sec-traps-gotcha12" title="Trap drills — bot traffic + abuse">
          <VIS.TrapProblem
            id="ris-q26"
            difficulty="medium"
            mode="single"
            title="Your QPS doubles overnight, but the query-image embedding distribution becomes nearly uniform random. What's the most likely cause?"
            scenario={<>Recall@10 is unaffected; latency is fine; CTR drops sharply. Pick the right diagnosis.</>}
            options={[
              {key:"a", text:"A scraping bot is uploading random images to probe the catalog; the embedder is serving them but no human ever clicks.", correct:true},
              {key:"b", text:"The embedding model regressed silently and now produces near-random embeddings.", correct:false},
              {key:"c", text:"A new user demographic with very different visual taste came online.", correct:false},
              {key:"d", text:"Capacity scaled out and load is now spread across more shards.", correct:false},
            ]}
            trap={<>
              (b) would show in recall@10 regression; the question says it's unaffected, ruling this out. (c) human users have non-uniform query distributions (clustering on popular categories); uniform random embedding distribution is the signature of synthetic traffic, not a human cohort. (d) load distribution doesn't change the input distribution.<br/><br/>
              (a) is the diagnostic: uniform random embeddings + 0 click rate = bot. The fix is rate-limiting + behavioral fingerprinting at the edge, not anything in the ML stack. The ML signal (uniform embedding distribution) is the canary that surfaces the abuse pattern faster than security tooling alone.
            </>}
            lens={<>ML monitoring sometimes catches operational anomalies (abuse, scraping, bugs) before classical infra alarms because it watches semantic features of traffic. The senior posture is to use embedding-distribution dashboards as a first-line abuse-detection signal.</>}
            stretch={<>If the bot starts uploading non-random images (a curated set), what's the next signal?</>}
          />
        </VIS.Section>

        <VIS.Section id="sec-traps-gotcha13" title="Trap drills — eval-set contamination">
          <VIS.TrapProblem
            id="ris-q27"
            difficulty="hard"
            mode="single"
            title="Recall@10 on your held-out gold set has been steadily rising for weeks, even though user-side metrics are flat. What is the most likely cause?"
            scenario={<>Gold set is supposed to be held out from training. Pick the likely cause.</>}
            options={[
              {key:"a", text:"The model is genuinely improving and user metrics lag.", correct:false},
              {key:"b", text:"The gold set was contaminated — likely because click-mining for hard negatives is pulling queries similar to gold-set queries into the training corpus, or the gold set itself was implicitly mined from production data.", correct:true},
              {key:"c", text:"The PQ codebooks are converging and reconstruction error is dropping uniformly.", correct:false},
              {key:"d", text:"ANN recall improved due to ef_search tuning.", correct:false},
            ]}
            trap={<>
              (a) is the optimistic answer; the question says user metrics are flat, so model quality genuinely didn't improve on the user-facing distribution. (c) and (d) would lift recall once, not continuously over weeks.<br/><br/>
              (b) is the silent-contamination trap: production-mined training data can implicitly contain the gold-set queries (or near-duplicates) if the gold set was itself sampled from production logs. Each retrain memorizes a bit more of the gold set, raising recall@10 on it without any real quality lift. The fix is to maintain a strict deduplication between gold-set and training-set, and to refresh the gold set with truly held-out data.
            </>}
            lens={<>Eval contamination is the silent killer of model-improvement metrics. Senior teams instrument the gold set / training set deduplication explicitly and audit it after every retrain.</>}
            stretch={<>How would you build a contamination-proof gold set going forward?</>}
          />
        </VIS.Section>

        <VIS.Section id="sec-traps-gotcha14" title="Trap drills — diversity in top-K">
          <VIS.TrapProblem
            id="ris-q28"
            difficulty="medium"
            mode="single"
            title="Your top-10 results are all near-duplicates of each other. What's the right intervention?"
            scenario={<>The ANN + re-rank produces top-10 that are 9 listings of the same product from 9 different sellers. Pick the right fix.</>}
            options={[
              {key:"a", text:"Apply MMR diversification at the results-assembler stage: penalize candidates whose similarity to already-selected results exceeds a threshold.", correct:true},
              {key:"b", text:"Retrain the embedder to produce more spread-out embeddings.", correct:false},
              {key:"c", text:"Filter the catalog upstream to deduplicate listings.", correct:false},
              {key:"d", text:"Lower the cosine-similarity threshold on retrieval so more diverse candidates are pulled in.", correct:false},
            ]}
            trap={<>
              (b) the embedder is doing its job — near-duplicates ARE near-duplicates in embedding space. Forcing them apart corrupts retrieval. (c) upstream catalog dedup is the right long-term move but it's not always possible (different sellers selling the same product are legitimately distinct listings) and has cross-team implications. (d) lowering threshold doesn't help; it just adds lower-quality candidates while the top-K is still duplicates.<br/><br/>
              (a) MMR at the assembler is the canonical fix: rank-aware diversification preserves the top-1 (the most relevant) and demotes near-duplicates of it from the top-10 to make room for the next-most-relevant distinct result. The diversification penalty is tuned to the use case (consumer search wants more diversity than catalog dedup).
            </>}
            lens={<>Diversity is a serving-time concern, not a training-time concern. Embedders learn similarity; diversification is applied as a rank-aware post-process at assembly time.</>}
            stretch={<>What's the wrong way to tune MMR — what failure mode does an over-diverse top-10 produce?</>}
          />
        </VIS.Section>

        <VIS.Section id="sec-traps-gotcha15" title="Trap drills — calibration for copyright threshold">
          <VIS.TrapProblem
            id="ris-q29"
            difficulty="hard"
            mode="single"
            title="Your copyright pipeline triggers DMCA actions when cosine similarity exceeds τ. False positives cause legal exposure. How do you set τ?"
            scenario={<>Calibration matters: the copyright head's score distribution is not uniform across query types. Pick the right calibration approach.</>}
            options={[
              {key:"a", text:"Tune τ on a global validation set to maximize F1.", correct:false},
              {key:"b", text:"Per-query-class calibration: estimate the FPR curve for each query class (photo, illustration, screenshot) separately, set τ to keep FPR below a legal-team threshold (e.g., 0.001) per class.", correct:true},
              {key:"c", text:"Use a fixed τ = 0.95 across all queries — high enough that any match is by construction near-identical.", correct:false},
              {key:"d", text:"Let users dispute false positives downstream; pick τ that maximizes recall.", correct:false},
            ]}
            trap={<>
              (a) global F1 optimization mixes query classes with very different score distributions; a τ optimal on average is too low for illustration matches (which have inflated cosine scores due to flat backgrounds) and too high for photo matches. (c) fixed τ ignores class structure and produces wildly different FPRs per class. (d) maximizing recall in a legal-action pipeline is reckless; FPR control dominates.<br/><br/>
              (b) per-class FPR calibration is the legally-defensible approach: each class has its own FPR-vs-τ curve, you set τ_class to bound FPR under a legal-team-supplied cap, and the resulting per-class TPR is whatever it is. This is also auditable — every threshold choice has a documented FPR.
            </>}
            lens={<>For high-stakes downstream actions, calibration is per-stratum, never global. The legal-team-supplied FPR cap is the input, not the output, of the threshold-setting process.</>}
            stretch={<>How does this calibration interact with the cross-encoder re-ranker's own confidence score?</>}
          />
        </VIS.Section>

        <VIS.Section id="sec-traps-gotcha16" title="Trap drills — global rollout staging">
          <VIS.TrapProblem
            id="ris-q30"
            difficulty="medium"
            mode="single"
            title="You retrained the backbone and want to roll it out globally. The old index is 1B vectors and serves 100k QPS. Pick the staged rollout."
            scenario={<>You have a fixed compute budget; you cannot keep both old and new index at full size indefinitely. Pick the staged rollout.</>}
            options={[
              {key:"a", text:"Build the new index in parallel on a 1% shadow shard, route 1% of traffic to it, monitor recall and latency for a week, then expand to 10%, 50%, 100%, swapping atomically per stage.", correct:true},
              {key:"b", text:"Hot-swap the new index in-place during off-peak hours.", correct:false},
              {key:"c", text:"Build the new index next to the old, A/B at 50/50 from day 1 to maximize statistical power.", correct:false},
              {key:"d", text:"Re-embed in-place: re-write each catalog vector in the existing HNSW graph one at a time as the new backbone embedding is computed.", correct:false},
            ]}
            trap={<>
              (b) hot-swap is unsafe: if the new index has a bug, every query regresses simultaneously and rollback is a full index rebuild. (c) 50/50 from day 1 is too aggressive — you have no early-warning signal and the blast radius of a regression is half of all queries. (d) in-place re-embed mixes two embedding spaces in one graph, which corrupts neighbour distances (see §3f).<br/><br/>
              (a) staged shadow rollout is the production-grade pattern: start at 1% with a fully separate new index, monitor real traffic, expand only after each stage's metrics confirm health. Compute cost is amortized — you only need full new-index capacity at the 100% stage.
            </>}
            lens={<>Embedding-space rollouts are blue-green with stages, not in-place. The senior pattern is to validate at small percentages before committing capacity to the new index.</>}
            stretch={<>What automated rollback triggers do you wire in at each stage?</>}
          />
        </VIS.Section>

        <VIS.Section id="sec-distractors" title="What the distractors teach">
          <ul>
            <li><strong>"Linear scan over all 1B vectors."</strong> ~1.5 TFLOPs and ~3TB of bandwidth per query. Cannot meet a 300ms budget at any reasonable cost. The whole motivation for ANN. Math: §3b, q21.</li>
            <li><strong>"BM25 over image filenames."</strong> Categorical mismatch — reverse-image search has no text query. Filenames are also noisy and product-name-language leaks into ranking. Math: q22.</li>
          </ul>
        </VIS.Section>

        <VIS.Section id="sec-watch" title="Watch-outs">
          <ul>
            <li><strong>Normalize-then-Euclidean is cosine.</strong> Don't conflate metric choice with encoder choice — the encoder's training loss is what determines similarity semantics. Math: §3a.</li>
            <li><strong>PQ compresses 96× at 1-2pp recall cost.</strong> 32 bytes/vector vs 3KB raw makes billion-scale fit in 32GB of RAM. Math: §3c.</li>
            <li><strong>Cross-encoder re-rank lifts precision@10 by 10-20pp.</strong> Cost is K extra forwards but fits in budget. Math: §3d.</li>
            <li><strong>Random sharding by image-id hash.</strong> Never by category or embedding-space cluster. Load balances by construction. Math: §3e, q20.</li>
            <li><strong>Backbone bumps require blue-green index swaps.</strong> Mixing two embedding spaces in one HNSW corrupts neighbour distances. Math: §3f, q12.</li>
            <li><strong>Taxonomy + safety gates live AFTER retrieval.</strong> Pre-filtering by noisy classifiers collapses recall. Math: §3h, q19.</li>
            <li><strong>PSI rising without recall regression = stale gold set.</strong> Rebalance the gold set before retraining. Math: §3h, q13.</li>
            <li><strong>Contrastive recipe: low τ, large batch, hard negatives, symmetric loss.</strong> Get all four right or regress 5-10pp. Math: q7.</li>
            <li><strong>Shortcut learning is invisible on in-distribution evals.</strong> Watermark / white-background / language-of-product leakage all manifest only on user-photo queries. Math: q5, q17.</li>
          </ul>
        </VIS.Section>
      </React.Fragment>
    )}
