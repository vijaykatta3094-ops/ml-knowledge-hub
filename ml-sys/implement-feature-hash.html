  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          // NO autoGloss here. Glossing terms inside option text leaks the
          // answer mechanism via hover. Authors must keep options self-contained;
          // a candidate who needs a definition can scroll up to the prose where
          // the term is explicitly wrapped via <VIS.Term>.
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>

  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// implement-feature_hash — coding
// Hashing trick: feature_hash(value, num_buckets, seed=42) -> mmh3.hash(value, seed) % num_buckets.
// Plus the signed-hash variant: pair (bucket, sign∈{+1,-1}) so collisions cancel in expectation.

const FH_CODE = [
  "import mmh3  # MurmurHash3 — portable, deterministic, fast (non-cryptographic)",
  "",
  "def feature_hash(value: str, num_buckets: int, seed: int = 42) -> int:",
  "    \"\"\"Hashing trick. Map an unbounded-cardinality string to a fixed bucket.",
  "    Same input + same seed -> same bucket, across Python/Java/Scala builds.",
  "    \"\"\"",
  "    # mmh3.hash returns a signed 32-bit int. We just want a non-negative bucket id.",
  "    return __1__ % __2__",
  "",
  "",
  "def signed_feature_hash(value: str, num_buckets: int, seed: int = 42):",
  "    \"\"\"Signed variant (Weinberger 2009): also derive a +1/-1 sign from a SECOND",
  "    independent hash so collisions cancel in expectation, not stack up.\"\"\"",
  "    bucket = mmh3.hash(value, seed) % num_buckets",
  "    # Use a DIFFERENT seed for the sign — same seed makes sign 100%-correlated with bucket.",
  "    sign   = __3__",
  "    return bucket, sign",
  "",
  "",
  "def apply_signed_hash(features: dict, num_buckets: int) -> list:",
  "    \"\"\"Build the hashed feature vector. Collisions on the same bucket with",
  "    OPPOSITE signs subtract; with SAME signs they add. E[collision bias] = 0.\"\"\"",
  "    x = [0.0] * num_buckets",
  "    for name, val in features.items():",
  "        b, s = signed_feature_hash(name, num_buckets)",

    <VIS.TLDR>
      The <VIS.Term def="Map a high-cardinality categorical (URL, n-gram, user-agent) into a fixed-size integer space via hash(value) mod B. No vocabulary, no OOV bucket, identical online/offline.">hashing trick</VIS.Term> trades a per-string vocabulary for a fixed <VIS.Term def="Size of the hashed feature space — B in hash(value) mod B. Larger B = fewer collisions, more parameters.">bucket count B</VIS.Term>. Unsigned: <code>bucket = mmh3.hash(value, seed) % B</code>. Signed (Weinberger 2009): also derive a +1/-1 <VIS.Term def="A second hash output, mapped to +1 or -1 from an INDEPENDENT seed. Multiplied into the value before accumulating, so collisions cancel in expectation.">sign</VIS.Term> from an independent seed so collisions cancel in expectation. For N distinct features into B buckets the expected <VIS.Term def="Probability that two features land in the same bucket. By the birthday approximation, ≈ N²/(2B) when N ≪ B.">collision rate</VIS.Term> follows the <VIS.Term def="The classic result that among N items drawn uniformly into B bins, the expected pair-collision count is N(N-1)/(2B) ≈ N²/(2B).">birthday bound</VIS.Term> ≈ N²/(2B). Three trap categories: (1) <VIS.Term def="Python's built-in hash() is salted per-process via PYTHONHASHSEED. Two interpreters → two bucket assignments. Use mmh3 or sha for any cross-process work.">non-portable hash choice</VIS.Term> (Python <code>hash()</code> is per-process random), (2) signed-trick mis-applied (using the SAME seed for bucket and sign → 100% correlated → no cancellation), (3) <VIS.Term def="The discipline of asserting that the same input produces the same bucket on Spark/Python training and the JVM/C++ server. One unit test, applied to every config change.">train-serve drift</VIS.Term> (changing seed, B, or hash function silently invalidates every cached embedding).

    <VIS.Section id="sec-setup" title="The production scenario">
      <p>
        Your <VIS.Term def="Click-through-rate ranking model. Predicts P(click | impression). Hashed features show up as URL n-grams, user-agent strings, referrer hosts.">CTR ranker</VIS.Term> has a URL feature with <strong>≈10M distinct values</strong> per day; you cannot maintain a <VIS.Term def="An explicit string→id lookup table maintained at training time. Bounded cardinality, interpretable, requires an OOV bucket for unseen values at serving time.">vocabulary</VIS.Term> the way you would for a 100k-categorical. You hash to a <strong>2M-bucket</strong> <VIS.Term def="Lookup table mapping bucket id → learned dense vector. Each hashed bucket gets one row of weights jointly learned with the model.">embedding table</VIS.Term>. Training is in <VIS.Term def="Distributed-batch compute framework. Standard offline training pipeline at most companies; runs JVM Spark with Python UDFs via PySpark.">Spark</VIS.Term>/Python; serving is in Java; both must agree on bucket assignment <em>bit-for-bit</em> or every URL embedding fetches the wrong slot at inference.
      </p>
      <p>
        We will build the <VIS.Term def="The straight bucket = hash(value, seed) mod B. Simplest form. Collisions stack — two features colliding both contribute their values to the same bucket.">unsigned hashing trick</VIS.Term> first, then upgrade to the <VIS.Term def="bucket = hash(value, seed_bucket) mod B; sign = +1 if hash(value, seed_sign) is even else -1. Accumulate sign*value. Collision contributions cancel in expectation.">signed variant</VIS.Term> from Weinberger 2009. The signed version makes the expected collision contribution to any bucket <em>zero</em>, which is why it's the default in <VIS.Term def="A linear-model toolkit that popularized signed feature hashing as a first-class default for high-cardinality categoricals.">VW (Vowpal Wabbit)</VIS.Term> and sklearn's <VIS.Term def="sklearn.feature_extraction.FeatureHasher — the canonical signed-hash transformer in Python; defaults to MurmurHash3 with alternate_sign=True.">FeatureHasher</VIS.Term>.
      </p>
      <p>
        Three families of trap interviewers test: <VIS.Term def="Choosing a hash that produces the same int across Python, JVM, and C++ for the same input. Rules out CPython's built-in hash() and Java's String.hashCode().">hash choice</VIS.Term> (MurmurHash3 vs SHA vs Python's <code>hash()</code>), the <VIS.Term def="A monotonically increasing 32-bit integer salt fed to the hash. Different seeds give different bucket permutations; same seed gives bit-identical output.">seed</VIS.Term> contract (must be pinned, never rotated), and the <VIS.Term def="A non-cryptographic 32/128-bit hash. Fast, uniform, deterministic across languages — the de-facto standard for feature hashing.">MurmurHash3</VIS.Term> vs <VIS.Term def="SHA-256 — cryptographic, slow, portable. Overkill for feature hashing; the cryptographic strength buys nothing here.">SHA-256</VIS.Term> choice (cryptographic strength is wasted compute for B≤2³¹). The <VIS.Term def="The risk that two features map to the same bucket, summing their contributions. Birthday-bound: ≈ N²/(2B). Signed-hash cancels in expectation; unsigned does not.">collision risk</VIS.Term> is the cost; the <VIS.Term def="Stateless, vocabulary-free representation that the same bytes produce the same vector everywhere. The whole reason to hash instead of look up.">portability gain</VIS.Term> is the benefit.
      </p>

    <VIS.Section id="sec-impl" title="The implementation">
      <VIS.CodeFillin
        id="fh-impl"

        title="feature_hash() + signed variant — fill the 4 blanks"
        language="python (mmh3)"
        code={FH_CODE}
        options={[
          {key:"hash_pos",      text:"(mmh3.hash(value, seed) & 0x7FFFFFFF)", fills:[1]},
          {key:"buckets_var",   text:"num_buckets", fills:[2]},
          {key:"sign_indep",    text:"1 if (mmh3.hash(value, seed + 1) & 1) == 0 else -1", fills:[3]},

          // Decoys
          {key:"hash_py",       text:"hash(value)"},                              // per-process randomized
          {key:"hash_signed",   text:"mmh3.hash(value, seed)"},                   // can be negative → negative buckets
          {key:"abs_hash",      text:"abs(mmh3.hash(value, seed))"},              // breaks on INT_MIN
          {key:"sha_truncate",  text:"int(hashlib.sha256(value.encode()).hexdigest()[:8], 16)"}, // 10× slower
          {key:"sign_same_seed",text:"1 if (mmh3.hash(value, seed) & 1) == 0 else -1"},          // 100% correlated with bucket
          {key:"sign_random",   text:"random.choice([-1, 1])"},                    // breaks determinism
          {key:"accumulate_abs",text:"x[b] += abs(val)"},                          // drops the sign — defeats the point
          {key:"accumulate_set",text:"x[b] = s * val"},                            // overwrites instead of adding
        ]}
        trap={<>
          (1) <strong>Sign of the hash.</strong> <code>mmh3.hash()</code> returns a SIGNED 32-bit int, so <code>hash(...) % B</code> in Python is technically fine (Python's <code>%</code> floor-mods) — but the JVM's <code>%</code> can return negative. The portable move is to mask off the sign bit: <code>hash &amp; 0x7FFFFFFF</code>. <code>abs(hash)</code> looks equivalent but BREAKS at <code>INT_MIN</code> (<code>abs(-2³¹) == -2³¹</code> in two's complement).<br/><br/>
          (2) <strong>Sign-bit seed.</strong> Using the SAME seed for bucket and sign makes the sign a deterministic function of the bucket — every feature in bucket <code>b</code> has the same sign, collisions stack instead of cancelling. The signed-trick's cancellation guarantee REQUIRES independence between the bucket hash and the sign hash; use <code>seed + 1</code> (or any independent seed) for the sign.<br/><br/>
          (3) <strong>Python's <code>hash()</code>.</strong> Per-process salted via <code>PYTHONHASHSEED</code>. Two Spark workers will hash the same URL to different buckets. The bug is silent on a single-process notebook and explodes the moment you parallelize.<br/><br/>
          (4) <strong>SHA for hashing trick.</strong> Correct but ~10× slower than MurmurHash3 and the upper bits aren't more "uniform" in any way you can measure for B=2M. SHA is for cryptographic integrity, not feature hashing.
        </>}
        lens={<>
          Reference:
          <pre style={{background:"#f1f5f9", padding:"10px 14px", borderRadius:6, fontSize:13, overflow:"auto"}}>{`def feature_hash(value, num_buckets, seed=42):
    return (mmh3.hash(value, seed) & 0x7FFFFFFF) % num_buckets

def signed_feature_hash(value, num_buckets, seed=42):
    bucket = mmh3.hash(value, seed) % num_buckets
    sign   = 1 if (mmh3.hash(value, seed + 1) & 1) == 0 else -1
    return bucket, sign`}</pre>
          The two-hash sign is the Weinberger 2009 construction: independence between the bucket and sign hashes makes the expected collision bias zero. Sklearn's <code>FeatureHasher</code> implements exactly this with <code>alternate_sign=True</code>.
        </>}
        stretch={<>For 10M distinct features into B=2M buckets, what is the expected fraction of buckets with at least one collision? Hint: birthday bound gives ≈ N²/(2B) pair-collisions ≈ 25M — so essentially every bucket has multiple colliders; the SIGNED variant is what saves model quality.</>}
      />

        options={[
          {key:"a", text:"False for feature hashing with a quality hash. Modulo bias on a uniform 32-bit hash is negligible unless B is close to 2³². Use whatever B fits your memory budget.", correct:true},
          {key:"b", text:"True — non-power-of-2 B causes 30% bucket-loading skew.", correct:false},
          {key:"c", text:"True for mmh3; false for SHA.", correct:false},
          {key:"d", text:"True — % is slower on non-power-of-2.", correct:false},
        ]}
        trap={<>Modulo bias matters for cryptographic random-number generation, not for feature hashing in the practical B-range (10³–10⁷). The skew is ~B/2³² — invisible.</>}
        lens={<>Pick B from memory and parameter budget (2M, 5M, 10M are common). Power-of-2 is convenient for bitwise-and tricks but not required.</>}
      />

      <VIS.TrapProblem id="fh-q15" difficulty="hard" mode="single"
        title="Mixing string and int features in the hashing trick"
        scenario={<>Feature dict has both <code>"country"="US"</code> and <code>"age"=42</code>. How do you safely hash both into the same bucket space?</>}
        options={[
          {key:"a", text:"Prefix every key with a namespace: hash(\"country=US\"), hash(\"age=42\"). The namespace prevents value collisions (e.g. country=42 vs age=42).", correct:true},
          {key:"b", text:"Concatenate raw bytes — hash(b\"US\") and hash(b\"42\") are different enough.", correct:false},
          {key:"c", text:"Hash strings to bucket-space-1, ints to bucket-space-2.", correct:false},
          {key:"d", text:"int values shouldn't be hashed — only embed string features.", correct:false},
        ]}
        trap={<>Without a namespace, <code>"42"</code> from age and <code>"42"</code> from a zip-code collide artificially. The namespace turns the global hash into a per-feature hash with the same bucket pool.</>}
        lens={<>Vowpal Wabbit's namespace convention (<code>|namespace feature1 feature2</code>) is exactly this discipline.</>}
      />

      <VIS.TrapProblem id="fh-q16" difficulty="medium" mode="single"
        title="What does sklearn's FeatureHasher(alternate_sign=True) do?"
        scenario={<>You set <code>FeatureHasher(n_features=2**20, alternate_sign=True)</code>. What's <code>alternate_sign</code> doing under the hood?</>}
        options={[
          {key:"a", text:"For each feature, derives a +1/-1 sign from a hash bit (independent of the bucket hash) and accumulates sign*value into the bucket — the Weinberger signed trick.", correct:true},
          {key:"b", text:"Alternates +1, -1, +1, -1 by row index.", correct:false},
          {key:"c", text:"Negates the values of features that hash to even buckets.", correct:false},
          {key:"d", text:"Doubles the bucket count to avoid collisions.", correct:false},
        ]}
        trap={<>The "alternate" in the name is unfortunate — it doesn't ALTERNATE in any sequential sense, it uses a HASH BIT to pick the sign per feature. The bit is independent of the bucket.</>}
        lens={<>Source: sklearn's <code>_hashing.pyx</code> — it XORs a parity bit from the same MurmurHash output (using bits not used by the modulo).</>}
      />

      <VIS.TrapProblem id="fh-q17" difficulty="hard" mode="single"
        title="When to choose hashing vs vocabulary"
        scenario={<>You have a feature with 50k distinct values (e.g. product categories). Hashing or vocabulary?</>}
        options={[
          {key:"a", text:"Vocabulary. Cardinality is small enough to fit a learned lookup table; you keep per-category interpretability and zero collisions. Hashing is for unbounded or 1M+ cardinality.", correct:true},
          {key:"b", text:"Hashing — always, for consistency.", correct:false},
          {key:"c", text:"Hashing — vocabulary is unsafe at any scale.", correct:false},
          {key:"d", text:"Depends on the downstream model.", correct:false},
        ]}
        trap={<>Hashing is the right answer for <em>unbounded</em> or <em>multi-million-cardinality</em> features (URLs, n-grams, user-agents). For bounded ≤100k cardinality, a vocabulary is simpler, interpretable, and collision-free.</>}
        lens={<>Rule of thumb: under 100k → vocabulary; over 1M or unbounded → hashing; 100k–1M is the judgment-call zone. The <VIS.Term def="A categorical feature whose distinct value count grows with traffic, never bounded — e.g. URLs, search queries, user-agent strings.">unbounded-cardinality</VIS.Term> case has no vocabulary option, period.</>}
      />

      <VIS.TrapProblem id="fh-q18" difficulty="medium" mode="single"
        title="MurmurHash3-32 vs MurmurHash3-128 — which to use?"
        scenario={<>Both are in mmh3. Which fits the hashing trick?</>}
        options={[
          {key:"a", text:"32-bit is enough for any practical B (≤ 2³¹). 128-bit is for collision-sensitive uses (HyperLogLog, content-addressed storage); overkill for feature hashing and slightly slower.", correct:true},
          {key:"b", text:"Always use 128 for safety.", correct:false},
          {key:"c", text:"32-bit causes overflow on % for B > 1M.", correct:false},
          {key:"d", text:"128-bit is required by sklearn.", correct:false},
        ]}
        trap={<>The hash space is collapsed to B buckets via mod, so a 32-bit hash space (4B values) is gargantuan relative to B≤2³¹. The collision rate is set by N²/B, not by hash output width.</>}
        lens={<>mmh3.hash() (32-bit) is the default for feature hashing. mmh3.hash128() is for content fingerprinting.</>}
      />

      <VIS.TrapProblem id="fh-q19" difficulty="hard" mode="single"
        title="Verifying hash uniformity in production"
        scenario={<>You suspect the hash is non-uniform. What's the right diagnostic?</>}
        options={[
          {key:"a", text:"Sample 1M live feature strings, count bucket loads, run a chi-squared goodness-of-fit against uniform. p < 0.01 with effect size > 5% bucket variance = real issue. Otherwise it's birthday-bound clumping.", correct:true},
          {key:"b", text:"Compute the standard deviation of bucket loads; if > 0, the hash is broken.", correct:false},
          {key:"c", text:"Sort buckets by load; if the top bucket has > 2× the median load, the hash is broken.", correct:false},
          {key:"d", text:"Hash quality cannot be measured post-hoc.", correct:false},
        ]}
        trap={<>(b) ignores that even a perfect hash gives some bucket variance (Poisson-distributed loads). (c) is a heuristic that fires on natural feature-frequency skew (e.g. <code>google.com</code> appears 1M times → its bucket is heavy through no fault of the hash).</>}
        lens={<><VIS.Term def="Statistical goodness-of-fit test. For B buckets and N observations, compute Σ(observed - expected)²/expected, compare to χ²(B-1) critical value.">Chi-squared</VIS.Term> on UNIQUE feature strings (not weighted by frequency) tests the hash itself. Chi-squared on weighted impressions tests load skew, which is mostly about input distribution.</>}
      />

      <VIS.TrapProblem id="fh-q20" difficulty="hard" mode="single"
        title="Doubling B — does collision rate halve?"
        scenario={<>Memory budget doubles. You double B from 2M to 4M. How does pair-collision count scale?</>}
        options={[
          {key:"a", text:"Halves. Expected pair-collisions ≈ N²/(2B), so 2B halves them. Linear in 1/B.", correct:true},
          {key:"b", text:"Quarters. Collisions scale as 1/B².", correct:false},
          {key:"c", text:"Stays the same — collision rate depends on hash quality, not B.", correct:false},
          {key:"d", text:"Halves AND embedding capacity doubles — net 4× quality.", correct:false},
        ]}
        trap={<>(d) is the trap — embedding capacity is a separate axis from collision rate. Doubling B doubles parameters (memory) AND halves collisions (quality), but those are two different wins, not multiplied.</>}
        lens={<>The collision-vs-capacity <VIS.Term def="Curve where you cannot improve one objective without worsening another. Here: parameter count vs collision rate, both scaling linearly with B.">Pareto frontier</VIS.Term>: doubling B linearly trades RAM for (a) halved collisions and (b) doubled parameter count. The signed-hash trick lets you push to smaller B than you otherwise could.</>}
      />

    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://arxiv.org/abs/0902.2206" target="_blank" rel="noopener"><strong>Weinberger et al. — Feature Hashing for Large Scale Multitask Learning</strong> (ICML 2009)</a> — the canonical paper. Defines the signed variant and proves its unbiasedness.</li>
        <li><a href="https://github.com/aappleby/smhasher" target="_blank" rel="noopener"><strong>SMHasher — MurmurHash3 reference</strong></a> — the spec every portable mmh3 binding implements.</li>
        <li><a href="https://scikit-learn.org/stable/modules/generated/sklearn.feature_extraction.FeatureHasher.html" target="_blank" rel="noopener"><strong>sklearn FeatureHasher</strong></a> — production-grade signed-hash implementation with <code>alternate_sign=True</code>.</li>
        <li><a href="https://vowpalwabbit.org/" target="_blank" rel="noopener"><strong>Vowpal Wabbit</strong></a> — popularized signed feature hashing + namespace convention at scale.</li>
      </ul>
    </VIS.Section>
