        <VIS.Section id="sec-walk" title="Walking the platform">
          <ol>
            <li><strong>The spec service is the source of truth.</strong> Every experiment is a row: variants, allocation %, layer, primary metric, guardrails, holdout flag, label-maturity SLA. Mutex group + salt are pinned at creation. <VIS.Equation tex={String.raw`\text{spec}\rightarrow\{\text{bucket},\text{alloc},\text{mutex}\}`} /></li>
            <li><strong>User bucketing is deterministic, cross-device, edge-cached.</strong> <VIS.Equation tex={String.raw`v = h(\text{user\_id}\,\|\,\text{salt}\,\|\,\text{exp\_id})\bmod 100`} />. Same user, same variant, every device — because user_id is global and the salt is pinned. See <strong>§3a</strong>.</li>
            <li><strong>Mutex layer service</strong> enforces that two experiments on the same surface cannot co-assign a user. The layer carves the user-space; the experiment claims a slice of one layer. See <strong>§3h</strong>.</li>
            <li><strong>Kafka telemetry carries three streams.</strong> <em>assign</em> (which variant), <em>exposure</em> (user saw the treated surface), <em>metric</em> (click, revenue, retention proxy). SRM uses <em>exposure</em>, not assign, because an unseen treatment is not a treatment.</li>
            <li><strong>Flink sessionizes, de-dupes, and emits per-user-per-day metric rows</strong> into both warehouses. Hourly is for monitoring; daily is for decisions. <VIS.Equation tex={String.raw`r_{u,d,m} = \sum_{e\in \text{day}(d)}\mathbb{1}[u,m,e]`} /></li>
            <li><strong>Label-delay handler buffers retention and refund-adjusted revenue.</strong> Daily rollup rows are stamped with a <em>ripe-at</em> timestamp and analysis only consumes ripe rows. See <strong>§3f</strong>.</li>
            <li><strong>CUPED reduces variance</strong> by adjusting each user's outcome with their pre-period covariate. <VIS.Equation tex={String.raw`Y_{\text{adj}} = Y - \theta(X - \bar X),\;\theta = \mathrm{Cov}(Y,X)/\mathrm{Var}(X)`} />. See <strong>§3b</strong>.</li>
            <li><strong>Sequential analysis with alpha-spending</strong> lets analysts peek daily without inflating the false-positive rate. O'Brien-Fleming front-loads conservatism; Pocock spreads it. See <strong>§3c</strong>.</li>
            <li><strong>SRM detector runs on every hourly tick.</strong> Chi-squared on the variant counts; a hot SRM vetoes the launch button. See <strong>§3d</strong>.</li>
            <li><strong>Analysis UI surfaces the primary metric, guardrails, sequential p-value, SRM status.</strong> Launch is gated by SRM = green AND sequential p-value crosses the spending boundary on the locked primary metric.</li>
          </ol>
        </VIS.Section>

        <VIS.Section id="sec-math" title="Why every stage is the way it is — the math">

          <h3 style={{marginTop:14, marginBottom:6, fontSize:15, color:"#334155"}}>§3a. Deterministic bucketing and the salt</h3>
          <p>For an experiment with variants <VIS.Equation tex={String.raw`V = \{0,\dots,k-1\}`} /> and traffic shares <VIS.Equation tex={String.raw`(p_0,\dots,p_{k-1})`} />:</p>
          <VIS.Equation display={true} tex={String.raw`v(u) = F^{-1}\bigl(h(\text{user\_id}\,\|\,\text{salt}\,\|\,\text{exp\_id}) / 2^{B}\bigr)`} />
          <p>where <VIS.Equation tex={String.raw`h`} /> is a B-bit uniform hash and <VIS.Equation tex={String.raw`F`} /> is the CDF over variant shares. The salt is per-experiment; re-randomizing means rotating the salt — same user, fresh variant. Pinning the salt enables exact replay of an experiment. Client-side randomization breaks this: device-A and device-B see different variants for the same user, contaminating every cross-device metric.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3b. CUPED variance reduction</h3>
          <p>Given outcome <VIS.Equation tex={String.raw`Y`} /> and a pre-experiment covariate <VIS.Equation tex={String.raw`X`} /> (usually the user's pre-period value of the same metric), define the adjusted outcome:</p>
          <VIS.Equation display={true} tex={String.raw`Y_{\text{adj}} = Y - \theta\,(X - \bar X),\qquad \theta = \frac{\mathrm{Cov}(Y,X)}{\mathrm{Var}(X)}`} />
          <p>The variance of <VIS.Equation tex={String.raw`Y_{\text{adj}}`} /> shrinks by exactly the squared correlation:</p>
          <VIS.Equation display={true} tex={String.raw`\frac{\mathrm{Var}(Y_{\text{adj}})}{\mathrm{Var}(Y)} = 1 - \rho^{2}`} />
          <p>For a metric with <VIS.Equation tex={String.raw`\rho \approx 0.6`} /> against its pre-period self, variance drops ~36% — i.e., the same statistical power needs ~36% fewer users. CUPED is the single biggest sample-size win on most engagement metrics.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3c. Sequential testing and alpha-spending</h3>
          <p>A fixed-horizon t-test peeked at daily inflates the Type-I error: at 30 daily peeks, naive false-positive rate climbs from 5% to ~26%. Alpha-spending pre-allocates the total alpha across peeks via a spending function <VIS.Equation tex={String.raw`\alpha(t)`} />, <VIS.Equation tex={String.raw`t \in [0,1]`} />:</p>
          <VIS.Equation display={true} tex={String.raw`\alpha_{\text{OBF}}(t) = 2 - 2\,\Phi\!\Bigl(\frac{z_{1-\alpha/2}}{\sqrt{t}}\Bigr),\qquad \alpha_{\text{Pocock}}(t) = \alpha \ln\!\bigl(1 + (e-1)\,t\bigr)`} />
          <p>O'Brien-Fleming gives near-zero alpha early and almost all of it at the end (good when you want to avoid early false stops); Pocock spreads alpha uniformly (good for ship-or-kill decisions where stopping early matters). Both preserve <VIS.Equation tex={String.raw`\sum_t \alpha_t = \alpha`} /> exactly under continuous-time monitoring.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3d. Sample-Ratio-Mismatch (SRM) chi-squared</h3>
          <p>For a designed split <VIS.Equation tex={String.raw`(p_c, p_t)`} /> and observed counts <VIS.Equation tex={String.raw`(O_c, O_t)`} /> with total <VIS.Equation tex={String.raw`N`} />:</p>
          <VIS.Equation display={true} tex={String.raw`\chi^{2} = \sum_{v}\frac{(O_v - p_v N)^{2}}{p_v N}`} />
          <p>For a 2-arm 50/50 split, df = 1, the 0.05 critical value is <VIS.Equation tex={String.raw`\chi^{2} > 3.84`} /> — re-randomize. A 50.3/49.7 split looks innocent but at <VIS.Equation tex={String.raw`N = 10^{8}`} /> users:</p>
          <VIS.Equation display={true} tex={String.raw`\chi^{2} \approx \frac{(3\times 10^{5})^{2}}{5\times 10^{7}} = 1800 \gg 3.84`} />
          <p>SRM is the silent killer: the analysis looks fine but the bucketing is broken. Always check SRM first; any inference past a hot SRM is poisoned.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3e. Minimum-detectable-effect (MDE) and sample size</h3>
          <p>For a two-sided test at significance <VIS.Equation tex={String.raw`\alpha`} /> and power <VIS.Equation tex={String.raw`1-\beta`} />, the smallest effect detectable with <VIS.Equation tex={String.raw`n`} /> users per arm is:</p>
          <VIS.Equation display={true} tex={String.raw`\text{MDE} = (z_{1-\alpha/2} + z_{1-\beta})\,\sqrt{\frac{2\sigma^{2}}{n}}`} />
          <p>For revenue per user with <VIS.Equation tex={String.raw`\sigma \approx \$5`} />, <VIS.Equation tex={String.raw`\alpha=0.05`} />, <VIS.Equation tex={String.raw`1-\beta=0.8`} />, to detect a 0.5% lift on a mean of $20:</p>
          <VIS.Equation display={true} tex={String.raw`n = \frac{2 \cdot 25 \cdot (1.96+0.84)^{2}}{(0.1)^{2}} \approx 3.9\times 10^{4}\;\text{users/arm}`} />
          <p>For a 0.1% lift the requirement is 25x bigger — ~1M users/arm. This is why FAANG-scale experiments need either CUPED variance reduction (§3b) or a longer horizon, and why low-MDE revenue metrics live on the daily-rollup warehouse, not on the hourly path.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3f. Label-delay handling for retention metrics</h3>
          <p>D7-retention requires 7 days of post-exposure observation; D30 needs 30; refund-adjusted revenue waits for the chargeback window. The analysis frontier at time <VIS.Equation tex={String.raw`t`} /> is the subset of users whose label has matured:</p>
          <VIS.Equation display={true} tex={String.raw`\mathcal{D}_{\text{ripe}}(t) = \{u : t - \text{exposure}(u) \ge \tau_{\text{mat}}\}`} />
          <p>Treating non-ripe rows as zero is the textbook positive-unlabeled mistake — it suppresses lift in fast-converting users and inflates lift in slow ones. The label-delay handler stamps each row with <em>ripe-at</em> and analyses join against the frontier.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3g. Multiple comparisons across metrics and experiments</h3>
          <p>With 200 secondary metrics per experiment and <VIS.Equation tex={String.raw`\alpha = 0.05`} />, the expected number of false discoveries from random noise alone is</p>
          <VIS.Equation display={true} tex={String.raw`\mathbb{E}[\text{FD}] = 200 \cdot 0.05 = 10`} />
          <p>Bonferroni controls the family-wise error rate by tightening to <VIS.Equation tex={String.raw`\alpha/m`} /> — conservative; few metrics survive. Benjamini-Hochberg (FDR) controls the expected false-discovery proportion:</p>
          <VIS.Equation display={true} tex={String.raw`\text{reject } H_{(i)} \iff p_{(i)} \le \frac{i}{m}\,q`} />
          <p>Across ~1000 concurrent experiments the platform additionally enforces the <strong>One-Metric Decision</strong> discipline: the primary metric is locked before unblinding. Secondaries are diagnostic, not decision-grade.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3h. Mutually-exclusive layers and interaction</h3>
          <p>Two experiments on the same surface (e.g., two ranker variants) interact: the treatment effect of A measured under B's treatment is not the same as under B's control. The estimator</p>
          <VIS.Equation display={true} tex={String.raw`\hat\Delta_A = \bar Y(A=1) - \bar Y(A=0)`} />
          <p>is unbiased only when B is randomized independently of A. Layers carve the user-space so that experiments on the same surface are placed in the same layer and assigned mutex variants; experiments on different surfaces are placed in different layers and randomized independently. Interaction risk drops from <VIS.Equation tex={String.raw`O(k^{2})`} /> pairwise comparisons to <VIS.Equation tex={String.raw`O(k)`} /> within-layer.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3i. Network interference (SUTVA violation)</h3>
          <p>The SUTVA assumption — a user's outcome depends only on their own treatment — fails in marketplaces (your treated seller affects an untreated buyer's experience). The naive between-user estimator</p>
          <VIS.Equation display={true} tex={String.raw`\hat\Delta = \bar Y_T - \bar Y_C`} />
          <p>under-estimates the true global treatment effect: spillover lifts the control. Mitigations: cluster randomization (whole markets, weeks, communities), graph-cluster designs, switchback experiments. Diagnostic: an A/A test that splits friends or graph-neighbors and looks for a non-zero estimate — if it appears, network interference is contaminating the regular A/B.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3j. Unit of randomization vs unit of analysis</h3>
          <p>Randomize on users, analyze on sessions, and the standard error is wrong: sessions within a user are correlated, so the effective <VIS.Equation tex={String.raw`n`} /> is closer to the user count. The variance correction is</p>
          <VIS.Equation display={true} tex={String.raw`\mathrm{Var}(\bar Y_{\text{cluster}}) \approx \frac{\sigma^{2}}{n}\,\bigl[1 + (\bar m - 1)\rho_{\text{intra}}\bigr]`} />
          <p>where <VIS.Equation tex={String.raw`\bar m`} /> is the average cluster size and <VIS.Equation tex={String.raw`\rho_{\text{intra}}`} /> is the intra-cluster correlation. Ignoring the correction makes p-values look <em>smaller</em> than they are — false positives. Rule: the unit of analysis must equal (or be cluster-corrected against) the unit of randomization.</p>

        </VIS.Section>

        <VIS.Section id="sec-distractors" title="What the distractors teach">
          <ul>
            <li><strong>"Deterministic-only assignment, no sequential peek protection."</strong> Deterministic hashing is necessary but not sufficient. Without alpha-spending, daily peeks blow Type-I error from 5% to ~26% over a 30-day experiment. The peek-safe layer is load-bearing. Math: §3c.</li>
            <li><strong>"Single global metric table, no per-experiment isolation."</strong> Concurrent experiments can't be analyzed cleanly when their rows are commingled. Mutex layers, label-maturity stamps, and per-experiment slicing all require per-experiment row identity. Math: §3f, §3h.</li>
          </ul>
        </VIS.Section>

        <VIS.Section id="sec-traps" title="Trap drills">
          <p style={{margin:"0 0 14px 0", fontSize:14, color:"#64748b"}}>
            26 senior-MLE traps across five axes: <strong>business metrics</strong>, <strong>data collection</strong>, <strong>training (analysis)</strong>, <strong>monitoring</strong>, <strong>gotchas</strong>. Pick one option per problem; reveal explains why the wrong answers are tempting.
          </p>

          {/* ============================ AXIS A — BUSINESS METRICS ============================ */}

          <VIS.TrapProblem
            id="exp-q1"
            difficulty="hard"
            title="A 14-day experiment is ready for a ship/no-ship call. Pick the criterion the platform should enforce."
            scenario={<>Four candidate decision rules are on the table. Three reward gaming or use unstable data; one composes the safety properties the platform was built to guarantee.</>}
            options={[
              {key:"a", text:"The pre-declared primary metric crosses the sequential alpha-spending boundary, SRM is green for the analysis date, and every guardrail in the spec remains within tolerance.", correct:true},
              {key:"b", text:"At least one secondary metric reaches p below 0.05 in the daily dashboard and the team agrees the result is directionally consistent with the original hypothesis.", correct:false},
              {key:"c", text:"The fixed-horizon t-test on the primary metric reaches p below 0.05 on the 14th day, regardless of any daily interim peeks performed earlier in the run.", correct:false},
              {key:"d", text:"The 95% confidence interval for the primary effect lies entirely above zero on the most recent hourly rollup, computed on the raw outcome with no covariate adjustment.", correct:false},
            ]}
            trap={<>(b) is HARKing on a secondary. (c) is fixed-horizon with peek inflation. (d) uses an unstable hourly slice and skips CUPED.</>}
            lens={<>A trustworthy launch composes locked primary, peek-safe inference, SRM green, and intact guardrails. Removing any single piece opens a gaming surface.</>}
          />

          <VIS.TrapProblem
            id="exp-q2"
            difficulty="hard"
            title="A UI redesign shows a +4% first-week click-through lift that shrinks in week two."
            scenario={<>The analyst proposes shipping on the week-one number, arguing users will keep clicking once it rolls out globally.</>}
            options={[
              {key:"a", text:"Ship now and let production tell you whether the lift persists; rolling back a UI later is cheap relative to the cost of waiting.", correct:false},
              {key:"b", text:"Extend the experiment beyond the typical novelty-decay window of 4-6 weeks and decide on the sustained-effect slice, not the early-engagement slice.", correct:true},
              {key:"c", text:"Trust the week-one reading because novelty engagement reliably converts into a long-term habit and therefore counts toward the metric.", correct:false},
              {key:"d", text:"Restrict the analysis to users in their first session, where the novelty signal is strongest, to get the cleanest read of the redesign's appeal.", correct:false},
            ]}
            trap={<>(a) ignores rollback cost on a user-visible surface. (c) confuses novelty with sustained behavior change. (d) filters to the slice most contaminated by the bias.</>}
            lens={<>Novelty decays over weeks. The decision-grade slice is the sustained-effect window, not the early-engagement spike.</>}
          />

          <VIS.TrapProblem
            id="exp-q3"
            difficulty="hard"
            title="With ~1000 quarterly launches, how many spurious wins should leadership expect at a per-experiment 5% bar?"
            scenario={<>Each launch locks one primary metric and reads it at alpha = 0.05; the platform applies no family-level correction across experiments. The CFO wants an order-of-magnitude expectation.</>}
            options={[
              {key:"a", text:"Zero in expectation, because the platform's sequential testing layer already controls the family-wise error rate across all running experiments simultaneously.", correct:false},
              {key:"b", text:"Around 5 per quarter, because the per-experiment alpha-spending procedure preserves an overall 0.5% false-positive rate at the platform level.", correct:false},
              {key:"c", text:"Around 50 per quarter, because 5% of 1000 independent reads at alpha = 0.05 reject the null by chance even when the treatment has no real effect.", correct:true},
              {key:"d", text:"Around 250 per quarter, because daily peeking and 200-metric dashboards combine to push the platform-wide false-positive rate to roughly 25%.", correct:false},
            ]}
            trap={<>(a) confuses per-experiment alpha with platform-wide alpha. (b) understates by an order of magnitude. (d) over-states because peek inflation is bounded inside each sequential test.</>}
            lens={<>Per-experiment alpha is not platform-wide alpha. Even with perfect within-experiment statistics, ~5% of attempts produce a false win.</>}
          />

          <VIS.TrapProblem
            id="exp-q4"
            difficulty="medium"
            title="One chart per experiment lives on the launch-review board's daily dashboard. Pick the chart."
            scenario={<>A weekly review board approves or vetoes experiments and gets one pinned chart per experiment. Pick the chart that matches the levers the reviewer actually controls.</>}
            options={[
              {key:"a", text:"A feature-importance bar chart for the model behind the treated surface, refreshed each retrain and grouped by feature family for readability.", correct:false},
              {key:"b", text:"The hourly rollup of every secondary metric, ranked by absolute effect size, refreshed every hour with no covariate adjustment to keep the read live.", correct:false},
              {key:"c", text:"A p-value histogram across all metrics in the experiment, overlaid against a uniform reference distribution as a per-experiment sanity check.", correct:false},
              {key:"d", text:"The primary effect with sequential confidence band, guardrails traffic-lighted, SRM status, and ripe-row coverage on the chosen analysis date.", correct:true},
            ]}
            trap={<>(a) is model-internal. (b) tempts the reviewer into HARKing on secondaries. (c) is a useful diagnostic but not a decision artefact.</>}
            lens={<>The launch dashboard surfaces the criterion plus its preconditions (SRM, ripe rows, guardrails). Anything else invites surface-mining.</>}
          />

          <VIS.TrapProblem
            id="exp-q5"
            difficulty="hard"
            title="Why is revenue lift a poor sole evaluator for most experiments?"
            scenario={<>A senior leader proposes dropping all guardrails and judging every experiment on quarterly revenue lift alone. Pick the strongest structural objection the platform should raise.</>}
            options={[
              {key:"a", text:"Revenue is the slowest, noisiest metric with the longest label-maturity horizon; modest product improvements at small revenue cost get killed by chance variance well before signal emerges.", correct:true},
              {key:"b", text:"Revenue lifts are easy to game with promotions and discount-coupon experiments, so the platform should ban revenue as a primary metric across all experiments outright.", correct:false},
              {key:"c", text:"Revenue is correlated with user satisfaction, so any revenue-positive change is by definition product-positive and additional gates on the same direction add no information.", correct:false},
              {key:"d", text:"Revenue is a backend metric outside the experimentation platform's scope; analysts should run revenue analyses in a separate offline workflow on the data warehouse.", correct:false},
            ]}
            trap={<>(b) is a real concern but secondary to the statistical-power objection. (c) is the leader's own argument. (d) is a process dodge, not a statistical one.</>}
            lens={<>Revenue's MDE is huge (see the sample-size math). Even a real improvement is undetectable on most experiments; guardrails exist because revenue alone is statistically inadequate.</>}
          />

          {/* ============================ AXIS B — DATA COLLECTION ============================ */}

          <VIS.TrapProblem
            id="exp-q6"
            difficulty="hard"
            title="An experiment shows a 50.3 / 49.7 split at N = 100M users. The owner says it is within noise."
            scenario={<>The platform's detector reports chi-squared = 1800 against the designed 50/50 split. The experiment owner argues that 0.3 percentage points is normal variation at this scale.</>}
            options={[
              {key:"a", text:"Continue the experiment but down-weight the larger arm in the analysis to numerically compensate for the assignment imbalance and recover a balanced estimate.", correct:false},
              {key:"b", text:"Halt the experiment, re-randomize, and root-cause the imbalance before any inference is reported; the chi-squared sits far above the 3.84 critical value for df = 1 at alpha = 0.05.", correct:true},
              {key:"c", text:"Continue the experiment because a 0.3-percentage-point gap is well below the 1-percent imbalance threshold that most large experimentation platforms tolerate in practice.", correct:false},
              {key:"d", text:"Continue the experiment but switch the analysis to a Bayesian framework that explicitly models the allocation prior so the chi-squared is dampened correctly.", correct:false},
            ]}
            trap={<>(a) treats an alarm as a numerical bias when it signals broken assignment. (c) invents a percentage threshold that the test does not use. (d) re-frames a broken-assignment problem as a statistics problem.</>}
            lens={<>At large N, the detector is sensitive to fractional-percent gaps. A hot alarm means assignment is broken; do not analyze past it.</>}
          />

          <VIS.TrapProblem
            id="exp-q7"
            difficulty="hard"
            title="Pick the cleanest event source for counting users in each variant."
            scenario={<>The platform needs an event source for counting users per variant. Pick the source that minimizes contamination of the count.</>}
            options={[
              {key:"a", text:"Assignment events emitted by the bucketing service on every assignment call, including users who never reached the treated surface during the experiment window.", correct:false},
              {key:"b", text:"Login events for every active user in the eligibility universe, filtered by the experiment's eligibility predicate after the fact at analysis time.", correct:false},
              {key:"c", text:"Exposure events emitted only when the treated surface was actually rendered, joined back to the assignment event for the variant identifier at analysis time.", correct:true},
              {key:"d", text:"Conversion events emitted only by users who took the primary outcome action of interest during the experiment window across all variants.", correct:false},
            ]}
            trap={<>(a) inflates the denominator with users who never saw the experiment. (b) does not reflect actual exposure. (d) conditions on the outcome — guaranteed selection bias.</>}
            lens={<>The count must include users who could have responded to the treatment. Exposure is the correct boundary; assignment over-counts; conversion under-counts and selects.</>}
          />

          <VIS.TrapProblem
            id="exp-q8"
            difficulty="hard"
            title="iOS-client logs arrive about 6 hours late on average. How does the platform respond?"
            scenario={<>The hourly metric rollup under-counts iOS users for several hours per day; lift estimates wobble on the hourly dashboard but settle on the daily one.</>}
            options={[
              {key:"a", text:"Extrapolate iOS counts on the hourly rollup based on the prior week's diurnal arrival pattern, then proceed with the launch decision on the corrected hourly view.", correct:false},
              {key:"b", text:"Drop iOS users from the experiment analysis entirely until the log-arrival delay is fixed at the SDK level, then resume the analysis once arrival skew converges.", correct:false},
              {key:"c", text:"Switch the launch criterion to the hourly rollup with a 6-hour rolling-average smoothing, which absorbs the device-side skew without dropping any users from the read.", correct:false},
              {key:"d", text:"Use the hourly rollup only for monitoring (SRM, guardrails) and gate every launch decision on the daily rollup with a label-arrival cutoff that exceeds the device skew.", correct:true},
            ]}
            trap={<>(a) makes up data. (b) discards a major platform. (c) keeps the launch on a stale path.</>}
            lens={<>Log-arrival skew is a fact of mobile platforms. Decisions belong on the slower path; monitoring lives on the faster path; cutoffs are on label arrival, not wall-clock.</>}
          />

          <VIS.TrapProblem
            id="exp-q9"
            difficulty="hard"
            title="An experiment uses D7-retention as the primary metric. When is the analysis frontier ready?"
            scenario={<>An experiment exposes a user on day 0; the primary metric is whether they return on day 7. Pick the correct ripe-row frontier for the analysis.</>}
            options={[
              {key:"a", text:"Restrict the analysis to users exposed at least 7 days before the analysis date, so every row in the cohort has had its D7 return outcome actually observed.", correct:true},
              {key:"b", text:"Use every exposed user; impute the D7 outcome for users in the most recent 7-day window based on prior-week return rates and pre-period covariates.", correct:false},
              {key:"c", text:"Use every exposed user; treat users who have not yet returned as negatives even when their 7-day observation window has not finished elapsing yet.", correct:false},
              {key:"d", text:"Restrict the analysis to users exposed exactly 7 days ago so the cohort is tight against the metric definition and free of right-censoring entirely.", correct:false},
            ]}
            trap={<>(b) makes up labels. (c) is the textbook positive-unlabeled mistake — pending windows are marked negative. (d) discards two-thirds of the eligible data.</>}
            lens={<>The ripe-row frontier is the only honest analysis. Anything earlier biases lift toward conversion speed rather than conversion rate.</>}
          />

          <VIS.TrapProblem
            id="exp-q10"
            difficulty="hard"
            title="A marketplace experiment treats sellers; the outcome metric is buyer conversion."
            scenario={<>A new seller-side ranking is rolled out to a random 50% of sellers. Buyer conversion is measured across all buyers in the marketplace. Pick the strongest concern.</>}
            options={[
              {key:"a", text:"The seller-side randomization collides with the user-bucketing service's salt, contaminating the variant assignment for the affected sellers and biasing downstream buyer-side metrics.", correct:false},
              {key:"b", text:"Buyers see a mix of treated and untreated sellers within the same browsing session, so the between-buyer estimator under-estimates the true global treatment effect from spillover.", correct:true},
              {key:"c", text:"Buyers are not bucketed at all in this experiment, so the platform's SRM detector cannot be computed on the buyer side and the experiment fails launch readiness.", correct:false},
              {key:"d", text:"Sellers carry different traffic volumes across the marketplace, so the variance of the buyer-side metric is unequal between the two seller arms in the experiment.", correct:false},
            ]}
            trap={<>(a) is a fictional mechanism — different randomization units do not collide on salts. (c) confuses randomization unit with detector scope. (d) is real but secondary to the SUTVA violation.</>}
            lens={<>When the randomization unit is upstream of the analysis unit, interference is the dominant bias. Cluster on markets or weeks to recover.</>}
          />

          {/* ============================ AXIS C — TRAINING / ANALYSIS ============================ */}

          <VIS.TrapProblem
            id="exp-q11"
            difficulty="hard"
            title="The pre-period correlation differs by user segment. How should the variance reducer be configured?"
            scenario={<>The pre-period covariate correlates at rho = 0.4 for median users and rho = 0.7 for whales. The analyst wants to apply the variance reducer globally and asks for guidance.</>}
            options={[
              {key:"a", text:"Skip variance reduction on this metric because heterogeneous correlation across user segments invalidates the underlying variance-reduction guarantee for the pooled estimator.", correct:false},
              {key:"b", text:"Replace variance reduction with stratification on the pre-period spending decile and run a stratified t-test on the post-period spending column at analysis time.", correct:false},
              {key:"c", text:"Apply variance reduction with a single theta estimated from the pooled pre-period data; the realized reduction is 1 - rho-squared at the pooled correlation level.", correct:true},
              {key:"d", text:"Fit a separate theta per segment and stitch the per-segment adjusted means together at analysis time using inverse-variance weights across the strata.", correct:false},
            ]}
            trap={<>(a) abandons a free variance win. (b) is valid but does not deliver the closed-form 1 - rho-squared reduction. (d) is heavy-handed and risks double-dipping unless held out.</>}
            lens={<>Unbiasedness comes from theta being a function of the pre-period only. A single pooled theta is the standard recipe; per-segment thetas require out-of-sample fitting.</>}
          />

          <VIS.TrapProblem
            id="exp-q12"
            difficulty="hard"
            title="Leadership wants the ability to ship clear wins early to free up a busy layer."
            scenario={<>The metric of interest is a fast-converting click-through rate. The team has to pick one alpha-spending shape for the sequential read.</>}
            options={[
              {key:"a", text:"A naive fixed-horizon t-test with no spending boundary applied at all, run at every daily peek, which gives the largest possible early-stopping power on real effects.", correct:false},
              {key:"b", text:"Bonferroni correction across the number of planned peeks, which produces a tight boundary at every peek that is both peek-safe and early-stop-friendly across the run.", correct:false},
              {key:"c", text:"O'Brien-Fleming spends most of alpha near the planned end of the experiment, leaving early peeks effectively unable to cross the boundary on most realistic effect sizes.", correct:false},
              {key:"d", text:"Pocock spends alpha relatively uniformly across peeks, leaving meaningful power available at early peeks to stop the experiment when the true effect is real and large.", correct:true},
            ]}
            trap={<>(a) inflates Type-I error. (b) is valid but conservative compared to Pocock when peeks are dense. (c) is the opposite tradeoff to what the team asked for.</>}
            lens={<>OBF and Pocock trade conservatism early vs late. For ship-fast-or-kill, pick the uniform spender; for avoid-false-stops, pick the end-heavy one.</>}
          />

          <VIS.TrapProblem
            id="exp-q13"
            difficulty="hard"
            title="Two ranker experiments target the same home-feed surface in the same week."
            scenario={<>A relevance-tuning experiment and a freshness-boost experiment both want to A/B on the home feed. Pick the platform's correct response to the scheduling conflict.</>}
            options={[
              {key:"a", text:"Place both into the same mutually-exclusive layer and assign each user to exactly one variant per layer, so the two experiments cannot co-treat the same user on that surface.", correct:true},
              {key:"b", text:"Run both freely with independent salts; the bucketing hash will randomize their assignments orthogonally and produce unbiased estimates of each marginal effect across the user base.", correct:false},
              {key:"c", text:"Run them sequentially: ship the first experiment, wait until it lands and stabilizes, then start the second experiment in the next quarter to avoid any cross-treatment effect.", correct:false},
              {key:"d", text:"Run both freely and add an A-by-B interaction term to the analysis model at read time to recover the marginal effects from the joint randomization across user buckets.", correct:false},
            ]}
            trap={<>(b) randomization alone does not remove interaction on a shared surface. (c) wastes a quarter and slows the team. (d) is a fix but is statistically expensive and assumes a linear interaction structure.</>}
            lens={<>Layers carve the user-space at assignment time. Independent randomization gives unbiased marginals but not freedom from interaction.</>}
          />

          <VIS.TrapProblem
            id="exp-q14"
            difficulty="hard"
            title="An analyst runs a session-level t-test for an experiment randomized on users."
            scenario={<>Sessions outnumber users by ~10x and the effect is small; the analyst hopes the larger row count will produce a smaller standard error on the lift estimate.</>}
            options={[
              {key:"a", text:"Use the session-level t-test as is, because more rows means a smaller standard error which is the right direction for sensitivity on a small-effect metric.", correct:false},
              {key:"b", text:"Cluster the standard error at the user-id level, because sessions within a user are correlated and the naive session-level standard error understates the uncertainty.", correct:true},
              {key:"c", text:"Switch the randomization unit from users to sessions so the unit of randomization matches the unit of analysis and the standard error becomes trustworthy again.", correct:false},
              {key:"d", text:"Drop within-user repeated sessions and analyze only the first session of each user during the experiment, which removes the within-user correlation entirely.", correct:false},
            ]}
            trap={<>(a) inflates effective n and produces fake significance. (c) breaks deterministic cross-device bucketing. (d) throws away most of the data and biases toward first-session behavior.</>}
            lens={<>The analysis unit must match (or be cluster-corrected against) the randomization unit. Ignoring within-user correlation manufactures false positives.</>}
          />

          <VIS.TrapProblem
            id="exp-q15"
            difficulty="hard"
            title="200 secondary metrics live on every experiment dashboard. Pick the correction policy."
            scenario={<>Per-experiment dashboards report ~200 secondaries. Without a platform-wide policy, secondary p-values are noisy and analysts cherry-pick. Pick the policy.</>}
            options={[
              {key:"a", text:"Apply Bonferroni across all 200 secondaries; treat any metric that survives at alpha/200 as a co-equal primary metric and allow it to gate the launch decision.", correct:false},
              {key:"b", text:"Skip correction; require teams to use eyeballing and senior domain judgment to identify meaningful effects across the full secondary dashboard at decision time.", correct:false},
              {key:"c", text:"Lock one primary per experiment in the spec; apply Benjamini-Hochberg FDR control across secondaries within each experiment; treat secondaries as diagnostic only.", correct:true},
              {key:"d", text:"Apply a platform-wide Bonferroni across 200,000 metric-experiment cells; this single global threshold replaces all per-experiment statistics and per-experiment configuration.", correct:false},
            ]}
            trap={<>(a) over-tightens and turns every secondary into a launch criterion. (b) is the status quo that motivates the question. (d) confounds independent decisions and is operationally unworkable.</>}
            lens={<>One primary per experiment for the decision; FDR on secondaries for diagnostics. The shape of the correction follows the role of the metric.</>}
          />

          {/* ============================ AXIS D — MONITORING ============================ */}

          <VIS.TrapProblem
            id="exp-q16"
            difficulty="hard"
            title="Pick the default guardrail bundle that every experiment should ship with."
            scenario={<>Every experiment ships with a default bundle of guardrails. Pick the bundle whose breaches reliably indicate the experiment is harming users.</>}
            options={[
              {key:"a", text:"The ROC-AUC of every model touched by the treated surface, refreshed weekly on a randomly sampled offline slice of production traffic across regions.", correct:false},
              {key:"b", text:"Daily revenue total at the company level, treated as a guardrail breach if it falls during the experiment window regardless of the experiment's traffic share.", correct:false},
              {key:"c", text:"The count of secondary metrics that show a directionally negative effect on the daily rollup, regardless of statistical significance or magnitude of the effect.", correct:false},
              {key:"d", text:"P95 latency on the treated surface, error rate, app-crash rate, and an opt-out / uninstall rate measured at the scope of the experiment's traffic.", correct:true},
            ]}
            trap={<>(a) is a model-monitoring bundle, not an experiment-guardrail one. (b) confuses company-wide noise with experiment effect. (c) is a HARKing artefact in disguise.</>}
            lens={<>Guardrails are user-perceptible harm signals at the experiment's scope. Latency, errors, crashes, opt-out — direct, observable, attributable.</>}
          />

          <VIS.TrapProblem
            id="exp-q17"
            difficulty="hard"
            title="The hourly dashboard has been stale for 4 hours after a Flink lag spike."
            scenario={<>The streaming processor is 4 hours behind; hourly rollups are out of date. Pick the platform's correct response to the staleness.</>}
            options={[
              {key:"a", text:"Page the platform on-call for the Flink lag; pause real-time evaluations until staleness recovers; do not gate launch decisions on stale hourly state during the incident.", correct:true},
              {key:"b", text:"Continue evaluating the real-time monitors on the stale data, because a 4-hour lag is within the daily-rollup's tolerance and the daily path still gates the launch decision anyway.", correct:false},
              {key:"c", text:"Switch the real-time monitors over to the daily rollup until the hourly rollup catches up, so dashboards continue to refresh even with a stale upstream processor.", correct:false},
              {key:"d", text:"Page experiment owners directly for every experiment whose hourly dashboard has stalled, so each team can investigate the lag independently within their own runbook.", correct:false},
            ]}
            trap={<>(b) trusts stale data for real-time signals. (c) loses the real-time character of the monitors. (d) fans out a platform issue to 1000 teams.</>}
            lens={<>Dashboard staleness is a platform incident, not a per-experiment one. Pause real-time decisions, page the platform, restore the path.</>}
          />

          <VIS.TrapProblem
            id="exp-q18"
            difficulty="hard"
            title="A 5-sigma effect lights up on a secondary metric outside the spec."
            scenario={<>A secondary engagement metric has jumped sharply. The team had registered a different primary in the spec at experiment start. Pick the senior response.</>}
            options={[
              {key:"a", text:"Ship on the strength of the 5-sigma effect; the size of the effect makes pre-registration a formality and the platform should treat the result as confirmatory.", correct:false},
              {key:"b", text:"Treat the secondary as a hypothesis to confirm in a follow-up experiment; the current experiment should still ship or kill on its pre-declared primary alone.", correct:true},
              {key:"c", text:"Add the secondary to the primary set retroactively, because the team always cared about engagement and the spec was an oversight rather than a binding pre-registration.", correct:false},
              {key:"d", text:"Average the secondary's effect with the primary's effect to produce a composite launch criterion that weights the two metrics by their realized magnitudes.", correct:false},
            ]}
            trap={<>(a) lets effect size override pre-registration discipline. (c) is HARKing in slow motion. (d) invents a composite metric the spec did not call for.</>}
            lens={<>One Metric Decision: primary is locked before unblinding. Hypotheses generated mid-experiment require a fresh experiment to confirm.</>}
          />

          <VIS.TrapProblem
            id="exp-q19"
            difficulty="hard"
            title="The transient alarm keeps firing. The owner asks to mute it for the rest of the run."
            scenario={<>The alarm has fired three times this week, each time a mobile-log lag that resolved within an hour. The owner asks the platform to mute the alert for this experiment.</>}
            options={[
              {key:"a", text:"Mute the alert for the rest of the experiment and rely on the analyst to compute the chi-squared manually one time at the final launch-decision moment instead.", correct:false},
              {key:"b", text:"Lower the chi-squared threshold below 3.84 so the detector becomes less sensitive to transient lags and the alarm stops firing on those short-window contaminations.", correct:false},
              {key:"c", text:"Keep the alarm enabled but route transient pages to a soft-warning channel that escalates only when the alarm remains hot beyond a defined sustained-time window.", correct:true},
              {key:"d", text:"Move evaluation to the daily rollup where transient lags are smoothed out by the wider window, so the alarm stops firing on short-lived mobile-log contaminations.", correct:false},
            ]}
            trap={<>(a) loses the safety property the analyst depends on at launch. (b) trades a real signal for noise reduction. (d) puts the safety check on a slower path than the launch decision.</>}
            lens={<>The detector has to stay on. Alarm fatigue is real but the fix is alert shaping, not alert removal.</>}
          />

          <VIS.TrapProblem
            id="exp-q20"
            difficulty="hard"
            title="A p95 latency guardrail is breached on a tier-2 country only; aggregate p95 looks fine."
            scenario={<>Latency p95 is breached for users in one regional tier; the aggregate p95 across the experiment looks healthy. The owner wants to treat it as a regional capacity issue.</>}
            options={[
              {key:"a", text:"Dismiss the regional breach; the aggregate p95 is the platform's contractual guardrail and it remains intact across the experiment's overall traffic share.", correct:false},
              {key:"b", text:"Adjust the experiment's regional traffic share to exclude the affected region and continue without re-running, so the aggregate guardrail stays clean for the launch.", correct:false},
              {key:"c", text:"Add the regional p95 to the launch criterion as a third primary metric and require it to clear the alpha-spending boundary alongside the original primary metric.", correct:false},
              {key:"d", text:"Treat the regional breach as a real guardrail breach; the aggregate p95 masks heterogeneous user impact and shipping the experiment would harm the affected region.", correct:true},
            ]}
            trap={<>(a) is the textbook Simpson's mistake on guardrails. (b) excludes the user segment that is being harmed. (c) confuses guardrails with primaries.</>}
            lens={<>Guardrails are about user impact. Heterogeneous breach has to be respected; aggregate-only thinking ships harm to subgroups.</>}
          />

          {/* ============================ AXIS E — GOTCHAS ============================ */}

          <VIS.TrapProblem
            id="exp-q21"
            difficulty="hard"
            title="An analyst peeks the daily dashboard for 30 days and stops on the first day p < 0.05."
            scenario={<>The experiment has a fixed-horizon design with alpha = 0.05. The analyst peeks every day and announces a winner on the first day the p-value drops below 0.05.</>}
            options={[
              {key:"a", text:"The realized false-positive rate is approximately 26%, because 30 daily peeks at alpha = 0.05 inflate Type-I error from 5% to far above the nominal alpha on the null hypothesis.", correct:true},
              {key:"b", text:"The realized false-positive rate is 5%, because the test was pre-registered at alpha = 0.05 and the analyst's stopping rule does not affect the per-day p-value calculation.", correct:false},
              {key:"c", text:"The realized false-positive rate is 0.17%, because each daily peek effectively divides the alpha across the 30 peeks by the Bonferroni rule applied at the experiment level.", correct:false},
              {key:"d", text:"The realized false-positive rate is unchanged at 5%, because each daily peek is a separate experiment with its own independent alpha budget on the same underlying data.", correct:false},
            ]}
            trap={<>(b) is the analyst's belief — pre-registration of alpha does not survive stop-on-first-significance. (c) is what Bonferroni would do if applied, which it was not. (d) treats peeks as independent experiments, which they aren't.</>}
            lens={<>Stop-on-first-significance on naive p-values is peeking; realized Type-I error explodes. Peek-safe protection has to be active at peek time, not invented after.</>}
          />

          <VIS.TrapProblem
            id="exp-q22"
            difficulty="hard"
            title="The headline result is null; a tenure-decile slice shows a clear effect on power users."
            scenario={<>The overall analysis is null. The analyst slices by tenure decile and finds p below 0.05 for the top decile. They propose shipping to power users only.</>}
            options={[
              {key:"a", text:"Ship to power users on the strength of the slice result; segment-level effects are perfectly valid conclusions of the experiment when the slicing dimension is a natural one.", correct:false},
              {key:"b", text:"Treat the power-user finding as exploratory; pre-register a power-user-only follow-up experiment and re-test the hypothesis cleanly on a fresh sample at the registered alpha.", correct:true},
              {key:"c", text:"Apply Bonferroni to the 10 decile slices and ship the treatment if the top decile survives at alpha / 10 after the post-hoc correction across all 10 evaluated tenure deciles.", correct:false},
              {key:"d", text:"Average the slice effects across deciles with inverse-variance weights and ship the treatment if the weighted-average effect crosses zero with the expected confidence.", correct:false},
            ]}
            trap={<>(a) is subgroup p-hacking. (c) reduces but does not fix the issue — segment-mining was not in the registered plan. (d) hides the mining behind a weighting scheme.</>}
            lens={<>Subgroup discoveries are hypotheses, not conclusions. Confirm them in a fresh, pre-registered experiment.</>}
          />

          <VIS.TrapProblem
            id="exp-q23"
            difficulty="hard"
            title="Aggregate lift is +0.5%; within-region lift is negative in every region."
            scenario={<>The aggregate lift is +0.5%; lift is -0.2% in NA, -0.1% in EMEA, -0.3% in APAC. The regional mix shifted during the experiment window.</>}
            options={[
              {key:"a", text:"Ship on the aggregate lift; the cohort-mix shift is part of the natural variation that the experiment is intended to capture across populations and across time.", correct:false},
              {key:"b", text:"Ship and route the regional negatives to a future follow-up that tunes the treatment per region; the aggregate result establishes a baseline expectation across the population.", correct:false},
              {key:"c", text:"Decompose the headline lift into within-region effect and mix-shift effect; if every within-region effect is negative, the experiment is harmful at the user level despite the aggregate sign.", correct:true},
              {key:"d", text:"Drop the regions with negative within-region effects from the analysis and report the residual aggregate lift as the launch criterion for the experiment at decision time.", correct:false},
            ]}
            trap={<>(a) ships harm to every region. (b) defers the harm. (d) cherry-picks the analysis sample to manufacture a positive read.</>}
            lens={<>Simpson's paradox: aggregate sign can flip the within-stratum sign. Decompose into within-region + mix-shift before shipping.</>}
          />

          <VIS.TrapProblem
            id="exp-q24"
            difficulty="hard"
            title="A 5% global holdout is permanently excluded from every experiment. Pick the strongest reason."
            scenario={<>The platform reserves a permanent 5% slice of users that receives no experimental treatment. Pick the strongest reason this slice is worth its opportunity cost in lost lift.</>}
            options={[
              {key:"a", text:"Provides a clean control for every per-experiment alarm-detector check, so the chi-squared can be calibrated against an unbiased reference population across the platform.", correct:false},
              {key:"b", text:"Acts as a permanent eval set for the recommender models in production, providing a label distribution unaffected by treatment-related selection across the user base.", correct:false},
              {key:"c", text:"Reduces the variance of every individual experiment by serving as a shared control population that all experiments draw from when computing their primary effect estimate.", correct:false},
              {key:"d", text:"Measures the long-cycle aggregate effect of every shipped experiment combined against an untreated baseline; catches cumulative drift that per-experiment analyses cannot recover.", correct:true},
            ]}
            trap={<>(a) misframes the detector's role. (b) is a side benefit but not the primary one. (c) is incorrect — holdouts are excluded from experiments, not shared with them.</>}
            lens={<>The holdout's value is long-cycle: it measures the cumulative impact of all shipped experiments together, which no per-experiment estimator can recover.</>}
          />

          <VIS.TrapProblem
            id="exp-q25"
            difficulty="hard"
            title="The mobile team wants to compute the assignment hash on the device to save a round-trip."
            scenario={<>The mobile team proposes computing hash(user || salt || exp) on the device. The bucketing-service call is replaced by a static-bundle download of the spec.</>}
            options={[
              {key:"a", text:"Push the salt and the spec to the client only for experiments whose assignment latency sits on the critical path; treat the spec payload as versioned, signed, and refreshable.", correct:true},
              {key:"b", text:"Replace the server-side bucketing entirely with on-device hashing for every experiment, because the hash math is identical on both sides and the round-trip is operationally wasteful.", correct:false},
              {key:"c", text:"Use a client-side random number generator instead of the hash, so the variant is decided locally on the device without any dependency on a downloaded spec payload at all.", correct:false},
              {key:"d", text:"Keep assignment server-side but cache the chosen variant in the client for the entire user lifetime, so subsequent requests skip the round-trip after the first assignment call lands.", correct:false},
            ]}
            trap={<>(b) loses the ability to rotate the salt or kill an experiment instantly. (c) breaks cross-device determinism and the detector. (d) freezes the variant against spec changes like a holdout flip.</>}
            lens={<>On-device hashing is acceptable when the spec is shipped versioned and signed; client-side randomness or stale caches break determinism and operability.</>}
          />

          <VIS.TrapProblem
            id="exp-q26"
            difficulty="hard"
            title="A reward-maximizing allocator runs alongside a fixed-allocation test on the same home-feed surface."
            scenario={<>An adaptive allocator shifts traffic toward higher-reward arms over time. A fixed-allocation test in the adjacent layer is on the same home-feed surface as the allocator.</>}
            options={[
              {key:"a", text:"Run both freely with independent salts; the adaptive allocator's traffic reshuffles do not affect the fixed-allocation test's randomization because the salts decouple the buckets.", correct:false},
              {key:"b", text:"Place both into the same mutually-exclusive layer so a user gets one variant per layer; analyze the fixed test within strata of the allocator's reallocation schedule at read time.", correct:true},
              {key:"c", text:"Pause the fixed-allocation test for the duration of the allocator's exploration phase, then resume the fixed test once the allocator has pinned itself to its winning arm in production.", correct:false},
              {key:"d", text:"Convert the fixed-allocation test to an adaptive allocator as well, so the allocation schedules stay aligned across the surface and downstream metrics share a single sampling regime.", correct:false},
            ]}
            trap={<>(a) ignores surface interaction between two treatments on the same slot. (c) wastes time and conflates the allocator's converged state with a control. (d) replaces a confirmatory test with an exploratory mechanism.</>}
            lens={<>Adaptive allocators and fixed tests share the same mutex constraint on a surface. Layer placement plus stratified analysis is the standard combination.</>}
          />

        </VIS.Section>

        <VIS.Section id="sec-watch" title="Watch-outs">
          <ul>
            <li><strong>SRM is the silent killer.</strong> At billions of users, a 0.3-percentage-point split breaches chi-squared. Veto every launch on a hot SRM. Math: §3d.</li>
            <li><strong>Peeking blows up Type-I error.</strong> Naive daily peeks turn 5% alpha into ~26% over a month. Alpha-spending has to be the default, not opt-in. Math: §3c.</li>
            <li><strong>Label maturity gates the analysis frontier.</strong> Retention and revenue rows that aren't ripe are not zeros — they're censored. Math: §3f.</li>
            <li><strong>One Metric Decision before unblinding.</strong> Lock the primary in the spec; secondaries are diagnostic. Math: §3g.</li>
            <li><strong>Same-surface experiments need mutex layers.</strong> Independent randomization is not the same as freedom from interaction. Math: §3h.</li>
            <li><strong>Network interference contaminates marketplace A/Bs.</strong> Between-user estimators under-estimate the global effect; cluster on markets or weeks. Math: §3i.</li>
            <li><strong>Randomization unit must match analysis unit.</strong> Or cluster the standard error. Otherwise sessions-within-user correlation inflates significance. Math: §3j.</li>
          </ul>
        </VIS.Section>
      </React.Fragment>
    )}

    <VIS.Section id="sec-further" title="Further reading">
