      subtitle={<>A batch <VIS.Term def="An audience-build pipeline takes a seed list and outputs an expanded user set. Distinct from a recommender: it produces a static segment, not a per-request ranking.">audience-build pipeline</VIS.Term> with <VIS.Term def="Approximate Nearest Neighbor retrieval: HNSW or IVF-PQ index. Trades small recall loss for sub-millisecond lookup over hundreds of millions of vectors.">ANN retrieval</VIS.Term> over user embeddings, a <VIS.Term def="The mean (or trimmed mean) of seed-user embeddings — represents the seed in vector space. Variance scales as 1/sqrt(n_seeds).">centroid</VIS.Term> from the seed, and a write-time <VIS.Term def="Removes advertiser's existing customers, opted-out users, and sanctioned-country IDs before the audience is synced to the ad platform.">exclusion filter</VIS.Term>.</>}
      byline={[{label:"Difficulty", value:"Hard"}, {label:"Mode", value:"Build, then study"}]}
    />

    <VIS.TLDR>
      <strong>Not a recommender, not a classifier — a batch audience-build with a holdout.</strong> Given a small <VIS.Term def="The advertiser's existing-customer or pixel-converter list. Typical size 10K-100K user IDs. Input to the entire pipeline.">seed audience</VIS.Term>, build a lookalike segment of 1M-10M users using a <VIS.Term def="Mean of seed embeddings, optionally trimmed. The variance of this estimator shrinks as 1/sqrt(n_seeds), which is why tiny seeds produce noisy centroids.">centroid</VIS.Term> in <VIS.Term def="Dense vector space where each user is represented by a learned embedding (e.g., 128-D). Similar users sit close under cosine distance.">embedding space</VIS.Term>, retrieve top-K with <VIS.Term def="Hierarchical Navigable Small World — graph-based ANN. Layered proximity graph with log-time greedy descent. RAM-heavy.">HNSW</VIS.Term>, gate on <VIS.Term def="Cosine similarity between the candidate user embedding and the seed centroid. The threshold tau trades precision (closer = more similar) against reach (more users qualify).">cosine similarity</VIS.Term>, then remove existing customers and opt-outs. Quality is measured by <VIS.Term def="Lift = P(convert | lookalike) / P(convert | random). The 3x bar is industry-standard for advertiser ROI. Must be measured on a held-out slice, not the seed.">lift</VIS.Term> on a 5% <VIS.Term def="A randomly held-out 5% slice of the expanded audience, withheld from auction. After 7 days, compare its conversion rate against a same-sized random control.">holdout</VIS.Term> versus a random control. The three subtle decisions: how to handle <VIS.Term def="Mathematically: a 1K-seed centroid has 10x the noise of a 100K-seed centroid because variance scales as 1/sqrt(n). Tiny seeds need Bayesian shrinkage toward platform mean.">seed-size bias</VIS.Term>, when to refresh embeddings (cost vs <VIS.Term def="The gap between when a user's behavior changed and when their embedding reflects it. Daily refresh keeps staleness under 24h for most users.">staleness</VIS.Term>), and the <VIS.Term def="Minimum audience size before identification becomes possible. Bound at k >= 100 means each output user is indistinguishable from at least 99 others.">k-anonymity</VIS.Term> floor for privacy.
    </VIS.TLDR>

    <VIS.Section id="sec-brief" title="The brief">
      <p>"Advertiser uploads a <VIS.Term def="Seed audience: the advertiser's existing-customer list or pixel-fired converters. Used to define what 'similar' means.">seed audience</VIS.Term> of 10K-100K user IDs. Build a lookalike segment of 1M-10M users with <VIS.Term def="Conversion-rate lift: ratio of expected conversions on the lookalike audience versus a random-control audience of the same size.">3x conversion lift</VIS.Term> vs random within 30 minutes. 600M-user platform with precomputed daily embeddings. Must exclude existing customers (advertiser CRM) and opted-out users. <VIS.Term def="A minimum audience size below which the audience cannot be released — protects users from being re-identified by intersection with auxiliary data.">k-anonymity</VIS.Term> floor k >= 100. <VIS.Term def="Conversion lift measured on a 5% holdout — randomly drawn from the expanded audience, withheld from auction for 7d, then compared to a random-control of equal size.">Lift</VIS.Term> measured on a 5% holdout after 7 days."</p>
    </VIS.Section>

        <VIS.Section id="sec-walk" title="Walking the pipeline">
          <ol>
            <li><strong>Seed validate.</strong> Reject seeds below minimum size (n &lt; 1K) — centroid noise dominates signal. Dedup, drop <VIS.Term def="Users who have withdrawn consent for advertising features. Must be excluded from inputs and outputs of any ad-targeting pipeline.">opted-out</VIS.Term> IDs, drop consent-revoked IDs.</li>
            <li><strong>Centroid aggregation.</strong> Compute <VIS.Term def="Mean computed after dropping the top and bottom 5% of values by some criterion (here: embedding norm). Robust to bot-account outliers in the seed upload.">trimmed-mean</VIS.Term> centroid plus <VIS.Term def="Matrix capturing pairwise variance of embedding dimensions across seed users. Captures directional spread — useful for Mahalanobis-distance gates and per-axis sampling.">covariance</VIS.Term> from the validated seed embeddings. <VIS.Equation tex={String.raw`\mu = \frac{1}{|S'|}\sum_{u \in S'} e_u`} /> where S' drops the top and bottom 5% by norm.</li>
            <li><strong>Per-seed expand (optional).</strong> For <VIS.Term def="Seed set that contains two or more distinct customer subgroups (e.g., bargain-hunters and luxury-buyers for the same brand). The centroid sits between modes in a region containing neither.">multi-modal seeds</VIS.Term>, the centroid is misleading. Run k-NN from each seed and union — catches both modes. See &sect;3b.</li>
            <li><strong>ANN retrieval.</strong> Query HNSW index with the centroid. Pull <VIS.Term def="Top-K retrieval: keep the K candidates with highest similarity to the query. For lookalike, K is typically 5-20x the target audience size to leave room for downstream filtering.">top-K</VIS.Term> candidates ordered by <VIS.Term def="Cosine similarity: dot product of two unit vectors. Equivalent to 1 minus cosine distance. Bounded [-1, 1]. Industry-standard similarity for normalized embeddings.">cosine similarity</VIS.Term>. <VIS.Equation tex={String.raw`s_u = \frac{\mu \cdot e_u}{\|\mu\|\,\|e_u\|}`} /></li>
            <li><strong>Similarity gate.</strong> Drop candidates below threshold tau. tau is calibrated on a <VIS.Term def="Held-out evaluation slice: a randomly drawn subset withheld from training and from the live audience, used to measure quality without contamination.">holdout</VIS.Term> to hit the 3x lift bar. See &sect;3c.</li>
            <li><strong>Exclusion filter.</strong> Subtract advertiser <VIS.Term def="Customer Relationship Management list: the advertiser's roster of existing customers. Used as a 'do not re-target' exclusion list at audience-build time.">CRM</VIS.Term> (existing customers), platform opt-out list, sanctioned-country IDs. Order matters: exclusion before k-anon so the floor checks the final usable set.</li>
            <li><strong>k-anonymity gate.</strong> If final audience &lt; 100, reject or pad with random. Adds <VIS.Term def="Differential privacy: a guarantee that the output reveals little about any single input row. Achieved by adding calibrated noise (e.g., Laplace) to aggregates like the centroid.">DP noise</VIS.Term> to the centroid for small seeds. See &sect;3d.</li>
            <li><strong>Audience sync.</strong> Hash IDs, push to ad-serving system. Batch nightly.</li>
            <li><strong>Lift evaluation.</strong> Hold out 5% of the audience from auction. After 7d compare <VIS.Term def="Conversion rate: fraction of impressioned users who completed the target action (purchase, signup, etc.) within the attribution window. Bottom-funnel metric.">conversion rate</VIS.Term> vs random-control of equal size. <VIS.Equation tex={String.raw`\text{lift} = \frac{CR_{\text{lookalike}}}{CR_{\text{random}}}`} /> Below 3x -> trigger rebuild. See &sect;3e.</li>
            <li><strong>Drift monitor.</strong> Tracks <VIS.Term def="Population Stability Index: bin-wise KL-style divergence between two distributions. PSI &lt; 0.1 stable; 0.1-0.2 minor drift; &gt; 0.2 investigate.">PSI</VIS.Term> on the embedding distribution. Alerts on PSI > 0.2 — usually a holiday or product-launch event. See &sect;3i.</li>
            <li><strong>Retrain loop.</strong> Weekly. Re-fits the <VIS.Term def="Neural network that maps user behavioral features to a dense embedding. 'Tower' usually means a single-leg embedding network in a two-tower retrieval architecture.">embedding tower</VIS.Term> with the latest conversion labels. Decoupled from the daily refresh.</li>
          </ol>
        </VIS.Section>

        <VIS.Section id="sec-math" title="Why every stage is the way it is — the math">

          <h3 style={{marginTop:14, marginBottom:6, fontSize:15, color:"#334155"}}>&sect;3a. Centroid quality vs seed size</h3>
          <p>The seed-centroid estimator's variance scales with seed size:</p>
          <VIS.Equation display={true} tex={String.raw`\text{Var}(\hat{\mu}) = \frac{\sigma^{2}}{n}, \qquad \|\hat{\mu} - \mu\| \;\propto\; \frac{1}{\sqrt{n}}`} />
          <p>A 1K-seed centroid is roughly 10x noisier than a 100K-seed centroid. The seed-validator rejects seeds below n=1K; between 1K and 10K we apply <VIS.Term def="Bayesian shrinkage: pull a noisy estimate toward a stable prior, weighted by sample size. Reduces variance at the cost of small bias toward the prior.">Bayesian shrinkage</VIS.Term> toward the <VIS.Term def="Platform-mean embedding: the average embedding across all platform users. Stable, representative — used as the prior in shrinkage estimators for small-seed lookalikes.">platform-mean</VIS.Term>:</p>
          <VIS.Equation display={true} tex={String.raw`\tilde{\mu} \;=\; \frac{n}{n + n_0}\,\hat{\mu}_{\text{seed}} \;+\; \frac{n_0}{n + n_0}\,\mu_{\text{platform}}`} />
          <p>Here n_0 is a pseudo-count prior strength (typically 5K). For very small seeds, the platform mean dominates and the lookalike returns a near-random audience — which is the right behavior (refuse to over-claim signal).</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>&sect;3b. When the centroid is wrong: per-seed expansion</h3>
          <p>If the seed has two distinct customer subgroups (e.g., bargain-hunters and luxury-buyers for the same brand), the centroid sits between them in a region containing neither. The <VIS.Term def="Mahalanobis distance: euclidean distance scaled by the inverse covariance matrix. Accounts for embedding-axis correlation; equivalent to euclidean in whitened space.">Mahalanobis distance</VIS.Term> from each seed cluster to the centroid is large:</p>
          <VIS.Equation display={true} tex={String.raw`d_{M}(e_u, \mu) = \sqrt{(e_u - \mu)^{\top}\,\Sigma^{-1}\,(e_u - \mu)}`} />
          <p>A test: cluster the seeds (mini-K-means, K=2..5) and check intra-cluster cosine. If the largest cluster contains less than 60% of seeds, switch to <VIS.Term def="Per-seed retrieval: run k-NN from each seed (or a sampled subset) and union the results. Catches multi-modal seeds where the centroid sits between modes.">per-seed expansion</VIS.Term>: sample 500 seeds, run k-NN on each, union with weighted overlap.</p>
          <VIS.Equation display={true} tex={String.raw`\text{audience} \;=\; \bigcup_{u \in S_{\text{sample}}} \text{topK}(e_u, K_{\text{per-seed}})`} />

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>&sect;3c. Cosine threshold tau vs reach (calibrated on holdout AUC)</h3>
          <p>The retrieval gate is a similarity threshold. Tighter tau means higher precision (closer match to seed behavior), smaller reach (fewer users qualify). Express the tradeoff:</p>
          <VIS.Equation display={true} tex={String.raw`\text{reach}(\tau) = |\{u : \cos(e_u, \mu) \ge \tau\}|, \qquad \text{precision}(\tau) \approx \frac{TP(\tau)}{TP(\tau) + FP(\tau)}`} />
          <p>Calibrate tau on a holdout slice (10% of last quarter's converted users for similar advertisers). For each candidate tau, measure <VIS.Term def="Area Under the ROC Curve: probability that a random positive scores higher than a random negative. Threshold-free ranking metric.">AUC</VIS.Term> of (cosine score vs conversion outcome). The optimum is the <VIS.Term def="Knee of the curve: the inflection point where marginal gain from loosening a constraint drops sharply. Standard heuristic for picking thresholds along a tradeoff frontier.">knee</VIS.Term> of the precision-reach curve at the smallest audience hitting the 3x lift bar:</p>
          <VIS.Equation display={true} tex={String.raw`\tau^{*} \;=\; \arg\min_{\tau}\,\{\tau : \text{lift}(\tau) \ge 3.0\}`} />

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>&sect;3d. k-anonymity bound</h3>
          <p>Re-identification risk depends on audience size. The k-anonymity guarantee:</p>
          <VIS.Equation display={true} tex={String.raw`\Pr[\text{re-identify}(u) \mid u \in A] \;\le\; \frac{1}{k}`} />
          <p>With k >= 100, each output user is indistinguishable from at least 99 others. Smaller audiences are dropped or padded; for small-seed lookalikes the centroid is perturbed with <VIS.Term def="Laplace noise: noise drawn from a Laplace distribution, calibrated by sensitivity and privacy budget. Standard primitive for differential privacy on numeric aggregates.">Laplace noise</VIS.Term>:</p>
          <VIS.Equation display={true} tex={String.raw`\tilde{\mu} = \hat{\mu} + \mathrm{Lap}(0, \Delta/\epsilon)`} />
          <p>where Delta is the <VIS.Term def="L1 sensitivity: the maximum change in an aggregate caused by adding or removing a single user. Drives the noise scale in differential privacy.">L1 sensitivity</VIS.Term> of the centroid (bounded by 2/n for normalized embeddings) and epsilon is the <VIS.Term def="Privacy budget epsilon: smaller epsilon means stronger privacy and noisier output. epsilon=1 is a common standard for analytics-grade DP applications.">privacy budget</VIS.Term> (typically 1.0).</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>&sect;3e. Lift evaluation on holdout</h3>
          <p>The 3x lift bar is the gating quality metric. Definition:</p>
          <VIS.Equation display={true} tex={String.raw`\text{lift} \;=\; \frac{P(\text{convert} \mid u \in \text{lookalike})}{P(\text{convert} \mid u \in \text{random})}`} />
          <p>Variance of the lift estimator on n holdout users with conversion rate p:</p>
          <VIS.Equation display={true} tex={String.raw`\text{Var}(\hat{\text{lift}}) \;\approx\; \frac{1 - p}{n\,p} \;\cdot\; \left(\frac{1}{\text{lift}^{2}} + 1\right)`} />
          <p>For p = 0.02 (typical conversion rate) and target lift = 3.0 with 95% <VIS.Term def="Confidence interval: a frequentist range that contains the true parameter with the stated probability under repeated sampling. 95% CI half-width = 0.3 means +/- 0.3 around the point estimate.">CI</VIS.Term> half-width = 0.3, the required holdout size is roughly</p>
          <VIS.Equation display={true} tex={String.raw`n_{\text{holdout}} \;\gtrsim\; \frac{1.96^{2}\,(1-p)}{p\,(0.1)^{2}} \;\approx\; 20{,}000`} />
          <p>A 5% holdout on a 1M-user audience gives 50K — comfortably above the threshold.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>&sect;3f. False-positive vs false-negative cost</h3>
          <p>For lookalike audiences the cost surface is asymmetric in the opposite direction to fraud detection:</p>
          <VIS.Equation display={true} tex={String.raw`C_{\text{FP}} \;=\; \text{CPM} \cdot p_{\text{no-convert}}, \qquad C_{\text{FN}} \;=\; \text{opportunity cost of missed conversion}`} />
          <p>A wasted <VIS.Term def="An ad served to a user. Cost is typically priced per thousand (CPM). For lookalike, a wasted impression is one served to a user who never converts.">impression</VIS.Term> costs &lt; $0.01; a missed high-value buyer can cost $50+. So tau is set on the loose side — the advertiser would rather pay for some non-converters than miss the long tail of buyers. The <VIS.Term def="Opportunity cost: the value of the option not taken. For lookalike, the dollar value of a high-value buyer the audience failed to reach.">opportunity cost</VIS.Term> dominates:</p>
          <VIS.Equation display={true} tex={String.raw`\tau^{*} \;=\; \arg\min_{\tau}\,\{C_{\text{FP}}(\tau) \cdot \text{FPR}(\tau) + C_{\text{FN}}(\tau) \cdot \text{FNR}(\tau)\}`} />

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>&sect;3g. Jaccard overlap for audience consistency</h3>
          <p>When the daily-refreshed embedding shifts, the same seed may produce a different audience. Measure stability across two consecutive runs with the <VIS.Term def="Jaccard similarity: intersection over union of two sets. For audiences, J = |A ∩ B| / |A ∪ B|. Bounded [0, 1] — 1 means identical sets.">Jaccard index</VIS.Term>:</p>
          <VIS.Equation display={true} tex={String.raw`J(A_t, A_{t+1}) \;=\; \frac{|A_t \cap A_{t+1}|}{|A_t \cup A_{t+1}|}`} />
          <p>For a stable advertiser, J > 0.7 is healthy. Below 0.5 means embeddings shifted enough that yesterday's audience is barely related to today's — usually triggered by a major retrain or a behavior-shift event.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>&sect;3h. Refresh cadence: cost vs staleness</h3>
          <p>Daily embedding refresh has cost C_refresh = compute + storage write. Skipping a day saves cost but increases staleness, measured as the expected behavioral distance between a user's current state and their cached embedding:</p>
          <VIS.Equation display={true} tex={String.raw`\text{staleness}(t) \;\approx\; \alpha \cdot t, \qquad \text{lift\_loss}(t) \;\propto\; \text{staleness}(t)`} />
          <p>where alpha is the per-day <VIS.Term def="Drift rate: how fast a user's true behavior diverges from their cached embedding. Higher in fast-moving categories (e.g., fashion) and lower in stable categories (e.g., financial services).">drift rate</VIS.Term> (empirically 0.5-2% lift loss per day for active categories). The cost-optimal cadence balances:</p>
          <VIS.Equation display={true} tex={String.raw`T^{*} \;=\; \arg\min_{T}\,\left[\frac{C_{\text{refresh}}}{T} + \kappa\,T\right]`} />
          <p>Daily refresh (T=1) is the empirical sweet spot for consumer-product advertisers.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>&sect;3i. Drift detection via PSI</h3>
          <p>Population Stability Index on the embedding distribution between week-over-week:</p>
          <VIS.Equation display={true} tex={String.raw`\text{PSI} \;=\; \sum_{i} (p_i^{\text{new}} - p_i^{\text{old}})\,\ln\frac{p_i^{\text{new}}}{p_i^{\text{old}}}`} />
          <p>Bucket users by quantile on a randomly sampled embedding dimension (or by <VIS.Term def="k-means clustering: assign each user embedding to the nearest of K centroids; recompute centroids; repeat until stable. Standard unsupervised bucketing for distribution-shift detection.">k-means cluster</VIS.Term> ID). PSI &lt; 0.1 = stable. 0.1-0.2 = minor drift. > 0.2 = trigger retrain investigation. Above 0.3 = abort daily lookalike rebuild — yesterday's audience is more reliable.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>&sect;3j. Why holdout cannot include seed users</h3>
          <p>Suppose you accidentally include seed users in the holdout. The seed by construction converts at high rate (they already are customers):</p>
          <VIS.Equation display={true} tex={String.raw`CR_{\text{seed}} \approx 1.0, \quad CR_{\text{lookalike-true}} \approx 0.05, \quad CR_{\text{random}} \approx 0.01`} />
          <p>Mixing seeds into the holdout inflates the numerator. With 10% seed contamination:</p>
          <VIS.Equation display={true} tex={String.raw`CR_{\text{contam}} \;=\; 0.1 \cdot 1.0 + 0.9 \cdot 0.05 \;=\; 0.145 \quad \Rightarrow \quad \text{lift}_{\text{contam}} = 14.5\times`} />
          <p>vs true lift of 5x. The reported number is meaningless. This is the entire reason the holdout must be drawn from the expanded audience after <VIS.Term def="Seed-removal: subtracting seed users from the candidate audience before sampling the holdout. Prevents seed-contamination of the lift estimator.">seed-removal</VIS.Term>, not before. The same logic applies to any <VIS.Term def="Data leakage: contamination of an evaluation set by information from the training or input set. Inflates reported metrics to numbers the live system cannot reproduce.">data leakage</VIS.Term> from input to evaluation.</p>

        </VIS.Section>

        <VIS.Section id="sec-distractors" title="What the distractors teach">
          <ul>
            <li><strong>"Skip holdout — use all seeds for both centroid and eval."</strong> Defeats the entire measurement. Lift becomes a self-fulfilling number with no statistical meaning. Math: &sect;3j.</li>
          </ul>
        </VIS.Section>

        <VIS.Section id="sec-traps" title="Trap drills">
          <p style={{margin:"0 0 14px 0", fontSize:14, color:"#64748b"}}>
            30 senior-MLE traps across five axes: <strong>business metrics</strong>, <strong>data collection</strong>, <strong>training</strong>, <strong>monitoring</strong>, <strong>gotchas</strong>. Pick one option per problem; reveal explains why the wrong answers are tempting.
          </p>

          {/* ============================ AXIS A — BUSINESS METRICS ============================ */}

          <VIS.TrapProblem
            id="la-q1"
            difficulty="hard"
            title="Pick the north-star the lookalike pipeline should be tuned against."
            scenario={<>The PM proposes candidate metrics. One survives perverse-optimization at both extremes.</>}
            options={[
              {key:"a", text:"Mean cosine similarity of the expanded audience to the seed centroid, averaged across all advertisers active in the last 7 days.", correct:false},
              {key:"b", text:"Conversion-rate lift on a 5% holdout slice withheld from auction for 7 days, measured against an equal-size random-control audience.", correct:true},
              {key:"c", text:"Audience reach: total number of users in the expanded segment across all live advertiser campaigns, summed weekly.", correct:false},
              {key:"d", text:"Hit-rate at K=10 of the ANN retrieval step, evaluated against the seed itself by holding out 10% of seed users.", correct:false},
            ]}
            trap={<>(a) is gameable by tightening tau until only near-duplicate users qualify — the metric soars while reach collapses. (c) is gameable by loosening tau — reach climbs while every advertiser's ROI collapses. (d) measures retrieval quality on the seed, not generalization to unseen converters.</>}
            lens={<>Lift on a held-out conversion signal is the only metric whose extreme values both correspond to bad outcomes. Math: &sect;3e.</>}
          />

          <VIS.TrapProblem
            id="la-q2"
            difficulty="hard"
            title="Advertiser asks for the largest possible audience. Defaults?"
            scenario={<>A new advertiser uploads a 50K-user seed and asks for "as many lookalikes as possible." Pick the response.</>}
            options={[
              {key:"a", text:"Build the largest audience that still clears the 3x lift bar on the holdout, capped at 10M to avoid swamping the auction system.", correct:true},
              {key:"b", text:"Return all 600M platform users ranked by cosine similarity, letting the advertiser apply their own bid-shading downstream.", correct:false},
              {key:"c", text:"Build an audience of exactly the requested cap with no lift-bar check, since the advertiser is paying and knows their own ROI target.", correct:false},
              {key:"d", text:"Build at the platform-wide default tau, regardless of how that interacts with this specific advertiser's seed signal.", correct:false},
            ]}
            trap={<>(b) burns advertiser budget on the long-tail of unlikely converters. (c) lets advertisers harm themselves and damages the platform's overall ROI reputation. (d) ignores seed-specific signal strength.</>}
            lens={<>The lift bar is the platform's contract with the advertiser, not a suggestion. Reach beyond the bar destroys ROI; reach below the bar leaves money on the table.</>}
          />

          <VIS.TrapProblem
            id="la-q3"
            difficulty="medium"
            title="Which dashboard does the head of ads-ML actually need?"
            scenario={<>Pin one chart on the daily lookalike-quality dashboard. Pick the one whose movements correspond to levers the team controls.</>}
            options={[
              {key:"a", text:"PSI of the embedding distribution week-over-week, paired with a heatmap of audience-Jaccard between consecutive daily rebuilds.", correct:false},
              {key:"b", text:"Lift on the most recent 7-day holdout cohort, sliced by advertiser-category, with the 3x bar drawn as a reference line on the chart.", correct:true},
              {key:"c", text:"Histogram of cosine similarity scores in the expanded audience for the largest advertiser of the past week, refreshed each morning.", correct:false},
              {key:"d", text:"Mean embedding norm by user-active-recency bucket, refreshed daily, with overlay of the rolling 30-day baseline mean.", correct:false},
            ]}
            trap={<>(a), (c), (d) are model-monitoring artefacts. They matter — but for an ML lead deciding where to spend the week, lift-by-advertiser-category is the one chart that tells them whether the system is currently delivering.</>}
            lens={<>The right dashboard surfaces the contract metric (3x lift) at the slicing dimension the team can act on (category-level rebuilds).</>}
          />

          <VIS.TrapProblem
            id="la-q4"
            difficulty="hard"
            title="A platform-wide tau or per-advertiser tau?"
            scenario={<>Conversion-rate baselines vary by advertiser category (luxury 0.5%, FMCG 3%). Pick the threshold strategy.</>}
            options={[
              {key:"a", text:"Per-advertiser tau, calibrated against each advertiser's own historical conversion data and the category-level prior conversion rate.", correct:true},
              {key:"b", text:"Single platform-wide tau, tuned against pooled-advertiser lift on the most recent quarter of holdout conversion data.", correct:false},
              {key:"c", text:"Per-category tau (luxury vs FMCG vs services), fixed for one year and revisited only during the annual model refresh cycle.", correct:false},
              {key:"d", text:"Probabilistic tau: sample threshold proportional to predicted lift, giving every advertiser a randomized audience composition.", correct:false},
            ]}
            trap={<>(b) over-includes for luxury (low baseline conversions inflate apparent lift) and under-includes for FMCG. (c) is closer but freezes against year-over-year shifts. (d) injects controlled randomness but the underlying optimum still varies.</>}
            lens={<>One model, advertiser-specific thresholds is the smallest change that captures category-level conversion-rate priors. Cost math: &sect;3f.</>}
          />

          <VIS.TrapProblem
            id="la-q5"
            difficulty="hard"
            title="Lift dropped from 3.4x to 2.6x after a retrain. CFO asks what to do."
            scenario={<>You retrained the embedding tower last Sunday. Lift on the post-retrain holdout cohort fell from 3.4x to 2.6x while audience size held flat at 4M. The CFO wants a decision.</>}
            options={[
              {key:"a", text:"Roll back to the prior embedding weights and investigate offline before re-deploying — a sub-3x lift breaks the platform's contract with advertisers.", correct:true},
              {key:"b", text:"Keep the new weights live and wait two more weeks for the holdout signal to stabilize before any rollback decision can be made on the new model.", correct:false},
              {key:"c", text:"Keep the new weights live and increase audience reach to compensate for the lower lift, since absolute conversions should net out roughly equal.", correct:false},
              {key:"d", text:"Tighten tau on the new model so the smaller resulting audience clears 3x, accepting the reach reduction as a permanent regression.", correct:false},
            ]}
            trap={<>(b) leaves advertisers paying for sub-3x audiences for two weeks. (c) amplifies the regression. (d) papers over a model regression by shrinking the surface — the underlying embedding has degraded and tau won't fix that.</>}
            lens={<>Sub-3x lift is a contract violation. Rollback first, debug offline, redeploy when the holdout clears the bar.</>}
          />

          <VIS.TrapProblem
            id="la-q6"
            difficulty="hard"
            title="A luxury advertiser disputes the lift number. How do you respond?"
            scenario={<>The luxury advertiser sees 2.1x lift on their pixel-tracked conversions in their own reporting tool. Your platform reports 3.4x lift on the 5% holdout for that advertiser.</>}
            options={[
              {key:"a", text:"Reconcile against the advertiser's pixel-tracked conversions on the same holdout users, since differences usually trace to attribution-window mismatch.", correct:true},
              {key:"b", text:"Trust the platform-side holdout number — the advertiser's pixel tracking has well-known undercount issues and is not the source of truth here.", correct:false},
              {key:"c", text:"Take the geometric mean of the two numbers as the reported lift, since neither side has full visibility into the joined attribution chain.", correct:false},
              {key:"d", text:"Drop the lift report for this advertiser entirely and revert to reporting cosine-similarity statistics until the discrepancy is resolved offline.", correct:false},
            ]}
            trap={<>(b) discards the source of truth the advertiser actually pays attention to. (c) is statistical cargo-cult — averaging two definitions doesn't yield a meaningful number. (d) hides the signal at the moment the advertiser needs it most.</>}
            lens={<>Almost every lift-number dispute traces to one of three causes: attribution window mismatch, pixel-undercount on the advertiser side, or holdout contamination. Reconcile, don't replace.</>}
          />

          {/* ============================ AXIS B — DATA COLLECTION ============================ */}

          <VIS.TrapProblem
            id="la-q7"
            difficulty="hard"
            title="Seed of 800 users uploaded. What do you build?"
            scenario={<>An advertiser uploads 800 IDs and clicks build. Pick the response.</>}
            options={[
              {key:"a", text:"Reject the build with a clear minimum-seed-size message — the centroid noise dominates signal below n approximately 1K under the variance bound in &sect;3a.", correct:true},
              {key:"b", text:"Build with the small seed and apply DP noise to the centroid — k-anonymity is preserved and the advertiser can interpret the resulting audience appropriately.", correct:false},
              {key:"c", text:"Build but skip the lift-bar check, since holdout statistics are unreliable for audiences derived from sub-1K seeds anyway.", correct:false},
              {key:"d", text:"Pad the seed to 1K by sampling random users from the platform — the diluted centroid is acceptable for a first-pass build under tight deadlines.", correct:false},
            ]}
            trap={<>(b) ships a noisy audience that misses the lift bar — the advertiser blames the platform. (c) hides the failure signal. (d) is the worst — the resulting centroid is closer to platform mean than to the advertiser's actual customer.</>}
            lens={<>Refuse to over-claim signal. The minimum-seed-size floor is a feature, not a limitation. Math: &sect;3a.</>}
          />

          <VIS.TrapProblem
            id="la-q8"
            difficulty="hard"
            title="Which conversion signal becomes the gold positive label for retrain?"
            scenario={<>Four candidate signals correlate with the advertiser's idea of a conversion. Pick the cleanest one for the weekly retrain corpus.</>}
            options={[
              {key:"a", text:"Pixel-fired purchase event on the advertiser's website, joined with the platform's hashed-user-ID within a 7-day click-attribution window.", correct:true},
              {key:"b", text:"Ad-click event on the platform itself, treated as a conversion proxy since click intent precedes purchase by a few hours typically.", correct:false},
              {key:"c", text:"Time-on-page after click-through, with users above the 90th percentile of dwell time treated as engaged-conversion-equivalents.", correct:false},
              {key:"d", text:"Reaching the advertiser's product-detail-page, since the user has expressed enough interest to navigate past the landing surface.", correct:false},
            ]}
            trap={<>(b) measures attention, not purchase. (c) is a soft proxy heavily contaminated by browse-only users. (d) is mid-funnel, not bottom-funnel.</>}
            lens={<>The cleanest label is the one closest to the dollar event. Trade volume for precision at retrain time; use the proxies as features.</>}
          />

          <VIS.TrapProblem
            id="la-q9"
            difficulty="hard"
            title="Seed contamination: pixel mis-fires include bot traffic."
            scenario={<>The advertiser's pixel fires on bot traffic about 3% of the time. Their seed upload includes those bot rows. Pick the mitigation.</>}
            options={[
              {key:"a", text:"Use the trimmed-mean centroid (drop top and bottom 5 percent by embedding norm) plus a bot-likelihood filter on the seed prior to centroid aggregation.", correct:true},
              {key:"b", text:"Trust the advertiser's seed as-is — they have first-party signal we lack, so filtering would discard relevant information about their customer base.", correct:false},
              {key:"c", text:"Drop seeds whose embedding cosine to the seed mean falls below the 25th percentile, since outliers are likely bots regardless of source.", correct:false},
              {key:"d", text:"Subsample the seed to 90% of original size to dilute the bot contribution, then build the centroid on the smaller cleaner sample.", correct:false},
            ]}
            trap={<>(b) ships bot-contaminated audiences. (c) discards legitimate niche customers (the trimmed mean already handles outliers; this layers an additional, more aggressive cut). (d) is statistically equivalent to nothing — bots are still 3% of the smaller sample.</>}
            lens={<>Trimmed mean handles distributional outliers; the bot-likelihood model handles known-pattern outliers. Both are needed; they're solving different problems.</>}
          />

          <VIS.TrapProblem
            id="la-q10"
            difficulty="hard"
            title="Seed-to-platform demographic skew."
            scenario={<>The seed is 85% urban, 70% female, ages 25-34. The platform overall is 50% urban, 52% female, broad age distribution. Pick the handling.</>}
            options={[
              {key:"a", text:"Build the lookalike directly on embedding similarity — demographic skew is a feature of the advertiser's signal, not a bias to correct away.", correct:true},
              {key:"b", text:"Apply a demographic-rebalance sampler that forces the expanded audience to match platform-wide demographics on age gender and geography.", correct:false},
              {key:"c", text:"Strip demographic features from the user embedding before retrieval, leaving only behavioral signal as the basis for similarity scoring.", correct:false},
              {key:"d", text:"Run two parallel retrievals — one on the raw centroid and one on a demographically-rebalanced centroid — and take the union with deduplication.", correct:false},
            ]}
            trap={<>(b) overrides the advertiser's actual signal — if their customers genuinely are urban-young-female, that's a fact, not a bias. (c) discards demographic signal that may legitimately correlate with the product. (d) doubles cost for unclear benefit.</>}
            lens={<>"Bias" in lookalike has a specific meaning: ungrounded skew. A skew that reflects the advertiser's real customer base is the entire signal. Demographic rebalance is only correct if the advertiser explicitly requests it (e.g., regulatory reasons).</>}
          />

          <VIS.TrapProblem
            id="la-q11"
            difficulty="hard"
            title="The exclusion list contains 40% of the candidate audience."
            scenario={<>For a long-tenure advertiser, their CRM exclusion list overlaps with 40% of the post-similarity-gate candidates. Pick the response.</>}
            options={[
              {key:"a", text:"Apply the exclusion filter and rebuild the audience with a looser tau if the result falls below the minimum-reach target after exclusion.", correct:true},
              {key:"b", text:"Skip the exclusion list — 40% overlap shows the lookalike is working too well, and excluding existing customers would damage performance metrics.", correct:false},
              {key:"c", text:"Apply the exclusion list and report the smaller audience as final, letting the advertiser decide whether to widen the seed or adjust their target reach.", correct:false},
              {key:"d", text:"Swap exclusion-list members for the next-best ranked candidates by cosine similarity, so the final size matches the pre-exclusion target.", correct:false},
            ]}
            trap={<>(b) makes the advertiser pay to re-target their existing customers — defeats the entire point. (c) is partially right but passes the rebuild decision back to the advertiser when the platform should make it. (d) reaches deeper into the tail without the platform owning the lift consequences.</>}
            lens={<>Exclusion is non-negotiable. The platform owns the loosen-tau-and-rebuild loop because the platform owns the lift contract.</>}
          />

          <VIS.TrapProblem
            id="la-q12"
            difficulty="hard"
            title="Seeds with declined GDPR consent — how do they enter the pipeline?"
            scenario={<>Some seed IDs were uploaded but those users have revoked platform consent for advertising features. Pick the handling.</>}
            options={[
              {key:"a", text:"Drop them at the seed-validator stage before centroid aggregation — opted-out users cannot be used as positive examples for any audience-derivation step.", correct:true},
              {key:"b", text:"Keep them in the centroid computation but exclude them from the output audience, since they only inform the seed representation not the targeting.", correct:false},
              {key:"c", text:"Hash their IDs before centroid aggregation so the resulting centroid carries no identifiable signal about the opted-out users specifically.", correct:false},
              {key:"d", text:"Compute the centroid with all seeds including opted-out, then add Laplace noise to make the centroid differentially private with epsilon equals 1.", correct:false},
            ]}
            trap={<>(b) is a common mistake — consent applies to the use of the data, not just the output. (c) hashing is not privacy. (d) DP is for a different threat model (re-identification of the audience), not for consent compliance.</>}
            lens={<>GDPR consent withdrawal means the data cannot be used as input to any advertising-decisioning step. Drop at ingest.</>}
          />

          {/* ============================ AXIS C — TRAINING ============================ */}

          <VIS.TrapProblem
            id="la-q13"
            difficulty="hard"
            title="The user-embedding tower is retrained weekly. Pick the loss."
            scenario={<>The user-embedding tower powers lookalike retrieval. Pick the loss function that produces embeddings most useful for centroid-based retrieval.</>}
            options={[
              {key:"a", text:"Contrastive InfoNCE loss on co-converted-with-same-advertiser pairs as positives and random user pairs as negatives, with in-batch negative sampling.", correct:true},
              {key:"b", text:"Cross-entropy classification of which advertiser-category each user has converted on, with one output head per category in the catalogue.", correct:false},
              {key:"c", text:"Triplet loss using a fixed anchor user, with the positive being the same user a day later and the negative being any other user sampled uniformly.", correct:false},
              {key:"d", text:"Masked-feature reconstruction: hide one behavioral feature and predict it from the rest, then use the bottleneck layer as the user embedding.", correct:false},
            ]}
            trap={<>(b) makes the embedding too coarse — every fashion-converter looks identical. (c) measures temporal stability, not cross-user similarity. (d) is plausible but produces embeddings optimized for feature-imputation, not user-similarity.</>}
            lens={<>The downstream task is "find users similar to converters." The loss should be: bring co-converters together, push random users apart. InfoNCE with in-batch negatives is the canonical choice.</>}
          />

          <VIS.TrapProblem
            id="la-q14"
            difficulty="hard"
            title="HNSW index parameters: M and efConstruction."
            scenario={<>You're choosing HNSW parameters for the 600M-user index. Pick the configuration that matches the use case.</>}
            options={[
              {key:"a", text:"M=32 efConstruction=200 efSearch=100 — moderate graph density, batch retrieval at low QPS, recall above 0.95 against exact ground truth.", correct:true},
              {key:"b", text:"M=8 efConstruction=40 efSearch=16 — minimum RAM footprint, online retrieval at high QPS, recall around 0.85 acceptable for batch use.", correct:false},
              {key:"c", text:"M=128 efConstruction=500 efSearch=400 — maximum quality, ignoring the 4x RAM cost since the index is rebuilt only once per day.", correct:false},
              {key:"d", text:"M=16 efConstruction=100 efSearch=50 — balanced default copied from the FAISS HNSW example, suitable for any indexing problem at any scale.", correct:false},
            ]}
            trap={<>(b) optimizes the wrong axis — lookalike is batch (low QPS), so the speed gain doesn't matter and the recall loss costs lift directly. (c) wastes RAM with diminishing recall returns past M=32. (d) is cargo-culted defaults.</>}
            lens={<>Lookalike is batch, retrieve top-K thousands of times per advertiser run. Quality matters far more than QPS. M=32 sits at the knee of the M-vs-recall curve.</>}
          />

          <VIS.TrapProblem
            id="la-q15"
            difficulty="hard"
            title="Embedding-tower retrain frequency."
            scenario={<>The behavioral feature pipeline produces fresh conversion labels every day. Pick the retrain cadence for the embedding tower itself.</>}
            options={[
              {key:"a", text:"Weekly retrain plus daily incremental refresh of user embeddings (apply existing tower to fresh features), with full tower retrain every Sunday.", correct:true},
              {key:"b", text:"Daily full tower retrain — fresh conversion signal arrives daily, so the model should be refit daily to capture all newly available training data.", correct:false},
              {key:"c", text:"Monthly retrain — embeddings are stable enough that monthly refit captures meaningful drift, and the cost saving makes the throughput tradeoff worthwhile.", correct:false},
              {key:"d", text:"Continuous online retrain — stream every fresh conversion event into a per-record SGD update on the embedding tower with a small learning rate.", correct:false},
            ]}
            trap={<>(b) over-fits to the past week's noise. (c) under-fits to behavior shifts. (d) is operationally hostile — non-deterministic embeddings break audience-Jaccard stability metrics overnight.</>}
            lens={<>Two loops at different cadences: daily refresh of vectors (apply existing tower to fresh features) vs weekly full retrain. The split decouples vector freshness from model freshness — cost: &sect;3h.</>}
          />

          <VIS.TrapProblem
            id="la-q16"
            difficulty="hard"
            title="In-batch negative sampling — what's the failure mode?"
            scenario={<>The InfoNCE loss uses in-batch negatives. Pick the most important failure mode to mitigate at training time.</>}
            options={[
              {key:"a", text:"False-negatives in the batch — a user truly similar to the anchor ends up sampled as a negative because they happened to share the batch.", correct:true},
              {key:"b", text:"Batch-size sensitivity — InfoNCE quality degrades as batch size shrinks below 256 because gradient noise dominates the contrastive signal.", correct:false},
              {key:"c", text:"GPU memory pressure — 600M-user embedding tables exceed single-GPU memory and require sharded all-to-all communication for in-batch sampling.", correct:false},
              {key:"d", text:"Optimizer instability — Adam's adaptive moments interact poorly with the contrastive objective and require careful warmup to avoid divergence.", correct:false},
            ]}
            trap={<>(b) is a real concern but mitigated trivially by gradient-accumulation. (c) is infrastructure not a learning-quality issue. (d) is a fairy tale — Adam handles InfoNCE fine.</>}
            lens={<>False negatives are the canonical pitfall: in-batch sampling assumes "other users in the batch are negatives" but for a converters-only batch this assumption fails 20-40% of the time. Mitigations: hard-negative mining, similarity-aware batch composition.</>}
          />

          <VIS.TrapProblem
            id="la-q17"
            difficulty="hard"
            title="Cosine versus L2 in the embedding space."
            scenario={<>The retrieval gate uses cosine similarity but the loss was trained with euclidean distance. Pick the response.</>}
            options={[
              {key:"a", text:"Train with cosine loss (or L2-normalize embeddings during training and use L2) — the metric used at retrieval should match the metric optimized at train time.", correct:true},
              {key:"b", text:"Keep euclidean training and cosine retrieval — they're approximately equivalent for normalized vectors, and the small mismatch rarely affects lift in practice.", correct:false},
              {key:"c", text:"Use euclidean retrieval to match training, since cosine retrieval discards magnitude information that the embedding tower has learned to encode.", correct:false},
              {key:"d", text:"Compute both metrics at retrieval and take the rank-fusion combination, since each captures a complementary aspect of user similarity.", correct:false},
            ]}
            trap={<>(b) is sloppy — they're only equivalent if embeddings are normalized, and that has to be enforced. (c) reintroduces magnitude as a signal that wasn't supposed to be there. (d) is cargo-culting rank fusion.</>}
            lens={<>Train-serve metric skew is the silent killer. Either L2-normalize embeddings before the loss and retrieval (cleanest) or use cosine loss at training. Don't mix.</>}
          />

          <VIS.TrapProblem
            id="la-q18"
            difficulty="hard"
            title="Cross-advertiser knowledge transfer in the embedding tower."
            scenario={<>The embedding tower is shared across all advertisers. Pick the design choice that maximizes lookalike quality.</>}
            options={[
              {key:"a", text:"Single shared tower trained on co-conversion across all advertisers, with the seed-centroid layer providing the per-advertiser personalization signal.", correct:true},
              {key:"b", text:"Per-advertiser embedding tower trained on only that advertiser's conversion data, since their customer base is the source of truth for that segment.", correct:false},
              {key:"c", text:"Per-category embedding towers — one for luxury one for FMCG one for services — to capture category-specific similarity-relevant features explicitly.", correct:false},
              {key:"d", text:"Shared tower plus per-advertiser fine-tune of the final layer, refit each week against that advertiser's freshest conversion labels.", correct:false},
            ]}
            trap={<>(b) starves on small advertisers. (c) is plausible but loses cross-category transfer. (d) operationally heavy with marginal lift gain.</>}
            lens={<>The shared-tower-plus-centroid pattern is the canonical lookalike architecture. The centroid IS the per-advertiser personalization — that's the whole point of the design.</>}
          />

          {/* ============================ AXIS D — MONITORING ============================ */}

          <VIS.TrapProblem
            id="la-q19"
            difficulty="hard"
            title="PSI on the embedding distribution jumped from 0.08 to 0.31."
            scenario={<>Embedding-PSI rose overnight from 0.08 to 0.31 — a 4x jump. Pick the response.</>}
            options={[
              {key:"a", text:"Halt the daily lookalike rebuild for all advertisers, investigate the upstream behavioral feature pipeline, and keep yesterday's audiences live until root-caused.", correct:true},
              {key:"b", text:"Continue rebuilds — PSI above 0.3 is a signal that the embedding has captured a real behavior shift and the new audiences will perform better than the old ones.", correct:false},
              {key:"c", text:"Continue rebuilds for advertisers whose Jaccard between yesterday and today exceeds 0.7, halt only for those whose audience composition changed substantially.", correct:false},
              {key:"d", text:"Roll back the user-embedding store to last week's snapshot and continue with stale embeddings until the PSI alert resolves on its own through normal drift.", correct:false},
            ]}
            trap={<>(b) ships unverified audiences during a known-instability window. (c) is partially right but Jaccard is a downstream symptom — the upstream signal (PSI) is more reliable. (d) loses a week of legitimate behavior drift along with the bad signal.</>}
            lens={<>PSI > 0.2 = investigate. PSI > 0.3 = halt rebuilds. Yesterday's audience is more reliable than a fresh build off a destabilized embedding. Math: &sect;3i.</>}
          />

          <VIS.TrapProblem
            id="la-q20"
            difficulty="hard"
            title="Audience Jaccard between consecutive days fell from 0.8 to 0.35."
            scenario={<>For one specific advertiser, the day-over-day audience Jaccard fell from 0.8 to 0.35 while platform-wide PSI stayed under 0.1. Pick the root-cause investigation.</>}
            options={[
              {key:"a", text:"Investigate that advertiser's seed list — most likely they uploaded a refreshed seed that differs substantially from yesterday's input set.", correct:true},
              {key:"b", text:"Investigate the platform embedding tower — a local instability for this advertiser's category implies the tower may need a per-category retrain immediately.", correct:false},
              {key:"c", text:"Investigate the HNSW index — non-determinism in the index-build process can produce different retrieval orderings even with stable inputs.", correct:false},
              {key:"d", text:"Investigate the auction layer — downstream changes in bid-shading can shift which audience members are actually exposed to ads day over day.", correct:false},
            ]}
            trap={<>(b) skips the simpler explanation. (c) is technically possible but HNSW is reproducible with fixed seeds. (d) is a downstream concern that doesn't change the audience composition itself.</>}
            lens={<>When one advertiser's audience destabilizes but platform metrics are stable, the cause is almost always the seed input. Check the seed before the embedding.</>}
          />

          <VIS.TrapProblem
            id="la-q21"
            difficulty="medium"
            title="Lift dropped 15% but cosine-similarity histogram is unchanged."
            scenario={<>Holdout lift fell from 3.4x to 2.9x while the cosine-distribution of the expanded audience is identical to last week. Pick the next investigation step.</>}
            options={[
              {key:"a", text:"Investigate the upstream conversion-attribution chain — pixel changes or attribution-window shifts can move lift without moving the retrieval-side metrics at all.", correct:true},
              {key:"b", text:"Investigate the embedding tower — declining lift with stable similarity scores implies the embedding semantics have shifted while the geometry has not.", correct:false},
              {key:"c", text:"Investigate the seed quality — pixel mis-fires can poison the seed without affecting the retrieval distribution downstream of the centroid aggregation.", correct:false},
              {key:"d", text:"Trigger an emergency full retrain — the divergence between retrieval-quality and lift signals a fundamental model drift requiring fresh embeddings.", correct:false},
            ]}
            trap={<>(b) is implausible — semantic-vs-geometric shift in embeddings is rare and would show up in PSI first. (c) would affect the cosine distribution. (d) is a hammer for what's likely an attribution problem.</>}
            lens={<>Lift moves; similarity doesn't = the cause is downstream of retrieval. Conversion-attribution is the usual culprit.</>}
          />

          <VIS.TrapProblem
            id="la-q22"
            difficulty="hard"
            title="A new advertiser-category appeared — what's the monitoring gap?"
            scenario={<>A novel advertiser category (e.g., cryptocurrency exchanges) onboarded last week with no historical conversion data. Pick the monitoring response.</>}
            options={[
              {key:"a", text:"Add a per-category lift-bar override that defaults to 'manual review' until 4 weeks of holdout conversion data accumulate to recalibrate the threshold.", correct:true},
              {key:"b", text:"Use the platform-wide default lift bar and 3x cosine-similarity floor — the lookalike pipeline is category-agnostic and onboarding doesn't require special handling.", correct:false},
              {key:"c", text:"Block lookalike builds for the new category entirely until the embedding tower is retrained on at least one full quarter of category-specific conversion data.", correct:false},
              {key:"d", text:"Use the closest-existing-category's lift bar (e.g., finance for crypto) as a transitional default, switching to the actual lift bar after one billing cycle.", correct:false},
            ]}
            trap={<>(b) ignores that conversion-rate priors differ wildly across categories. (c) blocks legitimate revenue with no signal-collection plan. (d) is plausible but couples two categories' calibrations.</>}
            lens={<>Novel categories need their own measurement window. Manual review during the bootstrap phase is the operationally honest answer.</>}
          />

          <VIS.TrapProblem
            id="la-q23"
            difficulty="medium"
            title="Audience reach fell 40% week-over-week, lift held at 3.2x."
            scenario={<>For the same advertiser, the expanded audience shrank from 6M to 3.6M users; lift on the smaller audience is unchanged at 3.2x. Pick the response.</>}
            options={[
              {key:"a", text:"Inspect the exclusion-filter step — a growing CRM list shrinks the post-exclusion audience without affecting the retrieval quality upstream of exclusion.", correct:true},
              {key:"b", text:"Inspect the embedding tower — a 40 percent reach drop usually traces to embedding-space contraction reducing the count of users above the similarity threshold.", correct:false},
              {key:"c", text:"Inspect the HNSW index — recent index rebuilds can produce reduced recall on specific query regions, manifesting as smaller retrieved candidate sets.", correct:false},
              {key:"d", text:"Trigger a tau-loosening to recover the previous reach level, since the advertiser's effective inventory has dropped 40 percent overnight.", correct:false},
            ]}
            trap={<>(b) and (c) would also affect lift. (d) papers over the actual cause.</>}
            lens={<>Reach drops with lift held = something is removing users from the final set without changing the quality of who remains. CRM growth is the canonical answer for long-tenure advertisers.</>}
          />

          <VIS.TrapProblem
            id="la-q24"
            difficulty="hard"
            title="The drift monitor is flapping. PSI bounces between 0.15 and 0.25 daily."
            scenario={<>PSI oscillates day-over-day around the 0.2 threshold. The on-call team gets alerted twice a week. Pick the response.</>}
            options={[
              {key:"a", text:"Switch to a rolling 7-day-window PSI and alert only when the 7-day average crosses 0.2, eliminating the daily oscillation while preserving the trend signal.", correct:true},
              {key:"b", text:"Raise the alert threshold to PSI=0.3, accepting more drift before triggering investigation, since the daily noise is overwhelming the actual drift signal.", correct:false},
              {key:"c", text:"Add a downstream lift-based alert to confirm each PSI trigger before paging anyone, suppressing PSI alerts that don't have a corresponding lift movement.", correct:false},
              {key:"d", text:"Remove the PSI alert entirely and rely on the lift-bar holdout check, since PSI without a lift confirmation is a noise signal not a quality signal.", correct:false},
            ]}
            trap={<>(b) raises the floor in a way that misses real shifts that stay below 0.3. (c) couples two slow signals (lift requires a 7-day holdout). (d) discards an early-warning signal.</>}
            lens={<>Smoothing the metric (window-average) is the correct first response to a flapping alert. Don't raise the threshold blindly; reduce the noise.</>}
          />

          {/* ============================ AXIS E — GOTCHAS ============================ */}

          <VIS.TrapProblem
            id="la-q25"
            difficulty="hard"
            title="The advertiser's CRM list includes deceased users."
            scenario={<>A long-tenure advertiser's CRM has stale entries — about 0.3% of the list is users who passed away or closed their accounts. Pick the handling.</>}
            options={[
              {key:"a", text:"Cross-reference the CRM against the platform's active-user set during exclusion, dropping stale entries that no longer correspond to active platform users.", correct:true},
              {key:"b", text:"Trust the advertiser's CRM as-is — it is their data, and the exclusion filter is meant to enforce their stated exclusion list verbatim without modification.", correct:false},
              {key:"c", text:"Drop the entire CRM exclusion step if the staleness rate exceeds 1 percent, falling back to embedding-similarity-based de-duplication of seed-vs-output.", correct:false},
              {key:"d", text:"Apply the CRM exclusion and accept the resulting reach loss as a customer-controlled hygiene problem the advertiser must clean up themselves.", correct:false},
            ]}
            trap={<>(b) wastes audience slots on impossible exclusions. (c) discards the legitimate exclusion signal. (d) is operationally honest but technically wrong — the platform has the active-user signal the advertiser lacks.</>}
            lens={<>Exclusion lists need to be intersected with the platform's active-user set before being applied. The platform has the freshness signal the advertiser doesn't.</>}
          />

          <VIS.TrapProblem
            id="la-q26"
            difficulty="hard"
            title="Multi-advertiser overlap: two advertisers in the same category."
            scenario={<>Two competing FMCG advertisers both target similar customer profiles. Their lookalike audiences overlap by 65%. Pick the handling.</>}
            options={[
              {key:"a", text:"Accept the overlap — each advertiser pays the auction for their impressions, and the platform doesn't enforce mutual exclusion between competing advertisers.", correct:true},
              {key:"b", text:"Force mutual exclusion across overlapping advertisers in the same category to protect each advertiser's reach from competitor-driven price-bidding inflation.", correct:false},
              {key:"c", text:"Cap each advertiser's audience at 50 percent of the platform-wide category audience to ensure ROI parity between competing brands in the same vertical.", correct:false},
              {key:"d", text:"Randomly assign overlapping users to one advertiser or the other at audience-build time to eliminate the redundancy in downstream auction traffic.", correct:false},
            ]}
            trap={<>(b) discriminates against advertisers without their consent. (c) imposes a platform-side cap on revenue. (d) introduces non-determinism into the audience composition.</>}
            lens={<>Overlap is the natural outcome of competitive markets. The auction handles the contention; lookalike just builds the audience.</>}
          />

          <VIS.TrapProblem
            id="la-q27"
            difficulty="hard"
            title="Privacy budget exhaustion under repeated lookalike requests."
            scenario={<>The same advertiser requests rebuilds 5 times in a week with slight seed variations. Each request adds DP noise; the privacy budget epsilon adds up. Pick the response.</>}
            options={[
              {key:"a", text:"Track per-seed-overlap cumulative epsilon and refuse new rebuilds when the budget for that seed neighborhood is exhausted within the per-week privacy window.", correct:true},
              {key:"b", text:"Treat each rebuild as a fresh epsilon=1 invocation, since the advertiser controls when to rebuild and the privacy budget is an operational accounting concern only.", correct:false},
              {key:"c", text:"Apply the DP noise only on the first build of the week and reuse it for subsequent rebuilds, amortizing the privacy cost across multiple invocations.", correct:false},
              {key:"d", text:"Raise epsilon to 5 per rebuild, accepting weaker per-build privacy guarantees in exchange for unlimited rebuild frequency for advertiser operational needs.", correct:false},
            ]}
            trap={<>(b) leaks privacy via composition. (c) reuses noise — defeats the DP property. (d) weakens the guarantee in the wrong direction.</>}
            lens={<>DP composition is the gotcha. Privacy budget accounting is a real cost on rebuild frequency and must be enforced at the seed-neighborhood level.</>}
          />

          <VIS.TrapProblem
            id="la-q28"
            difficulty="hard"
            title="The seed includes users who joined the platform last week."
            scenario={<>15% of the seed are users with under 7 days of platform history. Their embeddings are based on sparse behavioral data. Pick the handling.</>}
            options={[
              {key:"a", text:"Down-weight new-user seeds in the centroid aggregation (weight by log(days_on_platform)), so the centroid is anchored by users with mature behavioral signal.", correct:true},
              {key:"b", text:"Drop all new-user seeds from the centroid computation entirely — sparse behavioral data introduces noise that the trimmed-mean cannot adequately mitigate.", correct:false},
              {key:"c", text:"Include new-user seeds with equal weight to mature seeds — they represent the advertiser's most recent customer acquisition signal and should not be discounted.", correct:false},
              {key:"d", text:"Embed new-user seeds using a fallback content-based model (using only registration features) and include them in the centroid with equal weight.", correct:false},
            ]}
            trap={<>(b) discards a signal the advertiser explicitly provided. (c) over-weights noisy embeddings. (d) introduces a model heterogeneity into the centroid that's hard to reason about.</>}
            lens={<>Weight seeds by signal quality, not binary include/exclude. Log-weighting by tenure is a smooth way to balance freshness against embedding maturity.</>}
          />

          <VIS.TrapProblem
            id="la-q29"
            difficulty="hard"
            title="The advertiser's seed contains 5 users who are platform employees."
            scenario={<>An audit reveals 5 of 50K seed users are employees of the platform. Pick the handling.</>}
            options={[
              {key:"a", text:"Drop platform-employee IDs at the seed-validator stage to avoid leaking employee-behavior signal into advertiser-facing audience-derivation processes.", correct:true},
              {key:"b", text:"Keep employees in the seed — at 5 of 50K they are a negligible 0.01 percent contribution to the centroid and statistical noise will absorb the signal.", correct:false},
              {key:"c", text:"Drop employees but only if they belong to the ads-or-trust-and-safety teams whose behavior could plausibly bias the centroid in advertising-relevant directions.", correct:false},
              {key:"d", text:"Replace employee IDs with hash-of-employee-ID at ingestion so the resulting embedding contribution is anonymized without losing the seed-size signal.", correct:false},
            ]}
            trap={<>(b) treats this as a statistics problem when it's a policy problem. (c) is a half-measure. (d) hashing changes the identifier but not the embedding contribution.</>}
            lens={<>Employee data is policy-restricted regardless of statistical impact. Drop at ingest, document the count for audit, return the dedup'd seed to the advertiser as a courtesy.</>}
          />

          <VIS.TrapProblem
            id="la-q30"
            difficulty="hard"
            title="An advertiser uses the lookalike audience as a seed for the next lookalike."
            scenario={<>The advertiser builds Lookalike-1 from their CRM, then uses Lookalike-1 as the seed for Lookalike-2. They want to expand reach 100x. Pick the response.</>}
            options={[
              {key:"a", text:"Refuse the chained build — drift accumulates exponentially across hops and Lookalike-2 has effectively no relationship to the original customer signal.", correct:true},
              {key:"b", text:"Allow the chained build and accept the lift degradation across hops, since the advertiser controls their own ROI calculus and can stop chaining when it stops paying.", correct:false},
              {key:"c", text:"Allow the chained build but apply a stricter tau at each hop to compensate for the accumulating drift, recovering precision through aggressive thresholding.", correct:false},
              {key:"d", text:"Allow the chained build only if Lookalike-1 has cleared the 3x lift bar on its own holdout, treating that as evidence the chain is anchored to real conversion signal.", correct:false},
            ]}
            trap={<>(b) lets the advertiser harm themselves. (c) tightens tau on garbage signal. (d) the lift bar of Lookalike-1 doesn't protect against drift on the next hop — a 3x audience can still produce a 1x grandchild.</>}
            lens={<>Lookalike is a one-hop operation by design. The seed must be ground-truth converters, not a derived audience. Refuse chained builds; offer wider tau on the original instead.</>}
          />

        </VIS.Section>

        <VIS.Section id="sec-watch" title="Watch-outs">
          <ul>
            <li><strong>Seed size matters more than seed quality below ~1K.</strong> The centroid variance bound from &sect;3a makes tiny seeds noisy regardless of how clean the rows are. Refuse the build.</li>
            <li><strong>Holdout must be drawn AFTER seed-removal.</strong> Mixing seeds into the holdout inflates lift to absurdity. Math: &sect;3j.</li>
            <li><strong>Refresh cadence is daily, not real-time.</strong> Real-time lookalike rebuild is operationally hostile and the lift gain is dominated by embedding-refresh cost. Math: &sect;3h.</li>
            <li><strong>Cosine threshold tau is per-advertiser, not platform-wide.</strong> Category conversion-rate priors vary 10x; one tau cannot serve them all. Math: &sect;3c, &sect;3f.</li>
            <li><strong>Chained lookalikes (Lookalike-1 as seed for Lookalike-2) destroy lift.</strong> Refuse them. The signal degrades exponentially across hops.</li>
            <li><strong>PSI is an early-warning signal, lift is the contract metric.</strong> Both must monitor independently. Math: &sect;3i.</li>
          </ul>
        </VIS.Section>
      </React.Fragment>
    )}

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://research.facebook.com/publications/embedding-based-retrieval-in-facebook-search/" target="_blank" rel="noopener"><strong>Meta — Embedding-Based Retrieval in Facebook Search</strong></a> (paper). The user-embedding tower pattern used here.</li>
        <li><a href="https://eugeneyan.com/writing/system-design-for-discovery/" target="_blank" rel="noopener"><strong>Eugene Yan — System Design for Discovery</strong></a>. Generalizable framework for retrieval-style systems.</li>

        <li><a href="https://desfontain.es/privacy/k-anonymity.html" target="_blank" rel="noopener"><strong>Damien Desfontaines — k-anonymity</strong></a>. Privacy-bound math for audience-release problems.</li>
      </ul>
    </VIS.Section>
  </main>
  );
};
