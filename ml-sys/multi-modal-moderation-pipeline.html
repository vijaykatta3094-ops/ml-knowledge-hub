  React.useEffect(() => { loadExcalidraw().then(setLib).catch(console.error); }, []);
  function addPiece(piece) {
    if (!api || !lib || revealed || placedIdMap[piece.id]) return;
    const idx = Object.keys(placedIdMap).length;
    const x = 60 + (idx % 4) * 250;
    const y = 60 + Math.floor(idx / 4) * 150;
    const color = CATEGORY_COLOR[piece.category] || "#f1f5f9";
    const shape = piece.shape || "service";
    const specs = {
      service:       { type:"rectangle", w:210, h:90,  fillStyle:"solid",       strokeStyle:"solid",  strokeWidth:1, roundness:null },
      source:        { type:"ellipse",   w:230, h:100, fillStyle:"solid",       strokeStyle:"solid",  strokeWidth:1, roundness:null },
      stream_source: { type:"ellipse",   w:230, h:100, fillStyle:"hachure",     strokeStyle:"dashed", strokeWidth:2, roundness:null },
      queue:         { type:"rectangle", w:230, h:75,  fillStyle:"hachure",     strokeStyle:"dashed", strokeWidth:2, roundness:{type:3} },
      control:       { type:"diamond",   w:210, h:140, fillStyle:"cross-hatch", strokeStyle:"solid",  strokeWidth:2, roundness:null },
      store:         { composite:"cylinder", w:190, h:140 },
    };
    const spec = specs[shape] || specs.service;
    let generated, anchorEl;
    if (spec.composite === "cylinder") {
      const W = spec.w, H = spec.h, lipH = 26;
      const groupId = `g-${piece.id}-${Date.now()}`;
      const common = { backgroundColor: color, strokeColor:"#1e293b", fillStyle:"solid", roughness:1, strokeWidth:1, groupIds:[groupId] };
      const bodyArr = lib.convertToExcalidrawElements([{
        type:"rectangle", x, y: y + lipH/2, width: W, height: H - lipH, ...common,
        label: { text: piece.label, fontSize:14, textAlign:"center", verticalAlign:"middle" },
        customData: { pieceId: piece.id },
      }]);
      const topEllipse = lib.convertToExcalidrawElements([{ type:"ellipse", x, y, width:W, height:lipH, ...common }])[0];
      const bottomEllipse = lib.convertToExcalidrawElements([{ type:"ellipse", x, y: y + H - lipH, width:W, height:lipH, ...common }])[0];
      generated = [...bodyArr, topEllipse, bottomEllipse];
      anchorEl = bodyArr.find((e) => e.type === "rectangle");
    } else {
      const skeleton = {
        type: spec.type, x, y, width: spec.w, height: spec.h, backgroundColor: color, strokeColor:"#1e293b",
        fillStyle: spec.fillStyle, strokeStyle: spec.strokeStyle, strokeWidth: spec.strokeWidth, roughness:1,
        label: { text: piece.label, fontSize:14, textAlign:"center", verticalAlign:"middle" },
        customData: { pieceId: piece.id },
      };
      if (spec.roundness) skeleton.roundness = spec.roundness;
      generated = lib.convertToExcalidrawElements([skeleton]);
      anchorEl = generated.find((e) => e.type === spec.type) || generated[0];
    }
    const next = [...api.getSceneElements(), ...generated];
    api.updateScene({ elements: next });
    setPlacedIdMap({ ...placedIdMap, [piece.id]: anchorEl.id });
  }
  function reveal() {
    if (!api) return;
    const elements = api.getSceneElements();
    const directElemToPiece = {};
    elements.forEach((el) => { if (el.customData && el.customData.pieceId) directElemToPiece[el.id] = el.customData.pieceId; });
    function resolvePieceId(elementId) {
      if (directElemToPiece[elementId]) return directElemToPiece[elementId];
      const el = elements.find((e) => e.id === elementId);
      if (!el || !el.groupIds || el.groupIds.length === 0) return null;
      for (const gid of el.groupIds) {
        const tagged = elements.find((e) => e.groupIds && e.groupIds.includes(gid) && e.customData && e.customData.pieceId);
        if (tagged) return tagged.customData.pieceId;
      }
      return null;
    }
    const placedPieces = Array.from(new Set(Object.values(directElemToPiece)));
    const userEdges = [];
    elements.forEach((el) => {
      if (el.type === "arrow" && el.startBinding && el.endBinding) {
        const src = resolvePieceId(el.startBinding.elementId);
        const tgt = resolvePieceId(el.endBinding.elementId);
        if (src && tgt) userEdges.push([src, tgt]);
      }
    });
    const correctPicks = placedPieces.filter((p) => expectedPieces.includes(p));
    const distractors = placedPieces.filter((p) => !expectedPieces.includes(p));
    const missingPieces = expectedPieces.filter((p) => !placedPieces.includes(p));
    const correctEdges = userEdges.filter(([s,t]) => expectedEdges.some(([es,et]) => es===s && et===t));
    const wrongEdges   = userEdges.filter(([s,t]) => !expectedEdges.some(([es,et]) => es===s && et===t));
    const missingEdges = expectedEdges.filter(([s,t]) => !userEdges.some(([us,ut]) => us===s && ut===t));
    setReport({ placedCount: placedPieces.length, correctPickCount: correctPicks.length, expectedPickCount: expectedPieces.length,
      distractors, missingPieces, edgeCount: userEdges.length, correctEdgeCount: correctEdges.length,
      expectedEdgeCount: expectedEdges.length, wrongEdges, missingEdges });
    setRevealed(true);
    if (onReveal) onReveal();
  }
  function reset() { if (api) api.updateScene({ elements: [] }); setPlacedIdMap({}); setReport(null); setRevealed(false); }
  if (!lib) return React.createElement("div", { style:{padding:24, color:"#64748b"} }, "Loading Excalidraw canvas...");
  const Excalidraw = lib.Excalidraw;
  function lookupLabel(pieceId) { return pieces.find((p) => p.id === pieceId)?.label?.split("\n")[0] || pieceId; }
  return React.createElement("div", null,
    React.createElement("div", { style:{display:"flex", flexWrap:"wrap", gap:8, padding:"12px 14px", background:"#ffffff", border:"1px dashed #cbd5e1", borderRadius:8, marginBottom:10}},
      React.createElement("div", { style:{width:"100%", fontSize:13, color:"#475569", fontWeight:600, marginBottom:4}}, "Palette — click to drop a piece onto the canvas (hover for description)"),
      pieces.map((p) => React.createElement("button", { key: p.id, type:"button", onClick: () => addPiece(p),
        disabled: revealed || !!placedIdMap[p.id],

        "aria-label": p.tooltip ? `${p.label.split("\n")[0]} — ${p.tooltip}` : undefined,
        style:{ padding:"6px 10px", fontSize:13, cursor: placedIdMap[p.id] ? "default" : "pointer",
          background: placedIdMap[p.id] ? "#f1f5f9" : "#ffffff", opacity: placedIdMap[p.id] ? 0.5 : 1,
          border:"1px solid #cbd5e1", borderLeft:`4px solid ${{data:"#0ea5e9", model:"#8b5cf6", infra:"#f59e0b", monitor:"#10b981"}[p.category] || "#94a3b8"}`,
          borderRadius:6, whiteSpace:"nowrap" } }, p.label.split("\n")[0]))
    ),
    React.createElement("div", { ref: containerRef, style:{ height:600, border:"1px solid #cbd5e1", borderRadius:8, background:"#fefce8", position:"relative", overflow:"hidden", marginBottom:10 }},
      React.createElement(Excalidraw, { excalidrawAPI: (a) => setApi(a),
        initialData: { elements:[], appState:{ viewBackgroundColor:"#fefce8", currentItemRoughness:1 } },
        UIOptions: { canvasActions: { saveToActiveFile:false, loadScene:false, export:false, toggleTheme:false } } })),
    React.createElement("div", { style:{fontSize:13, color:"#64748b", marginBottom:8}}, "Tip: click a palette piece to drop it on the canvas, drag to position, use the arrow tool to connect."),
    !revealed ? React.createElement("button", { type:"button", onClick: reveal,
      style:{background:"#2563eb", color:"#fff", border:"none", padding:"10px 18px", borderRadius:8, fontWeight:600, cursor:"pointer"} },
      Object.keys(placedIdMap).length > 0 ? "Reveal model design" : "Skip & reveal solution") : null,
    revealed && report ? React.createElement("div", { style:{marginTop:12}},
      React.createElement("div", { style:{background:"#eff6ff", border:"1px solid #93c5fd", color:"#1e3a8a", padding:"10px 14px", borderRadius:8, fontSize:14, marginBottom:10}},
        `Pieces correct: ${report.correctPickCount} / ${report.expectedPickCount}. Connections correct: ${report.correctEdgeCount} / ${report.expectedEdgeCount}.`),
      report.distractors.length > 0 ? React.createElement("div", { style:{background:"#fee2e2", borderLeft:"4px solid #dc2626", color:"#7f1d1d", padding:"10px 14px", borderRadius:8, margin:"8px 0", fontSize:14}},
        React.createElement("strong", {style:{display:"block", marginBottom:4}}, "✗ Pieces that don't belong:"),
        report.distractors.map(lookupLabel).join(", ")) : null,
      report.missingPieces.length > 0 ? React.createElement("div", { style:{background:"#fef3c7", borderLeft:"4px solid #d97706", color:"#78350f", padding:"10px 14px", borderRadius:8, margin:"8px 0", fontSize:14}},
        React.createElement("strong", {style:{display:"block", marginBottom:4}}, "⚠ Missing pieces:"),
        report.missingPieces.map(lookupLabel).join(", ")) : null,
      report.missingEdges.length > 0 ? React.createElement("div", { style:{background:"#fef3c7", borderLeft:"4px solid #d97706", color:"#78350f", padding:"10px 14px", borderRadius:8, margin:"8px 0", fontSize:14}},
        React.createElement("strong", {style:{display:"block", marginBottom:4}}, "⚠ Missing connections:"),
        report.missingEdges.map(([s,t]) => `${lookupLabel(s)} → ${lookupLabel(t)}`).join("; ")) : null,
      report.wrongEdges.length > 0 ? React.createElement("div", { style:{background:"#fee2e2", borderLeft:"4px solid #dc2626", color:"#7f1d1d", padding:"10px 14px", borderRadius:8, margin:"8px 0", fontSize:14}},
        React.createElement("strong", {style:{display:"block", marginBottom:4}}, "✗ Wrong connections:"),
        report.wrongEdges.map(([s,t]) => `${lookupLabel(s)} → ${lookupLabel(t)}`).join("; ")) : null,
      React.createElement("button", { type:"button", onClick: reset,
        style:{background:"#64748b", color:"#fff", border:"none", padding:"8px 14px", borderRadius:6, fontWeight:600, fontSize:13, cursor:"pointer", marginTop:8} }, "↺ Try again")
    ) : null

}

// ============================================================================
// Phase 2: REFERENCE — pre-rendered correct DAG (read-only).
// ============================================================================
function PreRenderedDiagram({ pieces, positions, edges }) {
  const [lib, setLib] = React.useState(null);
  const [api, setApi] = React.useState(null);
  const built = React.useRef(false);

  React.useEffect(() => { loadExcalidraw().then(setLib).catch(console.error); }, []);

  React.useEffect(() => {
    if (!lib || !api || built.current) return;
    built.current = true;

    const specs = {
      service:       { type:"rectangle", w:200, h:80,  fillStyle:"solid",       strokeStyle:"solid",  strokeWidth:1, roundness:null },
      stream_source: { type:"ellipse",   w:230, h:90,  fillStyle:"hachure",     strokeStyle:"dashed", strokeWidth:2, roundness:null },
      queue:         { type:"rectangle", w:220, h:80,  fillStyle:"hachure",     strokeStyle:"dashed", strokeWidth:2, roundness:{type:3} },
      control:       { type:"diamond",   w:210, h:140, fillStyle:"cross-hatch", strokeStyle:"solid",  strokeWidth:2, roundness:null },
      store:         { composite:"cylinder", w:190, h:130 },
    };

    const skeletons = [];
    const anchorIdByPiece = {};

    pieces.forEach((piece) => {
      const pos = positions[piece.id];
      if (!pos) return;
      const color = CATEGORY_COLOR[piece.category] || "#f1f5f9";
      const spec = specs[piece.shape] || specs.service;
      const anchorId = `node-${piece.id}`;
      anchorIdByPiece[piece.id] = anchorId;

      if (spec.composite === "cylinder") {
        const W = spec.w, H = spec.h, lipH = 24;
        const groupId = `g-${piece.id}`;
        const common = {
          backgroundColor: color, strokeColor:"#1e293b",
          fillStyle:"solid", roughness:1, strokeWidth:1, groupIds:[groupId],
        };
        skeletons.push({
          type:"rectangle", id: anchorId,
          x: pos.x, y: pos.y + lipH/2, width: W, height: H - lipH, ...common,
          label: { text: piece.label, fontSize:13, textAlign:"center", verticalAlign:"middle" },
        });
        skeletons.push({ type:"ellipse", x: pos.x, y: pos.y,                width:W, height:lipH, ...common });
        skeletons.push({ type:"ellipse", x: pos.x, y: pos.y + H - lipH,     width:W, height:lipH, ...common });
      } else {
        const sk = {
          type: spec.type, id: anchorId,
          x: pos.x, y: pos.y, width: spec.w, height: spec.h,
          backgroundColor: color, strokeColor:"#1e293b",
          fillStyle: spec.fillStyle, strokeStyle: spec.strokeStyle, strokeWidth: spec.strokeWidth, roughness:1,
          label: { text: piece.label, fontSize:13, textAlign:"center", verticalAlign:"middle" },
        };
        if (spec.roundness) sk.roundness = spec.roundness;
        skeletons.push(sk);
      }
    });

    // BUG FIX: Excalidraw 0.17.6 `convertToExcalidrawElements` honors
    // `start:{id}` / `end:{id}` for the *binding metadata* (startBinding/
    // endBinding), but does NOT recompute arrow geometry (x/y/points) — every
    // arrow lands at (0,0) with a default 100px stub. So all 24 arrows pile
    // up at the top-left of the canvas and look invisible. We must compute
    // explicit geometry (center-to-center) and pass it alongside the binding.
    function shapeCenter(pieceId) {
      const pos = positions[pieceId];
      const piece = pieces.find((p) => p.id === pieceId);
      const spec = piece ? (specs[piece.shape] || specs.service) : specs.service;
      const W = spec.composite === "cylinder" ? spec.w : spec.w;
      const H = spec.composite === "cylinder" ? spec.h : spec.h;
      return { cx: pos.x + W/2, cy: pos.y + H/2 };
    }
    edges.forEach(([src, tgt]) => {
      const srcId = anchorIdByPiece[src];
      const tgtId = anchorIdByPiece[tgt];
      if (!srcId || !tgtId) return;
      if (!positions[src] || !positions[tgt]) return;
      const a = shapeCenter(src);
      const b = shapeCenter(tgt);
      skeletons.push({
        type:"arrow",
        x: a.cx, y: a.cy,
        points: [[0, 0], [b.cx - a.cx, b.cy - a.cy]],
        strokeColor:"#334155", strokeWidth:1.5, roughness:1,
        start: { id: srcId },
        end:   { id: tgtId },
      });
    });

    const elements = lib.convertToExcalidrawElements(skeletons);
    // Defer updateScene one frame: when PreRenderedDiagram mounts AFTER the
    // user clicks Reveal (lib already cached, api callback fires synchronously
    // during Excalidraw mount), Excalidraw's own internal scene-init runs
    // *after* our excalidrawAPI callback and silently clobbers our elements
    // with the empty initialData. Yielding via requestAnimationFrame lets
    // Excalidraw finish initializing before we push the real scene.
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        try {
          api.updateScene({ elements });
          setTimeout(() => { try { api.scrollToContent(elements, { fitToContent: true }); } catch (e) {} }, 50);
        } catch (e) { console.error("PreRenderedDiagram updateScene failed:", e); }
      });
    });
  }, [lib, api, pieces, positions, edges]);

  if (!lib) return React.createElement("div", { style:{padding:24, color:"#64748b"} }, "Loading reference diagram...");
  const Excalidraw = lib.Excalidraw;
  return React.createElement("div",
    { style:{ height: 800, border:"1px solid #cbd5e1", borderRadius:8, background:"#fefce8", position:"relative", overflow:"hidden", marginBottom:10 } },
    React.createElement(Excalidraw, {
      excalidrawAPI: (a) => setApi(a),
      viewModeEnabled: true,
      zenModeEnabled: false,
      gridModeEnabled: false,
      initialData: { elements:[], appState:{ viewBackgroundColor:"#fefce8", currentItemRoughness:1 } },
      UIOptions: { canvasActions: { saveToActiveFile:false, loadScene:false, export:false, toggleTheme:false, clearCanvas:false } },
    })
  );
}

    {solutionVisible && (
      <React.Fragment>
        <VIS.Section id="sec-reference" title="The reference design (read-only)">
          <p style={{margin:"0 0 10px 0", fontSize:14, color:"#64748b"}}>
            Pan/zoom inside the canvas. Compare this against what you built above.
          </p>
          <PreRenderedDiagram pieces={PIECES.filter(p => EXPECTED_PIECES.includes(p.id))} positions={POSITIONS} edges={EXPECTED_EDGES} />
        </VIS.Section>

        <VIS.Section id="sec-walk" title="Walking the cascade">
          <ol>
            <li><strong>Ingest fans out to three cheap signals in parallel</strong> — perceptual-hash lookup, FastText-like text classifier (&lt;5ms), MobileNet visual classifier (&lt;10ms). Cost per post is bounded by the slowest cheap stage. <VIS.Equation tex={String.raw`C_{\text{tier1}} \approx 10\,\text{ms}/\text{post}`} /></li>
            <li><strong>Hash hit → direct action.</strong> O(1) lookup, near-zero FP. See §3j for why this is its own stage.</li>
            <li><strong>Confidence router</strong> reads cheap-model softmax scores: <VIS.Equation tex={String.raw`\text{escalate} \iff \tau_{\text{low}} < \max_i p_i < \tau_{\text{high}}`} />, else auto-action. See §3b.</li>
            <li><strong>Expensive classifiers</strong> (BERT / ViT / video) return scores back to the router. The router's second pass is identical in form but with tighter thresholds. <VIS.Equation tex={String.raw`p_{\text{escalate}}^{(2)} \ll p_{\text{escalate}}^{(1)}`} /></li>
            <li><strong>Per-policy queues with SLA tiers.</strong> Self-harm (30s) and spam (10min) cannot share a queue. Little's Law sets each lane's depth: <VIS.Equation tex={String.raw`L = \lambda \cdot W`} />. See §3c.</li>
            <li><strong>Reviewer decisions</strong> → action service AND label bus → weekly retrain of cheap models. Label freshness drives the cadence. See §3h.</li>
            <li><strong>Surge control loop</strong>: backpressure controller monitors queue depth and tightens <VIS.Equation tex={String.raw`\tau_{\text{high}}`} /> proportionally. See §3f.</li>
          </ol>
        </VIS.Section>

        <VIS.Section id="sec-math" title="Why every stage is the way it is — the math">

          <h3 style={{marginTop:14, marginBottom:6, fontSize:15, color:"#334155"}}>§3a. Cascade-cost math</h3>
          <p>Running the heavy tier-2 model on every post is unaffordable:</p>
          <VIS.Equation display={true} tex={String.raw`3\times10^{9}\,\text{posts/day} \times 80\,\text{ms} = 2.4\times10^{11}\,\text{GPU-ms} \approx 700\,\text{GPU-years/day}`} />
          <p>Running only the cheap tier on 100% of traffic:</p>
          <VIS.Equation display={true} tex={String.raw`3\times10^{9} \times 5\,\text{ms} = 1.5\times10^{10}\,\text{GPU-ms} \approx 0.43\,\text{GPU-years/day}`} />
          <p>The cascade is the cost knob. Let <VIS.Equation tex={String.raw`p_{\text{esc}}`} /> be the fraction tier-1 promotes to tier-2 and <VIS.Equation tex={String.raw`p_{\text{hum}}`} /> the fraction promoted to humans:</p>
          <VIS.Equation display={true} tex={String.raw`C_{\text{total}} \;=\; C_{\text{cheap}} \;+\; p_{\text{esc}}\,C_{\text{deep}} \;+\; p_{\text{hum}}\,C_{\text{human}}`} />
          <p>With <VIS.Equation tex={String.raw`p_{\text{esc}}\approx 0.10`} /> and <VIS.Equation tex={String.raw`p_{\text{hum}}\approx 0.03`} />, compute saved vs pure-deep is</p>
          <VIS.Equation display={true} tex={String.raw`1 - \frac{C_{\text{cheap}} + 0.1\,C_{\text{deep}} + 0.03\,C_{\text{human}}}{C_{\text{deep,all}}} \;\approx\; 99.5\%`} />

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3b. Confidence-threshold math</h3>
          <p>Each tier emits a softmax over policy classes:</p>
          <VIS.Equation display={true} tex={String.raw`p_i = \frac{\exp(z_i)}{\sum_j \exp(z_j)}, \qquad \text{conf} = \max_i p_i`} />
          <p>The router's rule:</p>
          <VIS.Equation display={true} tex={String.raw`\text{action}(x) \;=\; \begin{cases} \text{auto-violate} & \max_i p_i > \tau_{\text{high}} \\ \text{escalate} & \tau_{\text{low}} < \max_i p_i \le \tau_{\text{high}} \\ \text{auto-pass} & \max_i p_i \le \tau_{\text{low}} \end{cases}`} />
          <p>Lowering <VIS.Equation tex={String.raw`\tau_{\text{high}}`} /> ships more auto-actions and more false-positives; raising it pushes more borderline content to humans. Thresholds are per-policy — see §3g for the cost-of-error reason.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3c. Per-policy queues + Little's Law</h3>
          <p>For a stable queue, mean depth equals arrival rate times mean wait:</p>
          <VIS.Equation display={true} tex={String.raw`L \;=\; \lambda \cdot W`} />
          <p>Self-harm lane: <VIS.Equation tex={String.raw`\lambda_{\text{sh}} = 10^{5}/86400 \approx 1.16\,\text{items/s}`} />, target <VIS.Equation tex={String.raw`W \le 30\,\text{s}`} />:</p>
          <VIS.Equation display={true} tex={String.raw`L_{\text{sh}} \le 1.16 \cdot 30 \approx 35\;\text{items}`} />
          <p>Spam lane: <VIS.Equation tex={String.raw`\lambda_{\text{sp}} = 5\times 10^{6}/86400 \approx 58\,\text{items/s}`} />, target <VIS.Equation tex={String.raw`W \le 600\,\text{s}`} />:</p>
          <VIS.Equation display={true} tex={String.raw`L_{\text{sp}} \le 58 \cdot 600 \approx 3.5\times 10^{4}\;\text{items}`} />
          <p>A single FIFO would force self-harm posts to wait behind spam — the 30s SLA breaks by construction. Priority scheduling drains self-harm first; spam gets the remaining capacity.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3d. Reviewer capacity sizing</h3>
          <VIS.Equation display={true} tex={String.raw`8000\,\text{reviewers} \times 8\,\text{h} \times 60\,\text{reviews/h} = 3.84\times 10^{6}\,\text{reviews/day}`} />
          <p>Naive 3% of 3B = 90M borderline posts/day — 23× more than human capacity. The required escalation rate is</p>
          <VIS.Equation display={true} tex={String.raw`r_{\text{hum}} \le \frac{3.84\times 10^{6}}{3\times 10^{9}} \approx 0.128\%`} />
          <p>So the router's thresholds must shrink the borderline band to ~1/23 of its naive width. The backpressure controller enforces this in real time when traffic shifts.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3e. Surge-buffer sizing</h3>
          <p>During a breaking-news surge, arrival rate spikes to <VIS.Equation tex={String.raw`10\lambda`} /> for duration <VIS.Equation tex={String.raw`\tau_{\text{surge}}`} />. Net inflow into the buffer:</p>
          <VIS.Equation display={true} tex={String.raw`\Delta B(\tau) \;=\; (10\lambda - \mu)\,\tau_{\text{surge}}`} />
          <p>For nominal <VIS.Equation tex={String.raw`\lambda \approx 35\,\text{k posts/s}`} /> and a 30-minute surge with <VIS.Equation tex={String.raw`\mu \approx \lambda`} />:</p>
          <VIS.Equation display={true} tex={String.raw`\Delta B \approx 9\lambda \cdot 1800\,\text{s} \approx 5.7\times 10^{8}\,\text{posts}`} />
          <p>The buffer absorbs the cheap-tier ingestion lag; the real defense is the backpressure controller tightening thresholds so the human queue does not inherit the surge.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3f. Backpressure controller (PI control)</h3>
          <p>Target queue depth per policy is the Little's-Law setpoint <VIS.Equation tex={String.raw`L^{*}`} />. Track the error:</p>
          <VIS.Equation display={true} tex={String.raw`e(t) \;=\; L_{\text{actual}}(t) - L^{*}`} />
          <p>Adjust the high threshold with a proportional-integral law:</p>
          <VIS.Equation display={true} tex={String.raw`\tau_{\text{high}}(t) \;=\; \tau_{\text{high}}^{\text{base}} \;+\; k_p\,e(t) \;+\; k_i \int_{0}^{t} e(s)\,ds`} />
          <p>When the queue grows, <VIS.Equation tex={String.raw`\tau_{\text{high}}`} /> rises, fewer items escalate, the queue drains. When the queue is empty, <VIS.Equation tex={String.raw`\tau_{\text{high}}`} /> falls and more borderline content is caught. Stability requires</p>
          <VIS.Equation display={true} tex={String.raw`T_{\text{response}} \;>\; T_{\text{fill}} \;\text{and}\; T_{\text{response}} \;<\; T_{\text{SLA}}`} />

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3g. Cost-of-error tradeoff (per-policy thresholds)</h3>
          <p>Expected misclassification loss at threshold τ:</p>
          <VIS.Equation display={true} tex={String.raw`\mathbb{E}[L(\tau)] \;=\; \pi\,(1-\text{TPR}(\tau))\,C_{\text{FN}} \;+\; (1-\pi)\,\text{FPR}(\tau)\,C_{\text{FP}}`} />
          <p>Setting the derivative to zero on the ROC curve gives the optimum slope:</p>
          <VIS.Equation display={true} tex={String.raw`\left.\frac{d\,\text{TPR}}{d\,\text{FPR}}\right|_{\tau^{*}} \;=\; \frac{(1-\pi)\,C_{\text{FP}}}{\pi\,C_{\text{FN}}}`} />
          <p>Self-harm: <VIS.Equation tex={String.raw`C_{\text{FN}} \to \infty`} />, so <VIS.Equation tex={String.raw`\tau^{*}_{\text{sh}}`} /> is low (catch everything, tolerate many false flags). Spam: <VIS.Equation tex={String.raw`C_{\text{FP}} \gg C_{\text{FN}}`} /> (shadow-banning a real user is worse than letting low-value spam leak), so <VIS.Equation tex={String.raw`\tau^{*}_{\text{sp}}`} /> is high. Hence <VIS.Equation tex={String.raw`\tau_{\text{sh}} < \tau_{\text{sp}}`} /> by construction.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3h. Retrain cadence + label-budget math</h3>
          <p>Weekly review volume:</p>
          <VIS.Equation display={true} tex={String.raw`N_{\text{labels/week}} \;=\; 3.84\times 10^{6} \cdot 7 \;\approx\; 2.7\times 10^{7}`} />
          <p>Distributed across 5 policy classifiers:</p>
          <VIS.Equation display={true} tex={String.raw`N_{\text{labels/classifier/week}} \;\approx\; 5.4\times 10^{6}`} />
          <p>Rule-of-thumb training-data lower bound: <VIS.Equation tex={String.raw`N_{\text{labels}} > 100 \cdot |\theta|`} /> for the cheap classifiers (FastText / MobileNet are O(10<sup>4</sup>–10<sup>6</sup>) parameters). Weekly cadence is the equilibrium between (a) reviewer-label freshness and (b) train-eval-deploy cycle time.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3i. Inter-rater agreement (Cohen's κ)</h3>
          <VIS.Equation display={true} tex={String.raw`\kappa \;=\; \frac{p_o - p_e}{1 - p_e}`} />
          <p>where <VIS.Equation tex={String.raw`p_o`} /> is observed reviewer-agreement and <VIS.Equation tex={String.raw`p_e`} /> is agreement expected by chance. When <VIS.Equation tex={String.raw`\kappa < 0.6`} />, labels are noisy enough that retraining on them adds noise faster than signal. Mitigation: a <em>golden-set</em> — ~10% of items pre-labeled by senior reviewers — used to score each reviewer and weight their labels in the retrain corpus.</p>

          <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>§3j. Hash lookup as cost optimization</h3>
          <p>Perceptual-hash matches catch ~20% of bad content (known CSAM, viral spam reposts) at O(1) per query. Daily savings:</p>
          <VIS.Equation display={true} tex={String.raw`0.20 \cdot 3\times 10^{9} \;=\; 6\times 10^{8}\,\text{posts skipped} \;\Rightarrow\; \sim \$50\text{k/day GPU saved}`} />
          <p>Worth its own stage because (a) lookup cost is orders of magnitude below even the cheap classifier, and (b) hash matches have <VIS.Equation tex={String.raw`\text{FPR} \approx 0`} /> — no model uncertainty to manage.</p>

        </VIS.Section>

        <VIS.Section id="sec-distractors" title="What the distractors teach">
          <ul>
            <li><strong>"Run BERT+ViT FIRST on every post."</strong> 700 GPU-years/day. The cascade exists because expensive-first is unaffordable. Math: §3a.</li>
            <li><strong>"Single FIFO queue, no SLA tiers."</strong> Self-harm sits behind spam, misses 30s SLA. Per-policy queues are non-negotiable. Math: §3c.</li>
          </ul>
        </VIS.Section>

        <VIS.Section id="sec-watch" title="Watch-outs">
          <ul>
            <li><strong>Cascade thresholds are calibrated, not fixed.</strong> Re-calibrate quarterly on a stratified human-labeled set — drift is silent. ROC math: §3g.</li>
            <li><strong>Reviewer labels are noisy.</strong> Use Cohen's κ + golden-set seeding before feeding back to retrain. Math: §3i.</li>
            <li><strong>Backpressure is a safety valve, not a strategy.</strong> If <VIS.Equation tex={String.raw`\tau_{\text{high}}(t)`} /> stays elevated, cheap models need to improve or capacity must grow. PI-control math: §3f.</li>
            <li><strong>Policy lanes have different cost-of-error.</strong> Self-harm: <VIS.Equation tex={String.raw`C_{\text{FN}} \to \infty`} />. Spam: <VIS.Equation tex={String.raw`C_{\text{FP}} \gg C_{\text{FN}}`} />. Tune per-policy, not globally. Math: §3g.</li>
          </ul>
        </VIS.Section>
      </React.Fragment>
    )}

  );
