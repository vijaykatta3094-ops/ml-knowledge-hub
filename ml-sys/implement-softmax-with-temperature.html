  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          // NO autoGloss here. Glossing terms inside option text leaks the
          // answer mechanism via hover. Authors must keep options self-contained;
          // a candidate who needs a definition can scroll up to the prose where
          // the term is explicitly wrapped via <VIS.Term>.
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// implement-softmax-with-temperature — ML coding + 18 trap drills
// V=128K vocab, fp32 logits. Numerically stable: subtract per-row max BEFORE exp.
// Scale logits by 1/T BEFORE softmax. T=0 → argmax fallback (one-hot, no NaN).

const SOFTMAX_CODE = [
  "def softmax_with_temperature(logits, T):",
  "    # logits: float32 (B, V),  V = 128_000",
  "    # T: scalar temperature. T=0 → greedy argmax (no NaN).",
  "",
  "    # T = 0 fallback: one-hot at argmax of original logits",
  "    if T == 0:",
  "        idx = __1__",
  "        probs = torch.zeros_like(logits)",
  "        probs.scatter_(1, idx.unsqueeze(1), 1.0)",
  "        return probs",
  "",
  "    # scale BEFORE softmax (not after)",
  "    scaled = __2__",
  "",
  "    # numerically stable: subtract per-row max BEFORE exp",
  "    row_max = __3__",
  "    shifted = __4__",
  "",

    </VIS.Section>

    <VIS.Section id="sec-q10" title="Drill 10: Order of scale and stabilize">
      <VIS.TrapProblem id="smt-q10" difficulty="hard" mode="single"
        title="Two implementations: (A) shift = z.max(); scaled = (z - shift) / T. (B) scaled = z / T; shift = scaled.max(); shifted = scaled - shift. Which is correct?"
        options={[
          {key:"a", text:"Both produce the same distribution mathematically, but (B) is safer when T is very small because (A) can still overflow after scaling.", correct:true},
          {key:"b", text:"Only (A) is correct — subtracting the max BEFORE scaling is the standard log-sum-exp recipe.", correct:false},
          {key:"c", text:"Only (B) is correct — scaling first changes which logit is the max.", correct:false},
          {key:"d", text:"Neither — you must shift, then scale by T, then shift again, then exp.", correct:false},
        ]}
        trap={<>(c) is wrong: dividing every logit by the same positive T preserves the argmax. (b) misses the overflow case: if T = 0.01 and (z - shift) range is [-100, 0], then (z - shift) / T = [-10000, 0], and exp(-10000) underflows to 0 — fine — but if the post-scale shift wasn't applied, you'd still be inside the safe range.</>}
        lens={<>Mathematically equivalent because the max of <code>z/T</code> is <code>max(z)/T</code> for T &gt; 0. Numerically, (B) — shift AFTER scaling — guarantees the largest scaled exponent is exactly 0. (A) keeps the largest pre-scaled exponent at 0, but then scaling by 1/T may blow up small T values. Prefer (B) in <VIS.Term def="The implementation code that ships to the LLM serving system. As opposed to a notebook prototype where speed of writing trumps correctness under load.">production code</VIS.Term>.</>}
        stretch={<>Does the argmax change sign with T &lt; 0? (Yes — that's exactly why negative T flips the distribution and should be rejected.)</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-q11" title="Drill 11: T = 0 fallback design">
      <VIS.TrapProblem id="smt-q11" difficulty="hard" mode="single"
        title="Why is the T = 0 branch implemented as an explicit argmax + scatter, rather than 'clamp T to a tiny epsilon'?"
        options={[
          {key:"a", text:"Clamping T → 1e-9 makes logits / T blow up to ~1e10; the max-subtract saves fp32 but downstream fp16 casts NaN, and ties between near-equal logits are resolved randomly.", correct:true},
          {key:"b", text:"PyTorch raises ZeroDivisionError on T = 0, so the explicit branch is required to catch the exception.", correct:false},
          {key:"c", text:"argmax is faster than softmax by ~100× and the branch is a perf optimization, not a correctness fix.", correct:false},
          {key:"d", text:"Scatter is the only way to construct a one-hot vector in PyTorch; one_hot() is reserved for class indices.", correct:false},
        ]}
        trap={<>(b) is false — PyTorch's float division by 0 returns inf (no exception). (c) is a side benefit but not the reason. (d) is false (<code>F.one_hot</code> works fine).</>}
        lens={<>Two correctness wins from the explicit branch: (1) no division by tiny T means no overflow propagation into fp16 downstream; (2) argmax with ties returns the smallest index <VIS.Term def="An operation that gives bit-identical output across runs and machines for the same input. Critical for LLM serving reproducibility and for debugging.">deterministically</VIS.Term>, whereas softmax at very small T amplifies fp32 rounding noise and ties become random. Plus, you save the exp/sum/div work for the common greedy-decode case.</>}
        stretch={<>What if multiple logits are tied at the max? (argmax returns first; for proper random tie-breaking, sample uniformly among <code>z == z.max()</code>. Real LLMs rarely tie.)</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-q12" title="Drill 12: Learnable T as a parameter">
      <VIS.TrapProblem id="smt-q12" difficulty="hard" mode="multi"
        title="You want T to be a learned scalar (e.g., for distillation temperature or calibration). Pick all valid parameterizations."
        scenario={<>You'll register a <code>nn.Parameter</code> and train it via gradient descent.</>}
        options={[
          {key:"a", text:"Register log_T = nn.Parameter(zeros(1)); use T = exp(log_T) so T stays positive without projection.", correct:true},
          {key:"b", text:"Register T_raw = nn.Parameter(zeros(1)); use T = F.softplus(T_raw) + eps to enforce T > 0 with smooth gradient.", correct:true},
          {key:"c", text:"Register T = nn.Parameter(ones(1)) directly and clip to T.data.clamp_(min=1e-3) after each optimizer step.", correct:true},
          {key:"d", text:"Register T = nn.Parameter(ones(1)) directly and let it go negative if the optimizer chooses.", correct:false},
          {key:"e", text:"Register T = nn.Parameter(ones(1)) and use T = T.abs() in forward — abs has a subgradient at 0 so it's fine.", correct:false},
        ]}
        trap={<>(d) lets T cross 0, flipping the distribution. (e) seems clever but <code>abs</code> at the optimum (T near 0) has a kinked gradient and lets the optimizer 'reflect' across zero, making training oscillate.</>}
        lens={<>Three valid choices: (a) <code>exp</code> <VIS.Term def="A choice of how to represent a constrained parameter as an unconstrained one. log_T = log(T) maps T > 0 to log_T ∈ ℝ; exp is the inverse map.">parameterization</VIS.Term> (same as Kendall-Gal σ trick) — unconstrained on ℝ, always positive, smooth gradient over many orders of magnitude. (b) softplus — softer than exp near zero, useful when you expect T near 1. (c) clip-after-step — works but <VIS.Term def="A function with a sudden jump or non-smoothness. Clip operations create non-differentiable kinks that gradient-based optimizers struggle with.">discontinuous</VIS.Term>, can stall optimizer momentum.</>}
        stretch={<>What's a sensible init for log_T? (0.0 → T=1. If using <VIS.Term def="Training a small 'student' model to match the outputs of a large 'teacher' model. Coined by Hinton et al. 2015; temperature softmax is core to the original recipe.">distillation</VIS.Term> per Hinton 2015, init log_T ≈ log(4) so the student starts with the teacher's <VIS.Term def="Probabilities from a softened (high-T) teacher softmax, as opposed to hard one-hot ground-truth labels. Carry inter-class similarity information.">soft labels</VIS.Term> at T=4.)</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-q13" title="Drill 13: Distillation context">
      <VIS.TrapProblem id="smt-q13" difficulty="medium" mode="single"
        title="In knowledge distillation, the teacher's softmax uses T = 4 (not T = 1). Why?"
        options={[
          {key:"a", text:"At T = 4, the teacher's probabilities are softer; non-argmax classes carry useful 'dark knowledge' about similarity between classes that the student can absorb.", correct:true},
          {key:"b", text:"T = 4 is faster on GPU because exp(z/4) avoids overflow that exp(z) would cause.", correct:false},
          {key:"c", text:"T = 4 is the optimum from Hinton's 2015 paper for ALL model sizes and tasks.", correct:false},
          {key:"d", text:"T = 4 increases the entropy regularization to prevent the student from collapsing.", correct:false},
        ]}
        trap={<>(b) confuses cause and effect (overflow is solved by max-subtract, not by T). (c) overfits the literature — T is task-dependent, typically 2-10. (d) gets the framing wrong; entropy regularization is implicit, not the goal.</>}
        lens={<>Hinton's <em>Distilling the Knowledge in a Neural Network</em> (2015): the teacher's confidence at T=1 is too sharp — almost all mass on one class — so the student only learns 'argmax was X'. At T=4, the teacher's full probability vector (e.g., P(cat)=0.6, P(dog)=0.3, P(deer)=0.08) reveals class similarity structure (<VIS.Term def="The information in non-argmax probabilities — the teacher's relative ranking and confidence across all classes, not just its top-1 prediction. Term coined by Hinton 2015.">dark knowledge</VIS.Term>). Student trained with this teacher generalizes better than one trained on hard labels alone.</>}
        stretch={<>Why must the student also use T = 4 during distillation training, then T = 1 at inference? (Loss is matched at the same temperature. At inference you want sharp predictions; at training you want the soft signal.)</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-q14" title="Drill 14: Entropy and T">
      <VIS.TrapProblem id="smt-q14" difficulty="medium" mode="single"
        title="How does the entropy of softmax(z / T) behave as T increases?"
        options={[
          {key:"a", text:"Strictly increases — entropy is maximized by uniform, and large T pushes toward uniform.", correct:true},
          {key:"b", text:"Decreases — large T 'concentrates' mass on the argmax.", correct:false},
          {key:"c", text:"Non-monotonic; entropy has a peak around T = 1.", correct:false},
          {key:"d", text:"Constant — entropy is invariant under temperature scaling because softmax is closed under monotonic transforms.", correct:false},
        ]}
        trap={<>(b) inverts the direction of T's effect. (c) sounds plausible but is wrong: entropy is monotone in T for fixed logits. (d) confuses 'argmax preserved' with 'distribution preserved'.</>}
        lens={<>Entropy H(p(T)) = -Σ p_i log p_i. At T = 0, p is one-hot, H = 0. At T = ∞, p is uniform, H = log V. In between, H is strictly increasing in T (for fixed non-degenerate z). Temperature is a clean <VIS.Term def="A continuous knob that smoothly interpolates between two extreme behaviors. T = 0 (one-hot) ↔ T = ∞ (uniform).">interpolation</VIS.Term> between the two extremes.</>}
        stretch={<>What's d(H)/dT at T = 1 in terms of logit variance? (For small logit spread, H'(T) ≈ Var(z) / T² — a <VIS.Term def="A measure of how much information an observable random variable carries about an unknown parameter. Appears in the second-order Taylor expansion of log-likelihood.">Fisher-information</VIS.Term>-like quantity. The hotter the temp, the slower entropy grows.)</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-q15" title="Drill 15: Top-k / top-p interaction">
      <VIS.TrapProblem id="smt-q15" difficulty="medium" mode="single"
        title="Your LLM samples with T = 0.7 AND top-k = 50. In what order should these be applied?"
        options={[
          {key:"a", text:"Apply T first (divide logits by 0.7), then take top-k = 50, then re-normalize via softmax over the kept 50.", correct:true},
          {key:"b", text:"Take top-k = 50 first, then divide the 50 surviving logits by 0.7, then softmax.", correct:false},
          {key:"c", text:"Equivalent — top-k and temperature commute because both are monotone in logit ordering.", correct:false},
          {key:"d", text:"Apply temperature only when top-k > V, otherwise top-k subsumes the effect of T.", correct:false},
        ]}
        trap={<>(c) is the tempting answer because top-k preserves argmax. But the SHAPE of the kept distribution (probabilities AFTER softmax over the survivors) differs depending on whether T was applied before or after — different sampling outcomes.</>}
        lens={<>Standard pipeline (Hugging Face <code>transformers</code> matches this): (1) scale logits by 1/T, (2) <VIS.Term def="Set the masked positions to -inf so that after exp they contribute 0 to softmax. The standard 'soft hard mask' for both attention and top-k filtering.">mask</VIS.Term> all but <VIS.Term def="Sampling restricted to the K highest-probability tokens; the rest get probability 0. K typically 40-50 in LLM serving.">top-k</VIS.Term> logits to -inf, (3) softmax over the survivors. Order matters because step 2 uses the SHAPE of the scaled logits to decide who survives — at T &lt; 1 the spread between top tokens widens, so top-k may keep a slightly different set than it would at T = 1.</>}
        stretch={<>Where does <VIS.Term def="Nucleus (top-p) sampling: keep the smallest set of tokens whose cumulative probability exceeds p (e.g., 0.95), then re-normalize and sample. Adapts the cutoff to the distribution's sharpness.">top-p</VIS.Term> fit into the order? (After top-k. Standard chain: temperature → top-k → top-p → sample.)</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-q16" title="Drill 16: Gradient through softmax-with-T">
      <VIS.TrapProblem id="smt-q16" difficulty="hard" mode="single"
        title="What is ∂L/∂z_i when L = -log(p_y) (cross-entropy) and p = softmax(z / T)?"
        options={[
          {key:"a", text:"(p_i − 𝟙[i=y]) / T — the standard softmax-CE gradient, scaled by 1/T because of the chain rule through z/T.", correct:true},
          {key:"b", text:"p_i − 𝟙[i=y] — temperature cancels out in the gradient because softmax is scale-invariant.", correct:false},
          {key:"c", text:"T · (p_i − 𝟙[i=y]) — chain rule through T multiplies gradients by T.", correct:false},
          {key:"d", text:"The gradient is undefined when T is learned because of the double dependency.", correct:false},
        ]}
        trap={<>(b) is the trap — looks 'clean' but skips the chain rule through z/T. (c) inverts the direction. (d) is incorrect; autograd handles it.</>}
        lens={<>Let u = z / T. Then ∂L/∂z_i = ∂L/∂u_i · ∂u_i/∂z_i = (p_i − 𝟙[i=y]) · (1/T). The 1/T factor matters: at T = 4, gradients on logits are 4× smaller than at T = 1, which is exactly why <VIS.Term def="The recipe used in Hinton's distillation paper: scale the soft-target cross-entropy loss by T² so gradient magnitudes are independent of the temperature choice.">T² rescaling</VIS.Term> shows up in distillation losses to keep gradient magnitudes comparable across temperatures.</>}
        stretch={<>Why does Hinton's distillation loss multiply by T²? (To compensate exactly for the 1/T² gradient shrinkage — once from the soft-target side, once from the student side — and keep <VIS.Term def="The size of gradients flowing into a parameter. If too small, learning stalls; if too large, training diverges. Controlled by loss scale, learning rate, gradient clipping.">gradient magnitude</VIS.Term> independent of T.)</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-q17" title="Drill 17: Production input validation">
      <VIS.TrapProblem id="smt-q17" difficulty="medium" mode="multi"
        title="Pick the input validations that belong in a production softmax_with_temperature() entrypoint."
        options={[
          {key:"a", text:"Reject T < 0 (raise ValueError).", correct:true},
          {key:"b", text:"Reject NaN logits or NaN T (raise ValueError or return a sentinel).", correct:true},
          {key:"c", text:"Clamp T to >= 1e-9 silently so the caller's bad config doesn't crash inference.", correct:false},
          {key:"d", text:"Verify logits.dtype is float32 or float64; reject float16 with a clear error pointing to the fp32 wrapper.", correct:true},
          {key:"e", text:"Verify logits has at least 2 dims (batch + vocab); reject 1D tensors with a shape-hint error.", correct:true},
          {key:"f", text:"Silently cast int logits to float; integer inputs are likely a caller mistake but should not break.", correct:false},
        ]}
        trap={<>(c) hides a config bug — caller intended T = 0 (greedy) or T &lt; 0 (sign error) and gets near-greedy without knowing. (f) hides an upstream bug; production should be loud about type surprises.</>}
        lens={<>Loud failures beat silent corrupt outputs. Validate T sign, finite logits, dtype, and shape. The T = 0 case should be the ONLY path that 'silently' takes a <VIS.Term def="An alternative code path taken when the primary path is unsafe or impossible. T=0 → argmax branch is a fallback for the divide-by-zero case.">fallback</VIS.Term>, and it does so via an explicit branch, not via clamping.</>}
        stretch={<>What about empty batch (B = 0)? (Return empty zeros of matching shape; don't raise — empty batches are valid in pipeline edge cases.)</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-q18" title="Drill 18: 'Online' single-pass softmax">
      <VIS.TrapProblem id="smt-q18" difficulty="hard" mode="single"
        title="The Milakov–Gimelshein 'online softmax' computes max and sum in a single pass over V. What invariant does it maintain at step n?"
        options={[
          {key:"a", text:"(m_n, s_n) where m_n = max(z_1..z_n) and s_n = sum_{i≤n} exp(z_i − m_n); update at step n+1 rescales s by exp(m_n − m_{n+1}) when m_{n+1} > m_n.", correct:true},
          {key:"b", text:"Just s_n = sum_{i≤n} exp(z_i); max is taken in a second pass over the full vector.", correct:false},
          {key:"c", text:"(m_n, s_n) but s is the running sum of un-shifted exp(z_i); the rescale step divides by exp(m_n).", correct:false},
          {key:"d", text:"A polynomial approximation to exp that avoids the need to track max at all.", correct:false},
        ]}
        trap={<>(b) describes the two-pass naive algorithm. (c) gets the shift wrong (sum must be shifted to be numerically safe). (d) is unrelated.</>}
        lens={<>One pass over V. Maintain running pair (m, s): when a new z_i arrives, if z_i &gt; m, rescale s ← s · exp(m − z_i) and update m ← z_i; then add exp(z_i − m) to s. Single pass, numerically stable, the foundation of <VIS.Term def="A 2022 GPU kernel by Dao et al. that fuses attention's softmax with the QK^T matmul and V multiply, dramatically reducing memory traffic. Built on online softmax.">FlashAttention</VIS.Term>.</>}
        stretch={<>Why is one-pass important on GPU when two-pass works fine on CPU? (Memory traffic. A V=128K logit row is 512 KB in fp32 — reading it twice from <VIS.Term def="High-Bandwidth Memory — the off-chip DRAM on a modern GPU. Reading from it is ~10× slower than from on-chip SRAM, so any kernel that minimizes HBM passes wins.">HBM</VIS.Term> costs measurable <VIS.Term def="The rate at which a kernel can read/write memory, usually limited by HBM bandwidth (~1-3 TB/s on a modern GPU). Often the binding constraint on softmax-like ops.">bandwidth</VIS.Term> at 60 tok/s/stream. One-pass halves DRAM traffic.)</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://arxiv.org/abs/1503.02531" target="_blank" rel="noopener"><strong>Hinton, Vinyals, Dean — Distilling the Knowledge in a Neural Network</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper, NeurIPS workshop 2015)</span><br/>The original distillation paper. Section 2 introduces temperature, the T² loss rescaling, and 'dark knowledge'. Eight pages, very readable.</li>
        <li><a href="https://arxiv.org/abs/1805.02867" target="_blank" rel="noopener"><strong>Milakov & Gimelshein — Online Normalizer Calculation for Softmax</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper, 2018)</span><br/>The single-pass max+sum trick used by FlashAttention. Three pages; the invariant + update rule are the whole paper.</li>
        <li><a href="https://arxiv.org/abs/2205.14135" target="_blank" rel="noopener"><strong>Dao et al. — FlashAttention</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper, NeurIPS 2022)</span><br/>Applies online softmax to fuse attention. Sections 3.1–3.2 are the softmax part; the rest is tiling.</li>
        <li><a href="https://huggingface.co/docs/transformers/generation_strategies" target="_blank" rel="noopener"><strong>HuggingFace — Generation strategies</strong></a> <span style={{color:"#64748b", fontSize:14}}>(docs, worked examples)</span><br/>Practical temperature / top-k / top-p / repetition-penalty combos and how they interact in production LLM serving.</li>
        <li><a href="https://en.wikipedia.org/wiki/LogSumExp" target="_blank" rel="noopener"><strong>LogSumExp (Wikipedia)</strong></a> <span style={{color:"#64748b", fontSize:14}}>(reference)</span><br/>The math behind the max-subtract trick in three lines. The fastest way to convince yourself the identity is exact.</li>
        <li><a href="https://gregorygundersen.com/blog/2020/02/09/log-sum-exp/" target="_blank" rel="noopener"><strong>Gregory Gundersen — The Log-Sum-Exp Trick</strong></a> <span style={{color:"#64748b", fontSize:14}}>(blog)</span><br/>Tight walkthrough with worked numerics showing exactly when naive softmax overflows and why max-subtract fixes it.</li>
      </ul>
    </VIS.Section>
  </main>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

    window.addEventListener("error", function (e) {
      const pre = document.createElement("pre");
      pre.style.cssText = "position:fixed;top:0;left:0;right:0;max-height:35vh;"
        + "overflow:auto;background:#fee2e2;color:#7f1d1d;padding:8px;"
        + "margin:0;font:12px/1.4 monospace;z-index:10002;";
      pre.textContent = "[visualize] " + (e.error?.stack || e.message || e);
      document.body.appendChild(pre);
    }, true);
  </script>
