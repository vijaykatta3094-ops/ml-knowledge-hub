<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// BatchNorm — row 22 (rewritten 2026-05-18: G20 hover-gloss + 25 trap drills)

const App = () => (
  <main style={{maxWidth:880,margin:"2em auto",padding:"0 16px",fontSize:16,lineHeight:1.65}}>
    <VIS.Hero pill="ML Fund" title="Batch Normalization"
      subtitle={<>The 2015 trick that made deep <VIS.Term def="Convolutional Neural Network. Stacks convolution + nonlinearity + pooling; standard backbone for image tasks before ViT.">CNNs</VIS.Term> trainable at sane learning rates by normalizing activations across the batch dimension.</>}
      byline={[{label:"L2",value:"Normalization"},{label:"L3",value:"BatchNorm"},{label:"Origin",value:"Ioffe & Szegedy 2015"}]}/>

    <VIS.TLDR>
      For each channel, <VIS.Term def="Batch Normalization. Normalize each feature across the batch dimension; standard for CNNs, awkward for variable-length sequences.">BatchNorm</VIS.Term> normalizes across the <strong>batch</strong> and spatial dimensions: subtract the batch mean, divide by the batch standard deviation, then apply a learnable{" "}
      <VIS.Term def="Per-channel affine transform applied after normalization: y = γ·x_hat + β. γ scales, β shifts. Lets the network undo the normalization if it hurts.">affine transform</VIS.Term> (γ scale, β shift). At inference it switches to <VIS.Term def="Exponential Moving Average. Smoothed running estimate of the per-channel mean/std, updated each train batch; frozen at eval.">EMA</VIS.Term> running statistics estimated over training batches. Effects: enables higher{" "}
      <VIS.Term def="Step size used by SGD/Adam updates. BN's smoother loss landscape lets you raise LR 10-100× safely.">learning rates</VIS.Term> and smoother loss landscape. Tradeoffs: breaks below batch size 8, has a train/eval mode discrepancy, and composes poorly with{" "}
      <VIS.Term def="Regularizer that zeros each activation independently with probability p during training. Variance interacts badly with BN's running stats.">dropout</VIS.Term> or variable-length sequences.
    </VIS.TLDR>

    <VIS.Section id="sec-math" title="Beat 1 — The transform">
      <VIS.Equation display tex="\hat{x}_i = \frac{x_i - \mu_{\mathcal{B}}}{\sqrt{\sigma_{\mathcal{B}}^2 + \epsilon}} \quad;\quad y_i = \gamma\,\hat{x}_i + \beta"/>
      <p>
        μ<sub>B</sub>, σ²<sub>B</sub> are computed <strong>per channel</strong> across the{" "}
        <VIS.Term def="The N dimension of the input tensor — one of the N independent samples drawn together each step. BN reduces over this axis (per channel).">batch dimension</VIS.Term>{" "}
        and over spatial <code>H×W</code> for{" "}
        <VIS.Term def="Layer using sliding-window kernels with shared weights over spatial positions; the workhorse of image models.">conv layers</VIS.Term>. The pair (γ, β) is learned per channel — the network can undo the normalization if needed. The{" "}
        <VIS.Term def="A small constant (≈1e-5) added inside BN's denominator √(σ² + ε). Prevents divide-by-zero and bounds the gradient w.r.t. variance.">ε</VIS.Term>{" "}
        prevents divide-by-zero when{" "}
        <VIS.Term def="Spread of a sample around its mean (squared). BN divides by the per-channel batch std (sqrt of variance + ε).">variance</VIS.Term>{" "}
        collapses. The transform is summarized as: standardize, then{" "}
        <VIS.Term def="Linear rescaling and shift y = γ·x + β with learnable per-channel γ and β; the second half of BN's transform.">scale-and-shift</VIS.Term>.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-axis" title="Beat 2 — Which axis gets normalized">
      <p>
        The defining choice is <em>which dimension you average over</em>. <VIS.Term def="Batch Normalization. Normalize each feature across the batch dimension; standard for CNNs, awkward for variable-length sequences.">BN</VIS.Term> averages over the batch dimension (per channel), so two samples in the same batch influence each other's normalization. <VIS.Term def="Per-token feature-vector normalization (subtract mean, divide by std, then learned affine). Stabilizes deep transformer training.">LayerNorm</VIS.Term> averages over the feature dimension inside one sample — batch-size independent.{" "}
        <VIS.Term def="Group Normalization (CV). Splits channels into G groups and normalizes within each group; works with small batch sizes where BN fails.">GroupNorm</VIS.Term> and{" "}
        <VIS.Term def="Per-sample, per-channel normalization. Originally for style transfer; widely used as a generative-model normalizer.">InstanceNorm</VIS.Term> are intermediate. For a conv{" "}
        <VIS.Term def="Multi-axis array stored in row-major or channels-first order. For images, shape (N, C, H, W): batch, channels, height, width.">tensor</VIS.Term> of shape (N, C, H, W) the choice is which axes go into the mean and std reduction.
      </p>
      <VIS.Mermaid chart={`
flowchart LR
  X["Input tensor (N, C, H, W)<br/>N=batch, C=channels"]
  X --> BN["BatchNorm: avg over N, H, W per channel<br/>(stats depend on batch composition)"]
  X --> LN["LayerNorm: avg over C, H, W per sample<br/>(stats depend only on the sample)"]
  X --> GN["GroupNorm: avg over groups of C, H, W per sample<br/>(batch-size independent)"]
  style BN fill:#dbeafe,stroke:#2563eb
  style LN fill:#fef9c3,stroke:#d97706
  style GN fill:#dcfce7,stroke:#16a34a
      `}/>
    </VIS.Section>

    <VIS.Section id="sec-eval" title="Beat 3 — Train vs eval mode (the famous bug)">
      <VIS.Callout kind="gotcha" title="Eval uses RUNNING statistics, not batch stats">
        During training, BN uses the current batch's (μ, σ) AND updates an{" "}
        <VIS.Term def="Exponential Moving Average. Smoothed running estimate of the per-channel mean/std, updated each train batch; frozen at eval.">EMA</VIS.Term> running estimate (default momentum 0.1 in{" "}
        <VIS.Term def="Open-source deep-learning framework. Its BN layer tracks running stats via 'running_mean' and 'running_var' buffers and toggles via model.train()/eval().">PyTorch</VIS.Term>). At eval time, BN uses ONLY the frozen running stats. Forgetting <code>model.eval()</code> means BN normalizes by your tiny eval-batch stats — predictions silently shift. Same trap with{" "}
        <VIS.Term def="A dropout-like regularizer applied at evaluation time to estimate prediction uncertainty. Requires keeping the model in 'train' mode and averaging multiple forward passes.">MC Dropout</VIS.Term> hacking.
      </VIS.Callout>
      <VIS.Callout kind="gotcha" title="Breaks at small batch sizes">
        With batch size 1 the per-channel variance is 0 and the normalized output is undefined. Even at batch 2-8 the batch statistics are too noisy to be reliable, and the running-stat EMA learns a moving target. Standard escape hatches:{" "}
        <VIS.Term def="Group Normalization (CV). Splits channels into G groups and normalizes within each group; works with small batch sizes where BN fails.">GroupNorm</VIS.Term> or{" "}
        <VIS.Term def="Per-token feature-vector normalization (subtract mean, divide by std, then learned affine). Stabilizes deep transformer training.">LayerNorm</VIS.Term> for sequence models, distributed{" "}
        <VIS.Term def="BN variant that pools batch statistics across GPUs/processes so the effective batch is the global batch. Reduces small-per-GPU-batch noise at the cost of a synchronization barrier.">SyncBN</VIS.Term> for multi-GPU.
      </VIS.Callout>
      <VIS.Callout kind="info" title="Why BN actually helps (post-2018 view)">
        The original paper attributed the speedup to reducing{" "}
        <VIS.Term def="Hypothesized shift in the distribution of intermediate activations as upstream layers update. BN was originally pitched as a fix; Santurkar et al. 2018 showed the smoothing of the loss landscape is closer to the real cause.">internal covariate shift</VIS.Term>, but Santurkar et al. 2018 showed the dominant effect is making the loss landscape smoother — gradients become more{" "}
        <VIS.Term def="Bounded-derivative property: a function f is L-Lipschitz if |f(x)−f(y)| ≤ L·|x−y|. A smaller Lipschitz constant on the gradient means the loss landscape doesn't curve sharply.">Lipschitz</VIS.Term>, so{" "}
        <VIS.Term def="Stochastic Gradient Descent. Update parameters with the gradient of one mini-batch's loss; the workhorse optimizer.">SGD</VIS.Term> can take larger steps without diverging.
      </VIS.Callout>
      <VIS.Callout kind="info" title="Folding BN into the previous conv at inference">
        Because the eval-time transform is a fixed{" "}
        <VIS.Term def="Transform of the form y = a·x + b: a scale plus a bias. Composes naturally with conv layers, so a frozen BN can be fused into the preceding conv's weights and bias.">affine map</VIS.Term> (running μ, running σ, γ, β all frozen), it composes with the preceding conv's weights into one fused conv. The output is bit-equivalent at eval — common in{" "}
        <VIS.Term def="Open Neural Network Exchange. Framework-neutral graph format for shipping models between training and inference runtimes.">ONNX</VIS.Term> /{" "}
        <VIS.Term def="NVIDIA inference compiler that lowers ONNX/PyTorch graphs to optimized CUDA kernels, including BN-conv fusion and INT8 quantization.">TensorRT</VIS.Term> export.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Test yourself — concept drill">
      <p style={{color:"#475569", marginBottom: 16}}>
        Twenty-five trap problems. Most test which axis BN normalizes over (and how it differs from <VIS.Term def="Per-token feature-vector normalization (subtract mean, divide by std, then learned affine). Stabilizes deep transformer training.">LayerNorm</VIS.Term> /{" "}
        <VIS.Term def="Group Normalization (CV). Splits channels into G groups and normalizes within each group; works with small batch sizes where BN fails.">GroupNorm</VIS.Term> /{" "}
        <VIS.Term def="Per-sample, per-channel normalization. Originally for style transfer; widely used as a generative-model normalizer.">InstanceNorm</VIS.Term>), or the operational quirks:{" "}
        <VIS.Term def="The .train() vs .eval() flag on a PyTorch module. Controls whether BN updates running stats and uses batch stats vs frozen running stats, and whether dropout is active.">train vs eval mode</VIS.Term>,{" "}
        <VIS.Term def="The running_mean and running_var buffers maintained as EMAs of per-batch statistics during training; used unchanged at eval.">running statistics</VIS.Term>, batch-size dependence, and interactions with{" "}
        <VIS.Term def="Regularizer that zeros each activation independently with probability p during training. Variance interacts badly with BN's running stats.">dropout</VIS.Term>,{" "}
        <VIS.Term def="Continue training a model (or just its head) on a smaller, task-specific dataset starting from pretrained weights.">fine-tuning</VIS.Term>, and{" "}
        <VIS.Term def="Splitting a training step across multiple GPUs/nodes — e.g. PyTorch DDP. Vanilla BN computes stats per-device; SyncBN pools globally.">distributed training</VIS.Term>. Each wrong option is a position a strong-but-not-expert practitioner could plausibly defend.
      </p>

      <VIS.TrapProblem
        id="bn-q1"
        difficulty="medium"
        title="P1 — Which dimension does BatchNorm average over?"
        scenario={<><em>Discriminating insight:</em> which tensor axis the statistics are reduced over. A conv activation has shape (N, C, H, W) where N is the batch and C is channels. Each channel learns its own (γ, β). For a forward pass through one BatchNorm2d layer:</>}
        options={[
          {key:"a", text:"For each (sample, channel) pair, compute mean/std over the spatial H×W positions of that one sample."},
          {key:"b", text:"For each sample, compute mean/std over all channels C and spatial dimensions H, W (so one (μ, σ) per sample)."},
          {key:"c", text:"For each channel, compute mean/std over the batch dimension N and spatial dimensions H, W combined (so one (μ, σ) per channel).", correct:true},
          {key:"d", text:"For each spatial location (h, w), compute mean/std across the batch and channels jointly (so one (μ, σ) per pixel)."},
        ]}
        trap={<>(a) is InstanceNorm — per-sample per-channel. (b) is LayerNorm-style — across features of one sample, batch-independent. (d) is a confused averaging that nothing uses. The single fact that distinguishes BN: it pools across the BATCH dimension for each channel, which is also why it breaks when N is tiny.</>}
        lens={<>Per channel, BN reduces over (N, H, W) and produces C means and C variances. Two samples in the same batch therefore influence each other's normalization — the property that makes BN powerful for CNNs and brittle for small-batch / variable-length cases.</>}
        stretch={<>Same question for BatchNorm1d on a (N, C) tensor: which axis?</>}
      />

      <VIS.TrapProblem
        id="bn-q2"
        difficulty="medium"
        title="P2 — What does PyTorch BN do at eval time?"
        scenario={<><em>Discriminating insight:</em> the source of (μ, σ) once .eval() flips the mode. A ResNet-50 is shipped to production for image classification, served one image at a time on CPU. The serving code calls model.eval() before inference.</>}
        options={[
          {key:"a", text:"BN uses the current input image's per-channel mean and std, computed on-the-fly per request."},
          {key:"b", text:"BN uses the running_mean and running_var buffers — EMAs accumulated over training batches — and freezes both buffers and (γ, β).", correct:true},
          {key:"c", text:"BN re-estimates (μ, σ) by running one forward pass over a held-out calibration set provided at deployment."},
          {key:"d", text:"BN disables itself and passes activations through unchanged so that serving is deterministic across batch sizes."},
        ]}
        trap={<>(a) is what happens if you FORGET to call .eval() — BN keeps using batch stats on the single eval sample, which gives variance 0 and undefined output. (c) is calibration as in TensorRT INT8, not standard BN behavior. (d) is wishful — BN is always an affine map at eval, never an identity.</>}
        lens={<>At eval, BN evaluates y = γ·(x − running_mean)/√(running_var + ε) + β with all four quantities frozen. running_mean and running_var are EMAs updated only during training (momentum=0.1 by default). This is a fixed affine map per channel, which is why it can be folded into the previous conv.</>}
        stretch={<>What's the symptom if a junior engineer forgets model.eval() in a production endpoint?</>}
      />

      <VIS.TrapProblem
        id="bn-q3"
        difficulty="hard"
        title="P3 — Single-GPU batch size 4 across 8 GPUs: where does BN break?"
        scenario={<><em>Discriminating insight:</em> the difference between per-GPU batch and global batch under data-parallel training. A team trains a segmentation model on 8 GPUs with a global batch of 32 images (4 per GPU). They use vanilla nn.BatchNorm2d. Eval IoU is wildly worse than train IoU even after model.eval() is correctly set.</>}
        options={[
          {key:"a", text:"BN computes its statistics independently on each GPU's local batch of 4 images, so the running-stat EMA is averaged over batches of size 4, not 32 — too noisy to match real-world inputs.", correct:true},
          {key:"b", text:"BN normalizes across the global batch automatically in DataParallel mode, so the problem must be in the loss function rather than normalization."},
          {key:"c", text:"BN's γ and β parameters are not synchronized across GPUs, so each GPU learns a different affine — the eval gap comes from averaging incompatible scales."},
          {key:"d", text:"BN is deterministic at batch 4 because variance is unbiased above batch 1, so the issue is the segmentation head and not the normalization."},
        ]}
        trap={<>(b) is the common myth — vanilla BN does NOT sync across GPUs. (c) confuses parameters (sync'd by gradient averaging in DDP) with running statistics (local). (d) waves away the small-batch-noise problem that is real here.</>}
        lens={<>Vanilla BN keeps per-GPU stats; with 4 per GPU the EMA learns from noisy estimates. The standard fix is SyncBN, which pools statistics across all 8 GPUs so the effective batch is 32 — at the cost of one all-reduce per BN layer per step.</>}
        stretch={<>Why doesn't this problem appear with LayerNorm or GroupNorm on the same setup?</>}
      />

      <VIS.TrapProblem
        id="bn-q4"
        difficulty="medium"
        title="P4 — LayerNorm vs BatchNorm: what's the actual distinction?"
        scenario={<><em>Discriminating insight:</em> the axis of reduction — distinct from where the affine sits or which loss the layer feeds. A junior engineer says "LayerNorm and BatchNorm are basically the same — both subtract a mean and divide by a std, with learned scale and shift; the difference is just whether you put them before or after the activation."</>}
        options={[
          {key:"a", text:"They differ only in placement: BN goes before ReLU, LayerNorm goes after — otherwise the math is identical and the reduction axis is the same in both."},
          {key:"b", text:"BN is for regression heads; LayerNorm is for classification heads — the difference is downstream-task-driven, not a difference in the normalization operation itself."},
          {key:"c", text:"BN uses learned γ and β to scale and shift; LayerNorm has no affine parameters and only performs the standardization step before the next layer."},
          {key:"d", text:"BN reduces over the BATCH dim per channel, so stats mix samples; LayerNorm reduces over the FEATURE dim within one sample, so stats are batch-independent.", correct:true},
        ]}
        trap={<>(a) is the placement myth — wrong, both have learned affines and either can go pre- or post-activation. (b) invents a use-case distinction; LayerNorm dominates transformers because of variable sequence length, not the head type. (c) is factually wrong about LayerNorm.</>}
        lens={<>The axis is the whole story. BN's stats depend on the batch composition (and so on batch size); LayerNorm's stats depend only on the sample's own features, making it the natural fit for transformers where sequence length varies and per-token statistics matter.</>}
        stretch={<>For a transformer LM with batch size 1, which one keeps working and why?</>}
      />

      <VIS.TrapProblem
        id="bn-q5"
        difficulty="hard"
        title="P5 — Can you fold a BN layer into the preceding conv at inference?"
        scenario={<><em>Discriminating insight:</em> whether the eval-time BN transform is an affine that composes with conv. The team wants to deploy a ResNet on an edge device that benefits from fewer ops. Someone proposes fusing each BN layer into the conv that feeds it, producing one conv with adjusted weights and bias and no separate BN layer.</>}
        options={[
          {key:"a", text:"Yes — at eval BN is an affine with frozen running stats and per-channel γ, β; this absorbs into the conv's weights and bias bit-equivalently.", correct:true},
          {key:"b", text:"No — BN's transform is input-dependent at eval time, so folding it would only be approximate and would silently degrade accuracy on real inputs."},
          {key:"c", text:"Yes, but only if (γ, β) are stripped first, because learned scales don't commute with convolution kernels and would otherwise corrupt the fused weights."},
          {key:"d", text:"No — fusing changes the receptive field of the conv since BN operates spatially per channel, so the resulting conv would see different patches."},
        ]}
        trap={<>(b) believes the eval transform stays sample-dependent; in fact running_mean/running_var are frozen buffers, not online estimates. (c) is the half-right trap: γ and β are exactly what you absorb; stripping them changes outputs. (d) confuses normalization scope with spatial extent — BN doesn't move data spatially.</>}
        lens={<>At eval, y = (γ/√(var+ε))·(W∗x + b − μ) + β = W'·x + b', where W' = (γ/√(var+ε))·W and b' = (γ/√(var+ε))·(b − μ) + β. Pure algebra, no approximation. This fusion is standard in ONNX/TensorRT conversion.</>}
        stretch={<>Under what circumstance does this fusion fail to be exact?</>}
      />

      <VIS.TrapProblem
        id="bn-q6"
        difficulty="medium"
        title="P6 — How are BN's running statistics computed?"
        scenario={<><em>Discriminating insight:</em> when running_mean and running_var get updated and from what data. A PR review claims: "BatchNorm's running statistics are computed at the end of training by averaging over the eval set, so the model adapts to your deployment distribution."</>}
        options={[
          {key:"a", text:"Correct — running stats are computed once at end of training by averaging the eval set so the deployed model matches deployment data."},
          {key:"b", text:"They are an EMA over per-batch statistics computed during TRAINING (updated when model.train() is on); the eval set is not used to update them.", correct:true},
          {key:"c", text:"They are stored as a polynomial fit over the loss curve and reconstructed at load time when the checkpoint is deserialized."},
          {key:"d", text:"They are recomputed every forward pass at eval time using the current input as a single-sample mean/variance estimate per channel."},
        ]}
        trap={<>(a) confuses "calibration" with BN's actual mechanism. (c) is fabricated nonsense that sounds quantitative. (d) is the .train()-left-on bug recast as a feature.</>}
        lens={<>running_mean ← (1 − momentum)·running_mean + momentum·batch_mean, same for running_var. Updated only inside the training loop. The eval set sees them as frozen buffers — that's the entire point of model.eval().</>}
        stretch={<>What happens to the running stats if you train for 1 epoch with batch size 4 vs 256?</>}
      />

      <VIS.TrapProblem
        id="bn-q7"
        difficulty="hard"
        title="P7 — Train accuracy 95%, eval accuracy 12% — what's the first thing to check?"
        scenario={<><em>Discriminating insight:</em> the train/eval mode toggle for BN. A team trains a CNN on ImageNet, sees train acc 95% on the last epoch, then runs the same model on the val set and gets 12% accuracy — basically random. No code changes between train and eval other than calling the eval loop. They haven't touched anything that changes the model structurally.</>}
        options={[
          {key:"a", text:"The val loader is misconfigured — likely shuffling labels or pointing to a different dataset."},
          {key:"b", text:"They forgot to call model.eval() so BN normalizes each val batch with that batch's noisy statistics instead of the frozen running buffers.", correct:true},
          {key:"c", text:"The model is overfitting catastrophically; train acc 95% with val 12% always means a generalization gap from too many parameters."},
          {key:"d", text:"Float precision on the eval GPU differs from the train GPU, causing numerical drift in the conv layers."},
        ]}
        trap={<>(a) is a possible bug but doesn't explain why train acc is high. (c) is the textbook overfit story, but a 83-point gap on ImageNet is too large for ordinary overfitting; it almost always means a forward-pass-mode bug. (d) is theatrical — FP32 conv on different GPUs doesn't drift 83 points.</>}
        lens={<>Forgetting model.eval() leaves BN in training mode at inference. With a small eval batch (often 1 in serving) variance is zero or tiny, so the normalized activations explode or collapse, and predictions become noise. Adding model.eval() is the one-line fix; this exact bug is the most common BN trap in production.</>}
        stretch={<>Dropout has the same train/eval toggle — what's the analogous symptom?</>}
      />

      <VIS.TrapProblem
        id="bn-q8"
        difficulty="medium"
        title="P8 — Why does BN typically enable larger learning rates?"
        scenario={<><em>Discriminating insight:</em> the current (post-2018) explanation for BN's optimization benefits. A senior asks why a ResNet with BN trains stably at lr=0.1 while the same architecture without BN diverges at lr=0.001.</>}
        options={[
          {key:"a", text:"BN removes internal covariate shift, so each layer sees the same input distribution throughout training and large LR no longer causes upstream layers to disrupt downstream ones."},
          {key:"b", text:"BN uses second-order gradient information internally to adapt the LR per parameter, making manual LR less important."},
          {key:"c", text:"BN smooths the loss landscape (gradients become more Lipschitz / curvature is bounded), so SGD steps don't overshoot — this is the explanation supported by Santurkar et al. 2018.", correct:true},
          {key:"d", text:"BN clips activations to a fixed range, which directly bounds gradient magnitudes — equivalent to gradient clipping at the activation level."},
        ]}
        trap={<>(a) is the 2015 explanation that has since been challenged; it's not wrong as a description but doesn't match the controlled experiments. (b) is invented — BN has no second-order machinery. (d) is wrong: BN does not bound activations; γ and β can amplify them arbitrarily.</>}
        lens={<>Santurkar et al. (2018) showed that artificially RE-introducing covariate shift after BN didn't hurt training, but the loss landscape's smoothness (its Lipschitz constant on gradients) was clearly improved by BN. The smoother landscape is what lets you take larger SGD steps without divergence.</>}
        stretch={<>What single experiment from the 2018 paper most directly falsifies the covariate-shift story?</>}
      />

      <VIS.TrapProblem
        id="bn-q9"
        difficulty="hard"
        title="P9 — Stacking dropout after BN: what goes wrong?"
        scenario={<><em>Discriminating insight:</em> how dropout's variance-injection during training corrupts BN's running statistics. A team adds dropout p=0.5 after the second-to-last BN layer in a CNN to combat overfitting. Train loss drops normally but eval accuracy is unstable across runs.</>}
        options={[
          {key:"a", text:"BN and dropout are mathematically identical regularizers, so combining them is double-regularization and the model under-fits."},
          {key:"b", text:"Dropout disables itself in the presence of BN by default in PyTorch, so the regularization isn't taking effect at all."},
          {key:"c", text:"Dropout zeros activations at train but not at eval; BN's running stats are accumulated from the train distribution and so are biased relative to the eval input.", correct:true},
          {key:"d", text:"Dropout is applied to BN's (γ, β) parameters directly, which corrupts the learned affine and produces unstable eval predictions."},
        ]}
        trap={<>(a) is the "regularization is regularization" shallow take. (b) is fabricated. (d) misplaces what dropout acts on (activations, not parameters). The actual mechanism is the train/eval distribution shift on BN's running stats — documented as "Disharmony between Dropout and Batch Normalization" (Li et al. 2019).</>}
        lens={<>During training, dropout multiplies activations by a Bernoulli mask scaled by 1/(1−p), changing their variance. BN's running_var is averaged across these scaled training batches but at eval dropout is off, so the stats it accumulated don't match the eval distribution. The classical recipe: put dropout AFTER the last BN, or use only one of them.</>}
        stretch={<>Why doesn't this problem appear when you stack dropout after LayerNorm in a transformer?</>}
      />

      <VIS.TrapProblem
        id="bn-q10"
        difficulty="medium"
        title="P10 — Variable-length sequences: where does BN break?"
        scenario={<><em>Discriminating insight:</em> what "per-channel statistic across the batch" means when sequences have different lengths. A team tries BN on a sequence-tagging model where input sequences range from 8 to 512 tokens. They flatten to (N·T, C) and apply BatchNorm1d.</>}
        options={[
          {key:"a", text:"The (γ, β) parameters become non-differentiable when sequence lengths differ across the batch, so gradients don't flow back through BN cleanly."},
          {key:"b", text:"BN handles variable lengths natively because it averages spatially — there's nothing wrong here other than possibly slow training on short sequences."},
          {key:"c", text:"BN requires a fixed input shape; PyTorch raises a runtime error on variable-length sequences once the second dimension stops matching."},
          {key:"d", text:"Long sequences contribute many more positions to the per-channel statistics than short ones, dominating the mean and variance; padding tokens further bias the estimate.", correct:true},
        ]}
        trap={<>(a) is invented; γ and β are always differentiable per channel. (b) underestimates the length-weighting issue. (c) is false — flattening reshapes around the constraint.</>}
        lens={<>BN treats each (sample, position) as an independent observation in the per-channel mean, so a batch with one long and one short sequence has its statistics dominated by the long one — and any padding included in the average adds further bias. LayerNorm sidesteps both issues by normalizing per-token, which is why transformers use it.</>}
        stretch={<>If you mask out padding before computing BN's statistics, does the problem fully go away?</>}
      />

      <VIS.TrapProblem
        id="bn-q11"
        difficulty="hard"
        title="P11 — Fine-tuning a pretrained CNN with batch size 2: BN behavior?"
        scenario={<><em>Discriminating insight:</em> what happens to running statistics when you fine-tune with a tiny batch on a small custom dataset. A team fine-tunes a torchvision ResNet-50 on a 600-image medical dataset with batch size 2 (memory constrained on a single 16GB GPU). They leave BN in default training mode.</>}
        options={[
          {key:"a", text:"BN's (γ, β) parameters are frozen by default when you load pretrained weights, so the layer effectively becomes a constant affine — no problem with small batch."},
          {key:"b", text:"BN is no-ops on transfer learning because the running stats are baked into the saved checkpoint and aren't updated unless you call .reset_running_stats()."},
          {key:"c", text:"BN's running stats drift toward the medical dataset's batch-of-2 statistics, overwriting the ImageNet stats — and with batch 2 the new stats are very noisy.", correct:true},
          {key:"d", text:"BN with batch 2 falls back to LayerNorm-style normalization automatically in PyTorch ≥ 1.10, so the small-batch behavior of the fine-tuned model is fine."},
        ]}
        trap={<>(a), (b), (d) are common fine-tuning myths. PyTorch does NOT freeze BN weights or running stats automatically on load — running_mean and running_var update every training batch unless you explicitly switch BN to eval mode while keeping the rest of the model in train mode (the standard fine-tune-with-frozen-BN recipe).</>}
        lens={<>For small-batch fine-tuning, the canonical recipe is: model.train() then iterate and call .eval() on every BatchNorm submodule. That preserves the ImageNet running stats while still updating other parameters. Or swap BN for GroupNorm before fine-tuning. Otherwise running stats degrade fast at batch 2.</>}
        stretch={<>Why is GroupNorm a popular default in detection / segmentation frameworks like Detectron2?</>}
      />

      <VIS.TrapProblem
        id="bn-q12"
        difficulty="medium"
        title="P12 — What does ε in the BN denominator do?"
        scenario={<><em>Discriminating insight:</em> the role of ε beyond "avoiding NaN". The denominator √(σ²<sub>B</sub> + ε) has ε = 1e−5 by default in PyTorch BN.</>}
        options={[
          {key:"a", text:"ε is a numerical-stability term that prevents divide-by-zero when σ² ≈ 0 and also bounds the gradient w.r.t. variance from blowing up when variance is tiny.", correct:true},
          {key:"b", text:"ε is the learning rate of the running statistics — increasing it makes the EMA adapt faster."},
          {key:"c", text:"ε is an L2 regularization coefficient on the (γ, β) parameters, applied implicitly through the normalization."},
          {key:"d", text:"ε is a confidence-interval width used to clip outlier activations before computing the mean and variance."},
        ]}
        trap={<>(b) confuses ε with momentum. (c) invents a regularization role. (d) is fabricated activation clipping that BN does not do.</>}
        lens={<>ε protects two things: division (avoiding 1/0 when a channel happens to be constant in this batch), and the gradient ∂loss/∂σ², which scales like 1/(σ² + ε)^(3/2) — a small ε floor stops gradient explosion when σ² is tiny. Standard value 1e−5; some libraries use 1e−3 for FP16 stability.</>}
        stretch={<>Under FP16 mixed-precision training, why might you raise ε to 1e−3?</>}
      />

      <VIS.TrapProblem
        id="bn-q13"
        difficulty="hard"
        title="P13 — Test-time batch size: does it affect predictions?"
        scenario={<><em>Discriminating insight:</em> whether the EVAL batch size changes outputs once model.eval() is on. A team benchmarks inference latency by sweeping eval batch sizes from 1 to 64. They observe that for the SAME image, the predicted probability is identical regardless of which batch size that image was in.</>}
        options={[
          {key:"a", text:"That's a bug — BN should always normalize across the current batch, so different batch sizes must yield different predictions; the team's eval pipeline is broken."},
          {key:"b", text:"That happens only because batch size 1 disables BN entirely; at batch size > 1 the predictions should differ."},
          {key:"c", text:"That happens only with SyncBN; vanilla BatchNorm produces different outputs at different eval batch sizes."},
          {key:"d", text:"That's expected — at eval BN uses frozen running statistics and (γ, β); the transform of one image doesn't depend on what other images share its batch.", correct:true},
        ]}
        trap={<>(a), (b), (c) all assume BN is still using batch stats at eval — the exact misconception this drill is built to expose. Eval mode means frozen affine, period; cross-batch independence is the desired property and is what makes folding BN into conv possible.</>}
        lens={<>At eval, BN is y = γ·(x − μ_running)/√(σ²_running + ε) + β, with all of μ_running, σ²_running, γ, β fixed. The transform is point-wise per channel — no dependence on other batch members. Train mode is the opposite: outputs depend on the batch.</>}
        stretch={<>How could you verify this property end-to-end with a 2-line test in PyTorch?</>}
      />

      <VIS.TrapProblem
        id="bn-q14"
        difficulty="medium"
        title="P14 — Why do CNNs use BN but transformers use LayerNorm?"
        scenario={<><em>Discriminating insight:</em> what about the workload makes one normalization preferable. A team building a new vision-transformer hybrid asks "why isn't BN used in the transformer blocks like it is in the conv stem?"</>}
        options={[
          {key:"a", text:"BN was published before transformers — transformers use LayerNorm only because it's newer and there's no real technical reason to prefer it."},
          {key:"b", text:"BN requires convolutions in the same layer to fuse with at inference; transformers have no convs, so the BN-conv fusion isn't available for them."},
          {key:"c", text:"LayerNorm has more learnable parameters per layer, which transformers need for expressiveness; BN has fewer and would bottleneck the network."},
          {key:"d", text:"Transformer per-device batches are small and sequence lengths vary; BN's batch-dependence and length-dependence both hurt, while LayerNorm sidesteps both.", correct:true},
        ]}
        trap={<>(a) is the "fashion" answer. (b) confuses inference-time fusion (an optimization) with a hard architectural constraint. (c) is false — both have one γ and β per normalized channel; counts are similar.</>}
        lens={<>Two real properties matter: (i) BN's statistics need a reasonably large, fixed-shape batch — transformers often run with batch 1-8 per device and variable seq length; (ii) per-token normalization is what transformers want semantically (each token's feature vector is on the same footing). LayerNorm gives both for free.</>}
        stretch={<>RMSNorm replaces LayerNorm in LLaMA — what does it drop and why does it still work?</>}
      />

      <VIS.TrapProblem
        id="bn-q15"
        difficulty="hard"
        title="P15 — Batch composition leaking information across samples"
        scenario={<><em>Discriminating insight:</em> a privacy / contamination consequence of BN's cross-sample normalization. A team is training a model where one batch contains a sensitive sample alongside ordinary samples. They want to know whether the sensitive sample's content can influence the predictions on the OTHER samples in the same batch.</>}
        options={[
          {key:"a", text:"No — BN's forward pass is per-sample once you reach an activation, so cross-batch leakage is impossible by construction."},
          {key:"b", text:"Yes, but only with batch size 2; once batches contain 32+ samples the contribution of any one sample is below numerical precision."},
          {key:"c", text:"Yes — at training time BN computes μ_B and σ²_B over the whole batch, so one sample shifts the normalization applied to every other sample. Implicit cross-sample coupling is real.", correct:true},
          {key:"d", text:"No — only LayerNorm has cross-sample interactions because it averages over feature dimensions; BN is purely per-sample once its batch stats are computed."},
        ]}
        trap={<>(a) misses the train-time coupling. (b) is wrong: contribution scales as 1/N but is never below FP32 precision for normal N. (d) gets the axes exactly backwards — LayerNorm is per-sample, BN is the one with cross-sample coupling.</>}
        lens={<>BN at train time tightly couples every sample in a batch through (μ_B, σ²_B). This is why differential-privacy training avoids BN (it complicates per-sample gradient analysis) and why some adversarial attacks construct batches to manipulate normalization. At eval the coupling disappears because running stats are frozen.</>}
        stretch={<>Why does DP-SGD typically use GroupNorm instead of BN?</>}
      />

      <VIS.TrapProblem
        id="bn-q16"
        difficulty="medium"
        title="P16 — Bias term in the preceding conv when followed by BN"
        scenario={<><em>Discriminating insight:</em> what BN's mean subtraction does to a conv's bias. A code review asks: "Conv2d before BatchNorm — should the conv have a bias term?"</>}
        options={[
          {key:"a", text:"Yes, always — the conv bias provides extra expressiveness regardless of what comes after the layer in the network."},
          {key:"b", text:"No — BN's per-channel mean subtraction absorbs any constant from the conv's bias, so the bias is redundant; bias=False is standard when BN follows.", correct:true},
          {key:"c", text:"Only if the BN uses learnable (γ, β); affine=False BN passes the conv's bias through unchanged into downstream layers."},
          {key:"d", text:"Yes — the conv bias is needed to initialize BN's β parameter correctly at the start of training before stats stabilize."},
        ]}
        trap={<>(a) misses the algebraic absorption. (c) is half-right: with affine=False, BN still subtracts the mean (and so still absorbs the bias); it just doesn't add β. (d) invents an initialization dependency.</>}
        lens={<>If conv outputs W∗x + b, BN computes (W∗x + b − μ_B), and μ_B contains b by construction (b is a constant per channel added before BN sees it). So b is immediately subtracted out and the gradient w.r.t. b is exactly zero. Setting bias=False on the conv saves parameters and FLOPs with no effect on outputs.</>}
        stretch={<>Does the same argument apply for Conv → LayerNorm in a ConvNeXt block?</>}
      />

      <VIS.TrapProblem
        id="bn-q17"
        difficulty="hard"
        title="P17 — track_running_stats=False at training: what happens?"
        scenario={<><em>Discriminating insight:</em> what BN reduces to when its running buffers are disabled. A team sets BatchNorm2d(... , track_running_stats=False) for an experimental run. They then call model.eval() and run inference on single images.</>}
        options={[
          {key:"a", text:"BN reverts to LayerNorm semantics automatically — it normalizes across the channel dimension of the single sample, batch-size independent."},
          {key:"b", text:"BN becomes an identity layer with only (γ, β) applied, since with no running buffers there are no statistics available at eval."},
          {key:"c", text:"BN falls back to per-sample statistics at eval, so each single-image inference computes its own (μ, σ) from that one image — variance is near zero and outputs collapse.", correct:true},
          {key:"d", text:"PyTorch raises a RuntimeError at eval time because there are no running buffers to use, forcing you to set the flag back to True."},
        ]}
        trap={<>(a) confabulates an automatic fallback that doesn't exist. (b) skips the normalization step. (d) believes PyTorch will guard you — it doesn't.</>}
        lens={<>With track_running_stats=False, BN ALWAYS computes statistics on the current input, in both train and eval. At eval on batch 1, that means per-(channel, single-image) — variance over (H, W) only — which can be near zero for low-variance channels and produces unstable outputs. The flag is useful only when you intend to always use input statistics (e.g., domain adaptation tricks).</>}
        stretch={<>When would you actually want track_running_stats=False?</>}
      />

      <VIS.TrapProblem
        id="bn-q18"
        difficulty="medium"
        title="P18 — Default momentum in PyTorch BN"
        scenario={<><em>Discriminating insight:</em> what the momentum hyperparameter does and what its default value is. A reviewer asks: "Should I tune the BN momentum?"</>}
        options={[
          {key:"a", text:"Default momentum is 0.1 in PyTorch (opposite convention from TF's 0.9 — both mean slow-moving averages). Rarely needs tuning, except very small datasets or long runs.", correct:true},
          {key:"b", text:"Default momentum is 0.9, identical to SGD momentum, and tuning it is essential for convergence on most architectures."},
          {key:"c", text:"PyTorch has no momentum parameter — running stats are computed as a simple unweighted average over all training batches."},
          {key:"d", text:"Momentum is the (γ, β) learning rate; default 0.1 matches the global LR multiplier for normalization layers."},
        ]}
        trap={<>(b) confuses the convention. (c) is wrong: there is a momentum, default 0.1, applied as running ← (1−m)·running + m·batch. (d) invents a γ/β-specific LR knob.</>}
        lens={<>PyTorch: running_mean ← (1 − 0.1)·running_mean + 0.1·batch_mean per step. TF: running_mean ← 0.9·running_mean + 0.1·batch_mean (the "momentum" they expose is 1 − PyTorch's). Effective window ≈ 1/momentum = 10 batches. Lower it to ~0.01 for very long runs where stats should adapt slowly.</>}
        stretch={<>If you train for 100 steps with momentum 0.1 starting from random init, what's the effective sample size in running_mean?</>}
      />

      <VIS.TrapProblem
        id="bn-q19"
        difficulty="hard"
        title="P19 — Gradient flow through BN's mean and variance"
        scenario={<><em>Discriminating insight:</em> that backprop flows through μ_B and σ²_B as well as through γ and β. A reviewer claims: "BN's gradients only flow through γ and β; the mean and variance are constants from the gradient's perspective."</>}
        options={[
          {key:"a", text:"Correct — μ_B and σ²_B are treated as constants by autograd because they're computed by reduction, which doesn't have a backward."},
          {key:"b", text:"Wrong — μ_B and σ²_B are functions of the batch's activations, and backprop computes ∂loss/∂x_i through them. This is exactly what couples gradients across samples in the same batch.", correct:true},
          {key:"c", text:"Wrong — but only in PyTorch versions before 1.0; modern frameworks detach the statistics from the graph for efficiency."},
          {key:"d", text:"Correct — autograd uses the running stats for the backward pass, not the batch stats, so cross-sample gradient coupling is impossible."},
        ]}
        trap={<>(a) and (c) believe autograd detaches the statistics; it doesn't (and shouldn't — that would change the loss landscape). (d) confuses train and eval semantics.</>}
        lens={<>The full BN backward includes terms ∂loss/∂x_j that flow through both μ_B(x_1, …, x_N) and σ²_B(x_1, …, x_N), giving every sample's gradient a contribution from every other sample in its batch. This is part of why BN's loss landscape is smoother — the gradient is implicitly regularized via the batch — and why DP-SGD's per-sample-gradient assumption is broken by BN.</>}
        stretch={<>Sketch why this coupling makes per-sample gradient clipping (as in DP-SGD) ill-defined for BN.</>}
      />

      <VIS.TrapProblem
        id="bn-q20"
        difficulty="medium"
        title="P20 — InstanceNorm vs BatchNorm at batch size 1"
        scenario={<><em>Discriminating insight:</em> that InstanceNorm is mathematically what BN reduces to at N=1 (without (γ, β) sharing across the batch — there isn't one). A team trying to make BN work at batch size 1 wonders if InstanceNorm is "just BN with a batch of 1."</>}
        options={[
          {key:"a", text:"They're identical — InstanceNorm is just BN's forward computation when N=1, including running statistics."},
          {key:"b", text:"InstanceNorm is a regularization technique applied only during training; at eval it's bypassed entirely."},
          {key:"c", text:"InstanceNorm averages over the channel axis like LayerNorm; BatchNorm averages over the spatial axis."},
          {key:"d", text:"InstanceNorm uses per-(sample, channel) stats by definition (no batch axis) AND tracks no running stats, so it behaves identically at train and eval.", correct:true},
        ]}
        trap={<>(a) misses that InstanceNorm has no running buffers and no train/eval distinction. (b) fabricates an eval-time bypass. (c) gets the axes wrong (InstanceNorm averages over (H, W) per (sample, channel), like BN-at-N=1 but conceptually different).</>}
        lens={<>InstanceNorm: per (sample, channel), mean and variance over spatial dims, no running stats, no train/eval split. BN at N=1 would do the same forward computation IF you also set track_running_stats=False — but standard BN with N=1 still tries to update its EMA buffers and so behaves badly. InstanceNorm dominates in style transfer for exactly this reason.</>}
        stretch={<>Why does InstanceNorm work well for style transfer but poorly for classification?</>}
      />

      <VIS.TrapProblem
        id="bn-q21"
        difficulty="hard"
        title="P21 — Adversarial robustness and batch composition"
        scenario={<><em>Discriminating insight:</em> that an adversary who controls part of a batch can manipulate BN's normalization for the rest. A red team observes that they can dramatically alter a target model's predictions on a victim image just by changing the OTHER images in the same eval batch. The model uses default BatchNorm2d.</>}
        options={[
          {key:"a", text:"Impossible — at eval the model uses frozen running stats; cross-batch attacks against BN cannot work in inference mode."},
          {key:"b", text:"The serving code is leaving the model in train mode, so BN uses batch stats and the adversary's images shift (μ_B, σ²_B) for the victim. Fix: call model.eval().", correct:true},
          {key:"c", text:"BN is fundamentally vulnerable to this attack in both train and eval mode; the only defense is to remove all BN layers."},
          {key:"d", text:"This is a bug in PyTorch's BN implementation that was patched in 1.11; upgrading resolves it without code or model changes."},
        ]}
        trap={<>(a) is correct ABOUT eval mode but misdiagnoses the scenario (this attack only works because eval mode isn't actually on). (c) and (d) catastrophize a well-defined fix.</>}
        lens={<>In eval mode with frozen running stats, batch composition cannot affect any other sample's output. The attack works only when train mode is leaking into inference — exactly the "forgot model.eval()" bug from P7, now weaponized. The fix is operational, not architectural.</>}
        stretch={<>Are there genuine attacks against BN that survive model.eval()?</>}
      />

      <VIS.TrapProblem
        id="bn-q22"
        difficulty="medium"
        title="P22 — Mixed-precision training (FP16): BN-specific risk?"
        scenario={<><em>Discriminating insight:</em> BN's variance calculation is the FP16 hot-spot. A team enables torch.cuda.amp for a ResNet and sees occasional NaNs in the loss after a few hundred steps.</>}
        options={[
          {key:"a", text:"The conv layers overflow in FP16 — BN itself is safe because it normalizes, so the cause is upstream of the BN layer."},
          {key:"b", text:"BN is incompatible with FP16; you must convert the entire model to BF16 in order to use any normalization layer at all."},
          {key:"c", text:"NaNs only come from softmax in FP16; BN's running stats are FP32 by default so the normalization can't be the cause."},
          {key:"d", text:"BN's variance involves squared activations; in FP16 x² can overflow, poisoning the stats. Fix: keep BN in FP32 (PyTorch AMP does this automatically).", correct:true},
        ]}
        trap={<>(a) underestimates that x² in variance is exactly the operation that overflows. (b) is too strong. (c) ignores that batch stats (the live computation) are not always FP32.</>}
        lens={<>BN computes E[x²] − E[x]² per channel; for large activations the x² term overflows FP16's ~65,504 range, poisoning every downstream stat. PyTorch AMP keeps BN in FP32 internally for this reason. If you use a custom BN, you must do the same.</>}
        stretch={<>Why is BF16 less prone to this than FP16?</>}
      />

      <VIS.TrapProblem
        id="bn-q23"
        difficulty="hard"
        title="P23 — Multi-task heads sharing a BN'd backbone: distribution drift"
        scenario={<><em>Discriminating insight:</em> tasks with different input distributions train BN's running stats away from any single task. A team uses one CNN backbone with three task-specific heads. Inputs for each task come from different distributions (natural images, satellite, medical). They train round-robin: one batch per task in rotation.</>}
        options={[
          {key:"a", text:"BN automatically maintains separate running stats per task when you tag forward passes with task IDs; no problem here."},
          {key:"b", text:"BN's (γ, β) are shared across tasks, so eval is fine as long as the affine fits; the stats themselves are unimportant."},
          {key:"c", text:"BN's running stats get pulled toward whichever task ran most recently, so eval on a task seen earlier uses stats biased toward other tasks — accuracy oscillates with rotation.", correct:true},
          {key:"d", text:"BN works because round-robin sampling produces an effectively i.i.d. batch when averaged over the rotation period."},
        ]}
        trap={<>(a) invents an API that doesn't exist by default. (b) underweights how much running stats matter at eval. (d) misunderstands EMA: it's NOT a simple average; the most recent batches dominate.</>}
        lens={<>BN's EMA is sequential, so the current running_mean reflects mostly the last ~1/momentum batches. With heterogeneous tasks, this drifts toward whatever task ran most recently. Standard fixes: separate BN layers per task (Domain-Specific BN), GroupNorm in the shared backbone, or task-conditional normalization (FiLM-style).</>}
        stretch={<>How does Domain-Specific BN avoid the drift without doubling parameters?</>}
      />

      <VIS.TrapProblem
        id="bn-q24"
        difficulty="medium"
        title="P24 — BatchNorm1d on (N, C) vs (N, C, L) tensors"
        scenario={<><em>Discriminating insight:</em> what BatchNorm1d's reduction axis is for each input rank. A team has a fully-connected head fed by a sequence encoder; they use nn.BatchNorm1d at both (N, C) and (N, C, L) stages.</>}
        options={[
          {key:"a", text:"For (N, C): reduce over N, one stat per feature. For (N, C, L): reduce over (N, L) per channel. Both forms are valid BatchNorm1d inputs.", correct:true},
          {key:"b", text:"BatchNorm1d only accepts (N, C) tensors; the (N, C, L) form must use BatchNorm2d with a dummy spatial dimension to satisfy the shape requirement."},
          {key:"c", text:"BatchNorm1d reduces over the C dimension in both cases — it's a per-sample feature normalizer, like LayerNorm but with a different name."},
          {key:"d", text:"BatchNorm1d reduces over the L dimension only; the batch dimension is untouched and the per-feature statistics are computed within each sample."},
        ]}
        trap={<>(b) is a common framework-fact mistake. (c) confuses BN with LayerNorm. (d) misidentifies the reduction axis.</>}
        lens={<>BatchNorm1d accepts both (N, C) and (N, C, L) and produces C per-channel (μ, σ) by reducing over the non-channel dimensions in both cases. The semantics are uniform with BatchNorm2d on (N, C, H, W).</>}
        stretch={<>Show why BatchNorm1d on (N, C) with C=1 reduces to global standardization across the batch.</>}
      />

      <VIS.TrapProblem
        id="bn-q25"
        difficulty="hard"
        title="P25 — Frozen running stats but trainable γ, β during fine-tuning"
        scenario={<><em>Discriminating insight:</em> how to fine-tune a pretrained CNN on small data without corrupting BN. A team wants to fine-tune a torchvision ResNet on a small dataset. They want to keep BN's running statistics from the pretraining run (ImageNet) but allow γ and β to adapt.</>}
        options={[
          {key:"a", text:"For each nn.BatchNorm2d submodule, call .eval() (freezes running stats) while keeping requires_grad=True on (γ, β); keep the rest of the model in .train().", correct:true},
          {key:"b", text:"Setting requires_grad=False on the BN layers achieves the goal automatically — both stats and (γ, β) are then frozen and the layer becomes a constant."},
          {key:"c", text:"This is impossible in PyTorch — running stats are tied to (γ, β) so either both update or neither does, and they share a single train/eval flag."},
          {key:"d", text:"Use torch.no_grad() inside the training loop for BN layers; this freezes running stats while still leaving gradients to flow through (γ, β)."},
        ]}
        trap={<>(b) over-applies requires_grad=False — that freezes the parameters but does NOT stop the running-stat update, which depends only on the train/eval mode. (c) is false. (d) is dangerous: no_grad blocks gradient flow entirely, defeating the goal.</>}
        lens={<>train()/eval() controls running-stat updates; requires_grad controls parameter learning. They are orthogonal. The standard recipe is to switch each BN to eval() (so running stats stay frozen at ImageNet values) while leaving (γ, β) trainable via the default requires_grad=True. Detectron2 and many transfer-learning frameworks wrap this as freeze_bn_stats(model).</>}
        stretch={<>What's the GroupNorm-based alternative recipe that side-steps all of this?</>}
      />
    </VIS.Section>
  </main>
