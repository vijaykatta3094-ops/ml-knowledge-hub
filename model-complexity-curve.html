  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          // NO autoGloss here. Glossing terms inside option text leaks the
          // answer mechanism via hover. Authors must keep options self-contained;
          // a candidate who needs a definition can scroll up to the prose where
          // the term is explicitly wrapped via <VIS.Term>.
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Model complexity curve — row 3 — fingerprint: model-complexity-curve
// Concept: as model capacity grows, bias falls and variance rises.
// Sweet spot lives at the minimum of the test-error U-curve.
// Pattern: smart-newcomer-depth (thought experiment → name+def → math → practical) + 25 trap drills.

// --- Vega-Lite: 30 polynomial fits per degree, overlaid (Beat 1) ---
function makeDegreeFits(degree, n_runs = 30) {
  const out = [];
  for (let r = 0; r < n_runs; r++) {
    const phase = r * 0.6;
    const noiseAmp = 0.12 * (degree / 10);
    for (let i = 0; i <= 40; i++) {
      const x = i / 40;
      let y;
      if (degree === 1) {
        y = 0.45 + 0.05 * (r / n_runs) + 0.10 * x; // near-flat
      } else if (degree === 3) {
        const base = 0.5 + 0.35 * Math.sin(2 * Math.PI * x);
        y = base + 0.06 * Math.sin(phase) + 0.04 * Math.sin(3 * x + phase);
      } else {
        // degree 10: wild
        const base = 0.5 + 0.35 * Math.sin(2 * Math.PI * x);
        const wiggle = 0.35 * Math.sin(8 * Math.PI * x + phase) +
                       0.20 * Math.sin(14 * Math.PI * x + phase * 1.3);
        y = base + wiggle * (0.35 + 0.20 * Math.sin(phase));
      }
      out.push({ x, y, run: r, degree: `Degree ${degree}` });
    }
  }
  // truth line
  for (let i = 0; i <= 40; i++) {
    const x = i / 40;
    out.push({ x, y: 0.5 + 0.35 * Math.sin(2 * Math.PI * x), run: -1, degree: `Degree ${degree}` });
  }
  return out;
}

      <VIS.TrapProblem
        id="mcc-q9"
        difficulty="hard"
        title="Q9 — What does rising train MSE signal as you raise ridge λ?"
        scenario={<><em>Discriminating insight:</em> The shape of the train curve as α grows tells you which side of the optimum you sit on. You sweep ridge λ: λ=0 → train 0.10, test 0.85. λ=1 → train 0.32, test 0.40. λ=100 → train 0.78, test 0.81. Why does train MSE rising past λ=1 matter for the diagnosis?</>}
        options={[
          { key: "a", text: "It signals numerical instability — the ridge normal-equation matrix becomes ill-conditioned at high values of λ." },
          { key: "b", text: "It is a routine artifact at every λ; only test error matters for diagnostic purposes, so ignore the train signal." },
          { key: "c", text: "You crossed the U-curve minimum on the regularization axis: further λ adds bias faster than it cuts variance.", correct: true },
          { key: "d", text: "It means the optimizer failed to converge at λ=100; raise the iteration count and re-fit on the same data." },
        ]}
        trap={<>(a) blames math when ridge is well-conditioned at all λ ≥ 0. (b) is a half-truth — train MSE rising IS a diagnostic, specifically of over-regularization. (d) blames optimization when ridge has a closed-form solution.</>}
        lens={<>On the regularization axis, the U-curve runs in reverse: low λ = high capacity (right of min), high λ = low capacity (left of min). Train MSE rising means you have forced the model simpler than it could be — bias dominates. λ=1 is near the sweet spot here.</>}
      />

      <VIS.TrapProblem
        id="mcc-q10"
        difficulty="medium"
        title="Q10 — Same train MSE, two models — pick the deployable one"
        scenario={<><em>Discriminating insight:</em> Train MSE alone cannot distinguish bias-limited from variance-limited models; you need a second number. Model A: train MSE 0.20, test MSE 0.21. Model B: train MSE 0.20, test MSE 0.55. Same train, very different test. Which to deploy and why?</>}
        options={[
          { key: "a", text: "Model B wins — lower variance on the training set indicates a better fit; the test gap is a sampling artifact." },
          { key: "b", text: "Model A — its train-test gap is tiny, indicating it generalized to the test distribution; B is overfitting.", correct: true },
          { key: "c", text: "Either is fine — same train MSE means equivalent fit, and the test difference is below practical significance." },
          { key: "d", text: "Model B — higher test error means it explored more of the function space; ensemble both for best results." },
        ]}
        trap={<>(a) inverts the diagnostic — same train, different test means B has higher variance, not lower. (c) ignores the test signal that is the whole point of held-out evaluation. (d) is decorative ("explored more of the function space"); ensembling can help but is not justified by the framing.</>}
        lens={<>Model A is in the variance-controlled regime (small generalization gap); Model B is overfitting. Deploy A. The bias-variance framework explicitly tells you: same train error, lower test error = lower variance (assuming similar bias).</>}
      />

      <VIS.TrapProblem
        id="mcc-q11"
        difficulty="hard"
        title="Q11 — 1k → 100k samples — what happens to the sweet spot?"
        scenario={<><em>Discriminating insight:</em> More data lets you tolerate more capacity before variance dominates. You used to find degree 3 optimal on a 1k-sample training set. Now you have 100k samples for the same regression task. The team expects degree 3 to still be best.</>}
        options={[
          { key: "a", text: "Sweet spot stays at degree 3 — optimal capacity is a property of the task and noise level, not of dataset size." },
          { key: "b", text: "Sweet spot shifts LEFT to a smaller degree — more data means less noise, so a simpler model class suffices here." },
          { key: "c", text: "Sweet spot becomes ill-defined — at 100k samples, all capacities have similar test error within statistical noise." },
          { key: "d", text: "Sweet spot shifts RIGHT — more data shrinks variance at every capacity, letting higher-capacity models pay off.", correct: true },
        ]}
        trap={<>(a) is the static-task fallacy — the curve depends on both task AND sample size. (b) is a plausible-sounding inversion; more data does shrink variance but EXPANDS the optimal capacity, not shrinks it. (c) contradicts the U-curve's basic shape.</>}
        lens={<>Variance scales roughly as 1/n at fixed capacity. More data lowers the variance curve everywhere, especially in the high-capacity region. The U-curve minimum slides RIGHT — bigger models become viable. This is why scaling laws work: more data unlocks more capacity.</>}
      />

      <VIS.TrapProblem
        id="mcc-q12"
        difficulty="medium"
        title="Q12 — 10× more data and both train AND test barely move"
        scenario={<><em>Discriminating insight:</em> The noise floor produces a specific failure pattern: train and test plateau together as you scale data, with both stuck above zero. You scale data 10× (10M → 100M samples), keeping the architecture fixed. Train and test loss drop only ~3% and then plateau.</>}
        options={[
          { key: "a", text: "Distribution shift — train and test now come from subtly different sources after the data refresh; investigate the join." },
          { key: "b", text: "Variance problem — 100M is still not enough; keep adding data until the train-test gap closes meaningfully." },
          { key: "c", text: "Irreducible noise floor σ²: labels themselves carry inherent noise, so no quantity of additional data will move test loss.", correct: true },
          { key: "d", text: "Bias problem — model capacity is too low to consume the new data; double the model size before adding more." },
        ]}
        trap={<>(a) does not explain why TRAIN plateaued; shift would only affect test. (b) misreads the signal — variance regimes show train falling while test stalls, not both plateauing together. (d) is plausible, but bias-limited models still benefit from data unless σ² is the binding floor.</>}
        lens={<>When both train AND test plateau together as you add data, σ² is the active constraint. Fix is BETTER LABELS (denoise, relabel, use stronger signal like dwell-time vs binary clicks), not more data or capacity.</>}
      />

      <VIS.TrapProblem
        id="mcc-q13"
        difficulty="hard"
        title="Q13 — 100 to 1000 trees, variance barely moves — why?"
        scenario={<><em>Discriminating insight:</em> Ensemble variance has an asymptote tied to inter-tree correlation rather than to tree count alone. Random forest with 100 trees on a 200k-row regression task has prediction variance 0.12 measured across bootstrap draws. You scale to 1000 trees, identical config. Variance is now 0.108 — only a 10% drop.</>}
        options={[
          { key: "a", text: "Trees are highly correlated (ρ ≈ 0.9) because they share most bootstrap samples; ensemble variance asymptotes at σ²·ρ.", correct: true },
          { key: "b", text: "Bug — n trees should always cut variance proportionally as σ²/n; expect 10× trees → 10× variance reduction." },
          { key: "c", text: "Bias dominates — adding trees can fix variance but cannot reduce bias, so the extra compute budget is wasted." },
          { key: "d", text: "mtry is too low — trees are over-decorrelated, so each tree is too weak to meaningfully contribute to the average." },
        ]}
        trap={<>(b) is the textbook σ²/n reading — true only for uncorrelated learners. (c) blames bias when the issue is variance asymptote, not bias dominance. (d) inverts the math — high correlation means mtry should go DOWN further to decorrelate, not up.</>}
        lens={<>For correlated ensembles: Var(avg) = σ²·(1-ρ)/n + σ²·ρ. As n→∞, variance → σ²·ρ. With ρ≈0.9, the floor is 0.9·σ², not zero. Fix: decorrelate (lower mtry, deeper subsampling, switch to extra-trees) — adding more trees alone cannot break the asymptote.</>}
      />

      <VIS.TrapProblem
        id="mcc-q14"
        difficulty="medium"
        title="Q14 — At which polynomial degree does variance start dominating?"
        scenario={<><em>Discriminating insight:</em> The transition from bias-dominated to variance-dominated occurs where their sum hits its minimum, rather than where the two component curves merely cross. Reading the U-curve plot above: bias² and variance lines cross around degree 4; total-error minimum is at degree 5. Pick the most precise statement.</>}
        options={[
          { key: "a", text: "Variance dominates the moment the variance curve goes positive (degree 1+), since variance grows from then onward." },
          { key: "b", text: "Variance dominates only past the interpolation threshold at degree 10+ where the classical U-curve gives way to descent." },
          { key: "c", text: "Variance dominates wherever the train-test gap exceeds about 10% of the test error in absolute magnitude terms." },
          { key: "d", text: "Variance dominates total error past the U-curve minimum (degree 5+) where its growth outpaces bias² reduction.", correct: true },
        ]}
        trap={<>(a) confuses "positive" with "dominant" — variance is always positive past degree 1 but starts very small. (b) imports the modern over-parameterized framing; this is a classical-regime question. (c) is an operational heuristic, not a property of the decomposition.</>}
        lens={<>"Dominates" means contributes most to total error. That happens past the U-curve minimum where variance grows faster than bias² shrinks. The crossing point of the two component curves is suggestive but not exact; the minimum of their sum is what matters.</>}
      />

      <VIS.TrapProblem
        id="mcc-q15"
        difficulty="hard"
        title="Q15 — CV AUC 0.92, test AUC 0.85 — explain the 7-point gap"
        scenario={<><em>Discriminating insight:</em> Test error and CV-tuned error can diverge when HPO sees too many trials on the same folds. XGBoost on churn data: 5-fold CV after 300 Optuna trials gives mean AUC 0.92, std 0.01 across folds. Held-out 200k test set: AUC 0.85. Random splits, so no temporal shift involved.</>}
        options={[
          { key: "a", text: "The test set is too small at 200k samples to give a stable AUC estimate; refit and re-evaluate on a larger split." },
          { key: "b", text: "Optuna overfit hyperparameters to specific CV-fold quirks across 300 trials; the CV scores were optimistically inflated.", correct: true },
          { key: "c", text: "Variance problem — XGBoost is too flexible at the tuned depth; reduce max_depth and retrain end-to-end on full data." },
          { key: "d", text: "Bias problem — the XGBoost class can't represent the patterns; switch to a deeper neural network with richer features." },
        ]}
        trap={<>(a) is false — 200k gives AUC CI under 0.005. (c) misreads the diagnostic — fold-to-fold std was 0.01 (tight); model variance would show as bigger fold std. (d) does not explain why CV scores were inflated.</>}
        lens={<>Tuning HPO 300 times on fixed CV folds is itself a fitting procedure that can overfit to fold-specific noise. The 7-point gap is HPO-overfitting, not model-overfitting. Fix: nested CV, or hold out a SECOND validation set just for HPO selection.</>}
      />

      <VIS.TrapProblem
        id="mcc-q16"
        difficulty="medium"
        title="Q16 — Place early-stopping within the bias-variance picture"
        scenario={<><em>Discriminating insight:</em> Capacity is set by architecture AND by training time — both expand the effective function class a learner explores. A teammate frames early stopping as 'a totally different fix from regularization.' Place early stopping on the bias-variance framework.</>}
        options={[
          { key: "a", text: "Early stopping sits outside the bias-variance framework — it is an optimization concern, separate from capacity sweeps." },
          { key: "b", text: "Early stopping is equivalent to dropout in expectation; both inject training-time stochasticity into the gradient updates." },
          { key: "c", text: "Training time acts as effective capacity; early stopping slides you LEFT on the U-curve, like raising α in ridge.", correct: true },
          { key: "d", text: "Early stopping increases capacity by exposing the model to more data passes; it slides you RIGHT on the U-curve axis." },
        ]}
        trap={<>(a) artificially excludes early stopping; it is a well-known regularizer. (d) inverts the direction — stopping EARLIER reduces effective capacity, not raises it. (b) confuses two distinct regularizers that have different mechanisms.</>}
        lens={<>Training longer = more effective capacity (the weights drift farther from initialization, fitting finer patterns including noise). Early stopping caps that drift, equivalent to L2 on (w − w_init). Both move you LEFT on the U-curve.</>}
      />

      <VIS.TrapProblem
        id="mcc-q17"
        difficulty="hard"
        title="Q17 — Same data, two seeds, 88% vs 79% test accuracy"
        scenario={<><em>Discriminating insight:</em> Variability across optimization runs is real but lives outside the classical decomposition's definition of variance. Fine-tuning DistilBERT on 50k examples with two random seeds gives 88% vs 79% test accuracy. Identical config, identical data, only the seed differs.</>}
        options={[
          { key: "a", text: "Different seeds explore different loss-landscape minima; the classical decomposition averages over training-set draws, not seeds.", correct: true },
          { key: "b", text: "This IS the classical bias-variance decomposition's variance term, acting through the initialization distribution as 𝒟." },
          { key: "c", text: "Bias problem — both seeds underfit, just at different rates; the 9-point gap is two paths to an underfit local optimum." },
          { key: "d", text: "Test set is mis-stratified — identical data should give identical accuracy across seeds, so the split must be the bug." },
        ]}
        trap={<>(b) overloads the term "variance" — colloquially these runs vary, but the formal decomposition averages over 𝒟, not seeds. (c) ignores that one seed got 88%, well above an underfit signature. (d) blames the data when the data is the same; seed variability is a known transformer-fine-tuning phenomenon (Mosbach et al. 2021).</>}
        lens={<>The classical bias-variance decomposition averages over training-set draws, not over optimization seeds. Seed variability is a separate (but real) source of test-error noise. Fixes: deep ensembles across seeds, SWA along one trajectory, or longer/more-stable training schedules.</>}
      />

      <VIS.TrapProblem
        id="mcc-q18"
        difficulty="medium"
        title="Q18 — ResNet-20 at 99% train, 60% test — first move?"
        scenario={<><em>Discriminating insight:</em> Three reasonable fixes exist; one is free and the others cost compute. CIFAR-10, ResNet-20, AdamW. Train accuracy 99.5%, val accuracy 60%. Val accuracy peaked at 72% around epoch 35 and has been declining for 20 epochs. Total epochs trained so far: 80. Pick the first move.</>}
        options={[
          { key: "a", text: "Order 500k more labels from MTurk crowd workers — overfitting consistently means more data is the right fix to try first." },
          { key: "b", text: "Switch the optimizer from AdamW to SGD with momentum=0.9 — AdamW overfits faster on small image datasets like CIFAR." },
          { key: "c", text: "Increase weight decay 10× and retrain from scratch — this is the valid variance-axis fix for an overfit network." },
          { key: "d", text: "Restore the epoch-35 val-peak checkpoint that captures the model's best-generalizing state, at zero compute cost.", correct: true },
        ]}
        trap={<>(a) is expensive and slow when a free fix exists. (b) is folklore — AdamW vs SGD is an unreliable variance fix on this task. (c) discards the free checkpoint and burns GPU on an option you should try AFTER cheap fixes.</>}
        lens={<>Val peaked at epoch 35 and declined — you already TRAINED past the U-curve minimum on the training-time axis. Restore the epoch-35 checkpoint (free, instant) before doing any expensive retrain. Only if performance is still inadequate do you try (c).</>}
      />

      <VIS.TrapProblem
        id="mcc-q19"
        difficulty="hard"
        title="Q19 — What does asking for one model's bias-variance mean?"
        scenario={<><em>Discriminating insight:</em> The decomposition's variance term is defined over training-set resampling, rather than over any property of a single trained model. The PM asks: "what's the bias and variance of the model we just shipped to production?" The model is one trained XGBoost regressor.</>}
        options={[
          { key: "a", text: "Bias and variance are properties of a fitted model — read them off via SHAP attributions and prediction confidence intervals." },
          { key: "b", text: "They are properties of the learning algorithm averaged over training-set draws; a single fitted model is one realization, not a pair.", correct: true },
          { key: "c", text: "Bias is the model's average prediction across test inputs; variance is the variance of those predictions across the test set." },
          { key: "d", text: "They are identical for any deterministic model — once weights are frozen, there is no bias-variance separation left to measure." },
        ]}
        trap={<>(a) misappropriates SHAP — that is feature attribution, not bias-variance. (c) is the most tempting wrong answer: it computes statistics of predictions over the TEST set, but the decomposition is over training-set resampling, not over test inputs. (d) is fabricated.</>}
        lens={<>To estimate bias/variance empirically, you bootstrap-train the same algorithm 50+ times and measure prediction spread at fixed inputs x. One shipped model = one realization. Use the framework to reason about CHOICES (capacity, regularization), not to label an existing artifact.</>}
      />

      <VIS.TrapProblem
        id="mcc-q20"
        difficulty="hard"
        title="Q20 — Train falls 0.40→0.05 while test climbs 0.42→0.55"
        scenario={<><em>Discriminating insight:</em> Train and test diverge specifically because added capacity fits training-set noise patterns absent from the held-out distribution. You sweep XGBoost max_depth 3 → 12 on a fixed 80/20 split. Train MSE drops 0.40 → 0.05. Test MSE rises 0.42 → 0.55. Explain the asymmetric movement.</>}
        options={[
          { key: "a", text: "Deeper trees fit training-specific noise that does not repeat in the test set; variance grows on test, train memorizes harder.", correct: true },
          { key: "b", text: "Train and test came from materially different distributions; investigate the 80/20 split protocol for leakage or shift." },
          { key: "c", text: "XGBoost has a latent bug at depth > 10 that inflates test error; check the library version and downgrade to v1.7." },
          { key: "d", text: "Test set has a higher inherent noise σ² than train; the gap reflects a population-level noise mismatch between splits." },
        ]}
        trap={<>(b) is a real concern but does not explain monotone divergence under a capacity sweep. (c) blames the library when this is textbook variance behavior. (d) is impossible if the split is i.i.d.; σ² is a property of the population, not the split.</>}
        lens={<>Train error keeps falling because deeper trees can fit any training-set pattern, including noise. Test error rises because those noise patterns do not repeat — variance dominates. Asymmetric movement is the U-curve's right side in action.</>}
      />

      <VIS.TrapProblem
        id="mcc-q21"
        difficulty="medium"
        title="Q21 — Which metric tracks the U-curve minimum during a sweep?"
        scenario={<><em>Discriminating insight:</em> One metric reliably tracks the U-curve minimum; the others move misleadingly or measure something else. Junior asks: "we are sweeping XGBoost depth 3 to 12 — which metric tells us where to stop?"</>}
        options={[
          { key: "a", text: "Train loss — pick the depth where train loss flattens, because that is where extra capacity stops paying off on the training fit." },
          { key: "b", text: "Training-time per epoch — pick the deepest model that fits inside your time budget, since deeper models give better predictions." },
          { key: "c", text: "Held-out validation loss — pick the depth at its minimum; this is the empirical estimate of the U-curve's height.", correct: true },
          { key: "d", text: "Count of unique predictions on the train set — more unique predictions means the model has fit more of the training set's structure." },
        ]}
        trap={<>(a) misuses train loss — it falls monotonically, so it has no minimum. (b) optimizes for compute, not generalization. (d) is invented.</>}
        lens={<>Held-out validation loss IS the empirical estimate of the U-curve's height at each capacity. The minimum of the validation curve identifies the sweet spot capacity. Tune on validation, not on test (that contaminates the test estimate).</>}
      />

      <VIS.TrapProblem
        id="mcc-q22"
        difficulty="hard"
        title="Q22 — Two regimes, same gap of 0.20 — distinguish them"
        scenario={<><em>Discriminating insight:</em> A gap alone is ambiguous — you need both numbers and the noise floor estimate to decide which regime. Model A: train 0.10, test 0.30, gap 0.20. Model B: train 0.40, test 0.60, gap 0.20. Estimated σ² = 0.05. Same gap, very different stories.</>}
        options={[
          { key: "a", text: "Both are variance-limited models — identical generalization gaps imply identical regimes; treat them the same way." },
          { key: "b", text: "A is bias-limited because its absolute errors are lower; B is variance-limited because its absolute errors are higher overall." },
          { key: "c", text: "Both have hit σ² already — ship whichever has lower latency in production and move on to a different metric." },
          { key: "d", text: "A is variance-dominated (train near σ², big gap); B has BOTH bias (train 8× σ²) AND variance — fix the bias first.", correct: true },
        ]}
        trap={<>(a) confuses the gap (variance proxy) with overall regime. (b) reads the numbers backwards — A's train 0.10 sits near σ²=0.05 (classic overfit), not bias. (c) is false; B's train is 8× σ², far from noise-limited.</>}
        lens={<>Gap alone is not enough — compare train to σ². A: train near σ² → no bias, big gap → variance. B: train far above σ² → bias AND gap → bias dominates first, add capacity, then re-diagnose.</>}
      />

      <VIS.TrapProblem
        id="mcc-q23"
        difficulty="medium"
        title="Q23 — Where does data augmentation sit on the U-curve?"
        scenario={<><em>Discriminating insight:</em> Augmentation affects one specific component of the decomposition by changing what the effective training set looks like to the learner. Image classification team adds RandAugment to their training pipeline. Train accuracy drops 2 points, test accuracy gains 4 points.</>}
        options={[
          { key: "a", text: "Augmentation effectively multiplies the training set; this shrinks variance at every capacity and shifts the sweet spot RIGHT.", correct: true },
          { key: "b", text: "Augmentation adds bias because the model learns invariances that were absent from the original empirical distribution it trains on." },
          { key: "c", text: "Augmentation acts purely on the optimizer as a form of regularization; the bias-variance decomposition itself is unaffected." },
          { key: "d", text: "Augmentation changes σ² because augmented images carry different label noise; the change in train/test traces a shift in σ²." },
        ]}
        trap={<>(b) treats invariances as bias; learned invariances usually MATCH the test distribution's invariances (rotation, crop), so they do not add systematic error. (c) artificially excludes augmentation from the framework. (d) confuses sample augmentation with label noise.</>}
        lens={<>Augmentation effectively multiplies the training set, shrinking variance at every capacity. This moves the U-curve down and lets higher capacities pay off (sweet spot shifts RIGHT). Train accuracy drops because the model has to fit harder examples; test gains because variance fell.</>}
      />

      <VIS.TrapProblem
        id="mcc-q24"
        difficulty="hard"
        title="Q24 — Validation loss falls monotonically across 8 widths"
        scenario={<><em>Discriminating insight:</em> A monotonically falling validation curve violates the U-curve's basic shape and points to a measurement bug rather than a real regime. You sweep neural-net width 32 → 4096 on a 1k-example dataset. Validation loss falls monotonically across all 8 widths with no visible minimum. The senior asks "what is going on?"</>}
        options={[
          { key: "a", text: "Classical U-curve is wrong for modern networks; width keeps improving things, so there is simply a different sweet spot." },
          { key: "b", text: "Validation set leaked into training, OR the val set is so small its noise dominates — the U-curve is hidden by measurement error.", correct: true },
          { key: "c", text: "You sit in the double-descent regime past the interpolation threshold; keep scaling width until you see a second descent emerge." },
          { key: "d", text: "Variance is zero because the data is essentially noiseless on this task; only bias matters here and larger models do better." },
        ]}
        trap={<>(a) is the over-strong reading of double descent — even in modern regimes, you observe a U then a descent, not zero U. (c) is plausible but: starting at width 32 on 1k examples, the FIRST minimum should still be visible. (d) is invented; few real datasets are noiseless.</>}
        lens={<>When validation does not U-curve on a small dataset, the likely cause is measurement: a tiny val set has noise that swamps signal, or the val set leaked into training augmentations / preprocessing. Audit the split, then re-run. The U-curve is a robust prediction; if you do not see it, suspect measurement.</>}
      />

      <VIS.TrapProblem
        id="mcc-q25"
        difficulty="hard"
        title="Q25 — Reading the curve: which capacity ships?"
        scenario={<><em>Discriminating insight:</em> Practical shipping decisions balance the U-curve minimum against production cost — but only one option respects the curve's geometry and the latency budget together. Three candidates: small (test 0.45, latency 5ms), medium (test 0.32, latency 15ms), large (test 0.31, latency 80ms). Test set 50k samples, CI on test loss ±0.01. Latency budget: p99 ≤ 50ms.</>}
        options={[
          { key: "a", text: "Ship large — the lowest test loss wins regardless of latency; the latency budget can be relaxed or revisited separately later." },
          { key: "b", text: "Ship small — its 5ms latency is best, and the test gap to medium is too small to matter for the operational outcome." },
          { key: "c", text: "Ship medium — its test loss falls inside the 95% CI of large's loss, and it clears the 50ms p99 latency budget cleanly.", correct: true },
          { key: "d", text: "Ship an ensemble of all three — averaging consistently beats individual models, smoothing out U-curve residual variance." },
        ]}
        trap={<>(a) ignores the latency constraint, which is binding (80ms > 50ms budget). (b) misreads the gap — 0.45 vs 0.32 is 13 points, well outside the ±0.01 CI; a real loss difference, not noise. (d) is reflexive — ensembling 3× the latency violates the budget.</>}
        lens={<>Read the U-curve: medium sits near the minimum (loss within noise of large), and meets the production constraint. Large is past the practical sweet spot once you account for latency cost. Small is left of the minimum — bias-limited. Medium ships.</>}
      />
    </VIS.Section>

        + "margin:0;font:12px/1.4 monospace;z-index:10002;";
      pre.textContent = "[visualize] " + (e.error?.stack || e.message || e);
      document.body.appendChild(pre);
    }, true);
  </script>
</body>
</html>
