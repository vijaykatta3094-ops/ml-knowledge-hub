  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          // NO autoGloss here. Glossing terms inside option text leaks the
          // answer mechanism via hover. Authors must keep options self-contained;
          // a candidate who needs a definition can scroll up to the prose where
          // the term is explicitly wrapped via <VIS.Term>.
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// BALD / BatchBALD for fraud queues — Bayesian active learning, joint-MI batch correction.
// Concept-specific anchor: every trap must hinge on BALD's MI decomposition (not margin/entropy),
// BatchBALD's joint-MI (not greedy top-K), or a posterior-approximation gotcha.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · Active learning for fraud labeling"
      title="BALD / BatchBALD for fraud queues"
      subtitle="Bayesian acquisition by mutual information with model parameters — and the joint-MI batch correction that stops K labels from being K copies of the same fraud ring."
      byline={[
        {label: "Papers", value: "Houlsby 2011 (BALD); Kirsch NeurIPS 2019 (BatchBALD)"},
        {label: "Year", value: "2011 / 2019 (KDD 2024 ADS revisit)"},
        {label: "L3", value: "Active learning for fraud labeling"},
      ]}/>

    <VIS.TLDR>
      <VIS.Term def="Bayesian Active Learning by Disagreement. Per-case score = mutual information between the unknown label and the model parameters, NOT predictive entropy.">BALD</VIS.Term>{" "}
      scores cases by `H[y|x,D] &minus; E&#x3B8; H[y|x,&#x3B8;]` — the part of predictive{" "}
      <VIS.Term def="Shannon entropy H[y|x,D] of the predictive distribution after marginalizing the posterior over parameters; total uncertainty about y given the data D.">predictive entropy</VIS.Term>{" "}
      that labeling will actually reduce (<VIS.Term def="Uncertainty from the model not knowing what it doesn't know. Reducible with more data; captured by ensembles or Bayesian methods.">epistemic</VIS.Term>), with{" "}
      <VIS.Term def="Uncertainty from inherent noise in the data. Not reducible with more data.">aleatoric</VIS.Term>{" "}
      noise subtracted out.{" "}
      <VIS.Term def="Bayesian Active Learning by Disagreement, batch-corrected. Acquires K queries that JOINTLY maximize mutual information with model parameters.">BatchBALD</VIS.Term>{" "}
      then corrects greedy top-K's redundancy on ringed fraud by computing{" "}
      <VIS.Term def="MI({y_1,...,y_K}; θ) — info gain on parameters from learning the K-tuple of labels jointly. Less-than-or-equal-to the sum of marginal MIs when labels are correlated.">joint MI</VIS.Term>{" "}
      over the K chosen cases, not sum of marginals.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is — MI between label and parameters, then joint MI for batches">
      <p>
        <VIS.Term def="A loop where the model proposes the next cases to label, an analyst labels them, the model retrains. Used when labels are expensive — typically $5-50/case in fraud.">Active learning</VIS.Term>{" "}
        scores each unlabeled case and asks the analyst to label the top-K. The default{" "}
        <VIS.Term def="The scalar score a(x) used to rank unlabeled cases. Margin, entropy, BALD, BatchBALD, BADGE, core-set are all acquisition functions differing in what they optimize.">acquisition function</VIS.Term>{" "}
        is{" "}
        <VIS.Term def="Score each case by 1 minus the gap between the top-1 and top-2 predicted class probabilities. The case nearest the decision boundary gets the highest score.">margin sampling</VIS.Term>.
        For fraud, margin oversamples members of the same{" "}
        <VIS.Term def="A coordinated group of fraudulent actors/accounts/devices that share features (BIN, device, IP, merchant). Their transactions cluster in feature space, so per-case acquisition picks K near-duplicates.">fraud ring</VIS.Term>{" "}
        (they all sit near the boundary together) — the K queries are near-duplicates.
      </p>
      <p>
        BALD reframes the score as{" "}
        <VIS.Term def="MI(y; θ) = H[y] - E_θ[H[y|θ]]. Measures how much knowing y reduces uncertainty about θ (or vice versa). Symmetric, non-negative, zero iff independent.">mutual information</VIS.Term>{" "}
        between the unknown label `y` and the{" "}
        <VIS.Term def="The probability distribution over parameters after combining the prior with observed data; expresses remaining uncertainty.">posterior</VIS.Term>{" "}
        on model parameters &#x3B8;:
      </p>
      <VIS.Equation display
        tex="\mathrm{BALD}(x) \;=\; \underbrace{H[y \mid x,\mathcal{D}]}_{\text{total predictive entropy}} \;-\; \underbrace{\mathbb{E}_{\theta \sim p(\theta\mid\mathcal{D})}\!\big[H[y \mid x,\theta]\big]}_{\text{average aleatoric (label noise)}}"/>
      <p>
        The difference is the part of predictive entropy that comes from{" "}
        <VIS.Term def="Uncertainty due to limited training data. Shrinks as you collect more labels — this is what active learning can reduce.">epistemic uncertainty</VIS.Term>{" "}
        — exactly the part labeling will reduce.{" "}
        <VIS.Term def="Uncertainty inherent to the data itself — two transactions with identical features can have different labels. Labeling does NOT reduce it.">Aleatoric uncertainty</VIS.Term>{" "}
        gets subtracted out.
      </p>

      <p style={{marginTop: 16}}>
        BatchBALD scores a SET of K queries jointly:
      </p>
      <VIS.Equation display
        tex="\mathrm{BatchBALD}(\{x_1,\dots,x_K\}) \;=\; H[y_1,\dots,y_K \mid x_{1:K},\mathcal{D}] \;-\; \mathbb{E}_{\theta}\!\Big[\sum_i H[y_i \mid x_i,\theta]\Big]"/>
      <p>
        The{" "}
        <VIS.Term def="H[y_1,...,y_K | x_{1:K}, D] — Shannon entropy of the K-dimensional label tuple under the predictive posterior; sub-additive under correlation: equal to the sum of marginals only when labels are conditionally independent.">joint entropy</VIS.Term>{" "}
        `H[y_1,…,y_K | x_&#123;1:K&#125;, D]` is SMALLER than the sum of marginals when labels are correlated (e.g., same fraud ring), so picking a near-duplicate as the 2nd query buys near-zero additional joint MI.{" "}
        <VIS.Term def="Top-K BALD that selects the K cases with the highest per-case BALD score independently. Misses within-batch redundancy; on clustered pools it picks K duplicates.">Greedy top-K BALD</VIS.Term>{" "}
        doesn't see this; BatchBALD does.
      </p>

      <VIS.Mermaid chart={`
flowchart TB
  POOL["Unlabeled fraud pool"]
  POOL --> BAYES["Posterior approx (MC-dropout / ensemble / bagged GBDT)"]
  BAYES --> PERCASE["Per-case BALD: MI(y; theta)"]
  PERCASE --> NAIVE["Greedy top-K: picks duplicates"]
  PERCASE --> JOINT["BatchBALD: joint MI over K-tuple"]
  JOINT --> DIVERSE["Diverse batch of K queries"]
  DIVERSE --> ANALYST["Analyst labels K cases"]
  ANALYST --> RETRAIN["Retrain, update posterior"]
  RETRAIN --> BAYES
  style PERCASE fill:#dbeafe,stroke:#2563eb,stroke-width:2px
  style JOINT fill:#fef3c7,stroke:#d97706,stroke-width:2px
  style NAIVE fill:#fee2e2,stroke:#dc2626,stroke-width:2px
      `} />
      <p>
        Blue = per-case BALD. Yellow = the joint-MI step that makes BatchBALD different from greedy top-K. Red = the failure path most teams trip on. The{" "}
        <VIS.Term def="Approximation of the parameter posterior p(θ|D) needed to compute BALD's expectations over θ. Common choices: MC-dropout (cheap, biased on OOD), deep ensembles (reliable), bagged GBDT (tabular).">posterior approximation</VIS.Term>{" "}
        is the input to the per-case BALD step — without it neither BALD nor BatchBALD is well-defined.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How it differs from margin sampling and greedy top-K BALD">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8, fontSize:14}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Property</th>

            <th style={{padding:"8px 10px", textAlign:"left"}}>BatchBALD</th>
          </tr>
        </thead>
        <tbody>
          <tr style={{background:"#e8f0fa"}}>

            <td style={{padding:"8px 10px"}}>Predictive confidence</td>
            <td style={{padding:"8px 10px"}}>Per-case MI(y; &#x3B8;)</td>
            <td style={{padding:"8px 10px"}}>Joint MI over K-tuple</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Needs posterior on &#x3B8;?</td>
            <td style={{padding:"8px 10px"}}>No</td>

    </VIS.Section>

    <VIS.Section id="sec-limits" title="Limitations and gotchas">
      <VIS.Callout kind="gotcha" title="MC-dropout under-estimates aleatoric on OOD inputs">
        BALD's second term is `E&#x3B8; H[y|x,&#x3B8;]` averaged over posterior samples.{" "}
        <VIS.Term def="Approximate Bayesian inference for neural nets (Gal & Ghahramani 2016): leave dropout ON at inference and treat M stochastic forward passes as posterior samples. Cheap, but the implied posterior is biased on OOD.">MC-dropout</VIS.Term>'s
        posterior is biased — on{" "}
        <VIS.Term def="Out-Of-Distribution. Inputs that fall outside the training distribution; many calibration methods break here.">out-of-distribution</VIS.Term>{" "}
        inputs, dropped masks give nearly the same prediction (network is locally flat), so the second term is too small and BALD over-rates noisy cases. Use a{" "}
        <VIS.Term def="A set of M independently-trained models with different seeds (Lakshminarayanan 2017). Acts as a non-parametric posterior approximation; more reliable than MC-dropout on OOD inputs, costlier at inference.">deep ensemble</VIS.Term>{" "}
        for high-stakes fraud.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="BatchBALD naive joint entropy is O(2^K)">
        Joint entropy over K binary labels enumerates 2^K assignments. Use the Kirsch{" "}
        <VIS.Term def="An estimator that replaces an intractable expectation with an average over random samples; variance shrinks as 1/M. Used in BatchBALD to approximate the joint MI over K-tuples by sampling parameter-label configurations.">MC estimator</VIS.Term>{" "}
        (paper Sec 5) for K under ~100, or{" "}
        <VIS.Term def="An O(K) approximation to BatchBALD: pick the highest-MI case, condition on it being in the batch, pick the next, repeat. Submodular guarantee gives a (1-1/e) bound vs full joint.">sequential-greedy BatchBALD</VIS.Term>{" "}
        (pick best, condition, pick next) for larger K.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="AL contaminates eval — needs a stratified random reserve">
        BALD-acquired labels are systematically harder than random. If they leak into eval,{" "}
        <VIS.Term def="Area Under the ROC Curve. Threshold-free ranking metric; for imbalanced fraud, prefer AUPRC at the operating point you actually ship.">AUC</VIS.Term>{" "}
        drifts as a function of acquisition, not model quality. See the companion visual on{" "}
        <VIS.Term def="A small, randomly sampled holdout from the same pool, stratified by score band so rare classes appear. Frozen and labeled outside the AL loop so eval metrics reflect model quality, not acquisition bias.">stratified random reserves</VIS.Term>.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — concept-specific trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        Every problem hinges on something BALD or BatchBALD-specific: the{" "}
        <VIS.Term def="BALD = H[y|x,D] − E_θ[H[y|x,θ]]. Splits total predictive uncertainty into epistemic (reducible by labels) and aleatoric (irreducible noise); BALD scores only the first.">MI decomposition</VIS.Term>,
        joint-MI batch correction, posterior approximation choice, or the{" "}
        <VIS.Term def="Decomposing total predictive uncertainty into epistemic (model doesn't know — reducible) and aleatoric (data is inherently noisy — irreducible). Labeling reduces only the first.">aleatoric/epistemic split</VIS.Term>.
        Strip the name → option no longer wins.
      </p>

      {/* axis: B2 — sounds reasonable, isn't */}
      <VIS.TrapProblem
        id="bald-p1"
        difficulty="hard"
        title="P1 — Margin sampling wastes the analyst batch on rings. Why specifically?"
        scenario={<><em>Discriminating insight: margin scores each case independently from its own predictive entropy; nothing penalizes label overlap.</em><br/><br/>Your fraud team labels 50/day via margin sampling. After two weeks, analysts say "same merchant over and over"; model gain plateaus. Pick the most precise mechanism.</>}
        options={[
          {key:"a", text:"Margin scores predictive confidence per case independently; ring members share features and cluster near the boundary, so K queries are near-duplicates with overlapping label information.", correct:true},
          {key:"b", text:"Margin sampling is biased toward the majority class; reweight positives 10x to fix."},
          {key:"c", text:"Two weeks is below the warm-up horizon for any AL acquisition function."},
          {key:"d", text:"Analyst label noise is high; margin sampling is sensitive to noise so it picks similar cases."},
        ]}
        trap={<>(b)-(d) name unrelated phenomena. The trap is "label overlap inside the batch," which is invisible to margin's per-case score — it's the property BatchBALD's joint-MI directly addresses.</>}
        lens={<>The fix is batch-aware acquisition. BALD per-case won't help (it's also independent). Only joint-MI methods (BatchBALD, BADGE, core-set) penalize within-batch overlap.</>}
        stretch={<>If your pool has no clustering, would BatchBALD's gain over greedy top-K shrink to zero?</>}
      />

      {/* axis: C2 — loss/objective math */}
      <VIS.TrapProblem
        id="bald-p2"
        difficulty="hard"
        title="P2 — Which term subtracts label noise from BALD?"
        scenario={<><em>Discriminating insight: the SECOND BALD term, the expected per-parameter entropy, captures aleatoric noise that labeling cannot reduce.</em><br/><br/>BALD score on a case is `BALD(x) = A − B`. A label is mostly uninformative because of inherent transaction-data ambiguity. Which term of BALD is supposed to subtract that?</>}
        options={[
          {key:"a", text:"The first term A = H[y|x,D] — total predictive entropy that includes aleatoric."},
          {key:"b", text:"The second term B = E&#x3B8;[H[y|x,&#x3B8;]] — average entropy at fixed parameters, which is aleatoric only.", correct:true},
          {key:"c", text:"Neither — BALD subtracts model uncertainty, not aleatoric."},
          {key:"d", text:"The product A&middot;B — BALD is multiplicative on uncertainty terms."},
        ]}
        trap={<>(a) confuses total with aleatoric. (c) inverts the decomposition: BALD subtracts ALEATORIC (B), so what remains is epistemic. (d) is fabricated.</>}
        lens={<>The decomposition is: total predictive uncertainty = epistemic + aleatoric. BALD = total − aleatoric = epistemic. Margin sampling has only the total — that's why it's fooled by inherently ambiguous cases.</>}
        stretch={<>If your posterior approximation under-estimates B (the aleatoric term), what direction does BALD bias?</>}
      />

      {/* axis: C1 — architectural choice */}
      <VIS.TrapProblem
        id="bald-p3"
        difficulty="medium"
        title="P3 — Can a point-estimate XGBoost compute BALD?"
        scenario={<><em>Discriminating insight: BALD's second term is an expectation over the parameter posterior — a point estimate has no posterior.</em><br/><br/>A junior asks: "Why can't I just use BALD with a regular XGBoost classifier?"</>}
        options={[
          {key:"a", text:"You can — BALD is a property of predictive distributions, not the model. Just use the XGBoost probabilities.",},
          {key:"b", text:"BALD's second term is `E&#x3B8;[H[y|x,&#x3B8;]]` — an expectation over the parameter posterior. A point-estimate XGBoost has no posterior. You need MC-dropout, a deep ensemble, or bagged XGBoost to approximate one.", correct:true},
          {key:"c", text:"BALD is only defined for binary classification with calibrated probabilities, so XGBoost's raw scores would need Platt scaling first."},
          {key:"d", text:"XGBoost is regression-only; BALD is for classification."},
        ]}
        trap={<>(a) collapses BALD to confidence-based AL, which IS margin sampling — and loses the aleatoric/epistemic split. (c) and (d) are non sequiturs.</>}
        lens={<>BALD needs a *posterior* over parameters, not a *better* model. Cheapest in practice: MC-dropout (one network, K forward passes with dropout on). For tabular: bagged XGBoost serves as posterior approximation.</>}
        stretch={<>Bagged XGBoost vs MC-dropout NN as posterior approximation — when does each win for fraud?</>}
      />

      {/* axis: F3 — reverse engineering */}
      <VIS.TrapProblem
        id="bald-p4"
        difficulty="hard"
        title="P4 — BALD=0.65, label adds nothing. Which BALD-specific failure?"
        scenario={<><em>Discriminating insight: under-estimated aleatoric term inflates BALD on label-noisy cases — a specific MC-dropout pathology.</em><br/><br/>You score a case at BALD = 0.65 (high). The analyst labels it as fraud. You retrain. The model barely shifts. The case looked obviously fraud to the analyst (no ambiguity for them, but the underlying transaction feature set is known to have label-noise issues). Diagnose.</>}
        options={[
          {key:"a", text:"BALD always over-rates fraud cases because positives have higher entropy in imbalanced classification."},
          {key:"b", text:"MC-dropout under-estimates the second BALD term (aleatoric) on this region of feature space — so the first term inflates the score, but the label can't tighten the parameter posterior because the underlying noise wasn't truly epistemic.", correct:true},
          {key:"c", text:"BALD doesn't apply to cases the analyst is confident about — it needs ambiguous labels."},
          {key:"d", text:"The model already converged; retraining can't change it regardless of BALD score."},
        ]}
        trap={<>(a) misreads imbalance. (c) confuses analyst confidence (high) with model parameter uncertainty (the BALD score). (d) ignores AL's premise.</>}
        lens={<>The failure is *aleatoric leakage into the first term*: MC-dropout's posterior is too narrow on certain feature regions, so B is under-estimated, A is inflated by noise, and the score reflects noise not info gain. Fix: deep ensemble with 5–10 models.</>}
        stretch={<>How would you DIAGNOSE this in production without labeling more cases?</>}
      />

      {/* axis: B1 — picking the right tool */}
      <VIS.TrapProblem
        id="bald-p5"
        difficulty="hard"
        multiSelect
        title="P5 — Which AL methods actually diversify the batch?"
        scenario={<><em>Discriminating insight: per-case scoring (BALD, margin, entropy) never penalizes within-batch overlap; only joint or representation-diversity methods do.</em><br/><br/>You're documenting AL options. Which explicitly diversify the batch (vs scoring per-case independently)? Select all that apply.</>}
        options={[
          {key:"a", text:"BatchBALD — joint mutual information over the K-tuple.", correct:true},
          {key:"b", text:"BADGE — k-means++ on the model's gradient embeddings.", correct:true},
          {key:"c", text:"Core-set selection — k-center on representation embeddings.", correct:true},
          {key:"d", text:"Greedy top-K BALD (independent per-case scoring)."},
          {key:"e", text:"Greedy top-K margin sampling."},
          {key:"f", text:"Random sampling (diverse by construction, but not actively diversifying)."},
        ]}
        trap={<>(d) is the seductive miss — BALD is information-theoretic, so people assume it diversifies. It does not unless you take the JOINT MI (that's BatchBALD). (f) is uniform-diversity by sampling, not active diversification.</>}
        lens={<>BatchBALD diversifies via JOINT MI (label info). BADGE diversifies via gradient direction. Core-set diversifies via representation coverage. All three address the within-batch overlap problem at different layers.</>}
        stretch={<>For ringed fraud where labels are highly correlated within a ring, which of (a/b/c) is theoretically best, and why?</>}
      />

      {/* axis: C4 — hyperparameter / computational sensitivity */}
      <VIS.TrapProblem
        id="bald-p6"
        difficulty="hard"
        title="P6 — BatchBALD scoring takes 6h at K=100. Which BatchBALD-specific term is exploding?"
        scenario={<><em>Discriminating insight: the joint-entropy term `H[y_1,…,y_K | x_&#123;1:K&#125;,D]` is exponential in K under naive enumeration; the MC estimator drops it to polynomial.</em><br/><br/>Pool=1M cases, K=100. Each round: scoring 6h, training 20 min. Pick the dominant cost.</>}
        options={[
          {key:"a", text:"MC-dropout inference is the bottleneck; reduce dropout samples from 100 to 10."},
          {key:"b", text:"Pool size dominates; sub-sample to 10k cases before scoring."},
          {key:"c", text:"BatchBALD's joint entropy enumerates 2^K assignments naively. Use Kirsch's MC estimator (paper Sec 5) which gives O(K&middot;M&middot;|pool|), tractable for K up to a few hundred.", correct:true},
          {key:"d", text:"Training time is hidden inside scoring; profile to confirm."},
        ]}
        trap={<>(a) reduces posterior fidelity to fix a different problem. (b) is a pragmatic hack but doesn't address the K-exponential cost (even K=100 on 10k pool is intractable naively). (d) misreads the budget.</>}
        lens={<>The 2^K is BatchBALD-specific. Greedy top-K BALD scales linearly in K. The MC estimator samples joint label assignments, reducing exponential to polynomial.</>}
        stretch={<>At what K does sequential-greedy BatchBALD (pick best, condition, pick next) beat the MC joint estimator?</>}
      />

      {/* axis: E6 — eval contamination */}
      <VIS.TrapProblem
        id="bald-p7"
        difficulty="hard"
        title="P7 — BatchBALD propensity reweighting: why marginal-MI propensities blow up at large batch K."
        scenario={<><em>Discriminating insight: BatchBALD's acquisition propensity for case i in batch B is governed by joint MI, not marginal BALD(x_i); using marginal-MI propensities to inverse-weight gives an importance-weight variance that explodes when batch size K grows relative to pool size N (joint-MI selects diverse batches, so marginals undercount the chance the case appears in any batch).</em><br/><br/>You want Horvitz-Thompson reweighting to fix train-set bias from BatchBALD. Engineer A: use marginal BALD(x_i) as the propensity. Engineer B: use the joint-MI inclusion probability of x_i in batch B. K=512, pool N=200k. Pick the BatchBALD-specific concern.</>}
        options={[
          {key:"a", text:"Either propensity is fine — they're proportional."},
          {key:"b", text:"BatchBALD's diversity penalty makes the joint-MI inclusion probability for x_i in batch B DIFFER from marginal BALD(x_i) by a redundancy-correction term. As K/N grows, the marginal-vs-joint gap grows; using marginal-MI propensities in IPW gives importance weights with unbounded variance (some cases have near-zero marginal MI but appear in batches due to diversity; their IPW weight diverges). Must use joint inclusion probabilities, or a clipped marginal approximation with explicit batch-budget bound.", correct:true},
          {key:"c", text:"Use uniform propensity — BatchBALD doesn't change them."},
          {key:"d", text:"Joint-MI inclusion is uncomputable; only marginal works."},
        ]}
        trap={<>(a) ignores the diversity-correction gap. (c) treats BatchBALD as random sampling. (d) is false — joint inclusion is estimable via the same MC samples used in acquisition.</>}
        lens={<>This is a BatchBALD-unique correction: the joint-MI batch construction means propensity for IPW is NOT marginal BALD. The gap is biggest at large K, small N.</>}
        stretch={<>At what K/N ratio does the marginal approximation's IPW variance exceed the joint estimator's by 10x?</>}
      />

      {/* axis: E3 — cold-start operational gotcha */}
      <VIS.TrapProblem
        id="bald-p8"
        difficulty="hard"
        title="P8 — Day 1 of a new product. BALD scores nearly uniform. Why?"
        scenario={<><em>Discriminating insight: BALD's `H[y|x,D] − E&#x3B8; H[y|x,&#x3B8;]` requires a meaningful posterior; at cold-start the posterior is wide everywhere, so MI is uniformly small.</em><br/><br/>1k labels (50 fraud), 5M unlabeled. Train a Bayesian model — posterior variance high everywhere. BALD scores are nearly identical across the pool. What's the cold-start fix?</>}
        options={[
          {key:"a", text:"Increase MC-dropout samples — more samples will spread BALD scores."},
          {key:"b", text:"With a weakly-trained model the posterior is wide everywhere, so per-case MI between label and parameters is small and roughly equal. Bootstrap with random or stratified-by-feature batches for 2-3 cycles, then turn on BALD once the posterior tightens enough to give meaningful disagreement.", correct:true},
          {key:"c", text:"BALD doesn't work below 10k labels; switch permanently to margin sampling."},
          {key:"d", text:"Train a larger model — more capacity will create score differentiation."},
        ]}
        trap={<>(a) more posterior samples of a wide posterior is still a wide posterior. (c) and (d) are overcorrections.</>}
        lens={<>BALD needs disagreement structure. A model that can't disagree about anything has uniform BALD. Cold-start playbook: random/stratified seeding for 2-3 cycles, then BALD.</>}
        stretch={<>What's the diagnostic for "posterior is now informative enough for BALD"?</>}
      />

      {/* axis: A1 — distinguish from sibling */}
      <VIS.TrapProblem
        id="bald-p9"
        difficulty="medium"
        title="P9 — BALD vs max-entropy acquisition: what's the actual difference?"
        scenario={<><em>Discriminating insight: max-entropy uses only the first BALD term; BALD subtracts the second.</em><br/><br/>A colleague claims "BALD and max-entropy AL are the same thing — both pick high-uncertainty cases." True?</>}
        options={[
          {key:"a", text:"True — both reduce to `H[y|x,D]` in practice; the difference is academic."},
          {key:"b", text:"True for binary classification, false for multi-class."},
          {key:"c", text:"False. Max-entropy = `H[y|x,D]` (first BALD term only). BALD = `H[y|x,D] − E&#x3B8;[H[y|x,&#x3B8;]]`. Max-entropy can't tell a confidently-fraud-with-noisy-labels case from a genuinely-uncertain case; BALD subtracts the noise.", correct:true},
          {key:"d", text:"False — BALD is regression-only, max-entropy is classification-only."},
        ]}
        trap={<>(a) misses the decomposition. (b) and (d) introduce dimensions that aren't operative.</>}
        lens={<>This is the canonical confusion. Max-entropy = total uncertainty. BALD = epistemic only. Aleatoric-rich datasets (fraud labels with ambiguity!) reveal the gap.</>}
        stretch={<>Construct a case where max-entropy and BALD pick completely different top-K queries.</>}
      />

      {/* axis: D4 — plausible misattribution */}
      <VIS.TrapProblem
        id="bald-p10"
        difficulty="hard"

        id="bald-p28"
        difficulty="hard"
        title="P28 — BALD-blind adversary: how to design transactions that BALD will NOT query?"
        scenario={<><em>Discriminating insight: BALD scores low when the posterior is confident — an attacker who mimics in-distribution normals lands in the low-BALD region; aleatoric-only ambiguity also scores low (BALD subtracts it).</em><br/><br/>An attacker who has read the AL setup wants their transactions to NEVER be labeled. Pick the strategy that minimizes BALD score on their transactions.</>}
        options={[
          {key:"a", text:"Submit highly ambiguous transactions — high entropy will confuse BALD."},
          {key:"b", text:"Submit transactions that look indistinguishable from in-distribution normal behavior. The posterior is confident on them (low first term, AND low second term — both small). BALD score ≈ 0. Aleatoric-noise mimicry also keeps BALD low because BALD subtracts the second term.", correct:true},
          {key:"c", text:"Submit a fraud ring of 10,000 identical transactions to dilute BatchBALD's diversity penalty."},
          {key:"d", text:"Submit transactions on the decision boundary — that's where BALD is lowest."},
        ]}
        trap={<>(a) raises predictive entropy AND aleatoric — BALD subtracts the latter, so the score depends on epistemic content, not just total entropy. (c) is a BatchBALD-specific attack on diversity, but BALD per-case is unaffected. (d) inverts the meaning.</>}
        lens={<>BALD is hardest to attack when an attacker mimics normal data — both terms collapse together. The defense is to combine BALD with risk-weighted acquisition (label by amount-at-risk regardless of BALD).</>}
        stretch={<>What's the ATTACK COST of producing in-distribution transactions vs out-of-distribution?</>}
      />

      {/* axis: C3 — what's dropped vs baseline */}
      <VIS.TrapProblem
        id="bald-p29"
        difficulty="medium"
        title="P29 — Greedy top-K BALD drops one specific term vs BatchBALD. Which?"
        scenario={<><em>Discriminating insight: greedy top-K BALD uses sum of marginal MIs; BatchBALD replaces it with joint MI, which differs by exactly the within-batch label-overlap term.</em><br/><br/>Pick the precise mathematical difference between greedy top-K BALD and BatchBALD.</>}
        options={[
          {key:"a", text:"BatchBALD adds a regularization term λ&middot;diversity to greedy BALD."},
          {key:"b", text:"BatchBALD replaces `Σ_i MI(y_i; θ)` with `MI({y_1,…,y_K}; θ)`. The difference is the within-batch label-overlap term `Σ_i MI(y_i; θ) − MI({y_1,…,y_K}; θ)`, which is non-negative and zero only under conditional independence.", correct:true},
          {key:"c", text:"BatchBALD multiplies BALD scores by a diversity weight per case."},
          {key:"d", text:"BatchBALD adds a Lagrangian for cluster constraints."},
        ]}
        trap={<>(a)(c)(d) all make up additional structure. The actual difference is sum-of-marginals vs joint, no extra hyperparameter.</>}
        lens={<>Joint MI ≤ sum of marginals (sub-additivity of joint entropy under correlation). Greedy BALD doesn't see the gap.</>}
        stretch={<>What does the gap measure in nats — how would you BOUND it for a fraud pool?</>}
      />

      {/* axis: B4 — when NOT to use */}
      <VIS.TrapProblem
        id="bald-p30"
        difficulty="hard"
        title="P30 — One regime where you should NOT use BALD/BatchBALD at all."
        scenario={<><em>Discriminating insight: when posterior approximation is unreliable AND the operating-point metric is far from the bulk of the posterior, BALD's signal is weak and noisy — random + reserve may dominate.</em><br/><br/>Pick the regime where BALD/BatchBALD is the WRONG choice.</>}
        options={[
          {key:"a", text:"Ringed fraud — too much label correlation for BatchBALD to recover."},
          {key:"b", text:"Cold-start with a weak posterior approximation AND a tail-operating-point KPI (e.g., catch-rate at 0.05% FPR). BALD's information-theoretic gains don't translate to the tail, and a noisy posterior estimate makes BALD scores unreliable. Random + stratified reserve dominates.", correct:true},
          {key:"c", text:"Large label budget (>10k/cycle) — BALD wastes compute."},
          {key:"d", text:"Imbalanced classes — BALD is class-balance-agnostic."},
        ]}
        trap={<>(a) is BatchBALD's sweet spot. (c)(d) misread the regime.</>}
        lens={<>BALD's value is in *posterior info gain*. When posterior approximation is poor (cold-start) and the metric is on a tail (catch-rate at low FPR), the chain from "posterior tightens" → "tail metric improves" is broken. Skip BALD in this regime.</>}
        stretch={<>What's the cheapest experiment that tells you if BALD's chain is broken on your problem?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li>
          <a href="https://arxiv.org/abs/1906.08158" target="_blank" rel="noopener">
            <strong>Kirsch, van Amersfoort, Gal — BatchBALD</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, NeurIPS 2019)</span>
          <br/>The canonical BatchBALD paper. Section 3 (joint mutual information) and Section 5 (<VIS.Term def="An estimator that replaces an intractable expectation with an average over random samples; variance shrinks as 1/M.">MC approximation</VIS.Term>) are the only sections you need for an interview.
        </li>
        <li>
          <a href="https://arxiv.org/abs/1112.5745" target="_blank" rel="noopener">
            <strong>Houlsby, Huszar, Ghahramani, Lengyel — BALD</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, 2011)</span>
          <br/>The original BALD paper. Read for the per-case formula and the MI decomposition; skip the{" "}
          <VIS.Term def="Gaussian Process. A non-parametric Bayesian model with a closed-form posterior over function values; gives BALD an analytic form but doesn't scale to fraud-pool sizes.">GP</VIS.Term>-specific derivations.
        </li>
        <li>
          <a href="https://jacobgil.github.io/deeplearning/activelearning" target="_blank" rel="noopener">
            <strong>Jacob Gildenblat — A practical guide to active learning</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(blog)</span>
          <br/>Practitioner walk-through of margin, BALD, BatchBALD, and{" "}
          <VIS.Term def="Batch Active learning by Diverse Gradient Embeddings (Ash et al. 2020). Diversifies the batch by running k-means++ on per-case gradient embeddings of the loss w.r.t. the final layer.">BADGE</VIS.Term>{" "}
          with code. Build intuition here before reading the papers.
        </li>
        <li>
          <a href="https://stripe.com/blog/how-we-built-it-stripe-radar" target="_blank" rel="noopener">
            <strong>Stripe Engineering — How we built Radar</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(blog)</span>
          <br/>Production fraud-labeling protocol:{" "}
          <VIS.Term def="A loop where the model proposes the next cases to label, an analyst labels them, the model retrains. Used when labels are expensive — typically $5-50/case in fraud.">AL</VIS.Term>{" "}
          for training + stratified random reserve for eval. Why the protocol matters as much as the model.
        </li>
        <li>
          <a href="https://www.youtube.com/watch?v=Qv6UVOQXTL4" target="_blank" rel="noopener">
            <strong>Yarin Gal — Bayesian Deep Learning (Cambridge lecture)</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(video)</span>
          <br/>The MC-dropout = approximate{" "}
          <VIS.Term def="Inference framework that maintains a posterior distribution over parameters rather than a point estimate. Required for BALD because its second term is an expectation over the parameter posterior.">Bayesian</VIS.Term>{" "}
          view that makes BALD tractable on neural nets. ~50 min; watch at 1.5x.
        </li>
      </ul>
    </VIS.Section>
  </main>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
