        scenario={<><em>Discriminating insight: BatchBALD optimizes parameter-info gain, NOT fraud catch rate; the two correlate only when the model's epistemic uncertainty is on the fraud-decision boundary.</em><br/><br/>You shipped BatchBALD. Analyst label spend is unchanged, model log-likelihood improved 8%, but fraud catch rate is flat. Which cause is most likely?</>}
        options={[
          {key:"a", text:"BatchBALD is broken; the joint MI estimate is converging to greedy BALD."},
          {key:"b", text:"BatchBALD optimizes posterior tightness, not the metric your business cares about. The labels reduced parameter uncertainty in a region OFF the fraud-decision boundary, so the operating-point performance (catch rate at the threshold) didn't move even though log-likelihood did.", correct:true},
          {key:"c", text:"Fraud catch rate is noisy; rerun for 3 more months."},
          {key:"d", text:"BatchBALD requires labeled positives to work; the team labeled too many negatives."},
        ]}
        trap={<>(a) and (d) are technical-but-wrong. (c) hand-waves.</>}
        lens={<>BALD/BatchBALD are *information-theoretic* objectives; the *business metric* (catch rate at threshold) is a *decision-theoretic* objective. Mismatch is common. Fix: use a decision-aware acquisition (expected error reduction, Bayesian active risk minimization).</>}
        stretch={<>What's the cheapest modification to BALD that makes it decision-aware?</>}
      />

      {/* axis: C5 — data assumption */}
      <VIS.TrapProblem
        id="bald-p11"
        difficulty="hard"
        title="P11 — When does BatchBALD's joint-MI gain over greedy BALD shrink to zero?"
        scenario={<><em>Discriminating insight: joint MI = sum of marginals when labels are conditionally independent given posterior; that condition holds on i.i.d. pools without ring structure.</em><br/><br/>A theorist insists "BatchBALD always beats greedy BALD." Build a counterexample.</>}
        options={[
          {key:"a", text:"A pool where every example is identical — both methods pick the same single point K times."},
          {key:"b", text:"A pool of i.i.d. samples with no within-batch label correlation given the parameters: joint MI = sum of marginals exactly, so greedy BALD == BatchBALD. The gain is structural, not free.", correct:true},
          {key:"c", text:"A pool where all cases are very high entropy."},
          {key:"d", text:"A pool labeled by a perfect oracle — no AL method matters."},
        ]}
        trap={<>(a) is technically true but degenerate. (c) and (d) describe regimes where AL is hard but BatchBALD doesn't lose its advantage from those alone.</>}
        lens={<>BatchBALD's benefit is the joint-entropy CORRECTION for label overlap. Without overlap (i.i.d. pool), there's nothing to correct. This is why BatchBALD shines on ringed fraud and flatlines on clean i.i.d. data.</>}
        stretch={<>How would you measure within-batch label overlap empirically before deciding BALD vs BatchBALD?</>}
      />

      {/* axis: D1 — intuitive but wrong */}
      <VIS.TrapProblem
        id="bald-p12"
        difficulty="medium"
        title="P12 — "BALD picks the cases the model is least confident on." True?"
        scenario={<><em>Discriminating insight: BALD picks cases where the parameter posterior most DISAGREES — not where the marginal predictive distribution has highest entropy.</em><br/><br/>Quick check. A teammate says: "BALD is just picking the cases the model is least confident on." Is this an accurate summary?</>}
        options={[
          {key:"a", text:"Yes — BALD is a confidence-based AL method."},
          {key:"b", text:"Yes for the first term, but the full BALD score adds a bonus for high-confidence cases that posterior samples disagree about."},
          {key:"c", text:"No. The marginal predictive distribution can have high entropy from aleatoric label noise — those cases LOOK uncertain but labeling them won't tighten the posterior. BALD scores cases where the POSTERIOR SAMPLES disagree (epistemic), not where the marginal is uncertain.", correct:true},
          {key:"d", text:"No — BALD is a regression method."},
        ]}
        trap={<>(a) is the common simplification you'll hear from juniors. (b) is plausible but wrong directionally — BALD subtracts the aleatoric contribution, doesn't add. (d) is silly.</>}
        lens={<>The simplification "least confident" is wrong because it doesn't distinguish two sources of low confidence: noisy labels (aleatoric) vs not-enough-data (epistemic). BALD targets the second.</>}
        stretch={<>For tabular fraud, is aleatoric high or low? What does that mean for BALD vs margin?</>}
      />

      {/* axis: F4 — paper-named failure */}
      <VIS.TrapProblem
        id="bald-p13"
        difficulty="hard"
        title="P13 — Kirsch et al. flag a specific weakness of their joint-MI estimator. Which?"
        scenario={<><em>Discriminating insight: the MC estimator's variance grows with the number of posterior samples M; small M makes BatchBALD ≈ BALD.</em><br/><br/>The BatchBALD paper itself calls out one practical bottleneck in the joint-MI MC estimator. Which?</>}
        options={[
          {key:"a", text:"The estimator is biased low — joint MI is systematically under-estimated, so BatchBALD underestimates batch redundancy."},
          {key:"b", text:"The estimator has high variance when M (posterior samples) is small; in the small-M regime BatchBALD reduces to greedy BALD in practice.", correct:true},
          {key:"c", text:"The estimator only works for binary classification."},
          {key:"d", text:"The estimator requires the pool size to be exponential in K."},
        ]}
        trap={<>(a) is a plausible-sounding miss (the bias isn't the named issue; variance is). (c) and (d) are fabricated.</>}
        lens={<>Calibration of the second-term aleatoric estimate is the practical bottleneck. Production: use M >= 100. With M=10 BatchBALD's joint correction is noisy.</>}
        stretch={<>Could you reduce M by changing the prior, the architecture, or the loss?</>}
      />

      {/* axis: E1 — production gotcha */}
      <VIS.TrapProblem
        id="bald-p14"
        difficulty="medium"
        title="P14 — Posterior approximation choice for production BALD"
        scenario={<><em>Discriminating insight: MC-dropout is cheap but biased on OOD; deep ensembles are slower but more reliable; bagged GBDT works for tabular.</em><br/><br/>Pick the posterior approximation for a payments fraud team scoring 1M cases/day.</>}
        options={[
          {key:"a", text:"MC-dropout with 10 forward passes — cheapest, sufficient for production."},
          {key:"b", text:"Single point-estimate model — use predicted probability as posterior approximation."},
          {key:"c", text:"Deep ensemble of 5-10 models — slower at inference but the most reliable posterior; payment fraud has plenty of OOD cases where MC-dropout under-estimates uncertainty. Bagged XGBoost is the GBDT-side equivalent.", correct:true},
          {key:"d", text:"Variational Bayesian NN with mean-field approximation — strictly better than ensembles."},
        ]}
        trap={<>(a) MC-dropout is biased on OOD and high-stakes fraud has OOD. (b) collapses to margin. (d) mean-field VI under-estimates correlations and gives wrong BALD on multi-modal posteriors.</>}
        lens={<>Ensembles vs MC-dropout is a calibration vs cost tradeoff. The empirically defensible default for fraud is 5–10 model deep ensemble (Lakshminarayanan et al. 2017).</>}
        stretch={<>How would you BENCHMARK whether your posterior is well-calibrated enough for BALD?</>}
      />

      {/* axis: A4 — composition with sibling */}
      <VIS.TrapProblem
        id="bald-p15"
        difficulty="hard"
        title="P15 — BatchBALD MC-estimator with M samples meets stratified pool sampling. Variance composition?"
        scenario={<><em>Discriminating insight: BatchBALD's joint-MI is approximated by a Monte Carlo estimator with M parameter samples; when the candidate pool is also stratified (e.g., by score band), the per-stratum joint-MI estimate inherits BOTH MC variance and stratum-size variance, and they COMPOUND — the effective standard error is sqrt(sigma_MC&sup2;/M + sigma_strat&sup2;/n_s), not max of the two. Naive M tuning ignores n_s.</em><br/><br/>You scale BatchBALD to a 50M pool by first stratifying the pool by predicted-score decile (sample n_s = 5k per stratum), then running BatchBALD on the union. You tune M = 100 MC samples by checking variance on the full pool. Why does the rare-stratum batch ranking still look noisy?</>}
        options={[
          {key:"a", text:"Increase M to 1000 — that fixes it."},
          {key:"b", text:"Switch to greedy top-K BALD instead of BatchBALD."},
          {key:"c", text:"Per-stratum joint-MI variance has TWO compounding sources: the MC estimator's sigma_MC&sup2;/M AND the stratum-subsampling sigma_strat&sup2;/n_s. Tuning M on the full pool sets sigma_MC&sup2;/M small relative to marginal sigma_strat&sup2; across strata, but inside the rare stratum n_s is small so its sigma_strat&sup2;/n_s dominates and MC noise is the wrong knob. Fix: per-stratum n_s budget proportional to sigma_strat, OR couple MC samples across candidates in the same stratum (common-random-numbers) to cancel sigma_MC contribution to rankings.", correct:true},
          {key:"d", text:"MC variance and stratum variance don't compound — the larger one dominates."},
        ]}
        trap={<>(a) increases M but ignores n_s. (b) abandons batch diversity. (d) is the classical 'max-of-two' misread; for variance of a difference they actually ADD.</>}
        lens={<>BatchBALD's MC joint-MI estimator interacts non-trivially with stratified pool sampling. Both variance sources contribute to the rank-ordering noise; common-random-numbers across candidates is the cheap fix.</>}
        stretch={<>Derive the M-vs-n_s tradeoff curve for fixed compute budget M*n_s.</>}
      />

      {/* axis: F2 — adversarial */}
      <VIS.TrapProblem
        id="bald-p16"
        difficulty="hard"
        title="P16 — An attacker floods the pool with 10,000 near-duplicate transactions. What does BatchBALD do?"
        scenario={<><em>Discriminating insight: BatchBALD's joint-MI correctly recognizes the 10,000 cases as redundant — labels only 1 — which is the WRONG operational answer if the attacker is using the diversity penalty as evasion.</em><br/><br/>Adversarial pool: an attacker submits 10,000 near-identical transactions to evade detection. What happens with BatchBALD on this pool?</>}
        options={[
          {key:"a", text:"BatchBALD labels all 10,000 because they're all near the boundary."},
          {key:"b", text:"BatchBALD labels 1 (joint-MI correctly identifies the 9,999 as redundant) — analyst sees one card-not-present and the model trains; but the attacker successfully evaded scrutiny on 9,999. Joint-MI diversity penalty is also an attack surface.", correct:true},
          {key:"c", text:"BatchBALD ignores the duplicates because they have low individual BALD score."},
          {key:"d", text:"BatchBALD requires labels to disambiguate; no behavior change."},
        ]}
        trap={<>(a) describes margin sampling, not BatchBALD. (c) and (d) are wrong about the mechanism.</>}
        lens={<>BatchBALD's joint-MI correction is *exactly* the property an attacker exploits. Defense: combine with risk-weighted acquisition (label by amount-at-risk) or cluster-cap (label N per cluster regardless of BALD).</>}
        stretch={<>Could you modify BatchBALD to be ATTACK-AWARE without losing the joint-MI benefit?</>}
      />

      {/* axis: D3 — senior vs junior signal */}
      <VIS.TrapProblem
        id="bald-p17"
        difficulty="hard"
        multiSelect
        title="P17 — Junior says "we use BALD." What does a senior follow up with?"
        scenario={<><em>Discriminating insight: BALD vs BatchBALD, posterior approximation, aleatoric handling, and eval design are four orthogonal decisions each hiding a system-design choice.</em><br/><br/>Select all questions a senior would ask next.</>}
        options={[
          {key:"a", text:"Greedy top-K or BatchBALD with joint MI?", correct:true},
          {key:"b", text:"What's your posterior approximation — MC-dropout, ensemble, or bagged GBDT?", correct:true},
          {key:"c", text:"How are you handling aleatoric leakage — is the second BALD term reliable?", correct:true},
          {key:"d", text:"How does your eval set stay unbiased — frozen holdout or stratified random reserve?", correct:true},
          {key:"e", text:"What's the depth of your Bayesian NN?"},
          {key:"f", text:"Did you use Adam or AdamW?"},
        ]}
        trap={<>(e) and (f) are noise — neither hinges on a BALD-design decision.</>}
        lens={<>Each of (a)-(d) is a different shipped system. Saying "we use BALD" without specifying any of them is exactly the under-specified answer that fails senior interviews.</>}
        stretch={<>Which of (a)-(d) does the team most often skip in practice?</>}
      />

      {/* axis: C2 — sequential greedy alternative */}
      <VIS.TrapProblem
        id="bald-p18"
        difficulty="hard"
        title="P18 — Sequential-greedy BatchBALD: what does each step add?"
        scenario={<><em>Discriminating insight: sequential greedy conditions on already-picked queries, so each subsequent pick maximizes MARGINAL joint MI given the prefix — cheaper than full joint MC.</em><br/><br/>Sequential-greedy BatchBALD picks one query, then picks the next conditioned on the first being in the batch, then the third conditioned on the first two. Why does this approximate the full joint?</>}
        options={[
          {key:"a", text:"It's exactly equal to greedy top-K BALD because of the chain rule of entropy."},
          {key:"b", text:"Each conditional pick adds the marginal joint MI given the prefix: `MI(y_k; θ | x_k, D, y_{1:k-1}, x_{1:k-1})`. This naturally subtracts overlap with already-chosen queries; it's a submodular approximation to the joint that costs O(K) per round, not O(2^K).", correct:true},
          {key:"c", text:"It under-approximates the joint MI by a constant factor that you can bias-correct."},
          {key:"d", text:"It's a heuristic with no information-theoretic guarantee."},
        ]}
        trap={<>(a) confuses conditioning with marginalization. (c) over-claims. (d) under-claims — there IS a submodularity argument.</>}
        lens={<>Sequential-greedy is the production-friendly variant. Submodularity of joint MI (Krause & Guestrin 2007) gives a (1 − 1/e) approximation guarantee. Most teams ship this rather than the full MC joint estimator.</>}
        stretch={<>For what K is sequential-greedy provably bad?</>}
      />

      {/* axis: B2 — sounds reasonable, isn't */}
      <VIS.TrapProblem
        id="bald-p19"
        difficulty="medium"
        title="P19 — "Increase dropout rate to make BALD scores more dispersed." Right or wrong?"
        scenario={<><em>Discriminating insight: dropout rate trades off posterior fidelity vs collapse; tuning it to maximize BALD-score dispersion optimizes the wrong objective.</em><br/><br/>BALD scores are clustered too tightly. A teammate suggests cranking MC-dropout rate up to 0.5 to spread them out.</>}
        options={[
          {key:"a", text:"Wrong — but for the right reason: higher dropout means a worse base model, so BALD scores are dispersed but uninformative."},
          {key:"b", text:"Wrong: dropout rate controls posterior WIDTH, not BALD score dispersion. Cranking it up makes the posterior too wide → both BALD terms inflate together → score differences (epistemic vs aleatoric) collapse. The fix for clustered scores is more posterior samples or a deep ensemble.", correct:true},
          {key:"c", text:"Right — higher dropout = more posterior samples behavior = better BALD."},
          {key:"d", text:"Right — dropout rate is the only knob for BALD score scale."},
        ]}
        trap={<>(a) is *correct-ish* but the mechanism it names (model quality) isn't the dominant one. (c) and (d) misread dropout's role.</>}
        lens={<>Dropout rate determines the implicit prior on parameter variance — not directly the BALD score. To genuinely spread BALD scores you need a posterior that has more between-sample disagreement on hard cases vs easy ones, which is what ensembles give.</>}
        stretch={<>Could you choose dropout rate by CALIBRATING the second BALD term against a held-out aleatoric estimate?</>}
      />

      {/* axis: A3 — counterfactual */}
      <VIS.TrapProblem
        id="bald-p20"
        difficulty="hard"
        title="P20 — Counterfactual: no BatchBALD, only margin sampling. Quantify the cost."
        scenario={<><em>Discriminating insight: the cost is dominated by labeled-batch redundancy at fixed K, scaling with intra-batch label correlation — NOT generic AL inefficiency.</em><br/><br/>Suppose BatchBALD vanished tomorrow and your only option is margin sampling. Quantify the concrete cost in three dimensions.</>}
        options={[
          {key:"a", text:"(1) Labels per real signal: 3-10x worse on ringed fraud pools — the margin batch has K duplicates, so unique fraud rings labeled per cycle drops K/cluster_size. (2) Time to model improvement: scales with redundancy factor. (3) Aleatoric leakage into AL choice: margin can't subtract it.", correct:true},
          {key:"b", text:"(1) GPU memory: 10x more. (2) Inference latency: 5x slower. (3) Storage: 2x more."},
          {key:"c", text:"(1) Recall: drops 20pp. (2) Precision: drops 15pp. (3) F1: drops 18pp — irrespective of pool structure."},
          {key:"d", text:"No cost — margin sampling is empirically equivalent on fraud."},
        ]}
        trap={<>(b) is wrong-axis. (c) gives a specific delta that doesn't depend on pool structure (suspect). (d) is the cope.</>}
        lens={<>The counterfactual cost is structural: redundancy. On i.i.d. pools margin and BatchBALD converge; on clustered fraud BatchBALD's gain is multiplicative in the ring size.</>}
        stretch={<>Above what cluster size does BatchBALD's gain over margin exceed the engineering cost?</>}
      />

      {/* axis: F1 — edge case */}
      <VIS.TrapProblem
        id="bald-p21"
        difficulty="medium"
        title="P21 — K=1 BatchBALD vs K=1 BALD."
        scenario={<><em>Discriminating insight: at K=1 there's no joint MI to compute — BatchBALD reduces mathematically to BALD.</em><br/><br/>Your batch size is K=1 (one label per round). Which is provably true?</>}
        options={[
          {key:"a", text:"BatchBALD with K=1 is identical to BALD with K=1. Joint MI over a singleton is just the marginal MI.", correct:true},
          {key:"b", text:"BatchBALD with K=1 still has a regularization benefit over BALD."},
          {key:"c", text:"BatchBALD with K=1 is faster than BALD because it skips the joint computation."},
          {key:"d", text:"BatchBALD doesn't define a K=1 case."},
        ]}
        trap={<>(b) makes up regularization that isn't in the paper. (c) is true compute-wise but not the asked property. (d) is wrong.</>}
        lens={<>BatchBALD's gain over BALD vanishes at K=1. The diversity benefit grows with K (up to where MC estimator variance dominates).</>}
        stretch={<>What's the smallest K where you'd actually choose BatchBALD over BALD in practice?</>}
      />

      {/* axis: A2 — definitional trap */}
      <VIS.TrapProblem
        id="bald-p22"
        difficulty="hard"
        title="P22 — BALD vs Expected Error Reduction (EER): are they the same?"
        scenario={<><em>Discriminating insight: BALD optimizes parameter info gain; EER optimizes expected reduction in a task-specific loss. They diverge when the boundary doesn't align with the posterior's most-uncertain region.</em><br/><br/>A colleague claims "BALD is the same as Expected Error Reduction." Diagnose.</>}
        options={[
          {key:"a", text:"True — both reduce uncertainty."},
          {key:"b", text:"False. BALD = MI(y; θ): how much labeling reduces parameter uncertainty. EER = expected reduction in model's task error (e.g., 0/1 loss). The two diverge when the task threshold is away from the posterior's high-disagreement region — common in imbalanced fraud where the operating point is in a tail.", correct:true},
          {key:"c", text:"False — EER is theoretical, BALD is empirical."},
          {key:"d", text:"True for binary classification, false for multi-class."},
        ]}
        trap={<>(a) elides the objective. (c) and (d) are wrong dimensions.</>}
        lens={<>BALD ≠ EER. For decision-aware AL, prefer EER variants (Bayesian Active Risk Minimization) at the cost of harder estimation.</>}
        stretch={<>Could you APPROXIMATE EER using BALD with a posterior-weighted threshold integration?</>}
      />

      {/* axis: E4 — rollout / migration */}
      <VIS.TrapProblem
        id="bald-p23"
        difficulty="hard"
        title="P23 — Migrate from margin sampling to BatchBALD. Order the rollout phases."
        scenario={<><em>Discriminating insight: rollout must establish the posterior approximation and the stratified reserve BEFORE turning on joint-MI acquisition, or you can't measure the lift.</em><br/><br/>Phases: (1) Add posterior approximation (ensemble), (2) Add stratified random reserve to eval, (3) Switch from margin to greedy-BALD, (4) Switch from greedy-BALD to BatchBALD. Pick the rollout order.</>}
        options={[
          {key:"a", text:"(4) → (3) → (2) → (1): start with the most-impactful change."},
          {key:"b", text:"(1) → (3) → (4) → (2): build the model side first, then add eval."},
          {key:"c", text:"(2) → (1) → (3) → (4): freeze unbiased eval (2) FIRST; then add posterior (1); then turn on greedy-BALD (3) and validate the lift on the frozen reserve; finally switch to BatchBALD (4) and again measure lift.", correct:true},
          {key:"d", text:"Roll them all out simultaneously; one round of A/B."},
        ]}
        trap={<>(a) lacks measurement scaffolding. (b) delays eval — can't measure lift. (d) is multi-variable, can't attribute.</>}
        lens={<>The rollout order is determined by what's MEASURABLE at each step. Without (2) you can't measure (3) or (4). Without (1) you can't compute BALD at all.</>}
        stretch={<>What metric specifically tells you greedy-BALD → BatchBALD added value beyond margin → greedy-BALD?</>}
      />

      {/* axis: F5 — community follow-up */}
      <VIS.TrapProblem
        id="bald-p24"
        difficulty="hard"
        title="P24 — Kirsch et al. (NeurIPS 2019) reported BatchBALD gains on MNIST. Why are fraud-team gains often smaller?"
        scenario={<><em>Discriminating insight: MNIST has independent class-balanced batches; fraud has correlated within-batch (rings) AND class imbalance — both shift the operating regime where BatchBALD's joint correction matters.</em><br/><br/>Pick the dominant reason fraud-team BatchBALD gains shrink vs MNIST.</>}
        options={[
          {key:"a", text:"Fraud has lower aleatoric noise."},
          {key:"b", text:"MNIST experiments use small K; production fraud uses K=100+ where the MC estimator dominates the gain."},
          {key:"c", text:"Operating-point mismatch: BatchBALD optimizes joint info gain over labels, but fraud KPIs are at a tail of the score distribution (catch-rate at 0.1% FPR); BatchBALD's gains in the bulk of the posterior may not move the tail-operating-point metric.", correct:true},
          {key:"d", text:"Fraud data is tabular and BatchBALD is image-only."},
        ]}
        trap={<>(a) misreads aleatoric direction. (b) describes a different effect (MC variance), not the main one. (d) is fabricated.</>}
        lens={<>The fraud-vs-MNIST gap is largely about *what metric you're maximizing*. BatchBALD shines on log-likelihood gains and faceplants on tail-operating-point gains.</>}
        stretch={<>How would you re-formulate BatchBALD to target tail-operating-point fraud KPIs?</>}
      />

      {/* axis: D2 — wrong-assumption cascade */}
      <VIS.TrapProblem
        id="bald-p25"
        difficulty="hard"
        multiSelect
        title="P25 — "BatchBALD just means train more models." Trace the wrong assumptions."
        scenario={<><em>Discriminating insight: BatchBALD is not "more models" — it's a JOINT acquisition function, orthogonal to posterior approximation. The "more models" intuition causes 3 cascading errors.</em><br/><br/>A teammate says "BatchBALD basically means train a deep ensemble — that's the part that helps." Which downstream consequences follow from this misreading? Select all that apply.</>}
        options={[
          {key:"a", text:"They'll buy a bigger ensemble (say M=20) and skip the joint-MI computation, expecting the gain.", correct:true},
          {key:"b", text:"They'll over-allocate eng time to posterior approximation and under-allocate to the joint-MI MC estimator.", correct:true},
          {key:"c", text:"When BatchBALD performance flatlines, they'll blame the posterior, not the acquisition function.", correct:true},
          {key:"d", text:"They'll switch from MC-dropout to MCMC-NN as a fix."},
          {key:"e", text:"They'll re-derive the chain rule of entropy."},
        ]}
        trap={<>(d) is plausible but downstream from the same misreading; not a CASCADE error per se. (e) is unrelated.</>}
        lens={<>The misreading "BatchBALD = more models" causes (a)(b)(c). The fix is to clarify: posterior approximation is ONE input; joint MI over the K-tuple is the SECOND, independent input. Both are necessary.</>}
        stretch={<>What single experiment isolates the joint-MI contribution from the posterior contribution?</>}
      />

      {/* axis: A5 — boundary with sibling */}
      <VIS.TrapProblem
        id="bald-p26"
        difficulty="hard"
        title="P26 — At what cluster size does BatchBALD beat BADGE?"
        scenario={<><em>Discriminating insight: BADGE diversifies in gradient space; BatchBALD diversifies in label-info space. They diverge when gradients are similar across the cluster but labels are NOT (or vice versa).</em><br/><br/>BatchBALD and BADGE both diversify the batch. Pick the regime where BatchBALD beats BADGE.</>}
        options={[
          {key:"a", text:"BatchBALD always wins because joint MI is information-theoretically optimal."},
          {key:"b", text:"BADGE always wins because gradient diversity is cheaper to compute."},
          {key:"c", text:"BatchBALD wins when cluster members have *similar gradients* (BADGE thinks they're already diverse and picks them anyway) but *correlated labels under the posterior* (BatchBALD penalizes them). Common when the model is in a flat-loss region.", correct:true},
          {key:"d", text:"They are mathematically equivalent."},
        ]}
        trap={<>(a)(b)(d) all assume one universally dominates. The interesting answer is *when do they disagree*.</>}
        lens={<>BADGE and BatchBALD diversify on different axes. Local-loss flat regions cause gradient collapse → BADGE under-diversifies → BatchBALD's label-info diversification wins. Use BADGE when posteriors are unreliable; BatchBALD when gradients are unreliable.</>}
        stretch={<>How would you HYBRIDIZE BatchBALD and BADGE in one acquisition function?</>}
      />

      {/* axis: E5 — reproducibility */}
      <VIS.TrapProblem
        id="bald-p27"
        difficulty="medium"
        title="P27 — Reproducing Kirsch et al.'s BatchBALD numbers — which detail must match?"
        scenario={<><em>Discriminating insight: the paper's gains require M ≥ 100 posterior samples AND the specific joint-MI MC estimator; smaller M collapses BatchBALD to BALD.</em><br/><br/>Pick the detail you MUST match to reproduce the BatchBALD paper's reported gains.</>}
        options={[
          {key:"a", text:"Same model architecture (LeNet for MNIST)."},
          {key:"b", text:"Same dataset and seed."},
          {key:"c", text:"M ≥ 100 posterior samples in the MC joint-entropy estimator. With M=10 (common to save compute), BatchBALD's joint correction is too noisy and the method reduces to greedy BALD.", correct:true},
          {key:"d", text:"Same optimizer (Adam vs SGD)."},
        ]}
        trap={<>(a)(b)(d) matter generically but aren't BatchBALD-specific. The M parameter is the BatchBALD-specific reproducibility lever.</>}
        lens={<>BatchBALD's joint-MI MC estimator has variance inversely proportional to M. Below M=100, joint MI ≈ sum of marginals (noisy) → behavior collapses to greedy BALD.</>}
        stretch={<>Could you reduce the M requirement with control variates or a different MC scheme?</>}
      />

      {/* axis: F2 — alternative adversarial */}
      <VIS.TrapProblem
        id="bald-p28"
        difficulty="hard"
        title="P28 — BALD-blind adversary: how to design transactions that BALD will NOT query?"
        scenario={<><em>Discriminating insight: BALD scores low when the posterior is confident — an attacker who mimics in-distribution normals lands in the low-BALD region; aleatoric-only ambiguity also scores low (BALD subtracts it).</em><br/><br/>An attacker who has read the AL setup wants their transactions to NEVER be labeled. Pick the strategy that minimizes BALD score on their transactions.</>}
        options={[
          {key:"a", text:"Submit highly ambiguous transactions — high entropy will confuse BALD."},
          {key:"b", text:"Submit transactions that look indistinguishable from in-distribution normal behavior. The posterior is confident on them (low first term, AND low second term — both small). BALD score ≈ 0. Aleatoric-noise mimicry also keeps BALD low because BALD subtracts the second term.", correct:true},
          {key:"c", text:"Submit a fraud ring of 10,000 identical transactions to dilute BatchBALD's diversity penalty."},
          {key:"d", text:"Submit transactions on the decision boundary — that's where BALD is lowest."},
        ]}
        trap={<>(a) raises predictive entropy AND aleatoric — BALD subtracts the latter, so the score depends on epistemic content, not just total entropy. (c) is a BatchBALD-specific attack on diversity, but BALD per-case is unaffected. (d) inverts the meaning.</>}
        lens={<>BALD is hardest to attack when an attacker mimics normal data — both terms collapse together. The defense is to combine BALD with risk-weighted acquisition (label by amount-at-risk regardless of BALD).</>}
        stretch={<>What's the ATTACK COST of producing in-distribution transactions vs out-of-distribution?</>}
      />

      {/* axis: C3 — what's dropped vs baseline */}
      <VIS.TrapProblem
        id="bald-p29"
        difficulty="medium"
        title="P29 — Greedy top-K BALD drops one specific term vs BatchBALD. Which?"
        scenario={<><em>Discriminating insight: greedy top-K BALD uses sum of marginal MIs; BatchBALD replaces it with joint MI, which differs by exactly the within-batch label-overlap term.</em><br/><br/>Pick the precise mathematical difference between greedy top-K BALD and BatchBALD.</>}
        options={[
          {key:"a", text:"BatchBALD adds a regularization term λ&middot;diversity to greedy BALD."},
          {key:"b", text:"BatchBALD replaces `Σ_i MI(y_i; θ)` with `MI({y_1,…,y_K}; θ)`. The difference is the within-batch label-overlap term `Σ_i MI(y_i; θ) − MI({y_1,…,y_K}; θ)`, which is non-negative and zero only under conditional independence.", correct:true},
          {key:"c", text:"BatchBALD multiplies BALD scores by a diversity weight per case."},
          {key:"d", text:"BatchBALD adds a Lagrangian for cluster constraints."},
        ]}
        trap={<>(a)(c)(d) all make up additional structure. The actual difference is sum-of-marginals vs joint, no extra hyperparameter.</>}
        lens={<>Joint MI ≤ sum of marginals (sub-additivity of joint entropy under correlation). Greedy BALD doesn't see the gap.</>}
        stretch={<>What does the gap measure in nats — how would you BOUND it for a fraud pool?</>}
      />

      {/* axis: B4 — when NOT to use */}
      <VIS.TrapProblem
        id="bald-p30"
        difficulty="hard"
        title="P30 — One regime where you should NOT use BALD/BatchBALD at all."
        scenario={<><em>Discriminating insight: when posterior approximation is unreliable AND the operating-point metric is far from the bulk of the posterior, BALD's signal is weak and noisy — random + reserve may dominate.</em><br/><br/>Pick the regime where BALD/BatchBALD is the WRONG choice.</>}
        options={[
          {key:"a", text:"Ringed fraud — too much label correlation for BatchBALD to recover."},
          {key:"b", text:"Cold-start with a weak posterior approximation AND a tail-operating-point KPI (e.g., catch-rate at 0.05% FPR). BALD's information-theoretic gains don't translate to the tail, and a noisy posterior estimate makes BALD scores unreliable. Random + stratified reserve dominates.", correct:true},
          {key:"c", text:"Large label budget (>10k/cycle) — BALD wastes compute."},
          {key:"d", text:"Imbalanced classes — BALD is class-balance-agnostic."},
        ]}
        trap={<>(a) is BatchBALD's sweet spot. (c)(d) misread the regime.</>}
        lens={<>BALD's value is in *posterior info gain*. When posterior approximation is poor (cold-start) and the metric is on a tail (catch-rate at low FPR), the chain from "posterior tightens" → "tail metric improves" is broken. Skip BALD in this regime.</>}
        stretch={<>What's the cheapest experiment that tells you if BALD's chain is broken on your problem?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li>
          <a href="https://arxiv.org/abs/1906.08158" target="_blank" rel="noopener">
            <strong>Kirsch, van Amersfoort, Gal — BatchBALD</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, NeurIPS 2019)</span>
          <br/>The canonical BatchBALD paper. Section 3 (joint mutual information) and Section 5 (MC approximation) are the only sections you need for an interview.
        </li>
        <li>
          <a href="https://arxiv.org/abs/1112.5745" target="_blank" rel="noopener">
            <strong>Houlsby, Huszar, Ghahramani, Lengyel — BALD</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, 2011)</span>
          <br/>The original BALD paper. Read for the per-case formula and the MI decomposition; skip the GP-specific derivations.
        </li>
        <li>
          <a href="https://jacobgil.github.io/deeplearning/activelearning" target="_blank" rel="noopener">
            <strong>Jacob Gildenblat — A practical guide to active learning</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(blog)</span>
          <br/>Practitioner walk-through of margin, BALD, BatchBALD, BADGE with code. Build intuition here before reading the papers.
        </li>
        <li>
          <a href="https://stripe.com/blog/how-we-built-it-stripe-radar" target="_blank" rel="noopener">
            <strong>Stripe Engineering — How we built Radar</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(blog)</span>
          <br/>Production fraud-labeling protocol: AL for training + stratified random reserve for eval. Why the protocol matters as much as the model.
        </li>
        <li>
          <a href="https://www.youtube.com/watch?v=Qv6UVOQXTL4" target="_blank" rel="noopener">
            <strong>Yarin Gal — Bayesian Deep Learning (Cambridge lecture)</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(video)</span>
          <br/>The MC-dropout = approximate Bayesian view that makes BALD tractable on neural nets. ~50 min; watch at 1.5x.
        </li>
      </ul>
    </VIS.Section>
  </main>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
  <script>
    window.addEventListener("error", function (e) {
      const pre = document.createElement("pre");
      pre.style.cssText = "position:fixed;top:0;left:0;right:0;max-height:35vh;"
        + "overflow:auto;background:#fee2e2;color:#7f1d1d;padding:8px;"
        + "margin:0;font:12px/1.4 monospace;z-index:10002;";
      pre.textContent = "[visualize] " + (e.error?.stack || e.message || e);
      document.body.appendChild(pre);
    }, true);
  </script>
