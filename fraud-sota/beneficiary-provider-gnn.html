  // <VIS.Term def="1-2 sentence plain-English explanation">jargon</VIS.Term>
  //
  // Wraps any technical term so a non-technical reader can hover for an
  // immediate definition. The explanation should:
  //   - assume the reader knows English but not software/your domain
  //   - fit in 1-2 short sentences (a tooltip, not a paragraph)
  //   - avoid further jargon (or wrap that too)
  //
  // The element exposes `data-rv-info` so the report-viewer overlay reuses
  // its own tooltip + double-click "explain this" feedback flow. In
  // standalone /visualize mode (no overlay), the lightweight hover handler
  // below renders the tooltip directly.
  function Term({ def, children }) {
    if (!def) return h(React.Fragment, null, children);
    return h("span", {
      className: "vis-term",
      "data-rv-info": def,
      "aria-label": def,
      tabIndex: 0,
    }, children);
  }

  // Standalone hover tooltip for <VIS.Term>. If the report-viewer overlay
  // is loaded it already shows tooltips for any [data-rv-info] element, so
  // we short-circuit here to avoid double-rendering.
  (function installTermTooltip() {
    let tip = null;
    function show(el) {
      if (window.__rvReady) return;  // overlay.js owns the tooltip in report-viewer mode
      const text = el.getAttribute("data-rv-info");
      if (!text) return;
      if (!tip) {
        tip = document.createElement("div");
        tip.className = "vis-term-tip";
        document.body.appendChild(tip);
      }
      tip.textContent = text;
      const r = el.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const pad = 8;
      let left = Math.max(pad,
        Math.min(r.left, window.innerWidth - tr.width - pad));
      const above = r.top - tr.height - pad;
      const below = r.bottom + pad;
      tip.style.left = left + "px";
      tip.style.top  = (above >= pad ? above : below) + "px";
      tip.style.display = "block";
    }
    function hide() { if (tip) tip.style.display = "none"; }
    document.addEventListener("mouseover", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el); else hide();
    });
    document.addEventListener("focusin", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el);
    });
    document.addEventListener("focusout", hide);
    document.addEventListener("scroll", hide, true);
  })();

  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."
  //   scenario={<>...JSX...</>}
  //   diagram={<VIS.Mermaid chart={...} />}
  //   options={[
  //     {key:"a", text:"...", correct:false},
  //     {key:"b", text:"...", correct:true},
  //     ...
  //   ]}
  //   trap={<>The most tempting wrong is X because...</>}
  //   lens={<>The right answer + reasoning</>}
  //   stretch="optional follow-up question"
  // />
  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Beneficiary-provider GNN — GNN over a bipartite patient-provider claims graph
// detects collusive billing patterns that univariate profiling misses.
// KDD 2024 'Bipartite GNN for Healthcare Fraud'.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · Healthcare claim fraud"
      title="Beneficiary-provider GNN"
      subtitle="A bipartite graph neural net over the patient-provider claim graph aggregates structural signals (shared beneficiaries, overlapping referral patterns, multi-hop co-billing) to flag collusive billing rings that univariate provider profiling misses."
      byline={[
        {label: "Source", value: "Bipartite GNN for Healthcare Fraud (KDD 2024)"},
        {label: "Year", value: "2024"},
        {label: "L3", value: "Healthcare claim fraud / Payer-side claim review"},
      ]}/>

    <VIS.TLDR>
      Univariate provider profiling ("does provider X bill more than peers") misses{" "}
      <VIS.Term def="A fraud pattern where multiple providers coordinate to bill for services not rendered, or to recycle the same beneficiaries through unnecessary procedures. The signal is in the relationship across providers, not in any one provider's stats.">collusive billing</VIS.Term>{" "}
      where two or more providers coordinate (recycling beneficiaries, ping-pong referrals, ghost beneficiaries shared across clinics). A{" "}
      <VIS.Term def="A graph neural network that operates on a graph with two node types (here: beneficiaries and providers) and edges only between the two types. Each node's representation is updated by aggregating from its neighbors of the OTHER type.">bipartite GNN</VIS.Term>{" "}
      over the patient-provider edge graph (one edge per claim, weighted by amount or visit count) aggregates structural signals across hops and produces a fraud score per provider AND per beneficiary AND per (provider, beneficiary) edge. The senior question is not "GNNs help" — it's HIPAA scope of the patient nodes, how to handle the long-tail of providers with few claims, how to interpret a multi-hop fraud score for SIU, and how to keep the model from confounding referral patterns with collusion.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is">
      <p>
        Build a bipartite graph: nodes are beneficiaries (patients) and providers; edges are claims. Edge attributes: claim amount, procedure code(s), service date, place of service. Node features for providers: specialty, region, panel size, billing summary stats. Node features for beneficiaries (within HIPAA scope): age band, region, HCC risk band, coverage type. Train a bipartite GNN (e.g., R-GCN, HAN, or a CARE-GNN-style camouflage-resistant model) on labeled fraud cases (provider sanctions, recovered overpayments) using semi-supervised or PU-learning to handle the small labeled set. Output: a fraud score per provider, plus a score per (provider, beneficiary) edge, plus optionally a "ring score" computed over connected subgraphs.
      </p>

      <VIS.Mermaid chart={`
flowchart TB
  G["Bipartite claim graph"]
  GNN["Bipartite GNN"]
  PS["Provider fraud score"]
  ES["Edge fraud score"]
  RS["Ring subgraph score"]
  SIU["SIU triage"]
  G --> GNN
  GNN --> PS
  GNN --> ES
  GNN --> RS
  PS --> SIU
  ES --> SIU
  RS --> SIU
  style GNN fill:#dbeafe,stroke:#2563eb,stroke-width:2px
  style SIU fill:#fef3c7,stroke:#d97706,stroke-width:2px
      `} />
      <p>
        Blue = the GNN aggregating multi-hop signal. Yellow = the SIU triage queue. Senior insight: the GNN outputs scores at three granularities (provider, edge, ring) — not just a per-provider rank. SIU prioritizes differently depending on whether you suspect a single fraudulent provider, a single ghost beneficiary across many providers, or a collusive ring spanning a subgraph.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How it differs from the baseline">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Aspect</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Univariate provider profiling</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Pairwise rule (shared-patient counts)</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Bipartite GNN</th>
          </tr>
        </thead>
        <tbody>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Catches multi-hop rings</td>
            <td style={{padding:"8px 10px"}}>No</td>
            <td style={{padding:"8px 10px"}}>Only 2-hop</td>
            <td style={{padding:"8px 10px"}}>Yes (multi-hop message passing)</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Uses beneficiary-side signal</td>
            <td style={{padding:"8px 10px"}}>Drops it</td>
            <td style={{padding:"8px 10px"}}>Aggregate counts only</td>
            <td style={{padding:"8px 10px"}}>Yes (typed nodes)</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Interpretability for SIU</td>
            <td style={{padding:"8px 10px"}}>High (per-feature)</td>
            <td style={{padding:"8px 10px"}}>High (named rule)</td>
            <td style={{padding:"8px 10px"}}>Lower (multi-hop attribution)</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>HIPAA scope</td>
            <td style={{padding:"8px 10px"}}>Provider-only data</td>
            <td style={{padding:"8px 10px"}}>De-identified counts</td>
            <td style={{padding:"8px 10px"}}>De-identified patient nodes inside compliance boundary</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Robust to attacker camouflage</td>
            <td style={{padding:"8px 10px"}}>Easy to game</td>
            <td style={{padding:"8px 10px"}}>Easy to game</td>
            <td style={{padding:"8px 10px"}}>Better (CARE-GNN style defenses)</td>
          </tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-when" title="When to pick">
      <ul>
        <li><strong>Payer-side claim review</strong> — you have the full bipartite graph across the network of providers and beneficiaries.</li>
        <li><strong>Collusion is plausible</strong> — pill-mill rings, ambulance-mill rings, telehealth co-billing rings.</li>
        <li><strong>You have labeled fraud cases</strong> — at least a few hundred substantiated fraud providers; PU-learning or semi-supervised setup can stretch this.</li>
        <li><strong>You can deploy inside HIPAA boundary</strong> — patient nodes carry PHI in the engineering pipeline even if the model sees only de-identified node features.</li>
        <li><strong>SIU has bandwidth for ring-level investigations</strong> — ring scores produce subgraph alerts; investigating a ring is more expensive per case but recovers more dollars per hour.</li>
      </ul>
    </VIS.Section>

    <VIS.Section id="sec-limits" title="Limitations and gotchas">
      <VIS.Callout kind="gotcha" title="HIPAA scope on patient nodes">
        Beneficiary node identifiers and features are PHI. Training, inference, and ALL artifacts that reference patient identifiers must stay inside the HIPAA-compliant data environment. Hash-based pseudonymization is NOT enough on its own — the bipartite structure plus auxiliary data can re-identify. Practical guardrail: train + run inference inside a VPC with audit logs, do not export per-edge or per-patient scores beyond the compliance boundary, surface only aggregated provider/ring-level signal to teams outside the boundary.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Referral patterns vs collusion confound">
        Legitimate specialty referral networks LOOK like rings (hospitalist refers to PCP refers to cardiologist refers back). Without explicit features for "is this a known referral relationship" the GNN can flag legitimate care networks. Mitigations: penalize the model on known-clean referral graphs, add an explicit referral-pattern feature per edge (was a referral on file, is the procedure post-referral appropriate), and validate ring detections against a known-clean control set before SIU dispatch.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Long-tail providers and cold-start">
        A new provider with 50 claims has noisy embeddings. The GNN's neighborhood-aggregation amplifies this (small neighborhood plus dense weight matrix produces high-variance outputs). Suppress alerts for providers below a claim-count floor and use a Bayesian prior + held-out monitoring to validate scores as data accumulates.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — 10 trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        Ten interview-grade traps. Many of these are tradeoff_mcq plus debugging cases focused on the structural-vs-univariate gap.
      </p>

      <VIS.TrapProblem
        id="bpg-p1"
        difficulty="hard"
        title="P1 — How does collusive billing manifest in a bipartite graph, and what's the GNN architecture?"
        scenario={<>You're at the design review. The interviewer asks: walk me through how a collusive billing ring SHOWS UP in the bipartite (beneficiary, provider) graph, and pick the GNN architecture you would use, with justification.</>}
        options={[
          {key:"a", text:"Manifestation: shared subset of beneficiaries across a small set of providers (high beneficiary-overlap inside the cluster), unusually dense subgraph (many edges among few nodes), tightly coordinated service codes across providers (similar billing distributions), and abnormal beneficiary patterns (multiple ER visits to the same chain in quick succession). Architecture: a heterogeneous bipartite GNN (R-GCN or HAN) — two node types (provider, beneficiary), one edge type (claim) with claim attributes (amount, codes, date). 2-3 layers (more layers cause oversmoothing on bipartite graphs). Loss: PU-learning to handle small positive label set; semi-supervised regularization on the unlabeled mass. Optional CARE-GNN-style neighbor sampling to resist camouflage attacks. Output heads: per-provider score, per-edge score (the claim), and a subgraph-level score (ring detection).", correct:true},
          {key:"b", text:"Just run k-means on provider features; clusters are rings."},
          {key:"c", text:"Use a homogeneous GCN with one node type (collapse beneficiaries into provider-pair edges)."},
          {key:"d", text:"Train a transformer on claim sequences; the attention will figure out the rings."},
        ]}
        trap={<>(b) ignores structure entirely. (c) collapses the bipartite structure into pairwise links, losing the multi-hop signal AND the beneficiary-side features. (d) misuses transformers for a problem that is fundamentally graph-structured, not sequence-structured.</>}
        lens={<>(a). The senior answer names the structural signal (dense subgraph + shared beneficiaries + coordinated codes), picks an architecture that respects the heterogeneous bipartite structure, and surfaces three score granularities (provider, edge, subgraph) because SIU investigates differently at each.</>}
        stretch={<>Why 2-3 layers, not 5-10?</>}
      />

      <VIS.TrapProblem
        id="bpg-p2"
        difficulty="hard"
        multiSelect
        title="P2 — The model flags a hospital + cardiologist + PCP triangle"
        scenario={<>The GNN flags a 3-node subgraph as a collusive ring: a regional hospital, a cardiology group, and a primary-care group. They share many beneficiaries and bill correlated procedure codes. SIU is about to open a ring investigation. What should the team check first? Select all that apply.</>}
        options={[
          {key:"a", text:"Is this a recognized referral network in the payer's provider directory? Many regions have established hospital + specialist + PCP referral relationships that look exactly like rings.", correct:true},
          {key:"b", text:"Are claim amounts within peer ranges, or is each provider also flagged univariately?", correct:true},
          {key:"c", text:"Are the beneficiary patient-mix shifts plausible (cardiac patients SHOULD see a cardiologist + PCP + hospital)?", correct:true},
          {key:"d", text:"Open the SIU letter immediately; the GNN found something."},
          {key:"e", text:"Disable the GNN; rings are too risky to act on."},
        ]}
        trap={<>(d) skips the referral-confound check that the limitations section warned about. (e) overreacts; the GNN's signal is valuable when paired with referral-pattern filtering.</>}
        lens={<>Three correct. <strong>(a)</strong> referral directory check is the first-pass false-positive filter. <strong>(b)</strong> if NO node is univariately suspicious, the ring signal alone is weak. <strong>(c)</strong> patient-mix plausibility checks rule out medically appropriate cardiac care patterns. Senior signal: the GNN's structural signal is a TRIGGER, not a verdict; pair with referral, univariate, and clinical-plausibility checks before SIU acts.</>}
        stretch={<>How would you build the "known clean referral network" training feature without manual labeling?</>}
      />

      <VIS.TrapProblem
        id="bpg-p3"
        difficulty="hard"
        title="P3 — Oversmoothing kills your signal at 5 layers"
        scenario={<>Your team initially ships a 5-layer R-GCN to capture far-hop signal. Validation AUC drops from 0.78 (at 2 layers) to 0.61 (at 5 layers). Embeddings of fraud-providers and clean-providers look indistinguishable when you UMAP them. Diagnose.</>}
        options={[
          {key:"a", text:"Bug — re-implement with PyTorch Geometric and the AUC will recover."},
          {key:"b", text:"Oversmoothing — at 5 layers each node's representation aggregates the entire connected component into a similar vector. The discriminative structural signal lives in 1-2 hop neighborhoods (direct co-billing patterns + immediate beneficiary overlap), not the global graph. Cap at 2-3 layers. Optionally add skip connections / GraphSAGE-style sampling to preserve local discriminability.", correct:true},
          {key:"c", text:"Add more parameters; the model is underfitting."},
          {key:"d", text:"Switch to a transformer with global attention."},
        ]}
        trap={<>(a) blames tooling. (c) reverses the diagnosis — more capacity does not fix oversmoothing; the issue is the message-passing depth, not the parameter count. (d) sidesteps the signal locality (you do not WANT global attention; you want local-neighborhood discriminability).</>}
        lens={<>(b). Oversmoothing is the canonical GNN failure at high layer counts. Bipartite graphs are especially susceptible because the alternating bipartite structure folds the receptive field back onto itself rapidly. 2-3 layers is standard. Skip connections (JK-Net) or sampling (GraphSAGE) help if you must go deeper.</>}
        stretch={<>How would you DETECT oversmoothing automatically during training, before it tanks AUC?</>}
      />

      <VIS.TrapProblem
        id="bpg-p4"
        difficulty="hard"
        title="P4 — A pill-mill operator camouflages by adding clean traffic"
        scenario={<>A pill-mill operator who'd been flagged historically begins adding routine refill encounters with low-risk beneficiaries (legitimate-looking patients with routine prescriptions). Their neighborhood now LOOKS more diverse and lower-risk. GNN score drops. They keep upcoding the original beneficiaries. What's the structural response?</>}
        options={[
          {key:"a", text:"Camouflage-resistant GNN training (CARE-GNN-style): instead of aggregating from ALL neighbors equally, learn to ATTEND to suspicious neighbors first. Adversarial training on synthesized camouflage cases. Edge-level scores instead of provider-only scores so the camouflage-traffic edges score low while the upcoded edges score high. Use temporal windows so a sudden increase in 'clean-looking' traffic is itself a flag.", correct:true},
          {key:"b", text:"Lower the alert threshold globally."},
          {key:"c", text:"Add more aggregation layers."},
          {key:"d", text:"Drop the GNN — it's been gamed."},
        ]}
        trap={<>(b) drowns SIU. (c) makes oversmoothing worse (see P3). (d) abandons SOTA when the right move is adversarial-resilient training.</>}
        lens={<>(a). CARE-GNN was designed exactly for this fraud-camouflage problem: a reinforcement-learned neighbor sampler that picks the most informative neighbors. Pair with edge-level scoring so the camouflage edges do not dilute the signal at the provider level, plus adversarial training on synthetic camouflage. Plus temporal monitoring (a sudden inflow of clean traffic at a previously-suspect provider is itself a signal).</>}
        stretch={<>What's the empirical lift CARE-GNN claims over vanilla GCN on the Yelp+Amazon fraud benchmarks?</>}
      />

      <VIS.TrapProblem
        id="bpg-p5"
        difficulty="medium"
        multiSelect
        title="P5 — How do you evaluate a bipartite fraud GNN?"
        scenario={<>You're setting up evaluation for the GNN. Which practices apply? Select all that apply.</>}
        options={[
          {key:"a", text:"Precision @ top-K with K matched to SIU capacity (per-week reviewable cases).", correct:true},
          {key:"b", text:"PR-AUC, not ROC-AUC, because fraud is rare (likely under 1% of providers).", correct:true},
          {key:"c", text:"Temporal split: train on past, validate on future, NOT random split — random splits leak ring-membership info across train/val.", correct:true},
          {key:"d", text:"Cold-start eval: hold out a subset of providers from training AND from their neighborhoods, measure score quality on the held-out subset.", correct:true},
          {key:"e", text:"ROC-AUC at default threshold — standard and sufficient."},
          {key:"f", text:"Cosine similarity of provider embeddings to a 'fraud centroid'."},
        ]}
        trap={<>(e) ROC-AUC at extreme imbalance is overstated. (f) imposes a fraud-centroid assumption that does not match real fraud topology (rings are diverse, not centroid-concentrated).</>}
        lens={<>Four correct. <strong>(a)</strong> operational precision-at-K matches SIU capacity. <strong>(b)</strong> PR-AUC is honest under imbalance (see the separate AUPRC-vs-AUC concept). <strong>(c)</strong> temporal splits prevent ring-information leakage; random splits give optimistic scores because the test ring's neighbors are in train. <strong>(d)</strong> cold-start eval measures how the model performs on providers it has not seen in the training neighborhood.</>}
        stretch={<>What's a leak pattern specific to bipartite GNNs that does not exist for tabular fraud models?</>}
      />

      <VIS.TrapProblem
        id="bpg-p6"
        difficulty="hard"
        title="P6 — Inductive vs transductive training"
        scenario={<>Your initial training was transductive (the full graph including val/test nodes used at training time). When you onboard a new payer client (cohort of providers + beneficiaries not seen at training time), the GNN cannot score them without retraining. How do you fix this?</>}
        options={[
          {key:"a", text:"Switch to an inductive GNN (GraphSAGE or a sampling-based scheme): node embeddings are computed by aggregating from sampled neighbors using LEARNED aggregator functions, not by lookup. The trained aggregators generalize to new graphs. Retrain periodically (quarterly), but inference works on new nodes immediately.", correct:true},
          {key:"b", text:"Retrain every time a client is onboarded."},
          {key:"c", text:"Use the average embedding of similar trained providers for new ones."},
          {key:"d", text:"Reject new clients until the next retrain cycle."},
        ]}
        trap={<>(b) is operationally painful and forfeits the speed of onboarding. (c) is the fallback when GraphSAGE is not in scope, but loses graph-structural signal. (d) is a non-starter business-wise.</>}
        lens={<>(a). Inductive GNNs (GraphSAGE family) solve exactly this: the aggregator function is learned and reused on new graphs. The bipartite version extends this naturally with type-aware aggregators. Quarterly retraining + inductive inference balances model freshness and onboarding speed.</>}
        stretch={<>What's the failure mode of inductive GNNs when the new client's graph structure is very different from training graphs?</>}
      />

      <VIS.TrapProblem
        id="bpg-p7"
        difficulty="hard"
        title="P7 — Ring-level score interpretation for SIU"
        scenario={<>A ring score fires on a 7-node subgraph (3 providers, 4 high-overlap beneficiaries). SIU asks: what specifically do we tell the providers and the prosecutor's office? "Subgraph score 0.91" is not actionable. How do you make ring scores interpretable?</>}
        options={[
          {key:"a", text:"Decompose the ring score into named structural features: shared-beneficiary count vs peer-network median, claim-amount correlation across providers, procedure-code coherence across the ring, temporal-pattern coherence (do the providers bill the same patients within 48 hours of each other), referral-network membership (or absence). Sample claims that exemplify each structural feature. Present SIU with the named features + claim samples, NOT the raw score.", correct:true},
          {key:"b", text:"Show the raw score; SIU is technical."},
          {key:"c", text:"Have an LLM write a natural-language explanation post-hoc."},
          {key:"d", text:"Refuse — the model is proprietary."},
        ]}
        trap={<>(b) is not operational; SIU writes letters and depositions in named-feature language. (c) is post-hoc rationalization disconnected from the model's actual decision basis. (d) breaks SIU workflow and undermines admissibility.</>}
        lens={<>(a). The senior pattern: structural features are mathematically grounded AND human-readable. They map back to specific claims and timestamps. Same shape as per-code decomposition in upcoding detection; the GNN's ring score decomposes into structural signals that SIU can name and cite.</>}
        stretch={<>What's a structural feature that is HARD to fabricate even by a determined attacker?</>}
      />

      <VIS.TrapProblem
        id="bpg-p8"
        difficulty="hard"
        multiSelect
        title="P8 — Label scarcity: only 250 substantiated fraud providers in 5 years"
        scenario={<>You have 40k providers in network, 250 substantiated fraud cases over 5 years (after audit + recoupment + agreement). Standard supervised training overfits. Which approaches are reasonable? Select all that apply.</>}
        options={[
          {key:"a", text:"PU-learning (Positive-Unlabeled): treat the 250 as positives, the rest as unlabeled (a mix of cleans and unflagged fraud). Use elkan-style PU loss to handle the unlabeled-mix correctly.", correct:true},
          {key:"b", text:"Semi-supervised graph regularization: enforce that neighbors in the bipartite graph have similar embeddings (with the SIU-confirmed labels as anchors).", correct:true},
          {key:"c", text:"Self-supervised graph contrastive pretraining (DGI / BGRL) to learn embeddings WITHOUT labels, then fine-tune a small classifier head on the 250.", correct:true},
          {key:"d", text:"Standard cross-entropy on 250 positives + 250 random negatives; train for 100 epochs."},
          {key:"e", text:"Synthesize 10x more positives via SMOTE."},
        ]}
        trap={<>(d) overfits horribly on 500 examples and 40k providers; the rest of the providers never appear at training time. (e) SMOTE in feature space for fraud is well-known to produce off-manifold synthetic positives; do not use it as a standalone fix.</>}
        lens={<>Three correct. <strong>(a)</strong> PU-learning is the principled treatment of "few labeled positives, lots of unlabeled." <strong>(b)</strong> graph-structure regularization exploits the unlabeled mass. <strong>(c)</strong> self-supervised pretraining gives you embeddings without labels, then you fine-tune a head on the few you have. Many production systems combine all three.</>}
        stretch={<>Which of the three would you START with given a quarter to ship?</>}
      />

      <VIS.TrapProblem
        id="bpg-p9"
        difficulty="medium"
        title="P9 — HIPAA scope on patient nodes"
        scenario={<>You're presenting the GNN architecture to privacy review. The reviewer flags: "you're using beneficiary identifiers and beneficiary features. That's PHI." What's the right architectural response?</>}
        options={[
          {key:"a", text:"Train + score inside the HIPAA-compliant data environment (VPC, audit log, no egress). Use de-identified beneficiary features (age band, region, HCC band — not direct identifiers). Patient nodes can keep an internal hashed pseudonym, but acknowledge that hash alone is not de-identification given the bipartite structure. Export ONLY provider-level + ring-level aggregated scores out of the compliance boundary; per-edge and per-patient scores stay inside.", correct:true},
          {key:"b", text:"Drop beneficiary nodes entirely; use a provider-only graph."},
          {key:"c", text:"Pseudonymize beneficiaries with SHA-256 and treat as fully de-identified."},
          {key:"d", text:"Send the graph to a hosted-cloud GNN service."},
        ]}
        trap={<>(b) loses the entire structural signal. (c) is a common misconception — hashing alone does not meet HIPAA Safe Harbor when the bipartite structure plus claims context can re-identify. (d) potentially violates BAAs and HIPAA depending on the host's compliance posture.</>}
        lens={<>(a). The senior compliance pattern: train and score INSIDE the boundary, scope which artifacts leave the boundary, name what is and is not de-identified under HIPAA Expert Determination, and align with the legal team on the egress controls.</>}
        stretch={<>What auxiliary data could re-identify patients from the bipartite graph even after hashing?</>}
      />

      <VIS.TrapProblem
        id="bpg-p10"
        difficulty="hard"
        title="P10 — End-to-end bipartite GNN production stack"
        scenario={<>You lead the program-integrity ML team at a national payer. 40k providers, 8M beneficiaries, 80M claims/year. Design the complete bipartite GNN production stack.</>}
        options={[
          {key:"a", text:"Inductive bipartite heterogeneous GNN (GraphSAGE-style with R-GCN-style typed aggregators), 2-3 layers to avoid oversmoothing, CARE-GNN-style camouflage-resistant neighbor sampling. Training: PU-learning + semi-supervised graph regularization + self-supervised graph pretraining stage (DGI/BGRL). Quarterly retraining. Three score heads: per-provider, per-edge, per-ring (computed via connected-subgraph aggregation). Triage: SIU queue prioritized by recoverable-dollars-per-hour, with structural-feature decomposition surfaced per alert. Referral-network feature explicitly modeled to suppress benign referral patterns. Confounding controls: case-mix matched comparisons before letter generation. Cold-start floor: suppress alerts below a claim-count threshold; Bayesian smoothing. Adversarial training quarterly. Score-distribution drift monitor + per-cohort thresholds. PHI handling: train + score inside HIPAA-compliant VPC; only aggregated provider/ring-level scores exit the boundary. Feedback loop: SIU dispositions feed back as labels.", correct:true},
          {key:"b", text:"Train a single deep GCN with 10 layers on raw claims data and let it figure things out."},
          {key:"c", text:"Skip the GNN; use rule-based shared-patient counts."},
          {key:"d", text:"Send the bipartite graph to a hosted Graph Neural Network as a Service vendor."},
        ]}
        trap={<>(b) ignores oversmoothing, camouflage, and inductive onboarding. (c) reverses the SOTA. (d) HIPAA + PHI is hard to outsource.</>}
        lens={<>(a). The complete senior architecture: inductive + bipartite + camouflage-resistant + label-scarce-aware + multi-head-scored + structurally-interpretable + HIPAA-compliant + adversarially-retrained, with explicit confounding controls. This is what survives compliance, legal, SIU operations, and adversarial pressure at $80B-payout scale.</>}
        stretch={<>What single failure mode would prompt you to roll back the entire GNN tier overnight?</>}
      />
    </VIS.Section>
