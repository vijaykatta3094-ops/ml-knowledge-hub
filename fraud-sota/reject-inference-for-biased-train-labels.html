  // <VIS.Term def="1-2 sentence plain-English explanation">jargon</VIS.Term>
  //
  // Wraps any technical term so a non-technical reader can hover for an
  // immediate definition. The explanation should:
  //   - assume the reader knows English but not software/your domain
  //   - fit in 1-2 short sentences (a tooltip, not a paragraph)
  //   - avoid further jargon (or wrap that too)
  //
  // The element exposes `data-rv-info` so the report-viewer overlay reuses
  // its own tooltip + double-click "explain this" feedback flow. In
  // standalone /visualize mode (no overlay), the lightweight hover handler
  // below renders the tooltip directly.
  function Term({ def, children }) {
    if (!def) return h(React.Fragment, null, children);
    return h("span", {
      className: "vis-term",
      "data-rv-info": def,
      "aria-label": def,
      tabIndex: 0,
    }, children);
  }

  // Standalone hover tooltip for <VIS.Term>. If the report-viewer overlay
  // is loaded it already shows tooltips for any [data-rv-info] element, so
  // we short-circuit here to avoid double-rendering.
  (function installTermTooltip() {
    let tip = null;
    function show(el) {
      if (window.__rvReady) return;  // overlay.js owns the tooltip in report-viewer mode
      const text = el.getAttribute("data-rv-info");
      if (!text) return;
      if (!tip) {
        tip = document.createElement("div");
        tip.className = "vis-term-tip";
        document.body.appendChild(tip);
      }
      tip.textContent = text;
      const r = el.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const pad = 8;
      let left = Math.max(pad,
        Math.min(r.left, window.innerWidth - tr.width - pad));
      const above = r.top - tr.height - pad;
      const below = r.bottom + pad;
      tip.style.left = left + "px";
      tip.style.top  = (above >= pad ? above : below) + "px";
      tip.style.display = "block";
    }
    function hide() { if (tip) tip.style.display = "none"; }
    document.addEventListener("mouseover", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el); else hide();
    });
    document.addEventListener("focusin", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el);
    });
    document.addEventListener("focusout", hide);
    document.addEventListener("scroll", hide, true);
  })();

  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."
  //   scenario={<>...JSX...</>}
  //   diagram={<VIS.Mermaid chart={...} />}
  //   options={[
  //     {key:"a", text:"...", correct:false},
  //     {key:"b", text:"...", correct:true},
  //     ...
  //   ]}
  //   trap={<>The most tempting wrong is X because...</>}
  //   lens={<>The right answer + reasoning</>}
  //   stretch="optional follow-up question"
  // />
  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Reject-inference — credit scoring + fraud techniques to handle the fact that
// declined/blocked applications never get an outcome label, biasing training data.
// Classical credit scoring; revisited in 'Reject Inference for Fraud Models' (Risk.net 2025).

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · Evaluation"
      title="Reject-inference for biased train labels"
      subtitle="Models trained only on approved (and outcome-observed) cases ignore 30%+ of the application population — the declined cases. Reject-inference augments training with proxy labels for those declined cases to undo the selection bias."
      byline={[
        {label: "Source", value: "Classical credit scoring; 'Reject Inference for Fraud Models' (Risk.net 2025)"},
        {label: "Year", value: "2025"},
        {label: "L3", value: "Evaluation and fairness for fraud models"},
      ]}/>

    <VIS.TLDR>
      Fraud and credit-decisioning models train on the subset of applications that were approved (because only approved applications produce observable outcomes). The approve/decline policy is itself selection: declined applications are systematically different from approved ones.{" "}
      <VIS.Term def="A family of techniques to recover unbiased model estimates when your training data has been selection-biased — specifically when training labels are observed only for the subset that passed a prior policy filter (approved customers, accepted loans, allowed transactions).">Reject-inference</VIS.Term>{" "}
      augments the training distribution with proxy labels for declined cases so the model learns the full applicant distribution, not just the approved sub-population. The senior question is what proxy you use, what assumptions it requires, when you should NOT use reject-inference (when biases are too entangled to recover), and how this interacts with fairness constraints.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is">
      <p>
        Suppose your fraud team trained model M_1 on year-1 data: only the approved transactions had observable outcomes (fraud-yes-or-no). M_1 trains on that approved-only sample. In year 2 you collect more data — but the year-1 approvals were filtered by some prior policy P_0 (rules, prior model, manual review). Year-2 data is approved according to a similar policy P_1 driven partly by M_1's scores. The approved-sample distribution is not the natural applicant distribution; it's the slice of applicants who passed P_0 (and P_1). Models trained only on this slice extrapolate poorly to declined cases — yet many decisions DO need a score for declined cases (re-evaluation, line-increase eligibility, lookalike-modeling for outreach, fairness analysis).
      </p>

      <VIS.Mermaid chart={`
flowchart TB
  APP["Applicant population"]
  POLICY["Approve or decline policy"]
  APPR["Approved set with observed outcomes"]
  DECL["Declined set with no outcome"]
  MODEL["Naive model"]
  RI["Reject-inference augmentation"]
  UNBIASED["Reweighted training set"]
  RIMODEL["Reject-inference model"]
  APP --> POLICY
  POLICY --> APPR
  POLICY --> DECL
  APPR --> MODEL
  APPR --> RI
  DECL --> RI
  RI --> UNBIASED
  UNBIASED --> RIMODEL
  style RI fill:#dbeafe,stroke:#2563eb,stroke-width:2px
  style RIMODEL fill:#fef3c7,stroke:#d97706,stroke-width:2px
      `} />
      <p>
        Blue = the reject-inference step (the SOTA fix). Yellow = the resulting model. Senior insight: the naive model is unbiased over the APPROVED sub-population only. Reject-inference attempts to recover an unbiased estimator over the full APPLICANT population by assigning proxy labels (or weights) to declined cases. There are several techniques (augmentation, reclassification, parceling, fuzzy augmentation, Heckman-style two-step) with different assumptions.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="Reject-inference techniques">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Technique</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>How it labels declines</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Key assumption</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Failure mode</th>
          </tr>
        </thead>
        <tbody>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Augmentation (label every decline bad)</td>
            <td style={{padding:"8px 10px"}}>All declines get label = bad</td>
            <td style={{padding:"8px 10px"}}>Policy was perfect</td>
            <td style={{padding:"8px 10px"}}>Conflates near-good cases with truly-bad</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Reclassification (model-based)</td>
            <td style={{padding:"8px 10px"}}>Declines labeled by an interim model trained on accepts</td>
            <td style={{padding:"8px 10px"}}>Accepts-only model extrapolates well</td>
            <td style={{padding:"8px 10px"}}>Circular — model labels its own training set</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Parceling (probabilistic)</td>
            <td style={{padding:"8px 10px"}}>Declines get probabilistic labels matched to accepts at the same score band</td>
            <td style={{padding:"8px 10px"}}>Same-score-band declines behave like same-score-band accepts</td>
            <td style={{padding:"8px 10px"}}>Violates if decline policy used non-score variables</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Heckman two-step (selection model)</td>
            <td style={{padding:"8px 10px"}}>Estimate selection process + outcome jointly via inverse-Mills ratio</td>
            <td style={{padding:"8px 10px"}}>Joint-normality of latent variables; valid exclusion restriction</td>
            <td style={{padding:"8px 10px"}}>Strong distributional assumptions, sensitive to misspec</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Bureau-data sourcing</td>
            <td style={{padding:"8px 10px"}}>Pull external (credit-bureau) outcomes on declined applicants</td>
            <td style={{padding:"8px 10px"}}>Bureau outcome is a valid proxy for your outcome</td>
            <td style={{padding:"8px 10px"}}>Privacy + cost + proxy validity</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Randomized policy holdout</td>
            <td style={{padding:"8px 10px"}}>Approve a small random sample of would-be-declines and observe</td>
            <td style={{padding:"8px 10px"}}>You can afford the loss on this sample</td>
            <td style={{padding:"8px 10px"}}>Expensive; small sample sizes</td>
          </tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-when" title="When to pick">
      <ul>
        <li><strong>Substantial decline rate (over 10%)</strong> — small decline rates create small sample-selection bias; large decline rates create large bias.</li>
        <li><strong>Decisions need a score on declined cases</strong> — line-increase eligibility, lookalike modeling, fairness audits, re-evaluation campaigns.</li>
        <li><strong>Policy was driven by score-overlap variables</strong> — when the decline policy uses variables that also appear in the model, parceling and Heckman are most defensible.</li>
        <li><strong>You can afford a randomized holdout</strong> — gold-standard reject-inference is a small randomized approval of would-be-declines. Expensive but unbiased.</li>
        <li><strong>External proxy outcomes exist</strong> — bureau-data sourcing or shared-industry consortium data can give outcome proxies for declines.</li>
      </ul>
    </VIS.Section>

    <VIS.Section id="sec-limits" title="Limitations and gotchas">
      <VIS.Callout kind="gotcha" title="Proxy labels themselves are biased">
        Every proxy label introduces its own bias. Augmentation conflates near-good declines with truly-bad. Reclassification is circular (the accepts-only model is exactly what reject-inference is supposed to fix). Parceling violates if decline policy used non-score variables. Heckman requires strong distributional assumptions. The closest thing to ground truth is a randomized policy holdout, and that is expensive.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Reject-inference can paint over fairness issues">
        If the prior policy declined disproportionately from a protected group, reject-inference can entrench that bias by labeling those declines as bad. Run fairness audits BEFORE and AFTER reject-inference; if the decline rate disparity is itself a problem, fix the policy first.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Reject-inference assumes outcomes WOULD have been observable">
        Reject-inference works when the outcome is something that WOULD have happened if the application were approved (fraud, default, chargeback). It does not work when the act of approval CREATES the outcome (e.g., engagement, retention) — there is no counterfactual outcome for declined applicants in those settings.
      </VIS.Callout>
      <VIS.Callout kind="info" title="ECOA, Reg B, and adverse-action notice">
        Reject-inference is widely accepted in credit decisioning under Reg B as a method for reducing model bias, but the resulting model still must support adverse-action explanations on declined cases. The reject-inference step is internal to the model; the adverse-action reasons surface to applicants are derived from the final model.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — 10 trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        Ten interview-grade traps on reject-inference design, proxy choices, and pitfalls.
      </p>

      <VIS.TrapProblem
        id="ri-p1"
        difficulty="hard"
        title="P1 — Walk through reject-inference and its assumptions"
        scenario={<>You're at a senior fraud-modeling interview. The interviewer asks: "your decline policy filters training data. Walk through reject-inference and its assumptions." Pick the strongest answer.</>}
        options={[
          {key:"a", text:"The naive model trains on approved-only outcomes, so it estimates an unbiased fraud probability conditional on being approved. It extrapolates poorly to declined cases because the decline policy is selection. Reject-inference adds proxy labels (or sample weights) for declined cases to recover an unbiased estimator over the full applicant distribution. Common techniques: (a) Augmentation: label all declines bad — assumes policy was perfect. (b) Reclassification: label declines via an interim accepts-only model — circular; the interim model has the same bias. (c) Parceling: assign probabilistic labels to declines based on same-score-band accepts — assumes the policy used only score-overlap variables. (d) Heckman two-step: model selection and outcome jointly via inverse-Mills ratio — assumes joint-normality and a valid exclusion restriction. (e) Randomized policy holdout: approve a small random sample of would-be-declines — gold standard but expensive. (f) Bureau-data sourcing: pull external outcomes on declined applicants — assumes the bureau proxy is valid. The right technique depends on policy structure, cost tolerance, and fairness constraints.", correct:true},
          {key:"b", text:"Train the model on accepts; reject-inference is unnecessary if AUC is high."},
          {key:"c", text:"Use SMOTE to oversample declines."},
          {key:"d", text:"Reject-inference is just adding more data; any technique works."},
        ]}
        trap={<>(b) ignores the selection bias entirely. (c) SMOTE is for class imbalance, not for selection bias — different problem, different remedy. (d) flattens the techniques and their distinct assumptions.</>}
        lens={<>(a). The senior answer names the SOURCE of the bias (selection), names the techniques with their distinct assumptions, and explains that the right choice depends on policy structure + cost tolerance + fairness. A junior answer skips assumptions and presents reject-inference as one monolithic technique.</>}
        stretch={<>Which technique would you START with for a fraud model where you have moderate decline rate and no bureau access?</>}
      />

      <VIS.TrapProblem
        id="ri-p2"
        difficulty="hard"
        title="P2 — Augmentation is the simplest but it's wrong here"
        scenario={<>A junior eng implements augmentation: every declined application gets label = bad (fraud). The new model trained on accepts (with real labels) + declines (with augmentation labels) has AUC 0.94 vs 0.78 baseline. They want to ship it. What's wrong?</>}
        options={[
          {key:"a", text:"Augmentation treats every decline as fraud, but the policy isn't perfect — many declined applications are legitimate, just risky-on-some-axis. The high AUC is mostly the model learning to reproduce the policy (predict decline from features the policy used), not learning fraud signal. Production performance will not match. The right fix: parceling, Heckman, randomized holdout, or bureau-data sourcing.", correct:true},
          {key:"b", text:"AUC went up; ship it."},
          {key:"c", text:"Augmentation is fine; the assumption is mild."},
          {key:"d", text:"AUC is the wrong metric; use AUPRC."},
        ]}
        trap={<>(b) is the metric-chasing failure (and high AUC plus learning to predict policy = textbook leakage). (c) understates the assumption — policy is rarely close to perfect; in fraud, policies decline both fraud AND borderline legit applicants. (d) is correct in general (see the AUPRC concept) but misses the specific augmentation failure mode.</>}
        lens={<>(a). Augmentation makes the model learn the POLICY, not the truth. AUC reflects predicting the policy because the augmented labels ARE the policy. Switch to parceling or randomized holdout — anything that doesn't conflate "declined" with "fraud."</>}
        stretch={<>How would you DETECT that the model is learning policy rather than fraud?</>}
      />

      <VIS.TrapProblem
        id="ri-p3"
        difficulty="hard"
        title="P3 — Reclassification is circular"
        scenario={<>A teammate proposes: train M_1 on accepts only. Use M_1 to label declines (any decline with predicted-fraud above 0.5 gets label = fraud, else label = good). Retrain on the union. Why might this not work?</>}
        options={[
          {key:"a", text:"M_1 is trained ONLY on accepts and has no information about declines. Its decline labels are extrapolations from the very biased distribution reject-inference is supposed to fix. The retrained model inherits M_1's bias plus adds noise from the imputation. AUC may rise on validation (which has the same bias) but production performance on the full applicant distribution doesn't improve.", correct:true},
          {key:"b", text:"It works; this is the standard approach."},
          {key:"c", text:"Add a third model to validate the labels."},
          {key:"d", text:"The bias is gone after one round."},
        ]}
        trap={<>(b) and (d) endorse the circular approach. (c) is "add more layers of the same bug." Cascading biased models does not fix the bias.</>}
        lens={<>(a). Reclassification is circular by construction. The cleanest variants iterate (parceling with score-band matching) but still fundamentally rely on accepts-only signal extrapolating. The most defensible approach when you can't afford a randomized holdout is parceling with explicit score-band matching plus a sensitivity analysis varying the labels for borderline declines.</>}
        stretch={<>Under what specific condition would reclassification actually work?</>}
      />

      <VIS.TrapProblem
        id="ri-p4"
        difficulty="hard"
        multiSelect
        title="P4 — Randomized policy holdout: cost and benefit"
        scenario={<>You propose a randomized policy holdout: approve 1% of would-be-declines uniformly at random. Which considerations matter for the design? Select all that apply.</>}
        options={[
          {key:"a", text:"Loss budget: 1% of declines, each generating an expected loss equal to the policy's estimated bad-rate among declines, scaled by exposure. Quantify and pre-fund.", correct:true},
          {key:"b", text:"Statistical power: at 1% holdout, how many holdout cases per year, and what's the AUC CI on the resulting model?", correct:true},
          {key:"c", text:"Regulatory: under ECOA / Reg B, can you approve some borderline declines as part of a designed experiment? (Usually yes, with documentation.)", correct:true},
          {key:"d", text:"Holdout-vs-policy comparability: ensure the holdout sample shares enough structure with the operational decline distribution to inform retraining.", correct:true},
          {key:"e", text:"Skip the holdout; just use augmentation."},
          {key:"f", text:"Holdout 100% of declines for one quarter."},
        ]}
        trap={<>(e) is the inadequate fallback. (f) is operationally and financially infeasible (could be catastrophic loss exposure).</>}
        lens={<>Four correct. <strong>(a)</strong> loss budget. <strong>(b)</strong> statistical power. <strong>(c)</strong> regulatory acceptability with documentation. <strong>(d)</strong> design comparability. Senior signal: name all four constraints; design the experiment with explicit pre-funded loss budget, target power, regulatory approval, and comparability.</>}
        stretch={<>What's a reasonable holdout-share to target for a fraud model in a high-volume credit setting?</>}
      />

      <VIS.TrapProblem
        id="ri-p5"
        difficulty="hard"
        title="P5 — Reject-inference and fairness"
        scenario={<>Your decline policy declines protected group G at twice the rate of the majority. You apply augmentation reject-inference. The new model has even higher decline rate disparity. What's happening?</>}
        options={[
          {key:"a", text:"Augmentation labeled all declines as bad, including the disproportionately-declined protected-group cases. The model learned to predict 'bad' for the same features that drove the original policy disparity. Reject-inference can entrench (not fix) policy-driven fairness issues. Fix: audit fairness BEFORE and AFTER reject-inference; if the disparity is policy-driven, fix the policy first; use parceling or randomized holdout (not augmentation); add a fairness constraint (equality of opportunity) at training.", correct:true},
          {key:"b", text:"The new model is correct; the disparity is justified."},
          {key:"c", text:"Reject-inference always reduces disparity."},
          {key:"d", text:"Use augmentation but flip the labels for the protected group."},
        ]}
        trap={<>(b) accepts the disparity uncritically. (c) is factually wrong (augmentation typically entrenches it). (d) is a violation of disparate-treatment doctrine (using protected-group membership as a feature).</>}
        lens={<>(a). The senior point: reject-inference is not fairness-neutral. Augmentation entrenches policy bias; parceling and randomized holdout are more defensible. Audit fairness pre/post. Combine with a fairness constraint at training (equality of opportunity, see the related concept). Fix the policy first if the disparity is policy-driven.</>}
        stretch={<>How does the fairness-aware fraud concept (equal opportunity) compose with reject-inference?</>}
      />

      <VIS.TrapProblem
        id="ri-p6"
        difficulty="hard"
        title="P6 — Heckman two-step: when to use, when not"
        scenario={<>A senior modeler proposes Heckman two-step: estimate the selection (decline) process and the outcome process jointly via an inverse-Mills ratio correction. When is this the right call?</>}
        options={[
          {key:"a", text:"When you have a VALID exclusion restriction: a variable that influences the selection process but NOT the outcome process (e.g., a quirky regional underwriting policy that affects approval but not fraud likelihood). When the joint-normality assumption is plausible (often violated for fraud outcomes). When you've consulted a colleague familiar with econometric two-step methods because the inverse-Mills ratio is fragile to misspecification.", correct:true},
          {key:"b", text:"Always — Heckman is the gold standard."},
          {key:"c", text:"Never — it's an econometric method, not ML."},
          {key:"d", text:"When AUC is high."},
        ]}
        trap={<>(b) overstates; Heckman has strong assumptions that often fail in fraud. (c) is the tribal-knowledge-only-ML view; Heckman is a useful tool when the assumptions hold. (d) is metric-chasing.</>}
        lens={<>(a). Heckman is appropriate when you have a valid exclusion restriction (rare in fraud where the same features drive both decline and fraud) AND when joint-normality is plausible. In most fraud-modeling settings, parceling or randomized holdout is more defensible.</>}
        stretch={<>What's a plausible exclusion restriction in a fraud setting?</>}
      />

      <VIS.TrapProblem
        id="ri-p7"
        difficulty="medium"
        title="P7 — Sensitivity analysis"
        scenario={<>You ship a parceling-based reject-inference model. Audit asks: "how sensitive is your model to the specific reject-inference labels?" What's the right thing to do?</>}
        options={[
          {key:"a", text:"Run sensitivity analyses: re-fit the model under several plausible label assignments for declines (e.g., 25% bad, 50% bad, 75% bad in the band; augmentation; reclassification). Report the AUPRC / precision-at-K / fairness metrics across the runs. If the metrics are stable, ship with documentation; if they swing significantly, that's a flag that the reject-inference is doing more than 'correcting' bias — it's making model choice depend on labeling assumption.", correct:true},
          {key:"b", text:"Refuse — the model is settled."},
          {key:"c", text:"Re-fit with random labels for declines; that's the upper bound on sensitivity."},
          {key:"d", text:"Sensitivity is not required for reject-inference."},
        ]}
        trap={<>(b) is unprofessional. (c) is too pessimistic — random labels don't represent a realistic scenario. (d) skips a standard audit requirement.</>}
        lens={<>(a). Sensitivity analysis across plausible labeling regimes is standard practice in reject-inference. It tells the auditor whether the model is robust to the imputation choice or whether the imputation IS the model.</>}
        stretch={<>What's a sensitivity threshold beyond which you would refuse to ship?</>}
      />

      <VIS.TrapProblem
        id="ri-p8"
        difficulty="hard"
        title="P8 — Bureau-data sourcing trap"
        scenario={<>A teammate proposes: pull credit-bureau outcomes for the declined applicants (did they default elsewhere within 12 months?) and use those as fraud proxy labels. When is this defensible?</>}
        options={[
          {key:"a", text:"When the bureau outcome is a valid proxy for your specific fraud type AND when you have legal basis to pull bureau on declined applicants (typically via FCRA-compliant inquiry). For credit fraud (synthetic identity, application fraud, bust-out fraud), bureau default outcomes within 6-12 months ARE a decent proxy because real fraud tends to manifest as default. For payment fraud (card-not-present, account-takeover), bureau default is NOT a valid proxy. Always document the proxy's validity in the model risk doc.", correct:true},
          {key:"b", text:"Always; bureau data is ground truth."},
          {key:"c", text:"Never; bureau data is biased."},
          {key:"d", text:"Use only if AUC improves."},
        ]}
        trap={<>(b) ignores proxy-validity; not every fraud type matches bureau default. (c) is too restrictive; bureau is a useful proxy in many credit-fraud settings. (d) is metric-chasing.</>}
        lens={<>(a). The senior signal: proxy validity is fraud-type-specific. Bureau default works for credit-product-fraud; not for payment-fraud. Always document validity. FCRA-compliant inquiry is a separate legal step.</>}
        stretch={<>What's the lookback window you'd use for bureau-default as a fraud proxy and why?</>}
      />

      <VIS.TrapProblem
        id="ri-p9"
        difficulty="medium"
        multiSelect
        title="P9 — Reject-inference and online drift"
        scenario={<>Your reject-inference model has been in production for 6 months. The decline-rate has drifted upward (policy tightened). What changes should you make? Select all that apply.</>}
        options={[
          {key:"a", text:"Refresh the reject-inference labels: the decline distribution shifted, so the proxy labels assigned at training-time are stale.", correct:true},
          {key:"b", text:"Retrain on a fresh sample including new declines with refreshed proxy labels.", correct:true},
          {key:"c", text:"Monitor the score-distribution drift on declined cases (where labels are not available); large drift = upstream policy change.", correct:true},
          {key:"d", text:"Refresh the randomized holdout sample to include recent decline patterns.", correct:true},
          {key:"e", text:"Reject-inference is a one-time fix; no refresh needed."},
        ]}
        trap={<>(e) ignores drift; reject-inference assumptions decay as policy + applicant distribution shift.</>}
        lens={<>Four correct. Reject-inference is on-going maintenance, not a one-time pre-deployment step. Refresh labels, retrain, monitor drift, refresh holdout.</>}
        stretch={<>How frequently should reject-inference labels be refreshed in a typical production fraud setting?</>}
      />

      <VIS.TrapProblem
        id="ri-p10"
        difficulty="hard"
        title="P10 — End-to-end reject-inference production design"
        scenario={<>You lead the credit-fraud modeling team at a national issuer. 50M applications/year, 35% decline rate, multi-segment (prime, near-prime, subprime), regulated under ECOA/Reg B, fairness audit required. Design the reject-inference architecture.</>}
        options={[
          {key:"a", text:"Default technique: parceling (probabilistic labels assigned to declines based on same-score-band accepts) for the bulk of declines. Gold-standard supplement: a 0.5-1% randomized policy holdout, pre-funded for expected loss, used as ground-truth periodic recalibration. Where bureau-default is a valid proxy (credit-product-fraud), pull FCRA-compliant bureau outcomes for declined applicants as a third signal. Segment-by-segment treatment: prime / near-prime / subprime have different decline structures and different proxy validity; segment-specific reject-inference. Fairness audit pre and post reject-inference per protected group with the same operating point comparison. Sensitivity analysis across plausible labeling regimes. Quarterly refresh of labels + retraining. Model-risk documentation cites assumptions, sensitivity results, fairness audit, and the randomized-holdout calibration. Online drift monitor on decline-side score distribution to detect upstream policy changes.", correct:true},
          {key:"b", text:"Augmentation everywhere; simplest."},
          {key:"c", text:"Skip reject-inference; train on accepts only."},
          {key:"d", text:"One Heckman two-step model for all segments."},
        ]}
        trap={<>(b) and (c) abdicate. (d) Heckman is fragile and applying one global Heckman to a multi-segment setting compounds the assumption fragility.</>}
        lens={<>(a). The complete senior architecture: parceling as the default, randomized holdout for ground-truth, bureau proxy where valid, per-segment treatment, fairness audit pre/post, sensitivity analysis, quarterly refresh, model-risk doc. This is what survives compliance, fairness audit, and model-risk review at scale.</>}
        stretch={<>What single failure mode would prompt you to roll back the reject-inference layer overnight?</>}
      />
    </VIS.Section>
