      <VIS.TrapProblem
        id="auc-p1"
        difficulty="hard"
        title="P1 — Your AUC is 0.99 but AUPRC is 0.3. What does that mean operationally?"
        scenario={<>Fraud-detection model. Validation set: 10M transactions, 100 fraud (0.001% base rate). ROC-AUC = 0.99. AUPRC = 0.30. The product manager calls AUC "near-perfect, ship it." Walk through what the metrics actually say about operational quality.</>}
        options={[
          {key:"a", text:"AUC 0.99 means: pick a random fraud + random non-fraud, the model ranks fraud higher 99% of the time. At 0.001% base rate, this rank quality is impressive but not operational — the absolute false positive count at any useful recall is still huge. AUPRC 0.30 means: average precision across recall levels is 30%. At top-K equal to SIU capacity (e.g., top 100 alerts), precision is roughly in that range — analysts spend most review time on false alerts. Operational story: the model RANKS well but THE THRESHOLD ECONOMICS ARE BAD. SIU can investigate maybe 100 alerts a day; out of those, 30 will be real fraud. The right next moves are: pair the model with a downstream filter (cheap rule or device fingerprint check), raise the threshold (accept lower recall in exchange for higher precision), or expand SIU capacity if the recovered dollars per alert justify it.", correct:true},
          {key:"b", text:"AUC and AUPRC measure the same thing; one is wrong."},
          {key:"c", text:"AUC 0.99 is the right metric for fraud; ship it."},
          {key:"d", text:"AUPRC 0.30 is bad; throw the model away."},
        ]}
        trap={<>(b) misunderstands the metrics — they measure different things by construction. (c) is the PM's reflex; ships a model SIU cannot actually operate. (d) discards a useful model; AUPRC 0.30 at 0.001% base rate is a 300x lift over the random baseline (0.001%) — significant lift, the problem is operational fit not model quality.</>}
        lens={<>(a). The senior story explains BOTH metrics, names what they say operationally, and proposes specific next moves (downstream filter, threshold, capacity expansion). Senior signal: do not throw away a useful model OR ship a misleading one; explain the gap to the PM in operational terms.</>}
        stretch={<>What single chart would you show the PM to make the same point in 30 seconds?</>}
      />

      <VIS.TrapProblem
        id="auc-p2"
        difficulty="hard"
        multiSelect
        title="P2 — Cross-segment comparison goes wrong"
        scenario={<>Your fraud team breaks AUPRC down by segment: card-present (CP) AUPRC = 0.18, card-not-present (CNP) AUPRC = 0.42, account-takeover (ATO) AUPRC = 0.08. Junior eng says "CP and ATO models are broken; CNP is fine." What's wrong with that reading? Select all that apply.</>}
        options={[
          {key:"a", text:"CP, CNP, and ATO have very different base rates; raw AUPRC is not comparable across segments.", correct:true},
          {key:"b", text:"Compare AUPRC LIFT over the segment-specific random baseline (AUPRC / base_rate) rather than raw AUPRC.", correct:true},
          {key:"c", text:"Compare precision-at-fixed-recall (e.g., precision @ recall = 0.6) across segments — operationally honest.", correct:true},
          {key:"d", text:"Junior is right; ship the CNP model and pause the others."},
          {key:"e", text:"AUPRC is a bad metric; switch all reporting to AUC."},
        ]}
        trap={<>(d) is the junior's mistake. (e) discards the more honest metric to retreat to the misleading one.</>}
        lens={<>Three correct. <strong>(a)</strong> the diagnosis (base-rate confound). <strong>(b)</strong> AUPRC lift normalizes for base rate. <strong>(c)</strong> precision-at-fixed-recall is the operational invariant. Senior signal: name the confound and propose specific operationally-meaningful comparisons.</>}
        stretch={<>Why might precision-at-fixed-recall still be misleading if SIU operates at different capacities per segment?</>}
      />

      <VIS.TrapProblem
        id="auc-p3"
        difficulty="hard"
        title="P3 — Your test AUPRC tanks after a label refresh"
        scenario={<>You re-pulled the fraud labels: previously, only confirmed-fraud was labeled positive; now, suspected-fraud (cases where the customer disputed, model flagged, but no SIU investigation concluded) is also positive. Base rate goes from 0.001 to 0.005. Same model. AUPRC drops from 0.30 to 0.12. Junior eng: "the model got worse." Diagnose.</>}
        options={[
          {key:"a", text:"The model did not change. The label population changed: suspected fraud is noisier (many disputes are not fraud). Higher noise = lower achievable AUPRC. Also, the population shift toward more (but noisier) positives changes the optimal threshold and reshapes the PR curve. The right comparison is AUPRC vs the new noise floor, NOT vs the old AUPRC.", correct:true},
          {key:"b", text:"Retrain the model with the new labels; AUPRC will recover."},
          {key:"c", text:"Revert to the old label definition."},
          {key:"d", text:"AUPRC is unreliable; use ROC-AUC instead."},
        ]}
        trap={<>(b) might help (retraining on the new label distribution is fine), but it does not address the diagnostic question. (c) hides the real issue (label-quality changes affect achievable performance) and probably understates true fraud. (d) reverts to the misleading metric.</>}
        lens={<>(a). The senior diagnosis: label changes are equivalent to changing the noise floor of the problem. AUPRC is anchored against the base rate; if the new positive class includes more borderline cases, the achievable AUPRC is lower regardless of model quality. Estimate the new noise floor (label-quality study, inter-rater agreement on a sample) before judging model quality.</>}
        stretch={<>If the team must use a single number for "is this model getting better or worse" across label refreshes, what would you propose?</>}
      />

      <VIS.TrapProblem
        id="auc-p4"
        difficulty="hard"
        title="P4 — AUC 0.99 model has 99.5% false-positive rate at threshold 0.5"
        scenario={<>Your fraud team ships a logistic regression at threshold 0.5. AUC 0.99 on validation. In production, the model fires on roughly 0.5% of all transactions, and 99% of those alerts are false positives. SIU is drowning. Where's the bug?</>}
        options={[
          {key:"a", text:"At 0.001% base rate, even a small absolute false-positive rate produces a huge ratio of FP to TP. Threshold 0.5 is rarely the right operating point for imbalanced classifiers — class priors, calibration, and operating-point choice matter more than threshold defaults. Diagnose: examine the PR curve, pick a threshold that delivers your SIU-capacity-matched recall, calibrate probabilities if you also need them downstream, and verify with precision-at-K not AUC.", correct:true},
          {key:"b", text:"AUC was a fluke; retrain the model."},
          {key:"c", text:"Logistic regression is broken on imbalanced data; switch to XGBoost."},
          {key:"d", text:"The customer base must be all fraudsters."},
        ]}
        trap={<>(b) misdiagnoses; the AUC is fine — the threshold is wrong. (c) switches models without addressing threshold choice. (d) is silly.</>}
        lens={<>(a). The senior diagnosis: threshold 0.5 default is the bug. At extreme imbalance, the operating point lives in the high-precision corner of the PR curve, not at posterior = 0.5. Operating-point choice is its own design decision — pick it from the PR curve based on SIU capacity, not from a default.</>}
        stretch={<>How does calibration interact with operating-point choice here?</>}
      />

      <VIS.TrapProblem
        id="auc-p5"
        difficulty="medium"
        title="P5 — Class-weighted training inflates AUC"
        scenario={<>Your colleague class-weights the loss 1000:1 in favor of the positive class to "fix imbalance." Training AUC jumps from 0.93 to 0.99. AUPRC barely moves (0.31 to 0.33). Production performance flat. What happened?</>}
        options={[
          {key:"a", text:"Class weighting effectively oversamples positives during training. The model's RANK ordering between positives and negatives improves slightly (slight AUPRC bump), but its predicted probability distribution is now miscalibrated (probabilities are inflated for positives). Some implementations of AUC may overstate due to the weighted evaluation. The real model quality (AUPRC + recall-at-K) barely moved because class weighting doesn't add discriminative information — it just reshapes the loss landscape. Net: a metric-game, not a model improvement.", correct:true},
          {key:"b", text:"AUC is the right metric; ship the new model."},
          {key:"c", text:"Class weighting always improves fraud models; the AUPRC must be miscomputed."},
          {key:"d", text:"AUC went up; that's all that matters."},
        ]}
        trap={<>(b) and (d) treat AUC as ground truth and miss the operational reality. (c) attributes the discrepancy to a metric bug when the model is actually unchanged in capability.</>}
        lens={<>(a). The senior diagnosis: class weighting reshapes the LOSS but does not change the underlying signal. AUC might tick up due to evaluation weighting but AUPRC + production performance is the operational truth. Class weighting is a calibration knob, not a model-quality knob.</>}
        stretch={<>When IS class weighting genuinely useful for fraud models?</>}
      />

      <VIS.TrapProblem
        id="auc-p6"
        difficulty="hard"
        multiSelect
        title="P6 — AUPRC for streaming online evaluation"
        scenario={<>You want to monitor model quality online on a streaming feed (real-time fraud scoring). Live labels arrive with multi-day lag (SIU investigation completes 3-7 days later). Which evaluation strategies are reasonable? Select all that apply.</>}
        options={[
          {key:"a", text:"Compute AUPRC on a sliding window of label-complete data (e.g., 7-day lag), reported daily on the prior week.", correct:true},
          {key:"b", text:"Use proxy labels (chargebacks, customer disputes) for faster feedback while waiting for SIU labels; pair the proxy AUPRC with the true-label AUPRC at lag.", correct:true},
          {key:"c", text:"Monitor PRECISION-AT-K with daily SIU disposition data — operationally available, no need to wait for full labels.", correct:true},
          {key:"d", text:"Use score-distribution drift as a leading indicator of model degradation before labels arrive.", correct:true},
          {key:"e", text:"AUPRC online needs every label immediately; without it, monitoring is impossible."},
        ]}
        trap={<>(e) overstates the requirement.</>}
        lens={<>Four correct. <strong>(a)</strong> sliding-window AUPRC handles the label lag. <strong>(b)</strong> proxy labels for early signal, paired with true-label AUPRC at lag. <strong>(c)</strong> precision-at-K does not need full labels — just enough dispositions. <strong>(d)</strong> drift monitoring is a leading indicator that doesn't need labels at all.</>}
        stretch={<>What single proxy label would you choose first for fraud monitoring?</>}
      />

      <VIS.TrapProblem
        id="auc-p7"
        difficulty="hard"
        title="P7 — AUPRC for ranking-based recommendation problems"
        scenario={<>A teammate proposes using AUPRC as the headline metric for the candidate-generation stage of a recommender. Is that appropriate?</>}
        options={[
          {key:"a", text:"Likely no. AUPRC is built for binary classification with a clear positive/negative label. Recsys candidate generation is a top-K-retrieval problem with NO well-defined negative class (un-shown items are not the same as negatives). Use recall-at-K and NDCG instead. The exception: if you operationalize the task as 'classify each candidate as relevant or not relevant' with a labeled-pairs dataset, then AUPRC can apply — but most prod recsys do not have this label shape.", correct:true},
          {key:"b", text:"Yes; AUPRC is the gold standard for imbalanced problems."},
          {key:"c", text:"No; use AUC for recsys."},
          {key:"d", text:"It depends on the loss function."},
        ]}
        trap={<>(b) misapplies the metric to a problem with no clean binary label. (c) is also wrong for the same reason (AUC has the same issue). (d) is a deflection.</>}
        lens={<>(a). The senior signal: metric choice depends on the problem structure, not just imbalance. Fraud has a clear binary label; candidate generation does not. Use recall-at-K and NDCG for top-K retrieval; reserve AUPRC for binary classification with a labeled positive class.</>}
        stretch={<>When IS AUPRC reasonable for a recsys problem?</>}
      />

      <VIS.TrapProblem
        id="auc-p8"
        difficulty="medium"
        title="P8 — Confidence intervals on AUPRC"
        scenario={<>You report AUPRC = 0.32 on 2M validation transactions with 200 positives. A reviewer asks for confidence intervals. How do you compute them?</>}
        options={[
          {key:"a", text:"Bootstrap: resample (with replacement) at the example level, recompute AUPRC each time (e.g., 1000 resamples), report 2.5th and 97.5th percentiles. Recognize that at 200 positives, the CI will be wide (likely AUPRC plus or minus 0.05 or more). Stratified resampling within positives + negatives gives slightly tighter CIs but the same shape.", correct:true},
          {key:"b", text:"Use a closed-form normal-approximation formula on the AUPRC."},
          {key:"c", text:"Confidence intervals on AUPRC are not standard; skip."},
          {key:"d", text:"Bootstrap the whole training pipeline (refit + score) 1000 times — captures total uncertainty."},
        ]}
        trap={<>(b) there is no clean closed-form for AUPRC CIs because of the step-function structure. (c) skip is unprofessional. (d) is overkill (and conflates model variance with metric variance — different question).</>}
        lens={<>(a). Bootstrapping at the example level (200 positives is small) is standard for AUPRC CIs. Wide CIs are expected; this is one reason why fraud teams pair AUPRC with operational metrics (precision-at-K) that have tighter CIs for fixed K.</>}
        stretch={<>At 200 positives, what's a rough rule of thumb for the AUPRC CI width?</>}
      />

      <VIS.TrapProblem
        id="auc-p9"
        difficulty="hard"
        multiSelect
        title="P9 — Threshold-free vs threshold-specific metrics"
        scenario={<>You're presenting model evaluation to a fraud-team review. Which threshold-FREE and threshold-SPECIFIC metrics belong in the standard fraud-eval scorecard? Select all that apply.</>}
        options={[
          {key:"a", text:"Threshold-free: AUPRC (with base-rate baseline), ROC-AUC (as a rank-quality summary).", correct:true},
          {key:"b", text:"Threshold-free: PR curve plotted across operating points so reviewers see the shape.", correct:true},
          {key:"c", text:"Threshold-specific: precision @ SIU-capacity-recall, recall @ business-target-precision, dollars-recovered-per-alert-hour.", correct:true},
          {key:"d", text:"Threshold-specific: calibration reliability diagram (predicted vs actual fraud rate by predicted-score bin).", correct:true},
          {key:"e", text:"Threshold-free: F1 score at threshold 0.5."},
          {key:"f", text:"Threshold-specific: accuracy at threshold 0.5."},
        ]}
        trap={<>(e) F1 at a fixed threshold IS threshold-specific, mislabeled. (f) accuracy is dominated by true negatives at extreme imbalance and is essentially meaningless.</>}
        lens={<>Four correct. <strong>(a)</strong> AUPRC + ROC-AUC for rank quality. <strong>(b)</strong> the curve itself so reviewers can see operating-point tradeoffs. <strong>(c)</strong> threshold-specific metrics tied to SIU operations. <strong>(d)</strong> calibration matters when downstream decisions use the score. Senior signal: a complete scorecard has threshold-free AND threshold-specific pieces; do not rely on a single number.</>}
        stretch={<>What's the one threshold-specific metric you would put at the top of the page if you had room for only one?</>}
      />

      <VIS.TrapProblem
        id="auc-p10"
        difficulty="hard"
        title="P10 — End-to-end fraud-eval design"
        scenario={<>You're designing the evaluation framework for a new fraud model. Specifications: 1M transactions/day, 0.05% fraud rate, SIU capacity 200 alerts/day, multi-segment (CP, CNP, ATO), label arrival with 3-7 day lag, fairness team will audit segment performance, model is updated quarterly. Specify the eval design.</>}
        options={[
          {key:"a", text:"Headline metric: AUPRC overall + per-segment, paired with each segment's base rate. Operating-point metric: precision-at-recall-K where K matches SIU capacity. Calibration: reliability diagram + Brier score (segment-stratified). Threshold-free: PR curve plotted for each segment. Online monitoring: sliding-window AUPRC at 7-day label lag, plus precision-at-K-daily on dispositions, plus score-distribution drift. Cross-segment comparison: AUPRC LIFT over segment-specific random baseline, NOT raw AUPRC. Fairness audit: precision and recall per protected group, with explicit comparison of the SAME operating point (not the best per-group threshold, which can hide disparate impact). CI: bootstrap on validation with 1000 resamples. Quarterly retrain: report all metrics on the new validation set with overlap to the previous validation set to monitor regression.", correct:true},
          {key:"b", text:"Headline AUC; ship if above 0.95."},
          {key:"c", text:"Skip AUPRC; use accuracy."},
          {key:"d", text:"Compute every metric in scikit-learn and let the team pick."},
        ]}
        trap={<>(b) is the misleading single-number that the rest of this concept argues against. (c) is wrong at extreme imbalance. (d) avoids design responsibility.</>}
        lens={<>(a). The complete senior eval design: headline AUPRC + segment + base rate, operating-point metric matched to SIU capacity, calibration, segment-stratified fairness, online lag-aware monitoring, AND quarterly comparability. This is what survives PM review, SIU operations, fairness audit, and model-refresh cycles.</>}
        stretch={<>What single metric would you put on the fraud-team's weekly dashboard if you had room for only one?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li>
          <a href="https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0118432" target="_blank" rel="noopener">
            <strong>Saito and Rehmsmeier — The Precision-Recall Plot Is More Informative than the ROC Plot</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(PLOS ONE, 2015)</span>
          <br/>The canonical paper. The clearest treatment of why AUPRC dominates ROC at extreme imbalance.
        </li>
        <li>
          <a href="https://scikit-learn.org/stable/modules/model_evaluation.html#precision-recall-and-average-precision" target="_blank" rel="noopener">
            <strong>scikit-learn — Precision-Recall and Average Precision</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(library docs)</span>
          <br/>The practitioner reference for computing AP/AUPRC with the standard step-function convention.
        </li>
        <li>
          <a href="https://www.fast.ai/posts/2022-01-08-rapidresponse.html" target="_blank" rel="noopener">
            <strong>Rachel Thomas — How (and why) to create a good validation set</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(blog)</span>
          <br/>Practitioner essay on validation design. The general lens (your validation must match deployment) applies directly to AUPRC vs ROC choice and operating-point selection.
        </li>
        <li>
          <a href="https://www.tylervigen.com/spurious-correlations" target="_blank" rel="noopener">
            <strong>Davis and Goadrich — The Relationship Between Precision-Recall and ROC Curves</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(ICML 2006)</span>
          <br/>The classic theoretical treatment of the PR-ROC relationship. Mostly of interest for the "PR space dominance implies ROC space dominance and vice versa" theorem.
        </li>
        <li>
          <a href="https://kdd2024.kdd.org/" target="_blank" rel="noopener">
            <strong>KDD 2024 tutorial — (Mis)using AUC for Fraud Detection</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(tutorial)</span>
          <br/>The most recent practitioner-oriented coverage. Working through the slide deck is a good 20-minute investment.
        </li>
      </ul>
    </VIS.Section>
  </main>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>

    window.addEventListener("error", function (e) {
      const pre = document.createElement("pre");
      pre.style.cssText = "position:fixed;top:0;left:0;right:0;max-height:35vh;"
        + "overflow:auto;background:#fee2e2;color:#7f1d1d;padding:8px;"
        + "margin:0;font:12px/1.4 monospace;z-index:10002;";
      pre.textContent = "[visualize] " + (e.error?.stack || e.message || e);
      document.body.appendChild(pre);
    }, true);
  </script>
