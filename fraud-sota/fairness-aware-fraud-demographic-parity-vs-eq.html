<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Fairness-aware fraud — demographic parity vs equality of opportunity in fraud models.
// Hardt et al. (NeurIPS 2016); 'Fair Fraud at Capital One' (ACM FAccT 2024).

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · Evaluation"
      title="Fairness-aware fraud (demographic parity vs. equal opportunity)"
      subtitle="Demographic parity (equal positive rates across groups) hurts overall fraud-detection performance because base fraud rates legitimately differ by segment. Equality of opportunity (equal true-positive rates across groups) preserves recall and is the consensus fairness criterion for fraud."
      byline={[
        {label: "Source", value: "Hardt et al. (NeurIPS 2016); Fair Fraud at Capital One (ACM FAccT 2024)"},
        {label: "Year", value: "2024"},
        {label: "L3", value: "Evaluation and fairness for fraud models"},
      ]}/>

    <VIS.TLDR>
      Two competing fairness definitions look similar but behave very differently for fraud.{" "}
      <VIS.Term def="A fairness criterion requiring the rate of POSITIVE PREDICTIONS to be equal across groups. Independent of ground-truth outcomes. Forces equal alert rates regardless of true fraud rate.">Demographic parity</VIS.Term>{" "}
      forces equal alert (positive-prediction) rates across groups; this hurts recall when base fraud rates differ by group.{" "}
      <VIS.Term def="A fairness criterion requiring TRUE-POSITIVE RATES (recall) to be equal across groups. Conditions on ground truth, so it does not force equal alert rates — it requires equal catch rate among the actual positives in each group.">Equality of opportunity</VIS.Term>{" "}
      requires equal true-positive rates across groups; preserves overall recall and is the consensus criterion for fraud detection where catching fraud is the primary objective. Per-group threshold tuning + equal-opportunity training is the standard practical pattern. Senior question: when does ECOA / Reg B push back, what's the relationship to disparate-treatment vs disparate-impact doctrine, and how do you measure post-deployment.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is">
      <p>
        A fairness-aware fraud model picks a fairness criterion, imposes it as a constraint (or post-processing) on the model + threshold choice, and runs ongoing fairness audits. The two main criteria you'll be asked about:
      </p>
      <ul>
        <li><strong>Demographic parity</strong>: P(alert | group) is equal across groups. Independent of fraud truth. Forces equal alert rate.</li>
        <li><strong>Equality of opportunity</strong>: P(alert | fraud=1, group) is equal across groups — i.e., true-positive rate (recall) is equal. Independent of base rates.</li>
      </ul>
      <p>For fraud, equality of opportunity is the consensus answer because catching fraud is the operational goal and base rates legitimately differ across legitimate segments (card-present vs card-not-present, geography, channel). Capital One's FAccT 2024 paper formalizes the operational pattern: equal-opportunity-constrained training plus per-group threshold tuning, with the resulting model then run through an adverse-action explanation pipeline.</p>

      <VIS.Mermaid chart={`
flowchart TB
  TRAIN["Training data"]
  CONSTRAINT["Fairness constraint at training"]
  MODEL["Constrained model"]
  THRESH["Per-group threshold tuning"]
  AUDIT["Pre and post audit"]
  SHIP["Shipped model"]
  TRAIN --> CONSTRAINT
  CONSTRAINT --> MODEL
  MODEL --> THRESH
  THRESH --> AUDIT
  AUDIT --> SHIP
  style CONSTRAINT fill:#dbeafe,stroke:#2563eb,stroke-width:2px
  style AUDIT fill:#fef3c7,stroke:#d97706,stroke-width:2px
      `} />
      <p>
        Blue = the fairness-aware training step. Yellow = the pre/post audit step. Senior insight: per-group threshold tuning is the operational lever; the training-time fairness constraint shapes the model's calibration; the audit validates the resulting deployment.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="Demographic parity vs equality of opportunity for fraud">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Aspect</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Demographic parity</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Equality of opportunity</th>
          </tr>
        </thead>
        <tbody>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Constraint</td>
            <td style={{padding:"8px 10px"}}>P(alert | group) equal across groups</td>
            <td style={{padding:"8px 10px"}}>P(alert | fraud=1, group) equal across groups</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Conditions on truth?</td>
            <td style={{padding:"8px 10px"}}>No</td>
            <td style={{padding:"8px 10px"}}>Yes</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Behavior when base rates differ</td>
            <td style={{padding:"8px 10px"}}>Forces equal alert rate; hurts recall on the higher-base-rate group</td>
            <td style={{padding:"8px 10px"}}>Allows alert rate to track base rate; preserves recall</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Adverse-action implications</td>
            <td style={{padding:"8px 10px"}}>Easier to defend on "equal treatment" framing</td>
            <td style={{padding:"8px 10px"}}>Requires per-group threshold reasoning</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Recall preservation</td>
            <td style={{padding:"8px 10px"}}>Often poor</td>
            <td style={{padding:"8px 10px"}}>Strong</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Standard pattern in fraud (per FAccT 2024)</td>
            <td style={{padding:"8px 10px"}}>Rarely used</td>
            <td style={{padding:"8px 10px"}}>Standard</td>
          </tr>
        </tbody>
      </table>
      <p style={{marginTop: 12}}>
        Formal definitions:
      </p>
      <VIS.Equation display tex="\text{Demographic parity:}\quad P(\hat{Y}=1 \mid G=g_1) = P(\hat{Y}=1 \mid G=g_2)" />
      <VIS.Equation display tex="\text{Equal opportunity:}\quad P(\hat{Y}=1 \mid Y=1, G=g_1) = P(\hat{Y}=1 \mid Y=1, G=g_2)" />
      <p>
        Equality of opportunity conditions on the actual outcome Y=1; demographic parity does not. That conditioning is what preserves recall when base rates legitimately differ.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-when" title="When to pick">
      <ul>
        <li><strong>Consumer credit / loan fraud under ECOA</strong> — the regulatory backdrop, with adverse-action notice + disparate-impact considerations.</li>
        <li><strong>Catching fraud is the primary operational objective</strong> — equality of opportunity preserves recall; demographic parity sacrifices recall to equalize alert rates.</li>
        <li><strong>Base rates legitimately differ by segment</strong> — channel, geography, product. Demographic parity forces equal alert rates DESPITE these legitimate differences and is rarely the right answer.</li>
        <li><strong>You have access to protected-group labels for AUDIT</strong> (but not necessarily for model training — see disparate-treatment limit below).</li>
        <li><strong>When fraud-impact is asymmetric across groups</strong> — e.g., false-positive blocks hurt some groups more than others; equal-opportunity training + impact-weighted thresholds.</li>
      </ul>
    </VIS.Section>

    <VIS.Section id="sec-limits" title="Limitations and gotchas">
      <VIS.Callout kind="gotcha" title="Disparate-treatment vs disparate-impact">
        ECOA prohibits disparate-TREATMENT: using protected-group membership as a feature in the model itself (with limited exceptions). It also recognizes disparate-IMPACT: a facially-neutral model producing disproportionate outcomes by group. Equality of opportunity is typically implemented WITHOUT using the protected attribute as a feature at training (to avoid disparate-treatment) but USING it for audit and constraint formulation. Some implementations satisfy this via "fair representations" or by training without the protected attribute and post-hoc threshold-tuning — but per-group thresholds themselves can run afoul of disparate-treatment in some interpretations. Consult legal.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Adverse-action notice still required">
        Even with equality of opportunity, declined applicants are entitled (under Reg B for credit, similar rules elsewhere) to adverse-action reasons. The fairness intervention is internal; the customer-facing explanation derives from the final model + threshold. Make sure your adverse-action pipeline still works post-intervention.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Per-group thresholds can be politically charged">
        Operationally, equality of opportunity often reduces to "different decision thresholds for different groups." This is mathematically correct AND ALSO controversial (looks like disparate treatment from one angle and the principled fairness fix from another). In some product lines + jurisdictions, regulators allow it explicitly; in others, they don't. Always partner with Legal + Compliance.
      </VIS.Callout>
      <VIS.Callout kind="info" title="Many fairness definitions are mutually exclusive">
        Kleinberg's impossibility result: when base rates differ, you cannot simultaneously achieve calibration + equal false-positive rates + equal false-negative rates. Picking equality of opportunity for fraud means accepting that other criteria (e.g., predictive parity, demographic parity) will NOT be satisfied. Be explicit about the tradeoff.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — 10 trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        Ten interview-grade traps on demographic parity vs equal opportunity in fraud.
      </p>

      <VIS.TrapProblem
        id="ff-p1"
        difficulty="hard"
        title="P1 — Why does demographic parity hurt fraud detection more than equal opportunity?"
        scenario={<>You're at a senior fraud-modeling interview. The interviewer asks: "Why does demographic parity hurt fraud detection more than equal opportunity?"</>}
        options={[
          {key:"a", text:"Demographic parity forces P(alert | group) to be equal across groups — independent of actual fraud truth. If group A has true fraud rate 1% and group B has 0.2%, demographic parity forces the alert rate to be the same for both — meaning you under-alert on A (missing real fraud) OR over-alert on B (firing on non-fraud) to equalize. Either way, overall recall drops. Equality of opportunity conditions on truth: P(alert | fraud=1, group) is equalized — equal RECALL across groups. Alert rates are allowed to track base rates. Total recall is preserved because you're catching the same fraction of real fraud in every group. For fraud where catching is the primary objective, equal opportunity is the consensus fairness criterion.", correct:true},
          {key:"b", text:"Demographic parity uses race as a feature; equal opportunity does not."},
          {key:"c", text:"Equal opportunity is just easier to compute."},
          {key:"d", text:"Demographic parity isn't a real fairness criterion."},
        ]}
        trap={<>(b) is wrong — neither criterion necessarily uses race as a feature; both can be implemented with protected-attribute usage limited to audit / constraint formulation. (c) is shallow. (d) is wrong; demographic parity is a real and widely-discussed criterion; it's just often inappropriate for fraud.</>}
        lens={<>(a). The senior answer explains that demographic parity ignores truth (base rates) while equal opportunity conditions on truth, and traces this to the operational impact on recall. Senior signal: name the truth-conditioning AND the consequence for recall in plain language.</>}
        stretch={<>When IS demographic parity the right criterion?</>}
      />

      <VIS.TrapProblem
        id="ff-p2"
        difficulty="hard"
        title="P2 — Group-aware features are banned"
        scenario={<>You want to train an equal-opportunity-constrained fraud model. Legal says you cannot use protected-group membership as a feature in the model (ECOA disparate-treatment). How do you build the equal-opportunity constraint without using the protected attribute as input?</>}
        options={[
          {key:"a", text:"Use the protected attribute for the constraint and audit only, NOT as an input feature. Implementation: train a model without the protected attribute as input. Compute per-group recall at a candidate threshold or set of per-group thresholds. Use protected-attribute-aware constraint formulation (e.g., adversarial debiasing where a separate head TRIES to predict group from the representation and the main model penalizes that head's success; or constrained optimization with group-conditional recall as a penalty). The protected attribute exists only in the constraint computation + post-deployment audit, not as a feature.", correct:true},
          {key:"b", text:"Use protected attributes as features; it's fine."},
          {key:"c", text:"Cannot be done — equal opportunity requires the attribute as input."},
          {key:"d", text:"Pull the attribute from the credit bureau and use it as a feature."},
        ]}
        trap={<>(b) violates disparate-treatment doctrine. (c) is wrong — the constraint can be enforced with the attribute used only in the loss / audit. (d) is the disparate-treatment violation in a thin disguise.</>}
        lens={<>(a). The senior pattern: protected attribute used ONLY for constraint formulation + audit; not in the feature set. Adversarial-debiasing or constrained-optimization variants implement this cleanly. Important: this is a legal / compliance design choice; partner with Legal on the specific implementation.</>}
        stretch={<>What's the adversarial-debiasing reference paper for this pattern?</>}
      />

      <VIS.TrapProblem
        id="ff-p3"
        difficulty="hard"
        multiSelect
        title="P3 — Per-group thresholds: are they OK?"
        scenario={<>To satisfy equality of opportunity, you set per-group thresholds: t_A = 0.45, t_B = 0.62. Recall is now equalized at 80% across groups. Counsel asks: "is this disparate-treatment?" Which considerations matter? Select all that apply.</>}
        options={[
          {key:"a", text:"Per-group thresholds are explicitly different decision rules for different protected groups; in some interpretations, this is disparate-treatment.", correct:true},
          {key:"b", text:"In other interpretations (and in some CFPB / OCC guidance), threshold-adjustment for the explicit purpose of remedying disparate-impact is allowed.", correct:true},
          {key:"c", text:"Document the intent (remedy disparate-impact), the method (equality of opportunity post-processing), the alternatives considered, and consult Legal.", correct:true},
          {key:"d", text:"Equal opportunity can sometimes be approximated without per-group thresholds via in-training constraints (Reductions Approach, Adversarial debiasing); this may be more legally defensible.", correct:true},
          {key:"e", text:"Per-group thresholds are always fine; ship it."},
          {key:"f", text:"Per-group thresholds are never fine; abandon equal opportunity."},
        ]}
        trap={<>(e) ignores the legal nuance. (f) overcorrects in the opposite direction.</>}
        lens={<>Four correct. <strong>(a)</strong> the disparate-treatment concern is real. <strong>(b)</strong> the remediation framing is recognized in some guidance. <strong>(c)</strong> documentation + Legal partnership is non-negotiable. <strong>(d)</strong> in-training constraints can sometimes achieve equal opportunity without explicit per-group thresholds at decision time. Senior signal: this is a Legal + ML co-design problem.</>}
        stretch={<>Which jurisdiction-specific guidance addresses this directly?</>}
      />

      <VIS.TrapProblem
        id="ff-p4"
        difficulty="hard"
        title="P4 — Kleinberg impossibility: you cannot have everything"
        scenario={<>A regulator asks: "your model should be calibrated AND have equal false-positive rates AND equal false-negative rates across groups." Why is this impossible when base rates differ?</>}
        options={[
          {key:"a", text:"Kleinberg's impossibility theorem (also Chouldechova): when base fraud rates differ across groups, you cannot simultaneously achieve (1) calibration within each group (predicted probability matches actual rate), (2) equal false-positive rates, and (3) equal false-negative rates. You can satisfy at most two. For fraud, the standard tradeoff is to pick equality of opportunity (≈ equal FNR / equal recall) and calibration; FPR will then differ across groups. The honest answer to the regulator is to explain the impossibility, name which two criteria are satisfied, and document the explicit choice.", correct:true},
          {key:"b", text:"It is possible; ML is powerful enough."},
          {key:"c", text:"Just retrain with more data."},
          {key:"d", text:"It only fails for parametric models."},
        ]}
        trap={<>(b), (c), (d) all evade the impossibility theorem.</>}
        lens={<>(a). Kleinberg's impossibility is foundational; any senior fairness-aware modeler should be able to state it precisely and name the operational consequence. For fraud, calibration + equality of opportunity is the standard pair; FPR disparities are documented and accepted.</>}
        stretch={<>Why does the impossibility fail (i.e., you CAN have all three) when base rates are equal?</>}
      />

      <VIS.TrapProblem
        id="ff-p5"
        difficulty="medium"
        title="P5 — Post-deployment fairness audit metrics"
        scenario={<>You shipped an equal-opportunity-constrained fraud model. What metrics should the monthly fairness audit report?</>}
        options={[
          {key:"a", text:"Per-group recall (TPR), per-group precision, per-group FPR, per-group calibration plot (predicted vs actual), per-group decline rate, per-group adverse-action distribution. Plus a top-level summary: is equal opportunity (per-group recall) within the tolerance band (e.g., +/- 2 percentage points across groups), and what's the gap on the non-target metrics (FPR, precision) so leadership knows what tradeoffs are being made.", correct:true},
          {key:"b", text:"Just AUC per group."},
          {key:"c", text:"One global AUC."},
          {key:"d", text:"Skip the audit if the model has not changed."},
        ]}
        trap={<>(b) and (c) miss most of the fairness picture. (d) ignores drift in the data.</>}
        lens={<>(a). The complete fairness scorecard: per-group recall (target), per-group precision (tradeoff), per-group FPR (tradeoff), per-group calibration, per-group decline + adverse-action distributions. Plus a top-level summary that names what's optimized and what's traded off.</>}
        stretch={<>What's a leading indicator that fairness will degrade NEXT month before the formal audit detects it?</>}
      />

      <VIS.TrapProblem
        id="ff-p6"
        difficulty="hard"
        title="P6 — Compose equal opportunity with reject-inference"
        scenario={<>Your fraud-modeling pipeline uses reject-inference (parceling) AND equal opportunity. Which sequence is correct?</>}
        options={[
          {key:"a", text:"(i) Apply reject-inference to the training data (parceling assigns proxy labels to declined cases). (ii) Train the model with the equal-opportunity constraint over the reject-inference-augmented training set. (iii) Fairness audit pre and post reject-inference (to verify that reject-inference did not entrench policy-driven disparity) and pre and post equal-opportunity training (to verify the constraint is met). (iv) Per-group threshold tuning (where allowed) at deployment. The two interventions COMPOSE — reject-inference broadens the training distribution; equal-opportunity training constrains its fairness properties.", correct:true},
          {key:"b", text:"Reject-inference replaces equal opportunity; pick one."},
          {key:"c", text:"Equal opportunity replaces reject-inference; pick one."},
          {key:"d", text:"Apply equal opportunity to accepts only, reject-inference to declines only."},
        ]}
        trap={<>(b), (c) treat them as alternatives when they're orthogonal. (d) misses the joint training.</>}
        lens={<>(a). The two interventions address different problems: reject-inference handles selection bias in TRAINING DATA; equal opportunity handles fairness in MODEL OUTPUTS. They compose. Pre-and-post fairness audit at each intervention is essential to validate the composition.</>}
        stretch={<>What's a fairness failure mode unique to the COMBINATION of reject-inference + equal opportunity?</>}
      />

      <VIS.TrapProblem
        id="ff-p7"
        difficulty="medium"
        multiSelect
        title="P7 — Intersectional fairness"
        scenario={<>Your fraud model satisfies equality of opportunity on race and on gender individually. But for the INTERSECTION (e.g., race = X AND gender = Y), recall is significantly lower. Which actions apply? Select all that apply.</>}
        options={[
          {key:"a", text:"Audit intersectional groups (race x gender x age, etc.) explicitly — individual-axis fairness does not imply intersectional fairness.", correct:true},
          {key:"b", text:"Re-formulate the equal-opportunity constraint over intersectional groups (computationally heavier; data-sparsity in small intersectional cells is a concern).", correct:true},
          {key:"c", text:"Add fairness-aware loss terms penalizing the worst-case intersectional gap.", correct:true},
          {key:"d", text:"Intersectional fairness is not relevant for fraud."},
          {key:"e", text:"Just average the per-axis recalls and ship."},
        ]}
        trap={<>(d) and (e) dismiss intersectional concerns. The famous Buolamwini + Gebru "Gender Shades" finding — facial-recognition systems performed equally well on coarse axes but failed on intersections (Black women specifically) — is the standard cautionary example.</>}
        lens={<>Three correct. <strong>(a)</strong> intersectional audit is necessary. <strong>(b)</strong> intersectional constraint at training (with data-sparsity caveats). <strong>(c)</strong> worst-case-gap penalties. Senior signal: name "Gender Shades" or analogous evidence; intersectional fairness is not optional.</>}
        stretch={<>What's the data-sparsity problem with intersectional constraints, and how do you handle it?</>}
      />

      <VIS.TrapProblem
        id="ff-p8"
        difficulty="hard"
        title="P8 — Equal opportunity on a multi-output model"
        scenario={<>Your fraud model outputs three scores: P(application fraud), P(account-takeover), P(transaction fraud). Should you enforce equality of opportunity on each individually, jointly, or some other way?</>}
        options={[
          {key:"a", text:"Each fraud category has its own per-group base rate and its own operational consequences (different downstream policies, different downstream impacts). Enforce equality of opportunity per-output, with separate constraints and separate per-group thresholds at deployment. Audit per-output. Joint enforcement (single global constraint) confuses the categories and likely makes the model worse on all three.", correct:true},
          {key:"b", text:"One global equal-opportunity constraint over the joint output."},
          {key:"c", text:"Skip equal opportunity on multi-output models."},
          {key:"d", text:"Average the three outputs and enforce equal opportunity on the average."},
        ]}
        trap={<>(b) flattens distinct fraud categories. (c) abdicates. (d) destroys the multi-output structure.</>}
        lens={<>(a). The senior pattern: per-output fairness with per-output thresholds. Each fraud category lives in its own operational world (different downstream policies, different impacts); fairness should be measured and enforced in that world.</>}
        stretch={<>What's a fairness failure mode where per-output enforcement misses an issue that joint enforcement would catch?</>}
      />

      <VIS.TrapProblem
        id="ff-p9"
        difficulty="hard"
        title="P9 — Customer disputes are themselves biased"
        scenario={<>Your equal-opportunity-constrained model is shipped. The customer-dispute feedback loop (which you use as a label source) is itself biased: some groups dispute more readily than others. How does this affect the fairness story?</>}
        options={[
          {key:"a", text:"Disputes are a NOISY label source. If dispute rate correlates with group membership, then 'training labels' indirectly encode group membership. Equal-opportunity-constrained training is then measured against a biased label distribution. Mitigations: (i) audit dispute rates per group and adjust for differential dispute propensity; (ii) supplement with non-dispute labels (chargebacks, SIU dispositions); (iii) calibrate the model to actual fraud, not disputed fraud; (iv) explicitly model dispute propensity as a separate signal.", correct:true},
          {key:"b", text:"Disputes are the customer's choice; out of scope for fairness."},
          {key:"c", text:"Drop disputes from the label set."},
          {key:"d", text:"Equal opportunity makes this irrelevant."},
        ]}
        trap={<>(b) abdicates fairness. (c) loses a useful signal. (d) misunderstands — equal opportunity is on the OUTPUT; biased LABELS still distort training.</>}
        lens={<>(a). The senior signal: label sources are a fairness consideration. Differential dispute propensity, differential SIU investigation rates, differential bureau-data coverage — all can encode group-correlated label noise. Mitigate via audit, supplementation, calibration to true fraud, and explicit modeling of the label-generation process.</>}
        stretch={<>What's a single proxy for "true fraud" that is least subject to differential reporting?</>}
      />

      <VIS.TrapProblem
        id="ff-p10"
        difficulty="hard"
        title="P10 — End-to-end fair-fraud production design"
        scenario={<>You lead the consumer-credit fraud-modeling team at a national bank. 50M applications/year, 35% decline rate, regulated under ECOA, fairness audit required, multi-output model (application fraud, account-takeover, transaction fraud). Design the complete fair-fraud architecture.</>}
        options={[
          {key:"a", text:"Equal-opportunity constraint at training (NOT demographic parity); per-output (separate constraints + thresholds per fraud category); protected attribute used only in constraint computation + audit, NOT as a model feature; protected attribute pulled from a separate fairness-audit data pipeline. Reject-inference (parceling + randomized policy holdout) on the training data, with fairness audit pre/post. Per-group threshold tuning at deployment (where legally allowed; documented intent of remedying disparate-impact). Intersectional fairness audit (race x gender x age) at monthly cadence. Calibrated probabilities + adverse-action explanation pipeline that surfaces named reasons regardless of fairness intervention. Customer-dispute label-quality audit + supplementation with chargebacks + SIU dispositions. Kleinberg-impossibility-aware documentation (we satisfy equal opportunity + calibration; FPR will differ across groups, and that's an explicit choice). Quarterly retraining with fairness audit gate. Drift monitor on per-group recall + decline rates. Legal partnership on all per-group threshold + protected-attribute-handling choices.", correct:true},
          {key:"b", text:"Demographic parity globally; one threshold; ship."},
          {key:"c", text:"No fairness intervention; just AUC."},
          {key:"d", text:"Per-group threshold tuning only; skip the training-time constraint."},
        ]}
        trap={<>(b) destroys recall and is rarely the right criterion. (c) ignores ECOA disparate-impact + reputational risk. (d) is partial — training-time constraint + post-hoc thresholds together are more robust than thresholds alone.</>}
        lens={<>(a). The complete senior architecture: equal opportunity (NOT demographic parity), per-output, protected-attribute-in-constraint-only, reject-inference + fairness audit pre/post, intersectional audit, Kleinberg-aware documentation, label-quality audit, adverse-action explanation, Legal partnership. This is what survives ECOA + fairness audit + recall-preservation + reputational risk at scale.</>}
        stretch={<>What single failure mode would prompt you to roll back the fairness layer overnight?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li>
          <a href="https://arxiv.org/abs/1610.02413" target="_blank" rel="noopener">
            <strong>Hardt, Price, Srebro — Equality of Opportunity in Supervised Learning</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(NeurIPS 2016)</span>
          <br/>The canonical equal-opportunity paper. Section 3 (the definitions) and section 5 (post-processing for equal opportunity) are the most relevant.
        </li>
        <li>
          <a href="https://dl.acm.org/doi/10.1145/3630106.3658983" target="_blank" rel="noopener">
            <strong>Fair Fraud at Capital One</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(ACM FAccT 2024)</span>
          <br/>The source paper for the operational pattern: equal-opportunity-constrained training plus per-group threshold tuning in a production fraud setting.
        </li>
        <li>
          <a href="https://arxiv.org/abs/1609.05807" target="_blank" rel="noopener">
            <strong>Kleinberg, Mullainathan, Raghavan — Inherent Tradeoffs in Fair Risk Determination</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(2016)</span>
          <br/>The impossibility theorem (P4). Section 2 is enough to understand the result and its operational consequences.
        </li>
        <li>
          <a href="https://www.consumerfinance.gov/" target="_blank" rel="noopener">
            <strong>CFPB — Fair Lending and ECOA guidance</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(regulatory)</span>
          <br/>The regulatory backdrop for ECOA / Reg B. Sections on disparate treatment vs disparate impact ground the legal framing.
        </li>
        <li>
          <a href="https://fairmlbook.org/" target="_blank" rel="noopener">
            <strong>Barocas, Hardt, Narayanan — Fairness and Machine Learning</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(textbook, free online)</span>
          <br/>The canonical practitioner textbook on fair ML. Chapters on group-fairness definitions + their tradeoffs + measurement are 2-3 hour reads, well worth the time.
        </li>
      </ul>
    </VIS.Section>
  </main>
);
