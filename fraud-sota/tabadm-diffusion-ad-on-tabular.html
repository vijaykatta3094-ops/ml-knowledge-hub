  // <VIS.Term def="1-2 sentence plain-English explanation">jargon</VIS.Term>
  //
  // Wraps any technical term so a non-technical reader can hover for an
  // immediate definition. The explanation should:
  //   - assume the reader knows English but not software/your domain
  //   - fit in 1-2 short sentences (a tooltip, not a paragraph)
  //   - avoid further jargon (or wrap that too)
  //
  // The element exposes `data-rv-info` so the report-viewer overlay reuses
  // its own tooltip + double-click "explain this" feedback flow. In
  // standalone /visualize mode (no overlay), the lightweight hover handler
  // below renders the tooltip directly.
  function Term({ def, children }) {
    if (!def) return h(React.Fragment, null, children);
    return h("span", {
      className: "vis-term",
      "data-rv-info": def,
      "aria-label": def,
      tabIndex: 0,
    }, children);
  }

  // Standalone hover tooltip for <VIS.Term>. If the report-viewer overlay
  // is loaded it already shows tooltips for any [data-rv-info] element, so
  // we short-circuit here to avoid double-rendering.
  (function installTermTooltip() {
    let tip = null;
    function show(el) {
      if (window.__rvReady) return;  // overlay.js owns the tooltip in report-viewer mode
      const text = el.getAttribute("data-rv-info");
      if (!text) return;
      if (!tip) {
        tip = document.createElement("div");
        tip.className = "vis-term-tip";
        document.body.appendChild(tip);
      }
      tip.textContent = text;
      const r = el.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const pad = 8;
      let left = Math.max(pad,
        Math.min(r.left, window.innerWidth - tr.width - pad));
      const above = r.top - tr.height - pad;
      const below = r.bottom + pad;
      tip.style.left = left + "px";
      tip.style.top  = (above >= pad ? above : below) + "px";
      tip.style.display = "block";
    }
    function hide() { if (tip) tip.style.display = "none"; }
    document.addEventListener("mouseover", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el); else hide();
    });
    document.addEventListener("focusin", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el);
    });
    document.addEventListener("focusout", hide);
    document.addEventListener("scroll", hide, true);
    // Touch / tap support: on a tap, toggle the tip for the tapped term.
    // Tapping anywhere else (including a different term) hides the current.
    let lastTappedTerm = null;
    document.addEventListener("click", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) {
        if (el === lastTappedTerm) { lastTappedTerm = null; hide(); }
        else { lastTappedTerm = el; show(el); }
      } else {
        lastTappedTerm = null; hide();
      }
    });
  })();

  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."
  //   scenario={<>...JSX...</>}
  //   diagram={<VIS.Mermaid chart={...} />}
  //   options={[
  //     {key:"a", text:"...", correct:false},
  //     {key:"b", text:"...", correct:true},
  //     ...
  //   ]}
  //   trap={<>The most tempting wrong is X because...</>}
  //   lens={<>The right answer + reasoning</>}
  //   stretch="optional follow-up question"
  // />
  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// TabADM — Diffusion-based anomaly detection for tabular fraud features.
// B3 anchor: diffusion log-density of a tabular row as the AD score
// (vs reconstruction in AE; vs isolation depth in IF).
// Cross-visual caution: TabADM (method) vs ADBench (meta-benchmark) — keep distinct.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · Deep anomaly detection"
      title="TabADM / Diffusion AD on tabular"
      subtitle="A diffusion denoiser trained on benign rows; the anomaly score is the denoising error at small noise levels — a tractable proxy for log-density of a tabular row."
      byline={[
        {label: "Paper", value: "Zamberg et al., ICML 2024"},
        {label: "Year", value: "2024"},
        {label: "L3", value: "Deep tabular AD"},
      ]}/>

    <VIS.TLDR>
      Classical VAE / autoencoder anomaly detectors{" "}
      <VIS.Term def="A failure mode where the encoder ignores the input and the decoder learns to output the marginal feature distribution. Reconstruction error becomes uninformative for anomaly scoring.">posterior-collapse</VIS.Term>{" "}
      on heterogeneous tabular data: the KL term in the ELBO pushes the posterior toward the prior and reconstruction error stops discriminating. TabADM replaces the ELBO with a per-noise-level denoising objective — no KL squeeze, no collapse. The score is the denoising reconstruction error at small noise levels, averaged across a short noise schedule. Wins on heterogeneous tabular fraud; loses on inference latency (K denoising steps per score).
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is — the score, end to end">
      <p>
        TabADM is a one-class anomaly detector built on top of a{" "}
        <VIS.Term def="A class of generative models that learn to reverse a gradual noising process. To score a point, you add a small amount of noise and measure how cleanly the trained model can denoise it.">diffusion model</VIS.Term>:
      </p>
      <ol>
        <li><strong>Train</strong> a denoiser eps_theta(x_t, t) on the BENIGN-only feature distribution. Loss is mean squared error on the predicted noise at uniformly-sampled noise level t.</li>
        <li><strong>Score</strong> a test row x: pick small t (e.g., t = 20 out of 1000), sample noise epsilon, form x_t = sqrt(alpha_bar_t)·x + sqrt(1 - alpha_bar_t)·epsilon, run the denoiser, and report ||eps_theta(x_t, t) - epsilon||² as that-level's error.</li>
        <li><strong>Average</strong> across a short SMALL-noise schedule (e.g., t in {`{10, 20, 30, 40, 50}`}) for variance reduction. Higher score → further off the benign manifold.</li>
      </ol>

      <VIS.Mermaid chart={`
flowchart TB
  X["Test row x"]
  X --> N["Add small noise t in 10 to 50"]
  N --> D["Trained denoiser eps_theta"]
  D --> R["Predicted noise eps_hat"]
  R --> E["Score = avg norm of eps_hat minus eps"]
  style D fill:#dbeafe,stroke:#2563eb,stroke-width:2px
  style E fill:#fef3c7,stroke:#d97706,stroke-width:2px
      `} />
      <p>
        Blue is the trained denoiser. Yellow is the anomaly score. We score at SMALL noise levels because at large noise the denoiser only knows the marginal distribution; discriminating signal lives in the local-manifold regime where benign rows denoise cleanly and anomalies drift.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How it differs from VAE-AD and Isolation Forest">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8, fontSize:14}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Aspect</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>VAE-AD</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Isolation Forest</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>TabADM</th>
          </tr>
        </thead>
        <tbody>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Score basis</td>
            <td style={{padding:"8px 10px"}}>Reconstruction error</td>
            <td style={{padding:"8px 10px"}}>Tree isolation depth</td>
            <td style={{padding:"8px 10px"}}>Denoising error at small t</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Failure mode</td>
            <td style={{padding:"8px 10px"}}>Posterior collapse (KL squeeze)</td>
            <td style={{padding:"8px 10px"}}>Misses high-order joint fraud</td>
            <td style={{padding:"8px 10px"}}>K× inference cost; small-noise tuning</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Captures</td>
            <td style={{padding:"8px 10px"}}>Smooth-continuous structure</td>
            <td style={{padding:"8px 10px"}}>Marginal/low-order outliers</td>
            <td style={{padding:"8px 10px"}}>High-order joint manifold</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Inference cost</td>
            <td style={{padding:"8px 10px"}}>1 forward pass</td>
            <td style={{padding:"8px 10px"}}>O(log n) per tree</td>
            <td style={{padding:"8px 10px"}}>K denoising steps</td>
          </tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — 22 trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        Twenty-two interview-grade traps on diffusion-density anomaly scoring, the specific posterior-collapse mechanism it sidesteps, small-noise scoring discipline, and production sequencing against IF and ADBench.
      </p>

      {/* AXIS: D1 — concept-specific mechanism trap */}
      <VIS.TrapProblem
        id="tabadm-p1"
        difficulty="hard"
        title="P1 — Why does a VAE anomaly detector collapse on tabular fraud features but TabADM does not?"
        scenario={<>You train a VAE-AD on benign transactions (40 features, 15 categorical one-hot, 25 continuous). Reconstruction loss converges; AUROC is 0.51 — both benign and fraud reconstruct equally well. Switching to TabADM on the same data and same encoder backbone lifts AUROC to 0.82. What is the discriminating mechanism?</>}
        options={[
          {key:"a", text:"The KL term in the VAE's ELBO pushes the approximate posterior toward the prior; on weak heterogeneous signal the model takes the path of least resistance — encoder ignores x, decoder outputs a marginal mean. TabADM's loss is per-noise-level denoising MSE with no KL squeeze, so there is no posterior-collapse pathway.", correct:true},
          {key:"b", text:"TabADM has more parameters."},
          {key:"c", text:"TabADM uses Gaussian noise during training; VAE does not."},
          {key:"d", text:"The VAE used the wrong activation function."},
        ]}
        trap={<>(b) is irrelevant — collapse is a structural objective problem, not a capacity problem. (c) confuses noising mechanics. (d) blames optimization for a loss-shape issue.</>}
        lens={<><em>Discriminating insight:</em> the KL term is the specific failure surface. Replacing the ELBO with per-noise-level denoising MSE removes the squeeze; the same backbone now produces a usable score.</>}
        stretch={<>Which VAE variants (beta-VAE with low beta, free-bits, NF posterior) try to keep VAE-AD usable, and why are they typically a partial fix?</>}
      />

      {/* AXIS: C2 — small-noise scoring mechanism */}
      <VIS.TrapProblem
        id="tabadm-p2"
        difficulty="hard"
        title="P2 — At which noise levels should you score, and why?"
        scenario={<>TabADM lets you score at any t in [1, 1000]. You try three configurations: (i) one fixed large t = 800, (ii) one fixed small t = 20, (iii) average across small t in {`{10, 20, 30, 40, 50}`}. AUROCs are 0.55, 0.78, 0.83. Why?</>}
        options={[
          {key:"a", text:"At large t the input is mostly noise; the denoiser only knows the marginal distribution and produces the same expected error for benign and anomalous points — the signal collapses. At small t, the denoiser leans on local manifold structure — benign rows denoise cleanly, anomalies drift. Averaging across a few small t reduces variance without entering the marginal regime.", correct:true},
          {key:"b", text:"Large t loses signal because of floating-point underflow."},
          {key:"c", text:"You should always score at exactly t = 1 for maximum signal."},
          {key:"d", text:"Variance reduction is incidental; the real reason is the model is better trained at small t."},
        ]}
        trap={<>(b) invents a numerical issue. (c) ignores variance reduction. (d) misattributes — the schedule effect is sampling variance, not training quality.</>}
        lens={<><em>Discriminating insight:</em> the small-noise regime is where the local manifold matters; the large-noise regime is the marginal distribution where benign and fraud are indistinguishable.</>}
        stretch={<>How would you choose the specific schedule (which small t to include) for YOUR dataset?</>}
      />

      {/* AXIS: D2 — wrong scoring mental model */}
      <VIS.TrapProblem
        id="tabadm-p3"
        difficulty="medium"
        title="P3 — Which of these are valid ways to compute a TabADM anomaly score?"
        scenario={<>Pick the score definition that is mechanically coherent with how TabADM is trained.</>}
        options={[
          {key:"a", text:"Add small noise to x; run denoiser; report norm of (predicted noise minus actual noise), averaged over a short small-noise schedule.", correct:true},
          {key:"b", text:"Generate K samples from the diffusion prior and count how many fall within an epsilon ball of x."},
          {key:"c", text:"Run the full forward process T = 1000 steps on x and report the final noise norm."},
          {key:"d", text:"Compute the KL divergence between x and the trained prior."},
        ]}
        trap={<>(b) is generation-based scoring — exponentially expensive in feature dim and not how diffusion scoring works. (c) is the noising direction, not denoising. (d) is dimensionally incoherent for a single point.</>}
        lens={<><em>Discriminating insight:</em> a diffusion AD score is REVERSE-process error at small noise, not generation density and not forward-noise statistics.</>}
        stretch={<>Why is the score definition robust to the specific noise epsilon drawn at scoring time?</>}
      />

      {/* AXIS: C5 / E4 — categorical encoding gotcha (diffusion-specific) */}
      <VIS.TrapProblem
        id="tabadm-p4"
        difficulty="hard"
        multiSelect
        title="P4 — Encoding mixed-type tabular for a continuous-noise process"
        scenario={<>You are preparing 40 features (15 categorical including merchant_id with 50k distinct values, 25 continuous) for a TabADM pipeline. Diffusion adds Gaussian noise in feature space. Which choices materially help, and which break the noise process?</>}
        options={[
          {key:"a", text:"Replace high-cardinality categoricals with learned low-dim embeddings co-trained with the denoiser.", correct:true},
          {key:"b", text:"Quantile-transform continuous columns toward an approximately Gaussian marginal.", correct:true},
          {key:"c", text:"Log-transform heavy-tailed monetary amounts before standardization.", correct:true},
          {key:"d", text:"One-hot all 50,000 merchant levels."},
          {key:"e", text:"Hash each categorical to a single integer index used directly as a feature."},
          {key:"f", text:"Drop all categorical columns and keep only continuous."},
        ]}
        trap={<>(d) blows dimensionality to 50,000 sparse axes — Gaussian noise on a one-hot is meaningless. (e) destroys ordinal/categorical structure — the noise process treats the integer as continuous. (f) discards signal.</>}
        lens={<><em>Discriminating insight:</em> continuous noise + sparse one-hot ≠ a coherent generative process. Embedding-then-noise is the bridge between categorical info and the diffusion objective.</>}
        stretch={<>What embedding dim is a reasonable starting rule for cardinality C?</>}
      />

      {/* AXIS: E1 — latency, K-step ceiling */}
      <VIS.TrapProblem
        id="tabadm-p5"
        difficulty="medium"
        title="P5 — 25 denoising steps at 8ms each. p99 SLA = 30ms. What ships?"
        scenario={<>Real-time fraud tier: 30ms p99, 600 TPS. Naive TabADM scoring uses 25 denoising steps at 8ms/step.</>}
        options={[
          {key:"a", text:"Distill TabADM into a single-forward-pass student model with the anomaly score as the regression target; deploy the student. Optionally also ship a few-step variant (3-5 steps) for higher-stakes traffic.", correct:true},
          {key:"b", text:"Add more GPUs to reduce per-request latency."},
          {key:"c", text:"Ship as-is — 200ms is acceptable for fraud."},
          {key:"d", text:"Run TabADM only on transactions above a static amount threshold."},
        ]}
        trap={<>(b) increases throughput, not per-request latency. (c) violates SLA. (d) is a band-aid that misses small-amount fraud.</>}
        lens={<><em>Discriminating insight:</em> diffusion's K-step cost is the cost of the generative score; distillation maps the trained scorer to a one-pass regressor and preserves rank ordering for AD use.</>}
        stretch={<>What fidelity metric tracks distillation quality for an ANOMALY scorer (not classification)?</>}
      />

      {/* AXIS: D4 — ADBench/sibling caveat */}
      <VIS.TrapProblem
        id="tabadm-p6"
        difficulty="hard"
        title="P6 — When does Isolation Forest beat TabADM on YOUR data?"
        scenario={<>ADBench finds tuned IF rivals most deep tabular AD. On your fraud data, which structural signal predicts IF will be hard to beat with TabADM?</>}
        options={[
          {key:"a", text:"When fraud is detectable via low-order marginal outliers — e.g., very large amount, brand-new device, rare country. Tree isolation captures these cheaply; the diffusion model's edge in modeling joint structure brings little extra signal here.", correct:true},
          {key:"b", text:"When the data has 0.5% prevalence."},
          {key:"c", text:"When you have enough GPU."},
          {key:"d", text:"When labels are noisy."},
        ]}
        trap={<>(b)(c)(d) are universal fraud constraints — they apply to both methods.</>}
        lens={<><em>Discriminating insight:</em> TabADM's edge is in high-order joint structure. Low-order fraud = IF territory at 100× lower cost.</>}
        stretch={<>What single offline experiment cleanly tests "is my fraud low-order or high-order"?</>}
      />

      {/* AXIS: D6 — adversarial probing */}
      <VIS.TrapProblem
        id="tabadm-p7"
        difficulty="hard"
        multiSelect
        title="P7 — Adversarial probing of a diffusion-based scorer"
        scenario={<>An attacker can submit synthetic transactions and observe binary accept/reject. Which attacks are realistic, and which are not?</>}
        options={[
          {key:"a", text:"Manifold attack — craft features that mimic common benign joint patterns to pull denoising error below threshold.", correct:true},
          {key:"b", text:"Boundary probing — binary-search on a feature (amount, velocity) to find the decision boundary, then plant fraud just inside.", correct:true},
          {key:"c", text:"Threshold-drift exploitation — send small bursts that nudge a rolling-percentile threshold upward, then attack at the new boundary.", correct:true},
          {key:"d", text:"GAN-generated near-benign features submitted as fraud.", correct:true},
          {key:"e", text:"Force the diffusion model to overfit to the attacker's transactions via gradient-based finetuning."},
        ]}
        trap={<>(e) requires model access and label oracle; not feasible from a black-box accept/reject channel.</>}
        lens={<><em>Discriminating insight:</em> anomaly scorers face manifold/boundary/threshold attacks. Mitigation = ensemble multiple AD scores, isotonic-calibrate thresholds (vs rolling percentile), rate-limit per-account probing.</>}
        stretch={<>Which of these attacks does a tuned IF also face? Which is unique to deep AD?</>}
      />

      {/* AXIS: C4 — one-class training discipline */}
      <VIS.TrapProblem
        id="tabadm-p8"
        difficulty="medium"
        title="P8 — Should you include confirmed-fraud rows in TabADM training?"
        scenario={<>You have 200M benign and 50k confirmed-fraud rows. The intern proposes training TabADM on ALL of it for "more data".</>}
        options={[
          {key:"a", text:"No — keep training benign-only. TabADM is a one-class density estimator; including fraud rows teaches the denoiser to also reconstruct fraud manifolds, lowering scores for fraud at inference. Use confirmed fraud only for threshold calibration and supervised side-channels.", correct:true},
          {key:"b", text:"Yes — more data always helps; the model will learn the difference."},
          {key:"c", text:"Yes — and balance benign/fraud 50-50 to handle imbalance."},
          {key:"d", text:"Yes, but only after removing categorical features."},
        ]}
        trap={<>(b)(c) confuse supervised classification with one-class density. (d) is a non-sequitur.</>}
        lens={<><em>Discriminating insight:</em> the score works precisely because the denoiser ONLY knows the benign manifold; teaching it the fraud manifold collapses the gap.</>}
        stretch={<>What if fraud-row contamination is unavoidable (label noise of 5% in "benign")?</>}
      />

      {/* AXIS: C3 — why average over schedule */}
      <VIS.TrapProblem
        id="tabadm-p9"
        difficulty="medium"
        title="P9 — Why average denoising error across a noise schedule rather than scoring at one t?"
        scenario={<>You compare scoring at one fixed small t vs averaging over t in {`{10, 20, 30, 40, 50}`}. Which is the right reason to average?</>}
        options={[
          {key:"a", text:"The denoising MSE at any single t has substantial sampling noise from the random epsilon drawn at scoring time. Averaging across a short schedule reduces variance without leaving the small-noise (manifold-sensitive) regime.", correct:true},
          {key:"b", text:"Averaging fixes the model's underfitting at small t."},
          {key:"c", text:"Averaging gives a probabilistically calibrated score directly."},
          {key:"d", text:"Averaging is required for distillation."},
        ]}
        trap={<>(b)(c)(d) conflate variance reduction with training quality, calibration, and distillation — separate concerns.</>}
        lens={<><em>Discriminating insight:</em> averaging is a variance-reduction trick on the sampling of epsilon at scoring time, not a fix for training or calibration.</>}
        stretch={<>How many noise levels are enough? What is the diminishing-return point?</>}
      />

      {/* AXIS: E5 — drift monitor */}
      <VIS.TrapProblem
        id="tabadm-p10"
        difficulty="medium"
        title="P10 — Benign distribution drifts; TabADM scores inflate. What do you monitor?"
        scenario={<>Two weeks after launch, the median TabADM anomaly score has shifted up 15% across all traffic. Confirmed fraud rate is unchanged. What is the most likely cause and the right monitor?</>}
        options={[
          {key:"a", text:"Benign feature distribution has drifted — the trained denoiser sees inputs further from its training manifold and produces higher denoising errors for everyone. Monitor a KS-test on per-feature distributions vs training reference; on alert, schedule a retrain or shift-correction.", correct:true},
          {key:"b", text:"Your GPU is throttling."},
          {key:"c", text:"The diffusion model is overfitting at inference."},
          {key:"d", text:"The noise schedule changed."},
        ]}
        trap={<>(b) does not change scores. (c) is not a thing (overfitting is a training concept). (d) is the operator's choice and should not silently change.</>}
        lens={<><em>Discriminating insight:</em> a one-class density model is sensitive to input-distribution drift on benigns; the inflation is a false-positive shift unrelated to actual fraud rate.</>}
        stretch={<>How would you do shift-correction without a full retrain?</>}
      />

      {/* AXIS: C1 / D2 — direction of the denoising loss */}
      <VIS.TrapProblem
        id="tabadm-p11"
        difficulty="hard"
        title="P11 — What does the denoiser predict, and how does that connect to the score?"
        scenario={<>Pick the precise training signal in TabADM and the precise score at inference.</>}
        options={[
          {key:"a", text:"Training: predict the noise eps added to x_0 to form x_t. Loss = MSE on predicted noise. Inference score: add small noise, predict, report MSE of predicted noise vs actual noise.", correct:true},
          {key:"b", text:"Training: predict x_0 directly from x_t. Inference: report KL divergence of predicted distribution."},
          {key:"c", text:"Training: predict the next forward-process step. Inference: report how many steps to reach pure noise."},
          {key:"d", text:"Training: maximize log-likelihood directly with score matching. Inference: report likelihood."},
        ]}
        trap={<>(b) is the eps vs x_0 parameterization choice — both possible, but TabADM uses noise-prediction. (c) is operationally backward. (d) is the score-matching family but not the trained-score TabADM uses.</>}
        lens={<><em>Discriminating insight:</em> the noise-prediction parameterization gives a clean per-noise-level MSE that doubles as score; the train objective and score are the same quantity.</>}
        stretch={<>How would the alternative x_0-parameterization change the score formula?</>}
      />

      {/* AXIS: F1 — when TabADM is the wrong choice */}
      <VIS.TrapProblem
        id="tabadm-p12"
        difficulty="medium"
        multiSelect
        title="P12 — When is TabADM the WRONG choice (architectural mismatch)?"
        scenario={<>Pick conditions where TabADM is structurally a bad fit even if you have data and compute.</>}
        options={[
          {key:"a", text:"You have 6 features total (5 continuous, 1 categorical).", correct:true},
          {key:"b", text:"Fraud lives almost entirely in low-order marginals (giant amount, rare country).", correct:true},
          {key:"c", text:"Real-time SLA is 10ms p99 and you cannot distill.", correct:true},
          {key:"d", text:"You have 200M benign rows and 50k labeled fraud."},
          {key:"e", text:"You can afford GPU inference."},
        ]}
        trap={<>(d)(e) are favorable conditions; not disqualifiers.</>}
        lens={<><em>Discriminating insight:</em> low-dim + low-order + tight SLA → IF/GBDT. TabADM earns its keep on high-dim + high-order + batch/distillable.</>}
        stretch={<>At what feature count does TabADM start to dominate IF empirically per ADBench?</>}
      />

      {/* AXIS: E2 — calibration */}
      <VIS.TrapProblem
        id="tabadm-p13"
        difficulty="medium"
        title="P13 — Downstream consumer wants P(fraud), not a raw score. How do you calibrate?"
        scenario={<>The risk engine wants a probability, not a denoising-error number. Pick the right calibration path.</>}
        options={[
          {key:"a", text:"Fit isotonic regression on a held-out window mapping raw denoising-error scores to confirmed-fraud rate per score bin. Refit weekly to track drift.", correct:true},
          {key:"b", text:"Apply softmax to the raw score."},
          {key:"c", text:"Use the score directly as P(fraud) divided by 100."},
          {key:"d", text:"Train a logistic regression on top of the score with sigmoid."},
        ]}
        trap={<>(b) makes no sense on a single scalar. (c) is dimensionally arbitrary. (d) is Platt-style and OK but isotonic typically handles the non-linear bin shape better for AD scores.</>}
        lens={<><em>Discriminating insight:</em> AD scores are rank-meaningful but not probability-meaningful; isotonic regression preserves ranking while imposing monotonicity to P(fraud).</>}
        stretch={<>Why does isotonic usually beat Platt for AD score calibration?</>}
      />

      {/* AXIS: C6 — Inference compute */}
      <VIS.TrapProblem
        id="tabadm-p14"
        difficulty="medium"
        multiSelect
        title="P14 — Levers to cut TabADM inference cost without retraining"
        scenario={<>Which moves cut score-time cost while preserving rank ordering?</>}
        options={[
          {key:"a", text:"Reduce the number of small-t levels averaged (e.g., 5 → 3).", correct:true},
          {key:"b", text:"Batch many test rows together to amortize GPU launch overhead.", correct:true},
          {key:"c", text:"Use FP16 (or BF16) inference where supported.", correct:true},
          {key:"d", text:"Increase the noise level t to t = 800 to get bigger signal."},
          {key:"e", text:"Switch to running the denoiser only on the categorical features."},
        ]}
        trap={<>(d) destroys signal (see P2). (e) breaks the model — the denoiser was trained on the full feature vector.</>}
        lens={<><em>Discriminating insight:</em> the small-noise schedule and FP16 are the levers; subsetting features or large-t scoring breaks the score's mechanism.</>}
        stretch={<>At what schedule length does rank-correlation with the full-K score drop below 0.95?</>}
      />

      {/* AXIS: D3 cascade */}
      <VIS.TrapProblem
        id="tabadm-p15"
        difficulty="hard"
        title="P15 — Diagnose this cascade"
        scenario={<>Junior MLE: "I tried TabADM, beat IF on the public dataset by 5 AUROC points, but in shadow against IF on our production traffic, TabADM is 2 points BEHIND IF. What's wrong with TabADM?"</>}
        options={[
          {key:"a", text:"Public-dataset fraud is high-order joint (where TabADM wins); your production fraud may be dominated by low-order marginal outliers (where IF wins). Run a fraud-decomposition: train a 1-feature IF per feature; if any single-feature IF gets close to ensemble IF, low-order fraud dominates and TabADM has little extra to add.", correct:true},
          {key:"b", text:"TabADM was undertrained — retrain for more epochs."},
          {key:"c", text:"IF was overfit to your training data."},
          {key:"d", text:"The two models have different score scales."},
        ]}
        trap={<>(b)(c) are the easy excuses. (d) is irrelevant for AUROC which is rank-based.</>}
        lens={<><em>Discriminating insight:</em> public-dataset wins are not guarantees on YOUR fraud signal structure. Decompose the signal before assigning blame to a model.</>}
        stretch={<>Design the per-feature-IF decomposition experiment in one paragraph.</>}
      />

        title="P16 — Rollout checklist items that are SPECIFIC to a diffusion AD scorer"
        scenario={<>Which checks specifically matter for TabADM (beyond generic ML rollout hygiene)?</>}
        options={[

          {key:"c", text:"Benign-distribution drift KS test on the input features vs training reference.", correct:true},

      />

      {/* AXIS: D1 — beta-VAE / NF posterior decoys */}
      <VIS.TrapProblem
        id="tabadm-p17"
        difficulty="hard"
        title="P17 — Why aren't VAE collapse-fixes (beta-VAE, NF posterior) enough to replace TabADM?"
        scenario={<>The intern proposes a beta-VAE with beta = 0.01 (to weaken the KL squeeze) as a cheaper alternative to TabADM.</>}
        options={[
          {key:"a", text:"Very low beta degenerates the VAE into a regular autoencoder — no probabilistic structure, reconstruction error often just memorizes the training set and AD generalization suffers. Diffusion gets a similar 'no KL squeeze' benefit but keeps a principled per-noise-level reconstruction objective that still requires modeling the manifold rather than memorizing.", correct:true},
          {key:"b", text:"Beta-VAE with beta = 0.01 is mathematically equivalent to TabADM."},
          {key:"c", text:"Beta-VAE will work perfectly; TabADM is overkill."},

        stretch={<>What about normalizing-flow posteriors — when do they suffice?</>}
      />

        id="tabadm-p18"
        difficulty="hard"
        title="P18 — Math of the small-t forward step"
        scenario={<>At noise step t, alpha_bar_t = 0.99. You form x_t = sqrt(alpha_bar_t)·x_0 + sqrt(1 - alpha_bar_t)·epsilon. What does this say about the signal-to-noise ratio of x_t?</>}
        options={[
          {key:"a", text:"x_t is mostly the signal x_0 (weighted by ~0.995) with a small noise component (weighted by ~0.1) — the small-noise regime where denoising error is sensitive to local manifold structure.", correct:true},
          {key:"b", text:"x_t is mostly noise."},
          {key:"c", text:"x_t equals the marginal mean."},
          {key:"d", text:"Alpha_bar_t = 0.99 is a degenerate case."},
        ]}
        trap={<>(b)(c)(d) misread the noise schedule arithmetic.</>}
        lens={<><em>Discriminating insight:</em> the scoring schedule is chosen precisely so alpha_bar_t stays near 1 — keeping x_t in the local neighborhood of x_0 where the manifold matters.</>}
        stretch={<>What alpha_bar_t value defines the boundary between "useful for AD scoring" and "too noisy"?</>}
      />

        id="tabadm-p19"

        title="P19 — TabADM and weak-label noise: what's the production reality?"

        options={[

      />

      <VIS.TrapProblem
        id="tabadm-p21"
