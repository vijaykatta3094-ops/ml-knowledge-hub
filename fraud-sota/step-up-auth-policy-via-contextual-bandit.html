        ]}
        trap={<>(b) is fashion. (c) is vague. (d) is an unsupported number.</>}
        lens={<><em>Discriminating insight:</em> the pitch names the structural advantages (delayed-reward handling, exploration, native arm cold-start) AND owns the cost (reward design, off-policy eval, staged rollouts).</>}
        stretch={<>How does the bandit play with the SMS deprecation that NIST is recommending?</>}
      />

      <VIS.TrapProblem
        id="su-p21"
        difficulty="medium"
        title="P21 — Logging at decision time: what MUST be logged for off-policy eval to work?"
        scenario={<>You must log enough information per decision to support later off-policy evaluation. What is mandatory?</>}
        options={[
          {key:"a", text:"At minimum: (1) full context vector AS SEEN at decision time (snapshot — not refetched later); (2) action chosen; (3) policy version; (4) action probability under that policy (the propensity, for IPS); (5) timestamp; (6) immediate outcome; (7) link to delayed-reward source (chargeback, dispute) so it can be joined later. Missing the propensity is the most common bug; without it, you can't reweight in IPS / doubly-robust evaluation. The full context snapshot matters because the feature store will have changed by the time you re-fetch.", correct:true},
          {key:"b", text:"Just the chosen action and outcome."},
          {key:"c", text:"Just the context."},
          {key:"d", text:"The bandit's full posterior."},
        ]}
        trap={<>(b)(c) are missing pieces. (d) is overkill and impractical.</>}
        lens={<><em>Discriminating insight:</em> the propensity at decision time is the bandit-specific log requirement. Forget to log it once and your off-policy eval is biased forever after.</>}
        stretch={<>How would you handle the case where the policy was deterministic at decision time (propensity = 1)?</>}
      />

      <VIS.TrapProblem
        id="su-p22"
        difficulty="medium"
        title="P22 — A/B test design: how do you measure bandit vs rule-based step-up?"
        scenario={<>You want to run a head-to-head A/B between the bandit and the current rule-based step-up policy. What is the right metric stack?</>}
        options={[
          {key:"a", text:"Primary: confirmed-fraud rate per arm (30-60 day window) — the true outcome metric. Secondary: per-segment completion rate, drop-off rate, support-contact rate, latency. Guardrail: total challenge volume per arm (to confirm both policies face similar load mixes) AND user-reported friction (NPS or survey on step-up flow). Sample size driven by the rare fraud rate (often need millions per arm). Interim proxy: completion rate weighted by historical fraud-per-arm to estimate the primary before the 60-day window closes.", correct:true},
          {key:"b", text:"Just completion rate."},
          {key:"c", text:"Just AUROC."},
          {key:"d", text:"Just the bandit's reward."},
        ]}
        trap={<>(b)(c) miss fraud. (d) is biased — the bandit optimizes its own reward; need an independent metric.</>}
        lens={<><em>Discriminating insight:</em> the head-to-head metric must include the delayed-fraud outcome AS PRIMARY, with proxy metrics for early reads. Single-metric A/B is the bandit-deployment trap.</>}
        stretch={<>How long until you can call the experiment statistically?</>}
      />

      <VIS.TrapProblem
        id="su-p23"
        difficulty="hard"
        title="P23 — Compliance asks: 'show me the bandit's decision logic for a specific session'. What do you produce?"
        scenario={<>An auditor wants per-decision explainability for a step-up choice. The bandit picked KBA for session #99. Justify.</>}
        options={[
          {key:"a", text:"Produce: (1) the context vector as snapshotted; (2) the per-arm score the bandit computed (linear contribution: theta_arm dot context, plus exploration bonus); (3) the action probability for each arm at that moment (propensity); (4) the policy version with a link to its model card; (5) the immediate outcome and (when available) the delayed-fraud outcome. LinUCB and Thompson are both linear-friendly so per-feature attribution is straightforward. This is the bandit equivalent of SHAP for a classifier — it exists, it just requires logging the right things at decision time (see P21).", correct:true},
          {key:"b", text:"The bandit is a black box — explain that it cannot be explained."},
          {key:"c", text:"Show the bandit's training history."},
          {key:"d", text:"Show only the final chosen arm."},
        ]}
        trap={<>(b) is wrong — linear bandits are very explainable. (c)(d) miss per-decision attribution.</>}
        lens={<><em>Discriminating insight:</em> linear contextual bandits (LinUCB, Thompson with linear model) are MORE explainable per-decision than a typical deep classifier — but only if you logged the propensity and per-arm score at decision time.</>}
        stretch={<>How does this story change if you replace LinUCB with a deep contextual bandit?</>}
      />

      <VIS.TrapProblem
        id="su-p24"
        difficulty="hard"
        title="P24 — End-to-end: design the step-up bandit for a 10M-DAU consumer bank"
        scenario={<>You inherit a rule-based step-up policy (every flagged session gets SMS) at a 10M-DAU consumer bank. Design the bandit.</>}
        options={[
          {key:"a", text:"Arms: SMS OTP, push to authenticator, FIDO key, biometric on enrolled device, KBA, no-action. Exclude permanent block (out of bandit scope). Context: risk-model score + amount + device-class + user-tenure + prior step-up outcomes per arm + channel-availability flags. Algorithm: hierarchical Thompson sampling (global prior, per-user posterior) — partial pooling handles sparsity. Reward: completion - drop_penalty - latency_cost - delayed_fraud_cost (the fraud term arrives via a delayed-feedback survival model that emits a calibrated expected-fraud estimate at decision time AND a retrospective correction when the actual reward arrives). Exploration: 5-10% on low-risk step-ups, 1-2% on high-risk. Logging: full context snapshot + propensity + policy version + action + outcome. Rollout: shadow &rarr; 5% &rarr; 50% &rarr; 100% with kill-switch back to SMS-only. Off-policy eval: doubly-robust IPS on historical data plus interleaved A/B in production. Audit: per-segment outcome fairness, per-decision attribution log retained 7 years for compliance.", correct:true},
          {key:"b", text:"Pure epsilon-greedy with random exploration."},
          {key:"c", text:"A multi-class classifier predicting the best challenge."},
          {key:"d", text:"A reinforcement-learning agent."},
        ]}
        trap={<>(b) misses context. (c) misses counterfactuals + cold-start. (d) is over-engineering (no sequential structure in single step-up).</>}
        lens={<><em>Discriminating insight:</em> the senior design names the algorithm family (hierarchical Thompson), the reward decomposition with delayed-fraud handling, exploration as a function of risk tier, the staged rollout under delayed reward, AND the audit / compliance layer. Every component justified by a real production failure mode.</>}
        stretch={<>Which decision is hardest to defend to an auditor: exploration on high-risk sessions, or the delayed-fraud reward weighting?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li>
          <a href="https://arxiv.org/abs/1003.0146" target="_blank" rel="noopener">
            <strong>Li et al. — A Contextual-Bandit Approach to Personalized News Article Recommendation (LinUCB)</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, WWW 2010)</span>
          <br/>The original LinUCB paper. Section 3 (algorithm) and Section 5 (offline evaluation via replay) are the keepers — both directly map to step-up auth.
        </li>
        <li>
          <a href="https://lilianweng.github.io/posts/2018-01-23-multi-armed-bandit/" target="_blank" rel="noopener">
            <strong>Lilian Weng — The Multi-Armed Bandit Problem and Its Solutions</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(blog)</span>
          <br/>Practitioner-grade walkthrough of LinUCB and Thompson sampling with intuition for exploration trade-offs. Pair with the paper for working understanding.
        </li>
        <li>
          <a href="https://research.netflix.com/research-area/recommendations" target="_blank" rel="noopener">
            <strong>Netflix Research — Bandits and Recommendations</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(blog series)</span>
          <br/>Production-grade write-up of contextual bandits + off-policy evaluation + delayed reward at scale. The closest public analogue to the step-up-auth problem.
        </li>
        <li>
          <a href="https://arxiv.org/abs/1003.5956" target="_blank" rel="noopener">
            <strong>Dudik, Langford, Li — Doubly Robust Policy Evaluation and Learning</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, ICML 2011)</span>
          <br/>The off-policy evaluation paper. Read for the IPS/doubly-robust machinery you need to evaluate a new bandit policy before deploying.
        </li>
        <li>
          <a href="https://pages.nist.gov/800-63-3/sp800-63b.html" target="_blank" rel="noopener">
            <strong>NIST SP 800-63B — Digital Identity Guidelines: Authenticators</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(standard)</span>
          <br/>The authoritative reference on what each step-up arm actually buys you in security terms (why FIDO &gt; SMS, why KBA is weakest). The bandit's reward should reflect these tiers.
        </li>
      </ul>
    </VIS.Section>
  </main>
);
