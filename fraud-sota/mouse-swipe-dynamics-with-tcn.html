<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Mouse / swipe dynamics with TCN — behavioral biometric for RAT detection.
// SIGNAL MODALITY ANCHOR: mouse/swipe = SPATIAL-TEMPORAL (x, y, t, pressure),
// DEVICE-CLASS-DEPENDENT (mouse vs trackpad vs touchscreen), NOT temporal-only.
// Cross-visual: sibling to keystroke (temporal-only) and gait (continuous IMU).

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · Behavioral biometrics · MOUSE/SWIPE"
      title="Mouse / swipe dynamics with TCN"
      subtitle="Causal-dilated 1D convolutions over (Δx, Δy, Δt, pressure) event sequences classify human-driven cursors from RAT-controlled cursors via curvature, jerk, and pressure dynamics."
      byline={[
        {label: "Source", value: "BioCatch / Sift behavioral biometrics whitepapers, 2024-2025"},
        {label: "Signal", value: "spatial-temporal (NOT timing-only, NOT IMU)"},
        {label: "L3", value: "Behavioral biometrics · mouse/swipe"},
      ]}/>

    <VIS.TLDR>
      A{" "}
      <VIS.Term def="Temporal Convolutional Network — a stack of causal, dilated 1D convolutions that produces a sequence-to-sequence representation with a large receptive field, no recurrence, and the causality constraint that prediction at step t uses only events at or before t.">TCN</VIS.Term>{" "}
      over per-event tuples (Δx, Δy, Δt, pressure, event_type) discriminates RAT-controlled cursors from human-driven ones by learning curvature, jerk, and pressure profiles that scripted automation cannot replicate. The causal-dilated convolution stack gives long effective receptive field at sub-1ms per-step inference — cheap enough for continuous online scoring. The dominant failure mode is device-class generalization: a single TCN trained on desktop-mouse data drops 15-20 AUROC points when deployed across mouse + trackpad + tablet stylus + phone swipe because the pressure ranges, curvature regimes, and event sampling rates differ. Production designs are per-device-class OR a single model conditioned on device class.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is — the spatial-temporal signal, end to end">
      <p>
        Each mouse/swipe interaction is a stream of events; each event is a tuple in space and time:
      </p>
      <ol>
        <li><strong>Featurize</strong>: per event, (Δx, Δy, Δt, pressure_or_touch_area, event_type). Derive curvature κ = |x' y'' - y' x''| / (x'² + y'²)^1.5, jerk (third derivative of position), and velocity magnitude.</li>
        <li><strong>Encode</strong>: a 5-block TCN with dilations 1, 2, 4, 8, 16 gives effective receptive field ≈ 64 events. Causal mask: prediction at step t depends only on events ≤ t (critical for online scoring).</li>
        <li><strong>Head</strong>: binary classifier (human vs RAT) or metric-learning encoder (per-user embedding similar to TypeNet).</li>
        <li><strong>Score</strong>: rolling-window aggregate of per-step predictions; alert at sustained anomaly.</li>
      </ol>

      <VIS.Mermaid chart={`
flowchart TB
  M["Event stream: (dx, dy, dt, pressure)"]
  M --> F["Derive curvature, jerk, velocity"]
  F --> T["TCN: causal-dilated 1D convs"]
  T --> H["Head: human-vs-RAT or user-embed"]
  H --> S["Rolling-window aggregate score"]
  style T fill:#dbeafe,stroke:#2563eb,stroke-width:2px
  style S fill:#fef3c7,stroke:#d97706,stroke-width:2px
      `} />
      <p>
        The causal-dilation stack is what makes the TCN both fast (no recurrence) and online (no future-event peeking). The discriminator lives in curvature variance and pressure profile, not in raw position.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How it differs from RNN/LSTM, transformer, and from sibling biometrics">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8, fontSize:14}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Aspect</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>LSTM</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Transformer</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>TCN</th>
          </tr>
        </thead>
        <tbody>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Parallelism</td>
            <td style={{padding:"8px 10px"}}>Sequential</td>
            <td style={{padding:"8px 10px"}}>Parallel</td>
            <td style={{padding:"8px 10px"}}>Parallel</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Cost on ~500 events</td>
            <td style={{padding:"8px 10px"}}>O(N)</td>
            <td style={{padding:"8px 10px"}}>O(N²) attention</td>
            <td style={{padding:"8px 10px"}}>O(N) with large RF via dilation</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Online causality</td>
            <td style={{padding:"8px 10px"}}>Native</td>
            <td style={{padding:"8px 10px"}}>Needs causal mask</td>
            <td style={{padding:"8px 10px"}}>Native (causal-dilated)</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Best fit here</td>
            <td style={{padding:"8px 10px"}}>OK</td>
            <td style={{padding:"8px 10px"}}>Overkill for &lt; 500 events</td>
            <td style={{padding:"8px 10px"}}>Right balance</td>
          </tr>
        </tbody>
      </table>
      <p style={{marginTop:12}}>
        <strong>Signal-modality contrast vs siblings:</strong> mouse/swipe is spatial-temporal AND device-class-dependent — neither holds for keystroke (timing-only, language-dependent) or gait (continuous 50Hz IMU, device-orientation-dependent). Do not import "mobile-soft-keyboard quantization" from keystroke or "battery cost" from gait into mouse/swipe design.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — 22 trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        Twenty-two interview-grade traps on causal-dilated convolutions, curvature/jerk as RAT discriminators, device-class generalization failure (the mouse-specific cascade), and online-scoring discipline.
      </p>

      {/* AXIS: C2 — TCN vs transformer */}
      <VIS.TrapProblem
        id="mse-p1"
        difficulty="hard"
        title="P1 — Why use a TCN over a transformer for ~500-event mouse sequences?"
        scenario={<>The intern proposes a transformer because "transformers are SOTA." You push back.</>}
        options={[
          {key:"a", text:"At ~500 events, transformer self-attention is O(N²) ≈ 250k pairwise ops per forward pass vs TCN's O(N) ≈ 500 ops × depth × kernel_size. The dilated-causal stack reaches receptive field 64 with 5 blocks — large enough for mouse dynamics, much cheaper, and natively causal for online scoring without an attention mask. Transformers earn their keep at multi-thousand-event windows; mouse sessions are not there.", correct:true},
          {key:"b", text:"Transformers cannot handle continuous features."},
          {key:"c", text:"TCNs are always more accurate."},
          {key:"d", text:"GPUs do not support attention efficiently."},
        ]}
        trap={<>(b) is wrong (transformers handle continuous inputs natively via linear projection). (c)(d) overclaim/false.</>}
        lens={<><em>Discriminating insight:</em> the architecture choice is cost-vs-receptive-field at a specific sequence length; TCN wins at the mouse-event regime.</>}
        stretch={<>At what sequence length does a transformer's quality start to dominate over a TCN?</>}
      />

      {/* AXIS: D2 — curvature as discriminator */}
      <VIS.TrapProblem
        id="mse-p2"
        difficulty="hard"
        title="P2 — What about cursor paths discriminates RAT from human?"
        scenario={<>Pick the curvature/dynamics property that most reliably separates RAT-controlled cursors from human-driven ones.</>}
        options={[
          {key:"a", text:"Distribution of instantaneous curvature κ = |x'y'' - y'x''| / (x'² + y'²)^1.5 and overshoot-correct micro-patterns. Humans approach targets with stochastic curvature, slight overshoot, and small corrective re-trajectories. Scripted RATs trace piecewise-linear (Bresenham) or 'ease-in-out' Bezier paths with sharply different curvature variance and no overshoot.", correct:true},
          {key:"b", text:"Total cursor distance per session."},
          {key:"c", text:"Number of left clicks."},
          {key:"d", text:"Color of the cursor."},
        ]}
        trap={<>(b)(c) are coarse aggregates that RATs already match. (d) is a joke.</>}
        lens={<><em>Discriminating insight:</em> the discriminator is in higher-order DYNAMICS (curvature, jerk, overshoot) not in summary statistics RATs already match.</>}
        stretch={<>What single curvature statistic would you watch in production for adversarial drift?</>}
      />

      {/* AXIS: D3 — device-class cascade (mouse-specific) */}
      <VIS.TrapProblem
        id="mse-p3"
        difficulty="hard"
        title="P3 — TCN AUROC drops 0.94 → 0.71 when deployed across desktop+tablet+mobile. Diagnose."
        scenario={<>You train a single global TCN on desktop-mouse data (AUROC 0.94 in train). In production across desktop + tablet stylus + phone swipe, AUROC drops to 0.71.</>}
        options={[
          {key:"a", text:"Device-class signal mismatch. (1) Pressure: standard mice report no pressure (always 1.0); stylus has high precise pressure; touchscreen has finger area not real pressure. (2) Curvature regime: mouse is fine-motor (hand-on-table); swipe is gross-motor (thumb across screen). (3) Event sampling rate: browser mousemove ~30-60Hz; touch events at display refresh (60-120Hz). Fix: per-device-class model OR a single model with explicit device-class embedding/conditioning, plus per-class normalization of pressure and resampling Δt to a fixed rate.", correct:true},
          {key:"b", text:"The model needs more layers."},
          {key:"c", text:"Production data is corrupted."},
          {key:"d", text:"AUROC always drops in production."},
        ]}
        trap={<>(b) is capacity-blame. (c) is unfounded. (d) is fatalism.</>}
        lens={<><em>Discriminating insight:</em> mouse/swipe is fundamentally DEVICE-CLASS-DEPENDENT — pressure, curvature regime, and sampling rate all differ. This is the modality-specific failure mode (not "biometric drift" — that is mostly keystroke/gait).</>}
        stretch={<>How many event sampling rates would you encounter in a typical multi-platform deployment?</>}
      />

      {/* AXIS: D4 — senior cross-examine */}
      <VIS.TrapProblem
        id="mse-p4"
        difficulty="hard"
        multiSelect
        title="P4 — Junior reports 'AUROC 0.94 bot vs human.' Which senior follow-ups matter?"
        scenario={<>Pick the senior follow-ups that distinguish a real result from a benchmark artifact for mouse/swipe RAT detection.</>}
        options={[
          {key:"a", text:"What automation framework generated the 'bot' samples? (Selenium-with-jitter is a different distribution from Puppeteer-fast-paths from headless Chrome.)", correct:true},
          {key:"b", text:"Per-device-class breakdown of AUROC.", correct:true},
          {key:"c", text:"Causal mask enforced at training and inference?", correct:true},
          {key:"d", text:"Event sampling rate distribution in train vs test?", correct:true},
          {key:"e", text:"How many GPU hours did training take?"},
        ]}
        trap={<>(e) is irrelevant to result interpretation.</>}
        lens={<><em>Discriminating insight:</em> bot-distribution coverage + per-device-class + causal mask + sampling rate are the mouse/swipe-specific audit gates.</>}
        stretch={<>Which of these gates does most academic mouse-biometrics work miss?</>}
      />

      {/* AXIS: D5 — pressure as RAT signal */}
      <VIS.TrapProblem
        id="mse-p5"
        difficulty="medium"
        title="P5 — Why is pressure a strong RAT discriminator on touchscreen but not on mouse?"
        scenario={<>Pressure feature ablation on touchscreen: AUROC drops 8 points without it. Same ablation on mouse: AUROC drops 0 points.</>}
        options={[
          {key:"a", text:"Standard mice report pressure as a constant (1.0 always), so the feature is degenerate on mouse data — no information. Touchscreen pressure (or touch area as proxy) is genuinely informative: humans apply variable, finger-anatomy-driven pressure; scripted RATs that inject synthetic touch events typically have constant or absent pressure values. The feature's discriminative power is device-class-conditional.", correct:true},
          {key:"b", text:"Mice are more accurate."},
          {key:"c", text:"Touchscreen events are faster."},
          {key:"d", text:"Pressure is broken on mice."},
        ]}
        trap={<>(b)(c) are surface. (d) misreads the hardware (most mice physically have no pressure sensor).</>}
        lens={<><em>Discriminating insight:</em> features carry information only when they vary in the data; pressure on a pressureless device is structural noise.</>}
        stretch={<>Which alternative features would replace pressure on a desktop-mouse model?</>}
      />

      {/* AXIS: D6 — curvature spoofing arms race */}
      <VIS.TrapProblem
        id="mse-p6"
        difficulty="hard"
        title="P6 — Attackers add Perlin-noise jitter to their RAT cursor paths. Your curvature detector starts to fail. Next move?"
        scenario={<>Known RAT vendor pushes an update: they overlay Perlin-noise jitter on their cursor paths to mimic human stochasticity. AUROC on this vendor's bots drops from 0.94 to 0.62.</>}
        options={[
          {key:"a", text:"Move up the derivative chain: jerk (third derivative of position) is harder to fake convincingly than curvature; acceleration autocorrelation captures the muscle-driven micro-corrections that Perlin noise lacks. Pair with overshoot-frequency features (humans approach a target, overshoot, and correct in a specific temporal envelope) and click-timing features (the time between cursor stop and click is human-specific). Continuously add new automation-tool samples from honeypots to a negative example pool to keep training data fresh against the arms race.", correct:true},
          {key:"b", text:"Use a bigger TCN."},
          {key:"c", text:"Give up on mouse biometrics."},
          {key:"d", text:"Lower the threshold."},
        ]}
        trap={<>(b)(c)(d) do not address the spoofing mechanism.</>}
        lens={<><em>Discriminating insight:</em> the senior move in an adversarial arms race is to escalate to higher-order dynamics that the attacker has not yet learned to fake, NOT to add capacity.</>}
        stretch={<>Why is jerk harder to fake than curvature, mechanistically?</>}
      />

      {/* AXIS: D8 — causal mask discipline */}
      <VIS.TrapProblem
        id="mse-p7"
        difficulty="hard"
        title="P7 — A teammate removes the causal mask 'because zero-padding was annoying.' Offline AUROC goes up. What happens in production?"
        scenario={<>Offline eval improves when the causal-dilation is replaced with non-causal padding (the model can see future events). Train-test AUROC: 0.94 → 0.97.</>}
        options={[
          {key:"a", text:"The model now uses future events to predict at step t. Offline metrics inflate because they batch the full session and let the model peek. At deploy time the model has no future events available — its real online performance collapses (often to near-random for the time-sensitive features). The right action: reject the change, keep the causal mask, and require offline eval to simulate streaming (apply mask at eval time too).", correct:true},
          {key:"b", text:"Production will also improve."},
          {key:"c", text:"It is fine — non-causal is just smoother."},
          {key:"d", text:"Add a different loss."},
        ]}
        trap={<>(b)(c) miss the online-streaming consequence. (d) is unrelated.</>}
        lens={<><em>Discriminating insight:</em> causal-mask integrity matters specifically because mouse/swipe deployment is ONLINE, not batched. Offline AUROC without causality is a lie about production behavior.</>}
        stretch={<>How would you bake a streaming-eval check into CI?</>}
      />

      {/* AXIS: D7 — event sampling rate */}
      <VIS.TrapProblem
        id="mse-p8"
        difficulty="medium"
        multiSelect
        title="P8 — Browsers throttle mousemove. What do you do?"
        scenario={<>Browser A fires mousemove at 60Hz; Browser B throttles to 30Hz; touch events on phone come at 120Hz. Select the right handling.</>}
        options={[
          {key:"a", text:"Resample all event streams to a fixed rate (e.g., 60Hz) via interpolation before encoding.", correct:true},
          {key:"b", text:"Include Δt as an explicit feature so the model can condition on inter-event timing.", correct:true},
          {key:"c", text:"Train a single model on the union and let it figure it out."},
          {key:"d", text:"Use per-rate models if rates are stable per platform.", correct:true},
        ]}
        trap={<>(c) is naive — the model has no way to recover from rate-induced curvature distortion without explicit conditioning.</>}
        lens={<><em>Discriminating insight:</em> event sampling rate is a hidden device-class variable that must be either normalized (resample) or modeled (Δt feature / per-rate model).</>}
        stretch={<>How would resampling affect the jerk feature?</>}
      />

      {/* AXIS: C5 — derived features */}
      <VIS.TrapProblem
        id="mse-p9"
        difficulty="medium"
        title="P9 — Curvature κ = |x'y'' - y'x''| / (x'² + y'²)^1.5. Why this specific form?"
        scenario={<>Pick the property of the standard curvature formula that matters for cursor discrimination.</>}
        options={[
          {key:"a", text:"It is scale-invariant: doubling the cursor speed doesn't change the geometric curvature of the path, only its temporal length. This isolates the SHAPE of the cursor path from its speed — important because RATs often modulate speed but not shape, and humans the inverse. The denominator (x'² + y'²)^1.5 is exactly the normalization that strips speed.", correct:true},
          {key:"b", text:"It is faster to compute than alternatives."},
          {key:"c", text:"It is differentiable for gradient descent."},
          {key:"d", text:"It is the only curvature formula."},
        ]}
        trap={<>(b) is a side benefit. (c) is true but irrelevant for AD scoring. (d) is false — there are many parametric forms.</>}
        lens={<><em>Discriminating insight:</em> the scale-invariance is the key: shape-vs-speed decomposition turns out to be the right factorization for cursor-trajectory analysis.</>}
        stretch={<>Why is this also useful when comparing across users with different baseline speeds?</>}
      />

      {/* AXIS: D2 — cascade */}
      <VIS.TrapProblem
        id="mse-p10"
        difficulty="medium"
        title="P10 — Junior: 'Our F1 is 0.92 on bot detection.' Senior asks one question."
        scenario={<>F1 = 0.92 sounds great. What is the senior's first question?</>}
        options={[
          {key:"a", text:"Which automation tools generated the negatives? If it is one tool (e.g., Selenium-with-default-WebDriver), F1 0.92 means we beat the easy bots. The senior question is the coverage: do the negatives include Playwright, Puppeteer-with-jitter, hand-crafted RATs from known vendors, and replayed-recording attacks? F1 on one tool ≠ F1 in the wild.", correct:true},
          {key:"b", text:"What is the F1 standard deviation?"},
          {key:"c", text:"What is the model size?"},
          {key:"d", text:"What is the training language?"},
        ]}
        trap={<>(b)(c)(d) miss the bot-distribution coverage question.</>}
        lens={<><em>Discriminating insight:</em> bot-class generalization is the deployment-quality bottleneck; F1 on a narrow negative-class is a leaderboard metric, not a production guarantee.</>}
        stretch={<>How would you build a continuously-updated bot-class corpus from honeypots?</>}
      />

      {/* AXIS: E1 — per-device-class deployment */}
      <VIS.TrapProblem
        id="mse-p11"
        difficulty="medium"
        title="P11 — Per-device-class model vs single conditioned model: which to ship?"
        scenario={<>You have three device classes (desktop / tablet / mobile). Choose the production architecture and justify in one sentence.</>}
        options={[
          {key:"a", text:"Single model with device-class embedding/conditioning if you have enough training data across all classes — it amortizes learning of universal features (curvature, jerk) and trains end-to-end with consistent thresholds. Per-class models if data is asymmetric (desktop has 100x more than tablet) and you can stand the operational complexity of three deployment pipelines. Hybrid: shared backbone, per-class head — captures most benefits.", correct:true},
          {key:"b", text:"Always single — simpler ops."},
          {key:"c", text:"Always per-class — more accurate."},
          {key:"d", text:"Toss a coin."},
        ]}
        trap={<>(b)(c) are absolutes; the trade-off depends on data distribution.</>}
        lens={<><em>Discriminating insight:</em> the architecture decision is set by training-data balance + ops cost. The hybrid (shared backbone + per-class head) is often the right middle ground.</>}
        stretch={<>What single metric would tell you which to ship?</>}
      />

      {/* AXIS: E3 — calibration / threshold */}
      <VIS.TrapProblem
        id="mse-p12"
        difficulty="medium"
        title="P12 — Bot prevalence is 0.3%. Choose the right operating metric."
        scenario={<>0.3% bots in production. PM proposes shipping at "AUROC 0.95 threshold."</>}
        options={[
          {key:"a", text:"AUROC alone is the wrong metric at this prevalence. Operate on AUPRC and P@k at investigator capacity. With 100M sessions/day and 50 investigators reviewing 100 alerts each, k = 5000; the threshold should be set so the top-5000 alerts maximize precision. AUROC 0.95 may correspond to terrible P@5000 — measure and tune directly.", correct:true},
          {key:"b", text:"AUROC 0.95 is a fine target."},
          {key:"c", text:"Drop AUROC entirely; use accuracy."},
          {key:"d", text:"Match the academic benchmark."},
        ]}
        trap={<>(b) is the prevalence-blind error. (c) is worse (accuracy under imbalance is misleading). (d) skips production thinking.</>}
        lens={<><em>Discriminating insight:</em> low-prevalence + investigator-capacity = P@k is the operational metric; AUROC is the academic comparison.</>}
        stretch={<>What is P@k at AUROC 0.95 for 0.3% prevalence, roughly?</>}
      />

      {/* AXIS: F3 — assistive tech fairness */}
      <VIS.TrapProblem
        id="mse-p13"
        difficulty="hard"
        title="P13 — Sticky-keys + voice-control users get flagged as bots. Diagnose."
        scenario={<>Customer complaints: users with motor-impairment accommodations (sticky-keys, switch control, voice-control) are systematically flagged as bots.</>}
        options={[
          {key:"a", text:"Assistive technologies generate non-natural cursor event streams — switch control issues discrete clicks; voice-control produces piecewise-linear paths; sticky-keys spaces out clicks oddly. The TCN sees curvature/jerk distributions that look like RAT behavior. Fairness fix: detect known accessibility input modalities (HID descriptors, accessibility-API events) and route those sessions to a non-curvature-based risk pipeline. This is a fairness-as-correctness issue: the model is right that the input is non-natural; it is wrong about the cause.", correct:true},
          {key:"b", text:"Just accept the false positives."},
          {key:"c", text:"Lower the threshold globally."},
          {key:"d", text:"Block users on assistive tech."},
        ]}
        trap={<>(b)(c)(d) range from indifferent to actively discriminatory.</>}
        lens={<><em>Discriminating insight:</em> ML fairness for mouse/swipe biometrics is mostly about routing assistive-tech sessions away from curvature-based scoring, not about retraining.</>}
        stretch={<>How would you detect assistive-tech sessions from the input stream alone?</>}
      />

      {/* AXIS: D5 — known RAT vendors */}
      <VIS.TrapProblem
        id="mse-p14"
        difficulty="medium"
        title="P14 — How do you keep the bot-negative pool fresh?"
        scenario={<>Your training corpus contains examples from automation frameworks circa 2023. New frameworks ship monthly.</>}
        options={[
          {key:"a", text:"Run a honeypot tier (decoy login pages indexed by automation tools); collect cursor streams from anything that hits the honeypot; periodically audit a sample to confirm they are RAT-driven (not curious researchers); retrain with the augmented negative pool every 2-4 weeks. Maintain a small held-out test set of attested human sessions to catch regressions where the model starts flagging humans as bots.", correct:true},
          {key:"b", text:"Train once, never update."},
          {key:"c", text:"Synthesize bot data with a GAN."},
          {key:"d", text:"Buy a leaderboard dataset."},
        ]}
        trap={<>(b) loses to the arms race. (c) introduces distribution mismatch. (d) is stale.</>}
        lens={<><em>Discriminating insight:</em> honeypot-driven negative-pool refresh is the production discipline that keeps the model current. Pure synthesis or static benchmarks lose ground.</>}
        stretch={<>How would you audit whether the honeypot pool is biased toward easy bots?</>}
      />

      {/* AXIS: F4 — DPI / resolution */}
      <VIS.TrapProblem
        id="mse-p15"
        difficulty="medium"
        title="P15 — Same user, different monitor (1080p home → 4K work). AUROC drops. Why?"
        scenario={<>Cursor speed in pixels is twice as fast on the 4K monitor at the same hand motion (since the monitor has more pixels per inch). The TCN sees a different velocity distribution.</>}
        options={[
          {key:"a", text:"Normalize cursor speed to physical units (mm/s) by including DPI as a feature OR by querying screen.devicePixelRatio in the browser and scaling Δx, Δy to physical millimeters before encoding. Curvature is scale-invariant so it survives, but velocity and acceleration features need DPI normalization.", correct:true},
          {key:"b", text:"Retrain per resolution."},
          {key:"c", text:"Ignore — the user signal is robust."},
          {key:"d", text:"Use only categorical features."},
        ]}
        trap={<>(b) is overkill given the simple fix. (c) ignores measured drop. (d) discards real signal.</>}
        lens={<><em>Discriminating insight:</em> the pixel-vs-physical-unit distinction is a mouse/swipe-specific normalization that does not apply to keystroke or gait.</>}
        stretch={<>Why is curvature already scale-invariant? Show in one sentence.</>}
      />

      {/* AXIS: E2 — latency */}
      <VIS.TrapProblem
        id="mse-p16"
        difficulty="medium"
        title="P16 — Online scoring at 100Hz event rate. Where does the latency budget go?"
        scenario={<>Stream is 100 events/second. You score per event. Pick the realistic latency budget breakdown.</>}
        options={[
          {key:"a", text:"TCN forward pass is sub-1ms on CPU at this event rate (small model, parallel convolutions). Per-event score is cheap. Latency dominates at (1) network round-trip to score server if not on-device, (2) feature pipeline (curvature/jerk/velocity computation), (3) rolling-window aggregator. On-device JS or WASM TCN is feasible and removes network RTT.", correct:true},
          {key:"b", text:"GPU is required."},
          {key:"c", text:"Per-event scoring is impossible online."},
          {key:"d", text:"Latency is dominated by floating-point precision."},
        ]}
        trap={<>(b)(c) overstate cost. (d) is irrelevant.</>}
        lens={<><em>Discriminating insight:</em> a small TCN at sub-1000-event windows fits comfortably in CPU/WASM budget — the practical question is feature pipeline placement, not model inference.</>}
        stretch={<>What's a reasonable rolling-window aggregator that avoids alert noise?</>}
      />

      {/* AXIS: D2 — RAT vs human-bot vs accessibility */}
      <VIS.TrapProblem
        id="mse-p17"
        difficulty="hard"
        title="P17 — Three classes the same TCN sees: RAT, scripted-bot, accessibility user. Confusion?"
        scenario={<>A binary human-vs-bot TCN sees three populations: legitimate human users, automation bots (Selenium etc.), RAT (remote-control of a real human's machine), and accessibility-tech users. How do these collapse into the binary?</>}
        options={[
          {key:"a", text:"RAT and automation bots BOTH have non-natural cursor dynamics but for different reasons — RAT has natural-on-the-attacker-side dynamics filtered through the remote-control protocol's input quantization; automation bots have synthetic dynamics from the start. A single binary head conflates them; a three-class head (human / bot / RAT) often improves both because the model can specialize per failure mode. Accessibility users need to be routed AWAY before the model sees them.", correct:true},
          {key:"b", text:"All three look identical."},
          {key:"c", text:"Bots and RAT are the same class."},
          {key:"d", text:"Accessibility users are always RAT."},
        ]}
        trap={<>(b)(c)(d) flatten meaningful structural differences.</>}
        lens={<><em>Discriminating insight:</em> the binary "human vs not-human" head loses signal. Three-class (human/bot/RAT) plus accessibility routing is the production-grade design.</>}
        stretch={<>What does a RAT's curvature look like vs a Selenium bot's?</>}
      />

      {/* AXIS: D4 — adversarial */}
      <VIS.TrapProblem
        id="mse-p18"
        difficulty="hard"
        multiSelect
        title="P18 — Adversaries who know your model. What's plausible?"
        scenario={<>Attacker has read the BioCatch whitepaper and knows curvature + jerk are scored. Pick the plausible attacks and the defenses.</>}
        options={[
          {key:"a", text:"Record real human cursor sessions and replay with timing perturbation — defense: include click-target accuracy and inter-event semantic timing (a click on a button that wasn't rendered yet is a bot tell).", correct:true},
          {key:"b", text:"Train a GAN to generate human-like curvature/jerk distributions — defense: rotate higher-order discriminators (jerk-of-jerk, overshoot frequency).", correct:true},
          {key:"c", text:"Inject Perlin noise into RAT cursor paths — defense: see P6.", correct:true},
          {key:"d", text:"Force the TCN to overfit at training time by submitting many adversarial examples — defense: not feasible from outside without training-time access.", correct:false},
        ]}
        trap={<>(d) is the wrong label — it IS implausible from outside, so it should NOT be selected as a plausible attack. The framing trips users who pattern-match on "adversarial" without thinking about access.</>}
        lens={<><em>Discriminating insight:</em> threat-model the access channel before assuming an attack is possible. Black-box probing is plausible; training-time poisoning needs internal access.</>}
        stretch={<>Which of (a)(b)(c) is hardest to defend in 2026?</>}
      />

      {/* AXIS: D2 — bot diversity */}
      <VIS.TrapProblem
        id="mse-p19"
        difficulty="medium"
        title="P19 — Class imbalance and class-skew within bots"
        scenario={<>Your bot class is 0.5% of traffic. Within bots, one framework (Selenium) is 80% of the negative pool. What problem does this create?</>}
        options={[
          {key:"a", text:"The model becomes a 'Selenium detector' more than a 'bot detector' — its decision boundary specializes on Selenium's curvature pattern and is weak on Puppeteer/Playwright/custom RATs. Mitigation: per-tool minority oversampling (or class-balanced loss within the bot superclass), continuous honeypot refresh, and a per-bot-tool monitoring dashboard so you see when a framework's detection rate slips.", correct:true},
          {key:"b", text:"No problem — bots are bots."},
          {key:"c", text:"Lower the threshold for Selenium."},
          {key:"d", text:"Drop minority tools from training."},
        ]}
        trap={<>(b)(c)(d) miss the within-class skew issue.</>}
        lens={<><em>Discriminating insight:</em> "bot" is a superclass; within-class skew creates systematic blind spots. The senior move is per-tool monitoring, not aggregate AUROC.</>}
        stretch={<>How would you set a min-recall-per-tool SLA?</>}
      />

      {/* AXIS: B3 — pitch */}
      <VIS.TrapProblem
        id="mse-p20"
        difficulty="hard"
        title="P20 — Pitch mouse/swipe TCN to a director"
        scenario={<>"Pitch the mouse-dynamics RAT detector to me. Why TCN and not transformer? Why is this worth our investment?"</>}
        options={[
          {key:"a", text:"Cursor event streams (Δx, Δy, Δt, pressure) at ~500 events per session encode user-specific micro-dynamics (curvature variance, jerk, overshoot-correct patterns) that scripted automation cannot fake. A 5-block causal-dilated TCN reaches a 64-event receptive field at O(N) cost — sub-1ms per-event inference fits CPU/WASM on-device. We chose TCN over transformer because at ~500 events the O(N²) attention buys nothing and the causal-dilation gives us native online streaming. The hard production work is per-device-class generalization (mouse / stylus / swipe have different pressure and curvature regimes) and continuous bot-pool refresh via honeypots. We expect 0.93+ AUROC on covered tool distributions and watch P@k at investigator capacity.", correct:true},
          {key:"b", text:"It is a TCN. It is SOTA."},
          {key:"c", text:"Cursors are random; we just classify them."},
          {key:"d", text:"It is unbreakable."},
        ]}
        trap={<>(b)(c)(d) are empty/false.</>}
        lens={<><em>Discriminating insight:</em> the pitch names the signal (spatial-temporal dynamics), the architecture rationale (TCN vs transformer at sequence length), the production failure mode (device-class), and the operational discipline (honeypot refresh + P@k).</>}
        stretch={<>How would the pitch change for a mobile-only product?</>}
      />

      {/* AXIS: E5 — drift */}
      <VIS.TrapProblem
        id="mse-p21"
        difficulty="medium"
        title="P21 — Detection rate of a specific RAT vendor drops 30% overnight. Cause?"
        scenario={<>You watch the per-tool dashboard. One known RAT vendor's detection rate falls from 0.92 to 0.62 overnight. No model change.</>}
        options={[
          {key:"a", text:"The vendor shipped an update. Their new release likely changed cursor synthesis — added curvature jitter, switched to a different ease-curve, or modulated event sampling. Pull samples from the honeypot for the affected vendor, label, retrain incremental with the new samples in the negative pool. Track time-to-recover as an SLA.", correct:true},
          {key:"b", text:"Random fluctuation."},
          {key:"c", text:"GPU clock changed."},
          {key:"d", text:"Wait for the next quarterly model refresh."},
        ]}
        trap={<>(b) ignores the magnitude. (c) is irrelevant. (d) leaves a hole open for weeks.</>}
        lens={<><em>Discriminating insight:</em> per-tool detection rate is the leading indicator of vendor updates; the response is incremental retrain, not next-quarter waiting.</>}
        stretch={<>What time-to-recover SLA would you set?</>}
      />

      {/* AXIS: E2 — hero end-to-end */}
      <VIS.TrapProblem
        id="mse-p22"
        difficulty="hard"
        title="P22 — End-to-end pick: banking app, web + iOS + Android"
        scenario={<>Banking RAT detection for a session. Three platforms; bot prevalence 0.3% web, 0.1% mobile.</>}
        options={[
          {key:"a", text:"Hybrid: shared backbone TCN with three platform-specific heads (mouse, swipe-tablet, swipe-phone). Per-event scoring with rolling-window aggregator. Resample event rates to a fixed 60Hz; include Δt as feature. On-device WASM scoring on web; native on mobile. Operate at P@k matching investigator capacity per platform (web has more bots, more alerts). Honeypot-driven incremental retrain every 2-4 weeks. Three-class head (human / bot / RAT) where labels permit; otherwise binary human-vs-not. Route assistive-tech sessions to non-curvature risk signals. Continuous per-tool detection rate dashboard with auto-alert on >20% drop.", correct:true},
          {key:"b", text:"Single global model for all platforms."},
          {key:"c", text:"Web only; skip mobile."},
          {key:"d", text:"GAN-generate all training data."},
        ]}
        trap={<>(b) gives the device-class drop from P3. (c) leaves half of traffic unprotected. (d) is synthesis-mismatch.</>}
        lens={<><em>Discriminating insight:</em> a senior mouse/swipe design is per-device-class-aware, honeypot-fresh, accessibility-routed, and P@k-tuned.</>}
        stretch={<>What is your kill-switch criterion if false-positives on a specific demographic spike?</>}
      />
    </VIS.Section>
