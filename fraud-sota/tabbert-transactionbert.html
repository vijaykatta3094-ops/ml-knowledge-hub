      if (matchStart > lastIdx) out.push(text.slice(lastIdx, matchStart));
      // Emit wrapped term (first-mention only)
      if (seen.has(term.toLowerCase())) {
        out.push(text.slice(matchStart, matchEnd));
      } else {
        seen.add(term.toLowerCase());
        out.push(h("span", {
          key: matchStart,
          className: "vis-term",
          "data-rv-info": _glossLookup[term],
          "aria-label": _glossLookup[term],
          tabIndex: 0,
        }, term));
      }
      lastIdx = matchEnd;
    }
    if (lastIdx < text.length) out.push(text.slice(lastIdx));
    return out.length === 1 ? out[0] : out;
  }

  // Standalone hover tooltip for <VIS.Term>. If the report-viewer overlay
  // is loaded it already shows tooltips for any [data-rv-info] element, so
  // we short-circuit here to avoid double-rendering.
  (function installTermTooltip() {
    let tip = null;
    function show(el) {
      if (window.__rvReady) return;  // overlay.js owns the tooltip in report-viewer mode
      const text = el.getAttribute("data-rv-info");
      if (!text) return;
      if (!tip) {
        tip = document.createElement("div");
        tip.className = "vis-term-tip";
        document.body.appendChild(tip);
      }
      tip.textContent = text;
      const r = el.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const pad = 8;
      let left = Math.max(pad,
        Math.min(r.left, window.innerWidth - tr.width - pad));
      const above = r.top - tr.height - pad;
      const below = r.bottom + pad;
      tip.style.left = left + "px";
      tip.style.top  = (above >= pad ? above : below) + "px";
      tip.style.display = "block";
    }
    function hide() { if (tip) tip.style.display = "none"; }
    document.addEventListener("mouseover", (e) => {
      const el = e.target.closest && e.target.closest("[data-rv-info]");
      if (el) show(el); else hide();
    });
    document.addEventListener("focusin", (e) => {
      const el = e.target.closest && e.target.closest("[data-rv-info]");
      if (el) show(el);
    });
    document.addEventListener("focusout", hide);
    document.addEventListener("scroll", hide, true);
    // Touch / tap support: on a tap, toggle the tip for the tapped term.
    // Tapping anywhere else (including a different term) hides the current.
    let lastTappedTerm = null;
    document.addEventListener("click", (e) => {
      const el = e.target.closest && e.target.closest("[data-rv-info]");
      if (el) {
        if (el === lastTappedTerm) { lastTappedTerm = null; hide(); }
        else { lastTappedTerm = el; show(el); }
      } else {
        lastTappedTerm = null; hide();
      }
    });
  })();

  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."
  //   scenario={<>...JSX...</>}
  //   diagram={<VIS.Mermaid chart={...} />}
  //   options={[
  //     {key:"a", text:"...", correct:false},
  //     {key:"b", text:"...", correct:true},
  //     ...
  //   ]}
  //   trap={<>The most tempting wrong is X because...</>}
  //   lens={<>The right answer + reasoning</>}
  //   stretch="optional follow-up question"
  // />
  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          // NO autoGloss here. Glossing terms inside option text leaks the
          // answer mechanism via hover. Authors must keep options self-contained;
          // a candidate who needs a definition can scroll up to the prose where
          // the term is explicitly wrapped via <VIS.Term>.
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// TabBERT / TransactionBERT (Padhi et al., ICASSP 2021) — masked-language-model
// pretraining on TABULAR transaction sequences. Load-bearing distinctions:
//   (1) per-CELL MLM — mask individual (row, column) cells and predict them
//       from surrounding cells AND adjacent rows. Not per-row, not per-token.
//   (2) the contribution is the OBJECTIVE (MLM on tabular), not the backbone.
//       The backbone is a fairly standard flat self-attention transformer.
//   (3) continuous-amount tokenization is the unsolved hard problem; choice
//       of scheme dominates the result.
// Strip "mask cells / MLM / unlabeled tx" and answers should not still work.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · Transaction sequence transformers"
      title="TabBERT / TransactionBERT"
      subtitle="Masked-language-model pretraining on tabular transaction sequences — mask individual cells, predict from context. Fine-tune for fraud after billions of unlabeled tx have shaped the representation."
      byline={[
        {label: "Source", value: "Padhi et al., ICASSP 2021; productionized at IBM / Capital One ~2024"},
        {label: "L3", value: "Tabular MLM pretraining"},
        {label: "Anchor", value: "Per-cell masked-cell prediction on (row × column) tabular tape"},
      ]}/>

    <VIS.TLDR>
      Supervised tabular fraud models ({" "}
      <VIS.Term def="Gradient-boosted decision trees (XGBoost, LightGBM, CatBoost). The dominant supervised baseline on tabular data; needs one label per row.">XGBoost</VIS.Term>,{" "}
      vanilla transformer) need a label per example. An issuer has, say, 5 billion authorizations per year but only ~5 million confirmed-fraud labels (~0.1%). TabBERT exploits the asymmetry: <strong>mask individual CELLS (a specific column-value in a specific row) of unlabeled transactions and train the{" "}
      <VIS.Term def="The shared transformer body whose weights are pretrained on a self-supervised task and reused as a feature extractor for downstream fine-tuning.">backbone</VIS.Term>{" "}
      to predict the masked cell from the rest of the row + adjacent rows</strong>. The model learns what a "typical" transaction looks like for this user / merchant / time-of-day combo.{" "}
      <VIS.Term def="Continue training a pretrained backbone on a small labeled dataset for a downstream task; typically with a much smaller learning rate.">Fine-tune</VIS.Term>{" "}
      the same backbone on the small labeled set, and anomalies relative to the learned{" "}
      <VIS.Term def="A learned dense vector summarizing an input so downstream layers can score, retrieve, or classify off it.">representation</VIS.Term>{" "}
      become highly discriminative. The contribution is the OBJECTIVE ({" "}
      <VIS.Term def="Bidirectional Encoder Representations from Transformers. Pretrained encoder trained with masked-token prediction.">BERT</VIS.Term>-style{" "}
      <VIS.Term def="Masked Language Modeling. Randomly mask ~15% of input tokens and train the model to predict them from surrounding context. Self-supervised; needs no labels.">MLM</VIS.Term>{" "}
      adapted to a 2-D row-by-column tape), not the architecture. <strong>The hardest unsolved piece is{" "}
      <VIS.Term def="Mapping a continuous numeric value (transaction amount) to a discrete token id or vector so a transformer's embedding/softmax machinery can consume it.">tokenizing continuous amounts</VIS.Term></strong>{" "}
      — log-bucket, quantile-bucket, or learned numerical embedding — and the choice of scheme dominates the lift more than the MLM itself.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is — masked-cell pretraining on a 2-D table">
      <ol>
        <li><strong>Input tape:</strong> a 2-D table where rows are transactions and columns are fields (amount, merchant_id,{" "}
          <VIS.Term def="Merchant Category Code. 4-digit ISO code (e.g., 5411 = grocery) classifying what kind of merchant accepted a transaction.">MCC</VIS.Term>,{" "}
          country, timestamp, channel). Each cell is tokenized into a discrete or learned vector — amount via bucketing or a small{" "}
          <VIS.Term def="Multi-Layer Perceptron. A small feed-forward neural network (one or two hidden layers) used as a learned projection.">MLP</VIS.Term>, categorical via{" "}
          <VIS.Term def="A table that maps each discrete id (e.g., merchant_id 42) to a learned dense vector. The vector is trained jointly with the rest of the network.">embedding lookup</VIS.Term>.
        </li>
        <li><strong>Two{" "}
          <VIS.Term def="Vector added to each token's embedding so order-invariant attention can know where the token sits in the sequence. TabBERT uses two — one for the row index, one for the column index.">positional encodings</VIS.Term>:</strong>{" "}
          a row-position (which transaction in the user's sequence) AND a column-position (which field within the row). Cells share row-PE with their row, and column-PE with their column.
        </li>
        <li><strong>MLM objective:</strong> on each training step, randomly mask ~15% of CELLS (not rows). The model must predict the masked cell from all surrounding cells — same row, other rows.{" "}
          <VIS.Term def="Standard classification loss: -log(p_t) where p_t is the predicted probability for the correct class. Used here to score the model's prediction of the masked cell.">Cross-entropy</VIS.Term>{" "}
          on the masked-cell target.
        </li>
        <li><strong>Pretrain on unlabeled tx:</strong> billions of rows, no fraud labels needed. The objective creates the{" "}
          <VIS.Term def="Self-supervised: the labels come from the input itself (the masked cell's true value) rather than from human annotation. Lets us use billions of unlabeled rows.">learning signal</VIS.Term>.
        </li>
        <li><strong>Fine-tune:</strong> add a fraud-{" "}
          <VIS.Term def="A small task-specific network (often one linear layer + sigmoid) stacked on the backbone's output to produce the final prediction.">classifier head</VIS.Term>{" "}
          on a{" "}
          <VIS.Term def="A single fixed-length vector summarizing a variable-length sequence — e.g., mean of token vectors, or the special [CLS]-position vector.">pooled representation</VIS.Term>{" "}
          of the last row; fine-tune the backbone with labels.
        </li>
      </ol>

      <VIS.Mermaid chart={`
flowchart TB
  T["2-D tape: rows are tx, cols are fields"]
  T --> M["Random per-cell mask 15 percent"]
  M --> X["Flat self-attention over all cells"]
  X --> P["Predict masked cells - cross entropy"]
  P --> R["Pretrained backbone"]
  R --> F["Fine-tune head with fraud labels"]
  F --> Y["Risk score"]
  style M fill:#dbeafe,stroke:#2563eb,stroke-width:2px
  style P fill:#fef3c7,stroke:#d97706,stroke-width:2px
  style F fill:#dcfce7,stroke:#16a34a,stroke-width:2px
      `}/>
      <p>Blue = the per-cell mask (the load-bearing piece). Yellow = MLM cross-entropy on the masked cells (zero fraud labels at this stage). Green ={" "}
        <VIS.Term def="Training where each example has a human-provided label (here, a fraud / not-fraud tag from a chargeback record).">supervised</VIS.Term>{" "}
        fine-tune.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How it differs from BERT / supervised tabular / FATA-Trans">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8, fontSize:14}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Aspect</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>BERT (text)</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Supervised tabular</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>FATA-Trans</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>TabBERT</th>
          </tr>
        </thead>
        <tbody>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"6px 10px"}}>Input structure</td>
            <td style={{padding:"6px 10px"}}>1-D token stream</td>
            <td style={{padding:"6px 10px"}}>Flat row or sequence of rows</td>
            <td style={{padding:"6px 10px"}}>Sequence of rows</td>
            <td style={{padding:"6px 10px"}}><strong>2-D (row × column) tape</strong></td>
          </tr>
          <tr>
            <td style={{padding:"6px 10px"}}>Pretraining objective</td>
            <td style={{padding:"6px 10px"}}>MLM on tokens</td>
            <td style={{padding:"6px 10px"}}>None (label-supervised)</td>
            <td style={{padding:"6px 10px"}}>None by default (orthogonal)</td>
            <td style={{padding:"6px 10px"}}><strong>MLM on cells</strong></td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"6px 10px"}}>Mask granularity</td>
            <td style={{padding:"6px 10px"}}>Token</td>
            <td style={{padding:"6px 10px"}}>N/A</td>
            <td style={{padding:"6px 10px"}}>N/A</td>
            <td style={{padding:"6px 10px"}}>Per-cell (column-value in a specific row)</td>
          </tr>
          <tr>
            <td style={{padding:"6px 10px"}}>Uses unlabeled tx</td>
            <td style={{padding:"6px 10px"}}>Massively</td>
            <td style={{padding:"6px 10px"}}>Not at all</td>
            <td style={{padding:"6px 10px"}}>Not by default</td>
            <td style={{padding:"6px 10px"}}>Massively (the core lever)</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"6px 10px"}}>Hardest design choice</td>
            <td style={{padding:"6px 10px"}}>WordPiece vocab</td>
            <td style={{padding:"6px 10px"}}>Feature eng</td>
            <td style={{padding:"6px 10px"}}>Delta-t bucketing + field-type taxonomy</td>
            <td style={{padding:"6px 10px"}}><strong>Continuous-amount tokenization</strong></td>
          </tr>
        </tbody>
      </table>
      <p style={{marginTop:10}}>
        <VIS.Term def="A diagnostic test: redact (strip) a load-bearing concept from the answer and check whether it still works. If yes, the problem wasn't actually testing that concept.">Redaction litmus</VIS.Term>: strip "MLM" and "unlabeled-tx" — does the answer still win? If yes, the problem isn't testing TabBERT, it's testing transformers-on-transactions.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-limits" title="Limits and gotchas — the TabBERT-specific ones">
      <VIS.Callout kind="gotcha" title="Continuous-amount tokenization is the unsolved problem">
        Amount is a continuous field with magnitude that spans 6+ orders ($0.01 to $50000+). Three tokenization strategies all have known failure modes: (a) <strong>log-bucket</strong> loses sub-bucket magnitude resolution (small{" "}
        <VIS.Term def="Card-testing: a fraudster runs many tiny low-value transactions to confirm a stolen card number is live before attempting a large purchase.">card-test</VIS.Term>{" "}
        probes $0.99 vs $1.00 collide); (b) <strong>quantile-bucket</strong> loses extreme-tail resolution (top 0.01% is one bucket); (c) <strong>learned numerical embedding</strong> (amount → small MLP → vector) preserves magnitude but breaks the MLM target distribution ({" "}
        <VIS.Term def="Mean squared error: average of (predicted - actual)². The standard loss when the target is a continuous number rather than a class.">MSE</VIS.Term>{" "}
        instead of cross-entropy on a different head). Most paper-to-paper lift variance comes from this choice.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="MLM trains 'common-vs-rare', not 'benign-vs-fraud'">
        The MLM pretrained representation distinguishes typical from atypical, not benign from fraudulent.{" "}
        <VIS.Term def="An event that is rare in the user's history (atypical) but legitimate (benign). MLM will flag it; only a labeled fine-tune can learn to ignore it.">Atypical-but-benign</VIS.Term>{" "}
        (your first wedding-ring purchase) gets high anomaly. Fine-tuning bridges the gap, but if your labeled set is too small to teach the bridge, you'll have{" "}
        <VIS.Term def="False Positive Rate: fraction of legitimate transactions wrongly flagged as fraud. Driver of customer-friction cost.">FPRs</VIS.Term>{" "}
        on atypical-benign events.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Adversary mimics common cells">
        A fraudster's optimal strategy under TabBERT is to mimic the user's most-frequent merchants and amounts. The MLM scores those as{" "}
        <VIS.Term def="A sample that looks like the training data — same data distribution. MLM gives in-distribution cells low anomaly by construction.">in-distribution</VIS.Term>. Defense:{" "}
        <VIS.Term def="Combine predictions from multiple models (e.g., MLM-anomaly + supervised classifier + velocity counter) by averaging or stacking; reduces variance and covers complementary failure modes.">ensemble</VIS.Term>{" "}
        with a supervised model that sees fraud labels, and explicit{" "}
        <VIS.Term def="Counters that track the rate of recent events (e.g., 'tx-per-card-per-5min', 'distinct-merchants-per-card-per-hour'); used to catch bursts that look in-distribution per-tx but anomalous in aggregate.">velocity counters</VIS.Term>{" "}
        that see ring behavior cross-card.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Pretrain compute is huge">
        MLM on billions of cells is expensive — typically the dominant compute. Same-compute supervised baselines (with{" "}
        <VIS.Term def="Synthetic perturbations of training data (jitter amounts, mask fields, sample negatives) used to enlarge an effective training set; cheap way to spend extra compute on a supervised baseline.">data augmentation</VIS.Term>) close more of the gap than naive reports suggest. Always{" "}
        <VIS.Term def="Comparing two models under the same compute budget (measured in FLOPs or wall-clock GPU-hours) so the comparison isolates algorithmic improvement from extra compute.">compute-match</VIS.Term>{" "}
        comparisons.
      </VIS.Callout>
      <VIS.Callout kind="gotcha" title="Tokenizer drift silently invalidates the pretrained backbone">
        If you re-bucket amounts after pretraining (e.g., add a new amount range), the{" "}
        <VIS.Term def="The lookup matrix mapping each discrete token id to a learned dense vector. Rows are addressed by integer index; reindexing the tokenizer remaps which row each input uses.">embedding-table</VIS.Term>{" "}
        lookups now point to wrong rows. Lock the{" "}
        <VIS.Term def="The deterministic function that converts raw input (e.g., $42.07) to a token id or vector. Must stay frozen between pretrain and fine-tune or the embedding rows become meaningless.">tokenizer</VIS.Term>{" "}
        when the backbone is pretrained; version-control as code.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — concept-specific trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        Every problem turns on something that ONLY TabBERT does: the per-cell{" "}
        <VIS.Term def="The size of the unit being masked — token (BERT), cell (TabBERT), or row. Controls which joint distribution the model learns to recover.">mask granularity</VIS.Term>, the 2-D (row × column) tape structure, the MLM-on-tabular objective, the continuous-amount tokenization choice, or the unlabeled-tx exploitation pattern. Strip "mask cells" / "MLM" / "unlabeled-tx" and the option must no longer win.
      </p>

      {/* P1 — B3 pitch */}
      <VIS.TrapProblem
        id="tabbert-p1"
        difficulty="hard"
        title="P1 — Director asks: 'We have 5B unlabeled tx and 50k fraud labels. Why pretrain with TabBERT instead of training XGBoost on the 50k?'"
        scenario={<><em>Discriminating insight: the pitch must name the MLM-on-tabular OBJECTIVE as the lever — what makes TabBERT possible is masked-cell prediction on unlabeled tx, creating supervision signal from the 5B without needing fraud labels. Strip "MLM on cells" and the pitch collapses to "more data is better." It must also name continuous-amount tokenization as the load-bearing engineering choice.</em><br/><br/>Pick the pitch.</>}
        options={[
          {key:"a", text:"Transformers are better than XGBoost, so we should switch."},
          {key:"b", text:"Two-stage approach. (1) <strong>MLM-pretrain</strong>: randomly mask ~15% of CELLS (a specific column-value in a specific row) across the 5B unlabeled tx and train the backbone to predict the masked cell from surrounding context — the objective creates supervision signal from unlabeled data. The model learns what 'typical' looks like for this user / merchant / time-of-day combo. (2) <strong>Fine-tune</strong> the same backbone on the 50k fraud labels with a classifier head. The 50k labels are now learning a DECISION BOUNDARY on top of a rich representation, not a model from scratch. XGBoost can't use the 5B at all. The lever is the OBJECTIVE — masked-cell prediction — not the architecture. The hardest engineering choice is how to tokenize continuous AMOUNTS so the MLM target distribution is meaningful (log-bucket vs quantile vs learned embedding).", correct:true},
          {key:"c", text:"Transformers have more parameters, so they'll learn fraud patterns better."},
          {key:"d", text:"BERT is the SOTA for NLP, so adapting it to tx will give SOTA fraud detection."},
        ]}
        trap={<>(a)(c) reduce to "transformers good" — fails the MLM-redaction test. (d) confuses "BERT is good for NLP" with "MLM transfers to tabular" — the contribution is the adaptation to tabular cells, not the transfer of BERT directly.</>}
        lens={<>Pitch must name (1) MLM as the objective creating supervision from unlabeled data and (2) per-cell mask granularity on a 2-D table. Tokenization is the engineering gotcha.</>}
        stretch={<>If you only have 100M unlabeled tx instead of 5B, is TabBERT still worth it? Hint: the data efficiency of MLM scales with unlabeled volume.</>}
      />

      {/* P2 — per-cell vs per-row mask granularity */}
      <VIS.TrapProblem
        id="tabbert-p2"
        difficulty="hard"
        title="P2 — Why per-CELL mask, not per-ROW mask? Diagnose the difference."
        scenario={<><em>Discriminating insight: per-cell mask preserves the within-row context — the model must predict the masked AMOUNT from this row's other cells (merchant, MCC, country, time) and from adjacent rows. Per-row mask removes the entire row, leaving only cross-row context — the model only learns inter-tx patterns, not intra-row co-occurrence (amount × MCC × country joints).</em><br/><br/>Pick the mechanism.</>}
        options={[
          {key:"a", text:"Per-cell and per-row are equivalent."},
          {key:"b", text:"Per-cell mask removes a SINGLE column-value (e.g., 'amount' field in row 7) while leaving the row's other cells (merchant_id, MCC, country, time) visible. The model must predict the masked AMOUNT from (i) other cells in the SAME row and (ii) cells across other rows. This teaches the model the joint distribution of within-row fields (P(amount | merchant, MCC, country)) AND across-row patterns. Per-row mask removes the entire row, so the model only sees neighboring rows — it can learn 'after this user pays rent on the 1st, they buy groceries' but not 'this MCC + this country usually means amount &lt; $100'. The within-row joint is most of the fraud signal, and per-cell mask is the granularity that exposes it.", correct:true},
          {key:"c", text:"Per-cell mask is faster to compute."},
          {key:"d", text:"Per-row mask is more BERT-like."},
        ]}
        trap={<>(a) collapses the distinction. (c) is incidental. (d) is wrong — BERT masks per-token, and the closer analog for tabular is per-cell.</>}
        lens={<>Mask granularity controls what joint distribution the model learns. Per-cell = within-row + across-row joints. Per-row = across-row only.</>}
        stretch={<>What does per-COLUMN mask (mask the same field across all rows) teach? Hint: column-level marginals, not joints — bad.</>}
      />

      {/* P3 — continuous amount tokenization */}
      <VIS.TrapProblem
        id="tabbert-p3"
        difficulty="hard"
        title="P3 — Continuous-amount tokenization: log-bucket, quantile-bucket, or learned numerical embedding?"
        scenario={<><em>Discriminating insight: each has a known failure mode. Log-bucket loses sub-bucket magnitude resolution (card-test probes $0.99 vs $1.00 collide). Quantile-bucket loses extreme-tail resolution (top 0.01% is one bucket). Learned numerical embedding preserves magnitude but breaks the MLM target distribution (cross-entropy on a discrete vocab no longer applies). Senior answer: production typically uses hybrid (log-bucket for tokens + per-bucket continuous offset) or a separate numerical head.</em><br/><br/>Pick the tokenization.</>}
        options={[
          {key:"a", text:"Log-bucket with 1024 buckets — fastest."},
          {key:"b", text:"Each scheme has a known failure mode. <strong>Log-bucket</strong>: simple discrete vocab; cross-entropy MLM works; loses sub-bucket magnitude — $0.99 and $1.00 collide which destroys signal on card-testing probes. <strong>Quantile-bucket</strong>: each bucket has equal training mass; extreme tail collapses to one bucket; high-value fraud is unresolved. <strong>Learned numerical embedding</strong>: amount → small MLP → vector preserves magnitude exactly; but MLM target is no longer a discrete distribution, so cross-entropy doesn't apply — you need a separate regression head (MSE on amount) or quantized residual. <strong>Production hybrid</strong>: log-bucket for the discrete-token MLM target + per-bucket continuous residual head for fine-grained recovery. Pick by which failure mode matters: small-amount card-testing → preserve sub-bucket; large-amount fraud → preserve extreme tail; both → hybrid.", correct:true},
          {key:"c", text:"Round to nearest dollar — simplest."},
          {key:"d", text:"Tokenize amount as a string of digits."},
        ]}
        trap={<>(a) ignores the tradeoffs and silently fails on small-amount fraud. (c) destroys sub-dollar resolution. (d) is a curiosity but explodes the vocab.</>}
        lens={<>The tokenization scheme dominates the result. No clean winner; pick by failure mode you can tolerate.</>}
        stretch={<>What's the right hybrid for an issuer whose largest fraud loss is $50k card-not-present?</>}
      />

      {/* P4 — MLM ≠ benign vs fraud */}
      <VIS.TrapProblem
        id="tabbert-p4"
        difficulty="hard"
        title="P4 — Junior says: 'After MLM pretrain, the model knows what fraud looks like.' Diagnose."
        scenario={<><em>Discriminating insight: MLM pretrain has NEVER SEEN A FRAUD LABEL. It learns "common vs rare," not "benign vs fraud." A first wedding-ring purchase is high-anomaly under MLM but benign. The fine-tune is what teaches the benign-vs-fraud boundary, on top of the common-vs-rare representation.</em><br/><br/>Diagnose the junior's claim.</>}
        options={[
          {key:"a", text:"Correct — MLM learns fraud."},
          {key:"b", text:"Wrong. MLM pretraining has never seen a fraud label — it learns a representation of WHAT IS COMMON for this user / merchant / MCC / time-of-day, by predicting masked cells. The signal it provides is 'common vs rare' (anomaly proxy), not 'benign vs fraud' (the fraud label distinction). Many atypical events are perfectly benign: a first wedding-ring purchase, a first international trip, a switch to a new gym subscription — all are atypical under the user's history and MLM will flag them. The fine-tuning step is what teaches the benign-vs-fraud distinction on top of the common-vs-rare representation. Without enough labels in fine-tune, you get false positives on atypical-benign events. Ship the MLM-pretrained backbone with a calibrated head, not as a fraud detector raw.", correct:true},
          {key:"c", text:"MLM detects all fraud."},
          {key:"d", text:"MLM is irrelevant to fraud detection."},

        trap={<>(a)(c) overclaim what MLM does. (d) underclaims — MLM is the representation foundation.</>}

      {/* P5 — vs FATA-Trans */}
      <VIS.TrapProblem
        id="tabbert-p5"
        difficulty="hard"
        title="P5 — Engineer claims 'TabBERT and FATA-Trans are competitors — pick one.' Diagnose."

        options={[
          {key:"a", text:"They're competitors — pick FATA-Trans."},
          {key:"b", text:"Category error in the question. <strong>TabBERT</strong> is a pretraining OBJECTIVE — mask cells, predict them — and is silent on the backbone architecture (the paper uses a flat self-attention transformer but you can swap the backbone). <strong>FATA-Trans</strong> is an ARCHITECTURE — per-field-type attention sub-spaces + delta-t PE — and is silent on the pretraining objective (paper is supervised). They operate on different axes and STACK: pretrain a FATA-Trans backbone with the TabBERT MLM objective. You get the MLM data efficiency (works on unlabeled tx) AND the field-type / delta-t inductive biases (works on irregular tabular sequences). Picking one as a competitor to the other forfeits the compound benefit.", correct:true},
          {key:"c", text:"They're competitors — pick TabBERT."},

        options={[

          {key:"b", text:"Tune empirically, typically 25-40% for tabular. The TabBERT row has fewer cells (say 8-12 columns) than a BERT sentence (~100+ tokens), so 15% of cells is just 1-2 cells per row — each gradient step provides little signal. Raising to 25-40% (say 3-5 cells per row of 12) provides more learning per step. Too high (&gt;50%) destroys the within-row joint context the model needs to predict any single masked cell. Sweep mask ratio on a held-out tx slice; the optimal is task and column-count dependent.", correct:true},

        options={[

        id="tabbert-p9"

        scenario={<><em>Discriminating insight: amount tokenizer was frozen at pretrain. New amounts fall outside the trained bucket range — they map to the OOV bucket or wrap to an unused bucket whose embedding is random. Recall on the new rail collapses; pretrained backbone must be re-pretrained on a new amount range.</em><br/><br/>Diagnose.</>}
        options={[

          {key:"b", text:"Amount tokenizer drift. The tokenizer was frozen at pretrain with a fixed amount range (e.g., $0.01 - $10k). The new rail introduces amounts up to $250k. All amounts above $10k map to the OOV bucket whose embedding was barely trained (rare in pretrain data). The MLM-derived representation for new-rail transactions is essentially random. Even the fine-tuned head can't compensate because the underlying representation is broken. Fixes: (a) re-pretrain MLM on the extended amount range (expensive but correct), (b) hybrid: route new-rail tx to a fallback supervised model until re-pretrain completes, (c) extend the tokenizer with new buckets and selectively re-pretrain only the affected embedding rows.", correct:true},
          {key:"c", text:"Just retrain the fine-tune head."},
          {key:"d", text:"The new rail is fine — backbones generalize."},

        trap={<>(a)(d) ignore the tokenizer dependency; (c) doesn't fix the backbone-level break.</>}

      />

      {/* P11 — vs supervised on label-rich */}

        options={[
          {key:"a", text:"Card-testing rings don't matter."},
          {key:"b", text:"Rounding to nearest dollar collapses $0.99, $1.00, $1.50 all into $1 — but card-testing rings specifically use SMALL DISTINCT amounts ($0.99 probe, $1.00 verify, $1.50 small-purchase) as a probe pattern; the distinction is the fingerprint. After rounding, MLM sees 'small-amount tx are common' (subscriptions, small purchases) and learns no anomaly. Fine-tune inherits the broken representation — there's nothing in the embeddings that distinguishes probe-fingerprint from benign small purchase. Recall on ring-pattern fraud drops 4pt. Fix: keep sub-dollar resolution in the tokenizer (log-bucket with finer granularity at small amounts, or learned numerical embedding) and re-pretrain.", correct:true},

      <VIS.TrapProblem
        id="tabbert-p13"
        difficulty="medium"
        title="P13 — 'TabBERT is just BERT applied to transactions.' What's the load-bearing difference?"
        scenario={<><em>Discriminating insight: BERT masks tokens in a 1-D text stream; TabBERT masks CELLS in a 2-D (row × column) tape. The mask granularity and the 2-D structure (column positional encoding, row positional encoding) are the adaptations. Calling it "just BERT" misses both.</em><br/><br/>Pick the adaptation.</>}
        options={[
          {key:"a", text:"It's literally BERT."},
          {key:"b", text:"Two adaptations make TabBERT a different model. (1) <strong>2-D input structure</strong>: BERT operates on a 1-D token stream; TabBERT operates on a (row × column) tape with row-positional-encoding AND column-positional-encoding. Cells share row-PE within their row, column-PE within their column — so the model knows 'this cell is amount, not merchant'. (2) <strong>Per-cell mask granularity</strong>: BERT masks individual tokens; TabBERT masks individual CELLS (a specific column-value in a specific row). The cell is a unit of meaning, not a sub-word piece. Predicting a masked AMOUNT cell from the rest of the row's cells + adjacent rows teaches a different joint distribution than BERT's next-token prediction. The backbone (flat self-attention) is similar; the input structure and mask granularity are NOT.", correct:true},

          {key:"d", text:"TabBERT uses different optimization."},
        ]}
        trap={<>(a) collapses; (c)(d) are incidental.</>}
        lens={<>Input structure (1-D vs 2-D) + mask granularity (token vs cell) are the load-bearing adaptations.</>}

      />

      {/* P14 — eval contamination */}

        scenario={<><em>Discriminating insight: random-row split leaks future-from-same-user; TabBERT (more capacity, MLM-pretrained representation) exploits the leak more than the supervised baseline. User-stratified TEMPORAL split closes the gap to honest 2pt.</em><br/><br/>Diagnose.</>}
        options={[
          {key:"a", text:"Production is buggy."},
          {key:"b", text:"Eval-time leakage. A random-row train/eval split puts some of User X's tx in train and some in eval. The MLM-pretrained TabBERT representation has SEEN User X's general pattern during pretraining (recall MLM was on the unlabeled tape including pretrain examples that may be near-duplicates of test); the supervised baseline only sees what's in the train fold. The capacity-heavy TabBERT exploits the leak more. Switch to USER-STRATIFIED TEMPORAL split: no user appears in both train and eval; eval is strictly after train cutoff; chargeback labels for eval are joined as of the eval cutoff (so no future-fraud-info leaks). Honest lift drops to ~2pt — matching production. The honest lift is real; the inflated number was confounded by leakage.", correct:true},

      <VIS.TrapProblem
