<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Provider upcoding via medical-code embedding — Med2Vec/CPT2Vec embeddings let
// you compare a provider's coding distribution vs peers to flag upcoding.
// AMIA 2024 pattern.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · Healthcare claim fraud"
      title="Provider upcoding via medical-code embedding"
      subtitle="Pretrained ICD/CPT embeddings (Med2Vec, Cui2Vec) let you compare a provider's coding-pattern distribution to a peer-cohort distribution. Novel upcoding combos that rule-based code-pair flags miss become detectable as embedding-space outliers."
      byline={[
        {label: "Source", value: "Med2Vec for Upcoding Detection (AMIA 2024)"},
        {label: "Year", value: "2024"},
        {label: "L3", value: "Healthcare claim fraud / Medicare integrity"},
      ]}/>

    <VIS.TLDR>
      A medical-coding{" "}
      <VIS.Term def="A way to turn discrete medical billing codes (ICD diagnoses, CPT procedures) into dense numeric vectors trained so that codes that co-occur on the same claim end up near each other in vector space. Same idea as word2vec, but for clinical codes.">code embedding</VIS.Term>{" "}
      built on millions of historical claims places semantically related ICD/CPT codes near each other in vector space. A provider's typical billing pattern becomes a distribution over that space; the same is built for matched-specialty peers. Statistical distance between the provider's distribution and the peer distribution flags{" "}
      <VIS.Term def="Billing a higher-paying procedure or diagnosis code than the documentation actually supports. E.g., a 15-minute office visit billed as a 45-minute high-complexity visit. The single biggest fraud-loss category in Medicare.">upcoding</VIS.Term>{" "}
      that rule-based "if codes A and B appear together flag this" filters miss. The senior question is not "embeddings are better than rules" — it's how do you handle ICD-11 migration drift, how do you prove the flagged provider is upcoding rather than serving a sicker panel, and how does the system survive the next coding system rollover.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is">
      <p>
        Train an embedding model (Med2Vec / Cui2Vec / a transformer on claim sequences) on millions of historical claims so each ICD-10 / CPT code becomes a dense vector. Codes that co-occur in real clinical workflows end up near each other (similar diagnoses, similar procedure bundles). For each provider, aggregate their billed codes over a window (last 90 days, weighted by claim) into a code-distribution vector. Compute a peer cohort matched on specialty, region, and patient-mix demographics; aggregate their codes too. Score the provider by the distance between their distribution and the peer distribution; investigate the top-tail.
      </p>

      <VIS.Mermaid chart={`
flowchart TB
  CLAIMS["Historical claims corpus"]
  EMB["Med2Vec embedding model"]
  PVEC["Provider code distribution"]
  PEERVEC["Peer cohort distribution"]
  SCORE["Distribution distance score"]
  TRIAGE["SIU review queue"]
  CLAIMS --> EMB
  EMB --> PVEC
  EMB --> PEERVEC
  PVEC --> SCORE
  PEERVEC --> SCORE
  SCORE --> TRIAGE
  style EMB fill:#dbeafe,stroke:#2563eb,stroke-width:2px
  style SCORE fill:#fef3c7,stroke:#d97706,stroke-width:2px
      `} />
      <p>
        Blue = the embedding layer (the SOTA component). Yellow = the distance score (operational output). Senior insight: the embedding does not directly classify upcoding — it produces a continuous distance signal that a Special Investigations Unit (SIU) prioritizes. Embeddings are a triage prior, not a verdict.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How it differs from the baseline">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Aspect</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Rule-based code-pair flags</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Provider z-score on flat code counts</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Embedding-based peer distance</th>
          </tr>
        </thead>
        <tbody>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Catches novel code combos</td>
            <td style={{padding:"8px 10px"}}>No (rule list is static)</td>
            <td style={{padding:"8px 10px"}}>Partially</td>
            <td style={{padding:"8px 10px"}}>Yes (semantic neighborhood)</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Handles 70k+ code vocabulary</td>
            <td style={{padding:"8px 10px"}}>Sparse coverage</td>
            <td style={{padding:"8px 10px"}}>Curse of dimensionality</td>
            <td style={{padding:"8px 10px"}}>Yes (dense low-dim)</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Interpretability for SIU</td>
            <td style={{padding:"8px 10px"}}>High (named rule)</td>
            <td style={{padding:"8px 10px"}}>Medium (per-code z)</td>
            <td style={{padding:"8px 10px"}}>Lower (distance to abstract centroid)</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Survives ICD version rollover</td>
            <td style={{padding:"8px 10px"}}>Brittle (rules need rewrite)</td>
            <td style={{padding:"8px 10px"}}>Brittle (counts re-scaled)</td>
            <td style={{padding:"8px 10px"}}>Brittle without retraining</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Risk of confounding (sicker panel)</td>
            <td style={{padding:"8px 10px"}}>Low (binary rule)</td>
            <td style={{padding:"8px 10px"}}>High (raw distance)</td>
            <td style={{padding:"8px 10px"}}>High without peer matching</td>
          </tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-when" title="When to pick">
      <ul>
        <li><strong>Medicare / Medicaid program integrity</strong> — large code vocabulary, large provider base, novel upcoding patterns emerge faster than rule lists.</li>
        <li><strong>Commercial-payer claim audit</strong> — same shape, but you have richer enrollment + demographics to build sharper peer cohorts.</li>
        <li><strong>You can compute matched peer cohorts</strong> — specialty + region + patient-mix matching is essential; without it the distance signal confounds case-mix with fraud.</li>
        <li><strong>Triage prior, not autonomous block</strong> — outputs feed an SIU queue; humans decide audit and recoupment. PHI handling + due-process requirements rule out auto-block.</li>
      </ul>
    </VIS.Section>

    <VIS.Section id="sec-limits" title="Limitations and gotchas">
      <VIS.Callout kind="gotcha" title="Embedding drift on ICD-11 migration">
        The ICD-11 rollover (US Medicare transition windows in 2026-2027) creates a new code vocabulary partially overlapping with ICD-10. Naive retraining on a 6-month mixed corpus produces unstable embeddings; embeddings for codes that exist in both versions can shift wildly because the surrounding code distribution changed. The fix is incremental: hold ICD-10 embeddings frozen, train ICD-11 codes into the same space using crosswalk anchors (CMS-published ICD-10 to ICD-11 maps) as alignment supervision.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Confounding: sicker panel vs upcoding">
        A provider whose patient mix is sicker (e.g., a geriatric clinic in a low-income county) will look like an upcoder if you compare to specialty-only peers. Peer cohorts MUST match on patient-mix demographics (HCC risk score, age, dual-eligible share, region). Without that, your highest-distance providers are oncologists, geriatricians, and safety-net clinicians — and you destroy reputational and legal capital chasing them.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Interpretability for SIU + due process">
        Investigators need to articulate why a provider was flagged in adverse-action letters and (often) in court. "Cosine distance 0.42 from peer centroid" is not a defensible explanation. Pair the distance score with named breakdowns: which specific codes contributed most to the distance, sample claims that exemplify the deviation, and per-code peer-distribution percentile.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — 10 trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        Ten interview-grade trap problems. The shape-suggestion was debugging; many of these are debugging plus tradeoff variants because real upcoding-detection stacks fail in subtle ways.
      </p>

      <VIS.TrapProblem
        id="puc-p1"
        difficulty="hard"
        title="P1 — ICD-11 migration breaks your embedding model. Fix."
        scenario={<>You shipped an upcoding detector built on a Med2Vec embedding trained on five years of ICD-10 claims. CMS begins ICD-11 migration. Within two months your queue is dominated by false-positive flags on providers who simply adopted ICD-11 codes early. The embedding has no vectors for many ICD-11 codes; the codes that overlap (same root code, slightly different specifier) sit at random initial positions. Provider-distance scores explode without any real change in billing behavior. Fix it.</>}
        options={[
          {key:"a", text:"Retrain from scratch on a 6-month mixed ICD-10 + ICD-11 corpus; ship the new model immediately."},
          {key:"b", text:"Freeze ICD-10 embeddings, train ICD-11 codes into the same vector space using CMS crosswalk anchors as alignment supervision (each ICD-11 code initialized at its mapped ICD-10 neighbor and fine-tuned on co-occurrence). Re-baseline peer distributions on the joint vocabulary. Add a model-version gate: providers below 50% ICD-11 adoption scored by old model, above 50% scored by new, blended in the band.", correct:true},
          {key:"c", text:"Map all ICD-11 codes back to ICD-10 via crosswalk and score as if nothing changed."},
          {key:"d", text:"Suspend the detector until the migration completes."},
        ]}
        trap={<>(a) retrains on too-thin ICD-11 data; embeddings for rare ICD-11 codes are noise, and provider-distance baselines shift discontinuously. (c) discards the new specificity ICD-11 provides — exactly the codes upcoders move to first. (d) abandons fraud surveillance during the precise window when miscoding spikes (transition windows historically see fraud-loss surges).</>}
        lens={<>(b). The senior pattern is incremental embedding extension with anchor supervision (analogous to how cross-lingual embedding alignment uses bilingual dictionaries). Freeze ICD-10, anchor ICD-11 to the same space via crosswalk, fine-tune on joint co-occurrence. The version-gate handles the transition band so a single provider does not switch models mid-quarter. Re-baseline peer distributions on the joint vocabulary.</>}
        stretch={<>What guardrail metric on the new ICD-11 embedding quality would trigger rollback of the new model?</>}
      />

      <VIS.TrapProblem
        id="puc-p2"
        difficulty="hard"
        title="P2 — Geriatric clinic flagged as top upcoder"
        scenario={<>Your model's top-1 highest-distance provider for Q3 is a geriatric internal-medicine clinic in a rural high-poverty county. Cosine distance 0.51 (median 0.08). SIU is about to issue an audit letter. Before they do, a clinical adviser flags that geriatric patients in poverty-rural counties have higher HCC risk scores, more multi-morbidity, and code more high-complexity visits. What's the actual bug here?</>}
        options={[
          {key:"a", text:"Peer cohort matches only on specialty (internal medicine) and region (state). It does NOT match on patient-mix risk (HCC score, age distribution, dual-eligible share). A geriatric clinic's coding pattern legitimately diverges from a state-average internal-medicine peer — that's case mix, not upcoding.", correct:true},
          {key:"b", text:"The cosine distance threshold is too low; raise it."},
          {key:"c", text:"The embedding is overfit; train a smaller model."},
          {key:"d", text:"This IS upcoding — SIU should send the letter."},
        ]}
        trap={<>(b) hides the bug — raises threshold uniformly and you still rank by a confounded score. (c) misdiagnoses an interpretability + match problem as a model-capacity problem. (d) is the failure mode the question warns against: the most reputationally and legally costly false positive a payer can make.</>}
        lens={<>(a). The bug is peer matching, not the embedding. Specialty + region is insufficient when patient mix shifts billing patterns legitimately. Re-define peer cohorts on (specialty, region, HCC risk band, age band, dual-eligible share). Re-score; the clinic likely drops out of the queue. Senior signal: name CASE MIX vs FRAUD as the confound, propose explicit matching variables, and protect SIU + legal from acting on a confounded score.</>}
        stretch={<>How would you build the matched-peer cohort if a small specialty has fewer than 30 matchable peers nationally?</>}
      />

      <VIS.TrapProblem
        id="puc-p3"
        difficulty="hard"
        multiSelect
        title="P3 — Embedding drift even WITHOUT ICD-11"
        scenario={<>Six months after deploying the model, you observe: distance scores have crept upward across nearly all providers (median 0.08 to 0.14). False-positive flags are rising. ICD vocabulary did not change. Which causes are plausible? Select all that apply.</>}
        options={[
          {key:"a", text:"Real-world coding behavior shifts (telemedicine grew, post-COVID coding changed) — your fixed embedding lags reality.", correct:true},
          {key:"b", text:"Peer-distribution baseline is computed on a fixed historical window; the population it represents has drifted but the baseline has not been refreshed.", correct:true},
          {key:"c", text:"Provider mix in your queue changed (new payers onboarded, different specialty distribution); your global threshold is inappropriate per-cohort.", correct:true},
          {key:"d", text:"The embedding model is overfitting in production; retrain weekly."},
          {key:"e", text:"Cosmic rays."},
        ]}
        trap={<>(d) confuses "model in production" with "model being trained in production" — the embedding is FROZEN at inference, so cannot overfit further. (e) is the deliberate junk option.</>}
        lens={<>Three correct. <strong>(a)</strong> data drift: embeddings encode co-occurrence as of training time; real coding behavior drifts. <strong>(b)</strong> baseline drift: peer distributions reflecting last year's population are stale. <strong>(c)</strong> cohort composition: a global threshold on a mixed population masks per-cohort behavior. Fixes: schedule rolling retraining (quarterly) of the embedding; refresh peer baselines monthly on a rolling window; set per-cohort thresholds.</>}
        stretch={<>What single drift-monitor would you put in production as the leading indicator?</>}
      />

      <VIS.TrapProblem
        id="puc-p4"
        difficulty="hard"
        title="P4 — SIU asks: WHY is this provider flagged?"
        scenario={<>The model flags a provider with cosine distance 0.42. SIU asks: "tell us specifically which codes drove this." Currently, your system outputs only the scalar distance. What's the engineering fix to make the signal actionable?</>}
        options={[
          {key:"a", text:"Decompose the distance per code: for each code the provider billed, compute its contribution to the total distance (e.g., shapley-style on the embedding-space distance, or per-code log-likelihood-ratio between provider and peer distribution). Surface the top-10 driver codes plus a few sample claims using each. Display per-code provider-frequency vs peer-percentile so SIU can show 'this code is billed by 99th-percentile share of this provider's claims vs 35th-percentile for peers.'", correct:true},
          {key:"b", text:"Replace embeddings with rule-based code-pair flags; SIU prefers the interpretability."},
          {key:"c", text:"Add a free-form LLM explanation; ask GPT to summarize why."},
          {key:"d", text:"Refuse — model details are proprietary."},
        ]}
        trap={<>(b) reverses the SOTA decision; loses novel-combo coverage. (c) is post-hoc rationalization that can lie about the model's actual decision basis (the model didn't use language; the LLM is fabricating a narrative). (d) breaks SIU workflow and likely fails due-process review in adverse-action proceedings.</>}
        lens={<>(a). The senior pattern: an embedding-based score is interpretable when projected back to the code level. Per-code distance decomposition is mathematically grounded (it actually attributes the score) and operationally usable (SIU points at specific codes and claims). This is the same interpretability move you make for any "vector space distance" signal — decompose to the named-feature level.</>}
        stretch={<>What is the difference between this decomposition and SHAP for tree models?</>}
      />

      <VIS.TrapProblem
        id="puc-p5"
        difficulty="medium"
        multiSelect
        title="P5 — Evaluation: how do you know this is working?"
        scenario={<>You ship the embedding-based model. SIU investigates queued cases at ~50/week capacity. How should you evaluate model quality? Select all that apply.</>}
        options={[
          {key:"a", text:"Precision @ top-K, where the relevant 'K' is SIU capacity (top 50/week). Measure what fraction of the top 50 result in a substantiated upcoding finding.", correct:true},
          {key:"b", text:"Recall is essentially unmeasurable directly (no ground-truth on the full provider population), but estimate it via stratified random audits: audit 30 providers from the bottom-tail and verify low miss rate.", correct:true},
          {key:"c", text:"Recovered dollars per audit hour — the business metric, not the ML metric, but the one execs care about.", correct:true},
          {key:"d", text:"AUC on a held-out set with provider-level labels."},
          {key:"e", text:"F1 score with a fixed threshold."},
        ]}
        trap={<>(d) and (e) assume provider-level labeled data exists at scale. It does not. The few hundred substantiated upcoders are not a random sample; AUC/F1 on a non-random subsample is biased. The right evaluation matches the operational reality: SIU has a fixed K, so precision-at-K is the operational metric; everything else is supplementary.</>}
        lens={<>Three correct. <strong>(a)</strong> precision-at-SIU-capacity is the right operational metric. <strong>(b)</strong> stratified random audits give a recall proxy at known cost. <strong>(c)</strong> dollars-recovered-per-hour grounds the business case. Senior signal: name what you CAN'T measure (full-population recall) and design substitutes.</>}
        stretch={<>How do you avoid SIU's review process biasing your labels over time?</>}
      />

      <VIS.TrapProblem
        id="puc-p6"
        difficulty="hard"
        title="P6 — Adversarial: a sophisticated upcoder adapts"
        scenario={<>A national chain of urgent-care clinics observes which codes trigger SIU queues and shifts its upcoding to a different code family that is near-peer for their specialty but slightly elevates revenue. Their distance score drops below threshold. The model stops flagging. What's the structural response?</>}
        options={[
          {key:"a", text:"Treat this as continuous co-evolution. Multi-axis features beyond peer-distance (within-provider temporal drift, claim-amount distribution shift, patient-overlap-with-claim-density anomalies). Quarterly re-train on adversarially-mined attack patterns. Score-distribution monitor with per-chain segmentation. Combine the embedding-distance signal with non-embedding signals (claim-payment velocity, beneficiary repeat-visit pattern) in a calibrated ensemble.", correct:true},
          {key:"b", text:"Lower the threshold globally."},
          {key:"c", text:"Switch to a larger embedding model."},
          {key:"d", text:"Trust the new low scores — the chain reformed."},
        ]}
        trap={<>(b) drowns SIU in false positives. (c) more capacity does not address the structural single-axis-defense weakness. (d) is the credulous reading — and the textbook fraud failure mode where the model rewards adaptive attackers.</>}
        lens={<>(a). Single-axis defenses die first. The senior posture: combine the embedding-distance signal with within-provider temporal drift, claim-amount distribution shifts, patient-flow anomalies, and other non-embedding signals in a calibrated ensemble. Quarterly red-team retraining. Per-chain segmentation in monitoring so a chain-wide tactical shift surfaces as a chain-level alert.</>}
        stretch={<>Which non-embedding signal is hardest for the adversary to game while still upcoding?</>}
      />

      <VIS.TrapProblem
        id="puc-p7"
        difficulty="medium"
        title="P7 — Cold-start: new provider with little history"
        scenario={<>A new physician opens a practice. After 60 days they have 200 claims. Their distance score is enormous (small samples are noisy in distribution-space). They're flagged. SIU questions whether the model is acting on too little data.</>}
        options={[
          {key:"a", text:"Apply a Bayesian smoothing: blend the provider's empirical distribution with a peer-cohort prior. As claim count grows, the prior weight decays. Below a claim-count floor (e.g., 500), suppress the alert entirely. Above the floor, surface the alert with a confidence band that reflects the remaining sample uncertainty.", correct:true},
          {key:"b", text:"Flag aggressively — new providers are higher-risk in general."},
          {key:"c", text:"Use the raw empirical distribution; the math is the math."},
          {key:"d", text:"Wait until the provider has 5 years of history before scoring."},
        ]}
        trap={<>(b) is reputationally costly (new providers also include legitimate new practices). (c) ignores sampling variance entirely; the score is well-defined but operationally noisy. (d) is overcautious — five-year wait gives free upcoding windows.</>}
        lens={<>(a). Bayesian smoothing with a peer prior + a claim-count floor + uncertainty band is the textbook fix for small-sample triage. Same shape as smoothing recommendations for new users in recsys cold-start, but with stricter operational guardrails (suppress below floor, never block above floor on first 90 days).</>}
        stretch={<>What's the prior strength you'd start with, and how do you tune it?</>}
      />

      <VIS.TrapProblem
        id="puc-p8"
        difficulty="hard"
        multiSelect
        title="P8 — Multiple coding-system worlds: dental, behavioral health, DME"
        scenario={<>Beyond general medical claims (ICD/CPT), your payer also handles dental (CDT codes), behavioral health (DSM + specific procedure codes), and durable medical equipment (HCPCS Level II). Should you build separate embeddings per vertical, one shared embedding, or something else?</>}
        options={[
          {key:"a", text:"Per-vertical embeddings — each coding system has its own co-occurrence structure and trains best in its own corpus.", correct:true},
          {key:"b", text:"A shared embedding across all coding systems, since a provider can bill across verticals."},
          {key:"c", text:"Per-vertical embeddings, plus a small set of cross-vertical anchor codes (e.g., E&M codes that appear in medical AND behavioral) used to weakly align the spaces — so multi-vertical providers get a coherent distance score.", correct:true},
          {key:"d", text:"Per-vertical fraud teams, per-vertical models, per-vertical SIU queues — don't try to score multi-vertical providers globally.", correct:true},
          {key:"e", text:"Skip the embedding approach for non-medical verticals; rules are sufficient there."},
        ]}
        trap={<>(b) trains a shared embedding on disjoint co-occurrence structures — codes that never co-occur cannot be placed meaningfully. (e) gives up SOTA on the largest fraud verticals after medical.</>}
        lens={<>Three correct. <strong>(a)</strong> the standard answer — per-vertical training is cleaner. <strong>(c)</strong> for the small set of providers who genuinely span verticals, anchor-aligned embeddings allow coherent scoring. <strong>(d)</strong> operationally, verticals have different SIU staffing and different regulatory regimes; separate queues respect that. Senior signal: nuanced per-vertical + per-tenant architecture, not "one model rules all."</>}
        stretch={<>If a multi-vertical provider's only suspicious behavior is the JUNCTION between two verticals (e.g., over-prescribing DME for behavioral patients), how does this architecture catch it?</>}
      />

      <VIS.TrapProblem
        id="puc-p9"
        difficulty="hard"
        title="P9 — PHI + HIPAA + training data"
        scenario={<>Training the Med2Vec embedding requires millions of historical claims, which contain PHI (Protected Health Information). Your CISO + privacy office push back on training a model on raw claim data. What's the right design?</>}
        options={[
          {key:"a", text:"De-identify the training corpus before embedding training: drop direct identifiers (member ID, provider tax ID, dates beyond month-year, ZIP3) and use only the (code, claim-grouping-token) pairs needed for co-occurrence. Run training inside the HIPAA-compliant data environment (VPC, audit logs, no egress). Embedding artifacts (the code vectors) are pure code-to-vector mappings and contain no PHI — they're free to deploy more broadly. Inference processes one provider's claim distribution at a time inside the same compliance boundary.", correct:true},
          {key:"b", text:"Send claims to OpenAI to generate embeddings."},
          {key:"c", text:"Refuse to use ML; rules only."},
          {key:"d", text:"Synthesize fake claims and train on those."},
        ]}
        trap={<>(b) is a HIPAA business-associate-agreement nightmare and likely violates the original payer-provider agreements. (c) abandons the SOTA. (d) embedding quality on synthetic claims is poor — the co-occurrence structure of real claims is what gives the embedding its discriminative power.</>}
        lens={<>(a). The senior compliance pattern: de-identify the training corpus to (code, claim-group) pairs (the minimum sufficient statistic for co-occurrence training), train inside the HIPAA-compliant environment, observe that the resulting embedding artifacts are PHI-free, then deploy those artifacts (the code-vector lookup) freely while the actual provider-distribution computation stays inside the compliance boundary.</>}
        stretch={<>Is the embedding artifact itself de-identified under HIPAA's Safe Harbor or under Expert Determination?</>}
      />

      <VIS.TrapProblem
        id="puc-p10"
        difficulty="hard"
        title="P10 — End-to-end upcoding detection stack"
        scenario={<>You lead the program integrity ML team at a national Medicare Advantage plan. 40k providers, 80M claims/year, $80B in payouts. Design the complete upcoding-detection architecture.</>}
        options={[
          {key:"a", text:"Tiered architecture. Tier 0 rule-based code-pair flags (cheap, catch known patterns). Tier 1 embedding-based peer-distance signal with case-mix-matched peer cohorts (specialty + region + HCC band + age + dual-eligible). Tier 2 ensemble that combines tier 1 with temporal within-provider drift, claim-amount distribution shifts, patient-overlap anomalies. Bayesian smoothing for cold-start providers. Per-vertical embeddings (medical, dental, behavioral, DME) with anchor alignment for multi-vertical providers. ICD-11 incremental embedding extension via crosswalk-anchor supervision. Per-code distance decomposition surfaced to SIU. Score + uncertainty + reason codes feed an SIU queue prioritized by recoverable-dollars-per-hour. Quarterly retraining + drift monitor. PHI handling: de-identified training corpus, in-VPC training, PHI-free embedding artifacts. SIU dispositions feed back as supervised signal where labels are reliable.", correct:true},
          {key:"b", text:"Replace SIU with the model; auto-recoup any flagged provider."},
          {key:"c", text:"Rule-only stack; embeddings unproven."},
          {key:"d", text:"One big neural net trained on raw claims; let it figure out everything."},
        ]}
        trap={<>(b) violates due process and CMS adverse-action rules. (c) misses novel upcoding (the entire reason for the embedding layer). (d) ignores per-vertical structure, HIPAA training boundary, SIU triage UX, ICD migration, and adversarial pressure — all of which require explicit architecture.</>}
        lens={<>(a). The complete senior architecture: tiered (rule + embedding + ensemble), case-mix-matched, multi-vertical with anchor alignment, ICD-version-resilient, per-code-decomposed for SIU, PHI-compliant, with quarterly retraining and a feedback loop. This is what survives compliance, legal, SIU operations, and adversarial pressure at $80B-payout scale.</>}
        stretch={<>What single failure mode would make you roll back the entire embedding tier overnight?</>}
      />
    </VIS.Section>
