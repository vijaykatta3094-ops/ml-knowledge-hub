  function autoGloss(text) {
    if (typeof text !== "string" || !text) return text;
    if (_glossPattern === null) _buildGlossPattern();
    if (_glossPattern === false) return text;
    const seen = new Set();
    const out = [];
    let lastIdx = 0;
    let m;
    _glossPattern.lastIndex = 0;
    while ((m = _glossPattern.exec(text)) !== null) {
      const before = m[1];
      const term = m[2];
      const matchStart = m.index + before.length;
      const matchEnd = matchStart + term.length;
      // Emit text BEFORE this match
      if (matchStart > lastIdx) out.push(text.slice(lastIdx, matchStart));
      // Emit wrapped term (first-mention only)
      if (seen.has(term.toLowerCase())) {
        out.push(text.slice(matchStart, matchEnd));
      } else {
        seen.add(term.toLowerCase());
        out.push(h("span", {
          key: matchStart,
          className: "vis-term",
          "data-rv-info": _glossLookup[term],
          "aria-label": _glossLookup[term],
          tabIndex: 0,
        }, term));
      }
      lastIdx = matchEnd;
    }
    if (lastIdx < text.length) out.push(text.slice(lastIdx));
    return out.length === 1 ? out[0] : out;
  }

  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."

  //   options={[

  //     {key:"b", text:"...", correct:true},

  //

  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,

  //

    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    //   single  → string | null
    //   multi   → Set<string>

    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)

        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }

    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          // NO autoGloss here. Glossing terms inside option text leaks the
          // answer mechanism via hover. Authors must keep options self-contained;
          // a candidate who needs a definition can scroll up to the prose where
          // the term is explicitly wrapped via <VIS.Term>.
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Deep SVDD / Deep SAD — one-class deep AD via hypersphere objective + collapse-prevention recipe.
// Concept-specific anchor: every trap hinges on the hypersphere objective, the collapse failure mode,
// the bias-free / bounded-activation / frozen-c architectural rules, or the Deep SAD inverse-distance term.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · Deep anomaly detection"
      title="Deep SVDD / Deep SAD"
      subtitle="Learn an embedding that shrinks normal data into a minimum-volume hypersphere — and survive the collapse failure mode that the paper specifically warns about."
      byline={[
        {label: "Papers", value: "Ruff et al. Deep SVDD (ICML 2018); Deep SAD (ICLR 2020)"},
        {label: "L3", value: "Deep anomaly detection"},
        {label: "Siblings", value: "DROCC, ICL, classical OC-SVM"},
      ]}/>

    <p style={{color:"#475569", fontSize:14, margin:"0 0 1em"}}>
      Sibling methods at a glance:{" "}
      <VIS.Term def="Deep Robust One-Class Classification (Goyal et al. ICML 2020). Sibling of Deep SVDD that generates adversarial pseudo-anomalies via PGD around normals; learns a classifier rather than a hypersphere.">DROCC</VIS.Term>{" "}
      (adversarial pseudo-anomalies), ICL (self-supervised contrast), classical OC-SVM (kernel one-class). The interview-relevant axis is{" "}
      <VIS.Term def="A loss function whose level sets form a convex set in parameter space — any local minimum is global. Classical SVDD (kernel) is convex; Deep SVDD is non-convex because phi is a neural net.">convex</VIS.Term>{" "}
      vs learned-embedding trade.
    </p>

    <VIS.TLDR>
      <VIS.Term def="Deep Support Vector Data Description (Ruff et al. ICML 2018). One-class deep AD: learn an embedding phi(x;W) that shrinks normal data toward a fixed center c; score is squared distance to c.">Deep SVDD</VIS.Term>{" "}
      minimizes the squared distance of normal points to a fixed center c in a learned{" "}
      <VIS.Term def="A vector representation phi(x) produced by a neural encoder. In Deep SVDD this is the space where the hypersphere lives — geometry there is what scores anomalies.">embedding</VIS.Term>{" "}
      space — equivalent to shrinking the smallest hypersphere that encloses them. The unique failure mode is{" "}
      <VIS.Term def="When the network learns the trivial solution phi(x) = c for ALL inputs: loss equals zero, every anomaly scores zero too. Caused by bias terms, learnable centers, or affine BatchNorm.">hypersphere collapse</VIS.Term>{" "}
      — and the paper's bias-free / bounded-activation / frozen-c recipe exists specifically to prevent it.{" "}
      <VIS.Term def="Deep Semi-supervised Anomaly Detection (Ruff et al. ICLR 2020). Extends Deep SVDD with a small labeled-anomaly set A via an inverse-distance term that repels labeled anomalies from c.">Deep SAD</VIS.Term>{" "}
      extends this with an inverse-distance term that pushes a small set of labeled anomalies away.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is — minimum-volume hypersphere in a learned embedding">
      <p>
        Classical{" "}
        <VIS.Term def="Support Vector Data Description (Tax & Duin 2004). Finds the smallest hypersphere in a kernel feature space that encloses the normal data. Anomaly score = distance to the sphere boundary.">SVDD</VIS.Term>{" "}
        operates in a fixed kernel feature space.{" "}
        <VIS.Term def="Deep Support Vector Data Description (Ruff et al. ICML 2018). One-class deep AD: learn an embedding phi(x;W) that shrinks normal data toward a fixed center c; score is squared distance to c.">Deep SVDD</VIS.Term>{" "}
        learns the{" "}
        <VIS.Term def="A vector representation phi(x) produced by a neural encoder. In Deep SVDD this is the space where the hypersphere lives — geometry there is what scores anomalies.">embedding</VIS.Term>{" "}
        <code>&phi;(x; W)</code> jointly via{" "}
        <VIS.Term def="Stochastic Gradient Descent. Iteratively updates parameters using minibatch gradient estimates. Standard optimizer for deep nets; Deep SVDD's loss is differentiable so any first-order optimizer works.">SGD</VIS.Term>. The center{" "}
        <code>c</code> is set once from the mean of an initial forward pass and FROZEN; the network is trained to pull normals toward c.
      </p>
      <VIS.Equation display tex="\min_{W}\;\frac{1}{n}\sum_{i=1}^{n}\|\phi(x_i;W)-c\|^2 + \frac{\lambda}{2}\sum_l \|W_l\|^2"/>
      <p>
        Soft-boundary variant (allows a fraction &nu; of outliers — useful when the training set may be contaminated with a few unlabeled anomalies):
      </p>
      <VIS.Equation display tex="\min_{R,W}\;R^2 + \frac{1}{\nu n}\sum_i \max(0, \|\phi(x_i)-c\|^2 - R^2) + \frac{\lambda}{2}\sum_l\|W_l\|^2"/>
      <p>
        Anomaly score at test time is simply <code>‖&phi;(x) − c‖&sup2;</code> (hard) or its distance past R (soft). A threshold on this score gives the binary decision; downstream{" "}
        <VIS.Term def="A monotone non-parametric mapping from raw scores to probabilities; used to calibrate ranking outputs without changing AUC. Often paired with Deep SVDD before policy thresholds.">isotonic regression</VIS.Term>{" "}
        can calibrate the score-to-probability mapping.
      </p>

      <VIS.Mermaid chart={`
flowchart TB
  X["Normal training data x"]
  X --> ENC["Encoder phi (bias-free, bounded act, no affine BN)"]
  ENC --> EMB["Embedding phi(x)"]
  EMB --> LOSS["Loss: shrink phi(x) toward fixed center c"]
  C["Frozen center c (mean of init forward pass)"] --> LOSS
  LOSS --> TRAIN["SGD on W only"]
  EMB --> SCORE["Anomaly score: phi(x) minus c, squared norm"]
  style ENC fill:#dbeafe,stroke:#2563eb,stroke-width:2px
  style C fill:#fef3c7,stroke:#d97706,stroke-width:2px
  style LOSS fill:#fee2e2,stroke:#dc2626,stroke-width:2px
      `}/>
      <p>Blue = the architectural constraints. Yellow = the frozen center c. Red = the loss that drives the entire one-class objective AND is the source of the{" "}
        <VIS.Term def="When the network learns the trivial solution phi(x) = c for ALL inputs: loss equals zero, every anomaly scores zero too. Caused by bias terms, learnable centers, or affine BatchNorm.">collapse</VIS.Term>{" "}
        risk.</p>
    </VIS.Section>

    <VIS.Section id="sec-collapse" title="The collapse failure mode — and the prevention recipe">
      <p>
        The trivial solution to the Deep SVDD objective is <code>&phi;(x) &equiv; c</code> for all inputs: loss = 0, gradient = 0, optimizer happy.
        At test time every input — normal AND anomaly — gets score 0.{" "}
        <VIS.Term def="Area Under the ROC Curve. AUC=0.5 means the score is no better than random — every point gets the same score, so ranking is uninformative.">AUC</VIS.Term>{" "}
        collapses to 0.5.
      </p>
      <p>The paper's architectural rules exist to BLOCK this:</p>
      <ul>
        <li><strong>No bias terms</strong> in any layer. A bias is a constant the network can drive to <code>c</code> to short-circuit the loss.</li>
        <li><strong>No unbounded activation followed by a bias.</strong> Same reason — the bias post-activation is an unconstrained constant.</li>
        <li><strong>No learnable center.</strong> <code>c</code> is fixed from an initial forward pass at random init. If you let the optimizer also move <code>c</code>, it sets <code>c = E[&phi;(x)]</code> and shrinks everything to it.</li>
        <li><strong>No affine{" "}
          <VIS.Term def="Batch Normalization. Normalizes activations per-minibatch with running mean/variance, then applies an optional learnable affine (gamma, beta). In Deep SVDD, the affine beta is a bias-equivalent that enables collapse.">BatchNorm</VIS.Term>/
          <VIS.Term def="Layer Normalization. Normalizes across feature dim per-sample with optional learnable affine. Same collapse-enabling concern as BatchNorm when affine=True.">LayerNorm</VIS.Term>.</strong>{" "}
          The learnable{" "}
          <VIS.Term def="A linear map x → Wx + b. The b (bias / translation) is what Deep SVDD forbids: it's an unconstrained additive constant the optimizer can use to collapse phi(x) toward c.">affine</VIS.Term>{" "}
          parameters are bias-equivalents.</li>
      </ul>
      <p>Diagnostic during training: monitor <code>Var_x[‖&phi;(x) − c‖&sup2;]</code> on a held-out batch. If it trends to zero, the{" "}
        <VIS.Term def="The network module phi(.;W) that maps raw inputs to the embedding space where the hypersphere lives. In Deep SVDD this is the only trainable component.">encoder</VIS.Term>{" "}
        is collapsing. Pair with a per-epoch{" "}
        <VIS.Term def="Area Under the ROC Curve. AUC=0.5 means the score is no better than random — every point gets the same score, so ranking is uninformative.">AUC</VIS.Term>{" "}
        check on a small synthetic-anomaly probe set as a second tripwire.</p>
    </VIS.Section>

    <VIS.Section id="sec-deepsad" title="Deep SAD — adding a known-anomaly inverse-distance term">
      <p>
        <VIS.Term def="Deep Semi-supervised Anomaly Detection (Ruff et al. ICLR 2020). Extends Deep SVDD with a small labeled-anomaly set A via an inverse-distance term that repels labeled anomalies from c.">Deep SAD</VIS.Term>{" "}
        extends Deep SVDD with a small set of LABELED anomalies <code>A</code>. The objective adds an inverse-distance term that pushes labeled anomalies away from <code>c</code>:
      </p>
      <VIS.Equation display tex="\min_W\;\frac{1}{n_{u}}\sum_{i\in U}\|\phi(x_i)-c\|^2 + \frac{\eta}{n_{a}}\sum_{j\in A}\big(\|\phi(x_j)-c\|^2 + \epsilon\big)^{-1}"/>
      <p>
        <code>&eta;</code> trades unlabeled-shrink vs labeled-push. <code>&epsilon;</code> (~1e-6) prevents the inverse term from exploding when a labeled anomaly is near c. Set <code>&eta;</code> too high and the labeled-push gradient dominates near c, destabilizing the{" "}
        <VIS.Term def="The network module phi(.;W) that maps raw inputs to the embedding space where the hypersphere lives. In Deep SVDD this is the only trainable component.">encoder</VIS.Term>; too low and Deep SAD degenerates to Deep SVDD.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-limits" title="Limitations and gotchas">
      <VIS.Callout kind="gotcha" title="Hypersphere collapse is silent">
        Training loss reaches near-zero (looks like convergence). Anomaly-score distribution becomes flat.{" "}
        <VIS.Term def="Area Under the ROC Curve. AUC=0.5 means the score is no better than random — every point gets the same score, so ranking is uninformative.">AUC</VIS.Term>=0.5.
        Most teams catch this only via downstream metric regressions. Always monitor <code>Var_x[‖&phi;(x)−c‖&sup2;]</code>.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="One center can't enclose multimodal normals">
        Deep SVDD assumes the normal data is approximately unimodal in the learned{" "}
        <VIS.Term def="A vector representation phi(x) produced by a neural encoder. In Deep SVDD this is the space where the hypersphere lives — geometry there is what scores anomalies.">embedding</VIS.Term>. If "normal" includes multiple distinct behaviors (B2B + B2C transactions, day vs night patterns), one hypersphere can't enclose both modes. Either learn a Multi-SVDD or use a different method.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="GADBench-style fair eval: GBDT-AD often wins on tabular">
        Deep SVDD's gains on image AD (CIFAR-10 one-vs-rest) don't always transfer to tabular fraud. On engineered tabular features, a tuned{" "}
        <VIS.Term def="Gradient-Boosted Decision Trees (XGBoost, LightGBM, CatBoost). For tabular AD, GBDT-AD uses leaf-embeddings or k-NN-on-residuals to score anomalies and is the strongest baseline.">GBDT</VIS.Term>-AD
        with k-NN or LOF often matches or beats it (see{" "}
        <VIS.Term def="Tang et al. NeurIPS 2024. A fair-evaluation benchmark for graph + tabular anomaly detection that controls for tuning, splits, and seeds. Common finding: deep AD's reported gains shrink under fair eval.">GADBench</VIS.Term>).
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — concept-specific trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        Every problem hinges on a{" "}
        <VIS.Term def="Deep Support Vector Data Description (Ruff et al. ICML 2018). One-class deep AD: learn an embedding phi(x;W) that shrinks normal data toward a fixed center c; score is squared distance to c.">Deep SVDD</VIS.Term>/
        <VIS.Term def="Deep Semi-supervised Anomaly Detection (Ruff et al. ICLR 2020). Extends Deep SVDD with a small labeled-anomaly set A via an inverse-distance term that repels labeled anomalies from c.">SAD</VIS.Term>-specific
        mechanism: the hypersphere objective, the{" "}
        <VIS.Term def="When the network learns the trivial solution phi(x) = c for ALL inputs: loss equals zero, every anomaly scores zero too. Caused by bias terms, learnable centers, or affine BatchNorm.">collapse</VIS.Term>{" "}
        failure mode and the architectural prevention recipe, the frozen-c initialization, or Deep SAD's inverse-distance term. Strip the name → option no longer wins.
      </p>

      {/* axis: F4 - paper-named failure */}
      <VIS.TrapProblem
        id="svdd-p1"
        difficulty="hard"
        title="P1 — Training loss converges to near-zero. AUC is 0.5. Diagnose."
        scenario={<><em>Discriminating insight: the unique signature of hypersphere collapse is loss=0 + flat anomaly scores + AUC=0.5; this is the Deep-SVDD-specific failure the paper warns about.</em><br/><br/>You train Deep SVDD on payments-normal data. Loss curve looks great — converges to ~1e-6. At eval, anomaly AUC is 0.5. Pick the dominant cause.</>}
        options={[
          {key:"a", text:"Hypersphere collapse: the network found the trivial solution phi(x) equals c for all inputs. Loss is zero, every test point scores zero, AUC collapses to 0.5. Audit the architecture for bias terms, learnable c, or affine BatchNorm — any of these enables collapse.", correct:true},
          {key:"b", text:"Overfitting — model memorized training set; reduce capacity."},
          {key:"c", text:"Class imbalance — too few anomalies in training."},
          {key:"d", text:"Learning rate too high; reduce by 10x."},
        ]}
        trap={<>(b) ignores that Deep SVDD has NO anomalies in training. (c) is a category error — Deep SVDD is one-class. (d) doesn't address the collapse mechanism.</>}
        lens={<>Loss=0 + AUC=0.5 is the canonical collapse signature. The diagnostic is <code>Var_x[‖phi(x)-c‖&sup2;]</code> = 0 across the dataset.</>}
        stretch={<>If you must use BatchNorm, what specific configuration is safe?</>}
      />

      {/* axis: C3 - what's dropped vs baseline (architectural constraints) */}
      <VIS.TrapProblem
        id="svdd-p2"
        difficulty="hard"
        multiSelect
        title="P2 — Which architectural choices enable hypersphere collapse?"
        scenario={<><em>Discriminating insight: each architectural feature that introduces an additive constant (bias, affine BN, learnable c) creates a path to collapse; bounded activations alone do not.</em><br/><br/>Audit a Deep SVDD network. Which features enable hypersphere collapse? Select all that apply.</>}
        options={[
          {key:"a", text:"nn.Linear(d, h, bias=True) — additive constant lets the network drive phi to c via the bias.", correct:true},
          {key:"b", text:"nn.BatchNorm1d(h, affine=True) — learnable affine is a bias-equivalent.", correct:true},
          {key:"c", text:"A learnable center c (optimized jointly with W) — optimizer trivially sets c = E[phi(x)].", correct:true},
          {key:"d", text:"ReLU activation."},
          {key:"e", text:"LayerNorm with affine=True at the final layer.", correct:true},
          {key:"f", text:"Adam optimizer."},
        ]}
        trap={<>(d) is bounded enough not to introduce collapse by itself. (f) is unrelated.</>}
        lens={<>The unifying property is "introduces an unconstrained additive constant." Bias, affine BN/LN, and learnable c all qualify. Bounded activations and optimizer choice don't.</>}
        stretch={<>Could you allow ONE bias term (at the input layer only) without enabling collapse?</>}
      />

      {/* axis: A1 - distinguish from sibling */}
      <VIS.TrapProblem
        id="svdd-p3"
        difficulty="hard"
        title="P3 — Deep SVDD vs Deep SAD: what specifically does Deep SAD add?"
        scenario={<><em>Discriminating insight: Deep SAD adds an INVERSE-distance term on labeled anomalies; the unlabeled term is identical to Deep SVDD's shrink-toward-c.</em><br/><br/>Pick the precise mathematical difference between Deep SVDD and Deep SAD.</>}
        options={[
          {key:"a", text:"Deep SAD switches from L2 to L1 distance."},
          {key:"b", text:"Deep SAD uses an attention-weighted embedding instead of a fixed projection."},
          {key:"c", text:"Deep SAD adds an INVERSE-distance term on the labeled-anomaly set: +eta times sum over A of (‖phi(x_j) − c‖&sup2; + epsilon) to the −1 power. The unlabeled term is unchanged. Labeled anomalies are pushed AWAY from c; unlabeled normals are pulled TOWARD c.", correct:true},
          {key:"d", text:"Deep SAD uses a learnable center c."},
        ]}
        trap={<>(a)(b) fabricate changes. (d) would CAUSE collapse — the opposite of what Deep SAD does.</>}
        lens={<>The inverse-distance term has gradient that BLOWS UP near c, ensuring labeled anomalies are repelled. epsilon ~ 1e-6 prevents numerical instability.</>}
        stretch={<>What happens if you set epsilon = 0 in the Deep SAD loss?</>}
      />

      {/* axis: C1 - architectural choice */}
      <VIS.TrapProblem
        id="svdd-p4"
        difficulty="hard"
        title="P4 — Why is c FROZEN at init and not learned?"
        scenario={<><em>Discriminating insight: if c is learnable, the optimizer trivially sets c = E[phi(x)] and the loss drops to the variance — degenerate to collapse.</em><br/><br/>A teammate says "let's make c learnable, it'll adapt better." Diagnose.</>}
        options={[
          {key:"a", text:"Reasonable — learnable parameters always help."},
          {key:"b", text:"Wrong: if c is learnable, the optimizer minimizes the loss by setting c = E_x[phi(x)] (closed-form), and the remaining loss is the variance of phi(x). To minimize the variance, the network drives phi(x) toward a constant — i.e., collapse. The paper FREEZES c after one initial forward pass for exactly this reason.", correct:true},
          {key:"c", text:"Wrong — learnable c is a regularization technique."},
          {key:"d", text:"Reasonable for the soft-boundary variant only."},
        ]}
        trap={<>(a) is the naive ML intuition. (c) and (d) make up justifications.</>}
        lens={<>The freeze-c rule is one of three architectural rules from the paper, all aimed at blocking collapse paths.</>}
        stretch={<>Could you use a SLOWLY-UPDATED c (EMA over training) without collapse?</>}
      />

      {/* axis: E2 - friday failure */}
      <VIS.TrapProblem
        id="svdd-p5"
        difficulty="hard"
        title="P5 — Working Deep SVDD model, teammate refactors net 'to match PyTorch defaults'. AUC collapses overnight. What changed?"
        scenario={<><em>Discriminating insight: PyTorch's default for nn.Linear is bias=True; for BatchNorm1d is affine=True. The standard refactor introduces both — both enable collapse.</em><br/><br/>Production Deep SVDD has been stable for 6 months. A teammate refactors the network "to use standard PyTorch defaults." Overnight, AUC drops from 0.89 to 0.51 with no training loss change. Pick the most likely cause.</>}
        options={[
          {key:"a", text:"Random seed changed; rerun training."},
          {key:"b", text:"Refactor changed nn.Linear(..., bias=False) to bias=True (PyTorch default) and/or BatchNorm1d(affine=False) to affine=True. Both introduce additive constants the network exploits to collapse phi(x) toward c. Loss is still small (it's the collapsed value), so loss curve looks fine.", correct:true},
          {key:"c", text:"The teammate also switched from SGD to Adam."},
          {key:"d", text:"Inference batch size was 64 in training, 1 at serving — normalization mismatch."},
        ]}
        trap={<>(c) and (d) name real but unrelated phenomena. (a) is the lazy guess.</>}
        lens={<>This is the canonical Deep-SVDD production incident. The defaults that work in standard supervised learning are unsafe for one-class objectives. Pin bias=False and affine=False explicitly in code, and assert on net.parameters() at load time.</>}
        stretch={<>How would you ASSERT collapse-safety at model load time?</>}
      />

      {/* axis: D1 - intuitive but wrong */}
      <VIS.TrapProblem
        id="svdd-p6"
        difficulty="medium"
        title="P6 — 'Hypersphere keeps shrinking; that's a problem we minimize R.' True?"
        scenario={<><em>Discriminating insight: R shrinking is not the failure; the failure is the embedding phi collapsing to a constant. Loss equals zero from BOTH terms going to zero, not from R going to zero alone.</em><br/><br/>A reviewer says: 'Deep SVDD's hypersphere will keep shrinking until R=0 — that's by design since we minimize R&sup2;.' Diagnose.</>}
        options={[
          {key:"a", text:"True — R=0 is the loss minimum."},
          {key:"b", text:"Subtly wrong. R shrinking is not by itself a problem — at R=0 with phi(x) = c for all x, loss is still 0. The PROBLEM is that this collapsed solution has phi(anomaly) = c too, so anomaly score equals 0. The architectural rules prevent the network from being ABLE to map every x to c, regardless of R.", correct:true},
          {key:"c", text:"True — the hard-boundary variant doesn't have R."},
          {key:"d", text:"Wrong — R is regularized via lambda."},
        ]}
        trap={<>(a) and (c) miss the embedding-collapse distinction. (d) names the wrong regularizer.</>}
        lens={<>The collapse risk is in the EMBEDDING, not the radius. The architectural rules constrain phi, not R.</>}
        stretch={<>Could the hard-boundary variant be SAFER than the soft-boundary variant against collapse?</>}
      />

      {/* axis: C5 - data assumption */}
      <VIS.TrapProblem
        id="svdd-p7"
        difficulty="hard"
        title="P7 — Multimodal normal data (B2B + B2C transactions). What breaks?"
        scenario={<><em>Discriminating insight: Deep SVDD's single-center hypersphere can't enclose a multimodal distribution; the optimizer collapses both modes to one center, and what was "B2B normal" looks anomalous, or vice versa.</em><br/><br/>Your "normal" includes B2B (10k transaction values, low frequency) and B2C (50-dollar transactions, high frequency). Deep SVDD with one center c trains. What's the failure mode?</>}
        options={[
          {key:"a", text:"Hypersphere collapse to c."},
          {key:"b", text:"One mode (B2B or B2C) gets pulled to c; the other mode ends up far from c and scores as anomalous despite being normal. AUC under-performs and the false-positive rate is concentrated in the underrepresented mode.", correct:true},
          {key:"c", text:"Numerical instability in the loss."},
          {key:"d", text:"The model trains fine — multimodal normals are handled automatically by the encoder."},
        ]}
        trap={<>(a) names a different failure (architectural). (c) is unrelated. (d) is wishful thinking.</>}
        lens={<>One hypersphere = one mode. Multimodal normals need Multi-SVDD (multiple centers) or a Mixture-SVDD variant. Or pre-stratify by mode and train per-mode.</>}
        stretch={<>Could you DETECT multimodal normals from training-set statistics before training Deep SVDD?</>}
      />

      {/* axis: C2 - loss/objective */}
      <VIS.TrapProblem
        id="svdd-p8"
        difficulty="medium"
        title="P8 — Hard-boundary vs soft-boundary Deep SVDD: when does each win?"
        scenario={<><em>Discriminating insight: soft-boundary allows a fraction nu of training points outside R (robust to label noise in 'normal' set); hard-boundary assumes the training set is clean.</em><br/><br/>Pick the regime where soft-boundary Deep SVDD beats hard.</>}
        options={[
          {key:"a", text:"Always — soft is a generalization of hard."},
          {key:"b", text:"When the 'normal' training set is suspected to be contaminated with a small fraction of anomalies (label noise on the unlabeled side). Soft-boundary's nu parameter allows that fraction outside R; hard-boundary tries to pull contaminants toward c, distorting the embedding.", correct:true},
          {key:"c", text:"When R is small."},
          {key:"d", text:"When the embedding dim is high."},
        ]}
        trap={<>(a) over-claims (soft has its own knob to tune). (c)(d) are unrelated.</>}
        lens={<>The choice is about train-set contamination tolerance. If you trust your normals, hard is simpler.</>}
        stretch={<>What does nu reduce to in the hard-boundary limit?</>}
      />

      {/* axis: B3 */}
      <VIS.TrapProblem
        id="svdd-p9"
        difficulty="hard"
        title="P9 — Pitch Deep SVDD to a stakeholder. What's the concept-specific pitch?"
        scenario={<><em>Discriminating insight: the unique pitch is 'end-to-end learned hypersphere with score calibrated by training' AND the named collapse-prevention engineering. Strip the name and 'one-class deep AD' wins for any sibling.</em><br/><br/>PM asks why Deep SVDD over generic 'one-class deep anomaly detection.' Pick the strongest concept-specific pitch.</>}
        options={[
          {key:"a", text:"It uses deep learning, so it's better than classical methods."},
          {key:"b", text:"End-to-end learned embedding compacts normals around a fixed center c; score ‖phi(x) − c‖&sup2; is calibrated by training, with named collapse-prevention engineering.", correct:true},
          {key:"c", text:"It's faster than autoencoders."},
          {key:"d", text:"It's the only deep AD method."},
        ]}
        trap={<>(a)(c)(d) are generic. Only (b) hinges on the hypersphere objective AND the explicit failure-mode story — all options now ~2 lines so length doesn't leak the key.</>}
        lens={<>The pitch hinges on the unique mechanism (hypersphere with frozen c, score=‖phi(x)−c‖&sup2;) AND the unique risk (hypersphere collapse, prevented via bias-free + bounded-activation + frozen-c architecture — an audit checklist for review).</>}
        stretch={<>What's the strongest stakeholder argument AGAINST Deep SVDD for tabular fraud?</>}
      />

      {/* axis: F2 - adversarial */}
      <VIS.TrapProblem
        id="svdd-p10"
        difficulty="hard"
        title="P10 — Attack a Deep SVDD detector. What strategy?"
        scenario={<><em>Discriminating insight: an attacker who knows c and has gradient access can use gradient descent on the input to minimize ‖phi(x) − c‖&sup2; — the score surface is convex and smooth, so the attack converges fast.</em><br/><br/>An attacker has white-box access to a Deep SVDD model. Pick the attack with the lowest cost per evasive transaction.</>}
        options={[
          {key:"a", text:"Random perturbation until score drops below threshold."},
          {key:"b", text:"Gradient descent on the input x minimizing ‖phi(x) − c‖&sup2; — the anomaly-score surface is convex in the embedding space and smooth in input space, so PGD converges in a handful of steps to an in-distribution-looking adversarial sample.", correct:true},
          {key:"c", text:"Brute force — try every feature combination."},
          {key:"d", text:"Black-box query attack — no gradient needed."},
        ]}
        trap={<>(a)(c) are inefficient. (d) is plausible but slower than the white-box attack we have access to.</>}
        lens={<>The CONVEX-and-smooth anomaly-score surface is a Deep-SVDD-specific vulnerability. Mitigations: randomize the embedding at inference, ensemble multiple models, or add adversarial-aware training (DROCC).</>}
        stretch={<>How does this attack compare to attacking a DROCC detector?</>}
      />

      {/* axis: E3 - implementation */}
      <VIS.TrapProblem
        id="svdd-p11"
        difficulty="hard"
        title="P11 — Initialization order matters. Sequence the steps."
        scenario={<><em>Discriminating insight: c must be computed AFTER random weight init but BEFORE any training step, with the network in eval mode (no dropout/BN running stats).</em><br/><br/>Pick the correct initialization sequence for Deep SVDD training.</>}
        options={[
          {key:"a", text:"(1) Set c = 0. (2) Init weights. (3) Train."},
          {key:"b", text:"(1) Init weights randomly. (2) Forward pass on a batch (or full training set) in eval mode. (3) Set c = mean of those embeddings. (4) Freeze c. (5) Train W only.", correct:true},
          {key:"c", text:"(1) Train W for a warm-up period. (2) Set c = mean of resulting embeddings. (3) Freeze c. (4) Continue training."},
          {key:"d", text:"(1) Init weights. (2) Set c randomly. (3) Train W and c jointly."},
        ]}
        trap={<>(a) sets c=0 — if the network's natural embedding is near 0, collapse path is trivial. (c) lets the warm-up training shape c, which biases the geometry. (d) is the learnable-c trap.</>}
        lens={<>The init order is one of the most-skipped details in re-implementations. Get this wrong and collapse becomes more likely.</>}
        stretch={<>Could you use a SUBSET of training data for the c-computing forward pass?</>}
      />

        id="svdd-p12"
        difficulty="hard"
        title="P12 — Counterfactual: classical SVDD with a kernel. What changes?"
        scenario={<><em>Discriminating insight: classical SVDD is convex (kernel feature space is fixed, optimization is QP); Deep SVDD is non-convex (embedding is learned). Convexity buys global optimality and no collapse risk; learned embedding buys task-specific representation.</em><br/><br/>Pick the cost of switching from Deep SVDD to classical kernel SVDD.</>}
        options={[
          {key:"a", text:"(1) Loss of task-specific embedding — kernel is fixed (typically RBF), so representation power is bounded by the kernel choice. (2) No collapse risk (convex QP). (3) Quadratic memory in n (kernel matrix), bad scaling.", correct:true},
          {key:"b", text:"(1) Faster training. (2) Lower AUC always. (3) No GPU support."},
          {key:"c", text:"(1) Higher AUC always. (2) More hyperparameters. (3) Easier to deploy."},
          {key:"d", text:"No real difference — kernel SVDD and Deep SVDD are equivalent."},
        ]}
        trap={<>(b)(c) make universal claims. (d) is wrong.</>}
        lens={<>The Deep-vs-classical tradeoff is convexity/scaling vs representation power. On structured tabular features (where the kernel can be hand-chosen), classical often wins.</>}

      />

        id="svdd-p16"

        options={[
          {key:"a", text:"Learning rate."},
          {key:"b", text:"Weight on the labeled-anomaly inverse-distance term. Low eta means labels are effectively ignored (Deep SAD reduces to Deep SVDD). High eta makes the inverse-distance term dominate, destabilizing training near c (gradients blow up). Paper recommends eta ~ 1.", correct:true},
          {key:"c", text:"Margin width."},
          {key:"d", text:"Number of posterior samples."},

      {/* axis: F3 - reverse engineer */}
      <VIS.TrapProblem
        id="svdd-p17"
        difficulty="hard"
        title="P17 — Anomaly scores form a bimodal distribution. Which Deep-SVDD-specific cause?"
        scenario={<><em>Discriminating insight: bimodal scores at test time usually mean the normal training data was bimodal — one mode collapsed near c, the other mode sits at a stable distance, and "normal" anomalies from the second mode score high.</em><br/><br/>Test-set anomaly scores split into two clear modes. Pick the cause.</>}
        options={[
          {key:"a", text:"Hypersphere collapse — half the scores went to zero."},
          {key:"b", text:"Multimodal training normals: one mode was pulled to c, the other mode ended up at a stable distance D &gt; 0. Test normals from mode 1 score near 0; test normals from mode 2 score near D&sup2;. Both are 'normal' but the bimodality is a Deep-SVDD-mode-collision symptom.", correct:true},
          {key:"c", text:"Adversarial attacks at inference."},
          {key:"d", text:"Floating-point underflow."},

        trap={<>(a) would give one mode at 0, not two. (c)(d) are unrelated.</>}
        lens={<>Bimodal score distributions are a multimodal-normal signature. Fix: pre-stratify normals or use Multi-SVDD.</>}

        id="svdd-p18"

        title="P18 — Combine Deep SVDD with a pre-trained encoder (transfer learning)."
        scenario={<><em>Discriminating insight: pre-trained encoders (e.g., BERT for text, ResNet for images) USUALLY have bias terms and affine BN — drop-in transfer enables collapse. Must zero-out biases or fine-tune with bias-free heads.</em><br/><br/>You want to use a pre-trained encoder as the base for Deep SVDD. What's the gotcha?</>}
        options={[
          {key:"a", text:"Pre-trained encoders are not deep enough; train from scratch."},
          {key:"b", text:"Pre-trained encoders carry bias terms and affine BatchNorm by default (standard supervised training relies on them). Dropping them in as the Deep SVDD encoder enables collapse. Fix: either zero-out and freeze the bias parameters, OR add a bias-free / affine-free projection head and freeze the backbone.", correct:true},
          {key:"c", text:"Pre-trained encoders are over-fit to ImageNet."},
          {key:"d", text:"No issue — Deep SVDD ignores biases at inference."},

        trap={<>(a) misses the issue. (c) is a different concern. (d) is false — biases ARE used at inference.</>}

        scenario={<><em>Discriminating insight: the bias-free architecture + the autoencoder pretraining (warm-start) + the specific LeNet adaptation are the paper's distinctive details; reproductions that miss any of these typically fail to match the numbers.</em><br/><br/>Pick the most-skipped reproducibility detail.</>}
        options={[
          {key:"a", text:"Optimizer (Adam vs SGD)."},
          {key:"b", text:"The autoencoder-pretraining warm-start: the paper pre-trains an AE on the normal data, then uses the encoder weights as Deep SVDD's initialization. Skipping this often leaves Deep SVDD in a bad local optimum (and risks collapse).", correct:true},
          {key:"c", text:"Random seed."},
          {key:"d", text:"Batch size."},

        trap={<>(a)(c)(d) matter generically but aren't Deep-SVDD-specific.</>}

        id="svdd-p20"

        scenario={<><em>Discriminating insight: drift causes can be (i) normal-data distribution shift (encoder needs re-training), (ii) gradual collapse from an unnoticed config change, (iii) eval-set drift; only (ii) is Deep-SVDD-specific.</em><br/><br/>Pick the diagnostic ordering for week-over-week AUC drift on a Deep SVDD detector.</>}
        options={[
          {key:"a", text:"(1) Check Var_x[‖phi(x)-c‖&sup2;] — is the encoder collapsing gradually? (2) Check if normal-data distribution shifted (KS test on features). (3) Check if eval set composition drifted (population mix).", correct:true},
          {key:"b", text:"(1) Increase model size. (2) Increase training time. (3) Switch to Deep SAD."},
          {key:"c", text:"(1) Retrain weekly. (2) Roll back if regression. (3) Add ensembling."},

        id="svdd-p21"
        difficulty="medium"
        title="P21 — Smallest training-set size where Deep SVDD still works?"

        options={[
          {key:"a", text:"100 — deep nets train fast."},
          {key:"b", text:"~1000-5000 normal samples. Below this, the c estimate from the init forward pass is noisy (high stratum variance) and the encoder under-fits. With 5000+ the embedding stabilizes; with 50k+ collapse risk dominates over data-size risk.", correct:true},
          {key:"c", text:"~1M — Deep SVDD needs ImageNet-scale data."},
          {key:"d", text:"There's no minimum — works at any scale."},

        trap={<>(a)(c)(d) miss the c-estimation vs encoder-fit tradeoff.</>}

        id="svdd-p22"
        difficulty="hard"
        title="P22 — Deep SVDD vs Deep One-Class Classification (Sabokrou et al.). Same thing?"
        scenario={<><em>Discriminating insight: Deep One-Class Classification (DOCC) uses a GAN-generated pseudo-negative; Deep SVDD has no negatives. Common confusion.</em><br/><br/>A reviewer says 'Deep SVDD and Deep One-Class Classification are the same method.' Diagnose.</>}
        options={[
          {key:"a", text:"Same — both are deep one-class methods."},
          {key:"b", text:"Different. Deep SVDD has NO negatives — only normals shrunk toward c. Deep One-Class Classification (Sabokrou et al.) GENERATES pseudo-negatives via a GAN and trains a binary classifier. The training objective and failure modes are different (Deep SVDD: collapse; DOCC: GAN-mode-collapse).", correct:true},
          {key:"c", text:"Same up to architectural choice."},
          {key:"d", text:"Deep SVDD is a special case of DOCC."},

        id="svdd-p24"
        difficulty="hard"

          {key:"b", text:"Was c computed once at init and FROZEN?", correct:true},

          {key:"d", text:"Is your normal distribution unimodal in the learned embedding?", correct:true},

          {key:"f", text:"What's your batch size?"},

      {/* axis: B2 - sounds reasonable, isn't */}
      <VIS.TrapProblem
        id="svdd-p25"
        difficulty="hard"
        title="P25 — 'Add a small constant to phi(x) to prevent collapse at zero.' Reasonable?"
        scenario={<><em>Discriminating insight: adding a constant is exactly the kind of bias-equivalent the paper forbids; it ENABLES collapse rather than prevents it.</em><br/><br/>A teammate suggests: 'Add a small constant offset to phi(x) so it can't collapse to zero. Then collapse at c is impossible.' Diagnose.</>}
        options={[
          {key:"a", text:"Reasonable — moves the embedding away from origin."},
          {key:"b", text:"Wrong. The constant IS a bias term. With it, the network can learn phi(x) = c − offset for all x, then offset gets added → phi(x) + offset = c. Collapse with the same outcome. The paper's rule against biases is specifically because such constants are collapse-enabling.", correct:true},
          {key:"c", text:"Reasonable if the constant is randomized per batch."},
          {key:"d", text:"Reasonable only at inference, not at training."},
        ]}
        trap={<>(a) is the seductive misread. (c)(d) try to salvage with stochasticity but the path-to-c remains.</>}
        lens={<>The collapse-prevention recipe is structural, not amelioration. Any additive constant the optimizer can exploit re-opens the collapse path.</>}
        stretch={<>What's the ONLY safe way to introduce a bias-like offset?</>}
      />

      {/* axis: F4 - paper-named failure (gradient) */}
      <VIS.TrapProblem
        id="svdd-p26"
        difficulty="hard"
        title="P26 — Deep SAD: the inverse-distance gradient explodes near c. Why and how is it handled?"
        scenario={<><em>Discriminating insight: the inverse term 1/(‖phi(x_j) − c‖&sup2; + epsilon) has gradient that grows like 1/d^3 near c; the epsilon floor caps the gradient magnitude.</em><br/><br/>Why does Deep SAD add an epsilon ~ 1e-6 inside the inverse-distance term?</>}
        options={[
          {key:"a", text:"Numerical stability for FP16 training only."},
          {key:"b", text:"Without epsilon, if a labeled anomaly happens to land near c, the inverse distance and its gradient diverge to infinity, blowing up the loss and training. epsilon bounds the smallest distance the term considers, capping the gradient magnitude at finite-but-large.", correct:true},
          {key:"c", text:"To regularize the embedding."},
          {key:"d", text:"To accelerate convergence."},
        ]}
        trap={<>(a) is partial (also matters in FP32). (c)(d) misread the role.</>}
        lens={<>The epsilon is a load-bearing detail. Skipping it leads to NaN losses early in training.</>}
        stretch={<>How would you CHOOSE epsilon based on the data scale?</>}
      />

          <span style={{color:"#64748b", fontSize:14}}>(blog)</span>

          <VIS.Term def="Batch Normalization. Normalizes activations per-minibatch with running mean/variance, then applies an optional learnable affine (gamma, beta). In Deep SVDD, the affine beta is a bias-equivalent that enables collapse.">BN</VIS.Term>)

          </a>{" "}
