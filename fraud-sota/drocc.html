        options={[
          {key:"a", text:"DROCC-LF just adds more PGD steps."},
          {key:"b", text:"DROCC-LF replaces the L2 radius-r shell with a LEARNED LOCAL FLOW (a per-point linear map approximating the normal manifold's local geometry). PGD then operates in the flowed space so shell-points stay near the manifold rather than veering off into irrelevant feature regions. The fix matters strongly on TABULAR (curved/anisotropic normal manifolds), substantially less on IMAGE data where the original L2-shell PGD already produces useful negatives.", correct:true},
          {key:"c", text:"DROCC-LF removes the r &gt; 0 lower bound."},
          {key:"d", text:"DROCC-LF is identical to vanilla DROCC with a different loss weight."},
        ]}
        trap={<>(a) misses the mechanism. (c) would re-introduce the r=0 collapse drocc-p1 covers. (d) is false.</>}
        lens={<>The DROCC-LF paper is the canonical fix for vanilla DROCC's manifold-blindness. If you're applying DROCC to tabular fraud, default to LF; if to image, vanilla suffices because convolutional <VIS.Term def="Neural net that maps raw input (image, text, item) into a dense latent vector consumed by downstream layers.">encoders</VIS.Term> already supply useful local geometry.</>}
        stretch={<>How would you estimate the per-point local flow on tabular data with mixed continuous/categorical features?</>}
      />

      {/* axis: E5 - reproducibility */}
      <VIS.TrapProblem
        id="drocc-p21"
        difficulty="medium"
        title="P21 — Reproducing DROCC on Thyroid (tabular). Which detail must match?"
        scenario={<><em>Discriminating insight: the paper's gains depend on (r, R) tuned PER DATASET; without the search, reproductions miss the numbers.</em><br/><br/>Pick the load-bearing reproducibility detail.</>}
        options={[
          {key:"a", text:"Optimizer."},
          {key:"b", text:"Per-dataset hyperparameter search for (r, R). The paper recommends grid-searching r and R for each dataset; defaults from one dataset don't transfer. With wrong (r, R) DROCC ranges from near-collapse to near-trivial.", correct:true},
          {key:"c", text:"Random seed."},
          {key:"d", text:"Batch size."},
        ]}
        trap={<>(a)(c)(d) matter generically but aren't load-bearing for DROCC numbers.</>}
        lens={<>The (r, R) search is the most-skipped detail. Reproductions that use fixed values typically under-perform on <VIS.Term def="Area Under the ROC Curve. Probability that a random positive scores higher than a random negative. Threshold-free ranking metric.">AUC</VIS.Term>.</>}
        stretch={<>How would you SHORT-CUT the (r, R) search using validation AUC?</>}
      />

      {/* axis: A2 - definitional trap */}
      <VIS.TrapProblem
        id="drocc-p22"
        difficulty="hard"
        title="P22 — DROCC convergence diagnostics: shell-loss oscillation — Lipschitz violation or just high LR?"
        scenario={<><em>Discriminating insight: a HIGH learning rate produces oscillation with PERIOD ~1 step and amplitude that DECAYS when LR is halved. A LIPSCHITZ CONSTRAINT VIOLATION produces oscillation with LONGER period (PGD inner loop and outer loop alternate finding adversaries the classifier can't smoothly reject), amplitude does NOT decay with LR, and the oscillation correlates with spikes in the empirical Lipschitz constant of f. Different remediations.</em><br/><br/>You see the radius-r shell BCE loss oscillate from 0.3 to 0.9 every ~2-3 epochs. LR is 1e-3. Pick the diagnostic and fix.</>}
        options={[
          {key:"a", text:"Always reduce LR — oscillation is always LR."},
          {key:"b", text:"Always increase r — oscillation is always shell-too-small."},
          {key:"c", text:"Diagnose: (1) halve LR — if amplitude drops proportionally, it was LR; (2) if amplitude persists, monitor empirical Lipschitz constant ‖&nabla;_x f‖ on a held-out batch; if it spikes during the oscillation peaks, it's a Lipschitz violation (f became too sharp, PGD found big-jump adversaries the next outer step can't smoothly correct). Lipschitz fix: add spectral-norm regularization on linear layers, OR reduce PGD step size alpha so x_adv stays in a region where f is locally smooth.", correct:true},
          {key:"d", text:"Switch to Adam — oscillation is optimizer."},
        ]}
        trap={<>(a) is the lazy diagnosis. (b) is the wrong direction (large r usually stabilizes, but the question is mechanism). (d) doesn't address either cause.</>}
        lens={<>DROCC's PGD inner-loop interacts with the classifier's smoothness; pathological oscillations need a <VIS.Term def="Bounded-derivative property: f is L-Lipschitz if |f(x)-f(y)| <= L*|x-y|. Smaller Lipschitz constant on the gradient means the loss landscape doesn't curve sharply.">Lipschitz</VIS.Term> lens. Standard LR-decay is necessary but not sufficient; consider <VIS.Term def="Deep-learning name for L2 regularization. Every step, weights are multiplied by (1 - α·η) before the gradient update — they 'decay' toward zero.">weight decay</VIS.Term> to tame the empirical Lipschitz constant.</>}
        stretch={<>How would you compute the empirical Lipschitz constant cheaply per epoch?</>}
      />

      {/* axis: C1 - architectural choice */}
      <VIS.TrapProblem
        id="drocc-p23"
        difficulty="medium"
        title="P23 — DROCC's classifier architecture: any constraints?"
        scenario={<><em>Discriminating insight: DROCC has no hypersphere → no need for the Deep SVDD bias-free / affine-free / frozen-c rules. The architecture is a standard binary classifier; constraints are on (r, R) and PGD, not on the network.</em><br/><br/>Pick the right constraint on DROCC's network architecture.</>}
        options={[
          {key:"a", text:"Same as Deep SVDD — bias=False, affine=False, no learnable c."},
          {key:"b", text:"Standard binary classifier with sigmoid output. No special constraint on biases, affine BatchNorm, etc. — DROCC doesn't have hypersphere collapse risk because there's no center to collapse to. Constraints live on (r, R) and PGD steps, not on the network.", correct:true},
          {key:"c", text:"Must use only convolutional layers."},
          {key:"d", text:"Must use Sigmoid Belief Networks."},
        ]}
        trap={<>(a) carries Deep SVDD's constraints over by mistake. (c)(d) fabricate.</>}
        lens={<>DROCC and Deep SVDD have DIFFERENT failure modes -> DIFFERENT architectural rules. Don't carry rules across — even <VIS.Term def="Batch Normalization. Normalize each feature across the batch dimension; standard for CNNs, awkward for variable-length sequences.">BatchNorm</VIS.Term> affine params, which Deep SVDD forbids, are fair game in DROCC.</>}
        stretch={<>Could you use Transformers as DROCC's classifier? What changes?</>}
      />

      {/* axis: E6 - eval contamination */}
      <VIS.TrapProblem
        id="drocc-p24"
        difficulty="hard"
        title="P24 — Eval DROCC on a benchmark with known anomalies. What's the contamination concern?"
        scenario={<><em>Discriminating insight: DROCC's eval AUC uses REAL test-time anomalies but TRAINS on synthetic; if the synthetic happen to align with the real-anomaly type (e.g., same direction in feature space), eval AUC inflates without generalization to other attack types.</em><br/><br/>Pick the specific DROCC eval-contamination concern.</>}
        options={[
          {key:"a", text:"Eval contamination is the same for all AD methods."},
          {key:"b", text:"DROCC's synthetic adversarial negatives are constructed in the radius shell around normals — but if the BENCHMARK'S anomalies happen to live in roughly the same shell (e.g., near-manifold attacks), DROCC's eval AUC inflates. Other attack types (far-from-manifold, structurally different) won't see the same lift, but the benchmark hides this. Solution: eval on attack types the synthetic recipe doesn't easily generate.", correct:true},
          {key:"c", text:"DROCC can't be evaluated on AUC."},
          {key:"d", text:"All benchmarks for DROCC are images."},
        ]}
        trap={<>(a)(c)(d) miss the specific synthetic-vs-real alignment concern.</>}
        lens={<>The synthetic-real alignment can inflate AUC. Hold out diverse attack types in eval to expose it; report <VIS.Term def="Area Under the Precision-Recall Curve. More informative than AUC for class-imbalanced problems.">AUPRC</VIS.Term> alongside AUC because fraud is heavily imbalanced.</>}
        stretch={<>How would you CONSTRUCT a benchmark that resists this inflation?</>}
      />

      {/* axis: F1 - edge case */}
      <VIS.TrapProblem
        id="drocc-p25"
        difficulty="hard"
        title="P25 — Smallest training-set size for DROCC?"
        scenario={<><em>Discriminating insight: DROCC's PGD inner loop needs gradient signal; with few normals the gradient becomes noisy and adversarial negatives become noise. Below ~5000 normals, Deep SVDD or classical methods are more reliable.</em><br/><br/>Pick the minimum training set size for DROCC on tabular fraud.</>}
        options={[
          {key:"a", text:"~100 — deep nets train fast."},
          {key:"b", text:"~5000+ normal samples. Below this, PGD's gradient signal becomes noisy (small-batch second-order effects), adversarial negatives degenerate, and the locally-Lipschitz guarantee weakens. Deep SVDD or classical OC-SVM is more robust to small data.", correct:true},
          {key:"c", text:"~1M — DROCC needs ImageNet-scale data."},
          {key:"d", text:"No minimum — works at any scale."},
        ]}
        trap={<>(a)(c)(d) miss the gradient-noise floor.</>}
        lens={<>PGD's inner-loop noise dominates at small data scales. DROCC is a large-data method, and a tuned <VIS.Term def="Gradient-Boosted Decision Trees (XGBoost, LightGBM, CatBoost). Sequentially fits trees to the residuals of previous trees; the dominant tabular baseline.">GBDT</VIS.Term> classifier on engineered features is usually the better small-data choice.</>}
        stretch={<>How does DROCC compare to PGD-AT in terms of data-size requirements?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li>
          <a href="https://arxiv.org/abs/2002.12718" target="_blank" rel="noopener">
            <strong>Goyal et al. — DROCC</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, ICML 2020)</span>
          <br/>The canonical paper. Section 3 (objective + shell PGD) and Section 5 (DROCC-LF for tabular).
        </li>
        <li>
          <a href="https://lilianweng.github.io/posts/2018-12-27-anomaly-detection/" target="_blank" rel="noopener">
            <strong>Lilian Weng — Anomaly detection deep dive</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(blog)</span>
          <br/>Practitioner walk-through of deep AD methods including DROCC, Deep SVDD, ICL. Build intuition here before the papers.
        </li>
        <li>
          <a href="https://github.com/microsoft/EdgeML/tree/master/pytorch/edgeml_pytorch/algorithm" target="_blank" rel="noopener">
            <strong>Official DROCC implementation (Microsoft EdgeML)</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(code)</span>
          <br/>Reference PyTorch implementation. Inner-loop detach handling is the load-bearing detail.
        </li>
        <li>
          <a href="https://arxiv.org/abs/1706.06083" target="_blank" rel="noopener">
            <strong>Madry et al. — Towards Deep Learning Models Resistant to Adversarial Attacks</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, ICLR 2018)</span>
          <br/>The canonical PGD-AT reference. Read to understand what DROCC INHERITS (the PGD subroutine) and what it CHANGES (the shell constraint and negative interpretation).
        </li>
        <li>
          <a href="https://arxiv.org/abs/2306.12251" target="_blank" rel="noopener">
            <strong>GADBench — Tang et al.</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, NeurIPS 2024)</span>
          <br/>Fair-eval benchmark that shows DROCC's tabular AD gains shrink vs tuned GBDT-AD. Read before adopting DROCC for production fraud.
        </li>
      </ul>
    </VIS.Section>
  </main>
);
