  // <VIS.Term def="1-2 sentence plain-English explanation">jargon</VIS.Term>
  //
  // Wraps any technical term so a non-technical reader can hover for an
  // immediate definition. The explanation should:
  //   - assume the reader knows English but not software/your domain
  //   - fit in 1-2 short sentences (a tooltip, not a paragraph)
  //   - avoid further jargon (or wrap that too)
  //
  // The element exposes `data-rv-info` so the report-viewer overlay reuses
  // its own tooltip + double-click "explain this" feedback flow. In
  // standalone /visualize mode (no overlay), the lightweight hover handler
  // below renders the tooltip directly.
  function Term({ def, children }) {
    if (!def) return h(React.Fragment, null, children);
    return h("span", {
      className: "vis-term",
      "data-rv-info": def,
      "aria-label": def,
      tabIndex: 0,
    }, children);
  }

  // Standalone hover tooltip for <VIS.Term>. If the report-viewer overlay
  // is loaded it already shows tooltips for any [data-rv-info] element, so
  // we short-circuit here to avoid double-rendering.
  (function installTermTooltip() {
    let tip = null;
    function show(el) {
      if (window.__rvReady) return;  // overlay.js owns the tooltip in report-viewer mode
      const text = el.getAttribute("data-rv-info");
      if (!text) return;
      if (!tip) {
        tip = document.createElement("div");
        tip.className = "vis-term-tip";
        document.body.appendChild(tip);
      }
      tip.textContent = text;
      const r = el.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const pad = 8;
      let left = Math.max(pad,
        Math.min(r.left, window.innerWidth - tr.width - pad));
      const above = r.top - tr.height - pad;
      const below = r.bottom + pad;
      tip.style.left = left + "px";
      tip.style.top  = (above >= pad ? above : below) + "px";
      tip.style.display = "block";
    }
    function hide() { if (tip) tip.style.display = "none"; }
    document.addEventListener("mouseover", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el); else hide();
    });
    document.addEventListener("focusin", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el);
    });
    document.addEventListener("focusout", hide);
    document.addEventListener("scroll", hide, true);
    // Touch / tap support: on a tap, toggle the tip for the tapped term.
    // Tapping anywhere else (including a different term) hides the current.
    let lastTappedTerm = null;
    document.addEventListener("click", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) {
        if (el === lastTappedTerm) { lastTappedTerm = null; hide(); }
        else { lastTappedTerm = el; show(el); }
      } else {
        lastTappedTerm = null; hide();
      }
    });
  })();

  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."
  //   scenario={<>...JSX...</>}
  //   diagram={<VIS.Mermaid chart={...} />}
  //   options={[
  //     {key:"a", text:"...", correct:false},
  //     {key:"b", text:"...", correct:true},
  //     ...
  //   ]}
  //   trap={<>The most tempting wrong is X because...</>}
  //   lens={<>The right answer + reasoning</>}
  //   stretch="optional follow-up question"
  // />
  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Gait / accelerometer biometrics for mobile — SSL transformer on phone IMU.
// SIGNAL MODALITY ANCHOR: gait = 3-axis accelerometer at 50Hz, WALK-CYCLE-PHASE aware,
// DEVICE-ORIENTATION-DEPENDENT, BATTERY-COST gated, iOS-BACKGROUND-RESTRICTED.
// Cross-visual: NOT spatial (vs mouse/swipe), NOT event-driven (vs keystroke).

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Fraud SOTA · Behavioral biometrics · GAIT"
      title="Gait / accelerometer for mobile"
      subtitle="Self-supervised transformer pretrained on phone 3-axis accelerometer windows learns walk-cycle-phase-aware embeddings; a linear probe identifies the user from a 10-second walk."
      byline={[
        {label: "Paper", value: "Gait Authentication via SSL Transformers (UbiComp 2024)"},
        {label: "Signal", value: "3-axis accelerometer at 50Hz (NOT events, NOT spatial)"},
        {label: "L3", value: "Behavioral biometrics · gait"},
      ]}/>

    <VIS.TLDR>
      A walking person's phone records a 3-axis accelerometer stream (a_x, a_y, a_z) at 50Hz that has a periodic{" "}
      <VIS.Term def="The repeating pattern of a single step — heel-strike, mid-stance, toe-off — that recurs at ~1-2 Hz during walking. Each user's walk-cycle has distinctive accelerometer signatures in vertical impact, lateral sway, and cadence variability.">walk-cycle phase</VIS.Term>{" "}
      with user-specific micro-mechanics. SSL pretraining (masked-prediction or contrastive) on millions of unlabeled walk windows yields a global encoder; a linear probe over ~30 enrollment windows hits &gt; 90% top-1 user-ID accuracy from a 10-second walk. The operational realities — battery cost, iOS background restrictions, device-orientation dependence, and activity confounds — are stricter than the model itself. Senior gait designs are duty-cycled, on-demand at high-risk events, walking-only (gated by activity classification), and treat the IMU stream as special-category PII.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is — IMU stream to user score">
      <p>
        Continuous 3-axis accelerometer at 50Hz produces a stream of (a_x, a_y, a_z). A sliding window of 5-10 seconds (250-500 samples) is the unit:
      </p>
      <ol>
        <li><strong>Sample</strong>: 50Hz is the minimum to capture step cadence (1-2Hz) and its harmonics. 25Hz loses fine phase info; 100Hz buys little.</li>
        <li><strong>Pretrain (SSL)</strong>: a 4-6 layer transformer over the window. Masked-prediction (mask 15% of timesteps, predict) is typically more data-efficient than contrastive on this signal.</li>
        <li><strong>Enroll</strong>: freeze the encoder, collect ~30 walking windows for each user, average their embeddings to build the user centroid.</li>
        <li><strong>Score</strong>: at high-risk events (login, large transfer), trigger a 10-second IMU capture; compute embedding; cosine-similarity to centroid is the auth score.</li>
        <li><strong>Activity gate</strong>: classify the window as walking / stairs / vehicle / stationary before scoring. Only walking is scored; everything else defers to other risk signals.</li>
      </ol>
      <VIS.Mermaid chart={`
flowchart TB
  I["3-axis accel at 50Hz, 10s window"]
  I --> A["Activity gate: walking?"]
  A -->|Yes| E["SSL-pretrained encoder"]
  A -->|No| F["Defer to other risk signals"]
  E --> C["Embedding 128-d"]
  C --> CM["Cosine vs enrolled centroid"]
  CM --> S["Auth score"]
  style E fill:#dbeafe,stroke:#2563eb,stroke-width:2px
  style S fill:#fef3c7,stroke:#d97706,stroke-width:2px
      `} />
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How it differs from supervised gait CNN — and from sibling biometrics">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8, fontSize:14}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Aspect</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Supervised gait CNN (pre-2022)</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>SSL gait transformer (this concept)</th>
          </tr>
        </thead>
        <tbody>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Training labels</td>
            <td style={{padding:"8px 10px"}}>Per-user labeled walking sessions</td>
            <td style={{padding:"8px 10px"}}>Unlabeled corpus + small per-user enrollment</td>
          </tr>
          <tr>
            <td style={{padding:"8px 10px"}}>Cold-start cost</td>
            <td style={{padding:"8px 10px"}}>High (label new users)</td>
            <td style={{padding:"8px 10px"}}>Low (centroid from ~30 windows)</td>
          </tr>
          <tr style={{background:"#e8f0fa"}}>
            <td style={{padding:"8px 10px"}}>Generalization</td>
            <td style={{padding:"8px 10px"}}>Limited cross-population</td>
            <td style={{padding:"8px 10px"}}>Strong via shared pretraining</td>
          </tr>
        </tbody>
      </table>
      <p style={{marginTop:12}}>
        <strong>Signal-modality contrast vs siblings:</strong> gait is continuous IMU — language-INDEPENDENT (unlike keystroke), spatially anchored to the device-not-the-screen (unlike mouse/swipe), and explicitly device-orientation-dependent (unlike either). Battery and OS-background restrictions are gait-specific operational gates that simply do not exist for keystroke or mouse.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — 22 trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        Twenty-two interview-grade traps anchored on walk-cycle phase, device orientation, battery and iOS-background constraints, activity gating, and gait-specific spoofing and drift.
      </p>

      {/* AXIS: D1 — orientation invariance */}
      <VIS.TrapProblem
        id="gait-p1"
        difficulty="hard"
        title="P1 — Why does raw 3-axis accelerometer break across phone positions?"
        scenario={<>You train a gait encoder on data with phones in front pocket. Deploy: users carry phones in back pocket, in bag, in hand. User-ID accuracy collapses 92% → 64%.</>}
        options={[
          {key:"a", text:"The 3 axes (a_x, a_y, a_z) are tied to phone orientation. Same walk, phone front-pocket vs back-pocket, produces accelerometer streams that are ROTATIONS of each other — different per-axis distributions even though the underlying walking motion is identical. Fix: (i) rotate to a gravity-aligned reference frame using the gravity vector (a low-pass filtered accelerometer); (ii) augment SSL pretraining with random rotations so the encoder learns rotation-invariant representations. Option (ii) is more robust to imperfect gravity-frame estimation.", correct:true},
          {key:"b", text:"The accelerometer is broken in the back pocket."},
          {key:"c", text:"Users walk differently with phones in different positions."},
          {key:"d", text:"You need a bigger encoder."},
        ]}
        trap={<>(b) is hardware confusion. (c) is a small effect compared to the rotation; the dominant fix is geometric. (d) is capacity-blame.</>}
        lens={<><em>Discriminating insight:</em> the gait modality is fundamentally orientation-coupled to the device; the right response is geometric normalization (gravity frame) or augmentation, not architecture.</>}
        stretch={<>Why might gravity-frame alignment fail when the user is running?</>}
      />

      {/* AXIS: D2 — battery cost (gait-specific) */}
      <VIS.TrapProblem
        id="gait-p2"
        difficulty="hard"
        title="P2 — Continuous 50Hz IMU costs how much battery? What's the duty cycle response?"
        scenario={<>PM wants 24/7 continuous gait monitoring. You measure: continuous 50Hz IMU at full power is ~50-150 mWh/day on a 3000mAh phone — 5-10% of daily battery for "fraud protection."</>}
        options={[
          {key:"a", text:"Users will uninstall apps that drain over 2% battery/day for an invisible feature. Duty cycle: sample 2 seconds every 30 seconds when phone motion is detected (via low-power motion-coprocessor); only enable full 50Hz capture when the motion classifier flags 'walking' AND a high-risk event is imminent. Total battery drops 80-90%. Apple's CMMotionActivityManager and Android's TYPE_SIGNIFICANT_MOTION provide the low-power motion gate.", correct:true},
          {key:"b", text:"Battery is irrelevant — users want security."},
          {key:"c", text:"Use 100Hz sampling for better signal."},
          {key:"d", text:"Sample continuously but discard most data."},
        ]}
        trap={<>(b) is false (research consistently shows uninstall correlates with battery). (c) makes it worse. (d) discards data but does not save battery.</>}
        lens={<><em>Discriminating insight:</em> battery is gait's hard operational gate — duty-cycle + motion-coprocessor + on-demand-on-high-risk is the standard play. None of this applies to keystroke or mouse.</>}
        stretch={<>What is the lowest sampling rate that still captures the walk-cycle phase?</>}
      />

      {/* AXIS: D3 — iOS background cascade (gait-specific) */}
      <VIS.TrapProblem
        id="gait-p3"
        difficulty="hard"
        title="P3 — iOS deployment cascade: app stops collecting after ~10 minutes"
        scenario={<>Android version works. iOS version: data collection stops after the user backgrounds the app for ~10 minutes. PM says "the iOS app is broken."</>}
        options={[
          {key:"a", text:"iOS strictly limits background app execution — Core Motion's high-frequency accelerometer access is suspended ~10 minutes after backgrounding (specific timeout varies by iOS version and app state). Fix: use CMMotionActivityManager (low-power background motion-class classification — always allowed); on detected high-risk event (large transfer about to confirm) trigger a brief 10s foreground sensor capture via a notification or in-app gate. The iOS app is not broken — the architecture is asking iOS to do something the OS does not allow.", correct:true},
          {key:"b", text:"Build a hidden background process — iOS will allow it."},
          {key:"c", text:"Migrate to Android-only."},
          {key:"d", text:"Use VoIP background mode as a workaround."},
        ]}
        trap={<>(b) is false. (c) abandons half the userbase. (d) is App Store rejection territory.</>}
        lens={<><em>Discriminating insight:</em> iOS background restrictions are the gait-specific deployment gate; the right design is event-triggered foreground capture, not continuous background streaming. This is unique to gait — no equivalent for keystroke/mouse.</>}
        stretch={<>Which iOS APIs allow continuous low-power motion telemetry?</>}
      />

      {/* AXIS: D4 — senior cross-examine */}
      <VIS.TrapProblem
        id="gait-p4"
        difficulty="hard"
        multiSelect
        title="P4 — Junior reports '92% top-1 user-ID accuracy.' Senior follow-ups?"
        scenario={<>The team reports 92% top-1 user-ID on gait.</>}
        options={[
          {key:"a", text:"How many enrollment windows per user?", correct:true},
          {key:"b", text:"Same-activity (walking) eval or cross-activity (also stairs, run)?", correct:true},
          {key:"c", text:"Same phone position or randomized across pockets/bag/hand?", correct:true},
          {key:"d", text:"How long the test walk is (window length)?", correct:true},
          {key:"e", text:"How many GPU hours pretraining used?"},
        ]}
        trap={<>(e) is irrelevant to result interpretation.</>}
        lens={<><em>Discriminating insight:</em> enrollment-count + activity-match + phone-position + window-length are the gait-specific eval gates. The metric without these is unreadable.</>}
        stretch={<>Which gate is most often loose in research-paper gait numbers?</>}
      />

      {/* AXIS: D5 — activity confound (gait-specific) */}
      <VIS.TrapProblem
        id="gait-p5"
        difficulty="medium"
        title="P5 — User-ID accuracy is 92% on walking, 41% on stairs. Why? Production response?"
        scenario={<>The encoder was pretrained mostly on walking. At deploy users sometimes walk up stairs.</>}
        options={[
          {key:"a", text:"Stairs have a different cadence (slower, higher vertical impact) and a different walk-cycle phase envelope. The encoder learned 'walking' features; 'stairs' is out-of-distribution. Fix: add an activity classifier (walking / stairs / running / stationary / vehicle) as a gate BEFORE the gait encoder. Only score on windows the classifier flags as 'walking'; for stairs/running, either route to other risk signals or train an activity-conditioned encoder.", correct:true},
          {key:"b", text:"Stairs always reduce gait accuracy."},
          {key:"c", text:"The model is overfit."},
          {key:"d", text:"Add gyroscope."},
        ]}
        trap={<>(b) is fatalist. (c) misreads the OOD-not-overfitting issue. (d) is an architectural change that does not address the activity-gate need.</>}
        lens={<><em>Discriminating insight:</em> activity-class gate is a gait-specific operational pattern; no analog in keystroke or mouse.</>}
        stretch={<>How would you train the activity classifier cheaply?</>}
      />

      {/* AXIS: D6 — spoofing (gait-specific) */}
      <VIS.TrapProblem
        id="gait-p6"
        difficulty="hard"
        title="P6 — Spoofing: attacker straps the victim's phone to themselves and walks. Defense?"
        scenario={<>An attacker steals a victim's phone and straps it to themselves (same pocket, same orientation). Their walk produces an accelerometer stream. The gait encoder sees a similar cadence.</>}
        options={[
          {key:"a", text:"Cadence alone is not the discriminator — walk-cycle MICRO-MECHANICS (vertical impact peak shape, lateral sway frequency, step-length variability) are user-specific even at matched cadence. EER on this attack is typically 5-15% (much higher than legitimate auth at 1-3%). Layered defense: cross-check with heart-rate (if a paired wearable exists), location pattern (the attacker is walking somewhere the victim is not at this time), and step away from gait-only at high-risk events.", correct:true},
          {key:"b", text:"Gait is unbreakable by physical attack."},
          {key:"c", text:"Ignore physical attacks; they are rare."},
          {key:"d", text:"Require fingerprint backup always."},
        ]}
        trap={<>(b) is naive. (c) underestimates. (d) over-corrects (defeats the passive value of gait).</>}
        lens={<><em>Discriminating insight:</em> gait raises the bar but does not stop physical-attack vectors; the senior response is layered authentication, not gait-only.</>}
        stretch={<>What's a heart-rate-based liveness check that respects privacy?</>}
      />

      {/* AXIS: C5 — walk-cycle phase awareness */}
      <VIS.TrapProblem
        id="gait-p7"
        difficulty="hard"
        title="P7 — Why does the best gait encoder include explicit walk-cycle-phase features?"
        scenario={<>Two encoder variants: (i) raw window into transformer; (ii) raw window + per-step features (step length proxy, cadence, vertical impact, step variance). Variant (ii) wins by 4-6 user-ID accuracy points.</>}
        options={[
          {key:"a", text:"Each user has distinctive micro-mechanics within the walk cycle — heel-strike impact shape, lateral sway envelope, push-off acceleration peak. Step segmentation (peak detection on |a|) extracts the per-cycle envelope cleanly; the transformer over the segmented per-step features sees a cleaner signal than a window where step phases are interleaved with timing variability. The lift is the inductive bias of 'walking has steps' baked into preprocessing.", correct:true},
          {key:"b", text:"Step features are smaller, so the model trains faster."},
          {key:"c", text:"The transformer cannot learn periodic structure."},
          {key:"d", text:"Step features are required by the paper's loss function."},
        ]}
        trap={<>(b)(d) are spurious. (c) is false but believable — transformers CAN learn periodicity, but with much more data than the inductive-bias approach.</>}
        lens={<><em>Discriminating insight:</em> the gait signal has a known periodic structure (the step cycle); explicit segmentation is an inductive bias that helps the model find the right invariances. No mouse/keystroke analog.</>}
        stretch={<>Why does step segmentation fail during running?</>}
      />

      {/* AXIS: C2 — SSL objective choice */}
      <VIS.TrapProblem
        id="gait-p8"
        difficulty="medium"
        title="P8 — Masked-prediction vs contrastive SSL for gait?"
        scenario={<>You have 5 million unlabeled walk windows. Pretrain with either masked-prediction (mask 15% of timesteps, predict their values) or contrastive (positive pairs via augmentation, push apart from negatives).</>}
        options={[
          {key:"a", text:"Both work; the gait-specific consideration is augmentation quality. Contrastive needs strong augmentations that are signal-preserving (small time-warp, channel shuffle is risky on gait — flips left/right asymmetry). Masked-prediction works directly on the raw stream with no augmentation choice. With limited augmentation expertise, masked-prediction is more robust; with carefully designed augmentations, contrastive sometimes wins.", correct:true},
          {key:"b", text:"Contrastive always beats masked-prediction."},
          {key:"c", text:"Masked-prediction is impossible for time series."},
          {key:"d", text:"SSL is overkill — use supervised."},
        ]}
        trap={<>(b)(c) overclaim/false. (d) ignores the cold-start advantage of SSL.</>}
        lens={<><em>Discriminating insight:</em> the augmentation-design burden is the practical SSL choice for gait. Channel-shuffle in particular can destroy left/right walking asymmetry.</>}
        stretch={<>Why is channel shuffle dangerous on gait but safe on image SSL?</>}
      />

      {/* AXIS: D7 — device-class (different phones) */}
      <VIS.TrapProblem
        id="gait-p9"
        difficulty="medium"
        title="P9 — User upgrades from iPhone 12 to iPhone 15. EER spikes. Why?"
        scenario={<>EER for a user spikes from 1.2% to 5.8% after they upgrade their phone (iPhone 12 → iPhone 15).</>}
        options={[
          {key:"a", text:"IMU calibration and noise characteristics differ across phone models — same gait produces slightly shifted distributions on different hardware. The user's centroid (estimated on iPhone 12 data) no longer matches their iPhone 15 measurements. Operational response: trigger re-enrollment on detected device change (device-ID stored alongside centroid); collect ~30 fresh walk windows on the new device; update centroid. Do not retrain the encoder — the issue is centroid alignment.", correct:true},
          {key:"b", text:"iPhone 15 has a worse IMU."},
          {key:"c", text:"Retrain the encoder from scratch."},
          {key:"d", text:"Drop gait when device changes."},
        ]}
        trap={<>(b) is false. (c) is overkill. (d) is over-correction.</>}
        lens={<><em>Discriminating insight:</em> cross-device IMU drift is centroid-level, not encoder-level. The fix is re-enrollment, not retraining.</>}
        stretch={<>How would you detect device changes from the IMU stream alone if metadata is missing?</>}
      />

      {/* AXIS: D8 — privacy / health (gait-specific) */}
      <VIS.TrapProblem
        id="gait-p10"
        difficulty="hard"
        multiSelect
        title="P10 — Privacy concerns specific to gait IMU (not generic PII)"
        scenario={<>Which of these are real, gait-specific privacy concerns (not generic ML data concerns)?</>}
        options={[
          {key:"a", text:"Gait can reveal medical conditions: Parkinson's tremor, post-injury limp, multiple sclerosis early signs.", correct:true},
          {key:"b", text:"Gait can reveal pregnancy (gait changes through trimesters).", correct:true},
          {key:"c", text:"Gait can reveal intoxication level.", correct:true},
          {key:"d", text:"GDPR / CCPA classify biometric identifiers as special-category personal data.", correct:true},
          {key:"e", text:"Gait reveals user typing speed."},
        ]}
        trap={<>(e) is keystroke, not gait — cross-modality confusion.</>}
        lens={<><em>Discriminating insight:</em> the IMU stream is a health-data side channel; this is unique to gait among the three behavioral biometrics. DP noise on stored embeddings and explicit consent flow are mandatory.</>}
        stretch={<>What DP-epsilon is appropriate for stored gait centroids?</>}
      />

      {/* AXIS: F6 — health drift (gait-specific) */}
      <VIS.TrapProblem
        id="gait-p11"
        difficulty="medium"
        title="P11 — User's gait shifts permanently after a knee injury. Operational response?"
        scenario={<>EER for a specific user persistently spikes after an event. Investigation: they had knee surgery 4 weeks ago. Gait has shifted.</>}
        options={[
          {key:"a", text:"Adaptive re-enrollment with a confirmation step: detect persistent within-user drift (over multiple sessions, not single-window noise); pause gait scoring; trigger a confirmation flow (other risk signals + user confirmation) to re-enroll the new gait centroid. The system should ALSO be aware that gait drift may indicate a health change — and not surface that to the user without consent.", correct:true},
          {key:"b", text:"Lock the account permanently."},
          {key:"c", text:"Force the user to walk the same way as before."},
          {key:"d", text:"Drop gait globally."},
        ]}
        trap={<>(b)(c)(d) are dystopian or extreme.</>}
        lens={<><em>Discriminating insight:</em> gait drift is a permanent, non-malicious user-change scenario. The system needs an adaptive-re-enrollment loop with a confirmation gate — and ethics-aware silence about why the drift happened.</>}
        stretch={<>How many sessions of drift before triggering re-enrollment?</>}
      />

      {/* AXIS: F2 — sedentary users */}
      <VIS.TrapProblem
        id="gait-p12"
        difficulty="medium"
        title="P12 — Sedentary or desk-bound users: how do you handle them?"
        scenario={<>10% of your users are desk-bound or elderly and rarely walk with their phone. They cannot enroll a gait centroid.</>}
        options={[
          {key:"a", text:"Gait is not the right biometric for every user. Detect 'enrollment infeasible' (no walking windows collected over the onboarding period) and explicitly route these users to a non-gait pipeline. The product should not block these users from using the app; it should silently substitute other behavioral signals (device usage patterns, typing if applicable, location patterns).", correct:true},
          {key:"b", text:"Force them to walk."},
          {key:"c", text:"Use a default centroid."},
          {key:"d", text:"Block them from the app."},
        ]}
        trap={<>(b)(c)(d) are user-hostile or technically broken.</>}
        lens={<><em>Discriminating insight:</em> not every user is a fit for every biometric; the design must route around modality-infeasibility silently.</>}
        stretch={<>How would you measure what fraction of your population is gait-feasible?</>}
      />

      {/* AXIS: F3 — vehicle / running confounds */}
      <VIS.TrapProblem
        id="gait-p13"
        difficulty="hard"
        title="P13 — User scores low while in a moving car. Diagnose."
        scenario={<>User-ID score is low for one specific 30-minute window. Investigation: the user was in a car.</>}
        options={[
          {key:"a", text:"Vehicle vibration looks like noise in the gait band (low-frequency, no clean step cycle). If the activity gate failed to classify 'vehicle' (because the road surface produced enough vibration to mimic step cadence in some classifiers), the encoder processed the window as walking. Fix: tighten the activity classifier (add a 'vehicle' class with diverse training data), require a step-count threshold from a peak detector before scoring, AND check correlation with GPS speed as a sanity gate.", correct:true},
          {key:"b", text:"The user's gait changes in a car."},
          {key:"c", text:"The IMU is broken in cars."},
          {key:"d", text:"Ignore — cars are rare."},
        ]}
        trap={<>(b) is conceptually confused — the user is not walking. (c) is hardware confusion. (d) is incorrect prevalence.</>}
        lens={<><em>Discriminating insight:</em> the activity-class gate must explicitly model vehicle; missing this class is the most common gait deployment bug.</>}
        stretch={<>Would step-count thresholding alone suffice without an activity classifier?</>}
      />

      {/* AXIS: E2 — onboarding UX */}
      <VIS.TrapProblem
        id="gait-p14"
        difficulty="medium"
        title="P14 — Passive vs active enrollment for gait"
        scenario={<>PM wants active enrollment: "Walk for 60 seconds during signup so we can register your gait." Engineering proposes passive: collect 30 walking windows during normal app usage in the first week.</>}
        options={[
          {key:"a", text:"Passive over the first 1-2 weeks wins for gait: covers natural phone-position variation (pocket / bag / hand) and activity variation, requires no UX friction, and respects the iOS-background reality (we collect when the user happens to walk while interacting with the app). Active is a one-shot snapshot of one phone position and unrealistic for the production distribution. The downside: cannot use gait for the first week — fall back to other signals during onboarding.", correct:true},
          {key:"b", text:"Active — done in one signup."},
          {key:"c", text:"Either — they are equivalent."},
          {key:"d", text:"Skip enrollment; use a global centroid."},
        ]}
        trap={<>(b) ignores phone-position variability. (c) misses the production-distribution argument. (d) is broken biometrics.</>}
        lens={<><em>Discriminating insight:</em> gait enrollment quality is determined by phone-position diversity and activity match; passive captures these naturally.</>}
        stretch={<>How would you signal "enough enrollment" passively?</>}
      />

      {/* AXIS: D2 — cascade */}
      <VIS.TrapProblem
        id="gait-p15"
        difficulty="hard"
        title="P15 — Diagnose this cascade"
        scenario={<>Team: "We trained gait SSL on a public 1000-user dataset, got 95% accuracy on the same benchmark, deployed at our 50k-user app, and accuracy is 71%. The data is bad."</>}
        options={[
          {key:"a", text:"Multiple compounding issues. (1) Phone-position distribution: public datasets often have controlled positions; production has the full pocket/bag/hand chaos. (2) Device distribution: 1000 users may all use 5 phone models; 50k users have 100+. (3) Activity distribution: research benchmarks often have walking-only sessions; production includes stairs, vehicles, running. (4) Enrollment realism: research often has 60+ minutes per user; production has ~30 windows. The fix is to retrain (or fine-tune) the encoder on YOUR distribution with realistic position/device/activity coverage, AND tighten the activity gate and orientation normalization.", correct:true},
          {key:"b", text:"The model is overfit; retrain with more regularization."},
          {key:"c", text:"Public datasets are useless."},
          {key:"d", text:"Use a bigger transformer."},
        ]}
        trap={<>(b)(c)(d) miss the production-distribution-mismatch root cause.</>}
        lens={<><em>Discriminating insight:</em> research-benchmark gait numbers ≠ production gait numbers because the research distribution is narrow; the senior move is distribution-aware fine-tuning + operational gates.</>}
        stretch={<>Which of the four distribution gaps is hardest to close in practice?</>}
      />

      {/* AXIS: C6 — sampling rate */}
      <VIS.TrapProblem
        id="gait-p16"
        difficulty="medium"
        title="P16 — Should you sample at 25, 50, or 100Hz?"
        scenario={<>The activity gate has flagged a walking window. You can sample at 25Hz, 50Hz, or 100Hz. The walk cadence is ~1.5Hz.</>}
        options={[
          {key:"a", text:"50Hz is the sweet spot. By Nyquist, sampling at 2x the highest frequency of interest is the minimum; walk-cycle phase has meaningful structure up to ~10-15Hz (vertical-impact transient harmonics), so 50Hz covers all of it with margin. 25Hz loses harmonics; 100Hz costs 2x battery for marginal signal gain. Most gait research uses 50Hz precisely for this reason.", correct:true},
          {key:"b", text:"100Hz always — more is better."},
          {key:"c", text:"25Hz — saves battery."},
          {key:"d", text:"Sampling rate does not matter."},
        ]}
        trap={<>(b) overpays. (c) loses signal. (d) is false.</>}
        lens={<><em>Discriminating insight:</em> Nyquist + battery constraint together set the rate; 50Hz is the standard answer with reasoning.</>}
        stretch={<>What frequency content is uniquely lost between 25Hz and 50Hz sampling?</>}
      />

      {/* AXIS: E4 — monitor */}
      <VIS.TrapProblem
        id="gait-p17"
        difficulty="medium"
        title="P17 — Population EER spikes after a new app version. Cause investigation?"
        scenario={<>You shipped a new app build. Population-wide gait EER moved from 2.1% to 4.5%. Where to look?</>}
        options={[
          {key:"a", text:"Most likely the IMU sampling pipeline changed (iOS Core Motion API version, Android sensor API). Compare per-second sample counts and accelerometer ranges to a reference window pre-release. A change in low-level sample rate, in mg-units calibration, or in Core Motion mode (raw vs filtered) shifts the input distribution for the encoder. Check release notes and roll back if confirmed; recalibrate encoder if not.", correct:true},
          {key:"b", text:"Random fluctuation."},
          {key:"c", text:"Users got worse at walking."},
          {key:"d", text:"GPU clock changed."},
        ]}
        trap={<>(b) ignores magnitude. (c) is silly. (d) is irrelevant.</>}
        lens={<><em>Discriminating insight:</em> population-wide gait drift after an app build = sensor-pipeline change. Distribution checks on raw input are the right place to look first.</>}
        stretch={<>What's a cheap continuous monitor on input distribution?</>}
      />

      {/* AXIS: E1 — fallback */}
      <VIS.TrapProblem
        id="gait-p18"
        difficulty="medium"
        multiSelect
        title="P18 — When should gait NOT be the deciding signal?"
        scenario={<>Pick the regimes where gait should defer to other risk signals rather than gate the action.</>}
        options={[
          {key:"a", text:"Stationary or vehicle activity classification.", correct:true},
          {key:"b", text:"Less than 10 seconds of walking captured.", correct:true},
          {key:"c", text:"First week after enrollment when centroid is unstable.", correct:true},
          {key:"d", text:"Recent device upgrade or detected phone-position change.", correct:true},
          {key:"e", text:"Whenever the user is over 65 years old."},
        ]}
        trap={<>(e) is age-discrimination, not a signal-quality issue.</>}
        lens={<><em>Discriminating insight:</em> the senior design gates gait by signal-quality conditions, not by demographic features.</>}
        stretch={<>What is the right fallback when gait is unavailable for a high-stakes action?</>}
      />

      {/* AXIS: D5 — combined defenses */}
      <VIS.TrapProblem
        id="gait-p19"
        difficulty="hard"
        title="P19 — Layered defense: gait + heart-rate + location"
        scenario={<>Senior architect: "Don't ship gait alone — make it one layer in a fusion. How?"</>}
        options={[
          {key:"a", text:"Treat each signal as a probability and combine via a learned fusion (logistic regression or small MLP) over (gait score, heart-rate-anomaly score, location-anomaly score, device-fingerprint score). Train the fusion on confirmed-fraud cases. Each signal alone has weaknesses (gait fails on stationary; HR misses non-wearable users; location fails on travelers); the fusion compensates. Operate the fusion's threshold against the cost-asymmetric FAR/FRR target.", correct:true},
          {key:"b", text:"Average the scores naively."},
          {key:"c", text:"Use only the highest-confidence signal."},
          {key:"d", text:"Use only gait."},
        ]}
        trap={<>(b) is unweighted and ignores correlation. (c)(d) discard signal.</>}
        lens={<><em>Discriminating insight:</em> the senior fusion is learned and cost-asymmetric, not heuristic averaging.</>}
        stretch={<>How would you handle correlation between gait and HR (e.g., both correlated with activity)?</>}
      />

      {/* AXIS: F5 — SSL data-hunger */}
      <VIS.TrapProblem
        id="gait-p20"
        difficulty="medium"
        title="P20 — SSL gains diminish with under-1k-user corpora. Why?"
        scenario={<>The UbiComp 2024 paper notes that SSL gains over supervised baselines diminish when the unlabeled corpus has fewer than ~1k unique users. Why?</>}
        options={[
          {key:"a", text:"SSL learns a representation by being exposed to within-class invariances; with too few users, the model cannot learn what is 'user-invariant' (walk-cycle structure shared across users) vs 'user-specific' (per-user micro-mechanics). At small corpus, the encoder either overfits to the few users seen at pretraining (effectively supervised on them) or fails to find a useful subspace. SSL's value emerges when the corpus has enough population diversity to disambiguate the two.", correct:true},
          {key:"b", text:"SSL always needs more data than supervised."},
          {key:"c", text:"Below 1k users, the encoder cannot fit."},
          {key:"d", text:"SSL needs labeled data."},
        ]}
        trap={<>(b) is misleading shorthand. (c)(d) are wrong.</>}
        lens={<><em>Discriminating insight:</em> SSL's data-hunger is for population diversity, not just window count — the right diversity unlocks the invariance learning.</>}
        stretch={<>What is the minimum user count for SSL gait to pay off on YOUR data?</>}
      />

      {/* AXIS: B3 — pitch */}
      <VIS.TrapProblem
        id="gait-p21"
        difficulty="hard"
        title="P21 — Pitch gait to a mobile banking PM"
        scenario={<>PM: "Why would I fund continuous gait biometrics over just stepping up fingerprint at high-risk moments?"</>}
        options={[
          {key:"a", text:"Gait gives passive, walking-window verification with no user friction at the moment of action — fingerprint requires the user to actively authenticate, which is friction at every high-risk event. We trigger a 10-second IMU capture on high-risk events (large transfer, login from new IP); SSL-pretrained encoder produces a cosine match to the enrolled centroid; pass-or-fail goes into a fusion with device-fingerprint and IP risk. Operating constraints: 2% battery/day budget (duty-cycled, motion-coprocessor-gated, on-demand at high-risk), iOS uses CMMotionActivityManager for low-power background motion classification with a foreground capture only at the triggered event. Excludes desk-bound users (10% of population) — they get a non-gait pipeline. Treats IMU as special-category PII with DP on stored centroids.", correct:true},
          {key:"b", text:"It is SSL. It is SOTA."},
          {key:"c", text:"It is free."},
          {key:"d", text:"It is unbreakable."},
        ]}
        trap={<>(b)(c)(d) are empty or false (spoofing exists; battery is not free).</>}
        lens={<><em>Discriminating insight:</em> the pitch names the friction advantage, the trigger architecture, the battery/iOS realities, the user-exclusion case, and the privacy stance.</>}
        stretch={<>How does the pitch change if the bank has high-end customers who travel internationally?</>}
      />

      {/* AXIS: hero end-to-end */}
      <VIS.TrapProblem
        id="gait-p22"
        difficulty="hard"
        title="P22 — End-to-end pick: mobile banking app, 24/7 ATO protection"
        scenario={<>You ship gait auth to a mobile banking app. PM wants 24/7 continuous protection. Design the production system.</>}
        options={[
          {key:"a", text:"On-demand at high-risk events, not 24/7 continuous. (1) Always-on low-power motion classification via CMMotionActivityManager / TYPE_SIGNIFICANT_MOTION (battery cost is negligible). (2) At a triggered high-risk event (large transfer, password change, login from new IP) AND if classified as 'walking', sample 10 seconds of 50Hz IMU in foreground. (3) Gravity-frame normalize, activity-gate to walking only, run through SSL encoder, cosine-similarity to user centroid. (4) Fuse with device-fingerprint, IP risk, and (where available) heart-rate-anomaly. (5) Operate at low FAR (~0.1%) with FRR fallback to step-up fingerprint. (6) Adaptive centroid re-enrollment on persistent drift (new phone, injury, etc.). (7) Document the IMU-as-PII consent flow and store centroids with DP noise. (8) Route the 10% desk-bound users to a non-gait pipeline.", correct:true},
          {key:"b", text:"Continuous 50Hz IMU 24/7."},
          {key:"c", text:"Active enrollment at signup, gait-only auth thereafter."},
          {key:"d", text:"Skip gait; use only fingerprint."},
        ]}
        trap={<>(b) drains battery. (c) ignores phone-position diversity. (d) leaves friction on every action.</>}
        lens={<><em>Discriminating insight:</em> a senior gait design is event-triggered, walking-gated, battery-aware, fairness-routed, and consent-explicit.</>}
        stretch={<>What is your kill-switch criterion if false-positives concentrate in a specific user segment?</>}
      />
    </VIS.Section>
