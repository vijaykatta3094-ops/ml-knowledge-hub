<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// LayerNorm — row 23 (rewritten 2026-05-19: G22 hover-gloss + 25 trap drills, batch-independent feature-axis norm; the transformer default)

const App = () => (
  <main style={{maxWidth:880,margin:"2em auto",padding:"0 16px",fontSize:16,lineHeight:1.65}}>
    <VIS.Hero pill="ML Fund" title="Layer Normalization"
      subtitle={<>The 2016 trick that lets <VIS.Term def="Sequence-to-sequence architecture built from stacked self-attention + feed-forward blocks. The dominant family for NLP and increasingly for vision and audio.">transformers</VIS.Term> train at batch size 1 by normalizing across the feature dimension within each sample — batch-independent and length-independent.</>}
      byline={[{label:"L2",value:"Normalization"},{label:"L3",value:"LayerNorm"},{label:"Origin",value:"Ba, Kiros, Hinton 2016"}]}/>

    <VIS.TLDR>
      For every sample (every <VIS.Term def="One position in a transformer's input sequence; carries one feature vector of size H (e.g. 768 for BERT-base). LayerNorm normalizes that vector in place.">token</VIS.Term> in a transformer), <VIS.Term def="Layer Normalization. Normalize each sample's feature vector to zero mean / unit variance, then apply a learned per-feature affine. The default in transformers.">LayerNorm</VIS.Term> normalizes across the <strong>feature</strong> dimension: subtract the per-sample mean, divide by the per-sample std, then apply a learnable{" "}
      <VIS.Term def="Per-feature affine transform applied after normalization: y = γ·x_hat + β. γ scales, β shifts. Lets the network undo the normalization if it hurts.">affine transform</VIS.Term> (γ scale, β shift). Statistics depend only on that sample, never on what else is in the batch — so it works at{" "}
      <VIS.Term def="The N dimension of the input tensor. LayerNorm does NOT reduce over this axis, so batch size 1 and variable-length batches are fine.">batch size 1</VIS.Term>, with{" "}
      <VIS.Term def="Sequences of different lengths in one mini-batch (typical in NLP). BatchNorm's per-position averaging biases toward longer sequences; LayerNorm sidesteps this entirely.">variable-length sequences</VIS.Term>, and during{" "}
      <VIS.Term def="Serving the model one request at a time. BN's running-stat dependence makes it brittle here; LN has no such dependence.">online inference</VIS.Term>. Variants:{" "}
      <VIS.Term def="Root-Mean-Square Norm (Zhang & Sennrich 2019). Drops the mean-centering step from LayerNorm — divides by RMS only and applies γ. ~10-15% faster; used in LLaMA, Mistral, Gemma.">RMSNorm</VIS.Term> drops the mean step for ~10-15% speed; placement choice is{" "}
      <VIS.Term def="Apply LayerNorm INSIDE the residual branch before attention/FFN: x + Attn(LN(x)). Trains stably without LR warmup. Used in GPT-2+, LLaMA, modern transformers.">Pre-LN</VIS.Term> vs{" "}
      <VIS.Term def="Apply LayerNorm AFTER the residual sum: LN(x + Attn(x)). Original 2017 Transformer. Requires LR warmup to train stably at depth.">Post-LN</VIS.Term>. Tradeoffs: zero batch-time coupling means no implicit regularization from batch noise, and a small per-token reduction cost on every layer.
    </VIS.TLDR>

    <VIS.Section id="sec-math" title="Beat 1 — The transform">
      <VIS.Equation display tex="\mu = \frac{1}{H}\sum_{i=1}^{H} x_i,\quad \sigma^2 = \frac{1}{H}\sum_{i=1}^{H}(x_i - \mu)^2"/>
      <VIS.Equation display tex="y_i = \gamma_i \cdot \frac{x_i - \mu}{\sqrt{\sigma^2 + \epsilon}} + \beta_i"/>
      <p>
        H is the <VIS.Term def="The size of the per-token feature vector inside a transformer block (e.g. 768 for BERT-base, 4096 for LLaMA-7B). LayerNorm reduces over this axis.">hidden dimension</VIS.Term> (e.g. 768 for BERT-base, 4096 for LLaMA-7B). (μ, σ²) are computed{" "}
        <strong>per sample</strong> across that one sample's H features — note that <VIS.Term def="Spread of a sample's H feature values around their mean (squared). LayerNorm divides by √(variance + ε) per token.">variance</VIS.Term> here is a within-token quantity, not a within-batch quantity. The per-feature pair (γ<sub>i</sub>, β<sub>i</sub>) is learned — the network can re-introduce any per-feature scale/shift the normalization stripped. The{" "}
        <VIS.Term def="A small constant (≈1e-5) added inside √(σ² + ε). Prevents divide-by-zero when the feature vector is nearly constant, and bounds the gradient w.r.t. variance.">ε</VIS.Term>{" "}
        prevents divide-by-zero when the feature vector is nearly constant — common at{" "}
        <VIS.Term def="The state of model parameters before any training has occurred. Modern transformer initializers (e.g. scaled-normal, GPT-NeoX init) interact with LayerNorm's gain γ — typical γ-init is 1, β-init is 0.">initialization</VIS.Term> on certain tokens. The transform is summarized as: standardize across H, then per-feature{" "}
        <VIS.Term def="Linear rescaling and shift y = γ·x + β with learnable per-feature γ and β. The second half of LayerNorm's transform.">scale-and-shift</VIS.Term>.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-axis" title="Beat 2 — Which axis gets normalized">
      <p>
        The defining choice in any norm is <em>which dimension you average over</em>. LayerNorm averages over the FEATURE dimension within one sample, so two samples in the same batch never influence each other's normalization.{" "}
        <VIS.Term def="Batch Normalization (Ioffe & Szegedy 2015). Normalize each feature across the batch dimension; standard for CNNs, awkward for variable-length sequences.">BatchNorm</VIS.Term> averages over the batch dimension per channel — the opposite axis choice.{" "}
        <VIS.Term def="Group Normalization (Wu & He 2018). Splits channels into G groups and normalizes within each group per sample. Batch-size independent; popular in detection/segmentation.">GroupNorm</VIS.Term> averages over channel groups per sample, an intermediate position.{" "}
        <VIS.Term def="Per-sample, per-channel normalization with no group structure. Originally for style transfer (Ulyanov et al. 2016); widely used in generative models.">InstanceNorm</VIS.Term> averages over spatial dims per (sample, channel). For a transformer activation of shape (N, T, H) where T is sequence length and H is the hidden dim, LayerNorm reduces over H — the rightmost axis only.
      </p>
      <VIS.Mermaid chart={`
flowchart LR
  X["Input tensor (N, T, H)<br/>N=batch, T=seq, H=hidden"]
  X --> BN["BatchNorm: avg over N (per channel, per position)<br/>(stats depend on batch composition)"]
  X --> LN["LayerNorm: avg over H per (sample, position)<br/>(stats depend only on this one token)"]
  X --> GN["GroupNorm: avg over groups of H per sample<br/>(batch-size independent, between BN and LN)"]
  style BN fill:#dbeafe,stroke:#2563eb
  style LN fill:#dcfce7,stroke:#16a34a
  style GN fill:#fef9c3,stroke:#d97706
      `}/>
    </VIS.Section>

    <VIS.Section id="sec-vs" title="Beat 3 — Why transformers picked LayerNorm">
      <p>
        Two properties of the transformer workload make LayerNorm fit and BatchNorm fail. First, per-device batches are often small (1-8) and sequence lengths vary across batches — so any norm that depends on{" "}
        <VIS.Term def="The number of independent samples processed together each step. BN's statistics get noisy when this is small; LN doesn't care.">batch size</VIS.Term> or position-count gets noisy statistics. Second, the semantic unit a transformer cares about is the per-token feature vector, not the per-channel pool over many tokens — LayerNorm normalizes exactly that unit.
      </p>
      <VIS.Callout kind="info" title="Pre-LN vs Post-LN — the modern choice">
        Original Transformer (Vaswani et al. 2017) used <VIS.Term def="Apply LayerNorm AFTER the residual sum: LN(x + Attn(x)). Original 2017 Transformer. Requires LR warmup to train stably at depth.">Post-LN</VIS.Term>: <code>LN(x + Attn(x))</code>. Modern stacks (GPT-2+, LLaMA, PaLM) use{" "}
        <VIS.Term def="Apply LayerNorm INSIDE the residual branch before attention/FFN: x + Attn(LN(x)). Trains stably without LR warmup. Used in GPT-2+, LLaMA, modern transformers.">Pre-LN</VIS.Term>: <code>x + Attn(LN(x))</code>. Pre-LN keeps the{" "}
        <VIS.Term def="Identity path that adds the block's input to its output: y = x + f(x). LayerNorm's placement (inside vs outside this path) is the Pre-LN vs Post-LN distinction.">residual stream</VIS.Term> un-normalized, which makes gradients flow cleanly through arbitrarily deep stacks — no{" "}
        <VIS.Term def="Linearly ramping the learning rate from near 0 over the first ~10k steps. Required to stabilize Post-LN transformers at depth; Pre-LN typically doesn't need it.">LR warmup</VIS.Term> required.
      </VIS.Callout>
      <VIS.Callout kind="info" title="RMSNorm — LayerNorm minus the mean term">
        <VIS.Term def="Root-Mean-Square Norm (Zhang & Sennrich 2019). Drops the mean-centering step from LayerNorm — divides by RMS only and applies γ. ~10-15% faster; used in LLaMA, Mistral, Gemma.">RMSNorm</VIS.Term> skips mean-centering and bias: <code>y = γ · x / RMS(x)</code> where <code>RMS(x) = √(mean(x²) + ε)</code>. Drops one reduction and one bias, gains ~10-15% throughput, and empirically matches LayerNorm quality. Used in LLaMA-1/2/3, Mistral, Gemma, T5's variant; standard in 2024+ open-weight LLMs.
      </VIS.Callout>
      <VIS.Callout kind="gotcha" title="LayerNorm has no train/eval mode distinction">
        Unlike BatchNorm, LayerNorm computes its statistics on the current input in both <code>model.train()</code> and <code>model.eval()</code> — there are no{" "}
        <VIS.Term def="The running_mean / running_var buffers that BatchNorm maintains as EMAs during training and uses at eval. LayerNorm has NO equivalent — it always uses input statistics.">running statistics</VIS.Term> to maintain, no{" "}
        <VIS.Term def="Exponential Moving Average. BN uses one to track per-channel batch statistics across training and freezes it at eval. LayerNorm has no EMA — nothing to track.">EMA</VIS.Term> updates, and no{" "}
        <VIS.Term def="BN variant that pools per-channel statistics across GPUs (all-reduce). Compensates for small per-device batch. LayerNorm needs no equivalent — its statistics are per-sample.">SyncBN</VIS.Term>-style cross-device synchronization. This eliminates the famous "forgot model.eval()" class of BN bugs that plagues{" "}
        <VIS.Term def="Open-source deep-learning framework. Its nn.LayerNorm has no track_running_stats flag and no mode toggle — by design.">PyTorch</VIS.Term> CNN deployments.
      </VIS.Callout>
      <VIS.Callout kind="gotcha" title="Don't mix BN and LN casually">
        BatchNorm's training/eval-mode mismatch and LayerNorm's no-mode-distinction differ. Mixing them in one architecture creates subtle bugs around <code>model.train()</code> / <code>model.eval()</code> toggles and around{" "}
        <VIS.Term def="Continue training a model (or just its head) on a smaller, task-specific dataset starting from pretrained weights. BN's running stats drift; LN is unaffected.">fine-tuning</VIS.Term> recipes.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Test yourself — concept drill">
      <p style={{color:"#475569", marginBottom: 16}}>
        Twenty-five trap problems. They probe four axes: (1) which dimension LayerNorm reduces over (vs{" "}
        <VIS.Term def="Batch Normalization (Ioffe & Szegedy 2015). Normalize each feature across the batch dimension; standard for CNNs, awkward for variable-length sequences.">BatchNorm</VIS.Term> /{" "}
        <VIS.Term def="Group Normalization (Wu & He 2018). Splits channels into G groups and normalizes within each group per sample. Batch-size independent; popular in detection/segmentation.">GroupNorm</VIS.Term> /{" "}
        <VIS.Term def="Per-sample, per-channel normalization with no group structure. Originally for style transfer; widely used in generative models.">InstanceNorm</VIS.Term>), (2) batch-size and length independence as a system property, (3) placement choices (Pre-LN vs Post-LN, where γ/β sit), and (4) operational quirks ({" "}
        <VIS.Term def="Mixed precision: storing parameters/activations in FP16 or BF16 while keeping some statistics in FP32. LayerNorm's reductions can lose precision in pure FP16.">mixed precision</VIS.Term>, {" "}
        <VIS.Term def="Splitting a training step across multiple GPUs/nodes — e.g. PyTorch DDP, FSDP. LayerNorm needs no cross-device sync; BN's SyncBN does.">distributed training</VIS.Term>, fine-tuning, and the BN-conv-style fusion question). Each wrong option is a position a strong-but-not-expert practitioner could defend.
      </p>

      <VIS.TrapProblem
        id="ln-q1"
        difficulty="medium"
        title="P1 — Which dimension does LayerNorm average over in a transformer?"
        scenario={<><em>Discriminating insight:</em> the tensor axis that LayerNorm reduces over. A transformer activation has shape (N, T, H) where N is batch, T is sequence length, H is the hidden dim. For one nn.LayerNorm(H) call:</>}
        options={[
          {key:"a", text:"For each feature index h, compute mean/std over the batch dim N and the sequence dim T (so one (μ, σ) per feature)."},
          {key:"b", text:"For each (sample, position) pair, compute mean/std over the H features of that one token (so one (μ, σ) per token).", correct:true},
          {key:"c", text:"For each sample n, compute mean/std over all positions T and features H jointly (so one (μ, σ) per sample)."},
          {key:"d", text:"For each position t, compute mean/std across the batch N and features H combined (so one (μ, σ) per position)."},
        ]}
        trap={<>(a) is BatchNorm's reduction — exactly the axis LayerNorm avoids. (c) is sometimes called "Layer Norm" in pre-2018 papers but PyTorch's nn.LayerNorm normalizes only over the explicitly-passed normalized_shape, usually just H. (d) is a confused per-position reduction that nothing standard uses.</>}
        lens={<>LayerNorm(normalized_shape=H) reduces over the last dim per (sample, position), producing N·T means and N·T variances. Statistics depend on this one token's H values — never on what else is in the batch. That property is the whole reason transformers use it.</>}
        stretch={<>What if you pass normalized_shape=(T, H) instead — what does LayerNorm reduce over then?</>}
      />

      <VIS.TrapProblem
        id="ln-q2"
        difficulty="medium"
        title="P2 — What does LayerNorm do at eval time?"
        scenario={<><em>Discriminating insight:</em> there is no train-vs-eval distinction for LayerNorm. A junior engineer asks: "When I call model.eval() on my transformer, what changes inside the LayerNorm layers?"</>}
        options={[
          {key:"a", text:"LayerNorm switches from per-token statistics to frozen running statistics accumulated during training (analogous to BatchNorm's buffers)."},
          {key:"b", text:"LayerNorm's (γ, β) are frozen at eval (requires_grad becomes False) but the normalization itself still uses input statistics."},
          {key:"c", text:"Nothing changes: LayerNorm uses the current input's statistics in both train and eval — there are no running buffers and no mode-dependent code path.", correct:true},
          {key:"d", text:"LayerNorm disables itself at eval and passes activations through unchanged so inference is deterministic across batch sizes."},
        ]}
        trap={<>(a) projects BN's mechanism onto LN — a common confusion when teaching norms together. (b) confuses requires_grad with the train/eval flag (model.eval() doesn't toggle requires_grad). (d) invents an eval-time bypass that would defeat the layer's purpose.</>}
        lens={<>LayerNorm has no running_mean / running_var buffers. Its forward is the same callable in both modes: compute (μ, σ) over normalized_shape on the current input, apply (γ, β). model.eval() affects dropout and BN; LN is untouched. This is one reason LayerNorm is "safer" than BN in production.</>}
        stretch={<>Why does that make the "forgot model.eval()" production bug impossible for a pure-LayerNorm model?</>}
      />

      <VIS.TrapProblem
        id="ln-q3"
        difficulty="medium"
        title="P3 — Batch size 1 inference: does LayerNorm work?"
        scenario={<><em>Discriminating insight:</em> LN's statistics do not depend on N. A team serves a GPT-style LM at batch size 1 (one request at a time). They worry that whichever norm is in the model will collapse at N=1.</>}
        options={[
          {key:"a", text:"Both BatchNorm and LayerNorm break at batch size 1 because variance over a single sample is undefined."},
          {key:"b", text:"LayerNorm works fine — its (μ, σ) are reduced over H within each token, so a single sample contains H values and the variance is well-defined. BatchNorm is the one that breaks at N=1.", correct:true},
          {key:"c", text:"LayerNorm requires at least N=2 to compute cross-sample running statistics; serving at N=1 forces a fallback to InstanceNorm semantics."},
          {key:"d", text:"Neither breaks at N=1 because both use frozen running statistics at eval time."},
        ]}
        trap={<>(a) conflates the two norms. (c) invents a running-statistics requirement LN doesn't have. (d) gets BN's eval mechanism roughly right but extends it to LN, which has no buffers.</>}
        lens={<>LayerNorm at N=1 reduces over H (typically 256-8192 values) per token — variance is well-conditioned. This is the central reason transformers, which often run at small N in production, adopted LN over BN.</>}
        stretch={<>What if your hidden dim is H=2 — does LayerNorm still behave well?</>}
      />

      <VIS.TrapProblem
        id="ln-q4"
        difficulty="medium"
        title="P4 — LayerNorm vs BatchNorm: the actual axis distinction"
        scenario={<><em>Discriminating insight:</em> the reduction axis is what separates them — not placement, not parameters, not the downstream task. A senior asks a candidate: "What's the one-sentence difference between BatchNorm and LayerNorm?"</>}
        options={[
          {key:"a", text:"They differ only in placement: BN before activation, LN after — otherwise the math and reduction axis are identical."},
          {key:"b", text:"BN is for regression heads, LN is for classification heads; the choice is task-driven."},
          {key:"c", text:"BN has γ, β; LN has no affine parameters and only standardizes."},
          {key:"d", text:"BN reduces over the BATCH dim per channel (statistics mix samples); LN reduces over the FEATURE dim within one sample (statistics are batch-independent).", correct:true},
        ]}
        trap={<>(a) is the placement myth. (b) invents a task-driven distinction; LN dominates transformers because of length/batch independence, not the head type. (c) is factually wrong: LN has γ, β per feature.</>}
        lens={<>The axis is the whole story. Once you know which dim is reduced, every downstream property follows: batch-size independence, length independence, no train/eval split, no running buffers, no SyncBN equivalent needed.</>}
        stretch={<>Name one situation where BN's batch-coupling is a feature, not a bug.</>}
      />

      <VIS.TrapProblem
        id="ln-q5"
        difficulty="hard"
        title="P5 — Can you fold LayerNorm into a preceding Linear at inference?"
        scenario={<><em>Discriminating insight:</em> whether LN's per-sample stats permit a BN-style algebraic fusion. A team deploying a transformer asks: "BN folds into the preceding conv — can we fold LN into the preceding Linear the same way?"</>}
        options={[
          {key:"a", text:"Yes — at eval LN is a fixed affine and fuses bit-equivalently into the preceding Linear's weights and bias, just like BN-conv fusion."},
          {key:"b", text:"No — LN's (μ, σ) are recomputed per-input at eval, so the transform is input-dependent and there is no fixed affine to absorb.", correct:true},
          {key:"c", text:"Yes, but only if (γ, β) are zero-initialized; otherwise the learned affine breaks the algebraic fusion."},
          {key:"d", text:"No — LN's reduction axis is the feature dim, which doesn't commute with Linear's matrix multiply, so even with frozen stats fusion is impossible."},
        ]}
        trap={<>(a) generalizes BN's trick to LN without checking the prerequisite. (c) invents a γ, β condition. (d) is the wrong-reason answer: the real blocker is statistics-are-input-dependent, not axis commutativity.</>}
        lens={<>BN-conv fusion works because at eval BN's (μ, σ) are FROZEN buffers — the eval-time transform is a fixed per-channel affine. LayerNorm has no equivalent: (μ, σ) are functions of the current input every forward pass. The (γ, β) part is a fixed per-feature affine and could be folded, but the standardization step blocks any complete fusion.</>}
        stretch={<>What partial fusion IS available — e.g., merging the γ scale into the next layer's weights?</>}
      />

      <VIS.TrapProblem
        id="ln-q6"
        difficulty="hard"
        title="P6 — Pre-LN vs Post-LN at 24+ layers"
        scenario={<><em>Discriminating insight:</em> why deep stacks chose Pre-LN. A team builds a 48-layer transformer and finds that Post-LN diverges in the first 2k steps unless they add a 10k-step LR warmup; Pre-LN trains stably from step 0 with no warmup.</>}
        options={[
          {key:"a", text:"Post-LN puts the normalization on the residual stream; gradients to early layers must pass through every LayerNorm, which amplifies and de-stabilizes them at depth. Pre-LN keeps an un-normalized residual, so gradients flow cleanly.", correct:true},
          {key:"b", text:"Pre-LN computes statistics over a different axis than Post-LN — Pre-LN reduces over (T, H) jointly, which is more stable than Post-LN's H-only reduction."},
          {key:"c", text:"Pre-LN automatically scales the residual by 1/√depth, which is the actual cause of stability; the LN position is incidental."},
          {key:"d", text:"Post-LN is fundamentally broken in PyTorch but works in JAX; the warmup masks the framework bug rather than fixing the math."},
        ]}
        trap={<>(b) invents an axis difference (both use the same reduction). (c) misattributes the stability to a depth-scaling factor that LN doesn't apply. (d) is a fabricated framework jab.</>}
        lens={<>Pre-LN: y = x + Attn(LN(x)). The residual path x carries unnormalized signal end-to-end, so ∂loss/∂x at layer 1 has a clean identity contribution from every later layer. Post-LN: y = LN(x + Attn(x)) — every gradient backprops through an LN, which rescales it. At depth ≥ 12 this rescaling compounds, and you need a warmup so the model's early activations don't blow up before the LN parameters adapt. See Xiong et al. 2020 "On Layer Normalization in the Transformer Architecture."</>}
        stretch={<>Why does T5 use a third variant ("Pre-LN with no bias and no mean centering" = RMSNorm) instead of either Pre-LN or Post-LN?</>}
      />

      <VIS.TrapProblem
        id="ln-q7"
        difficulty="medium"
        title="P7 — Train accuracy 95%, eval accuracy 94% on a pure-LN transformer"
        scenario={<><em>Discriminating insight:</em> a pure-LN architecture has no train/eval discrepancy from the normalization. A team running BERT-base sees train and eval accuracy within 1% throughout training. They wonder if they need to call model.eval() before evaluation.</>}
        options={[
          {key:"a", text:"Yes — model.eval() is required for LayerNorm to switch to frozen running statistics; without it the eval numbers are inflated by training-mode stats."},
          {key:"b", text:"Yes — but only because dropout is still active in train mode; LayerNorm itself is unaffected by the flag.", correct:true},
          {key:"c", text:"No — LayerNorm has no train/eval distinction and dropout doesn't matter for accuracy if the model has converged."},
          {key:"d", text:"Yes — LayerNorm without model.eval() introduces silent gradient updates that bias evaluation toward training data."},
        ]}
        trap={<>(a) projects BN onto LN. (c) is right about LayerNorm but wrong about dropout — dropout DOES matter at eval. (d) invents gradient updates from the forward pass.</>}
        lens={<>model.eval() is still required, but for dropout (and any BN you have lying around), not LayerNorm. LayerNorm is mode-agnostic. The clean train/eval parity of a pure-LN transformer is one of the reasons it's easier to deploy than a BN-heavy CNN.</>}
        stretch={<>Name two other modules whose behavior changes under model.eval().</>}
      />

      <VIS.TrapProblem
        id="ln-q8"
        difficulty="medium"
        title="P8 — Why does LayerNorm typically not need a warmup with Pre-LN?"
        scenario={<><em>Discriminating insight:</em> gradient magnitude through the residual path. A reviewer asks why GPT-2 (Pre-LN) trains stably at LR 3e-4 from step 0 while the original Transformer (Post-LN) needed a 4000-step linear warmup at the same LR.</>}
        options={[
          {key:"a", text:"Pre-LN models clip gradients automatically inside the LayerNorm forward pass — no external warmup needed."},
          {key:"b", text:"Pre-LN's residual stream is un-normalized end-to-end, so gradients to early layers have a clean identity path and don't accumulate the LN's rescaling factor across depth.", correct:true},
          {key:"c", text:"Pre-LN uses a smaller learning rate by convention, so no warmup is needed; same LR with Post-LN would also be fine."},
          {key:"d", text:"Pre-LN uses RMSNorm under the hood, which is more numerically stable and removes the need for warmup."},
        ]}
        trap={<>(a) is a fabricated mechanism. (c) is an empirical claim that's just false. (d) conflates Pre-LN with RMSNorm — they're orthogonal choices.</>}
        lens={<>Pre-LN's gradient w.r.t. an early-layer activation is dominated by the identity term in the residual sum. With Post-LN every gradient is multiplied by a Jacobian of LN, which at init can have a small operator norm; over 24+ layers that product becomes a tiny number, vanishing or exploding depending on initialization. Warmup buys time for the LN's γ, β to drift to a regime where the Jacobian is well-conditioned.</>}
        stretch={<>What single architectural change converts a Post-LN model into Pre-LN, and what extra LN must you add at the very end of the stack?</>}
      />

      <VIS.TrapProblem
        id="ln-q9"
        difficulty="hard"
        title="P9 — Stacking dropout after LayerNorm: any issue?"
        scenario={<><em>Discriminating insight:</em> LN doesn't have running statistics that dropout can corrupt. A team adds dropout p=0.1 after every LayerNorm in a transformer block to combat overfitting. Training is stable and eval accuracy is healthy.</>}
        options={[
          {key:"a", text:"This is the standard transformer pattern (used since the 2017 paper). LN-then-dropout works because LN has no running statistics for dropout's variance-injection to bias.", correct:true},
          {key:"b", text:"This is identical to the BN-then-dropout problem (Li et al. 2019): LN's per-batch statistics get biased by dropout's training-only mask."},
          {key:"c", text:"This is invalid — dropout must come BEFORE the LN, because LN normalizes the dropped activations and re-introduces variance the dropout removed."},
          {key:"d", text:"This works only with p ≤ 0.05; for p > 0.05 the dropout dominates LN's normalization and the model fails to train."},
        ]}
        trap={<>(b) is the false analogy to BN's dropout disharmony — LN has no running stats so the analogy doesn't transfer. (c) inverts the standard order. (d) invents an arbitrary threshold.</>}
        lens={<>The "Disharmony between Dropout and Batch Normalization" (Li et al. 2019) is specific to BN's running statistics: dropout perturbs the train-time activation variance, biasing the EMA that's frozen for eval. LayerNorm has no EMA to corrupt — it always computes statistics on the live input — so LN-then-dropout is the standard transformer recipe with no special considerations.</>}
        stretch={<>Where exactly is dropout placed in the canonical transformer block, relative to LN, attention, and the FFN?</>}
      />

      <VIS.TrapProblem
        id="ln-q10"
        difficulty="medium"
        title="P10 — Variable-length sequences: how does LayerNorm handle them?"
        scenario={<><em>Discriminating insight:</em> per-token reduction means length doesn't enter the statistics. A team has inputs ranging from 8 to 512 tokens. They use LayerNorm(H) at every block.</>}
        options={[
          {key:"a", text:"LayerNorm averages over (T, H) jointly, so longer sequences contribute more samples to (μ, σ) and dominate the statistics — same length-bias as BN."},
          {key:"b", text:"LayerNorm requires padding the batch to a fixed sequence length T before the forward pass; otherwise PyTorch raises a runtime error."},
          {key:"c", text:"LayerNorm reduces over H per (sample, position), so two tokens — even in different sequences of different lengths — get independent statistics. Length doesn't enter at all.", correct:true},
          {key:"d", text:"LayerNorm masks out padding automatically using the attention mask, so padded positions don't affect statistics."},
        ]}
        trap={<>(a) is BN's length-bias misapplied to LN. (b) confuses a tensor-shape requirement (batches must be rectangular, hence padding) with a per-token reduction requirement (LN doesn't pool across positions). (d) invents an automatic mask-passing API.</>}
        lens={<>Padding tokens still get LayerNormed (PyTorch doesn't know they're pad), but their normalized outputs are masked out by the attention mask downstream — so they don't influence other tokens. Length-bias in the statistics is impossible because each (sample, position) gets its own (μ, σ).</>}
        stretch={<>Why does this same property fail under BatchNorm even if you mask out padding?</>}
      />

      <VIS.TrapProblem
        id="ln-q11"
        difficulty="hard"
        title="P11 — Fine-tuning a pretrained transformer with batch size 2: LN behavior?"
        scenario={<><em>Discriminating insight:</em> LN has no running stats to corrupt, unlike BN. A team fine-tunes BERT-base on a 600-document medical task with batch size 2 (memory constrained on a single 16 GB GPU). Compared to the same situation with a BN-heavy CNN backbone, what's different?</>}
        options={[
          {key:"a", text:"LN has no running statistics that small-batch fine-tuning could degrade — every forward pass uses fresh per-token (μ, σ). The classic small-batch BN failure mode simply doesn't exist for LN.", correct:true},
          {key:"b", text:"LN aggregates running statistics like BN does, so the same small-batch noise applies and you must call .eval() on each LN submodule."},
          {key:"c", text:"LN fails completely at batch size 2 because its variance estimate has only 2 samples — InstanceNorm would be safer."},
          {key:"d", text:"LN's (γ, β) become numerically unstable at small batch because gradient estimates are noisy; freezing them with requires_grad=False is the standard recipe."},
        ]}
        trap={<>(b) projects BN onto LN. (c) confuses LN's reduction axis (over H, batch-independent) with one over N. (d) is a non-sequitur: γ, β gradients are well-defined regardless of batch size.</>}
        lens={<>BN small-batch fine-tuning failure: running stats drift to the new dataset's noisy batch-of-2 estimates. LN doesn't have running stats, so this whole class of failures vanishes — one of the main practical reasons transformer fine-tuning is so much smoother than CNN fine-tuning at small batch.</>}
        stretch={<>Name one OTHER reason transformer fine-tuning is more forgiving than CNN fine-tuning at low batch size.</>}
      />

      <VIS.TrapProblem
        id="ln-q12"
        difficulty="medium"
        title="P12 — What does ε in the LayerNorm denominator do?"
        scenario={<><em>Discriminating insight:</em> ε's role beyond "avoiding NaN." The denominator √(σ² + ε) has ε = 1e−5 by default in PyTorch's nn.LayerNorm.</>}
        options={[
          {key:"a", text:"ε is a numerical-stability term that prevents divide-by-zero when σ² ≈ 0 and also bounds the gradient w.r.t. variance from blowing up when variance is tiny.", correct:true},
          {key:"b", text:"ε is the LayerNorm momentum — increasing it makes the per-token statistics adapt more slowly across tokens."},
          {key:"c", text:"ε is an L2 regularization coefficient on (γ, β), applied implicitly through the normalization."},
          {key:"d", text:"ε is a confidence-interval width used to clip outlier features before computing the mean and variance."},
        ]}
        trap={<>(b) invents a momentum (LN has no running stats, so no momentum). (c) invents a regularization role. (d) fabricates an activation-clipping step.</>}
        lens={<>ε protects two things: division (avoiding 1/0 when a token's feature vector is constant), and the gradient ∂loss/∂σ², which scales like 1/(σ² + ε)^(3/2). Standard value 1e−5; for FP16 mixed precision you may need to raise to 1e−5 in FP32 or use 1e−6 — the floor needs to be representable in your dtype.</>}
        stretch={<>Why is ε's choice less critical in LN than in BN for small-batch settings?</>}
      />

      <VIS.TrapProblem
        id="ln-q13"
        difficulty="hard"
        title="P13 — Test-time batch size: does it change a transformer's predictions?"
        scenario={<><em>Discriminating insight:</em> LN's per-token reduction means batch composition can't influence any one token's output. A team benchmarks an LLM at eval batch sizes 1, 8, 64. For the same prompt placed in different batches, do the next-token logits change?</>}
        options={[
          {key:"a", text:"Yes — LN computes statistics across the batch dim, so different batch sizes produce different normalization."},
          {key:"b", text:"Yes — even though LN itself is per-token, the model's overall floating-point reduction order changes with batch size and the logits drift by a few ULPs."},
          {key:"c", text:"No — LN's statistics are per-(sample, token); batch composition cannot influence the transform for any specific token. Predictions are identical up to floating-point reductions.", correct:true},
          {key:"d", text:"No — but only if SyncBN-equivalent LN synchronization is enabled; vanilla LN produces different outputs at different batch sizes."},
        ]}
        trap={<>(a) projects BN's batch-coupling onto LN. (b) is partially right about floating-point ULP-level drift (caused by reduction-order effects in CUDA kernels), but the question is about LN's batch-dependence, which is zero. (d) invents a SyncLN that doesn't exist (and isn't needed).</>}
        lens={<>LN at any batch size N: each token's (μ, σ) is computed over its own H features. No cross-batch coupling. The only batch-size effect is at the kernel level (cuBLAS reduction order may differ between batched and unbatched paths), and that's a few ULPs — irrelevant for top-k logits.</>}
        stretch={<>Sketch a 2-line PyTorch test that verifies this invariance for an LLM forward.</>}
      />

      <VIS.TrapProblem
        id="ln-q14"
        difficulty="medium"
        title="P14 — RMSNorm: what does it drop and why does it still work?"
        scenario={<><em>Discriminating insight:</em> RMSNorm skips the mean-centering step but keeps the rescaling and γ. A team migrating from LayerNorm to RMSNorm in a 7B model asks "is this safe?"</>}
        options={[
          {key:"a", text:"RMSNorm skips both mean-centering and γ — it's just division by RMS — and that's why it's 30% faster but slightly lossy."},
          {key:"b", text:"RMSNorm drops the per-feature β bias, replacing β with a constant zero; γ and mean-centering are unchanged."},
          {key:"c", text:"RMSNorm drops the mean-centering step (no μ subtraction) and the β bias; it keeps division by RMS(x) and the learnable γ. ~10-15% faster; empirically matches LN quality in LLaMA / Mistral / Gemma.", correct:true},
          {key:"d", text:"RMSNorm reduces over the batch dim like BN but skips the running statistics; it works in transformers only at large batch."},
        ]}
        trap={<>(a) is half-right (mean-centering dropped, β dropped) but drops γ too — γ is essential and is kept. (b) gets the kept-vs-dropped pair reversed. (d) confuses the reduction axis.</>}
        lens={<>RMSNorm: y = γ · x / √(mean(x²) + ε). Compared to LN, it skips the μ subtraction (one reduction less) and the β bias (one parameter less per feature). Zhang & Sennrich 2019 hypothesized that the rescaling — not the recentering — is what stabilizes training; the empirical track record in modern LLMs confirms it.</>}
        stretch={<>If RMSNorm doesn't subtract the mean, why don't activations drift to a large constant during training?</>}
      />

      <VIS.TrapProblem
        id="ln-q15"
        difficulty="hard"
        title="P15 — Cross-sample information leakage: BN vs LN"
        scenario={<><em>Discriminating insight:</em> LN's forward pass is per-sample at every layer. A team training under differential privacy wants per-sample gradients to be well-defined. They ask which norm is compatible.</>}
        options={[
          {key:"a", text:"LayerNorm is compatible because its forward (and therefore backward) is per-sample — no cross-sample coupling at any layer. BatchNorm couples samples through (μ_B, σ_B), making per-sample gradients ill-defined.", correct:true},
          {key:"b", text:"Both are compatible; per-sample gradient is just ∂loss/∂x_i for a single sample i and neither norm changes that."},
          {key:"c", text:"Neither is compatible; both have implicit cross-sample dependencies through γ and β being shared parameters."},
          {key:"d", text:"BatchNorm is compatible because at eval it uses frozen running stats; LayerNorm is incompatible because its statistics are computed live."},
        ]}
        trap={<>(b) misses that BN's forward couples samples through the batch reduction. (c) confuses shared parameters (fine for DP) with shared random variables (the actual problem). (d) inverts the answer.</>}
        lens={<>BN at training: ∂loss/∂x_j contains terms that flow through (μ_B, σ_B), which depend on every sample in the batch — so the per-sample gradient is actually a per-batch object. LN at training: ∂loss/∂x_j depends only on x_j's own H features. This is why DP-SGD frameworks default to LN or GroupNorm and explicitly warn against BN.</>}
        stretch={<>Why is GroupNorm an acceptable DP-SGD substitute even though it has cross-channel coupling?</>}
      />

      <VIS.TrapProblem
        id="ln-q16"
        difficulty="medium"
        title="P16 — Bias term in the preceding Linear when followed by LayerNorm"
        scenario={<><em>Discriminating insight:</em> LN subtracts the per-sample mean across H. A code review asks: "nn.Linear before nn.LayerNorm — should the Linear have a bias?"</>}
        options={[
          {key:"a", text:"Yes, always — Linear's bias provides extra expressiveness regardless of what follows."},
          {key:"b", text:"No — LN subtracts the per-sample mean across H, but a constant bias added by Linear shifts ALL H features by the same amount per sample, so it's absorbed by the mean subtraction. bias=False is a common micro-optimization.", correct:true},
          {key:"c", text:"No — but only when the Linear's bias is initialized to zero; once it's learned, the redundancy disappears."},
          {key:"d", text:"Yes — Linear's bias is needed to initialize LN's β correctly during the first few warmup steps."},
        ]}
        trap={<>(b) is correct but subtle — the cancellation only works if the Linear bias is a SCALAR per feature (which it is); a "bias" varying across H wouldn't cancel. Wait, that's not the issue — the Linear bias IS a vector of length H. So it shifts each feature by a per-feature constant, and only the MEAN of those shifts is absorbed. Re-reading: the argument is that the per-sample mean over the H features includes the bias's contribution. So if all H features get bias b_h, the mean of the post-Linear vector is mean(W·x) + mean(b). Subtracting the mean removes mean(b) but NOT the per-feature components (b_h − mean(b)). So bias=False saves a TINY amount but is not algebraically equivalent. Hmm, the "common micro-optimization" framing is correct in practice (most transformers do bias=False before LN). (a) over-states; the saving is real. (c) invents an initialization condition. (d) is a fabricated dependency.</>}
        lens={<>Subtle: Linear's bias is a length-H vector (b_1, ..., b_H). After LN subtracts the per-sample mean of (W·x + b), the constant part of b — specifically its mean across H — is removed, but the per-feature deviations (b_h − mean(b)) survive into the post-LN output (re-scaled by γ). So Linear bias before LN is NOT fully redundant — only its overall offset is. Most transformer implementations still set bias=False before LN for the convention, but the equivalence is incomplete.</>}
        stretch={<>How does this contrast with the Conv-then-BN case where the bias really IS fully absorbed?</>}
      />

      <VIS.TrapProblem
        id="ln-q17"
        difficulty="hard"
        title="P17 — elementwise_affine=False at training: what happens?"
        scenario={<><em>Discriminating insight:</em> the LN layer becomes parameter-free. A team sets nn.LayerNorm(H, elementwise_affine=False) for an experimental run.</>}
        options={[
          {key:"a", text:"LN reverts to BatchNorm semantics — it normalizes across the batch dim because there are no per-feature parameters to make per-feature normalization meaningful."},
          {key:"b", text:"LN becomes an identity layer; without γ, β the forward pass collapses to a no-op."},
          {key:"c", text:"LN still normalizes (subtract per-sample mean, divide by per-sample std), but skips the γ-β affine — the output is unit-variance and zero-mean per token, with no learnable scale.", correct:true},
          {key:"d", text:"PyTorch raises a RuntimeError because LN requires elementwise_affine=True for backprop to be well-defined."},
        ]}
        trap={<>(a) invents a fallback. (b) misunderstands what γ, β do (they don't replace the normalization). (d) is a fabricated guard.</>}
        lens={<>elementwise_affine=False removes γ and β; the layer still does the standardization. Output is strictly zero-mean and unit-variance per token. This is useful for ablations (how much does the affine actually buy you?) and for some style-transfer architectures. Most production transformers leave the affine on.</>}
        stretch={<>What about bias=False alone — what does that turn off in PyTorch ≥ 1.10?</>}
      />

      <VIS.TrapProblem
        id="ln-q18"
        difficulty="medium"
        title="P18 — normalized_shape: what does the argument mean?"
        scenario={<><em>Discriminating insight:</em> normalized_shape tells LN which trailing dimensions to reduce over. A reviewer asks: "What does nn.LayerNorm([H]) vs nn.LayerNorm([T, H]) actually do?"</>}
        options={[
          {key:"a", text:"LayerNorm([H]) reduces over only the last dim (the feature dim) per token. LayerNorm([T, H]) reduces over the last TWO dims jointly — over all tokens of a sequence at once.", correct:true},
          {key:"b", text:"Both forms reduce over the last dim; the second form is just a hint to the optimizer that T is the sequence dim."},
          {key:"c", text:"LayerNorm([T, H]) raises an error because LN requires a 1D normalized_shape."},
          {key:"d", text:"LayerNorm([H]) reduces over the batch dim N (because H is the feature dim); LayerNorm([T, H]) reduces over (N, T) jointly."},
        ]}
        trap={<>(b) loses the "joint reduction" semantics. (c) is false: PyTorch accepts multi-dim normalized_shape. (d) inverts the meaning of normalized_shape — it's the dims TO reduce over, not the dims to keep.</>}
        lens={<>normalized_shape is the trailing-dim shape over which LN reduces. For input (N, T, H): LayerNorm([H]) gives N·T independent statistics; LayerNorm([T, H]) gives N independent statistics (one per sample, over all T·H values). The first is what transformers use; the second is rare and acts more like InstanceNorm.</>}
        stretch={<>For ViT (vision transformer) image patches, what normalized_shape is canonical and why?</>}
      />

      <VIS.TrapProblem
        id="ln-q19"
        difficulty="hard"
        title="P19 — Gradient flow through LN's μ and σ"
        scenario={<><em>Discriminating insight:</em> backprop flows through μ and σ as functions of the input, not just through γ and β. A reviewer claims: "LN's gradients only flow through γ and β; μ and σ are constants from the gradient's perspective."</>}
        options={[
          {key:"a", text:"Correct — μ and σ are computed by reduction (mean / variance), which autograd treats as constants."},
          {key:"b", text:"Correct — but only for elementwise_affine=False; with γ, β present the statistics participate in backprop."},
          {key:"c", text:"Wrong — μ and σ are differentiable functions of the input's H features, so backprop computes ∂loss/∂x_i through both terms. This makes the LN backward formula non-trivial.", correct:true},
          {key:"d", text:"Wrong — but only at training; at eval μ and σ are frozen running buffers, so backprop short-circuits them."},
        ]}
        trap={<>(a), (b) both project an "autograd detaches reductions" myth. (d) projects BN's eval semantics onto LN (LN has no eval-time freezing).</>}
        lens={<>The full LN backward includes ∂loss/∂x_i flowing through μ(x_1,...,x_H) and σ(x_1,...,x_H). Specifically: ∂L/∂x_i = (γ_i/√(σ²+ε)) · [∂L/∂y_i − (1/H)·Σ_j ∂L/∂y_j − x_hat_i · (1/H)·Σ_j ∂L/∂y_j · x_hat_j]. Three terms: direct, mean correction, variance correction. The cross-feature coupling within a token is what makes LN's gradient slightly more expensive than a pure pointwise operation.</>}
        stretch={<>How does removing mean-centering (RMSNorm) simplify the backward formula?</>}
      />

      <VIS.TrapProblem
        id="ln-q20"
        difficulty="medium"
        title="P20 — InstanceNorm vs LayerNorm: when do they coincide?"
        scenario={<><em>Discriminating insight:</em> for a 1D input (N, H), LN and InstanceNorm reduce over the same axis. A team wonders if they're "the same thing for transformers."</>}
        options={[
          {key:"a", text:"They're always identical for any input shape, since both reduce per-sample."},
          {key:"b", text:"For (N, H) inputs they reduce over the same axis (H per sample), so the forward is identical. For (N, C, H, W) inputs they differ: LN reduces over (C, H, W), InstanceNorm reduces over (H, W) per channel.", correct:true},
          {key:"c", text:"They differ in (γ, β) — LN has them, InstanceNorm doesn't."},
          {key:"d", text:"They differ in train/eval mode — InstanceNorm has running statistics like BN, LN does not."},
        ]}
        trap={<>(a) over-generalizes. (c) is wrong: InstanceNorm has affine=True by default in PyTorch. (d) is half-right by accident: nn.InstanceNorm has track_running_stats=False by default but you can turn it on.</>}
        lens={<>For (N, H) shapes the two coincide (one (μ, σ) per sample, over H). For 4D image inputs they diverge: LN reduces over (C, H, W) per sample (one stat per sample); InstanceNorm reduces over (H, W) per (sample, channel) (C stats per sample). The transformer-relevant case is 1D-like, so the distinction is mostly academic for NLP.</>}
        stretch={<>Why does InstanceNorm shine for style transfer specifically?</>}
      />

      <VIS.TrapProblem
        id="ln-q21"
        difficulty="hard"
        title="P21 — Distributed training: does LayerNorm need a SyncLN?"
        scenario={<><em>Discriminating insight:</em> LN's reduction is per-sample, so cross-device sync isn't needed. A team training a 70B transformer on 256 GPUs asks: "We use SyncBN for our CNN runs — is there a SyncLayerNorm we should be using here?"</>}
        options={[
          {key:"a", text:"Yes — torch.nn.SyncLayerNorm pools statistics across devices and is recommended for batch sizes < 32 per device."},
          {key:"b", text:"No — LN's statistics are per-(sample, token); each GPU's local samples don't need to know about other GPUs' samples to compute its norm correctly. There is no SyncLN and none is needed.", correct:true},
          {key:"c", text:"Yes — Megatron-LM ships a custom AllReduceLayerNorm that's required for tensor-parallel runs."},
          {key:"d", text:"No — but only for sequence-parallel runs; tensor-parallel runs need cross-device LN sync to recombine the sharded hidden dim."},
        ]}
        trap={<>(a) invents an API. (c) misnames a real thing — tensor-parallel LN does need an all-reduce, but the reason is sharding of H across devices, not statistics-pooling. (d) is closer to the truth — but the question is whether sync is needed FOR THE STATISTICS, and the answer is no; even tensor-parallel LN sync is about reassembling a sharded reduction, not pooling stats across batches.</>}
        lens={<>LN is per-sample, so no batch-pooling sync is needed. Tensor parallelism shards H across devices, which requires an all-reduce inside the LN forward to compute (μ, σ) over the FULL H even though each device only holds H/P features — but that's a sharded-reduction problem, not a batch-stats problem. Cross-batch sync (SyncBN's job) never applies to LN.</>}
        stretch={<>In tensor-parallel LN, why is the all-reduce inside the forward unavoidable even though LN is "per-sample"?</>}
      />

      <VIS.TrapProblem
        id="ln-q22"
        difficulty="medium"
        title="P22 — Mixed-precision training (FP16/BF16): LN-specific risk?"
        scenario={<><em>Discriminating insight:</em> LN's variance over H can lose precision in FP16. A team enables torch.cuda.amp on a transformer and sees occasional loss spikes after a few thousand steps.</>}
        options={[
          {key:"a", text:"LN is FP16-safe because reductions over H are small (H ≤ 8192); the loss spike must be from softmax or matmul, not LN."},
          {key:"b", text:"LN's reduction over H accumulates x² in FP16, which can lose precision when x is large; PyTorch AMP runs LN in FP32 by default to avoid this.", correct:true},
          {key:"c", text:"LN is fundamentally incompatible with FP16; you must convert the entire model to BF16 for any normalization to work."},
          {key:"d", text:"The loss spike is unrelated to LN — it's an FP16 underflow in the attention softmax."},
        ]}
        trap={<>(a) underestimates the precision loss in summing H FP16 squares. (c) is too strong. (d) ignores the LN-specific FP16 issue (though softmax is ALSO a hot-spot; both can spike).</>}
        lens={<>LN computes (1/H) Σ x_i² − (1/H Σ x_i)² per token. For H = 4096 and FP16 x in the range ±10, x² can be ~100 and the sum can be ~400000 — close to FP16's 65504 cap, with substantial accumulated rounding error. PyTorch AMP keeps LN's internal reductions in FP32 (autocast policy: layer_norm → fp32). Custom kernels must replicate this.</>}
        stretch={<>Why is BF16 less prone to this than FP16 despite having a smaller mantissa?</>}
      />

      <VIS.TrapProblem
        id="ln-q23"
        difficulty="hard"
        title="P23 — Multi-task / multi-domain transformers: any LN drift?"
        scenario={<><em>Discriminating insight:</em> LN has nothing analogous to BN's running-stats drift. A team uses one transformer backbone with three task-specific heads across heterogeneous input distributions, training round-robin. They worry about norm drift.</>}
        options={[
          {key:"a", text:"LN's statistics are computed fresh per token per forward pass, so there is no cross-task drift. Domain-specific normalization (if needed) must come from γ, β, not from any built-in drift mechanism.", correct:true},
          {key:"b", text:"LN's running statistics drift toward whichever task ran most recently — same problem as BN."},
          {key:"c", text:"LN automatically maintains separate per-task statistics when you tag forward passes with task IDs."},
          {key:"d", text:"LN drifts only via its γ, β parameters, which behave like running stats and bias toward the recent task."},
        ]}
        trap={<>(b) projects BN's drift onto LN. (c) invents an API. (d) confuses parameter drift (gradient-driven, on every task) with running-stat drift (EMA-driven, BN-specific).</>}
        lens={<>LN computes (μ, σ) fresh per token at every forward; there's nothing to drift. γ and β do learn shared cross-task affines, which can be a real issue — that's what Conditional LayerNorm (Perez et al., FiLM-style) addresses by making γ, β a function of a task-conditioning vector. But the "running-stat drift" failure mode of BN does not exist for LN.</>}
        stretch={<>Sketch one architecture that makes LN's γ, β task-conditional without doubling parameters.</>}
      />

      <VIS.TrapProblem
        id="ln-q24"
        difficulty="medium"
        title="P24 — LayerNorm placement in a transformer block (exact order)"
        scenario={<><em>Discriminating insight:</em> Pre-LN's exact wiring. A candidate is asked to write a Pre-LN transformer block in 5 lines of PyTorch. Which sequence is right?</>}
        options={[
          {key:"a", text:"x = LN(x); x = x + Attn(x); x = LN(x); x = x + FFN(x)"},
          {key:"b", text:"x = x + Attn(LN(x)); x = x + FFN(LN(x))", correct:true},
          {key:"c", text:"x = LN(x + Attn(x)); x = LN(x + FFN(x))"},
          {key:"d", text:"x = Attn(LN(x)) + FFN(LN(x))"},
        ]}
        trap={<>(a) puts LN OUTSIDE the residual (and applies it twice). (c) is Post-LN (the original 2017 Transformer). (d) drops the residual entirely.</>}
        lens={<>Canonical Pre-LN block (GPT-2+, LLaMA): x = x + Attn(LN(x)); x = x + FFN(LN(x)). LN is INSIDE the residual branch, applied to its input. Then a final LN at the end of the whole stack to normalize the residual stream before the output projection (often called the "final LN").</>}
        stretch={<>Why must Pre-LN models have an extra LN at the very end of the stack but Post-LN models don't?</>}
      />

      <VIS.TrapProblem
        id="ln-q25"
        difficulty="hard"
        title="P25 — Frozen LayerNorm parameters during PEFT (LoRA, prefix-tuning)"
        scenario={<><em>Discriminating insight:</em> LN's parameter count is tiny but its γ, β are surprisingly important. A team using LoRA on a 7B model wonders whether to leave LN's (γ, β) trainable or freeze them.</>}
        options={[
          {key:"a", text:"Always freeze LN's (γ, β) during PEFT — they're pretrained and unfreezing them defeats the parameter-efficient purpose."},
          {key:"b", text:"Common practice varies, but several PEFT papers (BitFit, Houlsby et al.) show that leaving LN's (γ, β) trainable consistently helps quality at near-zero parameter cost — LN params are < 0.1% of total. Many recipes mark them trainable alongside LoRA adapters.", correct:true},
          {key:"c", text:"LN's (γ, β) are tied to running statistics, so unfreezing them requires unfreezing the running stats too — which would corrupt the pretrained model. Always freeze."},
          {key:"d", text:"LN's (γ, β) are not learnable in HuggingFace's default LoRA wrapper, so the question is moot — they're already frozen."},
        ]}
        trap={<>(a) is too rigid. (c) projects BN's running-stats coupling onto LN. (d) is a framework-API claim that's either wrong or version-specific; the question is about what you SHOULD do, not the default.</>}
        lens={<>BitFit (Zaken et al. 2021) showed that bias-and-norm-only fine-tuning recovers most of full fine-tuning's gains on GLUE at ~0.1% of the parameter count. LN's γ, β are a natural extension of bias-only tuning and are commonly included in PEFT trainable sets (LoRA + LN being the standard combo). The "tiny but important" property of LN params is a recurring theme in PEFT.</>}
        stretch={<>What's the RMSNorm analogue — only γ is trainable; does that change PEFT recipes?</>}
      />
    </VIS.Section>
  </main>
);
