  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          // NO autoGloss here. Glossing terms inside option text leaks the
          // answer mechanism via hover. Authors must keep options self-contained;
          // a candidate who needs a definition can scroll up to the prose where
          // the term is explicitly wrapped via <VIS.Term>.
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>

  <script type="text/babel" data-presets="react">
// Data leakage in CV — row 11 — fingerprint: data-leakage-in-cv
// Concept explainer + 25 trap-drill problems across ≥5 axes.

// --- Vega-Lite: leaked-vs-honest CV scores across 30 hypothetical projects ---
const LEAK_SPEC = {
  width: 600, height: 280,
  encoding: {
    x: { field: "project", type: "ordinal", title: "Hypothetical project →",
         axis: { labelAngle: 0, values: [1, 10, 20, 30] } },
    y: { field: "auc", type: "quantitative", title: "AUC",
         scale: { domain: [0.70, 1.00] } },
    color: { field: "kind", type: "nominal",
             scale: { domain: ["Leaked CV (fit on full)", "Honest CV (fit on train fold)", "Production"],
                      range: ["#dc2626", "#16a34a", "#0ea5e9"] } }
  },
  mark: { type: "line", strokeWidth: 2, point: true }
};
const LEAK_DATA = (() => {
  const out = [];
  // RNG seeded by a simple LCG so the picture is stable.
  let s = 7;
  const r = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
  for (let p = 1; p <= 30; p++) {
    const honest = 0.78 + 0.07 * r();
    const prod   = honest - 0.005 - 0.01 * r();
    const leaked = honest + 0.04 + 0.04 * r();
    out.push({ project: p, kind: "Honest CV (fit on train fold)", auc: honest });
    out.push({ project: p, kind: "Production",                   auc: prod   });
    out.push({ project: p, kind: "Leaked CV (fit on full)",      auc: leaked });
  }
  return out;
})();

        The canonical wrong shape: a single global <code>.fit()</code> call BEFORE the split. The scaler's mean and standard deviation are computed using rows that will later be evaluated as held-out — the test rows have already touched the parameters used to normalize training. The model sees a <VIS.Term def="The joint statistics of features in the training-time view (column means, variances, correlations). Leakage means this view secretly summarizes the val/test rows too.">training distribution</VIS.Term> at train time that secretly knows about the val distribution. The same shape applies to any <VIS.Term def="A function from raw data to a numeric feature. If its parameters are learned from the dataset (mean, std, vocabulary, encoding table), it is leak-sensitive and must be fit per fold.">feature transform</VIS.Term> with a learned parameter — scaling is just the most visually obvious example.
      </p>

    <VIS.Section id="sec-right" title="Right (offline matches production)">
      <p>
        The fix is structural, not statistical: <strong>split first, fit only on the training rows of each fold, transform val with the train-only parameters.</strong> The validation rows are touched by <code>.transform()</code>, never by <code>.fit()</code>. The model now sees the same kind of distribution offline that it will see online — there is no future information bleeding backwards. This is sometimes called the <VIS.Term def="The rule that every step in the modeling pipeline must obey the same temporal/informational ordering offline that it will face online — no transform sees future or held-out rows during fitting.">train-time invariance</VIS.Term> property, and it is the single most important property of a leak-proof pipeline.

    <VIS.Section id="sec-sources" title="Where leakage hides (the usual suspects)">
      <p>
        Scaling is the famous example, but any object with a <code>.fit()</code> method is a leakage suspect. The pattern is always the same: the preprocessor learns parameters from data, and if that data includes the val/test rows, those parameters carry information from the rows you intend to score on. The taxonomy below covers the six places this hides — <VIS.Term def="A learned data transform: scaler, encoder, imputer, selector, decomposer. The diagnostic question: 'does this object have a .fit() method that learns from data?' If yes, it must live inside the CV loop.">fit-able preprocessors</VIS.Term>, <VIS.Term def="A feature that exists in training data but is unavailable at the moment of prediction, OR is computed using post-event information. The most severe leak: the offline metric is fundamentally meaningless.">target / feature leakage</VIS.Term>, and structural splitter mistakes (entity, time, duplicates).
      </p>
      <VIS.Callout kind="gotcha" title="1. Scaling / normalization fit on full data">
        <VIS.Term def="A preprocessor that centers each feature to zero mean and scales to unit variance using the column mean and standard deviation.">StandardScaler</VIS.Term>, <VIS.Term def="A preprocessor that linearly maps each feature into [0, 1] using the column min and max.">MinMaxScaler</VIS.Term>, <VIS.Term def="A preprocessor that centers each feature on the column median and scales by the interquartile range, ignoring outliers.">RobustScaler</VIS.Term>, <VIS.Term def="Per-row normalization to unit L2 norm; fits no parameters per se, but is still safest inside a Pipeline so it composes with other steps.">Normalizer</VIS.Term> — every one of them leaks if fit on the combined train+val dataset, because the fitted statistics depend on the held-out rows. Wrap them in a <VIS.Term def="sklearn.pipeline.Pipeline — chains preprocessors with a model so each .fit() inside the chain only ever sees the training fold of the outer split.">Pipeline</VIS.Term> so each CV iteration re-fits on the current train fold.
      </VIS.Callout>
      <VIS.Callout kind="gotcha" title="2. Target encoding fit globally">
        Replacing categorical levels with their average target value across the entire dataset leaks the label of every row into the feature of every other row in the same category. The trick to make this safe is <VIS.Term def="K-fold scheme nested INSIDE the outer CV: to encode a row, use the target mean computed only on rows from OTHER folds. Avoids the row's own label entering its own feature.">out-of-fold target encoding</VIS.Term>, sometimes combined with a <VIS.Term def="A pseudo-count m mixed into the category mean toward the global mean: encoded = (n_c * mean_c + m * global_mean) / (n_c + m). Stabilizes encodings for rare categories.">smoothing prior</VIS.Term> to handle rare categories.
      </VIS.Callout>
      <VIS.Callout kind="gotcha" title="3. Imputation fit globally">
        Filling NaN with the column mean / median / mode uses statistics from val rows when computed over the full table. The fix: <code>SimpleImputer</code> goes inside the Pipeline so it learns its fill value on the train fold only and reuses that value when transforming val. Same rule for <VIS.Term def="K-Nearest-Neighbors imputation — fills a missing cell using the values of its k nearest neighbors. Doubly leaky if neighbors are computed over the full dataset.">KNN imputation</VIS.Term> and <VIS.Term def="Iterative chained-equation imputer (sklearn's IterativeImputer). Trains regressors to fill each column from the others; fitted across train+val is a stealth leak.">iterative imputers</VIS.Term>.
      </VIS.Callout>
      <VIS.Callout kind="gotcha" title="4. Feature selection / dimensionality reduction fit globally">
        <VIS.Term def="Ranking features by their correlation, mutual information, chi-square, or model-importance with the target, then keeping the top-k. If fitted on full data, the ranking is informed by val rows.">SelectKBest</VIS.Term>, <VIS.Term def="Recursive Feature Elimination — iteratively drop the weakest feature according to a fitted model. Leaks if the fitting model has seen the val fold.">RFE</VIS.Term>, <VIS.Term def="Principal Component Analysis — finds orthogonal axes maximizing variance. The principal components themselves are a learned parameter and leak if fitted on full data.">PCA</VIS.Term>, <VIS.Term def="Truncated SVD on a sparse matrix — equivalent leakage profile to PCA. Common in NLP / recsys pipelines.">TruncatedSVD</VIS.Term>, <VIS.Term def="Linear Discriminant Analysis — finds axes maximizing between-class variance; uses labels and therefore leaks twice if fitted on full data.">LDA</VIS.Term> — anything that selects or rotates features based on the data must be fit inside the CV loop, not before it.
      </VIS.Callout>
      <VIS.Callout kind="gotcha" title="5. Group leakage (same entity in train and val)">
        If the same <VIS.Term def="An entity ID — patient, user, customer, device, household — whose presence in multiple rows makes plain row-shuffled splits invalid. Use GroupKFold or StratifiedGroupKFold to keep all rows for one group on the same side of the split.">group</VIS.Term> appears in multiple rows and you do plain k-fold, the same patient or user lands in train AND val and the model memorizes the entity instead of generalizing. Use <code>GroupKFold</code> (or <code>StratifiedGroupKFold</code> when you also need balanced positives) on the entity id.
      </VIS.Callout>
      <VIS.Callout kind="gotcha" title="6. Temporal leakage (future in train)">
        For time-series, row-shuffled k-fold trains on tomorrow and predicts yesterday. Use <VIS.Term def="A sklearn CV scheme for time-ordered data. Each train fold contains only rows BEFORE the val fold's timestamps. No future information enters training.">TimeSeriesSplit</VIS.Term> with an optional <VIS.Term def="A buffer between train end and val start, large enough that no label information at train-end can be observed at val-start (relevant when labels are computed with a delay).">embargo period</VIS.Term>. Same discipline applies to feature engineering: a feature like 'rolling-30-day mean' computed across the full series leaks the future into past rows.
      </VIS.Callout>
      <VIS.Callout kind="gotcha" title="7. Duplicate / near-duplicate rows">
        Web-scale datasets often have near-duplicates (same image with different metadata, same news article republished). Row-shuffled splits put a duplicate in both train and val and inflate the metric. <VIS.Term def="Removing near-duplicates from the dataset before splitting — by exact hash, MinHash, perceptual hash, or embedding similarity threshold. The first preprocessing step on any web-scale corpus.">Deduplicate</VIS.Term> first, or split by a group id that captures the duplicate cluster.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-pipeline" title="Sklearn Pipeline makes this structurally impossible">
      <p>
        The cleanest way to never leak is to never write preprocessing code outside the model object. The <VIS.Term def="sklearn's contract for an object that exposes .fit(X, y) and .predict(X) (and optionally .transform). Anything that satisfies the contract can be wrapped in a Pipeline and dropped into cross_val_score, GridSearchCV, or any meta-estimator.">estimator API</VIS.Term> defines a Pipeline as a list of (name, estimator) pairs composed into a single estimator: <code>fit()</code> calls each step's <code>fit_transform()</code> on the training data only, and <code>predict()</code> calls each step's <code>transform()</code> on new data. Wrap that in <code>cross_val_score</code> and every fold automatically re-fits the preprocessors on its own train rows. The same Pipeline object is what you serialize and ship to production — the offline-online <VIS.Term def="The principle that the exact same code, with the same fitted parameters, runs both offline (during CV) and online (at prediction time). Pipelines deliver this for free; bespoke preprocessing code in a notebook does not.">training-serving parity</VIS.Term> follows automatically.
      </p>
      <VIS.CodeBlock lang="python">{`from sklearn.pipeline import Pipeline
from sklearn.preprocessing import StandardScaler
from sklearn.impute import SimpleImputer
from sklearn.linear_model import LogisticRegression
from sklearn.model_selection import cross_val_score, StratifiedKFold

pipe = Pipeline([
    ("impute", SimpleImputer(strategy="median")),
    ("scale",  StandardScaler()),
    ("model",  LogisticRegression(C=1.0, max_iter=1000)),
])

cv = StratifiedKFold(n_splits=5, shuffle=True, random_state=0)
scores = cross_val_score(pipe, X, y, cv=cv, scoring="roc_auc")
# Each of the 5 folds re-fits impute + scale on its OWN train rows.
# Val rows are touched only by .transform(). No leakage.`}</VIS.CodeBlock>
      <VIS.Callout kind="ok" title="The Pipeline contract">
        When you call <code>pipe.fit(X_train, y_train)</code>, each step's <code>.fit()</code> sees only <code>X_train</code>. When you call <code>pipe.predict(X_val)</code>, each step's <code>.transform()</code> sees <code>X_val</code> but uses parameters learned from <code>X_train</code>. The same rule applies whether you call it manually or hand the Pipeline to <code>cross_val_score</code>, <code>GridSearchCV</code>, or <code>RandomizedSearchCV</code>.
      </VIS.Callout>
      <VIS.Callout kind="info" title="ColumnTransformer for heterogeneous columns">
        Most tabular pipelines have a mix of numeric, categorical, and text columns. Wrap each subset's preprocessing in a <VIS.Term def="sklearn.compose.ColumnTransformer — applies different transformers to different column subsets in one estimator. Composes inside a Pipeline; preserves the train-only fit guarantee.">ColumnTransformer</VIS.Term>, then place that whole object as one step of the outer Pipeline. The leak-proof guarantee carries through.
      </VIS.Callout>
      <VIS.Callout kind="gotcha" title="Pipelines do NOT save you from group, temporal, or duplicate leakage">
        The Pipeline guarantees only that <em>fit-able preprocessors</em> see train-only data. It cannot detect that the SAME PATIENT appears in both folds, or that your val rows are from BEFORE the train rows in time, or that a row is a duplicate. Those leaks live in the SPLITTER (use GroupKFold / TimeSeriesSplit / dedup) not in the preprocessor.
      </VIS.Callout>
    </VIS.Section>

        difficulty="medium"
        title="Time-series forecasting: which CV scheme prevents temporal leakage?"
        scenario={<><em>Discriminating insight:</em> rows have a timestamp. Pick the scheme that NEVER places a future row in train for a fold whose val rows are in the past.</>}
        options={[
          {key:"a", text:"KFold(shuffle=True) — shuffling randomizes the splits and breaks any temporal correlation that could leak.", correct:false},
          {key:"b", text:"StratifiedKFold on the target — keeps positive rate constant per fold, which suffices for time-series.", correct:false},
          {key:"c", text:"TimeSeriesSplit — each train fold contains only rows BEFORE the corresponding val fold's timestamps.", correct:true},
          {key:"d", text:"GroupKFold by month — guarantees each month appears in exactly one fold, which is enough.", correct:false},
        ]}
        trap={<>(a) is the OPPOSITE of correct — shuffling creates the leak. (b) does nothing for time. (d) prevents one entity-in-two-folds problem but not the forward-in-time-from-val problem.</>}
        lens={<>For time series, the only sound scheme is one that respects the arrow of time. TimeSeriesSplit does this; an embargo period extends the gap when labels are computed with delay. Use rolling-origin evaluation for production-realistic numbers.</>}
        stretch={<>What's the role of the 'embargo' / 'purge' period?</>}
      />

      <VIS.TrapProblem
        id="dl-q10"
        difficulty="hard"
        title="A team's CV AUC dropped 0.04 after switching from fit-on-full to fit-on-fold. The model has not changed. Why is this expected?"
        scenario={<><em>Discriminating insight:</em> the model code is identical. The drop must come from something that was previously inflating the metric.</>}
        options={[
          {key:"a", text:"Smaller training sets in each fold mean the model is statistically less accurate; the drop reflects sample-size variance only.", correct:false},
          {key:"b", text:"Fit-on-fold removes the inflation from leakage; the new number is honest and the old number was over-stated.", correct:true},
          {key:"c", text:"sklearn's StandardScaler has a known regression that lowers AUC when fit on subsets; downgrade and retest.", correct:false},
          {key:"d", text:"AUC is fold-size-dependent; reduce the number of folds to recover the previous metric.", correct:false},
        ]}
        trap={<>(a) is plausible but tiny — the train-fold size barely changes. (c) is a fabricated bug. (d) is metric-hacking, not engineering.</>}
        lens={<>The drop is the leakage tax becoming visible. The old number was inflated because the val rows had touched the scaler's parameters. The new number is what production will deliver. Don't 'fix' it back; ship the honest estimate.</>}
        stretch={<>How do you explain this drop to a skeptical stakeholder?</>}
      />

      <VIS.TrapProblem
        id="dl-q11"
        difficulty="medium"
        title="When is it SAFE to fit a preprocessor on the full dataset?"
        scenario={<><em>Discriminating insight:</em> the question is narrow. Two of the options describe data-driven preprocessing that always leaks. Find the one that has no learned parameters.</>}
        options={[
          {key:"a", text:"StandardScaler with the test set excluded — the val set is still inside.", correct:false},
          {key:"b", text:"A fixed user-provided list of column drops with no .fit() involved — selecting columns by name does not learn anything from data.", correct:true},
          {key:"c", text:"A target encoder with smoothing — smoothing supposedly bounds the leak.", correct:false},
          {key:"d", text:"PCA with k=2 — the small output dimension prevents the leak.", correct:false},
        ]}
        trap={<>(a) leaks via val. (c) smoothing reduces variance but doesn't kill the leak. (d) low k still uses the full-data covariance.</>}
        lens={<>The litmus test: does the preprocessor have a <code>.fit()</code> method that LEARNS something from data? If yes, it must be fit per fold. If no (constant column drop, hard-coded log transform, type cast), it can run on the full dataset because it carries no information.</>}
        stretch={<>Is log1p safe? sqrt? Box-Cox?</>}
      />

      <VIS.TrapProblem
        id="dl-q12"
        difficulty="hard"
        title="A SimpleImputer with strategy='mean' is inside a Pipeline. Where is the residual leak risk?"
        scenario={<><em>Discriminating insight:</em> the Pipeline guarantees per-fold fitting. The remaining risk must come from OUTSIDE that contract.</>}
        options={[
          {key:"a", text:"An earlier exploratory step replaced NaN with the global mean in pandas before the Pipeline saw the data — the leak is baked in.", correct:true},
          {key:"b", text:"SimpleImputer's mean-strategy uses a numerically unstable two-pass algorithm that leaks via floating-point error.", correct:false},
          {key:"c", text:"strategy='mean' is incompatible with sparse matrices, so the imputer silently uses the global mode instead.", correct:false},
          {key:"d", text:"SimpleImputer caches fill values across .fit() calls, so the second fold inherits the first fold's mean.", correct:false},
        ]}
        trap={<>(b), (c), (d) are fabricated bugs.</>}
        lens={<>Pipelines protect what they wrap. If a prior data-loading step has already imputed using global statistics, the Pipeline starts from a tainted X. Move ALL data-touching transforms inside the Pipeline (or onto a separate exploratory holdout) so the leak surface is one auditable object.</>}
        stretch={<>Same question for a 'fillna(0)' — is that safe?</>}
      />

      <VIS.TrapProblem
        id="dl-q13"
        difficulty="medium"
        title="A model trained on credit applications scores 0.88 AUC in CV but 0.62 in production. The pipeline is correctly inside sklearn Pipeline. Most likely cause?"
        scenario={<><em>Discriminating insight:</em> Pipeline-level leakage is ruled out. The drop is too large for ordinary noise. Pick the realistic remaining cause.</>}
        options={[
          {key:"a", text:"A feature derived from a column that is unavailable at prediction time — the feature itself leaks a future event into training.", correct:true},
          {key:"b", text:"AUC is unstable across populations of different sizes; the production sample is smaller than CV folds.", correct:false},
          {key:"c", text:"The Pipeline silently dropped one step in production deployment due to a serialization quirk.", correct:false},
          {key:"d", text:"Production users have higher default rates than training users; the base rate shift inverts AUC.", correct:false},
        ]}
        trap={<>(b) and (d) are real phenomena but small. (c) is fixable and not a leak. (a) is the classic feature-leakage case: a column that exists at training-data-collection time but NOT at prediction time.</>}
        lens={<>This is feature-LEAKAGE, distinct from preprocessor leakage. Example: 'days_since_last_payment' is observable only AFTER an outcome; at prediction time you don't have it. Audit every feature against 'is this available at the moment of prediction?' Pipeline cannot save you from this.</>}
        stretch={<>How do you systematically catch feature-leakage during EDA?</>}
      />

      <VIS.TrapProblem
        id="dl-q14"
        difficulty="hard"
        title="Out-of-fold target encoding: what's the additional risk when the cardinality is very high?"
        scenario={<><em>Discriminating insight:</em> OOF encoding solves the cross-row leak, but high cardinality introduces a different problem.</>}
        options={[
          {key:"a", text:"High cardinality requires more memory; the OOF computation runs out of RAM and silently truncates.", correct:false},
          {key:"b", text:"Many categories appear in only one fold; their out-of-fold mean is undefined or extremely high variance.", correct:true},
          {key:"c", text:"OOF encoding becomes a no-op above 10,000 categories — sklearn caps it for performance.", correct:false},
          {key:"d", text:"High cardinality forces use of hashing tricks, which leak by collision.", correct:false},
        ]}
        trap={<>(a), (c), (d) are fabricated technical claims. (b) is the genuine statistical concern.</>}
        lens={<>OOF encoding requires each category to appear in multiple folds. Singleton categories get unstable or undefined encodings. The fix is a smoothing prior that mixes the category mean toward the global mean weighted by category count — and falling back to a hash + frequency encoding for the long tail.</>}
        stretch={<>How does a Bayesian smoothing prior compute the mix?</>}
      />

      <VIS.TrapProblem
        id="dl-q15"
        difficulty="medium"
        title="Which of these is NOT a form of data leakage?"
        scenario={<><em>Discriminating insight:</em> three options describe real leaks; one describes a separate problem.</>}
        options={[
          {key:"a", text:"Imputing NaN with the column median computed on train+val combined.", correct:false},
          {key:"b", text:"Using a feature that records the prediction's outcome (post-hoc label) as an input feature.", correct:false},
          {key:"c", text:"Training on a class-imbalanced dataset where positives are 1% of rows.", correct:true},
          {key:"d", text:"Computing a 7-day rolling mean across the full timeline before train/val splitting.", correct:false},
        ]}
        trap={<>(a) leaks via global statistics. (b) is target-leakage (the most severe kind). (d) leaks the future into past rows.</>}
        lens={<>Class imbalance is a metric / loss-function problem, not a leak. The label distribution being skewed doesn't pass information across the split. Fix it with class weights, resampling, or threshold tuning — not by changing CV.</>}
        stretch={<>What about heavy class imbalance combined with row-shuffled CV — does that introduce leakage?</>}
      />

      <VIS.TrapProblem
        id="dl-q16"
        difficulty="hard"
        title="The CV AUC is 0.85, training AUC is 0.99, test AUC is 0.83. Is there leakage?"
        scenario={<><em>Discriminating insight:</em> CV and test AGREE; train is much higher. Two options confuse leakage with overfitting. Pick the right diagnosis.</>}
        options={[
          {key:"a", text:"Yes — train and CV diverge, which is the classical leakage signature.", correct:false},
          {key:"b", text:"No — CV and test agree, which means CV is honest. The train-CV gap is ordinary overfit.", correct:true},
          {key:"c", text:"Yes — any time training AUC is above 0.95, there is leakage from labels into features.", correct:false},
          {key:"d", text:"Can't tell without a separate validation set in addition to test.", correct:false},
        ]}
        trap={<>(a) inverts the leakage fingerprint. (c) is a folk rule that catches some real cases but misclassifies many fine models.</>}
        lens={<>Leakage's fingerprint is CV AGREEING with TRAIN and DISAGREEING with TEST. Here CV agrees with TEST. So CV is honest; the train-CV gap is the model overfitting to training data, mitigated by regularization / early stopping / more data — not by changing the pipeline.</>}
        stretch={<>If CV had been 0.95 and test 0.83, what would your next step be?</>}
      />

      <VIS.TrapProblem
        id="dl-q17"
        difficulty="hard"
        title="An NLP team uses TruncatedSVD on a TF-IDF matrix to compress 50k tokens to 128 dimensions. Where do they need to put SVD?"
        scenario={<><em>Discriminating insight:</em> SVD learns rotation axes from the data. The whole TF-IDF + SVD chain must respect the split-first rule.</>}
        options={[
          {key:"a", text:"Fit SVD on the full corpus once; the dense representation is then fed to per-fold CV with the model.", correct:false},
          {key:"b", text:"Put TF-IDF + TruncatedSVD inside the sklearn Pipeline so each fold re-fits both on its training rows.", correct:true},
          {key:"c", text:"Fit TF-IDF inside the Pipeline but keep SVD outside, since SVD is unsupervised and therefore safe.", correct:false},
          {key:"d", text:"Skip SVD and feed the raw TF-IDF matrix to the model; SVD always leaks at scale.", correct:false},
        ]}
        trap={<>(a) leaks because SVD sees val rows' covariance. (c) is the 'unsupervised = safe' trap. (d) abandons a useful step.</>}
        lens={<>TF-IDF learns the document-frequency vector; SVD learns the rotation axes. Both have a <code>.fit()</code>, both must be inside the Pipeline. Per-fold re-fitting is cheap because TF-IDF and SVD share the same loop, and modern sparse solvers are fast.</>}
        stretch={<>What changes when you swap TruncatedSVD for a pretrained sentence embedding model?</>}
      />

      <VIS.TrapProblem
        id="dl-q18"
        difficulty="medium"
        title="A recsys team builds a model with user_id and item_id features. CV by random row shuffle gives AUC 0.92; CV by user-grouped folds gives 0.74. Which number to trust?"
        scenario={<><em>Discriminating insight:</em> the two CV schemes measure different generalization questions. Pick the one that matches the production deployment.</>}
        options={[
          {key:"a", text:"Random-shuffle CV — it averages over more data points and gives the lower-variance estimate.", correct:false},
          {key:"b", text:"User-grouped CV — production must predict for users the model has never seen before, so leakage of users into both train and val inflates random-shuffle CV.", correct:true},
          {key:"c", text:"Average the two — the truth lies between them and averaging reduces both biases.", correct:false},
          {key:"d", text:"Trust whichever matches the test set AUC, regardless of CV scheme.", correct:false},
        ]}
        trap={<>(a) ignores the entity-leakage. (c) is statistically meaningless. (d) requires the test set to already be known, which is circular.</>}
        lens={<>CV must match the deployment question. If production will see new users, user-grouped CV is the honest estimate. If production will only see users seen during training (warm-start recsys), random-shuffle CV is appropriate. The 18-point gap is the leakage tax of evaluating cold-start with warm-start CV.</>}
        stretch={<>What CV scheme would you use for a recsys that handles BOTH warm and cold users?</>}
      />

      <VIS.TrapProblem
        id="dl-q19"
        difficulty="hard"
        title="What's the bug in this sklearn code?"
        scenario={<><em>Discriminating insight:</em> the Pipeline contains scaler + model. But there's a setup line BEFORE the Pipeline that taints everything.</>}
        options={[
          {key:"a", text:"selector = VarianceThreshold(threshold=0.01).fit(X); X_red = selector.transform(X); pipe = Pipeline([('s', StandardScaler()), ('m', LogReg())]); cross_val_score(pipe, X_red, y, cv=5).", correct:true},
          {key:"b", text:"pipe = Pipeline([('vt', VarianceThreshold(0.01)), ('s', StandardScaler()), ('m', LogReg())]); cross_val_score(pipe, X, y, cv=5).", correct:false},
          {key:"c", text:"pipe = Pipeline([('s', StandardScaler()), ('m', LogReg(C=1.0))]); cross_val_score(pipe, X, y, cv=5).", correct:false},
          {key:"d", text:"pipe = Pipeline([('s', StandardScaler()), ('m', RandomForestClassifier())]); cross_val_score(pipe, X, y, cv=5).", correct:false},
        ]}
        trap={<>(b), (c), (d) keep all data-fitting steps inside the Pipeline. Only (a) fits VarianceThreshold on full X before CV.</>}
        lens={<>VarianceThreshold has a <code>.fit()</code>. Fitting it on the full X before splitting computes per-column variance using val rows, then drops columns whose variance is low ACROSS train+val. The Pipeline downstream looks innocent because the leak already happened upstream.</>}
        stretch={<>If VarianceThreshold's threshold were 0 (drop only literal-constant columns), is it still a leak?</>}
      />

      <VIS.TrapProblem
        id="dl-q20"
        difficulty="medium"
        title="Why is fitting a scaler on (train + unlabeled test) sometimes called 'transductive' and considered acceptable?"
        scenario={<><em>Discriminating insight:</em> there's a research setting where this is OK and a production setting where it isn't. Pick the right framing.</>}
        options={[
          {key:"a", text:"In transductive learning, the test set's INPUTS are known in advance and the goal is to predict their labels — using test inputs in unsupervised fitting is by-design.", correct:true},
          {key:"b", text:"Transductive learning is a buzzword for label leakage; it's never acceptable in any setting.", correct:false},
          {key:"c", text:"Transductive learning is when you train on the entire test set's labels; the term is unrelated to feature fitting.", correct:false},
          {key:"d", text:"It's a sklearn-specific term that means 'fit the scaler twice' for numerical stability.", correct:false},
        ]}
        trap={<>(b) overstates the rule. (c) confuses transductive with overfit. (d) invents an sklearn behavior.</>}
        lens={<>In transductive setups (e.g., semi-supervised learning where unlabeled test inputs are KNOWN at training time), using test INPUTS in unsupervised preprocessing is legitimate — you have those inputs at inference. The leak rule applies when test inputs aren't known until inference time, which is the typical production case. Know which setting you're in.</>}
        stretch={<>Does this argument extend to PCA? To target encoding?</>}
      />

      <VIS.TrapProblem
        id="dl-q21"
        difficulty="hard"
        title="A team adds a feature 'mean target in this category over the past 30 days' computed on the full timeline. What's wrong?"
        scenario={<><em>Discriminating insight:</em> the feature looks like a windowed historical aggregate, which sounds safe. The actual leak is more subtle.</>}
        options={[
          {key:"a", text:"For training rows near the END of the timeline, the 30-day window contains rows whose labels are AFTER the row's timestamp; future labels leak.", correct:true},
          {key:"b", text:"30-day windows are too short for stable means; the feature is high-variance and useless.", correct:false},
          {key:"c", text:"Mean is a biased estimator for binary targets; use median instead.", correct:false},
          {key:"d", text:"The feature uses .rolling() in pandas, which has a known bug with date indexes.", correct:false},
        ]}
        trap={<>(b) is a statistical quibble. (c) is wrong (mean is the maximum-likelihood estimate for Bernoulli). (d) is fabricated.</>}
        lens={<>Windowed aggregates leak whenever the window is computed on the FULL timeline and used at training time on a row whose timestamp is in the middle. For the last 30 days of training, the rolling window includes labels from future-relative-to-the-row. The fix: compute the windowed feature using only rows strictly BEFORE the current row's timestamp ('point-in-time correct features').</>}
        stretch={<>How would you compute point-in-time correct features at scale?</>}
      />

      <VIS.TrapProblem
        id="dl-q22"
        difficulty="medium"
        title="GridSearchCV nested inside cross_val_score — when do you need this and why?"
        scenario={<><em>Discriminating insight:</em> the outer CV estimates generalization; the inner CV picks hyperparameters. Without nesting, what gets contaminated?</>}
        options={[
          {key:"a", text:"Without nesting, the held-out fold is used to PICK hyperparameters AND to ESTIMATE generalization — the estimate is optimistically biased.", correct:true},
          {key:"b", text:"Nested CV is purely a performance optimization for sklearn 1.4+; both schemes give the same number.", correct:false},
          {key:"c", text:"Nested CV is needed only when the HP grid is larger than the training set.", correct:false},
          {key:"d", text:"Nested CV protects against random-state mismatches between folds.", correct:false},
        ]}
        trap={<>(b), (c), (d) are fabricated. The actual reason is the dual use of the val signal.</>}
        lens={<>Single-CV with HP search uses the same val rows to choose HPs and to report a metric. With many HP configs, the best val score is biased upward by selection — like reporting the best of 50 p-values. Nested CV breaks the loop: the inner CV picks HPs on the inner train set; the outer CV measures generalization on rows never used for HP selection.</>}
        stretch={<>When can you skip nested CV and use a single split for HPs?</>}
      />

      <VIS.TrapProblem
        id="dl-q23"
        difficulty="hard"
        title="A team's offline test set was assembled by random sampling AT THE SAME TIME as training data. Production performance is 12 points lower. Is this leakage?"
        scenario={<><em>Discriminating insight:</em> the splits are honestly random; preprocessing is honestly per-fold. Yet production diverges. Pick the actual mechanism.</>}
        options={[
          {key:"a", text:"Yes — random sampling at the same time is the textbook definition of leakage.", correct:false},
          {key:"b", text:"No — this is distribution shift between the training period and the production period; leakage requires the val signal to be contaminated, which it isn't.", correct:true},
          {key:"c", text:"Yes — any time production performance is much lower, leakage is the default explanation.", correct:false},
          {key:"d", text:"No — production performance is always lower by some margin; 12 points is within normal range.", correct:false},
        ]}
        trap={<>(a) and (c) reflexively blame leakage. (d) is wrong — 12 points is large.</>}
        lens={<>Leakage means information flows from val into train within the offline pipeline. Here the offline pipeline is honest; the issue is that the offline DATA does not represent the production DATA (different time, different feature distribution, different label rate). Fix it by collecting a held-out test set from the SAME period that production will see, or by using a time-respecting CV scheme.</>}
        stretch={<>How would you distinguish leakage from distribution shift in practice?</>}
      />

      <VIS.TrapProblem
        id="dl-q24"
        difficulty="hard"
        title="An auto-ML tool reports 0.96 AUC on a tabular dataset. The human runs the same pipeline manually and gets 0.84. What's the most likely cause?"
        scenario={<><em>Discriminating insight:</em> auto-ML tools often run feature engineering on the full dataset before any CV. Pick the likely mechanism.</>}
        options={[
          {key:"a", text:"The auto-ML tool fits target encoders, feature interactions, or feature selection on the full dataset before its CV layer; the human pipeline doesn't.", correct:true},
          {key:"b", text:"The auto-ML tool uses a more powerful model class that legitimately scores 0.12 higher.", correct:false},
          {key:"c", text:"The human used the wrong AUC implementation (sklearn's vs scipy's).", correct:false},
          {key:"d", text:"Random seed difference produces a 0.12-point AUC gap on small datasets.", correct:false},
        ]}
        trap={<>(b) is unlikely at this magnitude on tabular data. (c) AUC implementations agree. (d) random seed effects are typically ±0.005.</>}
        lens={<>Many auto-ML tools advertise 'no leakage' but quietly run preprocessing on the full input before passing data to CV. Audit the auto-ML's preprocessing layer or run its winning pipeline on a separately held-out test set the auto-ML never saw. The honest number is the held-out one.</>}
        stretch={<>Which open-source auto-ML libraries explicitly guarantee leak-proof CV by default?</>}
      />

      <VIS.TrapProblem
        id="dl-q25"
        difficulty="hard"
        title="Image classification on a medical dataset: 5-fold AUC 0.94; held-out hospital AUC 0.71. Where is the leak?"
        scenario={<><em>Discriminating insight:</em> hospital-out evaluation is a strict generalization test. Pick the realistic leak — a structural property of medical data that random CV misses.</>}
        options={[
          {key:"a", text:"Random 5-fold puts images from the SAME PATIENT into both train and val; the model memorizes patient-specific anatomy.", correct:true},
          {key:"b", text:"The held-out hospital uses a different camera, so AUC drops; this is leakage by hardware drift.", correct:false},
          {key:"c", text:"The dataset has only 5 folds; not enough statistical power to detect leakage.", correct:false},
          {key:"d", text:"The held-out hospital is poorly labeled; relabel and the gap closes.", correct:false},
        ]}
        trap={<>(b) is a real phenomenon (covariate shift) but not leakage. (c) is wrong — 5 folds is fine. (d) blames data when the diagnostic points at split design.</>}
        lens={<>Medical imaging datasets routinely have many images per patient. Random row-shuffled CV lets the model see patient X in train and val, learning patient-specific anatomy that doesn't generalize. Use GroupKFold by patient_id, ideally combined with hospital-out evaluation as the final gate. The 23-point gap is the leakage tax of evaluating cross-patient generalization with within-patient CV.</>}
        stretch={<>How do you choose between patient-grouped CV and hospital-grouped CV?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://machinelearningmastery.com/data-preparation-without-data-leakage/" target="_blank" rel="noopener">
            Jason Brownlee — <em>Data Preparation Without Data Leakage</em> (blog)</a>
            — practical sklearn-Pipeline walkthrough with code. Start here if you want the runnable version of this page.</li>
        <li><a href="https://www.kaggle.com/code/alexisbcook/data-leakage" target="_blank" rel="noopener">
            Alexis Cook — <em>Data Leakage</em>, Kaggle Intermediate ML (blog + interactive)</a>
            — covers target leakage AND train-test contamination with concrete examples from real competitions.</li>
        <li><a href="https://scikit-learn.org/stable/common_pitfalls.html#data-leakage" target="_blank" rel="noopener">
            scikit-learn — <em>Common Pitfalls and Recommended Practices: Data leakage</em> (docs)</a>
            — the official sklearn guidance, including the Pipeline + GridSearchCV idiom. Authoritative reference.</li>
        <li><a href="https://www.cs.umb.edu/~ding/history/470_670_fall_2011/papers/cs670_Tran_PreferredPaper_LeakingInDataMining.pdf" target="_blank" rel="noopener">
            Kaufman, Rosset, Perlich — <em>Leakage in Data Mining: Formulation, Detection, and Avoidance</em> (paper, KDD 2011)</a>
            — the canonical paper. Formalizes leakage as 'introduction of information about the target that should not legitimately be available.'</li>
        <li><a href="https://www.youtube.com/watch?v=dWhdWxgt5SU" target="_blank" rel="noopener">
            StatQuest — Cross-Validation, clearly explained (~6 min, video)</a>
            — Josh Starmer's whiteboard intro to k-fold. Useful as the prerequisite if k-fold itself is new.</li>

            Hastie, Tibshirani, Friedman — <em>Elements of Statistical Learning</em>, Ch. 7.10 (textbook)</a>
            — the 'right way to do cross-validation' section. Free PDF. Mathematically rigorous treatment of why preprocessing must be inside the CV loop.</li>
      </ul>
    </VIS.Section>
