  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          // NO autoGloss here. Glossing terms inside option text leaks the
          // answer mechanism via hover. Authors must keep options self-contained;
          // a candidate who needs a definition can scroll up to the prose where
          // the term is explicitly wrapped via <VIS.Term>.
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// AUPRC vs AUROC for imbalanced data — G22 hover-gloss + 25 trap drills

// ROC curves: easy vs imbalanced. Both curves look great; the imbalanced one hides false positives.
const ROC_SPEC = {
  width: 560, height: 280,
  encoding: {
    x: { field: "fpr", type: "quantitative", title: "FPR = FP / (FP+TN)", scale:{domain:[0,1]} },
    y: { field: "tpr", type: "quantitative", title: "TPR = TP / (TP+FN)", scale:{domain:[0,1]} },
    color: { field: "model", type: "nominal", title: "Curve",
             scale: { domain: ["Balanced 50/50","Imbalanced 1% pos","Random baseline"],
                      range: ["#0f172a","#dc2626","#94a3b8"] } },
    strokeDash: { field: "model", type: "nominal",
                  scale: { domain:["Balanced 50/50","Imbalanced 1% pos","Random baseline"],
                           range:[[1,0],[1,0],[4,3]] } }
  },
  mark: { type: "line", strokeWidth: 3 }
};
const ROC_DATA = [];
for (let i = 0; i <= 50; i++) {
  const f = i / 50;
  // Both curves have similar AUROC ~0.93, because TPR vs FPR is prevalence-blind.
  const tpr_bal = Math.min(1, Math.sqrt(f) * 0.95 + 0.05);
  const tpr_imb = Math.min(1, Math.sqrt(f) * 0.95 + 0.05);
  ROC_DATA.push({ fpr: f, tpr: tpr_bal, model: "Balanced 50/50" });
  ROC_DATA.push({ fpr: f, tpr: tpr_imb, model: "Imbalanced 1% pos" });
  ROC_DATA.push({ fpr: f, tpr: f, model: "Random baseline" });
}

// PR curves: same two models, now precision exposes the imbalanced one.
const PR_SPEC = {
  width: 560, height: 280,
  encoding: {
    x: { field: "recall", type: "quantitative", title: "Recall = TP / (TP+FN)", scale:{domain:[0,1]} },
    y: { field: "precision", type: "quantitative", title: "Precision = TP / (TP+FP)", scale:{domain:[0,1]} },
    color: { field: "model", type: "nominal", title: "Curve",
             scale: { domain: ["Balanced 50/50 (π=0.50)","Imbalanced 1% (π=0.01)","Random π=0.50","Random π=0.01"],
                      range: ["#0f172a","#dc2626","#475569","#94a3b8"] } },
    strokeDash: { field: "model", type: "nominal",
                  scale: { domain:["Balanced 50/50 (π=0.50)","Imbalanced 1% (π=0.01)","Random π=0.50","Random π=0.01"],
                           range:[[1,0],[1,0],[4,3],[4,3]] } }
  },
  mark: { type: "line", strokeWidth: 3 }
};
const PR_DATA = [];
for (let i = 1; i <= 50; i++) {
  const r = i / 50;
  // Balanced: precision stays high (~0.9 across recall).
  PR_DATA.push({ recall: r, precision: Math.max(0.5, 0.95 - 0.10*r), model: "Balanced 50/50 (π=0.50)" });
  // Imbalanced: precision plummets — at recall=0.6 only 20% precision.
  PR_DATA.push({ recall: r, precision: Math.max(0.02, 0.55 * Math.exp(-2.0*r) + 0.04), model: "Imbalanced 1% (π=0.01)" });
  PR_DATA.push({ recall: r, precision: 0.50, model: "Random π=0.50" });
  PR_DATA.push({ recall: r, precision: 0.01, model: "Random π=0.01" });
}

const App = () => (
  <main style={{maxWidth:880,margin:"2em auto",padding:"0 16px",fontSize:16,lineHeight:1.65}}>
    <VIS.Hero pill="ML Fund · Concept" title="AUPRC vs AUROC for imbalanced data"
      subtitle={<>Why <VIS.Term def="Area under the Receiver Operating Characteristic curve. Plots TPR vs FPR across all thresholds. Robust to threshold choice but PREVALENCE-BLIND: stays high even when the model misses most of the minority class.">AUROC</VIS.Term> stays optimistic at 1% positives, while <VIS.Term def="Area under the Precision-Recall curve. Plots precision vs recall across all thresholds. Sensitive to prevalence: random baseline equals the positive-class rate π, not 0.5.">AUPRC</VIS.Term> tells the honest story.</>}
      byline={[
        {label:"Audience",value:"smart but new to ML"},
        {label:"Origin",value:"Davis & Goadrich 2006; Saito & Rehmsmeier 2015"},
      ]}/>

    <VIS.TLDR>
      On imbalanced data (positive class rate <code>π</code> &lt; 10%), AUROC lies to you because <VIS.Term def="True Positive Rate = TP / (TP + FN). The share of actual positives the model catches. Denominator depends ONLY on the positive class, so it is independent of prevalence.">TPR</VIS.Term> and <VIS.Term def="False Positive Rate = FP / (FP + TN). The share of actual negatives the model wrongly flags. Denominator is the huge negative pool under imbalance, so hundreds of false positives barely move it.">FPR</VIS.Term> are each normalised inside one class — neither sees the prevalence ratio. <VIS.Term def="Precision = TP / (TP + FP). The share of POSITIVE predictions that are correct. Denominator mixes both classes, so precision drops when negatives flood the alert queue.">Precision</VIS.Term> mixes classes in its denominator, so AUPRC drops the moment false positives outnumber true positives. <strong>Baselines:</strong> random AUROC = 0.5 always; random AUPRC = <code>π</code>.
    </VIS.TLDR>

    <VIS.Section id="sec-thought" title="Beat 1 — A thought experiment that exposes AUROC">
      <p>
        Imagine a <VIS.Term def="Detecting fraudulent credit-card transactions: rare-event binary classification with prevalence around 0.1% to 1%. Stakeholders care about precision at high recall, not AUROC.">fraud-detection</VIS.Term> dataset with 10,000 transactions: 100 fraud, 9,900 legitimate (<code>π</code> = 0.01). Your <VIS.Term def="A statistical model that learns from data instead of being explicitly programmed; here it outputs a fraud-likelihood score per transaction.">model</VIS.Term> scores every transaction and you pick a <VIS.Term def="The choice of cutoff score above which a sample is labelled positive. Sweeping this threshold from 0 to 1 traces out both the ROC and PR curves.">threshold</VIS.Term> that catches 60 of the 100 frauds. The threshold tuning gives you 60 <VIS.Term def="A positive example the model correctly flagged. In fraud, this is a real fraudulent transaction caught by the model.">true positives</VIS.Term>, 40 <VIS.Term def="A positive example the model missed. In fraud, this is a real fraudulent transaction that slipped through; usually the costliest error type.">false negatives</VIS.Term>, and — let's say — 200 <VIS.Term def="A negative example the model wrongly flagged as positive. In fraud, this is a legitimate transaction that triggered a fraud alert; investigated by humans at real cost.">false positives</VIS.Term>, 9,700 <VIS.Term def="A negative example the model correctly left alone. In fraud, this is a normal transaction that wasn't flagged.">true negatives</VIS.Term>.
      </p>
      <VIS.Mermaid chart={`
flowchart TB
  D["10000 transactions<br/>100 fraud · 9900 legit"]
  D --> M["Model flags 260 as fraud"]
  M --> TP["60 true positives<br/>TPR = 60/100 = 0.60"]
  M --> FP["200 false positives<br/>FPR = 200/9900 = 0.020"]
  TP --> A["AUROC sees<br/>TPR=0.60 at FPR=0.02<br/>looks excellent"]
  FP --> B["Precision = 60/260 = 0.23<br/>AUPRC reflects this"]
  style A fill:#fee2e2,stroke:#dc2626,stroke-width:2px
  style B fill:#dcfce7,stroke:#16a34a,stroke-width:2px
      `}/>
      <p>
        AUROC sees this as a strong <VIS.Term def="A (threshold, precision, recall, FPR) tuple the model is run at in production. Curve-summary metrics like AUROC and AUPRC average across all operating points; deployment lives at one.">operating point</VIS.Term>: TPR 0.60 at FPR 0.02. But precision is only 0.23 — three out of four fraud alerts are wrong. The <VIS.Term def="The team or system that has to act on every positive prediction — fraud analysts, content moderators, doctors. Precision = TP/(TP+FP) measures how often their action is justified.">alert investigation team</VIS.Term> drowns in false positives. AUPRC reflects the precision dimension that AUROC's <VIS.Term def="The bottom of the fraction. For FPR it is the count of all negatives — huge under imbalance, which is why hundreds of false positives barely move FPR.">denominator</VIS.Term> hides.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-defs" title="Beat 2 — Definitions and the prevalence asymmetry">
      <p>
        The two curves differ in <em>what they hold constant in the denominator</em>. ROC normalises inside each class; PR normalises across the model's positive predictions.
      </p>
      <VIS.Equation display
        tex="\text{TPR} = \frac{TP}{TP+FN},\quad \text{FPR} = \frac{FP}{FP+TN},\quad \text{Precision} = \frac{TP}{TP+FP},\quad \text{Recall} = \text{TPR}" />
      <p>
        TPR's denominator is a function of positives only; FPR's denominator is a function of negatives only. Neither depends on the <VIS.Term def="The fraction of samples that are positive: π = P / (P + N). Also called base rate, class prior, or positive rate. The single most important number for picking the right metric on imbalanced data.">prevalence</VIS.Term> π. So the <VIS.Term def="The Receiver Operating Characteristic curve: TPR plotted against FPR as the decision threshold sweeps from 1 to 0. Its area is AUROC.">ROC curve</VIS.Term> and its area are <em>identical</em> if you take the 1% positive dataset and <VIS.Term def="Replicating or synthesising minority-class examples to increase their share of the training data. Cheap fix for moderate imbalance; never apply to the test set.">over-sample positives</VIS.Term> until the dataset is 50/50 — the ranking did not change, and ROC only sees rankings inside each class.
      </p>
      <VIS.Equation display
        tex="\text{Precision} = \frac{TP}{TP+FP}\ \text{depends on}\ \pi\ \text{via}\ FP\propto N=(1-\pi)\cdot \text{total}" />
      <p>
        Precision's denominator <em>mixes</em> classes. At π = 0.50, a model with TPR 0.60 and FPR 0.02 has precision 60/(60+2) ≈ 0.97. At π = 0.01 with the same TPR and FPR it has precision 60/(60+198) ≈ 0.23. Same model, same operating point, completely different precision. That is the asymmetry AUPRC sees and AUROC misses. This is also why <VIS.Term def="The fraction of all samples the model classifies correctly: (TP+TN)/(TP+FP+TN+FN). Dominated by the majority class under imbalance, so a useless &quot;always predict negative&quot; classifier scores 0.99 at π=0.01.">accuracy</VIS.Term> is the worst metric on rare events.
      </p>
      <p>
        Two-row truth table for the punchline:
      </p>
      <table style={{width:"100%",borderCollapse:"collapse",margin:"12px 0"}}>
        <thead>
          <tr style={{background:"#f1f5f9"}}>
            <th style={{padding:"8px",border:"1px solid #cbd5e1",textAlign:"left"}}>Metric</th>
            <th style={{padding:"8px",border:"1px solid #cbd5e1",textAlign:"left"}}>Random baseline</th>
            <th style={{padding:"8px",border:"1px solid #cbd5e1",textAlign:"left"}}>Sensitive to prevalence π?</th>
          </tr>
        </thead>
        <tbody>
          <tr><td style={{padding:"8px",border:"1px solid #cbd5e1"}}>AUROC</td>
              <td style={{padding:"8px",border:"1px solid #cbd5e1"}}>0.5 (always)</td>
              <td style={{padding:"8px",border:"1px solid #cbd5e1"}}>No — invariant under class re-sampling</td></tr>
          <tr><td style={{padding:"8px",border:"1px solid #cbd5e1"}}>AUPRC</td>
              <td style={{padding:"8px",border:"1px solid #cbd5e1"}}>π (positive rate)</td>
              <td style={{padding:"8px",border:"1px solid #cbd5e1"}}>Yes — baseline tracks prevalence directly</td></tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-curves" title="Beat 3 — Two curves on the same model">
      <p>
        Below: the ROC curves for the balanced and the 1%-imbalanced versions of the same <VIS.Term def="A model that outputs a continuous score per sample (e.g. softmax probability or logistic-regression logit). Threshold this score to get a binary prediction; both ROC and PR curves come from sweeping the threshold.">scoring model</VIS.Term> are <em>identical</em>. The model's <VIS.Term def="The order in which the model places samples from highest to lowest score. Both AUROC and AUPRC are determined entirely by the ranking; any monotone transform of scores leaves them unchanged.">score-ranking</VIS.Term> didn't change, only the class proportions, and ROC is invariant to that.
      </p>
      <VIS.VegaLite spec={ROC_SPEC} data={ROC_DATA}/>
      <p>
        Now the <VIS.Term def="The Precision-Recall curve: precision plotted against recall as the threshold sweeps. Its area is AUPRC. Random baseline = π; perfect classifier sits at the top-right corner (1, 1).">PR curve</VIS.Term>s for the same two models — visibly different. The balanced model holds precision near 0.9 across recall; the 1%-imbalanced model collapses to precision below 0.2 as soon as <VIS.Term def="Recall = TP / (TP + FN) = TPR. The share of actual positives the model catches; the x-axis of the PR curve and the y-axis of the ROC curve.">recall</VIS.Term> climbs above 0.5. The random-baseline lines (dashed) show why: AUPRC's <VIS.Term def="The score a uniform-random classifier would achieve. For AUROC this is 0.5; for AUPRC it is the prevalence π. Always quote the baseline alongside the metric.">random floor</VIS.Term> is π, so the 1% model is being measured against a baseline of 0.01, not 0.5.
      </p>
      <VIS.VegaLite spec={PR_SPEC} data={PR_DATA}/>
      <p>
        Same ranks, same AUROC, completely different AUPRC. The model didn't change — the measurement did. The takeaway: on imbalanced tasks, AUROC measures whether the model can <em>rank</em> a single positive above a single negative; AUPRC measures whether the model can produce a <VIS.Term def="A short list of high-score samples sent to human reviewers or downstream automation. Precision at the top of the queue is what determines whether the system is usable in production.">prediction queue</VIS.Term> that is mostly true positives. The first is necessary; the second is what production needs.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-when" title="Beat 4 — When to use which (decision rule)">
      <VIS.Mermaid chart={`
flowchart TB
  Q["Pick a metric"]
  Q --> P{"Prevalence pi"}
  P -->|"pi greater than 0.3"| ROC["AUROC is fine"]
  P -->|"pi less than 0.1"| PR["Use AUPRC plus precision at K"]
  P -->|"pi in 0.1 to 0.3"| BOTH["Report both"]
  PR --> COST["Also compute cost-weighted recall"]
  style ROC fill:#dcfce7,stroke:#16a34a
  style PR fill:#fee2e2,stroke:#dc2626
  style BOTH fill:#fef3c7,stroke:#d97706
      `}/>
      <VIS.Callout kind="info" title="Use AUROC when classes are roughly balanced">
        For binary problems with prevalence above roughly 30%, AUROC has a clean probabilistic interpretation — <VIS.Term def="P(score(positive) > score(negative)) for a random pair. AUROC equals this probability, which is why AUROC is a pure ranking metric and ignores prevalence.">the probability that the model ranks a random positive above a random negative</VIS.Term>. Easy to communicate, robust to threshold choice.
      </VIS.Callout>
      <VIS.Callout kind="info" title="Use AUPRC when prevalence is under 10%">
        Fraud (0.1–1%), <VIS.Term def="Identifying rare diseases from medical records or imaging; positive rate often well below 1%. AUPRC tracks what radiologists experience: 'how many of the flagged cases are actually disease?'">rare-disease detection</VIS.Term> (&lt;0.01%), <VIS.Term def="Catching unsolicited or malicious messages out of a much larger non-spam stream. AUPRC is what users feel: 'of the messages routed to spam, how many were really spam?'">spam-catch at high precision</VIS.Term>, and most <VIS.Term def="The detection task is genuinely rare events, not an artificially-skewed-sample of a balanced phenomenon. The prior π in production is the prior the model is measured against.">true rare-event tasks</VIS.Term>. Tell stakeholders &quot;we catch 50% of fraud at 80% precision&quot; — that's AUPRC at an operating point, not AUROC = 0.95.
      </VIS.Callout>
      <VIS.Callout kind="gotcha" title="Random AUPRC equals π, not 0.5">
        A classifier that outputs uniform-random scores has AUROC ≈ 0.5 at every prevalence, but AUPRC ≈ π. So an AUPRC of 0.20 on a 1%-positive task is a 20× lift over random — much more impressive than the absolute number looks. Always report AUPRC alongside the random baseline π.
      </VIS.Callout>
      <VIS.Callout kind="gotcha" title="AUPRC and AUROC can disagree on model selection">
        Two models can have identical AUROC and differ in AUPRC by 3×. The one with higher AUPRC moves more <VIS.Term def="True positives ranked above false positives within the high-score region of the ROC curve. AUROC averages across ALL FPRs; AUPRC weights the high-precision (low-FPR) end of the curve more heavily, which is what matters in production.">true positives to the top of the score-ranking</VIS.Term>, which is what production cares about. Pick the metric that matches the deployment cost structure.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Don't &quot;rebalance&quot; the test set">
        Down-sampling negatives in the test set to make AUPRC look better is a serious leakage error: the test set must reflect deployment prevalence, otherwise reported AUPRC has no operational meaning. <VIS.Term def="Resampling done only on the training set to address learning-time imbalance. Never touch the test/validation set: it must match deployment prevalence for AUPRC, precision-at-K, and calibration to be honest.">Resampling lives in training only</VIS.Term>.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Test yourself — concept drill">

      <VIS.TrapProblem
        id="apr-q1"
        difficulty="medium"
        title="Q1 — Why is AUROC prevalence-invariant?"
        scenario={<><em>Discriminating insight:</em> look at what's in each denominator of TPR and FPR.</>}
        options={[
          {key:"a", text:"Because AUROC is computed using a non-parametric rank statistic that integrates out the class proportions during numerical integration."},
          {key:"b", text:"Because TPR = TP/(TP+FN) depends only on positives and FPR = FP/(FP+TN) depends only on negatives — neither denominator mixes the two classes, so resampling either class leaves the curve unchanged.", correct:true},
          {key:"c", text:"Because AUROC is mathematically equivalent to accuracy, and accuracy is prevalence-invariant under a fixed decision threshold."},
          {key:"d", text:"Because the trapezoidal-rule integration scheme used to compute AUROC averages over thresholds and cancels prevalence terms in the integral."},
        ]}
        trap={<>(a) and (d) invent numerical-method explanations. (c) confuses AUROC with accuracy — accuracy is in fact prevalence-sensitive.</>}
        lens={<>(b). Each ROC axis is normalised inside one class. Multiply your negatives by 10x: FPR is unchanged because both numerator and denominator scale together. Same for TPR with positives. So AUROC is purely a ranking statistic.</>}

      <VIS.TrapProblem
        id="apr-q2"

        title="Q2 — Random-classifier baselines: what are they?"

        options={[
          {key:"a", text:"AUROC = 0.5 and AUPRC = 0.5, both independent of prevalence."},
          {key:"b", text:"AUROC = 0.5 always; AUPRC = π (the positive class rate).", correct:true},
          {key:"c", text:"AUROC = π and AUPRC = 0.5; the prevalence-sensitive metric is AUROC."},
          {key:"d", text:"AUROC = 1 − π and AUPRC = π; both encode prevalence symmetrically."},

        trap={<>(a) ignores the prevalence sensitivity of precision. (c) flips which metric is prevalence-sensitive. (d) invents a symmetry that doesn't exist.</>}
        lens={<>(b). AUROC is a pure ranking statistic so random ranks give 0.5 regardless of π. AUPRC under random ranking averages out to precision = π at every threshold, so its area equals π. This is the single most-tested fact in the topic.</>}

        id="apr-q3"

        id="apr-q4"

          {key:"b", text:"A perfect classifier — both TPR and FPR are equal at the same threshold, so the model never errs."},

        id="apr-q9"
        difficulty="hard"
        title="Q9 — Davis &amp; Goadrich (2006) showed what about PR-space and ROC-space?"
        scenario={<><em>Discriminating insight:</em> there's a known mathematical correspondence — but with a one-way directionality.</>}
        options={[
          {key:"a", text:"Curves are independent: a high AUROC and a high AUPRC carry strictly different information that cannot be deduced from one another."},
          {key:"b", text:"There is a one-to-one mapping between PR points and ROC points for a fixed dataset, and a curve dominates in ROC space if and only if it dominates in PR space.", correct:true},
          {key:"c", text:"AUROC always lower-bounds AUPRC; if AUROC = a, then AUPRC at least a · π."},
          {key:"d", text:"PR curves are convex by construction while ROC curves can be non-convex; this is the structural difference between the two."},
        ]}
        trap={<>(a) is the popular &quot;they measure different things&quot; oversimplification. (c) invents a tidy inequality. (d) is backwards: ROC curves can be made convex (upper-convex hull); PR curves famously are NOT necessarily convex.</>}
        lens={<>(b). For a fixed test set, every (TPR, FPR) point maps to a unique (recall, precision) point and vice versa. So a model dominates in ROC-space iff it dominates in PR-space — both areas rank models the same way, even though the absolute numbers differ.</>}
        stretch={<>If dominance is equivalent, why prefer one curve over the other?</>}
      />

      <VIS.TrapProblem
        id="apr-q10"
        difficulty="hard"
        title="Q10 — Linear interpolation between PR points: safe or not?"
        scenario={<><em>Discriminating insight:</em> ROC curves are safe to interpolate linearly; PR curves are not. Why?</>}
        options={[
          {key:"a", text:"Linear interpolation in PR space is fine; precision and recall are both bounded on [0,1] so the straight line stays valid."},
          {key:"b", text:"Linear interpolation in PR space over-estimates precision between operating points because the achievable precision between two TP counts is nonlinear in FP — use the Davis–Goadrich interpolation instead.", correct:true},
          {key:"c", text:"Linear interpolation under-estimates AUPRC, so most libraries already correct for it by adding a constant offset."},
          {key:"d", text:"It is safe if and only if the classifier is calibrated; calibration ensures monotonicity of precision in recall."},
        ]}
        trap={<>(a) ignores the well-known interpolation issue. (c) and (d) invent corrections that don't exist.</>}
        lens={<>(b). Between two PR points, achievable precision lies on a curved trajectory, not a straight line. Naive linear interpolation inflates AUPRC by 1–2 points. Use the Davis–Goadrich step interpolation (or sklearn's <code>average_precision_score</code>) which weights by recall increments.</>}
      />

      <VIS.TrapProblem
        id="apr-q11"
        difficulty="medium"
        title="Q11 — sklearn: which function computes AUPRC?"
        scenario={<><em>Discriminating insight:</em> sklearn distinguishes the area under the PR curve from a related summary statistic that's actually different.</>}
        options={[
          {key:"a", text:"sklearn.metrics.roc_auc_score with average='precision_recall' — a parameter on the AUROC function."},
          {key:"b", text:"sklearn.metrics.average_precision_score — sums precision at each recall step, which is the recommended estimator and equals AUPRC under step interpolation.", correct:true},
          {key:"c", text:"sklearn.metrics.auc on the output of precision_recall_curve with trapezoidal integration; this is the canonical and most accurate route."},
          {key:"d", text:"sklearn.metrics.f1_auc — F1 area under the curve; AUPRC and F1-AUC are mathematically equivalent."},
        ]}
        trap={<>(a) and (d) are invented names. (c) is the trap most candidates fall into: trapezoidal AUC over PR points uses LINEAR interpolation and overestimates AUPRC.</>}
        lens={<>(b). <code>average_precision_score</code> uses step interpolation (weights each precision by the recall increment), matches Davis–Goadrich, and is the safe default. Avoid <code>auc(recall, precision)</code> for this reason.</>}
      />

      <VIS.TrapProblem
        id="apr-q12"
        difficulty="hard"
        title="Q12 — Multi-class extension: how is AUPRC typically reported?"
        scenario={<><em>Discriminating insight:</em> the natural extension treats each class as a one-vs-rest binary problem and aggregates.</>}
        options={[
          {key:"a", text:"AUPRC is undefined for multi-class problems; use multi-class log-loss instead."},
          {key:"b", text:"Macro-averaged AUPRC (mean of per-class AUPRC) or micro-averaged (pool all predictions and compute one PR curve); micro is sensitive to dominant classes, macro treats each class equally.", correct:true},
          {key:"c", text:"AUPRC is averaged via softmax temperature across all classes, weighted by the maximum-probability prediction per sample."},
          {key:"d", text:"Multi-class AUPRC uses a multinomial extension that requires a generalised confusion tensor; not standardly implemented in any major library."},
        ]}
        trap={<>(a) is false; it's standard. (c) invents a temperature-based fusion. (d) is overstated — macro/micro AUPRC are in every major library.</>}
        lens={<>(b). Treat as one-vs-rest, compute per-class AUPRC, then macro (mean) or micro (pooled). On long-tailed multi-class, macro is harsher because rare classes pull the mean down.</>}
        stretch={<>Which is closer to what users experience on a 1000-class imbalanced classifier — macro or micro AUPRC?</>}
      />

      <VIS.TrapProblem
        id="apr-q13"
        difficulty="medium"
        title="Q13 — F1 score and AUPRC: relationship?"
        scenario={<><em>Discriminating insight:</em> F1 is a single operating-point summary; AUPRC is a curve summary.</>}
        options={[
          {key:"a", text:"F1 = AUPRC under uniform threshold sweeping; the two are mathematically identical when the model is calibrated."},
          {key:"b", text:"F1 is the harmonic mean of precision and recall at one threshold; AUPRC integrates precision over recall across all thresholds — F1-at-best-threshold approximates a single point on the PR curve.", correct:true},
          {key:"c", text:"F1 is the AUPRC of the binary indicator function (label ≥ threshold), so the two coincide for thresholded classifiers."},
          {key:"d", text:"F1 = 2 · AUPRC / (1 + AUPRC); this is the direct formula used in most ML libraries."},
        ]}
        trap={<>(a), (c), (d) invent identities. F1 and AUPRC measure different things — one is a point, the other is an area.</>}
        lens={<>(b). F1 collapses precision and recall at one threshold into one number; AUPRC summarises the whole curve. Use F1 when you've already chosen an operating threshold; use AUPRC for threshold-agnostic model comparison.</>}
      />

      <VIS.TrapProblem
        id="apr-q14"
        difficulty="medium"
        title="Q14 — A team brags about AUROC = 0.99 on a 99.99/0.01 imbalanced task. Reasonable to celebrate?"
        scenario={<><em>Discriminating insight:</em> at extreme imbalance, AUROC can be misleadingly close to 1 while AUPRC stays close to its random baseline π.</>}
        options={[
          {key:"a", text:"Yes — AUROC = 0.99 is near-perfect and indicates a strong model regardless of prevalence."},
          {key:"b", text:"Not by itself — at π = 0.0001, even AUROC = 0.99 can correspond to AUPRC near 0.05, meaning most flagged positives are still false alarms. Always ask for AUPRC and precision-at-K.", correct:true},
          {key:"c", text:"Not in the slightest — AUROC is meaningless on heavily-imbalanced data and should be ignored."},
          {key:"d", text:"Yes, but only after confirming the test set was rebalanced to 50/50 for fair comparison with balanced benchmarks."},
        ]}
        trap={<>(a) takes AUROC at face value. (c) overcorrects — AUROC isn't meaningless, just incomplete. (d) endorses the test-set rebalancing leakage error.</>}
        lens={<>(b). At extreme imbalance, AUROC saturates near 1 long before the model is usable. The fraction of false positives in the alert queue is what matters, and only AUPRC, precision-at-K, or recall-at-precision-α capture that.</>}
      />

      <VIS.TrapProblem
        id="apr-q15"
        difficulty="hard"
        title="Q15 — Calibration vs AUPRC: do you need calibrated probabilities for AUPRC to be meaningful?"
        scenario={<><em>Discriminating insight:</em> AUPRC depends only on the score RANKING, not on the absolute probability values.</>}
        options={[
          {key:"a", text:"Yes — AUPRC integrates probabilities into the area, so an uncalibrated model has biased AUPRC."},
          {key:"b", text:"No — AUPRC is a rank-based metric. Calibrated probabilities matter for deployment thresholds and stakeholder communication, not for AUPRC itself.", correct:true},
          {key:"c", text:"Only if you use sklearn's average_precision_score; other implementations are calibration-invariant."},
          {key:"d", text:"AUPRC requires calibrated probabilities under the binary case but not under multi-class, due to the softmax temperature parameter."},
        ]}
        trap={<>(a) confuses calibration with ranking. (c) invents a library-specific dependence. (d) invents a multi-class quirk.</>}
        lens={<>(b). Any monotonic transform of scores leaves AUPRC unchanged. Calibration matters when you pick a deployment threshold or report precision-at-recall-X to a stakeholder, not for measuring the curve area.</>}
      />

      <VIS.TrapProblem
        id="apr-q16"
        difficulty="medium"
        title="Q16 — &quot;Our model has AUPRC = 0.6 and the random baseline is 0.05.&quot; What's the lift?"
        scenario={<><em>Discriminating insight:</em> AUPRC lift = AUPRC / π.</>}
        options={[
          {key:"a", text:"Lift = 0.6 - 0.05 = 0.55, a 55-point improvement over random."},
          {key:"b", text:"Lift = 0.6 / 0.05 = 12×, meaning the model concentrates positives in its ranking 12× more densely than random ranking would.", correct:true},
          {key:"c", text:"Lift = 0.6 × 0.05 = 0.03; the multiplicative form is the standard reporting convention."},
          {key:"d", text:"Lift is undefined unless AUROC is also reported, since lift requires both curves."},
        ]}
        trap={<>(a) confuses absolute gap with multiplicative lift. (c) inverts the operation. (d) is fabricated.</>}
        lens={<>(b). The natural lift is AUPRC / π; 12× lift over random ranking is much more impressive than the absolute 0.6 sounds. Always report alongside the baseline.</>}
      />

      <VIS.TrapProblem
        id="apr-q17"
        difficulty="hard"
        title="Q17 — Choosing between AUPRC and AUROC for a 5%-positive churn prediction task. Which?"
        scenario={<><em>Discriminating insight:</em> 5% prevalence is borderline — neither metric dominates.</>}
        options={[
          {key:"a", text:"AUROC alone; 5% is high enough that prevalence-sensitivity is small."},
          {key:"b", text:"AUPRC alone; below 10% prevalence is always AUPRC territory regardless of business context."},
          {key:"c", text:"Both — at 5–30% prevalence, report AUROC for ranking robustness and AUPRC for operating-point realism, and let the business decide based on cost of false-positive vs false-negative.", correct:true},
          {key:"d", text:"Neither — at 5%, use F1 score exclusively; AUROC and AUPRC are both misleading."},
        ]}
        trap={<>(a) and (b) propose rigid thresholds for what should be a context-aware choice. (d) overclaims F1.</>}
        lens={<>(c). 5–30% prevalence is the gray zone where both metrics are informative and disagree usefully. Reporting both surfaces the cost-tradeoff explicitly and avoids being trapped by either metric's blind spot.</>}
      />

      <VIS.TrapProblem
        id="apr-q18"
        difficulty="hard"
        title="Q18 — A model has AUROC = 0.95 but precision-at-recall-0.5 is only 0.10. Is AUROC lying?"
        scenario={<><em>Discriminating insight:</em> AUROC's average can hide operating-point pathologies if FPR is small but precision still rotten.</>}
        options={[
          {key:"a", text:"Yes — AUROC always over-states; reject the model."},
          {key:"b", text:"No — both numbers are correct but measure different things. AUROC averages TPR over ALL FPRs; precision-at-recall-0.5 measures the operating point that production cares about, and prevalence is hiding in the gap.", correct:true},
          {key:"c", text:"Yes — there must be a labelling error, since AUROC = 0.95 mathematically implies precision-at-recall-0.5 above 0.6."},
          {key:"d", text:"No — but only because the test set is too small; with 10× more samples, AUROC and precision-at-recall-0.5 would converge."},
        ]}
        trap={<>(a) over-generalises. (c) invents a false mathematical link. (d) blames sample size.</>}
        lens={<>(b). Two views of the same model. AUROC is averaged; precision-at-recall-0.5 is a single operating point. Under low prevalence, the gap between them widens — and the operating point is what production reality looks like.</>}
        stretch={<>Which gives the more honest story to a non-technical PM?</>}
      />

      <VIS.TrapProblem
        id="apr-q19"
        difficulty="medium"
        title="Q19 — Inverted labels: what happens to AUROC and AUPRC if you flip the positive class?"
        scenario={<><em>Discriminating insight:</em> AUROC is symmetric in a precise sense; AUPRC is not.</>}
        options={[
          {key:"a", text:"Both flip to 1 − original value; both are perfectly symmetric under label inversion."},
          {key:"b", text:"AUROC maps to 1 − AUROC (symmetric around 0.5); AUPRC changes in a non-symmetric way because the random baseline shifts from π to 1 − π and precision is renormalised.", correct:true},
          {key:"c", text:"AUROC is unchanged because it averages TPR over FPR; AUPRC drops to 0 because precision is undefined when the rare class is now the negative class."},
          {key:"d", text:"Both are unchanged — both metrics are class-label-agnostic by construction."},
        ]}
        trap={<>(a) over-symmetrises. (c) invents undefined behaviour. (d) ignores the asymmetry entirely.</>}
        lens={<>(b). AUROC flips around 0.5: a 0.95 model becomes a 0.05 model (which you then flip the predictions of to recover 0.95). AUPRC does NOT mirror cleanly — the random baseline changes from π to 1 − π, so the lift over baseline changes too. Always state which class is positive.</>}
      />

      <VIS.TrapProblem
        id="apr-q20"
        difficulty="hard"
        title="Q20 — A medical-imaging model: π = 0.001. You quote AUPRC = 0.10. The radiology team is unimpressed. Why?"
        scenario={<><em>Discriminating insight:</em> 0.10 sounds low but it's a 100× lift over random. The team's framing is operational: precision at their working recall.</>}
        options={[
          {key:"a", text:"AUPRC = 0.10 is genuinely poor; the model is barely better than random and the team is right to dismiss it."},
          {key:"b", text:"AUPRC is a 100× lift over baseline π = 0.001, but radiologists don't experience the curve — they experience the operating point. Translate to precision and recall at their working threshold: e.g. &quot;at the threshold where we catch 60% of disease, 1 in 5 flagged cases is real disease.&quot;", correct:true},
          {key:"c", text:"The team is biased against rare-disease ML in general; the metric is fine and the team should be educated about AUPRC interpretation."},
          {key:"d", text:"AUPRC at extreme imbalance is unreliable below π = 0.01; use F1 score instead and don't report AUPRC at all."},
        ]}
        trap={<>(a) underweights the lift over baseline. (c) blames the audience. (d) abandons AUPRC unnecessarily.</>}
        lens={<>(b). Stakeholders never reason in curve-areas. Translate to operating-point precision and recall at the threshold the team will actually use. AUPRC is the model-selection metric; precision-at-recall-X is the communication metric.</>}
        stretch={<>What single operating-point summary would resonate most with a clinician?</>}
      />

      <VIS.TrapProblem
        id="apr-q21"
        difficulty="medium"
        title="Q21 — Cost-weighted recall: when does it replace AUPRC?"
        scenario={<><em>Discriminating insight:</em> AUPRC weights all recall increments equally; reality often weights some false-positive or false-negative regions much more heavily.</>}
        options={[
          {key:"a", text:"Never — AUPRC is mathematically optimal for any cost structure and dominates cost-weighted summaries."},
          {key:"b", text:"When the cost of a false negative greatly exceeds a false positive (or vice versa), report expected cost over the PR curve weighted by the cost ratio; AUPRC alone hides this asymmetry.", correct:true},
          {key:"c", text:"Only for regression-based churn models; AUPRC remains the gold standard for binary classification regardless of cost asymmetry."},
          {key:"d", text:"When the model is uncalibrated; well-calibrated models do not require cost-weighting because probabilities directly encode cost."},
        ]}
        trap={<>(a) and (c) overclaim AUPRC. (d) confuses calibration with cost-weighting (separate concerns).</>}
        lens={<>(b). AUPRC treats all recall increments equally, but a missed cancer is not equal to a missed spam. When costs are asymmetric, integrate the PR curve weighted by the cost ratio (or use precision-at-recall-X for the X that matches the operational target).</>}
      />

      <VIS.TrapProblem
        id="apr-q22"
        difficulty="hard"
        title="Q22 — Two test sets: A (π = 0.01, 10,000 samples) and B (π = 0.10, 1,000 samples). Same model. Which AUPRC is higher and why?"
        scenario={<><em>Discriminating insight:</em> AUPRC is sensitive to prevalence — but the comparison is not as simple as &quot;higher π means higher AUPRC&quot;.</>}
        options={[
          {key:"a", text:"AUPRC on A will always be higher because the model has more samples to learn the rare class structure."},
          {key:"b", text:"AUPRC on B will tend to be higher because its random baseline is 10× larger (0.10 vs 0.01); the ceiling at high recall is also higher. But absolute AUPRC values from datasets of different prevalence are not directly comparable.", correct:true},
          {key:"c", text:"Equal — AUPRC is a rank-based metric and rank statistics are invariant across resampling."},
          {key:"d", text:"AUPRC on B is exactly 10× the AUPRC on A because their prevalences differ by 10×."},
        ]}
        trap={<>(a) confuses sample size with prevalence. (c) is the AUROC behaviour. (d) invents a clean 10× scaling that doesn't hold in general.</>}
        lens={<>(b). Different prevalences shift both the random baseline AND the maximum achievable precision at each recall. Compare AUPRC only within a fixed prevalence; across prevalences, compare lift over baseline (AUPRC / π) instead.</>}
      />

      <VIS.TrapProblem
        id="apr-q23"
        difficulty="hard"
        title="Q23 — A precision-recall curve is non-monotone (precision dips then rises with recall). What does that signal?"
        scenario={<><em>Discriminating insight:</em> PR curves are not required to be monotonic — local non-monotonicity reveals structure in the ranking.</>}
        options={[
          {key:"a", text:"A bug in the implementation; PR curves must be monotonic decreasing by construction."},
          {key:"b", text:"A region of the score-ranking where adding the next-scored sample pulls in a false positive faster than a true positive; common with clustered or duplicated samples near the decision region.", correct:true},
          {key:"c", text:"A perfectly calibrated model; PR curves dip only when calibration is exact."},
          {key:"d", text:"The model is overfitting to the validation set; a smooth monotone curve is the sign of a well-generalised model."},
        ]}
        trap={<>(a) claims monotonicity that isn't required. (c) confuses calibration with curve shape. (d) blames overfitting incorrectly.</>}
        lens={<>(b). Non-monotone PR curves are normal: when the next-ranked few samples are mostly false positives, precision drops locally; when the next batch is mostly true positives, precision recovers. The Davis–Goadrich step interpolation correctly handles these dips; trapezoidal interpolation does not.</>}
      />

      <VIS.TrapProblem
        id="apr-q24"
        difficulty="medium"
        title="Q24 — Threshold-free metrics: which pair would you report to a PM on a fraud-detection launch review?"
        scenario={<><em>Discriminating insight:</em> the PM wants threshold-independent confidence in the model AND a real operating-point number.</>}
        options={[
          {key:"a", text:"AUROC and accuracy."},
          {key:"b", text:"AUPRC alongside precision-at-recall-X (where X is the business-required recall), plus the random baseline π for context.", correct:true},
          {key:"c", text:"Log-loss and Brier score — both calibration-aware summaries."},
          {key:"d", text:"F1 score alone — it's the single most informative number for imbalanced classification."},
        ]}
        trap={<>(a) is the default that hides false-positive volume. (c) is good for calibration but doesn't speak to the imbalance trade-off. (d) over-collapses into one number.</>}
        lens={<>(b). AUPRC for threshold-independent model selection; precision-at-recall-X for the operating point; π for grounding. This trio lets the PM reason about both model quality and deployment cost without surprise.</>}
      />

      <VIS.TrapProblem
        id="apr-q25"
        difficulty="hard"
        title="Q25 — Cross-batch summary: AUPRC vs AUROC in one sentence."
        scenario={<><em>Discriminating insight:</em> the difference is in the denominator of precision vs the denominators of TPR and FPR.</>}
        options={[
          {key:"a", text:"AUPRC is a noisier version of AUROC; both summarise the same underlying ranking and differ only by Monte-Carlo sampling variance."},
          {key:"b", text:"AUROC averages TPR over FPR (both class-internal and prevalence-blind), while AUPRC averages precision over recall (precision mixes classes in its denominator and is prevalence-sensitive); use AUPRC when the cost of a false positive scales with the negative class size.", correct:true},
          {key:"c", text:"AUROC and AUPRC are mathematically equivalent under monotone transforms of the score; the choice is purely cosmetic and should be made based on audience preference."},
          {key:"d", text:"AUPRC dominates AUROC always; AUROC was deprecated in favour of AUPRC by the ML community after Davis &amp; Goadrich 2006."},
        ]}
        trap={<>(a) treats AUPRC as a sampling artefact. (c) is the classic &quot;same information&quot; oversimplification. (d) is historically false.</>}
        lens={<>(b). The denominator difference is the whole story. TPR and FPR each live inside one class, so prevalence cannot move them. Precision spans both classes in its denominator, so under imbalance it collapses while AUROC keeps smiling. Pick the metric whose denominator matches the operational reality of the cost structure.</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://www.biostat.wisc.edu/~page/rocpr.pdf" target="_blank" rel="noopener">
            Davis &amp; Goadrich — <em>The Relationship Between Precision-Recall and ROC Curves</em> (ICML 2006, paper)</a>
            — the foundational paper. Proves PR/ROC dominance equivalence and introduces the step interpolation now used in sklearn's <code>average_precision_score</code>.</li>
        <li><a href="https://journals.plos.org/plosone/article?id=10.1371/journal.pone.0118432" target="_blank" rel="noopener">
            Saito &amp; Rehmsmeier — <em>The Precision-Recall Plot Is More Informative than the ROC Plot When Evaluating Binary Classifiers on Imbalanced Datasets</em> (PLOS ONE 2015, paper)</a>
            — the empirical companion. Side-by-side examples of when AUROC misleads and AUPRC tells the truth.</li>
        <li><a href="https://machinelearningmastery.com/roc-curves-and-precision-recall-curves-for-imbalanced-classification/" target="_blank" rel="noopener">
            Jason Brownlee — <em>ROC and Precision-Recall Curves for Imbalanced Classification</em> (blog)</a>
            — practitioner walkthrough with sklearn code. Start here if you want hands-on intuition.</li>
        <li><a href="https://scikit-learn.org/stable/modules/generated/sklearn.metrics.average_precision_score.html" target="_blank" rel="noopener">
            scikit-learn — <em>average_precision_score</em> (docs)</a>
            — the function you should actually call. Note the warning against trapezoidal interpolation via <code>auc(recall, precision)</code>.</li>
        <li><a href="https://www.youtube.com/watch?v=4jRBRDbJemM" target="_blank" rel="noopener">
            StatQuest — ROC and AUC, clearly explained (~16 min, video)</a>
            — Josh Starmer's whiteboard walkthrough of ROC. Pair with his PR-curve follow-up for the imbalanced case.</li>
        <li><a href="https://www.fharrell.com/post/mlconfusion/" target="_blank" rel="noopener">
            Frank Harrell — <em>Classification vs. Prediction</em> (blog)</a>
            — opinionated critique of threshold-based metrics. Useful counter-weight: argues that proper scoring rules (log-loss, Brier) should often replace AUROC and AUPRC entirely.</li>
      </ul>
    </VIS.Section>
  </main>
);
