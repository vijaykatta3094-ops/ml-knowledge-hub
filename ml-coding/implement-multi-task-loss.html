<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// implement-multi-task-loss — coding
// Multi-task loss with Kendall&Gal-style learned uncertainty weighting (homoscedastic).
// Axes: numerical (loss scaling, log_sigma init), API (retain_graph for shared backbone),
// distributed (per-task grad norms), gradient (GradNorm vs uncertainty), gotchas
// (task imbalance, frozen vs trainable backbone, MTL vs STL).

const MTL_CODE = [
  "import torch",
  "import torch.nn as nn",
  "import torch.nn.functional as F",
  "",
  "class MultiTaskLoss(nn.Module):",
  "    \"\"\"Kendall & Gal (CVPR 2018) homoscedastic-uncertainty multi-task loss.",
  "",
  "    Combines K task losses with PER-TASK LEARNED weights:",
  "        total = Σ_k  (1 / (2 σ_k²)) · L_k  +  log σ_k",
  "    For numerical stability we parametrize s_k = log σ_k² (a real-valued",
  "    log-variance) so σ_k² = exp(s_k) > 0 is guaranteed and we never divide",
  "    by an un-clamped sigmoid. The penalty term log σ_k = 0.5 · s_k.",
  "",
  "    Args:",
  "        task_types: list[str] of length K, each in {'regression','classification'}.",
  "                    Regression uses 1/(2σ²) precision; classification uses 1/σ²",
  "                    (Kendall & Gal Eq. 10 — the factor differs by task type).",
  "    \"\"\"",
  "    def __init__(self, task_types):",
  "        super().__init__()",
  "        self.task_types = task_types",
  "        # Learnable log-variance per task. Init at 0 ⇒ σ²=1 ⇒ equal weighting at t=0.",
  "        # Negative init biases toward over-weighting a task (small σ²), which then",
  "        # gets pulled back by the log σ penalty during training.",
  "        self.log_var = nn.Parameter(__1__)",
  "",
  "    def forward(self, task_losses):",
  "        \"\"\"task_losses: list[Tensor] of K scalars, one per task head.\"\"\"",
  "        total = 0.0",
  "        for k, L_k in enumerate(task_losses):",
  "            s_k = self.log_var[k]",
  "            # Precision = 1 / σ² for classification, 1 / (2σ²) for regression.",
  "            # We multiply L_k by precision, NOT by σ² — confusing this inverts",
  "            # the relationship between uncertainty and weight (a noisy task ends",
  "            # up DOMINATING training instead of being down-weighted).",
  "            if self.task_types[k] == 'regression':",
  "                precision = __2__",
  "            else:  # classification",
  "                precision = torch.exp(-s_k)",
  "            # The +log σ_k term (= 0.5 · s_k) is the REGULARIZER that prevents",
  "            # the trivial solution σ_k → ∞ (which would zero out every task).",
  "            total = total + __3__",
  "        return total",
  "",
  "",
  "# ---- Usage in a training loop with shared backbone + K task heads ----",
  "def train_step(backbone, heads, mtl_loss, optimizer, batch):",
  "    \"\"\"One step of joint training. heads[k] consumes the shared backbone output.\"\"\"",
  "    optimizer.zero_grad(set_to_none=True)",
  "    z = backbone(batch['x'])               # shared features, requires_grad=True",
  "    task_losses = []",
  "    for k, head in enumerate(heads):",
  "        y_hat = head(z)",
  "        if mtl_loss.task_types[k] == 'regression':",
  "            L_k = F.mse_loss(y_hat, batch[f'y{k}'])",
  "        else:",
  "            L_k = F.cross_entropy(y_hat, batch[f'y{k}'])",
  "        task_losses.append(L_k)",
  "    # ONE combined backward — the shared backbone is on the autograd graph of",
  "    # every task loss, so a single .backward() on `total` produces the correct",
  "    # summed gradient on backbone params. retain_graph is NOT needed here.",
  "    total = __4__",
  "    total.backward()",
  "    optimizer.step()",
  "    return total.item(), [L.item() for L in task_losses]",
];

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="ML Coding · Senior MLE"
      title="Implement MultiTaskLoss — learned uncertainty weighting (Kendall & Gal)"
      subtitle="K task heads on a shared backbone. Per-task learned σ²: noisy tasks down-weight themselves. log σ penalty stops the trivial σ → ∞ collapse. One backward over the joint loss."
      byline={[
        {label:"Question type", value:"ML Coding"},
        {label:"Signature", value:"class MultiTaskLoss(nn.Module) — forward(task_losses: list[Tensor]) → Tensor"},
        {label:"Difficulty", value:"Hard"},
      ]}/>

    <VIS.TLDR>
      Combine K task losses as <code>total = Σₖ exp(−s<sub>k</sub>) · L<sub>k</sub> + 0.5 · s<sub>k</sub></code> where <code>s<sub>k</sub> = log σ<sub>k</sub>²</code> is a <VIS.Term def="A trainable scalar per task, registered as nn.Parameter so the optimizer updates it together with model weights via the same backward pass.">learnable parameter</VIS.Term>. Two ideas, each load-bearing: <strong>(1)</strong> parametrize the log-variance, not σ — exp(−s) is always positive, no clamp needed; <strong>(2)</strong> the +0.5·s penalty stops the optimizer from driving σ→∞ to zero out a hard task. A noisy task naturally gets a larger σ and a smaller weight; the model focuses on tractable supervision automatically. One <code>.backward()</code> on the joint scalar handles the shared <VIS.Term def="The trunk network whose features are consumed by every task head. Receives gradient contributions from every task simultaneously through the shared computational graph.">backbone</VIS.Term> correctly — no <code>retain_graph</code> needed.
    </VIS.TLDR>

    <VIS.Section id="sec-setup" title="The production scenario">
      <p>
        You're training a <VIS.Term def="A model that learns several related prediction targets simultaneously, sharing a common feature extractor. Lets information from one task improve another via shared representations.">multi-task model</VIS.Term> for a self-driving perception stack: depth regression (per-pixel meters), semantic segmentation (19 classes), and 2D-instance detection (bbox + score). All three heads consume the same <VIS.Term def="The shared feature-extraction trunk (e.g., a ResNet-50 or HRNet) whose output tensor feeds every task head. Its parameters receive gradient contributions from every task.">shared backbone</VIS.Term>. The first instinct — sum the three losses with hand-tuned scalar weights — fails reproducibly: the depth loss is in meters² (≈ 10), cross-entropy is in nats (≈ 0.5), and bbox L1 is in normalized coords (≈ 0.05). A single scalar coefficient sweep over 3 tasks is 3-D grid search; over 8 tasks it's a research project. <VIS.Term def="Kendall, Gal, and Cipolla, CVPR 2018: 'Multi-Task Learning Using Uncertainty to Weigh Losses for Scene Geometry and Semantics'. Introduced learnable σ per task as a principled alternative to grid-searched scalar weights.">Kendall & Gal (2018)</VIS.Term> replaces the hand-tuned coefficients with K learned scalars and lets gradient descent balance them.
      </p>
      <p>
        The conceptual move: each task k has an unknown <VIS.Term def="Task-level noise that is constant across inputs — captures how inherently noisy or hard the supervision is. Contrasts with heteroscedastic uncertainty, which varies per input.">homoscedastic uncertainty</VIS.Term> σₖ. Under a Gaussian likelihood for regression and a scaled softmax for classification, the negative log-likelihood factors into <code>(1/(2σ²))·L + log σ</code>. Train σₖ jointly with the weights. The <VIS.Term def="A penalty term whose only job is to prevent a degenerate solution. Here, log σ stops the optimizer from sending σ→∞ to zero out a task it dislikes.">regularizer</VIS.Term> <code>log σ</code> is the load-bearing piece — without it, σ→∞ gives loss <code>− log σ → −∞</code> and the task vanishes.
      </p>
      <p>
        The most-shipped bugs cluster across five axes. <strong>Numerical:</strong> weighting by σ² instead of 1/σ² (inverts the uncertainty relationship); poor <code>log_var</code> init that lets one task swallow training. <strong>API:</strong> calling <code>.backward()</code> per task with stale <code>retain_graph=True</code> when one combined backward is correct and cheaper. <strong>Distributed:</strong> per-task gradient norms vary by 100×; without per-task <VIS.Term def="Logging the L2 norm of each task's gradient contribution to the shared backbone — diagnostic for whether one task dominates updates. Lives next to total grad-norm in MLflow/W&amp;B.">grad-norm monitoring</VIS.Term> you can't tell which task is dominating. <strong>Gradient:</strong> <VIS.Term def="Chen et al. 2018: an alternative MTL weighting scheme that explicitly equalizes per-task gradient norms on the shared backbone. Requires an extra backward to measure grad norms.">GradNorm</VIS.Term> targets per-task grad-norm equality directly, which is different from σ-weighting. <strong>Gotchas:</strong> <VIS.Term def="When tasks have wildly different difficulty, dataset sizes, or loss scales, one task can dominate the shared backbone gradient and starve the others. Symptom: easy task's val metric tracks STL, hard tasks regress.">task imbalance</VIS.Term>, frozen vs trainable backbone, and the underdiscussed <VIS.Term def="Multi-Task Learning. Training one model to predict multiple targets jointly via shared parameters.">MTL</VIS.Term> vs <VIS.Term def="Single-Task Learning. Training one separate model per target. The baseline MTL must beat to justify the engineering complexity.">STL</VIS.Term> regression check.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-primer" title="Concept primer — why log σ saves the algorithm">
      <p>
        <strong>The naive recipe is the trap.</strong> Write <code>total = Σ w_k · L_k</code> with hand-tuned scalars <code>w_k</code>. Now make the <code>w_k</code> learnable parameters and train. Gradient on <code>w_k</code> is <code>L_k</code> itself, which is non-negative for losses (MSE, cross-entropy). Descending on <code>w_k</code> drives every weight to its lower bound — typically zero — and the joint loss collapses to 0 with no learning. You need a counter-force.
      </p>
      <p>
        <strong>Kendall & Gal's counter-force is principled.</strong> Derive the weight from a probabilistic model. For regression with Gaussian likelihood <code>N(f(x), σ²)</code>, the negative log-likelihood per example is <code>(1/(2σ²))(y − f(x))² + 0.5 log(2πσ²)</code>. Drop the constant <code>0.5 log 2π</code> and you have <code>(1/(2σ²)) · L + 0.5 log σ²</code>. The first term is the precision-weighted loss; the second term is the <VIS.Term def="The price the model pays to claim that a task is noisy. Without it, every task would claim infinite noise to drop out of training. With it, the optimizer trades precision-on-task against admission-of-uncertainty.">uncertainty penalty</VIS.Term>. As σ grows, the precision term shrinks but the penalty grows; the optimum is at the σ that matches the empirical task <VIS.Term def="The unexplained part of the supervision — how much of the target the model cannot predict from inputs alone. For regression, the residual MSE. For classification, the irreducible cross-entropy from label noise.">irreducible noise</VIS.Term>.
      </p>
      <p>
        <strong>The numerical trick: parametrize log σ², not σ.</strong> If you store σ as a parameter you must clamp it positive (e.g., <code>σ = softplus(raw)</code>) and the derivatives carry the clamp through. If you store <code>s = log σ²</code> directly, then <code>1/σ² = exp(−s)</code> and <code>log σ = 0.5 · s</code>, both well-defined for all real s. exp is its own derivative — the gradient on s is <code>0.5 · (1 − exp(−s) · L)</code>, which is zero at <code>exp(−s) = 1/L</code>, i.e., σ² = L. The optimum is the empirical task loss itself, which is exactly what "homoscedastic uncertainty" should be.
      </p>
      <p>
        <strong>Classification differs by a factor of 2.</strong> For a softmax likelihood scaled by 1/σ², Kendall & Gal show the equivalent penalty is <code>log σ</code> with a <code>1/σ²</code> precision (not <code>1/(2σ²)</code>). The factor-of-2 difference matters only at <VIS.Term def="The phase early in training when σ values are still moving rapidly. Once σ² has tracked task loss for a few thousand steps, the factor of 2 is absorbed into a near-constant shift of log σ.">early σ dynamics</VIS.Term>; both forms work in practice. Most reference implementations use <code>1/(2σ²)</code> for both task types, which is a small approximation but rarely a bug.
      </p>
      <p>
        <strong>Contrast with the alternatives.</strong> <VIS.Term def="The simplest MTL baseline: pick scalars w_k by grid search on a validation set. Works for K=2-3; explodes combinatorially beyond that. The number every MTL paper compares against.">fixed-weight summation</VIS.Term> is the static baseline. <VIS.Term def="GradNorm: instead of weighting by uncertainty, target equal gradient norms across tasks on the shared backbone. Adjusts weights to keep ||∂L_k/∂θ_shared|| equal across k. Different objective, similar effect.">GradNorm</VIS.Term> targets per-task grad-norm equality on the backbone — fundamentally a different objective (equal influence, not equal information). <VIS.Term def="Yu et al. NeurIPS 2020 — Projecting Conflicting Gradients. When two tasks' gradients on shared params have negative cosine similarity, project one onto the orthogonal complement of the other before stepping. Surgery on gradients, not on weights.">PCGrad / gradient surgery</VIS.Term> projects conflicting per-task gradients orthogonally. Kendall & Gal stays the most popular because it adds K extra parameters total — not K per-layer like GradNorm — and integrates trivially with any existing trainer.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-impl" title="The implementation">
      <VIS.CodeFillin
        id="mtl-impl"
        difficulty="hard"
        title="MultiTaskLoss — fill in the 4 blanks"
        language="python"
        code={MTL_CODE}
        options={[
          {key:"init_zero",     text:"torch.zeros(len(task_types))",                             fills:[1]},
          {key:"reg_precision", text:"0.5 * torch.exp(-s_k)",                                    fills:[2]},
          {key:"loss_with_penalty", text:"precision * L_k + 0.5 * s_k",                          fills:[3]},
          {key:"joint_loss",    text:"mtl_loss(task_losses)",                                    fills:[4]},
          // Decoys
          {key:"init_neg",          text:"torch.full((len(task_types),), -2.0)  # over-weights tasks at t=0; pulled back by penalty but starts off-balance"},
          {key:"sigma_squared",     text:"torch.exp(s_k)  # this is σ², not 1/σ² — INVERTS the uncertainty relationship"},
          {key:"no_penalty",        text:"precision * L_k  # missing the log σ regularizer ⇒ σ → ∞ collapse"},
          {key:"wrong_sign",        text:"precision * L_k - 0.5 * s_k  # wrong sign on penalty; encourages σ → ∞ even faster"},
          {key:"sigma_not_logvar",  text:"nn.Parameter(torch.ones(len(task_types)))  # parametrizing σ directly, no positivity guarantee"},
          {key:"per_task_backward", text:"for L in task_losses: L.backward(retain_graph=True)  # K backwards on the shared backbone — correct numerically but wastes compute and forgets to include the σ regularizer"},
          {key:"sum_losses_naive",  text:"sum(task_losses)  # ignores per-task σ; collapses to fixed-weight 1.0 baseline"},
          {key:"detached_total",    text:"mtl_loss(task_losses).detach()  # cuts the graph — backward becomes a no-op"},
        ]}
        trap={<>
          The 4 most-shipped bugs:<br/>
          (1) <code>precision = torch.exp(s_k)</code> — uses σ² instead of 1/σ². A noisy task ends up with a LARGER weight; the model focuses on the loudest noise.<br/>
          (2) Forgetting the <code>+ 0.5 · s_k</code> term. Training drives every σ → ∞ and every task loss disappears from the total within a few hundred steps. Symptom: total loss decreases monotonically while every task metric is random-baseline.<br/>
          (3) Parametrizing σ directly (<code>nn.Parameter(torch.ones(K))</code>) without softplus. Optimizer can push σ negative; <code>1/σ²</code> stays positive but the math is no longer a likelihood.<br/>
          (4) Calling <code>.backward()</code> per task with <code>retain_graph=True</code>. Correct numerically (gradients sum into <code>.grad</code>) but wastes a backward per task AND skips the σ regularizer unless you backward the penalty separately.
        </>}
        lens={<>
          Reference:
          <pre style={{background:"#f1f5f9", padding:"10px 14px", borderRadius:6, fontSize:13, overflow:"auto"}}>{`self.log_var = nn.Parameter(torch.zeros(K))      # s_k init at 0 ⇒ σ²=1
precision    = 0.5 * torch.exp(-s_k)             # 1/(2σ²)
total        += precision * L_k + 0.5 * s_k      # weighted loss + penalty
total.backward()                                 # ONE backward; backbone gets the right grad`}</pre>
          The fixed point of gradient descent on s_k satisfies <code>exp(−s_k) · L_k = 1</code>, i.e., σ_k² = L_k. The model converges with each σ² tracking its task's empirical loss.
        </>}
        stretch={<>Write the equivalent module under a <strong>fixed-weight</strong> baseline. Answer: <code>total = sum(w_k * L_k for k in range(K))</code> with <code>w_k</code> as registered buffers, not Parameters. Compare a 2-task run (depth + segmentation) under (a) Kendall σ-weighting and (b) the best fixed weights from grid search. On Cityscapes, σ-weighting matches or beats grid search at a fraction of the search cost.</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-traps" title="20 trap drills — bugs that ship">
      <p>Each drill isolates a single bug. The bugs cluster across five axes: <VIS.Term def="Per-task loss-scale balancing, σ initialization, the log σ penalty sign, and the choice of log-variance vs σ parametrization.">numerical</VIS.Term>, <VIS.Term def="retain_graph semantics, where backward is called, and what nn.Parameter vs nn.Buffer means for σ.">API</VIS.Term>, <VIS.Term def="Per-task gradient-norm monitoring and DDP all-reduce semantics over the shared backbone.">distributed</VIS.Term>, <VIS.Term def="Uncertainty weighting vs GradNorm vs PCGrad — different mechanisms with different fixed points.">gradient</VIS.Term>, and the <VIS.Term def="Frozen-backbone vs trainable-backbone behavior; MTL vs STL regression checks; auxiliary-loss design.">gotchas</VIS.Term> family.</p>

      <VIS.TrapProblem
        id="mtl-q1"
        difficulty="medium"
        mode="single"
        title="Why precision = 1/σ², not σ²?"
        scenario={<>You're staring at the line <code>total += w_k · L_k + penalty</code> and need to choose w_k. Which is the correct precision factor for a regression task?</>}
        options={[
          {key:"a", text:"σ_k² (variance) — a noisier task gets more weight to compensate.", correct:false},
          {key:"b", text:"1 / (2σ_k²) — a noisier task gets LESS weight; certainty is rewarded.", correct:true},
          {key:"c", text:"σ_k (standard deviation, linear).", correct:false},
          {key:"d", text:"1 — uncertainty doesn't affect the weight.", correct:false},
        ]}
        trap={<>(a) inverts the relationship — a noisy task ends up DOMINATING the gradient because you weighted it heavier. The whole point of Kendall & Gal is that noisy tasks should auto-down-weight themselves, not auto-up-weight.</>}
        lens={<>Derivation: under a Gaussian likelihood N(f(x), σ²), the negative log-likelihood is (1/(2σ²))(y-f(x))² + const + log σ. The 1/(2σ²) is the precision of a Gaussian.</>}
      />

      <VIS.TrapProblem
        id="mtl-q2"
        difficulty="hard"
        mode="single"
        title="What happens without the log σ penalty?"
        scenario={<>A junior teammate's first draft has <code>total = Σ (1/(2σ_k²)) · L_k</code> — clean precision-weighted sum, no <code>+ log σ</code>. They argue "the penalty is a regularizer; not strictly necessary." You let them run it. What's the symptom 1000 steps in?</>}
        options={[
          {key:"a", text:"Loss converges normally; the penalty was indeed cosmetic.", correct:false},
          {key:"b", text:"Total loss collapses to ~0 within 500 steps while every per-task validation metric tracks the random baseline. σ_k diverges to infinity on every task.", correct:true},
          {key:"c", text:"Training diverges — total loss explodes to inf.", correct:false},
          {key:"d", text:"Per-task losses oscillate but converge eventually.", correct:false},
        ]}
        trap={<>The optimizer discovers it can drive σ_k → ∞ to make 1/(2σ²)·L_k → 0 for each task. Without log σ as a counter-force, this is the global minimum of the joint loss — and it's catastrophic: the network learns nothing because every task's gradient vanishes.</>}
        lens={<>The log σ term is not regularization — it's part of the likelihood. Calling it "regularizer" is the cognitive bug; it's a constitutive piece of the loss.</>}
      />

      <VIS.TrapProblem
        id="mtl-q3"
        difficulty="medium"
        mode="single"
        title="Why parametrize log σ², not σ directly?"
        scenario={<>Two designs: (A) store σ as <code>nn.Parameter</code>, compute <code>1/σ²</code> directly. (B) store <code>s = log σ²</code>, compute <code>exp(-s)</code>. What's wrong with (A)?</>}
        options={[
          {key:"a", text:"(A) is fine; both are mathematically equivalent.", correct:false},
          {key:"b", text:"(A) has no positivity guarantee — SGD can push σ ≤ 0; 1/σ² stays defined for σ ≠ 0 but the probabilistic interpretation breaks.", correct:true},
          {key:"c", text:"(A) is slower because division is slower than exp.", correct:false},
          {key:"d", text:"(A) has worse gradients because the derivative of 1/σ² involves σ³.", correct:false},
        ]}
        trap={<>(d) is a real point but secondary — the primary reason is positivity. With log σ² parametrization, σ² = exp(s) > 0 unconditionally and 'σ went negative on step 47' isn't a failure mode you have to defend against.</>}
        lens={<>The same idiom appears in VAEs (log_var head), Gaussian process priors, and any place a variance is learned. Log-parametrize, always.</>}
      />

      <VIS.TrapProblem
        id="mtl-q4"
        difficulty="hard"
        mode="single"
        title="What's the fixed point of gradient descent on s_k?"
        scenario={<>For regression task k, the loss term is <code>(1/(2σ²)) · L_k + 0.5 · log σ²</code>. At the fixed point of gradient descent on <code>s = log σ²</code>, what equation does σ² satisfy?</>}
        options={[
          {key:"a", text:"σ² = 1 always (the initialization).", correct:false},
          {key:"b", text:"σ² = L_k (the empirical task loss).", correct:true},
          {key:"c", text:"σ² = 0 (the task is solved).", correct:false},
          {key:"d", text:"σ² = mean(L_k across k) (equalization).", correct:false},
        ]}
        trap={<>(d) is the GradNorm intuition leaking in. Kendall & Gal does NOT equalize losses across tasks — it sets each σ_k² to its own task's residual.</>}
        lens={<>∂/∂s [(1/2)exp(-s)·L + 0.5·s] = -0.5·exp(-s)·L + 0.5 = 0 ⇒ exp(-s) = 1/L ⇒ exp(s) = L ⇒ σ² = L. Each task's σ² tracks its own irreducible noise.</>}
      />

      <VIS.TrapProblem
        id="mtl-q5"
        difficulty="hard"
        mode="multi"
        title="One backward vs K backwards on the shared backbone"
        scenario={<>You have K tasks on a shared backbone. Choose all correct statements about backward strategies.</>}
        options={[
          {key:"a", text:"Calling .backward() ONCE on the joint scalar total produces the same .grad on backbone params as K separate per-task backwards summed.", correct:true},
          {key:"b", text:"K separate .backward() calls require retain_graph=True on all but the last, because each backward frees the graph by default.", correct:true},
          {key:"c", text:"K separate backwards are ALWAYS faster than one joint backward.", correct:false},
          {key:"d", text:"The σ-regularizer (log σ) is only gradient-connected to log_var via the joint total — per-task backwards on L_k alone won't update log_var.", correct:true},
          {key:"e", text:"K backwards on the same graph give different numerical results than one joint backward.", correct:false},
        ]}
        trap={<>(c) is the reverse of reality — K backwards cost K times more on the shared backbone, since each backward retraces the whole graph. (e) confuses ordering with correctness — addition is associative in the gradient.</>}
        lens={<>The shared backbone receives ∂L_total/∂θ = Σ_k ∂L_k/∂θ via the chain rule, regardless of whether you call .backward() once on the sum or K times on the addends. One call is just cheaper.</>}
      />

      <VIS.TrapProblem
        id="mtl-q6"
        difficulty="medium"
        mode="single"
        title="Initializing log_var"
        scenario={<>What init for <code>self.log_var = nn.Parameter(...)</code> in MultiTaskLoss(K)?</>}
        options={[
          {key:"a", text:"torch.zeros(K) — σ² = 1, equal weighting at step 0.", correct:true},
          {key:"b", text:"torch.full((K,), -2.0) — over-weights every task initially; faster early progress.", correct:false},
          {key:"c", text:"torch.randn(K) — break symmetry like layer weights.", correct:false},
          {key:"d", text:"torch.full((K,), 10.0) — large σ² ⇒ small weight; gentle start.", correct:false},
        ]}
        trap={<>(b) sounds reasonable but creates a Catch-22: the heavily-weighted task moves first, drives the backbone toward its solution, the other tasks see a worse-fitted backbone and their L_k grows, σ_k follows, and you've biased the trajectory. (c) introduces unnecessary noise. (d) drowns the gradient signal early.</>}
        lens={<>Symmetric zero-init is the standard recipe. Once L_k diverges across tasks (one is harder), σ_k follows naturally over the first few hundred steps.</>}
      />

      <VIS.TrapProblem
        id="mtl-q7"
        difficulty="hard"
        mode="single"
        title="retain_graph in a multi-task setup"
        scenario={<>When does <code>retain_graph=True</code> on <code>.backward()</code> become NECESSARY (not just safe) in a multi-task setup?</>}
        options={[
          {key:"a", text:"Always — multi-task setups need it.", correct:false},
          {key:"b", text:"When you compute the joint total scalar and call .backward() once on it.", correct:false},
          {key:"c", text:"When you call .backward() separately on each task loss AND want to backward through the same shared backbone for the next task.", correct:true},
          {key:"d", text:"When the backbone has dropout or batchnorm.", correct:false},
        ]}
        trap={<>(a) is the reflex answer that wastes memory and time — retain_graph keeps activations alive past their use. (b) is wrong because the joint backward frees the graph normally; you don't need it. (c) is the actual case: each backward pass tries to free the same shared graph; the second one crashes without retain_graph.</>}
        lens={<>retain_graph is a memory liability — every activation in the forward graph is held in VRAM until you stop calling .backward(). Avoid it by computing one joint scalar and backwarding once.</>}
      />

      <VIS.TrapProblem
        id="mtl-q8"
        difficulty="hard"
        mode="single"
        title="Per-task gradient norms on the backbone"
        scenario={<>You suspect one task is dominating the shared backbone. Cheapest diagnostic to confirm?</>}
        options={[
          {key:"a", text:"Compare per-task validation metrics; the dominant task improves while others stall.", correct:false},
          {key:"b", text:"Compute ||∂L_k/∂θ_backbone||₂ for each k by per-task .backward() with retain_graph=True, then log the K norms to W&B. The dominant task has 10-100× the norm of the others.", correct:true},
          {key:"c", text:"Compare per-task σ_k values at convergence.", correct:false},
          {key:"d", text:"Check that .grad is non-zero on backbone params.", correct:false},
        ]}
        trap={<>(a) is the symptom, not the diagnostic. (c) confuses output (σ) with input (gradient); σ may be balanced and gradients still imbalanced if the precision-weighted losses are imbalanced. (d) is a sanity check, not a diagnostic for imbalance.</>}
        lens={<>This is what GradNorm explicitly targets — equalizing per-task ||∂L_k/∂θ_shared||. Even if you use Kendall & Gal weighting, logging these norms is the standard MTL diagnostic.</>}
      />

      <VIS.TrapProblem
        id="mtl-q9"
        difficulty="medium"
        mode="single"
        title="MTL beats STL — what's the right test?"
        scenario={<>You ship a 3-task MTL model. What single experiment proves MTL is worth the added complexity vs 3 separate STL models?</>}
        options={[
          {key:"a", text:"MTL total parameters &lt; sum of 3 STL parameters.", correct:false},
          {key:"b", text:"MTL training time &lt; sum of 3 STL training times.", correct:false},
          {key:"c", text:"Per-task validation metric for at least 2 of 3 tasks is ≥ the corresponding STL model trained to convergence.", correct:true},
          {key:"d", text:"Joint training loss curve is smooth.", correct:false},
        ]}
        trap={<>(a) and (b) are real wins of MTL but they don't justify shipping a model that's WORSE per-task. The point of MTL is shared representations help each task; if MTL regresses every metric, fewer parameters and faster training don't matter.</>}
        lens={<>The honest comparison is "MTL vs 3 STL trained with the same compute budget." If MTL loses on all 3 tasks, the shared representation is hurting. Ship 3 STLs.</>}
      />

      <VIS.TrapProblem
        id="mtl-q10"
        difficulty="hard"
        mode="multi"
        title="GradNorm vs Kendall & Gal — what's the difference?"
        scenario={<>Both are MTL weighting schemes. Pick the true statements.</>}
        options={[
          {key:"a", text:"Kendall & Gal targets each σ_k² to match the per-task irreducible noise. GradNorm targets per-task gradient norms on the shared backbone to be equal.", correct:true},
          {key:"b", text:"GradNorm requires K extra backward passes per step to compute per-task grad norms.", correct:true},
          {key:"c", text:"Kendall & Gal adds K learnable parameters total; GradNorm adds K learnable parameters total.", correct:true},
          {key:"d", text:"GradNorm always outperforms Kendall & Gal on benchmark MTL setups.", correct:false},
          {key:"e", text:"Both methods set the same fixed point of σ_k.", correct:false},
        ]}
        trap={<>(d) overclaims — the two are competitive on standard benchmarks; pick whichever fits your trainer (K&G is cheaper). (e) is wrong: K&G's fixed point is σ_k² = L_k (per-task), GradNorm's is ||∂L_k/∂θ|| = const across k. These coincide only when per-task losses already have similar gradient magnitudes.</>}
        lens={<>K&G is cheaper per step but assumes Gaussian-likelihood derivations. GradNorm is more general but requires the K-backward overhead and a target rate of grad-norm equalization.</>}
      />

      <VIS.TrapProblem
        id="mtl-q11"
        difficulty="medium"
        mode="single"
        title="Frozen backbone — should we still use Kendall & Gal?"
        scenario={<>You freeze the backbone (e.g., a pretrained CLIP) and train only the K task heads. Should you still use MultiTaskLoss with learned σ?</>}
        options={[
          {key:"a", text:"Yes, exactly the same recipe.", correct:false},
          {key:"b", text:"No — with no shared trainable params, there's no gradient competition between tasks. Each head trains independently; σ-weighting is moot. Use fixed weights (or train K independent heads).", correct:true},
          {key:"c", text:"Yes, but only for the regression tasks.", correct:false},
          {key:"d", text:"Yes, but you must double the σ values.", correct:false},
        ]}
        trap={<>The σ-weighting solves a coupling problem: K losses fighting for one set of shared weights. Remove the coupling (freeze backbone, separate heads) and the problem dissolves; σ-weighting is just an unnecessary K extra parameters.</>}
        lens={<>The architectural lens: σ-weighting is useful exactly when and to the degree that backbone gradient is contested. A frozen backbone has no contest.</>}
      />

      <VIS.TrapProblem
        id="mtl-q12"
        difficulty="medium"
        mode="single"
        title="Auxiliary losses vs primary losses"
        scenario={<>You add a self-supervised auxiliary loss (e.g., a reconstruction head) alongside K supervised losses. Should the auxiliary loss live under the same MultiTaskLoss σ-weighting?</>}
        options={[
          {key:"a", text:"Yes, treat it as task K+1 with its own σ.", correct:false},
          {key:"b", text:"Often no — fix the auxiliary at a small constant weight (e.g., 0.1). Auxiliary losses are tools to shape the backbone; you don't WANT them to down-weight themselves to zero when they're doing their job.", correct:true},
          {key:"c", text:"Yes, but with a negative σ init.", correct:false},
          {key:"d", text:"No, auxiliary losses cannot have gradients.", correct:false},
        ]}
        trap={<>(a) is the reflex answer and is often wrong. Under K&G, a successful auxiliary loss has low L_k, which means high precision (low σ²), which weights it MORE — pulling the backbone away from the primary tasks. The opposite of what you wanted.</>}
        lens={<>Auxiliary losses are regularizers, not targets. Treat them as such — fixed weight, hand-tuned, not learned.</>}
      />

      <VIS.TrapProblem
        id="mtl-q13"
        difficulty="hard"
        mode="single"
        title="DDP all-reduce — does MTL change the picture?"
        scenario={<>You wrap your MTL model in DistributedDataParallel across 8 GPUs. What changes about the all-reduce hooks compared to single-task DDP?</>}
        options={[
          {key:"a", text:"You must call all-reduce manually per task.", correct:false},
          {key:"b", text:"Nothing — DDP all-reduces .grad on every parameter once per .backward() call; whether .grad came from one task or K is invisible to DDP. One joint backward = one all-reduce.", correct:true},
          {key:"c", text:"DDP can't handle multiple losses.", correct:false},
          {key:"d", text:"You must use FSDP instead of DDP.", correct:false},
        ]}
        trap={<>(a) is the per-task-backward trap leaking in. (c)/(d) are FUD — DDP doesn't care how many forward passes produced the graph; it hooks the .backward() at the .grad level.</>}
        lens={<>If you DO use per-task .backward() with retain_graph, each call triggers an all-reduce — paying K× the comm cost. Another reason to prefer one joint backward.</>}
      />

      <VIS.TrapProblem
        id="mtl-q14"
        difficulty="hard"
        mode="single"
        title="Negative total loss — is something broken?"
        scenario={<>After 50 epochs of Kendall & Gal training, you log total_loss = -3.2. Is this a bug?</>}
        options={[
          {key:"a", text:"Yes — losses must be non-negative; something is broken.", correct:false},
          {key:"b", text:"No — the +0.5·log σ² term goes negative when σ² &lt; 1 (i.e., a well-fitted task). Negative TOTAL loss is normal and not a bug.", correct:true},
          {key:"c", text:"Yes — σ has gone negative.", correct:false},
          {key:"d", text:"Yes — the model is overfitting.", correct:false},
        ]}
        trap={<>(a) is the wrong cognitive frame — the K&G total is a negative log likelihood (up to constants), not a sum of non-negative losses. It's perfectly free to be negative when the model is well-calibrated.</>}
        lens={<>Monitor per-task L_k separately; those remain non-negative for MSE and cross-entropy and tell you the real story.</>}
      />

      <VIS.TrapProblem
        id="mtl-q15"
        difficulty="medium"
        mode="single"
        title="Loss scaling under mixed precision (AMP)"
        scenario={<>You train MTL under AMP with GradScaler. Where does the scaler.scale() multiply?</>}
        options={[
          {key:"a", text:"Inside MultiTaskLoss.forward, on each per-task loss.", correct:false},
          {key:"b", text:"On the joint total scalar, before .backward(): scaler.scale(total).backward(). Scaler is task-agnostic; it just rescales the loss before backward to avoid fp16 underflow.", correct:true},
          {key:"c", text:"On the log_var parameter directly.", correct:false},
          {key:"d", text:"AMP is incompatible with MTL.", correct:false},
        ]}
        trap={<>(a) breaks the σ-regularizer math because scaling per-task losses also scales the log σ penalty inconsistently — the precision and penalty pieces would scale by different factors. Scale the WHOLE total once.</>}
        lens={<>AMP composes orthogonally with K&G. The scaler multiplies the loss tensor; backward unscales the gradients; optimizer sees the un-scaled gradient. log_var trains normally.</>}
      />

      <VIS.TrapProblem
        id="mtl-q16"
        difficulty="hard"
        mode="single"
        title="Task imbalance — what if one task has 100× more samples?"
        scenario={<>Task A has 1M samples; task B has 10K. Same backbone, same K&G loss. What happens to σ?</>}
        options={[
          {key:"a", text:"σ_B grows because task B's loss is noisier in finite samples; this is correct behavior.", correct:false},
          {key:"b", text:"σ_A grows because task A dominates the backbone.", correct:false},
          {key:"c", text:"σ-weighting balances per-batch losses but doesn't compensate for per-task batch frequency. If you sample task A 99× more often than task B, task B's gradient is starved REGARDLESS of σ. Fix with batch composition (equalize task frequency in each batch), not σ.", correct:true},
          {key:"d", text:"Nothing changes; K&G handles it.", correct:false},
        ]}
        trap={<>(d) is the reflex answer that misses that σ rescales the PRESENT loss; it can't rescale absent gradient. If batches don't include task B, σ_B doesn't update either.</>}
        lens={<>Batch sampling and loss weighting are independent axes. K&G handles per-batch scale; round-robin or stratified sampling handles per-task frequency.</>}
      />

      <VIS.TrapProblem
        id="mtl-q17"
        difficulty="medium"
        mode="single"
        title="Should log_var be in the optimizer's parameter list?"
        scenario={<>You define <code>self.log_var = nn.Parameter(torch.zeros(K))</code> inside <code>MultiTaskLoss</code>. The optimizer is created over <code>list(backbone.parameters()) + list(heads.parameters())</code>. Does log_var get updated?</>}
        options={[
          {key:"a", text:"Yes — nn.Parameter is auto-discovered everywhere.", correct:false},
          {key:"b", text:"No — log_var lives in MultiTaskLoss, which isn't in your parameter list. The optimizer can't update what it doesn't own. You must add list(mtl_loss.parameters()) explicitly.", correct:true},
          {key:"c", text:"It gets updated only on epoch boundaries.", correct:false},
          {key:"d", text:"It updates via the .grad hook automatically.", correct:false},
        ]}
        trap={<>This is one of the most-shipped bugs in actual MTL repos. .backward() computes .grad on log_var correctly; the optimizer skips it because it isn't in the param list; σ stays at its init value forever. The model looks like it's training but the weighting is frozen.</>}
        lens={<>Always include <code>list(mtl_loss.parameters())</code> in the optimizer construction. Or — make MultiTaskLoss a submodule of the main nn.Module so backbone.parameters() picks it up.</>}
      />

      <VIS.TrapProblem
        id="mtl-q18"
        difficulty="hard"
        mode="multi"
        title="Properties any correct MTL loss should satisfy"
        scenario={<>Which of these should hold for any correct Kendall & Gal MultiTaskLoss implementation? (CI assertions.)</>}
        options={[
          {key:"a", text:"At log_var = 0, total = 0.5 · Σ L_k. (σ²=1 ⇒ precision = 0.5; penalty = 0.)", correct:true},
          {key:"b", text:"Gradient of total w.r.t. log_var[k] equals 0 when σ_k² = L_k. (Fixed-point check.)", correct:true},
          {key:"c", text:"As σ_k → ∞, the k-th term goes to +∞ (penalty dominates).", correct:true},
          {key:"d", text:"As σ_k → 0+, the k-th term goes to +∞ (precision dominates).", correct:true},
          {key:"e", text:"Total loss is invariant to multiplying any L_k by a constant.", correct:false},
        ]}
        trap={<>(e) is wrong and an important non-property: scaling L_k by 100 shifts the fixed-point σ_k² to 100·(original), which shifts the optimal contribution by log(100). The loss is NOT scale-invariant per-task. This is why per-task normalization (loss-scale calibration) is still worth tuning.</>}
        lens={<>(a)-(d) are 4-line property tests that catch most of the bug families in the rest of this section. Worth shipping in your test suite.</>}
      />

      <VIS.TrapProblem
        id="mtl-q19"
        difficulty="medium"
        mode="single"
        title="Detecting the σ² ↔ 1/σ² inversion in CI"
        scenario={<>You suspect the precision is the wrong way around (someone wrote <code>torch.exp(s_k)</code> instead of <code>torch.exp(-s_k)</code>). Cheapest unit test?</>}
        options={[
          {key:"a", text:"Train for 1000 steps on a synthetic 2-task problem where task A has loss ~10 and task B has loss ~0.1, both stable. Correct K&G converges to σ_A² ≈ 10, σ_B² ≈ 0.1. Inverted K&G drives BOTH σ to 0 (precision-weighted term goes to ∞).", correct:true},
          {key:"b", text:"Assert log_var stays at zero forever.", correct:false},
          {key:"c", text:"Pass zero losses and check that total = 0.", correct:false},
          {key:"d", text:"Compare against scipy's NLL implementation.", correct:false},
        ]}
        trap={<>(b) doesn't differentiate (the bug appears only under training). (c) holds for both correct and inverted under all-zero losses — uninformative.</>}
        lens={<>The signal in (a) is the asymmetry: correct K&G separates σ_A and σ_B; inverted K&G collapses them together AND blows up training. Two distinguishing observations from one test.</>}
      />

      <VIS.TrapProblem
        id="mtl-q20"
        difficulty="hard"
        mode="multi"
        title="Pre-deploy gates for a Kendall & Gal MTL pipeline"
        scenario={<>You're shipping a K=4 MTL model. Which gates catch the bug families before production?</>}
        options={[
          {key:"a", text:"Property test: total = 0.5·Σ L_k at log_var=0; fixed-point gradient zero when σ² = L; +∞ behavior at σ → 0 and σ → ∞.", correct:true},
          {key:"b", text:"Smoke test: train 1000 steps on synthetic 2-task data with known task losses; assert each σ_k² is within 20% of the empirical L_k at convergence.", correct:true},
          {key:"c", text:"MTL vs STL comparison: at the same compute budget, MTL must match or beat ≥ 2 of 4 STL baselines on per-task validation metrics.", correct:true},
          {key:"d", text:"log_var must be in optimizer.param_groups[0]['params']. (One line of assert.)", correct:true},
          {key:"e", text:"Total loss must be non-negative.", correct:false},
        ]}
        trap={<>(e) is the cognitive trap (re-asked from Q14): the K&G total can go negative when tasks are well-fit (σ² &lt; 1 ⇒ log σ² &lt; 0). Asserting non-negativity will fire on healthy training and obscure real bugs.</>}
        lens={<>(d) is the most-shipped bug in real MTL repos. The σ never updates because the optimizer never owns it. One assert catches it in CI.</>}
      />

      <VIS.TrapProblem
        id="mtl-q21"
        difficulty="hard"
        mode="single"
        title="When K=1 (just one task), does Kendall & Gal degenerate?"
        scenario={<>You instantiate <code>MultiTaskLoss(['regression'])</code> with a single task. What happens?</>}
        options={[
          {key:"a", text:"Bug — K must be ≥ 2.", correct:false},
          {key:"b", text:"The σ-weighting is mathematically valid but produces an identical optimization to plain MSE up to a deterministic scaling. There's no MTL benefit because there's no coupling.", correct:true},
          {key:"c", text:"Identical to plain MSE.", correct:false},
          {key:"d", text:"The σ explodes because there's no penalty term.", correct:false},
        ]}
        trap={<>(c) is almost right but misses the deterministic per-step scaling: the effective LR on backbone params is (1/(2σ²)) times the plain-MSE LR, with σ tracking L. Over many steps this is absorbed into LR scheduling, hence "identical optimization up to deterministic scaling."</>}
        lens={<>The σ machinery exists to resolve K-way competition for the backbone. With K=1, there's no competition and σ does no work. Useful smoke test.</>}
      />

      <VIS.TrapProblem
        id="mtl-q22"
        difficulty="medium"
        mode="single"
        title="Comparing K&G to fixed-weight grid search"
        scenario={<>You ran a 2-task grid search over fixed weights and found best at w_depth=0.3, w_seg=0.7. K&G ran without any tuning and converged to σ²_depth = 9.4, σ²_seg = 0.42. Are these consistent?</>}
        options={[
          {key:"a", text:"No — completely different.", correct:false},
          {key:"b", text:"Yes — effective K&G weights are 1/(2·σ²), so 1/18.8 ≈ 0.053 for depth and 1/0.84 ≈ 1.19 for seg. Normalized to sum to 1: w_depth ≈ 0.04, w_seg ≈ 0.96. Roughly consistent with grid search direction (seg dominates) but K&G assigns seg even more weight.", correct:true},
          {key:"c", text:"Yes — σ² values directly compare to grid-search weights.", correct:false},
          {key:"d", text:"Cannot compare; different paradigms.", correct:false},
        ]}
        trap={<>(c) confuses σ² with weight. (a) misses that K&G's weights are 1/(2σ²), so the implied weight ratios are interpretable.</>}
        lens={<>The implied weight from K&G shifts during training as σ moves. Grid search gives one static answer; K&G gives a trajectory. They agree on direction more often than on absolute values.</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://arxiv.org/abs/1705.07115" target="_blank" rel="noopener"><strong>Kendall, Gal, Cipolla — Multi-Task Learning Using Uncertainty to Weigh Losses</strong> (CVPR 2018)</a> — the originating paper; clear derivation from Gaussian and softmax likelihoods.</li>
        <li><a href="https://arxiv.org/abs/1711.02257" target="_blank" rel="noopener"><strong>Chen et al. — GradNorm</strong> (ICML 2018)</a> — the per-task-gradient-norm-equalization alternative; the right comparison baseline.</li>
        <li><a href="https://arxiv.org/abs/2001.06782" target="_blank" rel="noopener"><strong>Yu et al. — PCGrad: Gradient Surgery for Multi-Task Learning</strong> (NeurIPS 2020)</a> — projects conflicting gradients orthogonally; complements rather than replaces K&G.</li>
        <li><a href="https://ruder.io/multi-task/" target="_blank" rel="noopener"><strong>Sebastian Ruder — An Overview of Multi-Task Learning in Deep Neural Networks</strong> (blog)</a> — the practitioner's tour of MTL recipes. Best starting point if you've never shipped an MTL model.</li>
        <li><a href="https://github.com/yaringal/multi-task-learning-example" target="_blank" rel="noopener"><strong>Yarin Gal — reference implementation</strong> (GitHub)</a> — minimal Keras implementation by one of the original authors; reads in 50 lines.</li>
        <li><a href="https://www.youtube.com/watch?v=UdXfsAr4Gjw" target="_blank" rel="noopener"><strong>Sebastian Raschka — Multi-Task Learning explained</strong> (~20 min, video)</a> — clean whiteboard walk-through covering uncertainty weighting and GradNorm side-by-side.</li>
      </ul>
    </VIS.Section>
  </main>
);
