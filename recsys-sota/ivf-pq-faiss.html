<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// REDO v2 — RecSys-SOTA batch 15
// IVF-PQ (Faiss) — billion-scale ANN on a memory diet
// Unique mechanism: cluster the vector space with k-means (Inverted File / IVF),
// then encode each vector with PRODUCT QUANTIZATION (PQ) — split the vector
// into M subvectors and replace each subvector with the nearest code in a
// per-subvector codebook. Lookup = find closest centroids (nprobe), then
// approximate the distance with PQ table lookups.
// Anchor that survives redaction: "cluster space into K cells (IVF); encode each
// vector as a product of subvector codes (PQ); lookup = closest centroids + PQ
// distance approximations." Compact codes (~16 bytes per vector); lossy.
// ANN-trio caution:
//   HNSW    = proximity graph (RAM-heavy, log-time)
//   IVF-PQ  = clustering + product quantization (compact but lossy) [THIS visual]
//   ScaNN   = anisotropic quantization (loss-aware, MIP-tuned)

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="RecSys SOTA · Sparse retrieval / ANN"
      title="IVF-PQ (Faiss) — billion-scale ANN on a memory diet"
      subtitle="Cluster vectors into K cells (IVF). Encode each vector as M subvector codes (PQ). Lookup = closest centroids + PQ distance tables. ~16 bytes per vector at the cost of recall."
      byline={[
        {label: "Paper", value: "Jegou et al. 2011 (PQ) + Sivic & Zisserman 2003 (IVF); widely deployed in Faiss 2024-2026"},
        {label: "Surface", value: "Billion-scale catalogs where RAM is the binding constraint, not the last few recall points"},
        {label: "Anchor that survives redaction", value: "K-means cells (IVF) + product-quantized codes (PQ); ~16 bytes/vector; lookup = closest centroids + PQ approximations"},
      ]}/>

    <VIS.TLDR>
      IVF-PQ is the canonical answer when the catalog will not fit in RAM as raw vectors. <strong>IVF</strong> partitions the vector space into K cells via k-means; at query time you probe the <code>nprobe</code> closest cells instead of scanning every vector. <strong>PQ</strong> chops each vector into M equal subvectors and replaces each subvector with the index of its nearest entry in a per-subvector codebook of (usually) 256 entries - the whole vector compresses to M bytes (often M=16, hence ~16 bytes per vector). The senior trap: IVF-PQ is NOT &ldquo;just an ANN index.&rdquo; It is specifically a <em>clustering + quantization</em> stack whose compactness lets a billion vectors live in ~16 GB - but whose tail recall collapses if cluster sizes are imbalanced and <code>nprobe</code> misses the cell holding the true neighbor.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is — IVF cells plus PQ codes">
      <VIS.Mermaid chart={`flowchart TB
  V["Vector v in R^d"]
  IVF["K-means cells (IVF), pick nprobe closest"]
  SPLIT["Split v into M subvectors"]
  PQ["Each subvector becomes one byte code in its codebook"]
  IDX["Per-cell inverted list of (id, M-byte code)"]
  Q["Query q"]
  Q --> IVF
  V --> SPLIT --> PQ --> IDX
  IVF --> SCAN["Scan only the nprobe cells"]
  SCAN --> DIST["PQ distance via precomputed tables"]
  DIST --> R["Top-k candidates"]`} />
      <ul>
        <li><strong>IVF (Inverted File)</strong> - cluster all vectors with k-means into K cells (typical K = 4096-65536). At query, score each centroid; probe only the <code>nprobe</code> closest cells. This is the &ldquo;skip 99% of the catalog&rdquo; trick.</li>
        <li><strong>PQ (Product Quantization)</strong> - split each vector into M equal-length subvectors. For each subvector position, learn a 256-entry codebook by k-means. Encode the subvector as the byte-index of its nearest codebook entry. The whole vector now lives in M bytes.</li>
        <li><strong>Distance approximation</strong> - at query time, precompute a (M x 256) table of subvector-to-query distances once. Each candidate distance is M table lookups + sum. No raw vectors needed.</li>
      </ul>
      <p>The full catalog fits in M bytes per vector. The trade is recall: PQ approximation introduces error, and the <code>nprobe</code> heuristic can miss the true cell.</p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How IVF-PQ differs from HNSW and ScaNN">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8, fontSize:14}}>
        <thead><tr style={{background:"#1f3a5f", color:"#fff"}}>
          <th style={{textAlign:"left", padding:8}}>Method</th>
          <th style={{textAlign:"left", padding:8}}>Core mechanism</th>
          <th style={{textAlign:"left", padding:8}}>Memory</th>
          <th style={{textAlign:"left", padding:8}}>Recall ceiling</th>
        </tr></thead>
        <tbody>
          <tr><td style={{padding:8}}>HNSW</td><td style={{padding:8}}>Proximity graph, greedy walk</td><td style={{padding:8}}>Full vectors + edges in RAM</td><td style={{padding:8}}>Very high (raw vectors)</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:8}}><strong>IVF-PQ</strong></td><td style={{padding:8}}><strong>k-means cells + product-quantized codes</strong></td><td style={{padding:8}}><strong>~16 bytes/vector</strong></td><td style={{padding:8}}><strong>Capped by PQ error</strong></td></tr>
          <tr><td style={{padding:8}}>ScaNN</td><td style={{padding:8}}>Anisotropic quantization, inner-product-aware</td><td style={{padding:8}}>Compact, MIP-tuned</td><td style={{padding:8}}>Higher than PQ for MIP</td></tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — 24 trap problems">
      <p style={{color:"#475569"}}>Each problem cites the axis it draws from. Pick, then reveal.</p>

      <VIS.TrapProblem id="ivf-p1" difficulty="hard"
        title="P1 — IVF-PQ vs HNSW: load-bearing difference"
        scenario={<><em>Discriminating insight: HNSW keeps raw vectors and a graph in RAM and walks the graph. IVF-PQ keeps NO raw vectors - just ~16-byte codes and an inverted-file index. Memory profile is ~100x smaller, recall ceiling is lower, and tail recall depends on nprobe choosing the right cell.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"IVF-PQ stores no raw vectors - only k-means centroids and ~16-byte PQ codes per vector. ANN search probes nprobe closest cells and approximates distances via PQ tables. HNSW stores raw vectors AND a graph; greedy walk over raw vectors. ~100x memory advantage for IVF-PQ; lower recall ceiling.", correct:true},
          {key:"b", text:"They use the same memory profile."},
          {key:"c", text:"IVF-PQ is a graph method."},
          {key:"d", text:"Both store raw vectors."},
        ]}
        trap={<>(b)(c)(d) collapse the clustering-plus-quantization mechanism that defines IVF-PQ.</>}
        lens={<>k-means cells + quantized codes vs proximity graph over raw vectors.</>}
        stretch={<>What is the per-vector byte cost of HNSW at d=768, M=32?</>}
      />

      <VIS.TrapProblem id="ivf-p2" difficulty="hard"
        title="P2 — IVF-PQ vs ScaNN: anchor each"
        scenario={<><em>Discriminating insight: PQ minimizes generic L2 reconstruction error in each subvector codebook. ScaNN&apos;s anisotropic quantization weights the error along the inner-product axis so the codes preserve the distance that actually matters for MIP search. Same compactness, smarter codebook.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"IVF-PQ&apos;s codebooks are trained to minimize generic L2 reconstruction error per subvector. ScaNN&apos;s anisotropic quantization weights the error in the direction of inner product - the loss that matters for max-inner-product retrieval. Same byte budget, smarter codes for MIP.", correct:true},
          {key:"b", text:"They optimize the same loss."},
          {key:"c", text:"ScaNN drops the IVF stage."},
          {key:"d", text:"IVF-PQ is anisotropic by default."},
        ]}
        trap={<>(b)(c)(d) confuse the quantization objective.</>}
        lens={<>PQ = isotropic L2 codes. ScaNN = anisotropic MIP-aware codes.</>}
        stretch={<>Why does ScaNN&apos;s edge over PQ shrink for L2-based image retrieval?</>}
      />

      <VIS.TrapProblem id="ivf-p3" difficulty="medium"
        title="P3 — Without IVF-PQ, what is the realistic fallback?"
        scenario={<><em>Discriminating insight: realistic fallbacks at billion-scale are DiskANN (disk-resident graph), HNSW sharded across many boxes (RAM-expensive), or ScaNN (compact but tuned for inner-product). IVF-PQ sits at the cheapest-RAM end of the spectrum.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"DiskANN (graph index streamed from disk), HNSW sharded across many RAM-heavy boxes, or ScaNN if the embedding is inner-product. IVF-PQ sits at the cheapest-RAM corner of the design space; the others give back some RAM-cost for higher recall.", correct:true},
          {key:"b", text:"Brute-force scan is at parity."},
          {key:"c", text:"Random retrieval suffices."},
          {key:"d", text:"BM25 is the fallback."},
        ]}
        trap={<>(b)(c)(d) under-shoot ANN at scale.</>}
        lens={<>IVF-PQ is the cheapest-RAM corner; alternatives trade RAM for recall.</>}
        stretch={<>What is DiskANN&apos;s recall edge over IVF-PQ?</>}
      />

      <VIS.TrapProblem id="ivf-p4" difficulty="hard"
        title="P4 — Compose IVF-PQ with OPQ (Optimized Product Quantization)"
        scenario={<><em>Discriminating insight: OPQ applies a learned rotation R to the data before PQ so the subvectors are statistically decorrelated - each subvector codebook covers a more compact region, and the PQ approximation error drops. IVF-OPQ is the standard production variant.</em><br/>What does OPQ add?</>}
        options={[
          {key:"a", text:"OPQ learns a rotation R that decorrelates the dimensions before PQ splits them. Each subvector is more compact in the rotated basis, so PQ error drops for the same byte budget. IVF-OPQ is the standard production variant; same byte cost, better recall.", correct:true},
          {key:"b", text:"OPQ is a different distance metric."},
          {key:"c", text:"OPQ adds a graph on top of IVF."},
          {key:"d", text:"OPQ doubles the byte budget."},
        ]}
        trap={<>(b)(c)(d) miss the rotation mechanism.</>}
        lens={<>Rotate to decorrelate; PQ compresses tighter for free.</>}
        stretch={<>What is OPQ&apos;s typical recall lift over plain PQ?</>}
      />

      <VIS.TrapProblem id="ivf-p5" difficulty="medium"
        title="P5 — Below what catalog size does IVF-PQ stop paying for itself?"
        scenario={<><em>Discriminating insight: IVF-PQ&apos;s compactness pays off only when raw vectors do not fit in RAM. Below ~10M-50M vectors, HNSW&apos;s recall edge dominates the RAM savings. The crossover depends on dim, M, and recall target.</em><br/>Where is the boundary?</>}
        options={[
          {key:"a", text:"Below tens of millions of vectors, the RAM savings are too small to matter and HNSW&apos;s higher recall ceiling wins. IVF-PQ&apos;s value proposition is RAM-bound scale - it shines exactly where HNSW&apos;s graph blows the RAM budget.", correct:true},
          {key:"b", text:"IVF-PQ always wins."},
          {key:"c", text:"IVF-PQ wins only at tiny scale."},
          {key:"d", text:"Scale is irrelevant."},
        ]}
        trap={<>(b)(c)(d) miss the RAM-vs-scale trade.</>}
        lens={<>IVF-PQ&apos;s edge is exactly the regime where HNSW runs out of RAM.</>}
        stretch={<>What is the per-vector byte cost of M=8 vs M=32 PQ?</>}
      />

      <VIS.TrapProblem id="ivf-p6" difficulty="hard"
        title="P6 — Pick the retrieval architecture"
        scenario={<><em>Discriminating insight: a 2B-doc semantic catalog at 3k QPS, p95 latency 30 ms, recall@100 target 0.92, single-box budget. HNSW does not fit. ScaNN is overkill if the embedding is not strictly MIP. IVF-PQ at M=16, nprobe=64 fits in ~32 GB and meets the recall floor.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"IVF-PQ at M=16, nprobe=64 - 2B 16-byte codes fit in ~32 GB; PQ table lookup meets 30 ms; recall@100 at 0.92 is reachable with a properly tuned nprobe. HNSW would need many TB of RAM; ScaNN is for tighter latency budgets and strictly inner-product embeddings.", correct:true},
          {key:"b", text:"HNSW - but does not fit in RAM at 2B vectors."},
          {key:"c", text:"Brute-force scan - 30 ms budget impossible at 2B."},
          {key:"d", text:"LSH - recall floor below 0.92."},
        ]}
        trap={<>(b) RAM. (c) latency. (d) recall.</>}
        lens={<>2B + RAM cap + 0.92 recall = IVF-PQ.</>}
        stretch={<>What changes at recall@10 = 0.99 target?</>}
      />

      <VIS.TrapProblem id="ivf-p7" difficulty="hard"
        title="P7 — Sounds reasonable: &ldquo;just add IVF cells to HNSW&rdquo;"
        scenario={<><em>Discriminating insight: people propose &ldquo;IVF over HNSW&rdquo; to reduce graph search scope. The architectures are orthogonal mechanisms (cell partitioning vs proximity-graph walking); fusing them naively duplicates work and rarely beats either pure variant. The win path is HNSW-PQ (graph topology + quantized vectors), not IVF + graph.</em><br/>Why is &ldquo;IVF on top of HNSW&rdquo; usually a mistake?</>}
        options={[
          {key:"a", text:"IVF cells already approximate locality; running a proximity-graph walk inside each cell duplicates the work the cell partition is supposed to short-circuit. The right composition is HNSW-PQ: keep graph topology, compress per-node vectors. Not IVF wrapping HNSW.", correct:true},
          {key:"b", text:"IVF and HNSW always compose for free."},
          {key:"c", text:"IVF and HNSW are identical."},
          {key:"d", text:"Faiss already does this internally."},
        ]}
        trap={<>(b)(c)(d) collapse the mechanism distinction.</>}
        lens={<>Compose orthogonally - graph + quantization, not partitioning + graph.</>}
        stretch={<>What does HNSW-PQ in Faiss actually look like?</>}
      />

      <VIS.TrapProblem id="ivf-p8" difficulty="hard"
        title="P8 — IVF-PQ&apos;s anchor (cells + product codes + lookup tables): pitch it"
        scenario={<><em>Discriminating insight: the anchor names all three pieces - k-means cells, product-quantized codes, and the precomputed distance table that turns scoring into M table lookups. A pitch missing any one is a near-miss.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"IVF-PQ partitions the vector space into K cells via k-means and probes the nprobe closest cells per query. Each vector is encoded into M (typically 16) byte-codes by product quantization. Per-query, a (M x 256) distance table is precomputed once and candidate distances are M table lookups. Fits a billion vectors in ~16 GB.", correct:true},
          {key:"b", text:"IVF-PQ is a proximity-graph walk."},
          {key:"c", text:"IVF-PQ is brute-force scan."},
          {key:"d", text:"IVF-PQ is locality-sensitive hashing."},
        ]}
        trap={<>(b) is HNSW. (c) is the baseline. (d) is LSH.</>}
        lens={<>Cells + product codes + precomputed lookup tables - all three.</>}
        stretch={<>Which of the three is hardest to engineer well?</>}
      />

      <VIS.TrapProblem id="ivf-p9" difficulty="hard" multiSelect
        title="P9 — When NOT to use IVF-PQ. Select 3."
        scenario={<><em>Discriminating insight: IVF-PQ needs (i) catalog too big for raw-vector RAM, (ii) recall budget that tolerates PQ error, (iii) stable cluster sizes. It is wrong for tiny catalogs, recall-saturated tasks, or distributions that produce massively imbalanced cells.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"Catalog of 1M items where HNSW fits comfortably and gives higher recall.", correct:true},
          {key:"b", text:"Recall-saturated task where the application needs recall above 0.995 (PQ error caps below this).", correct:true},
          {key:"c", text:"Embedding distribution with massively imbalanced clusters - one cell holds 30% of vectors and nprobe probes can miss the true neighbor.", correct:true},
          {key:"d", text:"2B-vector catalog at 30 ms latency with recall@100 = 0.92 target - production sweet spot."},
          {key:"e", text:"Real-time updates with millisecond-fresh inserts where rebuilding cells is acceptable nightly."},
        ]}
        trap={<>(d) sweet spot. (e) plausible-not-wrong - rebuilds are doable.</>}
        lens={<>IVF-PQ needs scale + recall headroom + balanced clusters.</>}
        stretch={<>What diagnoses cluster imbalance early?</>}
      />

      <VIS.TrapProblem id="ivf-p10" difficulty="hard"
        title="P10 — Why PRODUCT quantization, not scalar?"
        scenario={<><em>Discriminating insight: a single (scalar) codebook over d-dim vectors needs 2^(d*log2(256)) entries to be expressive - impossible. Product quantization factorizes the codebook into M smaller (256-entry) codebooks, each over a subvector. Codebook size grows linearly in M, not exponentially in d.</em><br/>Why product?</>}
        options={[
          {key:"a", text:"A single codebook covering R^d at byte-level granularity needs an exponentially large entry count. Product quantization factorizes the codebook into M smaller codebooks, each over a d/M-dim subvector - codebook size scales linearly in M, not exponentially in d. The factorization is what makes byte-coded ANN feasible.", correct:true},
          {key:"b", text:"Product is just a code name."},
          {key:"c", text:"Product reduces the distance metric."},
          {key:"d", text:"Product is for batch processing."},
        ]}
        trap={<>(b)(c)(d) miss the factorization argument.</>}
        lens={<>Factorize the codebook to avoid exponential blow-up.</>}
        stretch={<>What is the equivalent of M=1 PQ?</>}
      />

      <VIS.TrapProblem id="ivf-p11" difficulty="hard"
        title="P11 — nprobe: what does it control?"
        scenario={<><em>Discriminating insight: nprobe is the number of cells visited per query. Bigger nprobe = more cells scanned = more candidates = higher recall and higher latency. The recall-vs-nprobe curve typically has an elbow; production runs to the right of it for safety.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"nprobe = number of IVF cells visited per query. Bigger nprobe = more candidates = higher recall and linearly higher latency. The recall-vs-nprobe curve has an elbow; production tunes just past it.", correct:true},
          {key:"b", text:"nprobe controls the codebook size."},
          {key:"c", text:"nprobe controls the number of subvectors M."},
          {key:"d", text:"nprobe is the batch size."},
        ]}
        trap={<>(b)(c)(d) confuse nprobe with PQ knobs.</>}
        lens={<>nprobe trades recall for latency, linearly.</>}
        stretch={<>What does the recall-vs-nprobe elbow look like at K=4096?</>}
      />

      <VIS.TrapProblem id="ivf-p12" difficulty="hard"
        title="P12 — What does IVF-PQ deliberately drop vs HNSW?"
        scenario={<><em>Discriminating insight: HNSW gives raw-vector distance and high recall ceiling; IVF-PQ gives approximate distance via PQ tables. The drop is distance fidelity in exchange for ~100x memory savings.</em><br/>What does IVF-PQ forfeit?</>}
        options={[
          {key:"a", text:"Distance fidelity. PQ approximates true distance through subvector codebook lookups; the error caps recall regardless of nprobe. The gain is per-vector memory dropping from ~3 KB to ~16 bytes - the only way to fit a billion vectors on one box.", correct:true},
          {key:"b", text:"IVF-PQ forfeits the use of vectors."},
          {key:"c", text:"IVF-PQ forfeits clustering."},
          {key:"d", text:"IVF-PQ forfeits the distance metric."},
        ]}
        trap={<>(b)(c)(d) miss the property dropped.</>}
        lens={<>Distance fidelity is the deliberate sacrifice; memory is the gain.</>}
        stretch={<>What does the PQ-error vs M curve look like?</>}
      />

      <VIS.TrapProblem id="ivf-p13" difficulty="hard"
        title="P13 — Most fragile knob"
        scenario={<><em>Discriminating insight: nprobe dominates the recall floor at query time - too low and the true nearest cell is missed entirely, recall falls off a cliff. M (subvector count) is sticky (set at build time, controls byte budget and approximation error). K (cell count) is robust within a wide range.</em><br/>Rank by 2x mis-set breakage.</>}
        options={[
          {key:"a", text:"nprobe is most fragile - too low and the right cell is missed and recall collapses, especially in the long tail. M is next (sticky, controls byte budget and error floor). K is most forgiving over a wide range.", correct:true},
          {key:"b", text:"K is most fragile."},
          {key:"c", text:"M is most fragile."},
          {key:"d", text:"Random seed is most fragile."},
        ]}
        trap={<>(b) wide-range robust. (c) sticky but predictable. (d) noise.</>}
        lens={<>nprobe is the production-tunable cliff; M is the build-time floor.</>}
        stretch={<>What does the recall@1000 vs nprobe curve look like under imbalance?</>}
      />

      <VIS.TrapProblem id="ivf-p14" difficulty="medium"
        title="P14 — Data assumption violations"
        scenario={<><em>Discriminating insight: IVF-PQ assumes the k-means cells partition the embedding distribution evenly enough that nprobe captures the true neighbor. Skewed distributions (e.g., 30% of vectors collapse into 1 cell after a content change) violate this and tail recall craters.</em><br/>Which violation is most direct?</>}
        options={[
          {key:"a", text:"Skewed embedding distribution that produces wildly imbalanced k-means cells. The big cells hold most candidates; nprobe of small cells misses the true neighbor with high probability. The fix is residual rebalancing or retraining the IVF centroids on the current distribution.", correct:true},
          {key:"b", text:"Vector ids serialized with a different endianness."},
          {key:"c", text:"Query embeddings normalized but doc embeddings are not (or vice versa)."},
          {key:"d", text:"Lookup tables stored in the wrong memory tier."},
        ]}
        trap={<>(b)(c)(d) generic infra, not IVF-PQ-specific.</>}
        lens={<>Cluster balance is the load-bearing assumption.</>}
        stretch={<>What dashboard surfaces cluster size skew?</>}
      />

      <VIS.TrapProblem id="ivf-p15" difficulty="hard"
        title="P15 — Intuitive but wrong: &ldquo;just raise nprobe to fix recall&rdquo;"
        scenario={<><em>Discriminating insight: nprobe pushes recall up linearly in latency until you have probed all K cells (which is brute-force scan). If recall@1000 is collapsing because clusters are imbalanced, nprobe up to the elbow helps - but beyond the elbow, latency explodes for marginal recall. Often the real fix is rebalancing or higher M.</em><br/>Why is &ldquo;just bump nprobe&rdquo; usually wrong?</>}
        options={[
          {key:"a", text:"nprobe up to the recall-vs-nprobe elbow gives cheap recall. Past the elbow, latency grows linearly for negligible recall gain. If recall is capped by PQ error (M too small) or cluster imbalance, nprobe cannot fix it - rebalance the cells or raise M.", correct:true},
          {key:"b", text:"nprobe always fixes recall."},
          {key:"c", text:"nprobe is unrelated to recall."},
          {key:"d", text:"nprobe is a build-time knob."},
        ]}
        trap={<>(b)(c)(d) miss the nprobe elbow.</>}
        lens={<>nprobe past the elbow is wasted latency.</>}
        stretch={<>What does the cost-per-recall-point curve look like past the elbow?</>}
      />

      <VIS.TrapProblem id="ivf-p16" difficulty="hard"
        title="P16 — Wrong-assumption cascade"
        scenario={<><em>Discriminating insight: assuming &ldquo;IVF-PQ is a black box ANN&rdquo; cascades into (i) skipping cluster balance monitoring (recall craters silently), (ii) shipping default M=8 codes (recall ceiling too low), (iii) under-setting nprobe (recall floor below SLO).</em><br/>What breaks?</>}
        options={[
          {key:"a", text:"All three: cluster balance, M (byte budget / recall ceiling), and nprobe (recall floor). Each is load-bearing for IVF-PQ specifically; black-boxing it loses all three.", correct:true},
          {key:"b", text:"Only cluster balance."},
          {key:"c", text:"Only nprobe."},
          {key:"d", text:"Nothing - IVF-PQ IS a black box."},
        ]}
        trap={<>(d) the seductive misread.</>}
        lens={<>IVF-PQ has three operational contracts; black-boxing breaks all three.</>}
        stretch={<>What dashboard panel surfaces these three?</>}
      />

      <VIS.TrapProblem id="ivf-p17" difficulty="medium"
        title="P17 — Senior vs junior framing"
        scenario={<><em>Discriminating insight: a junior responds to recall@10 great + recall@1000 bad by raising nprobe blindly. A senior measures cluster sizes first: if a handful of cells hold most of the catalog, the long-tail recall problem is cluster imbalance, not nprobe. The diagnostic is cluster-size histogram.</em><br/>Which lever first?</>}
        options={[
          {key:"a", text:"Plot the cluster-size histogram. If a few cells hold most vectors, nprobe cannot rescue tail recall - the true neighbor often lives in a small cell that nprobe skips. Rebalance (retrain centroids on current data, or use residual-IVF). nprobe is the right lever only when cells are roughly balanced.", correct:true},
          {key:"b", text:"Raise nprobe unconditionally."},
          {key:"c", text:"Drop nprobe."},
          {key:"d", text:"Switch to HNSW."},
        ]}
        trap={<>(b)(c) skip diagnosis. (d) abandons IVF-PQ.</>}
        lens={<>Cluster balance is the IVF-PQ-specific tail-recall diagnostic.</>}
        stretch={<>What does a healthy cluster-size histogram look like?</>}
      />

      <VIS.TrapProblem id="ivf-p18" difficulty="hard"
        title="P18 — Plausible-misattribution: subvector ordering changed in training"
        scenario={<><em>Discriminating insight: recall@100 dropped 8 points after a routine codebook retrain. Index was fully rebuilt; nprobe unchanged. Actual cause: the data-loader subtly permuted dimensions before subvector split (a refactor that shuffled feature columns), so the M subvectors now cover different dimension groups than before. The codebooks are valid but cover the wrong subvectors at query time.</em><br/>Recall@100 -8 points after codebook retrain. Index rebuilt, nprobe unchanged. Most likely cause?</>}
        options={[
          {key:"a", text:"Codebook training is non-deterministic - rerun.", correct:false},
          {key:"b", text:"Dimension-ordering drift: the data loader silently permuted dimensions before subvector split. The codebooks now cover different dim-groups than at query time; subvector distances are off. Diagnostic: hash the dim-ordering on every train + serve and alert on mismatch.", correct:true},
          {key:"c", text:"GPU thermal throttling on the index builder.", correct:false},
          {key:"d", text:"nprobe value reset to default by config drift.", correct:false},
        ]}
        trap={<>(a) plausible blame but reruns reproduce the regression - the bug is upstream. (c)(d) generic infra. The IVF-PQ-specific fingerprint is &ldquo;codebook is valid but covers wrong subvectors.&rdquo;</>}
        lens={<>Subvector boundaries depend on dim ordering; hash it.</>}
        stretch={<>What CI gate catches dim-ordering drift between train and serve?</>}
      />

      <VIS.TrapProblem id="ivf-p19" difficulty="hard"
        title="P19 — Production gotcha: cluster imbalance under content drift"
        scenario={<><em>Discriminating insight: k-means cells trained on month-old data become imbalanced as new content arrives. Tail recall collapses silently. The discipline is periodic IVF retraining on the current distribution - rebuilding only PQ codes is not enough.</em><br/>What is the discipline?</>}
        options={[
          {key:"a", text:"Periodically retrain the IVF centroids on the current vector distribution - not just the PQ codes. Cells age into imbalance as new content lands; tail recall drops silently. Centroid retrain is cheap relative to PQ retrain; both should be scheduled.", correct:true},
          {key:"b", text:"Centroids never need retraining."},
          {key:"c", text:"Only the PQ codes age; centroids are stable."},
          {key:"d", text:"Both age but neither matters."},
        ]}
        trap={<>(b)(c)(d) miss the aging mechanism.</>}
        lens={<>IVF cells age with content; retrain them.</>}
        stretch={<>What cadence balances retrain cost vs imbalance?</>}
      />

      <VIS.TrapProblem id="ivf-p20" difficulty="hard"
        title="P20 — Failure on Friday: recall@1000 collapsed; recall@10 fine"
        scenario={<><em>Discriminating insight: recall@10 stays high because the top-10 neighbors usually live in the densest cells that nprobe always hits. Recall@1000 needs the long tail of cells, which nprobe skips when imbalance grows. The fingerprint of cluster imbalance is exactly this divergence.</em><br/>3am page: recall@1000 down to 0.6, recall@10 still 0.95. Diagnosis?</>}
        options={[
          {key:"a", text:"Cluster imbalance. Top-10 neighbors live in the densest cells that nprobe always hits; the long tail of recall@1000 needs smaller cells that nprobe skips. The divergence is the fingerprint. Fix: retrain IVF centroids, or raise nprobe (short-term), or use residual-IVF.", correct:true},
          {key:"b", text:"PQ codebook corruption on a single dim."},
          {key:"c", text:"Query embeddings drifted but doc embeddings are stable."},
          {key:"d", text:"Index disk was remounted with different mount options."},
        ]}
        trap={<>(b) plausible but a global codebook bug would tank recall@10 too. (c)(d) infra.</>}
        lens={<>recall@10 high, recall@1000 low = cluster imbalance.</>}
        stretch={<>What does residual-IVF (IVF-R) do differently?</>}
      />

      <VIS.TrapProblem id="ivf-p21" difficulty="medium"
        title="P21 — Library default that bites: M=8 in Faiss"
        scenario={<><em>Discriminating insight: Faiss IndexIVFPQ defaults to M=8 (8 bytes per vector). That is great for memory but caps recall on 768-dim vectors well below what M=16 or M=32 delivers. Teams ship M=8 and discover the recall ceiling weeks later.</em><br/>Where does the default break IVF-PQ?</>}
        options={[
          {key:"a", text:"Default M=8 (~8 bytes/vector) is tuned for memory demos. On 768-dim embeddings, the PQ approximation error caps recall well below what M=16 or M=32 delivers - and M is sticky (set at build time). Teams ship the default and discover the ceiling weeks later.", correct:true},
          {key:"b", text:"Default M=8 is fine at all dims."},
          {key:"c", text:"M has no recall impact."},
          {key:"d", text:"Faiss has no IVF-PQ implementation."},
        ]}
        trap={<>(b)(c)(d) deny the default trap.</>}
        lens={<>Faiss defaults are memory-demos, not production-tuned.</>}
        stretch={<>What is the recall vs M curve at d=768?</>}
      />

      <VIS.TrapProblem id="ivf-p22" difficulty="hard" ordered
        title="P22 — Order the rollout"
        scenario={<><em>Discriminating insight: rollout is (1) freeze embedding model, (2) train IVF centroids on a representative sample, (3) train PQ codebooks (or OPQ rotation + PQ), (4) encode all vectors and build inverted lists, (5) tune nprobe on a holdout, (6) ramp traffic. Skipping the holdout tune is the classic mistake.</em><br/>Order.</>}
        options={[
          {key:"a", text:"Freeze embedding - train IVF centroids on a representative sample - train PQ codebooks (or OPQ + PQ) - encode and build inverted lists - tune nprobe on a holdout - ramp traffic", correct:true},
          {key:"b", text:"Ramp traffic first."},
          {key:"c", text:"Train PQ before IVF."},
          {key:"d", text:"Skip the holdout nprobe tune."},
        ]}
        trap={<>(b)(c)(d) lose stage diagnostics.</>}
        lens={<>Embedding then IVF then PQ then encode then tune then ramp.</>}
        stretch={<>Why train IVF before PQ?</>}
      />

      <VIS.TrapProblem id="ivf-p23" difficulty="hard"
        title="P23 — Smallest input that breaks IVF-PQ&apos;s claimed advantage"
        scenario={<><em>Discriminating insight: a small catalog (5M vectors) at recall@10 target 0.99. HNSW fits easily in RAM and delivers 0.995+ recall. IVF-PQ&apos;s memory advantage is meaningless and its PQ error caps recall below the target.</em><br/>Construct the edge case.</>}
        options={[
          {key:"a", text:"5M 768-dim vectors with recall@10 = 0.99 target. HNSW fits in ~16 GB RAM and exceeds the recall target with margin. IVF-PQ&apos;s memory edge is irrelevant and its PQ error caps recall below 0.99 even at high nprobe. The claimed advantage requires both scale pressure AND recall headroom.", correct:true},
          {key:"b", text:"2B vectors, recall@100 = 0.92."},
          {key:"c", text:"100M users with 5k QPS."},
          {key:"d", text:"Catalog of 50K items where everything is brute-force."},
        ]}
        trap={<>(b) sweet spot. (c) user count, not catalog. (d) too small for any ANN to matter.</>}
        lens={<>IVF-PQ needs scale pressure AND recall headroom; missing either flips the Pareto.</>}
        stretch={<>What hybrid covers both regimes (HNSW for hot, IVF-PQ for cold)?</>}
      />

      <VIS.TrapProblem id="ivf-p24" difficulty="hard"
        title="P24 — Paper-named failure: tail recall collapse under imbalance"
        scenario={<><em>Discriminating insight: the original IVF-PQ paper acknowledges that cluster imbalance is the dominant failure mode for tail recall. The fix is residual-IVF (encode the cluster residual with PQ, not the raw vector) and periodic centroid retrain.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"Tail recall collapse under imbalanced k-means cells. nprobe heuristics miss the small cells that hold long-tail neighbors. The fix is residual-IVF (encode the residual after subtracting the centroid - codes are more uniform across cells) and scheduled centroid retraining.", correct:true},
          {key:"b", text:"PQ has no tail failure mode."},
          {key:"c", text:"Imbalance helps recall."},
          {key:"d", text:"There are no documented failures."},
        ]}
        trap={<>(b)(c)(d) deny the named failure.</>}
        lens={<>Imbalance is the canonical IVF-PQ tail bug; residuals are the canonical fix.</>}
        stretch={<>How much does residual-IVF lift tail recall in practice?</>}
      />

    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://hal.inria.fr/inria-00514462v2/document" target="_blank" rel="noopener">Jegou et al. - <em>Product Quantization for Nearest Neighbor Search</em> (TPAMI 2011, paper)</a> - the canonical PQ paper. Sections 3-4 cover the subvector decomposition.</li>

        <li><a href="https://www.pingcap.com/article/approximate-nearest-neighbor-ann-search-explained-ivf-vs-hnsw-vs-pq/" target="_blank" rel="noopener">PingCAP - <em>IVF vs HNSW vs PQ explained</em> (blog)</a> - head-to-head with recall, latency, and memory numbers.</li>
