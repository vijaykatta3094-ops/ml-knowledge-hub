  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."
  //   scenario={<>...JSX...</>}
  //   diagram={<VIS.Mermaid chart={...} />}
  //   options={[
  //     {key:"a", text:"...", correct:false},
  //     {key:"b", text:"...", correct:true},
  //     ...
  //   ]}
  //   trap={<>The most tempting wrong is X because...</>}
  //   lens={<>The right answer + reasoning</>}
  //   stretch="optional follow-up question"
  // />
  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          // NO autoGloss here. Glossing terms inside option text leaks the
          // answer mechanism via hover. Authors must keep options self-contained;
          // a candidate who needs a definition can scroll up to the prose where
          // the term is explicitly wrapped via <VIS.Term>.
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// REDO v2 — RecSys-SOTA batch 12
// ScalingNote — LLM-tower distillation (industry writeups + ACM TOIS 2025 survey)
// Unique mechanism: scale BOTH towers of a two-tower retriever with a 7B-LLM
// backbone OFFLINE; then DISTILL the heavy query-tower into a small (~4-layer)
// student for online serving. The doc-tower runs offline once and its
// embeddings are precomputed and indexed. The LLM teaches; the student serves.
// LLM-tower pair caution (LLMHNS vs ScalingNote):
//   - LLMHNS    = LLM at TRAINING-DATA construction (offline labels for negatives)
//   - ScalingNote = LLM as TEACHER during distillation; dropped at serving [THIS visual]
// Anchor that survives §2a redaction: "LLM teaches a small student
// query-tower via distillation; doc-tower embeddings are precomputed offline;
// LLM is NOT in the serving path." This is NOT "LLM-as-retriever" and NOT
// "two-tower with bigger encoders."

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="RecSys SOTA · Distillation for serving"
      title="ScalingNote — LLM-tower distillation for two-tower retrieval"
      subtitle={<>Scale both towers with a 7B-LLM backbone offline; <VIS.Term def="Train a small 'student' model to match a large 'teacher' model's outputs (logits or features), often with temperature softening.">distill</VIS.Term> the heavy query-tower into a 4-layer student for online; precompute doc-tower <VIS.Term def="Dense vector representation of a discrete item (word, user, product). Learned so that similar items have similar vectors.">embeddings</VIS.Term> into the <VIS.Term def="Approximate Nearest Neighbor. Family of algorithms (HNSW, IVF, ScaNN) that find close vectors much faster than exact search at small recall cost.">ANN</VIS.Term> index. The LLM is the teacher, not the server.</>}
      byline={[
        {label: "Paper", value: "Industry writeups + ACM TOIS 2025 retrieval survey"},
        {label: "Surface", value: <><VIS.Term def="Recsys architecture: separate user-encoder tower and item-encoder tower; dot-product their outputs to score (user, item) pairs.">Two-tower</VIS.Term> retrieval where the doc-tower is amortizable offline and only query-side needs cheap online encoding</>},
        {label: "Anchor that survives redaction", value: "LLM teaches small student query-tower via distillation; doc embeddings precomputed offline; LLM is NOT in the serving path"},
      ]}/>

    <VIS.TLDR>
      Standard <VIS.Term def="Recsys architecture: separate user-encoder tower and item-encoder tower; dot-product their outputs to score (user, item) pairs.">two-tower</VIS.Term> retrieval treats the query-tower and the doc-tower symmetrically — both online, both about the same size. That symmetry is wasteful: documents change slowly (encode once, store in the <VIS.Term def="Approximate Nearest Neighbor. Family of algorithms (HNSW, IVF, ScaNN) that find close vectors much faster than exact search at small recall cost.">ANN</VIS.Term> index) while queries arrive at 10k QPS and must be encoded in milliseconds. ScalingNote breaks the symmetry: a large 7B-LLM backbone trains BOTH towers offline; the doc-tower&apos;s <VIS.Term def="Dense vector representation of a discrete item (word, user, product). Learned so that similar items have similar vectors.">embeddings</VIS.Term> are then PRECOMPUTED and indexed once; the query-tower is <VIS.Term def="Train a small 'student' model to match a large 'teacher' model's outputs (logits or features), often with temperature softening.">DISTILLED</VIS.Term> into a small 4-layer student for cheap online encoding. The senior trap: this is NOT &ldquo;LLM-as-retriever&rdquo; (the LLM is not in the serving path — that would cost orders of magnitude more). It is also NOT just &ldquo;asymmetric two-tower&rdquo; — the LLM teacher is what supplies the high-quality target embeddings the student is distilled toward.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is — offline LLM teacher, online distilled student">
      <VIS.Mermaid chart={`flowchart TB
  LLMQ["7B-LLM query tower (offline)"]
  LLMD["7B-LLM doc tower (offline)"]
  DOC["Doc corpus"]
  IDX["Doc embeddings -> ANN index (offline, periodic refresh)"]
  STU["Distilled 4-layer student query tower (online)"]
  Q["Live user query"]
  LLMD --> DOC
  DOC --> IDX
  LLMQ --> STU
  Q --> STU
  STU --> IDX`} />
      <ul>
        <li><strong>Offline training</strong> — both towers use a 7B-LLM backbone; query and doc <VIS.Term def="Dense vector representation of a discrete item (word, user, product). Learned so that similar items have similar vectors.">embeddings</VIS.Term> are aligned on (query, positive-doc) pairs via a <VIS.Term def="Loss that pulls positive pairs together and pushes negatives apart in embedding space (e.g. InfoNCE).">contrastive loss</VIS.Term>.</li>
        <li><strong>Doc-tower precomputation</strong> — once the doc-tower is trained, ALL doc embeddings are encoded once and pushed into the <VIS.Term def="Approximate Nearest Neighbor. Family of algorithms (HNSW, IVF, ScaNN) that find close vectors much faster than exact search at small recall cost.">ANN</VIS.Term> index. Refresh cadence is daily / weekly.</li>
        <li><strong>Query-tower distillation</strong> — the heavy LLM query tower is the teacher; a small 4-layer <VIS.Term def="Sequence model built from stacked self-attention + feed-forward blocks. Order-agnostic without positional encodings; the default architecture for sequences.">transformer</VIS.Term> student is distilled to match its embeddings, optionally with <VIS.Term def="Divide logits by T>1 before softmax. Smoothes the distribution; used in distillation so the student learns inter-class similarity.">temperature softening</VIS.Term>.</li>
        <li><strong>Online</strong> — only the student runs (milliseconds per query); ANN lookup is unchanged and benefits from <VIS.Term def="Dense retrieval via dot-product (or cosine) between learned dense embeddings of queries and items; usually served by an ANN index.">dense retrieval</VIS.Term> primitives like <VIS.Term def="Hierarchical Navigable Small World. Graph-based ANN: layered proximity graph, greedy descent at each layer. RAM-heavy, log-time.">HNSW</VIS.Term>.</li>
      </ul>
      <p>The LLM never sees a live query; the doc-tower never runs at serving time, sparing <VIS.Term def="The 99th percentile of response times. 1% of requests are slower; tail latency, often dominates SLA pain.">p99 latency</VIS.Term> from heavy <VIS.Term def="Time between when an input arrives and when the model returns a prediction; usually budgeted at the p99 tail.">inference latency</VIS.Term> costs.</p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How it differs from symmetric two-tower, LLM-as-retriever, LLMHNS">
      <p>The four options below differ on where the LLM lives, what runs as the online <VIS.Term def="Neural net that maps raw input (image, text, item) into a dense latent vector consumed by downstream layers.">encoder</VIS.Term>, and whether the doc side is <VIS.Term def="Cached Key/Value tensors from prior transformer steps; lets autoregressive decoding skip recomputing past attention.">cached</VIS.Term> or recomputed. The <VIS.Term def="Multi-stage retrieval/ranking pipeline; each stage shrinks the candidate set and uses a heavier model.">cascade</VIS.Term> structure and <VIS.Term def="Refresh model weights on new data; usually periodic (weekly/daily) for systems where labels arrive from human reviewers.">retrain</VIS.Term> cadence flow from those three choices.</p>
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8, fontSize:14}}>
        <thead><tr style={{background:"#1f3a5f", color:"#fff"}}>
          <th style={{textAlign:"left", padding:8}}>Method</th>
          <th style={{textAlign:"left", padding:8}}>Where LLM lives</th>
          <th style={{textAlign:"left", padding:8}}>Online query encoder</th>
          <th style={{textAlign:"left", padding:8}}>Doc encoder</th>
        </tr></thead>
        <tbody>
          <tr><td style={{padding:8}}>Symmetric two-tower</td><td style={{padding:8}}>N/A</td><td style={{padding:8}}>Large, online</td><td style={{padding:8}}>Large, online or precomputed</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:8}}>LLM-as-retriever</td><td style={{padding:8}}>Serving path</td><td style={{padding:8}}>LLM</td><td style={{padding:8}}>Indexed (or in-context)</td></tr>
          <tr><td style={{padding:8}}>LLMHNS</td><td style={{padding:8}}>Training-data construction</td><td style={{padding:8}}>Whatever recsys uses</td><td style={{padding:8}}>Whatever recsys uses</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:8}}><strong>ScalingNote</strong></td><td style={{padding:8}}><strong>Offline teacher only</strong></td><td style={{padding:8}}><strong>4-layer distilled student</strong></td><td style={{padding:8}}><strong>Precomputed offline</strong></td></tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — 24 trap problems">
      <p style={{color:"#475569"}}>Each problem cites the axis it draws from — covering the <VIS.Term def="ScalingNote distillation: distill the heavy ranker's logits into the retrieval scorer each cycle so retrieval and ranking stay aligned without re-syncing indexes.">ScalingNote distillation</VIS.Term> mechanism, <VIS.Term def="When the data distribution at serving time diverges from the training distribution; model accuracy silently degrades.">drift</VIS.Term> hazards, and the cost/<VIS.Term def="Fraction of relevant items captured in the top-K retrieved list.">recall@K</VIS.Term> tradeoff. Pick, then reveal.</p>

      {/* A1 */}
      <VIS.TrapProblem id="sn-p1" difficulty="hard"
        title="P1 — ScalingNote vs LLM-as-retriever: what is the load-bearing difference?"
        scenario={<><em>Discriminating insight: LLM-as-retriever puts an LLM call into the serving path (every live query hits an LLM). ScalingNote uses the LLM ONLY offline as a teacher; the live serving path runs a small distilled student. The QPS profile is orders of magnitude different.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"ScalingNote keeps the LLM strictly OFFLINE as a teacher; the live serving path runs only a small 4-layer distilled student. LLM-as-retriever puts the LLM IN the serving path. The QPS/latency profile is orders of magnitude different.", correct:true},
          {key:"b", text:"They are equivalent at serving."},
          {key:"c", text:"ScalingNote is a special case of LLM-as-retriever."},
          {key:"d", text:"Both run the LLM at every query."},
        ]}
        trap={<>(b)(c)(d) collapse the offline-vs-online distinction.</>}
        lens={<>Where the LLM lives determines cost.</>}
        stretch={<>What is the QPS limit of LLM-as-retriever vs ScalingNote?</>}
      />

      {/* A2 definitional */}
      <VIS.TrapProblem id="sn-p2" difficulty="hard"
        title="P2 — ScalingNote vs LLMHNS: anchor each"
        scenario={<><em>Discriminating insight: cross-visual caution. LLMHNS uses the LLM to LABEL hard negatives offline (training-data construction). ScalingNote uses the LLM as a TEACHER for distillation (model construction). Different jobs at different phases.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"LLMHNS uses the LLM at training-DATA construction (offline labels for hard negatives). ScalingNote uses the LLM as the TEACHER during model distillation (the LLM&apos;s output embeddings are the student&apos;s target). Different jobs at different phases of training.", correct:true},
          {key:"b", text:"Both put the LLM at serving."},
          {key:"c", text:"ScalingNote is a special case of LLMHNS."},
          {key:"d", text:"They are mathematically identical."},
        ]}
        trap={<>(b)(c)(d) collapse the distinction.</>}
        lens={<>Labeling vs teaching are different roles for the LLM.</>}
        stretch={<>Could you compose LLMHNS + ScalingNote?</>}
      />

      {/* A3 counterfactual */}
      <VIS.TrapProblem id="sn-p3" difficulty="medium"
        title="P3 — Without ScalingNote, what is the realistic fallback?"
        scenario={<><em>Discriminating insight: fallbacks are symmetric two-tower (both towers online, expensive), or LLM-as-retriever (LLM at serving — extreme cost), or a small two-tower from scratch (cheap but weaker recall). ScalingNote sits between cost extremes.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"Symmetric two-tower (both towers online, expensive) or LLM-as-retriever (LLM in serving path, extreme cost) or a small two-tower from scratch (cheap, weaker recall). ScalingNote sits in the middle: small student at serving, LLM-quality embeddings.", correct:true},
          {key:"b", text:"Random retrieval is at parity."},
          {key:"c", text:"You would skip retrieval."},
          {key:"d", text:"FAQ replacement."},
        ]}
        trap={<>(b)(c)(d) under-shoot retrieval surface.</>}
        lens={<>ScalingNote sits between symmetric and LLM-as-retriever on cost.</>}
        stretch={<>What is the recall gap to LLM-as-retriever?</>}
      />

      {/* A4 composition */}
      <VIS.TrapProblem id="sn-p4" difficulty="hard"
        title="P4 — Compose ScalingNote with LLMHNS"
        scenario={<><em>Discriminating insight: LLMHNS labels hard negatives offline; ScalingNote distills the LLM&apos;s teacher embeddings into a student. They are orthogonal — LLMHNS labels feed the contrastive loss that defines the LLM teacher&apos;s embedding; the student then learns to mimic. Both LLM uses are offline; serving path remains small.</em><br/>What does the stack achieve?</>}
        options={[
          {key:"a", text:"LLMHNS provides high-quality hard negatives that train the LLM teacher; ScalingNote then distills that better teacher into the small student. Both LLM uses are offline; the serving path remains small. Compatible if you can afford two offline LLM passes.", correct:true},
          {key:"b", text:"They cannot coexist."},
          {key:"c", text:"They are identical."},
          {key:"d", text:"Composition would put the LLM at serving."},
        ]}
        trap={<>(b)(c)(d) confuse offline composition.</>}
        lens={<>Both offline; the serving path stays small.</>}
        stretch={<>What is the offline LLM-pass cost of stacking these?</>}
      />

      {/* A5 boundary */}
      <VIS.TrapProblem id="sn-p5" difficulty="medium"
        title="P5 — At what doc-update rate does ScalingNote stop helping?"
        scenario={<><em>Discriminating insight: precomputed doc embeddings amortize when the doc corpus changes slowly. If docs change minute-by-minute (live news, social posts), the offline doc-tower index is permanently stale and the symmetric/streaming alternatives win.</em><br/>Where is the boundary?</>}
        options={[
          {key:"a", text:"When docs change faster than the index refresh cadence (minute-by-minute updates, live news feeds). The precomputed embeddings are permanently stale; alternative architectures with online doc encoding win.", correct:true},
          {key:"b", text:"ScalingNote always wins."},
          {key:"c", text:"ScalingNote helps only for static corpora."},
          {key:"d", text:"Update rate is irrelevant."},
        ]}
        trap={<>(b)(c)(d) miss the staleness contract.</>}
        lens={<>Doc-update rate gates ScalingNote&apos;s amortization.</>}
        stretch={<>What refresh cadence balances cost and staleness?</>}
      />

      {/* B1 application */}
      <VIS.TrapProblem id="sn-p6" difficulty="hard"
        title="P6 — Pick the retrieval architecture"
        scenario={<><em>Discriminating insight: a 50M-doc enterprise search at 5k QPS with daily doc updates and a strict 10ms query budget. Doc-tower precompute is feasible (50M is small enough). LLM at serving is excluded by cost. The 10ms budget rules out a heavy online query tower. ScalingNote is purpose-built.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"ScalingNote — small online student fits 10ms budget; LLM teacher trains offline; doc-tower precomputed at daily cadence covers the update rate. LLM-as-retriever is excluded by cost; symmetric two-tower exceeds the latency budget.", correct:true},
          {key:"b", text:"LLM-as-retriever — but cost is excluded."},
          {key:"c", text:"Symmetric two-tower — exceeds 10ms latency."},
          {key:"d", text:"BM25 only — leaves recall on the table."},
        ]}
        trap={<>(b) cost. (c) latency. (d) recall.</>}
        lens={<>Daily docs + tight latency + cost ceiling = ScalingNote.</>}
        stretch={<>What if QPS jumped to 100k?</>}
      />

      {/* B2 sounds reasonable */}
      <VIS.TrapProblem id="sn-p7" difficulty="hard"
        title="P7 — Sounds reasonable: &ldquo;just shrink the LLM with quantization&rdquo;"
        scenario={<><em>Discriminating insight: quantization shrinks an LLM&apos;s parameter footprint but does not change its DEPTH; per-query latency remains dominated by sequential layer computation. ScalingNote&apos;s distilled student is a 4-layer transformer — depth shrunk, not just precision. The latency win is depth, not bits.</em><br/>Why is &ldquo;quantize the LLM&rdquo; insufficient?</>}
        options={[
          {key:"a", text:"Quantization reduces memory and arithmetic precision but does not reduce DEPTH; per-query wall-clock is dominated by sequential layer computation. ScalingNote distills DEPTH (4 layers); quantization can stack on top, but distillation is the load-bearing latency reduction.", correct:true},
          {key:"b", text:"Quantization solves the problem fully."},
          {key:"c", text:"Quantization and distillation are equivalent."},
          {key:"d", text:"Quantization always loses recall."},
        ]}
        trap={<>(b)(c) the seductive misreads. (d) overstates.</>}
        lens={<>Latency reduction comes from depth, not precision.</>}
        stretch={<>What latency does 4-bit 7B match vs distilled 4-layer?</>}
      />

      {/* B3 anchor */}
      <VIS.TrapProblem id="sn-p8" difficulty="hard"
        title="P8 — ScalingNote&apos;s anchor (LLM teacher, distilled student, precomputed docs): pitch it"
        scenario={<><em>Discriminating insight: the anchor is &ldquo;LLM teaches a small student query-tower; doc embeddings precomputed offline; LLM is NOT in the serving path.&rdquo; The pitch should name all three.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"A 7B-LLM trains both towers offline, then we precompute all doc embeddings into the ANN index and distill the LLM query-tower into a small 4-layer student for online serving. The LLM never sees a live query; the doc-tower never runs at serving time. Users get LLM-quality embeddings at student-quality latency.", correct:true},
          {key:"b", text:"We use a bigger LLM at serving for better recall."},
          {key:"c", text:"We use the LLM as the ANN index."},
          {key:"d", text:"We retrain weekly to fix staleness."},
        ]}
        trap={<>(b) serving-LLM misread. (c) nonsensical. (d) cadence misread.</>}
        lens={<>Teacher offline, student online, docs indexed — all three.</>}
        stretch={<>Which of the three is hardest to engineer well?</>}
      />

      {/* B4 not to use */}
      <VIS.TrapProblem id="sn-p9" difficulty="hard" multiSelect
        title="P9 — When NOT to use ScalingNote. Select all that apply."
        scenario={<><em>Discriminating insight: ScalingNote needs (i) doc-tower amortizability (docs change slowly), (ii) online cost ceiling that excludes LLM serving, (iii) recall budget that justifies the offline LLM cost. It is wrong for live-feed corpora, very small QPS, or recall-insensitive lookups.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"Live news feed with minute-by-minute doc updates — doc embeddings are always stale.", correct:true},
          {key:"b", text:"Very low QPS service where symmetric two-tower fits the latency budget anyway.", correct:true},
          {key:"c", text:"Lookup task where exact-match SQL suffices (no semantic retrieval needed).", correct:true},
          {key:"d", text:"50M-doc enterprise search with daily updates and 5k QPS (sweet spot)."},
          {key:"e", text:"Adversarial setting where docs are frequently rewritten to break the index.", correct:true},
        ]}
        trap={<>(d) is sweet spot.</>}
        lens={<>ScalingNote needs slow docs + cost pressure + recall need.</>}
        stretch={<>How would you detect adversarial doc rewrites?</>}
      />

      {/* C1 architectural */}
      <VIS.TrapProblem id="sn-p10" difficulty="hard"
        title="P10 — Why DISTILL the query-tower, not just train a small one from scratch?"
        scenario={<><em>Discriminating insight: a small query-tower trained from scratch on the same data underperforms because the LLM&apos;s embedding space encodes structure the small model cannot learn from limited query-doc pairs alone. Distillation transfers the structure; from-scratch training cannot.</em><br/>Why distillation?</>}
        options={[
          {key:"a", text:"The LLM embedding space encodes semantic structure learned from massive pretraining; a small from-scratch query-tower has no access to that structure and underperforms on the same query-doc data. Distillation transfers the structure into the small student.", correct:true},
          {key:"b", text:"Distillation is a latency optimization."},
          {key:"c", text:"Distillation is a memory optimization."},
          {key:"d", text:"Distillation is purely organizational."},
        ]}
        trap={<>(b)(c)(d) miss the knowledge transfer.</>}
        lens={<>Distillation transfers pretraining structure that supervised training alone cannot recover.</>}
        stretch={<>What loss does the distillation actually use?</>}
      />

      {/* C2 loss */}
      <VIS.TrapProblem id="sn-p11" difficulty="hard"
        title="P11 — Distillation loss composition"
        scenario={<><em>Discriminating insight: the student is trained on a COMBINATION of (i) embedding-matching loss against the teacher (MSE or cosine on the embedding), (ii) standard contrastive loss on (query, doc) pairs. Either alone underperforms; the combination retains both teacher structure and task signal.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"L = alpha * L_distill(student vs teacher embedding) + (1 - alpha) * L_contrastive(student query vs positive doc vs negatives). Distillation alone overfits to teacher; contrastive alone loses pretraining structure.", correct:true},
          {key:"b", text:"Distillation loss alone."},
          {key:"c", text:"Contrastive loss alone."},
          {key:"d", text:"Adversarial loss between teacher and student."},
        ]}
        trap={<>(b) loses task signal. (c) loses pretraining structure. (d) wrong family.</>}
        lens={<>Both losses are load-bearing; their balance is alpha.</>}
        stretch={<>How does alpha behave over training? Anneal or fixed?</>}
      />

      {/* C3 dropped */}
      <VIS.TrapProblem id="sn-p12" difficulty="hard"
        title="P12 — What does ScalingNote deliberately drop vs symmetric two-tower?"
        scenario={<><em>Discriminating insight: symmetric two-tower can re-encode docs online if the doc-tower is fast enough. ScalingNote forfeits this: the doc-tower is offline, so any doc that changed since the last index refresh is served with a stale embedding.</em><br/>What does ScalingNote forfeit?</>}
        options={[
          {key:"a", text:"Doc freshness within the refresh cadence. The doc-tower is offline; any doc that changed between refreshes is served with a stale embedding. The gain is online cost; the loss is real-time doc updates.", correct:true},
          {key:"b", text:"ScalingNote forfeits the use of an LLM."},
          {key:"c", text:"ScalingNote forfeits the ANN index."},
          {key:"d", text:"ScalingNote forfeits online queries."},
        ]}
        trap={<>(b)(c)(d) miss the dropped property.</>}
        lens={<>Doc freshness is the deliberate sacrifice.</>}
        stretch={<>How would partial-incremental refresh work?</>}
      />

      {/* C4 hyperparameter */}
      <VIS.TrapProblem id="sn-p13" difficulty="hard"
        title="P13 — Most fragile knob"
        scenario={<><em>Discriminating insight: the distillation temperature dominates. Too sharp: student over-fits to teacher&apos;s argmax and loses semantic structure. Too soft: student averages too widely and loses discrimination. Student depth and alpha are secondary.</em><br/>Rank by 2x mis-set breakage.</>}
        options={[
          {key:"a", text:"Distillation temperature is most fragile; alpha (loss mixing) is next; student depth is least. Temperature controls how the teacher&apos;s softmax distribution is softened for the student; mis-set destroys the knowledge-transfer premise.", correct:true},
          {key:"b", text:"Student depth is most fragile."},
          {key:"c", text:"Alpha is most fragile."},
          {key:"d", text:"Batch size is most fragile."},
        ]}
        trap={<>(b)(c)(d) miss the temperature mechanism.</>}
        lens={<>Temperature is the distillation control knob.</>}
        stretch={<>What does the optimal temperature curve look like?</>}
      />

      {/* C5 data assumption */}
      <VIS.TrapProblem id="sn-p14" difficulty="medium"
        title="P14 — Data assumption violations"
        scenario={<><em>Discriminating insight: ScalingNote assumes doc embeddings produced by the offline LLM tower remain valid until the next refresh. Doc content drift (descriptions edited, products discontinued) silently invalidates embeddings before the refresh.</em><br/>Which violation is most direct?</>}
        options={[
          {key:"a", text:"Doc content drift between refreshes (descriptions edited, products discontinued). The precomputed embedding no longer reflects the current doc; the student matches against the wrong representation.", correct:true},
          {key:"b", text:"Off-by-one in doc-id indexing."},
          {key:"c", text:"Different tokenizer."},
          {key:"d", text:"Mismatched batch sizes."},
        ]}
        trap={<>(b)(c)(d) generic.</>}
        lens={<>Doc-content drift is the staleness contract violation.</>}
        stretch={<>What monitor catches doc drift early?</>}
      />

      {/* D1 intuitive but wrong */}
      <VIS.TrapProblem id="sn-p15" difficulty="hard"
        title="P15 — Intuitive but wrong: &ldquo;the LLM tower&apos;s capacity is wasted&rdquo;"
        scenario={<><em>Discriminating insight: the LLM tower&apos;s capacity is &ldquo;baked into&rdquo; the doc embeddings (computed once, served forever) and into the student via distillation. It is not wasted; it is amortized.</em><br/>Why is &ldquo;wasted&rdquo; wrong?</>}
        options={[
          {key:"a", text:"The LLM&apos;s capacity is amortized in two places: (i) baked into the doc embeddings that are precomputed once and served forever, (ii) transferred into the small student via distillation. The LLM does not need to run at serving for its capacity to be present.", correct:true},
          {key:"b", text:"The LLM capacity is genuinely wasted."},
          {key:"c", text:"The LLM is only useful at serving."},
          {key:"d", text:"Distillation does not transfer capacity."},
        ]}
        trap={<>(b)(c)(d) miss the amortization mechanism.</>}
        lens={<>Capacity is transferred, not discarded.</>}
        stretch={<>What is the rate at which capacity &ldquo;leaks&rdquo; if the LLM changes after distillation?</>}
      />

      {/* D2 wrong-assumption cascade */}
      <VIS.TrapProblem id="sn-p16" difficulty="hard"
        title="P16 — Wrong-assumption cascade"
        scenario={<><em>Discriminating insight: &ldquo;ScalingNote is just distillation&rdquo; cascades into (i) skipping the doc-tower offline precompute (re-introduces serving cost), (ii) putting the LLM in the serving path for query encoding (defeats the purpose), (iii) evaluating only on offline recall (misses online cost wins).</em><br/>What breaks?</>}
        options={[
          {key:"a", text:"All three: doc precompute, query-tower distillation, and the cost-aware evaluation. Each is load-bearing; remove any one and ScalingNote regresses toward symmetric two-tower or LLM-as-retriever.", correct:true},
          {key:"b", text:"Only the doc precompute."},
          {key:"c", text:"Only the evaluation."},
          {key:"d", text:"Nothing — ScalingNote IS just distillation."},
        ]}
        trap={<>(d) the seductive misread.</>}
        lens={<>The three pieces — precompute, distill, cost-aware eval — are inseparable.</>}
        stretch={<>What does the cost-vs-recall curve look like?</>}
      />

      {/* D3 senior vs junior */}
      <VIS.TrapProblem id="sn-p17" difficulty="medium"
        title="P17 — Senior vs junior framing"
        scenario={<><em>Discriminating insight: a junior responds to recall regression by increasing student depth. A senior measures the teacher-student recall GAP first: if the gap is large, distillation is mis-tuned; if the gap is small, the teacher itself regressed (LLM upgrade?). The diagnostic is teacher vs student, not student in isolation.</em><br/>Which lever first?</>}
        options={[
          {key:"a", text:"Measure teacher recall and student recall side-by-side. If the gap is large, distillation is mis-tuned (temperature, alpha, training time). If the gap is small but both regressed, the teacher LLM changed (e.g., the LLM was upgraded upstream). The right lever depends on the gap.", correct:true},
          {key:"b", text:"Increase student depth."},
          {key:"c", text:"Increase embedding size."},
          {key:"d", text:"Switch to LLM-as-retriever."},
        ]}
        trap={<>(b)(c) miss the teacher-vs-student diagnostic. (d) abandons ScalingNote.</>}
        lens={<>Teacher-student gap is the ScalingNote-specific diagnostic.</>}
        stretch={<>What dashboard panel shows teacher-vs-student recall over time?</>}
      />

      {/* D4 plausible-misattribution */}
      <VIS.TrapProblem id="sn-p18" difficulty="hard"
        title="P18 — Plausible-misattribution: tokenizer drift across LLM teacher versions"
        scenario={<><em>Discriminating insight: NDCG drifts down ~3% after the LLM API auto-upgraded — but the doc index is fresh and the student weights are unchanged. The hosted teacher silently bumped its BPE tokenizer (T₀ → T₁); the same doc text now produces a slightly different token stream, distillation targets miscalibrate against the student&apos;s old-tokenizer assumption. Engineers blame index staleness; refreshing the index does nothing because the bug is in the tokenization layer upstream of embedding.</em><br/>NDCG fell after the teacher LLM API minor-version bump. Index is fresh, student unchanged. Most likely cause?</>}
        options={[
          {key:"a", text:"Doc index staleness — refresh the index.", correct:false},
          {key:"b", text:"Teacher tokenizer drift: the hosted LLM silently changed its BPE vocabulary on minor-version bump. Same text tokenizes differently, distillation targets shift relative to the student&apos;s frozen-tokenizer assumption. Diagnostic: hash the teacher tokenizer config on every distillation run and alert on mismatch.", correct:true},
          {key:"c", text:"Student model regressed from a code change.", correct:false},
          {key:"d", text:"GPU thermal throttling on the serving box.", correct:false},
        ]}
        trap={<>(a) seductive — staleness is the default suspect for recall regressions and matches the team&apos;s mental model, but the index is fresh here. (c)(d) generic infra suspects with no link to the API bump.</>}
        lens={<>When a hosted LLM teacher minor-bumps, check the tokenizer hash before the index.</>}
        stretch={<>What CI gate would catch tokenizer drift between distillation and serving?</>}
      />

      {/* E1 production gotcha */}
      <VIS.TrapProblem id="sn-p19" difficulty="hard"
        title="P19 — Production gotcha: teacher-student version skew"
        scenario={<><em>Discriminating insight: doc embeddings are indexed against a SPECIFIC teacher version. If the teacher is retrained but the doc index is not refreshed, the student (trained against the new teacher) will mismatch against the old doc embeddings.</em><br/>What is the discipline?</>}
        options={[
          {key:"a", text:"Version-pin the teacher LLM that produced doc embeddings; bump the index only when both the teacher and the student are retrained together. Mismatched teacher-student versions silently mismatch the embedding space.", correct:true},
          {key:"b", text:"Teacher version does not matter."},
          {key:"c", text:"Refresh the index continuously."},
          {key:"d", text:"Skip versioning entirely."},
        ]}
        trap={<>(b)(c)(d) miss the version-pinning discipline.</>}
        lens={<>Teacher and doc index must move together.</>}
        stretch={<>How would a CI test catch version skew?</>}
      />

      {/* E2 failure on Friday */}
      <VIS.TrapProblem id="sn-p20" difficulty="hard"
        title="P20 — Failure on Friday: recall cratered after teacher LLM upgrade"
        scenario={<><em>Discriminating insight: the teacher LLM was upgraded; the student was redistilled against the new teacher; the doc index was NOT refreshed. Student now operates in a new embedding space; the indexed doc embeddings are still in the OLD space. Recall craters.</em><br/>3am page: recall down 25% after teacher upgrade. Diagnosis?</>}
        options={[
          {key:"a", text:"Teacher upgrade redistilled the student into a new embedding space, but the doc index was not refreshed and still holds old-space embeddings. Student and index disagree. Re-encode docs through the new teacher (or roll back student until docs catch up).", correct:true},
          {key:"b", text:"GPU thermal throttling."},
          {key:"c", text:"Cache TTL changed."},
          {key:"d", text:"Index disk full."},
        ]}
        trap={<>(b)(c)(d) miss the version-skew mechanism.</>}
        lens={<>Teacher upgrades imply re-indexing.</>}
        stretch={<>What runbook entry covers this exact scenario?</>}
      />

      {/* E3 implementation specifics */}
      <VIS.TrapProblem id="sn-p21" difficulty="medium"
        title="P21 — Library default that bites: student initialized randomly"
        scenario={<><em>Discriminating insight: many distillation libraries default to random student init. For a 4-layer student aiming to match a 32-layer LLM, random init makes distillation slow and unstable. Initialize from a pretrained small model (e.g., MiniLM) and distill from there.</em><br/>Where does the default break ScalingNote?</>}
        options={[
          {key:"a", text:"Default random init makes the student start far from the teacher manifold; distillation converges slowly and unstably. Initialize the student from a pretrained small model (e.g., MiniLM) and distill from a much closer starting point.", correct:true},
          {key:"b", text:"Default LR is wrong."},
          {key:"c", text:"Default batch size is wrong."},
          {key:"d", text:"Default optimizer is wrong."},
        ]}
        trap={<>(b)(c)(d) generic.</>}
        lens={<>Student init choice is load-bearing.</>}
        stretch={<>How big should the small-pretrained student be?</>}
      />

      {/* E4 rollout */}
      <VIS.TrapProblem id="sn-p22" difficulty="hard" ordered
        title="P22 — Order the rollout"
        scenario={<><em>Discriminating insight: rollout is (1) train LLM teacher offline, (2) precompute doc embeddings, (3) distill student, (4) shadow-score student against teacher, (5) traffic ramp on student with doc index. Starting with the student before the teacher is the classic mistake.</em><br/>Order.</>}
        options={[
          {key:"a", text:"LLM teacher trained offline → precompute doc embeddings into ANN index → distill student → shadow-score student vs teacher → traffic ramp", correct:true},
          {key:"b", text:"Train the student first."},
          {key:"c", text:"Skip doc precompute."},
          {key:"d", text:"Ramp traffic first."},
        ]}
        trap={<>(b)(c)(d) lose stage diagnostics.</>}
        lens={<>Teacher → docs → student → eval → ramp.</>}
        stretch={<>Why teacher before student?</>}
      />

      {/* F1 edge case */}
      <VIS.TrapProblem id="sn-p23" difficulty="hard"
        title="P23 — Smallest input that breaks ScalingNote&apos;s claimed advantage"
        scenario={<><em>Discriminating insight: a corpus where every doc&apos;s content changes hourly eliminates the precompute amortization that justifies ScalingNote. The offline doc-tower becomes a perpetual bottleneck; you would be better off with online encoding.</em><br/>Construct the edge case.</>}
        options={[
          {key:"a", text:"A corpus where every doc changes hourly (live news, social feed). Precomputed doc embeddings are permanently stale; the offline doc-tower becomes a perpetual bottleneck instead of an amortization. ScalingNote&apos;s premise is violated.", correct:true},
          {key:"b", text:"Static corpus with daily updates (sweet spot)."},
          {key:"c", text:"100M users."},
          {key:"d", text:"Catalog of 50M items."},
        ]}
        trap={<>(b) sweet spot. (c)(d) scale.</>}
        lens={<>ScalingNote needs doc amortizability.</>}
        stretch={<>What hybrid approach covers fast-changing slices?</>}
      />

      {/* F4 paper-named failure */}
      <VIS.TrapProblem id="sn-p24" difficulty="hard"
        title="P24 — Paper-named failure: stale doc embeddings"
        scenario={<><em>Discriminating insight: the paper itself calls out stale doc embeddings as the dominant failure mode — the LLM teacher updates faster than the doc index can refresh, and student-vs-index diverge. The fix is version-pinned refresh policy.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"Stale doc embeddings under teacher updates. The teacher and the doc index must be version-pinned together; otherwise the student (trained against the new teacher) and the index (built by the old teacher) diverge silently. The fix is policy, not architecture.", correct:true},
          {key:"b", text:"Latency is the dominant failure."},
          {key:"c", text:"Cost is the dominant failure."},
          {key:"d", text:"There are no failures."},
        ]}
        trap={<>(b)(c)(d) miss the named failure.</>}
        lens={<>Staleness under teacher updates is the long-tail bug.</>}
        stretch={<>What refresh policy bounds the drift?</>}
      />

    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://dl.acm.org/doi/pdf/10.1145/3771925" target="_blank" rel="noopener">Wang et al., <em>A Comprehensive Survey on Retrieval Methods in Recommender Systems</em> (ACM TOIS 2025)</a> — primary survey that situates ScalingNote among <VIS.Term def="First stage of recsys: retrieve a few hundred items from the full catalog (millions). Usually ANN or two-tower.">candidate generation</VIS.Term> methods.</li>
        <li><a href="https://arxiv.org/abs/2002.10957" target="_blank" rel="noopener">Wang et al., <em>MiniLM: Deep Self-Attention Distillation</em> (NeurIPS 2020)</a> — practitioner reference for <VIS.Term def="Train a small 'student' model to match a large 'teacher' model's outputs (logits or features), often with temperature softening.">knowledge distillation</VIS.Term> of transformers; <VIS.Term def="Small distilled transformer (~22M params, 6 layers) producing sentence embeddings at a fraction of T5's compute.">MiniLM</VIS.Term> is the canonical student-init choice ScalingNote builds on.</li>
        <li><a href="https://eugeneyan.com/writing/system-design-for-discovery/" target="_blank" rel="noopener">Eugene Yan — <em>System Design for Discovery</em> (blog)</a> — practitioner framing of two-tower retrieval and the <VIS.Term def="Two-stage recsys pipeline: a cheap retrieval narrows millions of items to a shortlist, then a heavier ranker reorders that shortlist.">retrieve-rank</VIS.Term> cascade.</li>
        <li><a href="https://jalammar.github.io/illustrated-bert/" target="_blank" rel="noopener">Jay Alammar — <em>The Illustrated BERT</em> (blog)</a> — background on the <VIS.Term def="Neural net that maps raw input (image, text, item) into a dense latent vector consumed by downstream layers.">encoders</VIS.Term> the towers use; <VIS.Term def="Bidirectional Encoder Representations from Transformers. Pretrained text encoder; classic backbone for text classification (~50ms inference).">BERT</VIS.Term> is the spiritual ancestor of the LLM query tower.</li>
        <li><a href="https://lilianweng.github.io/posts/2021-05-31-contrastive/" target="_blank" rel="noopener">Lilian Weng — <em>Contrastive Representation Learning</em> (blog)</a> — background on the <VIS.Term def="Contrastive loss: pulls positive (anchor, target) pairs together, pushes negatives apart, normalized over a batch of candidates.">InfoNCE</VIS.Term> objective and <VIS.Term def="Train the model to score observed (positive) items above a sub-sample of random non-observed (negative) items; avoids full softmax.">negative sampling</VIS.Term> that align the towers.</li>
      </ul>
    </VIS.Section>
  </main>
