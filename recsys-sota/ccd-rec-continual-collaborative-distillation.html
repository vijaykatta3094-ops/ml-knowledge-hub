<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// REDO v2 — RecSys-SOTA batch 14
// CCD-Rec — Continual Collaborative Distillation
// Unique mechanism: at each incremental refresh, the PREVIOUS-VERSION model
// becomes the TEACHER and the NEW model is the STUDENT. The student trains on
// the new data window AND a KD loss against the old model on a SHARED ITEM
// SET so user-stable preferences are preserved while new behavior is absorbed.
// Selective REPLAY of informative samples narrows the KD support set.
// Anchor that survives §2a redaction: "model at time t-1 distills into model
// at time t over a shared/replay item set; user-stable preferences are pulled
// forward by the KD loss while new data drives the task loss." This is NOT
// plain incremental fine-tune (no teacher) and NOT classical KD (no time axis).
// Continual pair (CCD-Rec vs RAIE): both incremental-learning recipes but
// different angles — CCD-Rec is SELF-distillation across TIME (preserve stable
// preferences); RAIE is REGION-LOCAL LoRA edits (isolate drift to a cohort).
// Cross-batch (QAD batch 13): QAD is precision-coupled distillation (FP32->INT8);
// CCD-Rec is time-coupled (model_t-1 -> model_t). Different coupling axis.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="RecSys SOTA · Continual learning for recs"
      title="CCD-Rec — Continual Collaborative Distillation"
      subtitle="At every refresh, the PREVIOUS model becomes the TEACHER of the NEW model on a shared/replay item set. New data drives the task loss; the time-shifted KD loss preserves user-stable preferences and prevents catastrophic forgetting."
      byline={[
        {label: "Sources", value: "Wang et al., 'Continual Collaborative Distillation for Recommender System' (KDD 2024)"},
        {label: "Surface", value: "Production recsys with daily/hourly refresh cadence and limited compute budget per cycle"},
        {label: "Anchor that survives redaction", value: "Model at time t-1 distills into model at time t over a shared replay set; KD pulls forward stable preferences while task loss absorbs new behavior"},
      ]}/>

    <VIS.TLDR>
      Production recommenders refresh constantly. Plain incremental fine-tuning on the new data window <VIS.Term def="A model trained on fresh data overwrites parameters that encoded older stable patterns; behavior on long-tail or returning users degrades because the older signal is gone from the weights.">catastrophically forgets</VIS.Term> stable user preferences; full retraining is too expensive at production cadence. CCD-Rec runs a <VIS.Term def="Knowledge Distillation. A student model is trained to match a teacher model&apos;s soft outputs (logits / embeddings / scores) in addition to the task labels.">KD</VIS.Term> loss where the TEACHER is the model from the PREVIOUS REFRESH (the &ldquo;collaborator&rdquo; across time) and the STUDENT is the new model — both evaluated on a SHARED item set with selective replay. New data drives the task loss; the time-shifted KD loss pulls user-stable preferences forward. The senior trap: this is NOT classical KD (no time axis, no self-loop) and NOT plain incremental learning (no teacher), and the &ldquo;collaborative&rdquo; word does NOT mean federated — it means the model collaborates with its own past self.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is — time-coupled self-distillation with selective replay">
      <VIS.Mermaid chart={`flowchart TB
  D0["Data window t-1"]
  D1["Data window t (new)"]
  M0["Teacher (model t-1, frozen)"]
  M1["Student (model t)"]
  R["Shared/replay item set"]
  L1["KD loss on R"]
  L2["Task loss on new window"]
  STAR["Stable prefs preserved"]
  NEW["New behavior absorbed"]
  D0 --> M0
  D1 --> M1
  M0 --> R
  M1 --> R
  R --> L1
  D1 --> L2
  L1 --> STAR
  L2 --> NEW
  STAR --> M1
  NEW --> M1`} />
      <ul>
        <li><strong>Teacher = previous-refresh model</strong> — at refresh t, the frozen model from t-1 is reused as teacher. No external teacher is trained.</li>
        <li><strong>Shared/replay set R</strong> — KD is computed on a curated item subset that covers stable popular items and a sampled tail; this narrows the KD support so it does not fight the new data.</li>
        <li><strong>Two losses, two roles</strong> — task loss on the new window absorbs new behavior; KD loss on R pulls forward stable preferences that the new window underweights.</li>
        <li><strong>No federation</strong> — &ldquo;collaborative&rdquo; refers to the model collaborating with its own past version, not multiple clients.</li>
      </ul>
      <p>After training, the previous-refresh teacher is discarded (or kept one cycle as the next teacher) and only the new student serves.</p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How it differs from incremental fine-tune, replay-only, and classical KD">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8, fontSize:14}}>
        <thead><tr style={{background:"#1f3a5f", color:"#fff"}}>
          <th style={{textAlign:"left", padding:8}}>Method</th>
          <th style={{textAlign:"left", padding:8}}>Teacher</th>
          <th style={{textAlign:"left", padding:8}}>Forgetting protection</th>
          <th style={{textAlign:"left", padding:8}}>Cost / cycle</th>
        </tr></thead>
        <tbody>
          <tr><td style={{padding:8}}>Plain incremental fine-tune</td><td style={{padding:8}}>None</td><td style={{padding:8}}>None — forgets stable prefs</td><td style={{padding:8}}>Low</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:8}}>Replay only (rehearsal)</td><td style={{padding:8}}>None</td><td style={{padding:8}}>Implicit via old samples</td><td style={{padding:8}}>Low-medium</td></tr>
          <tr><td style={{padding:8}}>Full retrain</td><td style={{padding:8}}>None</td><td style={{padding:8}}>Strong but expensive</td><td style={{padding:8}}>High</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:8}}>Classical KD (offline)</td><td style={{padding:8}}>External big model</td><td style={{padding:8}}>N/A (capacity, not time)</td><td style={{padding:8}}>Teacher training cost</td></tr>
          <tr><td style={{padding:8}}><strong>CCD-Rec</strong></td><td style={{padding:8}}><strong>Self at t-1</strong></td><td style={{padding:8}}><strong>Explicit via KD on R</strong></td><td style={{padding:8}}><strong>Low — one fwd pass on R</strong></td></tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — 24 trap problems">
      <p style={{color:"#475569"}}>Each problem cites the discriminating insight, then asks for the pick.</p>

      <VIS.TrapProblem id="ccd-p1" difficulty="hard"
        title="P1 — CCD-Rec vs plain incremental fine-tune: load-bearing difference?"
        scenario={<><em>Discriminating insight: plain incremental fine-tune updates weights on the new window only — the model loses behavior on returning users whose patterns are NOT in the new window. CCD-Rec adds a KD loss against the previous-refresh model on a shared item set, pulling stable preferences forward even when the new window does not cover them.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"CCD-Rec adds a KD loss where the previous-refresh model acts as the teacher on a shared/replay set; this explicitly preserves stable user preferences that the new data window does not cover. Plain incremental fine-tune has no teacher and forgets those preferences.", correct:true},
          {key:"b", text:"CCD-Rec uses a bigger model architecture."},
          {key:"c", text:"They are mathematically equivalent."},
          {key:"d", text:"CCD-Rec disables gradient flow for the new window."},
        ]}
        trap={<>(b)(c)(d) miss the time-coupled KD anchor.</>}
        lens={<>Time-shifted self-distillation is the load-bearing piece.</>}
        stretch={<>How long does an unprotected fine-tune typically take to visibly forget on returning-user metrics?</>}
      />

      <VIS.TrapProblem id="ccd-p2" difficulty="hard"
        title="P2 — Why is the teacher the previous-refresh SELF, not a separately trained big model?"
        scenario={<><em>Discriminating insight: classical KD distills a large external teacher into a small student to compress capacity. CCD-Rec has no capacity goal — student and teacher are the SAME architecture at different times. The teacher exists for FREE (it served yesterday) and encodes exactly the preferences we want to preserve. A separately trained big teacher solves a different problem.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"The previous-refresh model encodes the production preferences we want to preserve; it costs zero extra to use (it already exists from yesterday&apos;s deploy). A separately trained big teacher solves capacity compression, not forgetting protection.", correct:true},
          {key:"b", text:"A bigger teacher always beats self-teaching."},
          {key:"c", text:"Self-distillation is mathematically equivalent to classical KD."},
          {key:"d", text:"The teacher is randomly initialized."},
        ]}
        trap={<>(b) conflates capacity KD with continual KD. (c)(d) deny the time axis.</>}
        lens={<>The teacher&apos;s job is to remember yesterday, not to be smarter.</>}
        stretch={<>What if you used yesterday&apos;s model AND a bigger external teacher together?</>}
      />

      <VIS.TrapProblem id="ccd-p3" difficulty="hard"
        title="P3 — Without CCD-Rec, what is the realistic fallback at production refresh cadence?"
        scenario={<><em>Discriminating insight: fallbacks are (i) plain incremental fine-tune — fast but forgets; (ii) replay buffer (rehearsal) — partially mitigates forgetting via stale samples but slower than KD on R; (iii) full retrain weekly — expensive, lags new behavior; (iv) elastic weight consolidation (EWC) — protects weights via Fisher penalty but is harder to tune than KD on R. CCD-Rec sits at the engineering sweet spot.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"Replay-only (rehearsal of old samples), EWC (Fisher-weighted regularization), or full retrain. CCD-Rec is the engineering sweet spot when refresh is daily/hourly and full retrain budget is not available.", correct:true},
          {key:"b", text:"Just disable refreshes and serve a static model."},
          {key:"c", text:"Run RL exploration instead of KD."},
          {key:"d", text:"There is no alternative."},
        ]}
        trap={<>(b) violates production cadence. (c)(d) wrong family.</>}
        lens={<>CCD-Rec sits between cheap-but-forgetful fine-tune and expensive-but-fresh full retrain.</>}
        stretch={<>When is EWC preferable to KD on R?</>}
      />

      <VIS.TrapProblem id="ccd-p4" difficulty="hard"
        title="P4 — Compose CCD-Rec with a replay buffer"
        scenario={<><em>Discriminating insight: replay buffer hands the new model OLD SAMPLES; CCD-Rec gives it OLD MODEL OUTPUTS on a shared set. They are orthogonal: replay restores supervision signal on stale data; KD restores the previous decision surface on a shared support set. Together they cover both the input distribution and the output distribution of yesterday.</em><br/>What does the stack achieve?</>}
        options={[
          {key:"a", text:"Replay restores the INPUT distribution from t-1 (so the model still sees old user-item pairs); CCD-Rec&apos;s KD restores the OUTPUT distribution (so the model still scores them like yesterday&apos;s model did). They are orthogonal and compose.", correct:true},
          {key:"b", text:"They conflict — pick one."},
          {key:"c", text:"They are identical."},
          {key:"d", text:"CCD-Rec subsumes replay completely."},
        ]}
        trap={<>(b)(c)(d) deny composition.</>}
        lens={<>Orthogonal axes: input distribution (replay) vs output distribution (KD).</>}
        stretch={<>What share of the batch should be replay vs new data?</>}
      />

      <VIS.TrapProblem id="ccd-p5" difficulty="medium"
        title="P5 — What is the shared/replay item set R?"
        scenario={<><em>Discriminating insight: R is the support set on which the KD loss is computed. Too small and it cannot anchor stable preferences across the catalog; too large and KD fights the new task loss everywhere. The selective replay paper uses a mix of head items (popular, stable) plus a sampled tail to cover diversity.</em><br/>How is R chosen?</>}
        options={[
          {key:"a", text:"A curated subset of items: head items where stable preferences live + a sampled tail for coverage. Too small and KD cannot anchor the catalog; too large and KD fights the task loss everywhere.", correct:true},
          {key:"b", text:"All items in the catalog."},
          {key:"c", text:"Only items from the new window."},
          {key:"d", text:"Randomly initialized embedding indices."},
        ]}
        trap={<>(b) collapses to full-retrain regularization. (c) defeats the purpose. (d) nonsensical.</>}
        lens={<>R is the KD support; sizing trades anchoring vs new-signal interference.</>}
        stretch={<>How would you decide the size of R automatically?</>}
      />

      <VIS.TrapProblem id="ccd-p6" difficulty="hard"
        title="P6 — Pick the continual learning method"
        scenario={<><em>Discriminating insight: a production feed model must refresh hourly. The team has the previous deploy&apos;s checkpoint, a small replay buffer, and limited compute per cycle. Returning-user CTR is the gating metric. CCD-Rec is purpose-built.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"CCD-Rec — distill the previous-refresh model into the new model on a shared item set; new window drives task loss. Returning-user CTR is preserved while new behavior is absorbed.", correct:true},
          {key:"b", text:"Plain incremental fine-tune — fails the returning-user metric."},
          {key:"c", text:"Full retrain — violates the hourly budget."},
          {key:"d", text:"Static model — no refresh at all."},
        ]}
        trap={<>(b) fails the bar. (c)(d) violate constraints.</>}
        lens={<>Previous checkpoint + tight cadence + returning-user metric = CCD-Rec.</>}
        stretch={<>What happens to the metric if you skip CCD-Rec for a week?</>}
      />

      <VIS.TrapProblem id="ccd-p7" difficulty="hard"
        title="P7 — Sounds reasonable: &ldquo;just lower the learning rate&rdquo;"
        scenario={<><em>Discriminating insight: lowering LR slows ALL learning, including new-behavior absorption. It is a blunt tradeoff between staleness and forgetting and does not exploit the structural difference between stable and new patterns. CCD-Rec&apos;s KD loss applies the forgetting protection EXACTLY where stable patterns live (on R) and leaves the new data window at full LR.</em><br/>Why is lower LR insufficient?</>}
        options={[
          {key:"a", text:"Low LR throttles both new-behavior learning and forgetting indiscriminately. CCD-Rec instead applies a structural penalty (KD on R) that targets stable preferences specifically; the new data window can train at full LR.", correct:true},
          {key:"b", text:"Low LR is equivalent to KD on R."},
          {key:"c", text:"Low LR removes the need for a teacher."},
          {key:"d", text:"LR has no effect on forgetting."},
        ]}
        trap={<>(b)(c)(d) miss the structural vs scalar distinction.</>}
        lens={<>KD on R is a STRUCTURAL anti-forgetting prior, not a global LR cap.</>}
        stretch={<>How would you choose between low LR and KD on R for very small models?</>}
      />

      <VIS.TrapProblem id="ccd-p8" difficulty="hard"
        title="P8 — CCD-Rec anchor (time-coupled self-distillation + shared support): pitch it"
        scenario={<><em>Discriminating insight: anchor is &ldquo;previous-refresh model becomes the teacher of the new model on a shared/replay item set.&rdquo; The pitch must name both the time-coupling and the shared support. Drop either and the description collapses to plain KD or plain replay.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"At each refresh, the previous model is frozen and serves as the teacher of the new model on a curated shared item set R. The KD loss on R preserves stable preferences while the task loss on the new data window absorbs new behavior.", correct:true},
          {key:"b", text:"We distill a big external teacher into a small student weekly."},
          {key:"c", text:"We use federated learning across user devices."},
          {key:"d", text:"We freeze user embeddings entirely."},
        ]}
        trap={<>(b)(c)(d) lose the time axis or the self-loop.</>}
        lens={<>Self at t-1 + shared support set R are inseparable.</>}
        stretch={<>What metric on R would tell you the KD weight is too high?</>}
      />

      <VIS.TrapProblem id="ccd-p9" difficulty="hard" multiSelect
        title="P9 — When NOT to use CCD-Rec. Select all that apply."
        scenario={<><em>Discriminating insight: CCD-Rec needs (i) a refresh cadence faster than full retrain, (ii) a previous-refresh checkpoint, (iii) some stable user preferences worth preserving. It is wrong when the data distribution genuinely shifts every cycle (e.g., breaking news) or when retraining from scratch is cheap.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"Breaking-news ranking where yesterday&apos;s preferences are LITERALLY obsolete today — KD anchoring is wrong.", correct:true},
          {key:"b", text:"Cold-start models with no production deploy yet — there is no teacher to distill from.", correct:true},
          {key:"c", text:"Full retrain budget is cheap enough — KD adds engineering complexity for little gain.", correct:true},
          {key:"d", text:"Hourly refresh of a long-term-user feed with stable preference signal (sweet spot)."},
          {key:"e", text:"Rapid-cycle A/B exploration where every cycle must explore fresh strategies; KD pulls back to last cycle.", correct:true},
        ]}
        trap={<>(d) sweet spot.</>}
        lens={<>CCD-Rec assumes stable-preference signal exists and a previous checkpoint is available.</>}
        stretch={<>What signal would tell you preferences are too unstable for CCD-Rec?</>}
      />

      <VIS.TrapProblem id="ccd-p10" difficulty="hard"
        title="P10 — Why is staleness a risk in CCD-Rec?"
        scenario={<><em>Discriminating insight: if you keep distilling from the same old teacher cycle after cycle, the student inherits an increasingly stale decision surface. Without a decay schedule on the KD weight (or refreshing the teacher to be model t-1 every cycle, not model t-N), the student over-anchors and lags real preference drift.</em><br/>What is the discipline?</>}
        options={[
          {key:"a", text:"Always re-set the teacher to the IMMEDIATELY previous refresh (t-1, not t-N), AND decay the KD weight as time-since-stable-prefs-baseline grows. Otherwise the student over-anchors to a stale decision surface.", correct:true},
          {key:"b", text:"Use the same teacher checkpoint forever."},
          {key:"c", text:"Increase KD weight over time."},
          {key:"d", text:"Disable the teacher entirely."},
        ]}
        trap={<>(b)(c) over-anchor. (d) defeats the purpose.</>}
        lens={<>Teacher must roll forward each cycle; KD weight should decay if anything.</>}
        stretch={<>What dashboard catches teacher staleness?</>}
      />

      <VIS.TrapProblem id="ccd-p11" difficulty="hard"
        title="P11 — CCD-Rec loss composition"
        scenario={<><em>Discriminating insight: total loss = lambda * KD(student on R vs teacher on R) + (1 - lambda) * Task(student on new window vs labels). lambda is the anti-forgetting knob; T (KD temperature) controls how soft the teacher scores are. KD alone freezes the model; task alone forgets.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"L = lambda * KD(student on R vs teacher on R) + (1 - lambda) * Task(student on new window vs labels). lambda controls anti-forgetting strength; temperature T controls how soft the teacher signal is. Both losses load-bearing.", correct:true},
          {key:"b", text:"KD only."},
          {key:"c", text:"Task only (this is plain incremental fine-tune)."},
          {key:"d", text:"Contrastive loss between student and teacher embeddings."},
        ]}
        trap={<>(b) freezes. (c) is the baseline. (d) wrong family.</>}
        lens={<>Two-term loss; lambda is the anti-forgetting knob.</>}
        stretch={<>Should lambda be fixed, decayed, or learned?</>}
      />

      <VIS.TrapProblem id="ccd-p12" difficulty="hard"
        title="P12 — What does CCD-Rec deliberately drop vs full retrain?"
        scenario={<><em>Discriminating insight: full retrain re-derives ALL parameters from scratch every cycle and is provably immune to forgetting but expensive. CCD-Rec gives up that immunity for a much cheaper update — KD provides an APPROXIMATE anchor, not a guarantee.</em><br/>What does CCD-Rec give up?</>}
        options={[
          {key:"a", text:"Immunity to forgetting. Full retrain is provably immune because it re-derives all parameters; CCD-Rec gives an approximate anchor via KD. The trade is compute per cycle for a small anti-forgetting residual.", correct:true},
          {key:"b", text:"Gradient descent."},
          {key:"c", text:"The teacher."},
          {key:"d", text:"The new data window."},
        ]}
        trap={<>(b)(c)(d) miss the dropped property.</>}
        lens={<>CCD-Rec trades full immunity for compute.</>}
        stretch={<>How would you measure the residual forgetting?</>}
      />

      <VIS.TrapProblem id="ccd-p13" difficulty="hard"
        title="P13 — Most fragile knob in CCD-Rec"
        scenario={<><em>Discriminating insight: the size of R (KD support set) and lambda (KD weight) jointly determine the forgetting-vs-staleness tradeoff. Mis-set support pushes the KD anchor to a tiny or oversized region; mis-set lambda either freezes or forgets. Temperature next. LR last.</em><br/>Rank.</>}
        options={[
          {key:"a", text:"Size of R is most fragile — too small under-anchors stable preferences, too large fights the new task loss everywhere. lambda (KD weight) next; temperature after; LR last.", correct:true},
          {key:"b", text:"Optimizer choice is most fragile."},
          {key:"c", text:"Batch size is most fragile."},
          {key:"d", text:"Embedding dimension is most fragile."},
        ]}
        trap={<>(b)(c)(d) miss the CCD-Rec-specific knobs.</>}
        lens={<>Size of R and lambda are the anti-forgetting knobs.</>}
        stretch={<>How would you cross-validate the size of R?</>}
      />

      <VIS.TrapProblem id="ccd-p14" difficulty="medium"
        title="P14 — Data assumption violations"
        scenario={<><em>Discriminating insight: CCD-Rec assumes stable preferences ACTUALLY EXIST in the population. For an audience that churns every week (e.g., short-lived games marketplace), the &ldquo;stable&rdquo; signal the teacher encodes is a fiction and KD propagates noise as if it were stable.</em><br/>Which violation is most direct?</>}
        options={[
          {key:"a", text:"User base churns faster than the refresh cycle — there are no stable preferences for the teacher to encode. KD then anchors the student to ghost preferences and underperforms plain incremental fine-tune.", correct:true},
          {key:"b", text:"Off-by-one in date partitioning."},
          {key:"c", text:"GPU OOM during distillation."},
          {key:"d", text:"Tokenizer mismatch."},
        ]}
        trap={<>(b)(c)(d) generic.</>}
        lens={<>CCD-Rec needs a population with actual stable preferences.</>}
        stretch={<>What metric detects ghost-preference anchoring?</>}
      />

      <VIS.TrapProblem id="ccd-p15" difficulty="hard"
        title="P15 — Intuitive but wrong: &ldquo;the teacher dominates training cost&rdquo;"
        scenario={<><em>Discriminating insight: the teacher is FROZEN. It runs forward passes on R only — no gradients, no backprop. R is a tiny subset of the catalog. The teacher&apos;s training cost is zero (it was trained yesterday in production). Total CCD-Rec overhead vs plain fine-tune is one forward pass on R.</em><br/>Why is &ldquo;teacher dominates&rdquo; wrong?</>}
        options={[
          {key:"a", text:"The teacher is frozen and only forward-evaluated on the small set R; its training cost is amortized from yesterday&apos;s production deploy. CCD-Rec&apos;s overhead over plain fine-tune is one extra forward pass on R, which is small.", correct:true},
          {key:"b", text:"The teacher requires a full backward pass."},
          {key:"c", text:"The teacher must be re-trained from scratch every cycle."},
          {key:"d", text:"There is no teacher in CCD-Rec."},
        ]}
        trap={<>(b)(c) confuse training and forward. (d) denies mechanism.</>}
        lens={<>Frozen teacher + small R = small overhead.</>}
        stretch={<>What is the realistic % training overhead in production?</>}
      />

      <VIS.TrapProblem id="ccd-p16" difficulty="hard"
        title="P16 — Wrong-assumption cascade"
        scenario={<><em>Discriminating insight: assuming &ldquo;CCD-Rec is just KD&rdquo; cascades into (i) using a big external teacher (wastes compute, wrong forgetting signal), (ii) computing KD on new-window items only (defeats the anchor), (iii) refreshing the teacher rarely (over-anchors). Each correction restores a load-bearing piece.</em><br/>What breaks?</>}
        options={[
          {key:"a", text:"All three: external teacher (wrong signal), KD on new-window items (no anchor for stable preferences), stale teacher (over-anchors). The self-loop (teacher = previous-refresh self) and the shared support R are inseparable from CCD-Rec.", correct:true},
          {key:"b", text:"Only the teacher choice."},
          {key:"c", text:"Only the support set."},
          {key:"d", text:"Nothing — CCD-Rec really is just KD."},
        ]}
        trap={<>(d) the seductive misread.</>}
        lens={<>Self-at-t-1, support R, fresh teacher each cycle — all three load-bearing.</>}
        stretch={<>What ablation shows each piece is necessary?</>}
      />

      <VIS.TrapProblem id="ccd-p17" difficulty="medium"
        title="P17 — Senior vs junior diagnostic"
        scenario={<><em>Discriminating insight: when returning-user CTR drops after a refresh, a junior bumps the KD weight lambda. A senior plots KD loss on R AND task loss on the new window separately — if KD plateaued early but returning-user CTR dropped, R is too small (anchor support insufficient); if KD is still high, teacher is stale.</em><br/>Which lever first?</>}
        options={[
          {key:"a", text:"Plot KD loss on R and task loss on the new window separately. KD plateau + CTR drop means R is too small (expand R or sample more tail). High KD + CTR drop means the teacher is stale (re-set to immediately previous refresh).", correct:true},
          {key:"b", text:"Bump lambda blindly."},
          {key:"c", text:"Drop CCD-Rec entirely."},
          {key:"d", text:"Increase embedding size."},
        ]}
        trap={<>(b)(c)(d) miss the diagnostic decomposition.</>}
        lens={<>KD loss curve on R is the CCD-Rec-specific diagnostic.</>}
        stretch={<>What dashboard would show both curves side by side?</>}
      />

      <VIS.TrapProblem id="ccd-p18" difficulty="hard"
        title="P18 — Plausible-misattribution: drift in the user-base shape"
        scenario={<><em>Discriminating insight: returning-user CTR drops gradually over a month while new-user metrics stay flat. The team blames CCD-Rec staleness and disables KD. Real cause: the returning-user cohort itself shifted (people switched device classes, regions); the teacher&apos;s preferences were correct for the OLD cohort but the new returning cohort is different. Disabling KD makes it worse because new data still under-represents the new returning cohort.</em><br/>Most likely cause?</>}
        options={[
          {key:"a", text:"The returning-user COHORT shifted (device mix, region mix); the teacher anchors yesterday&apos;s cohort. Fix is to refresh the COHORT DEFINITION inside R, not disable KD. Disabling KD makes returning-user CTR worse.", correct:true},
          {key:"b", text:"GPU thermal throttling."},
          {key:"c", text:"Disk full on the training cluster."},
          {key:"d", text:"Random seed changed."},
        ]}
        trap={<>(b)(c)(d) generic infra suspects.</>}
        lens={<>R is a population definition; if the population shifts, R must shift too.</>}
        stretch={<>What CI gate would detect cohort-definition drift in R?</>}
      />

      <VIS.TrapProblem id="ccd-p19" difficulty="hard"
        title="P19 — Production gotcha: teacher-student feature schema skew"
        scenario={<><em>Discriminating insight: CCD-Rec assumes teacher and student have the SAME feature schema so their outputs on R are comparable. If the team ships a new feature mid-cycle (added a context vector), the teacher&apos;s outputs on R are computed in the OLD schema; comparing them to the student&apos;s outputs in the new schema makes the KD loss arbitrary noise.</em><br/>What is the discipline?</>}
        options={[
          {key:"a", text:"Pin the feature schema across teacher and student or compute KD only on features common to both. A new feature mid-cycle invalidates the comparison; the KD loss becomes schema-noise and pulls the student in random directions.", correct:true},
          {key:"b", text:"Feature schema is irrelevant to KD."},
          {key:"c", text:"The student inherits features from the teacher automatically."},
          {key:"d", text:"Skip CCD-Rec when adding features."},
        ]}
        trap={<>(b)(c) deny the schema dependency. (d) is over-correction.</>}
        lens={<>Schema parity is a CCD-Rec precondition; new features require a teacher re-baseline.</>}
        stretch={<>How would you do a teacher re-baseline cleanly?</>}
      />

      <VIS.TrapProblem id="ccd-p20" difficulty="hard"
        title="P20 — Failure on Friday: returning-user CTR drops 6% after refresh"
        scenario={<><em>Discriminating insight: KD weight lambda was bumped to 0.7 for &ldquo;extra anti-forgetting&rdquo;; the model became over-anchored to last week&apos;s preferences and stopped absorbing this week&apos;s new behavior; new-user CTR also stagnates. Diagnosis is lambda mis-set, not a CCD-Rec bug.</em><br/>3am page. Diagnose.</>}
        options={[
          {key:"a", text:"lambda was raised too high; the student is over-anchored to the teacher and underweights new behavior. Roll lambda back to baseline and verify both returning-user AND new-user CTR recover.", correct:true},
          {key:"b", text:"GPU thermal throttling."},
          {key:"c", text:"Cache TTL changed."},
          {key:"d", text:"Disk full."},
        ]}
        trap={<>(b)(c)(d) miss the KD-weight diagnostic.</>}
        lens={<>Over-anchoring is the most common CCD-Rec failure mode after a lambda change.</>}
        stretch={<>What canary would catch this before full rollout?</>}
      />

      <VIS.TrapProblem id="ccd-p21" difficulty="medium"
        title="P21 — Library default that bites: KD temperature"
        scenario={<><em>Discriminating insight: many KD libraries default temperature T=1 (softmax with no smoothing), which produces near-argmax teacher distributions for recsys logits — dark knowledge is lost. CCD-Rec depends on the teacher&apos;s RELATIVE scores across items, so T should typically be 2-4.</em><br/>What is the gotcha?</>}
        options={[
          {key:"a", text:"Default T=1 collapses the teacher&apos;s score distribution to near-argmax for recsys logits; the dark-knowledge structure (which items the teacher scored similarly) is destroyed. Use T in [2, 4] so the relative ordering across items is preserved.", correct:true},
          {key:"b", text:"Default LR is too high."},
          {key:"c", text:"Default batch size is wrong."},
          {key:"d", text:"Default optimizer is wrong."},
        ]}
        trap={<>(b)(c)(d) generic.</>}
        lens={<>KD temperature must smooth the teacher to expose dark knowledge.</>}
        stretch={<>What does T approaching infinity do to the loss?</>}
      />

      <VIS.TrapProblem id="ccd-p22" difficulty="hard" ordered
        title="P22 — Order the CCD-Rec refresh"
        scenario={<><em>Discriminating insight: rollout is (1) load previous-refresh model as frozen teacher, (2) prepare new data window AND shared support R, (3) compute teacher logits on R, (4) train student with task loss on new window and KD loss on R, (5) validate on both returning-user and new-user slices, (6) deploy and archive student as next cycle&apos;s teacher. Computing teacher logits AFTER student training is the classic mistake.</em><br/>Order.</>}
        options={[
          {key:"a", text:"Load previous-refresh teacher frozen -> prepare new window and R -> compute teacher logits on R -> train student with both losses -> validate returning + new slices -> deploy and archive as next teacher.", correct:true},
          {key:"b", text:"Compute teacher logits after student training."},
          {key:"c", text:"Skip the returning-user validation slice."},
          {key:"d", text:"Deploy before archiving the previous teacher."},
        ]}
        trap={<>(b)(c)(d) lose stage diagnostics.</>}
        lens={<>Teacher logits before student training; validate both slices; archive for the next cycle.</>}
        stretch={<>Why archive before deploying?</>}
      />

      <VIS.TrapProblem id="ccd-p23" difficulty="hard"
        title="P23 — Smallest input that breaks CCD-Rec&apos;s claimed advantage"
        scenario={<><em>Discriminating insight: if the new data window perfectly covers the same items as R AND the teacher&apos;s outputs on R are noisy, KD on R fights the task loss without adding signal. CCD-Rec collapses to noise injection in that regime.</em><br/>Construct the edge case.</>}
        options={[
          {key:"a", text:"New window covers exactly the items in R, and the teacher&apos;s scores on R are noisy (e.g., teacher was undertrained yesterday). KD then injects noisy gradients into a well-covered region — strictly worse than plain incremental fine-tune.", correct:true},
          {key:"b", text:"Long-term user feed with stable preferences (sweet spot)."},
          {key:"c", text:"Daily refresh with curated R (sweet spot)."},
          {key:"d", text:"Mature production model with clean teacher (sweet spot)."},
        ]}
        trap={<>(b)(c)(d) sweet spots.</>}
        lens={<>CCD-Rec needs R to cover a region the new window DOES NOT see well.</>}
        stretch={<>How would you measure R-window overlap automatically?</>}
      />

      <VIS.TrapProblem id="ccd-p24" difficulty="hard"
        title="P24 — Named failure: teacher chain over-anchoring"
        scenario={<><em>Discriminating insight: a common bug — the team keeps the teacher fixed at an older snapshot (e.g., last week&apos;s model) for stability, treating CCD-Rec as a long-horizon anchor. After several cycles the student is pulled toward a snapshot that no longer reflects reality; performance silently regresses. Fix: roll the teacher each cycle to the IMMEDIATELY previous refresh; if needed, decay lambda over time-since-teacher.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"Teacher chain over-anchoring — keeping the same teacher across many cycles freezes the decision surface to a stale snapshot. Roll teacher each cycle (immediately previous refresh, not multi-cycle-old); decay lambda with time-since-teacher if extra protection is needed.", correct:true},
          {key:"b", text:"Use the same teacher for a year."},
          {key:"c", text:"Increase lambda over time."},
          {key:"d", text:"Disable refreshes."},
        ]}
        trap={<>(b)(c)(d) deepen the bug.</>}
        lens={<>Teacher must roll forward each cycle; lambda decays.</>}
        stretch={<>How would you monitor for over-anchoring in production?</>}
      />

    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://dl.acm.org/doi/10.1145/3637528.3671924" target="_blank" rel="noopener">Wang et al., <em>Continual Collaborative Distillation for Recommender System</em> (KDD 2024)</a> — the source paper; formalizes time-coupled KD and selective replay.</li>
        <li><a href="https://lilianweng.github.io/posts/2018-11-30-meta-learning/" target="_blank" rel="noopener">Lilian Weng — <em>Meta-Learning and Continual Learning</em> (blog)</a> — practitioner overview of EWC, rehearsal, KD as continual learning tools.</li>
        <li><a href="https://www.pnas.org/doi/10.1073/pnas.1611835114" target="_blank" rel="noopener">Kirkpatrick et al., <em>Overcoming catastrophic forgetting in neural networks</em> (PNAS 2017)</a> — canonical EWC paper, the regularization alternative to CCD-Rec.</li>
        <li><a href="https://arxiv.org/abs/1503.02531" target="_blank" rel="noopener">Hinton et al., <em>Distilling the Knowledge in a Neural Network</em> (NeurIPS 2014 workshop)</a> — original KD; CCD-Rec specializes this to time-coupled self-distillation.</li>
        <li><a href="https://eugeneyan.com/writing/system-design-for-discovery/" target="_blank" rel="noopener">Eugene Yan — <em>System Design for Discovery</em> (blog)</a> — production recsys refresh patterns and why incremental updates matter.</li>
        <li><a href="https://research.google/teams/brain/" target="_blank" rel="noopener">Google Research — Brain team continual learning publications</a> — survey hub for rehearsal vs regularization vs distillation families.</li>
      </ul>
    </VIS.Section>
  </main>
);
