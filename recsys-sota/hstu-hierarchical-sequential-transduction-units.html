      <VIS.TrapProblem
        id="hstu-f3b"
        difficulty="hard"
        title="F3b — Per-action-token loss magnitudes differ wildly (training-only symptom)"
        scenario={<>You instrument HSTU's training and break the cross-entropy loss out *per action type*: <code>L_click</code>, <code>L_watch</code>, <code>L_skip</code>, <code>L_like</code>. You observe magnitudes differ by ~10×: <code>L_click ≈ 4.2</code>, <code>L_watch ≈ 0.4</code>, <code>L_skip ≈ 3.8</code>, <code>L_like ≈ 5.1</code>. Online NDCG looks fine. Which symptom is *training-only*, would never appear in DLRM's discriminative training, and is a *direct* consequence of HSTU's heterogeneous action vocab?</>}
        options={[
          {key:"a", text:"The per-action-token loss spread itself — DLRM's pointwise BCE has one scalar loss per (user, item) example, so it cannot produce per-action-class loss magnitudes; the spread exists *because* HSTU shares one softmax across action types with very different base rates and entropies. Watch-events are predictable (low entropy → low L); like-events are rare and bursty (high entropy → high L). The loss curve looks healthy in aggregate, hiding that the model is essentially solving the easy class.", correct:true},
          {key:"b", text:"Overall loss not decreasing — generic ML issue, would appear in DLRM too."},
          {key:"c", text:"Validation gradient norms exploding — generic, not HSTU-specific."},
          {key:"d", text:"Memory pressure on the embedding table — orthogonal to loss shape."},
        ]}
        trap={<>(b), (c), (d) are diagnoses that DLRM training surfaces just as readily; redaction-substitute "HSTU" with "Model X" and they remain valid. Only (a) requires HSTU's specific architectural choice: <em>one shared softmax over a heterogeneous action vocab</em>. DLRM's per-target BCE heads simply cannot exhibit this spread.</>}
        lens={<>The heterogeneous action vocab is the load-bearing fact. The aggregate CE is a misleading dashboard; the right HSTU-era training dashboards must report per-action-class loss + per-class accuracy/recall. The fix is class-balanced loss reweighting or per-class temperature on the action-vocab softmax — not LR/batch tuning.</>}
        stretch={<>If you class-reweight the softmax to equalize per-class loss magnitudes, what new failure mode does that introduce on the offline-online gap?</>}
      />

      {/* axis: F2 — privacy adversarial */}
      <VIS.TrapProblem
        id="hstu-f2b"
        difficulty="hard"
        title="F2b — Membership inference on HSTU"
        scenario={<>A privacy researcher claims HSTU is more vulnerable to membership inference than DLRM. Why?</>}
        options={[
          {key:"a", text:"HSTU's generative loss memorizes specific action sequences at scale (LLM-style memorization); querying with a partial sequence reveals whether the user was in the training set with high accuracy. DLRM's discriminative loss has no equivalent memorization vector.", correct:true},
          {key:"b", text:"HSTU runs on more powerful GPUs."},
          {key:"c", text:"DLRM has built-in DP."},
          {key:"d", text:"There's no difference."},
        ]}
        trap={<>(b), (c), (d) are non-answers.</>}
        lens={<>The risk inherits from the generative-loss paradigm. The mitigation is the same as for LLMs (DP-SGD, sequence shuffling, deduplication) but the *attack surface* is recsys-specific (the attacker doesn't need text — just a partial action sequence).</>}
        stretch={<>Sketch a DP-SGD adaptation for HSTU. What does it cost in quality?</>}
      />

      {/* axis: A2 — easily-confused */}
      <VIS.TrapProblem
        id="hstu-a2b"
        difficulty="medium"
        title="A2b — HSTU vs LongER (ByteDance long-seq transformer)"
        scenario={<>ByteDance's LongER and Meta's HSTU both target long user sequences. What's the actual difference?</>}
        options={[
          {key:"a", text:"LongER focuses on memory-efficient long-context attention for retrieval; HSTU focuses on generative next-action loss with custom pointwise+aggregated norm for ranking. They solve different parts of the stack.", correct:true},
          {key:"b", text:"They're identical."},
          {key:"c", text:"LongER is for ads; HSTU is for video."},
          {key:"d", text:"LongER doesn't use transformers."},
        ]}
        trap={<>(b), (d) are false. (c) is over-specific.</>}
        lens={<>Long-sequence handling is necessary but not sufficient for HSTU's claims. The novelty is the *loss* + *norm* + *vocab*, not just the context length.</>}
        stretch={<>Could you combine LongER's memory tricks with HSTU's loss? What changes?</>}
      />

      {/* axis: C3 — drop crosses, what else */}
      <VIS.TrapProblem
        id="hstu-c3b"
        difficulty="hard"
        title="C3b — Beyond crosses, what else does HSTU drop?"
        scenario={<>HSTU drops more than crosses vs DLRM. Pick all that HSTU explicitly removes.</>}
        multiSelect
        options={[
          {key:"a", text:"Hand-engineered cross features.", correct:true},
          {key:"b", text:"Pointwise per-item BCE loss in favor of generative softmax.", correct:true},
          {key:"c", text:"Separate retrieval + ranking stages (replaced by a single transducer).", correct:true},
          {key:"d", text:"LayerNorm (replaced by pointwise + aggregated norm).", correct:true},
          {key:"e", text:"Item-ID embedding tables."},
          {key:"f", text:"Positional encoding."},
        ]}
        trap={<>(e) is wrong — HSTU keeps item-ID embeddings (that's exactly what TIGER replaces). (f) is wrong — HSTU keeps position+time bias.</>}
        lens={<>Four removals: crosses, BCE, two-stage funnel, LayerNorm. Two retentions: item-ID embeddings, position encoding. Each removal has a published-rationale connection.</>}
        stretch={<>Which of the four removals would you put back first if you had to weaken HSTU minimally to ship faster?</>}
      />

      {/* axis: E4 — calibration head detail */}
      <VIS.TrapProblem
        id="hstu-e4b"
        difficulty="hard"
        title="E4b — Where to fit the new calibration head"
        scenario={<>You're building HSTU's new calibration head. Where in the stack does it sit, and what does it consume as input?</>}
        options={[
          {key:"a", text:"Sits between HSTU's generative softmax and the auction; consumes the per-(item, action) marginal probability and outputs calibrated P(click | history, item). Fit on held-out (HSTU score, realized click) pairs.", correct:true},
          {key:"b", text:"Inside HSTU as an extra transformer layer."},
          {key:"c", text:"Before HSTU, as a feature-engineering step."},
          {key:"d", text:"No calibration head needed."},
        ]}
        trap={<>(b) confuses calibration with capacity. (c) is upstream and can't fix output miscalibration. (d) ignores the auction's requirement.</>}
        lens={<>The calibration head is downstream of HSTU's softmax, before the auction. The marginalization (joint → per-(item, click) probability) is the HSTU-specific step that's missing in a DLRM Platt pipeline.</>}
        stretch={<>What goes wrong if you fit on training data instead of held-out?</>}
      />

      {/* axis: E3 — mixed-precision */}
      <VIS.TrapProblem
        id="hstu-e3b"
        difficulty="hard"
        title="E3b — FP8 quantization on HSTU"
        scenario={<>You quantize HSTU to FP8 for inference. Calibration drifts noticeably more than it would for a similarly-quantized DLRM. Why?</>}
        options={[
          {key:"a", text:"HSTU's generative softmax has long tails; FP8 underflow on small probabilities truncates the tail, distorting the calibrated CTR estimate. DLRM's pointwise sigmoid outputs a scalar — FP8 keeps it accurate.", correct:true},
          {key:"b", text:"FP8 is incompatible with transformers."},
          {key:"c", text:"DLRM has no embeddings."},
          {key:"d", text:"Quantization doesn't affect calibration."},
        ]}
        trap={<>(b), (c), (d) misread.</>}
        lens={<>The interaction is precision-vs-distribution-shape: long-tailed outputs are sensitive to low-bit precision in a way that scalar sigmoid isn't. Mitigation: keep the final softmax + calibration head in BF16/FP16; quantize earlier layers only.</>}
        stretch={<>Which other distribution-shape sensitivities does FP8 expose in HSTU vs DLRM?</>}
      />

      {/* axis: D1 — sequence-as-feature */}
      <VIS.TrapProblem
        id="hstu-d1c"
        difficulty="medium"
        title="D1c — 'Just add sequence as a feature to DLRM'"
        scenario={<>A skeptical lead says "instead of migrating to HSTU, can't we just add a sequence-mean-pool feature to DLRM and call it a day?" Why is this insufficient?</>}
        options={[
          {key:"a", text:"Mean-pooling destroys the sequential signal HSTU's attention captures (recency, ordering, cross-token interactions). The scaling-law evidence in the paper is specifically tied to *attention over the sequence*, not summary statistics.", correct:true},
          {key:"b", text:"Mean-pooling doesn't fit in DLRM."},
          {key:"c", text:"You'd need to retrain."},
          {key:"d", text:"It actually works fine."},
        ]}
        trap={<>(b) is false. (c) is trivially true but not the reason. (d) is the naive reading.</>}
        lens={<>Mean-pooling vs attention is exactly the difference DLRM-with-sequence-feature vs HSTU. Mean-pool throws away ordering, position, and cross-token interaction — three things HSTU's scaling-law evidence depends on.</>}
        stretch={<>Is there a cheaper attention-pool that captures most of the gain?</>}
      />

      {/* axis: E2 — alternate failure */}
      <VIS.TrapProblem
        id="hstu-e2b"
        difficulty="hard"
        title="E2b — Friday: NDCG up, watch-time down"
        scenario={<>HSTU ships. Offline NDCG@10 +6%. Online watch-time -1.4%. CTR slightly up. Time-on-feed slightly down. Diagnose the most HSTU-specific cause.</>}
        options={[
          {key:"a", text:"Generative-loss mode collapse: HSTU concentrates on 'safe' high-CTR actions, raising click-rate but lowering exploration; users click more but engage shallower. NDCG (fixed candidate set) rewards this; total watch-time doesn't.", correct:true},
          {key:"b", text:"Latency increased."},
          {key:"c", text:"Random."},
          {key:"d", text:"Calibration drift."},
        ]}
        trap={<>(d) would shift CTR predictions but not the deeper exploration/engagement metric.</>}
        lens={<>The mismatch between "what NDCG rewards" and "what watch-time rewards" is HSTU's hardest production problem because it amplifies with scale. The fix is loss-side regularization (entropy bonus, diversity term) or an explicit exploration objective.</>}
        stretch={<>What single offline metric tracks online watch-time better than NDCG@10?</>}
      />

      {/* axis: F4 — paper-vs-blog */}
      <VIS.TrapProblem
        id="hstu-f4b"
        difficulty="medium"
        title="F4b — What the paper does NOT claim"
        scenario={<>Which of these is NOT a claim made in the HSTU paper itself?</>}
        options={[
          {key:"a", text:"HSTU replaces ANN retrieval indexes.", correct:true},
          {key:"b", text:"HSTU scales as a power law in compute."},
          {key:"c", text:"HSTU's custom attention is 5.3-15.2x over FA2."},
          {key:"d", text:"Pointwise + aggregated norm enables heterogeneous tokens."},
        ]}
        trap={<>(a) is what *TIGER* claims, not HSTU. Many candidates conflate the two.</>}
        lens={<>HSTU is a ranker-side replacement. It assumes a candidate set is delivered from upstream retrieval (ANN, two-tower, TIGER). Confusing the role is a sign someone hasn't read the paper.</>}
        stretch={<>What's the closest HSTU comes to addressing retrieval?</>}
      />

      {/* axis: C4 — temperature */}
      <VIS.TrapProblem
        id="hstu-c4b"
        difficulty="hard"
        title="C4b — Decoding temperature at serving time"
        scenario={<>HSTU autoregressively decodes the next action at serving. What's the effect of varying the decoding temperature T?</>}
        options={[
          {key:"a", text:"T < 1 → mode-collapse to high-frequency actions, higher CTR but lower exploration and worse long-tail recall; T > 1 → flatter distribution, more exploration but noisier CTR predictions.", correct:true},
          {key:"b", text:"Temperature only affects training."},
          {key:"c", text:"Temperature doesn't apply to softmax."},
          {key:"d", text:"T should always be 0."},
        ]}
        trap={<>(b), (c) are wrong. (d) is the greedy-decoding misreading.</>}
        lens={<>Serving-time temperature is an HSTU-specific knob unavailable in DLRM (whose sigmoid has no temperature). Tuning it lets you trade exploration vs exploitation at inference — but it also shifts calibration, so the calibration head must depend on T.</>}
        stretch={<>If T affects calibration, what's the right way to fit the calibration head?</>}
      />

      {/* axis: D4 — bandit comparison */}
      <VIS.TrapProblem
        id="hstu-d4b"
        difficulty="hard"
        title="D4b — HSTU vs contextual bandit"
        scenario={<>Both HSTU and contextual bandits "learn from user actions." What's the actual difference?</>}
        options={[
          {key:"a", text:"Bandits balance exploration vs exploitation explicitly via uncertainty estimates (UCB, Thompson); HSTU has no native uncertainty representation — its 'exploration' is a side-effect of softmax temperature and entropy at decode time, not a designed exploration policy.", correct:true},
          {key:"b", text:"Bandits don't use neural networks."},
          {key:"c", text:"HSTU is a special case of bandits."},
          {key:"d", text:"Bandits work only on cold-start."},
        ]}
        trap={<>(b), (c), (d) are wrong.</>}
        lens={<>HSTU = pure exploitation with implicit exploration via softmax stochasticity. If your business needs principled exploration, layer a bandit on top (HSTU scores → bandit policy → action), or replace HSTU with an RL framework that has exploration as a first-class citizen.</>}
        stretch={<>How would you add Thompson sampling to HSTU? What does the uncertainty estimate come from?</>}
      />

    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li>
          <a href="https://arxiv.org/abs/2402.17152" target="_blank" rel="noopener"><strong>Zhai et al. — Actions Speak Louder than Words</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, ICML 2024)</span>
          <br/>The HSTU paper. Read sections 3 (architecture), 4 (loss), 6 (scaling experiments).
        </li>
        <li>
          <a href="https://arxiv.org/abs/2505.18654" target="_blank" rel="noopener"><strong>Han et al. — MTGR</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, CIKM 2025)</span>
          <br/>Direct critique + fix for HSTU's dropped-crosses problem. Group-Layer Norm details.
        </li>
        <li>
          <a href="https://arxiv.org/abs/2502.18965" target="_blank" rel="noopener"><strong>Cai et al. — OneRec / OneRec-V2</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, Kuaishou 2025)</span>
          <br/>Production-scale generative recsys that consumes HSTU-style sequence ideas + DPO-style alignment.
        </li>
        <li>
          <a href="https://eugeneyan.com/writing/recsys-llm/" target="_blank" rel="noopener"><strong>Eugene Yan — RecSys + LLM landscape</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(blog)</span>
          <br/>Where HSTU fits in the broader LLM-meets-recsys taxonomy; pragmatic engineering lens.
        </li>
        <li>
          <a href="https://arxiv.org/abs/2305.05065" target="_blank" rel="noopener"><strong>Rajput et al. — TIGER</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, NeurIPS 2023)</span>
          <br/>The sibling — generative *retrieval* via RQ-VAE Semantic IDs. Read alongside HSTU to understand the family.
        </li>
      </ul>
    </VIS.Section>
  </main>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
  <script>
    window.addEventListener("error", function (e) {
      const pre = document.createElement("pre");
      pre.style.cssText = "position:fixed;top:0;left:0;right:0;max-height:35vh;"
        + "overflow:auto;background:#fee2e2;color:#7f1d1d;padding:8px;"
        + "margin:0;font:12px/1.4 monospace;z-index:10002;";
      pre.textContent = "[visualize] " + (e.error?.stack || e.message || e);
      document.body.appendChild(pre);
    }, true);
  </script>
