        ]}
        trap={<>(a), (b), (c) are real HSTU choices but do not drive vocab-entropy collapse specifically; only the generative-softmax loss systematically concentrates mass as capacity grows.</>}
        lens={<>The generative loss with a finite vocab tends to mode-collapse as capacity grows. NDCG on a fixed eval set does not notice; online does. The fix is loss regularization (label smoothing on the action vocab) or an explicit exploration head.</>}
        stretch={<>Why doesn't this happen in LLMs at the same rate? What is different about the action vocab?</>}
      />

      {/* F4 */}
      <VIS.TrapProblem
        id="hstu-f4"
        difficulty="hard"
        title="F4 — Picking the regime the HSTU paper itself flags as weak"
        scenario={<>The HSTU paper itself flags a regime where pure HSTU underperforms. Pick the regime named in the paper.</>}
        options={[
          {key:"a", text:"GPU-rich engagement-loop surfaces with long histories, where the action-token scaling law saturates before quality gains materialize."},
          {key:"b", text:"Short user-history domains and surfaces with strong contextual covariates not in the action stream (e.g. search queries, ad targeting context).", correct:true},
          {key:"c", text:"Multilingual content surfaces, where tokenization across languages decouples action types from the items they refer to."},
          {key:"d", text:"Reinforcement-learning recommender environments, where HSTU's generative loss conflicts with the policy-gradient update used by the RL controller."},
        ]}
        trap={<>(a) is the opposite — that is where HSTU wins. (c), (d) are not paper-flagged regimes.</>}
        lens={<>The paper is honest about regime-of-validity. The architectural reason maps to two of the standing HSTU weaknesses: no inductive bias for short sequences, no native handling of context not in the action stream (e.g. query terms in search).</>}
        stretch={<>How would you augment HSTU to handle a strong contextual covariate (e.g. query text) without breaking the action-vocab framework?</>}
      />

      {/* F5 */}
      <VIS.TrapProblem
        id="hstu-f5"
        difficulty="hard"
        title="F5 — Deriving MTGR's motivation from HSTU's architectural choices"
        scenario={<>The MTGR paper (Meituan 2025) shows vanilla HSTU regresses on a specific class of recommendation surface where DLRM had been strong. From HSTU's architectural choices alone, derive which class of surface and which specific mechanism MTGR uses.</>}
        options={[
          {key:"a", text:"Surface: mature DLRM-tuned rankers with deep cross-feature engineering (food delivery, ads). Mechanism: re-inject crosses as additional tokens with Group-Layer Normalization to preserve their signal.", correct:true},
          {key:"b", text:"Surface class: short-form video; mechanism: extend sequences past 16k tokens to push the scaling-law gain past what HSTU's paper showed."},
          {key:"c", text:"Surface class: search; mechanism: replace the action-vocab softmax with sigmoid so each candidate becomes independently scorable inside the existing retrieval stack."},
          {key:"d", text:"Surface class: cold-start-heavy catalogs; mechanism: swap random item-IDs for RQ-VAE Semantic IDs so newly-launched items share embedding prefixes with seen ones."},
        ]}
        trap={<>(b), (c), (d) misread the architectural diff. The HSTU choice that MTGR addresses is dropping crosses, not sequence length, softmax shape, or content tokenization.</>}
        lens={<>HSTU drops crosses → mature DLRM surfaces lose business signal → MTGR re-injects crosses with GLN. The chain of inference is fully derivable from HSTU's architectural choice.</>}
        stretch={<>Why GLN and not just plain concatenation + LayerNorm?</>}
      />

      {/* F1b */}
      <VIS.TrapProblem
        id="hstu-f1b"
        difficulty="hard"
        title="F1b — Why noisy autoplay clicks hurt HSTU more than DLRM"
        scenario={<>Your surface has 60% autoplay click rate (a noisy proxy for genuine engagement). Action vocab: click, dwell, like, share, skip. Pick the option whose mechanism explains why this hurts HSTU more than DLRM.</>}
        options={[
          {key:"a", text:"HSTU cannot represent multi-label data; autoplay-driven clicks and genuine clicks share a label, so HSTU treats them identically while DLRM can split them via separate heads."},
          {key:"b", text:"DLRM is more robust to all noise because its hand-engineered crosses act as a regularizer that filters spurious co-occurrence; HSTU has no such regularizer."},
          {key:"c", text:"HSTU's generative softmax over the action vocab over-weights 'click' (the noisy label) at all scales; DLRM's pointwise sigmoid can be re-weighted post-hoc to compensate without retraining.", correct:true},
          {key:"d", text:"There is no asymmetry — both models degrade equally under autoplay noise once you control for sample size and class imbalance."},
        ]}
        trap={<>(a) is false — HSTU handles multi-label fine. (b) is over-broad — crosses do not regularize label noise. (d) misses the loss-shape asymmetry that lets DLRM be reweighted but forces HSTU into retraining.</>}
        lens={<>The cure for HSTU is reweighting inside the softmax loss (label smoothing toward dwell/like) or filtering autoplay-clicks at the data layer. The asymmetry is that DLRM lets you tweak post-hoc; HSTU forces you to fix it in training.</>}
        stretch={<>If you can only do one of (label smoothing, data filtering), which has more leverage?</>}
      />

      {/* F3b (title rewritten to question form; trim) */}
      <VIS.TrapProblem
        id="hstu-f3b"
        difficulty="hard"
        title="F3b — Identifying the training symptom HSTU surfaces but DLRM cannot"
        scenario={<>You instrument HSTU's training and break cross-entropy out per action type: L_click ≈ 4.2, L_watch ≈ 0.4, L_skip ≈ 3.8, L_like ≈ 5.1. Online NDCG looks fine. Pick the symptom whose existence is a direct consequence of HSTU's architectural choice and is impossible to observe in DLRM training.</>}
        options={[
          {key:"a", text:"Per-action loss spread itself — one shared softmax over a heterogeneous vocab produces class-specific losses driven by base rates and entropy; DLRM's per-target BCE heads cannot exhibit this spread.", correct:true},
          {key:"b", text:"Overall training loss not decreasing across epochs — would surface identically in DLRM under bad LR or batch settings; not HSTU-specific and would not require the per-class breakdown to diagnose."},
          {key:"c", text:"Validation gradient norms exploding mid-training — generic optimization pathology any deep model would exhibit under bad LR; not tied to HSTU's vocab structure or shared softmax design."},
          {key:"d", text:"Memory pressure on the embedding table at peak step — a sharding and sizing problem orthogonal to loss shape; would appear in DLRM with similar vocab cardinality."},
        ]}
        trap={<>(b), (c), (d) are diagnoses that DLRM training surfaces just as readily; redaction-substitute "HSTU" with "Model X" and they remain valid. Only (a) requires HSTU's specific choice of one shared softmax over a heterogeneous action vocab.</>}
        lens={<>The heterogeneous action vocab is the load-bearing fact. The aggregate CE is a misleading dashboard; the right HSTU-era training dashboards must report per-action-class loss + per-class accuracy/recall. The fix is class-balanced loss reweighting or per-class temperature on the action-vocab softmax — not LR/batch tuning.</>}
        stretch={<>If you class-reweight the softmax to equalize per-class loss magnitudes, what new failure mode does that introduce on the offline-online gap?</>}
      />

      {/* F2b */}
      <VIS.TrapProblem
        id="hstu-f2b"
        difficulty="hard"
        title="F2b — Why HSTU is more exposed to membership inference than DLRM"
        scenario={<>A privacy researcher claims HSTU is more vulnerable to membership inference than DLRM. Pick the option whose mechanism explains the asymmetric exposure.</>}
        options={[
          {key:"a", text:"HSTU runs on more powerful GPUs that leak side-channel timing information about which training sequences were processed; DLRM's smaller compute footprint avoids the side channel."},
          {key:"b", text:"HSTU's generative loss memorizes specific action sequences at scale (LLM-style memorization); querying with a partial sequence reveals training-set membership at high accuracy. DLRM's discriminative loss has no equivalent memorization vector.", correct:true},
          {key:"c", text:"DLRM has built-in differential privacy because Platt scaling injects noise into the calibration head; HSTU has no equivalent stochastic post-processing layer."},
          {key:"d", text:"There is no real difference in exposure once both models are trained on the same data; the asymmetry is a benchmarking artifact of different evaluation setups."},
        ]}
        trap={<>(a), (c), (d) are non-answers — side channels and Platt-as-DP are inventions, and the difference is real, not an artifact.</>}
        lens={<>The risk inherits from the generative-loss paradigm. The mitigation is the same as for LLMs (DP-SGD, sequence shuffling, deduplication) but the attack surface is recsys-specific (the attacker does not need text — just a partial action sequence).</>}
        stretch={<>Sketch a DP-SGD adaptation for HSTU. What does it cost in quality?</>}
      />

      {/* A2b */}
      <VIS.TrapProblem
        id="hstu-a2b"
        difficulty="medium"
        title="A2b — Distinguishing HSTU from ByteDance's LongER long-sequence transformer"
        scenario={<>ByteDance's LongER and Meta's HSTU both target long user sequences. Pick the option that names the actual architectural split between them.</>}
        options={[
          {key:"a", text:"They are identical in design but trained on different data — LongER on ByteDance click logs, HSTU on Meta engagement logs; the published metric differences are dataset effects, not architecture."},
          {key:"b", text:"LongER targets ads ranking and uses sigmoid scoring; HSTU targets video feeds and uses softmax — the split is application-specific rather than architectural."},
          {key:"c", text:"LongER focuses on memory-efficient long-context attention for retrieval; HSTU focuses on a generative next-action loss with custom pointwise+aggregated norm for ranking — they solve different parts of the stack.", correct:true},
          {key:"d", text:"LongER replaces transformer attention with a state-space model; HSTU keeps softmax attention but adds hierarchical caching to handle the same context length more efficiently."},
        ]}
        trap={<>(a) and (b) are over-specific or false. (d) misnames both architectures — LongER is still attention-based, HSTU does not use softmax attention.</>}
        lens={<>Long-sequence handling is necessary but not sufficient for HSTU's claims. The novelty is the loss + norm + vocab, not just the context length.</>}
        stretch={<>Could you combine LongER's memory tricks with HSTU's loss? What changes?</>}
      />

      {/* C3b — multi-select */}
      <VIS.TrapProblem
        id="hstu-c3b"
        difficulty="hard"
        title="C3b — Listing the design elements HSTU removes versus DLRM"
        scenario={<>HSTU removes more than crosses relative to DLRM. Identify each element below that HSTU explicitly removes from the DLRM template.</>}
        multiSelect
        options={[
          {key:"a", text:"Hand-engineered cross features — replaced by attention over the action stream.", correct:true},
          {key:"b", text:"Pointwise per-item BCE loss — replaced by a generative softmax over the joint action vocab.", correct:true},
          {key:"c", text:"Separate retrieval and ranking stages — collapsed into a single sequence transducer that scores externally-retrieved candidates.", correct:true},
          {key:"d", text:"LayerNorm — replaced by pointwise + aggregated normalization for heterogeneous tokens.", correct:true},
          {key:"e", text:"Item-ID embedding tables — replaced by content-derived Semantic IDs the way TIGER does."},
          {key:"f", text:"Positional encoding — removed because the causal mask plus action-time gaps already supply order information."},
        ]}
        trap={<>(e) is wrong — HSTU keeps item-ID embeddings (that is exactly what TIGER replaces, not HSTU). (f) is wrong — HSTU keeps position + time bias on the residual stream.</>}
        lens={<>Four removals: crosses, BCE, two-stage funnel, LayerNorm. Two retentions: item-ID embeddings, position encoding. Each removal has a published-rationale connection.</>}
        stretch={<>Which of the four removals would you put back first if you had to weaken HSTU minimally to ship faster?</>}
      />

      {/* E4b */}
      <VIS.TrapProblem
        id="hstu-e4b"
        difficulty="hard"
        title="E4b — Placing the new calibration head for HSTU"
        scenario={<>You are building HSTU's new calibration head. Pick the option whose placement in the stack and choice of input is right.</>}
        options={[
          {key:"a", text:"Sits between HSTU's generative softmax and the auction; consumes the per-(item, action) marginal probability and outputs calibrated P(click | history, item). Fit on held-out (HSTU score, realized click) pairs.", correct:true},
          {key:"b", text:"Sits inside HSTU as an extra transformer layer that re-normalizes the logits before the softmax; trained jointly with the rest of the model on the same loss."},
          {key:"c", text:"Sits before HSTU as a feature-engineering step that pre-computes calibration-relevant features (recency, frequency); HSTU then learns to emit calibrated scores directly."},
          {key:"d", text:"No calibration head is needed — HSTU's generative softmax already produces well-calibrated probabilities because the loss is cross-entropy against ground truth."},
        ]}
        trap={<>(b) confuses calibration with capacity. (c) is upstream and cannot fix output miscalibration. (d) ignores the auction's actual calibration requirement.</>}
        lens={<>The calibration head is downstream of HSTU's softmax, before the auction. The marginalization (joint → per-(item, click) probability) is the HSTU-specific step that is missing in a DLRM Platt pipeline.</>}
        stretch={<>What goes wrong if you fit on training data instead of held-out?</>}
      />

      {/* E3b */}
      <VIS.TrapProblem
        id="hstu-e3b"
        difficulty="hard"
        title="E3b — Why FP8 quantization drifts HSTU's calibration more than DLRM's"
        scenario={<>You quantize HSTU to FP8 for inference. Calibration drifts noticeably more than it would for a similarly-quantized DLRM. Pick the option that names the mechanism behind the asymmetric drift.</>}
        options={[
          {key:"a", text:"FP8 is incompatible with transformer attention kernels in general; HSTU surfaces the issue because it runs more matmuls per token than DLRM, accumulating quantization error proportionally."},
          {key:"b", text:"DLRM has no embedding tables to quantize — its sparse features are already integer-coded — so FP8 affects only the MLP, while HSTU quantizes everything end to end."},
          {key:"c", text:"HSTU's generative softmax has long tails; FP8 underflow on small probabilities truncates the tail and distorts the calibrated CTR estimate. DLRM's pointwise sigmoid outputs a single scalar that FP8 represents accurately.", correct:true},
          {key:"d", text:"Quantization does not affect calibration in either model; the observed drift is a deployment artifact caused by the quantized model running on a different GPU generation than the FP32 baseline."},
        ]}
        trap={<>(a), (b), (d) are misreadings — FP8 works fine with attention, DLRM does have FP-typed embeddings, and quantization absolutely shifts probability distributions.</>}
        lens={<>The interaction is precision-vs-distribution-shape: long-tailed outputs are sensitive to low-bit precision in a way that scalar sigmoid is not. Mitigation: keep the final softmax + calibration head in BF16/FP16; quantize earlier layers only.</>}
        stretch={<>Which other distribution-shape sensitivities does FP8 expose in HSTU vs DLRM?</>}
      />

      {/* D1c */}
      <VIS.TrapProblem
        id="hstu-d1c"
        difficulty="medium"
        title="D1c — Why a sequence-mean-pool feature on DLRM falls short of HSTU"
        scenario={<>A skeptical lead says: instead of migrating to HSTU, just add a sequence-mean-pool feature to DLRM and ship. Pick the option whose explanation correctly identifies what the workaround forfeits.</>}
        options={[
          {key:"a", text:"Mean-pooling cannot be plumbed into DLRM's MLP top without breaking the existing feature-cross signature; the workaround fails for engineering reasons before it is even evaluated."},
          {key:"b", text:"Mean-pooling discards the sequential signal HSTU's attention captures (recency, ordering, cross-token interactions); the scaling-law evidence in the paper is tied to attention over the sequence, not summary statistics over it.", correct:true},
          {key:"c", text:"The workaround needs a full retraining cycle that costs as much as the HSTU migration, so the savings claim does not hold even if the modeling claim did."},
          {key:"d", text:"It actually works fine — at most surfaces a mean-pooled sequence feature recovers ~95% of HSTU's lift, so the migration is rarely justified."},
        ]}
        trap={<>(a) is invented — mean-pool plumbs into DLRM easily. (c) is trivially true but not the load-bearing reason. (d) is the naive reading.</>}
        lens={<>Mean-pooling vs attention is exactly the difference between DLRM-with-sequence-feature and HSTU. Mean-pool throws away ordering, position, and cross-token interaction — three things HSTU's scaling-law evidence depends on.</>}
        stretch={<>Is there a cheaper attention-pool that captures most of the gain?</>}
      />

      {/* E2b */}
      <VIS.TrapProblem
        id="hstu-e2b"
        difficulty="hard"
        title="E2b — Diagnosing NDCG up + watch-time down after HSTU ramp"
        scenario={<>HSTU ships. Offline NDCG@10 +6%. Online watch-time -1.4%. CTR slightly up. Time-on-feed slightly down. Pick the cause whose mechanism is HSTU-specific.</>}
        options={[
          {key:"a", text:"Calibration drift after cutover — CTR predictions slipped right, the auction overweights low-quality items, and watch-time falls as a downstream symptom of mis-priced bids."},
          {key:"b", text:"Latency increased on the long-sequence path, pushing some requests past the p99 budget and degrading the served candidate set; offline eval used the full budget and missed this."},
          {key:"c", text:"Sample-size noise — a 1.4% delta on watch-time is within typical week-over-week variance for a video feed, so no underlying mechanism is needed to explain the result."},
          {key:"d", text:"Generative-loss mode collapse — HSTU concentrates on safe high-CTR actions, raising click-rate but lowering exploration; users click more but engage shallower. NDCG (fixed candidate set) rewards this; total watch-time does not.", correct:true},
        ]}
        trap={<>(a) would shift CTR predictions but not the exploration/engagement metric. (b) and (c) are generic ops/noise excuses that ignore the metric pattern (CTR up, watch-time down) HSTU's loss shape predicts.</>}
        lens={<>The mismatch between what NDCG rewards and what watch-time rewards is HSTU's hardest production problem because it amplifies with scale. The fix is loss-side regularization (entropy bonus, diversity term) or an explicit exploration objective.</>}
        stretch={<>What single offline metric tracks online watch-time better than NDCG@10?</>}
      />

      {/* F4b (title rephrased — was 'does NOT claim', G17) */}
      <VIS.TrapProblem
        id="hstu-f4b"
        difficulty="medium"
        title="F4b — Spotting the claim falsely attributed to the HSTU paper"
        scenario={<>Identify the claim that the HSTU paper does itself attribute to TIGER or another sibling system, rather than making it directly.</>}
        options={[
          {key:"a", text:"HSTU replaces ANN retrieval indexes with autoregressive Semantic-ID decoding.", correct:true},
          {key:"b", text:"HSTU's offline quality scales as a power law in compute, the way LLM pretraining does."},
          {key:"c", text:"HSTU's custom attention is 5.3-15.2× faster than FlashAttention2 at 8k context."},
          {key:"d", text:"Pointwise + aggregated normalization enables a single residual stream to carry heterogeneous tokens."},
        ]}
        trap={<>(a) is what TIGER claims, not HSTU. Many candidates conflate the two.</>}
        lens={<>HSTU is a ranker-side replacement. It assumes a candidate set is delivered from upstream retrieval (ANN, two-tower, TIGER). Confusing the role is a sign someone has not read the paper.</>}
        stretch={<>What is the closest HSTU comes to addressing retrieval?</>}
      />

      {/* C4b */}
      <VIS.TrapProblem
        id="hstu-c4b"
        difficulty="hard"
        title="C4b — Predicting the effect of decoding temperature at serving time"
        scenario={<>HSTU autoregressively decodes the next action at serving. Pick the option that correctly characterizes how varying the decoding temperature T trades off online metrics.</>}
        options={[
          {key:"a", text:"Temperature only affects training — at serving time HSTU's softmax is replaced by argmax, so T has no effect on the served action distribution."},
          {key:"b", text:"Temperature does not apply to HSTU's softmax because the action vocab is heterogeneous; per-action-type scaling is required and a single T silently has no effect on most action types."},
          {key:"c", text:"T < 1 mode-collapses to high-frequency actions, raising CTR but lowering exploration and long-tail recall; T > 1 flattens the distribution, raising exploration but adding noise to CTR predictions.", correct:true},
          {key:"d", text:"T should always be 0 (greedy decoding) — any T > 0 introduces stochasticity that the auction cannot reconcile with deterministic bidding."},
        ]}
        trap={<>(a), (b) are wrong — T applies and matters at serving. (d) is the greedy-decoding misreading; T = 0 throws away the exploration knob the loss makes available.</>}
        lens={<>Serving-time temperature is an HSTU-specific knob unavailable in DLRM (whose sigmoid has no temperature). Tuning it lets you trade exploration vs exploitation at inference — but it also shifts calibration, so the calibration head must depend on T.</>}
        stretch={<>If T affects calibration, what is the right way to fit the calibration head?</>}
      />

      {/* D4b */}
      <VIS.TrapProblem
        id="hstu-d4b"
        difficulty="hard"
        title="D4b — Distinguishing HSTU from a contextual bandit"
        scenario={<>HSTU and contextual bandits both learn from user actions. Pick the option that names the actual functional difference between them as production systems.</>}
        options={[
          {key:"a", text:"Bandits do not use neural networks; they rely on linear models with closed-form regret bounds, while HSTU is a deep transformer with no such bound."},
          {key:"b", text:"HSTU is a special case of contextual bandits — the next-action softmax is mathematically equivalent to a Thompson-sampling step over the action vocab."},
          {key:"c", text:"Bandits are only useful for cold-start exploration and become redundant once enough impression data is collected, while HSTU is the steady-state ranker."},
          {key:"d", text:"Bandits balance exploration vs exploitation via explicit uncertainty estimates (UCB, Thompson); HSTU has no native uncertainty representation — its exploration is a side-effect of softmax temperature at decode.", correct:true},
        ]}
        trap={<>(a), (b), (c) are wrong: bandits can use neural networks, HSTU is not a Thompson-sampling step, and bandits are not only for cold-start.</>}
        lens={<>HSTU is pure exploitation with implicit exploration via softmax stochasticity. If your business needs principled exploration, layer a bandit on top (HSTU scores → bandit policy → action), or replace HSTU with an RL framework that has exploration as a first-class citizen.</>}
        stretch={<>How would you add Thompson sampling to HSTU? What does the uncertainty estimate come from?</>}
      />

    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li>
          <a href="https://arxiv.org/abs/2402.17152" target="_blank" rel="noopener"><strong>Zhai et al. — Actions Speak Louder than Words</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, ICML 2024)</span>
          <br/>The HSTU paper. Read sections 3 (architecture), 4 (loss), 6 (scaling experiments).
        </li>

        </li>
        <li>

          <a href="https://eugeneyan.com/writing/recsys-llm/" target="_blank" rel="noopener"><strong>Eugene Yan — RecSys + LLM landscape</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(blog)</span>
          <br/>Where HSTU fits in the broader LLM-meets-recsys taxonomy; pragmatic engineering lens.
        </li>
        <li>
          <a href="https://arxiv.org/abs/2305.05065" target="_blank" rel="noopener"><strong>Rajput et al. — TIGER</strong></a>{" "}

        </li>

    </VIS.Section>
  </main>
);
