  // <VIS.Term def="1-2 sentence plain-English explanation">jargon</VIS.Term>
  //
  // Wraps any technical term so a non-technical reader can hover for an
  // immediate definition. The explanation should:
  //   - assume the reader knows English but not software/your domain
  //   - fit in 1-2 short sentences (a tooltip, not a paragraph)
  //   - avoid further jargon (or wrap that too)
  //
  // The element exposes `data-rv-info` so the report-viewer overlay reuses
  // its own tooltip + double-click "explain this" feedback flow. In
  // standalone /visualize mode (no overlay), the lightweight hover handler
  // below renders the tooltip directly.
  function Term({ def, children }) {
    if (!def) return h(React.Fragment, null, children);
    return h("span", {
      className: "vis-term",
      "data-rv-info": def,
      "aria-label": def,
      tabIndex: 0,
    }, children);
  }

  // Standalone hover tooltip for <VIS.Term>. If the report-viewer overlay
  // is loaded it already shows tooltips for any [data-rv-info] element, so
  // we short-circuit here to avoid double-rendering.
  (function installTermTooltip() {
    let tip = null;
    function show(el) {
      if (window.__rvReady) return;  // overlay.js owns the tooltip in report-viewer mode
      const text = el.getAttribute("data-rv-info");
      if (!text) return;
      if (!tip) {
        tip = document.createElement("div");
        tip.className = "vis-term-tip";
        document.body.appendChild(tip);
      }
      tip.textContent = text;
      const r = el.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const pad = 8;
      let left = Math.max(pad,
        Math.min(r.left, window.innerWidth - tr.width - pad));
      const above = r.top - tr.height - pad;
      const below = r.bottom + pad;
      tip.style.left = left + "px";
      tip.style.top  = (above >= pad ? above : below) + "px";
      tip.style.display = "block";
    }
    function hide() { if (tip) tip.style.display = "none"; }
    document.addEventListener("mouseover", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el); else hide();
    });
    document.addEventListener("focusin", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el);
    });
    document.addEventListener("focusout", hide);
    document.addEventListener("scroll", hide, true);
    // Touch / tap support: on a tap, toggle the tip for the tapped term.
    // Tapping anywhere else (including a different term) hides the current.
    let lastTappedTerm = null;
    document.addEventListener("click", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) {
        if (el === lastTappedTerm) { lastTappedTerm = null; hide(); }
        else { lastTappedTerm = el; show(el); }
      } else {
        lastTappedTerm = null; hide();
      }
    });
  })();

  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."
  //   scenario={<>...JSX...</>}
  //   diagram={<VIS.Mermaid chart={...} />}
  //   options={[
  //     {key:"a", text:"...", correct:false},
  //     {key:"b", text:"...", correct:true},
  //     ...
  //   ]}
  //   trap={<>The most tempting wrong is X because...</>}
  //   lens={<>The right answer + reasoning</>}
  //   stretch="optional follow-up question"
  // />
  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// REDO v2 — RecSys-SOTA batch 12
// MixGCF (Huang et al., KDD 2021; survey arXiv 2409.07237, 2024)
// Unique mechanism: SYNTHESIZES hard negatives by MIXING graph-neighborhood
// embeddings. Takes the positive item embedding, samples K candidate negatives,
// and INTERPOLATES (linearly combines) them in the GCN latent space at a layer-
// wise mixing factor to produce a synthetic hard negative that does not
// correspond to any real item. The point: hardness is CONSTRUCTED in latent
// space, not MINED from existing items.
// Cross-visual caution (negative-sampling trio):
//   - MixGCF  = SYNTHESIZES via embedding-mix in GCN latent space (no labels needed) [THIS visual]
//   - LLMHNS  = LLM reasons about candidate-positive similarity (label-aware text)
//   - AHNS    = ADAPTIVE difficulty per user as their embedding converges (curriculum)
// Anchor that survives §2a redaction: "synthetic hard negatives via layer-wise
// embedding interpolation in a GCN" — NOT generic hard-negative mining.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="RecSys SOTA · Negative sampling (graph)"
      title="MixGCF — Synthetic hard negatives by embedding-mixing in GCN latent space"
      subtitle="Samples K candidate negatives from the graph, then INTERPOLATES (linearly mixes) their embeddings with the positive at each GCN layer to fabricate a synthetic hard negative. The synthetic item never exists in the catalog — and that is the point."
      byline={[
        {label: "Paper", value: "Huang et al., MixGCF (KDD 2021); survey arXiv 2409.07237 (2024)"},
        {label: "Surface", value: "GNN-based retrieval (LightGCN, NGCF) where in-batch hard negatives plateau"},
        {label: "Anchor that survives redaction", value: "Synthesis-by-mixing in GCN latent space, not mining from real items"},
      ]}/>

    <VIS.TLDR>
      Standard <VIS.Term def="Training examples drawn to be examples of the &lsquo;not-clicked&rsquo; outcome. Random negatives are typically far too easy for a converged model.">negative samples</VIS.Term> in graph recsys are too easy: a converged GCN already separates random pairs with high margin, so the gradient vanishes. MixGCF makes hard negatives by <strong>synthesizing</strong> them: at each GCN layer it samples K candidate negatives, computes per-layer mixing coefficients via an inner-product hardness score, and linearly combines the candidate embeddings with the positive&apos;s. The resulting embedding does NOT correspond to any item in the catalog — it is a <em>fabricated</em> latent point that sits on the decision boundary. That is the load-bearing claim: <em>hardness is CONSTRUCTED in latent space, not MINED from existing items</em>. The sibling concepts (LLMHNS, AHNS) work very differently — see the cross-visual caution at the top of this file.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is — layer-wise embedding interpolation">
      <VIS.Mermaid chart={`flowchart TB
  P["Positive item embedding (per-layer)"]
  N["K sampled candidate negatives (per-layer)"]
  S["Hardness score (inner product with user)"]
  M["Layer-wise mixing coefficient alpha_l"]
  Z["Synthetic negative embedding (linear combo at each layer)"]
  L["BPR or InfoNCE loss vs synthetic negative"]
  P --> Z
  N --> S
  S --> M
  M --> Z
  Z --> L`} />
      <ul>
        <li><strong>Per-layer sampling</strong> — at each GCN layer L, sample K candidate negatives independently; this exploits the multi-hop neighborhood structure unique to GCN-based retrieval.</li>
        <li><strong>Hardness score</strong> — inner product of each candidate with the user (or positive) embedding; harder candidates score higher.</li>
        <li><strong>Layer-wise mixing</strong> — coefficient alpha_l per layer; the harder the candidate at layer L, the more weight it gets.</li>
        <li><strong>Synthetic embedding</strong> — output is a linear combination at each layer; the negative item DOES NOT exist in the catalog.</li>
      </ul>
      <p>The synthetic negative is consumed by the standard BPR / InfoNCE loss as if it were a real item embedding.</p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How it differs from in-batch and standard hard-negative mining">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8, fontSize:14}}>
        <thead><tr style={{background:"#1f3a5f", color:"#fff"}}>
          <th style={{textAlign:"left", padding:8}}>Method</th>
          <th style={{textAlign:"left", padding:8}}>Negative source</th>
          <th style={{textAlign:"left", padding:8}}>Hardness</th>
          <th style={{textAlign:"left", padding:8}}>Exists in catalog?</th>
        </tr></thead>
        <tbody>
          <tr><td style={{padding:8}}>Random / uniform</td><td style={{padding:8}}>Whole catalog</td><td style={{padding:8}}>Too easy</td><td style={{padding:8}}>Yes</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:8}}>In-batch</td><td style={{padding:8}}>Same minibatch</td><td style={{padding:8}}>Medium</td><td style={{padding:8}}>Yes</td></tr>
          <tr><td style={{padding:8}}>Standard hard mining</td><td style={{padding:8}}>Top-scored real items</td><td style={{padding:8}}>Hard</td><td style={{padding:8}}>Yes — entrenches model bias</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:8}}><strong>MixGCF</strong></td><td style={{padding:8}}><strong>SYNTHESIZED (latent-space mix)</strong></td><td style={{padding:8}}><strong>Boundary-tunable</strong></td><td style={{padding:8}}><strong>NO — fabricated</strong></td></tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — 24 trap problems">
      <p style={{color:"#475569"}}>Each problem cites the axis it draws from. Pick, then reveal.</p>

      {/* A1 */}
      <VIS.TrapProblem id="mixgcf-p1" difficulty="hard"
        title="P1 — MixGCF vs standard hard-negative mining: what is the load-bearing difference?"
        scenario={<><em>Discriminating insight: hard-negative MINING picks the top-scored REAL items (entrenches model bias because the model picks its own confusions); MixGCF SYNTHESIZES a latent point by interpolating embeddings (no real item is required).</em><br/>Pick.</>}
        options={[
          {key:"a", text:"MixGCF SYNTHESIZES hard negatives by linearly mixing embeddings of sampled candidates with the positive at each GCN layer — the resulting embedding corresponds to no real item. Hard-negative mining picks the top-scored real items, which entrenches the model&apos;s existing confusions.", correct:true},
          {key:"b", text:"MixGCF and hard mining both pick top-scored real items."},
          {key:"c", text:"MixGCF uses an LLM to score candidates."},
          {key:"d", text:"MixGCF is metric-based meta-learning."},
        ]}
        trap={<>(b) collapses the distinction. (c) confuses with LLMHNS. (d) wrong family.</>}
        lens={<>Synthesis (latent mix) is qualitatively different from mining (real top-K).</>}
        stretch={<>Why does mining entrench bias but synthesis does not?</>}
      />

      {/* A2 definitional */}
      <VIS.TrapProblem id="mixgcf-p2" difficulty="hard"
        title="P2 — MixGCF vs LLMHNS vs AHNS: anchor each"
        scenario={<><em>Discriminating insight: this is the cross-visual caution. MixGCF = synthesizes (embedding-mix in GCN latent space). LLMHNS = LLM scores real candidates by semantic similarity. AHNS = adaptive curriculum on hardness per user/epoch.</em><br/>Pick the correct triple.</>}
        options={[
          {key:"a", text:"MixGCF synthesizes by layer-wise embedding interpolation in a GCN; LLMHNS uses an LLM to score real candidates by semantic similarity; AHNS adapts the difficulty schedule of negatives across training. Mechanism, source, and schedule are all different.", correct:true},
          {key:"b", text:"They are the same family with different names."},
          {key:"c", text:"MixGCF uses an LLM; LLMHNS uses a curriculum."},
          {key:"d", text:"All three pick the top-scored real item."},
        ]}
        trap={<>(b)(c)(d) collapse distinctions central to the trio.</>}
        lens={<>SYNTHESIZE vs SCORE vs SCHEDULE — the three anchors.</>}
        stretch={<>Which of the three would you stack with which?</>}
      />

      {/* A3 counterfactual */}
      <VIS.TrapProblem id="mixgcf-p3" difficulty="medium"
        title="P3 — Without MixGCF, what is the realistic GCN retrieval fallback?"
        scenario={<><em>Discriminating insight: in-batch negatives plateau in GCN retrieval (as the model converges, batch-mates become too easy); random negatives are even worse. The realistic alternative is hard-negative mining, which entrenches bias.</em><br/>Pick the realistic gap.</>}
        options={[
          {key:"a", text:"In-batch or hard-negative mining. In-batch saturates as the model converges; hard mining entrenches the model&apos;s own confusions. MixGCF&apos;s synthesis side-steps both by fabricating boundary-adjacent latents.", correct:true},
          {key:"b", text:"Random uniform negatives are at parity with MixGCF."},
          {key:"c", text:"Hard mining strictly dominates MixGCF."},
          {key:"d", text:"You would not need negatives."},
        ]}
        trap={<>(b) too easy. (c) reverses the paper&apos;s finding. (d) wrong family.</>}
        lens={<>Both fallbacks have characteristic failure modes that synthesis avoids.</>}
        stretch={<>What does &ldquo;saturate&rdquo; look like in the loss curve?</>}
      />

      {/* A4 composition */}
      <VIS.TrapProblem id="mixgcf-p4" difficulty="hard"
        title="P4 — Compose MixGCF with AHNS curriculum"
        scenario={<><em>Discriminating insight: MixGCF controls the spatial difficulty (where in latent space the negative sits); AHNS controls the temporal difficulty (when in training to make negatives hard). They are orthogonal — AHNS can schedule MixGCF&apos;s mixing coefficient over epochs.</em><br/>What does the stack achieve?</>}
        options={[
          {key:"a", text:"AHNS schedules MixGCF&apos;s mixing coefficient (alpha) across epochs: small alpha early (easy synthetic negatives), large alpha late (boundary-adjacent synthetic negatives). Spatial mechanism (MixGCF) and temporal schedule (AHNS) are orthogonal.", correct:true},
          {key:"b", text:"AHNS and MixGCF are mutually exclusive."},
          {key:"c", text:"AHNS replaces MixGCF."},
          {key:"d", text:"The stack is identical to LLMHNS."},
        ]}
        trap={<>(b)(c) mistake the orthogonality. (d) confuses families.</>}
        lens={<>Spatial vs temporal control composes.</>}
        stretch={<>What if the AHNS schedule mis-paces alpha?</>}
      />

      {/* A5 boundary */}
      <VIS.TrapProblem id="mixgcf-p5" difficulty="medium"
        title="P5 — At what catalog size does MixGCF stop helping?"
        scenario={<><em>Discriminating insight: with very small catalogs (≤500 items), random and in-batch negatives are already informative — synthesis adds little and risks creating off-manifold latents. The advantage grows with catalog size.</em><br/>Where is the boundary?</>}
        options={[
          {key:"a", text:"Very small catalogs (a few hundred items). In-batch already covers most of the space; synthesis adds noise rather than signal. MixGCF&apos;s advantage scales with catalog size, where random/in-batch becomes hopelessly easy.", correct:true},
          {key:"b", text:"MixGCF always wins."},
          {key:"c", text:"MixGCF only helps under 100 items."},
          {key:"d", text:"Catalog size is irrelevant."},
        ]}
        trap={<>(b)(c)(d) miss the scale dependence.</>}
        lens={<>Synthesis pays off where the real-item space is too sparse to mine well.</>}
        stretch={<>What threshold for catalog size would you pick?</>}
      />

      {/* B1 application */}
      <VIS.TrapProblem id="mixgcf-p6" difficulty="hard"
        title="P6 — Pick the negative-sampling strategy for this scenario"
        scenario={<><em>Discriminating insight: a 50M-item LightGCN retrieval system has plateaued NDCG with in-batch negatives. The user is GNN-shaped, embeddings are in a GCN latent space, hard mining would entrench the model&apos;s confusions. MixGCF&apos;s synthesis is purpose-built.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"MixGCF — GCN latent space, in-batch saturated, hard mining would entrench bias. Synthesis at the layer level uses the GCN structure that already exists.", correct:true},
          {key:"b", text:"LLMHNS — adds an offline LLM cost but no textual signal is given as a constraint here."},
          {key:"c", text:"AHNS — schedules difficulty but does not change the negative source."},
          {key:"d", text:"Random negatives — already saturated."},
        ]}
        trap={<>(b) needs textual content. (c) orthogonal. (d) the saturated baseline.</>}
        lens={<>GCN + in-batch saturation = MixGCF&apos;s sweet spot.</>}
        stretch={<>If text were available, when would LLMHNS dominate MixGCF?</>}
      />

      {/* B2 sounds reasonable */}
      <VIS.TrapProblem id="mixgcf-p7" difficulty="hard"
        title="P7 — Sounds reasonable: &ldquo;synthetic negatives are catastrophic — they don&apos;t exist&rdquo;"
        scenario={<><em>Discriminating insight: many engineers reject MixGCF on the grounds that &ldquo;the negative is a fake item.&rdquo; The reason it is NOT catastrophic: BPR / InfoNCE only require an embedding to push the user away from; it does not need to be a real item. The synthetic embedding sits where the model is currently confused, which is exactly the gradient signal you want.</em><br/>Why is the objection wrong?</>}
        options={[
          {key:"a", text:"The loss does not require negatives to be real items — it requires embeddings to push away from. The synthetic embedding lives where the model is currently confused; that is the right gradient signal. The catalog constraint is a serving concept, not a training one.", correct:true},
          {key:"b", text:"Synthetic negatives ARE catastrophic; MixGCF only works by accident."},
          {key:"c", text:"BPR cannot handle synthetic negatives."},
          {key:"d", text:"Synthetic and real negatives are mathematically identical."},
        ]}
        trap={<>(b) the seductive misread. (c) false. (d) ignores the construction.</>}
        lens={<>Loss operates on embeddings, not items; that decoupling is what enables synthesis.</>}
        stretch={<>How would you sanity check that the synthetic latent is on-manifold?</>}
      />

      {/* B3 anchor */}
      <VIS.TrapProblem id="mixgcf-p8" difficulty="hard"
        title="P8 — MixGCF&apos;s anchor (synthesize via embedding-mix in GCN latent space): pitch it"
        scenario={<><em>Discriminating insight: the anchor is &ldquo;hardness is CONSTRUCTED via per-layer interpolation in GCN latent space, not MINED from real items.&rdquo;</em><br/>Pick the pitch that names the anchor.</>}
        options={[
          {key:"a", text:"Instead of picking the top-scored REAL item as the hard negative (which entrenches the model&apos;s own confusions), MixGCF FABRICATES a hard negative by linearly mixing candidate embeddings with the positive at each GCN layer. The latent point sits on the current decision boundary; it does not need to be a real item.", correct:true},
          {key:"b", text:"We use a bigger embedding table."},
          {key:"c", text:"We add an LLM to score candidates."},
          {key:"d", text:"We use random negatives more aggressively."},
        ]}
        trap={<>(b) capacity misread. (c) confuses with LLMHNS. (d) the baseline.</>}
        lens={<>Synthesis-by-mix is the unique mechanism.</>}
        stretch={<>What property of the GCN makes per-layer mixing tractable?</>}
      />

      {/* B4 not to use */}
      <VIS.TrapProblem id="mixgcf-p9" difficulty="hard" multiSelect
        title="P9 — When NOT to use MixGCF. Select all that apply."
        scenario={<><em>Discriminating insight: MixGCF needs a GCN (per-layer embeddings to mix), enough catalog size for in-batch to saturate, and an inner-product compatible loss (BPR/InfoNCE). It is misapplied in non-graph retrieval or sequential rec models.</em><br/>Pick the do-not-use cases.</>}
        options={[
          {key:"a", text:"Non-graph retrieval (two-tower MLP) — no per-layer GCN structure to mix.", correct:true},
          {key:"b", text:"Sequential rec (SASRec, BERT4Rec) — different embedding structure; layer-wise mix is undefined.", correct:true},
          {key:"c", text:"Tiny catalogs (few hundred items) where in-batch is already informative.", correct:true},
          {key:"d", text:"50M-item LightGCN retrieval — sweet spot."},
          {key:"e", text:"Pointwise classification with a sigmoid loss (no negative pairing in the loss form).", correct:true},
        ]}
        trap={<>(d) is the sweet spot.</>}
        lens={<>MixGCF needs GCN + pairwise loss + non-trivial catalog.</>}
        stretch={<>How would you adapt the mixing idea to sequential models?</>}
      />

      {/* C1 architectural */}
      <VIS.TrapProblem id="mixgcf-p10" difficulty="hard"
        title="P10 — Why mix at each GCN LAYER, not just at the final embedding?"
        scenario={<><em>Discriminating insight: mixing at the final layer only is one choice; mixing per-layer interpolates along the graph aggregation path so that the synthetic negative inherits hard structure at multiple receptive-field sizes. This is the GCN-specific knob — only graph models have layer-wise embeddings.</em><br/>Why per-layer?</>}
        options={[
          {key:"a", text:"Per-layer mixing produces synthetic negatives hard at multiple receptive-field sizes (1-hop, 2-hop, 3-hop). Final-layer-only mixing produces one mixed point; per-layer mixing uses the GCN&apos;s aggregation structure that already exists.", correct:true},
          {key:"b", text:"Per-layer mixing is mathematically equivalent to final-layer mixing."},
          {key:"c", text:"Per-layer mixing is a latency optimization."},
          {key:"d", text:"Per-layer mixing is a fallback."},
        ]}
        trap={<>(b)(c)(d) miss the receptive-field structure.</>}
        lens={<>The GCN&apos;s multi-hop structure is what makes per-layer mixing meaningful.</>}
        stretch={<>What if all layers had the same receptive field?</>}
      />

      {/* C2 loss */}
      <VIS.TrapProblem id="mixgcf-p11" difficulty="hard"
        title="P11 — Which loss compositions are compatible with MixGCF?"
        scenario={<><em>Discriminating insight: MixGCF feeds the synthetic embedding into a standard pairwise loss (BPR or InfoNCE). It is NOT compatible with pointwise sigmoid (no negative pairing), and it interacts subtly with sampled-softmax (the partition function expects real items).</em><br/>Pick.</>}
        options={[
          {key:"a", text:"BPR or InfoNCE: the loss takes an explicit (user, positive, negative) triple, and the negative is just an embedding to push away from. Pointwise sigmoid has no negative pairing; sampled-softmax assumes negatives index real items.", correct:true},
          {key:"b", text:"Pointwise sigmoid is fully compatible."},
          {key:"c", text:"Sampled-softmax requires no adaptation."},
          {key:"d", text:"Only adversarial loss works."},
        ]}
        trap={<>(b)(c) are the seductive misreads.</>}
        lens={<>Pairwise loss is required; partition-function losses need adaptation.</>}
        stretch={<>How would you adapt sampled-softmax for synthetic negatives?</>}
      />

      {/* C3 dropped */}
      <VIS.TrapProblem id="mixgcf-p12" difficulty="hard"
        title="P12 — What does MixGCF deliberately give up vs hard-negative mining?"
        scenario={<><em>Discriminating insight: hard mining gives you a REAL item you can also analyze (look up its features, debug why it was confused). MixGCF gives you a LATENT POINT — no item-level interpretability. The gain is unbiased boundary-adjacency; the loss is debuggability of individual negatives.</em><br/>What does MixGCF forfeit?</>}
        options={[
          {key:"a", text:"Item-level interpretability of individual negatives. The synthetic embedding does not correspond to a real item, so you cannot look up its features when debugging. The gain is unbiased boundary-adjacency; the loss is the &ldquo;which item is the model confused with?&rdquo; diagnostic.", correct:true},
          {key:"b", text:"MixGCF forfeits the use of a GCN."},
          {key:"c", text:"MixGCF forfeits BPR loss."},
          {key:"d", text:"MixGCF forfeits training speed."},
        ]}
        trap={<>(b)(c)(d) miss the dropped diagnostic.</>}
        lens={<>You trade interpretability for unbiased synthesis.</>}
        stretch={<>How would you recover an &ldquo;effective real item&rdquo; from the synthetic latent for debugging?</>}
      />

      {/* C4 hyperparameter */}
      <VIS.TrapProblem id="mixgcf-p13" difficulty="hard"
        title="P13 — Most fragile knob"
        scenario={<><em>Discriminating insight: the layer-wise mixing coefficient alpha dominates. Too small: synthetic ≈ positive, loss is too easy. Too large: synthetic ≈ averaged-negatives, loss is unstable. K (number of candidates) is robust within a range.</em><br/>Rank by 2x mis-set breakage.</>}
        options={[
          {key:"a", text:"alpha (mixing coefficient) is most fragile; K (candidates per layer) is next; learning rate is least. alpha is the spatial difficulty knob; mis-set destroys the synthesis premise.", correct:true},
          {key:"b", text:"K is the most fragile knob."},
          {key:"c", text:"Learning rate is the most fragile knob."},
          {key:"d", text:"Number of GCN layers is the most fragile knob."},
        ]}
        trap={<>(b)(c)(d) miss the mixing-coefficient mechanism.</>}
        lens={<>alpha sets where the synthetic negative sits relative to the decision boundary.</>}
        stretch={<>What does the optimal alpha schedule look like over training?</>}
      />

      {/* C5 data assumption */}
      <VIS.TrapProblem id="mixgcf-p14" difficulty="medium"
        title="P14 — Data assumption violations"
        scenario={<><em>Discriminating insight: MixGCF assumes the embedding space is locally linear enough that mid-point interpolation lands on a useful latent. Highly clustered embedding spaces with deep clusters break this — the mid-point falls in a void between clusters.</em><br/>Which violation is most direct?</>}
        options={[
          {key:"a", text:"Highly clustered embedding space with empty regions between clusters. Linear interpolation between embeddings from different clusters lands in the void; the synthetic negative is off-manifold and gives a noisy gradient.", correct:true},
          {key:"b", text:"Off-by-one in user-id indexing."},
          {key:"c", text:"Different tokenizer."},
          {key:"d", text:"Mismatched batch sizes."},
        ]}
        trap={<>(b)(c)(d) generic.</>}
        lens={<>Local linearity is the contract of the mix.</>}
        stretch={<>How would you measure local linearity of the embedding space?</>}
      />

      {/* D1 intuitive but wrong */}
      <VIS.TrapProblem id="mixgcf-p15" difficulty="hard"
        title="P15 — Intuitive but wrong: &ldquo;synthetic negatives are essentially data augmentation&rdquo;"
        scenario={<><em>Discriminating insight: data augmentation operates in input space (image rotations, text dropouts). MixGCF operates in LATENT space at a specific layer of a specific model. It is NOT generic augmentation; the embedding space and the loss form are load-bearing.</em><br/>Why is &ldquo;just augmentation&rdquo; wrong?</>}
        options={[
          {key:"a", text:"MixGCF operates in the model&apos;s LATENT space at specific GCN layers, not in the input space. It depends on the embedding space being locally linear and on the loss form (pairwise). Generic data augmentation in input space has neither property; the analogy hides the load-bearing pieces.", correct:true},
          {key:"b", text:"MixGCF IS just standard data augmentation."},
          {key:"c", text:"Data augmentation requires no embedding space."},
          {key:"d", text:"MixGCF and augmentation are unrelated families."},
        ]}
        trap={<>(b) the seductive misread. (c)(d) miss the latent-space claim.</>}
        lens={<>Latent space mix and input-space augmentation are different in mechanism and assumptions.</>}
        stretch={<>What is the closest input-space analog of MixGCF?</>}
      />

      {/* D2 wrong-assumption cascade */}
      <VIS.TrapProblem id="mixgcf-p16" difficulty="hard"
        title="P16 — Wrong-assumption cascade"
        scenario={<><em>Discriminating insight: &ldquo;MixGCF is hard-negative mining + a trick&rdquo; cascades into (i) using top-scored real items as the &ldquo;candidate&rdquo; pool (re-introduces mining bias), (ii) treating alpha as a regularizer rather than a difficulty knob, (iii) evaluating only on AUC instead of NDCG@K (where boundary-tuning shows up).</em><br/>What breaks?</>}
        options={[
          {key:"a", text:"All three: the candidate sampling becomes biased, alpha is tuned wrong, and the metric does not show the boundary-tuning gain. MixGCF&apos;s candidates should be sampled WITHOUT model-self bias; alpha is a spatial-difficulty knob; NDCG@K is the eval surface.", correct:true},
          {key:"b", text:"Only the metric."},
          {key:"c", text:"Only the candidate sampling."},
          {key:"d", text:"Nothing — &ldquo;mining + trick&rdquo; is accurate."},
        ]}
        trap={<>(d) the seductive misread.</>}
        lens={<>The three pieces — sampling, alpha, eval — are each load-bearing.</>}
        stretch={<>What does the AUC vs NDCG@K gap look like for MixGCF vs hard mining?</>}
      />

      {/* D3 senior vs junior */}
      <VIS.TrapProblem id="mixgcf-p17" difficulty="medium"
        title="P17 — Senior vs junior framing"
        scenario={<><em>Discriminating insight: a junior debugs MixGCF regressions by tuning learning rate and embedding size. A senior plots the loss-on-synthetic vs loss-on-real curves separately and inspects alpha&apos;s effective range.</em><br/>Which lever first?</>}
        options={[
          {key:"a", text:"Plot loss-on-synthetic and loss-on-real separately. If the gap is closing too fast, alpha is too small (synthetic is too easy). If loss-on-synthetic stays high while loss-on-real falls, alpha is too large (synthetic is off-manifold). Tune alpha before LR or embedding size.", correct:true},
          {key:"b", text:"Tune learning rate first."},
          {key:"c", text:"Tune embedding size first."},
          {key:"d", text:"Switch to LLMHNS."},
        ]}
        trap={<>(b)(c) miss the alpha diagnostic. (d) wrong family.</>}
        lens={<>The synthetic-vs-real loss split is the MixGCF-specific diagnostic.</>}
        stretch={<>What does &ldquo;optimal&rdquo; look like on these two curves?</>}
      />

      {/* D4 plausible-misattribution */}
      <VIS.TrapProblem id="mixgcf-p18" difficulty="hard"
        title="P18 — Plausible-misattribution"
        scenario={<><em>Discriminating insight: NDCG@10 regresses but loss-on-real continues to fall — looks like overfitting, but is actually alpha drift. Loss-on-synthetic stops decreasing, indicating the synthetic latents have wandered off-manifold; the gradient on real items diverges from the gradient on synthetic ones.</em><br/>Most likely cause?</>}
        options={[
          {key:"a", text:"alpha drifted high; synthetic latents are now off-manifold and the gradient signal is decorrelated from the real-item gradient. NDCG@10 regresses on real items even though the loss-on-real continues to fall. Fix: cap alpha or anneal.", correct:true},
          {key:"b", text:"GPU thermal throttling."},
          {key:"c", text:"Cache invalidation."},
          {key:"d", text:"Overfitting to the entire training set."},
        ]}
        trap={<>(b)(c) generic. (d) seductive but does not explain the synthetic-vs-real loss divergence.</>}
        lens={<>alpha drift is the MixGCF-specific failure that looks like overfitting.</>}
        stretch={<>How would alpha&apos;s schedule prevent this?</>}
      />

      {/* E1 production gotcha */}
      <VIS.TrapProblem id="mixgcf-p19" difficulty="hard"
        title="P19 — Production gotcha: synthetic negatives at INFERENCE? No."
        scenario={<><em>Discriminating insight: MixGCF is a TRAINING-time technique. At inference, you score real items only. A common bug is to leak the synthetic-latent code path into the inference pipeline, causing nonsensical scores for non-items.</em><br/>What is the discipline?</>}
        options={[
          {key:"a", text:"MixGCF&apos;s synthesis path is training-only. At inference, you score real items from the embedding table; the per-layer mix code path must be guarded behind a training flag. A common bug is to leak the synthesis into the inference graph.", correct:true},
          {key:"b", text:"Synthetic items are scored at inference too."},
          {key:"c", text:"Inference uses a different model entirely."},
          {key:"d", text:"MixGCF requires no inference changes; the path is identical."},
        ]}
        trap={<>(b) is the bug. (c) overstates. (d) ignores the leak risk.</>}
        lens={<>Synthesis is a training-time gradient trick, not an inference operation.</>}
        stretch={<>What test catches the leak?</>}
      />

      {/* E2 failure on Friday */}
      <VIS.TrapProblem id="mixgcf-p20" difficulty="hard"
        title="P20 — Failure on Friday: NDCG@10 cratered after a routine commit"
        scenario={<><em>Discriminating insight: a refactor swapped the per-layer mixing order so the synthetic embedding now uses the WRONG layer&apos;s alpha. The synthetic latents are off the intended manifold; NDCG cratered while loss-on-real looks normal.</em><br/>3am page: NDCG@10 down 15%, loss-on-real unchanged. Diagnosis?</>}
        options={[
          {key:"a", text:"A layer-mixing-order refactor mis-applied alpha at the wrong layers; synthetic latents are off-manifold and decorrelated from real-item gradients. Diagnostic: compare loss-on-synthetic and loss-on-real curves pre- and post-commit.", correct:true},
          {key:"b", text:"GPU thermal throttling."},
          {key:"c", text:"Embedding table corrupted."},
          {key:"d", text:"Cache TTL changed."},
        ]}
        trap={<>(b)(c)(d) generic.</>}
        lens={<>Layer-mixing order is MixGCF-specific; the synthetic-loss curve catches it.</>}
        stretch={<>What CI assertion guards layer-mixing order?</>}
      />

      {/* E3 implementation specifics */}
      <VIS.TrapProblem id="mixgcf-p21" difficulty="medium"
        title="P21 — Library default that bites: alpha shared across layers"
        scenario={<><em>Discriminating insight: some implementations default alpha to a single scalar shared across all GCN layers. This breaks the layer-wise structure that motivated MixGCF — you have collapsed it to final-layer-mix.</em><br/>Where does the default break MixGCF?</>}
        options={[
          {key:"a", text:"alpha shared across all layers collapses MixGCF to a final-layer mix and loses the multi-hop receptive-field benefit. alpha should be a per-layer vector (or per-layer schedule), not a global scalar.", correct:true},
          {key:"b", text:"Default LR is wrong."},
          {key:"c", text:"Default weight decay is wrong."},
          {key:"d", text:"Default batch size is wrong."},
        ]}
        trap={<>(b)(c)(d) generic.</>}
        lens={<>Per-layer alpha is the load-bearing implementation detail.</>}
        stretch={<>How would you initialize the per-layer alpha vector?</>}
      />

      {/* E4 rollout */}
      <VIS.TrapProblem id="mixgcf-p22" difficulty="hard" ordered
        title="P22 — Order the rollout"
        scenario={<><em>Discriminating insight: rollout is (1) reproduce baseline with in-batch on the GCN, (2) add MixGCF with small alpha (close to baseline behavior), (3) anneal alpha to target, (4) compare loss-on-synthetic vs loss-on-real curves, (5) shadow-score, (6) traffic ramp.</em><br/>Order.</>}
        options={[
          {key:"a", text:"GCN baseline with in-batch negatives → MixGCF with small alpha → anneal alpha → compare synthetic-vs-real loss curves → shadow-score → traffic ramp", correct:true},
          {key:"b", text:"Large alpha from day 1."},
          {key:"c", text:"Skip the in-batch baseline."},
          {key:"d", text:"Ramp traffic first."},
        ]}
        trap={<>(b) over-aggressive. (c) loses the baseline. (d) backwards.</>}
        lens={<>Anneal alpha; verify each phase.</>}
        stretch={<>Why small alpha first, not large?</>}
      />

      {/* F1 edge case */}
      <VIS.TrapProblem id="mixgcf-p23" difficulty="hard"
        title="P23 — Smallest input that breaks MixGCF&apos;s claimed advantage"
        scenario={<><em>Discriminating insight: with a one-layer GCN (no multi-hop), the per-layer mixing collapses to a single-layer mix, and MixGCF&apos;s receptive-field benefit disappears. You retain the &ldquo;synthesize not mine&rdquo; benefit but lose the GCN-specific structural payoff.</em><br/>Construct the edge case.</>}
        options={[
          {key:"a", text:"A one-layer GCN. Per-layer mixing collapses to single-layer mix; the multi-hop receptive-field benefit disappears. You keep the synthesis benefit but the GCN-specific layer-wise structure no longer carries information.", correct:true},
          {key:"b", text:"A 3-layer GCN with diverse receptive fields (sweet spot)."},
          {key:"c", text:"10M items."},
          {key:"d", text:"100M users."},
        ]}
        trap={<>(b) sweet spot. (c)(d) describe scale.</>}
        lens={<>MixGCF needs multi-hop GCN structure to be GCN-specific.</>}
        stretch={<>For a one-layer GCN, what is the closest equivalent of MixGCF?</>}
      />

      {/* F4 paper-named failure */}
      <VIS.TrapProblem id="mixgcf-p24" difficulty="hard"
        title="P24 — Paper-named failure: mixing-factor sensitivity and non-existent compositions"
        scenario={<><em>Discriminating insight: the paper names two failure modes: (i) mixing-factor (alpha) sensitivity — mis-set destabilizes training, (ii) the synthetic embedding may correspond to a non-existent (off-manifold) composition. Which is the bigger practical risk?</em><br/>Which dominates practice?</>}
        options={[
          {key:"a", text:"alpha sensitivity dominates practice. Off-manifold synthetic embeddings are mitigated by sampling candidates from the user&apos;s neighborhood (already close in the GCN graph). alpha&apos;s mis-set is the long-tail bug.", correct:true},
          {key:"b", text:"Off-manifold is the dominant practical risk."},
          {key:"c", text:"Both are negligible."},
          {key:"d", text:"Only catalog size matters."},
        ]}
        trap={<>(b) reverses practical risk. (c)(d) deny the paper&apos;s account.</>}
        lens={<>alpha is the practical risk; off-manifold is partly mitigated by neighborhood-aware sampling.</>}
        stretch={<>What sampling restriction would further bound off-manifold risk?</>}
      />

    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://arxiv.org/abs/2409.07237" target="_blank" rel="noopener">Lai et al., <em>Negative Sampling in Recommendation: A Survey and Future Directions</em> (arXiv 2409.07237, 2024)</a> — survey that situates MixGCF among siblings.</li>
        <li><a href="https://dl.acm.org/doi/10.1145/3447548.3467408" target="_blank" rel="noopener">Huang et al., <em>MixGCF: An Improved Training Method for Graph Neural Network-based Recommender Systems</em> (KDD 2021)</a> — primary source.</li>
        <li><a href="https://arxiv.org/abs/2002.02126" target="_blank" rel="noopener">He et al., <em>LightGCN</em> (SIGIR 2020)</a> — the GCN baseline MixGCF is most often paired with.</li>
        <li><a href="https://lilianweng.github.io/posts/2021-05-31-contrastive/" target="_blank" rel="noopener">Lilian Weng — <em>Contrastive Representation Learning</em> (blog)</a> — practitioner intuition for hard-negative mining and synthesis.</li>
        <li><a href="https://eugeneyan.com/writing/recsys2022/" target="_blank" rel="noopener">Eugene Yan — <em>RecSys 2022 notes</em> (blog)</a> — practitioner framing of negative sampling tradeoffs.</li>
      </ul>
    </VIS.Section>
  </main>
