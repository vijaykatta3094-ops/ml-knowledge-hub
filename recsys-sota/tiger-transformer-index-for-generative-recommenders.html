      />

      {/* axis: F3 */}
      <VIS.TrapProblem
        id="tiger-f3"
        difficulty="hard"
        title="F3 — Recall@10 high, NDCG@10 low"
        scenario={<>TIGER's recall@10 is great but NDCG@10 is poor. Which TIGER-specific design choice drives this?</>}
        options={[
          {key:"a", text:"Beam search decode finds candidates by prefix matching, but prefix-order doesn't reflect posterior probability over items — within a prefix, ranking is degenerate. NDCG@10 needs in-bucket ordering that TIGER's decode doesn't naturally provide.", correct:true},
          {key:"b", text:"Random."},
          {key:"c", text:"NDCG bug."},
          {key:"d", text:"Recall is wrong."},
        ]}
        trap={<>(b), (c), (d) miss the within-bucket ranking issue.</>}
        lens={<>TIGER is a retrieval model; ranking within retrieved candidates is a separate problem. Add a re-ranker (HSTU, cross-encoder).</>}
        stretch={<>Could you train TIGER to also rank, not just retrieve?</>}
      />

      {/* axis: F4 */}
      <VIS.TrapProblem
        id="tiger-f4"
        difficulty="hard"
        title="F4 — What the TIGER paper itself flags"
        scenario={<>Which failure mode does the TIGER paper explicitly call out?</>}
        options={[
          {key:"a", text:"Codebook collisions producing distinct items with the same Semantic ID — paper proposes a residual disambiguation token.", correct:true},
          {key:"b", text:"GPU memory issues."},
          {key:"c", text:"Slow training."},
          {key:"d", text:"Multilingual data."},
        ]}
        trap={<>(b), (c), (d) aren't paper-flagged failures.</>}
        lens={<>The paper is direct: collisions are unavoidable and need a small tiebreaker token.</>}
        stretch={<>How big does the tiebreaker need to be at 50M-item catalog scale?</>}
      />

      {/* axis: F5 */}
      <VIS.TrapProblem
        id="tiger-f5"
        difficulty="hard"
        title="F5 — Community follow-up: multilingual weakness"
        scenario={<>A 2025 practitioner handbook on Semantic-ID generative recsys identifies a specific TIGER weakness on multilingual catalogs. What's the failure?</>}
        options={[
          {key:"a", text:"A single content encoder produces inconsistent embeddings across languages; items with the same product but different-language descriptions get different Semantic IDs, fragmenting the prefix structure and hurting cross-language transfer.", correct:true},
          {key:"b", text:"Codebook explosion in multilingual catalogs."},
          {key:"c", text:"Constrained decoding fails."},
          {key:"d", text:"Pretrained encoders don't work multilingually."},
        ]}
        trap={<>(b), (c), (d) are partial but not the specific failure.</>}
        lens={<>Fix: multilingual pretrained encoder (mT5, multilingual CLIP).</>}
        stretch={<>How would you measure cross-language prefix-sharing quality?</>}
      />

      {/* axis: F1b */}
      <VIS.TrapProblem
        id="tiger-f1b"
        difficulty="hard"
        title="F1b — Sparse-text items (1-3 word titles)"
        scenario={<>Used-goods marketplace. Items: "blue jacket", "white shoes" — 1-3 words. TIGER vs random-ID embeddings?</>}
        options={[
          {key:"a", text:"TIGER's RQ-VAE has too little signal per item to build distinctive codes; many items collapse to a few prefix buckets; random-ID two-tower might still learn useful representations from collaborative-filtering signal that TIGER can't access.", correct:true},
          {key:"b", text:"TIGER always wins."},
          {key:"c", text:"Random IDs always win."},
          {key:"d", text:"No difference."},
        ]}
        trap={<>(b), (c), (d) over-generalize.</>}
        lens={<>If average item content has ≤5-10 unique tokens, TIGER's advantage compresses.</>}
        stretch={<>Could you augment content with auto-generated descriptions from a VLM?</>}
      />

      {/* axis: F3b */}
      <VIS.TrapProblem
        id="tiger-f3b"
        difficulty="hard"
        title="F3b — Codebook utilization 12% — what's broken?"
        scenario={<>You inspect the trained RQ-VAE and find <strong>only 12% of codebook entries are used by any item</strong>. Most likely causes?</>}
        multiSelect
        options={[
          {key:"a", text:"Commitment loss weight β too low → encoder drifts away from rarely-used codes, abandoning them rather than nudging them to be useful.", correct:true},
          {key:"b", text:"Initial codebook clustering biased toward dense regions of the embedding space → codes elsewhere never get assigned.", correct:true},
          {key:"c", text:"No code-balance / entropy regularization in the loss.", correct:true},
          {key:"d", text:"Random seed."},
          {key:"e", text:"GPU memory."},
        ]}
        trap={<>(d), (e) are seldom the root cause.</>}
        lens={<>Codebook collapse is the canonical RQ-VAE training failure. Fixes: EMA codebook updates, code-balance loss, periodic re-init of unused codes.</>}
        stretch={<>How would you reinitialize an unused code mid-training?</>}
      />

      {/* axis: D1c */}
      <VIS.TrapProblem
        id="tiger-d1c"
        difficulty="medium"
        title="D1c — 'Generative retrieval > all retrieval'"
        scenario={<>An ML evangelist says generative retrieval is strictly better than ANN. Defeat the claim.</>}
        options={[
          {key:"a", text:"Cold-start items with zero content (e.g. live-stream events tagged only with timestamp) — no content for RQ-VAE; ANN can still use collaborative-filtering signals; TIGER cannot.", correct:true},
          {key:"b", text:"Generative is always better."},
          {key:"c", text:"ANN is always better."},
          {key:"d", text:"They're identical."},
        ]}
        trap={<>(b), (c), (d) are over-generalizations.</>}
        lens={<>TIGER requires content. There's always a content-poor surface where ANN wins.</>}
        stretch={<>Could you fold both strategies into one model?</>}
      />

      {/* axis: C5b */}
      <VIS.TrapProblem
        id="tiger-c5b"
        difficulty="hard"
        title="C5b — TIGER with short user histories"
        scenario={<>User histories are short (median 3 events). Does TIGER still work?</>}
        options={[
          {key:"a", text:"Yes — TIGER's value is in item representation (Semantic IDs), not user-history length; short histories just mean a short prompt, but the decoder's autoregressive Semantic-ID generation still benefits from prefix-sharing.", correct:true},
          {key:"b", text:"No — short histories break TIGER."},
          {key:"c", text:"Only HSTU works with long histories."},
          {key:"d", text:"Need to use random IDs instead."},
        ]}
        trap={<>(b), (c), (d) confuse TIGER's value chain with HSTU's.</>}
        lens={<>HSTU's value comes from long sequences; TIGER's comes from content-derived Semantic IDs. Independent levers.</>}
        stretch={<>How short is too short for TIGER?</>}
      />

      {/* axis: E3b */}
      <VIS.TrapProblem
        id="tiger-e3b"
        difficulty="hard"
        title="E3b — How does constrained decoding work?"
        scenario={<>You implement constrained decoding. The trie maps prefixes to valid continuations. What's the latency impact?</>}
        options={[
          {key:"a", text:"Minimal at inference: the trie is consulted at each decode step to mask invalid logits before softmax; cost is O(B·D) per step (B beam, D codes). Trie itself can be a single GPU-resident sparse mask refreshed at codebook updates.", correct:true},
          {key:"b", text:"Doubles decode time."},
          {key:"c", text:"Requires CPU."},
          {key:"d", text:"Eliminates beam search."},
        ]}
        trap={<>(b), (c), (d) misread.</>}
        lens={<>Constrained decoding is cheap when implemented as a logit mask; expensive as post-hoc rejection sampling.</>}
        stretch={<>How often must you refresh the trie?</>}
      />

      {/* axis: F4b */}
      <VIS.TrapProblem
        id="tiger-f4b"
        difficulty="medium"
        title="F4b — TIGER paper's reported collision rate"
        scenario={<>What collision rate does the TIGER paper empirically report?</>}
        options={[
          {key:"a", text:"~0.3% at K=4, |codebook|=256 — small enough that a single tiebreaker token suffices for production.", correct:true},
          {key:"b", text:"~10%."},
          {key:"c", text:"0%."},
          {key:"d", text:"The paper doesn't measure it."},
        ]}
        trap={<>(b) is too high. (c) is impossible without tiebreaker. (d) is false.</>}
        lens={<>The 0.3% figure is the empirical TIGER fingerprint. If your reproduction shows ~5%, codebook collapse is likely.</>}
        stretch={<>What collision rate would you flag as unsafe to ship?</>}
      />

      {/* axis: A4b */}
      <VIS.TrapProblem
        id="tiger-a4b"
        difficulty="hard"
        title="A4b — TIGER + diffusion models"
        scenario={<>You add a small diffusion head over TIGER's beam outputs to generate diverse candidate Semantic IDs. Does this help?</>}
        options={[
          {key:"a", text:"Yes for diversity, no for relevance: diffusion broadens the candidate distribution (good for exploration) but doesn't change the underlying decode probability. Net: better novelty metrics, marginal recall change. Constrain output to valid IDs.", correct:true},
          {key:"b", text:"Yes, always better."},
          {key:"c", text:"No, hurts always."},
          {key:"d", text:"Not possible to combine."},
        ]}
        trap={<>(b), (c), (d) over-generalize.</>}
        lens={<>Diffusion adds diversity but doesn't fix underlying TIGER metrics.</>}
        stretch={<>How would you measure the novelty/recall tradeoff?</>}
      />

      {/* axis: E2b */}
      <VIS.TrapProblem
        id="tiger-e2b"
        difficulty="hard"
        title="E2b — Hallucinations slip past constrained decoding"
        scenario={<>You're using constrained decoding via a trie; still seeing 1% hallucinations. Root cause?</>}
        options={[
          {key:"a", text:"Trie is stale — built from an older catalog snapshot; items added since aren't in the trie, but they ARE in the production catalog. Refresh cadence too slow.", correct:true},
          {key:"b", text:"Constrained decoding is buggy."},
          {key:"c", text:"Beam search is wrong."},
          {key:"d", text:"GPU corruption."},
        ]}
        trap={<>(b), (c), (d) are 2nd-order.</>}
        lens={<>The trie must track the live catalog. Stale tries are the canonical 1% hallucination source.</>}
        stretch={<>How would you set the trie-refresh cadence?</>}
      />

      {/* axis: C2c */}
      <VIS.TrapProblem
        id="tiger-c2c"
        difficulty="hard"
        title="C2c — Train RQ-VAE and seq2seq jointly or separately?"
        scenario={<>Pick a training strategy.</>}
        options={[
          {key:"a", text:"Two-stage: train RQ-VAE first to convergence, freeze codebooks, then train seq2seq. Joint training is unstable because seq2seq gradients tend to collapse codebooks. TIGER paper uses two-stage.", correct:true},
          {key:"b", text:"Joint always better."},
          {key:"c", text:"Train seq2seq first, then RQ-VAE."},
          {key:"d", text:"Doesn't matter."},
        ]}
        trap={<>(b), (c), (d) misread.</>}
        lens={<>Two-stage training stabilizes codebooks. Joint training is research-frontier, not the production default.</>}
        stretch={<>How frequently should you refresh the RQ-VAE stage?</>}
      />

      {/* axis: D2b */}
      <VIS.TrapProblem
        id="tiger-d2b"
        difficulty="medium"
        title="D2b — 'Semantic IDs give free generalization'"
        scenario={<>A teammate claims Semantic IDs give "free generalization to new items." What's the catch?</>}
        options={[
          {key:"a", text:"Only generalization to items whose content is well-covered by the RQ-VAE training distribution. Items from a wholly new category (content-distribution shift) still cold-start poorly — the RQ-VAE never learned codes for that region.", correct:true},
          {key:"b", text:"There's no catch."},
          {key:"c", text:"Generalization is fake."},
          {key:"d", text:"Requires GPU."},
        ]}
        trap={<>(b), (c), (d) misread.</>}
        lens={<>TIGER generalizes within the content distribution it was trained on.</>}
        stretch={<>How would you detect a content-distribution shift in production?</>}
      />

      {/* axis: E5b */}
      <VIS.TrapProblem
        id="tiger-e5b"
        difficulty="hard"
        title="E5b — Why production gains differ from paper"
        scenario={<>You implement TIGER as described; production NDCG gain is half the paper's. Most likely cause?</>}
        options={[
          {key:"a", text:"Production catalog is ~100× larger than the paper's benchmark, with longer tail of low-content items; RQ-VAE codebooks struggle to cover the tail; recall on tail items underperforms.", correct:true},
          {key:"b", text:"Wrong learning rate."},
          {key:"c", text:"Wrong batch size."},
          {key:"d", text:"Random seed."},
        ]}
        trap={<>(b), (c), (d) are 2nd-order.</>}
        lens={<>Catalog-scale gap is the most common reason TIGER underperforms its paper.</>}
        stretch={<>What's the right scaling rule for K and codebook size?</>}
      />

      {/* axis: D4b */}
      <VIS.TrapProblem
        id="tiger-d4b"
        difficulty="hard"
        title="D4b — Cold-start: new item, zero interactions"
        scenario={<>A new item is added. Rich content. TIGER serves it. How well does it perform vs the same item in two-tower+HNSW?</>}
        options={[
          {key:"a", text:"TIGER: new item gets a Semantic ID from content alone; if a similar warm item exists, it inherits useful prefix structure and may be retrieved zero-shot. Two-tower: new item gets a randomly-initialized embedding that's effectively random in the ANN space until trained.", correct:true},
          {key:"b", text:"Both perform identically."},
          {key:"c", text:"Two-tower wins always."},
          {key:"d", text:"Neither works."},
        ]}
        trap={<>(b), (c), (d) miss TIGER's primary cold-start argument.</>}
        lens={<>Cold-start retrieval is TIGER's headline benefit.</>}
        stretch={<>How big can the cold-start gap be (recall@10 delta)?</>}
      />

    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://arxiv.org/abs/2305.05065" target="_blank" rel="noopener"><strong>Rajput et al. — TIGER paper (NeurIPS 2023)</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper)</span><br/>The original. Focus on sections 3 (RQ-VAE), 4 (seq2seq), 5 (experiments including collision rates).</li>
        <li><a href="https://arxiv.org/abs/2507.22224" target="_blank" rel="noopener"><strong>Generative Recommendation with Semantic IDs: A Practitioner's Handbook (2025)</strong></a> <span style={{color:"#64748b", fontSize:14}}>(handbook)</span><br/>Production lessons + LC-Rec details.</li>
        <li><a href="https://arxiv.org/abs/2107.10832" target="_blank" rel="noopener"><strong>Lee et al. — RQ-VAE original (CVPR 2022)</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper)</span><br/>Residual quantization foundations.</li>
        <li><a href="https://eugeneyan.com/writing/recsys-llm/" target="_blank" rel="noopener"><strong>Eugene Yan — Generative recsys landscape</strong></a> <span style={{color:"#64748b", fontSize:14}}>(blog)</span><br/>Pragmatic engineering lens.</li>
        <li><a href="https://arxiv.org/abs/1711.00937" target="_blank" rel="noopener"><strong>van den Oord et al. — VQ-VAE</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper)</span><br/>The codebook-quantization ancestor. Commitment loss and EMA updates.</li>
      </ul>
    </VIS.Section>
  </main>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
  <script>
    window.addEventListener("error", function (e) {
      const pre = document.createElement("pre");
      pre.style.cssText = "position:fixed;top:0;left:0;right:0;max-height:35vh;"
        + "overflow:auto;background:#fee2e2;color:#7f1d1d;padding:8px;"
        + "margin:0;font:12px/1.4 monospace;z-index:10002;";
      pre.textContent = "[visualize] " + (e.error?.stack || e.message || e);
      document.body.appendChild(pre);
    }, true);
  </script>
</body>
