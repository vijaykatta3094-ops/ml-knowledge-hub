  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          // NO autoGloss here. Glossing terms inside option text leaks the
          // answer mechanism via hover. Authors must keep options self-contained;
          // a candidate who needs a definition can scroll up to the prose where
          // the term is explicitly wrapped via <VIS.Term>.
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// TIGER — Transformer Index for Generative Recommenders (Rajput et al., NeurIPS 2023)
// v3 retro-sweep: gate-clean rewrite. Confusingly-similar decoys, balanced positions, G19-aware.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="RecSys SOTA · Generative recommendation"
      title={<><VIS.Term def="Transformer Index for GEnerative Recommenders. Google 2023 paper: emits items by generating semantic-ID code tuples instead of softmaxing over millions of items.">TIGER</VIS.Term> — Transformer Index for Generative Recommenders</>}
      subtitle={<>Replace <VIS.Term def="Approximate Nearest Neighbor. Family of algorithms (HNSW, IVF, ScaNN) that find close vectors much faster than exact search at small recall cost.">ANN</VIS.Term> retrieval with <VIS.Term def="Generates one token at a time, each conditioned on the tokens produced so far.">autoregressive</VIS.Term> Semantic-ID decoding. Generation IS retrieval.</>}
      byline={[
        {label: "Paper", value: "Rajput et al., NeurIPS 2023"},
        {label: "Year", value: "2023-2024"},
        {label: "Domain", value: "Generative retrieval"},
      ]}/>

    <VIS.TLDR>
      TIGER quantizes content <VIS.Term def="Dense vector representation of a discrete item (word, user, product). Learned so that similar items have similar vectors.">embeddings</VIS.Term> (text/image) with <VIS.Term def="Residual-Quantized Variational AutoEncoder: residually quantizes an embedding via K codebooks of D codes each, producing a K-tuple discrete code. Captures hierarchical semantics; similar items share prefixes.">RQ-VAE</VIS.Term> into K-tuple <VIS.Term def="A short discrete tuple (e.g. 4 codes × 256 entries) that encodes an item's content hierarchically — first code = coarse category, later codes = finer residual semantics. Replaces random item IDs.">Semantic IDs</VIS.Term>, then trains a <VIS.Term def="Sequence-to-sequence transformer: encoder reads an input sequence, decoder autoregressively emits an output sequence.">seq2seq</VIS.Term> transformer to autoregressively generate the next item's Semantic ID. <strong>No ANN index. No <VIS.Term def="Hierarchical Navigable Small World. Graph-based ANN: layered proximity graph, greedy descent at each layer. RAM-heavy, log-time.">HNSW</VIS.Term>.</strong> Items with similar content share ID prefixes, giving <VIS.Term def="The problem of recommending items (or to users) with little or no interaction history.">cold-start</VIS.Term> generalization that random-ID embeddings cannot. Source: <a href="https://arxiv.org/abs/2305.05065" target="_blank" rel="noopener">arXiv:2305.05065</a>.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="Beat 1 — What it is">
      <p>
        Two stages: (1) train an RQ-VAE on item content to produce a K-tuple Semantic ID per item; (2) train a seq2seq transformer that encodes user history (as a sequence of Semantic IDs) and autoregressively decodes the K-tuple Semantic ID of the next item. At serving time, you don't look up candidates in an index — you generate the ID directly, then map back via a <VIS.Term def="Prefix tree. Each path from root to leaf spells a valid sequence; used to enforce valid Semantic-ID decoding.">trie</VIS.Term>.
      </p>
      <VIS.Mermaid chart={`
flowchart TB
  C["Item content (text / image)"]
  C --> E["Content encoder"]
  E --> R["RQ-VAE: residual quantization"]
  R --> S["Semantic ID (e.g. 4-tuple)"]
  S --> T["Seq2seq transformer over user history"]
  T --> O["Autoregressive decode of next item's Semantic ID"]
  style R fill:#dbeafe,stroke:#1e40af,stroke-width:2px
  style O fill:#dcfce7,stroke:#16a34a,stroke-width:2px
      `} />
    </VIS.Section>

    <VIS.Section id="sec-diff" title="Beat 2 — How it differs from two-tower + HNSW">
      <p>
        <strong><VIS.Term def="Recsys architecture: separate user-encoder tower and item-encoder tower; dot-product their outputs to score (user, item) pairs.">Two-tower</VIS.Term> + HNSW.</strong> User and item towers learn <VIS.Term def="Retrieval via dot-product (or cosine) between learned dense embeddings of queries and items; usually served by an ANN index.">dense</VIS.Term> embeddings; an HNSW index over item embeddings supports approximate-NN retrieval. Index maintenance is operational overhead; cold-start items get random initial embeddings; updates require periodic re-indexing.
      </p>
      <p>
        <strong>TIGER.</strong> No index. Items with similar content share Semantic-ID prefixes. At serve time, the transformer decodes the K-tuple — items along the decoded prefix are naturally similar. <strong>Cold-start works zero-shot</strong> because a new item's Semantic ID is computed from its content, inheriting the structure of similar trained items.
      </p>
      <p>
        <strong>vs <VIS.Term def="Hierarchical Sequential Transduction Units. Meta 2024 paper: sequence-modeling architecture for recommendation that scales past DLRM's plateau.">HSTU</VIS.Term>.</strong> TIGER replaces retrieval; HSTU replaces ranking. They compose.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-when" title="Beat 3 — When to pick it">
      <p>
        Pick TIGER when (a) catalog has strong content signal (text/image descriptions), (b) cold-start is a recurring pain (frequent catalog churn, ephemeral items), (c) ANN index maintenance has operational cost you'd like to retire, (d) latency budget tolerates K-step autoregressive decode (K≈4 typically adds ~2× a two-tower lookup).
      </p>
    </VIS.Section>

    <VIS.Section id="sec-gotchas" title="Beat 4 — Limitations & gotchas">
      <p>
        TIGER's biggest risks: <strong><VIS.Term def="When two distinct items map to the exact same K-tuple of codes; the model cannot tell them apart at decode time.">Semantic-ID collisions</VIS.Term></strong> (two items map to the same tuple), <strong><VIS.Term def="VQ/RQ-VAE failure: most codebook entries go unused; encoder maps all inputs to a few popular codes. Sign of broken quantization.">codebook collapse</VIS.Term></strong> during RQ-VAE training (most codes unused), <strong><VIS.Term def="Decoder emits a token sequence (Semantic ID) that does not correspond to any real item in the catalog.">hallucination</VIS.Term></strong> (decoded ID matches no real item — requires <VIS.Term def="Mask the decoder's logits at each step so it can only emit tokens that lead to a valid sequence (e.g., a real catalog item).">constrained decoding</VIS.Term>), and <strong><VIS.Term def="Across catalog updates or retraining, codebook entries shift; the same item gets a different Semantic ID, breaking downstream consumers.">codebook drift</VIS.Term></strong> on catalog updates (re-training shifts IDs; downstream models break).
      </p>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        Each problem's four options are real-but-wrong beliefs from advanced beginners. The correct option wins only on a load-bearing mechanism detail.
      </p>

      <h3 style={{marginTop:24, color:"#1f3a5f"}}>A. Identity & comparison</h3>

            <VIS.TrapProblem
        id="tiger-a1"
        difficulty="hard"
        title="A1 — Where does TIGER and two-tower+HNSW actually diverge?"
        scenario={<>Your CTO calls TIGER "a fancier two-tower." Pick the option that names the architectural property that survives a redaction test.</>}
        options={[
          {key:"a", text:"TIGER swaps the dual MLP towers for a transformer encoder; the index and serving stack are otherwise unchanged."},
          {key:"b", text:"TIGER learns a single joint user-item embedding instead of two towers, so HNSW indexes a fused vector at half the dimension."},
          {key:"c", text:<>TIGER deletes the ANN service: the autoregressive <VIS.Term def="The half of a seq2seq transformer that emits the output sequence one token at a time; consumes the encoder state plus its own past tokens.">decoder</VIS.Term> over Semantic IDs is the retrieval path; no HNSW or <VIS.Term def="Inverted File + Product Quantization. ANN: cluster space into K cells, encode each vector as a PQ code; lookup = nearest centroids + PQ distances.">IVF-PQ</VIS.Term> exists.</>, correct:true},
          {key:"d", text:"TIGER keeps HNSW but builds it over Semantic-ID embeddings instead of two-tower embeddings."},
        ]}
        trap={<>Distinguish architectural depth (transformer vs MLP) from index-tier elimination.</>}
        lens={<>The discriminator is the index-tier itself. Two-tower upgrades still ship an ANN service; TIGER does not. That changes deploy, re-index cadence, and cold-start in one move.</>}
        stretch={<>What does HNSW give you that TIGER's decoder cannot easily reproduce?</>}
      />

            <VIS.TrapProblem
        id="tiger-a2"
        difficulty="hard"
        title="A2 — What separates Semantic IDs from hashed item IDs?"
        scenario={<>A peer claims "Semantic IDs are hashed item IDs with extra steps." Pick the property that distinguishes them.</>}
        options={[
          {key:"a", text:<>Semantic IDs are derived from content via RQ-VAE, so similar items share prefix codes and prefix-decoding surfaces neighbors without ANN search.</>, correct:true},
          {key:"b", text:"Semantic IDs use a stronger hash (SHA-256 vs murmur), reducing collisions at large catalog scale."},
          {key:"c", text:"Semantic IDs are integer tuples while hashed IDs are bit strings; the tuple shape is what enables transformer decoding."},
          {key:"d", text:"Semantic IDs are learned per user and personalized to history, whereas hashed IDs are a single global mapping shared across all users."},
        ]}
        trap={<>Hashing arguments confuse collision-avoidance with hierarchical structure.</>}
        lens={<>The prefix structure (not collision avoidance) is the central property. Prefix-sharing is what enables <VIS.Term def="Recommendation systems where the model GENERATES the next item's identifier (or token sequence) instead of scoring a candidate list.">generative retrieval</VIS.Term> and cold-start.</>}
        stretch={<>What property of <VIS.Term def="Repeated quantize-then-quantize-the-error trick. K codebooks; level k encodes what level k-1 missed.">residual quantization</VIS.Term> specifically produces the hierarchical prefix structure?</>}
      />

            <VIS.TrapProblem
        id="tiger-a3"
        difficulty="hard"
        title="A3 — Without TIGER, what's the conventional cold-start retrieval stack?"
        scenario={<>If TIGER didn't exist, your team would run some baseline <VIS.Term def="The problem of recommending items (or to users) with little or no interaction history.">cold-start</VIS.Term> retrieval. Pick the option that names exactly what TIGER collapses into one model.</>}
        options={[
          {key:"a", text:"A graph-neighborhood retriever that walks item-item edges built from co-purchase signal; cold items inherit edges from their seller."},
          {key:"b", text:"A pure LLM-as-retriever pipeline that prompts a frozen LLM with user history and parses item titles from the completion."},
          {key:"c", text:"A multi-armed bandit over random embeddings, gradually replacing them as interactions accumulate; no separate index."},
          {key:"d", text:<>A <VIS.Term def="Recsys architecture: separate user-encoder tower and item-encoder tower; dot-product their outputs to score (user, item) pairs.">two-tower</VIS.Term> with content-tower item embeddings, HNSW rebuilt nightly, plus a content-only fallback path for ultra-cold items.</>, correct:true},
        ]}
        trap={<>Each decoy is a real architecture but solves a different problem (graph, LLM, bandit).</>}
        lens={<>The traditional fallback is content-tower + index rebuild + content-only path. TIGER fuses these three layers into one <VIS.Term def="The half of a seq2seq transformer that emits the output sequence one token at a time; consumes the encoder state plus its own past tokens.">decoder</VIS.Term>.</>}
        stretch={<>At what catalog-churn rate does the TIGER simplification dominate?</>}
      />

      {/* a4 multiSelect — no position change needed */}
      <VIS.TrapProblem
        id="tiger-a4"
        difficulty="hard"
        title="A4 — Composing TIGER (retrieval) with HSTU (ranking)"
        scenario={<>You stack TIGER for retrieval and HSTU for ranking. Select every option that names a real composition effect rather than a folklore objection.</>}
        multiSelect
        options={[
          {key:"a", text:"HSTU consumes item-ID embeddings; TIGER emits Semantic-ID tuples. You need a translation layer or HSTU input-layer change to accept the tuple.", correct:true},
          {key:"b", text:"TIGER's prefix-similar candidates partially duplicate HSTU's diversity reranker, so the rerank policy needs re-tuning on this candidate distribution.", correct:true},
          {key:"c", text:<>Latency stacks: TIGER's K-step decode plus HSTU's per-candidate scoring forces precompute or <VIS.Term def="Decoding strategy that keeps the top-B partial sequences at each step instead of one greedy pick. Higher recall at B× compute.">beam</VIS.Term> caching to keep <VIS.Term def="The 99th percentile of response times. 1% of requests are slower; tail latency, often dominates SLA pain.">p99</VIS.Term> in budget.</>, correct:true},
          {key:"d", text:"HSTU's attention mask learns to ignore TIGER's outputs because Semantic-ID tokens have higher entropy than item-ID tokens."},
          {key:"e", text:"TIGER's content awareness lets HSTU drop sequence modeling entirely; one stage suffices."},
        ]}
        trap={<>(d) and (e) sound architecturally savvy but assume properties neither model has.</>}
        lens={<>Three real composition effects: interface mismatch, diversity overlap, latency stacking. Each is its own remediation.</>}
        stretch={<>How would you modify HSTU's input layer to consume Semantic IDs directly?</>}
      />

            <VIS.TrapProblem
        id="tiger-a5"
        difficulty="hard"
        title="A5 — When does Semantic-ID prefix-sharing carry no information?"
        scenario={<>Prefix-sharing is TIGER's headline cold-start benefit. Pick the catalog property under which prefix-sharing stops discriminating items.</>}
        options={[
          {key:"a", text:"Catalog with extreme popularity skew: head items dominate sequences, so prefix transitions are learned only for head buckets."},
          {key:"b", text:"Homogeneous catalog (all items near-duplicates) — every item maps to the same prefix bucket; prefix-sharing has no discriminating signal.", correct:true},
          {key:"c", text:"Catalog with many sparse text descriptions — average length under 20 tokens; transformer still trains but recall drops."},
          {key:"d", text:"Catalog scale beyond 10M items — codebook combinatorics saturate at K=4 × 256, so collisions explode."},
        ]}
        trap={<>(a) and (c) describe real pains but prefix-sharing still helps; (d) is a collision argument, not a prefix-sharing argument.</>}

        stretch={<>What's the empirical signal that your <VIS.Term def="Learned dictionary of discrete vectors (codes). An encoder snaps its output to the nearest code; that code's index becomes a token.">codebook</VIS.Term> is collapsing?</>}

      <h3 style={{marginTop:32, color:"#1f3a5f"}}>C. Mechanism</h3>

            <VIS.TrapProblem
        id="tiger-c1"
        difficulty="hard"
        title="C1 — Why RQ-VAE residual codebooks over one large codebook"
        scenario={<>RQ-VAE uses K residual codebooks of D codes each. Pick the property that justifies residual over one flat codebook of K·D codes.</>}
        options={[
          {key:"a", text:"Residual codebooks let the encoder use fewer parameters; one flat codebook needs K times more entries to match capacity."},
          {key:"b", text:"Residual quantization decodes faster because GPU vectorized lookups happen K times in parallel."},
          {key:"c", text:"Residual codebooks express D^K tuples with K·D codes; a flat codebook matching that capacity needs D^K codes — statistically intractable.", correct:true},
          {key:"d", text:"Residual codebooks tolerate label noise in content; flat VQ would memorize the noise during training."},
        ]}
        trap={<>(a) and (d) name real properties but not the central reason. (b) confuses serial residual decode with parallel.</>}
        lens={<>K codebooks of D codes represent D^K effective tuples. A single 256^4-code codebook would never be learnable.</>}
        stretch={<>Why is "residual" the right structure rather than "parallel" (K independent quantizations)?</>}
      />

        options={[

          {key:"b", text:"Reconstruction trains the encoder; commitment is a KL term against a Gaussian prior; codebook loss enforces orthogonality between codes."},
          {key:"c", text:<>Reconstruction trains the encoder; commitment is a temperature schedule on <VIS.Term def="Differentiable approximation to sampling from a categorical distribution; lets you backprop through discrete choices via reparameterization.">Gumbel-softmax</VIS.Term>; codebook loss is an entropy bonus.</>},
          {key:"d", text:"Reconstruction trains the encoder; the other two are weight-decay terms preventing codebook entries from drifting at training time."},

        trap={<>(b) borrows from VAE priors. (c) borrows from discrete-VAE alternatives. (d) confuses regularization with assignment loss.</>}

        stretch={<>What's the failure mode when commitment loss weight is too high?</>}

        lens={<>Codebook collapse is the canonical RQ-VAE training failure. Fixes: EMA updates, code-balance loss, periodic re-init of unused codes.</>}
        stretch={<>How would you reinitialize an unused code mid-training?</>}
      />

            <VIS.TrapProblem
        id="tiger-d1c"
        difficulty="medium"
        title="D1c — Defeating 'generative retrieval beats ANN on everything'"
        scenario={<>An ML evangelist claims generative retrieval strictly dominates ANN. Pick the counterexample whose failure for TIGER is rooted in the model's input requirements.</>}
        options={[
          {key:"a", text:"Niche e-commerce catalogs (10K SKUs) — ANN serves at sub-millisecond latency; TIGER's K-step decode is slower without compensating quality gain."},
          {key:"b", text:"Ranking tasks (NDCG-optimized) — ANN's dot-product scores give continuous-valued ranking; TIGER's prefix-decode gives near-degenerate in-bucket order."},
          {key:"c", text:"Multi-modal catalogs (text + image + audio) — ANN over concatenated embeddings handles all modalities; TIGER's single content encoder can't fuse modalities."},
          {key:"d", text:<><VIS.Term def="The problem of recommending items (or to users) with little or no interaction history.">Cold-start</VIS.Term> items with zero content (live-stream events tagged only with timestamp) — RQ-VAE has nothing to encode; ANN can still use <VIS.Term def="Recommend items based on what similar users liked, using interaction matrices; no content features needed.">collaborative-filtering</VIS.Term> signals.</>, correct:true},
        ]}
        trap={<>(a)/(b)/(c) name real domains but the question targets TIGER's input requirement; ranking and modalities are secondary.</>}
        lens={<>TIGER requires content. There's always a content-poor surface where ANN wins.</>}
        stretch={<>Could you fold both strategies into one model?</>}
      />

            <VIS.TrapProblem
        id="tiger-c5b"
        difficulty="hard"
        title="C5b — TIGER on short user histories"
        scenario={<>User histories have median length 3. Pick the option that correctly locates where TIGER's value chain sits.</>}
        options={[
          {key:"a", text:"TIGER fails: the autoregressive decoder needs at least 8-10 history tokens to condition the K-step Semantic-ID generation."},
          {key:"b", text:"TIGER still works: its value chain is in item representation (Semantic IDs), not history length; short histories give a short prompt but prefix-sharing still helps.", correct:true},
          {key:"c", text:"TIGER needs to be replaced by HSTU at short histories because HSTU is designed for long sequences and degrades less."},
          {key:"d", text:"TIGER works only if you swap Semantic IDs for random item IDs at short histories so the decoder doesn't over-rely on content."},
        ]}
        trap={<>(a) overstates a sequence-length requirement. (c) reverses HSTU's value chain. (d) defeats the point.</>}
        lens={<>HSTU's value comes from long sequences; TIGER's comes from content-derived Semantic IDs. Independent levers.</>}
        stretch={<>How short is too short for TIGER?</>}
      />

            <VIS.TrapProblem
        id="tiger-e3b"
        difficulty="hard"
        title="E3b — Latency cost of constrained decoding"
        scenario={<>You implement constrained decoding via a trie mapping prefixes to valid continuations. Pick the option that accurately describes the inference-time cost.</>}
        options={[
          {key:"a", text:"Roughly doubles decode time because each step does a softmax then a trie-lookup pass to filter outputs."},
          {key:"b", text:"Forces the decoder onto CPU because trie traversal is branch-heavy and GPU mask-and-renormalize cannot be vectorized cleanly."},
          {key:"c", text:"Minimal: the trie becomes a GPU-resident sparse mask applied to logits before softmax; cost is O(B·D) per step (B beam, D codes).", correct:true},
          {key:"d", text:"Eliminates beam search because the trie already enforces validity; greedy decode now matches beam quality."},
        ]}
        trap={<>(a) over-counts. (b) misreads the implementation. (d) confuses validity with ranking quality.</>}
        lens={<>Constrained decoding is cheap when implemented as a logit mask; expensive only as post-hoc rejection sampling.</>}
        stretch={<>How often must you refresh the trie?</>}
      />

            <VIS.TrapProblem
        id="tiger-f4b"
        difficulty="medium"
        title="F4b — Empirical collision rate from the TIGER paper"
        scenario={<>Pick the collision rate the TIGER paper actually reports at K=4 and |codebook|=256, plus the implication for production.</>}
        options={[
          {key:"a", text:"≈0.3% — small enough that a single per-item tiebreaker token suffices, no extra codebook layer needed.", correct:true},
          {key:"b", text:"≈3-5% — large enough that production deployments need a 5th codebook layer to stay safe."},
          {key:"c", text:"≈10% — paper notes collisions are common; production deployments need item-ID side-channel resolution."},
          {key:"d", text:"Effectively 0% — the paper proves collision-freeness with their chosen K and codebook size."},
        ]}
        trap={<>(b)/(c) over-estimate; (d) over-claims a property the paper does not prove.</>}
        lens={<>The 0.3% figure is the empirical TIGER fingerprint. If your reproduction shows ~5%, suspect codebook collapse.</>}
        stretch={<>What collision rate would you flag as unsafe to ship?</>}
      />

            <VIS.TrapProblem
        id="tiger-a4b"
        difficulty="hard"
        title="A4b — Adding diversity on top of TIGER's beam outputs"
        scenario={<>You want more diverse <VIS.Term def="Return the K highest-scoring items from a ranked list.">top-K</VIS.Term> from TIGER. Choose between <VIS.Term def="Maximal Marginal Relevance. Greedy reranker: each step picks the candidate maximizing (relevance − λ × similarity to already-chosen).">MMR</VIS.Term> rerank on final item embeddings vs prefix-sampling at decode time. Pick the option that names the layer-correct additive move.</>}
        options={[
          {key:"a", text:"Both are additive — stack them; prefix-sampling at decode then MMR on the post-decode items always improves diversity strictly."},
          {key:"b", text:"MMR is largely redundant because TIGER's beams already share prefixes and behave like i.i.d. samples; prefix-sampling is the only additive move."},
          {key:"c", text:"Neither helps — TIGER's diversity is fixed by the codebook structure at training time; only retraining with a diversity loss can change it."},
          {key:"d", text:"Prefix-sampling is largely redundant — TIGER's beams already differ by prefix. MMR on post-decode item embeddings catches the case where distinct prefixes resolve to near items.", correct:true},
        ]}
        trap={<>(a) double-counts. (b) inverts the actual i.i.d. relationship — MMR operates on post-decode items, not beam tokens. (c) is wrong.</>}
        lens={<>TIGER's beams are diverse at the prefix level for free. The marginal diversity move must operate at a layer the prefix structure does not already diversify — i.e. final item embeddings (MMR).</>}
        stretch={<>If you push diversity into decoding (temperature on first codebook), what offline metric will mislead you?</>}
      />

            <VIS.TrapProblem
        id="tiger-e2b"
        difficulty="hard"
        title="E2b — 1% hallucinations leak past constrained decoding"
        scenario={<>You have constrained decoding via a trie; you still see 1% hallucinated IDs in production. Pick the most likely cause.</>}
        options={[
          {key:"a", text:"Beam search is sampling low-probability prefixes; the trie cannot mask probability mass, only validity; rare-but-valid IDs look like hallucinations downstream."},
          {key:"b", text:"Trie is stale — built from an older catalog snapshot; items added since aren't in the trie but ARE in the production catalog; refresh cadence is too slow.", correct:true},
          {key:"c", text:"The codebook is colliding above the tiebreaker budget; some Semantic IDs resolve to multiple item-IDs and the impression pipeline picks the wrong one."},
          {key:"d", text:"Mixed-precision inference on the trie mask introduces numerical noise that occasionally lets an invalid logit slip past."},
        ]}
        trap={<>(a) confuses validity with probability. (c) is a different failure mode. (d) is mythical.</>}
        lens={<>The trie must track the live catalog. Stale tries are the canonical 1% hallucination source.</>}
        stretch={<>How would you set the trie-refresh cadence?</>}
      />

            <VIS.TrapProblem
        id="tiger-c2c"
        difficulty="hard"
        title="C2c — Joint vs staged training of RQ-VAE and seq2seq"
        scenario={<>Pick the training strategy the TIGER paper uses, and the load-bearing reason.</>}
        options={[
          {key:"a", text:"Joint end-to-end training: RQ-VAE and seq2seq share gradients; the seq2seq objective shapes Semantic IDs toward retrieval quality."},
          {key:"b", text:"Alternating: seq2seq first to learn ID transitions, then RQ-VAE conditioned on those transitions to refine codebooks."},
          {key:"c", text:"Two-stage: train RQ-VAE to convergence, freeze codebooks, then train seq2seq. Joint training is unstable because seq2seq gradients collapse codebooks.", correct:true},
          {key:"d", text:"Curriculum: train RQ-VAE then seq2seq, then jointly fine-tune for a small number of steps to lock in retrieval quality."},
        ]}
        trap={<>(a) and (d) are research-frontier variants. (b) reverses the dependency.</>}
        lens={<>Two-stage training stabilizes codebooks. Joint training is research-frontier, not the production default.</>}
        stretch={<>How frequently should you refresh the RQ-VAE stage?</>}
      />

            <VIS.TrapProblem
        id="tiger-d2b"
        difficulty="medium"
        title="D2b — Limit of Semantic-ID 'free generalization'"
        scenario={<>A teammate claims Semantic IDs give free generalization to any new item. Pick the option naming the specific limit of that generalization.</>}
        options={[
          {key:"a", text:"Generalization is bounded by the RQ-VAE training distribution: items from a wholly new content category cold-start poorly because RQ-VAE never learned codes for that region.", correct:true},
          {key:"b", text:"Generalization breaks when the new item's content embedding norm exceeds the codebook's quantization range; norm clipping is required."},
          {key:"c", text:"Generalization is only free for warm-similar items; for novel items, the seq2seq still needs at least 10 interactions to lift them above the noise floor."},
          {key:"d", text:"Generalization is real but quickly saturates; after the first 100 cold items, recall@10 on new items flattens regardless of content quality."},
        ]}
        trap={<>(b) is mythical. (c) confuses inference-time with training-time. (d) is unsupported.</>}
        lens={<>TIGER generalizes within the content distribution it was trained on.</>}
        stretch={<>How would you detect a content-distribution shift in production?</>}
      />

            <VIS.TrapProblem
        id="tiger-e5b"
        difficulty="hard"
        title="E5b — Production NDCG gain half of the paper's"
        scenario={<>You implement TIGER as described; production NDCG gain is half the paper's. Pick the most likely cause given the scale gap between MovieLens and a real catalog.</>}
        options={[
          {key:"a", text:"User-history length differs — your production users have shorter sessions than MovieLens, weakening seq2seq conditioning."},
          {key:"b", text:"Evaluation metric differs — paper measures NDCG@10 on held-out interactions; production measures NDCG@10 on online impression-rank, which is noisier."},
          {key:"c", text:"Trie freshness — paper uses a fixed test catalog; production catalog is changing during evaluation, so a fraction of decoded IDs are stale-valid."},
          {key:"d", text:"Catalog scale — production is ~100× larger with a longer tail of low-content items; RQ-VAE codebooks struggle to cover the tail and tail recall lags.", correct:true},
        ]}
        trap={<>(a)/(b)/(c) name real production-vs-paper gaps but the catalog-scale tail is the dominant explanation.</>}
        lens={<>Catalog-scale gap is the most common reason TIGER underperforms its paper.</>}
        stretch={<>What's the right scaling rule for K and codebook size?</>}
      />

            <VIS.TrapProblem
        id="tiger-d4b"
        difficulty="hard"
        title="D4b — Cold-start performance: TIGER vs two-tower+HNSW"
        scenario={<>A new item with rich content is added. Pick the option that names the mechanism by which TIGER's cold-start beats two-tower+HNSW.</>}
        options={[
          {key:"a", text:"Two-tower also handles content cold-start fine because the item tower is content-driven; the difference is purely operational (no re-index)."},
          {key:"b", text:"TIGER assigns a Semantic ID from content alone; if a similar warm item exists, the new item inherits useful prefix structure and is retrievable zero-shot. Two-tower's randomly-initialized embedding is uninformative until training.", correct:true},
          {key:"c", text:"TIGER's autoregressive decoder is regularized to prefer recent items; new items get a recency bonus that lifts them above the noise floor immediately."},
          {key:"d", text:"TIGER uses a content tower internally that two-tower lacks; both use random IDs but TIGER fuses content into the embedding at retrieval time."},
        ]}
        trap={<>(a) reverses the actual gap — two-tower's item embedding is the learned-ID one, not the content tower. (c) and (d) misread architecture.</>}
        lens={<>Cold-start retrieval is TIGER's headline benefit. The mechanism is content-derived ID prefix inheritance, not architectural recency bias.</>}
        stretch={<>How big can the cold-start gap be (recall@10 delta)?</>}
      />

    </VIS.Section>
