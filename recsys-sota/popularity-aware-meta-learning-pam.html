<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// REDO v2 — RecSys-SOTA batch 11
// PAM — Popularity-Aware Meta-Learning (arXiv 2411.11225, 2024)
// Unique mechanism: STRATIFY THE META-TASK SAMPLING BY ITEM POPULARITY (or
// predicted popularity TRAJECTORY). Cold-but-trending items, cold-forever items,
// and head items each get DIFFERENT meta-priors. The meta-learner therefore
// generalizes fairly across head/tail rather than over-exploring tail items
// that will never warm.
// Cross-visual caution (meta-learning trio):
//   - MAFCDR = adversarial domain head + cross-domain
//   - CFSM   = content-feature prior + double-tower mutual attention
//   - PAM    = popularity-trajectory stratification at meta-task sampling (THIS)
// Don't let "few-shot variance" / "MAML inner-loop sensitivity" be PAM's
// signature. PAM's signature is task-distribution skew handled at the
// META-SAMPLER level, gated by a popularity-trajectory predictor.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="RecSys SOTA · Cold-start (streaming)"
      title="PAM — Popularity-Aware Meta-Learning"
      subtitle="The meta-learner conditions on item-popularity bucket at meta-task sampling time — a cold-but-trending item gets one prior, a cold-forever item gets another. Exploration is gated by predicted trajectory, not by interaction count."
      byline={[
        {label: "Paper", value: "Online Item Cold-Start Recommendation with Popularity-Aware Meta-Learning (arXiv 2411.11225, 2024)"},
        {label: "Surface", value: "Streaming-data settings with short item lifecycles (TikTok, news, e-commerce flash inventory)"},
        {label: "Anchor that survives redaction", value: "Popularity-trajectory stratification at meta-task sampling"},
      ]}/>

    <VIS.TLDR>
      Streaming recommenders mint thousands of cold items per hour; most will stay cold, a handful will go viral. Uniform meta-priors over-explore every cold item identically, wasting budget on items that will never warm. PAM&apos;s move: <strong>condition the meta-learner on a popularity bucket</strong> determined by a <VIS.Term def="A model that predicts whether a brand-new item will trend, plateau, or stay cold based on early-stage signals (creator reputation, content category, seed engagement).">popularity-trajectory predictor</VIS.Term>, stratify meta-task sampling so each bucket gets its own prior, and let MAML adapt FROM that bucket&apos;s prior. The bet is that &quot;cold-but-going-viral&quot; and &quot;always-cold&quot; need fundamentally different exploration policies — and meta-task stratification at sampling time is the cleanest place to encode that.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is — popularity-stratified meta-task sampling">
      <VIS.Mermaid chart={`flowchart TB
  ITEMS["New items (per hour)"]
  ITEMS --> PRED["Popularity-trajectory predictor"]
  PRED --> HOT["Bucket: cold-trending"]
  PRED --> MID["Bucket: cold-plateau"]
  PRED --> COLD["Bucket: cold-forever"]
  HOT --> S1["Meta-tasks sampled within bucket"]
  MID --> S2["Meta-tasks sampled within bucket"]
  COLD --> S3["Meta-tasks sampled within bucket"]
  S1 --> META["MAML outer loop (bucket-conditioned)"]
  S2 --> META
  S3 --> META
  META --> R["Bucket-aware prior; inner loop adapts"]`} />
      <ul>
        <li><strong>Popularity-trajectory predictor</strong> — small upstream model that buckets each new item by predicted lifecycle (cold-trending, cold-plateau, cold-forever) using early signals: creator history, content category, seed engagement.</li>
        <li><strong>Stratified meta-task sampling</strong> — meta-tasks are drawn WITHIN buckets so the meta-learner sees representative tasks per bucket, not random tasks dominated by head items.</li>
        <li><strong>Bucket-conditioned MAML</strong> — the inner loop adapts from a prior chosen by the predicted bucket; exploration budget is allocated by bucket, not uniformly.</li>
      </ul>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How it differs from MAML-Rec / uniform-prior meta-learning / popularity reranking">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8, fontSize:14}}>
        <thead><tr style={{background:"#1f3a5f", color:"#fff"}}>
          <th style={{textAlign:"left", padding:8}}>Method</th>
          <th style={{textAlign:"left", padding:8}}>Prior over items</th>
          <th style={{textAlign:"left", padding:8}}>Exploration policy</th>
          <th style={{textAlign:"left", padding:8}}>Lifecycle-aware?</th>
        </tr></thead>
        <tbody>
          <tr><td style={{padding:8, borderTop:"1px solid #e2e8f0"}}>MAML-Rec</td><td style={{padding:8, borderTop:"1px solid #e2e8f0"}}>Uniform over tasks</td><td style={{padding:8, borderTop:"1px solid #e2e8f0"}}>Uniform per cold item</td><td style={{padding:8, borderTop:"1px solid #e2e8f0"}}>No</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:8}}>Popularity reranking (post hoc)</td><td style={{padding:8}}>Implicit head bias</td><td style={{padding:8}}>None at meta-level</td><td style={{padding:8}}>Reactive only</td></tr>
          <tr><td style={{padding:8, borderTop:"1px solid #e2e8f0"}}>Bandit (LinUCB)</td><td style={{padding:8, borderTop:"1px solid #e2e8f0"}}>Per-arm posterior</td><td style={{padding:8, borderTop:"1px solid #e2e8f0"}}>UCB confidence interval</td><td style={{padding:8, borderTop:"1px solid #e2e8f0"}}>No</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:8}}><strong>PAM</strong></td><td style={{padding:8}}><strong>Bucket-conditioned</strong></td><td style={{padding:8}}><strong>Trajectory-gated</strong></td><td style={{padding:8}}><strong>YES — load-bearing</strong></td></tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — 24 trap problems">
      <p style={{color:"#475569"}}>Each problem cites the question-axis it draws from. Pick, then reveal.</p>

      {/* axis: A1 */}
      <VIS.TrapProblem
        id="pam-p1" difficulty="hard"
        title="P1 — PAM vs uniform MAML-Rec: what is the load-bearing addition?"
        scenario={<><em>Discriminating insight: MAML-Rec samples meta-tasks uniformly over cold items, giving every new item the same prior and the same exploration budget. PAM stratifies sampling by predicted popularity trajectory; cold-trending items get a head-leaning prior, cold-forever items get a different (likely sparser) prior. The lever is at the META-SAMPLER level, not the inner loop.</em><br/>What is the load-bearing addition?</>}
        options={[
          {key:"a", text:"Popularity-trajectory stratification at meta-task SAMPLING time. Each item bucket gets its own meta-prior, so the inner loop adapts FROM a bucket-appropriate initialization rather than a uniform one.", correct:true},
          {key:"b", text:"A larger inner-loop learning rate."},
          {key:"c", text:"A bigger embedding table."},
          {key:"d", text:"Removing the inner loop entirely."},
        ]}
        trap={<>(b)(c) tweak orthogonal axes. (d) removes the mechanism.</>}
        lens={<>The lever is at the meta-sampler, not the inner loop.</>}
        stretch={<>Why is sampler-level intervention superior to per-item reweighting in the loss?</>}
      />

      {/* axis: A2 */}
      <VIS.TrapProblem
        id="pam-p2" difficulty="hard"
        title="P2 — PAM vs LinUCB (contextual bandit)"
        scenario={<><em>Discriminating insight: bandits maintain per-arm uncertainty estimates and pull arms by upper-confidence. PAM uses a separate trajectory predictor to bucket items BEFORE any interactions arrive; exploration is then meta-prior-driven within bucket, not bandit-driven across all items. PAM is a meta-learning solution; LinUCB is a bandit.</em><br/>Which is correct?</>}
        options={[
          {key:"a", text:"PAM is a meta-learning approach that buckets items by predicted trajectory before any interactions; LinUCB is a contextual bandit that explores by per-arm confidence. PAM front-loads the prior; LinUCB front-loads exploration. They compose: PAM&apos;s bucket can determine LinUCB&apos;s exploration coefficient.", correct:true},
          {key:"b", text:"PAM and LinUCB are equivalent."},
          {key:"c", text:"PAM has no exploration."},
          {key:"d", text:"LinUCB does the same trajectory prediction."},
        ]}
        trap={<>(b)(c)(d) confuse the families.</>}
        lens={<>Meta-learning vs bandit families; they compose.</>}
        stretch={<>How would PAM&apos;s buckets seed LinUCB&apos;s prior covariance?</>}
      />

      {/* axis: A3 */}
      <VIS.TrapProblem
        id="pam-p3" difficulty="medium"
        title="P3 — Counterfactual: no PAM, what happens to cold-but-trending items?"
        scenario={<><em>Discriminating insight: without trajectory awareness, cold-trending items get the same exploration budget as cold-forever items; viral items therefore take hours longer to surface, missing their peak. The opportunity cost is huge in short-lifecycle settings (TikTok-style).</em><br/>What is the realistic gap?</>}
        options={[
          {key:"a", text:"Cold-trending items surface ~5-15x slower because exploration budget is split across the entire cold pool. In short-lifecycle inventory (TikTok), the item is already past peak before warming.", correct:true},
          {key:"b", text:"No difference; uniform exploration is fine."},
          {key:"c", text:"Cold-forever items dominate uniformly."},
          {key:"d", text:"The gap is in latency, not surfacing time."},
        ]}
        trap={<>(b)(c)(d) miss the lifecycle cost.</>}
        lens={<>Opportunity cost on short-lifecycle items is the dominant business case.</>}
        stretch={<>Sketch the time-to-surface distribution with vs without PAM.</>}
      />

      {/* axis: A4 */}
      <VIS.TrapProblem
        id="pam-p4" difficulty="hard"
        title="P4 — Compose PAM with TIGER / HSTU"
        scenario={<><em>Discriminating insight: TIGER/HSTU score items via generative retrieval over a learned vocabulary; the vocabulary itself has implicit popularity bias (frequent items get tighter codebook codes). PAM&apos;s buckets can override this at the candidate-set sampling stage, ensuring cold-trending items appear in the candidate pool the generative model scores.</em><br/>What does the stack achieve?</>}
        options={[
          {key:"a", text:"PAM&apos;s buckets feed candidate-pool sampling, ensuring cold-trending items appear in the pool TIGER/HSTU scores. Without PAM, the generative model never sees them and they cannot win.", correct:true},
          {key:"b", text:"TIGER replaces PAM."},
          {key:"c", text:"They cannot compose."},
          {key:"d", text:"PAM is post-hoc only."},
        ]}
        trap={<>(b)(c)(d) miss the pool-sampling integration.</>}
        lens={<>Cold items must appear in the candidate pool to win.</>}
        stretch={<>Where in the funnel does PAM&apos;s bucket signal live?</>}
      />

      {/* axis: A5 */}
      <VIS.TrapProblem
        id="pam-p5" difficulty="medium"
        title="P5 — Boundary: when does PAM stop helping?"
        scenario={<><em>Discriminating insight: PAM&apos;s edge requires (i) short item lifecycles (uniform exploration is too slow), (ii) a usable trajectory predictor. With long-lifecycle catalogs (movies, books) or a trajectory predictor with AUC near 0.5, PAM degenerates.</em><br/>Where is the boundary?</>}
        options={[
          {key:"a", text:"PAM wins when (i) item lifecycle is short (hours-to-days) AND (ii) the trajectory predictor has meaningful AUC (≥ 0.7) on early signals. Long lifecycles or weak predictor → PAM degenerates toward uniform sampling.", correct:true},
          {key:"b", text:"PAM always wins."},
          {key:"c", text:"PAM wins for long-lifecycle catalogs."},
          {key:"d", text:"PAM is independent of predictor quality."},
        ]}
        trap={<>(b)(c)(d) miss the conditions.</>}
        lens={<>Short lifecycle + decent predictor are the necessary conditions.</>}
        stretch={<>How would you measure the predictor&apos;s AUC under selection bias?</>}
      />

      {/* axis: B1 */}
      <VIS.TrapProblem
        id="pam-p6" difficulty="hard"
        title="P6 — Pick the technique for THIS scenario"
        scenario={<><em>Discriminating insight: TikTok-like surface, 50k new videos/hour, item lifecycle ~6 hours, rich creator and content signals available for trajectory prediction.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"PAM — short lifecycle (cannot wait for uniform exploration to warm items), strong early signals (creator history + content), trajectory predictor will work. Buckets feed candidate pool + meta-prior.", correct:true},
          {key:"b", text:"Pure popularity ranker."},
          {key:"c", text:"Vanilla MAML-Rec."},
          {key:"d", text:"Static content-based ranker."},
        ]}
        trap={<>(b) reinforces head bias. (c) wastes exploration. (d) static.</>}
        lens={<>Short lifecycle + early signal availability = PAM.</>}
        stretch={<>What if creator signals were absent?</>}
      />

      {/* axis: B2 — sounds reasonable, isn't */}
      <VIS.TrapProblem
        id="pam-p7" difficulty="hard"
        title="P7 — Sounds reasonable: &quot;just boost cold items in the ranker&quot;"
        scenario={<><em>Discriminating insight: a ranker-side boost gives every cold item the same uplift, wasting exposure on cold-forever items. PAM&apos;s buckets allocate exposure where the trajectory predictor says it pays off.</em><br/>Why is a flat cold boost wrong?</>}
        options={[
          {key:"a", text:"A flat cold boost over-exposes cold-forever items and under-exposes cold-trending items — the very items you most want to find. PAM&apos;s trajectory predictor allocates the exposure by predicted payoff.", correct:true},
          {key:"b", text:"Flat boosts always solve cold-start."},
          {key:"c", text:"Cold boosts are mathematically equivalent to PAM."},
          {key:"d", text:"Cold boosts are unrelated to PAM."},
        ]}
        trap={<>(b)(c)(d) miss the allocation argument.</>}
        lens={<>Exposure should be allocated by expected payoff, not uniformly.</>}
        stretch={<>How would you A/B test &quot;flat boost vs PAM&quot;?</>}
      />

      {/* axis: B3 — popularity stratification at sampling */}
      <VIS.TrapProblem
        id="pam-p8" difficulty="hard"
        title="P8 — PAM&apos;s anchor (popularity stratification at sampling): pitch it"
        scenario={<><em>Discriminating insight: PAM&apos;s anchor is &quot;different cold items deserve different priors and different exploration budgets, decided at sampling time.&quot; That is the asymmetry to name.</em><br/>Pick the right pitch.</>}
        options={[
          {key:"a", text:"We spend cold-start exposure on the items most likely to take off — predicted by a small trajectory model on creator and content signals — instead of giving every new item the same budget regardless of its odds.", correct:true},
          {key:"b", text:"We add a popularity feature column."},
          {key:"c", text:"We retrain weekly with more data."},
          {key:"d", text:"We use bigger embeddings."},
        ]}
        trap={<>(b)(c)(d) miss the asymmetry.</>}
        lens={<>Different items deserve different budgets — sampler-level.</>}
        stretch={<>What metric does the PM watch?</>}
      />

      {/* axis: B4 */}
      <VIS.TrapProblem
        id="pam-p9" difficulty="hard" multiSelect
        title="P9 — When NOT to use PAM. Select all that apply."
        scenario={<><em>Discriminating insight: PAM fails when the trajectory predictor is uninformative, when item lifecycles are very long (the cost of uniform exploration is absorbed), or when the catalog is small enough to exhaustively explore.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"Trajectory predictor near AUC 0.5 (no early signal).", correct:true},
          {key:"b", text:"Long-lifecycle catalog (movies, books) where the head/tail churn is slow.", correct:true},
          {key:"c", text:"Small catalog you can exhaustively explore in a few hours.", correct:true},
          {key:"d", text:"Short lifecycle + strong early signals — PAM&apos;s sweet spot."},
          {key:"e", text:"Adversarial supply (creator gaming) that fools the trajectory predictor without monitoring.", correct:true},
        ]}
        trap={<>(d) is the sweet spot.</>}
        lens={<>Need short lifecycle + informative predictor + non-trivial catalog.</>}
        stretch={<>How would you mitigate (e)?</>}
      />

      {/* axis: C1 */}
      <VIS.TrapProblem
        id="pam-p10" difficulty="hard"
        title="P10 — Why stratify at SAMPLING vs at the loss?"
        scenario={<><em>Discriminating insight: per-example loss reweighting in the inner loop only adjusts the gradient magnitude for items already drawn into the batch. Stratified SAMPLING controls WHICH items appear in the batch at all, which is a stronger lever for representativeness.</em><br/>Why sampler-level is right?</>}
        options={[
          {key:"a", text:"Sampling controls representation in the batch; loss reweighting only adjusts gradient magnitude for items already in the batch. For tail items that almost never appear, only sampling can fix the imbalance.", correct:true},
          {key:"b", text:"Loss reweighting and sampling are equivalent."},
          {key:"c", text:"Sampling is faster."},
          {key:"d", text:"Sampling is decorative."},
        ]}
        trap={<>(b)(c)(d) miss the representation argument.</>}
        lens={<>Sampler controls representation; loss only adjusts seen items.</>}
        stretch={<>What would IPW have to do to recover PAM&apos;s effect?</>}
      />

      {/* axis: C2 — loss/objective */}
      <VIS.TrapProblem
        id="pam-p11" difficulty="hard"
        title="P11 — Loss: bucket-conditioned vs IPW reweighting vs joint"
        scenario={<><em>Discriminating insight: PAM stratifies at the META-TASK SAMPLING step (each bucket contributes its own averaged inner gradient). IPW-style reweighting only rescales the per-example loss; head-bucket tasks still dominate the meta-batch composition, so the tail buckets get high-variance gradients and a stale prior. Sampling-time stratification and loss-time reweighting are NOT equivalent.</em><br/>Pick the load-bearing formulation.</>}
        options={[
          {key:"a", text:"L_outer = Σ_bucket w_bucket · E_tasks-in-bucket[L_inner]. Bucket-conditioned averaging means each bucket contributes its own meta-gradient regardless of head/tail task counts; w_bucket controls overall mixing weight.", correct:true},
          {key:"b", text:"L_outer = E_all-tasks[(1/p_bucket(item)) · L_inner], inverse-propensity weighting where p_bucket is the marginal popularity-bucket frequency. Rescales per-task loss but does not stratify meta-task sampling, so head tasks still dominate the batch.", correct:false},
          {key:"c", text:"L_outer = E_all-tasks[L_inner] with no bucketing. Head-bucket tasks dominate the gradient; tail buckets get negligible signal.", correct:false},
          {key:"d", text:"L_outer = E_all-tasks[L_inner] + λ · adversarial-domain-discriminator loss with gradient reversal. This is MAFCDR&apos;s cross-domain objective, not PAM&apos;s stratification.", correct:false},
        ]}
        trap={<>(b) is the senior-MLE near-miss — IPW reweights losses but leaves task sampling unstratified, so tail-bucket gradients stay high-variance. (c) collapses to uniform. (d) is MAFCDR&apos;s objective.</>}
        lens={<>Sampling-time stratification ≠ loss-time reweighting. PAM&apos;s lever is the meta-task sampler.</>}
        stretch={<>When would IPW be sufficient on its own — and why isn&apos;t it here?</>}
      />

      {/* axis: C3 — what's dropped */}
      <VIS.TrapProblem
        id="pam-p12" difficulty="medium"
        title="P12 — What PAM DROPS vs uniform meta-learning"
        scenario={<><em>Discriminating insight: PAM drops the uniform-prior assumption. It adds the trajectory predictor (an extra moving part with its own training data and drift) but drops a brittle invariant.</em><br/>What is dropped?</>}
        options={[
          {key:"a", text:"The uniform-prior assumption across all cold items. Replaced with bucket-conditioned priors driven by a popularity-trajectory predictor.", correct:true},
          {key:"b", text:"The MAML inner loop."},
          {key:"c", text:"The item embedding table."},
          {key:"d", text:"Everything."},
        ]}
        trap={<>(b)(c) still present.</>}
        lens={<>Uniform prior is the dropped invariant.</>}
        stretch={<>What does the trajectory predictor cost in training data?</>}
      />

      {/* axis: C4 */}
      <VIS.TrapProblem
        id="pam-p13" difficulty="hard"
        title="P13 — Most fragile hyperparameter"
        scenario={<><em>Discriminating insight: the bucket-boundary thresholds (where you split cold-trending vs cold-plateau vs cold-forever) dominate. Wrong boundaries put trending items in the cold bucket (or vice versa), corrupting the priors. The bucket count itself is secondary.</em><br/>Rank by 2x mis-set breakage.</>}
        options={[
          {key:"a", text:"Bucket-boundary thresholds (where you split cold-trending vs cold-plateau vs cold-forever) >> bucket count >> MAML inner LR. Wrong boundaries put items in the wrong prior, corrupting the meta-learner.", correct:true},
          {key:"b", text:"Embedding dim is most fragile."},
          {key:"c", text:"Batch size is most fragile."},
          {key:"d", text:"All equal."},
        ]}
        trap={<>(b)(c)(d) miss the boundary mechanism.</>}
        lens={<>The boundaries decide which prior an item adapts from.</>}
        stretch={<>How would you tune boundaries — quantiles or held-out NDCG?</>}
      />

      {/* axis: C5 — data assumption violations */}
      <VIS.TrapProblem
        id="pam-p14" difficulty="medium"
        title="P14 — Data assumption violations"
        scenario={<><em>Discriminating insight: PAM assumes the trajectory predictor was trained on a label distribution similar to today&apos;s. A seasonal shift (holidays, world events) shifts the trajectory label distribution and the predictor mis-buckets; PAM then routes new items to wrong priors.</em><br/>Which violation is most direct?</>}
        options={[
          {key:"a", text:"Seasonality shifts the trajectory label distribution; the predictor mis-buckets. Mitigation: short retraining window for the predictor + drift monitoring on bucket assignments.", correct:true},
          {key:"b", text:"Different label encodings."},
          {key:"c", text:"Slight feature-order changes."},
          {key:"d", text:"Different batch sizes."},
        ]}
        trap={<>(b)(c)(d) generic.</>}
        lens={<>The predictor&apos;s label distribution is the contract.</>}
        stretch={<>What monitor catches predictor drift?</>}
      />

      {/* axis: D1 — intuitive but wrong */}
      <VIS.TrapProblem
        id="pam-p15" difficulty="hard"
        title="P15 — Intuitive but wrong: &quot;just over-sample tail items&quot;"
        scenario={<><em>Discriminating insight: blanket tail oversampling lifts cold-forever items into the batch, wasting capacity. PAM oversamples ONLY items the trajectory predictor flags as likely-to-trend.</em><br/>Why is blanket tail oversampling wrong here?</>}
        options={[
          {key:"a", text:"Blanket tail oversampling treats all tail items as deserving the same exposure. PAM oversamples conditionally on predicted trajectory; budget goes to items likely to warm.", correct:true},
          {key:"b", text:"Tail oversampling and PAM are equivalent."},
          {key:"c", text:"Tail oversampling always wins."},
          {key:"d", text:"Tail oversampling is unrelated."},
        ]}
        trap={<>(b)(c)(d) miss the conditional argument.</>}
        lens={<>Allocate by predicted payoff, not by tail membership.</>}
        stretch={<>How does PAM&apos;s sampler compare to inverse-popularity oversampling?</>}
      />

      {/* axis: D2 — cascade */}
      <VIS.TrapProblem
        id="pam-p16" difficulty="hard"
        title="P16 — Wrong-assumption cascade"
        scenario={<><em>Discriminating insight: assuming &quot;the trajectory predictor is reliable&quot; without monitoring cascades into: (i) trusting bucket assignments forever, (ii) failing to detect predictor drift, (iii) misallocating exploration during seasonal shifts.</em><br/>What breaks?</>}
        options={[
          {key:"a", text:"All three: stale bucket assignments, undetected drift, misallocated exploration during seasonality. Mitigation: monitor predictor calibration on a recent rolling window and gate releases on calibration tests.", correct:true},
          {key:"b", text:"Just the bucket assignments."},
          {key:"c", text:"Just the exploration allocation."},
          {key:"d", text:"Nothing — the predictor is reliable."},
        ]}
        trap={<>(d) over-trust.</>}
        lens={<>The predictor is a moving part with its own drift surface.</>}
        stretch={<>What is the calibration metric on bucket assignments?</>}
      />

      {/* axis: D3 — senior vs junior */}
      <VIS.TrapProblem
        id="pam-p17" difficulty="medium"
        title="P17 — Senior vs junior framing"
        scenario={<><em>Discriminating insight: junior reaches for more data; senior reaches for &quot;is the trajectory predictor still calibrated?&quot; — the upstream moving part is the most common silent failure.</em><br/>Cold-trending recall sags 8%; first lever?</>}
        options={[
          {key:"a", text:"Check the trajectory predictor&apos;s calibration on a recent window. If it has drifted, fix it before debugging the meta-learner.", correct:true},
          {key:"b", text:"Wait for more interaction data."},
          {key:"c", text:"Increase inner-loop LR."},
          {key:"d", text:"Bigger embeddings."},
        ]}
        trap={<>(b)(c)(d) tweak the wrong moving part.</>}
        lens={<>The upstream predictor is the cheap-to-check, often-failing component.</>}
        stretch={<>What recent-window calibration metric would you use?</>}
      />

      {/* axis: D4 — plausible misattribution */}
      <VIS.TrapProblem
        id="pam-p18" difficulty="hard"
        title="P18 — Offline lift is real, online lift is zero. Where did it go?"
        scenario={<><em>Discriminating insight: PAM produces well-calibrated cold-item embeddings, but the UPSTREAM candidate generator (two-tower retrieval, ANN index) never surfaces those items into the ranker&apos;s top-K — so PAM&apos;s lift never reaches users. The bug is downstream-of-PAM cascade starvation, not anything inside the meta-learner.</em><br/>Most likely cause?</>}
        options={[
          {key:"a", text:"Upstream candidate generator (retrieval / ANN index) does not surface cold items into PAM&apos;s ranking pool; PAM only re-ranks items it never sees. Fix: add a cold-item quota to retrieval or rebuild the ANN index with the new cold embeddings.", correct:true},
          {key:"b", text:"PAM&apos;s outer-loop loss is decreasing on the wrong bucket; head-bucket gradients have started dominating and tail buckets are no longer fitting offline metrics.", correct:false},
          {key:"c", text:"The offline eval set is sampled uniformly across buckets, but online traffic is head-dominated — so the offline NDCG lift is a sampling artifact and there is no real lift to recover.", correct:false},
          {key:"d", text:"Trajectory-bucket boundaries defined at meta-train time have drifted (yesterday&apos;s tail is today&apos;s head), so items are being routed to the wrong bucket-specific head at serve time.", correct:false},
        ]}
        trap={<>(b)(c)(d) are all PAM-internal stories. The bug is cascade-level: a perfect cold-item ranker is useless if retrieval never feeds it cold items.</>}
        lens={<>Trace the request path end-to-end. Embedding quality &gt; pool composition &gt; user impact.</>}
        stretch={<>What metric would you instrument to catch this cascade gap before launch?</>}
      />

      {/* axis: E1 — production gotcha */}
      <VIS.TrapProblem
        id="pam-p19" difficulty="hard"
        title="P19 — Production gotcha: the trajectory predictor as a hidden dependency"
        scenario={<><em>Discriminating insight: the trajectory predictor has its own training data, its own retraining cadence, its own drift surface. Teams forget it exists and only debug the meta-learner. Operational hygiene: treat the predictor as a first-class model with monitoring.</em><br/>What is the discipline?</>}
        options={[
          {key:"a", text:"Treat the trajectory predictor as a first-class model: training pipeline, calibration monitoring, drift alerts, retraining cadence. PAM&apos;s output is only as good as the predictor&apos;s buckets.", correct:true},
          {key:"b", text:"The predictor is a static module."},
          {key:"c", text:"The predictor is irrelevant to PAM&apos;s performance."},
          {key:"d", text:"Predictor monitoring is overkill."},
        ]}
        trap={<>(b)(c)(d) under-rate the dependency.</>}
        lens={<>The predictor is a first-class dependency, not a static feature.</>}
        stretch={<>What is the minimal monitoring set for the predictor?</>}
      />

      {/* axis: E2 — Failure on Friday */}
      <VIS.TrapProblem
        id="pam-p20" difficulty="hard"
        title="P20 — Failure on Friday: cold-trending bucket empties"
        scenario={<><em>Discriminating insight: an upstream creator-feature pipeline broke; the trajectory predictor lost its strongest signal (creator history) and now classifies almost every new item as cold-forever. The cold-trending bucket empties; viral items never surface.</em><br/>3am page: cold-trending bucket population fell 90%, overall NDCG down 6%. Diagnosis?</>}
        options={[
          {key:"a", text:"Creator-feature pipeline upstream lost a column; the trajectory predictor&apos;s strongest signal vanished and it now classifies everything as cold-forever. Restore the upstream feature; gate releases on bucket-population diversity.", correct:true},
          {key:"b", text:"GPU thermal throttling."},
          {key:"c", text:"MAML LR drift."},
          {key:"d", text:"Cache TTL changed."},
        ]}
        trap={<>(b)(c)(d) generic.</>}
        lens={<>Bucket-population diversity is the canary.</>}
        stretch={<>What would the bucket-population SLO look like?</>}
      />

      {/* axis: E3 — implementation specifics */}
      <VIS.TrapProblem
        id="pam-p21" difficulty="medium"
        title="P21 — Library default that bites: balanced sampler"
        scenario={<><em>Discriminating insight: a generic &quot;balanced sampler&quot; in a meta-learning library will sample uniformly per CLASS (e.g., per user), not per BUCKET. Out of the box, PAM&apos;s bucketing is ignored unless you explicitly plug in a bucket-stratified sampler.</em><br/>What default bites?</>}
        options={[
          {key:"a", text:"The default balanced sampler is class-balanced (per user/per item), not bucket-stratified. You must explicitly plug in a bucket sampler keyed on the trajectory predictor.", correct:true},
          {key:"b", text:"Adam β2 default."},
          {key:"c", text:"Default dropout."},
          {key:"d", text:"Default LR schedule."},
        ]}
        trap={<>(b)(c)(d) generic.</>}
        lens={<>Sampler integration is the load-bearing plumbing.</>}
        stretch={<>How do you unit-test the bucket sampler?</>}
      />

      {/* axis: E4 — rollout */}
      <VIS.TrapProblem
        id="pam-p22" difficulty="hard" ordered
        title="P22 — Order the rollout"
        scenario={<><em>Discriminating insight: rollout is (1) train and validate the trajectory predictor stand-alone, (2) wire it into the sampler with monitoring but uniform weights, (3) shift weights toward bucket-specific priors, (4) shadow-score, (5) traffic ramp.</em><br/>Order.</>}
        options={[
          {key:"a", text:"Train predictor stand-alone → wire into sampler with uniform weights (sanity) → shift to bucket-specific weights → shadow-score → traffic ramp", correct:true},
          {key:"b", text:"Wire in bucket-specific weights from day 1."},
          {key:"c", text:"Skip predictor validation."},
          {key:"d", text:"Ramp traffic before shadow-scoring."},
        ]}
        trap={<>(b) over-aggressive. (c) skips a critical step. (d) backwards.</>}
        lens={<>Predictor validation is the gate; uniform weights catch wiring bugs.</>}
        stretch={<>What predictor metric is your gate?</>}
      />

      {/* axis: F1 — edge case */}
      <VIS.TrapProblem
        id="pam-p23" difficulty="hard"
        title="P23 — Smallest input that breaks PAM&apos;s claimed advantage"
        scenario={<><em>Discriminating insight: a trajectory predictor at AUC 0.5 is equivalent to random bucketing; PAM degenerates to uniform meta-learning + the overhead of running a useless model.</em><br/>Construct the edge case.</>}
        options={[
          {key:"a", text:"A trajectory predictor at chance-level AUC (≈0.5) — the buckets become random, the bucket-conditioned priors collapse to a noisy uniform, and PAM regresses below MAML-Rec because of the added overhead.", correct:true},
          {key:"b", text:"Predictor at AUC 0.9 — PAM&apos;s sweet spot, not an edge case."},
          {key:"c", text:"10k items."},
          {key:"d", text:"5 buckets."},
        ]}
        trap={<>(b) sweet spot. (c)(d) describe scale.</>}
        lens={<>Predictor quality is the gating factor.</>}
        stretch={<>What AUC threshold would you set as a gate?</>}
      />

      {/* axis: F4 — paper-named failure mode */}
      <VIS.TrapProblem
        id="pam-p24" difficulty="hard"
        title="P24 — Paper-named failure: predictor is itself a hard problem"
        scenario={<><em>Discriminating insight: the paper itself names &quot;trajectory prediction is hard&quot; as the dominant limitation: early-stage signals are noisy, virality has heavy-tailed structure, and creator gaming attacks the predictor.</em><br/>What is the paper&apos;s named limitation?</>}
        options={[
          {key:"a", text:"Predicting which cold items will trend is itself a hard problem; PAM&apos;s lift is bounded by the predictor&apos;s quality, which the paper acknowledges as the dominant practical limitation.", correct:true},
          {key:"b", text:"MAML&apos;s second-order cost."},
          {key:"c", text:"Embedding-dim sensitivity."},
          {key:"d", text:"Inner-loop LR sensitivity."},
        ]}
        trap={<>(b)(c)(d) not paper-named.</>}
        lens={<>PAM&apos;s upper bound is the predictor.</>}
        stretch={<>How would you make the predictor self-correcting via online feedback?</>}
      />

    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://arxiv.org/html/2411.11225v1" target="_blank" rel="noopener">Wei et al., <em>Online Item Cold-Start Recommendation with Popularity-Aware Meta-Learning</em> (arXiv 2411.11225, 2024)</a> — primary source.</li>
        <li><a href="https://arxiv.org/abs/1703.03400" target="_blank" rel="noopener">Finn, Abbeel, Levine, <em>Model-Agnostic Meta-Learning</em> (MAML, ICML 2017)</a> — the meta-loop PAM specializes.</li>
        <li><a href="https://eugeneyan.com/writing/system-design-for-discovery/" target="_blank" rel="noopener">Eugene Yan — <em>System Design for Discovery</em> (blog)</a> — exploration vs exploitation in short-lifecycle catalogs.</li>
        <li><a href="https://lilianweng.github.io/posts/2018-01-23-multi-armed-bandit/" target="_blank" rel="noopener">Lilian Weng — <em>The Multi-Armed Bandit</em> (blog)</a> — exploration framing PAM departs from.</li>
        <li><a href="https://karpathy.github.io/2019/04/25/recipe/" target="_blank" rel="noopener">Andrej Karpathy — <em>A Recipe for Training Neural Networks</em> (blog)</a> — practitioner discipline for monitoring upstream model dependencies.</li>
      </ul>
    </VIS.Section>
  </main>
);
