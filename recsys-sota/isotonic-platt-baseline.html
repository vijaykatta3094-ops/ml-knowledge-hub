          {key:"a", text:"Logged-impression sampling is biased by the policy that did the serving — high-score items are over-represented. The Platt fit is on a conditional distribution, not the marginal; serving applies it to the full candidate pool, where it mis-calibrates the low-score side.", correct:true},
          {key:"b", text:"Platt drifts naturally."},
          {key:"c", text:"Isotonic would have been stable."},
          {key:"d", text:"GPU clock drift."},
        ]}
        trap={<>(c) is wrong — isotonic has the same problem on the same data. (b), (d) are non-explanations.</>}
        lens={<>The fix is fitting on a reserved exploration slice (small fraction of traffic served by uniform sampling), or IPS-weighted refit. Either way, recognize that "calibrate on logged data" is a biased estimator without correction.</>}
        stretch={<>What size of exploration slice is enough? How do you bound the cost?</>}
      />

      {/* axis: E2 (failure-on-Friday) */}
      <VIS.TrapProblem
        id="iso-e2"
        difficulty="hard"
        title="E2 — Friday 3am: Brier OK, segment alerts firing"
        scenario={<>Your model's marginal Brier is unchanged. But three high-value advertiser segments are off-pacing by 12-25 percent. Latency, eval, GPU all fine. Why isotonic-specifically and not raw-score? <em>Discriminating insight: isotonic guarantees only marginal calibration; segment off-pacing is the canonical isotonic failure that raw scores don't even pretend to fix.</em></>}
        options={[
          {key:"a", text:"Isotonic was fit on aggregate data; it's marginally calibrated but the per-segment reliability has drifted. The raw ranker had no calibration claim at all, so it cannot be the source of a regression that started after the isotonic refit.", correct:true},
          {key:"b", text:"GPU thermal."},
          {key:"c", text:"Random."},
          {key:"d", text:"Calibration always drifts on Fridays."},
        ]}
        trap={<>(b), (c), (d) are red herrings.</>}
        lens={<>The page is the segment-miscalibration alarm; the fix is per-segment calibration with shrinkage (covariate-aware isotonic, or per-segment Platt). The mistake to avoid is "refit isotonic on more data" — more aggregate data doesn't fix segment-level structure.</>}
        stretch={<>Sketch the per-segment calibration pipeline. What's the shrinkage target?</>}
      />

      {/* axis: E3 (implementation specifics) */}
      <VIS.TrapProblem
        id="iso-e3"
        difficulty="hard"
        title="E3 — scikit-learn IsotonicRegression default that bites"
        scenario={<>You use <code>sklearn.isotonic.IsotonicRegression</code>. There's a default that silently breaks production. Which? <em>Discriminating insight: out_of_bounds is 'nan' by default — out-of-range scores at serving return NaN instead of clipping, taking down the downstream auction.</em></>}
        options={[
          {key:"a", text:"`out_of_bounds='nan'` — at serving time, scores beyond the calibration set's range return NaN instead of clipping. Set `out_of_bounds='clip'` (or rebuild bounds on streaming data).", correct:true},
          {key:"b", text:"`increasing=True` — default is False."},
          {key:"c", text:"`y_min=0` — default is None."},
          {key:"d", text:"It uses log-space by default."},
        ]}
        trap={<>(b) is the inverse of true (default is 'auto'). (c), (d) are misreadings.</>}
        lens={<>This default has killed at least one production bid pipeline mid-shift. Always set `out_of_bounds='clip'` for production isotonic.</>}
        stretch={<>What's the diagnostic that catches this before launch?</>}
      />

      {/* axis: E4 (rollout) */}
      <VIS.TrapProblem
        id="iso-e4"
        difficulty="hard"
        mode="ordered"
        title="E4 — Order the calibrator-rollout phases"
        scenario={<>Phases: (a) shadow log calibrated probabilities (don't serve), (b) mirror auction (both calibrators score; old serves; you compare bid impact), (c) small-traffic ramp, (d) full traffic + retire old calibrator. <em>Discriminating insight: mirror auction is where you measure bid-impact — skip it and Friday-3am pages happen.</em></>}
        options={[
          {key:"a", text:"Shadow log — verify the new calibrator runs at production load without affecting users.", order:1},
          {key:"b", text:"Mirror auction — fit and validate calibrated bids against realized outcomes.", order:2},
          {key:"c", text:"Small-traffic ramp.", order:3},
          {key:"d", text:"Full traffic + retire old calibrator.", order:4},
          {key:"e", text:"Skip shadow — go straight to ramp."},
          {key:"f", text:"Retire old calibrator first."},
        ]}
        trap={<>Many candidates skip mirror auction or fit during ramp. The mirror is where you have aligned (old_bid, new_bid, realized) tuples — that's the only place to safely validate bid impact.</>}
        lens={<>Calibrator rollouts mirror model rollouts but the alarm window is faster (revenue impact in hours, not days). Mirror auction is non-optional.</>}
        stretch={<>What's the rollback SLO at each ramp step?</>}
      />

      {/* axis: E5 (reproducibility) */}
      <VIS.TrapProblem
        id="iso-e5"
        difficulty="hard"
        title="E5 — Reproducing 'isotonic beats Platt by 4 percent Brier'"
        scenario={<>A 2024 industry blog claims isotonic gives 4 percent lower Brier than Platt on their CTR data. You can't reproduce. Which experimental property must match? <em>Discriminating insight: gap depends on (1) calibration-set size, (2) score-prob curve shape — both unique to their data, neither published.</em></>}
        multiSelect
        options={[
          {key:"a", text:"Their calibration set size — gap shrinks with N and may invert at small N.", correct:true},
          {key:"b", text:"Their underlying ranker's score-vs-prob curve shape (sigmoidal favors Platt; kinked favors isotonic).", correct:true},
          {key:"c", text:"Their Brier metric variant (binary vs multi-class).", correct:true},
          {key:"d", text:"Their GPU vendor."},
          {key:"e", text:"Their random seed."},
        ]}
        trap={<>(d) is irrelevant. (e) is a minor effect.</>}
        lens={<>Calibration benchmarks rarely transfer — the gap is dominated by data properties the blog probably didn't publish. Treat such numbers as upper bounds on your own.</>}
        stretch={<>Design a benchmark that DOES transfer between teams. What does it sample over?</>}
      />

      {/* axis: E6 (staleness monitor) */}
      <VIS.TrapProblem
        id="iso-e6"
        difficulty="hard"
        title="E6 — Monitoring Platt for staleness"
        scenario={<>Pick the monitor that detects calibrator staleness fastest. <em>Discriminating insight: marginal reliability diagrams are slow; raw-score-distribution KL-shift catches it before labels arrive.</em></>}
        options={[
          {key:"a", text:"Raw-score-distribution KL divergence between training and serving windows — catches upstream feature/ranker shifts the calibrator hasn't seen, hours before they manifest as miscalibration on labels.", correct:true},
          {key:"b", text:"Daily marginal Brier."},
          {key:"c", text:"Weekly reliability diagram."},
          {key:"d", text:"Click-through volume."},
        ]}
        trap={<>(b), (c) catch the problem only after labels arrive (lag of hours-to-days). (d) is a downstream symptom.</>}
        lens={<>The senior monitoring move is to catch the <em>cause</em> (input distribution shift) before the <em>effect</em> (label-mediated miscalibration). KL on raw scores is the canonical leading indicator.</>}
        stretch={<>What's the right KL threshold to alarm on? How do you calibrate it?</>}
      />

      <h3 style={{marginTop:32, color:"#1f3a5f"}}>F. Failure modes</h3>

      {/* axis: F1 (high-noise data) */}
      <VIS.TrapProblem
        id="iso-f1"
        difficulty="hard"
        title="F1 — Calibrating on noisy labels (autoplay clicks)"
        scenario={<>40 percent of your 'click' labels are autoplay accidents. You fit Platt nightly. What's the specific failure? <em>Discriminating insight: Platt fits the noisy joint, not the true conditional — calibrated outputs over-predict click rates by exactly the noise floor.</em></>}
        options={[
          {key:"a", text:"Platt minimizes log-loss against the observed label distribution, which includes the 40 percent noise. The fitted calibrator therefore systematically over-predicts P(real click) by the noise floor. Fix: de-noise labels upstream (action-vocab discrimination) or fit on a cleaner label proxy.", correct:true},
          {key:"b", text:"Platt is robust to label noise."},
          {key:"c", text:"Isotonic would have been fine."},
          {key:"d", text:"Noise washes out at scale."},
        ]}
        trap={<>(b) is false. (c) is identical-failure-different-method. (d) is wrong: bias from label noise is asymptotic, not vanishing.</>}
        lens={<>Calibrators inherit label-noise bias. The cure is upstream (de-noise the labels) or a noise-aware objective (e.g. fit on label-confidence-weighted examples).</>}
        stretch={<>How would you weight examples by label confidence in a Platt fit?</>}
      />

      {/* axis: F2 (adversarial) */}
      <VIS.TrapProblem
        id="iso-f2"
        difficulty="hard"
        title="F2 — Adversarial input that breaks isotonic specifically"
        scenario={<>Construct an attack that degrades isotonic more than Platt. <em>Discriminating insight: small-N tail injection — adding a few high-score positives to the calibration set forces PAV to pool the entire top decile.</em></>}
        options={[
          {key:"a", text:"Inject a small number of high-score positive examples into the calibration set. PAV's tail-pooling step collapses the entire top decile into one calibrated value, destroying the ranker's discrimination at the top. Platt is parametric and only shifts the sigmoid parameters slightly.", correct:true},
          {key:"b", text:"Random noise."},
          {key:"c", text:"Adversarial gradients."},
          {key:"d", text:"Empty calibration set."},
        ]}
        trap={<>(b), (c), (d) hurt every calibrator. The asymmetry on the tail is isotonic-specific.</>}
        lens={<>PAV's L2-optimal-monotonic property is its strength on clean data and its weakness on adversarial tails. Knowing this tells you to monitor pool sizes per decile, not just the marginal reliability.</>}
        stretch={<>What monitor would have caught this attack?</>}
      />

      {/* axis: F3 (paper-named failure) */}
      <VIS.TrapProblem
        id="iso-f3"
        difficulty="hard"
        title="F3 — Marginal-only failure flagged in calibration literature"
        scenario={<>Calibration papers (Naeini et al. 2015; recent industry blogs) name a specific failure mode of Platt/isotonic that fundamentally cannot be fixed post-hoc. Which? <em>Discriminating insight: conditional miscalibration (per-segment) — Platt/isotonic operate on the scalar score only, can't condition on segment features.</em></>}
        options={[
          {key:"a", text:"Per-segment miscalibration in the presence of marginal calibration — flagged repeatedly in the calibration literature. The fix requires moving from score-only post-hoc calibrators to covariate-aware ones (per-segment fit, conditional isotonic, calibrated probability trees).", correct:true},
          {key:"b", text:"Latency."},
          {key:"c", text:"Compute."},
          {key:"d", text:"Memory."},
        ]}
        trap={<>(b), (c), (d) are operational concerns, not the literature's named flaw.</>}
        lens={<>This is the single most-cited limitation. The fix requires giving the calibrator covariates, not more data on the same scalar.</>}
        stretch={<>What's the simplest covariate-aware extension that doesn't blow up the calibration sample size?</>}
      />

      {/* axis: F4 (multi-objective failure) */}
      <VIS.TrapProblem
        id="iso-f4"
        difficulty="hard"
        title="F4 — Calibrating a multi-objective ranker"
        scenario={<>Ranker outputs three scores (P(click), P(watch &gt; 30s), P(share)). Fit a separate Platt per objective. Recombine via weighted sum. What breaks? <em>Discriminating insight: per-head Platts are not jointly calibrated — sum-of-calibrated is not calibrated-sum.</em></>}
        options={[
          {key:"a", text:"Each Platt is marginally calibrated for its own head; the weighted sum is NOT calibrated for any joint quantity. The auction (which consumes the sum) sees a miscalibrated bid. Fix: fit a joint calibrator on the recombined score, or use a multi-head proper-scoring loss.", correct:true},
          {key:"b", text:"Weighted sums are always calibrated."},
          {key:"c", text:"Only the click head matters."},
          {key:"d", text:"Latency triples."},
        ]}
        trap={<>(b) is the textbook reflex. (c) is wrong. (d) is irrelevant to calibration.</>}
        lens={<>This is the multi-objective gotcha: composing calibrated heads is not calibration-preserving. Fit downstream of the combiner, not upstream.</>}
        stretch={<>Sketch the right architecture: where should the calibrator sit?</>}
      />

      {/* axis: F5 (community-found) */}
      <VIS.TrapProblem
        id="iso-f5"
        difficulty="hard"
        title="F5 — Why the conformal-prediction wave threatens Platt"
        scenario={<>Why is industry shifting attention from Platt/isotonic to conformal prediction in 2024-2025? <em>Discriminating insight: Platt gives pointwise probabilities without coverage guarantees; conformal gives finite-sample distribution-free coverage — what auctions and risk-aware allocators want.</em></>}
        options={[
          {key:"a", text:"Platt/isotonic give a point probability with no uncertainty bound; conformal gives a finite-sample, distribution-free coverage guarantee on a prediction set. Downstream risk-aware decisions (auction, budget pacing, regulatory) need the interval, not the point.", correct:true},
          {key:"b", text:"Conformal is faster."},
          {key:"c", text:"Platt is being deprecated by scikit-learn."},
          {key:"d", text:"Conformal works on smaller data."},
        ]}
        trap={<>(b), (c), (d) are non-answers. The coverage guarantee is the real driver.</>}
        lens={<>Conformal isn't replacing Platt; it's complementing it. The industry is realizing that auctions and pacers want intervals, not points. Senior MLEs know which downstream consumer needs which.</>}
        stretch={<>For which downstream consumers is conformal worth the cost? For which is Platt enough?</>}
      />

      {/* axis: F6 (debugging) */}
      <VIS.TrapProblem
        id="iso-f6"
        difficulty="hard"
        title="F6 — Reliability diagram looks perfect; clicks still mis-priced"
        scenario={<>Your aggregate reliability diagram is dead flat. Auction logic is still over-bidding by 8 percent on certain queries. Diagnose. <em>Discriminating insight: aggregate reliability hides query-level heterogeneity; the diagram is the wrong tool for segment-level calibration.</em></>}
        options={[
          {key:"a", text:"Aggregate reliability is the marginal — it cannot detect per-query miscalibration. Plot reliability diagrams stratified by query type / segment to find the leak.", correct:true},
          {key:"b", text:"Reliability diagrams are unreliable."},
          {key:"c", text:"Switch to Brier."},
          {key:"d", text:"Refit Platt."},
        ]}
        trap={<>(b), (c), (d) are non-diagnostics.</>}
        lens={<>The marginal-vs-conditional distinction shows up here as "the standard dashboard hides the failure." Stratified reliability is the standard production add-on.</>}
        stretch={<>How many segments is enough? At what point does stratification become noise?</>}
      />

      {/* axis: F7 (silent regression) */}
      <VIS.TrapProblem
        id="iso-f7"
        difficulty="hard"
        title="F7 — Isotonic refit at midnight, regression at noon"
        scenario={<>Isotonic refits at midnight. By noon, predicted CTR overshoots realized on the morning cohort. <em>Discriminating insight: the midnight calibration set is over-represented by evening-cohort traffic; morning users have a different score distribution.</em></>}
        options={[
          {key:"a", text:"The calibration set sampled from the previous evening over-represents one diurnal cohort. Morning traffic has a different score distribution; the fitted isotonic over-shoots. Fix: stratified-by-hour sampling, or hourly micro-refits.", correct:true},
          {key:"b", text:"Isotonic always degrades by noon."},
          {key:"c", text:"GPU thermal."},
          {key:"d", text:"More data."},
        ]}
        trap={<>(b), (c), (d) are non-explanations.</>}
        lens={<>Diurnal sampling bias in the calibration set is the most common, least-discussed isotonic failure mode in production. Cure is stratified sampling, not more data.</>}
        stretch={<>What sample size per hour stratum is enough? How do you decide?</>}
      />

      {/* axis: F8 (distillation interplay) */}
      <VIS.TrapProblem
        id="iso-f8"
        difficulty="hard"
        title="F8 — Distillation undoes Platt"
        scenario={<>You distill the teacher (Platt-calibrated) into a student. Student's reliability diagram is now miscalibrated. Why? <em>Discriminating insight: distillation softens output distributions — student's logits are not on the same scale as teacher's, so teacher's Platt parameters don't transfer.</em></>}
        options={[
          {key:"a", text:"Distillation with temperature softens probabilities so the student's output is on a different logit scale than the teacher's. The Platt parameters (a, b) were fit on teacher logits; they're wrong for student logits. The student needs its own Platt refit on fresh held-out data.", correct:true},
          {key:"b", text:"Student is always miscalibrated."},
          {key:"c", text:"Temperature scaling fixes it automatically."},
          {key:"d", text:"Distillation preserves calibration."},
        ]}
        trap={<>(d) is the seductive textbook reflex; it's false.</>}
        lens={<>This is the bridge to the post-distillation-calibration concept. Senior MLEs know that any compression/distillation step requires a fresh calibrator fit.</>}
        stretch={<>What's the smallest held-out set size that lets you safely refit Platt on the student?</>}
      />

    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li>
          <a href="https://eugeneyan.com/writing/system-design-for-discovery/" target="_blank" rel="noopener"><strong>Eugene Yan — System design for discovery</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(blog, 2024)</span>
          <br/>Practical engineering lens on where Platt / isotonic sit in a production recsys stack.
        </li>
        <li>
          <a href="https://arxiv.org/abs/1706.04599" target="_blank" rel="noopener"><strong>Guo et al. — On Calibration of Modern Neural Networks</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(ICML 2017)</span>
          <br/>Foundational treatment of temperature scaling vs Platt; reliability diagrams; ECE.
        </li>
        <li>
          <a href="https://arxiv.org/abs/2107.07511" target="_blank" rel="noopener"><strong>Angelopoulos and Bates — Gentle Introduction to Conformal Prediction</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(arXiv 2021)</span>
          <br/>The next-step alternative to Platt/isotonic for downstream consumers that need coverage, not point estimates.
        </li>
      </ul>
    </VIS.Section>
  </main>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
  <script>
    window.addEventListener("error", function (e) {
      const pre = document.createElement("pre");
      pre.style.cssText = "position:fixed;top:0;left:0;right:0;max-height:35vh;"
        + "overflow:auto;background:#fee2e2;color:#7f1d1d;padding:8px;"
        + "margin:0;font:12px/1.4 monospace;z-index:10002;";
      pre.textContent = "[visualize] " + (e.error?.stack || e.message || e);
      document.body.appendChild(pre);
    }, true);
  </script>
</body>
