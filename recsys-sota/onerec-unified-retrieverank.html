        options={[
          {key:"a", text:"Reward-model overfitting — the reward model learned spurious correlations in historical watch-time data; offline preference-AUC measures fit to the reward model, not actual online watch-time. DPO over an overfitting reward model produces offline gains that don't transfer.", correct:true},
          {key:"b", text:"Latency."},
          {key:"c", text:"Random."},
          {key:"d", text:"Calibration drift."},
        ]}
        trap={<>(b), (c), (d) miss the reward-model overfitting story.</>}
        lens={<>The offline/online gap in OneRec is driven by reward-model quality. Fix: hold-out reward-model eval, regularize reward model, periodic reward-model refresh on fresh data.</>}
        stretch={<>How would you detect reward-model overfitting?</>}
      />

      {/* F4 */}
      <VIS.TrapProblem
        id="onerec-f4"
        difficulty="hard"
        title="F4 — Paper-named failure mode: list decode latency"
        scenario={<>OneRec V1 had a specific failure mode that motivated V2's Lazy Decoder-Only. What was it?</>}
        options={[
          {key:"a", text:"List decode latency at production scale was prohibitive (full encoder-decoder cross-attention at every step). V2's Lazy Decoder-Only addresses this with on-demand cross-attention.", correct:true},
          {key:"b", text:"Memory."},
          {key:"c", text:"Training instability."},
          {key:"d", text:"Cold-start."},
        ]}
        trap={<>(b), (c), (d) aren't paper-flagged.</>}
        lens={<>The architectural progression V1 → V2 is driven by latency, not quality. Quality was fine; cost wasn't.</>}
        stretch={<>What other architecture innovations achieve similar compute cuts?</>}
      />

      {/* F5 */}
      <VIS.TrapProblem
        id="onerec-f5"
        difficulty="hard"
        title="F5 — Community-found: reward-model bias amplification"
        scenario={<>Multiple 2025 papers (notably on debiased RLHF and recsys preference learning) flag a specific OneRec-relevant failure pattern. What is it?</>}
        options={[
          {key:"a", text:"DPO over a reward model trained on biased data amplifies the bias in the policy. Specifically: if popular items are over-impressed in training data, the reward model values popularity; DPO then concentrates more on popular items; future training data is even more popularity-biased.", correct:true},
          {key:"b", text:"DPO doesn't converge."},
          {key:"c", text:"DPO causes GPU memory issues."},
          {key:"d", text:"DPO requires labeled data."},
        ]}
        trap={<>(b), (c), (d) misread.</>}
        lens={<>The bias-amplification feedback loop is the most-cited OneRec critique. Mitigations: IPS-debiased reward, regularization toward uniform prior, periodic intervention sampling.</>}
        stretch={<>What's the steady-state bias under unbounded DPO iterations?</>}
      />

      {/* F1b */}
      <VIS.TrapProblem
        id="onerec-f1b"
        difficulty="hard"
        title="F1b — Sparse positive feedback"
        scenario={<>A long-tail surface where most items get 0 watch-time. Does OneRec's DPO work?</>}
        options={[
          {key:"a", text:"DPO requires pair preferences (item A preferred to item B). On a surface where most items get 0 watch-time, almost every pair has the same reward (0 = 0), giving DPO no signal. Either use sparse positives only (compare each positive to a few uniformly-sampled negatives) or fall back to supervised CE.", correct:true},
          {key:"b", text:"DPO works fine."},
          {key:"c", text:"Need bigger model."},
          {key:"d", text:"Need more iterations."},
        ]}
        trap={<>(b), (c), (d) misread.</>}
        lens={<>DPO degrades gracefully on dense feedback (Kuaishou main feed). It fails silently on sparse feedback (long-tail surfaces).</>}
        stretch={<>What's the minimum positive-rate for DPO to work?</>}
      />

      {/* F3b */}
      <VIS.TrapProblem
        id="onerec-f3b"
        difficulty="hard"
        title="F3b — Lists are too homogeneous"
        scenario={<>OneRec's generated lists are all similar (low diversity within the list). Which OneRec-specific knob fixes this?</>}
        options={[
          {key:"a", text:"List decode temperature / nucleus sampling — autoregressive list decode tends to repeat patterns; raising sampling temperature or using nucleus sampling at decode time diversifies the list without retraining.", correct:true},
          {key:"b", text:"Retrain from scratch."},
          {key:"c", text:"Add MMR re-ranker."},
          {key:"d", text:"More iterations of DPO."},
        ]}
        trap={<>(c) can work but is the cascade move; (d) typically reduces diversity further.</>}
        lens={<>OneRec's list-wise output is sensitive to decode-time sampling. Tune sampling before architectural changes.</>}
        stretch={<>How would you trade off list-diversity vs predicted watch-time?</>}
      />

      {/* D2b */}
      <VIS.TrapProblem
        id="onerec-d2b"
        difficulty="hard"
        title="D2b — 'OneRec is just RLHF for recsys' cascade"
        scenario={<>This framing hides what OneRec-specific failure modes?</>}
        multiSelect
        options={[
          {key:"a", text:"Watch-time-driven reward is implicit; doesn't isolate quality from engagement-bait → DPO can amplify clickbait.", correct:true},
          {key:"b", text:"List-wise output: standard RLHF is single-output; list interactions (diversity, order) need separate handling.", correct:true},
          {key:"c", text:"Production scale: implicit-feedback DPO at billions of pairs has different stability than LLM-RLHF at 10K human pairs.", correct:true},
          {key:"d", text:"Same model architecture as ChatGPT."},
        ]}
        trap={<>(d) is irrelevant to the failure modes.</>}
        lens={<>The "RLHF for recsys" framing under-counts the implicit-feedback, list-wise, and production-scale specifics that make OneRec hard.</>}
        stretch={<>Which of these failure modes was hardest for the OneRec team?</>}
      />

      {/* A4b */}
      <VIS.TrapProblem
        id="onerec-a4b"
        difficulty="hard"
        title="A4b — OneRec + Semantic IDs from RQ-VAE"
        scenario={<>OneRec uses Semantic IDs as its output vocabulary. Where do they come from?</>}
        options={[
          {key:"a", text:"From an RQ-VAE trained on item content (TIGER's recipe). OneRec inherits TIGER's content tokenization but adds list-wise generation + DPO on top.", correct:true},
          {key:"b", text:"From random hashing."},
          {key:"c", text:"From manual category labels."},
          {key:"d", text:"From a separate Bert."},
        ]}
        trap={<>(b), (c), (d) misread.</>}
        lens={<>OneRec composes TIGER's content tokenization with its own list-wise generation + DPO. The Semantic-ID layer is shared.</>}
        stretch={<>What if you swap Semantic IDs for random IDs in OneRec? What breaks?</>}
      />

      {/* E1b */}
      <VIS.TrapProblem
        id="onerec-e1b"
        difficulty="hard"
        title="E1b — User-vector cache staleness"
        scenario={<>You cache user vectors hourly for OneRec serving. What's the staleness impact?</>}
        options={[
          {key:"a", text:"Items the user interacted with in the last hour don't appear in the user vector; OneRec recommends as if those interactions didn't happen — including recommending items the user just consumed. Mitigation: append fresh interactions to the cached vector at decode time.", correct:true},
          {key:"b", text:"No impact."},
          {key:"c", text:"User vectors are deterministic."},
          {key:"d", text:"Latency goes up."},
        ]}
        trap={<>(b), (c), (d) misread.</>}
        lens={<>Cache freshness vs serving latency is a classic OneRec tradeoff. The mitigation (append-fresh) recovers most of the gap cheaply.</>}
        stretch={<>What's the right cache refresh cadence?</>}
      />

      {/* C2b */}
      <VIS.TrapProblem
        id="onerec-c2b"
        difficulty="hard"
        title="C2b — DPO's KL constraint"
        scenario={<>DPO contains an implicit KL constraint between the trained policy and the SFT prior. What happens if you make the KL constraint weight too small?</>}
        options={[
          {key:"a", text:"Policy diverges arbitrarily from the SFT prior to chase reward → reward hacking (high reward, degenerate outputs); recommendations look weird; offline preference-AUC looks great but online watch-time crashes.", correct:true},
          {key:"b", text:"Faster training."},
          {key:"c", text:"No impact."},
          {key:"d", text:"More accurate."},
        ]}
        trap={<>(b), (c), (d) misread.</>}
        lens={<>The KL constraint is the safety belt. Reward hacking is the canonical sign of constraint too loose.</>}
        stretch={<>How would you tune the KL weight?</>}
      />

      {/* D4b */}
      <VIS.TrapProblem
        id="onerec-d4b"
        difficulty="hard"
        title="D4b — Watch-time goes up 1.6% but novelty drops"
        scenario={<>OneRec ships. Watch-time up 1.6%. But novelty metrics (unique items shown / user / day) drop 20%. Diagnose.</>}
        options={[
          {key:"a", text:"DPO over watch-time concentrates the policy on a smaller set of high-watch-time items (filter bubble). Watch-time wins per item but variety drops. The fix is either a multi-objective reward (watch-time + novelty) or a downstream diversification reranker.", correct:true},
          {key:"b", text:"Random."},
          {key:"c", text:"GPU issue."},
          {key:"d", text:"Bug."},
        ]}
        trap={<>(b), (c), (d) miss the filter-bubble logic.</>}
        lens={<>OneRec optimizes whatever the reward says. Reward = watch-time alone → narrow recommendations. Multi-objective reward is the production move.</>}
        stretch={<>What weights would you give watch-time vs novelty?</>}
      />

      {/* F4b */}
      <VIS.TrapProblem
        id="onerec-f4b"
        difficulty="medium"
        title="F4b — V2 Lazy Decoder-Only specifics"
        scenario={<>Lazy Decoder-Only cuts compute 94% from V1. What does it sacrifice?</>}
        options={[
          {key:"a", text:"Some cross-attention expressiveness — Lazy means cross-attention runs only at some layers/steps, not all. For very long user histories with strong recent-history dependence, quality may drop slightly vs full cross-attention; V2 paper claims the trade is favorable in practice.", correct:true},
          {key:"b", text:"Nothing."},
          {key:"c", text:"Latency."},
          {key:"d", text:"Memory."},
        ]}
        trap={<>(b) is the marketing reading. (c), (d) are improved, not sacrificed.</>}
        lens={<>Lazy attention is an approximation. The paper validates the trade empirically, but for surfaces where the assumption breaks, a hybrid (lazy + full attention at key layers) is the move.</>}
        stretch={<>Which layer would you mark as 'always full attention'?</>}
      />

      {/* C5b */}
      <VIS.TrapProblem
        id="onerec-c5b"
        difficulty="hard"
        title="C5b — Multi-task heads in OneRec"
        scenario={<>You want OneRec to predict both watch-time AND completion-rate. How?</>}
        options={[
          {key:"a", text:"Multi-objective reward model: train two reward heads (watch-time, completion-rate), combine via weighted sum or Pareto frontier; DPO then optimizes the combined objective. The OneRec backbone is unchanged.", correct:true},
          {key:"b", text:"Train two OneRecs."},
          {key:"c", text:"Pick one objective."},
          {key:"d", text:"Use cascade."},
        ]}
        trap={<>(b), (c), (d) misread.</>}
        lens={<>OneRec's flexibility comes from the reward-model layer. Adding objectives = adding reward heads, not retraining the backbone.</>}
        stretch={<>How would you tune the weighting?</>}
      />

      {/* A5b */}
      <VIS.TrapProblem
        id="onerec-a5b"
        difficulty="hard"
        title="A5b — Sub-second freshness requirements"
        scenario={<>You're recommending news on a breaking-news surface. Items go stale within minutes. Does OneRec work?</>}
        options={[
          {key:"a", text:"Poorly — OneRec relies on a reward model fit on historical watch-time; breaking news has no history. The cached user vectors also lag the actual breaking-news interest. Cascade with content-fresh retrieval + light scoring is more appropriate.", correct:true},
          {key:"b", text:"Works fine."},
          {key:"c", text:"Just retrain hourly."},
          {key:"d", text:"OneRec is faster."},
        ]}
        trap={<>(b), (c) underestimate the freshness lag. (d) is irrelevant.</>}
        lens={<>OneRec is a long-cycle architecture (train on historical, deploy daily). Sub-second freshness mismatches the training cadence.</>}
        stretch={<>Could you train a 'breaking-news-only' OneRec on hourly data?</>}
      />

      {/* E5b */}
      <VIS.TrapProblem
        id="onerec-e5b"
        difficulty="hard"
        title="E5b — Comparing OneRec to your team's cascade"
        scenario={<>Your team's cascade is different from Kuaishou's. How do you estimate OneRec's expected gain for your surface?</>}
        options={[
          {key:"a", text:"Run an offline simulation: predict watch-time with OneRec-style list decode vs current cascade's predicted list. Compare on a held-out historical week. The headline gain depends on your cascade's per-stage efficiency.", correct:true},
          {key:"b", text:"Trust the paper's 1.6% gain."},
          {key:"c", text:"Just A/B test."},
          {key:"d", text:"Use the 10.6% cost as the only metric."},
        ]}
        trap={<>(b), (d) over-trust the paper. (c) is expensive to do for an unknown gain.</>}
        lens={<>Paper gains are platform-specific. Offline simulation is the right way to estimate.</>}
        stretch={<>What's the cheap-and-imperfect proxy if simulation is too expensive?</>}
      />

      {/* D1c */}
      <VIS.TrapProblem
        id="onerec-d1c"
        difficulty="medium"
        title="D1c — 'OneRec is the future, cascade is dead'"
        scenario={<>A blog declares the cascade dead post-OneRec. Defeat the claim with a single counter.</>}
        options={[
          {key:"a", text:"Cascade still wins on multi-team surfaces (different teams own different stages, with different optimization objectives), regulatory surfaces (each stage has different audit requirements), and ads surfaces (each stage has different calibration requirements).", correct:true},
          {key:"b", text:"OneRec is just hype."},
          {key:"c", text:"Cascade is faster."},
          {key:"d", text:"They're identical."},
        ]}
        trap={<>(b), (c), (d) are over-generalizations.</>}
        lens={<>OneRec is the right architecture for certain surfaces. Cascade survives where its modularity has real value.</>}
        stretch={<>Will hybrids (OneRec inside cascade) be the steady state?</>}
      />

      {/* E3b */}
      <VIS.TrapProblem
        id="onerec-e3b"
        difficulty="hard"
        title="E3b — Reward model staleness"
        scenario={<>Your reward model was trained 30 days ago. Watch-time distribution has shifted. What's the OneRec-specific consequence?</>}
        options={[
          {key:"a", text:"DPO is optimizing against an outdated reward landscape; gains evaporate; offline preference-AUC may even climb (relative to old reward) while online watch-time drops. Refresh reward model on rolling-30-day data.", correct:true},
          {key:"b", text:"No impact."},
          {key:"c", text:"Random."},
          {key:"d", text:"Need more DPO."},
        ]}
        trap={<>(d) makes things worse.</>}
        lens={<>Reward model staleness is OneRec's silent killer. Refresh cadence policy is a critical part of the production runbook.</>}
        stretch={<>What's the right reward-model refresh cadence?</>}
      />

      {/* C3b */}
      <VIS.TrapProblem
        id="onerec-c3b"
        difficulty="hard"
        title="C3b — OneRec's training signal vs HSTU's"
        scenario={<>Both train on user interactions. What's the actual difference in training signal?</>}
        options={[
          {key:"a", text:"HSTU: next-action cross-entropy over the action vocabulary (predict what the user does next). OneRec: list-wise CE + iterative DPO with watch-time as reward (predict what list maximizes watch-time). HSTU's signal is per-event; OneRec's is per-list-outcome.", correct:true},
          {key:"b", text:"Identical."},
          {key:"c", text:"OneRec uses BCE."},
          {key:"d", text:"HSTU uses watch-time."},
        ]}
        trap={<>(b), (c), (d) misread.</>}
        lens={<>The training-signal difference is the OneRec discriminator. List-wise + outcome-aligned vs token-wise + next-token.</>}
        stretch={<>Could you train HSTU with watch-time DPO?</>}
      />

    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://arxiv.org/abs/2502.18965" target="_blank" rel="noopener"><strong>Cai et al. — OneRec paper (Kuaishou 2025)</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper)</span><br/>The original. Focus on sections on DPO + watch-time signal + deployment results.</li>
        <li><a href="https://arxiv.org/abs/2305.18290" target="_blank" rel="noopener"><strong>Rafailov et al. — DPO original</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper, NeurIPS 2023)</span><br/>Direct Preference Optimization foundations. Read before OneRec.</li>
        <li><a href="https://arxiv.org/abs/2305.05065" target="_blank" rel="noopener"><strong>Rajput et al. — TIGER (NeurIPS 2023)</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper)</span><br/>OneRec uses TIGER's Semantic-ID tokenization.</li>
        <li><a href="https://arxiv.org/abs/2402.17152" target="_blank" rel="noopener"><strong>Zhai et al. — HSTU (ICML 2024)</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper)</span><br/>Sibling architecture for ranking. OneRec absorbs the ranking step.</li>
        <li><a href="https://eugeneyan.com/writing/recsys-llm/" target="_blank" rel="noopener"><strong>Eugene Yan — Generative recsys landscape</strong></a> <span style={{color:"#64748b", fontSize:14}}>(blog)</span><br/>OneRec in the broader pipeline-collapse taxonomy.</li>
      </ul>
    </VIS.Section>
  </main>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
  <script>
    window.addEventListener("error", function (e) {
      const pre = document.createElement("pre");
      pre.style.cssText = "position:fixed;top:0;left:0;right:0;max-height:35vh;"
        + "overflow:auto;background:#fee2e2;color:#7f1d1d;padding:8px;"
        + "margin:0;font:12px/1.4 monospace;z-index:10002;";
      pre.textContent = "[visualize] " + (e.error?.stack || e.message || e);
      document.body.appendChild(pre);
    }, true);
  </script>
