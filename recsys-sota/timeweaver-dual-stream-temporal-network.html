<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>visualize</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <style>
    body { font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
           margin: 0; background: #ffffff; color: #0f172a; }
  </style>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@lottiefiles/lottie-player@2.0.8/dist/lottie-player.js" async></script>
  <script>
// vis-components.js — design-system JSX components for the /visualize skill.
// Exposed as window.VIS.{Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle}.
// window.RV is aliased to window.VIS for report-viewer back-compat.
// Available globally to any visual.jsx without imports.
// (CSS class prefix kept as "rv-" — internal namespace; preserves report-viewer interop.)

(function () {
  "use strict";

  if (!window.React) {
    console.warn("[vis-components] React not loaded yet; skipping setup");
    return;
  }
  const h = React.createElement;

  // Lazy-load a CDN script; cache the load Promise so repeats are cheap.
  const _scriptCache = new Map();
  function _loadScript(src) {
    if (_scriptCache.has(src)) return _scriptCache.get(src);
    const p = new Promise((resolve, reject) => {
      const existing = document.querySelector(`script[data-vis-cdn="${src}"]`);
      if (existing) return existing.addEventListener("load", resolve);
      const s = document.createElement("script");
      s.src = src; s.async = false; s.dataset.visCdn = src;
      s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
    _scriptCache.set(src, p);
    return p;
  }

  let _katexCssInjected = false;
  function _ensureKatexCss() {
    if (_katexCssInjected) return;
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = "https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css";
    document.head.appendChild(link);
    _katexCssInjected = true;
  }

  let _hljsCssInjected = false;
  function _ensureHljsCss() {
    if (_hljsCssInjected) return;
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = "https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css";
    document.head.appendChild(link);
    _hljsCssInjected = true;
  }

  // ----- Styles, injected once ----- //
  (function injectStyles() {
    if (document.getElementById("rv-components-styles")) return;
    const css = `
      .rv-hero {
        background: radial-gradient(120% 90% at 20% 0%, #dbeafe 0%, #ffffff 60%);
        padding: 28px 28px 22px; border-radius: 16px; margin-bottom: 20px;
        border: 1px solid #e2e8f0;
      }
      .rv-hero h1 {
        font-size: 38px; line-height: 1.1; letter-spacing: -0.02em;
        font-weight: 700; margin: 10px 0 6px; color: #0f172a;
      }
      .rv-hero .rv-sub {
        font-size: 16px; color: #475569; margin: 0; max-width: 60ch;
      }
      .rv-hero .rv-byline {
        font-size: 12px; color: #64748b; margin-top: 14px;
        display: flex; gap: 14px; flex-wrap: wrap;
      }
      .rv-hero .rv-byline span strong { color: #1e293b; font-weight: 600; }

      .rv-pill {
        display: inline-block; padding: 2px 10px; border-radius: 999px;
        background: #2563eb; color: #fff; font-size: 11px; font-weight: 600;
        letter-spacing: 0.6px; text-transform: uppercase;
      }

      .rv-tag {
        display: inline-block; padding: 1px 8px; border-radius: 999px;
        font-size: 11px; font-weight: 600; vertical-align: middle;
      }
      .rv-tag-green  { background: #dcfce7; color: #166534; }
      .rv-tag-yellow { background: #fef9c3; color: #854d0e; }
      .rv-tag-red    { background: #fee2e2; color: #991b1b; }
      .rv-tag-blue   { background: #dbeafe; color: #1e40af; }
      .rv-tag-gray   { background: #e4e4e7; color: #3f3f46; }

      .rv-card {
        border: 1px solid #e4e4e7; border-radius: 10px;
        padding: 14px 16px; margin: 12px 0;
        background: linear-gradient(180deg, #fafafa, #fff);
      }

      .rv-tldr {
        background: #f1f5f9;
        border-left: 4px solid #2563eb;
        border-radius: 0 10px 10px 0;
        padding: 14px 18px; margin: 0 0 24px;
        font-size: 15px; line-height: 1.55; color: #0f172a;
      }
      .rv-tldr .rv-tldr-label {
        display: inline-block; margin-right: 8px;
        font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
        color: #2563eb; text-transform: uppercase;
        vertical-align: 1px;
      }
      .vis-callout {
        border-left: 4px solid; border-radius: 0 8px 8px 0;
        padding: 12px 16px; margin: 14px 0;
      }
      .vis-callout-title { display: block; margin-bottom: 4px; }
      .vis-callout-info   { background: #dbeafe; border-color: #2563eb; color: #1e3a8a; }
      .vis-callout-warn   { background: #fef3c7; border-color: #d97706; color: #78350f; }
      .vis-callout-gotcha { background: #fee2e2; border-color: #dc2626; color: #7f1d1d; }
      .vis-callout-ok     { background: #dcfce7; border-color: #16a34a; color: #14532d; }

      .vis-term {
        text-decoration: underline dotted;
        text-decoration-color: #94a3b8;
        text-underline-offset: 3px;
        cursor: help;
      }
      .vis-term:focus { outline: 2px solid #2563eb; outline-offset: 2px; }
      .vis-term-tip {
        position: fixed; z-index: 10001; max-width: 340px;
        background: #0f172a; color: #f8fafc; font-size: 13px; line-height: 1.45;
        padding: 8px 10px; border-radius: 6px;
        box-shadow: 0 4px 14px rgba(0,0,0,0.22);
        pointer-events: none; white-space: pre-wrap;
      }

      /* Trap problem (MCQ with click-to-reveal). One block per problem. */
      .vis-trap {
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 20px 22px;
        margin: 24px 0;
        background: #fafbfc;
      }
      .vis-trap-header {
        display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
        flex-wrap: wrap;
      }
      .vis-trap-difficulty {
        font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
        padding: 3px 10px; border-radius: 999px; text-transform: uppercase;
      }
      .vis-trap-diff-easy   { background: #dcfce7; color: #166534; }
      .vis-trap-diff-medium { background: #fef9c3; color: #854d0e; }
      .vis-trap-diff-hard   { background: #fee2e2; color: #991b1b; }
      .vis-trap-title { font-size: 17px; color: #0f172a; }
      .vis-trap-multi-badge {
        font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
        padding: 2px 8px; border-radius: 999px;
        background: #e0e7ff; color: #3730a3;
        text-transform: uppercase;
      }
      .vis-trap-scenario { margin: 0 0 12px; line-height: 1.65; }
      .vis-trap-diagram  { margin: 12px 0; }
      .vis-trap-options  { display: flex; flex-direction: column; gap: 8px; margin: 16px 0; }
      .vis-trap-option {
        text-align: left;
        padding: 11px 14px;
        background: #ffffff;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font: inherit; color: #0f172a;
        cursor: pointer;
        transition: border-color 0.15s, background 0.15s;
      }
      .vis-trap-option:hover:not(:disabled) {
        border-color: #2563eb; background: #f1f5f9;
      }
      .vis-trap-option.is-selected {
        border-color: #2563eb; background: #dbeafe;
      }
      .vis-trap-option.is-correct {
        border-color: #16a34a; background: #dcfce7;
      }
      .vis-trap-option.is-wrong-selected {
        border-color: #dc2626; background: #fee2e2;
      }
      .vis-trap-option.is-correct-wrong-pos {
        border-color: #d97706; background: #fef3c7;
      }
      .vis-trap-option.is-disabled {
        opacity: 0.6;
      }
      .vis-trap-key { font-weight: 700; margin-right: 4px; color: #475569; }
      .vis-trap-tick { color: #16a34a; font-weight: 700; margin-left: 6px; }
      .vis-trap-x    { color: #dc2626; font-weight: 700; margin-left: 6px; }
      .vis-trap-actions {
        display: flex; align-items: center; gap: 12px;
        margin-top: 8px;
      }
      .vis-trap-reveal-btn, .vis-trap-reset-btn {
        background: #2563eb; color: #ffffff; border: none;
        padding: 10px 18px; border-radius: 8px;
        font: inherit; font-weight: 600;
        cursor: pointer;
      }
      .vis-trap-reveal-btn:hover, .vis-trap-reset-btn:hover { background: #1d4ed8; }
      .vis-trap-reset-btn {
        background: #64748b; margin-top: 12px;
        font-size: 13px; padding: 8px 14px;
      }
      .vis-trap-reset-btn:hover { background: #475569; }
      .vis-trap-hint { color: #64748b; font-size: 14px; }
      .vis-trap-reveal-block {
        margin-top: 18px; padding-top: 16px; border-top: 1px solid #e2e8f0;
      }
      .vis-trap-trap, .vis-trap-lens, .vis-trap-stretch {
        margin: 10px 0; padding: 12px 16px; border-radius: 8px;
      }
      .vis-trap-trap    { background: #fef3c7; border-left: 4px solid #d97706; color: #78350f; }
      .vis-trap-lens    { background: #dcfce7; border-left: 4px solid #16a34a; color: #14532d; }
      .vis-trap-stretch { background: #e0e7ff; border-left: 4px solid #6366f1; color: #312e81; }
      .vis-trap-trap strong, .vis-trap-lens strong, .vis-trap-stretch strong {
        display: block; margin-bottom: 4px;
      }
      .vis-trap-trap p, .vis-trap-lens p, .vis-trap-stretch p { margin: 0; line-height: 1.55; }

      /* System Design — pick-and-connect block diagram */
      .vis-sd {
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 20px 22px;
        margin: 24px 0;
        background: #fafbfc;
      }
      .vis-sd-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
      .vis-sd-mode-badge {
        font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
        padding: 2px 8px; border-radius: 999px;
        background: #fef3c7; color: #78350f; text-transform: uppercase;
      }
      .vis-sd-scenario { margin: 0 0 14px; line-height: 1.65; }
      .vis-sd-label { font-size: 13px; font-weight: 600; color: #475569; margin: 14px 0 6px; }
      .vis-sd-palette { display: flex; flex-wrap: wrap; gap: 8px; padding: 10px;
                        background: #ffffff; border: 1px dashed #cbd5e1; border-radius: 8px; }
      .vis-sd-piece {
        padding: 8px 12px;
        background: #ffffff; border: 1px solid #cbd5e1; border-radius: 8px;
        font: inherit; font-size: 13px; cursor: pointer;
        transition: border-color 0.15s, background 0.15s;
        white-space: nowrap;
      }
      .vis-sd-piece:hover:not(:disabled) { border-color: #2563eb; background: #f1f5f9; }
      .vis-sd-piece.is-placed { opacity: 0.4; cursor: default; }
      .vis-sd-piece.cat-data    { border-left: 4px solid #0ea5e9; }
      .vis-sd-piece.cat-model   { border-left: 4px solid #8b5cf6; }
      .vis-sd-piece.cat-infra   { border-left: 4px solid #f59e0b; }
      .vis-sd-piece.cat-monitor { border-left: 4px solid #10b981; }

      .vis-sd-canvas {
        display: flex; flex-wrap: wrap; gap: 10px;
        min-height: 80px;
        padding: 14px;
        background: #ffffff; border: 1px solid #cbd5e1; border-radius: 8px;
      }
      .vis-sd-canvas-empty { color: #94a3b8; font-style: italic; font-size: 14px; }
      .vis-sd-placed {
        padding: 9px 13px;
        background: #ffffff; border: 1.5px solid #2563eb; border-radius: 8px;
        font: inherit; font-size: 13px; font-weight: 500; cursor: pointer;
        position: relative;
        transition: all 0.15s;
      }
      .vis-sd-placed:hover { background: #eff6ff; }
      .vis-sd-placed.is-connect-source {
        background: #dbeafe; border-color: #1d4ed8; border-width: 2.5px;
        box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
      }
      .vis-sd-placed.is-correct  { background: #dcfce7; border-color: #16a34a; }
      .vis-sd-placed.is-wrong    { background: #fee2e2; border-color: #dc2626; }
      .vis-sd-remove {
        margin-left: 8px; color: #94a3b8; font-weight: 700;
        cursor: pointer; padding: 0 4px;
      }
      .vis-sd-remove:hover { color: #dc2626; }

      .vis-sd-actions { display: flex; align-items: center; gap: 12px; margin: 12px 0 8px; }
      .vis-sd-connect-btn {
        background: #2563eb; color: #ffffff; border: none;
        padding: 8px 14px; border-radius: 6px;
        font: inherit; font-weight: 600; font-size: 13px; cursor: pointer;
      }
      .vis-sd-connect-btn:hover { background: #1d4ed8; }
      .vis-sd-connect-status { color: #475569; font-size: 14px; font-style: italic; }
      .vis-sd-connect-cancel {
        background: transparent; color: #dc2626; border: 1px solid #fca5a5;
        padding: 4px 10px; border-radius: 6px;
        font: inherit; font-size: 12px; cursor: pointer;
      }

      .vis-sd-edges { background: #ffffff; border: 1px solid #e2e8f0;
                      border-radius: 8px; padding: 10px 14px; }
      .vis-sd-edges ul { list-style: none; padding: 0; margin: 6px 0 0; }
      .vis-sd-edges li {
        padding: 6px 10px; margin: 4px 0; border-radius: 6px;
        display: flex; align-items: center; gap: 8px;
        background: #f8fafc; font-size: 14px;
      }
      .vis-sd-edges li.is-correct { background: #dcfce7; }
      .vis-sd-edges li.is-wrong   { background: #fee2e2; }
      .vis-sd-edge-x {
        background: transparent; color: #94a3b8; border: none;
        cursor: pointer; padding: 0 4px; margin-left: auto;
      }
      .vis-sd-edge-x:hover { color: #dc2626; }
      .vis-sd-reveal-btn {
        background: #2563eb; color: #ffffff; border: none;
        padding: 10px 18px; border-radius: 8px;
        font: inherit; font-weight: 600; cursor: pointer;
        margin-top: 12px;
      }
      .vis-sd-reveal-btn:hover { background: #1d4ed8; }
      .vis-sd-score {
        background: #eff6ff; border: 1px solid #93c5fd;
        padding: 10px 14px; border-radius: 8px;
        margin: 12px 0;
        font-size: 14px; color: #1e3a8a;
      }
      .vis-sd-missing-block {
        background: #fef3c7; border-left: 4px solid #d97706;
        padding: 10px 14px; border-radius: 8px;
        margin: 10px 0;
        font-size: 14px; color: #78350f;
      }
      .vis-sd-missing-block strong { display: block; margin-bottom: 4px; }

      /* CodeFillin — fill-in-the-blank code exercise */
      .vis-cf-mode-badge {
        font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
        padding: 2px 8px; border-radius: 999px;
        background: #dcfce7; color: #14532d; text-transform: uppercase;
      }
      .vis-cf-code-wrap {
        position: relative;
        background: #0f172a; color: #e2e8f0;
        padding: 16px 18px 14px;
        border-radius: 8px;
        margin: 12px 0;
        font-family: ui-monospace, "JetBrains Mono", Menlo, monospace;
        font-size: 14px; line-height: 1.65;
        overflow-x: auto;
      }
      .vis-cf-code-lang {
        position: absolute; top: 6px; right: 12px;
        font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px;
      }
      .vis-cf-code { background: transparent !important; color: inherit; margin: 0; }
      .vis-cf-line { white-space: pre; }
      .vis-cf-blank {
        background: #1e293b; color: #fbbf24; border: 1px dashed #475569;
        padding: 1px 8px; border-radius: 4px;
        font-family: inherit; font-size: 13.5px; cursor: pointer;
        margin: 0 1px;
        transition: all 0.12s;
      }
      .vis-cf-blank:hover:not(:disabled) { background: #334155; border-color: #94a3b8; }
      .vis-cf-blank.is-filled {
        background: #1e3a8a; color: #ffffff; border-style: solid; border-color: #3b82f6;
      }
      .vis-cf-blank.is-correct { background: #14532d; color: #bbf7d0; border-color: #16a34a; }
      .vis-cf-blank.is-wrong   { background: #7f1d1d; color: #fecaca; border-color: #dc2626; }
      .vis-cf-options {
        display: flex; flex-wrap: wrap; gap: 8px;
        margin: 8px 0 12px;
      }
      .vis-cf-option {
        background: #ffffff; border: 1px solid #cbd5e1; border-radius: 8px;
        padding: 8px 12px; font: inherit; cursor: pointer;
        transition: all 0.12s;
      }
      .vis-cf-option:hover:not(:disabled) { border-color: #2563eb; background: #f1f5f9; }
      .vis-cf-option.is-picked { border-color: #2563eb; background: #dbeafe; border-width: 2px; }
      .vis-cf-option.is-used { opacity: 0.5; }
      .vis-cf-option.is-correct-option { background: #f0fdf4; border-color: #16a34a; }
      .vis-cf-option code { background: #f1f5f9; padding: 1px 6px; border-radius: 4px; font-size: 13.5px; }
      .vis-cf-correct-mark { color: #16a34a; font-size: 12px; margin-left: 6px; }

      /* MathDerivation — step-by-step proof */
      .vis-md-mode-badge {
        font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
        padding: 2px 8px; border-radius: 999px;
        background: #e0e7ff; color: #312e81; text-transform: uppercase;
      }
      .vis-md-steps { padding: 0; list-style: none; counter-reset: vmds; }
      .vis-md-step {
        background: #ffffff; border: 1px solid #e2e8f0; border-radius: 8px;
        padding: 14px 16px; margin: 10px 0;
      }
      .vis-md-step-label { margin-bottom: 8px; }
      .vis-md-show-btn {
        background: #f1f5f9; color: #1e293b; border: 1px solid #cbd5e1;
        padding: 6px 12px; border-radius: 6px; font: inherit; font-size: 13px;
        cursor: pointer;
      }
      .vis-md-show-btn:hover { background: #e2e8f0; }
      .vis-md-mcq { display: flex; flex-direction: column; gap: 8px; }
      .vis-md-step-option {
        background: #ffffff; border: 1.5px solid #cbd5e1; border-radius: 8px;
        padding: 14px 16px; cursor: pointer;
        transition: border-color 0.12s, background 0.12s;
        text-align: left; font: inherit;
      }
      .vis-md-step-option:hover { border-color: #2563eb; background: #f1f5f9; }
      .vis-md-pick-feedback {
        padding: 6px 12px; border-radius: 6px; margin-bottom: 8px;
        font-size: 13px; font-weight: 600;
      }
      .vis-md-pick-feedback.is-correct { background: #dcfce7; color: #14532d; }
      .vis-md-pick-feedback.is-wrong   { background: #fee2e2; color: #7f1d1d; }
      .vis-md-step-body { margin-top: 10px; }
      .vis-md-explain { margin: 8px 0 0; color: #475569; line-height: 1.6; }

      /* Responsive SVG wrappers — diagrams shrink to fit narrow containers
         instead of overflowing the parent. Without these, Mermaid/Vega SVGs
         render at their intrinsic width and get clipped on the left/right
         when viewport is narrower than ~900px. */
      .vis-mermaid svg, .vis-vega svg {
        max-width: 100%;
        height: auto;
        display: inline-block;
      }
      .vis-mermaid, .vis-vega { overflow-x: auto; }

      /* Mermaid text rendering fixes for Mermaid 10. By default the auto-sized
         node fill rect and the edge-label background rect are both tight to the
         text, which clips descenders (g/p/y/j/q) at the bottom of nodes AND
         the right edge of edge labels ("Yes" → "Ye"). Force overflow:visible
         everywhere and give the labels generous padding. */
      .vis-mermaid svg,
      .vis-mermaid foreignObject,
      .vis-mermaid .node foreignObject,
      .vis-mermaid .edgeLabel,
      .vis-mermaid .edgeLabel foreignObject,
      .vis-mermaid .label,
      .vis-mermaid .label foreignObject {
        overflow: visible !important;
      }
      .vis-mermaid .node .nodeLabel,
      .vis-mermaid .node .label,
      .vis-mermaid .label foreignObject div {
        line-height: 1.5;
        padding: 2px 4px;
      }
      .vis-mermaid .edgeLabel {
        padding: 2px 8px;
        background: #ffffff;
        border-radius: 3px;
        line-height: 1.4;
      }
      .vis-mermaid .edgeLabel foreignObject div,
      .vis-mermaid .edgeLabel span,
      .vis-mermaid .edgeLabel .labelBkg {
        padding: 0 4px !important;
        background: transparent !important;
      }
    `;
    const tag = document.createElement("style");
    tag.id = "rv-components-styles";
    tag.textContent = css;
    document.head.appendChild(tag);
  })();

  // ----- Components ----- //

  // <RV.Pill>v0.2</RV.Pill>  →  small uppercase pill
  function Pill({ children, color }) {
    const style = color ? { background: color } : null;
    return h("span", { className: "rv-pill", style }, children);
  }

  // <RV.Tag color="green">ok</RV.Tag>  →  status pill
  function Tag({ children, color = "gray" }) {
    return h("span", { className: "rv-tag rv-tag-" + color }, children);
  }

  // <RV.ByLine items={[{label:"Build",value:"2026-05-15"}, ...]} />
  function ByLine({ items = [] }) {
    return h("div", { className: "rv-byline" },
      items.map((it, i) =>
        h("span", { key: i },
          h("strong", null, it.label), " ", it.value
        )
      )
    );
  }

  // Set the browser tab title. Auto-called by RV.Hero; reports without a

  function Mermaid({ chart, id }) {
    const ref = React.useRef(null);
    const autoId = React.useId();
    React.useEffect(() => {
      let cancelled = false;
      _loadScript("https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js")
        .then(() => {
          if (!window.mermaid._inited) {
            window.mermaid._inited = true;
            // trusted-author content; "loose" enables click handlers + HTML labels in mermaid
            // trusted-author content; "loose" enables click handlers + HTML labels in mermaid.
            // flowchart.padding + nodePadding give descenders (g, p, y, j, q) room to render
            // inside diamond/rectangle nodes — without this Mermaid 10 clips them at the bottom edge.
            window.mermaid.initialize({
              startOnLoad: false,
              theme: "default",
              securityLevel: "loose",
              flowchart: { padding: 18, nodeSpacing: 50, rankSpacing: 60, useMaxWidth: true, htmlLabels: true },
              themeVariables: { fontSize: "14px" }
            });
          }
          return window.mermaid.render((id || "mmd") + "-" + autoId.replace(/:/g, ""), chart);
        })
        .then(({ svg }) => {
          if (cancelled || !ref.current) return;
          ref.current.innerHTML = svg;
          // POST-PROCESS to fix Mermaid 10 descender clipping (g, p, y, j, q).
          // Mermaid sizes foreignObjects to the font em-box, which does NOT include
          // descender depth. Grow each foreignObject by 12px (6 top + 6 bottom) so
          // descenders render fully. Also grow rectangle node fills to match so the
          // colored box doesn't show a thin sliver above/below the text.
          const svgEl = ref.current.querySelector("svg");
          if (!svgEl) return;
          svgEl.querySelectorAll("foreignObject").forEach((fo) => {
            const h = parseFloat(fo.getAttribute("height") || "0");
            const y = parseFloat(fo.getAttribute("y") || "0");
            fo.setAttribute("height", String(h + 12));
            fo.setAttribute("y", String(y - 6));
          });
          svgEl.querySelectorAll("g.node > rect").forEach((rect) => {
            const h = parseFloat(rect.getAttribute("height") || "0");
            const y = parseFloat(rect.getAttribute("y") || "0");
            rect.setAttribute("height", String(h + 12));
            rect.setAttribute("y", String(y - 6));
          });
          // Diamonds use <polygon points="..."/>. Expand vertically by translating
          // top and bottom vertices outward from the centroid by 6px each.
          svgEl.querySelectorAll("g.node > polygon").forEach((poly) => {
            const pts = (poly.getAttribute("points") || "").trim().split(/\s+/)
              .map((p) => p.split(",").map(parseFloat));
            if (pts.length < 3 || pts.some((p) => p.length < 2 || p.some(isNaN))) return;
            const cy = pts.reduce((s, p) => s + p[1], 0) / pts.length;
            const grown = pts.map(([x, py]) => [x, py + (py < cy ? -6 : 6)]);
            poly.setAttribute("points", grown.map((p) => p.join(",")).join(" "));
          });
        })
        .catch((e) => { if (ref.current) ref.current.textContent = "[mermaid error] " + e; });
      return () => { cancelled = true; };
    }, [chart, id, autoId]);
    return h("div", { ref, className: "vis-mermaid", style: { margin: "16px 0", textAlign: "center" } });
  }

  // <VIS.Term def="1-2 sentence plain-English explanation">jargon</VIS.Term>
  //
  // Wraps any technical term so a non-technical reader can hover for an
  // immediate definition. The explanation should:
  //   - assume the reader knows English but not software/your domain
  //   - fit in 1-2 short sentences (a tooltip, not a paragraph)
  //   - avoid further jargon (or wrap that too)
  //
  // The element exposes `data-rv-info` so the report-viewer overlay reuses
  // its own tooltip + double-click "explain this" feedback flow. In
  // standalone /visualize mode (no overlay), the lightweight hover handler
  // below renders the tooltip directly.
  function Term({ def, children }) {
    if (!def) return h(React.Fragment, null, children);
    return h("span", {
      className: "vis-term",
      "data-rv-info": def,
      "aria-label": def,
      tabIndex: 0,
    }, children);
  }

  // Standalone hover tooltip for <VIS.Term>. If the report-viewer overlay
  // is loaded it already shows tooltips for any [data-rv-info] element, so
  // we short-circuit here to avoid double-rendering.
  (function installTermTooltip() {
    let tip = null;
    function show(el) {
      if (window.__rvReady) return;  // overlay.js owns the tooltip in report-viewer mode
      const text = el.getAttribute("data-rv-info");
      if (!text) return;
      if (!tip) {
        tip = document.createElement("div");
        tip.className = "vis-term-tip";
        document.body.appendChild(tip);
      }
      tip.textContent = text;
      const r = el.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const pad = 8;
      let left = Math.max(pad,
        Math.min(r.left, window.innerWidth - tr.width - pad));
      const above = r.top - tr.height - pad;
      const below = r.bottom + pad;
      tip.style.left = left + "px";
      tip.style.top  = (above >= pad ? above : below) + "px";
      tip.style.display = "block";
    }
    function hide() { if (tip) tip.style.display = "none"; }
    document.addEventListener("mouseover", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el); else hide();
    });
    document.addEventListener("focusin", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el);
    });
    document.addEventListener("focusout", hide);
    document.addEventListener("scroll", hide, true);
  })();

  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."
  //   scenario={<>...JSX...</>}
  //   diagram={<VIS.Mermaid chart={...} />}
  //   options={[
  //     {key:"a", text:"...", correct:false},
  //     {key:"b", text:"...", correct:true},
  //     ...
  //   ]}
  //   trap={<>The most tempting wrong is X because...</>}
  //   lens={<>The right answer + reasoning</>}
  //   stretch="optional follow-up question"
  // />
  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// TimeWeaver — Dual-Stream Temporal Network for sequential recsys.
// MDPI Systems 2025; integrates inter-event time-interval into positional encoding via dual streams.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="RecSys SOTA · Time-aware recommendation"
      title="TimeWeaver — Dual-Stream Temporal Network"
      subtitle="Treat absolute time and inter-event interval as two parallel streams woven into the transformer's positional encoding."
      byline={[
        {label: "Paper", value: "MDPI Systems 2025"},
        {label: "Domain", value: "Sequential transformer rec"},
        {label: "Core idea", value: "Dual-stream time encoding"},
      ]}/>

    <VIS.TLDR>
      Standard <VIS.Term def="Self-Attentive Sequential Recommendation. Kang and McAuley 2018. Encodes user history as a sequence of item tokens with positional embeddings; predicts next item via causal self-attention.">SASRec</VIS.Term>-style transformers ignore the time gap between events — a 1-hour pause and a 1-month pause look the same to attention. TimeWeaver runs two parallel streams: one absolute-time stream (when did each event happen) and one relative-interval stream (how long between adjacent events). Both feed into the positional encoding. Source: <a href="https://www.mdpi.com/2079-8954/13/10/857" target="_blank" rel="noopener">MDPI Systems 13(10):857</a>.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is">
      <p>
        TimeWeaver augments a standard sequential transformer with two side-channel time streams. The <strong>absolute stream</strong> encodes each event's wall-clock timestamp (day-of-week, hour-of-day, or a normalized continuous value). The <strong>relative stream</strong> encodes the time interval between adjacent events. Both streams are projected and combined with the item-token embeddings before being fed to the transformer's attention layers. The combination function varies by paper: concatenate-then-project, additive fusion, or gated mixing.
      </p>
      <VIS.Mermaid chart={`
flowchart TB
  S["Event sequence with timestamps"]
  S --> I["Item token embeddings"]
  S --> A["Absolute time stream: hour, day, month"]
  S --> R["Relative interval stream: t_i - t_i-1"]
  I --> F["Fusion layer"]
  A --> F
  R --> F
  F --> T["Transformer self-attention"]
  T --> O["Next-item prediction"]
  style F fill:#dbeafe,stroke:#1e40af,stroke-width:2px
      `} />
      <p>
        The dual-stream design lets the model condition on both "what time of day is it now" (absolute) and "how long since the last event" (relative) — two distinct kinds of temporal signal that interact differently with user behavior.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How it differs from the baseline">
      <p>
        <strong>SASRec / BERT4Rec (the baseline).</strong> Each event is just a token; the positional encoding is the integer step index. Timestamps are either ignored entirely or concatenated as a single side feature. The model has no native distinction between "absolute" and "relative" time signal — both, if used, are squashed into one bucketed feature.
      </p>
      <p>
        <strong>TimeWeaver (the delta).</strong> Two separate streams isolate the two notions of time. The absolute stream captures seasonality and circadian patterns (Monday morning vs Friday night). The relative stream captures recency and engagement-burst patterns. The model can independently weight them via the fusion layer.
      </p>
      <p>
        <strong>What changes operationally.</strong> Two new tuning surfaces: the encoding of each stream (linear, log, sinusoidal, learned) and the fusion mechanism (concatenate, add, gate). The compute overhead is small — the streams are low-dimensional — but the hyperparameter surface is larger.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-when" title="When to pick it / where it wins">
      <p>
        TimeWeaver wins on sequences where both absolute time (seasonality, time-of-day patterns) AND inter-event intervals matter, and where you have enough data to fit the larger hyperparameter surface. Music streaming (circadian + session-burst), e-commerce (weekday/weekend + multi-day-gap), and news (breaking-news bursts + diurnal cycles) are clean fits. The architecture is more invasive than <VIS.Term def="Time-aware Rotary Positional Embedding. Drop-in replacement for RoPE that swaps the integer step index for a normalized timestamp inside the rotation-angle computation.">TimeRoPE</VIS.Term> but gives finer control.
      </p>
      <p>
        Avoid TimeWeaver when sequences are short, when timestamps are unreliable, or when the simpler TimeRoPE drop-in already captures the gap-awareness you need. The dual-stream framing is overkill if only one kind of time signal is informative.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-gotchas" title="Limitations & gotchas">
      <p>
        Four failure modes. <strong>Time-interval encoding choice</strong> — linear vs log vs learned, each shifts metrics; sweep per surface. <strong>Stream imbalance</strong> — if the absolute and relative streams have very different magnitudes after projection, the fusion layer learns to ignore the smaller one; LayerNorm each stream before fusion. <strong>Train-serve skew</strong> — if absolute-time encodings include the year, you ship a model that has never seen the current year at serve time; either cycle the year (mod 4) or drop year entirely. <strong>Computational waste at short sequences</strong> — the dual-stream overhead is only worth it when sequences are long enough to have meaningful interval distributions; below ~10 events per user, the bias-variance tradeoff favors simpler encodings.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        Ten trap problems on TimeWeaver's discriminating signals: when the dual-stream framing wins, when the simpler TimeRoPE is enough, and the production gotchas that distinguish a working deployment from a wasteful one.
      </p>

      <VIS.TrapProblem
        id="tw-p1"
        difficulty="hard"
        title="P1 — Why absolute time alone is not enough"
        scenario={<>A peer suggests "Just add hour-of-day and day-of-week features to SASRec; that's all the time signal we need." You disagree. Why is relative interval ALSO needed?</>}
        options={[
          {key:"a", text:"It isn't; hour and day-of-week capture everything."},
          {key:"b", text:"Absolute time captures seasonality and circadian patterns but not engagement bursts; two users browsing at 8pm Monday differ if one is on a multi-hour session vs returning after a 3-week break.", correct:true},
          {key:"c", text:"SASRec rejects categorical features."},
          {key:"d", text:"Relative interval is computationally cheaper."},
        ]}
        trap={<>(a) is the position the peer is arguing — the senior must articulate the structural reason it's wrong. (c) and (d) are technical-sounding non-answers. The senior recognizes that absolute and relative time encode orthogonal signals.</>}
        lens={<>Absolute time and relative interval are orthogonal signals. Absolute time captures seasonality (Monday vs Friday, morning vs night). Relative interval captures engagement state (mid-session burst vs returning user). A model with only absolute time cannot distinguish two users browsing at the same hour but in different engagement states. Both are needed; TimeWeaver's dual-stream architecture is the natural encoding.</>}
        stretch={<>Can you compute relative interval from absolute time alone inside the model?</>}
      />

      <VIS.TrapProblem
        id="tw-p2"
        difficulty="hard"
        multiSelect
        title="P2 — TimeWeaver vs TimeRoPE"
        scenario={<>A staff engineer asks whether to migrate from RoPE-based SASRec to TimeRoPE or to TimeWeaver. Which of the following are true tradeoffs? Select all that apply.</>}
        options={[
          {key:"a", text:"TimeRoPE is a near-drop-in for RoPE-based architectures; TimeWeaver is more invasive but gives separate absolute and relative streams.", correct:true},
          {key:"b", text:"TimeWeaver's dual-stream design has more hyperparameters and a larger tuning surface.", correct:true},
          {key:"c", text:"TimeRoPE collapses absolute and relative time into a single rotation-angle scalar.", correct:true},
          {key:"d", text:"TimeRoPE always beats TimeWeaver on every benchmark."},
          {key:"e", text:"Both architectures work without timestamps."},
          {key:"f", text:"TimeWeaver lets you weight the absolute and relative signals independently via the fusion layer.", correct:true},
        ]}
        trap={<>(d) is overclaiming; benchmarks vary by corpus. (e) is the no-timestamps fantasy; both architectures explicitly require timestamps. The senior must engage with the four real tradeoffs.</>}
        lens={<>Four real tradeoffs. TimeRoPE is the cheap migration (a); TimeWeaver has a larger tuning surface (b); TimeRoPE collapses both time signals into one (c); TimeWeaver lets you weight them independently (f). The right pick depends on your gap distribution and the asymmetry between absolute and relative signal strength in your domain.</>}
        stretch={<>If you had to ship one without offline evaluation budget, which would you bet on?</>}
      />

      <VIS.TrapProblem
        id="tw-p3"
        difficulty="hard"
        title="P3 — Stream imbalance failure mode"
        scenario={<>You ship TimeWeaver. After training, you inspect attention patterns and find the model behaves identically to vanilla SASRec — the time streams are effectively ignored. The fusion layer's projection weights for the time streams are near-zero. What's the most likely structural cause?</>}
        options={[
          {key:"a", text:"Time streams are correctly being ignored; data has no time signal."},
          {key:"b", text:"The time streams' post-projection magnitudes are much smaller than the item-token embeddings' magnitudes; the fusion layer learns to ignore them. Apply LayerNorm per stream before fusion.", correct:true},
          {key:"c", text:"The model needs longer training."},
          {key:"d", text:"Learning rate is too high."},
        ]}
        trap={<>(a) prematurely concludes "no signal" without checking that the streams are even reaching the model. (c) and (d) blame training schedule. The senior recognizes the magnitude-imbalance trap: a fusion layer with heterogeneous input magnitudes collapses to using the largest.</>}
        lens={<>Fusion layers with heterogeneous input magnitudes are unstable. The standard fix is per-stream LayerNorm before fusion so each stream contributes on a comparable scale. Without this, a transformer's optimization just learns to ignore the smaller streams. This is a generic deep-learning gotcha that bites every dual-/multi-stream architecture.</>}
        stretch={<>What's a cheap diagnostic to detect stream imbalance before retraining?</>}
      />

      <VIS.TrapProblem
        id="tw-p4"
        difficulty="medium"
        title="P4 — Year encoding in the absolute stream"
        scenario={<>Your TimeWeaver implementation includes year as part of the absolute-time encoding. You train on 2020-2024 data and deploy in 2026. Online metrics drop after deployment. What's the most likely cause?</>}
        options={[
          {key:"a", text:"Drift in user behavior across years."},
          {key:"b", text:"The year-2026 encoding was never seen during training; the embedding for that year is essentially random.", correct:true},
          {key:"c", text:"Architecture bug."},
          {key:"d", text:"Random batch order."},
        ]}
        trap={<>(a) is plausible but is a population claim, not a model claim. (c) and (d) blame implementation. The senior recognizes that "year" as an absolute-time component is a train-serve skew trap.</>}
        lens={<>Absolute-time encodings that include "year" suffer train-serve skew the moment you cross a year boundary. Either drop year entirely (rely on day-of-week + hour-of-day + month), cycle year mod a small period, or use only continuous time normalized within a rolling window. This is a special case of the general "don't include strictly-increasing features in models you ship for years" rule.</>}
        stretch={<>What's the principled minimal absolute-time encoding that avoids this trap?</>}
      />

      <VIS.TrapProblem
        id="tw-p5"
        difficulty="hard"
        multiSelect
        title="P5 — Where TimeWeaver wins"
        scenario={<>Four surfaces. (i) Music streaming with mixed circadian + session-burst patterns. (ii) Short-sequence cold-start surface (users with 2-3 events). (iii) E-commerce next-purchase with multi-day intervals and weekday/weekend cycles. (iv) Real-time bidding model that sees one event per user. Which surfaces are good TimeWeaver fits? Select all that apply.</>}
        options={[
          {key:"a", text:"(i) — circadian (absolute) plus session burst (relative) need separate streams.", correct:true},
          {key:"b", text:"(ii) — short sequences have insufficient interval distribution to fit dual streams."},
          {key:"c", text:"(iii) — multi-day intervals (relative) plus weekday cycles (absolute) are the dual-stream sweet spot.", correct:true},
          {key:"d", text:"(iv) — one event per user gives no sequence to weave time into."},
          {key:"e", text:"TimeWeaver always wins regardless of sequence length."},
        ]}
        trap={<>(b) (d) are correctly identified as bad fits but the question asks for GOOD fits. (e) is the maximalist trap. The senior must read carefully.</>}
        lens={<>Two clear wins. Music streaming (i) and e-commerce next-purchase (iii) both have BOTH absolute and relative time signal, with enough sequence length to fit the dual-stream architecture. Short-sequence (ii) and single-event (iv) surfaces are bad TimeWeaver fits — not enough interval distribution to fit on.</>}
        stretch={<>What sequence-length threshold makes TimeWeaver worth the architectural cost?</>}
      />

      <VIS.TrapProblem
        id="tw-p6"
        difficulty="hard"
        title="P6 — Interval encoding choice"
        scenario={<>Your inter-event intervals span seconds to years. Two implementation choices: (i) linear normalization, (ii) log normalization. Which is more robust and why?</>}
        options={[
          {key:"a", text:"Linear — preserves true scale."},
          {key:"b", text:"Log — compresses many orders of magnitude into a usable range so both sub-minute and multi-year intervals get meaningful gradients.", correct:true},
          {key:"c", text:"Neither — use one-hot bucketing only."},
          {key:"d", text:"Doesn't matter — model learns the encoding."},
        ]}
        trap={<>(a) is naive. (c) loses ordering information. (d) is the lazy "model handles it" answer. The senior recognizes that wide-range numerical features need log compression.</>}
        lens={<>Log normalization is the standard for inter-event intervals spanning many orders of magnitude. Linear normalization compresses the recent intervals into near-zero range, killing gradients. Quantile bucketing is a viable alternative when corpus statistics are stable. Learned normalization works but adds parameters.</>}
        stretch={<>How would you decide between log and quantile normalization for your corpus?</>}
      />

      <VIS.TrapProblem
        id="tw-p7"
        difficulty="hard"
        title="P7 — Fusion mechanism choice"
        scenario={<>You're picking how to fuse the three streams (item token, absolute time, relative interval). Three options: concatenate-then-project, additive fusion (sum + project), gated mixing (learned per-stream weights). Which has the most expressive power AND a clear failure mode?</>}
        options={[
          {key:"a", text:"Concatenate-then-project — most expressive, but the input dimension grows."},
          {key:"b", text:"Additive fusion — simplest, but assumes the streams share a vector space."},
          {key:"c", text:"Gated mixing — most expressive AND can collapse to ignoring streams if gates saturate at zero during training.", correct:true},
          {key:"d", text:"All three are equivalent."},
        ]}
        trap={<>(a) (b) are true but don't answer "most expressive AND has a clear failure mode." (d) is wrong; the three are not equivalent. The senior must engage with both halves of the question.</>}
        lens={<>Gated mixing is most expressive — learned per-stream weights mean the model can decide which stream matters per token. The failure mode is gate saturation: if gates saturate at zero early in training, the corresponding stream is effectively dropped and gradients can't recover it. The fix is gate initialization at 0.5 and a small auxiliary loss to keep gates from saturating.</>}
        stretch={<>If you saw a stream's gate at near-zero in a trained model, would you trust that the model concluded the stream is uninformative?</>}
      />

      <VIS.TrapProblem
        id="tw-p8"
        difficulty="hard"
        title="P8 — Compute cost at scale"
        scenario={<>Your sequences average 200 events. You add the dual-stream TimeWeaver design to a 6-layer transformer. Compute overhead vs vanilla SASRec is ~12%. The eng lead asks if that's reasonable. What's the structural reason it's small?</>}
        options={[
          {key:"a", text:"It's actually large; the eng lead is wrong."},
          {key:"b", text:"The time streams are low-dimensional projections fed into the input; they don't quadratically scale with sequence length the way attention does. Attention is the dominant cost.", correct:true},
          {key:"c", text:"Sparse attention amortizes the overhead."},
          {key:"d", text:"The hardware caches the time streams."},
        ]}
        trap={<>(a) overstates the overhead. (c) is generic. (d) is hardware speculation. The senior recognizes that attention is O(L^2 d) while time-stream projections are O(L d_time), and d_time is small.</>}
        lens={<>Attention dominates compute in long-sequence transformers. The time-stream projections are O(L · d_time) where d_time is small (8-32 dims), while attention is O(L^2 · d_model). A 12% overhead on a 200-event sequence is the typical landing point. This is why dual-stream architectures scale well.</>}
        stretch={<>At what sequence length does the time-stream overhead become non-negligible?</>}
      />

      <VIS.TrapProblem
        id="tw-p9"
        difficulty="hard"
        multiSelect
        title="P9 — Offline eval slicing"
        scenario={<>You ship TimeWeaver. Aggregate NDCG@10 is up 0.3 points vs SASRec. The eng lead asks "where exactly is the win coming from?" Which slices of the eval should you produce? Select all that apply.</>}
        options={[
          {key:"a", text:"Slice by inter-event gap decile; the win should concentrate in the longer-gap deciles.", correct:true},
          {key:"b", text:"Slice by hour-of-day; the win should appear where circadian patterns are strong.", correct:true},
          {key:"c", text:"Slice by user sequence length; very short sequences should show no win.", correct:true},
          {key:"d", text:"Aggregate by item popularity; popular items dominate, so slicing by popularity shows nothing useful."},
          {key:"e", text:"Report only the aggregate; slicing is overfitting to the eval."},
        ]}
        trap={<>(d) is a clever-sounding non-answer; popularity slicing IS useful in many contexts but it doesn't probe TimeWeaver's mechanism specifically. (e) is anti-science. The senior wants to validate that the win comes from the EXPECTED mechanism.</>}
        lens={<>Three slices that probe TimeWeaver's mechanism directly. Gap-decile (a) tests whether longer gaps are where the win lives. Hour-of-day (b) tests whether circadian patterns are captured. Sequence-length (c) tests whether the win scales with data per user. Aggregate-only reporting cannot tell you whether the win is from the architecture or from noise.</>}
        stretch={<>If aggregate is up but all three slices are flat, what does that suggest?</>}
      />

      <VIS.TrapProblem
        id="tw-p10"
        difficulty="hard"
        title="P10 — Senior reading of the TimeWeaver paper"
        scenario={<>A junior reads the TimeWeaver paper and concludes "dual-stream is always better than single-stream." You disagree. What's the senior framing?</>}
        options={[
          {key:"a", text:"Dual-stream is always better."},
          {key:"b", text:"Dual-stream wins when both signals are independently informative and the data is plentiful; on short sequences or surfaces with one dominant signal, the extra parameters and tuning surface are wasted.", correct:true},
          {key:"c", text:"Single-stream is always better."},
          {key:"d", text:"Architecture choice doesn't matter at scale."},
        ]}
        trap={<>(a) is the junior's read. (c) is the opposite extreme. (d) is the maximalist "scale solves all" position. The senior recognizes that architecture choice tracks the signal structure of the data.</>}
        lens={<>Dual-stream is a structural commitment. It pays off when both absolute and relative time are independently informative AND when you have enough data to fit the extra hyperparameter surface. On short sequences or surfaces where one time signal dominates, simpler encodings (TimeRoPE drop-in) often match dual-stream at lower cost. The right architecture follows the data, not the most recent paper.</>}
        stretch={<>What corpus diagnostic would predict whether dual-stream is worth it before training?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://www.mdpi.com/2079-8954/13/10/857" target="_blank" rel="noopener"><strong>TimeWeaver: Time-Aware Sequential Recommender System via Dual-Stream Temporal Network</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper, MDPI Systems 2025)</span><br/>The TimeWeaver paper. Read the ablation table — it isolates the contribution of absolute vs relative stream.</li>
        <li><a href="https://arxiv.org/abs/1808.09781" target="_blank" rel="noopener"><strong>Kang and McAuley — Self-Attentive Sequential Recommendation (SASRec)</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper, ICDM 2018)</span><br/>The baseline TimeWeaver augments. Read this first; the dual-stream design only makes sense against SASRec's plain integer-positional encoding.</li>
        <li><a href="https://www.emergentmind.com/topics/time-aware-rotary-positional-embedding" target="_blank" rel="noopener"><strong>EmergentMind — Time-aware Rotary Positional Embedding (topic page)</strong></a> <span style={{color:"#64748b", fontSize:14}}>(survey)</span><br/>The TimeRoPE line — useful contrast to TimeWeaver's dual-stream design.</li>
        <li><a href="https://eugeneyan.com/writing/recsys-llm/" target="_blank" rel="noopener"><strong>Eugene Yan — Sequential recsys deep-dive</strong></a> <span style={{color:"#64748b", fontSize:14}}>(blog)</span><br/>Best practitioner survey of how time and positional encodings interact in sequential recsys.</li>
        <li><a href="https://arxiv.org/abs/1904.06690" target="_blank" rel="noopener"><strong>Sun et al. — BERT4Rec</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper, CIKM 2019)</span><br/>The other major sequential recsys baseline; same time-blindness issue as SASRec.</li>
      </ul>
    </VIS.Section>
  </main>
);
