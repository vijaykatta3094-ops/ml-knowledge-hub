        trap={<>(b) — the convenient lie.</>}
        lens={<>Per-step signal is the assumption; aggregates degrade MOCB to a glorified scalarized LinUCB.</>}
        stretch={<>Could you impute the per-step signal from item metadata?</>}
      />

      {/* ============== D. Intuition traps ============== */}
      <h3 style={{marginTop:32, color:"#1f3a5f"}}>D. Intuition traps</h3>

      {/* axis: D1 ⭐ — insight: "more weight on fairness = more fairness" is intuitive but wrong direction in dual */}
      <VIS.TrapProblem
        id="mocb-d1"
        difficulty="hard"
        title="D1 ⭐ — Intuitive but wrong"
        scenario={<>Intuition: "If fairness is consistently violated, just hand-set w<sup>(fair)</sup> = 10 and the bandit will rank fair items first." Why is this exactly what MOCB rejects, and what fails in practice?</>}

      />

      {/* axis: D3 — junior fix vs senior fix on constraint violation */}
      <VIS.TrapProblem

        difficulty="hard"
        title="D3 — Junior vs senior fix on persistent violation"
        scenario={<>Diversity floor missed three days in a row. Junior MLE: "raise eta so dual catches up faster." Senior MLE reaches for what FIRST?</>}

          {key:"a", text:"Check feasibility: is the floor attainable given the current catalog? Plot the maximum achievable diversity across all policies — if the ceiling on diversity is 0.28 and the floor is 0.30, no eta change will help; the constraint is infeasible. Only once feasibility is confirmed does the senior tune eta.", correct:true},
          {key:"b", text:"Increase alpha to explore more."},

        trap={<>The junior&apos;s fix is locally plausible but skips the structural question.</>}

      />

      {/* axis: D4 — symptom looks like one thing, is another */}
      <VIS.TrapProblem
        id="mocb-d4"
        difficulty="hard"
        title="D4 — Plausible misattribution"

      {/* ============== E. Operations ============== */}
      <h3 style={{marginTop:32, color:"#1f3a5f"}}>E. Operations</h3>

      {/* axis: E1 — insight: dual divergence as feasibility signal is the canonical MOCB production gotcha */}
      <VIS.TrapProblem
        id="mocb-e1"
        difficulty="hard"
        title="E1 — Production gotcha: dual divergence"
        scenario={<>Two weeks post-launch, w<sup>(fair)</sup> has climbed from 0.3 &rarr; 1.0 &rarr; 4.0 &rarr; 12.0; CTR has collapsed 18%. The dashboards are green except for CTR. Most likely cause?</>}
        options={[
          {key:"a", text:"The feasible region is empty — no policy on the current catalog can satisfy fairness floor + sustain meaningful CTR exploration. Dual ascent doesn&apos;t saturate; w keeps climbing trying to enforce an unattainable target. Diagnosis: plot max-achievable fairness across policies; if it&apos;s below the floor, the constraint must be relaxed or the catalog expanded with diverse arms. DO NOT clip w and ship — clipping silently breaks the algorithm.", correct:true},
          {key:"b", text:"Random noise."},
          {key:"c", text:"Exploration alpha too high."},
          {key:"d", text:"theta is mis-initialized."},
        ]}
        trap={<>(b), (c), (d) miss the climbing pattern that&apos;s the algorithm&apos;s feasibility alarm.</>}
        lens={<>Dual divergence IS the diagnostic signal MOCB exposes. Treat it as a structural alert, not a tuning knob.</>}
        stretch={<>What policy-space plot shows infeasibility most cleanly?</>}
      />

      {/* axis: E2 ⭐ — Failure-on-Friday: catalog drop causes w to spike, bandit goes nuts overnight */}
      <VIS.TrapProblem
        id="mocb-e2"
        difficulty="hard"
        title="E2 ⭐ — Failure on Friday"
        scenario={<>Friday 3am page: CTR down 14%, fairness OK, complaint queue full. Investigation shows: Thursday 11pm, the merchandising team disabled a chunk of small-seller inventory for a brand campaign. Latency, GPU util, ranking all unchanged. What specifically went wrong in the MOCB loop — and why does this fail mode NOT exist in plain LinUCB?</>}
        options={[
          {key:"a", text:"Pulling the small-seller inventory made the small-seller floor harder to hit on the remaining catalog. MOCB&apos;s dual ascent fired hard — w_fair spiked overnight, the scalarized score is now dominated by the (small) remaining fairness signal, and CTR-driven arm selection got crushed. Plain LinUCB would have just delivered worse fairness silently. The MOCB-specific fix: dual rate-limit + alert on catalog mass changes feeding into the bandit&apos;s feasibility set.", correct:true},
          {key:"b", text:"Standard catalog refresh — re-train theta."},
          {key:"c", text:"Wait for traffic to normalize."},
          {key:"d", text:"Increase exploration alpha."},
        ]}
        trap={<>(b), (c), (d) treat this as generic — but the CTR-crash WITH stable latency and stable fairness IS the MOCB signature when catalog feasibility tightens.</>}
        lens={<>Catalog edits are silent inputs to MOCB&apos;s feasibility set. Without a rate-limit on dual, sudden infeasibility tightening crushes CTR before ops can react.</>}
        stretch={<>What alerting rule do you add to catalog-change pipelines?</>}
      />

      {/* axis: E3 — implementation specific: default eta in reference implementation, dual step too aggressive */}
      <VIS.TrapProblem
        id="mocb-e3"
        difficulty="medium"
        title="E3 — Library default to override"
        scenario={<>You use a reference MOCB implementation. Which default is most likely to bite you in production if you accept it as-is?</>}
        options={[
          {key:"a", text:"The default dual step size eta — often set to a value reasonable for stationary academic benchmarks (e.g. 0.1) but too aggressive for the noisy, traffic-shifting production reward signal. Set eta by reward scale / constraint variance, not by library default.", correct:true},
          {key:"b", text:"Default ridge regularization lambda_r."},
          {key:"c", text:"Default UCB alpha."},
          {key:"d", text:"Default random seed."},
        ]}
        trap={<>(b), (c) have mature defaults; (d) is a joke option that some pick anyway.</>}
        lens={<>The MOCB-new knob is eta. Defaults are tuned to benchmarks, not your reward variance. Always re-tune.</>}
        stretch={<>How would you estimate the right eta from one day of logs?</>}
      />

      {/* axis: E4 — rollout: shadow scoring is special-cased because of dual */}
      <VIS.TrapProblem
        id="mocb-e4"
        difficulty="hard"
        mode="ordered"
        title="E4 — Rollout sequence"
        scenario={<>Migrate LinUCB &rarr; MOCB. Order the phases. Items that don&apos;t belong are not ranked.</>}
        options={[
          {key:"a", text:"Backfill per-impression fairness signal in logs; verify K-dim reward stream is clean.", order:1},
          {key:"b", text:"Shadow-score MOCB offline on logged data with dual UPDATES DISABLED (frozen w) — confirm theta_k learn separately.", order:2},
          {key:"c", text:"Enable dual updates in shadow; confirm w_t tracks constraint slack without affecting production.", order:3},
          {key:"d", text:"Small traffic ramp (1%) with dual rate-limit ON; monitor dual divergence and CTR.", order:4},
          {key:"e", text:"Full ramp to MOCB; retire LinUCB after 14 days dual stability.", order:5},
          {key:"f", text:"Replace LinUCB on day 1 with full MOCB."},
          {key:"g", text:"Enable dual updates BEFORE shadow scoring."},
        ]}
        trap={<>(f), (g) skip the dual-validation phase that&apos;s MOCB-specific.</>}
        lens={<>The dual layer needs its own shadow-validation phase: estimators first (with w frozen), then dual (with shadow traffic). Skipping bakes dual misbehavior into the rollout.</>}
        stretch={<>What dashboard exits the shadow phase?</>}
      />

      {/* axis: E5 — reproducibility: paper uses hand-set tau; production tau is regulator-defined */}
      <VIS.TrapProblem
        id="mocb-e5"
        difficulty="medium"
        title="E5 — Paper-to-production reproducibility"
        scenario={<>The Sci Reports paper benchmarks MOCB on a smart-tourism dataset with hand-set constraint thresholds &tau;. What&apos;s the hardest detail to reproduce in YOUR production?</>}
        options={[
          {key:"a", text:"The constraint threshold tau — in the paper, tau is set to make the constraint interesting AND feasible. In production, tau is regulator- or product-defined and may be infeasible OR trivially slack. The paper&apos;s clean MOCB-vs-LinUCB delta depends on tau being a sweet-spot binding constraint; production tau frequently is not.", correct:true},
          {key:"b", text:"The exploration alpha."},
          {key:"c", text:"The ridge lambda_r."},
          {key:"d", text:"The dataset size."},
        ]}
        trap={<>(b), (c), (d) all matter but are mature; (a) is the MOCB-specific reproduction trap.</>}
        lens={<>Benchmark feasibility is curated; production feasibility is given. The MOCB-vs-baseline delta in production is conditional on tau being binding.</>}
        stretch={<>How would you A/B-test a candidate tau?</>}
      />

      {/* axis: E6 — eval contamination: comparing on CTR alone hides MOCB's value */}
      <VIS.TrapProblem
        id="mocb-e6"
        difficulty="hard"
        title="E6 — Eval contamination"
        scenario={<>An A/B test report says "MOCB lost — CTR is 1.8% lower than LinUCB control." How is this evaluation contaminated, and what&apos;s the honest readout?</>}
        options={[
          {key:"a", text:"CTR-only eval ignores the entire point of MOCB. The honest readout is (i) CTR delta and (ii) fairness floor satisfaction delta — control likely violated the floor (paying nothing in CTR because no constraint mechanism); MOCB satisfied it (paying 1.8% CTR as feasibility cost). If the regulator&apos;s floor is mandatory, that 1.8% is the price of compliance, not a loss.", correct:true},
          {key:"b", text:"The test is fine — CTR is the only metric that matters."},
          {key:"c", text:"MOCB is wrong."},
          {key:"d", text:"The sample size is too small."},
        ]}
        trap={<>(b) is the seductive product-side framing that throws away the entire reason MOCB exists.</>}
        lens={<>Multi-objective methods MUST be evaluated multi-objectively. CTR-only eval is the most common way to roll back a working MOCB.</>}
        stretch={<>What multi-objective summary metric reads cleanly for the VP?</>}
      />

      {/* ============== F. Failure modes ============== */}
      <h3 style={{marginTop:32, color:"#1f3a5f"}}>F. Failure modes</h3>

      {/* axis: F1 — edge case: K=1 collapses MOCB to LinUCB */}
      <VIS.TrapProblem
        id="mocb-f1"
        difficulty="medium"
        title="F1 — Edge case: K = 1 objective"
        scenario={<>You configure MOCB with K=1 objective (just CTR), no active constraints. What happens?</>}
        options={[
          {key:"a", text:"MOCB collapses exactly to LinUCB. The dual variable has nothing to update against (no constraint slack); the single weight is irrelevant under argmax. This is the design check: MOCB is a strict superset, so the degenerate case must reduce cleanly. If your implementation does anything else, it&apos;s buggy.", correct:true},
          {key:"b", text:"MOCB crashes."},
          {key:"c", text:"MOCB ignores the context."},
          {key:"d", text:"MOCB performs much better than LinUCB."},
        ]}
        trap={<>(d) is the "more machinery == better" instinct; in the degenerate case the machinery does nothing useful.</>}
        lens={<>Reduction sanity-check: every multi-X method must collapse to its scalar baseline in the K=1 case. Failure to reduce is a code smell.</>}
        stretch={<>What unit test would you add to enforce this?</>}
      />

      {/* axis: F2 — adversarial: attack on the dual mechanism specifically */}
      <VIS.TrapProblem
        id="mocb-f2"
        difficulty="hard"
        title="F2 — Adversarial attack on the dual"
        scenario={<>Design an adversarial traffic pattern that maximally degrades MOCB&apos;s CTR while leaving plain LinUCB unaffected.</>}
        options={[
          {key:"a", text:"Inject periodic bursts of users for whom the fairness floor is near-violated (cohorts where small-seller arms have artificially low CTR). MOCB&apos;s dual sees the threatened violation, RAISES w_fair, and the scalarized ranker over-corrects on this cohort; CTR drops. Plain LinUCB doesn&apos;t see fairness at all so it&apos;s unaffected by these bursts.", correct:true},
          {key:"b", text:"Increase total traffic — affects both equally."},
          {key:"c", text:"Use the same query repeatedly."},
          {key:"d", text:"There is no such attack."},
        ]}
        trap={<>(d) — confident wrong answer; (b), (c) generic load attacks.</>}
        lens={<>The dual mechanism is the new attack surface. Anyone who can manipulate the fairness signal can push w around. Mitigate with rate-limited dual updates and outlier rejection on the slack stream.</>}
        stretch={<>What input filter blocks the attack?</>}
      />

      {/* axis: F3 — reverse engineering: symptom is "w climbing + CTR flat" → which design choice causes it */}
      <VIS.TrapProblem
        id="mocb-f3"
        difficulty="hard"
        title="F3 — Reverse engineering"
        scenario={<>Observed: w<sup>(fair)</sup> climbs steadily for 6 hours, then PLATEAUS at a high value; CTR is stable; fairness floor is met. Which MOCB design choice causes this exact pattern?</>}
        options={[
          {key:"a", text:"Dual ascent ON a binding-but-feasible constraint. The dual climbs until the scalarized argmax shifts the bandit into the feasible region; once slack is zero (constraint exactly met), the dual gradient is zero too, and w plateaus. CTR stable = the bandit settled into the feasible optimum. This is the textbook MOCB success pattern, not a bug.", correct:true},
          {key:"b", text:"Dual divergence — the constraint is infeasible."},
          {key:"c", text:"Oscillation — eta too large."},
          {key:"d", text:"theta drift — the catalog changed."},
        ]}
        trap={<>(b) is the panic readout — climbing w is alarming until you check if it PLATEAUED. (c), (d) explain different signatures.</>}
        lens={<>Signature matching: climb + plateau + stable CTR = healthy dual convergence on a binding constraint. Climb without plateau = divergence. Train ops to recognize both.</>}
        stretch={<>What plateau-detection rule would alert on divergence but stay quiet on healthy climb-plateau?</>}
      />

      {/* axis: F4 — paper-named: Sci Reports authors call out exploration-feasibility tension */}
      <VIS.TrapProblem
        id="mocb-f4"
        difficulty="hard"
        title="F4 — Paper-named failure mode"
        scenario={<>The Sci Reports paper specifically warns about ONE regime where MOCB&apos;s constraint mechanism can transiently fail even with correct hyperparameters. Which regime?</>}
        options={[
          {key:"a", text:"Early exploration phase. UCB requires exploration; exploration means pulling under-pulled arms; for cold arms theta is uncertain so exploration can produce arms that violate the constraint. Cumulative violation is bounded but not zero in this phase. The paper formalizes this as sublinear cumulative-violation guarantee, NOT per-step zero violation.", correct:true},
          {key:"b", text:"Stationary phase — no failures."},
          {key:"c", text:"K = 1 case."},
          {key:"d", text:"When alpha = 0."},
        ]}
        trap={<>(b) misreads the paper&apos;s guarantee.</>}
        lens={<>Exploration-feasibility tension is intrinsic. The paper bounds CUMULATIVE violation, not per-step. Regulators must accept a slack budget or you can&apos;t run any bandit.</>}
        stretch={<>How would you communicate the slack budget to a regulator?</>}
      />

      {/* axis: F5 — community-named follow-up: constrained-bandit literature critiques MOCB's slow tau-shift response */}
      <VIS.TrapProblem
        id="mocb-f5"
        difficulty="hard"
        title="F5 — Community-found weakness"
        scenario={<>Constrained-bandit literature (post-2023) critiques MOCB-style dual ascent for one specific weakness when constraints THEMSELVES drift (e.g. regulator raises the floor mid-quarter). What&apos;s the weakness, and what kind of follow-up addresses it?</>}
        options={[
          {key:"a", text:"Dual ascent assumes the constraint threshold tau is fixed. When tau drifts (regulator raises floor from 20% to 25%), the dual variable needs to fully re-converge — which is slow because dual ascent is a single-rate gradient method. Follow-ups (e.g. predictive dual updates, meta-learned eta schedules) anticipate tau drift and pre-warm the dual.", correct:true},
          {key:"b", text:"MOCB cannot handle drifting context — only constraint drift."},
          {key:"c", text:"Dual ascent is mathematically wrong."},
          {key:"d", text:"There are no such follow-ups."},
        ]}
        trap={<>(d) confidently denies the literature.</>}
        lens={<>Drifting tau is the under-discussed weakness. Stationary tau assumption is buried in the proof. Follow-ups attack this directly.</>}
        stretch={<>How would you detect tau drift before it bites you?</>}
      />

      {/* axis: F6 — second F-axis: regret-violation tradeoff under different eta */}
      <VIS.TrapProblem
        id="mocb-f6"
        difficulty="hard"
        title="F6 — Regret vs violation tradeoff"
        scenario={<>You can spend an extra factor-2 in regret to halve cumulative constraint violation, or vice versa. Which knob trades these?</>}
        options={[
          {key:"a", text:"The dual step size eta. Larger eta → dual reacts faster → less cumulative violation but more regret (over-reactive scalarization hurts CTR). Smaller eta → slower violation correction but cleaner regret. This trade is the headline result of constrained-bandit analysis and the operational knob.", correct:true},
          {key:"b", text:"The exploration alpha."},
          {key:"c", text:"The ridge regularizer."},
          {key:"d", text:"The catalog size."},
        ]}
        trap={<>(b), (c), (d) are unrelated knobs.</>}
        lens={<>Eta is the regret-violation control. Tune by the relative business cost of the two.</>}
        stretch={<>How do you set eta given your team&apos;s SLA on cumulative violation?</>}
      />

    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li>
          <a href="https://www.nature.com/articles/s41598-025-89920-2" target="_blank" rel="noopener"><strong>Multi-objective contextual bandits in recommendation systems for smart tourism</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, Sci Reports 2025)</span>
          <br/>Primary source. Read §3 (vector reward formalization), §4 (adaptive-weight dual ascent), §5 (regret + cumulative-violation bounds).
        </li>
        <li>
          <a href="https://arxiv.org/abs/1003.0146" target="_blank" rel="noopener"><strong>Li et al. — A Contextual-Bandit Approach to Personalized News Article Recommendation (LinUCB)</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, WWW 2010)</span>
          <br/>The scalar baseline MOCB extends. Read for ridge update, UCB bonus, alpha tuning conventions.
        </li>
        <li>
          <a href="https://arxiv.org/abs/1706.06969" target="_blank" rel="noopener"><strong>Agrawal &amp; Devanur — Linear Contextual Bandits with Knapsacks (OPLB family)</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, NeurIPS 2016)</span>
          <br/>The constrained-bandit lineage MOCB sits in. Read for the dual-ascent regret-violation tradeoff that MOCB inherits.
        </li>
        <li>
          <a href="https://tor-lattimore.com/downloads/book/book.pdf" target="_blank" rel="noopener"><strong>Lattimore &amp; Szepesv&aacute;ri — Bandit Algorithms</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(textbook, free PDF)</span>
          <br/>Chapter on constrained bandits. Gold-standard derivations.
        </li>
        <li>
          <a href="https://arxiv.org/abs/2003.06467" target="_blank" rel="noopener"><strong>Mehrotra et al. — Fairness-aware recommendation</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper)</span>
          <br/>Broader fairness-floor landscape. Where MOCB&apos;s constraint-as-floor framing comes from.
        </li>
        <li>
          <a href="https://eugeneyan.com/writing/system-design-for-discovery/" target="_blank" rel="noopener"><strong>Eugene Yan — System Design for Discovery</strong></a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(blog)</span>
          <br/>Practitioner perspective on where multi-objective tradeoffs actually bite in production.
        </li>
      </ul>
    </VIS.Section>
  </main>
);
ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
  <script>
    window.addEventListener("error", function (e) {
      const pre = document.createElement("pre");
      pre.style.cssText = "position:fixed;top:0;left:0;right:0;max-height:35vh;"
        + "overflow:auto;background:#fee2e2;color:#7f1d1d;padding:8px;"
        + "margin:0;font:12px/1.4 monospace;z-index:10002;";
      pre.textContent = "[visualize] " + (e.error?.stack || e.message || e);
      document.body.appendChild(pre);
    }, true);
  </script>
