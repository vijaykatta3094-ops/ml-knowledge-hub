      if (matchStart > lastIdx) out.push(text.slice(lastIdx, matchStart));
      // Emit wrapped term (first-mention only)
      if (seen.has(term.toLowerCase())) {
        out.push(text.slice(matchStart, matchEnd));
      } else {
        seen.add(term.toLowerCase());
        out.push(h("span", {
          key: matchStart,
          className: "vis-term",
          "data-rv-info": _glossLookup[term],
          "aria-label": _glossLookup[term],
          tabIndex: 0,
        }, term));
      }
      lastIdx = matchEnd;
    }
    if (lastIdx < text.length) out.push(text.slice(lastIdx));
    return out.length === 1 ? out[0] : out;
  }

  // Standalone hover tooltip for <VIS.Term>. If the report-viewer overlay
  // is loaded it already shows tooltips for any [data-rv-info] element, so
  // we short-circuit here to avoid double-rendering.
  (function installTermTooltip() {
    let tip = null;
    function show(el) {
      if (window.__rvReady) return;  // overlay.js owns the tooltip in report-viewer mode
      const text = el.getAttribute("data-rv-info");
      if (!text) return;
      if (!tip) {
        tip = document.createElement("div");
        tip.className = "vis-term-tip";
        document.body.appendChild(tip);
      }
      tip.textContent = text;
      const r = el.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const pad = 8;
      let left = Math.max(pad,
        Math.min(r.left, window.innerWidth - tr.width - pad));
      const above = r.top - tr.height - pad;
      const below = r.bottom + pad;
      tip.style.left = left + "px";
      tip.style.top  = (above >= pad ? above : below) + "px";
      tip.style.display = "block";
    }
    function hide() { if (tip) tip.style.display = "none"; }
    document.addEventListener("mouseover", (e) => {
      const el = e.target.closest && e.target.closest("[data-rv-info]");
      if (el) show(el); else hide();
    });
    document.addEventListener("focusin", (e) => {
      const el = e.target.closest && e.target.closest("[data-rv-info]");
      if (el) show(el);
    });
    document.addEventListener("focusout", hide);
    document.addEventListener("scroll", hide, true);
    // Touch / tap support: on a tap, toggle the tip for the tapped term.
    // Tapping anywhere else (including a different term) hides the current.
    let lastTappedTerm = null;
    document.addEventListener("click", (e) => {
      const el = e.target.closest && e.target.closest("[data-rv-info]");
      if (el) {
        if (el === lastTappedTerm) { lastTappedTerm = null; hide(); }
        else { lastTappedTerm = el; show(el); }
      } else {
        lastTappedTerm = null; hide();
      }
    });
  })();

  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."
  //   scenario={<>...JSX...</>}
  //   diagram={<VIS.Mermaid chart={...} />}
  //   options={[
  //     {key:"a", text:"...", correct:false},
  //     {key:"b", text:"...", correct:true},
  //     ...
  //   ]}
  //   trap={<>The most tempting wrong is X because...</>}
  //   lens={<>The right answer + reasoning</>}
  //   stretch="optional follow-up question"
  // />
  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          // NO autoGloss here. Glossing terms inside option text leaks the
          // answer mechanism via hover. Authors must keep options self-contained;
          // a candidate who needs a definition can scroll up to the prose where
          // the term is explicitly wrapped via <VIS.Term>.
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// SGL — Self-supervised Graph Learning for Recommendation (Wu et al., SIGIR 2021)
// v2 redo — 30+ trap problems anchored on SGL's edge/node-dropout-augmented InfoNCE on the user-item bipartite graph.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="RecSys SOTA · Self-supervised / Contrastive"
      title="SGL — Self-supervised Graph Learning"
      subtitle={<>Two stochastically-augmented views of the user-item <VIS.Term def="A graph with two disjoint node sets (users, items) where edges only connect across sets — the standard data structure for collaborative-filtering recsys.">bipartite graph</VIS.Term>; <VIS.Term def="Contrastive loss: pulls positive (anchor, target) pairs together, pushes negatives apart, normalized over a batch of candidates.">InfoNCE</VIS.Term> pulls same-node pairs together and pushes other nodes apart — a regularizer that mostly helps the <VIS.Term def="The bulk of low-frequency items (or users) in a power-law-distributed catalog; collectively large but each item has few interactions.">long tail</VIS.Term>.</>}
      byline={[
        {label: "Paper", value: "Wu et al., SIGIR 2021"},
        {label: "Year", value: "2021 (cited through 2024-2025)"},
        {label: "Domain", value: "Graph contrastive recsys"},
      ]}/>

    <VIS.TLDR>
      SGL adds an <VIS.Term def="InfoNCE — a contrastive objective that maximizes a lower bound on mutual information between a positive pair against a batch of negatives.">InfoNCE</VIS.Term> regularizer to a <VIS.Term def="LightGCN — a stripped-down GCN for recsys that drops self-loops, transforms, and non-linearities; the dominant graph baseline.">LightGCN</VIS.Term> backbone. Generate two views of the user-item <VIS.Term def="A graph with two disjoint node sets (users, items) where edges only connect across sets.">bipartite graph</VIS.Term> via <strong><VIS.Term def="Drop each edge independently with probability p; perturbs the message-passing pathways without removing whole nodes.">edge dropout</VIS.Term></strong>/<VIS.Term def="Remove a node and all its edges with probability p; a coarser augmentation than edge drop.">node dropout</VIS.Term>; positive pair = same node across views; negatives = other nodes in the batch. The <VIS.Term def="A training signal that uses a positive (true) example alongside many negatives, so the model must rank the positive above the rest.">contrastive</VIS.Term> term forces each node to be robust to dropped neighbors, breaking the <VIS.Term def="Recommenders over-recommend already-popular items because they have more training signal, starving the long tail.">popularity bias</VIS.Term> shortcut. Gains scale with graph <em><VIS.Term def="Property that interactions are concentrated on a small subset of items/users; most of the bipartite graph is empty.">sparsity</VIS.Term></em>. Source: <a href="https://dl.acm.org/doi/10.1145/3404835.3462862" target="_blank" rel="noopener">SIGIR 2021</a>.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="Beat 1 — What it is">
      <p>
        Take the user-item interaction graph G. Apply <VIS.Term def="Drawn at random each step from a distribution; here, which edges/nodes get dropped is resampled per forward pass.">stochastic</VIS.Term> <strong>edge dropout</strong> (drop each edge <VIS.Term def="Independent and identically distributed — each edge is dropped independently with the same probability.">i.i.d.</VIS.Term> with prob p) or <strong>node dropout</strong> twice independently to get two augmented graphs G₁ and G₂. Push both through a <em>shared</em> <VIS.Term def="LightGCN — a stripped-down GCN for recsys that drops self-loops, transforms, and non-linearities; the dominant graph baseline.">LightGCN</VIS.Term> encoder to get two <VIS.Term def="Learned dense vectors representing each user/item; the geometry of these vectors is what scoring and retrieval consume.">embedding</VIS.Term> sets. For each node, its embedding in G₁ and its embedding in G₂ form a positive pair; embeddings of other nodes in the batch are negatives.
      </p>
      <p>
        Total loss: <code>L = L_BPR + λ · L_InfoNCE</code>. The <VIS.Term def="Bayesian Personalized Ranking — the standard pairwise recsys loss that pushes positive (user, item) scores above sampled negatives.">BPR</VIS.Term> term is the regular supervised ranking signal; the InfoNCE term <VIS.Term def="An auxiliary loss term that constrains the model's solution space (e.g., to be smoother or invariant), reducing overfitting.">regularizes</VIS.Term> the embedding geometry.
      </p>
      <VIS.Mermaid chart={`
flowchart TB
  G["User-item graph G"]
  G --> A1["Edge drop p (view 1)"]
  G --> A2["Edge drop p (view 2)"]
  A1 --> E1["LightGCN encoder"]
  A2 --> E2["LightGCN encoder"]
  E1 --> CL["InfoNCE: same-node positive"]
  E2 --> CL
  G --> BPR["BPR on full graph"]
  CL --> L["L = L_BPR + lambda * L_InfoNCE"]
  BPR --> L
  style CL fill:#fef3c7,stroke:#d97706,stroke-width:2px
      `} />
    </VIS.Section>

    <VIS.Section id="sec-diff" title="Beat 2 — How it differs from LightGCN, NCL, SimGCL, and supervised contrastive">
      <p>
        <strong>LightGCN.</strong> No augmentation, no contrastive loss. Popularity dominates because BPR's <VIS.Term def="Train the model to score observed (positive) items above a sub-sample of random non-observed (negative) items; avoids full softmax.">negatives</VIS.Term> are usually obscure items the user never saw — the gradient says "popular &gt; obscure" rather than "preferred &gt; not-preferred."
      </p>
      <p>
        <strong>SGL (this paper).</strong> Adds InfoNCE under stochastic <VIS.Term def="Synthetic transformations of training data (here, dropped edges/nodes) that produce views the model is forced to treat as equivalent.">augmentation</VIS.Term>. Long-tail items get more representation room because each node must reconstruct itself from a partially-deleted neighborhood — popular nodes can no longer hog all the signal.
      </p>
      <p>
        <strong>NCL / SimGCL (follow-ups).</strong> Augment in <em>embedding space</em> (<VIS.Term def="Noise drawn from a normal distribution N(0, σ²) added to embeddings; preserves direction in expectation but perturbs magnitude.">Gaussian noise</VIS.Term> on the embedding) instead of structure space (edge drop). Cheaper (no second graph pass), but loses the structural insight SGL targets.
      </p>
      <p>
        <strong>Supervised contrastive recsys.</strong> Positives = label-validated co-interactions, not augmentations. Solves a different problem (sharpening the <VIS.Term def="The boundary in embedding space that separates relevant from irrelevant items for a given user/query.">decision boundary</VIS.Term> at full label cost).
      </p>
    </VIS.Section>

    <VIS.Section id="sec-when" title="Beat 3 — When to pick SGL">
      <p>
        Pick SGL when (a) you're already on LightGCN/<VIS.Term def="Neural Graph Collaborative Filtering — pre-LightGCN graph recsys that kept transforms and non-linearities; superseded by LightGCN's minimalism.">NGCF</VIS.Term>, (b) your interaction graph is <strong>sparse</strong> (high <VIS.Term def="Gini coefficient — measure of inequality on [0,1]; 0 = uniform, 1 = totally concentrated. Applied to node degrees, flags long-tail-heavy graphs.">Gini</VIS.Term> on <VIS.Term def="Number of edges incident to a node; on the user-item graph, a user's degree is how many items they've interacted with.">degree</VIS.Term>, long-tail-heavy), (c) you can afford 2× <VIS.Term def="One pass through the network that computes activations and the loss; backward then computes gradients. SGL does two forward passes per step (one per augmented view).">forward pass</VIS.Term>es per step. The gain-vs-density curve is steep — measure your graph's degree distribution before estimating SGL's lift.
      </p>
      <VIS.Mermaid chart={`
flowchart TB
  D["LightGCN baseline"]
  D --> Q1{"Graph sparse / long-tail?"}
  Q1 -->|No| LGCN["Stay on LightGCN"]
  Q1 -->|Yes| Q2{"2x compute budget?"}
  Q2 -->|No| SimGCL["Try SimGCL (cheaper)"]
  Q2 -->|Yes| SGL["SGL"]
  style LGCN fill:#fee2e2,stroke:#dc2626
  style SGL fill:#dcfce7,stroke:#16a34a
      `} />
    </VIS.Section>

    <VIS.Section id="sec-gotchas" title="Beat 4 — Limitations & gotchas">
      <VIS.Callout kind="gotcha" title="Dropout strength is a knob, not a free win">
        Too little (p &lt; 0.05): the two views are nearly identical → InfoNCE <VIS.Term def="A loss collapses when its inputs become indistinguishable — here, positives ≈ negatives means the gradient signal vanishes.">degenerates</VIS.Term> (positives ≈ negatives at <VIS.Term def="The gap an InfoNCE/hinge loss tries to enforce between the positive score and the negatives; too small ≈ no learning signal.">margin</VIS.Term>). Too much (p &gt; 0.4): signal destroyed → positives drift apart faster than negatives. Sweet spot p ≈ 0.1–0.3.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="Gains shrink on dense domains">
        On dense graphs (every user ~200+ items), LightGCN already gets enough signal; SGL's regularization adds little.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="2× compute per step">
        Two augmented forward passes per batch. <VIS.Term def="Samples processed per unit time; SGL's two forward passes halve it vs LightGCN at the same batch size.">Throughput</VIS.Term> drops; tune batch size or use <VIS.Term def="SimGCL (Yu et al., SIGIR 2022) — follow-up to SGL that replaces structural edge dropout with Gaussian noise on embeddings, skipping the 2× forward pass.">SimGCL</VIS.Term>.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        30+ problems on SGL's <VIS.Term def="Augmentation that modifies the graph topology (edges/nodes) rather than the embedding values; injects a graph-aware prior into contrastive learning.">structural-augmentation</VIS.Term> contrastive design. <VIS.Term def="Replace a method name with a placeholder ('Model X') and re-read the answer — if the right option still survives as 'correct', the question wasn't actually about that method.">Redact</VIS.Term> "SGL" → "Model X" and the right answer should NOT survive.
      </p>

      <h3 style={{marginTop:24, color:"#1f3a5f"}}>A. Identity &amp; comparison</h3>

      <VIS.TrapProblem id="sgl-a1" difficulty="hard"
        title="A1 — SGL vs SimGCL: same family, opposite choice"
        scenario={<>Both are graph contrastive. The discriminator?</>}
        options={[
          {key:"a", text:"SGL augments in STRUCTURE space (edge/node dropout on the bipartite graph, requires a second forward pass per view); SimGCL augments in EMBEDDING space (Gaussian noise on the embedding, free of a second pass). The trade-off is: structure augmentation respects graph semantics but costs 2× compute; embedding noise is cheaper but injects domain-agnostic perturbation.", correct:true},
          {key:"b", text:"SGL uses InfoNCE; SimGCL doesn't."},
          {key:"c", text:"SimGCL is supervised; SGL is not."},
          {key:"d", text:"They are identical."},
        ]}
        trap={<>(b)/(c)/(d) all false — both use InfoNCE; both self-supervised.</>}
        lens={<>The augmentation operator is the discriminator. SGL bets that structural perturbation injects graph-semantic prior; SimGCL bets you can skip that and get most of the lift from noise.</>}
        stretch={<>If your graph has high homophily, which would you expect to win and why?</>}
      />

      <VIS.TrapProblem id="sgl-a2" difficulty="hard"
        title="A2 — SGL vs supervised contrastive recsys"
        scenario={<>What's the actual difference in positive-pair definition?</>}
        options={[
          {key:"a", text:"SGL: positives = same node across two AUGMENTED views (label-free, structure-based). Supervised contrastive: positives = nodes whose labels actually agree (e.g., users who bought the same item), label-based. The first regularizes geometry under structural perturbation; the second sharpens decision boundary with label signal.", correct:true},
          {key:"b", text:"Both use the same positives."},
          {key:"c", text:"SGL needs labels."},
          {key:"d", text:"Supervised contrastive doesn't use InfoNCE."},
        ]}
        trap={<>(b)/(c)/(d) misread.</>}
        lens={<>SGL is label-free — that's the whole 'self-supervised' part. Confusing it with supervised contrastive is the most common SGL misreading.</>}

      />

      <VIS.TrapProblem id="sgl-a3" difficulty="medium"
        title="A3 — Counterfactual: no SGL, what's the cost?"
        scenario={<>SGL didn't exist. To match its long-tail lift on sparse domains, you'd...</>}
        options={[
          {key:"a", text:"Heavy long-tail oversampling + popularity-aware negative sampling + careful loss reweighting; pays in tuning effort + risk of overcorrection toward rare items, and STILL doesn't approach SGL's smooth embedding geometry on long-tail nodes.", correct:true},
          {key:"b", text:"Just train LightGCN longer."},
          {key:"c", text:"Use a bigger model."},
          {key:"d", text:"Increase batch size."},
        ]}
        trap={<>(b)/(c)/(d) don't address the popularity-bias root cause.</>}
        lens={<>Without SGL, the gap is filled by sampling tricks + loss engineering, both of which are noisier than augmentation-based regularization.</>}
        stretch={<>What's the failure mode of pure long-tail oversampling?</>}
      />

      <VIS.TrapProblem id="sgl-a4" difficulty="hard"
        title="A4 — Composition: SGL + LightGCN"
        scenario={<>SGL paper actually uses LightGCN as its encoder. What changes when you swap LightGCN for a heavier encoder like NGCF?</>}
        multiSelect
        options={[
          {key:"a", text:"NGCF's added transforms and non-linearities introduce optimization noise that the InfoNCE term must now compete with — gains shrink vs the LightGCN+SGL baseline.", correct:true},
          {key:"b", text:"Edge dropout still helps but less, because NGCF's transforms already act as implicit regularizers.", correct:true},
          {key:"c", text:"InfoNCE no longer works with non-linearities."},
          {key:"d", text:"Augmentations become unnecessary."},

        trap={<>(c) is false; (d) overcorrects.</>}

      <VIS.TrapProblem id="sgl-a5" difficulty="hard"

        stretch={<>Is the threshold absolute or domain-dependent?</>}
      />

      <h3 style={{marginTop:32, color:"#1f3a5f"}}>B. Application</h3>

      <VIS.TrapProblem id="sgl-b1" difficulty="hard"
        title="B1 — Long-tail music catalog with 50M users, 10M tracks"
        scenario={<>Music streaming. 50M users, 10M tracks; ~90% of tracks have &lt;100 plays. Median user listens to ~30 tracks/month (sparse). Currently on LightGCN. Pick SGL, SimGCL, or BPR-only.</>}
        options={[
          {key:"a", text:"BPR-only — keep it simple."},
          {key:"b", text:"SGL — sparse, long-tail-heavy, LightGCN baseline — exactly the regime where edge-dropout-augmented InfoNCE breaks the popularity shortcut.", correct:true},
          {key:"c", text:"SimGCL — but only after measuring SGL's lift first."},
          {key:"d", text:"Doesn't matter; pick by cost."},

        trap={<>(a) under-fits long-tail. (c) is the cost-optimization variant but skips the validation. (d) ignores the obvious-fit case.</>}
        lens={<>Long-tail + sparse + LightGCN = the canonical SGL win condition.</>}
        stretch={<>If you can only do one A/B (SGL vs SimGCL), which goes first?</>}
      />

      <VIS.TrapProblem id="sgl-b2" difficulty="hard"
        title="B2 — 'Higher λ on InfoNCE always helps'"
        scenario={<>A staff engineer suggests increasing λ from 0.1 to 1.0 "to make the contrastive signal stronger." Why is this wrong?</>}
        options={[
          {key:"a", text:"At λ ≫ optimal, the InfoNCE term dominates BPR — the model optimizes for self-augmentation invariance rather than ranking quality. Embedding alignment improves; NDCG drops because BPR's ordering signal is now noise relative to the contrastive geometry.", correct:true},
          {key:"b", text:"λ doesn't affect training."},
          {key:"c", text:"Higher λ is always better."},
          {key:"d", text:"You need more data."},

        trap={<>(b)/(c)/(d) misread.</>}
        lens={<>InfoNCE is a regularizer, not the objective. The right λ keeps it dominated by BPR.</>}

      />

      <VIS.TrapProblem id="sgl-b3" difficulty="hard"
        title="B3 — Pitch SGL to a CTO (must require SGL mechanism)"
        scenario={<>Your CTO asks why SGL over a free LightGCN. Single sentence that <em>requires</em> understanding SGL's edge-dropout contrastive — fails if SGL were just "a bigger LightGCN."</>}
        options={[
          {key:"a", text:"'It's a more modern method.' (Generic — survives redaction.)"},
          {key:"b", text:"'SGL specifically breaks the popularity shortcut LightGCN inherits from BPR — by forcing each node to reconstruct itself from two stochastically-dropped neighborhoods, popular nodes can no longer dominate, which is why our long-tail recall improves measurably on the sparse slice while NDCG@10 holds.'", correct:true},
          {key:"c", text:"'Used at top tech companies.'"},
          {key:"d", text:"'+2% NDCG.'"},
        ]}
        trap={<>(a) survives redaction. (c) is hype. (d) is offline-only.</>}
        lens={<>The pitch must turn on SGL's specific augmentation→popularity-shortcut-broken mechanism. Drop that and any "more regularization" claim works.</>}
        stretch={<>If you can't show long-tail-recall gain, what do you ask for in 30 days?</>}
      />

      <VIS.TrapProblem id="sgl-b4" difficulty="hard"
        title="B4 — When NOT to use SGL"
        scenario={<>Dense in-house movie dataset: 100K users, 5K movies, every user rates 200+ movies. Pick SGL or LightGCN.</>}
        options={[
          {key:"a", text:"SGL — modern."},
          {key:"b", text:"LightGCN — at 200+ ratings/user, the popularity shortcut isn't there to break; SGL pays 2× compute for ~0.3% lift (paper Fig 4); not worth it.", correct:true},
          {key:"c", text:"Either."},
          {key:"d", text:"NGCF."},
        ]}
        trap={<>(a) is the modernization reflex.</>}
        lens={<>Dense data + LightGCN is fine. SGL targets sparsity. Read the gain-vs-density curve before adopting.</>}
        stretch={<>At what density would you re-open the SGL question?</>}
      />

      <h3 style={{marginTop:32, color:"#1f3a5f"}}>C. Mechanism</h3>

      <VIS.TrapProblem id="sgl-c1" difficulty="hard"
        title="C1 — Why edge dropout, not feature dropout?"
        scenario={<>Why does SGL use edge/node dropout on the GRAPH rather than feature dropout on the EMBEDDINGS?</>}
        options={[
          {key:"a", text:"Edge dropout perturbs the message-passing pathways — the same node ends up with a different aggregated neighborhood. Feature dropout on embeddings perturbs the representation but leaves the aggregation graph intact, so the model only learns to be robust to noisy features, not robust to missing neighbors (which is the popularity-shortcut failure SGL targets).", correct:true},
          {key:"b", text:"Edge dropout is faster."},
          {key:"c", text:"Feature dropout is incompatible with GCNs."},
          {key:"d", text:"They're equivalent."},
        ]}
        trap={<>(b)/(c)/(d) miss the mechanism.</>}
        lens={<>The augmentation must perturb the PATH along which signal flows. That's exactly what breaks popularity dependence: a popular node loses some edges, and must rely on what's left.</>}
        stretch={<>Why doesn't dropout INSIDE the GCN (e.g., on the message weights) work as well?</>}
      />

      <VIS.TrapProblem id="sgl-c2" difficulty="hard"
        title="C2 — Why InfoNCE specifically for SGL's bipartite graph?"
        scenario={<>SGL augments the user-item bipartite graph (node-drop / edge-drop) and pulls two views of the SAME node together. Why InfoNCE rather than triplet/margin loss for this objective?</>}
        options={[
          {key:"a", text:"On the bipartite graph, the 'hard negatives' are other popular items the user didn't click — they're already mixed into any random batch. InfoNCE's softmax-over-batch turns every other node in the batch into an implicit negative, so the popular-item shortcut (just predict head items) is penalized in every step. Triplet loss compares one negative at a time and needs an explicit miner; on a bipartite graph with skewed degrees the miner keeps re-picking the same popular items, so the popularity shortcut survives.", correct:true},
          {key:"b", text:"InfoNCE is faster on GPU."},
          {key:"c", text:"Triplet loss doesn't work on graphs."},
          {key:"d", text:"They are equivalent up to constants."},
        ]}
        trap={<>(b) is a side effect. (c)/(d) are false.</>}
        lens={<>SGL's whole point is breaking the popularity shortcut via structural augmentation. InfoNCE compounds that: large batches on the user-item graph contain popular items as automatic negatives, so the loss directly punishes "predict popular." A triplet miner re-introduces the bias it's supposed to remove.</>}
        stretch={<>What happens if batch size drops to 64 on a long-tail catalog? Which loss degrades faster?</>}
      />

      <VIS.TrapProblem id="sgl-c3" difficulty="hard"
        title="C3 — What SGL drops vs supervised contrastive"
        scenario={<>SGL is self-supervised. What does it deliberately give up that supervised contrastive has?</>}
        multiSelect
        options={[
          {key:"a", text:"Label-validated positive pairs — SGL's positives are augmentation-derived, which may not match user preference structure.", correct:true},
          {key:"b", text:"BPR loss — preserved.", correct:false},
          {key:"c", text:"Graph encoder — preserved.", correct:false},
          {key:"d", text:"Sharpened class boundary at full label cost — supervised contrastive has it; SGL doesn't.", correct:true},
        ]}
        trap={<>(b)/(c) NOT dropped.</>}
        lens={<>SGL trades label signal for cheap regularization. Supervised contrastive trades regularization for label-bound sharpness. Different bets.</>}
        stretch={<>When does the label-cost saving become a liability?</>}
      />

      <VIS.TrapProblem id="sgl-c4" difficulty="hard"
        mode="ordered"
        title="C4 — Rank SGL hyperparams by production impact"
        scenario={<>Rank: (a) λ (InfoNCE weight), (b) p (dropout rate), (c) τ (InfoNCE temperature), (d) batch size. Top = most catastrophic if mis-set.</>}
        options={[
          {key:"a", text:"p (dropout rate — too low collapses positives≈negatives; too high destroys signal).", order:1},
          {key:"b", text:"τ (temperature — wrong τ flattens or sharpens too much; recall collapses).", order:2},
          {key:"c", text:"λ (mis-balances BPR vs InfoNCE).", order:3},
          {key:"d", text:"Batch size — large is generally better for InfoNCE."},
        ]}
        trap={<>Many candidates rank λ first because it's the loss weight; in practice p dominates because it controls the augmentation operator entirely.</>}
        lens={<>Augmentation strength is the load-bearing knob. λ matters only after p and τ are correct.</>}
        stretch={<>Which of these can you A/B-test cheaply?</>}
      />

      <VIS.TrapProblem id="sgl-c5" difficulty="hard"
        title="C5 — Data assumption: dense bipartite"
        scenario={<>You apply SGL to a graph where every user has &gt;500 items. What breaks first?</>}
        options={[
          {key:"a", text:"Edge dropout at p≈0.1 removes a small fraction of edges from a thick neighborhood — both augmented views look essentially identical to LightGCN, the contrastive term degenerates (positives barely differ from baseline), and the 2× compute buys ~0% lift.", correct:true},
          {key:"b", text:"GPU OOM."},
          {key:"c", text:"BPR breaks."},
          {key:"d", text:"Cold-start improves."},
        ]}
        trap={<>(b)/(c)/(d) are non-explanations.</>}
        lens={<>Dense graphs are robust to edge dropout. The augmentation has nothing to give.</>}
        stretch={<>At what dropout rate does dense-graph SGL start helping?</>}
      />

      <VIS.TrapProblem id="sgl-c6" difficulty="hard"
        title="C6 — Why share the encoder across the two views?"
        scenario={<>Why does SGL use a SHARED LightGCN for both augmented views, not two separate encoders?</>}
        options={[
          {key:"a", text:"InfoNCE's positive pair is 'same node across views' — for the pair to be meaningful, both embeddings must come from the SAME parameterization, otherwise the contrastive objective collapses to 'these two encoders should agree' rather than 'the encoder should be augmentation-invariant.' Two separate encoders would be a different loss entirely.", correct:true},
          {key:"b", text:"Saves GPU memory."},
          {key:"c", text:"Two encoders is more compute."},
          {key:"d", text:"They are equivalent."},
        ]}
        trap={<>(b)/(c) are side effects.</>}
        lens={<>Shared encoder is the conceptual core: SGL teaches ONE function to be robust to augmentation. Two encoders teach two functions to agree — a fundamentally different goal.</>}
        stretch={<>What if you slightly perturbed one encoder? When does that become useful?</>}
      />

      <VIS.TrapProblem id="sgl-c7" difficulty="hard"
        title="C7 — Node dropout vs edge dropout in SGL"
        scenario={<>The paper studies three augmentation operators: edge drop, node drop, random walk. Which empirically wins on long-tail surfaces, and why?</>}
        options={[
          {key:"a", text:"Edge dropout wins on most domains (Yelp2018, Amazon) because node dropout occasionally removes high-degree nodes wholesale — over-perturbing the graph topology. Edge drop perturbs more uniformly. Random walk underperforms because it adds structured bias that fights the augmentation-invariance goal.", correct:true},
          {key:"b", text:"Node dropout is always best."},
          {key:"c", text:"All three are equivalent."},
          {key:"d", text:"Random walk wins on sparse graphs."},
        ]}
        trap={<>(b)/(c)/(d) misread the paper.</>}
        lens={<>Augmentation must be (i) graph-aware and (ii) low-variance. Edge dropout satisfies both. Node dropout is too coarse; random walk introduces bias.</>}
        stretch={<>Could you mix edge + node dropout? When?</>}
      />

      <h3 style={{marginTop:32, color:"#1f3a5f"}}>D. Intuition traps</h3>

      <VIS.TrapProblem id="sgl-d1" difficulty="hard"
        title="D1 — 'Contrastive learning is always better than supervised'"
        scenario={<>The intuition "self-supervised contrastive scales better than supervised" is correct for vision. Why does it fail when applied naively to SGL on dense recsys data?</>}
        options={[
          {key:"a", text:"SGL's contrastive signal is REGULARIZATION on top of BPR, not a replacement. On dense data, BPR already has enough label signal; adding InfoNCE adds noise that the supervised loss must overcome. The 'contrastive scales' story applies when supervised data is the bottleneck — exactly the OPPOSITE of dense recsys.", correct:true},
          {key:"b", text:"InfoNCE doesn't work on graphs."},
          {key:"c", text:"Supervised is always better."},
          {key:"d", text:"More data always helps."},
        ]}
        trap={<>(b)/(c)/(d) are over-generalizations.</>}
        lens={<>SGL is a sparsity-regime intervention. The contrastive-scales story is a different regime.</>}
        stretch={<>Could you make SGL the primary loss and BPR the regularizer? What changes?</>}
      />

      <VIS.TrapProblem id="sgl-d2" difficulty="hard"
        title="D2 — Cascade: 'SGL is just dropout + LightGCN'"
        scenario={<>Tech lead assumes "SGL is LightGCN + dropout, more or less." List the wrong consequences.</>}
        multiSelect
        options={[
          {key:"a", text:"Assumes dropout alone gives the lift → wrong: dropout without InfoNCE doesn't beat baseline on long tail. The two pieces are joint.", correct:true},
          {key:"b", text:"Assumes you can apply dropout to weights instead of edges → wrong: the contrastive positive pair is defined over GRAPH structure, not weight perturbation.", correct:true},
          {key:"c", text:"Assumes BPR is dropped → wrong: BPR is preserved as the main supervised signal.", correct:true},
          {key:"d", text:"Assumes hyperparameters carry over from LightGCN → fine, mostly true."},
        ]}
        trap={<>(d) is the unchanged piece — useful for showing you read the paper.</>}
        lens={<>'Dropout + LightGCN' miscounts what makes SGL work. The contrastive pair definition and the augmentation operator are both load-bearing.</>}
        stretch={<>What's the smallest change that converts LightGCN+dropout into SGL?</>}
      />

      <VIS.TrapProblem id="sgl-d3" difficulty="hard"
        title="D3 — Junior: 'add more data.' Senior: ?"
        scenario={<>SGL regresses on dense surface during shadow scoring. Junior: 'train on 2× more data.' Senior: 'tune p or switch to SimGCL.' Why is the senior right?</>}
        options={[
          {key:"a", text:"On dense data, the bottleneck is NOT data volume; LightGCN already converges with full label signal. SGL's contrastive term is adding regularization the model doesn't need — fix it by tuning down (low p, low λ) or switch to the cheaper SimGCL that doesn't pay the 2× cost.", correct:true},
          {key:"b", text:"More data always helps."},
          {key:"c", text:"Senior is wrong."},
          {key:"d", text:"SimGCL is unrelated."},
        ]}
        trap={<>(b)/(c)/(d) misread.</>}
        lens={<>Data scaling helps when label signal is the bottleneck. On dense recsys, geometry is the bottleneck, and SGL's specific intervention may be too strong.</>}
        stretch={<>When would the junior actually be right?</>}
      />

      <VIS.TrapProblem id="sgl-d4" difficulty="hard"
        title="D4 — Long-tail recall up, NDCG@10 flat — diagnose"
        scenario={<>SGL ships. Long-tail recall +3%, NDCG@10 flat, latency +20%. Why?</>}
        options={[
          {key:"a", text:"SGL's contrastive term smooths embeddings of long-tail nodes (recall ↑) but NDCG@10 is dominated by head-of-distribution rankings where LightGCN already does well — the regularizer doesn't move head ranking. Latency rises 20% from the 2× forward pass. Net: trade a real tail lift for compute, no head loss.", correct:true},
          {key:"b", text:"Random noise."},
          {key:"c", text:"GPU throttling."},
          {key:"d", text:"Calibration drift."},
        ]}
        trap={<>(b)/(c)/(d) are not the mechanism.</>}
        lens={<>SGL's signature: tail up, head flat, compute up. If you don't care about tail, SGL isn't worth the compute.</>}
        stretch={<>Which surfaces care about tail recall enough to pay 20% latency?</>}
      />

      <h3 style={{marginTop:32, color:"#1f3a5f"}}>E. Operations</h3>

      <VIS.TrapProblem id="sgl-e1" difficulty="hard"
        title="E1 — Augmentation done at training, not serving"
        scenario={<>At serving, do you augment the graph?</>}
        options={[
          {key:"a", text:"No. Augmentation is a TRAINING-time regularizer. At serving, you use the FULL graph + the trained encoder. Augmenting at serving would inject noise into a deterministic prediction — defeating the regularization's purpose.", correct:true},
          {key:"b", text:"Yes, with smaller p."},
          {key:"c", text:"Yes, average over multiple augmented views."},
          {key:"d", text:"It's a hyperparameter."},
        ]}
        trap={<>(b)/(c)/(d) confuse train-time augmentation with test-time augmentation; SGL is about regularization, not TTA.</>}
        lens={<>SGL is NOT a test-time-augmentation method. The whole point is that the encoder has internalized robustness during training.</>}
        stretch={<>Could TTA help SGL? When?</>}
      />

      <VIS.TrapProblem id="sgl-e2" difficulty="hard"
        title="E2 — Friday: long-tail recall up but auction revenue down"
        scenario={<>SGL ships. Long-tail recall +3%. Auction revenue down 0.8%. Why specifically SGL?</>}
        options={[
          {key:"a", text:"SGL re-allocates ranking room to long-tail items; in an auction the bid×CTR optimizer is calibrated for head-heavy ranking — shifting toward long-tail surfaces lower-bid creatives at the top, dropping revenue per impression. The fix is auction-aware re-calibration after SGL, not rolling back.", correct:true},
          {key:"b", text:"SGL randomly hurts revenue."},
          {key:"c", text:"GPU thermal."},
          {key:"d", text:"Friday-specific drift."},
        ]}
        trap={<>(b)/(c)/(d) red herrings.</>}
        lens={<>SGL changes the head/tail balance; downstream systems calibrated for old balance need updates.</>}
        stretch={<>What's the shadow test that catches this Tuesday?</>}
      />

      <VIS.TrapProblem id="sgl-e3" difficulty="hard"
        title="E3 — Reference-impl default that bites"
        scenario={<>OSS SGL implementations have a default that's wrong for many production surfaces. Which?</>}
        options={[
          {key:"a", text:"`drop_rate=0.1` — fine for the paper's sparse benchmarks but for sparser real-world graphs (very long-tail e-commerce) the optimal p is higher (0.2-0.3). Shipping at 0.1 silently leaves lift on the table.", correct:true},
          {key:"b", text:"`lambda=0.1` — paper recommends."},
          {key:"c", text:"`use_bf16=False`."},
          {key:"d", text:"`num_layers=3`."},
        ]}
        trap={<>(b)/(c)/(d) are real defaults but not the silent trap.</>}
        lens={<>p is the load-bearing knob; the default is calibrated for paper benchmarks, not production-sparsity.</>}
        stretch={<>How would you set p without grid-search?</>}
      />

      <VIS.TrapProblem id="sgl-e4" difficulty="hard"
        mode="ordered"
        title="E4 — Order the LightGCN → SGL migration phases"
        scenario={<>Phases: (a) shadow with SGL, (b) tune p+τ on shadow, (c) A/B at 5% on long-tail-recall watchdog, (d) full traffic. Top = first.</>}
        options={[
          {key:"a", text:"Shadow with SGL (default p, default τ).", order:1},
          {key:"b", text:"Tune p, τ on shadow long-tail-recall.", order:2},
          {key:"c", text:"A/B at 5% with long-tail-recall watchdog.", order:3},
          {key:"d", text:"Full traffic.", order:4},
          {key:"e", text:"Skip tuning, ramp directly."},
          {key:"f", text:"Retire LightGCN first."},
        ]}
        trap={<>Skipping the p/τ tuning is the common mistake — defaults won't match your sparsity.</>}
        lens={<>p tuning is the SGL-specific bit. Skipping it leaves lift on the table.</>}
        stretch={<>SLA at each ramp stage?</>}
      />

      <VIS.TrapProblem id="sgl-e5" difficulty="hard"
        title="E5 — Reproducing the paper's lift"
        scenario={<>Paper claims +5% NDCG on Yelp2018. Which experimental details matter most?</>}
        multiSelect
        options={[
          {key:"a", text:"Sparsity of Yelp2018 (it's a deliberately sparse benchmark; on denser ones the lift evaporates).", correct:true},
          {key:"b", text:"p in 0.1-0.3 range (outside this, gain disappears).", correct:true},
          {key:"c", text:"InfoNCE temperature τ ≈ 0.2 (paper-tuned).", correct:true},
          {key:"d", text:"Use a different LightGCN variant."},
          {key:"e", text:"Run on CPU."},
        ]}
        trap={<>(d)/(e) are not in the paper.</>}
        lens={<>SGL's gains are sensitive to (i) data sparsity, (ii) augmentation strength, (iii) temperature.</>}
        stretch={<>What's the minimum-viable check on your data?</>}
      />

      <VIS.TrapProblem id="sgl-e6" difficulty="hard"
        title="E6 — Public benchmarks hide a weakness"
        scenario={<>SGL beats LightGCN by +5% NDCG on Yelp2018. What about Yelp2018 hides a real-world weakness?</>}
        options={[
          {key:"a", text:"Yelp2018 was pre-filtered to drop users/items with fewer than 10 interactions — the EXTREME long tail isn't there. In production, the bottom 50% of items get <3 interactions and SGL's gains aren't as dramatic because there's no neighborhood TO drop edges from.", correct:true},
          {key:"b", text:"Yelp2018 includes synthetic data."},
          {key:"c", text:"Yelp2018 uses BPR."},
          {key:"d", text:"Yelp2018 is too small."},
        ]}
        trap={<>(b)/(c)/(d) misread.</>}
        lens={<>Public benchmarks pre-filter the extreme tail; SGL's reported lift may overestimate prod gains on the bottom decile.</>}
        stretch={<>How would you augment your eval with a 'real long-tail' slice?</>}
      />

      <h3 style={{marginTop:32, color:"#1f3a5f"}}>F. Failure modes</h3>

      <VIS.TrapProblem id="sgl-f1" difficulty="hard"
        title="F1 — Smallest input that breaks SGL's advantage"
        scenario={<>Construct the simplest input that makes SGL revert to LightGCN performance.</>}
        options={[
          {key:"a", text:"A bipartite graph where every user has the same fixed neighborhood (e.g., everyone rates every item) — edge dropout removes a random small subset, both views remain near-isomorphic, InfoNCE positives ≈ negatives, the contrastive term has no signal.", correct:true},
          {key:"b", text:"Empty graph."},
          {key:"c", text:"Random noise."},
          {key:"d", text:"Length-1B sequence."},
        ]}
        trap={<>(b)/(c)/(d) hurt every model.</>}
        lens={<>SGL depends on neighborhood DIVERSITY across users. Symmetric or saturated graphs leave nothing for the augmentation to do.</>}
        stretch={<>How would you detect symmetric graphs before training?</>}
      />

      <VIS.TrapProblem id="sgl-f2" difficulty="hard"
        title="F2 — Adversarial: super-popular spam item"
        scenario={<>Design adversarial input that degrades SGL but leaves LightGCN unaffected.</>}
        options={[
          {key:"a", text:"Inject a spam item connected to ALL users. Edge dropout at p=0.1 still leaves ~90% of those edges; the spam node always survives augmentation; InfoNCE positives concentrate on it; the encoder maps every user near the spam node. LightGCN-only is also hurt but doesn't compound the error through contrastive geometry.", correct:true},
          {key:"b", text:"Random noise."},
          {key:"c", text:"Empty."},
          {key:"d", text:"Length-1B."},
        ]}
        trap={<>(b)/(c)/(d) hurt every model.</>}
        lens={<>SGL's contrastive geometry can be poisoned by a single super-connected node. Mitigation: degree-aware dropout (drop popular edges more aggressively).</>}
        stretch={<>Sketch degree-aware edge dropout.</>}
      />

      <VIS.TrapProblem id="sgl-f3" difficulty="hard"
        title="F3 — Reverse engineering: long-tail recall up but pop-recall drops"
        scenario={<>You scale SGL training. Long-tail recall keeps climbing; popular-item recall starts to dip. Which SGL design choice is responsible?</>}
        options={[
          {key:"a", text:"The augmentation operator (edge dropout) is uniform over edges — proportionally MORE edges of popular nodes are dropped (because they have more). The contrastive loss compensates by spreading popular-node embedding mass — eventually 'over-de-popularizing' them. Fix: degree-aware dropout that drops edges INVERSELY to node degree.", correct:true},
          {key:"b", text:"LightGCN backbone."},
          {key:"c", text:"BPR loss."},
          {key:"d", text:"Layer count."},
        ]}
        trap={<>(b)/(c)/(d) are unchanged.</>}
        lens={<>SGL's augmentation has degree bias. Recognizing this is the on-ramp to SimGCL/degree-aware variants.</>}
        stretch={<>What loss-side fix would equalize popular vs tail without changing the augmentation?</>}
      />

      <VIS.TrapProblem id="sgl-f4" difficulty="hard"
        title="F4 — Paper-named failure"
        scenario={<>The SGL paper itself flags a regime where pure SGL underperforms. Which?</>}
        options={[
          {key:"a", text:"Dense interaction graphs — where LightGCN already has enough signal and SGL's 2× compute earns little.", correct:true},
          {key:"b", text:"Sparse engagement-loop."},
          {key:"c", text:"Large catalogs."},
          {key:"d", text:"GPU-rich infra."},
        ]}
        trap={<>(b)/(c)/(d) are where SGL wins, not where it loses.</>}
        lens={<>The paper is honest about the regime boundary.</>}
        stretch={<>How would you decide before training?</>}
      />

      <VIS.TrapProblem id="sgl-f5" difficulty="hard"
        title="F5 — Derive the follow-up (SimGCL) from SGL's open knobs"
        scenario={<>From SGL's mechanism alone, derive the obvious follow-up direction (which became SimGCL).</>}
        options={[
          {key:"a", text:"Replace structure-space augmentation (edge dropout) with EMBEDDING-space augmentation (Gaussian noise on the embedding). Eliminates the 2× forward pass cost; preserves the InfoNCE regularization. Trade-off: loses graph-aware perturbation prior.", correct:true},
          {key:"b", text:"Bigger LightGCN."},
          {key:"c", text:"Different loss."},
          {key:"d", text:"More data."},
        ]}
        trap={<>(b)/(c)/(d) aren't the natural follow-up.</>}
        lens={<>SGL's two costs (2× compute + graph-aware augmentation operator) suggest the follow-up: skip the second pass, add noise in embedding space. That's SimGCL.</>}
        stretch={<>When does SimGCL beat SGL?</>}
      />

      <VIS.TrapProblem id="sgl-f6" difficulty="hard"
        title="F6 — Privacy: contrastive gradient leakage"
        scenario={<>SGL's InfoNCE compares each node against batch negatives. Why is gradient-based privacy attack possibly easier on SGL than LightGCN?</>}
        options={[
          {key:"a", text:"InfoNCE's gradient w.r.t. a node embedding pushes it toward its positive and AWAY from the in-batch negatives — the gradient signal is more revealing about the node's identity (it directly encodes 'this node is NOT like nodes A, B, C'). LightGCN's BPR gradient is much more diffuse.", correct:true},
          {key:"b", text:"SGL uses more GPUs."},
          {key:"c", text:"LightGCN has built-in DP."},
          {key:"d", text:"No difference."},
        ]}
        trap={<>(b)/(c)/(d) are non-answers.</>}
        lens={<>Contrastive gradients are more informative per step → larger privacy budget consumed per epoch. DP-SGD on SGL needs tighter accounting.</>}
        stretch={<>Sketch DP-SGD on SGL specifically.</>}
      />

    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li>
          <a href="https://dl.acm.org/doi/10.1145/3404835.3462862" target="_blank" rel="noopener"><strong>Wu et al. — Self-supervised Graph Learning for Recommendation (SGL)</strong></a> (paper, SIGIR 2021)
          <br/>The original SGL paper. Read sections 3 (augmentation operators) and 4.3 (<VIS.Term def="Controlled experiment that removes one component of a model to measure its contribution; standard tool for attributing lift to specific mechanisms.">ablation</VIS.Term> on sparsity).
        </li>
        <li>
          <a href="https://arxiv.org/abs/2002.02126" target="_blank" rel="noopener"><strong>He et al. — LightGCN</strong></a> (paper, SIGIR 2020)
          <br/>The encoder SGL builds on. Understanding LightGCN's minimalism is key to seeing why SGL's contrastive layer slots in cleanly.
        </li>
        <li>
          <a href="https://arxiv.org/abs/2112.08679" target="_blank" rel="noopener"><strong>Yu et al. — Are Graph Augmentations Necessary? (SimGCL)</strong></a> (paper, SIGIR 2022)
          <br/>The follow-up. Replaces structural augmentation with embedding-space noise — strong <VIS.Term def="A reference model that any new method must beat to justify itself; here, SimGCL is the cheap-but-strong alternative to SGL.">baseline</VIS.Term>; understanding the contrast clarifies SGL's design choice.
        </li>
        <li>
          <a href="https://arxiv.org/abs/2002.05709" target="_blank" rel="noopener"><strong>Chen et al. — SimCLR</strong></a> (paper, ICML 2020)
          <br/>Original InfoNCE-on-augmented-views formulation in vision. SGL is the recsys <VIS.Term def="A direct port of an idea from one domain (vision) to another (graph recsys); SGL is SimCLR's recipe applied to user-item graphs.">analogue</VIS.Term>.
        </li>
        <li>
          <a href="https://dl.acm.org/doi/10.1145/3746280" target="_blank" rel="noopener"><strong>Survey on SSL for Recommendation</strong></a> (ACM CSUR 2025, HKU DS Lab)
          <br/>Where SGL sits in the broader <VIS.Term def="Self-supervised learning. Train on auxiliary objectives derived from the input itself (no human labels) — masked-token prediction, contrastive pairs, etc.">self-supervised</VIS.Term> recsys taxonomy. Compares against SimGCL, NCL, supervised contrastive variants.
        </li>
      </ul>
    </VIS.Section>
