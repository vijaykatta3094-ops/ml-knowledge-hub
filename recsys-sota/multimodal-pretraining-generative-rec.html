  // <VIS.Term def="1-2 sentence plain-English explanation">jargon</VIS.Term>
  //
  // Wraps any technical term so a non-technical reader can hover for an
  // immediate definition. The explanation should:
  //   - assume the reader knows English but not software/your domain
  //   - fit in 1-2 short sentences (a tooltip, not a paragraph)
  //   - avoid further jargon (or wrap that too)
  //
  // The element exposes `data-rv-info` so the report-viewer overlay reuses
  // its own tooltip + double-click "explain this" feedback flow. In
  // standalone /visualize mode (no overlay), the lightweight hover handler
  // below renders the tooltip directly.
  function Term({ def, children }) {
    if (!def) return h(React.Fragment, null, children);
    return h("span", {
      className: "vis-term",
      "data-rv-info": def,
      "aria-label": def,
      tabIndex: 0,
    }, children);
  }

  // Standalone hover tooltip for <VIS.Term>. If the report-viewer overlay
  // is loaded it already shows tooltips for any [data-rv-info] element, so
  // we short-circuit here to avoid double-rendering.
  (function installTermTooltip() {
    let tip = null;
    function show(el) {
      if (window.__rvReady) return;  // overlay.js owns the tooltip in report-viewer mode
      const text = el.getAttribute("data-rv-info");
      if (!text) return;
      if (!tip) {
        tip = document.createElement("div");
        tip.className = "vis-term-tip";
        document.body.appendChild(tip);
      }
      tip.textContent = text;
      const r = el.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const pad = 8;
      let left = Math.max(pad,
        Math.min(r.left, window.innerWidth - tr.width - pad));
      const above = r.top - tr.height - pad;
      const below = r.bottom + pad;
      tip.style.left = left + "px";
      tip.style.top  = (above >= pad ? above : below) + "px";
      tip.style.display = "block";
    }
    function hide() { if (tip) tip.style.display = "none"; }
    document.addEventListener("mouseover", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el); else hide();
    });
    document.addEventListener("focusin", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el);
    });
    document.addEventListener("focusout", hide);
    document.addEventListener("scroll", hide, true);
  })();

  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."
  //   scenario={<>...JSX...</>}
  //   diagram={<VIS.Mermaid chart={...} />}
  //   options={[
  //     {key:"a", text:"...", correct:false},
  //     {key:"b", text:"...", correct:true},
  //     ...
  //   ]}
  //   trap={<>The most tempting wrong is X because...</>}
  //   lens={<>The right answer + reasoning</>}
  //   stretch="optional follow-up question"
  // />
  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Multimodal Pretraining + Generative Rec.
// arXiv 2405.06927 (2024 survey + methods). Pretrains on multimodal item content with
// BOTH contrastive (alignment) AND generative (LM/MLM) losses, so one backbone supports
// retrieval, query rewriting, and natural-language explanation.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="RecSys SOTA · Multimodal generative rec"
      title="Multimodal Pretraining + Generative Rec"
      subtitle="One backbone pretrained with both contrastive (alignment) and generative (LM) losses on multimodal item content — supports retrieval, query rewriting, and explanation from the same weights."
      byline={[
        {label: "Source", value: "arXiv 2405.06927 (2024)"},
        {label: "Year", value: "2024"},
        {label: "Domain", value: "Multimodal + generative rec"},
      ]}/>

    <VIS.TLDR>
      Contrastive-only pretraining (think <VIS.Term def="A vision-language model trained with a symmetric contrastive loss: pull paired (image, caption) embeddings together, push unpaired apart. Produces strong alignment but no generation head.">CLIP/SigLIP</VIS.Term>) gives strong retrieval but cannot emit text. Generative-only pretraining (caption / next-token LM) produces fluent text but its CLS-like pooled representation is weaker for nearest-neighbour search. <strong>Joint contrastive + generative pretraining</strong> on multimodal item catalog content keeps both abilities in one backbone — useful when the same system must <em>retrieve</em> candidate items <em>and</em> rewrite queries / generate explanations.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is">
      <p>
        Two losses, one backbone, shared multimodal tower.{" "}
        <VIS.Term def="A loss that pulls representations of matching pairs (image and its caption, item and its description) together, and pushes mismatched pairs apart. In recsys: encourages the item-content tower to align with the user/query tower.">Contrastive loss</VIS.Term>{" "}
        aligns paired multimodal views (item image ↔ item text, item ↔ user-context).{" "}
        <VIS.Term def="A loss where the model predicts the next token given previous tokens (causal LM) or masked tokens (MLM). In recsys: lets the same backbone generate queries, summaries, or explanations from item content.">Generative loss</VIS.Term>{" "}
        trains a decoder (or LM head) to produce captions, queries, or explanations from the same encoder. The encoder's representation is the candidate-generation key; the decoder is the query-rewriter / explainer.
      </p>
      <VIS.Mermaid chart={`
flowchart TB
  IMG["Item image"] --> ENC["Multimodal encoder"]
  TXT["Item title/desc"] --> ENC
  ENC --> POOL["Pooled embedding"]
  POOL --> CON["Contrastive loss (align)"]
  ENC --> DEC["Decoder / LM head"]
  DEC --> GEN["Generative loss (caption/query/explanation)"]
  POOL -.serve.-> RET["Retrieval (ANN)"]
  DEC -.serve.-> QR["Query rewrite / explanation"]
  style CON fill:#dbeafe,stroke:#1e40af,stroke-width:2px
  style GEN fill:#fef3c7,stroke:#d97706,stroke-width:2px
      `} />
      <p>
        Training mixes the two losses (a single weighted sum, or alternating mini-batches). At serving time the same checkpoint exposes two heads: pooled embedding for retrieval, decoder for text generation. The point is <em>parameter sharing</em>: knowledge learned about a product through contrastive alignment is available to the decoder when it has to write a one-line explanation, and vice versa.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How it differs from the baseline">
      <p>
        <strong>Contrastive-only baseline (CLIP-style).</strong> Excellent retrieval and zero-shot classification; <em>no</em> generation capability. To ship explanations you bolt on a separate LLM and pay the latency / cost / staleness of a two-system pipeline. The pooled embedding is also informationally lossy in the contrastive setup — items are pushed apart at the embedding level, so fine-grained details that matter for explanation get squeezed out.
      </p>
      <p>
        <strong>Generative-only baseline (caption-LM).</strong> Fluent text generation; the pooled representation is incidental to the LM objective and underperforms contrastive embeddings for nearest-neighbour retrieval at typical K. You can ship explanations, but ranking quality drops.
      </p>
      <p>
        <strong>The joint delta.</strong> One backbone, both abilities, shared knowledge. The contrastive loss <em>regularizes</em> the encoder away from collapsing into a pure language-modelling representation; the generative loss forces the encoder to retain enough item-content detail to be decodable. The shared embedding space carries the same item identity across retrieval AND explanation surfaces.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-when" title="When to pick it / where it wins">
      <p>
        Pick joint pretraining when (a) the surface needs <strong>both retrieval and explanation</strong> from the same item knowledge (e-commerce search with "why this result," shopping assistants, RAG-over-catalog, conversational rec), (b) you have rich multimodal item content (images, descriptions, attributes) to pretrain on, and (c) you'd rather ship one model than maintain two. Skip it when you only need retrieval (use contrastive-only — simpler, cheaper, often better at top-K) or only need generation (use a generative-only LM on item text).
      </p>
    </VIS.Section>

    <VIS.Section id="sec-gotchas" title="Limitations & gotchas">
      <p>
        Three persistent failures.{" "}
        <strong>Loss-weight sensitivity.</strong> The contrastive : generative weighting is the single most-load-bearing hyperparameter; tilt too far toward contrastive and the decoder collapses into low-perplexity but generic text; tilt toward generative and recall at top-K degrades. The textbook 1:1 weight is rarely optimal in practice.{" "}
        <strong>Multi-objective debugging is harder than either alone.</strong> When retrieval quality drops, is it a contrastive issue, a generative-loss interference issue, or a data-mixing issue? You lose the diagnostic clarity of a single-objective model.{" "}
        <strong>Hallucinated explanations.</strong> The decoder happily generates plausible-sounding but factually wrong attribute claims about items the contrastive head retrieved correctly — a UX disaster because the retrieval part looks right.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        Ten interview-grade scenarios on the discriminating signals of joint multimodal pretraining: when to pick it, how to debug loss-balance pathologies, and the failure modes that distinguish contrastive collapse from generative drift from hallucinated explanation. Mix of single-correct and multi-select.
      </p>

      <VIS.TrapProblem
        id="mmpg-p1"
        difficulty="hard"
        title="P1 — Why does contrastive-only struggle to generate?"
        scenario={<>Your team pretrained a CLIP-style image-text dual encoder on 200M item (image, title) pairs from your e-commerce catalog. Retrieval recall@100 is strong. Product asks you to bolt on a single-sentence "why we recommend this" surface. You try to use the pooled image embedding as the prefix for a frozen LLM and decode an explanation. Outputs are generic ("Great product, you might like it") and frequently contradict visible item attributes. The contrastive objective is well-tuned. What is the most fundamental reason a contrastive-only encoder is a poor generator?</>}
        options={[
          {key:"a", text:"The encoder is too small; scale it up and the explanations will be specific."},
          {key:"b", text:"The InfoNCE loss only requires that paired embeddings rank above unpaired ones at the embedding level; it does not require the embedding to be decodable back into item attributes. Fine-grained detail not needed for separation is squeezed out.", correct:true},
          {key:"c", text:"The LLM is frozen; unfreeze it and the outputs will be specific."},
          {key:"d", text:"You need a larger temperature in the contrastive softmax."},
        ]}
        trap={<>(a) is the lazy scale-cure. (c) helps marginally but does not fix the root cause — if the prefix embedding lacks the attribute information, the LLM cannot recover it. (d) is a knob change that does not address the representational issue.</>}
        lens={<>Contrastive losses optimize for <em>discriminability</em>, not <em>reconstructibility</em>. The encoder only needs to encode enough detail to separate items from one another, and frequently collapses to coarse attributes (category, dominant color) when finer detail does not aid separation in the batch. To generate specific text you need a generative loss in pretraining that forces the encoder to retain decodable detail — which is exactly the joint-pretraining motivation.</>}
        stretch={<>Could you fix this post-hoc by training a generation head with a frozen contrastive encoder? Why is the lift bounded?</>}
      />

      <VIS.TrapProblem
        id="mmpg-p2"
        difficulty="hard"
        multiSelect
        title="P2 — Loss-weight sweep: read the symptoms"
        scenario={<>Joint pretraining run. You sweep the contrastive : generative loss weight across 0.1, 1.0, 10. Symptoms: at weight 0.1, retrieval R@100 drops by roughly 6 points but generated explanations get markedly more specific. At weight 10, retrieval recovers but generated explanations regress to generic platitudes. At weight 1.0, both abilities are mediocre. Select all true statements.</>}
        options={[
          {key:"a", text:"At weight 10 the encoder is being pulled toward contrastive optimum; the decoder loses gradient signal and produces generic text.", correct:true},
          {key:"b", text:"At weight 0.1 the generative loss dominates and the encoder retains more decodable detail at the cost of discriminability for retrieval.", correct:true},
          {key:"c", text:"The 1.0 default is provably optimal — keep it and tune downstream."},
          {key:"d", text:"Loss-weight scheduling (warm up generative first, anneal to joint) is a reasonable next experiment.", correct:true},
          {key:"e", text:"Switching to a single objective would make debugging easier, but trading away one of the abilities."},
        ]}
        trap={<>(c) is the textbook default that the sweep itself disproves. (e) is technically true but is a different design decision — the question asks what the sweep <em>shows</em>.</>}
        lens={<>The two losses are competing for encoder capacity. The 1.0 default is a starting point, not an answer. Read the sweep: contrastive-heavy = generic text, generative-heavy = weak retrieval. Loss-weight scheduling, modality-specific projection heads, and explicit two-stream architectures are the standard mitigations.</>}
        stretch={<>If you had to ship today with weight 0.1, how would you compensate for the retrieval drop using a cheap downstream component?</>}
      />

      <VIS.TrapProblem
        id="mmpg-p3"
        difficulty="hard"
        title="P3 — Hallucinated explanation, correct retrieval"
        scenario={<>The retrieval head returns a sneaker (correct — user has bought running shoes for years). The decoder writes: "Lightweight knit upper with carbon-fiber plate for marathon pacing." The item is in fact a casual sneaker with no carbon plate. The contrastive recall metric looks fine; the explanation is wrong. Which is the most accurate framing of the failure?</>}
        options={[
          {key:"a", text:"Retrieval is broken — the wrong item was returned."},
          {key:"b", text:"The decoder is hallucinating attributes the encoder never grounded in the actual item content; the joint loss did not enforce enough generative faithfulness to fine-grained features.", correct:true},
          {key:"c", text:"The contrastive head needs more negatives."},
          {key:"d", text:"This is a temperature problem — lower the LM sampling temperature."},
        ]}
        trap={<>(a) misreads the symptom. (c) and (d) are both knob-tuning fixes that do not address the root cause: the decoder is producing fluent text not anchored in the item.</>}
        lens={<>"Correct retrieval + wrong explanation" is the signature failure of joint pretraining when the generative loss reads the title but not the image (or vice-versa). Mitigations: per-attribute generation targets during pretraining, retrieval-augmented decoding at serve time (force the decoder to copy from a structured-attribute string), or post-decode fact-check against the item's structured attributes.</>}
        stretch={<>Would constrained decoding against an attribute vocabulary solve this? What does it cost?</>}
      />

      <VIS.TrapProblem
        id="mmpg-p4"
        difficulty="medium"
        title="P4 — Pick the right pretraining recipe"
        scenario={<>Catalog: 50M items with rich images, multi-paragraph descriptions, and structured attributes. Two product surfaces: (a) primary search ranking (latency-critical, retrieval-only), (b) shopping-assistant chat which must explain why an item was suggested. Engineering capacity: one ML team, one backbone. Which pretraining recipe is the right pick?</>}
        options={[
          {key:"a", text:"Contrastive-only — it is the strongest for retrieval, and you can bolt on a separate LLM later."},
          {key:"b", text:"Generative-only — generation is the new surface, retrieval is solved."},
          {key:"c", text:"Joint contrastive + generative — one backbone serves both surfaces, parameter sharing improves the explanation surface.", correct:true},
          {key:"d", text:"Train two independent backbones — no objective interference."},
        ]}
        trap={<>(a) is the safe textbook answer and would have been right two years ago — but the prompt explicitly says one team, one backbone, two surfaces. (d) ignores the engineering-capacity constraint. (b) loses retrieval.</>}
        lens={<>This is a tradeoff problem, not a recipe problem. With one team and two surfaces that share the same item knowledge, joint pretraining is the right pick precisely because the shared backbone amortizes the multimodal item knowledge across both surfaces.</>}
        stretch={<>If the explanation surface launched 6 months later, would you still pick (c) on day one? Why?</>}
      />

      <VIS.TrapProblem
        id="mmpg-p5"
        difficulty="hard"
        multiSelect
        title="P5 — Debugging retrieval regression after joint pretraining"
        scenario={<>You migrated from a contrastive-only model to a joint contrastive+generative pretraining run. Offline retrieval R@100 dropped by roughly 3 points; explanation BLEU improved noticeably. The loss-weight was set to the default 1.0. Select all valid first diagnostic moves.</>}
        options={[
          {key:"a", text:"Sweep the loss weight (0.1, 0.3, 1.0, 3.0, 10.0) and re-evaluate retrieval at each point.", correct:true},
          {key:"b", text:"Add a separate projection head for the contrastive loss so the encoder's last layer is not shared.", correct:true},
          {key:"c", text:"Compare retrieval embeddings layer-by-layer to find where the generative gradient is pulling the representation away from the contrastive optimum.", correct:true},
          {key:"d", text:"Roll back the migration immediately and abandon joint pretraining."},
          {key:"e", text:"Increase the batch size by 10x to compensate."},
        ]}
        trap={<>(d) is the panic answer that gives up the explanation gain you just earned. (e) is a generic recipe change that does not target the multi-objective issue.</>}
        lens={<>The 3-point drop is a tractable engineering tradeoff, not a kill signal. Standard mitigations: loss-weight sweep, separate projection heads (so the shared encoder isn't asked to be the contrastive embedding AND the generative prefix), per-layer probing to localize where the objectives clash. After 2–3 iterations the joint model typically lands within a point of contrastive-only retrieval while keeping the explanation gains.</>}
        stretch={<>What's a cheap online experiment that would tell you whether the 3-point offline drop matters for production?</>}
      />

      <VIS.TrapProblem
        id="mmpg-p6"
        difficulty="medium"
        title="P6 — One head, two heads, two backbones"
        scenario={<>You need both retrieval and explanation from item content. Three options on the table: (a) one backbone with shared last layer feeding both losses, (b) one backbone with two projection heads (contrastive head + generative head), (c) two fully independent backbones. Which design <strong>most reliably</strong> reduces objective interference while still amortizing learning across both abilities?</>}
        options={[
          {key:"a", text:"Shared last layer — maximally compact."},
          {key:"b", text:"Shared backbone + two projection heads — the shared backbone learns the multimodal item knowledge once, while the two heads let each objective tune the representation for its own task.", correct:true},
          {key:"c", text:"Two independent backbones — guaranteed no interference."},
          {key:"d", text:"All three designs are equivalent at scale."},
        ]}
        trap={<>(a) under-decouples — the same vector must serve as both retrieval key and generation prefix, which the loss-weight sweep then has to balance. (c) over-decouples — no amortization, doubled training and serving cost. (d) is the lazy generalization.</>}
        lens={<>Two projection heads on a shared backbone is the standard recipe: amortizes the expensive multimodal knowledge once, lets each objective shape its own surface. It costs one extra small head per objective and is what most production joint-pretraining systems converge to.</>}
        stretch={<>Where do you place the heads — at the encoder's last layer, or earlier? Why might earlier be safer?</>}
      />

      <VIS.TrapProblem
        id="mmpg-p7"
        difficulty="hard"
        title="P7 — Image-text alignment failure case"
        scenario={<>Catalog has 5M items where the seller-supplied title and description are mostly accurate, but a non-trivial slice are wrong (cross-listings, recycled descriptions, mislabelled colour). After joint pretraining the decoder confidently writes descriptions that match the bad text, not the image. Retrieval is fine. What is the cleanest fix at pretraining time?</>}
        options={[
          {key:"a", text:"Drop the generative loss — text labels are too noisy."},
          {key:"b", text:"Add an image-conditioned generation target (caption-from-image, not caption-from-title) so the decoder is supervised by the modality with cleaner ground truth.", correct:true},
          {key:"c", text:"Increase the contrastive weight 10x."},
          {key:"d", text:"Add more negatives in the contrastive loss."},
        ]}
        trap={<>(a) throws out the headline ability. (c) and (d) tune the wrong objective — the problem is generative supervision, not contrastive separation.</>}
        lens={<>The decoder copies whatever you supervise it with. If seller-supplied text is noisy, supervise generation against image-derived captions (from a vision-language pretrained model on a clean subset) or against structured attributes. The text remains an input modality for retrieval; it just stops being the gold target for generation.</>}
        stretch={<>How would you decide which slices of the catalog have clean text? What's the cheapest first signal?</>}
      />

      <VIS.TrapProblem
        id="mmpg-p8"
        difficulty="hard"
        multiSelect
        title="P8 — Joint pretraining is wrong tool"
        scenario={<>Which of the following catalogs / use cases should NOT motivate joint multimodal pretraining? Select all that apply.</>}
        options={[
          {key:"a", text:"ID-only catalog (items have no image or text content, just IDs and interaction history).", correct:true},
          {key:"b", text:"Surface only needs retrieval (no chat, no explanation surface, no query rewrite).", correct:true},
          {key:"c", text:"Catalog with rich images and titles, single ML team, building a shopping assistant + search."},
          {key:"d", text:"Tiny catalog (~10k items) where the simplest possible model works.", correct:true},
          {key:"e", text:"Catalog with strong cold-start needs and high-volume new-item creation."},
        ]}
        trap={<>(c) and (e) are <em>good</em> fits — picking them as "wrong tool" is the trap. Cold-start in particular benefits from content-based pretraining; multimodal joint pretraining is one of the better options.</>}
        lens={<>Joint pretraining is wrong when (1) there is no content to pretrain on, (2) only one surface (retrieval-only or generation-only), or (3) the catalog is so small that any pretraining overshoots. It is right exactly when you have content AND multiple surfaces AND scale that rewards parameter sharing.</>}
        stretch={<>For (e), would you pick joint pretraining or TIGER (Semantic IDs)? What does the choice depend on?</>}
      />

      <VIS.TrapProblem
        id="mmpg-p9"
        difficulty="hard"
        title="P9 — Why the multi-objective is harder to debug"
        scenario={<>Offline retrieval R@100 dropped 4 points after a routine data refresh in a joint contrastive+generative pretraining pipeline. Generative BLEU is unchanged. Three candidate root causes: (1) the new training data has more text noise than image noise, (2) the contrastive loss weight quietly drifted, (3) the optimizer warm-up was misconfigured. Why is this scenario harder to bisect than the same drop in a contrastive-only system?</>}
        options={[
          {key:"a", text:"It is not harder — the same diagnostic tools apply."},
          {key:"b", text:"With one objective, retrieval drop has one head and one loss to blame; with two objectives, the generative gradient can interfere with the encoder representation, so you must rule out the second objective's influence before localizing the bug.", correct:true},
          {key:"c", text:"Joint pretraining requires GPUs the team does not have."},
          {key:"d", text:"You always need a held-out probe for the generative loss to compare."},
        ]}
        trap={<>(a) is the dismissive answer. (d) is true but partial — the harder issue is the cross-objective interference making it ambiguous which head is at fault.</>}
        lens={<>Multi-objective debugging requires probing each objective in isolation (ablate the other, measure the drop independently) AND in interaction (does the gradient norm from one objective spike when the other drifts?). The diagnostic surface grows roughly as the product of objectives × possible interactions, not the sum. This is the operational cost of joint pretraining.</>}
        stretch={<>What's a cheap automated probe you can run on every checkpoint to detect cross-objective interference early?</>}
      />

      <VIS.TrapProblem
        id="mmpg-p10"
        difficulty="medium"
        multiSelect
        title="P10 — Production rollout sequencing"
        scenario={<>Joint pretraining ships well offline. You plan a production rollout. Order does not matter here, but pick all rollout steps that are <strong>necessary</strong> rather than optional.</>}
        options={[
          {key:"a", text:"Replay-shadow the retrieval head against the existing contrastive baseline on live traffic; gate on no regression at the candidate-generation stage before shipping.", correct:true},
          {key:"b", text:"Add a hallucination-rate guardrail metric (decoded attribute claims vs structured-attribute ground truth) before exposing generated explanations to users.", correct:true},
          {key:"c", text:"Run a small A/B with the explanation surface gated to an internal cohort first, measuring user trust and click-through impact.", correct:true},
          {key:"d", text:"Increase the model's parameter count 2x as part of the rollout."},
          {key:"e", text:"Establish a rollback path that can serve retrieval-only from the joint checkpoint if the generation surface needs to be disabled.", correct:true},
        ]}
        trap={<>(d) is a generic "bigger is better" recipe that has nothing to do with safe rollout. The other four are non-negotiable: shadow-test retrieval (the surface users already trust), guardrail hallucination, internal A/B, rollback plan.</>}
        lens={<>Joint pretraining adds a brand-new failure mode (hallucinated explanations) to a system that historically only had retrieval failures. Rollout must protect the existing surface (retrieval) and gate the new one (explanation) with specific guardrails. The rollback path matters: when explanations misbehave you need to keep serving retrieval from the same checkpoint without re-deploying.</>}
        stretch={<>If the hallucination-rate guardrail trips at 1%, do you roll back retrieval too? Why or why not?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://arxiv.org/pdf/2405.06927" target="_blank" rel="noopener">
            Liu et al. — <em>Multimodal Pretraining, Adaptation, and Generation for Recommendation: A Survey</em> (arXiv 2405.06927, 2024)</a>
            — the source survey; map of the design space (alignment-only, generation-only, joint) with case studies on e-commerce and short-video.</li>
        <li><a href="https://openai.com/index/clip/" target="_blank" rel="noopener">
            Radford et al. — <em>Learning Transferable Visual Models From Natural Language Supervision (CLIP)</em> (blog + ICML 2021)</a>
            — the canonical contrastive-only baseline this technique is competing with. Read for what contrastive-only does and does not get you.</li>
        <li><a href="https://lilianweng.github.io/posts/2021-05-31-contrastive/" target="_blank" rel="noopener">
            Lilian Weng — <em>Contrastive Representation Learning</em> (blog)</a>
            — the best practitioner deep-dive on contrastive losses, batch construction, and the failure modes that motivate adding a generative objective.</li>
        <li><a href="https://arxiv.org/abs/2305.05065" target="_blank" rel="noopener">
            Rajput et al. — <em>Recommender Systems with Generative Retrieval (TIGER)</em> (NeurIPS 2023)</a>
            — the generative-retrieval companion technique; reads cleanly next to joint pretraining as two different ways to get generation into recsys.</li>
        <li><a href="https://eugeneyan.com/writing/llm-patterns/" target="_blank" rel="noopener">
            Eugene Yan — <em>Patterns for Building LLM-based Systems &amp; Products</em> (blog)</a>
            — practitioner notes on hallucination guardrails, retrieval-augmented generation, and shipping LLM-backed surfaces alongside classic retrieval — the operational context for the rollout problem.</li>
      </ul>
    </VIS.Section>
