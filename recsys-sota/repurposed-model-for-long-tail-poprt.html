<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// REDO v2 — RecSys-SOTA batch 10
// PopRT — Bypassing the Popularity Bias: Repurposing Models for Better Long-Tail Recommendation
// (arXiv 2410.02776, 2024)
// Unique mechanism: REPURPOSE the existing head-item model at SERVING time via output reweighting
// (or a routed tail-specialist) — NO retrain, NO change to the training objective.
// Cross-visual caution: BISER is dual-model self-supervision under MNAR;
// DRE is representation-level orthogonal popularity head;
// PopRT is serving-time output reweighting (no retrain). Don't conflate.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="RecSys SOTA · Debiasing / Long-tail"
      title="PopRT — Repurposed head-item model for the tail"
      subtitle="No retrain. No new loss. At serving time, reweight outputs (or route via a popularity-context detector) so the SAME trained model becomes a tail recommender."
      byline={[
        {label: "Paper", value: "arXiv 2410.02776 (2024)"},
        {label: "Surface", value: "Catalogs with extreme 80/20 skew where one global model can't be sharp on both head and tail"},
      ]}/>

    <VIS.TLDR>
      Classical popularity-bias fixes change the TRAINING loss (<VIS.Term def="Inverse Propensity Weighting — reweight training examples by 1/popularity to undo skew.">IPW</VIS.Term>, BISER) and pay the price of degrading head performance. PopRT&apos;s twist: keep the head-item model and its loss UNTOUCHED. Repurpose it for the tail at SERVING time, either by output reweighting against a learned popularity prior, or by routing tail-context queries to a small tail-specialist that shares the head backbone. The head stays sharp; the tail gets a dedicated handler. The fragile knob is the popularity-context router (or, in the reweighting variant, the calibration of the popularity prior).
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is — serving-time repurposing">
      <VIS.Mermaid chart={`flowchart TB
  Q["Query: user u, context c"]
  HM["Frozen HEAD-trained model (untouched)"]
  RT["Popularity-context router OR output reweighter"]
  TS["Tail specialist (lightweight, optional)"]
  S["Final tail-aware ranking"]
  Q --> RT
  Q --> HM
  HM --> RT
  RT -->|"context suggests tail intent"| TS
  RT -->|"head intent or low-confidence"| HM
  TS --> S
  HM --> S`} />
      <ul>
        <li><strong>No retrain</strong> — the head-item model is frozen. PopRT does not touch its weights or its loss.</li>
        <li><strong>Serving-time intervention</strong> — at inference, either (i) reweight the head model&apos;s output scores by an inverse popularity prior, OR (ii) route via a popularity-context detector to a small tail-specialist that shares the backbone.</li>
        <li><strong>Fragile knob</strong> — the router threshold (or reweighting calibration). Mis-calibrated, you get a fuzzy seam where head-vs-tail predictions disagree.</li>
      </ul>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How it differs from IPW / BISER / DRE">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8, fontSize:14}}>
        <thead><tr style={{background:"#1f3a5f", color:"#fff"}}>
          <th style={{textAlign:"left", padding:8}}>Method</th>
          <th style={{textAlign:"left", padding:8}}>Touches training?</th>
          <th style={{textAlign:"left", padding:8}}>Mechanism</th>
          <th style={{textAlign:"left", padding:8}}>Head-model cost</th>
        </tr></thead>
        <tbody>
          <tr><td style={{padding:8, borderTop:"1px solid #e2e8f0"}}>IPW reweighting</td><td style={{padding:8, borderTop:"1px solid #e2e8f0"}}>YES (loss)</td><td style={{padding:8, borderTop:"1px solid #e2e8f0"}}>Reweight per-example gradients</td><td style={{padding:8, borderTop:"1px solid #e2e8f0"}}>Head sharpness DEGRADES</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:8}}>BISER</td><td style={{padding:8}}>YES (dual training)</td><td style={{padding:8}}>Bilateral mutual supervision under MNAR</td><td style={{padding:8}}>2× training cost</td></tr>
          <tr><td style={{padding:8, borderTop:"1px solid #e2e8f0"}}>DRE</td><td style={{padding:8, borderTop:"1px solid #e2e8f0"}}>YES (representation)</td><td style={{padding:8, borderTop:"1px solid #e2e8f0"}}>Aux orthogonal popularity head</td><td style={{padding:8, borderTop:"1px solid #e2e8f0"}}>Joint training overhead</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:8}}><strong>PopRT</strong></td><td style={{padding:8}}><strong>NO — serving-time only</strong></td><td style={{padding:8}}><strong>Output reweighting OR popularity-context routing</strong></td><td style={{padding:8}}><strong>Head stays sharp</strong></td></tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — 26 trap problems">
      <p style={{color:"#475569"}}>Each problem cites the question-axis it draws from. Pick, then reveal.</p>

      {/* axis: A1 */}
      <VIS.TrapProblem
        id="poprt-p1" difficulty="hard"
        title="P1 — PopRT vs IPW reweighting"
        scenario={<><em>Discriminating insight: IPW penalizes head-item gradients GLOBALLY in training &mdash; head sharpness degrades by design. PopRT leaves the head model untouched and adds a serving-time handler for tail intent.</em><br/>What is the load-bearing difference between PopRT and IPW for popularity bias?</>}
        options={[
          {key:"a", text:"PopRT operates at SERVING time without retraining; the head model's training is untouched. IPW operates in TRAINING by reweighting gradients, which globally penalizes head items and degrades head sharpness.", correct:true},
          {key:"b", text:"PopRT uses more parameters."},
          {key:"c", text:"IPW is slower at serving."},
          {key:"d", text:"They are equivalent."},
        ]}
        trap={<>(b)(c) misstate. (d) false.</>}
        lens={<>The intervention point (training vs serving) is the load-bearing inversion. Pay at serving, harvest the sharp head.</>}
        stretch={<>What is the back-of-envelope NDCG-head gain by NOT using IPW?</>}
      />

      {/* axis: A2 */}
      <VIS.TrapProblem
        id="poprt-p2" difficulty="hard"
        title="P2 — PopRT vs BISER (both target long-tail problems)"
        scenario={<><em>Discriminating insight: BISER fixes MNAR-bias at training via dual-model mutual supervision; PopRT does no training intervention &mdash; it is purely serving-time. Different problems, different scopes.</em><br/>Long-tail problem driven by MNAR EXPOSURE bias (not just popularity skew). Which method?</>}
        options={[
          {key:"a", text:"BISER — its bilateral self-supervision corrects MNAR exposure bias by surfacing likely-positive items the head model never saw. PopRT's serving-time reweighting does not fix exposure bias; it only redistributes scores.", correct:true},
          {key:"b", text:"PopRT — long-tail problems all use PopRT."},
          {key:"c", text:"Both at the same time."},
          {key:"d", text:"Neither — must use IPW."},
        ]}
        trap={<>(b) misdiagnoses bias type. (c) overkill without diagnosis. (d) IPW is what BISER replaces.</>}
        lens={<>Bias TYPE dictates the method: MNAR exposure ⇒ BISER; popularity-skew at serving ⇒ PopRT.</>}
        stretch={<>What diagnostic separates MNAR from popularity-skew?</>}
      />

      {/* axis: A3 */}
      <VIS.TrapProblem
        id="poprt-p3" difficulty="hard"
        title="P3 — PopRT vs DRE (both target tail recall)"
        scenario={<><em>Discriminating insight: DRE augments tail embeddings via content-similar head items at REPRESENTATION level. PopRT does NOT touch embeddings &mdash; it reweights or routes at the output level. DRE fails when tail items are content-alien from head; PopRT does not require content similarity.</em><br/>Your tail items are content-ALIEN from head (e.g., niche musical genres unrelated to mainstream). Which method?</>}
        options={[
          {key:"a", text:"PopRT — works without requiring content similarity. DRE's contrastive enhancement assumes head-tail content similarity and fails when tail is alien.", correct:true},
          {key:"b", text:"DRE — always wins for tail."},
          {key:"c", text:"BISER — content alien is MNAR."},
          {key:"d", text:"Train a new model."},
        ]}
        trap={<>(b) ignores DRE&apos;s assumption. (c) misdiagnoses bias type.</>}
        lens={<>Method match must respect the data assumptions. PopRT&apos;s freedom from content-similarity is a real advantage here.</>}
        stretch={<>What is the smallest content-similarity threshold where DRE works?</>}
      />

      {/* axis: A4 */}
      <VIS.TrapProblem
        id="poprt-p4" difficulty="medium"
        title="P4 — What does PopRT DROP vs IPW?"
        scenario={<><em>Discriminating insight: PopRT drops the GLOBAL gradient reweighting of IPW &mdash; head items stop being penalized in training. The cost dropped is "training-time popularity intervention".</em><br/>Which IPW-stack component does PopRT remove?</>}
        options={[
          {key:"a", text:"Training-time global gradient reweighting — head items are no longer penalized during training. PopRT moves the intervention to serving.", correct:true},
          {key:"b", text:"The model itself."},
          {key:"c", text:"Item embeddings."},
          {key:"d", text:"The evaluation metric."},
        ]}
        trap={<>(b)(c)(d) are not removed.</>}
        lens={<>The dropped piece is "training-time reweighting". Everything else stays.</>}
        stretch={<>What does this imply for offline-online metric reconciliation?</>}
      />

      {/* axis: B1 */}
      <VIS.TrapProblem
        id="poprt-p5" difficulty="hard" multiSelect
        title="P5 — When does PopRT's mechanism actually pay off?"
        scenario={<><em>Discriminating insight: PopRT wins when (i) head model is already sharp and expensive to retrain, AND (ii) tail intent can be detected from query context, AND (iii) catalog is severely 80/20 skewed.</em><br/>Pick scenarios where PopRT beats IPW. Select all that apply.</>}
        options={[
          {key:"a", text:"Existing head-item model is heavily tuned and retraining is a multi-week project; tail is critical for engagement.", correct:true},
          {key:"b", text:"Tail intent is detectable from query/session context (search query 'obscure 70s prog rock' vs 'top hits').", correct:true},
          {key:"c", text:"Catalog has extreme 80/20 skew (movie streaming, book retail).", correct:true},
          {key:"d", text:"Catalog is uniformly distributed; no head-tail split."},
          {key:"e", text:"You can afford 2× training cost and the head model can be retrained from scratch."},
        ]}
        trap={<>(d) no skew = no need. (e) BISER becomes viable; PopRT is over-engineering.</>}
        lens={<>The "Goldilocks zone": skewed catalog + detectable tail intent + expensive-to-retrain head.</>}
        stretch={<>What is the minimum head-tail ratio where PopRT starts to pay?</>}
      />

      {/* axis: B2 */}
      <VIS.TrapProblem
        id="poprt-p6" difficulty="medium"
        title="P6 — When NOT to use PopRT"
        scenario={<><em>Discriminating insight: PopRT fails when tail intent is undetectable from context, when catalog is uniform, or when router cannot be calibrated for lack of tail eval data.</em><br/>Strongest argument AGAINST PopRT?</>}
        options={[
          {key:"a", text:"Tail intent is not detectable from query/session context AND tail evals are too sparse to calibrate the router — the router will swing randomly between head and tail handlers, regressing both.", correct:true},
          {key:"b", text:"PopRT uses two models."},
          {key:"c", text:"PopRT does not retrain the model."},
          {key:"d", text:"PopRT is for long-tail."},
        ]}
        trap={<>(b)(c)(d) are descriptive, not arguments against.</>}
        lens={<>The router is the load-bearing piece. Without signal to calibrate it, PopRT collapses to the head model alone.</>}
        stretch={<>What is the minimum tail-eval volume to calibrate?</>}
      />

      {/* axis: B3 */}
      <VIS.TrapProblem
        id="poprt-p7" difficulty="hard"
        title="P7 — Stakeholder pitch hinging on the UNIQUE mechanism"
        scenario={<><em>Discriminating insight: pitch must name no-retrain + serving-time + head-stays-sharp. Generic "fixes long tail" pitches survive redaction.</em><br/>VP asks "why PopRT?" in 2 sentences. Pick the pitch that does NOT generalize to any long-tail method.</>}
        options={[
          {key:"a", text:"PopRT improves tail without retraining the head — the head model stays sharp and we add a serving-time popularity-context router + tail specialist. Zero risk to the head NDCG that the existing business depends on.", correct:true},
          {key:"b", text:"PopRT improves long-tail recall."},
          {key:"c", text:"PopRT is state of the art."},
          {key:"d", text:"PopRT reduces popularity bias."},
        ]}
        trap={<>(b)(c)(d) survive redaction.</>}
        lens={<>Name the unique combo: no-retrain + serving-time + head-untouched.</>}
        stretch={<>What dashboard metric defends the ongoing router complexity?</>}
      />

      {/* axis: C1 */}
      <VIS.TrapProblem
        id="poprt-p8" difficulty="hard"
        title="P8 — Where does the popularity correction live?"
        scenario={<><em>Discriminating insight: in the serving stack, between the head model&apos;s score output and the final ranking. NOT in the embeddings, not in the loss, not in the data pipeline.</em><br/>Where, architecturally, does PopRT's intervention sit?</>}
        options={[
          {key:"a", text:"In the serving stack, between the head model's score outputs and the final ranking — either as output-score reweighting or a router that diverts tail-intent queries to a small tail specialist.", correct:true},
          {key:"b", text:"In the loss function."},
          {key:"c", text:"In the embedding store."},
          {key:"d", text:"In the data pipeline."},
        ]}
        trap={<>(b)(c)(d) are all places PopRT explicitly does NOT touch.</>}
        lens={<>Serving-time intervention is the architectural inversion vs IPW/BISER/DRE.</>}
        stretch={<>What about latency impact at the serving layer?</>}
      />

      {/* axis: C2 */}
      <VIS.TrapProblem
        id="poprt-p9" difficulty="hard"
        title="P9 — Fragile knob: the router"
        scenario={<><em>Discriminating insight: the router threshold (or reweighting calibration) is the fragile knob. Mis-calibrated, it produces a fuzzy seam where head-confident vs tail-confident queries disagree.</em><br/>Which knob, mis-set, most reliably breaks PopRT?</>}
        options={[
          {key:"a", text:"The popularity-context router threshold — the boundary between 'route to head model' and 'route to tail specialist'. Mis-calibrated, you get a fuzzy seam region where regressions appear.", correct:true},
          {key:"b", text:"Learning rate."},
          {key:"c", text:"Batch size."},
          {key:"d", text:"Optimizer."},
        ]}
        trap={<>(b)(c)(d) are generic, not PopRT-specific.</>}
        lens={<>The router IS PopRT. Treat its threshold as the regularization knob.</>}
        stretch={<>How would you A/B the threshold safely?</>}
      />

      {/* axis: C3 */}
      <VIS.TrapProblem
        id="poprt-p10" difficulty="medium"
        title="P10 — Robust knob"
        scenario={<><em>Discriminating insight: the tail specialist&apos;s capacity is robust within range; the head model is untouched (its hyperparameters were already tuned).</em><br/>Which knob is robust in PopRT?</>}
        options={[
          {key:"a", text:"Tail-specialist model capacity (within order-of-magnitude variation) — the head's pre-existing tuning dominates total performance.", correct:true},
          {key:"b", text:"Router threshold."},
          {key:"c", text:"Reweighting calibration."},
          {key:"d", text:"Head model's LR."},
        ]}
        trap={<>(b)(c) are the fragile ones. (d) head model is untouched, so its LR is moot.</>}
        lens={<>Focus tuning effort on the router; the specialist is robust.</>}
        stretch={<>What does "robust" mean quantitatively here?</>}
      />

      {/* axis: C4 */}
      <VIS.TrapProblem
        id="poprt-p11" difficulty="hard"
        title="P11 — The seam problem"
        scenario={<><em>Discriminating insight: the boundary between head-route and tail-route creates a SEAM where the two handlers disagree on borderline queries. Regressions concentrate here.</em><br/>Where do PopRT regressions concentrate?</>}
        options={[
          {key:"a", text:"At the boundary of the popularity-context router — borderline queries (moderately popular items, ambiguous intent) get inconsistent treatment from head vs tail handlers, producing local NDCG regressions on the seam.", correct:true},
          {key:"b", text:"On head queries."},
          {key:"c", text:"On tail queries only."},
          {key:"d", text:"On uniform-distribution queries."},
        ]}
        trap={<>(b)(c)(d) miss the seam-specific failure mode.</>}
        lens={<>The seam is a real ops concern. Smooth-routing (soft mixture instead of hard route) is the common mitigation.</>}
        stretch={<>How would you measure the seam width?</>}
      />

      {/* axis: D1 */}
      <VIS.TrapProblem
        id="poprt-p12" difficulty="medium"
        title="P12 — Common misconception: 'PopRT is just IPW with extra steps'"
        scenario={<><em>Discriminating insight: PopRT does NOT touch training. IPW does. The whole point of PopRT is to AVOID the head-degrading effect of training-time reweighting.</em><br/>"PopRT is just IPW deployed slightly differently." Correct?</>}
        options={[
          {key:"a", text:"No — IPW reweights gradients during training (degrades head). PopRT does no training intervention; reweighting (or routing) happens at SERVING, where the head model stays untouched. Different intervention point, different cost profile.", correct:true},
          {key:"b", text:"Yes — same thing."},
          {key:"c", text:"Yes — both reweight."},
          {key:"d", text:"Yes — both target popularity."},
        ]}
        trap={<>(b)(c)(d) miss the intervention-point distinction.</>}
        lens={<>Same goal, different intervention point, different cost.</>}
        stretch={<>When would you still prefer IPW?</>}
      />

      {/* axis: D2 — context-vector composition tradeoff (router input design) */}
      <VIS.TrapProblem
        id="poprt-p13" difficulty="hard"
        title="P13 — Router context-vector composition: what to feed the gate?"
        scenario={<><em>Discriminating insight: PopRT&apos;s router accuracy is bottlenecked by what enters its context vector. Popularity-bucket-only context is the cheapest but cannot disambiguate &quot;user shopping for a niche gift&quot; (tail-intent under a head-popular query) from &quot;user wants the popular thing&quot;; adding item-content embedding fixes that but leaks head bias; user-segment plus session-stage is the senior compromise.</em><br/>Your PopRT router uses ONLY popularity-bucket of the candidate as the context vector. The router is high-accuracy on holdout but tail-recall sags in production. Which context-design failure?</>}
        options={[
          {key:"a", text:"Popularity-bucket alone is too narrow — it can route the candidate but not the INTENT. A user typing &quot;1960s jazz vinyl&quot; under a head-popular session never reaches a tail specialist because the candidate-popularity context says &quot;head&quot;. Add user-segment + query-rarity to the context.", correct:true},
          {key:"b", text:"The router is overfit; add dropout to the gate."},
          {key:"c", text:"Use item-content embedding as router context &mdash; it has highest fidelity for tail discrimination."},
          {key:"d", text:"Use only the user&apos;s historical popularity-bucket distribution &mdash; user-level features dominate item-level."},
        ]}
        trap={<>(b) misdiagnoses generalization vs context-coverage. (c) tempting but content embedding is pretrained on a head-skewed corpus &mdash; it INJECTS head bias into the router. (d) ignores the per-query intent shift.</>}
        lens={<>Router context = which axes of intent the gate can separate. Bucket-only collapses two intent dimensions onto one feature; the fix is dimensionality, not regularization.</>}
        stretch={<>Sketch the minimal 3-feature context vector and justify each.</>}
      />

      {/* axis: D3 */}
      <VIS.TrapProblem
        id="poprt-p14" difficulty="medium"
        title="P14 — Wrong-assumption cascade"
        scenario={<><em>Discriminating insight: framing PopRT as "must build a separate model for the tail" cascades into a multi-week training project. The actual paper presents the REWEIGHTING variant as the no-retrain option.</em><br/>Pick the framing root that cascades into avoidable infra work.</>}
        options={[
          {key:"a", text:"Assuming PopRT requires a separately trained tail model — leads to a 4-week training project, when the lightweight variant is just output reweighting against a popularity prior, deployable in days.", correct:true},
          {key:"b", text:"Assuming PopRT requires GPUs."},
          {key:"c", text:"Assuming PopRT is for explicit feedback."},
          {key:"d", text:"Assuming PopRT changes the head model."},
        ]}
        trap={<>(b)(c) are local. (d) is also true and bad but the cascade in (a) is larger.</>}
        lens={<>Pick the cheapest PopRT variant that gives the lift you need.</>}
        stretch={<>When does the routed-specialist variant beat reweighting?</>}
      />

      {/* axis: D4 */}
      <VIS.TrapProblem
        id="poprt-p15" difficulty="medium"
        title="P15 — Junior gets right but misses senior point"
        scenario={<><em>Discriminating insight: junior says "specialist for tail". Senior point: no retrain + serving-time intervention + the SEAM is the load-bearing risk.</em><br/>Pick the answer that is TRUE but misses the senior point.</>}
        options={[
          {key:"a", text:"PopRT uses a specialist model for tail items.", correct:true},
          {key:"b", text:"PopRT's value is no retrain — head sharpness is preserved at zero training cost."},
          {key:"c", text:"PopRT's failure mode is at the seam between head and tail routing."},
          {key:"d", text:"PopRT can also be deployed as pure output reweighting without a specialist."},
        ]}
        trap={<>(a) is true and survives redaction &mdash; could describe any head-tail multi-model system.</>}
        lens={<>Senior point: no retrain + serving-time + seam-as-risk.</>}
        stretch={<>Smallest ablation that proves the no-retrain claim?</>}
      />

      {/* axis: E1 */}
      <VIS.TrapProblem
        id="poprt-p16" difficulty="hard"
        title="P16 — Friday 3am page: PopRT-unique symptom"
        scenario={<><em>Discriminating insight: page-grade symptom is "router output distribution shifted + tail NDCG regressed". Generic drift would not move router output.</em><br/>Page: tail NDCG -3%, router-output distribution shifted to 90% head-route from 60%. Root cause?</>}
        options={[
          {key:"a", text:"Popularity-context features used by the router drifted (e.g., new content categories, query-string vocabulary shift). Router is mis-routing tail queries to the head model. Recalibrate router; rebuild popularity-context features.", correct:true},
          {key:"b", text:"Generic data drift."},
          {key:"c", text:"Embedding store corrupted."},
          {key:"d", text:"Logging policy changed."},
        ]}
        trap={<>(b)(c)(d) generic; the conjunction is PopRT-unique.</>}
        lens={<>Router output is the canonical PopRT health metric.</>}
        stretch={<>What is the alert threshold?</>}
      />

      {/* axis: E2 */}
      <VIS.TrapProblem
        id="poprt-p17" difficulty="medium"
        title="P17 — Open-source default that bites"
        scenario={<><em>Discriminating insight: most PopRT implementations default the router threshold to a fixed 50th percentile of popularity &mdash; rarely correct for your catalog. Always recalibrate per-deployment.</em><br/>Default-config trap?</>}
        options={[
          {key:"a", text:"Router threshold defaults to the 50th percentile of training-set popularity — usually wrong for your serving distribution. Recalibrate against held-out tail-eval before believing any numbers.", correct:true},
          {key:"b", text:"Learning rate."},
          {key:"c", text:"Adam optimizer."},
          {key:"d", text:"Batch size."},
        ]}
        trap={<>(b)(c)(d) generic.</>}
        lens={<>Always inspect the router threshold default. Calibrate to your data.</>}
        stretch={<>What unit test would enforce this?</>}
      />

      {/* axis: E3 */}
      <VIS.TrapProblem
        id="poprt-p18" difficulty="hard" mode="ordered"
        title="P18 — Order the PopRT rollout"
        scenario={<><em>Discriminating insight: keep head model frozen; build router; offline-eval router; shadow against pure-head baseline; calibrate threshold last.</em><br/>Order. Wrong moves do not get ranked.</>}
        options={[
          {key:"a", text:"Snapshot the head model; build popularity-context features for the router.", order:1},
          {key:"b", text:"Train router (or fit reweighting calibration) on held-out tail eval.", order:2},
          {key:"c", text:"Shadow A/B vs pure head model.", order:3},
          {key:"d", text:"Calibrate router threshold against live traffic.", order:4},
          {key:"e", text:"Retrain the head model."},
          {key:"f", text:"Roll to 100% on day 1."},
        ]}
        trap={<>(e) violates PopRT's no-retrain claim. (f) skips safety.</>}
        lens={<>Head-frozen + build router + shadow + calibrate.</>}
        stretch={<>Rollback signal?</>}
      />

      {/* axis: F1 */}
      <VIS.TrapProblem
        id="poprt-p19" difficulty="medium"
        title="P19 — Failure: uniform catalog"
        scenario={<><em>Discriminating insight: when popularity distribution is uniform, there is no "head" and "tail" to separate. PopRT collapses to the head model alone.</em><br/>Catalog is uniform (no 80/20 skew). PopRT outcome?</>}
        options={[
          {key:"a", text:"PopRT collapses to the head model alone — the router has no popularity gradient to exploit, and reweighting against a uniform prior is the identity. No lift, just added latency from the router pass-through.", correct:true},
          {key:"b", text:"Strong lift on long tail."},
          {key:"c", text:"Strong lift on head."},
          {key:"d", text:"Random behavior."},
        ]}
        trap={<>(b)(c)(d) misread the mechanism.</>}
        lens={<>No skew, no benefit. Match the method to the data shape.</>}
        stretch={<>What is the minimum skew where PopRT pays?</>}
      />

      {/* axis: F2 */}
      <VIS.TrapProblem
        id="poprt-p20" difficulty="hard"
        title="P20 — Adversarial input that breaks PopRT specifically"
        scenario={<><em>Discriminating insight: an attacker can craft queries that LOOK like tail-intent (popularity-context features) but should route to head. Forces the router to mis-classify, exploiting the seam.</em><br/>Which adversarial input most specifically breaks PopRT?</>}
        options={[
          {key:"a", text:"Queries crafted to manipulate the popularity-context router into the wrong handler — exploit the seam. Mitigation: smooth (mixture) routing instead of hard route; monitor router-output distribution for anomalies.", correct:true},
          {key:"b", text:"Random click noise."},
          {key:"c", text:"Popular-item flooding."},
          {key:"d", text:"Long user history."},
        ]}
        trap={<>(b)(c)(d) are generic.</>}
        lens={<>The router is the attack surface. Smooth-route to limit adversarial leverage.</>}
        stretch={<>How would you detect router manipulation in flight?</>}
      />

      {/* axis: F3 */}
      <VIS.TrapProblem
        id="poprt-p21" difficulty="hard"
        title="P21 — Reweighting vs routing variants — when which?"
        scenario={<><em>Discriminating insight: REWEIGHTING is cheaper (no second model) but blunter (cannot specialize for tail patterns). ROUTING is heavier but sharper for tail.</em><br/>You have a tight latency budget (50ms p99). Which PopRT variant?</>}
        options={[
          {key:"a", text:"Output reweighting — adds a multiplicative pass over candidate scores, ~1ms overhead. The routed-specialist variant adds a second model forward, blowing the budget.", correct:true},
          {key:"b", text:"Routed specialist — always sharper."},
          {key:"c", text:"Both, ensembled."},
          {key:"d", text:"Neither."},
        ]}
        trap={<>(b) ignores latency. (c) doubles cost. (d) gives up.</>}
        lens={<>Variant choice has a latency-vs-quality tradeoff. Tight p99 ⇒ reweighting.</>}
        stretch={<>What is the NDCG gap between variants?</>}
      />

      {/* axis: F4 */}
      <VIS.TrapProblem
        id="poprt-p22" difficulty="medium"
        title="P22 — Edge case: claim collapses"
        scenario={<><em>Discriminating insight: PopRT&apos;s advantage collapses when (i) catalog is uniform OR (ii) router cannot be calibrated OR (iii) head intent equals tail intent (no detectable context).</em><br/>Pick the case where PopRT&apos;s advantage shrinks to ~zero.</>}
        options={[
          {key:"a", text:"No detectable signal that separates tail-intent from head-intent queries — router output is near-random, and reweighting against an irrelevant prior adds noise.", correct:true},
          {key:"b", text:"Large head-tail gap."},
          {key:"c", text:"Tail items have rich content."},
          {key:"d", text:"Existing head model is sharp."},
        ]}
        trap={<>(b)(c)(d) all SUPPORT PopRT&apos;s edge.</>}
        lens={<>Without signal, no router can work.</>}
        stretch={<>How would you quantify "detectable signal"?</>}
      />

      {/* axis: F5 */}
      <VIS.TrapProblem
        id="poprt-p23" difficulty="medium"
        title="P23 — Paper-admitted limitation"
        scenario={<><em>Discriminating insight: paper admits router calibration is fragile + the seam causes local regressions. Compute cost is not the admitted limit (PopRT is cheap).</em><br/>Which is the paper-admitted limitation?</>}
        options={[
          {key:"a", text:"Router calibration is fragile, and the boundary between head-route and tail-route ('seam') causes local regressions on borderline queries.", correct:true},
          {key:"b", text:"Compute cost is too high."},
          {key:"c", text:"Cannot handle uniform catalog."},
          {key:"d", text:"Needs item embeddings."},
        ]}
        trap={<>(b) opposite of truth. (c) true but not the paper&apos;s framed limit. (d) generic.</>}
        lens={<>Always read the limitations section.</>}
        stretch={<>Smallest mitigation for the seam?</>}
      />

      {/* axis: F6 */}
      <VIS.TrapProblem
        id="poprt-p24" difficulty="medium"
        title="P24 — Cost structure"
        scenario={<><em>Discriminating insight: training cost is zero (head model unchanged); serving cost adds a router pass + optionally a specialist forward. Storage adds the specialist&apos;s weights.</em><br/>Where is PopRT&apos;s extra cost concentrated?</>}
        options={[
          {key:"a", text:"Serving only: a router forward (small) + optionally a tail-specialist forward (modest). Training cost is zero by design.", correct:true},
          {key:"b", text:"Training."},
          {key:"c", text:"Labeling."},
          {key:"d", text:"Embedding store."},
        ]}
        trap={<>(b)(c)(d) misread.</>}
        lens={<>Pay at serving, harvest the sharp head and the cold-deploy.</>}
        stretch={<>What is the back-of-envelope latency overhead?</>}
      />

      {/* axis: F7 — serving-time deployment topology */}
      <VIS.TrapProblem
        id="poprt-p25" difficulty="hard"
        title="P25 — Where in the serving stack should PopRT live?"
        scenario={<><em>Discriminating insight: PopRT can be installed at three rank-stack surfaces and each has a different tail-uplift/head-CTR tradeoff. (1) AFTER L3 ranker as a re-route (chooses among already-scored candidates) &mdash; lowest head risk, smallest tail lift since L3 has already pruned tail. (2) INSIDE L3 as a rerank-by-router pass &mdash; medium risk, medium lift. (3) AT L4 final-cut on a slate of ~50 &mdash; biggest tail lift but with rank-position constraints binding (top-3 positions own &gt;70% of CTR; any tail injection there hits head CTR hardest).</em><br/>You want tail uplift WITHOUT denting head CTR. Where should PopRT sit?</>}
        options={[
          {key:"a", text:"Inside L3 rerank with a position-budget rule: PopRT can reorder ranks 4–N but never displace the top-3. Mid-stack gives meaningful tail recovery (L3 still has tail candidates in its scored set), and the position-budget caps head-CTR exposure to the long-tail of the slate.", correct:true},
          {key:"b", text:"After L3 (post-ranker) &mdash; safest because L3 has already made its call; PopRT only re-routes the leftovers."},
          {key:"c", text:"At L4 final-cut on a slate of 50 &mdash; PopRT gets the most freedom and the biggest tail lift, with no constraint on top positions."},
          {key:"d", text:"Anywhere &mdash; PopRT&apos;s router decides per-query, so the surface doesn&apos;t matter."},
        ]}
        trap={<>(b) plausible-sounding but tail items are already pruned by L3 score; PopRT has nothing to elevate. (c) maximum lift but slaughters head CTR because positions 1–3 carry &gt;70% of clicks. (d) topology absolutely matters &mdash; the router&apos;s decision space is constrained by which candidates reach the surface.</>}
        lens={<>Rank-position constraints are binding: tail uplift compounds linearly with available rank slots, head-CTR loss compounds super-linearly with displacement near the top. L3-rerank with a top-K freeze is the senior compromise.</>}
        stretch={<>Quantify: with top-3 frozen and PopRT free on ranks 4–10, what fraction of total CTR is the deploy risking?</>}
      />

      {/* axis: F8 */}
      <VIS.TrapProblem
        id="poprt-p26" difficulty="medium"
        title="P26 — Reproducibility"
        scenario={<><em>Discriminating insight: PopRT&apos;s reproducibility hinges on the EXACT router-feature set + threshold + (if used) specialist architecture. Head model details are inherited.</em><br/>What must be fixed to reproduce?</>}
        options={[
          {key:"a", text:"Router feature set + threshold + (if routed-variant) tail-specialist architecture. The head model is whatever you used; PopRT is the wrapper.", correct:true},
          {key:"b", text:"Just the seed."},
          {key:"c", text:"Just the LR."},
          {key:"d", text:"Just the head model."},
        ]}
        trap={<>(b)(c) generic. (d) misses the wrapper.</>}
        lens={<>The experimental artifact is the SERVING-WRAPPER config.</>}
        stretch={<>How would you publish a reproducible PopRT setup?</>}
      />

    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://arxiv.org/abs/2410.02776" target="_blank" rel="noopener">Bypassing the Popularity Bias: Repurposing Models for Better Long-Tail Recommendation (arXiv 2024)</a> — primary source.</li>
        <li><a href="https://eugeneyan.com/writing/long-tail/" target="_blank" rel="noopener">Eugene Yan — <em>How to Find Your Niche in Recommendations (long tail)</em> (blog)</a> — practitioner framing for long-tail product strategy.</li>
        <li><a href="https://medium.com/@bugraa/the-fairness-of-recommender-systems-d8d3a32a6648" target="_blank" rel="noopener">Bugra Akyildiz — <em>Fairness and Long-Tail in Recommender Systems</em> (blog)</a> — head/tail split mental model.</li>
        <li><a href="https://www.cs.cornell.edu/people/tj/publications/joachims_etal_17a.pdf" target="_blank" rel="noopener">Joachims et al. — <em>Unbiased Learning-to-Rank with Biased Feedback</em> (WSDM 2017)</a> — the IPW baseline PopRT diverges from.</li>
        <li><a href="https://distill.pub/2020/circuits/" target="_blank" rel="noopener">Distill — <em>Circuits</em></a> — visual intuition for "what the head model already knows", relevant to no-retrain interventions.</li>
      </ul>
    </VIS.Section>
  </main>
);
ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
  <script>
    window.addEventListener("error", function (e) {
      const pre = document.createElement("pre");
      pre.style.cssText = "position:fixed;top:0;left:0;right:0;max-height:35vh;"
        + "overflow:auto;background:#fee2e2;color:#7f1d1d;padding:8px;"
        + "margin:0;font:12px/1.4 monospace;z-index:10002;";
      pre.textContent = "[visualize] " + (e.error?.stack || e.message || e);
      document.body.appendChild(pre);
    }, true);
  </script>
</body>
</html>
