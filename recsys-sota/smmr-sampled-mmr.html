  // <VIS.Term def="1-2 sentence plain-English explanation">jargon</VIS.Term>
  //
  // Wraps any technical term so a non-technical reader can hover for an
  // immediate definition. The explanation should:
  //   - assume the reader knows English but not software/your domain
  //   - fit in 1-2 short sentences (a tooltip, not a paragraph)
  //   - avoid further jargon (or wrap that too)
  //
  // The element exposes `data-rv-info` so the report-viewer overlay reuses
  // its own tooltip + double-click "explain this" feedback flow. In
  // standalone /visualize mode (no overlay), the lightweight hover handler
  // below renders the tooltip directly.
  function Term({ def, children }) {
    if (!def) return h(React.Fragment, null, children);
    return h("span", {
      className: "vis-term",
      "data-rv-info": def,
      "aria-label": def,
      tabIndex: 0,
    }, children);
  }

  // Standalone hover tooltip for <VIS.Term>. If the report-viewer overlay
  // is loaded it already shows tooltips for any [data-rv-info] element, so
  // we short-circuit here to avoid double-rendering.
  (function installTermTooltip() {
    let tip = null;
    function show(el) {
      if (window.__rvReady) return;  // overlay.js owns the tooltip in report-viewer mode
      const text = el.getAttribute("data-rv-info");
      if (!text) return;
      if (!tip) {
        tip = document.createElement("div");
        tip.className = "vis-term-tip";
        document.body.appendChild(tip);
      }
      tip.textContent = text;
      const r = el.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const pad = 8;
      let left = Math.max(pad,
        Math.min(r.left, window.innerWidth - tr.width - pad));
      const above = r.top - tr.height - pad;
      const below = r.bottom + pad;
      tip.style.left = left + "px";
      tip.style.top  = (above >= pad ? above : below) + "px";
      tip.style.display = "block";
    }
    function hide() { if (tip) tip.style.display = "none"; }
    document.addEventListener("mouseover", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el); else hide();
    });
    document.addEventListener("focusin", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el);
    });
    document.addEventListener("focusout", hide);
    document.addEventListener("scroll", hide, true);
    // Touch / tap support: on a tap, toggle the tip for the tapped term.
    // Tapping anywhere else (including a different term) hides the current.
    let lastTappedTerm = null;
    document.addEventListener("click", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) {
        if (el === lastTappedTerm) { lastTappedTerm = null; hide(); }
        else { lastTappedTerm = el; show(el); }
      } else {
        lastTappedTerm = null; hide();
      }
    });
  })();

  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."
  //   scenario={<>...JSX...</>}
  //   diagram={<VIS.Mermaid chart={...} />}
  //   options={[
  //     {key:"a", text:"...", correct:false},
  //     {key:"b", text:"...", correct:true},
  //     ...
  //   ]}
  //   trap={<>The most tempting wrong is X because...</>}
  //   lens={<>The right answer + reasoning</>}
  //   stretch="optional follow-up question"
  // />
  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// REDO v2 — RecSys-SOTA batch 9
// SMMR — Sampling-Based MMR Reranking (HSE 2025)
// Unique mechanism: sampled-from-softmax over MMR scores with provable O(tau log K) relevance bound.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="RecSys SOTA · Diversity/DPP"
      title="SMMR — Sampling-based MMR"
      subtitle="Sample next item from a softmax over MMR scores instead of the argmax. Tunable randomness with an analytical relevance bound."
      byline={[
        {label: "Paper", value: "Ananyeva, HSE 2025"},
        {label: "Surface", value: "Discovery where deterministic MMR over-converges"},
      ]}/>

    <VIS.TLDR>
      MMR's argmax over-converges when many top-K candidates have near-tied MMR scores. SMMR fixes this by drawing the next item from <code>Softmax(MMR_scores / tau)</code>. The unique value is a <strong>provable relevance bound</strong>: expected relevance loss vs deterministic MMR is bounded by O(tau · log K) — randomness with a closed-form cost statement. Strip the softmax and you lose the bound.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is, in one equation">
      <p>
        At each step, compute the MMR score for every remaining candidate, then sample the next item:
      </p>
      <VIS.Equation display tex={`p_i = \\frac{\\exp(\\text{MMR}(i)/\\tau)}{\\sum_{j} \\exp(\\text{MMR}(j)/\\tau)}, \\quad i^{*} \\sim p`}/>
      <p>
        Where <code>MMR(i) = lambda · rel(i) − (1−lambda) · max sim(i, S)</code> and the max runs over already-chosen items S. As <VIS.Term def="A scalar that controls how peaked the softmax is. Small tau makes it close to argmax (deterministic); large tau makes it close to uniform.">tau</VIS.Term> goes to zero, SMMR recovers deterministic MMR; as tau goes large, it approaches uniform sampling.
      </p>
      <VIS.Mermaid chart={`flowchart TB
  C["Candidate pool"]
  M["MMR scores per candidate"]
  SM["Softmax with temperature tau"]
  S["Sample next item"]
  L["Slate"]
  C --> M --> SM --> S --> L
  L -->|step t+1| M`} />
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How it differs from MMR / DPP / random shuffle">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8, fontSize:14}}>
        <thead><tr style={{background:"#1f3a5f", color:"#fff"}}>
          <th style={{textAlign:"left", padding:8}}>Method</th>
          <th style={{textAlign:"left", padding:8}}>Selection rule</th>
          <th style={{textAlign:"left", padding:8}}>Reproducibility</th>
          <th style={{textAlign:"left", padding:8}}>Bound</th>
        </tr></thead>
        <tbody>
          <tr><td style={{padding:8, borderTop:"1px solid #e2e8f0"}}>MMR</td>
              <td style={{padding:8, borderTop:"1px solid #e2e8f0"}}>argmax of MMR</td>
              <td style={{padding:8, borderTop:"1px solid #e2e8f0"}}>Deterministic</td>
              <td style={{padding:8, borderTop:"1px solid #e2e8f0"}}>None</td></tr>
          <tr style={{background:"#f8fafc"}}>
            <td style={{padding:8}}>SMMR</td>
            <td style={{padding:8}}>Sample from softmax(MMR/tau)</td>
            <td style={{padding:8}}>Stochastic (seeded for tests)</td>
            <td style={{padding:8}}>Expected relevance loss ≤ O(tau log K)</td></tr>
          <tr>
            <td style={{padding:8, borderTop:"1px solid #e2e8f0"}}>DPP</td>
            <td style={{padding:8, borderTop:"1px solid #e2e8f0"}}>argmax of log-det gain</td>
            <td style={{padding:8, borderTop:"1px solid #e2e8f0"}}>Deterministic given kernel</td>
            <td style={{padding:8, borderTop:"1px solid #e2e8f0"}}>(1 - 1/e) submodular bound</td></tr>
          <tr style={{background:"#f8fafc"}}>
            <td style={{padding:8}}>Random shuffle</td>
            <td style={{padding:8}}>Uniform random</td>
            <td style={{padding:8}}>Stochastic</td>
            <td style={{padding:8}}>No relevance preservation</td></tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — 26 trap problems">
      <p style={{color:"#475569"}}>Each problem cites the question-axis it draws from. Pick, then reveal.</p>

      {/* axis: C1 */}
      <VIS.TrapProblem
        id="smmr-p1" difficulty="hard"
        title="P1 — Why softmax sampling instead of just adding noise?"
        scenario={<><em>Discriminating insight: arbitrary noise loses the analytical bound; softmax sampling specifically gives a sub-Gaussian concentration that yields the O(tau log K) bound.</em><br/>A junior asks: &quot;Why not just add Gaussian noise to MMR scores instead of softmax-sampling?&quot; What's the right answer?</>}
        options={[
          {key:"a", text:"The softmax distribution is sub-Gaussian; that's what gives a closed-form expected-relevance bound (O(tau log K)). Arbitrary Gaussian noise has no such bound — you'd lose the only thing SMMR claims to provide.", correct:true},
          {key:"b", text:"Gaussian noise can produce negative scores."},
          {key:"c", text:"Softmax is faster to compute than adding noise."},
          {key:"d", text:"Gaussian noise is non-differentiable."},
        ]}
        trap={<>(b)/(c)/(d) sidestep the actual reason. The bound is the entire point of SMMR over &quot;random noise on MMR.&quot;</>}
        lens={<>SMMR's value is the analytical guarantee, not the randomness per se. The Boltzmann distribution is what makes the proof work.</>}
        stretch={<>Without the bound, what would distinguish SMMR from ad-hoc noise injection?</>}
      />

      {/* axis: C2 */}
      <VIS.TrapProblem
        id="smmr-p2" difficulty="hard"
        title="P2 — What does the variance bound actually say?"
        scenario={<><em>Discriminating insight: the bound is on EXPECTED relevance loss vs MMR, parameterized by tau and slate length K — not on per-user variance.</em><br/>A teammate paraphrases: &quot;The SMMR bound means each user's relevance is within O(tau log K) of the MMR baseline.&quot; Is that right?</>}
        options={[
          {key:"a", text:"No — the bound is on the EXPECTATION of relevance across draws, not per-user. Individual users can lose more; the average user is bounded.", correct:true},
          {key:"b", text:"Yes — the bound applies per-user."},
          {key:"c", text:"The bound is on the variance of relevance, not the mean."},
          {key:"d", text:"The bound only applies at tau=0."},
        ]}
        trap={<>(b) is a common mis-paraphrase. (c) confuses mean and variance bounds. (d) makes the bound trivial.</>}
        lens={<>Expectation-bound (E[loss] ≤ O(tau log K)) is weaker than per-user bound. Communicate carefully.</>}
        stretch={<>What's a per-user concentration statement you could derive on top?</>}
      />

      {/* axis: E2 */}
      <VIS.TrapProblem
        id="smmr-p3" difficulty="hard"
        title="P3 — Failure-on-Friday: A/B variance blows up"
        scenario={<><em>Discriminating insight: per-user slate randomness adds variance on TOP of treatment-vs-control variance, requiring larger A/B sample size — a SMMR-specific power calc gotcha.</em><br/>SMMR shipped Thursday at tau=0.5 on home feed. Friday 3am page: <strong>A/B verdict blocked because variance is too wide</strong> to declare a winner. Latency, eval, util all fine. Why does this hit SMMR specifically?</>}
        options={[
          {key:"a", text:"SMMR injects per-user slate variance on top of treatment vs control variance; standard t-test power calculations under-estimate sample size. Fix: use within-user pairs (same user gets both arms across sessions) or inflate n by the variance-inflation factor.", correct:true},
          {key:"b", text:"SMMR causes higher GPU utilization which makes timing noisier."},
          {key:"c", text:"tau=0.5 is too high; reduce to 0.05."},
          {key:"d", text:"The metric is poorly defined."},
        ]}
        trap={<>(b) misattributes. (c) treats a symptom (lower tau means less diversity uplift). (d) ducks the issue.</>}
        lens={<>SMMR's randomness is intentional and good for product, but expensive for A/B power. Plan for variance inflation.</>}
        stretch={<>By what factor would you inflate n at tau=0.5?</>}
      />

      {/* axis: A1 */}
      <VIS.TrapProblem
        id="smmr-p4" difficulty="hard"
        title="P4 — SMMR vs DPP: when does SMMR win?"
        scenario={<><em>Discriminating insight: SMMR sometimes beats DPP because randomization explores embedding regions DPP&apos;s deterministic argmax does not.</em><br/>The paper claims SMMR sometimes beats DPP on diversity metrics. Pick the most plausible explanation.</>}
        options={[
          {key:"a", text:"DPP's deterministic argmax always picks the same kind of slate for similar users; SMMR's randomization explores embedding regions DPP never visits, sometimes giving better fleet-wide diversity.", correct:true},
          {key:"b", text:"SMMR has a stronger approximation bound than DPP."},
          {key:"c", text:"SMMR uses a better kernel."},
          {key:"d", text:"DPP is non-deterministic; SMMR is deterministic."},
        ]}
        trap={<>(b) misstates: DPP's (1-1/e) is stronger than SMMR's O(tau log K). (c) is false: SMMR has no kernel. (d) inverts.</>}
        lens={<>SMMR's win isn't a better single-slate bound; it's exploration. Two different optimization regimes.</>}
        stretch={<>For which surface would DPP definitely beat SMMR?</>}
      />

      {/* axis: D1 */}
      <VIS.TrapProblem
        id="smmr-p5" difficulty="hard"
        title="P5 — Intuitive but wrong: bigger tau = better diversity"
        scenario={<><em>Discriminating insight: past a small tau, SMMR converges to uniform sampling — diversity goes up but relevance crashes; the optimal tau is small.</em><br/>You sweep tau across (0.05, 0.5, 5, 50) and see diversity rise monotonically. Engineer says &quot;ship tau=50 for max diversity.&quot; What's wrong?</>}
        options={[
          {key:"a", text:"At tau=50 SMMR is essentially uniform sampling over the candidate pool — diversity is at the max but expected relevance has collapsed. The sweet spot is small tau (0.1-0.5).", correct:true},
          {key:"b", text:"tau=50 makes the softmax compute slow."},
          {key:"c", text:"tau=50 violates PSD."},
          {key:"d", text:"At tau=50, the bound becomes meaningless and the user metric explodes."},
        ]}
        trap={<>(b)/(c) misattribute. (d) is more right than (b)/(c) but doesn't say what the relevance is doing — and the bound at tau=50 is &quot;loss can be very large,&quot; not literally violated.</>}
        lens={<>Diversity-only metrics climb at large tau, but expected user satisfaction drops. Choose tau by the joint metric.</>}
        stretch={<>What's the simplest joint metric that captures both?</>}
      />

      {/* axis: D2 */}
      <VIS.TrapProblem
        id="smmr-p6" difficulty="hard" multiSelect
        title="P6 — Wrong-assumption cascade: SMMR = MMR + noise"
        scenario={<><em>Discriminating insight: thinking SMMR is &quot;MMR with arbitrary noise&quot; cascades into bad implementation choices and lost analytical guarantees.</em><br/>You assume SMMR is &quot;MMR + noise.&quot; Which downstream conclusions does this corrupt? Select all that apply.</>}
        options={[
          {key:"a", text:"You'll implement with Gaussian noise on the scores and lose the O(tau log K) bound.", correct:true},
          {key:"b", text:"You'll skip seeding the RNG for tests, making unit tests flaky.", correct:true},
          {key:"c", text:"You'll explain the variance/relevance trade as &quot;more noise = more diversity&quot; without an analytical knob.", correct:true},
          {key:"d", text:"None — the assumption is harmless."},
        ]}
        trap={<>(d) is the cascade trigger.</>}
        lens={<>The softmax sampling is load-bearing for the bound; arbitrary noise wins half the surface area but loses the entire claim.</>}
        stretch={<>What single sentence captures &quot;SMMR is not just noise&quot;?</>}
      />

      {/* axis: D3 */}
      <VIS.TrapProblem
        id="smmr-p7" difficulty="hard"
        title="P7 — Junior vs senior: unit test for SMMR"
        scenario={<><em>Discriminating insight: junior assumes SMMR can&apos;t be unit-tested due to non-determinism; senior seeds the RNG and tests against expected probabilities.</em><br/>Junior says &quot;SMMR is non-deterministic, we can't unit test it.&quot; What does the senior do?</>}
        options={[
          {key:"a", text:"Seed the RNG; the slate is fully reproducible for testing. Non-determinism is per-user-online behavior, not a property of the algorithm. Also test the probability distribution against analytical softmax with a chi-square check.", correct:true},
          {key:"b", text:"Replace SMMR with deterministic MMR for tests."},
          {key:"c", text:"Test only the MMR-score computation, not the sampling."},
          {key:"d", text:"Run SMMR 1000 times and check the average slate."},
        ]}
        trap={<>(b) loses test fidelity. (c)/(d) work but are weaker than seeded testing.</>}
        lens={<>RNG seeding makes any sampled algorithm deterministic for tests; complain about non-determinism only when you can't seed.</>}
        stretch={<>What's the right way to test &quot;sample from the correct distribution&quot; without running 1000 trials?</>}
      />

      {/* axis: D4 */}
      <VIS.TrapProblem
        id="smmr-p8" difficulty="hard"
        title="P8 — Plausible misattribution"
        scenario={<><em>Discriminating insight: high per-user click variance under SMMR is by design; the right metric is aggregate engagement, not per-user variance.</em><br/>A/B shows SMMR has higher click variance per user than MMR. Junior says &quot;SMMR is too noisy.&quot; Senior says &quot;that's intentional.&quot; Which metric should you actually trust?</>}
        options={[
          {key:"a", text:"Aggregate (fleet-wide) engagement metrics — session length, returning-user rate. Per-user click variance is high BY DESIGN; SMMR's value is across the fleet.", correct:true},
          {key:"b", text:"Per-user click variance; lower is always better."},
          {key:"c", text:"Click-through rate at position 1 only."},
          {key:"d", text:"NDCG@10."},
        ]}
        trap={<>(b) confuses noise-bad with variance-by-design. (c)/(d) are partial metrics.</>}
        lens={<>SMMR is a fleet-level diversity tool; evaluate at the fleet level, not per-user.</>}
        stretch={<>What within-user metric is still meaningful under SMMR?</>}
      />

      {/* axis: D5 */}
      <VIS.TrapProblem
        id="smmr-p9" difficulty="hard"
        title="P9 — Sounds reasonable: just use epsilon-greedy"
        scenario={<><em>Discriminating insight: epsilon-greedy treats all items uniformly when exploring, losing MMR&apos;s relevance-similarity structure; SMMR samples proportional to MMR.</em><br/>If tau-tuning seems hard, can you replace SMMR with epsilon-greedy random selection (uniform with probability epsilon, MMR-argmax otherwise)? Why might this be worse?</>}
        options={[
          {key:"a", text:"Epsilon-greedy explores by picking uniformly random when it explores; SMMR's softmax samples proportional to MMR, so low-relevance items remain rare. Epsilon-greedy loses the relevance preservation; SMMR keeps it.", correct:true},
          {key:"b", text:"Epsilon-greedy is non-deterministic; SMMR is deterministic."},
          {key:"c", text:"Epsilon-greedy requires a value function; SMMR doesn't."},
          {key:"d", text:"They're equivalent."},
        ]}
        trap={<>(b)/(c)/(d) misstate the actual structural difference.</>}
        lens={<>SMMR is structured exploration (MMR-weighted); epsilon-greedy is unstructured exploration (uniform). Structure preserves relevance.</>}
        stretch={<>When would epsilon-greedy be the right choice over SMMR?</>}
      />

      {/* axis: E1 */}
      <VIS.TrapProblem
        id="smmr-p10" difficulty="hard"
        title="P10 — tau interacts with slate length K"
        scenario={<><em>Discriminating insight: the variance bound scales with log K — tau that works at K=10 over-randomizes at K=50.</em><br/>You tuned tau=0.3 at K=10 and shipped. Product wants to extend the slate to K=50. Do you re-tune?</>}
        options={[
          {key:"a", text:"Yes — the bound scales with log K, so the same tau gives a larger expected loss at K=50. Re-tune tau (likely lower) to keep loss equivalent.", correct:true},
          {key:"b", text:"No — tau is scale-invariant."},
          {key:"c", text:"No — but reduce candidate pool size to compensate."},
          {key:"d", text:"Increase tau because longer slates need more diversity."},
        ]}
        trap={<>(b) misreads the bound. (c) confuses N (pool) with K (slate). (d) reverses the relationship.</>}
        lens={<>tau is K-dependent; re-tune when the product changes K.</>}
        stretch={<>Derive how tau scales as a function of K for constant expected loss.</>}
      />

      {/* axis: E3 */}
      <VIS.TrapProblem
        id="smmr-p11" difficulty="hard"
        title="P11 — Log-sum-exp numerics"
        scenario={<><em>Discriminating insight: many MMR libs return log-space scores; double-applying exp+softmax overflows for high lambda·rel(); use logsumexp.</em><br/>Your SMMR implementation overflows when lambda is large. Most likely cause and fix?</>}
        options={[
          {key:"a", text:"MMR scores are already in log space; exp+softmax overflows for high values. Use the log-sum-exp trick: subtract max(MMR) before exp, then re-add.", correct:true},
          {key:"b", text:"lambda must be less than 1."},
          {key:"c", text:"Switch to integer arithmetic."},
          {key:"d", text:"Use float64 instead of float32."},
        ]}
        trap={<>(b) misstates lambda's range. (c) is absurd. (d) postpones the issue.</>}
        lens={<>Log-sum-exp is standard for any softmax over arbitrary-scale inputs.</>}
        stretch={<>Write the pseudocode for stable softmax sampling.</>}
      />

      {/* axis: E4 */}
      <VIS.TrapProblem
        id="smmr-p12" difficulty="hard"
        title="P12 — Rollout: log tau per request"
        scenario={<><em>Discriminating insight: per-request RNG output is needed for reproducibility audits and slate replay; without logging, debugging is impossible.</em><br/>You ship SMMR. The legal team asks &quot;why did user X see this slate?&quot; A week later. You need to be able to answer. What do you log?</>}
        options={[
          {key:"a", text:"Per-request: tau, RNG seed, MMR scores for every candidate, drawn samples per step. With these you can replay exactly.", correct:true},
          {key:"b", text:"Just the slate that was shown."},
          {key:"c", text:"tau only."},
          {key:"d", text:"Click events only."},
        ]}
        trap={<>(b)/(c)/(d) lose replay fidelity.</>}
        lens={<>Replayable stochastic systems need full input + RNG state logged. Standard practice for any sampled ranker.</>}
        stretch={<>What's the storage cost of full replay logging at 100M slates/day?</>}
      />

      {/* axis: E5 */}
      <VIS.TrapProblem
        id="smmr-p13" difficulty="hard"
        title="P13 — Reproducibility per-user is intentionally lost"
        scenario={<><em>Discriminating insight: per-user reproducibility is intentionally given up; offline replays must seed by (user, request_time) or they will not match production.</em><br/>You run an offline replay for last week. The slates don't match production. Bug?</>}
        options={[
          {key:"a", text:"Not a bug. SMMR is stochastic; reproducibility requires seeding by (user, request_time). Without seeded replays you reproduce only the distribution, not the specific slates.", correct:true},
          {key:"b", text:"Yes — SMMR must be deterministic for production use."},
          {key:"c", text:"The RNG implementation is wrong."},
          {key:"d", text:"Network non-determinism is the cause."},
        ]}
        trap={<>(b) demands the wrong property. (c)/(d) misattribute.</>}
        lens={<>Stochastic algorithms have a reproducibility protocol; design and enforce it from day one.</>}
        stretch={<>What's the right seed key for sessionized SMMR?</>}
      />

      {/* axis: E6 */}
      <VIS.TrapProblem
        id="smmr-p14" difficulty="hard"
        title="P14 — Eval contamination: single-replay diversity"
        scenario={<><em>Discriminating insight: SMMR&apos;s diversity is over the DISTRIBUTION of slates; single-replay metrics under- or over-estimate.</em><br/>Offline eval uses one replay and reports diversity@K = 0.42. Reviewer says this is wrong. Why?</>}
        options={[
          {key:"a", text:"SMMR is stochastic; a single replay samples one slate from the distribution. Diversity@K should be averaged over N draws to estimate the expected diversity SMMR delivers.", correct:true},
          {key:"b", text:"diversity@K is the wrong metric for SMMR."},
          {key:"c", text:"You should replay with tau=0."},
          {key:"d", text:"Single-replay diversity is always biased high."},
        ]}
        trap={<>(b) ducks. (c) defeats the purpose. (d) over-claims direction of bias.</>}
        lens={<>Always evaluate stochastic algorithms over multiple draws to estimate the distribution, not just one slate.</>}
        stretch={<>How many draws do you need for a 0.01 stderr on diversity@K?</>}
      />

      {/* axis: F1 */}
      <VIS.TrapProblem
        id="smmr-p15" difficulty="hard"
        title="P15 — K=1 degenerate case"
        scenario={<><em>Discriminating insight: at K=1, MMR&apos;s similarity penalty has no chosen set to penalize against, so SMMR degenerates to sampling-by-relevance — no diversity term active.</em><br/>For K=1 (push notifications), SMMR degenerates to what?</>}
        options={[
          {key:"a", text:"Softmax sampling over relevance scores only — no diversity term active. Equivalent to relevance-Boltzmann ranking. Use a different mechanism if you need cross-send variety.", correct:true},
          {key:"b", text:"It still uses MMR's similarity penalty against an empty set."},
          {key:"c", text:"Pure argmax."},
          {key:"d", text:"Uniform sampling."},
        ]}
        trap={<>(b) misstates: max over empty set is undefined / zero. (c)/(d) are at extreme taus, not the algorithm's K=1 behavior.</>}
        lens={<>SMMR at K=1 is Boltzmann-relevance ranking. If that's what you want, fine; if you want set-diversity it's the wrong tool for K=1.</>}
        stretch={<>How would you add variety across K=1 push notifications?</>}
      />

      {/* axis: F2 */}
      <VIS.TrapProblem
        id="smmr-p16" difficulty="hard"
        title="P16 — Adversarial item inflates relevance"
        scenario={<><em>Discriminating insight: an adversary that inflates relevance dominates softmax; SMMR has no special defense vs MMR or pure relevance ranking.</em><br/>An adversary inflates one item's relevance to 100x normal. What does SMMR do?</>}
        options={[
          {key:"a", text:"Picks it with probability near 1 (softmax peaks on it); SMMR has no defense against inflated relevance. Same vulnerability as MMR. Calibrate relevance upstream.", correct:true},
          {key:"b", text:"Rejects it because softmax normalizes scores."},
          {key:"c", text:"Picks it only with probability epsilon."},
          {key:"d", text:"The bound prevents it."},
        ]}
        trap={<>(b) confuses normalization with bounding. (c)/(d) attribute defenses SMMR lacks.</>}
        lens={<>SMMR is a reranker; defense vs inflated scores happens upstream in calibration. Stack defenses, don't expect them from the diversity layer.</>}
        stretch={<>What upstream signal would detect score-inflation?</>}
      />

      {/* axis: F3 */}
      <VIS.TrapProblem
        id="smmr-p17" difficulty="hard"
        title="P17 — Fleet-wide diversity LOWER than MMR"
        scenario={<><em>Discriminating insight: SMMR with shared tau across users still peaks the softmax on the most popular item — per-user diversity up, fleet-wide diversity might be down.</em><br/>Per-user slates show higher diversity than MMR. But fleet-wide diversity (distinct items shown across all users) is LOWER. Cause?</>}
        options={[
          {key:"a", text:"All users share the same tau; the softmax still peaks on the most popular item, so the same hot item dominates many users' slates. Fix: per-user tau or per-user RNG draws that vary the softmax mode.", correct:true},
          {key:"b", text:"SMMR is biased toward popularity."},
          {key:"c", text:"tau is too high."},
          {key:"d", text:"Fleet-wide diversity isn't a real metric."},
        ]}
        trap={<>(b) restates the symptom. (c) is a possible workaround but not the structural cause. (d) ducks.</>}
        lens={<>Per-user randomness does not automatically yield fleet-wide variety when the underlying scores share modes across users.</>}
        stretch={<>What's the cheapest way to add per-user variance without per-user tuning?</>}
      />

      {/* axis: F4 */}
      <VIS.TrapProblem
        id="smmr-p18" difficulty="hard"
        title="P18 — When the bound is vacuous"
        scenario={<><em>Discriminating insight: the bound is tight only for K of at least 5 and for MMR scores that are NOT concentrated in a single mode; pathological distributions make it useless.</em><br/>Authors note when the bound is tight. Pick the scenario where SMMR's relevance bound IS still meaningful.</>}
        options={[
          {key:"a", text:"K=20 slate with MMR scores spread across many near-tied modes (the over-convergence pathology SMMR is designed for).", correct:true},
          {key:"b", text:"K=2 slate with one dominant MMR score and others near zero."},
          {key:"c", text:"K=20 slate with one dominant MMR score 1000x larger than the rest."},
          {key:"d", text:"K=1 slate."},
        ]}
        trap={<>(b)/(c)/(d) are the pathological cases the paper calls out.</>}
        lens={<>The bound is most meaningful where SMMR is designed to be used: K-large slates with near-tied MMR scores.</>}
        stretch={<>What metric tells you a slate has the right shape for SMMR?</>}
      />

      {/* axis: F5 */}
      <VIS.TrapProblem
        id="smmr-p19" difficulty="hard"
        title="P19 — Plackett-Luce alternative"
        scenario={<><em>Discriminating insight: PL sampling gives a slightly tighter bound but loses the closed-form tau interpretation; the trade is theoretical elegance vs engineering simplicity.</em><br/>Follow-up work suggests replacing softmax with Plackett-Luce sampling. What's the trade?</>}
        options={[
          {key:"a", text:"PL gives a slightly tighter bound but loses softmax's closed-form tau interpretation. Trade-off between theoretical elegance (tighter bound) and engineering simplicity (one tau dial).", correct:true},
          {key:"b", text:"PL is strictly better."},
          {key:"c", text:"Softmax is strictly better."},
          {key:"d", text:"They're equivalent."},
        ]}
        trap={<>(b)/(c)/(d) hide the trade.</>}
        lens={<>Two-knob vs one-knob, with bound trade. SMMR's choice: one knob.</>}
        stretch={<>When would you ship PL over SMMR?</>}
      />

      {/* axis: A2 */}
      <VIS.TrapProblem
        id="smmr-p20" difficulty="hard"
        title="P20 — SMMR vs Plackett-Luce vs MMR"
        scenario={<><em>Discriminating insight: PL samples from relevance only; SMMR samples from MMR (relevance minus diversity penalty); MMR is argmax of MMR.</em><br/>Match each method to what it samples from.</>}
        options={[
          {key:"a", text:"PL: relevance only. SMMR: MMR (relevance minus diversity penalty). MMR: argmax (no sampling).", correct:true},
          {key:"b", text:"All three sample from the same distribution."},
          {key:"c", text:"PL and MMR sample; SMMR is argmax."},
          {key:"d", text:"None sample; all are argmax."},
        ]}
        trap={<>(b)/(c)/(d) misstate sampling rules.</>}
        lens={<>Each method's distinction is in the WHAT it samples from. SMMR's distinction: it bakes diversity into the sampling distribution.</>}
        stretch={<>Construct a slate where SMMR and PL would disagree most.</>}
      />

      {/* axis: A3 */}
      <VIS.TrapProblem
        id="smmr-p21" difficulty="hard"
        title="P21 — Counterfactual: no SMMR, what's the fallback?"
        scenario={<><em>Discriminating insight: without SMMR, the closest substitute is MMR + epsilon-greedy or MMR + Gaussian noise — both lose the analytical bound.</em><br/>Suppose SMMR did not exist. What's the closest substitute for the &quot;randomized MMR with bound&quot; product?</>}
        options={[
          {key:"a", text:"MMR + epsilon-greedy or MMR + Gaussian noise — gets the randomness, loses the O(tau log K) analytical bound and clean tau knob.", correct:true},
          {key:"b", text:"DPP — it's strictly better."},
          {key:"c", text:"Random shuffle."},
          {key:"d", text:"No substitute exists."},
        ]}
        trap={<>(b) confuses concerns (DPP is set-level, not randomized exploration). (c)/(d) are extreme.</>}
        lens={<>SMMR's unique value is randomization-with-bound. Substitutes lose one of those.</>}
        stretch={<>If you must ship epsilon-greedy, what's the right epsilon?</>}
      />

      {/* axis: A4 */}
      <VIS.TrapProblem
        id="smmr-p22" difficulty="hard"
        title="P22 — SMMR composed with DPP"
        scenario={<><em>Discriminating insight: DPP&apos;s set-level scoring + SMMR&apos;s exploration sampling address different over-convergence modes; composition is principled.</em><br/>Would you compose SMMR and DPP?</>}
        options={[
          {key:"a", text:"Yes — DPP scores top-K candidate slates, SMMR samples among the near-tied scores for exploration. DPP handles set geometry; SMMR handles fleet exploration.", correct:true},
          {key:"b", text:"No — they conflict."},
          {key:"c", text:"Yes — apply SMMR upstream of DPP to randomize candidates."},
          {key:"d", text:"They're equivalent."},
        ]}
        trap={<>(b) misses the orthogonality. (c) destroys the candidate ordering DPP needs. (d) is wrong.</>}
        lens={<>Different over-convergence failures; orthogonal fixes; compose.</>}
        stretch={<>What's the right tau for SMMR sitting after DPP?</>}
      />

      {/* axis: B1 */}
      <VIS.TrapProblem
        id="smmr-p23" difficulty="hard"
        title="P23 — Pick SMMR over MMR / DPP / LLM"
        scenario={<><em>Discriminating insight: SMMR&apos;s sweet spot is &quot;MMR over-converges&quot; — a candidate pool with many near-tied scores.</em><br/>You have a music-discovery surface where the top-50 candidates have very similar MMR scores. Pick the right tool.</>}
        options={[
          {key:"a", text:"SMMR — the near-tied scores are exactly the over-convergence pathology it's designed for; tau will spread the picks across the tied modes.", correct:true},
          {key:"b", text:"MMR — argmax is the right call when scores are tied."},
          {key:"c", text:"DPP — you always want set-level scoring."},
          {key:"d", text:"LLM reranker — natural-language understanding is required."},
        ]}
        trap={<>(b) doubles down on the over-convergence MMR has. (c)/(d) are valid alternatives but heavier than needed.</>}
        lens={<>SMMR's narrow sweet spot is MMR-with-tied-scores. For that, it's the lightest principled fix.</>}
        stretch={<>What signal tells you scores are tied enough for SMMR to matter?</>}
      />

      <VIS.TrapProblem
        id="smmr-p24" difficulty="hard"
        title="P24 — Sounds reasonable: lower tau for higher relevance"
        scenario={<><em>Discriminating insight: lowering tau approaches deterministic MMR, recovering its over-convergence pathology — relevance up, diversity down to MMR baseline.</em><br/>Compliance says &quot;we're losing too much relevance; just lower tau.&quot; What's the consequence?</>}

          {key:"c", text:"Lower tau is illegal because it violates the bound."},

        stretch={<>If the bound is too generous, can you ship tau=0.01? What do you give up?</>}

      <VIS.TrapProblem
        id="smmr-p25" difficulty="hard"
        title="P25 — When NOT to ship SMMR"

          {key:"b", text:"Discovery surfaces."},
          {key:"c", text:"Cold-start music recs."},
          {key:"d", text:"E-commerce home feed."},

        trap={<>(b)/(c)/(d) are exactly the surfaces SMMR is designed for.</>}
        lens={<>Reproducibility constraints rule out stochastic rerankers regardless of their bounds.</>}
        stretch={<>What if &quot;reproducibility&quot; just means &quot;same slate within 24h&quot;?</>}
      />

      {/* axis: B3 */}
      <VIS.TrapProblem
        id="smmr-p26" difficulty="hard"
        title="P26 — Pitch to the PM"
        scenario={<><em>Discriminating insight: the pitch must hinge on the sampled-pool variance bound — strip &quot;SMMR&quot; and &quot;just randomize MMR&quot; loses the bound.</em><br/>PM asks why SMMR is worth shipping over MMR + epsilon-greedy. Pick the strongest pitch.</>}
        options={[
          {key:"a", text:"SMMR samples from softmax(MMR/tau) with a provable bound on expected relevance loss: O(tau log K). You can SET the relevance cost in advance via tau, no A/B sweeping. Epsilon-greedy is unstructured noise with no analytical knob.", correct:true},
          {key:"b", text:"SMMR is more diverse than MMR + epsilon-greedy."},
          {key:"c", text:"SMMR is faster than MMR."},
          {key:"d", text:"SMMR has fewer hyperparameters."},

        trap={<>(b)/(c)/(d) could be said about most randomized rerankers; the bound is uniquely SMMR.</>}

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://www.hse.ru/data/2025/07/04/1995597406/" target="_blank" rel="noopener"><strong>Ananyeva — SMMR: Sampling-Based MMR Reranking for Faster, More Diverse Search</strong></a> <span style={{color:"#64748b",fontSize:14}}>(paper, HSE 2025)</span><br/>The reference paper. Bound derivation and benchmark results.</li>
        <li><a href="https://dl.acm.org/doi/10.1145/290941.291025" target="_blank" rel="noopener"><strong>Carbonell &amp; Goldstein — The Use of MMR, Diversity-Based Reranking</strong></a> <span style={{color:"#64748b",fontSize:14}}>(paper, SIGIR 1998)</span><br/>The original MMR paper. Reading SMMR with the original MMR in hand makes the &quot;argmax to softmax&quot; change concrete.</li>
        <li><a href="https://lilianweng.github.io/posts/2018-04-08-policy-gradient/" target="_blank" rel="noopener"><strong>Lilian Weng — Policy Gradient Algorithms</strong></a> <span style={{color:"#64748b",fontSize:14}}>(blog)</span><br/>Boltzmann-softmax policies and temperature-controlled exploration in RL — the same mathematical pattern SMMR uses.</li>
        <li><a href="https://en.wikipedia.org/wiki/Softmax_function" target="_blank" rel="noopener"><strong>Wikipedia — Softmax function</strong></a> <span style={{color:"#64748b",fontSize:14}}>(reference)</span><br/>Temperature-controlled Boltzmann distribution properties; the bound derivation relies on these.</li>
        <li><a href="https://en.wikipedia.org/wiki/Plackett%E2%80%93Luce_model" target="_blank" rel="noopener"><strong>Wikipedia — Plackett-Luce model</strong></a> <span style={{color:"#64748b",fontSize:14}}>(reference)</span><br/>The alternative sampling distribution SMMR's follow-ups consider; useful for understanding the trade.</li>
      </ul>
    </VIS.Section>

);
