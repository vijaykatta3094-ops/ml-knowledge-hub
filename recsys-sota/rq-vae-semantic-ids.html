  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          // NO autoGloss here. Glossing terms inside option text leaks the
          // answer mechanism via hover. Authors must keep options self-contained;
          // a candidate who needs a definition can scroll up to the prose where
          // the term is explicitly wrapped via <VIS.Term>.
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// RQ-VAE Semantic IDs (Lee et al. CVPR 2022; recsys handbook 2025)
// v3 retro-sweep — confusingly-similar decoys, gate-clean, position-balanced.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="RecSys SOTA · Content tokenization"
      title="RQ-VAE Semantic IDs"
      subtitle="Residually quantize content embeddings into K-tuple discrete codes. Hierarchical prefix structure. The vocabulary that powers TIGER and OneRec."
      byline={[
        {label: "Origin paper", value: "Lee et al., CVPR 2022 (RQ-VAE for image gen)"},
        {label: "Recsys application", value: "TIGER 2023, OneRec 2025, handbook 2025"},
        {label: "Domain", value: "Discrete content tokenization for generative recsys"},
      ]}/>

    <VIS.TLDR>
      <VIS.Term def="Residual-Quantized Variational AutoEncoder — a hierarchical discrete-quantization model. Each input embedding is encoded as K codes from K codebooks, where each codebook quantizes the residual after the previous code is subtracted.">RQ-VAE</VIS.Term> quantizes a content <VIS.Term def="Dense vector representation of a discrete item (word, user, product). Learned so that similar items have similar vectors.">embedding</VIS.Term> into K <VIS.Term def="Learned dictionary of discrete vectors (codes). An encoder snaps its output to the nearest code; that code's index becomes a token.">codebooks</VIS.Term> of D <VIS.Term def="One entry in a codebook — a learned vector that an input snaps to during quantization. Identified by its integer index.">codes</VIS.Term> each, producing a K-tuple discrete ID. First codebook captures coarse semantics; later ones capture finer residuals. <strong>Similar items share prefix codes</strong> — the property that makes <VIS.Term def="Recommendation systems where the model GENERATES the next item's identifier (or token sequence) instead of scoring a candidate list.">generative retrieval</VIS.Term> (<VIS.Term def="Transformer Index for GEnerative Recommenders. Google 2023 paper: emits items by generating semantic-ID code tuples instead of softmaxing over millions of items.">TIGER</VIS.Term>) work and that enables <VIS.Term def="When a new user or item has no interaction history, so embedding tables and behavioral features have nothing to learn from.">cold-start</VIS.Term> without <VIS.Term def="Approximate Nearest Neighbor. Family of algorithms (HNSW, IVF, ScaNN) that find close vectors much faster than exact search at small recall cost.">ANN</VIS.Term>. Source: <a href="https://arxiv.org/abs/2507.22224" target="_blank" rel="noopener">Practitioner handbook 2025</a>.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="Beat 1 — What it is">
      <p>
        Take a content embedding (from <VIS.Term def="T5-based sentence encoder; turns text into a fixed-size dense embedding. TIGER uses it as the RQ-VAE input encoder.">Sentence-T5</VIS.Term>, <VIS.Term def="Contrastive Language-Image Pretraining. Joint image-text encoder producing aligned embeddings via contrastive loss.">CLIP</VIS.Term>, whatever). <VIS.Term def="Map a continuous vector to the nearest of a finite set of discrete codes. Replaces a real-valued representation with an integer index.">Quantize</VIS.Term> it to the nearest entry in codebook 1 → first code c₁. Compute the <VIS.Term def="What's left of the input after subtracting the chosen code. Each subsequent codebook quantizes this leftover signal, capturing progressively finer detail.">residual</VIS.Term> (embedding - code_1). Quantize the residual to codebook 2 → c₂. Repeat K times. The <VIS.Term def="Discrete K-tuple code derived from item content (via RQ-VAE). Similar items share prefix codes; replaces random hashed IDs.">Semantic ID</VIS.Term> is the K-tuple (c₁, c₂, ..., c_K). To <VIS.Term def="Reverse the encoding: rebuild an approximation of the original embedding by summing the K chosen codes. Reconstruction error drives training.">reconstruct</VIS.Term>: sum of all K codes.
      </p>
      <VIS.Mermaid chart={`
flowchart TB
  E["Content embedding (768-d)"]
  E --> Q1["Quantize: codebook 1 (256 codes) -> c1"]
  Q1 --> R1["Residual: e - c1"]
  R1 --> Q2["Quantize: codebook 2 -> c2"]
  Q2 --> R2["Residual: e - c1 - c2"]
  R2 --> Q3["...continue K times"]
  Q3 --> S["Semantic ID: (c1, c2, c3, c4)"]
  style S fill:#dbeafe,stroke:#1e40af,stroke-width:2px
      `} />
    </VIS.Section>

    <VIS.Section id="sec-diff" title="Beat 2 — vs random IDs, vs single-codebook VQ, vs continuous embeddings">
      <p>
        <strong>vs random <VIS.Term def="Item identifier produced by a hash function (e.g. MurmurHash) over the raw item ID. Compact but carries no semantic structure — similar items get unrelated buckets.">hashed</VIS.Term> item IDs.</strong> Hashed IDs are arbitrary — similar items get unrelated hashes. Semantic IDs are content-derived; similar items share prefix codes, enabling <VIS.Term def="Look up items by matching the first j out of K codes. Because RQ-VAE places similar items under the same prefix, a partial match still narrows the candidate set efficiently.">prefix-based retrieval</VIS.Term> and cold-start <VIS.Term def="A model's ability to perform well on items or users it never saw during training, by leaning on shared structure (here: prefix codes) instead of memorized IDs.">generalization</VIS.Term>.
      </p>
      <p>
        <strong>vs single-codebook <VIS.Term def="Vector-Quantized VAE. Quantizes encoder output to a single codebook; commitment loss keeps encoder near code centroids.">VQ-VAE</VIS.Term>.</strong> A single codebook of equivalent <VIS.Term def="The number of distinct code combinations the model can represent — D^K for K codebooks of D codes each. Determines how finely items can be distinguished.">capacity</VIS.Term> would need D^K codes (intractable). RQ-VAE's <VIS.Term def="Repeated quantize-then-quantize-the-error trick. K codebooks; level k encodes what level k-1 missed. Captures fine detail with small vocabularies.">residual quantization</VIS.Term> scheme captures <VIS.Term def="Structure organized in levels of increasing detail — here, coarse semantic category first, finer sub-category next, fine-grained distinction last.">hierarchical</VIS.Term> detail with K·D codes (linear in K).
      </p>
      <p>
        <strong>vs continuous content embeddings + ANN.</strong> Continuous embeddings work but require an ANN index. Semantic IDs are <VIS.Term def="Taking values from a finite set (integer indices), not a continuous range. Discrete codes plug into token vocabularies; continuous vectors do not.">discrete</VIS.Term> and fit into the <VIS.Term def="The set of all tokens a language/sequence model can emit. Semantic IDs expand this set with code IDs so items become first-class tokens.">vocabulary</VIS.Term> of any <VIS.Term def="Generates one token at a time, each conditioned on the tokens produced so far.">autoregressive</VIS.Term> model (transformer, sequence model) directly.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-when" title="Beat 3 — When to pick RQ-VAE Semantic IDs">
      <p>
        Pick when (a) you have items with content features (text/image/attributes), (b) you want generative retrieval (TIGER), generative ranking (<VIS.Term def="Unified retrieve+rank model. Single backbone serves both retrieval and ranking via task-template prompts; eliminates retrieval-ranker train/serve skew.">OneRec</VIS.Term>), or want to replace random-ID embedding tables, (c) cold-start matters, (d) you can afford ~2× a vanilla embedding-table lookup latency (K decode steps).
      </p>
    </VIS.Section>

    <VIS.Section id="sec-gotchas" title="Beat 4 — Limitations & gotchas">
      <p>
        Biggest risks: <strong><VIS.Term def="VQ/RQ-VAE failure: most codebook entries go unused; encoder maps all inputs to a few popular codes. Sign of broken quantization.">codebook collapse</VIS.Term></strong> (most codes unused), <strong><VIS.Term def="Across catalog updates or retraining, codebook entries shift; the same item gets a different Semantic ID, breaking downstream consumers.">codebook drift</VIS.Term></strong> (Semantic IDs shift on retraining, breaking downstream), <strong><VIS.Term def="Two distinct items end up with identical K-tuple Semantic IDs. The system can no longer tell them apart at retrieval/ranking time.">collisions</VIS.Term></strong> (two distinct items map to the same K-tuple), <strong><VIS.Term def="Neural net that maps raw input (image, text, item) into a dense latent vector consumed by downstream layers.">encoder</VIS.Term> dependence</strong> (codebook quality depends on the content encoder).
      </p>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        44 problems. Each must require knowing RQ-VAE specifically (residual quantization, three losses, codebook collapse, prefix structure) to answer.
      </p>

      <h3 style={{marginTop:24, color:"#1f3a5f"}}>A. Identity & comparison</h3>

      {/* A1 */}
      <VIS.TrapProblem
        id="rqvae-a1"
        difficulty="hard"
        title="A1 — What separates RQ-VAE from single-codebook VQ-VAE?"
        scenario={<>Both produce discrete codes from continuous embeddings. Pick the load-bearing discriminator. <em>Discriminating insight: distinguish stacked-residual quantization from single-stage quantization.</em></>}
        options={[
          {key:"a", text:"RQ-VAE uses a continuous prior over codes whereas VQ-VAE uses a uniform categorical prior over a fixed codebook."},
          {key:"b", text:"RQ-VAE stacks K codebooks, each quantizing the residual from the prior level, so vocabulary grows as D^K with linear storage K·D.", correct:true},
          {key:"c", text:<>RQ-VAE replaces the <VIS.Term def="VQ-VAE term that pulls encoder outputs toward their chosen code; prevents the encoder from drifting away from the codebook.">commitment loss</VIS.Term> with a <VIS.Term def="Loss that pulls positive pairs together and pushes negatives apart in embedding space (e.g. InfoNCE).">contrastive loss</VIS.Term> across batch, while VQ-VAE keeps the standard commitment loss.</>},
          {key:"d", text:"RQ-VAE quantizes the encoder output and the decoder input separately, whereas VQ-VAE quantizes only the bottleneck."},
        ]}
        trap={<>(a) confuses with VAE prior taxonomy. (c) confuses with VQ-VAE-2 training tweaks. (d) invents a dual-quantization scheme that does not exist.</>}
        lens={<>The residual structure is the entire RQ-VAE contribution. It is a compute/memory hack that grows effective vocabulary exponentially in K while paying linearly.</>}
        stretch={<>What's the residual structure analog in transformer attention?</>}
      />

      {/* A2 */}
      <VIS.TrapProblem
        id="rqvae-a2"
        difficulty="hard"
        title={<>A2 — RQ-VAE vs <VIS.Term def="Product Quantization. Split a vector into K equal subspaces and quantize each independently; used for compact ANN indexes (Faiss).">product quantization (PQ)</VIS.Term></>}
        scenario={<>Both produce K codes per vector. Pick the actual difference. <em>Discriminating insight: split-the-vector vs quantize-the-residual.</em></>}
        options={[
          {key:"a", text:"PQ trains its codebooks jointly with a downstream task while RQ-VAE trains them with a pure reconstruction objective offline."},
          {key:"b", text:"PQ uses larger codebooks per stage to compensate for parallel structure, while RQ-VAE keeps codebooks small via residual sharing."},
          {key:"c", text:"PQ splits the vector into K disjoint sub-vectors and quantizes each independently; RQ-VAE quantizes the same vector K times on the residual.", correct:true},
          {key:"d", text:"PQ requires the vector to be unit-normalized so codes lie on the sphere; RQ-VAE drops that constraint via residual rescaling."},
        ]}
        trap={<>(a) flips training regime. (b) invents a size-asymmetry. (d) confuses with cosine-PQ variants.</>}
        lens={<>PQ codes are independent (parallel). RQ codes are dependent (residual). Hierarchical structure is what makes RQ-VAE's prefix-sharing work.</>}
        stretch={<>Could you replace TIGER's RQ-VAE with PQ? What breaks?</>}
      />

      {/* A3 */}
      <VIS.TrapProblem
        id="rqvae-a3"
        difficulty="hard"
        title="A3 — If RQ-VAE didn't exist, what's TIGER's fallback?"
        scenario={<>TIGER needs a discrete tokenization of items. Pick the closest fallback that loses the smallest amount of TIGER's value. <em>Discriminating insight: which tokenizer preserves an autoregressive decoder while losing only prefix-sharing?</em></>}
        options={[
          {key:"a", text:"Single-codebook VQ-VAE: still discrete and autoregressive-decodable, but loses prefix-sharing so cold-start degrades sharply.", correct:true},
          {key:"b", text:"Product quantization on content embeddings: gives K parallel codes that fit a decoder vocabulary similarly to RQ-VAE."},
          {key:"c", text:<><VIS.Term def="Locality-Sensitive Hashing. Hash family where similar vectors collide with high probability; used for cheap approximate nearest neighbor.">Locality-sensitive hashing</VIS.Term> with K bands: discrete codes are cheap and content-derived so cold-start behavior is preserved.</>},
          {key:"d", text:"Learned random-ID embeddings with a content-tower auxiliary loss to mimic prefix structure."},
        ]}
        trap={<>(b) PQ codes are parallel, not hierarchical — TIGER's autoregressive decode loses its meaning. (c) LSH is probabilistic, not trained with the decoder. (d) random-ID + aux loss is exactly what RQ-VAE replaces.</>}
        lens={<>RQ-VAE is the load-bearing piece that gives TIGER its cold-start story. The nearest fallback is VQ-VAE because it preserves the autoregressive contract.</>}
        stretch={<>How would TIGER+VQ-VAE compare to TIGER+RQ-VAE empirically?</>}
      />

      {/* A4 */}
      <VIS.TrapProblem
        id="rqvae-a4"
        difficulty="hard"
        title={<>A4 — Stack RQ-VAE inside <VIS.Term def="Hierarchical Sequential Transduction Units. Meta 2024 paper: sequence-modeling architecture for recommendation that scales past DLRM's plateau.">HSTU</VIS.Term></>}
        scenario={<>You use RQ-VAE Semantic IDs as the item-token vocabulary in HSTU. Pick all that follow. <em>Discriminating insight: which HSTU components become more load-bearing under a structured vocabulary?</em></>}
        multiSelect
        options={[
          {key:"a", text:"Cold-start improves: new items get content-derived prefixes and inherit useful sequence behavior from nearby trained items.", correct:true},
          {key:"b", text:<>Vocabulary explodes: <VIS.Term def="Function that turns a vector of scores into a probability distribution (largest score → largest probability, all sum to 1).">softmax</VIS.Term> over (action × Semantic-ID K-tuple) requires <VIS.Term def="Decompose softmax over a huge vocabulary into smaller softmaxes (e.g. one per code position) to make it tractable.">factorized softmax</VIS.Term> plus <VIS.Term def="Train the model to score observed (positive) items above a sub-sample of random non-observed (negative) items; avoids full softmax.">negative sampling</VIS.Term>.</>, correct:true},
          {key:"c", text:"Pointwise+aggregated norm matters more: Semantic-ID tokens have a different scale than action tokens and need rebalancing.", correct:true},
          {key:"d", text:<><VIS.Term def="How closely predicted probabilities match true frequencies. A model predicting 0.7 should be right 70% of the time.">Calibration</VIS.Term> becomes trivial because Semantic-ID priors give well-shaped softmax probabilities out of the box.</>},
          {key:"e", text:"HSTU's paper recommends this combo as the default configuration for billion-scale catalogs."},
        ]}
        trap={<>(d) misreads calibration as a vocabulary problem. (e) invents a paper recommendation.</>}
        lens={<>RQ-VAE composes with HSTU but is non-trivial. The combination of large vocab plus heterogeneous norm makes existing HSTU tricks more load-bearing, not less.</>}
        stretch={<>What additional design would you need to make this stack work at scale?</>}
      />

      {/* A5 */}
      <VIS.TrapProblem
        id="rqvae-a5"
        difficulty="hard"
        title="A5 — Where does prefix-sharing stop helping?"
        scenario={<>Prefix-sharing is RQ-VAE's value-add. Pick the catalog regime where it stops carrying signal. <em>Discriminating insight: content-discriminability vs scale/language/data.</em></>}
        options={[
          {key:"a", text:"Catalogs above 100M items where the prefix combinatorial space saturates and collision rate among popular items climbs sharply."},
          {key:"b", text:"Catalogs of near-identical descriptions (generic-brand SKUs): content has no discriminating variance so all prefixes collapse to one cluster.", correct:true},
          {key:"c", text:"Multilingual catalogs where a single encoder produces inconsistent embeddings and prefix structure fragments by language."},
          {key:"d", text:"Catalogs with abundant interaction data that already give learned random-ID embeddings near-optimal recall for warm items."},
        ]}
        trap={<>(a) is scale collision, separate phenomenon. (c) is real but is encoder failure, not prefix-sharing limit. (d) is irrelevant — warm-item quality doesn't bound prefix-sharing.</>}
        lens={<>Prefix-sharing works when content provides discriminating signal. Uniform content → no prefix variance → no value.</>}
        stretch={<>What's the empirical signal that prefix-sharing is no longer useful?</>}
      />

      <h3 style={{marginTop:32, color:"#1f3a5f"}}>B. Application</h3>

      {/* B1 */}
      <VIS.TrapProblem
        id="rqvae-b1"
        difficulty="hard"
        title="B1 — Replace random-ID embedding table for warm items?"
        scenario={<>You have a learned random-ID embedding table for 50M items (<VIS.Term def="Deep Learning Recommendation Model. Meta's classic recsys architecture: feature crosses + MLP top.">DLRM</VIS.Term>-v2-style <VIS.Term def="Recsys architecture: separate user-encoder tower and item-encoder tower; dot-product their outputs to score (user, item) pairs.">two-tower</VIS.Term>). Pick the gating principle for replacement. <em>Discriminating insight: when does the downstream consumer actually exploit prefix structure?</em></>}
        options={[
          {key:"a", text:"Replace whenever the catalog churn exceeds 5% per month, because random-ID embeddings cannot keep up with churn at that rate."},
          {key:"b", text:"Replace whenever recall regressed in the last A/B, because Semantic IDs reliably outperform random embeddings on warm items."},
          {key:"c", text:"Replace only when the consumer is autoregressive (TIGER, OneRec) or cold-start dominates; otherwise random IDs are simpler and equally good warm.", correct:true},
          {key:"d", text:"Replace only after migrating to a fresh content encoder, because Semantic IDs inherit the encoder's quality regardless of the consumer."},
        ]}
        trap={<>(a) confuses churn with cold-start. (b) over-claims warm-item lift. (d) is true but partial — it ignores whether the consumer uses prefix structure.</>}
        lens={<>RQ-VAE is justified when you are consuming Semantic IDs downstream (generative model) or when cold-start dominates. Otherwise it is overhead.</>}
        stretch={<>What's the cold-start rate threshold where Semantic IDs become worth it?</>}
      />

      {/* B2 */}
      <VIS.TrapProblem
        id="rqvae-b2"
        difficulty="hard"
        title="B2 — 'RQ-VAE is just dimensionality reduction'"
        scenario={<>A teammate dismisses RQ-VAE as "just PCA on embeddings." Pick the refutation that turns on the right mechanism. <em>Discriminating insight: what's the actual contract RQ-VAE fulfils that PCA cannot?</em></>}
        options={[
          {key:"a", text:"PCA is linear, RQ-VAE is nonlinear via the encoder, so RQ-VAE captures content interactions that PCA cannot represent."},
          {key:"b", text:"PCA loses variance from minor components, while RQ-VAE preserves them via residual quantization across K codebooks."},
          {key:"c", text:"PCA needs a feature-mean subtraction step, while RQ-VAE handles non-centered embeddings via its commitment loss term."},
          {key:"d", text:"PCA outputs continuous vectors; RQ-VAE outputs a discrete K-tuple that fits an autoregressive decoder vocabulary — the discreteness is the contract.", correct:true},
        ]}
        trap={<>(a) is true but PCA-vs-encoder is the wrong axis. (b) is reconstruction-fidelity, not the consumer contract. (c) is preprocessing trivia.</>}
        lens={<>Discreteness is RQ-VAE's contract with downstream autoregressive models. Continuous PCA cannot fulfil it.</>}
        stretch={<>What's the closest continuous analog with similar autoregressive compatibility?</>}
      />

      {/* B3 */}
      <VIS.TrapProblem
        id="rqvae-b3"
        difficulty="medium"
        title="B3 — Pitch RQ-VAE to a Director in one sentence"
        scenario={<>Director asks: "Why RQ-VAE Semantic IDs over random hashed IDs?" Pick the pitch that only works if the listener understands residual-prefix structure. <em>Discriminating insight: which pitch redaction-fails if you swap 'RQ-VAE' with a generic neural tokenizer?</em></>}
        options={[
          {key:"a", text:"Codes are stacked codebook prefixes from residual quantization, so two items sharing 2 of 4 codes are semantically close without co-occurring in training.", correct:true},
          {key:"b", text:"It uses a neural tokenizer trained on content, so cold-start works zero-shot, downstream models plug in, and we retire one legacy ID system."},
          {key:"c", text:<>It is the modern replacement for random hashing because production papers from Google and Kuaishou have shown 2% <VIS.Term def="Normalized Discounted Cumulative Gain. Ranking metric that rewards relevant items appearing near the top of the list.">NDCG</VIS.Term> lift in their reported numbers.</>},
          {key:"d", text:"It compresses embeddings into a few bytes, so the embedding table shrinks dramatically and we save serving memory across all downstream services."},
        ]}
        trap={<>(b) is the trap — the standard "cold-start + downstream + retire-a-system" pitch fits any neural tokenizer; redaction-substitute "RQ-VAE" with "Model X" and (b) is unchanged. (c) is appeal-to-authority. (d) is the compression use case, not the prefix-sharing pitch.</>}
        lens={<>Cold-start zero-shot retrieval comes specifically from codebook prefixes encoding hierarchical semantics via residual quantization. The pitch must turn on this mechanism.</>}
        stretch={<>If two new items share their first code by coincidence (not semantics), how does the prefix-shared neighborhood fail?</>}
      />

      {/* B4 */}
      <VIS.TrapProblem
        id="rqvae-b4"
        difficulty="hard"
        title="B4 — Worst-fit use case for RQ-VAE"
        scenario={<>Pick the deployment where RQ-VAE adds engineering cost with little payoff. <em>Discriminating insight: which downstream consumer ignores prefix structure entirely?</em></>}
        options={[
          {key:"a", text:"TIGER autoregressive retrieval with hourly catalog updates and a multilingual content encoder across five product locales."},
          {key:"b", text:"DLRM-style cross-feature MLP on a stable catalog with rich interaction data and negligible cold-start traffic.", correct:true},
          {key:"c", text:"OneRec sequence-to-sequence ranking where Semantic IDs serve as both encoder vocabulary and decoder vocabulary."},
          {key:"d", text:"HSTU action-item sequence model where item tokens are concatenated with action tokens in a unified vocabulary."},
        ]}
        trap={<>(a), (c), (d) are RQ-VAE's primary consumers — autoregressive models that exploit prefix structure.</>}
        lens={<>RQ-VAE is leveraged via downstream consumers. If your consumer does not use prefix structure, you do not benefit.</>}
        stretch={<>What's the smallest catalog where RQ-VAE is worth the engineering effort?</>}
      />

      <h3 style={{marginTop:32, color:"#1f3a5f"}}>C. Mechanism</h3>

      {/* C1 */}
      <VIS.TrapProblem
        id="rqvae-c1"
        difficulty="hard"
        title="C1 — Why residual quantization over parallel quantization?"
        scenario={<>Pick the property residual quantization adds that parallel (independent) quantization lacks. <em>Discriminating insight: structural property of the stacked codes.</em></>}
        options={[
          {key:"a", text:"Residual quantization yields tighter reconstruction MSE per code because residual norms shrink geometrically across layers."},
          {key:"b", text:"Residual quantization permits joint training of codebooks because gradients can flow through later codebooks back into earlier ones."},
          {key:"c", text:"Residual codes form a coarse-to-fine hierarchy: codebook k captures what codebooks 1..k-1 missed, so prefixes encode coarse similarity.", correct:true},
          {key:"d", text:"Residual quantization tolerates encoder drift better because each codebook independently re-snaps the residual at training time."},
        ]}
        trap={<>(a) is a true side-effect, not the load-bearing property. (b) overstates gradient flow vs straight-through. (d) confuses with EMA updates.</>}
        lens={<>The coarse-to-fine semantics enables prefix-sharing. The first code defines the coarse cluster; subsequent codes refine.</>}
        stretch={<>What's the failure mode if codebook 1 captures fine-grained details?</>}
      />

      {/* C2 */}
      <VIS.TrapProblem
        id="rqvae-c2"
        difficulty="hard"
        title="C2 — Why three losses (recon + commitment + codebook)?"
        scenario={<>RQ-VAE trains <VIS.Term def="Distance (usually MSE) between encoder input and decoder output. Drives the autoencoder to preserve information.">reconstruction</VIS.Term> + commitment + codebook losses jointly. Pick the role of all three. <em>Discriminating insight: which loss handles encoder-codebook coupling in each direction?</em></>}
        options={[
          {key:"a", text:"Recon shapes the encoder; commitment pins encoder to chosen codes; codebook loss moves codes toward encoder outputs — bidirectional coupling.", correct:true},
          {key:"b", text:<>Recon shapes both encoder and codes via <VIS.Term def="Backprop trick: forward pass uses a non-differentiable op (e.g. quantization); backward pass pretends it was identity so gradients flow.">straight-through</VIS.Term>; commitment is a <VIS.Term def="Asymmetric measure of distance between two distributions. Used as a regularizer in VAEs to keep latents near a prior.">KL</VIS.Term> regularizer; codebook loss is an entropy term over usage.</>},
          {key:"c", text:<>Recon shapes the <VIS.Term def="Neural net that maps a latent vector (or token sequence) back to the output space (reconstructed input, next item).">decoder</VIS.Term>; commitment regularizes the prior over codes; codebook loss enforces orthogonality between codes within a codebook.</>},
          {key:"d", text:"Recon and commitment are interchangeable forms of the same gradient; codebook loss is the only required term and the rest are stabilizers."},
        ]}
        trap={<>(b) confuses with continuous-VAE KL. (c) invents orthogonality. (d) misreads the gradient asymmetry.</>}
        lens={<>The three losses solve the chicken-and-egg between encoder and codebook. Drop any and training fails in a specific way.</>}
        stretch={<>Which of the three has the most tunable hyperparameter?</>}
      />

      {/* C3 */}
      <VIS.TrapProblem
        id="rqvae-c3"
        difficulty="hard"
        title="C3 — What's intentionally given up vs continuous embeddings?"
        scenario={<>Moving from continuous content embeddings to RQ-VAE Semantic IDs, pick all that are intentionally traded away. <em>Discriminating insight: what the discrete contract costs.</em></>}
        multiSelect
        options={[
          {key:"a", text:"Fine-grained distance structure: Semantic IDs at the same prefix are similar but exact intra-cluster distances are lost.", correct:true},
          {key:"b", text:"Direct dot-product retrievability: Semantic IDs are not vectors, so an autoregressive decoder must consume them.", correct:true},
          {key:"c", text:<>Differentiability for downstream gradients: discrete codes require <VIS.Term def="Straight-Through Estimator. Treats a non-differentiable op (quantization, rounding) as identity during backprop so gradients can flow.">straight-through estimators</VIS.Term> to backprop through.</>, correct:true},
          {key:"d", text:"Content information entirely: discrete codes throw away the encoder embedding once quantized."},
          {key:"e", text:"Item uniqueness: discrete codes guarantee identical Semantic IDs for distinct items."},
        ]}
        trap={<>(d) wrong — content info is preserved (reconstructable). (e) wrong — uniqueness is preserved with tiebreakers.</>}
        lens={<>Three real losses: distance structure, dot-product compatibility, differentiability. The gain is discreteness for autoregressive models.</>}
        stretch={<>Could a continuous-discrete hybrid recover any of these?</>}
      />

      {/* C4 */}
      <VIS.TrapProblem
        id="rqvae-c4"
        difficulty="hard"
        title="C4 — Commitment weight β at three regimes"
        scenario={<>You set β to 0.001, 0.25 (default), and 5.0. Pick the regime-by-regime failure description. <em>Discriminating insight: encoder-vs-codebook tug-of-war as β scales.</em></>}
        options={[
          {key:"a", text:"β=0.001 over-pins encoder; β=0.25 frees it; β=5.0 lets it drift — high β means more encoder freedom in VQ-style training."},
          {key:"b", text:"β=0.001: encoder drifts, codes stale, quantization gap explodes at inference. β=0.25: balanced. β=5.0: encoder squashed, recon loss high.", correct:true},
          {key:"c", text:"β=0.001 collapses the codebook to one code; β=0.25 prevents collapse via stronger commitment; β=5.0 maximizes codebook entropy directly."},
          {key:"d", text:"β=0.001 and β=5.0 both train fine because the codebook loss dominates; β only matters if you remove the codebook loss entirely."},
        ]}
        trap={<>(a) inverts the sign of β. (c) confuses β with code-balance regularizer. (d) misreads dominance.</>}
        lens={<>β controls encoder–codebook tug-of-war. 0.25 is the canonical VQ-VAE default.</>}

          {key:"c", text:"Inconclusive without training-curve evidence; continue training and re-measure utilization after another 20 epochs before deciding."},
          {key:"d", text:"Healthy staircase: residuals shrink across layers so later codes are inherently less common; this pattern is expected.", correct:true},
        ]}
        trap={<>(a) misreads the expected pattern. (b) inverts the alarm threshold. (c) refuses to read a clear pattern.</>}
        lens={<>Utilization decreases by codebook depth in healthy RQ-VAE. The metric must be tier-aware.</>}
        stretch={<>What utilization rate at codebook 1 would alarm you?</>}
      />

      {/* D2b */}
      <VIS.TrapProblem
        id="rqvae-d2b"
        difficulty="medium"
        title="D2b — 'Semantic IDs are forever' — what's wrong?"
        scenario={<>A teammate thinks Semantic IDs are immutable once trained. Pick the correction. <em>Discriminating insight: ID stability under retraining.</em></>}
        options={[
          {key:"a", text:"Semantic IDs change on every retrain; downstream must treat them as versioned data and key on (Semantic-ID, version) tuples.", correct:true},
          {key:"b", text:"Semantic IDs are immutable for items present at training time; only items added after training receive new IDs at inference time."},
          {key:"c", text:"Only the encoder changes across retrains; codebook entries are frozen by construction so Semantic IDs persist across versions."},
          {key:"d", text:"Only the decoder changes across retrains; Semantic IDs and codebooks are computed once and held constant for the model's lifetime."},
        ]}
        trap={<>(b), (c), (d) all invent partial-stability rules that the training procedure does not guarantee.</>}
        lens={<>Treat Semantic IDs as versioned. Downstream contracts need to handle version bumps gracefully.</>}
        stretch={<>What's the migration cost when versions bump?</>}
      />

      {/* A4b */}
      <VIS.TrapProblem
        id="rqvae-a4b"
        difficulty="hard"
        title="A4b — RQ-VAE applied to user embeddings"
        scenario={<>Could you use RQ-VAE to quantize USER embeddings instead of item content? Pick the assessment. <em>Discriminating insight: generality of residual quantization vs production leverage.</em></>}
        options={[
          {key:"a", text:"Impossible: RQ-VAE's encoder is wired to content features, so user embeddings (built from interaction history) cannot be quantized by it."},
          {key:"b", text:"Yes — same machinery on user embeddings yields user Semantic IDs; useful for discrete-user-token consumers, less leverage than items.", correct:true},
          {key:"c", text:"Trivially better than item tokenization because users have richer signal and codebooks fit user clusters more cleanly than item clusters."},
          {key:"d", text:"Equivalent to random hashing because user embeddings drift continuously and codebook stability cannot be maintained under that drift."},
        ]}
        trap={<>(a) over-restricts RQ-VAE. (c) over-claims user-side leverage. (d) confuses drift with infeasibility.</>}
        lens={<>RQ-VAE is a general quantization tool. Applying it to users is research-explored, niche in production.</>}
        stretch={<>What's the consumer model that benefits from user Semantic IDs?</>}
      />

      {/* E2b */}
      <VIS.TrapProblem
        id="rqvae-e2b"
        difficulty="hard"
        title="E2b — Continually updating codebooks online — practical?"
        scenario={<>You want to continually update codebooks online (every batch). Pick the production assessment. <em>Discriminating insight: codebook stability as a contract.</em></>}
        options={[
          {key:"a", text:"Always practical: online EMA updates were designed exactly for this and downstream consumers absorb small per-batch shifts naturally."},
          {key:"b", text:"Hourly updates are fine because per-hour drift is small enough that downstream embedding tables can stale-cache through it."},
          {key:"c", text:"Daily updates are fine because most production stacks already retrain downstream models nightly and absorb codebook changes in that cycle."},
          {key:"d", text:"Risky: any update changes some Semantic IDs; standard production uses frozen codebooks plus scheduled retraining events, not online.", correct:true},
        ]}
        trap={<>(a), (b), (c) all under-account for the downstream contract that depends on stable Semantic IDs.</>}
        lens={<>Codebook stability is a contract with downstream. Update frequency = how often you can break that contract.</>}
        stretch={<>What's the right retraining cadence in your environment?</>}
      />

      {/* C5b */}
      <VIS.TrapProblem
        id="rqvae-c5b"
        difficulty="hard"
        title="C5b — Joint end-to-end training with TIGER?"
        scenario={<>Can you jointly train RQ-VAE end-to-end with TIGER under a single loss? Pick the assessment. <em>Discriminating insight: gradient flow through the quantization step.</em></>}
        options={[
          {key:"a", text:"Always better than two-stage because the consumer gradient directly shapes codes for retrieval, eliminating the proxy-metric gap."},
          {key:"b", text:"Risky: the consumer gradient flows through quantization via straight-through; codebooks get pressure from both ends, often collapsing.", correct:true},
          {key:"c", text:"Impossible because the quantization step is non-differentiable and no estimator exists that lets the consumer loss reach the codebook."},
          {key:"d", text:"Trivial because PyTorch handles non-differentiable steps via autograd checkpointing, so the joint loss compiles without code changes."},
        ]}
        trap={<>(a) over-claims. (c) ignores straight-through. (d) misreads autograd.</>}
        lens={<>Two-stage is the production default. Joint training is research-frontier; needs careful gradient management.</>}
        stretch={<>How does straight-through estimator handle the discrete step?</>}
      />

      {/* D4b */}
      <VIS.TrapProblem
        id="rqvae-d4b"
        difficulty="hard"
        title="D4b — Cold-start: rich content but zero interactions"
        scenario={<>New item with rich content, zero interactions. RQ-VAE produces a Semantic ID. Pick what happens at retrieval. <em>Discriminating insight: how prefix inheritance bridges the cold-start gap.</em></>}
        options={[
          {key:"a", text:"Retrieval fails because the autoregressive decoder needs interaction history to assign non-trivial likelihood to a new Semantic-ID prefix."},
          {key:"b", text:"You must retrain RQ-VAE on the new item before retrieval can surface it; the codebook needs a fresh fit per cold item."},
          {key:"c", text:"The new ID inherits structure via shared codebooks; if a similar warm item exists, downstream retrieval surfaces it via shared prefix.", correct:true},
          {key:"d", text:"Use random ID embeddings for cold items and rely on a separate warm-start handoff once interactions accumulate over the first week."},
        ]}
        trap={<>(a) misreads the decoder's behavior. (b) misreads codebook generality. (d) bypasses RQ-VAE entirely, defeating the point.</>}
        lens={<>This is exactly the cold-start story RQ-VAE Semantic IDs enable. Inheriting prefix structure from neighbors gives zero-shot retrievability.</>}
        stretch={<>What's the recall gap vs warm items for cold-start?</>}
      />

      {/* F4b */}
      <VIS.TrapProblem
        id="rqvae-f4b"
        difficulty="medium"
        title="F4b — EMA decay rate for codebook updates"
        scenario={<>Pick the typical EMA decay rate for RQ-VAE codebook updates. <em>Discriminating insight: noise smoothing vs responsiveness tradeoff.</em></>}
        options={[
          {key:"a", text:"0.99 or 0.999: slow enough to smooth per-batch noise but responsive to systematic encoder shifts across training.", correct:true},
          {key:"b", text:"0.5: balanced smoothing that lets codebooks track encoder shifts within a few hundred batches at typical batch sizes."},
          {key:"c", text:"1.0 (no update): freeze codebooks from initialization and rely entirely on the commitment loss to align encoder outputs to codes."},
          {key:"d", text:"0.0 (full replace): replace each code with the latest batch's encoder mean for that code; lets codebooks track encoder exactly."},
        ]}
        trap={<>(b) is too aggressive. (c) freezes too hard. (d) is full noise.</>}
        lens={<>0.99 / 0.999 is the canonical range. Same as BatchNorm running stats.</>}
        stretch={<>When would you lower the decay?</>}
      />

      {/* E5b */}
      <VIS.TrapProblem
        id="rqvae-e5b"
        difficulty="hard"
        title="E5b — TIGER recall 30% below the paper. Likely causes?"
        scenario={<>You reproduce TIGER on your catalog. Recall is 30% lower than the paper. Pick the likely causes. <em>Discriminating insight: load-bearing inputs vs ops noise.</em></>}
        multiSelect
        options={[
          {key:"a", text:"Content quality on your catalog is lower than the paper's benchmark (sparser descriptions, multilingual mix).", correct:true},
          {key:"b", text:"Different content encoder choice (Sentence-T5 vs the paper's specific checkpoint or version).", correct:true},
          {key:"c", text:"Catalog scale mismatch (paper's 1M items vs your 100M shifts codebook utilization patterns).", correct:true},
          {key:"d", text:"GPU brand mismatch between your training cluster and the paper's reported H100 hardware setup."},
          {key:"e", text:"PyTorch random seed differences between your reproduction and the paper's released seed configuration."},
        ]}
        trap={<>(d), (e) are 2nd-order knobs that do not move recall by 30%.</>}
        lens={<>The three RQ-VAE inputs (content quality, encoder, scale) cascade. Reproduction failures usually trace to one of these.</>}
        stretch={<>What's the cheapest of the three to validate first?</>}
      />

      {/* A5b */}
      <VIS.TrapProblem
        id="rqvae-a5b"
        difficulty="hard"
        title="A5b — RQ-VAE vs LSH"
        scenario={<>Both produce discrete codes from continuous embeddings. Pick the load-bearing discriminator. <em>Discriminating insight: hashing for ANN vs trained codes for autoregressive decoding.</em></>}
        options={[
          {key:"a", text:"LSH and RQ-VAE both rely on trained codebooks, but LSH uses random projections while RQ-VAE uses learned residual projections."},
          {key:"b", text:"LSH preserves Euclidean distance more tightly than RQ-VAE, but RQ-VAE has lower decode latency because K is typically smaller."},
          {key:"c", text:"LSH gives probabilistically distance-preserving bucket codes for ANN; RQ-VAE gives jointly-trained hierarchical codes for autoregressive use.", correct:true},
          {key:"d", text:"LSH is a special case of RQ-VAE with K=1 codebook of random codes; both produce the same Semantic IDs under sufficient training."},
        ]}
        trap={<>(a) misstates LSH's training. (b) inverts the distance-preservation contract. (d) invents a reduction.</>}
        lens={<>LSH and RQ-VAE serve different downstream consumers. LSH → ANN. RQ-VAE → autoregressive.</>}
        stretch={<>Could you combine them?</>}
      />

      {/* C1c */}
      <VIS.TrapProblem
        id="rqvae-c1c"
        difficulty="hard"
        title="C1c — RQ-VAE for embedding compression"
        scenario={<>Could you use RQ-VAE purely to compress 768-d float embeddings to a tiny K-tuple ID? Pick the assessment. <em>Discriminating insight: compression as a real use case orthogonal to autoregressive vocabulary.</em></>}
        options={[
          {key:"a", text:"Yes — the K-tuple is ~K·log2(D) bits vs 768·32 bits for float32; massive storage win, with reconstruction fidelity as the trade.", correct:true},
          {key:"b", text:"No — RQ-VAE codebooks are trained jointly with a reconstruction loss that targets retrieval quality, not bit-rate compression."},
          {key:"c", text:"No — embeddings cannot be compressed below a Shannon limit set by the catalog entropy, and RQ-VAE does not approach that limit."},
          {key:"d", text:"Only when paired with a downstream autoregressive model; without one, the compressed code cannot be decoded back to a usable embedding."},
        ]}
        trap={<>(b) confuses recon loss with rate-distortion. (c) cites Shannon without grounding. (d) misreads the decoder requirement.</>}
        lens={<>Compression is a real use case orthogonal to the autoregressive-vocabulary use case. Both leverage discrete codes.</>}
        stretch={<>What's the compression ratio at K=4, D=256, dim=768?</>}
      />

      {/* D1c */}
      <VIS.TrapProblem
        id="rqvae-d1c"
        difficulty="medium"
        title="D1c — 'RQ-VAE solves cold-start, period'"
        scenario={<>An evangelist claims RQ-VAE solves cold-start completely. Pick the refutation. <em>Discriminating insight: in-distribution vs out-of-distribution cold-start.</em></>}
        options={[
          {key:"a", text:"Solved only for items with high-quality content embeddings; sparse-text items still cold-start poorly even if their category is in-distribution."},
          {key:"b", text:"Solved only for in-distribution items; new categories (OOD content) still cold-start poorly because codebooks have no codes for that region.", correct:true},
          {key:"c", text:"Cold-start is fundamentally unsolvable so the claim is false; random hashing reaches the same recall asymptote as RQ-VAE on cold items."},
          {key:"d", text:"Solved fully; the prefix-sharing mechanism gives zero-shot retrieval across both in-distribution and out-of-distribution items by construction."},
        ]}
        trap={<>(a) is true but a weaker refutation. (c) over-claims unsolvability. (d) is the evangelist's claim, restated.</>}
        lens={<>RQ-VAE handles in-distribution cold-start (new items in known categories). Out-of-distribution cold-start (new categories) needs additional machinery.</>}
        stretch={<>How would you detect OOD content shift?</>}
      />

    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://arxiv.org/abs/2107.10832" target="_blank" rel="noopener"><strong>Lee et al. — RQ-VAE for image generation (CVPR 2022)</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper)</span><br/>The original residual quantization paper. Originally for image gen; adapted to recsys later.</li>
        <li><a href="https://arxiv.org/abs/2507.22224" target="_blank" rel="noopener"><strong>Generative Recommendation with Semantic IDs: A Practitioner's Handbook (2025)</strong></a> <span style={{color:"#64748b", fontSize:14}}>(handbook)</span><br/>Production lessons + LC-Rec + multilingual encoder consistency.</li>
        <li><a href="https://arxiv.org/abs/1711.00937" target="_blank" rel="noopener"><strong>van den Oord et al. — VQ-VAE</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper, NIPS 2017)</span><br/>The ancestor of RQ-VAE. Commitment loss, EMA codebook updates.</li>
        <li><a href="https://arxiv.org/abs/2305.05065" target="_blank" rel="noopener"><strong>Rajput et al. — TIGER</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper, NeurIPS 2023)</span><br/>The first major recsys application of RQ-VAE.</li>
        <li><a href="https://arxiv.org/abs/2502.18965" target="_blank" rel="noopener"><strong>Cai et al. — OneRec</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper, Kuaishou 2025)</span><br/>OneRec uses RQ-VAE Semantic IDs as its decoding vocabulary.</li>
      </ul>
    </VIS.Section>
  </main>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
  <script>
    window.addEventListener("error", function (e) {
      const pre = document.createElement("pre");
      pre.style.cssText = "position:fixed;top:0;left:0;right:0;max-height:35vh;"
        + "overflow:auto;background:#fee2e2;color:#7f1d1d;padding:8px;"
        + "margin:0;font:12px/1.4 monospace;z-index:10002;";
      pre.textContent = "[visualize] " + (e.error?.stack || e.message || e);
      document.body.appendChild(pre);
    }, true);
  </script>
