          {key:"d", text:"GPU thermal."},
          {key:"e", text:"Random seed dependence."},
        ]}
        trap={<>(d), (e) aren't paper-flagged failures.</>}
        lens={<>The three are the canonical VQ-VAE family failure modes. Each has a standard fix (EMA, KL annealing, careful init).</>}
        stretch={<>Posterior collapse is more common in continuous VAE — does it really happen in RQ-VAE?</>}
      />

      {/* F5 */}
      <VIS.TrapProblem
        id="rqvae-f5"
        difficulty="hard"
        title="F5 — Community-found: multilingual encoder inconsistency"
        scenario={<>The 2025 handbook explicitly flags a specific RQ-VAE weakness on multilingual catalogs. What?</>}
        options={[
          {key:"a", text:"A single content encoder produces inconsistent embeddings across languages → items with the same product but different-language descriptions get different Semantic IDs → prefix structure fragments by language → cross-language transfer fails.", correct:true},
          {key:"b", text:"Multilingual codebooks are unstable."},
          {key:"c", text:"RQ-VAE doesn't work multilingually."},
          {key:"d", text:"Pretrained encoders are too small."},
        ]}
        trap={<>(b), (c), (d) misread.</>}
        lens={<>The fix is multilingual pretrained encoder (mT5, multilingual CLIP). Translation-equivalent items then get nearby embeddings, hence shared Semantic-ID prefixes.</>}
        stretch={<>How would you measure cross-language prefix quality?</>}
      />

      {/* F1b */}
      <VIS.TrapProblem
        id="rqvae-f1b"
        difficulty="hard"
        title="F1b — Items with very long content (e.g. 10K-word descriptions)"
        scenario={<>Items have 10K-word descriptions (e.g. long-form articles). What's the RQ-VAE pre-step?</>}
        options={[
          {key:"a", text:"Truncate or summarize content to encoder's context length before producing the embedding. Sentence-T5 typically handles ~512 tokens; longer content needs chunking + pooling or a different encoder. Truncation is lossy but standard.", correct:true},
          {key:"b", text:"RQ-VAE handles any length."},
          {key:"c", text:"Sentence-T5 accepts 10K tokens."},
          {key:"d", text:"Long content gives better Semantic IDs."},
        ]}
        trap={<>(b), (c), (d) misread encoder limits.</>}
        lens={<>The encoder's context length is a hard constraint. Long content is a preprocessing problem.</>}
        stretch={<>How would you chunk + pool? What does it lose?</>}
      />

      {/* F3b */}
      <VIS.TrapProblem
        id="rqvae-f3b"
        difficulty="hard"
        title="F3b — Codebook utilization metric"
        scenario={<>You measure codebook utilization: 70% of codebook 1 codes used, 30% of codebook 4 codes used. Healthy or unhealthy?</>}
        options={[
          {key:"a", text:"The staircase (later codebooks less utilized) is EXPECTED in healthy RQ-VAE — residuals get smaller after each layer; later codes are inherently less common. The pattern is healthy. Unhealthy would be: <40% utilization at codebook 1 (collapse) or zero codes used at codebook 4 (vanishing).", correct:true},
          {key:"b", text:"Unhealthy."},
          {key:"c", text:"Need more training."},
          {key:"d", text:"Codebook 4 should also be 70%."},
        ]}
        trap={<>(b), (c), (d) misread the staircase.</>}
        lens={<>Utilization decreases by codebook depth in healthy RQ-VAE. The metric must be tier-aware.</>}
        stretch={<>What utilization rate at codebook 1 would alarm you?</>}
      />

      {/* D2b */}
      <VIS.TrapProblem
        id="rqvae-d2b"
        difficulty="medium"
        title="D2b — 'Semantic IDs are forever'"
        scenario={<>A teammate thinks Semantic IDs are immutable once trained. What's wrong?</>}
        options={[
          {key:"a", text:"Semantic IDs change on every RQ-VAE retrain. Catalog updates often force retraining; downstream systems must treat Semantic IDs as versioned data, not stable keys. Operational implication: any downstream system needs a (Semantic-ID, version) tuple as its actual key.", correct:true},
          {key:"b", text:"They are forever."},
          {key:"c", text:"Only the encoder changes."},
          {key:"d", text:"Only the decoder changes."},
        ]}
        trap={<>(b), (c), (d) misread.</>}
        lens={<>Treat Semantic IDs as versioned. Downstream contracts need to handle version bumps gracefully.</>}
        stretch={<>What's the migration cost when versions bump?</>}
      />

      {/* A4b */}
      <VIS.TrapProblem
        id="rqvae-a4b"
        difficulty="hard"
        title="A4b — RQ-VAE for non-content items (e.g. user IDs)"
        scenario={<>Could you use RQ-VAE to quantize USER embeddings (instead of item content)?</>}
        options={[
          {key:"a", text:"Yes — same machinery, but the input is now a user embedding (e.g. average of their interaction history); output is a Semantic-ID for the user. Useful when downstream consumer needs discrete user tokens. Less common in practice; usually item tokenization carries more leverage.", correct:true},
          {key:"b", text:"Impossible."},
          {key:"c", text:"Trivially better than item tokenization."},
          {key:"d", text:"Same as random hashing."},
        ]}
        trap={<>(b), (c), (d) misread.</>}
        lens={<>RQ-VAE is a general quantization tool. Applying it to users is research-explored, niche in production.</>}
        stretch={<>What's the consumer model that benefits from user Semantic IDs?</>}
      />

      {/* E2b */}
      <VIS.TrapProblem
        id="rqvae-e2b"
        difficulty="hard"
        title="E2b — Online learning of codebooks"
        scenario={<>You want to continually update codebooks online. Practical?</>}
        options={[
          {key:"a", text:"Risky: every codebook update changes existing Semantic IDs for some items; downstream consumers see constant drift. The standard production pattern is FROZEN codebooks + scheduled retraining events (every few weeks), not online learning. Online updates are research-frontier; not production-ready.", correct:true},
          {key:"b", text:"Always practical."},
          {key:"c", text:"Hourly updates fine."},
          {key:"d", text:"Daily updates fine."},
        ]}
        trap={<>(b), (c), (d) under-account for drift.</>}
        lens={<>Codebook stability is a contract with downstream. Update frequency = how often you can break that contract.</>}
        stretch={<>What's the right retraining cadence in your environment?</>}
      />

      {/* C5b */}
      <VIS.TrapProblem
        id="rqvae-c5b"
        difficulty="hard"
        title="C5b — Joint training with downstream consumer"
        scenario={<>Can you jointly train RQ-VAE end-to-end with the consumer model (e.g. TIGER) using a single loss?</>}
        options={[
          {key:"a", text:"Risky: the consumer's gradient passes through the quantization step (non-differentiable); you need a straight-through estimator; codebooks then get gradient pressure from BOTH reconstruction (forwards) and consumer loss (backwards), often causing codebook collapse. The TIGER paper uses two-stage training for stability.", correct:true},
          {key:"b", text:"Always better than two-stage."},
          {key:"c", text:"Impossible."},
          {key:"d", text:"Trivial."},
        ]}
        trap={<>(b), (c), (d) misread.</>}
        lens={<>Two-stage is the production default. Joint training is research-frontier; needs careful gradient management.</>}
        stretch={<>How does straight-through estimator handle the discrete step?</>}
      />

      {/* D4b */}
      <VIS.TrapProblem
        id="rqvae-d4b"
        difficulty="hard"
        title="D4b — Cold-start: rich content but no training history"
        scenario={<>New item: rich content, zero interactions. RQ-VAE → Semantic ID. Then what?</>}
        options={[
          {key:"a", text:"The new item's Semantic ID inherits structure from similar trained items via shared codebooks; if a similar warm item exists, downstream retrieval will surface the new item via shared prefix. Zero-shot retrieval without any training on the new item.", correct:true},
          {key:"b", text:"Doesn't work for cold-start."},
          {key:"c", text:"Need to retrain RQ-VAE for each new item."},
          {key:"d", text:"Use random embeddings instead."},
        ]}
        trap={<>(b), (c), (d) misread.</>}
        lens={<>This is exactly the cold-start story RQ-VAE Semantic IDs enable. Inheriting prefix structure from neighbors gives zero-shot retrievability.</>}
        stretch={<>What's the recall gap vs warm items for cold-start?</>}
      />

      {/* F4b */}
      <VIS.TrapProblem
        id="rqvae-f4b"
        difficulty="medium"
        title="F4b — EMA decay rate"
        scenario={<>What EMA decay rate is typical for RQ-VAE codebook updates?</>}
        options={[
          {key:"a", text:"0.99 or 0.999 — slow enough to smooth out per-batch noise but responsive to systematic encoder shifts. Too low (e.g. 0.9) → noisy codebooks; too high (e.g. 0.9999) → codebooks lag too much.", correct:true},
          {key:"b", text:"0.5."},
          {key:"c", text:"1.0 (no update)."},
          {key:"d", text:"0.0 (full replace)."},
        ]}
        trap={<>(b), (c), (d) misread.</>}
        lens={<>0.99 / 0.999 is the canonical range. Same as BatchNorm running stats.</>}
        stretch={<>When would you lower the decay?</>}
      />

      {/* E5b */}
      <VIS.TrapProblem
        id="rqvae-e5b"
        difficulty="hard"
        title="E5b — Reproducing TIGER via RQ-VAE on your catalog"
        scenario={<>You build TIGER on your catalog. Recall is 30% lower than the paper. Most likely cause?</>}
        multiSelect
        options={[
          {key:"a", text:"Content quality on your catalog is lower than the paper's benchmark (sparser descriptions, multilingual mix).", correct:true},
          {key:"b", text:"Different content encoder choice (Sentence-T5 vs other).", correct:true},
          {key:"c", text:"Catalog scale (paper's 1M items vs your 100M).", correct:true},
          {key:"d", text:"GPU brand."},
          {key:"e", text:"Random seed."},
        ]}
        trap={<>(d), (e) are 2nd-order.</>}
        lens={<>The three RQ-VAE inputs (content quality, encoder, scale) cascade. Reproduction failures usually trace to one of these.</>}
        stretch={<>What's the cheapest of the three to validate first?</>}
      />

      {/* A5b */}
      <VIS.TrapProblem
        id="rqvae-a5b"
        difficulty="hard"
        title="A5b — RQ-VAE vs LSH"
        scenario={<>Both produce discrete codes. Which discriminator matters?</>}
        options={[
          {key:"a", text:"LSH produces probabilistically-distance-preserving codes for ANN search; the codes are useful as bucket assignments but lack hierarchical semantics. RQ-VAE codes are jointly trained with the encoder and have explicit hierarchical structure (residual). LSH is useful for retrieval; RQ-VAE for autoregressive generation.", correct:true},
          {key:"b", text:"They're identical."},
          {key:"c", text:"LSH is hierarchical."},
          {key:"d", text:"RQ-VAE is just LSH."},
        ]}
        trap={<>(b), (c), (d) misread.</>}
        lens={<>LSH and RQ-VAE serve different downstream consumers. LSH → ANN; RQ-VAE → autoregressive.</>}
        stretch={<>Could you combine them?</>}
      />

      {/* C1c */}
      <VIS.TrapProblem
        id="rqvae-c1c"
        difficulty="hard"
        title="C1c — RQ-VAE for embedding compression"
        scenario={<>Could you use RQ-VAE just to compress 768-d embeddings to a tiny K-tuple ID?</>}
        options={[
          {key:"a", text:"Yes — that's exactly the use case. The discrete K-tuple is ~K·log2(D) bits vs 768·32 bits for the original float32 embedding. Massive storage win. Loss of fidelity is the trade.", correct:true},
          {key:"b", text:"RQ-VAE is not for compression."},
          {key:"c", text:"Embeddings can't be compressed."},
          {key:"d", text:"Compression doesn't matter."},
        ]}
        trap={<>(b), (c), (d) misread.</>}
        lens={<>Compression is a real use case orthogonal to the autoregressive-vocabulary use case. Both leverage discrete codes.</>}
        stretch={<>What's the compression ratio at K=4, D=256, dim=768?</>}
      />

      {/* D1c */}
      <VIS.TrapProblem
        id="rqvae-d1c"
        difficulty="medium"
        title="D1c — 'RQ-VAE solves cold-start, period'"
        scenario={<>An evangelist says RQ-VAE solves cold-start. Defeat.</>}
        options={[
          {key:"a", text:"Only for items in the RQ-VAE training distribution. New CATEGORIES of items (out-of-distribution content) still cold-start poorly — codebooks don't have codes for that region of embedding space. The fix requires periodic RQ-VAE retraining as the distribution evolves.", correct:true},
          {key:"b", text:"RQ-VAE solves it forever."},
          {key:"c", text:"Cold-start is unsolvable."},
          {key:"d", text:"Use random hashing."},
        ]}
        trap={<>(b), (d) over-claim. (c) under-claims.</>}
        lens={<>RQ-VAE handles in-distribution cold-start (new items in known categories). Out-of-distribution cold-start (new categories) needs additional machinery.</>}
        stretch={<>How would you detect OOD content shift?</>}
      />

    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://arxiv.org/abs/2107.10832" target="_blank" rel="noopener"><strong>Lee et al. — RQ-VAE for image generation (CVPR 2022)</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper)</span><br/>The original residual quantization paper. Originally for image gen; adapted to recsys later.</li>
        <li><a href="https://arxiv.org/abs/2507.22224" target="_blank" rel="noopener"><strong>Generative Recommendation with Semantic IDs: A Practitioner's Handbook (2025)</strong></a> <span style={{color:"#64748b", fontSize:14}}>(handbook)</span><br/>Production lessons + LC-Rec + multilingual encoder consistency.</li>
        <li><a href="https://arxiv.org/abs/1711.00937" target="_blank" rel="noopener"><strong>van den Oord et al. — VQ-VAE</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper, NIPS 2017)</span><br/>The ancestor of RQ-VAE. Commitment loss, EMA codebook updates.</li>
        <li><a href="https://arxiv.org/abs/2305.05065" target="_blank" rel="noopener"><strong>Rajput et al. — TIGER</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper, NeurIPS 2023)</span><br/>The first major recsys application of RQ-VAE.</li>
        <li><a href="https://arxiv.org/abs/2502.18965" target="_blank" rel="noopener"><strong>Cai et al. — OneRec</strong></a> <span style={{color:"#64748b", fontSize:14}}>(paper, Kuaishou 2025)</span><br/>OneRec uses RQ-VAE Semantic IDs as its decoding vocabulary.</li>
      </ul>
    </VIS.Section>
  </main>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
  <script>
    window.addEventListener("error", function (e) {
      const pre = document.createElement("pre");
      pre.style.cssText = "position:fixed;top:0;left:0;right:0;max-height:35vh;"
        + "overflow:auto;background:#fee2e2;color:#7f1d1d;padding:8px;"
        + "margin:0;font:12px/1.4 monospace;z-index:10002;";
      pre.textContent = "[visualize] " + (e.error?.stack || e.message || e);
      document.body.appendChild(pre);
    }, true);
  </script>
