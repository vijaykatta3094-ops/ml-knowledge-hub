<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// REDO v2 — RecSys-SOTA batch 15
// ScaNN (Google) — anisotropic vector quantization for inner-product search
// Unique mechanism: vector quantization where the codebook is trained to
// minimize quantization error WEIGHTED by inner-product directionality —
// not uniform L2 reconstruction error. Custom for max-inner-product search
// (MIPS), which is what two-tower retrieval actually wants.
// Anchor that survives redaction: "anisotropic vector quantization —
// quantization error WEIGHTED by inner-product loss directionality, not
// uniform L2. Custom for max-inner-product search."
// ANN-trio caution:
//   HNSW    = proximity graph (RAM-heavy, log-time)
//   IVF-PQ  = clustering + product quantization (compact but lossy, ISOTROPIC)
//   ScaNN   = anisotropic quantization (loss-aware, MIP-tuned) [THIS visual]

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="RecSys SOTA · Sparse retrieval / ANN"
      title="ScaNN (Google) — anisotropic quantization for inner-product search"
      subtitle="Quantize vectors so the error is small in the direction of the inner product - the only direction MIPS cares about. PQ is isotropic; ScaNN is loss-aware."
      byline={[
        {label: "Paper", value: "Guo et al., 'Accelerating Large-Scale Inference with Anisotropic Vector Quantization' (ICML 2020); production at Google 2024-2026"},
        {label: "Surface", value: "Inner-product retrieval (two-tower, dual encoders) at extreme latency budgets"},
        {label: "Anchor that survives redaction", value: "Anisotropic vector quantization - quantization error WEIGHTED by inner-product loss directionality, not uniform L2"},
      ]}/>

    <VIS.TLDR>
      Product quantization minimizes the generic L2 reconstruction error of each subvector - it treats every direction equally. But max-inner-product search (MIPS) does NOT care equally about every direction: error perpendicular to the query barely changes the dot product, while error parallel to the query changes it a lot. <strong>ScaNN&apos;s anisotropic quantization</strong> reweights the loss so the codebook spends its budget on parallel-direction precision and tolerates perpendicular error. Same byte budget as PQ; lower MIPS error. The senior trap: ScaNN is NOT &ldquo;a better PQ for everything.&rdquo; The win is specifically in <em>inner-product retrieval</em> (two-tower recommenders, dual-encoder semantic search) and disappears when the metric is L2 (image retrieval) or when the embedding distribution is itself isotropic.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is — anisotropic codebook training">
      <VIS.Mermaid chart={`flowchart TB
  V["Vector v"]
  Q["Query q"]
  ERR_PAR["Error along q (parallel)"]
  ERR_PERP["Error perpendicular to q"]
  L_PQ["PQ loss: ||v - q_hat||^2 (isotropic)"]
  L_SCANN["ScaNN loss: weight parallel-error >> perpendicular-error"]
  V --> ERR_PAR
  V --> ERR_PERP
  ERR_PAR --> L_PQ
  ERR_PERP --> L_PQ
  ERR_PAR --> L_SCANN
  ERR_PERP --> L_SCANN
  L_SCANN --> CODEBOOK["Trained codebook (anisotropic)"]
  CODEBOOK --> RETRIEVE["MIPS lookup over codes"]
  Q --> RETRIEVE`} />
      <ul>
        <li><strong>The PQ baseline</strong> trains each subvector codebook by k-means on the subvector population - minimizes uniform L2 reconstruction error.</li>
        <li><strong>ScaNN reweights the loss</strong> so quantization error parallel to a typical query direction is penalized much more than error perpendicular to it. Same byte budget; codebook entries cluster along high-dot-product axes.</li>
        <li><strong>Result</strong> - for the same code length, MIPS distance estimate is more accurate; recall at fixed latency lifts a few points over PQ on inner-product workloads.</li>
        <li><strong>It is not a graph and not a clustering scheme</strong> - it is a quantization-objective change. ScaNN is typically composed with a coarse partitioner (similar to IVF) and an in-memory codebook lookup.</li>
      </ul>
      <p>The mechanism is the loss function, not the index topology.</p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How ScaNN differs from HNSW and IVF-PQ">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8, fontSize:14}}>
        <thead><tr style={{background:"#1f3a5f", color:"#fff"}}>
          <th style={{textAlign:"left", padding:8}}>Method</th>
          <th style={{textAlign:"left", padding:8}}>Core mechanism</th>
          <th style={{textAlign:"left", padding:8}}>Loss</th>
          <th style={{textAlign:"left", padding:8}}>Sweet spot</th>
        </tr></thead>
        <tbody>
          <tr><td style={{padding:8}}>HNSW</td><td style={{padding:8}}>Proximity graph</td><td style={{padding:8}}>Greedy walk on raw distance</td><td style={{padding:8}}>Up to hundreds of millions</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:8}}>IVF-PQ</td><td style={{padding:8}}>Clusters + product codes</td><td style={{padding:8}}><strong>Isotropic L2</strong> reconstruction</td><td style={{padding:8}}>Billion-scale, generic distance</td></tr>
          <tr><td style={{padding:8}}><strong>ScaNN</strong></td><td style={{padding:8}}><strong>Coarse partition + anisotropic codes</strong></td><td style={{padding:8}}><strong>Inner-product-aware (anisotropic)</strong></td><td style={{padding:8}}><strong>MIPS, microsecond budgets</strong></td></tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — 24 trap problems">
      <p style={{color:"#475569"}}>Each problem cites the axis it draws from. Pick, then reveal.</p>

      <VIS.TrapProblem id="scann-p1" difficulty="hard"
        title="P1 — ScaNN vs PQ: load-bearing difference"
        scenario={<><em>Discriminating insight: PQ minimizes UNIFORM L2 reconstruction error in each subvector codebook - all directions matter equally. ScaNN minimizes ANISOTROPIC error - parallel-to-query direction matters MORE than perpendicular. Same byte budget, MIPS-aware codebook.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"PQ trains codebooks to minimize generic L2 reconstruction error per subvector - all directions are equally penalized. ScaNN weights the loss so error in the inner-product direction is penalized more than perpendicular error. Same byte budget per vector; MIPS distance is more accurate; L2 distance is no better.", correct:true},
          {key:"b", text:"PQ and ScaNN train the same codebooks."},
          {key:"c", text:"ScaNN uses bigger codebooks."},
          {key:"d", text:"PQ uses a proximity graph; ScaNN does not."},
        ]}
        trap={<>(b)(c)(d) collapse the anisotropic-loss mechanism.</>}
        lens={<>PQ = isotropic L2 loss. ScaNN = inner-product-direction-weighted loss.</>}
        stretch={<>What does the anisotropic loss look like in closed form?</>}
      />

      <VIS.TrapProblem id="scann-p2" difficulty="hard"
        title="P2 — ScaNN vs HNSW: anchor each"
        scenario={<><em>Discriminating insight: HNSW is a proximity-graph walk over raw vectors - no quantization, RAM-heavy, recall ceiling extremely high. ScaNN is a quantization method whose codebook is loss-aware for MIPS - compact codes, sub-millisecond budgets. Different mechanism class entirely.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"HNSW is a graph-walk over raw vectors; no quantization; RAM-heavy; very high recall ceiling. ScaNN is a quantization method whose codebook is trained to be inner-product-aware; compact codes; built for sub-millisecond MIPS. Different mechanism class entirely.", correct:true},
          {key:"b", text:"Both walk a proximity graph."},
          {key:"c", text:"HNSW is anisotropic by default."},
          {key:"d", text:"They are interchangeable."},
        ]}
        trap={<>(b)(c)(d) confuse graph walking with quantization.</>}
        lens={<>HNSW = graph, raw vectors. ScaNN = anisotropic quantization, MIPS-tuned.</>}
        stretch={<>Why does HNSW dominate L2 retrieval while ScaNN dominates MIPS?</>}
      />

      <VIS.TrapProblem id="scann-p3" difficulty="medium"
        title="P3 — Without ScaNN, what is the realistic fallback?"
        scenario={<><em>Discriminating insight: realistic fallbacks for MIPS are IVF-PQ (isotropic but compact), normalize-then-L2 + HNSW (works if you can re-normalize), or learned index (research). ScaNN sits at the &ldquo;optimized for inner product with compact codes&rdquo; corner.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"IVF-PQ (compact codes but isotropic loss - leaves recall on the table for MIPS), or normalize-to-unit-sphere then HNSW with L2 (works but RAM-heavy), or coarse learned indices (research). ScaNN owns the &ldquo;compact codes AND inner-product-aware&rdquo; corner.", correct:true},
          {key:"b", text:"Brute-force MIPS at parity."},
          {key:"c", text:"Random retrieval."},
          {key:"d", text:"BM25 only."},
        ]}
        trap={<>(b)(c)(d) under-shoot MIPS at scale.</>}
        lens={<>ScaNN&apos;s niche is compact + MIPS-aware.</>}
        stretch={<>How does normalize-then-L2 compare on recall vs ScaNN?</>}
      />

      <VIS.TrapProblem id="scann-p4" difficulty="hard"
        title="P4 — Compose ScaNN with a coarse partitioner (tree / IVF-like)"
        scenario={<><em>Discriminating insight: production ScaNN uses a coarse partitioner (tree or IVF-like) to prune the catalog to a few thousand candidates, then runs the anisotropic-code distance estimate, then RE-RANKS the top few hundred with exact distance on raw vectors. Three stages, each load-bearing.</em><br/>What does the composition achieve?</>}
        options={[
          {key:"a", text:"Three stages: (1) coarse partitioner prunes the catalog to a few thousand candidates, (2) anisotropic-code distance gives a cheap MIPS estimate over those candidates, (3) top few hundred are re-ranked with exact raw-vector distance. Each stage cuts cost and the final rerank rescues recall lost to quantization.", correct:true},
          {key:"b", text:"ScaNN is a single stage."},
          {key:"c", text:"The partitioner is optional and never matters."},
          {key:"d", text:"Reranking is forbidden."},
        ]}
        trap={<>(b)(c)(d) miss the three-stage cascade.</>}
        lens={<>Partition + anisotropic codes + exact rerank - three load-bearing stages.</>}
        stretch={<>How many candidates does the rerank touch in production?</>}
      />

      <VIS.TrapProblem id="scann-p5" difficulty="medium"
        title="P5 — Where does ScaNN&apos;s edge over PQ shrink to zero?"
        scenario={<><em>Discriminating insight: anisotropic quantization is only better than isotropic PQ when the loss is genuinely anisotropic - i.e., the distance metric is inner-product and queries have a directional bias. For L2 image retrieval, the directionality argument disappears and ScaNN reduces to PQ.</em><br/>Where does the edge vanish?</>}
        options={[
          {key:"a", text:"L2 retrieval (e.g., image embeddings used with Euclidean distance). The anisotropic-loss reweighting assumes inner-product is the loss that matters; for L2, every direction is equally important and the reweighting buys nothing. ScaNN reduces to PQ.", correct:true},
          {key:"b", text:"ScaNN always wins."},
          {key:"c", text:"Inner-product retrieval is where ScaNN underperforms."},
          {key:"d", text:"The distance metric does not affect quantization."},
        ]}
        trap={<>(b)(c)(d) miss the metric-dependent argument.</>}
        lens={<>Anisotropy needs a directional loss; L2 has none.</>}
        stretch={<>What other metrics share the directionality structure?</>}
      />

      <VIS.TrapProblem id="scann-p6" difficulty="hard"
        title="P6 — Pick the retrieval architecture"
        scenario={<><em>Discriminating insight: a 500M-vector two-tower retrieval surface at 50k QPS, p95 latency 2 ms (extreme), recall@100 target 0.9. MIPS-native embedding. HNSW does not fit the 2 ms budget; IVF-PQ leaves recall on the table. ScaNN&apos;s coarse + anisotropic-codes + rerank meets all three.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"ScaNN - 500M vectors with MIPS embedding at 2 ms p95 and recall@100=0.9 is its production sweet spot. HNSW exceeds the latency budget. IVF-PQ&apos;s isotropic codes cap recall a few points below target. ScaNN&apos;s anisotropic codebook + coarse partition + small rerank meets all three constraints.", correct:true},
          {key:"b", text:"HNSW - exceeds the 2 ms latency budget."},
          {key:"c", text:"IVF-PQ - misses the recall target."},
          {key:"d", text:"Brute-force - impossible at 500M, 2 ms."},
        ]}
        trap={<>(b) latency. (c) recall. (d) latency.</>}
        lens={<>MIPS + extreme latency + recall pressure = ScaNN.</>}
        stretch={<>What if the embedding switched to L2?</>}
      />

      <VIS.TrapProblem id="scann-p7" difficulty="hard"
        title="P7 — Sounds reasonable: &ldquo;ScaNN should beat PQ on every benchmark&rdquo;"
        scenario={<><em>Discriminating insight: anisotropic quantization is a MIPS-specific optimization. On L2 image-retrieval benchmarks it ties PQ; on inner-product benchmarks it wins. The blanket claim &ldquo;ScaNN beats PQ&rdquo; is wrong - it depends on the loss the benchmark uses.</em><br/>Why is the blanket claim wrong?</>}
        options={[
          {key:"a", text:"Anisotropic quantization optimizes the inner-product-direction error. On L2 benchmarks the directional argument vanishes and ScaNN ties PQ. ScaNN&apos;s win is metric-conditional: it shines on MIPS workloads and ties on L2.", correct:true},
          {key:"b", text:"ScaNN always wins."},
          {key:"c", text:"ScaNN always loses."},
          {key:"d", text:"Quantization is metric-independent."},
        ]}
        trap={<>(b)(c)(d) miss the metric dependency.</>}
        lens={<>Anisotropy is loss-specific; check the metric before claiming the win.</>}
        stretch={<>What does the recall-vs-metric chart look like?</>}
      />

      <VIS.TrapProblem id="scann-p8" difficulty="hard"
        title="P8 — ScaNN&apos;s anchor (anisotropic loss + coarse partition + rerank): pitch it"
        scenario={<><em>Discriminating insight: the anchor names all three pieces - anisotropic loss for inner-product, coarse partitioning to prune, and exact rerank on the top few hundred. A pitch missing any one is incomplete.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"ScaNN trains a codebook to minimize quantization error weighted by inner-product direction (anisotropic loss), composes it with a coarse partitioner to prune the catalog quickly, then re-ranks the top candidates with exact raw-vector inner-product. Designed end-to-end for MIPS at microsecond budgets.", correct:true},
          {key:"b", text:"ScaNN is a proximity-graph walk."},
          {key:"c", text:"ScaNN is brute-force scan."},
          {key:"d", text:"ScaNN is LSH."},
        ]}
        trap={<>(b) is HNSW. (c) is the baseline. (d) is LSH.</>}
        lens={<>Anisotropic codes + coarse partition + rerank - all three.</>}
        stretch={<>Which of the three is hardest to engineer well?</>}
      />

      <VIS.TrapProblem id="scann-p9" difficulty="hard" multiSelect
        title="P9 — When NOT to use ScaNN. Select all that apply."
        scenario={<><em>Discriminating insight: ScaNN needs (i) inner-product distance, (ii) extreme latency pressure that justifies the training complexity, (iii) stable embedding distribution. It is wrong for L2 retrieval, rapidly drifting embeddings, or surfaces where the team cannot afford the more complex codebook training pipeline.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"L2 image retrieval where the anisotropic argument does not apply - PQ ties ScaNN at lower training complexity.", correct:true},
          {key:"b", text:"Embedding distribution that drifts weekly - the anisotropic codebook becomes mistuned faster than it can be retrained.", correct:true},
          {key:"c", text:"Two-tower retrieval with MIPS at 2 ms p95 - the production sweet spot."},
          {key:"d", text:"Tiny team that cannot maintain a custom codebook-training pipeline; off-the-shelf Faiss IVF-PQ is operationally simpler.", correct:true},
          {key:"e", text:"Cosine-similarity retrieval where vectors are normalized to unit norm - cosine reduces to inner product."},
        ]}
        trap={<>(c) sweet spot. (e) is exactly where ScaNN works - unit-norm makes inner-product = cosine.</>}
        lens={<>ScaNN needs MIPS + latency pressure + stable embedding + ops capacity.</>}
        stretch={<>What signals codebook mistuning in production?</>}
      />

      <VIS.TrapProblem id="scann-p10" difficulty="hard"
        title="P10 — Why does inner-product care about direction at all?"
        scenario={<><em>Discriminating insight: inner product q.v decomposes as |q||v|cos(theta). Quantization error of v perpendicular to q changes |v| only along q-perpendicular - barely changes the dot product. Quantization error along q changes |v| along q - directly changes the dot product. The asymmetry is intrinsic to inner-product geometry.</em><br/>Why direction matters.</>}
        options={[
          {key:"a", text:"Inner product q.v depends on the projection of v onto q. Quantization error perpendicular to q does not change the projection and barely changes the dot product. Error parallel to q changes the projection directly. The asymmetry is inherent to inner-product geometry and the anisotropic loss exploits it.", correct:true},
          {key:"b", text:"Direction matters only for L2."},
          {key:"c", text:"Inner product is direction-blind."},
          {key:"d", text:"Quantization error is uniform by symmetry."},
        ]}
        trap={<>(b)(c)(d) miss the geometric argument.</>}
        lens={<>Inner product cares only about the projection onto q.</>}
        stretch={<>What is the closed-form anisotropic loss?</>}
      />

      <VIS.TrapProblem id="scann-p11" difficulty="hard"
        title="P11 — Why is the rerank stage non-negotiable?"
        scenario={<><em>Discriminating insight: anisotropic quantization still has approximation error - the top-1 by anisotropic estimate is not always the true top-1. A small exact rerank over the top candidates is what produces the headline recall numbers. Skipping it costs recall.</em><br/>Why rerank?</>}
        options={[
          {key:"a", text:"Anisotropic codes give a cheap MIPS ESTIMATE, not the exact distance. The top-K-by-estimate is not exactly the top-K-by-truth. A small exact rerank over the top few hundred candidates (using raw vectors loaded on demand) rescues most of the recall lost to quantization. Skipping rerank cuts headline recall a few points.", correct:true},
          {key:"b", text:"Rerank is optional."},
          {key:"c", text:"Rerank uses anisotropic codes again."},
          {key:"d", text:"Rerank is for serving, not retrieval."},
        ]}
        trap={<>(b)(c)(d) collapse the rerank role.</>}
        lens={<>Anisotropic codes propose; exact rerank ratifies.</>}
        stretch={<>How big should the rerank pool be?</>}
      />

      <VIS.TrapProblem id="scann-p12" difficulty="hard"
        title="P12 — What does ScaNN deliberately drop vs HNSW?"
        scenario={<><em>Discriminating insight: HNSW gives recall ceiling close to 1.0 over raw vectors. ScaNN trades that ceiling for sub-millisecond latency on MIPS - the anisotropic quantization is approximate, and even the exact rerank only sees a top few hundred. The drop is recall ceiling.</em><br/>What does ScaNN forfeit?</>}
        options={[
          {key:"a", text:"Recall ceiling. HNSW&apos;s graph walk over raw vectors reaches near-perfect recall at the price of RAM and latency. ScaNN&apos;s anisotropic codes are approximate; the exact rerank only sees the top few hundred; the recall ceiling sits a few points below HNSW. The gain is sub-millisecond MIPS at compact memory.", correct:true},
          {key:"b", text:"ScaNN forfeits MIPS."},
          {key:"c", text:"ScaNN forfeits embeddings."},
          {key:"d", text:"ScaNN forfeits the rerank."},
        ]}
        trap={<>(b)(c)(d) miss what is sacrificed.</>}
        lens={<>Recall ceiling vs latency - ScaNN&apos;s deliberate trade.</>}
        stretch={<>How far below HNSW is the ceiling?</>}
      />

      <VIS.TrapProblem id="scann-p13" difficulty="hard"
        title="P13 — Most fragile knob"
        scenario={<><em>Discriminating insight: the anisotropic loss WEIGHT (how much parallel-error is penalized relative to perpendicular-error) dominates. Mis-set, the codebook is either generic-PQ (no anisotropic gain) or over-aggressive (catastrophic perpendicular blow-up). Rerank pool size is secondary; K (number of codebooks) is robust within a wide range.</em><br/>Rank by 2x mis-set breakage.</>}
        options={[
          {key:"a", text:"Anisotropic-loss weight is most fragile - mis-set, the codebook either reverts to generic PQ (no win) or over-emphasizes parallel and explodes perpendicular error. Rerank pool size is next. K (number of codebooks) is most forgiving over a wide range.", correct:true},
          {key:"b", text:"K is most fragile."},
          {key:"c", text:"Rerank pool size is most fragile."},
          {key:"d", text:"Random seed is most fragile."},
        ]}
        trap={<>(b) wide-range robust. (c) tunable at query time. (d) noise.</>}
        lens={<>Anisotropic-loss weight is the load-bearing dial.</>}
        stretch={<>How is the anisotropic weight typically chosen?</>}
      />

      <VIS.TrapProblem id="scann-p14" difficulty="medium"
        title="P14 — Data assumption violations"
        scenario={<><em>Discriminating insight: ScaNN assumes the embedding distribution is stable enough that the anisotropic codebook trained on yesterday&apos;s data still serves today&apos;s queries. A model retrain that rotates the embedding space invalidates the anisotropic loss reweighting - directions that mattered yesterday no longer matter today.</em><br/>Which violation is most direct?</>}
        options={[
          {key:"a", text:"Embedding distribution shift - a model retrain rotates the embedding space. The anisotropic codebook is trained for yesterday&apos;s direction of inner-product; today&apos;s queries see different directionality; the anisotropic reweighting is mistuned. Fix: retrain the codebook on the new embedding distribution.", correct:true},
          {key:"b", text:"Vector ids out of range."},
          {key:"c", text:"Query batch size larger than the rerank pool."},
          {key:"d", text:"Codebook stored in a different file format."},
        ]}
        trap={<>(b)(c)(d) generic infra, not ScaNN-specific.</>}
        lens={<>The anisotropic codebook is pinned to the embedding direction; retrains invalidate it.</>}
        stretch={<>What monitor catches embedding rotation early?</>}
      />

      <VIS.TrapProblem id="scann-p15" difficulty="hard"
        title="P15 — Intuitive but wrong: &ldquo;just use bigger codebooks to fix recall&rdquo;"
        scenario={<><em>Discriminating insight: bigger codebooks raise the recall ceiling but the anisotropic-loss weight is the load-bearing knob for MIPS quality - if the weight is mis-tuned, no codebook size compensates. ScaNN&apos;s edge is the LOSS, not the codebook capacity.</em><br/>Why is &ldquo;just bigger codebooks&rdquo; wrong?</>}
        options={[
          {key:"a", text:"Bigger codebooks raise the recall ceiling but ScaNN&apos;s edge over PQ is the anisotropic-LOSS weighting, not codebook capacity. A mis-tuned anisotropic weight kills the win regardless of codebook size. The senior move is to tune the anisotropic loss first, then size codebooks.", correct:true},
          {key:"b", text:"Bigger codebooks always fix recall."},
          {key:"c", text:"Codebooks are unrelated to recall."},
          {key:"d", text:"Codebooks are a build-time decoration."},
        ]}
        trap={<>(b)(c)(d) miss the loss-vs-capacity distinction.</>}
        lens={<>The loss is the ScaNN secret sauce; capacity is the floor.</>}
        stretch={<>What is the recall vs anisotropic-weight curve?</>}
      />

      <VIS.TrapProblem id="scann-p16" difficulty="hard"
        title="P16 — Wrong-assumption cascade"
        scenario={<><em>Discriminating insight: assuming &ldquo;ScaNN is just better PQ&rdquo; cascades into (i) skipping the embedding-distribution audit (the anisotropic loss is direction-pinned), (ii) skipping the rerank pool sizing (recall ceiling stays below SLO), (iii) shipping L2 workloads on ScaNN where it ties PQ but costs more to train.</em><br/>What breaks?</>}
        options={[
          {key:"a", text:"All three: embedding-distribution stability, rerank pool sizing, and metric appropriateness. Each is load-bearing; black-boxing ScaNN as &ldquo;just better PQ&rdquo; loses all three.", correct:true},
          {key:"b", text:"Only the rerank."},
          {key:"c", text:"Only the distribution stability."},
          {key:"d", text:"Nothing - ScaNN IS just better PQ."},
        ]}
        trap={<>(d) the seductive misread.</>}
        lens={<>ScaNN has three operational contracts; collapsing them loses all three.</>}
        stretch={<>What dashboard panel surfaces these?</>}
      />

      <VIS.TrapProblem id="scann-p17" difficulty="medium"
        title="P17 — Senior vs junior framing"
        scenario={<><em>Discriminating insight: a junior compares ScaNN to PQ on a single benchmark and reports a win or loss. A senior asks which DISTANCE METRIC the benchmark uses and AUDITS the embedding direction-of-inner-product distribution. The win condition is structural, not statistical.</em><br/>Which lever first?</>}
        options={[
          {key:"a", text:"Audit (i) the distance metric (inner-product, cosine, or L2) and (ii) the embedding distribution&apos;s directional bias. ScaNN wins when the metric is inner-product AND the embedding has directional structure. On L2, ScaNN ties PQ. On a benchmark, check the metric before reading the recall delta.", correct:true},
          {key:"b", text:"Compare benchmark numbers blindly."},
          {key:"c", text:"Pick PQ for everything."},
          {key:"d", text:"Pick ScaNN for everything."},
        ]}
        trap={<>(b)(c)(d) skip the structural audit.</>}
        lens={<>Audit metric + embedding structure; the win is conditional.</>}
        stretch={<>What does &ldquo;directional bias&rdquo; mean in practice?</>}
      />

      <VIS.TrapProblem id="scann-p18" difficulty="hard"
        title="P18 — Plausible-misattribution: rerank pool too small"
        scenario={<><em>Discriminating insight: recall@10 looks great in offline eval but recall@100 in production sits 5 points below target. The codebook is fine; the bug is the rerank pool was sized for recall@10 (e.g., 100 candidates) and never lifted for the recall@100 launch (where you need a 500-1000 candidate rerank). The anisotropic codes propose; the rerank ratifies; small pool caps recall.</em><br/>Recall@10 great offline; recall@100 in prod -5 points. Codebook fresh. Most likely cause?</>}
        options={[
          {key:"a", text:"Codebook went stale after retrain.", correct:false},
          {key:"b", text:"Rerank pool too small: the anisotropic codes propose top-K-by-estimate; the exact rerank only sees the top few hundred. If the pool was sized for recall@10 (e.g., 100 candidates) it caps recall@100. Bump rerank pool to 500-1000 and measure.", correct:true},
          {key:"c", text:"GPU memory leak on the rerank stage.", correct:false},
          {key:"d", text:"Inner-product sign flipped during deployment.", correct:false},
        ]}
        trap={<>(a) plausible but the prompt says codebook is fresh. (c)(d) generic infra. The fingerprint is recall@10 good, recall@K with K bigger than pool-size bad.</>}
        lens={<>Rerank pool size caps recall@K when K is bigger than pool.</>}
        stretch={<>What rerank pool size lifts recall@1000 to target?</>}
      />

      <VIS.TrapProblem id="scann-p19" difficulty="hard"
        title="P19 — Production gotcha: training complexity"
        scenario={<><em>Discriminating insight: ScaNN&apos;s training is more complex than PQ&apos;s. Anisotropic loss requires query-distribution statistics that must be collected and refreshed. Teams under-invest in the training pipeline and ship stale codebooks. The discipline is treat the codebook as a regularly-retrained artifact, not a one-shot.</em><br/>What is the discipline?</>}
        options={[
          {key:"a", text:"Schedule periodic codebook retraining on fresh query-distribution statistics. ScaNN&apos;s anisotropic loss needs the current direction-of-inner-product; stale codebooks lose the anisotropic edge over time. The training pipeline must be productized, not a one-shot launch artifact.", correct:true},
          {key:"b", text:"Codebooks never need retraining."},
          {key:"c", text:"Training pipeline is unnecessary."},
          {key:"d", text:"Stale codebooks are fine."},
        ]}
        trap={<>(b)(c)(d) miss the training-pipeline discipline.</>}
        lens={<>The codebook is a refreshed artifact; productize the pipeline.</>}
        stretch={<>What cadence balances retrain cost vs drift?</>}
      />

      <VIS.TrapProblem id="scann-p20" difficulty="hard"
        title="P20 — Failure on Friday: recall on inner-product workload cratered"
        scenario={<><em>Discriminating insight: someone bumped the embedding model upstream; the new embedding rotates the direction-of-inner-product significantly. ScaNN codebook was NOT retrained against the new direction. The anisotropic reweighting is now misaligned; codes that minimized error along OLD inner-product direction are now wasted along an irrelevant axis. Recall craters.</em><br/>3am page: MIPS recall down 15 points right after an upstream embedding upgrade. Diagnosis?</>}
        options={[
          {key:"a", text:"Embedding-upgrade rotated the direction-of-inner-product but the ScaNN codebook was not retrained. The anisotropic reweighting now penalizes the wrong direction; codes minimize error along an axis that no longer matters. Fix: retrain codebook on the new embedding, or roll the embedding back until the codebook retrain completes.", correct:true},
          {key:"b", text:"ScaNN binary needs recompilation."},
          {key:"c", text:"The partitioner stage went down."},
          {key:"d", text:"Disk full on rerank store."},
        ]}
        trap={<>(b)(c)(d) generic infra, not ScaNN-specific.</>}
        lens={<>Embedding rotations invalidate the anisotropic codebook.</>}
        stretch={<>What gate stops this from shipping unannounced?</>}
      />

      <VIS.TrapProblem id="scann-p21" difficulty="medium"
        title="P21 — Library default that bites: rerank pool too small"
        scenario={<><em>Discriminating insight: the open-source ScaNN library defaults to a rerank pool sized for recall@10 demos. Production workloads that need recall@1000 (e.g., candidate generation feeding a heavy ranker) hit the cap and chase the recall gap with downstream tweaks for weeks.</em><br/>Where does the default break ScaNN?</>}
        options={[
          {key:"a", text:"Default rerank pool sizes are tuned for recall@10 demos. Candidate-generation surfaces that need recall@1000 hit the rerank pool cap and chase the gap with downstream tweaks for weeks. Bump pool to a few thousand for recall@1000 workloads.", correct:true},
          {key:"b", text:"Defaults are perfect for all workloads."},
          {key:"c", text:"Rerank pool is irrelevant to recall."},
          {key:"d", text:"ScaNN has no library."},
        ]}
        trap={<>(b)(c)(d) deny the default trap.</>}
        lens={<>Defaults assume demo recall@10; production needs recall@K, K bigger.</>}
        stretch={<>What pool size lifts recall@1000 to 0.95?</>}
      />

      <VIS.TrapProblem id="scann-p22" difficulty="hard" ordered
        title="P22 — Order the rollout"
        scenario={<><em>Discriminating insight: rollout is (1) freeze embedding model, (2) collect query-distribution statistics, (3) train anisotropic codebook on those statistics, (4) build coarse partitioner, (5) tune rerank pool size on a holdout, (6) ramp traffic. Skipping the query-statistics step is the classic mistake - the anisotropic loss has no direction to weight.</em><br/>Order.</>}
        options={[
          {key:"a", text:"Freeze embedding - collect query-distribution statistics - train anisotropic codebook on those statistics - build coarse partitioner - tune rerank pool size on a holdout - ramp traffic", correct:true},
          {key:"b", text:"Ramp traffic first."},
          {key:"c", text:"Skip query-distribution collection."},
          {key:"d", text:"Train codebook before freezing embedding."},
        ]}
        trap={<>(b)(c)(d) lose stage diagnostics.</>}
        lens={<>Embedding then query-stats then codebook then partitioner then pool then ramp.</>}
        stretch={<>Why collect query-distribution before codebook training?</>}
      />

      <VIS.TrapProblem id="scann-p23" difficulty="hard"
        title="P23 — Smallest input that breaks ScaNN&apos;s claimed advantage"
        scenario={<><em>Discriminating insight: an L2 image-retrieval workload at 10M vectors. The anisotropic argument vanishes (L2 is direction-blind). ScaNN ties PQ on recall, and the additional training complexity is pure overhead. PQ wins on operational simplicity.</em><br/>Construct the edge case.</>}
        options={[
          {key:"a", text:"L2 image retrieval at 10M vectors. The anisotropic-loss reweighting is direction-blind to L2; ScaNN ties PQ on recall but adds training-pipeline complexity. PQ wins on simplicity. The claimed ScaNN advantage requires INNER-PRODUCT distance.", correct:true},
          {key:"b", text:"500M MIPS vectors at 2 ms p95."},
          {key:"c", text:"100M users."},
          {key:"d", text:"Catalog of 50K items."},
        ]}
        trap={<>(b) sweet spot. (c) user count, not catalog. (d) too small.</>}
        lens={<>ScaNN needs MIPS; L2 collapses the edge.</>}
        stretch={<>What other metrics share the inner-product directional structure?</>}
      />

      <VIS.TrapProblem id="scann-p24" difficulty="hard"
        title="P24 — Paper-named failure: brittleness to embedding distribution shifts"
        scenario={<><em>Discriminating insight: the paper acknowledges that the anisotropic codebook is direction-pinned to the embedding distribution it was trained on. Significant distribution shift (model retrain, domain change) silently mis-tunes the reweighting and recall drops. The fix is policy: schedule codebook retrains tied to embedding-model versions.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"Brittleness to embedding-distribution shifts. The anisotropic loss is direction-pinned; significant shift (model retrain, domain change) silently mis-tunes the reweighting. The fix is scheduled codebook retrains tied to embedding-model versions; treat the codebook as a versioned artifact.", correct:true},
          {key:"b", text:"ScaNN is immune to distribution shift."},
          {key:"c", text:"Codebooks self-correct over time."},
          {key:"d", text:"There are no documented failures."},
        ]}
        trap={<>(b)(c)(d) deny the named failure.</>}
        lens={<>Codebook is direction-pinned; distribution shift is the canonical bug.</>}
        stretch={<>What CI gate catches embedding shift before codebook retrain?</>}
      />

    </VIS.Section>
