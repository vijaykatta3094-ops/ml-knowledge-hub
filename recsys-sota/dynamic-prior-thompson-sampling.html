  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."
  //   scenario={<>...JSX...</>}
  //   diagram={<VIS.Mermaid chart={...} />}
  //   options={[
  //     {key:"a", text:"...", correct:false},
  //     {key:"b", text:"...", correct:true},
  //     ...
  //   ]}
  //   trap={<>The most tempting wrong is X because...</>}
  //   lens={<>The right answer + reasoning</>}
  //   stretch="optional follow-up question"
  // />
  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field
  //                  (1, 2, 3 …) saying their correct rank. Wrong-move options
  //                  have `order: null` and should NOT be picked at all.
  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          // NO autoGloss here. Glossing terms inside option text leaks the
          // answer mechanism via hover. Authors must keep options self-contained;
          // a candidate who needs a definition can scroll up to the prose where
          // the term is explicitly wrapped via <VIS.Term>.
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Dynamic Prior Thompson Sampling (Yang et al. arXiv 2602.00943, 2026)
// v2 redo — 31 trap problems spanning A-F axes; concept-anchored on
// dynamic prior shaping from the incumbent-arm distribution, cold-arm
// exploration-rate bounding, and the news/short-video churn use case.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="RecSys SOTA · Bandits &amp; online learning"
      title="Dynamic Prior Thompson Sampling"
      subtitle={<>Reshape the <VIS.Term def="A new arm has no interaction history; the bandit has no per-arm posterior data and falls back on the prior to decide pull probability.">cold-arm</VIS.Term> <VIS.Term def="Prior probability distribution over parameters expressing beliefs before seeing data; combined with the likelihood gives the posterior.">prior</VIS.Term> using the observed <VIS.Term def="Updated belief distribution over an arm's reward parameter after combining prior with observed pulls.">posterior</VIS.Term> distribution of incumbent arms — bound the <VIS.Term def="Tradeoff in online learning: try new actions to gather data vs pick the best-known action to maximize reward now.">exploration</VIS.Term> probability of fresh items in constant-churn catalogs.</>}
      byline={[
        {label: "Paper", value: "Yang et al., arXiv 2602.00943 (2026)"},
        {label: "Year", value: "2026"},
        {label: "Domain", value: "Constant-churn catalogs: news, short-video"},
      ]}/>

    <VIS.TLDR>
      Vanilla <VIS.Term def="A Bayesian bandit that pulls each arm with the posterior probability it is optimal.">Thompson Sampling</VIS.Term> gives every newly-introduced arm a <VIS.Term def="Flat prior assigning equal density to every parameter value; Beta(1,1) is the canonical example for CTR.">uniform prior</VIS.Term> — so when a news app onboards 10k new articles per hour, the <VIS.Term def="Online decision algorithm that picks among arms (actions), observes reward, and updates beliefs to balance exploration vs exploitation.">bandit</VIS.Term> samples each as if it could be the best one, sinking real <VIS.Term def="Click-Through Rate. Fraction of impressions that lead to a click; the central calibration target for ads and feed ranking.">CTR</VIS.Term> on cold-arm exploration. Dynamic Prior TS reshapes the new-arm prior toward the <em><VIS.Term def="An established arm that already has enough pull history for its posterior to be data-dominated rather than prior-dominated.">incumbent</VIS.Term></em> posterior, bounding the exploration probability of fresh items by the observed performance distribution of established arms. Source: <a href="https://arxiv.org/abs/2602.00943" target="_blank" rel="noopener">arXiv 2602.00943</a>.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="Beat 1 — What it is">
      <p>
        Standard TS gives a new arm a flat (<VIS.Term def="Two-parameter distribution on [0,1] commonly used as a conjugate prior for click-through-rate; Beta(1,1) is uniform.">Beta(1,1)</VIS.Term> or Gaussian N(0, sigma_0^2)) prior. Dynamic Prior TS instead fits a <VIS.Term def="A prior over the parameters of another prior. Here: a Beta fit to the distribution of per-arm posterior means across incumbents, used as the prior for new arms.">HYPER-PRIOR</VIS.Term> from the posterior reward distribution of <VIS.Term def="An established arm that already has enough pull history for its posterior to be data-dominated rather than prior-dominated.">incumbent</VIS.Term> arms, and uses that as the new arm's prior:
      </p>
      <VIS.Equation display tex={`\\pi_{\\text{new}}(\\theta) = \\hat{P}\\big( \\theta \\;|\\; \\{\\theta_i^{\\text{posterior}}\\}_{i \\in \\text{incumbents}} \\big)`}/>
      <p>
        Concretely: at any time t, observe the empirical distribution of incumbent arm posteriors (or means); fit a parametric prior (e.g. Beta with <VIS.Term def="Method of Moments. Fit a distribution's parameters by matching its theoretical moments (mean, variance) to the empirical sample moments. Closed-form, no optimization.">method-of-moments</VIS.Term> parameters) to that distribution; assign this prior to every newly-introduced arm. This bounds the new arm's TS sample by what the catalog has historically been; cold-arm pull probability becomes the fraction of incumbents that would have been sampled at that prior value.
      </p>
      <VIS.Mermaid chart={`
flowchart TB
  Inc["Incumbent arms posteriors {theta_i}"] --> HP["Fit hyper-prior (e.g. Beta MoM)"]
  HP --> NP["Assign prior to NEW arms"]
  X["Context / state"] --> S["TS sample theta_a ~ prior or posterior"]
  NP --> S
  S --> Pull["Argmax — pull arm a*"]
  Pull --> R["Observe reward r"]
  R --> U["Bayesian posterior update for THIS arm"]
  U --> Inc
  style HP fill:#fef3c7,stroke:#d97706
      `} />
    </VIS.Section>

    <VIS.Section id="sec-diff" title="Beat 2 — How it differs from siblings">
      <p>
        <strong>vs vanilla TS:</strong> uniform prior on new arms; vanilla TS over-explores cold arms in churn catalogs. Dynamic prior shapes the new-arm prior to match incumbent posteriors.
      </p>
      <p>
        <strong>vs <VIS.Term def="Linear Upper Confidence Bound. Contextual bandit assuming linear reward; picks the action with the highest (mean + confidence-bound) estimate.">LinUCB</VIS.Term> <VIS.Term def="When a new user or item has no interaction history, so embedding tables and behavioral features have nothing to learn from.">cold-start</VIS.Term>:</strong> LinUCB's cold-arm <VIS.Term def="Upper Confidence Bound. Bandit rule that picks the action with the highest (mean + uncertainty) estimate; explicit exploration.">UCB</VIS.Term> bonus is mechanically aggressive (large because A = lambda I); a different problem with a different fix (warm-start A from sibling arms). Dynamic Prior TS addresses the Bayesian-prior analog.
      </p>
      <p>
        <strong>vs hand-tuned prior:</strong> a hand-set prior (e.g. Beta(2,8) for 'most items have low CTR') is static and stale. Dynamic prior updates as incumbents evolve.
      </p>
      <p>
        <strong>vs <VIS.Term def="Initializing a new arm's parameters from related arms' history (sibling features, category averages) instead of from a flat prior.">warm-start</VIS.Term> via sibling features (cold-start ML):</strong> sibling features predict the new arm's mean. Dynamic prior shapes the new arm's <VIS.Term def="Epistemic uncertainty about an arm's reward — captured by the width (variance) of the posterior, not just its mean.">UNCERTAINTY</VIS.Term> (the prior distribution shape). Complementary, not competitive.
      </p>
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8, fontSize:14}}>
        <thead><tr style={{background:"#1f3a5f", color:"#fff"}}><th style={{textAlign:"left",padding:8}}>Property</th><th style={{textAlign:"left",padding:8}}>Vanilla TS</th><th style={{textAlign:"left",padding:8}}>Hand-set prior</th><th style={{textAlign:"left",padding:8}}>Dynamic Prior TS</th></tr></thead>
        <tbody>
          <tr><td style={{padding:8}}>New-arm prior</td><td style={{padding:8}}>Uniform / Beta(1,1)</td><td style={{padding:8}}>Static, e.g. Beta(2,8)</td><td style={{padding:8}}><strong>Fitted to incumbent posteriors</strong></td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:8}}>Adapts to traffic</td><td style={{padding:8}}>No</td><td style={{padding:8}}>No</td><td style={{padding:8}}><strong>Yes</strong></td></tr>
          <tr><td style={{padding:8}}>Cold-arm pull rate</td><td style={{padding:8}}>~1/N</td><td style={{padding:8}}>Bounded but stale</td><td style={{padding:8}}><strong>Bounded by incumbent distribution</strong></td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:8}}>Best for</td><td style={{padding:8}}>Static catalogs</td><td style={{padding:8}}>Mild churn</td><td style={{padding:8}}><strong>High-churn (news, video)</strong></td></tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-when" title="Beat 3 — When to pick it">
      <p>
        Pick Dynamic Prior TS when: (1) <VIS.Term def="Rate at which new items enter (and old items retire) in the catalog; news and short-video can see 10k-50k new items per hour.">catalog churn</VIS.Term> is high (many new arms per hour or per day), (2) the cost of cold-arm exploration is measurable (CTR drop, user complaints), (3) you have a stable enough population of incumbent arms to fit a meaningful hyper-prior. Skip when catalogs are static (vanilla TS suffices) or when cold arms genuinely deserve uniform exploration (e.g. completely new category launch).
      </p>
      <VIS.Mermaid chart={`
flowchart TB
  Q1{"Catalog churn high?"}
  Q1 -->|No| TS["Vanilla TS"]
  Q1 -->|Yes| Q2{"Stable incumbent population?"}
  Q2 -->|No| HS["Hand-set conservative prior"]
  Q2 -->|Yes| Q3{"Cold-arm CTR cost measurable?"}
  Q3 -->|No| TS
  Q3 -->|Yes| DP["Dynamic Prior TS"]
  style DP fill:#dcfce7,stroke:#16a34a
      `} />
    </VIS.Section>

    <VIS.Section id="sec-gotchas" title="Beat 4 — Limitations &amp; gotchas">
      <p>
        <strong>Prior shaping introduces its own model dependency</strong> — the hyper-prior's parametric family is a modeling choice. Beta is natural for CTR; Gaussian for <VIS.Term def="Total time a user spends watching a recommended item. Used as the engagement reward signal in OneRec and other video recsys.">watch-time</VIS.Term>; mis-specified families bias the prior. <strong>Incumbent-pool <VIS.Term def="Sample we observe is non-random; the act of observing changes which items appear. Common in MNAR rec data.">selection bias</VIS.Term></strong> — the surviving incumbents are themselves a biased sample (they survived selection by the bandit); the hyper-prior over-represents 'arms that did well historically.' <strong>Catalog regime shift</strong> — if traffic shifts to a regime where incumbents and new arms have systematically different reward distributions (e.g. seasonal content launch), the hyper-prior is stale. <strong>Hyper-prior <VIS.Term def="How frequently the fitted hyper-prior is re-estimated from current incumbents. Too rare = stale prior, too frequent = chases noise.">refresh cadence</VIS.Term></strong> — too rare = stale; too frequent = noisy.
      </p>
      <VIS.Callout kind="gotcha" title="Survivorship bias in the hyper-prior is the silent failure mode">
        Incumbent arms are a SELECTED population (the <VIS.Term def="Online decision algorithm that picks among arms (actions), observes reward, and updates beliefs to balance exploration vs exploitation.">bandit</VIS.Term> pulled them often enough that you have posterior data). The hyper-prior built from them over-represents 'arms that didn't get killed early'. Genuinely-good-but-bad-luck new arms get a prior that says 'you probably don't deserve to be pulled'. Mitigate: include a fraction of recently-RETIRED arms in the hyper-prior fit (counter the <VIS.Term def="Bias introduced because only arms that performed well early survived to become incumbents; the surviving sample is non-random in a way that overstates the catalog's typical CTR.">selection</VIS.Term>).
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — trap problems">
      <p style={{color:"#475569", marginBottom: 16}}>
        31 problems across taxonomy axes A-F. Redact "Dynamic Prior TS" to "Model X" — generic-ML or generic-<VIS.Term def="Online decision algorithm that picks among arms (actions), observes reward, and updates beliefs to balance exploration vs exploitation.">bandits</VIS.Term> candidates should not be able to answer correctly. Each is anchored to a property Dynamic Prior TS owns (hyper-prior fitting, incumbent-shaped new-arm prior, cold-arm bound, <VIS.Term def="Bias introduced because only arms that performed well early survived to become incumbents; the surviving sample is non-random in a way that overstates the catalog's typical CTR.">survivorship bias</VIS.Term>).
      </p>

      <h3 style={{marginTop:24, color:"#1f3a5f"}}>A. Identity &amp; comparison</h3>

      {/* A1 — discriminator vs vanilla TS */}
      <VIS.TrapProblem
        id="dpts-a1"
        difficulty="hard"
        title="A1 — Dynamic Prior TS vs vanilla TS"
        scenario={<>Both are Bayesian Thompson Sampling bandits with per-arm posteriors. What does Dynamic Prior TS do at the moment a NEW arm enters the catalog that vanilla TS does NOT?</>}
        options={[
          {key:"a", text:"Dynamic Prior TS assigns the new arm a prior FITTED to the empirical distribution of incumbent arm posteriors (e.g. Beta with mean = average incumbent mean, concentration = sample variance). Vanilla TS gives every new arm a UNIFORM Beta(1, 1) — effectively claiming 'I have no information about this arm; it could be the best'. The dynamic prior says 'the best historical guess is the incumbent distribution; this arm should be sampled at a rate consistent with that distribution, not assumed-best'.", correct:true},
          {key:"b", text:"Same algorithm, different parameter names."},
          {key:"c", text:"Dynamic Prior TS skips exploration entirely."},
          {key:"d", text:"Dynamic Prior TS uses LinUCB internally."},
        ]}
        trap={<>(b) is the equivalence miss; (a) requires the prior-vs-uniform distinction.</>}
        lens={<>Vanilla TS's <VIS.Term def="Flat prior assigning equal density to every parameter value; Beta(1,1) is the canonical example for CTR.">uniform prior</VIS.Term> assumes ignorance; dynamic prior leverages incumbent-arm evidence as a real <VIS.Term def="Prior probability distribution over parameters expressing beliefs before seeing data; combined with the likelihood gives the posterior.">prior</VIS.Term>.</>}
        stretch={<>What's the <VIS.Term def="Bayesian decision theory: choose the action that maximizes expected utility under the posterior. Justifies treating priors as decisions, not just beliefs.">Bayesian-decision-theoretic</VIS.Term> justification for the dynamic prior?</>}
      />

      {/* A2 — definitional: hyper-prior vs prior vs posterior */}
      <VIS.TrapProblem
        id="dpts-a2"
        difficulty="hard"
        title="A2 — Hyper-prior vs prior vs posterior"
        scenario={<>Reviewer: "Aren't you just doing Empirical Bayes on the TS prior?" Yes / no, and what distinguishes Dynamic Prior TS from textbook Empirical Bayes?</>}
        options={[
          {key:"a", text:"It IS Empirical Bayes for the cold-arm prior. The distinguishing innovation is that the hyper-prior is fit ONLINE from the current incumbent posteriors (not a one-shot offline fit on historical data) and is applied SPECIFICALLY to new-arm onboarding (not to all arms). The paper's contribution is the online-refresh + new-arm-only application; the math is recognizable EB.", correct:true},
          {key:"b", text:"It's a different framework — not EB."},
          {key:"c", text:"It's hierarchical Bayes only."},
          {key:"d", text:"It's frequentist."},
        ]}
        trap={<>(a) requires honest taxonomy; (b)-(d) misclassify.</>}
        lens={<>It's online <VIS.Term def="Bayesian framework where the prior's parameters are estimated from data rather than chosen subjectively; a point estimate of the hyper-prior replaces a full posterior over it.">Empirical Bayes</VIS.Term> targeted at new arms. The honest framing is mathematically simple; the engineering is the contribution.</>}
        stretch={<>What's the <VIS.Term def="A solution expressible as a finite algebraic formula, with no iterative optimization required.">closed-form</VIS.Term> <VIS.Term def="Method of Moments. Fit a distribution's parameters by matching its theoretical moments (mean, variance) to the empirical sample moments. Closed-form, no optimization.">MoM</VIS.Term> hyper-prior for Beta posteriors?</>}
      />

      {/* A3 — counterfactual */}
      <VIS.TrapProblem
        id="dpts-a3"
        difficulty="medium"
        title="A3 — Counterfactual: no Dynamic Prior TS"
        scenario={<>If Dynamic Prior TS didn't exist, what's your fallback for cold-arm onboarding in a news app with 10k new articles per hour, and concrete cost?</>}
        options={[
          {key:"a", text:"(i) Vanilla TS — each new arm gets Beta(1,1); 10k new arms per hour means ~10k uniform-sampled cold pulls per hour, sinking CTR by an estimated 5-15% during peak onboarding. (ii) Hand-set conservative prior (Beta(2, 18) for 'most items low CTR') — stops the bleeding but is stale; incumbent distribution drifts and the static prior under-explores when traffic improves. (iii) Sibling-feature warm start — predicts the mean but not the prior shape; complementary, not a full replacement. Realistic fallback is (ii) with monthly manual tuning.", correct:true},
          {key:"b", text:"No alternative exists."},
          {key:"c", text:"Random ranking."},
          {key:"d", text:"Switch to LinUCB."},
        ]}
        trap={<>(d) addresses cold-start differently — different problem; (a) is the honest taxonomy.</>}
        lens={<>The <VIS.Term def="What would have happened under an alternative system. Used here to weigh the lift of Dynamic Prior TS against the realistic fallback of hand-tuned priors.">counterfactual</VIS.Term> is hand-set priors that <VIS.Term def="When the data distribution at serving time diverges from the training distribution; model accuracy silently degrades.">drift</VIS.Term>. Dynamic Prior TS automates that ops burden.</>}
        stretch={<>What manual cadence would match Dynamic Prior TS empirically?</>}
      />

      {/* A4 — composition: Dynamic Prior TS in LinUCB / NeuralUCB */}
      <VIS.TrapProblem
        id="dpts-a4"
        difficulty="hard"
        title="A4 — Composition: dynamic-prior idea inside LinUCB"
        scenario={<>Can the dynamic-prior idea be applied to LinUCB's cold-arm regime (A_a = lambda I)?</>}
        options={[
          {key:"a", text:"Yes, by initializing new-arm A_a to the average of incumbent A_a's eigen-decomposition (or to a 'population A' fit from incumbent matrices), instead of lambda I. The cold-arm UCB bonus then matches the typical incumbent bonus pattern rather than the maximally-aggressive lambda I default. Same engineering idea (incumbent-informed cold-arm initialization), different math layer (matrices instead of priors). The two co-exist; the idea is concept-orthogonal.", correct:true},
          {key:"b", text:"No, the idea is TS-specific."},
          {key:"c", text:"No, LinUCB has no cold-start."},
          {key:"d", text:"No, it would break the regret bound."},
        ]}
        trap={<>(b), (c) wrong; (d) overconfident.</>}
        lens={<>"Use <VIS.Term def="An established arm that already has enough pull history for its posterior to be data-dominated rather than prior-dominated.">incumbents</VIS.Term> to <VIS.Term def="Initializing a new arm's parameters from related arms' history (sibling features, category averages) instead of from a flat prior.">warm-start</VIS.Term> cold arms" generalizes across bandit families. The TS instance is one application.</>}
        stretch={<>What's the right way to combine incumbent A matrices?</>}
      />

      {/* A5 — boundary */}
      <VIS.TrapProblem
        id="dpts-a5"
        difficulty="medium"
        title="A5 — Boundary: where Dynamic Prior TS stops helping"
        scenario={<>At what catalog-churn rate does Dynamic Prior TS's value over vanilla TS become negligible?</>}
        options={[
          {key:"a", text:"When new arms enter at a rate so low that the cold-arm exploration cost is dwarfed by the steady-state regret of incumbent exploration. Rule of thumb: if new arms < 1% of pulled arms per day, vanilla TS's cold-arm overhead is rounding error; dynamic prior is over-engineering. Useful range: churn 5-50% of daily arms.", correct:true},
          {key:"b", text:"Always helps."},
          {key:"c", text:"Never helps."},
          {key:"d", text:"Only at churn = 100%."},
        ]}
        trap={<>(b) overconfident; (a) requires the cost-comparison framing.</>}
        lens={<>The value of dynamic prior tracks <VIS.Term def="Rate at which new items enter (and old items retire) in the catalog; news and short-video can see 10k-50k new items per hour.">churn</VIS.Term> rate. Low churn = use vanilla.</>}
        stretch={<>What single metric measures the <VIS.Term def="Rate at which new items enter (and old items retire) in the catalog; news and short-video can see 10k-50k new items per hour.">churn</VIS.Term> 'pressure'?</>}
      />

      <h3 style={{marginTop:32, color:"#1f3a5f"}}>B. Application</h3>

      {/* B1 — pick the right tool */}
      <VIS.TrapProblem
        id="dpts-b1"
        difficulty="hard"
        title="B1 — Pick the right tool"
        scenario={<>Surface: short-video feed. ~50k new videos per hour; ~2M active videos; current bandit = vanilla TS; pundits complaining "first-impressions of new videos drown out my favorite creators". Reward = watch-completion. What's the right intervention?</>}
        options={[
          {key:"a", text:"Switch to Dynamic Prior TS. The new-arm flood is exactly the failure mode it addresses; fitting the hyper-prior from incumbent watch-completion posteriors will bound the first-impression exploration rate to what's consistent with the catalog's typical performance, instead of treating every new video as a potential best video. Hand-set priors are operationally fragile at this churn rate.", correct:true},
          {key:"b", text:"Stay on vanilla TS."},
          {key:"c", text:"Move to LinUCB."},
          {key:"d", text:"Static popularity ranker."},
        ]}
        trap={<>(b) ignores the complaint signal; (c) addresses a different problem.</>}
        lens={<>High <VIS.Term def="Rate at which new items enter (and old items retire) in the catalog; news and short-video can see 10k-50k new items per hour.">churn</VIS.Term> + measurable cold-arm complaint = Dynamic Prior TS's ideal pitch.</>}
        stretch={<>What's the <VIS.Term def="Offline counterfactual evaluation: re-score historical traffic logs under the candidate policy to estimate online lift before launching A/B.">offline replay</VIS.Term> that proves the lift?</>}
      />

      {/* B2 — "just lower the cold-arm prior mean" */}
      <VIS.TrapProblem
        id="dpts-b2"
        difficulty="hard"
        title="B2 — Sounds prudent, isn't"
        scenario={<>Engineer: "Just set every new arm's prior to Beta(1, 10) — assume new items are bad until proven otherwise." Why is this not Dynamic Prior TS and what fails?</>}
        options={[
          {key:"a", text:"Fixed pessimistic prior. (i) UNDER-explores when the incumbent population is actually high-CTR (e.g. all incumbents converge to CTR=0.4 — Beta(1,10) under-shoots and pulls no new arm). (ii) OVER-protects when CTR drifts down (Beta(1,10) becomes optimistic relative to a deflated incumbent population). Dynamic Prior TS fits the prior to the current incumbent distribution; the fixed prior fails in both directions when incumbents move.", correct:true},
          {key:"b", text:"This is exactly Dynamic Prior TS."},
          {key:"c", text:"Same regret bound."},
          {key:"d", text:"Static priors are mathematically optimal."},
        ]}
        trap={<>(b) is the equivalence miss; (a) requires seeing why static fails bidirectionally.</>}
        lens={<>Static pessimism is a one-shot solution to a moving problem. Dynamic prior IS the move.</>}
        stretch={<>How would static and dynamic priors compare in a <VIS.Term def="A data-generating process whose distribution does not change over time. Under stationarity a fixed prior cannot become stale.">stationary</VIS.Term> world?</>}
      />

      {/* B3 — PM pitch */}
      <VIS.TrapProblem
        id="dpts-b3"
        difficulty="hard"
        title="B3 — One-sentence PM pitch (Dynamic Prior TS-specific)"
        scenario={<>PM asks "why Dynamic Prior TS over our current TS with hand-tuned prior?" Pick the pitch that COULD NOT be made about any cold-start fix.</>}
        options={[
          {key:"a", text:"Today, an engineer hand-tunes the new-article prior every quarter; when traffic shifts (election season, sports cup), the prior is stale and we either ship over-exploration for a month or panic-tune. Dynamic Prior TS reads the prior off the live incumbent CTR distribution every hour; the prior automatically tracks traffic and we eliminate the quarterly tuning loop.", correct:true},
          {key:"b", text:"It helps cold start."},
          {key:"c", text:"It's Bayesian."},
          {key:"d", text:"It's SOTA 2026."},
        ]}
        trap={<>(b), (c), (d) survive redaction. (a) hinges on the auto-tracking of incumbent distribution.</>}
        lens={<>The <VIS.Term def="Product Manager. Non-technical stakeholder; pitches must hinge on business value, not algorithmic novelty.">PM</VIS.Term> pitch must hinge on eliminating manual prior re-tuning. That's the dynamic-prior-specific business case.</>}
        stretch={<>What's the manual-tuning cost in eng-hours per year?</>}
      />

      {/* B4 — when NOT to use */}
      <VIS.TrapProblem
        id="dpts-b4"
        difficulty="medium"
        title="B4 — Where Dynamic Prior TS is the wrong choice"
        scenario={<>Surface: an e-commerce catalog where new product categories (not items) appear seasonally — Christmas decorations in November, swimwear in May. Incumbents in May have NOTHING in common with incoming summer swimwear. Is Dynamic Prior TS appropriate?</>}
        options={[
          {key:"a", text:"No — incumbents are a wrong reference population for the new arms. Fitting the prior from current incumbents transfers WRONG information to the cold arms. Better: a per-category prior (fit hyper-prior from sibling category history) OR fall back to a hand-set conservative prior for category launches. Dynamic Prior TS assumes incumbents and new arms come from the SAME population — when they don't, its mechanism backfires.", correct:true},
          {key:"b", text:"Yes — always applies."},
          {key:"c", text:"Yes — incumbents are always informative."},
          {key:"d", text:"No — TS doesn't work for e-commerce."},
        ]}
        trap={<>(b), (c) confidently wrong; (a) requires the population-mismatch insight.</>}
        lens={<>The dynamic-prior assumption is '<VIS.Term def="An established arm that already has enough pull history for its posterior to be data-dominated rather than prior-dominated.">incumbents</VIS.Term> are a relevant reference'. Violate it and the method actively harms.</>}
        stretch={<>How would you detect the <VIS.Term def="When incumbents and new arms come from systematically different reward distributions, breaking the i.i.d. assumption the hyper-prior relies on.">population mismatch</VIS.Term>?</>}
      />

      <h3 style={{marginTop:32, color:"#1f3a5f"}}>C. Mechanism</h3>

      {/* C1 — architectural choice: hyper-prior family */}
      <VIS.TrapProblem
        id="dpts-c1"
        difficulty="hard"
        title="C1 — Why a parametric hyper-prior (Beta), not the empirical distribution?"
        scenario={<>The incumbent posteriors are individual Beta distributions; you could use the empirical mixture-of-Betas as the new-arm prior directly. Why does Dynamic Prior TS fit a SINGLE parametric Beta hyper-prior?</>}
        options={[
          {key:"a", text:"Three reasons. (1) Conjugacy — a single Beta prior preserves the closed-form posterior update on the new arm's observed rewards; a mixture-of-Betas posterior is a mixture with growing mixture count, intractable online. (2) Regularization — the parametric fit smooths over per-incumbent noise. (3) Simplicity in production — fit two parameters from method-of-moments, refresh hourly. A non-parametric mixture would update the prior with every incumbent update, blowing up.", correct:true},
          {key:"b", text:"Beta is the only valid prior."},
          {key:"c", text:"Mixture is mathematically forbidden."},
          {key:"d", text:"No reason — it's an arbitrary choice."},
        ]}
        trap={<>(b), (c) overconfident; (a) requires conjugacy + simplicity reasoning.</>}
        lens={<>Conjugate parametric prior = <VIS.Term def="A solution expressible as a finite algebraic formula, with no iterative optimization required.">closed-form</VIS.Term> posterior. The choice IS the engineering tractability.</>}
        stretch={<>For non-Beta rewards, what hyper-prior would you pick?</>}
      />

      {/* C2 — loss / objective: empirical Bayes vs hierarchical Bayes */}
      <VIS.TrapProblem
        id="dpts-c2"
        difficulty="hard"
        title="C2 — Empirical Bayes vs full hierarchical Bayes"
        scenario={<>Why does Dynamic Prior TS use Empirical Bayes (point estimate of hyper-prior parameters) instead of full hierarchical Bayes (posterior over hyper-prior parameters)?</>}
        options={[
          {key:"a", text:"Engineering tractability. Full hierarchical Bayes maintains a posterior over hyper-prior parameters AND a per-arm posterior; sampling requires MCMC or variational inference at every TS pull, infeasible at recsys QPS. Empirical Bayes replaces the hyper-prior posterior with its mean (or MoM estimate); collapses one layer of randomness. The price: slight overconfidence in the prior (no uncertainty about prior parameters). Generally negligible when incumbents are many; matters when incumbents are few.", correct:true},
          {key:"b", text:"They are mathematically equivalent."},
          {key:"c", text:"Hierarchical Bayes has lower regret in TS."},
          {key:"d", text:"Empirical Bayes is the only valid frequentist method."},
        ]}
        trap={<>(a) requires the engineering vs. statistical-purity tradeoff.</>}
        lens={<><VIS.Term def="Bayesian framework where the prior's parameters are estimated from data rather than chosen subjectively; a point estimate of the hyper-prior replaces a full posterior over it.">EB</VIS.Term> is a tractable approximation to <VIS.Term def="Full Bayes with multiple layers of priors (parameters drawn from hyper-priors drawn from hyper-hyper-priors); the un-collapsed version of Empirical Bayes.">hierarchical Bayes</VIS.Term>. The price is hyper-prior overconfidence.</>}
        stretch={<>When does the overconfidence matter operationally?</>}
      />

      {/* C3 — what's added vs vanilla TS */}
      <VIS.TrapProblem
        id="dpts-c3"
        difficulty="medium"
        title="C3 — What's added vs vanilla TS; what's dropped"
        scenario={<>Compared to vanilla TS, what does Dynamic Prior TS ADD and what's DROPPED?</>}
        options={[
          {key:"a", text:"Adds: (i) a periodic hyper-prior fit from incumbent posteriors, (ii) a 'new-arm initialization rule' using the fitted hyper-prior instead of Beta(1, 1). Drops: nothing structural — per-arm TS sampling, posterior updates, argmax over samples are unchanged. The added code is the hyper-prior fit + new-arm initialization; ~50 lines of incremental code.", correct:true},
          {key:"b", text:"Adds neural networks."},
          {key:"c", text:"Drops the TS sampling step."},
          {key:"d", text:"Adds UCB bonus."},
        ]}
        trap={<>(b), (c), (d) confused with siblings; (a) is the precise delta.</>}
        lens={<>Dynamic Prior TS = TS + (<VIS.Term def="A prior over the parameters of another prior. Here: a Beta fit to the distribution of per-arm posterior means across incumbents, used as the prior for new arms.">hyper-prior</VIS.Term> fit) + (new-arm initialization). Same loop otherwise.</>}
        stretch={<>What's the smallest meaningful pull-rate for incumbents to trust the hyper-prior?</>}
      />

      {/* C4 — hyperparameter */}
      <VIS.TrapProblem
        id="dpts-c4"
        difficulty="hard"
        title="C4 — Most-likely-to-bite hyperparameter"
        scenario={<>Rank operational risk if mis-set: (i) Beta prior alpha/beta for non-new arms, (ii) hyper-prior refresh cadence, (iii) MoM vs MLE for the hyper-prior fit, (iv) eligibility threshold for an arm to count as 'incumbent'. Highest-risk?</>}
        options={[
          {key:"a", text:"(iv) eligibility threshold. Too lax (e.g. min 10 pulls) and you're fitting the hyper-prior from arms with their own high posterior variance — the prior is noisy. Too strict (e.g. min 10k pulls) and you're fitting from a tiny survivorship-biased subset — the prior over-protects new arms. (i) Beta is set-and-forget for non-new arms; (ii) refresh cadence is mid-risk; (iii) MoM vs MLE differ negligibly on Beta.", correct:true},
          {key:"b", text:"(i) prior alpha/beta."},
          {key:"c", text:"(ii) refresh cadence."},
          {key:"d", text:"(iii) MoM vs MLE."},
        ]}

        title="C5 — Time-of-day prior drift"
        scenario={<>You refresh the hyper-prior HOURLY by re-fitting over all incumbent posteriors. CTR on your news surface has a strong diurnal pattern: 6-9am CTR is ~2x the 2-4am CTR. The dynamic prior estimated at 3am gets applied to NEW arms that go live at 8am. What goes wrong, and which design choice fixes it without retiring the dynamic prior?</>}

          {key:"b", text:"Hourly refresh always handles diurnal patterns."},

        lens={<>Hourly refresh is NOT <VIS.Term def="Time-of-day periodicity in user behavior (e.g., 6-9am CTR ~2x 2-4am CTR for news). A prior fitted in one phase mis-applies in another.">diurnal</VIS.Term>-aware. The right granularity is hour-bucket-conditional, not faster refresh.</>}
        stretch={<>How many time buckets are statistically supported by a typical news catalog?</>}
      />

      <h3 style={{marginTop:32, color:"#1f3a5f"}}>D. Intuition traps</h3>

        id="dpts-d1"
        difficulty="hard"
        title="D1 ⭐ — Intuitive but wrong"
        scenario={<>Intuition: "Dynamic Prior TS is always MORE CONSERVATIVE than vanilla TS — it shapes the prior toward incumbent CTR, which is lower than uniform Beta(1, 1)'s implicit mean of 0.5." Why is this wrong in BOTH directions?</>}
        options={[
          {key:"a", text:"Vanilla Beta(1, 1) has implicit mean 0.5 (uniform). For most surfaces incumbent CTR is BELOW 0.5; dynamic prior shifts mean DOWN — more conservative (correct). But for surfaces where incumbent CTR is HIGH (e.g. a well-curated editor's-pick feed with CTR ~ 0.6+), dynamic prior shifts mean UP — LESS conservative. The intuition is wrong because 'conservative' is relative to the actual catalog; dynamic prior tracks the catalog rather than always going one direction.", correct:true},
          {key:"b", text:"Yes, always more conservative."},
          {key:"c", text:"Yes, always more aggressive."},
          {key:"d", text:"Neither — same behavior."},

        trap={<>(b) is the seductive intuition; (a) requires noticing that vanilla 0.5 isn't always conservative.</>}
        lens={<>'Conservative' is direction-dependent; vanilla TS's <VIS.Term def="Two-parameter distribution on [0,1] commonly used as a conjugate prior for click-through-rate; Beta(1,1) is uniform.">Beta(1,1)</VIS.Term> implies <VIS.Term def="Click-Through Rate. Fraction of impressions that lead to a click; the central calibration target for ads and feed ranking.">CTR</VIS.Term>=0.5, an arbitrary midpoint.</>}
        stretch={<>When would dynamic prior INCREASE cold-arm exploration?</>}
      />

      <h3 style={{marginTop:32, color:"#1f3a5f"}}>E. Operations</h3>

      {/* E1 — production gotcha: hyper-prior stuck at narrow Beta */}

        id="dpts-e1"
        difficulty="hard"
        title="E1 — Production gotcha: hyper-prior collapses to a narrow Beta"
        scenario={<>Three months post-launch, the fitted hyper-prior has converged to Beta(50, 200) — concentrated mean ~ 0.2, very narrow. New arms get pulled at vanishingly low rate. What happened, and the right fix?</>}
        options={[
          {key:"a", text:"Survivorship bias has compounded. Only well-performing arms become incumbents; their posteriors are tightly concentrated around their realized CTR. The MoM fit yields tight Beta hyper-prior. New arms are essentially never picked. Fix: include a fraction of recently-RETIRED arms (those killed by the bandit) in the hyper-prior fit, with an importance weight that counters the selection. Alternatively, inflate the fitted concentration (broaden the prior) by a constant factor.", correct:true},

        scenario={<>Friday 3am page: complaints from editors that 'a brand-new editor's-pick article got 4 impressions all day'. Investigation: Thursday a flagship piece was published. Vanilla TS would have given it ~1/N pulls; under Dynamic Prior TS, it got the new-arm prior of Beta(50, 200) (heavily down-shaped). What went wrong and what's the fix?</>}

      {/* E3 — arm graduation criterion */}

        id="dpts-e3"
        difficulty="hard"
        title="E3 — Arm graduation criterion"
        scenario={<>An arm that ENTERS the catalog gets the dynamic prior; an arm that has accumulated enough data should LEAVE the cold-start regime and rely on its own posterior. What is the correct graduation criterion, and what specifically goes wrong if you fix it as "min_pulls = 1000"?</>}
        options={[
          {key:"a", text:"Graduation is NOT a pull-count question; it's a question of whether the arm's POSTERIOR has shrunk enough that its own data dominates the prior. The right criterion is on the posterior's variance ratio: graduate when Var(posterior) / Var(prior) drops below a threshold (e.g. 0.1) — equivalently when alpha + beta of the Beta posterior exceeds a function of the hyper-prior strength. A fixed pull-count threshold fails because hyper-prior strength varies by surface: 1000 pulls might still be prior-dominated on a low-CTR surface, OR fully data-dominated on a high-CTR surface. Use a variance-ratio criterion instead.", correct:true},
          {key:"b", text:"min_pulls=1000 is universally correct."},
          {key:"c", text:"Arms never graduate in Dynamic Prior TS."},
          {key:"d", text:"Graduation is the same as eligibility for the hyper-prior."},

        stretch={<>What's the variance ratio's relationship to the <VIS.Term def="Effective Bayesian sample size. For Beta(a,b), the prior is worth a+b pseudo-observations; data dominates when n exceeds a+b.">effective Bayesian sample size</VIS.Term>?</>}

        scenario={<>Dynamic Prior TS fits ONE hyper-prior across all incumbents and applies it to every cold arm. A colleague argues you should use a FULL hierarchical Bayes model — arm-CTR ~ Beta(alpha_c, beta_c) where (alpha_c, beta_c) is itself drawn from a hyperprior conditional on category c. What does each model gain and lose, and which design choice in production tips the decision?</>}
