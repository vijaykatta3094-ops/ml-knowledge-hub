<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// REDO v2 — RecSys-SOTA batch 14
// PLE — Progressive Layered Extraction (Tang et al., RecSys 2020)
// Unique mechanism: at EACH layer, experts are SPLIT into SHARED experts and
// TASK-SPECIFIC experts. The shared experts feed all tasks; the task-specific
// experts feed only their task. Then multiple such CGC (Customized Gate
// Control) blocks are STACKED — depth-wise progressive separation. Lower
// layers share more; upper layers specialize more.
// Anchor that survives §2a redaction: "shared experts AND task-specific
// experts at EACH layer, with gates routing; CGC blocks stack depth-wise so
// shared signal is progressively distilled into task-specific signal as you
// go up." This is NOT MMoE (no shared/specific split) and NOT HoME (no
// group hierarchy).
// Multi-task trio caution:
//   HoME  = HIERARCHY across expert GROUPS (group-level gating, breadth)
//   PLE   = PROGRESSIVE shared+specific at EACH LAYER (depth-wise stacking)
//   AESM2 = AUTOMATIC per-input expert selection (input-conditioned, Gumbel)

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="RecSys SOTA · Multi-task learning"
      title="PLE — Progressive Layered Extraction"
      subtitle="At every layer, experts split into SHARED (all tasks) and TASK-SPECIFIC (one task each); gates mix them per task. Stacking these CGC blocks DEPTH-wise progressively separates shared signal from task-specific signal — lower layers share, upper layers specialize."
      byline={[
        {label: "Sources", value: "Tang et al., 'Progressive Layered Extraction (PLE): A Novel Multi-Task Learning Model for Personalized Recommendations' (RecSys 2020, Best Paper Award)"},
        {label: "Surface", value: "Production multi-task recsys with 2-4 tasks where MMoE shows seesaw"},
        {label: "Anchor that survives redaction", value: "Shared experts AND task-specific experts at EACH layer, gates route; CGC blocks stack depth-wise so shared signal is progressively distilled into task-specific signal"},
      ]}/>

    <VIS.TLDR>
      MMoE shares ALL experts across all tasks — when tasks pull experts in different directions, gradients interfere and the <VIS.Term def="When optimizing one task degrades another in multi-task learning. Sharing too much capacity causes gradient interference; isolating too much loses transfer.">seesaw effect</VIS.Term> appears (gains on task A pair with losses on task B). PLE provably alleviates this by EXPLICITLY allocating SHARED experts (everyone uses them) AND TASK-SPECIFIC experts (only that task uses them) at every layer. Each layer is a <VIS.Term def="Customized Gate Control. A multi-task layer with both shared experts and per-task task-specific experts; each task gate mixes its task-specific experts plus the shared experts only.">CGC</VIS.Term> block; stacking CGC blocks DEPTH-wise creates progressive separation — early layers blend shared signal, later layers refine task-specific signal. The senior trap: PLE is NOT MMoE (no explicit shared/specific split), is NOT HoME (no group hierarchy across breadth), and is NOT just &ldquo;more experts&rdquo; (the win is the structural split + depth, not capacity). PLE&apos;s sweet spot is 2-4 tasks; beyond that, gate competition across many task-specific stacks pushes you toward HoME.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is — CGC block per layer, stacked depth-wise">
      <VIS.Mermaid chart={`flowchart TB
  X["Input features"]
  L1["CGC layer 1"]
  L2["CGC layer 2"]
  L3["CGC layer 3"]
  S1["Shared experts L1"]
  TA1["Task A experts L1"]
  TB1["Task B experts L1"]
  GA1["Gate A L1"]
  GB1["Gate B L1"]
  HA["Task A head"]
  HB["Task B head"]
  X --> L1
  L1 --> S1
  L1 --> TA1
  L1 --> TB1
  S1 --> GA1
  TA1 --> GA1
  S1 --> GB1
  TB1 --> GB1
  GA1 --> L2
  GB1 --> L2
  L2 --> L3
  L3 --> HA
  L3 --> HB`} />
      <ul>
        <li><strong>CGC layer = shared experts + per-task experts + per-task gates.</strong> Each task gate mixes the SHARED experts plus ITS OWN task-specific experts; it does NOT see other tasks&apos; specific experts.</li>
        <li><strong>Stack CGC blocks depth-wise.</strong> Lower CGC blocks see general signal (mostly shared); upper blocks see progressively refined task-specific signal.</li>
        <li><strong>Per-task gates per layer.</strong> Each task has a gate at each layer — gates do not transfer; specialization is computed afresh at each layer.</li>
        <li><strong>Per-task heads at the top.</strong> Final task-specific output is the head&apos;s read of the deepest CGC&apos;s task slice.</li>
      </ul>
      <p>The depth axis is what makes it &ldquo;progressive&rdquo;; the per-layer split is what makes it &ldquo;extraction.&rdquo; Both load-bearing.</p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How it differs from MMoE, CGC alone, and HoME">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8, fontSize:14}}>
        <thead><tr style={{background:"#1f3a5f", color:"#fff"}}>
          <th style={{textAlign:"left", padding:8}}>Method</th>
          <th style={{textAlign:"left", padding:8}}>Shared/specific split</th>
          <th style={{textAlign:"left", padding:8}}>Depth axis</th>
          <th style={{textAlign:"left", padding:8}}>Breadth (groups) axis</th>
        </tr></thead>
        <tbody>
          <tr><td style={{padding:8}}>MMoE</td><td style={{padding:8}}>No (all shared)</td><td style={{padding:8}}>Single block</td><td style={{padding:8}}>No</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:8}}>CGC (PLE building block)</td><td style={{padding:8}}>Yes (per layer)</td><td style={{padding:8}}>Single block</td><td style={{padding:8}}>No</td></tr>
          <tr><td style={{padding:8}}><strong>PLE</strong></td><td style={{padding:8}}><strong>Yes (per layer)</strong></td><td style={{padding:8}}><strong>Stacked CGC blocks</strong></td><td style={{padding:8}}><strong>No</strong></td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:8}}>HoME</td><td style={{padding:8}}>Implicit via groups</td><td style={{padding:8}}>Optional</td><td style={{padding:8}}>Yes (expert groups)</td></tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — 24 trap problems">
      <p style={{color:"#475569"}}>Each problem cites the discriminating insight, then asks for the pick.</p>

      <VIS.TrapProblem id="ple-p1" difficulty="hard"
        title="P1 — PLE vs MMoE: load-bearing difference?"
        scenario={<><em>Discriminating insight: MMoE shares all experts; per-task gates differ but each gate can pull every expert in arbitrary directions, causing gradient interference when tasks pull oppositely. PLE EXPLICITLY allocates SHARED experts (feed all tasks) AND TASK-SPECIFIC experts (feed only that task) at every layer. Task-specific experts are isolated from other tasks&apos; gradients — a structural fix to the seesaw effect.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"PLE explicitly allocates SHARED experts (feed all tasks) and TASK-SPECIFIC experts (feed only that task) at every layer. Task-specific experts are gradient-isolated from other tasks; MMoE has no such split and suffers seesaw from gradient interference on shared experts.", correct:true},
          {key:"b", text:"They are mathematically equivalent."},
          {key:"c", text:"PLE removes gates entirely."},
          {key:"d", text:"PLE uses fewer total experts than MMoE."},
        ]}
        trap={<>(b)(c)(d) miss the structural split anchor.</>}
        lens={<>Shared + task-specific split at each layer is the structural fix.</>}
        stretch={<>How is the seesaw bound mathematically in PLE vs MMoE?</>}
      />

      <VIS.TrapProblem id="ple-p2" difficulty="hard"
        title="P2 — PLE vs CGC alone: what does stacking add?"
        scenario={<><em>Discriminating insight: a single CGC block already implements shared + task-specific split. PLE stacks multiple CGC blocks depth-wise; each upper block sees the refined output of the lower block, progressively distilling shared signal into task-specific signal. Stacking is the &ldquo;progressive&rdquo; in PLE.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"CGC alone does the per-layer shared+specific split once. PLE stacks multiple CGC blocks depth-wise so the separation refines progressively — early layers blend shared signal, later layers refine task-specific signal. Stacking is the progressive piece.", correct:true},
          {key:"b", text:"They are the same."},
          {key:"c", text:"CGC has more capacity than PLE."},
          {key:"d", text:"Stacking adds nothing."},
        ]}
        trap={<>(b)(c)(d) miss the depth-wise progressive separation.</>}
        lens={<>Stacking = progressive depth-wise refinement.</>}
        stretch={<>How many CGC blocks until you saturate?</>}
      />

      <VIS.TrapProblem id="ple-p3" difficulty="hard"
        title="P3 — Without PLE, what is the realistic fallback at 2-4 tasks?"
        scenario={<><em>Discriminating insight: fallbacks at 2-4 tasks are (i) flat MMoE — simple, suffers seesaw; (ii) CGC single block — works for 2 tasks, scales worse than PLE; (iii) per-task towers — no sharing, large parameter cost; (iv) shared-bottom + per-task heads — naive, often the production baseline before PLE. PLE wins at 2-4 tasks with measurable seesaw.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"Flat MMoE (simple, suffers seesaw), CGC single block (works but no progressive refinement), shared-bottom + per-task heads (naive baseline), or per-task towers (no sharing). PLE wins at 2-4 tasks where seesaw is measurable.", correct:true},
          {key:"b", text:"Drop the multi-task setup."},
          {key:"c", text:"Train each task as a fully separate model with no shared layers."},
          {key:"d", text:"There is no alternative."},
        ]}
        trap={<>(b)(c) violate the multi-task requirement.</>}
        lens={<>PLE wins in the 2-4 task regime where seesaw appears.</>}
        stretch={<>What seesaw threshold tells you to switch from MMoE to PLE?</>}
      />

      <VIS.TrapProblem id="ple-p4" difficulty="hard"
        title="P4 — Compose PLE with HoME"
        scenario={<><em>Discriminating insight: PLE structures depth (stacked CGC); HoME structures breadth (expert groups). They are orthogonal axes; one could nest HoME&apos;s breadth-wise groups inside each CGC block of a PLE stack to get depth-wise progressive + breadth-wise group hierarchy.</em><br/>What does the stack achieve?</>}
        options={[
          {key:"a", text:"PLE controls depth (stacked CGC blocks); HoME controls breadth (expert groups). They are orthogonal; one can host HoME-style breadth groups inside each PLE CGC block, giving depth-wise progressive separation + breadth-wise group hierarchy.", correct:true},
          {key:"b", text:"They conflict — pick one."},
          {key:"c", text:"They are identical."},
          {key:"d", text:"Combining doubles inference latency."},
        ]}
        trap={<>(b)(c)(d) deny composition.</>}
        lens={<>Depth (PLE) and breadth (HoME) compose as orthogonal axes.</>}
        stretch={<>When is the combined cost not worth the gain?</>}
      />

      <VIS.TrapProblem id="ple-p5" difficulty="medium"
        title="P5 — What does &ldquo;customized&rdquo; mean in CGC?"
        scenario={<><em>Discriminating insight: in CGC, each TASK&apos;s gate is CUSTOMIZED to see only the shared experts plus ITS OWN task-specific experts — it does not see other tasks&apos; specific experts. That is the customization: the gate&apos;s expert pool is task-specific.</em><br/>What is &ldquo;customized&rdquo;?</>}
        options={[
          {key:"a", text:"Each task&apos;s gate is customized to see only the shared experts plus its OWN task-specific experts — it does not see other tasks&apos; specific experts. The expert pool per gate is task-specific.", correct:true},
          {key:"b", text:"Customization means the gate parameters are randomly initialized."},
          {key:"c", text:"Customization means the gate is hand-tuned."},
          {key:"d", text:"Customization means all gates see all experts."},
        ]}
        trap={<>(b)(c)(d) miss the per-task expert-pool customization.</>}
        lens={<>Customization = per-task expert pool; not parameter init.</>}
        stretch={<>Why doesn&apos;t task A&apos;s gate see task B&apos;s specific experts?</>}
      />

      <VIS.TrapProblem id="ple-p6" difficulty="hard"
        title="P6 — Pick the multi-task architecture"
        scenario={<><em>Discriminating insight: a video feed predicts 3 tasks (CTR, watch-time, follow). MMoE was deployed first and showed seesaw — gains in CTR paired with watch-time regressions. Team wants a structural fix without designing expert groups (no HoME budget). PLE is purpose-built.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"PLE — stacked CGC blocks with shared and task-specific experts per layer; progressive separation alleviates seesaw at 3 tasks without requiring expert-group design.", correct:true},
          {key:"b", text:"More MMoE experts — does not solve seesaw."},
          {key:"c", text:"Per-task towers — no sharing."},
          {key:"d", text:"Drop the third task — political."},
        ]}
        trap={<>(b)(c)(d) miss the structural win.</>}
        lens={<>2-4 tasks + seesaw + no group-design budget = PLE.</>}
        stretch={<>When would you upgrade from PLE to HoME?</>}
      />

      <VIS.TrapProblem id="ple-p7" difficulty="hard"
        title="P7 — Sounds reasonable: &ldquo;just add task-specific layers on top of MMoE&rdquo;"
        scenario={<><em>Discriminating insight: adding task-specific layers AT THE TOP of MMoE adds capacity to each head but does NOT solve the gate interference at MMoE&apos;s shared expert layer — gradients still bleed across tasks at the bottom. PLE&apos;s structural fix is per-layer shared+specific split, NOT just task-specific top layers.</em><br/>Why is &ldquo;task-specific top layers&rdquo; insufficient?</>}
        options={[
          {key:"a", text:"Task-specific top layers add head capacity but the gate interference at MMoE&apos;s shared experts remains — gradients still bleed across tasks at the bottom of the stack. PLE&apos;s structural fix is per-layer shared+specific split, not just deeper heads.", correct:true},
          {key:"b", text:"Top layers solve seesaw automatically."},
          {key:"c", text:"Top layers are equivalent to per-layer split."},
          {key:"d", text:"Capacity is unrelated to seesaw."},
        ]}
        trap={<>(b)(c)(d) miss the bottom-of-stack interference.</>}
        lens={<>Interference happens at the shared-expert level; top heads cannot fix it.</>}
        stretch={<>What does the gradient bleed look like in MMoE?</>}
      />

      <VIS.TrapProblem id="ple-p8" difficulty="hard"
        title="P8 — PLE anchor (per-layer shared+specific + progressive depth): pitch it"
        scenario={<><em>Discriminating insight: anchor is &ldquo;at every layer, EXPLICITLY split experts into shared and task-specific; STACK these CGC blocks depth-wise for progressive separation.&rdquo; The pitch must name both the per-layer split AND the depth stacking.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"Each CGC layer explicitly splits experts into shared (fed to all tasks) and task-specific (fed only to that task). Stacking these CGC blocks depth-wise progressively distills shared signal into task-specific signal as you ascend the stack.", correct:true},
          {key:"b", text:"We organize experts into breadth-wise groups with coarse and fine gates."},
          {key:"c", text:"We use Gumbel routing per input to select experts."},
          {key:"d", text:"We have a single shared-bottom plus per-task heads."},
        ]}
        trap={<>(b) is HoME. (c) is AESM2. (d) is naive shared-bottom.</>}
        lens={<>Per-layer split + depth stacking are inseparable.</>}
        stretch={<>What does the &ldquo;progressive&rdquo; actually progress toward?</>}
      />

      <VIS.TrapProblem id="ple-p9" difficulty="hard" multiSelect
        title="P9 — When NOT to use PLE. Select all that apply."
        scenario={<><em>Discriminating insight: PLE&apos;s structural advantage requires multiple tasks, observable seesaw, and a latency budget that admits stacked depth. Four scenarios violate one of those preconditions; one scenario is exactly the regime PLE was designed for. Decoys vary by which precondition they break, not by &ldquo;sweet spot&rdquo; framing.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"Single-task setup — no multi-task interference to mitigate; shared+specific split is meaningless.", correct:true},
          {key:"b", text:"6+ tasks where breadth-wise group competition dominates — HoME&apos;s coarse-gate hierarchy is the right axis, PLE&apos;s depth-only stack saturates."},
          {key:"c", text:"Sub-5ms latency budget where stacked CGC depth blows the SLA — depth is the cost knob PLE pays."},
          {key:"d", text:"Per-input routing decisions are needed (different topology per request) — that&apos;s AESM²&apos;s axis; PLE&apos;s topology is fixed at graph-design time."},
          {key:"e", text:"3-task video feed with measurable CTR/watch-time/share-rate seesaw and a comfortable latency budget — exactly PLE&apos;s designed regime, NOT a disqualifier."},
        ]}
        trap={<>(e) is the success regime; the other four each violate a different PLE precondition (task count, breadth-axis fit, latency, topology-flexibility).</>}
        lens={<>PLE needs 2-4 tasks, observable seesaw, fixed topology, and depth-friendly latency budget.</>}
        stretch={<>What latency does each CGC block typically add?</>}
      />

      <VIS.TrapProblem id="ple-p10" difficulty="hard"
        title="P10 — Why does PLE provably alleviate seesaw?"
        scenario={<><em>Discriminating insight: in MMoE, every task gradient flows through every expert; oppositely-pulled gradients on the same expert produce interference. In PLE, task-specific experts receive gradient ONLY from their task — there is no interference there by construction. Shared experts still see all gradients (their job), but the task-specific track preserves a clean path.</em><br/>Why?</>}
        options={[
          {key:"a", text:"Task-specific experts receive gradients from only one task by construction — interference is impossible there. Shared experts still aggregate, but the task-specific track preserves a clean, interference-free gradient path per task.", correct:true},
          {key:"b", text:"PLE is identical to MMoE."},
          {key:"c", text:"PLE has no shared experts."},
          {key:"d", text:"PLE removes gradients entirely."},
        ]}
        trap={<>(b)(c)(d) deny the mechanism.</>}
        lens={<>Task-specific experts are gradient-isolated by construction.</>}
        stretch={<>What residual interference remains via shared experts?</>}
      />

      <VIS.TrapProblem id="ple-p11" difficulty="hard"
        title="P11 — PLE forward pass mechanics"
        scenario={<><em>Discriminating insight: at each CGC layer, for each task: gate inputs are concatenated outputs of (shared experts + that task&apos;s task-specific experts). Gate outputs a distribution over those experts and computes a weighted sum, which feeds the next layer&apos;s shared and task-specific experts for that task. Other tasks&apos; specific experts are invisible to this gate.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"At each CGC layer, for each task: gate sees shared experts + that task&apos;s task-specific experts; gate outputs weighted sum; this feeds the next layer for that task. Other tasks&apos; specific experts are invisible to this gate.", correct:true},
          {key:"b", text:"All gates see all experts."},
          {key:"c", text:"Gates are absent in PLE."},
          {key:"d", text:"Gates see only shared experts."},
        ]}
        trap={<>(b) is MMoE. (c) destroys the design. (d) misses task-specific path.</>}
        lens={<>Per-task gate sees shared + own specific only; that is the customization.</>}
        stretch={<>What if you let a gate see all task-specific experts?</>}
      />

      <VIS.TrapProblem id="ple-p12" difficulty="hard"
        title="P12 — What does PLE deliberately drop vs MMoE?"
        scenario={<><em>Discriminating insight: MMoE shares all experts maximally; PLE restricts each task to shared + its own specific. PLE forfeits the chance for a task to access another task&apos;s specific expert — the cost of structural isolation.</em><br/>What is dropped?</>}
        options={[
          {key:"a", text:"Cross-task access to task-specific experts. In MMoE every task can mix every expert; in PLE task A cannot access task B&apos;s specific experts. The trade is flexibility for clean gradient isolation.", correct:true},
          {key:"b", text:"PLE forfeits sharing entirely."},
          {key:"c", text:"PLE forfeits gradients."},
          {key:"d", text:"PLE forfeits multi-task itself."},
        ]}
        trap={<>(b)(c)(d) miss the dropped property.</>}
        lens={<>Cross-task access to specific experts is the deliberate cost.</>}
        stretch={<>When would cross-task access actually help?</>}
      />

      <VIS.TrapProblem id="ple-p13" difficulty="hard"
        title="P13 — Most fragile knob in PLE"
        scenario={<><em>Discriminating insight: the ratio of shared to task-specific experts at each layer determines how much PLE behaves like MMoE (all shared) vs per-task towers (no shared). Stack depth is next; expert hidden dim after; LR last.</em><br/>Rank.</>}
        options={[
          {key:"a", text:"Shared-to-task-specific expert ratio is most fragile — too shared collapses to MMoE; too specific collapses to per-task towers. Stack depth next; expert hidden dim after; LR last.", correct:true},
          {key:"b", text:"Optimizer choice is most fragile."},
          {key:"c", text:"Batch size is most fragile."},
          {key:"d", text:"Number of tasks is most fragile."},
        ]}
        trap={<>(b)(c)(d) miss the PLE-specific structural ratio.</>}
        lens={<>Shared:specific ratio is the structural ratio knob.</>}
        stretch={<>How would you tune this ratio per layer?</>}
      />

      <VIS.TrapProblem id="ple-p14" difficulty="medium"
        title="P14 — Data assumption violations"
        scenario={<><em>Discriminating insight: PLE&apos;s &ldquo;progressive&rdquo; piece assumes the shared-vs-specific layer ordering is preserved through the stack — lower layers do gradual sharing, upper layers do task-specific refinement. If a config error inverts that ordering (specific-then-shared), upper layers force task-specific representations back into the shared pool, destroying the gradient-isolation that PLE is designed to provide.</em><br/>Which violation is most direct?</>}
        options={[
          {key:"a", text:"Shared-vs-specific layer-stack ordering inverted: upper layers configured as shared while lower layers are task-specific — gradient isolation is reversed and PLE collapses to noisy shared-bottom.", correct:true},
          {key:"b", text:"Tasks share label-noise but have disjoint targets — noise correlation is annoying but PLE&apos;s structural split still has meaningful work to do."},
          {key:"c", text:"One task has 100x more training samples than the others — imbalance is a per-task loss-weighting problem, doesn&apos;t invert PLE&apos;s structural property."},
          {key:"d", text:"Tasks are sequential (label of t depends on t-1) — this is a temporal-modeling problem orthogonal to PLE&apos;s multi-task split."},
        ]}
        trap={<>(b)(c)(d) are real data quirks but each leaves PLE&apos;s structural ordering intact; only inverted layer-stack ordering destroys the &ldquo;progressive&rdquo; property.</>}
        lens={<>PLE&apos;s structural precondition: lower=shared, upper=specific ordering through the stack.</>}
        stretch={<>How would you assert layer-ordering correctness in code?</>}
      />

      <VIS.TrapProblem id="ple-p15" difficulty="hard"
        title="P15 — Intuitive but wrong: &ldquo;PLE doubles inference cost because it has more experts&rdquo;"
        scenario={<><em>Discriminating insight: total expert count in PLE need not exceed MMoE&apos;s — the experts are PARTITIONED into shared and task-specific, not added on top. Inference cost is dominated by the gating + weighted sum, which scales with experts per gate (shared + own specific), not the total count.</em><br/>Why is &ldquo;doubles inference&rdquo; wrong?</>}
        options={[
          {key:"a", text:"PLE partitions a budget of experts into shared and task-specific; total count is comparable to MMoE. Each task gate touches shared + own specific, not all experts, so inference cost is similar to MMoE.", correct:true},
          {key:"b", text:"PLE always doubles inference cost."},
          {key:"c", text:"PLE always halves inference cost."},
          {key:"d", text:"PLE removes inference."},
        ]}
        trap={<>(b)(c)(d) misidentify cost.</>}
        lens={<>Partition vs add; total budget is comparable.</>}
        stretch={<>What is the realistic % overhead at production traffic?</>}
      />

      <VIS.TrapProblem id="ple-p16" difficulty="hard"
        title="P16 — Wrong-assumption cascade"
        scenario={<><em>Discriminating insight: assuming &ldquo;PLE is just MMoE with more experts&rdquo; cascades into (i) letting gates see all experts (defeats isolation), (ii) skipping the depth stack (defeats progressive separation), (iii) random shared/specific allocation (defeats the structural prior). Each piece is load-bearing.</em><br/>What breaks?</>}
        options={[
          {key:"a", text:"All three: full-gate access destroys task-specific isolation; no stack destroys progressive separation; random shared/specific allocation destroys the structural prior. PLE needs the split AND the stack together.", correct:true},
          {key:"b", text:"Only the gate."},
          {key:"c", text:"Only the depth."},
          {key:"d", text:"Nothing — PLE really is just MMoE with more experts."},
        ]}
        trap={<>(d) the seductive misread.</>}
        lens={<>Per-layer split + depth stack + restricted gates — all three load-bearing.</>}
        stretch={<>What ablation isolates each?</>}
      />

      <VIS.TrapProblem id="ple-p17" difficulty="medium"
        title="P17 — Senior vs junior diagnostic"
        scenario={<><em>Discriminating insight: when PLE under-performs, a junior adds more experts. A senior measures gate weight on shared vs task-specific experts per task per layer — if a task gate weights its task-specific experts close to zero, the model is collapsing back to MMoE-like behavior; if shared weight is zero, the model has degenerated to per-task towers. Diagnose, do not just add capacity.</em><br/>Which lever first?</>}
        options={[
          {key:"a", text:"Measure gate weight on shared vs task-specific experts per task per layer. Zero task-specific weight = collapsed to MMoE; zero shared weight = collapsed to per-task towers. Adjust shared:specific ratio or regularization accordingly.", correct:true},
          {key:"b", text:"Add experts blindly."},
          {key:"c", text:"Drop PLE entirely."},
          {key:"d", text:"Increase backbone width."},
        ]}
        trap={<>(b)(c)(d) miss the gate-weight diagnostic.</>}
        lens={<>Gate weight per type is the PLE-specific diagnostic.</>}
        stretch={<>What dashboard would show shared vs specific gate weight per task per layer?</>}
      />

      <VIS.TrapProblem id="ple-p18" difficulty="hard"
        title="P18 — Plausible-misattribution: task imbalance broke PLE"
        scenario={<><em>Discriminating insight: A/B shows PLE underperforms after a new task added with 100x more training samples than the others. Team blames PLE. Real cause: the shared experts now over-fit to the dominant task because gradients from that task swamp the others on shared experts; the task-specific experts of the minority tasks are starved. Fix is per-task gradient/loss reweighting, not abandoning PLE.</em><br/>Most likely cause?</>}
        options={[
          {key:"a", text:"Task sample imbalance: the dominant task floods shared experts with its gradient, starving minority task-specific experts of useful representation. Re-weight per-task loss or balance batches across tasks; do not abandon PLE.", correct:true},
          {key:"b", text:"GPU thermal throttling."},
          {key:"c", text:"Cache TTL changed."},
          {key:"d", text:"Disk full."},
        ]}
        trap={<>(b)(c)(d) generic.</>}
        lens={<>Task imbalance is a PLE failure mode; rebalance, do not abandon.</>}
        stretch={<>What loss reweighting heuristic stabilizes PLE under imbalance?</>}
      />

      <VIS.TrapProblem id="ple-p19" difficulty="hard"
        title="P19 — Production gotcha: stack depth latency"
        scenario={<><em>Discriminating insight: each CGC block adds a forward pass through shared + task-specific experts + gating. At deep stacks (e.g., 4-5 blocks) this can blow past sub-10ms latency budgets. Discipline: profile depth-vs-latency carefully; for tight budgets, shrink expert hidden dim before reducing stack depth (depth is the &ldquo;progressive&rdquo; value).</em><br/>What is the discipline?</>}
        options={[
          {key:"a", text:"Profile depth vs latency carefully. Each CGC block adds expert + gate compute; deep stacks can exceed latency budgets. Shrink expert hidden dim before reducing depth — depth is the load-bearing progressive piece.", correct:true},

          {key:"d", text:"Skip the latency profile."},

      <VIS.TrapProblem id="ple-p20" difficulty="hard"
        title="P20 — 3am page: shared experts started gradient-shocking after a downstream task swap"
        scenario={<><em>Discriminating insight: a downstream task (task C) was added with an aggressive loss; its gradient now dominates the shared-expert pool through the gates. Task A — which was load-bearing on a SHARED-LAYER feature transformation — loses that signal because the shared experts are being pulled toward C. PLE&apos;s gradient-isolation only protects the task-specific track; the shared track is exposed.</em><br/>3am page. Diagnose.</>}
        options={[
          {key:"a", text:"A new downstream task is gradient-shocking the shared-expert pool — task A relied on a shared-layer feature transformation that is now being rewritten toward task C. Cap task C&apos;s loss weight or move its representation into a task-specific expert before the shared layer.", correct:true},
          {key:"b", text:"Task-specific experts share an init pool with shared experts — symmetry-breaking via init; would show as long-warmup degradation, not a sharp shock after a task swap."},
          {key:"c", text:"Shared:specific ratio set higher in upper layers than lower — that&apos;s a static config issue; wouldn&apos;t change on a downstream-task swap."},
          {key:"d", text:"Gate softmax normalization joint across pools — normalization issue; would mis-route everywhere, not just task A."},

        trap={<>(b)(c)(d) are PLE failure modes but each has the wrong temporal signature for this incident (post-task-swap, task-A-specific).</>}

        stretch={<>What pre-deploy invariant would catch a load-bearing shared-layer dependency?</>}
      />

      <VIS.TrapProblem id="ple-p21" difficulty="medium"
        title="P21 — Library default that bites: gate normalization"
        scenario={<><em>Discriminating insight: some MTL libraries normalize gate outputs across the union of shared and task-specific experts; others normalize within each pool separately. The former couples shared and specific strength; the latter decouples them. The decoupled version is closer to PLE&apos;s spirit but is not the default.</em><br/>What is the gotcha?</>}
        options={[
          {key:"a", text:"Default gate normalization may couple shared and task-specific gate strengths into one softmax; this re-introduces a tradeoff that PLE&apos;s structural split was supposed to remove. Normalize within shared and specific pools separately when possible.", correct:true},

        stretch={<>How does this interact with the shared:specific ratio knob?</>}
      />

      <VIS.TrapProblem id="ple-p22" difficulty="hard" ordered
        title="P22 — Order the PLE rollout"
        scenario={<><em>Discriminating insight: rollout is (1) confirm seesaw in MMoE baseline, (2) design shared:specific expert split at each layer, (3) pick stack depth, (4) train with separate-pool gate normalization, (5) validate per-task gate weights on shared vs specific, (6) ramp. Skipping the seesaw confirmation is the classic mistake — PLE is overkill when MMoE has no seesaw.</em><br/>Order.</>}
        options={[
          {key:"a", text:"Confirm seesaw in MMoE -> design shared:specific split -> pick stack depth -> train -> validate gate weights -> ramp.", correct:true},

          {key:"c", text:"Skip gate-weight validation."},

      />

      <VIS.TrapProblem id="ple-p23" difficulty="hard"
        title="P23 — Smallest input that breaks PLE&apos;s claimed advantage"
        scenario={<><em>Discriminating insight: PLE&apos;s structural advantage assumes both shared and specific structure exist. Several plausible-looking edge inputs exist; only one zeroes the advantage. Others fall in success regimes or degrade gracefully.</em><br/>Construct the edge case.</>}
        options={[
          {key:"b", text:"2-task setup where tasks are essentially the same target with different label noise — tasks perfectly aligned; task-specific experts learn pure noise; PLE buys nothing vs shared-bottom + per-task heads.", correct:true},

      <VIS.TrapProblem id="ple-p24" difficulty="hard"
        title="P24 — Named failure: task-specific expert collapse"
        scenario={<><em>Discriminating insight: under default settings the per-task gate may push almost all weight onto shared experts (which receive more total gradient and look more robust early in training), letting task-specific experts atrophy. The structural advantage of PLE evaporates. Mitigate via entropy regularization on per-task gates, or a soft floor on task-specific weight.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"Task-specific expert collapse — per-task gates push weight onto shared experts (which look stable early in training); task-specific experts atrophy. Mitigate with entropy regularization on the gate, or a soft floor on task-specific weight.", correct:true},
          {key:"b", text:"PLE is immune to collapse."},
          {key:"c", text:"Add more shared experts."},
          {key:"d", text:"Disable task-specific experts."},
        ]}
        trap={<>(b) denies the failure. (c)(d) deepen it.</>}

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://dl.acm.org/doi/10.1145/3383313.3412236" target="_blank" rel="noopener">Tang et al., <em>Progressive Layered Extraction (PLE): A Novel Multi-Task Learning Model for Personalized Recommendations</em> (RecSys 2020, Best Paper)</a> — the source paper.</li>
        <li><a href="https://research.google/pubs/pub46193/" target="_blank" rel="noopener">Ma et al., <em>Modeling Task Relationships in Multi-task Learning with Multi-gate Mixture-of-Experts</em> (KDD 2018)</a> — canonical MMoE; the baseline PLE alleviates.</li>
        <li><a href="https://blog.reachsumit.com/posts/2024/06/multi-task-video-recsys-p1/" target="_blank" rel="noopener">Sumit Kumar — <em>Multi-task Video Recommendation Systems</em> (blog, 2024)</a> — practitioner contrast of PLE, HoME, AESM2 with diagrams.</li>
        <li><a href="https://eugeneyan.com/writing/multitask-models/" target="_blank" rel="noopener">Eugene Yan — <em>Multi-task models in production</em> (blog)</a> — engineering tradeoffs (gate competition, seesaw, sharing vs isolation).</li>
        <li><a href="https://ruder.io/multi-task/" target="_blank" rel="noopener">Sebastian Ruder — <em>An Overview of Multi-Task Learning in Deep Neural Networks</em> (blog)</a> — survey that frames shared-bottom, MMoE, PLE in one place.</li>
        <li><a href="https://arxiv.org/html/2408.05430v1" target="_blank" rel="noopener">Wang et al., <em>HoME</em> (arXiv 2408.05430, 2024)</a> — the next step beyond PLE for 6+ tasks; contrast piece.</li>
      </ul>
    </VIS.Section>
  </main>
);
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
