<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// REDO v2 — RecSys-SOTA batch 12
// MACRS — Multi-Agent Conversational RecSys (Fang et al., arXiv 2402.01135, 2024)
// Unique mechanism: SPLIT a CRS into FOUR LLM agents, each owning a distinct
// dialogue sub-skill (planner, asker, recommender, explainer), with an
// act-planning controller deciding which agent speaks next. The point is not
// "use an LLM for dialog" or "add retrieval" — it is the DECOMPOSITION of the
// CRS into specialized agents that prevents a single LLM from confusing asking
// with recommending.
// B3 anchor: multi-agent dialog where each agent owns a sub-skill — NOT a
// single LLM with retrieval.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="RecSys SOTA · Conversational recommendation"
      title="MACRS — Multi-Agent Conversational RecSys"
      subtitle="Split the CRS into four cooperating LLM agents (planner, asker, recommender, explainer) with an act-planning controller deciding which agent speaks each turn."
      byline={[
        {label: "Paper", value: "Fang et al., arXiv 2402.01135 (2024)"},
        {label: "Surface", value: "Multi-turn conversational recsys — books, movies, e-commerce dialog"},
        {label: "Anchor that survives redaction", value: "Per-agent sub-skill specialization controlled by an act planner — not a single LLM with retrieval"},
      ]}/>

    <VIS.TLDR>
      A single LLM running a <VIS.Term def="A recommender system that drives a multi-turn conversation with the user to elicit preferences and refine suggestions, rather than scoring items in one shot.">conversational recommender</VIS.Term> tends to blur two jobs — asking clarifying questions and producing recommendations — because both compete for the same prompt budget and the same generation. MACRS gives each job its OWN agent: a <strong>planner</strong> picks the next dialogue act, an <strong>asker</strong> elicits preferences, a <strong>recommender</strong> proposes items, an <strong>explainer</strong> justifies them. The act-planning controller chooses which agent speaks each turn. The architectural payoff is auditability and separation of concerns — when something regresses, you know <em>which</em> agent broke. The senior trap: this is NOT &ldquo;LLM + RAG.&rdquo; The four agents are functionally distinct sub-skills, not redundant LLM calls.
    </VIS.TLDR>

    <VIS.Section id="sec-what" title="What it is — four agents and an act planner">
      <VIS.Mermaid chart={`flowchart TB
  U["User turn"] --> P["Planner agent (act selector)"]
  P -->|ask| A["Asker agent (preference elicitation)"]
  P -->|recommend| R["Recommender agent (item proposal)"]
  P -->|explain| E["Explainer agent (justification)"]
  A --> O["System response"]
  R --> O
  E --> O
  O --> U`} />
      <ul>
        <li><strong>Planner</strong> — given dialogue state, picks the next act: ASK, RECOMMEND, or EXPLAIN.</li>
        <li><strong>Asker</strong> — owns preference elicitation. Generates clarifying questions targeting unfilled preference slots.</li>
        <li><strong>Recommender</strong> — owns item proposal. Reads the (partial) preference slots and proposes items.</li>
        <li><strong>Explainer</strong> — owns justification. Given a proposed item, generates a faithful rationale.</li>
      </ul>
      <p>Each agent has a focused prompt and a narrow output contract — short prompts, auditable behavior, and a single regression signal per agent.</p>
    </VIS.Section>

    <VIS.Section id="sec-diff" title="How it differs from sibling CRS designs">
      <table style={{width:"100%", borderCollapse:"collapse", marginTop:8, fontSize:14}}>
        <thead><tr style={{background:"#1f3a5f", color:"#fff"}}>
          <th style={{textAlign:"left", padding:8}}>Method</th>
          <th style={{textAlign:"left", padding:8}}>Decomposition</th>
          <th style={{textAlign:"left", padding:8}}>Act control</th>
          <th style={{textAlign:"left", padding:8}}>Failure attribution</th>
        </tr></thead>
        <tbody>
          <tr><td style={{padding:8}}>Single-LLM CRS</td><td style={{padding:8}}>None — one prompt does it all</td><td style={{padding:8}}>Implicit in generation</td><td style={{padding:8}}>Opaque</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:8}}>HRL-based CRS</td><td style={{padding:8}}>Policy levels</td><td style={{padding:8}}>RL policy</td><td style={{padding:8}}>Per-policy</td></tr>
          <tr><td style={{padding:8}}>Graph-based CRS</td><td style={{padding:8}}>KG over items</td><td style={{padding:8}}>Heuristic</td><td style={{padding:8}}>Per-edge</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:8}}><strong>MACRS</strong></td><td style={{padding:8}}><strong>Four sub-skill agents</strong></td><td style={{padding:8}}><strong>Act planner</strong></td><td style={{padding:8}}><strong>Per-agent</strong></td></tr>
        </tbody>
      </table>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill — 24 trap problems">
      <p style={{color:"#475569"}}>Each problem cites the axis it draws from. Pick, then reveal.</p>

      {/* A1 */}
      <VIS.TrapProblem id="macrs-p1" difficulty="hard"
        title="P1 — MACRS vs single-LLM CRS: what is the load-bearing difference?"
        scenario={<><em>Discriminating insight: a single LLM is forced to choose, within one generation, whether to ASK or RECOMMEND; this conflation is the documented failure mode. MACRS factors the choice into a planner agent before the content agent runs.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"MACRS factors the act decision (ASK / RECOMMEND / EXPLAIN) into a dedicated planner agent that runs BEFORE the content agent. A single-LLM CRS conflates act choice with content generation in one prompt, which is why it asks when it should recommend and vice versa.", correct:true},
          {key:"b", text:"MACRS uses a larger LLM than single-LLM CRS."},
          {key:"c", text:"MACRS uses retrieval; single-LLM CRS does not."},
          {key:"d", text:"MACRS uses RL; single-LLM CRS uses supervised."},
        ]}
        trap={<>(b) confuses scale with structure. (c) is the &ldquo;LLM + RAG&rdquo; misread. (d) orthogonal.</>}
        lens={<>The decomposition itself is the architectural payoff, not the model size or retrieval.</>}
        stretch={<>What metric quantifies the &ldquo;asking when should recommend&rdquo; failure?</>}
      />

      {/* A2 */}
      <VIS.TrapProblem id="macrs-p2" difficulty="hard"
        title="P2 — MACRS vs a chatbot with RAG"
        scenario={<><em>Discriminating insight: a RAG chatbot is one LLM with retrieval — still a single content agent. MACRS&apos;s point is per-act specialization (asker vs recommender vs explainer), each with its own prompt contract.</em><br/>Which is correct?</>}
        options={[
          {key:"a", text:"A RAG chatbot is a single content agent with a retrieval tool; the act decision and the content generation share one prompt. MACRS is four agents with separate prompts and a planner over them — RAG is orthogonal and can be added inside the recommender agent.", correct:true},
          {key:"b", text:"They are equivalent."},
          {key:"c", text:"RAG eliminates the need for MACRS."},
          {key:"d", text:"MACRS is just RAG with more retrievers."},
        ]}
        trap={<>(b)(c)(d) miss the per-act specialization.</>}
        lens={<>Specialization across agents is not retrieval inside one agent.</>}
        stretch={<>Where would RAG sit inside the MACRS recommender?</>}
      />

      {/* A3 counterfactual */}
      <VIS.TrapProblem id="macrs-p3" difficulty="medium"
        title="P3 — Without MACRS, what is your fallback CRS?"
        scenario={<><em>Discriminating insight: realistic fallbacks are single-LLM CRS (conflates acts), HRL-based CRS (heavy training + reward design), or rule-based slot-filler (rigid, no free-form). None achieve MACRS&apos;s per-agent auditability with low marginal engineering.</em><br/>Pick the realistic gap.</>}
        options={[
          {key:"a", text:"Single-LLM CRS or HRL-based CRS. Single-LLM is cheap but conflates acts; HRL needs reward shaping. MACRS sits between: per-agent decomposition without RL machinery.", correct:true},
          {key:"b", text:"A pure popularity ranker is at parity."},
          {key:"c", text:"You would skip CRS entirely."},
          {key:"d", text:"A static FAQ would suffice."},
        ]}
        trap={<>(b)(c)(d) under-shoot CRS surface area.</>}
        lens={<>The realistic gap is auditability vs RL engineering.</>}
        stretch={<>How does HRL&apos;s reward shaping compare with MACRS&apos;s planner prompt?</>}
      />

      {/* A4 composition */}
      <VIS.TrapProblem id="macrs-p4" difficulty="hard"
        title="P4 — Compose MACRS with a knowledge-graph item index"
        scenario={<><em>Discriminating insight: a KG over items naturally lives INSIDE the recommender agent (proposes items by graph walk over filled slots). It does not replace the planner or the asker.</em><br/>What does the stack achieve?</>}
        options={[
          {key:"a", text:"The KG lives inside the recommender agent and proposes items by walks over filled preference slots. The planner, asker, and explainer remain unchanged. MACRS&apos;s decomposition stays intact; only the recommender&apos;s internals change.", correct:true},
          {key:"b", text:"The KG replaces the planner."},
          {key:"c", text:"The KG eliminates the asker agent."},
          {key:"d", text:"MACRS and KG are incompatible."},
        ]}
        trap={<>(b)(c)(d) miss agent boundaries.</>}
        lens={<>Each agent&apos;s internals are swappable; the decomposition is the API.</>}
        stretch={<>What does the KG do for the EXPLAINER agent?</>}
      />

      {/* A5 boundary */}
      <VIS.TrapProblem id="macrs-p5" difficulty="medium"
        title="P5 — At what dialog depth does MACRS stop paying for itself?"
        scenario={<><em>Discriminating insight: MACRS&apos;s overhead is the planner call and prompt-template maintenance for four agents. For very short dialogs (2 turns or fewer), per-turn planner latency dominates the budget.</em><br/>Where is the boundary?</>}
        options={[
          {key:"a", text:"For very short dialogs (two turns or fewer) per-turn planner latency dominates; single-LLM CRS wins on wall-clock. MACRS&apos;s payoff is in 4+ turn dialogs where the asker/recommender confusion in single-LLM costs more than the planner overhead.", correct:true},
          {key:"b", text:"MACRS always wins."},
          {key:"c", text:"MACRS only wins below 1B parameters."},
          {key:"d", text:"Dialog length is irrelevant."},
        ]}
        trap={<>(b)(c) over-claim. (d) ignores the cost model.</>}
        lens={<>Decomposition pays off with dialog depth, not breadth.</>}
        stretch={<>How would you measure the &ldquo;act-confusion&rdquo; rate in single-LLM CRS?</>}
      />

      {/* B1 application */}
      <VIS.TrapProblem id="macrs-p6" difficulty="hard"
        title="P6 — Pick a CRS architecture for this scenario"
        scenario={<><em>Discriminating insight: a travel-booking domain needs both slot-filling (dates, destinations) AND free-form preference talk (&ldquo;something quiet&rdquo;). Slot-filling alone misses free-form; pure LLM dialog conflates the two. MACRS is purpose-built for this mix.</em><br/>Pick.</>}
        options={[
          {key:"a", text:"MACRS — the planner can interleave slot-targeted ASK acts with free-form RECOMMEND acts, and the explainer covers &ldquo;why this hotel?&rdquo; questions naturally.", correct:true},
          {key:"b", text:"A rigid slot-filler — fails the free-form preferences."},
          {key:"c", text:"Single-LLM CRS — will keep recommending before slots are filled."},
          {key:"d", text:"Pure FAQ retrieval."},
        ]}
        trap={<>(b)(c)(d) each fail one of the two requirements.</>}
        lens={<>MACRS&apos;s sweet spot is mixed slot + free-form.</>}
        stretch={<>What metric measures &ldquo;recommended before slots filled&rdquo;?</>}
      />

      {/* B2 sounds reasonable */}
      <VIS.TrapProblem id="macrs-p7" difficulty="hard"
        title="P7 — Sounds reasonable: &ldquo;just use a bigger LLM&rdquo;"
        scenario={<><em>Discriminating insight: bigger LLMs do not solve act-confusion — they make it more confident. The decomposition is the architectural fix; capability is not the constraint, control over WHICH job runs WHEN is.</em><br/>Why is &ldquo;use GPT-4&rdquo; insufficient?</>}
        options={[
          {key:"a", text:"Capability is not the bottleneck; act-control is. A larger LLM still has to decide ASK vs RECOMMEND within one generation, and a more capable model just executes the wrong choice more fluently. MACRS&apos;s planner externalizes the act choice.", correct:true},
          {key:"b", text:"GPT-4 cannot do conversation."},
          {key:"c", text:"Bigger LLMs solve the problem."},
          {key:"d", text:"Latency is the only difference."},
        ]}
        trap={<>(b) false. (c) the seductive misread. (d) shifts to latency.</>}
        lens={<>Externalize the act choice; do not hope the LLM picks correctly.</>}
        stretch={<>How would you test &ldquo;more confident wrong&rdquo; experimentally?</>}
      />

      {/* B3 — anchor pitch */}
      <VIS.TrapProblem id="macrs-p8" difficulty="hard"
        title="P8 — MACRS&apos;s anchor (multi-agent sub-skill split): pitch it"
        scenario={<><em>Discriminating insight: the anchor is &ldquo;each agent owns ONE dialogue sub-skill — preference elicitation, item proposal, justification — and a planner picks which one speaks.&rdquo;</em><br/>Pick the pitch that names the anchor.</>}
        options={[
          {key:"a", text:"Instead of one LLM trying to ask, recommend, and explain in the same generation, MACRS gives each sub-skill its own agent with a focused prompt, and a planner picks which agent speaks. When something regresses we know which agent caused it; single-LLM CRS gives us a black box.", correct:true},
          {key:"b", text:"We use a bigger LLM for better recommendations."},
          {key:"c", text:"We add retrieval to a chatbot."},
          {key:"d", text:"We fine-tune nightly."},
        ]}
        trap={<>(b) capability misread. (c) RAG misread. (d) cadence misread.</>}
        lens={<>Per-agent sub-skill is the anchor, not retrieval or scale.</>}
        stretch={<>Name a sub-skill not in the four-agent split that could become an agent.</>}
      />

      {/* B4 not to use */}
      <VIS.TrapProblem id="macrs-p9" difficulty="hard" multiSelect
        title="P9 — When NOT to use MACRS. Select all that apply."
        scenario={<><em>Discriminating insight: MACRS needs multi-turn dialog AND mixed asking+recommending. It is overkill for one-shot recs, for purely structured Q&amp;A, or when there is no asking phase.</em><br/>Pick the do-not-use cases.</>}
        options={[
          {key:"a", text:"One-shot home-page recommendation (no conversation).", correct:true},
          {key:"b", text:"Purely structured Q&amp;A with a fixed answer set (FAQ bot).", correct:true},
          {key:"c", text:"Domain where preferences are pre-collected at signup (no in-session asking phase).", correct:true},
          {key:"d", text:"Travel-booking with mixed slot-fill + free-form preferences."},
          {key:"e", text:"Pure cold-start with no dialog interface."},
        ]}
        trap={<>(d) is sweet spot. (e) generic; cold-start can still benefit if dialog is present.</>}
        lens={<>MACRS needs both asking AND recommending in-session.</>}
        stretch={<>If signup pre-collects preferences, what becomes of the asker?</>}
      />

      {/* C1 architectural */}
      <VIS.TrapProblem id="macrs-p10" difficulty="hard"
        title="P10 — Why a separate planner agent? Why not let agents self-route?"
        scenario={<><em>Discriminating insight: self-routing forces every content agent to first decide &ldquo;is it my turn?&rdquo; — recreating the original act-confusion inside each agent. A SEPARATE planner makes the decision once, with the full dialogue context.</em><br/>Why externalize?</>}
        options={[
          {key:"a", text:"Self-routing forces each content agent to spend prompt budget deciding whether to act, re-introducing act-confusion at agent level. A separate planner makes the decision once with the full dialogue state, then the chosen agent runs with full prompt budget on content.", correct:true},
          {key:"b", text:"Self-routing is faster."},
          {key:"c", text:"Self-routing is more accurate."},
          {key:"d", text:"There is no functional difference."},
        ]}
        trap={<>(b)(c)(d) miss the prompt-budget mechanism.</>}
        lens={<>The planner is a control-plane abstraction, not a UI gimmick.</>}
        stretch={<>What state does the planner need that content agents do not?</>}
      />

      {/* C2 loss */}
      <VIS.TrapProblem id="macrs-p11" difficulty="hard"
        title="P11 — Training signal: how is the planner supervised?"
        scenario={<><em>Discriminating insight: the planner learns from human-labeled act traces (turn → act) or from offline RL on dialogue success. The content agents are trained / prompted on their per-act objective.</em><br/>Pick the correct loss decomposition.</>}
        options={[
          {key:"a", text:"Planner: act-classification loss over human-labeled dialogue traces (or offline RL with dialog-success reward). Asker / recommender / explainer: per-agent objectives (slot-coverage, ranking, faithfulness). Each agent has its own loss signal.", correct:true},
          {key:"b", text:"All four agents share a single end-to-end loss."},
          {key:"c", text:"Only the recommender is trained."},
          {key:"d", text:"All agents are trained adversarially against each other."},
        ]}
        trap={<>(b) collapses MACRS to single-LLM. (c) ignores three agents. (d) wrong family.</>}
        lens={<>Per-agent loss yields per-agent regression diagnostics.</>}
        stretch={<>How does the planner&apos;s reward shape differ from HRL CRS?</>}
      />

      {/* C3 dropped */}
      <VIS.TrapProblem id="macrs-p12" difficulty="hard"
        title="P12 — What does MACRS deliberately drop vs single-LLM CRS?"
        scenario={<><em>Discriminating insight: MACRS drops the implicit joint-optimization of asking and recommending (no &ldquo;blended&rdquo; turn). Gain: auditability. Loss: cross-act fluidity. The paper accepts the tradeoff.</em><br/>What does MACRS forfeit?</>}
        options={[
          {key:"a", text:"MACRS forfeits the ability for a single utterance to BLEND asking and recommending (&ldquo;Do you prefer thrillers or comedies? If thrillers, you might like Heat&rdquo;). Each turn now does one act. The gain is per-agent debuggability and act-control.", correct:true},
          {key:"b", text:"MACRS forfeits the use of LLMs."},
          {key:"c", text:"MACRS forfeits retrieval."},
          {key:"d", text:"MACRS forfeits multi-turn dialog."},
        ]}
        trap={<>(b)(c)(d) miss the dropped fluidity.</>}
        lens={<>Cross-act fluidity is the deliberate sacrifice.</>}
        stretch={<>Can the planner emit a &ldquo;hybrid&rdquo; act and call two agents in one turn?</>}
      />

      {/* C4 hyperparameter */}
      <VIS.TrapProblem id="macrs-p13" difficulty="hard"
        title="P13 — Most fragile knob"
        scenario={<><em>Discriminating insight: the planner&apos;s act-policy temperature dominates. Too sharp: it loops on one act (always-ASK). Too soft: it bounces between acts erratically.</em><br/>Rank by 2x mis-set breakage.</>}
        options={[
          {key:"a", text:"Planner act-policy temperature is most fragile; recommender LR next; explainer max-tokens least. Temperature controls how decisive the planner is per turn; mis-set causes act looping or thrash.", correct:true},
          {key:"b", text:"Explainer max-tokens is the most fragile knob."},
          {key:"c", text:"Recommender LR is the most fragile knob."},
          {key:"d", text:"Asker top-k is the most fragile knob."},
        ]}
        trap={<>(b)(c)(d) tweak content-agent details and miss the planner.</>}
        lens={<>The planner is the control plane; its temperature is the control gain.</>}
        stretch={<>How would you measure act looping?</>}
      />

      {/* C5 data assumption */}
      <VIS.TrapProblem id="macrs-p14" difficulty="medium"
        title="P14 — Data assumption violations"
        scenario={<><em>Discriminating insight: MACRS assumes act-labeled dialogue traces are available for planner supervision. Domains without act labels must bootstrap with rules or weak supervision and inherit single-LLM confusions.</em><br/>What violation is most direct?</>}
        options={[
          {key:"a", text:"No act-labeled traces. The planner cannot be supervised; you must bootstrap with rules (e.g., &ldquo;if last user turn contains a question, ASK&rdquo;) or weakly supervised LLM-derived labels — which inherit the single-LLM confusions you were trying to fix.", correct:true},
          {key:"b", text:"Off-by-one in turn indexing."},
          {key:"c", text:"Different tokenizer."},
          {key:"d", text:"Mismatched batch sizes."},
        ]}
        trap={<>(b)(c)(d) generic.</>}
        lens={<>Act labels are the planner&apos;s contract.</>}
        stretch={<>How would you bootstrap act labels cheaply?</>}
      />

      {/* D1 intuitive but wrong */}
      <VIS.TrapProblem id="macrs-p15" difficulty="hard"
        title="P15 — Intuitive but wrong: &ldquo;four agents equals 4x latency&rdquo;"
        scenario={<><em>Discriminating insight: per-turn, only TWO agents typically run (planner + chosen content agent). Latency is ~2x single-LLM, not 4x. The four-agent count is the design surface, not the per-turn call graph.</em><br/>Why is 4x wrong?</>}
        options={[
          {key:"a", text:"Per turn only the planner and one content agent run — about 2x single-LLM latency, not 4x. The four-agent figure counts agents in the SYSTEM, not calls per turn. With prompt caching the planner call is also small.", correct:true},
          {key:"b", text:"All four agents run every turn."},
          {key:"c", text:"Latency is unchanged."},
          {key:"d", text:"Latency is 10x."},
        ]}
        trap={<>(b) the seductive misread. (c)(d) extremes.</>}
        lens={<>Design surface is not the per-turn call graph.</>}
        stretch={<>When would more than 2 agents run per turn?</>}
      />

      {/* D2 wrong-assumption cascade */}
      <VIS.TrapProblem id="macrs-p16" difficulty="hard"
        title="P16 — Wrong-assumption cascade"
        scenario={<><em>Discriminating insight: &ldquo;MACRS is just a fancy chatbot&rdquo; cascades into (i) skipping the planner (acts confuse again), (ii) merging asker+recommender prompts to save tokens (re-introduces act-confusion), (iii) evaluating only end-to-end success (loses per-agent diagnostic).</em><br/>What breaks?</>}
        options={[
          {key:"a", text:"All three: the planner, the per-agent prompt boundaries, and the per-agent evaluation. Each is a load-bearing piece of the decomposition; remove any one and you regress toward single-LLM CRS.", correct:true},
          {key:"b", text:"Only the planner."},
          {key:"c", text:"Only the evaluation."},
          {key:"d", text:"Nothing — &ldquo;fancy chatbot&rdquo; is accurate."},
        ]}
        trap={<>(d) the seductive misread.</>}
        lens={<>Planner + agent boundaries + per-agent eval are inseparable.</>}
        stretch={<>How would you A/B test &ldquo;merge asker+recommender&rdquo; safely?</>}
      />

      {/* D3 senior vs junior */}
      <VIS.TrapProblem id="macrs-p17" difficulty="medium"
        title="P17 — Senior vs junior framing"
        scenario={<><em>Discriminating insight: a junior debugs MACRS regressions by tuning prompts of all four agents in lockstep. A senior isolates the regressing agent first via per-agent metrics, then tunes only that one.</em><br/>Which lever first?</>}
        options={[
          {key:"a", text:"Isolate via per-agent metrics: planner act-accuracy, asker slot-coverage, recommender NDCG, explainer faithfulness. Tune ONLY the regressing agent. The per-agent diagnostic IS the architectural payoff of MACRS.", correct:true},
          {key:"b", text:"Tune all four prompts in lockstep."},
          {key:"c", text:"Switch to single-LLM CRS."},
          {key:"d", text:"Increase model size."},
        ]}
        trap={<>(b)(c)(d) waste the decomposition.</>}
        lens={<>Use the per-agent attribution; it is the whole point.</>}
        stretch={<>What single dashboard panel best shows per-agent health?</>}
      />

      {/* D4 plausible-misattribution */}
      <VIS.TrapProblem id="macrs-p18" difficulty="hard"
        title="P18 — Plausible-misattribution"
        scenario={<><em>Discriminating insight: a drop in NDCG looks like a recommender-agent problem but is actually an asker-agent problem: under-elicited slots leave the recommender ranking against an incomplete preference. Slot-coverage drops first, NDCG drops second.</em><br/>Most likely root cause?</>}
        options={[
          {key:"a", text:"Asker slot-coverage dropped first; recommender NDCG follows because the recommender ranks against an incomplete preference. Fix the asker (or the planner&apos;s preference for ASK) before touching the recommender.", correct:true},
          {key:"b", text:"GPU thermal throttling."},
          {key:"c", text:"Recommender model degraded."},
          {key:"d", text:"Cache invalidation."},
        ]}
        trap={<>(b)(d) generic. (c) seductive but downstream symptom.</>}
        lens={<>Trace failures upstream along the planner → asker → recommender chain.</>}
        stretch={<>What canary metric catches under-elicitation first?</>}
      />

      {/* E1 production gotcha */}
      <VIS.TrapProblem id="macrs-p19" difficulty="hard"
        title="P19 — Production gotcha: inter-agent latency stacking"
        scenario={<><em>Discriminating insight: even at two agents per turn, sequential dependence (planner&apos;s output is the routing key) means latency stacks; you cannot parallelize them without speculatively running multiple content agents.</em><br/>What is the practical discipline?</>}
        options={[
          {key:"a", text:"Speculatively run the most likely content agent in parallel with the planner; if the planner picks differently, discard the speculative output. The planner&apos;s decision is the routing key, so without speculation latency stacks sequentially.", correct:true},
          {key:"b", text:"Always run all four content agents in parallel and pick one."},
          {key:"c", text:"Run the planner and content agent in parallel without speculation."},
          {key:"d", text:"Latency stacking is not solvable; accept it."},
        ]}
        trap={<>(b) over-spends. (c) violates dependency. (d) defeatist.</>}
        lens={<>Speculative execution is the standard trick under sequential dependence.</>}
        stretch={<>What is the break-even point between speculation cost and latency savings?</>}
      />

      {/* E2 Failure on Friday */}
      <VIS.TrapProblem id="macrs-p20" difficulty="hard"
        title="P20 — Failure on Friday: planner stuck on ASK"
        scenario={<><em>Discriminating insight: a routine prompt update lowered the planner&apos;s confidence threshold to switch from ASK to RECOMMEND; the system asks indefinitely. NDCG looks fine (no items are ranked) but session abandonment spikes.</em><br/>3am page: abandonment up 30%, NDCG unchanged. Diagnosis?</>}
        options={[
          {key:"a", text:"Planner is looping on ASK because its switch-to-RECOMMEND threshold was lowered; the system never recommends. NDCG is unchanged because no items are ranked. Per-agent dashboards would show act-distribution shifted heavily toward ASK.", correct:true},
          {key:"b", text:"GPU OOM."},
          {key:"c", text:"Recommender model degraded."},
          {key:"d", text:"Cache TTL changed."},
        ]}
        trap={<>(b)(c)(d) generic; do not explain &ldquo;NDCG unchanged.&rdquo;</>}
        lens={<>Act-distribution drift is the diagnostic; planner is the suspect.</>}
        stretch={<>What CI assertion gates planner act-distribution drift?</>}
      />

      {/* E3 implementation specifics */}
      <VIS.TrapProblem id="macrs-p21" difficulty="medium"
        title="P21 — Library default that bites: shared system prompt"
        scenario={<><em>Discriminating insight: many CRS frameworks default to a single shared system prompt across all agents. This dilutes per-agent specialization — every agent inherits the global &ldquo;you are a helpful conversational recommender&rdquo; framing.</em><br/>Where does the default break MACRS?</>}
        options={[
          {key:"a", text:"A shared system prompt across all four agents inherits one generic role and dilutes per-agent specialization. Each MACRS agent should have its OWN system prompt naming its specific sub-skill and its output contract.", correct:true},
          {key:"b", text:"Default temperature is wrong."},
          {key:"c", text:"Default top-k is wrong."},
          {key:"d", text:"Default max-tokens is wrong."},
        ]}
        trap={<>(b)(c)(d) generic.</>}
        lens={<>Per-agent system prompts are the specialization knob.</>}
        stretch={<>What does each agent&apos;s system prompt name explicitly?</>}
      />

      {/* E4 rollout */}
      <VIS.TrapProblem id="macrs-p22" difficulty="hard" ordered
        title="P22 — Order the rollout"
        scenario={<><em>Discriminating insight: rollout sequence: (1) build the planner alone and shadow-evaluate act decisions against human labels, (2) add asker + recommender behind the planner, (3) add explainer, (4) shadow-score full pipeline, (5) traffic ramp.</em><br/>Order.</>}
        options={[
          {key:"a", text:"Planner alone → planner + asker + recommender → add explainer → shadow-score full pipeline → traffic ramp", correct:true},
          {key:"b", text:"Build all four agents at once and ship."},
          {key:"c", text:"Build the recommender first; add the planner last."},
          {key:"d", text:"Ramp traffic first."},
        ]}
        trap={<>(b)(c)(d) lose the per-stage diagnostic.</>}
        lens={<>Build the control plane first; layer content agents.</>}
        stretch={<>Why planner before content?</>}
      />

      {/* F1 edge case */}
      <VIS.TrapProblem id="macrs-p23" difficulty="hard"
        title="P23 — Smallest input that breaks MACRS&apos;s claimed advantage"
        scenario={<><em>Discriminating insight: a one-turn dialog with a fully specified user query has no asking phase and no act ambiguity. MACRS&apos;s planner has nothing to decide; overhead is pure cost.</em><br/>Construct the edge case.</>}
        options={[
          {key:"a", text:"A one-turn dialog with a fully-specified user query — no asking phase, no act ambiguity. The planner&apos;s act decision is trivial (always RECOMMEND). MACRS&apos;s decomposition does not save anything; single-LLM CRS does the same work cheaper.", correct:true},
          {key:"b", text:"Multi-turn dialog with mixed slot + free-form preferences (sweet spot, not edge case)."},
          {key:"c", text:"Catalog of 10M items."},
          {key:"d", text:"User base of 100M."},
        ]}
        trap={<>(b) sweet spot. (c)(d) describe scale.</>}
        lens={<>MACRS needs act-decision ambiguity to pay off.</>}
        stretch={<>How would you A/B route &ldquo;simple&rdquo; sessions to single-LLM?</>}
      />

      {/* F4 paper-named failure */}
      <VIS.TrapProblem id="macrs-p24" difficulty="hard"
        title="P24 — Paper-named failure: inter-agent latency and coordination bugs"
        scenario={<><em>Discriminating insight: the paper names (i) inter-agent latency stacking and (ii) coordination bugs (planner picks an act the chosen content agent cannot fulfill). Which dominates practice?</em><br/>Pick.</>}
        options={[
          {key:"a", text:"Coordination bugs dominate practice: the planner picks ASK, the asker returns no question (all slots filled), no recovery path. Latency is engineering-solvable via speculation/caching; coordination requires fallback policies in the planner.", correct:true},
          {key:"b", text:"Latency dominates; coordination is rare."},
          {key:"c", text:"Both are negligible."},
          {key:"d", text:"Coordination bugs are a myth."},
        ]}
        trap={<>(b) reverses paper&apos;s finding. (c)(d) deny reality.</>}
        lens={<>Coordination is the planner&apos;s fallback policy; latency is solvable.</>}
        stretch={<>What fallback should the planner have when the chosen agent declines?</>}
      />

    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://arxiv.org/html/2402.01135" target="_blank" rel="noopener">Fang et al., <em>A Multi-Agent Conversational Recommender System</em> (arXiv 2402.01135, 2024)</a> — primary source for MACRS.</li>
        <li><a href="https://lilianweng.github.io/posts/2023-06-23-agent/" target="_blank" rel="noopener">Lilian Weng — <em>LLM-Powered Autonomous Agents</em> (blog)</a> — planner / content-agent decomposition intuition.</li>
        <li><a href="https://eugeneyan.com/writing/llm-patterns/" target="_blank" rel="noopener">Eugene Yan — <em>Patterns for Building LLM-Based Systems &amp; Products</em> (blog)</a> — practitioner framing of multi-agent vs single-LLM tradeoffs.</li>
        <li><a href="https://arxiv.org/abs/2004.00646" target="_blank" rel="noopener">Gao et al., <em>Advances and Challenges in Conversational Recommender Systems</em> (survey, 2020)</a> — sibling CRS designs (HRL, KG-based, slot-filling).</li>
        <li><a href="https://jalammar.github.io/illustrated-transformer/" target="_blank" rel="noopener">Jay Alammar — <em>The Illustrated Transformer</em> (blog)</a> — background on the LLMs each agent runs.</li>
      </ul>
    </VIS.Section>
  </main>
);

      const pre = document.createElement("pre");

        + "margin:0;font:12px/1.4 monospace;z-index:10002;";

      document.body.appendChild(pre);
    }, true);
  </script>
