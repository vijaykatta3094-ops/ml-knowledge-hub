<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Focal loss — ml-fund concept visual (G20 hover-gloss + trap drills)

const FL_SPEC = {
  width: 600, height: 280,
  layer: [
    { mark:{type:"line",color:"#0f172a",strokeWidth:3},
      encoding:{x:{field:"p",type:"quantitative",title:"Predicted prob for true class (p_t)"},
                y:{field:"ce",type:"quantitative",title:"Loss"}}},
    { mark:{type:"line",color:"#dc2626",strokeWidth:3},
      encoding:{x:{field:"p"}, y:{field:"fl2"}}},
    { mark:{type:"line",color:"#d97706",strokeWidth:3,strokeDash:[4,2]},
      encoding:{x:{field:"p"}, y:{field:"fl5"}}}
  ]
};
const FL_DATA = Array.from({length:50}, (_,i) => {
  const p = (i+1)/50;
  return { p, ce: -Math.log(p), fl2: Math.pow(1-p,2)*(-Math.log(p)), fl5: Math.pow(1-p,5)*(-Math.log(p)) };
});

// Modulating-factor curve: (1 - p_t)^γ across γ ∈ {0, 0.5, 1, 2, 5}
const MOD_SPEC = {
  width: 600, height: 260,
  encoding: {
    x: { field: "p", type: "quantitative", title: "p_t (predicted prob for true class)" },
    y: { field: "w", type: "quantitative", title: "Modulating factor (1 - p_t)^γ" },
    color: { field: "gamma", type: "nominal", title: "γ",
             scale: { domain: ["0","0.5","1","2","5"],
                      range: ["#0f172a","#6366f1","#16a34a","#dc2626","#d97706"] } }
  },
  mark: { type: "line", strokeWidth: 3 }
};
const MOD_DATA = [];
[0, 0.5, 1, 2, 5].forEach(g => {
  for (let i = 1; i <= 50; i++) {
    const p = i / 50;
    MOD_DATA.push({ p, w: Math.pow(1 - p, g), gamma: String(g) });
  }
});

const App = () => (
  <main style={{maxWidth:880,margin:"2em auto",padding:"0 16px",fontSize:16,lineHeight:1.65}}>
    <VIS.Hero pill="ML Fund · Concept" title="Focal loss"
      subtitle={<>A loss that down-weights easy examples per-sample (not per-class), making single-stage <VIS.Term def="An ML setup where every pixel/anchor is a candidate class. Background dominates 99.99% of candidates and drowns the foreground signal under plain cross-entropy.">dense classification</VIS.Term> trainable under extreme imbalance.</>}
      byline={[
        {label:"Audience",value:"smart but new to ML"},
        {label:"Origin",value:"Lin et al. 2017 (RetinaNet)"},
      ]}/>

    <VIS.TLDR>
      <code>FL = -(1 - p_t)^γ · log(p_t)</code>, where <code>p_t</code> = the model's predicted probability for the true class. The <VIS.Term def="The (1 - p_t)^γ factor in focal loss. It scales each sample's loss by how confident the model already is about the right answer.">modulating factor</VIS.Term> <code>(1 - p_t)^γ</code> shrinks toward 0 for easy examples (high <code>p_t</code>) and stays near 1 for hard ones (low <code>p_t</code>) — so <VIS.Term def="The signal that updates weights during backprop. Focal loss reduces this signal for confident-correct samples; it does not change the predictions themselves.">gradient</VIS.Term> concentrates on hard examples. Standard value: γ=2, from <VIS.Term def="Lin et al. 2017 single-stage object detector. Showed focal loss closes the accuracy gap with two-stage detectors (Faster R-CNN) at 5× the speed.">RetinaNet</VIS.Term>.
    </VIS.TLDR>

    <VIS.Section id="sec-curve" title="Beat 1 — What γ does to the per-sample loss">
      <p>
        Below: total loss as a function of <code>p_t</code>. Black = plain <VIS.Term def="The standard classification loss: -log(p_t) where p_t is the predicted probability for the correct class. Treats every sample equally regardless of confidence.">cross-entropy</VIS.Term>. Red = focal loss at γ=2 (the <VIS.Term def="The (γ, α) values Lin et al. recommended after sweep: γ=2, α=0.25 for the rare class. Most production focal-loss deployments start here.">RetinaNet default</VIS.Term>). Amber dashed = γ=5 (aggressive). At <code>p_t=0.9</code>, plain <VIS.Term def="Cross-entropy. Equivalent to log-loss; the standard loss for classification.">CE</VIS.Term> loss ≈ 0.1, focal loss (γ=2) ≈ 0.001 — a 100× down-weight on the already-easy case.
      </p>
      <VIS.VegaLite spec={FL_SPEC} data={FL_DATA}/>
      <p>
        The mechanism lives in the multiplicative <code>(1 - p_t)^γ</code> term. Think of it as a per-sample weight that the model assigns to itself based on its own confidence. Plot this weight alone across γ:
      </p>
      <VIS.VegaLite spec={MOD_SPEC} data={MOD_DATA}/>
      <p>
        At γ=0, the factor is 1 everywhere — focal loss collapses back to plain <VIS.Term def="Binary cross-entropy. The loss function for yes/no predictions; equals -log(p_t) for the true class.">BCE</VIS.Term>/CE. At γ=2, an example with <code>p_t=0.9</code> gets a weight of 0.01 (essentially silent), while a hard one at <code>p_t=0.1</code> stays near 0.81. The well-classified samples are still in the <VIS.Term def="The chunk of samples processed together in one forward/backward pass; the gradient is summed over the batch before optimizer step.">batch</VIS.Term> — they just stop pulling gradient during <VIS.Term def="Backpropagation: the chain-rule pass that computes gradients of the loss w.r.t. each weight; consumed by SGD/AdamW to update parameters.">backprop</VIS.Term>.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-formal" title="Beat 2 — Definition, naming, and the α companion">
      <p>
        Formal definition for a single sample, with true class <code>y</code> and model probability <code>p_y</code> = <code>p_t</code>:
      </p>
      <VIS.Equation display
        tex="\mathrm{FL}(p_t) \;=\; -\,(1 - p_t)^{\gamma}\,\log(p_t)" />
      <p>
        The full form used in RetinaNet adds an <VIS.Term def="The per-class scalar weight in focal loss. Lin et al. use α=0.25 for the positive class; different from the per-sample (1-p_t)^γ modulation.">α-balancing</VIS.Term> term — a per-class scalar weight, exactly like <VIS.Term def="Cross-entropy loss with a fixed per-class scalar weight. Up-weights the rare class. Does NOT adapt to per-sample confidence; that's the focal-loss innovation.">class-weighted CE</VIS.Term>:
      </p>
      <VIS.Equation display
        tex="\mathrm{FL}_{\alpha}(p_t) \;=\; -\,\alpha_t\,(1 - p_t)^{\gamma}\,\log(p_t)" />
      <p>
        Two distinct knobs, two distinct jobs:
      </p>
      <ul>
        <li><strong>α (per-class)</strong> — a fixed scalar attached to each class label. Re-weights the loss by the rarity of the class. Identical in spirit to class-weighted BCE.</li>
        <li><strong>(1 - p_t)^γ (per-sample)</strong> — a multiplier that depends on <em>this specific example's</em> predicted probability. Adapts during training as the model improves.</li>
      </ul>
      <VIS.Callout kind="info" title="Different from class-weighted BCE">
        <VIS.Term def="Per-class weighted binary cross-entropy. The classic baseline for imbalanced binary classification: multiply the loss for the rare class by a fixed scalar > 1.">Class-weighted BCE</VIS.Term> applies the SAME weight to every example in a class, no matter how easy or hard it is for the model. Focal loss applies a DIFFERENT weight to every example based on its own <code>p_t</code>. That per-sample adaptivity is the load-bearing idea — and it's what α alone cannot do.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-when" title="Beat 3 — When focal loss earns its complexity">
      <VIS.Callout kind="info" title="Extreme imbalance + many easy negatives (the RetinaNet case)">
        <VIS.Term def="Object detector that predicts class and box directly from a feature map in one pass (no region-proposal stage). Fast but historically less accurate than two-stage; focal loss closed that gap.">Single-stage object detection</VIS.Term> scores ~100k <VIS.Term def="Fixed bounding boxes laid over the image at multiple scales. Each is a binary classification candidate (object vs background). RetinaNet has ~100k per image.">anchor boxes</VIS.Term> per image; <strong>~99.99% are background</strong>. Most are trivially easy (clear sky, blank wall) and dominate the plain-CE gradient by sheer count. Focal loss silences them so the few hard foreground anchors and hard background anchors drive learning. Without it, two-stage detectors like <VIS.Term def="A two-stage object detector: a region-proposal network shortlists ~1k candidate boxes, then a classifier head refines them. Two stages provide implicit hard-negative filtering.">Faster R-CNN</VIS.Term> dominated; with it, RetinaNet matched accuracy at higher throughput.
      </VIS.Callout>
      <VIS.Callout kind="gotcha" title="Overkill for moderate imbalance">
        For a 90/10 or even 99/1 split with reasonable feature signal, class-weighted CE plus <VIS.Term def="Sampling strategy that draws from the minority class more often per epoch to balance per-batch class counts. Cheap alternative to focal loss.">oversampling</VIS.Term> usually closes the gap. Focal loss earns its complexity at 99.99/0.01 or denser, where the easy-negative count overwhelms gradients regardless of class weighting.
      </VIS.Callout>
      <VIS.Callout kind="warn" title="γ=0 sanity check">
        <code>(1 - p_t)^0 = 1</code> for all samples, so focal loss with γ=0 (and α=1) is mathematically identical to plain CE. Useful as a sanity-check baseline when debugging a focal-loss implementation.
      </VIS.Callout>
      <VIS.Callout kind="gotcha" title="Focal-trained models often need post-hoc calibration">
        Down-weighting confident-correct examples removes the gradient signal that normally pulls predicted probabilities toward observed frequencies, so focal models tend to be over-confident. Standard fix: <VIS.Term def="Post-hoc calibration. Divide pre-softmax logits by a single scalar T, learned on a held-out set; spreads bimodal predictions back across the probability axis without changing argmax accuracy.">temperature scaling</VIS.Term> on a held-out set (Mukhoti et al. 2020).
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Test yourself — concept drill">
      <p style={{color:"#475569", marginBottom: 16}}>
        Twenty-five interview-grade trap problems. Each is built around a confusingly-similar decoy that a candidate with ~80% understanding could plausibly defend. Bias toward mechanism (axis C) and application (axis B), with some identity (A), intuition (D), operations (E), and failure (F) mixed in.
      </p>

      <VIS.TrapProblem
        id="fl-q1"
        difficulty="medium"
        title="Q1 — What exactly does the (1 - p_t)^γ factor do to a sample's contribution?"
        scenario={<><em>Discriminating insight:</em> the factor's effect is on the LOSS magnitude per sample, leaving the model's prediction and the label untouched. Compare a sample with p_t=0.95 vs one with p_t=0.20 — what differs in training?</>}
        options={[
          {key:"a", text:"It lowers the predicted probability of confident examples so they look harder than they are, forcing the model to revisit them."},
          {key:"b", text:"It modifies the soft-target label distribution from one-hot toward (γ, 1-γ), softening confident predictions."},
          {key:"c", text:"It scales each sample's loss (and therefore gradient) by a confidence-dependent weight: tiny weight for high p_t, near-1 weight for low p_t.", correct:true},

      />

          {key:"b", text:"Standard cross-entropy: -log(p_t), since (1-p_t)^0 = 1 for every sample.", correct:true},

      <VIS.TrapProblem
        id="fl-q4"

        scenario={<><em>Discriminating insight:</em> identify which quantity each technique modifies in the (target, prediction, loss) trio.</>}

        lens={<>(a). Label smoothing replaces a hard 0/1 target with (ε, 1-ε), which softens the SUPERVISION. Focal loss leaves the target as one-hot and instead reweights the LOSS by (1-p_t)^γ. The first changes what the model is asked to match; the second changes how loudly each sample asks.</>}
      />

      <VIS.TrapProblem
        id="fl-q5"
        difficulty="hard"
        title="Q5 — Why focal loss instead of class-weighted BCE for dense object detection?"
        scenario={<><em>Discriminating insight:</em> object detection has ~100k anchors per image, ~99.99% background. The dominant problem is the COUNT of easy negatives, going beyond pure class imbalance alone.</>}
        options={[
          {key:"a", text:"Class-weighted BCE produces uncalibrated probabilities at deployment time; focal loss is naturally calibrated by its design."},
          {key:"b", text:"Class-weighted BCE up-weights ALL positives equally but ignores the flood of easy background anchors; focal silences each easy negative individually.", correct:true},

      <VIS.TrapProblem
        id="fl-q6"

        title="Q6 — Which best describes the role of α in αFL = -α_t (1-p_t)^γ log(p_t)?"
        scenario={<><em>Discriminating insight:</em> α has a subscript t indexed by the TRUE CLASS, while (1-p_t)^γ has p_t which depends on the model's PREDICTION for that sample.</>}
        options={[

        lens={<>(c). α is the classic per-class weighting term — a fixed scalar attached to the class label, like in class-weighted BCE. It composes multiplicatively with the per-sample (1-p_t)^γ but does a separate job.</>}

      <VIS.TrapProblem

        lens={<>(b). At p_t→0, (1-p_t)^γ → 1, so focal loss is essentially uncapped CE for confidently-wrong samples — they get the loud signal they deserve. The modulation only silences confidently-RIGHT samples.</>}
      />

      <VIS.TrapProblem
        id="fl-q9"
        difficulty="hard"
        title="Q9 — Why are focal-loss models often poorly calibrated?"
        scenario={<><em>Discriminating insight:</em> calibration depends on the model believing its own confident predictions. Focal loss tells the model to STOP CARING about its confident predictions during training.</>}

        lens={<>(c). γ controls per-sample down-weighting steepness. Lin et al. swept γ ∈ {0, 0.5, 1, 2, 5} and recommended γ=2 as the default; larger γ helps when easy examples are even more dominant than RetinaNet's ~99.99% background.</>}
      />

        id="fl-q11"

        options={[

          {key:"b", text:"About the same as plain CE, since the modulating factor is near 1 in the middle of the probability range."},
          {key:"c", text:"About twice plain CE, because the modulating factor amplifies losses for borderline samples."},

        lens={<>(a). (1-0.5)^2 = 0.25. So even at the most "uncertain" point p_t=0.5, focal loss applies a 4× down-weight relative to plain CE. The down-weight at p_t=0.9 (factor 0.01, 100×) is much more dramatic, but the modulation is at work everywhere except p_t→0.</>}

      />

        scenario={<><em>Discriminating insight:</em> γ and α target different problems. Once γ handles easy/hard, α's job is mostly cosmetic class balance.</>}
        options={[
          {key:"a", text:"α has a dominant effect on accuracy; γ matters only when α is mis-tuned, so γ should be set last in any hyperparameter sweep."},
          {key:"b", text:"Once γ=2 is set, α has a small effect; Lin et al. found α≈0.25 (counter-intuitive — down-weighting positives is what γ needs).", correct:true},
          {key:"c", text:"Optimal α equals the inverse class frequency ratio; this is the only setting under which training converges to non-degenerate weights."},
          {key:"d", text:"α and γ are mathematically equivalent under a logarithmic reparametrization; tuning either one suffices for any imbalance level."},
        
        ]}
        trap={<>(a) inverts the priority order. (c) overstates a heuristic; inverse-frequency α is a starting point, not a requirement. (d) is false — α is per-class scalar, γ is per-sample exponent.</>}
        lens={<>(b). The original paper recommends γ=2, α=0.25 (down-weighting the rare positive class — the opposite of what class-weighting intuition suggests, because γ already concentrates gradient on hard positives, and α=0.25 prevents over-emphasis).</>}
      />

      <VIS.TrapProblem
        id="fl-q14"
        difficulty="medium"
        title="Q14 — How does focal loss differ from oversampling the minority class?"
        scenario={<><em>Discriminating insight:</em> oversampling changes the empirical class distribution seen by the model; focal loss leaves the distribution alone.</>}
        options={[
          {key:"a", text:"Oversampling repeats minority examples in batches; focal loss leaves the batch alone and reweights each sample's loss by predicted confidence.", correct:true},
          {key:"b", text:"They are mathematically identical when the oversampling ratio equals (1 - p_t)^γ for some γ — duality between data and loss intervention."},
          {key:"c", text:"Oversampling adapts to the model's current confidence per sample; focal loss applies one fixed weight regardless of training progress."},
          {key:"d", text:"Both modify the target distribution; focal loss does so via (1-p_t)^γ, oversampling via duplication of minority-class examples in batches."},
        
        ]}
        trap={<>(b) overstates a mathematical equivalence that doesn't hold (oversampling is per-class, focal is per-sample). (c) reverses the adaptivity property. (d) misattributes the target as what's changed.</>}
        lens={<>(a). Oversampling is a data-level intervention (batch composition); focal loss is a loss-level intervention (per-sample weighting). They compose — focal-on-oversampled data is a valid recipe — but they are not substitutes.</>}
      />

      <VIS.TrapProblem
        id="fl-q15"
        difficulty="hard"
        title="Q15 — Why is γ called a 'focusing parameter'?"
        scenario={<><em>Discriminating insight:</em> visualize the loss curve as γ increases. Where does the model's attention concentrate?</>}
        options={[
          {key:"a", text:"γ literally implements visual attention, weighting pixels by how 'focused' the image is at that location."},
          {key:"b", text:"γ focuses the model's optimizer on a smaller learning-rate region around the minimum, similar to a learning-rate annealing schedule."},
          {key:"c", text:"As γ increases, the loss curve flattens for high p_t and stays steep for low p_t — concentrating learning signal on the hard (low-p_t) region.", correct:true},
          {key:"d", text:"γ focuses the softmax distribution by raising every logit to the γ power, sharpening predictions."},
        
        ]}
        trap={<>(a) confuses with image-attention mechanisms. (b) confuses with learning-rate schedules. (d) invents a logit-power op.</>}
        lens={<>(c). Higher γ means stronger silencing of high-p_t samples — the gradient budget gets concentrated (focused) on the low-p_t hard cases. The name describes what happens to gradient allocation, not anything to do with visual or optimizer attention.</>}
      />

      <VIS.TrapProblem
        id="fl-q16"
        difficulty="medium"
        title="Q16 — What's the right baseline to validate a focal-loss implementation?"
        scenario={<><em>Discriminating insight:</em> exploit the γ=0 collapse to plain CE.</>}
        options={[
          {key:"a", text:"Set γ=0 (and α=1); verify the loss value and gradients match plain CE/BCE exactly on a small batch.", correct:true},
          {key:"b", text:"Set γ=2 and check that the loss equals the published RetinaNet COCO mAP within 0.1 points."},
          {key:"c", text:"Set α=0 and confirm the model trains successfully on a binary classification task."},
          {key:"d", text:"Train for one epoch and verify the loss decreases monotonically; focal loss is monotonic in batch order."},
        
        ]}
        trap={<>(b) confuses loss validation with end-to-end accuracy validation. (c) breaks the loss (α=0 kills the rare class). (d) "monotonic in batch order" is meaningless.</>}
        lens={<>(a). The cleanest unit test: γ=0, α=1 should make focal loss numerically equal to plain CE. Run a tiny tensor through both, assert allclose. Catches the bulk of implementation bugs (wrong exponent, swapped subtraction, broken broadcast).</>}
      />

      <VIS.TrapProblem
        id="fl-q17"
        difficulty="hard"
        title="Q17 — Multi-label setting (one image, multiple labels): how does focal loss change?"
        scenario={<><em>Discriminating insight:</em> multi-label uses sigmoid per class (rather than softmax over classes). Each per-class p_t is independent of the others.</>}
        options={[
          {key:"a", text:"It must first reduce to single-label via argmax over the active label set; focal loss is not directly defined for multi-label outputs."},
          {key:"b", text:"The modulating factor becomes (1 - p_top)^γ where p_top is the maximum predicted probability across the active class labels."},
          {key:"c", text:"Focal loss is applied only to the dominant predicted class per image; other active labels fall back to plain BCE for the gradient."},
          {key:"d", text:"It's applied per-class as sigmoid focal: sum over classes of -α_c (1 - p_c)^γ log(p_c) for positives and the symmetric form for negatives.", correct:true},
        
        ]}
        trap={<>(a), (b), (c) all invent restrictions or modifications that aren't in standard implementations.</>}
        lens={<>(d). Sigmoid focal loss is the standard generalization. Each class gets its own (1-p_c)^γ modulation, separately for the positive and negative branch of BCE — used widely in multi-label object detection and pixel-wise segmentation.</>}
      />

      <VIS.TrapProblem
        id="fl-q18"
        difficulty="hard"
        title="Q18 — A team reports focal loss UNDERPERFORMS plain CE on their 70/30 imbalance binary task. Most likely diagnosis?"
        scenario={<><em>Discriminating insight:</em> focal loss is designed for extreme imbalance (99.99/0.01) and many easy negatives. 70/30 is mild.</>}
        options={[
          {key:"a", text:"γ must be set negative for mild imbalance; γ=2 is only correct for the extreme dense-detection regime that motivated the paper."},
          {key:"b", text:"Imbalance is too mild for focal loss to help; γ=2 silences moderately-confident correct samples that plain CE still needs.", correct:true},
          {key:"c", text:"Focal loss requires at least 1M training samples to converge; with smaller datasets it consistently underperforms plain CE baselines."},
          {key:"d", text:"They forgot to apply label smoothing on top of focal loss; the two must always be combined for fine-tuned models to perform well."},
        
        ]}
        trap={<>(a) γ<0 is undefined (it would explode the loss for high p_t). (c) invents a sample-size floor. (d) invents a mandatory pairing.</>}
        lens={<>(b). Focal loss earns its complexity at extreme imbalance. At 70/30, plain CE plus class-weighting (or no weighting) is competitive — and focal loss's aggressive silencing of confident-correct samples can hurt by removing gradient signal the model still needed.</>}
      />

      <VIS.TrapProblem
        id="fl-q19"
        difficulty="hard"
        title="Q19 — Does focal loss change the model's predictions or its loss curve?"
        scenario={<><em>Discriminating insight:</em> separate "what the model outputs" from "what the loss function says about those outputs."</>}
        options={[
          {key:"a", text:"It changes both: the modulating factor is applied to the softmax output before it reaches the user, lowering easy-case predicted probabilities."},
          {key:"b", text:"It changes neither — focal loss is essentially a renaming of cross-entropy; the underlying math reduces to the same gradient update."},
          {key:"c", text:"It changes the loss curve and the gradients that update weights; the per-sample predicted probabilities themselves are unchanged.", correct:true},
          {key:"d", text:"It changes only predictions: easy examples have their predicted probabilities artificially lowered so that future gradients become larger."},
        
        ]}
        trap={<>(a) and (d) invent a prediction-modification step that doesn't exist. (b) ignores the (1-p_t)^γ factor entirely.</>}
        lens={<>(c). The loss function is a scalar applied AFTER the model has produced its predictions. Focal loss changes the scalar (and hence the gradient flowing back into weights), not the predictions themselves. A focal-trained model and a CE-trained model can have different predictions at inference because they were OPTIMIZED differently — but neither loss alters predictions at runtime.</>}
      />

      <VIS.TrapProblem
        id="fl-q20"
        difficulty="medium"
        title="Q20 — How is focal loss combined with α-balancing in practice?"
        scenario={<><em>Discriminating insight:</em> the two factors multiply; the per-sample modulation and per-class weight are independent.</>}
        options={[
          {key:"a", text:"They are exclusive choices: use α for class-imbalance, or γ for confidence-imbalance, but not both simultaneously."},
          {key:"b", text:"They multiply: αFL = -α_t · (1 - p_t)^γ · log(p_t). α is a per-class scalar; (1-p_t)^γ is a per-sample modulator. Both are tuned together.", correct:true},
          {key:"c", text:"α replaces γ when classes are extremely imbalanced (>99/1); below that, γ is sufficient."},
          {key:"d", text:"α is applied to the modulating factor itself: (α(1-p_t))^γ — α modifies the steepness of the focal curve."},
        
        ]}
        trap={<>(a) and (c) invent mutual exclusivity. (d) misplaces α inside the exponent.</>}
        lens={<>(b). The αFL formulation uses both: α handles per-class re-weighting (like class-weighted BCE), and (1-p_t)^γ handles per-sample down-weighting. They commute, multiply, and are tuned together (Lin et al. recommend γ=2, α=0.25).</>}
      />

      <VIS.TrapProblem
        id="fl-q21"
        difficulty="hard"
        title="Q21 — RetinaNet's α=0.25 for the positive class seems backwards. Why down-weight positives?"
        scenario={<><em>Discriminating insight:</em> γ already concentrates gradient on hard positives. α=0.25 prevents γ's effect on positives from over-shooting.</>}
        options={[
          {key:"a", text:"γ already over-emphasizes hard positives, so α=0.25 dampens that to keep the overall positive/negative loss contribution balanced.", correct:true},
          {key:"b", text:"Because positives in COCO are mislabeled at roughly a 75% rate; α=0.25 down-weights the noisy labels in the loss to compensate."},
          {key:"c", text:"Because RetinaNet's anchor-matching heuristic produces about 4× more positive anchors than needed, and α=0.25 corrects the over-supply."},
          {key:"d", text:"Because positive anchors are placed by a separate ground-truth oracle whose confidence averages 0.25; α matches that confidence by design."},
        
        ]}
        trap={<>(b), (c), (d) invent plausible-sounding mechanisms with no basis in the paper.</>}
        lens={<>(a). γ amplifies the gradient from hard positives (low p_t for the positive class), which would otherwise overwhelm the gradient from hard negatives. α=0.25 brings the positive contribution back into balance. The result is a γ-α pair that's tuned together; you can't read α in isolation.</>}
      />

      <VIS.TrapProblem
        id="fl-q22"
        difficulty="hard"
        title="Q22 — A practitioner says 'focal loss reduces the gradient on easy negatives by lowering their predicted probability.' Where's the error?"
        scenario={<><em>Discriminating insight:</em> separate two things — what the model PREDICTS for a sample, and how much that sample's loss CONTRIBUTES to the gradient.</>}
        options={[
          {key:"a", text:"The error is using 'easy negatives' — focal loss only modifies the gradient for hard positives, not negatives, by design of (1-p_t)^γ."},
          {key:"b", text:"There is no error in the statement; it is a clean and accurate restatement of the focal-loss mechanism used by RetinaNet at COCO."},
          {key:"c", text:"The error is the loss reduction — focal loss actually INCREASES the gradient on easy negatives to force the model to revisit them later."},
          {key:"d", text:"The direction is wrong: focal loss does not change predicted probabilities; it just scales each sample's loss contribution down.", correct:true},
        
        ]}
        trap={<>(a) reverses which class focal loss applies to (it applies to both). (b) endorses a wrong statement. (c) reverses the direction again.</>}
        lens={<>(d). The misconception is that focal loss somehow tampers with the model's outputs. It does not — predictions are computed by the model's forward pass. Focal loss is a scalar applied to the per-sample loss; it changes the gradient flowing back during training, but a focal-trained model's prediction at inference time is just whatever the trained weights produce.</>}
      />

      <VIS.TrapProblem
        id="fl-q23"
        difficulty="medium"
        title="Q23 — In segmentation with 95% background pixels, would you reach for focal loss?"
        scenario={<><em>Discriminating insight:</em> 95% background is dense but well shy of the dense-detection extreme; many practitioners reach for Dice or weighted BCE first. Focal is one option among several.</>}
        options={[
          {key:"a", text:"Always — focal loss is strictly better than the alternatives whenever the imbalance ratio exceeds 90/10 in the per-pixel training set."},
          {key:"b", text:"Never — focal loss is designed for object detection only; pixel-wise segmentation requires Dice or weighted-BCE objectives by convention."},
          {key:"c", text:"Maybe — focal loss is reasonable but not unique; Dice loss or weighted BCE or focal+Dice all show up depending on the failure mode.", correct:true},
          {key:"d", text:"Always — γ=10 is the segmentation-specific setting; it dominates Dice and weighted BCE across the standard semantic-segmentation benchmarks."},
        
        ]}
        trap={<>(a), (b), (d) all overclaim. (b) is wrong (focal-segmentation is widely used); (a) and (d) overstate dominance.</>}
        lens={<>(c). Focal loss is one of several reasonable choices for dense segmentation. Dice optimizes region overlap, weighted BCE handles class imbalance per-pixel, focal handles easy-pixel dominance. Combinations (focal+Dice) are common. The right pick depends on the specific failure mode — region miss vs easy-negative drown.</>}
      />

      <VIS.TrapProblem
        id="fl-q24"
        difficulty="hard"
        title="Q24 — A focal-loss model gets 97% accuracy but its predicted probabilities cluster at 0.999 or 0.001 with little in between. Fix?"
        scenario={<><em>Discriminating insight:</em> bimodal output probabilities are a classic mis-calibration symptom. The model is right but over-confident.</>}
        options={[
          {key:"a", text:"Post-hoc temperature scaling: divide pre-softmax logits by a learned scalar T fit on a held-out set; spreads predictions back.", correct:true},
          {key:"b", text:"Retrain the model from scratch with γ doubled to 4; more aggressive focal modulation will reduce the over-confidence at deployment."},
          {key:"c", text:"Increase α on the rare class up to 0.75; the α hyperparameter directly controls calibration of probabilities in focal loss."},
          {key:"d", text:"Switch the final activation from softmax to sparsemax; sparsemax produces naturally calibrated probabilities by construction."},
        
        ]}
        trap={<>(b) doubles down on the cause — larger γ silences confident samples MORE, which is what created the mis-calibration. (c) confuses α with calibration. (d) invents a sparsemax-fixes-calibration claim.</>}
        lens={<>(a). Focal loss is known to produce over-confident outputs because it stops penalizing confident-correct predictions. The standard post-hoc fix is temperature scaling: fit a single scalar T on a held-out set such that softmax(logits/T) is well-calibrated (Mukhoti et al. 2020).</>}
        stretch={<>What does temperature scaling do to accuracy?</>}
      />

      <VIS.TrapProblem
        id="fl-q25"
        difficulty="hard"
        title="Q25 — Cross-batch: how does focal loss differ from class-weighted BCE in a single sentence?"
        scenario={<><em>Discriminating insight:</em> focal weighs per-sample by confidence; class-weighted weighs per-class by frequency. The two work on different axes.</>}
        options={[
          {key:"a", text:"Class-weighted BCE is a special case of focal loss when γ is tuned to match the empirical class frequency ratio in the training data."},
          {key:"b", text:"Class-weighted BCE applies one scalar per class regardless of sample difficulty; focal applies a sample-specific scalar from current confidence.", correct:true},
          {key:"c", text:"Focal loss is a special case of class-weighted BCE where the class weight is recomputed every batch from the running mean of (1-p_t)."},
          {key:"d", text:"They are equivalent under uniform class distributions and differ only when classes are imbalanced — meaning focal loss is just a rebrand."},
        
        ]}
        trap={<>(a) and (c) try to nest one inside the other. The two are fundamentally orthogonal — per-class scalar vs per-sample confidence-modulated scalar. (d) ignores the per-sample axis entirely.</>}
        lens={<>(b). The axis distinction is the whole point. Class-weighted BCE: per-class scalar, fixed for the run. Focal loss: per-sample scalar, adapts every forward pass as p_t changes. They compose (the αFL formulation does both), but they are not nested.</>}
      />
    </VIS.Section>
  </main>
);
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
  <script>
    window.addEventListener("error", function (e) {
      const pre = document.createElement("pre");
      pre.style.cssText = "position:fixed;top:0;left:0;right:0;max-height:35vh;"
        + "overflow:auto;background:#fee2e2;color:#7f1d1d;padding:8px;"
        + "margin:0;font:12px/1.4 monospace;z-index:10002;";
      pre.textContent = "[visualize] " + (e.error?.stack || e.message || e);
      document.body.appendChild(pre);
    }, true);
  </script>
