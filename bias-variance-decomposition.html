<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>visualize</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <style>
    body { font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
           margin: 0; background: #ffffff; color: #0f172a; }
  </style>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@lottiefiles/lottie-player@2.0.8/dist/lottie-player.js" async></script>
  <script>
// vis-components.js — design-system JSX components for the /visualize skill.
// Exposed as window.VIS.{Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle}.
// window.RV is aliased to window.VIS for report-viewer back-compat.
// Available globally to any visual.jsx without imports.
// (CSS class prefix kept as "rv-" — internal namespace; preserves report-viewer interop.)

(function () {
  "use strict";

  if (!window.React) {
    console.warn("[vis-components] React not loaded yet; skipping setup");
    return;
  }
  const h = React.createElement;

  // Lazy-load a CDN script; cache the load Promise so repeats are cheap.
  const _scriptCache = new Map();
  function _loadScript(src) {
    if (_scriptCache.has(src)) return _scriptCache.get(src);
    const p = new Promise((resolve, reject) => {
      const existing = document.querySelector(`script[data-vis-cdn="${src}"]`);
      if (existing) return existing.addEventListener("load", resolve);
      const s = document.createElement("script");
      s.src = src; s.async = false; s.dataset.visCdn = src;
      s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
    _scriptCache.set(src, p);
    return p;
  }

  let _katexCssInjected = false;
  function _ensureKatexCss() {
    if (_katexCssInjected) return;
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = "https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css";
    document.head.appendChild(link);
    _katexCssInjected = true;
  }

  let _hljsCssInjected = false;
  function _ensureHljsCss() {
    if (_hljsCssInjected) return;
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = "https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css";
    document.head.appendChild(link);
    _hljsCssInjected = true;
  }

  // ----- Styles, injected once ----- //
  (function injectStyles() {
    if (document.getElementById("rv-components-styles")) return;
    const css = `
      .rv-hero {
        background: radial-gradient(120% 90% at 20% 0%, #dbeafe 0%, #ffffff 60%);
        padding: 28px 28px 22px; border-radius: 16px; margin-bottom: 20px;
        border: 1px solid #e2e8f0;
      }
      .rv-hero h1 {
        font-size: 38px; line-height: 1.1; letter-spacing: -0.02em;
        font-weight: 700; margin: 10px 0 6px; color: #0f172a;
      }
      .rv-hero .rv-sub {
        font-size: 16px; color: #475569; margin: 0; max-width: 60ch;
      }
      .rv-hero .rv-byline {
        font-size: 12px; color: #64748b; margin-top: 14px;
        display: flex; gap: 14px; flex-wrap: wrap;
      }
      .rv-hero .rv-byline span strong { color: #1e293b; font-weight: 600; }

      .rv-pill {
        display: inline-block; padding: 2px 10px; border-radius: 999px;
        background: #2563eb; color: #fff; font-size: 11px; font-weight: 600;
        letter-spacing: 0.6px; text-transform: uppercase;
      }

      .rv-tag {
        display: inline-block; padding: 1px 8px; border-radius: 999px;
        font-size: 11px; font-weight: 600; vertical-align: middle;
      }
      .rv-tag-green  { background: #dcfce7; color: #166534; }
      .rv-tag-yellow { background: #fef9c3; color: #854d0e; }
      .rv-tag-red    { background: #fee2e2; color: #991b1b; }
      .rv-tag-blue   { background: #dbeafe; color: #1e40af; }
      .rv-tag-gray   { background: #e4e4e7; color: #3f3f46; }

      .rv-card {
        border: 1px solid #e4e4e7; border-radius: 10px;
        padding: 14px 16px; margin: 12px 0;
        background: linear-gradient(180deg, #fafafa, #fff);
      }

      .rv-tldr {
        background: #f1f5f9;
        border-left: 4px solid #2563eb;
        border-radius: 0 10px 10px 0;
        padding: 14px 18px; margin: 0 0 24px;
        font-size: 15px; line-height: 1.55; color: #0f172a;
      }
      .rv-tldr .rv-tldr-label {
        display: inline-block; margin-right: 8px;
        font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
        color: #2563eb; text-transform: uppercase;
        vertical-align: 1px;
      }
      .vis-callout {
        border-left: 4px solid; border-radius: 0 8px 8px 0;
        padding: 12px 16px; margin: 14px 0;
      }
      .vis-callout-title { display: block; margin-bottom: 4px; }
      .vis-callout-info   { background: #dbeafe; border-color: #2563eb; color: #1e3a8a; }
      .vis-callout-warn   { background: #fef3c7; border-color: #d97706; color: #78350f; }
      .vis-callout-gotcha { background: #fee2e2; border-color: #dc2626; color: #7f1d1d; }
      .vis-callout-ok     { background: #dcfce7; border-color: #16a34a; color: #14532d; }

      .vis-term {
        text-decoration: underline dotted;
        text-decoration-color: #94a3b8;
        text-underline-offset: 3px;
        cursor: help;
      }
      .vis-term:focus { outline: 2px solid #2563eb; outline-offset: 2px; }
      .vis-term-tip {
        position: fixed; z-index: 10001; max-width: 340px;
        background: #0f172a; color: #f8fafc; font-size: 13px; line-height: 1.45;
        padding: 8px 10px; border-radius: 6px;
        box-shadow: 0 4px 14px rgba(0,0,0,0.22);
        pointer-events: none; white-space: pre-wrap;
      }

      /* Trap problem (MCQ with click-to-reveal). One block per problem. */
      .vis-trap {
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 20px 22px;
        margin: 24px 0;
        background: #fafbfc;
      }
      .vis-trap-header {
        display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
        flex-wrap: wrap;
      }
      .vis-trap-difficulty {
        font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
        padding: 3px 10px; border-radius: 999px; text-transform: uppercase;
      }
      .vis-trap-diff-easy   { background: #dcfce7; color: #166534; }
      .vis-trap-diff-medium { background: #fef9c3; color: #854d0e; }
      .vis-trap-diff-hard   { background: #fee2e2; color: #991b1b; }
      .vis-trap-title { font-size: 17px; color: #0f172a; }
      .vis-trap-scenario { margin: 0 0 12px; line-height: 1.65; }
      .vis-trap-diagram  { margin: 12px 0; }
      .vis-trap-options  { display: flex; flex-direction: column; gap: 8px; margin: 16px 0; }
      .vis-trap-option {
        text-align: left;
        padding: 11px 14px;
        background: #ffffff;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font: inherit; color: #0f172a;
        cursor: pointer;
        transition: border-color 0.15s, background 0.15s;
      }
      .vis-trap-option:hover:not(:disabled) {
        border-color: #2563eb; background: #f1f5f9;
      }
      .vis-trap-option.is-selected {
        border-color: #2563eb; background: #dbeafe;
      }
      .vis-trap-option.is-correct {
        border-color: #16a34a; background: #dcfce7;
      }
      .vis-trap-option.is-wrong-selected {
        border-color: #dc2626; background: #fee2e2;
      }
      .vis-trap-option.is-disabled {
        opacity: 0.6;
      }
      .vis-trap-key { font-weight: 700; margin-right: 4px; color: #475569; }
      .vis-trap-tick { color: #16a34a; font-weight: 700; margin-left: 6px; }
      .vis-trap-x    { color: #dc2626; font-weight: 700; margin-left: 6px; }
      .vis-trap-actions {
        display: flex; align-items: center; gap: 12px;
        margin-top: 8px;
      }
      .vis-trap-reveal-btn, .vis-trap-reset-btn {
        background: #2563eb; color: #ffffff; border: none;
        padding: 10px 18px; border-radius: 8px;
        font: inherit; font-weight: 600;
        cursor: pointer;
      }
      .vis-trap-reveal-btn:hover, .vis-trap-reset-btn:hover { background: #1d4ed8; }
      .vis-trap-reset-btn {
        background: #64748b; margin-top: 12px;
        font-size: 13px; padding: 8px 14px;
      }
      .vis-trap-reset-btn:hover { background: #475569; }
      .vis-trap-hint { color: #64748b; font-size: 14px; }
      .vis-trap-reveal-block {
        margin-top: 18px; padding-top: 16px; border-top: 1px solid #e2e8f0;
      }
      .vis-trap-trap, .vis-trap-lens, .vis-trap-stretch {
        margin: 10px 0; padding: 12px 16px; border-radius: 8px;
      }
      .vis-trap-trap    { background: #fef3c7; border-left: 4px solid #d97706; color: #78350f; }
      .vis-trap-lens    { background: #dcfce7; border-left: 4px solid #16a34a; color: #14532d; }
      .vis-trap-stretch { background: #e0e7ff; border-left: 4px solid #6366f1; color: #312e81; }
      .vis-trap-trap strong, .vis-trap-lens strong, .vis-trap-stretch strong {
        display: block; margin-bottom: 4px;
      }
      .vis-trap-trap p, .vis-trap-lens p, .vis-trap-stretch p { margin: 0; line-height: 1.55; }

      /* Responsive SVG wrappers — diagrams shrink to fit narrow containers
         instead of overflowing the parent. Without these, Mermaid/Vega SVGs
         render at their intrinsic width and get clipped on the left/right
         when viewport is narrower than ~900px. */
      .vis-mermaid svg, .vis-vega svg {
        max-width: 100%;
        height: auto;
        display: inline-block;
      }
      .vis-mermaid, .vis-vega { overflow-x: auto; }

      /* Mermaid text rendering fixes for Mermaid 10. By default the auto-sized
         node fill rect and the edge-label background rect are both tight to the
         text, which clips descenders (g/p/y/j/q) at the bottom of nodes AND
         the right edge of edge labels ("Yes" → "Ye"). Force overflow:visible
         everywhere and give the labels generous padding. */
      .vis-mermaid svg,
      .vis-mermaid foreignObject,
      .vis-mermaid .node foreignObject,
      .vis-mermaid .edgeLabel,
      .vis-mermaid .edgeLabel foreignObject,
      .vis-mermaid .label,
      .vis-mermaid .label foreignObject {
        overflow: visible !important;
      }
      .vis-mermaid .node .nodeLabel,
      .vis-mermaid .node .label,
      .vis-mermaid .label foreignObject div {
        line-height: 1.5;
        padding: 2px 4px;
      }
      .vis-mermaid .edgeLabel {
        padding: 2px 8px;
        background: #ffffff;
        border-radius: 3px;
        line-height: 1.4;
      }
      .vis-mermaid .edgeLabel foreignObject div,
      .vis-mermaid .edgeLabel span,
      .vis-mermaid .edgeLabel .labelBkg {
        padding: 0 4px !important;
        background: transparent !important;
      }
    `;
    const tag = document.createElement("style");
    tag.id = "rv-components-styles";
    tag.textContent = css;
    document.head.appendChild(tag);
  })();

  // ----- Components ----- //

  // <RV.Pill>v0.2</RV.Pill>  →  small uppercase pill
  function Pill({ children, color }) {
    const style = color ? { background: color } : null;
    return h("span", { className: "rv-pill", style }, children);
  }

  // <RV.Tag color="green">ok</RV.Tag>  →  status pill
  function Tag({ children, color = "gray" }) {
    return h("span", { className: "rv-tag rv-tag-" + color }, children);
  }

  // <RV.ByLine items={[{label:"Build",value:"2026-05-15"}, ...]} />
  function ByLine({ items = [] }) {
    return h("div", { className: "rv-byline" },
      items.map((it, i) =>
        h("span", { key: i },
          h("strong", null, it.label), " ", it.value
        )
      )
    );
  }

  // Set the browser tab title. Auto-called by RV.Hero; reports without a
  // Hero can call this directly: RV.setTitle("...").
  function setTitle(str) {
    if (typeof str === "string" && str.trim()) document.title = str.trim();
  }

  // <RV.Hero title="..." subtitle="..." pill="v0.2" byline={[...]}>
  //   children (optional, rendered below subtitle)
  // </RV.Hero>
  function Hero({ title, subtitle, pill, byline, accent, children }) {
    React.useEffect(() => { setTitle(title); }, [title]);
    return h("section", { className: "rv-hero" },
      pill ? h(Pill, null, pill) : null,
      h("h1", null,
        accent ? h("span", { className: accent }) : null,
        accent ? " " : null,
        title
      ),
      subtitle ? h("p", { className: "rv-sub" }, subtitle) : null,
      byline && byline.length ? h(ByLine, { items: byline }) : null,
      children
    );
  }

  // <RV.Card><strong>title</strong><p>body</p></RV.Card>
  function Card({ children, className }) {
    return h("div", {
      className: "rv-card" + (className ? " " + className : "")
    }, children);
  }

  // <RV.Section id="sec-foo" title="Foo">...</RV.Section>
  //   — renders <h2 id={id}>{title}</h2> + body. The id is picked up by
  //   the auto-TOC sidebar.
  function Section({ id, title, children }) {
    return h(React.Fragment, null,
      h("h2", { id }, title),
      children
    );
  }

  // <RV.TLDR>One-paragraph headline answer.</RV.TLDR>
  // ALWAYS render this immediately after <RV.Hero>, before any sections.
  // Reader should be able to leave after reading it.
  function TLDR({ children }) {
    return h("aside", { className: "rv-tldr", role: "note" },
      h("span", { className: "rv-tldr-label" }, "TL;DR"),
      children
    );
  }

  function Mermaid({ chart, id }) {
    const ref = React.useRef(null);
    const autoId = React.useId();
    React.useEffect(() => {
      let cancelled = false;
      _loadScript("https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js")
        .then(() => {
          if (!window.mermaid._inited) {
            window.mermaid._inited = true;
            // trusted-author content; "loose" enables click handlers + HTML labels in mermaid
            // trusted-author content; "loose" enables click handlers + HTML labels in mermaid.
            // flowchart.padding + nodePadding give descenders (g, p, y, j, q) room to render
            // inside diamond/rectangle nodes — without this Mermaid 10 clips them at the bottom edge.
            window.mermaid.initialize({
              startOnLoad: false,
              theme: "default",
              securityLevel: "loose",
              flowchart: { padding: 18, nodeSpacing: 50, rankSpacing: 60, useMaxWidth: true, htmlLabels: true },
              themeVariables: { fontSize: "14px" }
            });
          }
          return window.mermaid.render((id || "mmd") + "-" + autoId.replace(/:/g, ""), chart);
        })
        .then(({ svg }) => {
          if (cancelled || !ref.current) return;
          ref.current.innerHTML = svg;
          // POST-PROCESS to fix Mermaid 10 descender clipping (g, p, y, j, q).
          // Mermaid sizes foreignObjects to the font em-box, which does NOT include
          // descender depth. Grow each foreignObject by 12px (6 top + 6 bottom) so
          // descenders render fully. Also grow rectangle node fills to match so the
          // colored box doesn't show a thin sliver above/below the text.
          const svgEl = ref.current.querySelector("svg");
          if (!svgEl) return;
          svgEl.querySelectorAll("foreignObject").forEach((fo) => {
            const h = parseFloat(fo.getAttribute("height") || "0");
            const y = parseFloat(fo.getAttribute("y") || "0");
            fo.setAttribute("height", String(h + 12));
            fo.setAttribute("y", String(y - 6));
          });
          svgEl.querySelectorAll("g.node > rect").forEach((rect) => {
            const h = parseFloat(rect.getAttribute("height") || "0");
            const y = parseFloat(rect.getAttribute("y") || "0");
            rect.setAttribute("height", String(h + 12));
            rect.setAttribute("y", String(y - 6));
          });
          // Diamonds use <polygon points="..."/>. Expand vertically by translating
          // top and bottom vertices outward from the centroid by 6px each.
          svgEl.querySelectorAll("g.node > polygon").forEach((poly) => {
            const pts = (poly.getAttribute("points") || "").trim().split(/\s+/)
              .map((p) => p.split(",").map(parseFloat));
            if (pts.length < 3 || pts.some((p) => p.length < 2 || p.some(isNaN))) return;
            const cy = pts.reduce((s, p) => s + p[1], 0) / pts.length;
            const grown = pts.map(([x, py]) => [x, py + (py < cy ? -6 : 6)]);
            poly.setAttribute("points", grown.map((p) => p.join(",")).join(" "));
          });
        })
        .catch((e) => { if (ref.current) ref.current.textContent = "[mermaid error] " + e; });
      return () => { cancelled = true; };
    }, [chart, id, autoId]);
    return h("div", { ref, className: "vis-mermaid", style: { margin: "16px 0", textAlign: "center" } });
  }

  function VegaLite({ spec, data }) {
    const ref = React.useRef(null);
    React.useEffect(() => {
      let cancelled = false;
      Promise.all([
        _loadScript("https://cdn.jsdelivr.net/npm/vega@5"),
        _loadScript("https://cdn.jsdelivr.net/npm/vega-lite@5"),
        _loadScript("https://cdn.jsdelivr.net/npm/vega-embed@6"),
      ]).then(() => {
        if (cancelled || !ref.current) return;
        const full = data ? { ...spec, data: { values: data } } : spec;
        window.vegaEmbed(ref.current, full, { actions: false, renderer: "svg" });
      }).catch((e) => { if (ref.current) ref.current.textContent = "[vega error] " + e; });
      return () => { cancelled = true; };
    }, [spec, data]);
    return h("div", { ref, className: "vis-vega", style: { margin: "16px 0" } });
  }

  function Equation({ tex, display = false }) {
    const ref = React.useRef(null);
    React.useEffect(() => {
      _ensureKatexCss();
      let cancelled = false;
      _loadScript("https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js")
        .then(() => {
          if (cancelled || !ref.current) return;
          window.katex.render(tex, ref.current, { displayMode: display, throwOnError: false });
        });
      return () => { cancelled = true; };
    }, [tex, display]);
    const Tag = display ? "div" : "span";
    return h(Tag, { ref, className: "vis-eq" });
  }

  function CodeBlock({ lang = "plaintext", children }) {
    const ref = React.useRef(null);
    React.useEffect(() => {
      _ensureHljsCss();
      let cancelled = false;
      _loadScript("https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js")
        .then(() => _loadScript(`https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/languages/${lang}.min.js`).catch(() => {}))
        .then(() => {
          if (cancelled || !ref.current) return;
          // Reset so hljs re-highlights when `children` or `lang` change
          ref.current.removeAttribute("data-highlighted");
          ref.current.className = "language-" + lang;
          ref.current.textContent = String(Array.isArray(children) ? children.join("") : children);
          window.hljs.highlightElement(ref.current);
        });
      return () => { cancelled = true; };
    }, [lang, children]);
    return h("pre", { style: { margin: "12px 0", borderRadius: 8, overflow: "auto" } },
      h("code", { ref, className: `language-${lang}` }, children));
  }

  function Callout({ kind = "info", title, children }) {
    return h("aside", { className: `vis-callout vis-callout-${kind}`, role: "note" },
      title ? h("strong", { className: "vis-callout-title" }, title) : null,
      children);
  }

  // <VIS.Term def="1-2 sentence plain-English explanation">jargon</VIS.Term>
  //
  // Wraps any technical term so a non-technical reader can hover for an
  // immediate definition. The explanation should:
  //   - assume the reader knows English but not software/your domain
  //   - fit in 1-2 short sentences (a tooltip, not a paragraph)
  //   - avoid further jargon (or wrap that too)
  //
  // The element exposes `data-rv-info` so the report-viewer overlay reuses
  // its own tooltip + double-click "explain this" feedback flow. In
  // standalone /visualize mode (no overlay), the lightweight hover handler
  // below renders the tooltip directly.
  function Term({ def, children }) {
    if (!def) return h(React.Fragment, null, children);
    return h("span", {
      className: "vis-term",
      "data-rv-info": def,
      "aria-label": def,
      tabIndex: 0,
    }, children);
  }

  // Standalone hover tooltip for <VIS.Term>. If the report-viewer overlay
  // is loaded it already shows tooltips for any [data-rv-info] element, so
  // we short-circuit here to avoid double-rendering.
  (function installTermTooltip() {
    let tip = null;
    function show(el) {
      if (window.__rvReady) return;  // overlay.js owns the tooltip in report-viewer mode
      const text = el.getAttribute("data-rv-info");
      if (!text) return;
      if (!tip) {
        tip = document.createElement("div");
        tip.className = "vis-term-tip";
        document.body.appendChild(tip);
      }
      tip.textContent = text;
      const r = el.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const pad = 8;
      let left = Math.max(pad,
        Math.min(r.left, window.innerWidth - tr.width - pad));
      const above = r.top - tr.height - pad;
      const below = r.bottom + pad;
      tip.style.left = left + "px";
      tip.style.top  = (above >= pad ? above : below) + "px";
      tip.style.display = "block";
    }
    function hide() { if (tip) tip.style.display = "none"; }
    document.addEventListener("mouseover", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el); else hide();
    });
    document.addEventListener("focusin", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el);
    });
    document.addEventListener("focusout", hide);
    document.addEventListener("scroll", hide, true);
  })();

  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."
  //   scenario={<>...JSX...</>}
  //   diagram={<VIS.Mermaid chart={...} />}
  //   options={[
  //     {key:"a", text:"...", correct:false},
  //     {key:"b", text:"...", correct:true},
  //     ...
  //   ]}
  //   trap={<>The most tempting wrong is X because...</>}
  //   lens={<>The right answer + reasoning</>}
  //   stretch="optional follow-up question"
  // />
  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch } = props;
    const [selected, setSelected] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);
    const correctKey = options.find((o) => o.correct)?.key;

    function pick(key) {
      if (revealed) return;
      setSelected(key);
    }
    function reveal() {
      setRevealed(true);
    }
    function reset() {
      setSelected(null);
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (selected === o.key ? " is-selected" : "");
      if (o.correct) return "vis-trap-option is-correct";
      if (selected === o.key) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title)
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && !o.correct && selected !== o.key
        },
          h("span", { className: "vis-trap-key" }, "(" + o.key + ")"),
          " ",
          o.text,
          revealed && o.correct ? h("span", { className: "vis-trap-tick" }, " ✓") : null,
          revealed && selected === o.key && !o.correct
            ? h("span", { className: "vis-trap-x" }, " ✗") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, selected ? "Reveal model answer" : "Skip & reveal"),
        selected ? h("span", { className: "vis-trap-hint" },
          "You picked (" + selected + ")") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term, TrapProblem };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>

// GOLD-STANDARD EXAMPLE for /visualize.

// --- Vega-Lite for Beat 1: 30 polynomial fits per scenario, overlaid ---
function makeFitData(degree, n_runs=30, seed=42) {
  // Pseudo-random fits: each "run" gets a slightly different sine + noise.
  const out = [];
  for (let r = 0; r < n_runs; r++) {
    for (let i = 0; i <= 30; i++) {
      const x = i / 30;
      let y;
      if (degree === 1) {
        // Flat-ish line: high bias, low variance
        y = 0.5 + 0.05 * Math.sin(r * 0.7);
      } else {
        // Wiggly: low bias, high variance
        const phase = r * 0.5;
        y = 0.5 + 0.4 * Math.sin(2 * Math.PI * x + phase) +
            0.2 * Math.sin(8 * Math.PI * x + phase * 1.3) * 0.5;
      }
      out.push({ x, y, run: r, degree: degree === 1 ? "Too simple" : "Too flexible" });
    }
  }
  // Add "truth" line
  for (let i = 0; i <= 30; i++) {
    const x = i / 30;
    out.push({ x, y: 0.5 + 0.4 * Math.sin(2 * Math.PI * x), run: -1, degree: "Truth" });
  }
  return out;
}
const FITS_DATA = [...makeFitData(1), ...makeFitData(15)];
const FITS_SPEC = {
  width: 360, height: 240,
  facet: { field: "degree", type: "nominal", title: null,
           sort: ["Too simple", "Too flexible"] },
  columns: 2,
  spec: {
    layer: [
      { transform: [{ filter: "datum.run >= 0" }],
        mark: { type: "line", opacity: 0.18, color: "#2563eb", strokeWidth: 1 },
        encoding: {
          x: { field: "x", type: "quantitative", axis: { title: "input" } },
          y: { field: "y", type: "quantitative", axis: { title: "prediction" } },
          detail: { field: "run", type: "nominal" }
        } },
      { transform: [{ filter: "datum.run === -1" }],
        mark: { type: "line", color: "#dc2626", strokeWidth: 3 },
        encoding: {
          x: { field: "x", type: "quantitative" },
          y: { field: "y", type: "quantitative" }
        } }
    ]
  }
};

// --- Vega-Lite for the classic tradeoff curve ---
const TRADEOFF_SPEC = {
  width: 600, height: 280,
  encoding: {
    x: { field: "capacity", type: "quantitative", title: "Model capacity (e.g. polynomial degree) →" },
    y: { field: "error", type: "quantitative", title: "Expected error" },
    color: { field: "kind", type: "nominal",
             scale: { domain: ["Bias²","Variance","Total error"],
                      range: ["#dc2626","#d97706","#0f172a"] } },
    strokeDash: { field: "kind", type: "nominal",
                  scale: { domain: ["Bias²","Variance","Total error"],
                           range: [[1,0],[1,0],[6,3]] } }
  },
  mark: { type: "line", strokeWidth: 3 }
};
const TRADEOFF_DATA = Array.from({length:30}, (_,i) => {
  const c = i + 1;
  const bias = 4 / c;
  const variance = c * 0.08;
  return [
    {capacity:c, kind:"Bias²", error: bias},
    {capacity:c, kind:"Variance", error: variance},
    {capacity:c, kind:"Total error", error: bias + variance + 0.3},
  ];
}).flat();

// --- Archery target SVG: bias = darts all in wrong place; variance = darts spread out ---
const ArcheryTarget = ({ darts, label, sub }) => (
  <div style={{ textAlign: "center" }}>
    <svg viewBox="-110 -110 220 220" width="200" height="200" style={{ display: "block", margin: "0 auto" }}>

  </div>
);

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="ML Fund · Concept"
      title="Bias–variance tradeoff"
      subtitle="Why every model's expected error decomposes into three named pieces, and why two of them pull against each other."
      byline={[
        {label: "Audience", value: "smart but new to ML"},
        {label: "Source", value: "Geman et al. 1992"},
      ]}/>

    <VIS.TLDR>
      Total expected error for a model splits into three named pieces:{" "}
      <VIS.Term def="How wrong the model's average prediction is. Even with infinite data of the same kind, a too-simple model is systematically off — that gap is bias.">bias</VIS.Term>,{" "}
      <VIS.Term def="How much the model's prediction jumps around when re-trained on different samples drawn from the same population. Flexible models tend to wobble more.">variance</VIS.Term>, and an{" "}
      <VIS.Term def="The randomness baked into the data itself — labels we can never predict perfectly because the world is noisy. Sets a floor below which no model can go.">irreducible noise floor</VIS.Term>.
      You can shrink the first two by changing model capacity. You cannot shrink the third.
    </VIS.TLDR>

    <VIS.Section id="sec-experiment" title="Beat 1 — A thought experiment, watched 60 times">
      <p>
        Imagine the same prediction problem (say, "given a house's square-footage, predict its price") is handed to <strong>30 data scientists</strong>. Each one independently collects their own random sample of houses from the same city — same housing market, same underlying patterns — call this their{" "}
        <VIS.Term def="The pool of all possible (features, label) pairs your problem could draw from. We never see all of it; we see samples drawn from it. 'Training set' = one such sample.">data-generating distribution</VIS.Term>.
        We run the experiment twice: once where they all fit a too-simple model, once where they all fit a too-flexible one. Each thin blue line below is one scientist's fit; the red line is the true relationship.
      </p>

      <VIS.VegaLite spec={FITS_SPEC} data={FITS_DATA} />

      <p>
        Left panel: 30 fits, all <em>too simple</em> (basically flat). They cluster tightly together (low variance) but every one of them misses the actual ups-and-downs of the truth (high bias). <strong>Bias is the gap between the average fit and the truth.</strong>
      </p>
      <p>
        Right panel: 30 fits, all <em>too flexible</em> (high-degree polynomial). They go wildly different places — the same input gets predictions all over the map. On average they're closer to the truth, but at any one input, the disagreement across scientists is huge. <strong>Variance is the spread of fits around their own average.</strong>
      </p>
      <p>
        The lesson is in the contrast. <strong>Bias is "wrong on average."</strong> <strong>Variance is "different every time."</strong> They are not the same thing, and they trade off as you change how flexible the model class is.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-name" title="Beat 2 — Naming the pieces (archery target analogy)">
      <p>
        A target analogy makes the distinction crisp. Each blue dot below is one scientist's prediction at the same input <code>x</code>. The black dot at the center is the truth.
      </p>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: 24, margin: "20px 0" }}>
        <ArcheryTarget
          darts={[[55,-30],[60,-25],[58,-20],[62,-35],[55,-25],[63,-22],[57,-18],[60,-30]]}
          label="High bias, low variance"
          sub='"Wrong on average" — darts tightly clustered, but in the wrong spot.'
        />
        <ArcheryTarget
          darts={[[-50,40],[55,-30],[-30,-50],[40,55],[-55,-20],[20,-50],[-10,60],[50,30]]}
          label="Low bias, high variance"
          sub='"Different every time" — darts spread out, but centered on the truth.'
        />
      </div>

      <p>
        Now we can name what we observe. Given a learning procedure (a fixed model class plus how you train it) and a specific input <code>x</code> we want to predict for:
      </p>
      <ul>
        <li><strong>Bias² at x</strong> = how far the AVERAGE prediction (across all training sets) is from the truth, squared. <em>(Center of the dart cluster ↔ bullseye.)</em></li>
        <li><strong>Variance at x</strong> = the SPREAD of predictions across training sets, measured as the average squared deviation from the cluster center. <em>(How wide the cluster is.)</em></li>
        <li><strong>Irreducible noise σ²</strong> = the part of the label that's random even given perfect knowledge of <code>x</code>. Two identical houses can sell for different prices.</li>
      </ul>
    </VIS.Section>

    <VIS.Section id="sec-math" title="Beat 3 — The math (one equation, one decomposition)">
      <VIS.Equation display
        tex="\mathbb{E}_{\mathcal{D},\,\varepsilon}\!\big[(y - \hat{f}_{\mathcal{D}}(x))^2\big] \;=\; \underbrace{\big(\mathbb{E}_{\mathcal{D}}[\hat{f}_{\mathcal{D}}(x)] - f(x)\big)^{\!2}}_{\text{bias}^2} \;+\; \underbrace{\mathbb{E}_{\mathcal{D}}\!\big[(\hat{f}_{\mathcal{D}}(x) - \mathbb{E}_{\mathcal{D}}[\hat{f}_{\mathcal{D}}(x)])^2\big]}_{\text{variance}} \;+\; \sigma^2" />

      <VIS.Mermaid chart={`
flowchart TB
  TOTAL["Total expected error"]
  TOTAL --> B["Bias squared"]
  TOTAL --> V["Variance"]
  TOTAL --> N["Irreducible noise"]
  style B fill:#fee2e2,stroke:#dc2626,stroke-width:2px
  style V fill:#fef3c7,stroke:#d97706,stroke-width:2px
  style N fill:#e0e7ff,stroke:#6366f1,stroke-width:2px
      `} />

      <p style={{marginTop: 12}}>
        Each branch maps to one piece of the equation:{" "}
        <span style={{background:"#fee2e2", padding:"2px 6px", borderRadius:4}}><strong>Bias²</strong></span>{" "}
        — how far the dart-cluster center is from the bullseye.{" "}
        <span style={{background:"#fef3c7", padding:"2px 6px", borderRadius:4}}><strong>Variance</strong></span>{" "}
        — how wide the dart-cluster is.{" "}
        <span style={{background:"#e0e7ff", padding:"2px 6px", borderRadius:4}}><strong>σ²</strong></span>{" "}

      <p>Mapping the symbols back to the thought experiment:</p>
      <ul>
        <li><VIS.Term def="A mathematical operator that averages a quantity over a probability distribution. 'E[X over D]' means: imagine drawing many samples from D and computing X each time — the long-run average is E[X].">𝔼<sub>𝒟</sub>[·]</VIS.Term>{" "}= average over training sets drawn from the same data-generating distribution. Concretely: the average over those 30 scientists' fits.</li>
        <li><strong>f(x)</strong> = the true (unknown) value at input <code>x</code> (the bullseye).</li>
        <li><strong>f̂<sub>𝒟</sub>(x)</strong> = what a model fitted on training set 𝒟 predicts at <code>x</code> (one dart).</li>
        <li><strong>σ²</strong> = noise variance. Doesn't depend on the model — it's a property of the data.</li>
      </ul>
      <p>The astonishing fact: the decomposition is <em>exact</em>. No other terms hide in there.</p>
    </VIS.Section>

    <VIS.Section id="sec-curve" title="The classic tradeoff curve (capacity ↔ error)">
      <VIS.VegaLite spec={TRADEOFF_SPEC} data={TRADEOFF_DATA} />
      <p>
        Red = bias² (falls as capacity grows). Amber = variance (rises). Dashed black = their sum + noise floor. The minimum of the dashed line is the sweet spot — the capacity at which adding more flexibility hurts more than it helps.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-practical" title="Beat 4 — What to do about it in practice">
      <VIS.Mermaid chart={`
flowchart TB
  D["Compare train vs test"]
  D --> Q1{"Big gap?"}
  Q1 -->|Yes| V["Variance problem"]
  Q1 -->|No| Q2{"Both high?"}
  Q2 -->|Yes| B["Bias problem"]
  Q2 -->|No| OK["Healthy"]
  style V fill:#fef3c7,stroke:#d97706,stroke-width:2px
  style B fill:#fee2e2,stroke:#dc2626,stroke-width:2px
  style OK fill:#dcfce7,stroke:#16a34a,stroke-width:2px
      `} />

      <div style={{margin:"16px 0"}}>
        <p style={{margin:"8px 0"}}>
          <span style={{background:"#fef3c7", padding:"2px 8px", borderRadius:4}}><strong>Variance problem</strong></span>{" "}
          — train ≪ test → model is fitting training-set quirks. Try regularization (L1/L2/dropout), more data, ensembling, or a simpler model.
        </p>
        <p style={{margin:"8px 0"}}>
          <span style={{background:"#fee2e2", padding:"2px 8px", borderRadius:4}}><strong>Bias problem</strong></span>{" "}
          — train ≈ test, both high → model class is too simple to represent the truth. Try a bigger model, richer features, or a different model family.
        </p>
        <p style={{margin:"8px 0"}}>
          <span style={{background:"#dcfce7", padding:"2px 8px", borderRadius:4}}><strong>Healthy</strong></span>{" "}
          — train ≈ test, both low → you're at or near the sweet spot.

      </div>

      <VIS.Callout kind="gotcha" title="What the framework does NOT say">
        Bias and variance are properties of the <em>learning algorithm averaged over training sets</em>, not of a single fitted model. One ResNet on one CIFAR-10 split has one error number — not a bias and a variance separately. Use the framework to reason about <em>choices</em> (capacity, regularization, data size, ensembling), not to label an existing model.

      <VIS.Callout kind="warn" title="Modern caveat: double descent">

    <VIS.Section id="sec-summary" title="The 30-second summary">

      </p>
    </VIS.Section>

    <VIS.Section id="sec-problems" title="Hard problems — diagnose the lens">

      <VIS.TrapProblem
        id="bv-p1"
        difficulty="hard"
        title="P1 — ResNet-50 on CIFAR: $2.5k of MTurk data, or regularization?"
        scenario={<>You train ResNet-50 (~25M params) on CIFAR-10 with 50k training images. Train accuracy 99.8%, test accuracy 75%. Your tech lead suggests collecting 200k additional images via Mechanical Turk — total cost ~$2,500, ~2 weeks of labeling. What should you do FIRST?</>}
        options={[
          {key:"a", text:"Order the MTurk data — more data is the textbook fix for overfitting."},
          {key:"b", text:"Drop to ResNet-18 — fewer parameters mean less variance."},
          {key:"c", text:"Apply dropout 0.5 + weight decay 5e-4 + RandAugment, then re-evaluate.", correct:true},
          {key:"d", text:"Lower learning rate from 0.1 to 0.001 to stabilize training."},
        ]}
        trap={<>(a) is the textbook reflex — "more data fixes overfitting." But 200k MTurk images cost real money, take weeks, and introduce labeling noise. (b) is also tempting because smaller capacity does reduce variance — but you'd lose representational power on the harder classes (cats vs dogs, deer vs horse). (d) is a guess masquerading as caution.</>}
        lens={<>Variance problem (train ≫ test by 24 points). The cheap-fast-first lever is <strong>regularization</strong>: data augmentation gives you "more effective data" for free; dropout + weight decay constrain the model directly. Closes most variance gaps in hours, not weeks. Order: regularize → augment → smaller architecture → more data. Always cheapest first.</>}
        stretch={<>When WOULD ordering the MTurk data first beat regularization? (Hint: think about what regularization can't fix.)</>}
      />

      <VIS.TrapProblem
        id="bv-p2"
        difficulty="hard"
        title="P2 — Both train and test stuck: bias problem, or noise floor?"
        scenario={<>Credit-card fraud detection. Logistic regression with 200 features: train AUC = 0.62, val AUC = 0.61. Tech lead says "bias problem — train an XGBoost." Product manager says "the labels are noisy — fix the data first." Both errors are high and close together. Who's right?</>}
        options={[
          {key:"a", text:"Tech lead — train a 1000-tree XGBoost; the gap-to-perfect is bias."},
          {key:"b", text:"PM — re-label a sample via expert reviewers and retrain logistic regression."},
          {key:"c", text:"Estimate the Bayes error σ² first via inter-rater agreement on a labeled subset, then decide.", correct:true},
          {key:"d", text:"Both are wrong — switch to a different metric (PR-AUC) since AUC is misleading on imbalanced data."},
        ]}
        trap={<>(a) is the textbook reading of "train ≈ test, both high → bias problem." It's right IF σ² is small. But fraud labels are genuinely ambiguous — two expert reviewers often disagree on the same transaction. If σ² ≈ 0.35 AUC (which is realistic for fraud), no model can do better than ~0.65. Switching to XGBoost would burn weeks and yield AUC 0.63 — slightly above LR but BELOW the σ² floor. (b) is partially right but treats relabeling as a hammer without measuring whether labels are actually the bottleneck.</>}
        lens={<>The bias-variance decomposition assumes σ² is KNOWN. In real ML you have to MEASURE σ² before declaring a bias problem. The cheap measurement: have 2-3 experts independently label ~500 transactions; the inter-rater AUC (or Cohen's κ) is a lower bound on σ²-driven error. If σ² is high, the next move is BETTER FEATURES or different labels, not bigger models.</>}
        stretch={<>If inter-rater agreement gives κ = 0.4 (moderate), what's the rough upper bound on achievable AUC?</>}
      />

      <VIS.TrapProblem
        id="bv-p3"
        difficulty="hard"
        title="P3 — You 10× the training data and val loss barely moves"
        scenario={<>You're training a two-tower recommendation model. You scale training interactions from 10M to 100M (10× more data). Val NDCG@10 moves from 0.41 to 0.43. Train NDCG@10 moves from 0.42 to 0.44. Both moved together — barely. What does this tell you?</>}
        options={[
          {key:"a", text:"Variance problem — keep scaling; go to 1B interactions."},
          {key:"b", text:"Bias problem — model is too simple; double the embedding dimension."},
          {key:"c", text:"You're at the irreducible noise floor — neither more data nor more capacity will help much.", correct:true},
          {key:"d", text:"Distribution shift between train and val — investigate the temporal split."},
        ]}
        trap={<>(a) leans on scaling laws — "more data always helps." But scaling laws apply when you're NOT yet at the noise floor. When val AND train both refuse to move together as you add data, you're already at the σ² floor. (b) is tempting because "bias problem → bigger model" feels textbook. But if it were bias-limited, train would have ROOM TO MOVE with capacity. Here both metrics are stuck. (d) is a sanity-check candidate but doesn't explain why TRAIN also stopped improving.</>}
        lens={<>This is the irreducible noise floor σ². When you scale data and both train AND val plateau together, the labels themselves have inherent noise (recommender interactions are notoriously noisy — clicks ≠ true preference). The fix is BETTER LABELS (e.g., dwell-time-weighted clicks instead of raw clicks), NEW FEATURES, or shifting the loss to focus on cleaner signal. Not scale.</>}
        stretch={<>How would you discriminate this from distribution shift (option d)? What's the specific experiment?</>}
      />

      <VIS.TrapProblem
        id="bv-p4"
        difficulty="hard"
        title="P4 — k-NN bias-variance arithmetic"
        scenario={<>k-NN on a noisy 2D regression task. At k=1: bias² = 0.01, variance = 0.85. At k=100: bias² = 0.42, variance = 0.02. Irreducible noise σ² = 0.05. Test error = bias² + variance + σ². Which k minimizes test error?</>}
        options={[
          {key:"a", text:"k=1 — bias is lowest, that's what matters most."},
          {key:"b", text:"k=100 — variance is lowest, production needs stability."},
          {key:"c", text:"Around k ≈ 15, near the interior minimum where bias and variance are balanced.", correct:true},
          {key:"d", text:"Depends on the loss function — no single k is optimal without specifying loss."},
        ]}
        trap={<>(a) and (b) both pick extremes — the most common k-NN trap. At k=1: total = 0.01 + 0.85 + 0.05 = 0.91. At k=100: total = 0.42 + 0.02 + 0.05 = 0.49. (a) is much worse than (b), but neither is the minimum. The classic U-curve has its minimum in the INTERIOR. (d) is a clever-sounding non-answer; squared error is the standard regression loss and the question already specifies it via bias²+variance.</>}
        lens={<>Interpolating: at moderate k (around 15), bias² ≈ 0.10 and variance ≈ 0.18 — total ≈ 0.33. The minimum is where ∂(bias² + variance)/∂k = 0, which lies in the interior of the capacity space. Extremes are almost never optimal. This IS the bias-variance U-curve — k acts as inverse capacity (higher k = simpler model).</>}
        stretch={<>If σ² jumped from 0.05 to 0.50, would the optimal k shift, and which way?</>}
      />

      <VIS.TrapProblem
        id="bv-p5"
        difficulty="hard"
        title="P5 — Random forest: 100 → 1000 trees, variance barely drops"
        scenario={<>You train a random forest with 100 trees on a fixed dataset. Empirical prediction variance ≈ 0.12. You scale to 1000 trees (10×). Variance now ≈ 0.108 — a 10% drop. Why such a small improvement?</>}
        options={[
          {key:"a", text:"Bug — more trees should always cut variance proportionally (variance / n)."},
          {key:"b", text:"Trees are highly correlated (ρ ≈ 0.9) because they share the same training data; ensemble variance asymptotes at σ²·ρ.", correct:true},
          {key:"c", text:"Bias dominates — adding trees can't fix bias."},
          {key:"d", text:"Feature subsampling is too aggressive — mtry is too low."},
        ]}
        trap={<>(a) is the textbook ensemble-variance reading — "n trees give σ²/n." That's true ONLY when trees are uncorrelated. (c) is half-right that more trees don't help bias but the question is about variance changes, not test-error changes. (d) is plausible-sounding noise — mtry too low gives more diverse trees, lower ρ, MORE variance reduction; mtry too high gives higher ρ. The math would tell you mtry is too HIGH, not too low, if anything.</>}
        lens={<>Ensemble variance: Var(avg of n correlated predictions) = σ²·(1-ρ)/n + σ²·ρ. As n → ∞, variance → σ²·ρ, not 0. With ρ ≈ 0.9 (typical for RF on small data because trees share most of the bootstrap samples), the floor is ~0.9·σ². Going 100 → 1000 trees moves you from σ²·(0.1/100 + 0.9) ≈ 0.901·σ² to σ²·(0.1/1000 + 0.9) ≈ 0.9001·σ² — practically nothing. The fix to actually reduce variance: lower ρ (decorrelate trees) by reducing mtry, deepening boostrap, or using extra-trees.</>}
        stretch={<>What's the lowest variance you can achieve with this ensemble if ρ = 0.9 is fixed by the data?</>}
      />
    </VIS.Section>
