<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>visualize</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <style>
    body { font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
           margin: 0; background: #ffffff; color: #0f172a; }
  </style>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/@lottiefiles/lottie-player@2.0.8/dist/lottie-player.js" async></script>
  <script>
// vis-components.js — design-system JSX components for the /visualize skill.
// Exposed as window.VIS.{Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle}.
// window.RV is aliased to window.VIS for report-viewer back-compat.
// Available globally to any visual.jsx without imports.
// (CSS class prefix kept as "rv-" — internal namespace; preserves report-viewer interop.)

(function () {
  "use strict";

  if (!window.React) {
    console.warn("[vis-components] React not loaded yet; skipping setup");
    return;
  }
  const h = React.createElement;

  // Lazy-load a CDN script; cache the load Promise so repeats are cheap.
  const _scriptCache = new Map();
  function _loadScript(src) {
    if (_scriptCache.has(src)) return _scriptCache.get(src);
    const p = new Promise((resolve, reject) => {
      const existing = document.querySelector(`script[data-vis-cdn="${src}"]`);
      if (existing) return existing.addEventListener("load", resolve);
      const s = document.createElement("script");
      s.src = src; s.async = false; s.dataset.visCdn = src;
      s.onload = resolve; s.onerror = reject;
      document.head.appendChild(s);
    });
    _scriptCache.set(src, p);
    return p;
  }

  let _katexCssInjected = false;
  function _ensureKatexCss() {
    if (_katexCssInjected) return;
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = "https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css";
    document.head.appendChild(link);
    _katexCssInjected = true;
  }

  let _hljsCssInjected = false;
  function _ensureHljsCss() {
    if (_hljsCssInjected) return;
    const link = document.createElement("link");
    link.rel = "stylesheet";
    link.href = "https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css";
    document.head.appendChild(link);
    _hljsCssInjected = true;
  }

  // ----- Styles, injected once ----- //
  (function injectStyles() {
    if (document.getElementById("rv-components-styles")) return;
    const css = `
      .rv-hero {
        background: radial-gradient(120% 90% at 20% 0%, #dbeafe 0%, #ffffff 60%);
        padding: 28px 28px 22px; border-radius: 16px; margin-bottom: 20px;
        border: 1px solid #e2e8f0;
      }
      .rv-hero h1 {
        font-size: 38px; line-height: 1.1; letter-spacing: -0.02em;
        font-weight: 700; margin: 10px 0 6px; color: #0f172a;
      }
      .rv-hero .rv-sub {
        font-size: 16px; color: #475569; margin: 0; max-width: 60ch;
      }
      .rv-hero .rv-byline {
        font-size: 12px; color: #64748b; margin-top: 14px;
        display: flex; gap: 14px; flex-wrap: wrap;
      }
      .rv-hero .rv-byline span strong { color: #1e293b; font-weight: 600; }

      .rv-pill {
        display: inline-block; padding: 2px 10px; border-radius: 999px;
        background: #2563eb; color: #fff; font-size: 11px; font-weight: 600;
        letter-spacing: 0.6px; text-transform: uppercase;
      }

      .rv-tag {
        display: inline-block; padding: 1px 8px; border-radius: 999px;
        font-size: 11px; font-weight: 600; vertical-align: middle;
      }
      .rv-tag-green  { background: #dcfce7; color: #166534; }
      .rv-tag-yellow { background: #fef9c3; color: #854d0e; }
      .rv-tag-red    { background: #fee2e2; color: #991b1b; }
      .rv-tag-blue   { background: #dbeafe; color: #1e40af; }
      .rv-tag-gray   { background: #e4e4e7; color: #3f3f46; }

      .rv-card {
        border: 1px solid #e4e4e7; border-radius: 10px;
        padding: 14px 16px; margin: 12px 0;
        background: linear-gradient(180deg, #fafafa, #fff);
      }

      .rv-tldr {
        background: #f1f5f9;
        border-left: 4px solid #2563eb;
        border-radius: 0 10px 10px 0;
        padding: 14px 18px; margin: 0 0 24px;
        font-size: 15px; line-height: 1.55; color: #0f172a;
      }
      .rv-tldr .rv-tldr-label {
        display: inline-block; margin-right: 8px;
        font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
        color: #2563eb; text-transform: uppercase;
        vertical-align: 1px;
      }
      .vis-callout {
        border-left: 4px solid; border-radius: 0 8px 8px 0;
        padding: 12px 16px; margin: 14px 0;
      }
      .vis-callout-title { display: block; margin-bottom: 4px; }
      .vis-callout-info   { background: #dbeafe; border-color: #2563eb; color: #1e3a8a; }
      .vis-callout-warn   { background: #fef3c7; border-color: #d97706; color: #78350f; }
      .vis-callout-gotcha { background: #fee2e2; border-color: #dc2626; color: #7f1d1d; }
      .vis-callout-ok     { background: #dcfce7; border-color: #16a34a; color: #14532d; }

      .vis-term {
        text-decoration: underline dotted;
        text-decoration-color: #94a3b8;
        text-underline-offset: 3px;
        cursor: help;
      }
      .vis-term:focus { outline: 2px solid #2563eb; outline-offset: 2px; }
      .vis-term-tip {
        position: fixed; z-index: 10001; max-width: 340px;
        background: #0f172a; color: #f8fafc; font-size: 13px; line-height: 1.45;
        padding: 8px 10px; border-radius: 6px;
        box-shadow: 0 4px 14px rgba(0,0,0,0.22);
        pointer-events: none; white-space: pre-wrap;
      }

      /* Trap problem (MCQ with click-to-reveal). One block per problem. */
      .vis-trap {
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 20px 22px;
        margin: 24px 0;
        background: #fafbfc;
      }
      .vis-trap-header {
        display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
        flex-wrap: wrap;
      }
      .vis-trap-difficulty {
        font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
        padding: 3px 10px; border-radius: 999px; text-transform: uppercase;
      }
      .vis-trap-diff-easy   { background: #dcfce7; color: #166534; }
      .vis-trap-diff-medium { background: #fef9c3; color: #854d0e; }
      .vis-trap-diff-hard   { background: #fee2e2; color: #991b1b; }
      .vis-trap-title { font-size: 17px; color: #0f172a; }
      .vis-trap-multi-badge {
        font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
        padding: 2px 8px; border-radius: 999px;
        background: #e0e7ff; color: #3730a3;
        text-transform: uppercase;
      }
      .vis-trap-scenario { margin: 0 0 12px; line-height: 1.65; }
      .vis-trap-diagram  { margin: 12px 0; }
      .vis-trap-options  { display: flex; flex-direction: column; gap: 8px; margin: 16px 0; }
      .vis-trap-option {
        text-align: left;
        padding: 11px 14px;
        background: #ffffff;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font: inherit; color: #0f172a;
        cursor: pointer;
        transition: border-color 0.15s, background 0.15s;
      }
      .vis-trap-option:hover:not(:disabled) {
        border-color: #2563eb; background: #f1f5f9;
      }
      .vis-trap-option.is-selected {
        border-color: #2563eb; background: #dbeafe;
      }
      .vis-trap-option.is-correct {
        border-color: #16a34a; background: #dcfce7;
      }
      .vis-trap-option.is-wrong-selected {
        border-color: #dc2626; background: #fee2e2;
      }
      .vis-trap-option.is-correct-wrong-pos {
        border-color: #d97706; background: #fef3c7;
      }
      .vis-trap-option.is-disabled {
        opacity: 0.6;
      }
      .vis-trap-key { font-weight: 700; margin-right: 4px; color: #475569; }
      .vis-trap-tick { color: #16a34a; font-weight: 700; margin-left: 6px; }
      .vis-trap-x    { color: #dc2626; font-weight: 700; margin-left: 6px; }
      .vis-trap-actions {
        display: flex; align-items: center; gap: 12px;
        margin-top: 8px;
      }
      .vis-trap-reveal-btn, .vis-trap-reset-btn {
        background: #2563eb; color: #ffffff; border: none;
        padding: 10px 18px; border-radius: 8px;
        font: inherit; font-weight: 600;
        cursor: pointer;
      }
      .vis-trap-reveal-btn:hover, .vis-trap-reset-btn:hover { background: #1d4ed8; }
      .vis-trap-reset-btn {
        background: #64748b; margin-top: 12px;
        font-size: 13px; padding: 8px 14px;
      }
      .vis-trap-reset-btn:hover { background: #475569; }
      .vis-trap-hint { color: #64748b; font-size: 14px; }
      .vis-trap-reveal-block {
        margin-top: 18px; padding-top: 16px; border-top: 1px solid #e2e8f0;
      }
      .vis-trap-trap, .vis-trap-lens, .vis-trap-stretch {
        margin: 10px 0; padding: 12px 16px; border-radius: 8px;
      }
      .vis-trap-trap    { background: #fef3c7; border-left: 4px solid #d97706; color: #78350f; }
      .vis-trap-lens    { background: #dcfce7; border-left: 4px solid #16a34a; color: #14532d; }
      .vis-trap-stretch { background: #e0e7ff; border-left: 4px solid #6366f1; color: #312e81; }
      .vis-trap-trap strong, .vis-trap-lens strong, .vis-trap-stretch strong {
        display: block; margin-bottom: 4px;
      }
      .vis-trap-trap p, .vis-trap-lens p, .vis-trap-stretch p { margin: 0; line-height: 1.55; }

      /* Responsive SVG wrappers — diagrams shrink to fit narrow containers
         instead of overflowing the parent. Without these, Mermaid/Vega SVGs
         render at their intrinsic width and get clipped on the left/right
         when viewport is narrower than ~900px. */
      .vis-mermaid svg, .vis-vega svg {
        max-width: 100%;
        height: auto;
        display: inline-block;
      }
      .vis-mermaid, .vis-vega { overflow-x: auto; }

      /* Mermaid text rendering fixes for Mermaid 10. By default the auto-sized
         node fill rect and the edge-label background rect are both tight to the
         text, which clips descenders (g/p/y/j/q) at the bottom of nodes AND
         the right edge of edge labels ("Yes" → "Ye"). Force overflow:visible
         everywhere and give the labels generous padding. */
      .vis-mermaid svg,
      .vis-mermaid foreignObject,
      .vis-mermaid .node foreignObject,
      .vis-mermaid .edgeLabel,
      .vis-mermaid .edgeLabel foreignObject,
      .vis-mermaid .label,
      .vis-mermaid .label foreignObject {
        overflow: visible !important;
      }
      .vis-mermaid .node .nodeLabel,
      .vis-mermaid .node .label,
      .vis-mermaid .label foreignObject div {
        line-height: 1.5;
        padding: 2px 4px;
      }
      .vis-mermaid .edgeLabel {
        padding: 2px 8px;
        background: #ffffff;
        border-radius: 3px;
        line-height: 1.4;
      }
      .vis-mermaid .edgeLabel foreignObject div,
      .vis-mermaid .edgeLabel span,
      .vis-mermaid .edgeLabel .labelBkg {
        padding: 0 4px !important;
        background: transparent !important;
      }
    `;
    const tag = document.createElement("style");
    tag.id = "rv-components-styles";
    tag.textContent = css;
    document.head.appendChild(tag);
  })();

  // ----- Components ----- //

  // <RV.Pill>v0.2</RV.Pill>  →  small uppercase pill
  function Pill({ children, color }) {
    const style = color ? { background: color } : null;
    return h("span", { className: "rv-pill", style }, children);
  }

  // <RV.Tag color="green">ok</RV.Tag>  →  status pill
  function Tag({ children, color = "gray" }) {
    return h("span", { className: "rv-tag rv-tag-" + color }, children);
  }

  // <RV.ByLine items={[{label:"Build",value:"2026-05-15"}, ...]} />
  function ByLine({ items = [] }) {
    return h("div", { className: "rv-byline" },
      items.map((it, i) =>
        h("span", { key: i },
          h("strong", null, it.label), " ", it.value
        )
      )
    );
  }

  // Set the browser tab title. Auto-called by RV.Hero; reports without a
  // Hero can call this directly: RV.setTitle("...").
  function setTitle(str) {
    if (typeof str === "string" && str.trim()) document.title = str.trim();
  }

  // <RV.Hero title="..." subtitle="..." pill="v0.2" byline={[...]}>
  //   children (optional, rendered below subtitle)
  // </RV.Hero>
  function Hero({ title, subtitle, pill, byline, accent, children }) {
    React.useEffect(() => { setTitle(title); }, [title]);
    return h("section", { className: "rv-hero" },
      pill ? h(Pill, null, pill) : null,
      h("h1", null,
        accent ? h("span", { className: accent }) : null,
        accent ? " " : null,
        title
      ),
      subtitle ? h("p", { className: "rv-sub" }, subtitle) : null,
      byline && byline.length ? h(ByLine, { items: byline }) : null,
      children
    );
  }

  // <RV.Card><strong>title</strong><p>body</p></RV.Card>
  function Card({ children, className }) {
    return h("div", {
      className: "rv-card" + (className ? " " + className : "")
    }, children);
  }

  // <RV.Section id="sec-foo" title="Foo">...</RV.Section>
  //   — renders <h2 id={id}>{title}</h2> + body. The id is picked up by
  //   the auto-TOC sidebar.
  function Section({ id, title, children }) {
    return h(React.Fragment, null,
      h("h2", { id }, title),
      children
    );
  }

  // <RV.TLDR>One-paragraph headline answer.</RV.TLDR>
  // ALWAYS render this immediately after <RV.Hero>, before any sections.
  // Reader should be able to leave after reading it.
  function TLDR({ children }) {
    return h("aside", { className: "rv-tldr", role: "note" },
      h("span", { className: "rv-tldr-label" }, "TL;DR"),
      children
    );
  }

  function Mermaid({ chart, id }) {
    const ref = React.useRef(null);
    const autoId = React.useId();
    React.useEffect(() => {
      let cancelled = false;
      _loadScript("https://cdn.jsdelivr.net/npm/mermaid@10.9.0/dist/mermaid.min.js")
        .then(() => {
          if (!window.mermaid._inited) {
            window.mermaid._inited = true;
            // trusted-author content; "loose" enables click handlers + HTML labels in mermaid
            // trusted-author content; "loose" enables click handlers + HTML labels in mermaid.
            // flowchart.padding + nodePadding give descenders (g, p, y, j, q) room to render
            // inside diamond/rectangle nodes — without this Mermaid 10 clips them at the bottom edge.
            window.mermaid.initialize({
              startOnLoad: false,
              theme: "default",
              securityLevel: "loose",
              flowchart: { padding: 18, nodeSpacing: 50, rankSpacing: 60, useMaxWidth: true, htmlLabels: true },
              themeVariables: { fontSize: "14px" }
            });
          }
          return window.mermaid.render((id || "mmd") + "-" + autoId.replace(/:/g, ""), chart);
        })
        .then(({ svg }) => {
          if (cancelled || !ref.current) return;
          ref.current.innerHTML = svg;
          // POST-PROCESS to fix Mermaid 10 descender clipping (g, p, y, j, q).
          // Mermaid sizes foreignObjects to the font em-box, which does NOT include
          // descender depth. Grow each foreignObject by 12px (6 top + 6 bottom) so
          // descenders render fully. Also grow rectangle node fills to match so the
          // colored box doesn't show a thin sliver above/below the text.
          const svgEl = ref.current.querySelector("svg");
          if (!svgEl) return;
          svgEl.querySelectorAll("foreignObject").forEach((fo) => {
            const h = parseFloat(fo.getAttribute("height") || "0");
            const y = parseFloat(fo.getAttribute("y") || "0");
            fo.setAttribute("height", String(h + 12));
            fo.setAttribute("y", String(y - 6));
          });
          svgEl.querySelectorAll("g.node > rect").forEach((rect) => {
            const h = parseFloat(rect.getAttribute("height") || "0");
            const y = parseFloat(rect.getAttribute("y") || "0");
            rect.setAttribute("height", String(h + 12));
            rect.setAttribute("y", String(y - 6));
          });
          // Diamonds use <polygon points="..."/>. Expand vertically by translating
          // top and bottom vertices outward from the centroid by 6px each.
          svgEl.querySelectorAll("g.node > polygon").forEach((poly) => {
            const pts = (poly.getAttribute("points") || "").trim().split(/\s+/)
              .map((p) => p.split(",").map(parseFloat));
            if (pts.length < 3 || pts.some((p) => p.length < 2 || p.some(isNaN))) return;
            const cy = pts.reduce((s, p) => s + p[1], 0) / pts.length;
            const grown = pts.map(([x, py]) => [x, py + (py < cy ? -6 : 6)]);
            poly.setAttribute("points", grown.map((p) => p.join(",")).join(" "));
          });
        })
        .catch((e) => { if (ref.current) ref.current.textContent = "[mermaid error] " + e; });
      return () => { cancelled = true; };
    }, [chart, id, autoId]);
    return h("div", { ref, className: "vis-mermaid", style: { margin: "16px 0", textAlign: "center" } });
  }

  function VegaLite({ spec, data }) {
    const ref = React.useRef(null);
    React.useEffect(() => {
      let cancelled = false;
      Promise.all([
        _loadScript("https://cdn.jsdelivr.net/npm/vega@5"),
        _loadScript("https://cdn.jsdelivr.net/npm/vega-lite@5"),
        _loadScript("https://cdn.jsdelivr.net/npm/vega-embed@6"),
      ]).then(() => {
        if (cancelled || !ref.current) return;
        const full = data ? { ...spec, data: { values: data } } : spec;
        window.vegaEmbed(ref.current, full, { actions: false, renderer: "svg" });
      }).catch((e) => { if (ref.current) ref.current.textContent = "[vega error] " + e; });
      return () => { cancelled = true; };
    }, [spec, data]);
    return h("div", { ref, className: "vis-vega", style: { margin: "16px 0" } });
  }

  function Equation({ tex, display = false }) {
    const ref = React.useRef(null);
    React.useEffect(() => {
      _ensureKatexCss();
      let cancelled = false;
      _loadScript("https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js")
        .then(() => {
          if (cancelled || !ref.current) return;
          window.katex.render(tex, ref.current, { displayMode: display, throwOnError: false });
        });
      return () => { cancelled = true; };
    }, [tex, display]);
    const Tag = display ? "div" : "span";
    return h(Tag, { ref, className: "vis-eq" });
  }

  function CodeBlock({ lang = "plaintext", children }) {
    const ref = React.useRef(null);
    React.useEffect(() => {
      _ensureHljsCss();
      let cancelled = false;
      _loadScript("https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js")
        .then(() => _loadScript(`https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/languages/${lang}.min.js`).catch(() => {}))
        .then(() => {
          if (cancelled || !ref.current) return;
          // Reset so hljs re-highlights when `children` or `lang` change
          ref.current.removeAttribute("data-highlighted");
          ref.current.className = "language-" + lang;
          ref.current.textContent = String(Array.isArray(children) ? children.join("") : children);
          window.hljs.highlightElement(ref.current);
        });
      return () => { cancelled = true; };
    }, [lang, children]);
    return h("pre", { style: { margin: "12px 0", borderRadius: 8, overflow: "auto" } },
      h("code", { ref, className: `language-${lang}` }, children));
  }

  function Callout({ kind = "info", title, children }) {
    return h("aside", { className: `vis-callout vis-callout-${kind}`, role: "note" },
      title ? h("strong", { className: "vis-callout-title" }, title) : null,
      children);
  }

  // <VIS.Term def="1-2 sentence plain-English explanation">jargon</VIS.Term>
  //
  // Wraps any technical term so a non-technical reader can hover for an
  // immediate definition. The explanation should:
  //   - assume the reader knows English but not software/your domain
  //   - fit in 1-2 short sentences (a tooltip, not a paragraph)
  //   - avoid further jargon (or wrap that too)
  //
  // The element exposes `data-rv-info` so the report-viewer overlay reuses
  // its own tooltip + double-click "explain this" feedback flow. In
  // standalone /visualize mode (no overlay), the lightweight hover handler
  // below renders the tooltip directly.
  function Term({ def, children }) {
    if (!def) return h(React.Fragment, null, children);
    return h("span", {
      className: "vis-term",
      "data-rv-info": def,
      "aria-label": def,
      tabIndex: 0,
    }, children);
  }

  // Standalone hover tooltip for <VIS.Term>. If the report-viewer overlay
  // is loaded it already shows tooltips for any [data-rv-info] element, so
  // we short-circuit here to avoid double-rendering.
  (function installTermTooltip() {
    let tip = null;
    function show(el) {
      if (window.__rvReady) return;  // overlay.js owns the tooltip in report-viewer mode
      const text = el.getAttribute("data-rv-info");
      if (!text) return;
      if (!tip) {
        tip = document.createElement("div");
        tip.className = "vis-term-tip";
        document.body.appendChild(tip);
      }
      tip.textContent = text;
      const r = el.getBoundingClientRect();
      const tr = tip.getBoundingClientRect();
      const pad = 8;
      let left = Math.max(pad,
        Math.min(r.left, window.innerWidth - tr.width - pad));
      const above = r.top - tr.height - pad;
      const below = r.bottom + pad;
      tip.style.left = left + "px";
      tip.style.top  = (above >= pad ? above : below) + "px";
      tip.style.display = "block";
    }
    function hide() { if (tip) tip.style.display = "none"; }
    document.addEventListener("mouseover", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el); else hide();
    });
    document.addEventListener("focusin", (e) => {
      const el = e.target.closest && e.target.closest(".vis-term");
      if (el) show(el);
    });
    document.addEventListener("focusout", hide);
    document.addEventListener("scroll", hide, true);
  })();

  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."
  //   scenario={<>...JSX...</>}

  //   options={[

  //   trap={<>The most tempting wrong is X because...</>}
  //   lens={<>The right answer + reasoning</>}
  //   stretch="optional follow-up question"

  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset

  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term, TrapProblem };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>

// --- Vega-Lite for Beat 1: 30 polynomial fits per scenario, overlaid ---
function makeFitData(degree, n_runs=30, seed=42) {
  // Pseudo-random fits: each "run" gets a slightly different sine + noise.
  const out = [];
  for (let r = 0; r < n_runs; r++) {
    for (let i = 0; i <= 30; i++) {
      const x = i / 30;
      let y;
      if (degree === 1) {
        // Flat-ish line: high bias, low variance
        y = 0.5 + 0.05 * Math.sin(r * 0.7);
      } else {
        // Wiggly: low bias, high variance
        const phase = r * 0.5;
        y = 0.5 + 0.4 * Math.sin(2 * Math.PI * x + phase) +
            0.2 * Math.sin(8 * Math.PI * x + phase * 1.3) * 0.5;
      }
      out.push({ x, y, run: r, degree: degree === 1 ? "Too simple" : "Too flexible" });
    }
  }
  // Add "truth" line
  for (let i = 0; i <= 30; i++) {
    const x = i / 30;
    out.push({ x, y: 0.5 + 0.4 * Math.sin(2 * Math.PI * x), run: -1, degree: "Truth" });
  }
  return out;
}
const FITS_DATA = [...makeFitData(1), ...makeFitData(15)];
const FITS_SPEC = {
  width: 360, height: 240,
  facet: { field: "degree", type: "nominal", title: null,
           sort: ["Too simple", "Too flexible"] },
  columns: 2,
  spec: {
    layer: [
      { transform: [{ filter: "datum.run >= 0" }],
        mark: { type: "line", opacity: 0.18, color: "#2563eb", strokeWidth: 1 },
        encoding: {
          x: { field: "x", type: "quantitative", axis: { title: "input" } },
          y: { field: "y", type: "quantitative", axis: { title: "prediction" } },
          detail: { field: "run", type: "nominal" }
        } },
      { transform: [{ filter: "datum.run === -1" }],
        mark: { type: "line", color: "#dc2626", strokeWidth: 3 },
        encoding: {
          x: { field: "x", type: "quantitative" },
          y: { field: "y", type: "quantitative" }
        } }
    ]
  }
};

// --- Vega-Lite for the classic tradeoff curve ---
const TRADEOFF_SPEC = {
  width: 600, height: 280,
  encoding: {
    x: { field: "capacity", type: "quantitative", title: "Model capacity (e.g. polynomial degree) →" },
    y: { field: "error", type: "quantitative", title: "Expected error" },
    color: { field: "kind", type: "nominal",
             scale: { domain: ["Bias²","Variance","Total error"],

const TRADEOFF_DATA = Array.from({length:30}, (_,i) => {
  const c = i + 1;
  const bias = 4 / c;
  const variance = c * 0.08;

    {capacity:c, kind:"Bias²", error: bias},
    {capacity:c, kind:"Variance", error: variance},

// --- Archery target SVG: bias = darts all in wrong place; variance = darts spread out ---

const App = () => (

    <VIS.TLDR>
      Total expected error for a model splits into three named pieces:{" "}
      <VIS.Term def="How wrong the model's average prediction is. Even with infinite data of the same kind, a too-simple model is systematically off — that gap is bias.">bias</VIS.Term>,{" "}
      <VIS.Term def="How much the model's prediction jumps around when re-trained on different samples drawn from the same population. Flexible models tend to wobble more.">variance</VIS.Term>, and an{" "}
      <VIS.Term def="The randomness baked into the data itself — labels we can never predict perfectly because the world is noisy. Sets a floor below which no model can go.">irreducible noise floor</VIS.Term>.
      You can shrink the first two by changing model capacity. You cannot shrink the third.

    <VIS.Section id="sec-experiment" title="Beat 1 — A thought experiment, watched 60 times">
      <p>
        Imagine the same prediction problem (say, "given a house's square-footage, predict its price") is handed to <strong>30 data scientists</strong>. Each one independently collects their own random sample of houses from the same city — same housing market, same underlying patterns — call this their{" "}
        <VIS.Term def="The pool of all possible (features, label) pairs your problem could draw from. We never see all of it; we see samples drawn from it. 'Training set' = one such sample.">data-generating distribution</VIS.Term>.
        We run the experiment twice: once where they all fit a too-simple model, once where they all fit a too-flexible one. Each thin blue line below is one scientist's fit; the red line is the true relationship.
      </p>

      <p>
        Left panel: 30 fits, all <em>too simple</em> (basically flat). They cluster tightly together (low variance) but every one of them misses the actual ups-and-downs of the truth (high bias). <strong>Bias is the gap between the average fit and the truth.</strong>

      <p>

      </p>
      <p>
        The lesson is in the contrast. <strong>Bias is "wrong on average."</strong> <strong>Variance is "different every time."</strong> They are not the same thing, and they trade off as you change how flexible the model class is.

    <VIS.Section id="sec-name" title="Beat 2 — Naming the pieces (archery target analogy)">

          {key:"e", text:"Lower learning rate from 3e-4 to 1e-5 to stabilize training."},
        ]}
        trap={<>Most candidates jump to (a) — "more data fixes overfitting" is the textbook reflex. The 200k MTurk images cost money, time, and add labeling noise. The ordering trap that catches senior candidates: many pick (c) FIRST because regularization "feels active" — but (b) is <em>free</em>. You already paid for those 30 epochs; just save and restore the checkpoint. Doing (c) before (b) means you immediately retrain instead of harvesting the val-peak you already have. Right SET but wrong ORDER is the senior-vs-junior signal — in a real loop, it wastes 4-8 hours of GPU time you didn't need to spend.</>}
        lens={<>Correct order: <strong>(b) first — restore the free checkpoint</strong>, then <strong>(c) — augmentation + dropout re-training</strong>. The val-plateau at epoch 30 IS the early-stopping signal; you trained through the optimum. Only AFTER regularization fails do you escalate to data (a) or architecture (d). (e) is a non-fix — LR doesn't address variance, it slows training.</>}
        stretch={<>If the val curve had ONLY plateaued (not dropped) after epoch 30, would the order change? Why?</>}
      />

      <VIS.TrapProblem
        id="bv-p2"
        difficulty="hard"
        multiSelect
        title="P2 — Both train and val low: bias, noise, or imbalance?"
        scenario={<>Credit-card fraud detection at a fintech. Logistic regression on 200 features: 12 user-demographic columns, 80 transaction-aggregate features (30/60/90 day windows), 50 merchant-network features, 58 device-fingerprint signals. Positive rate: <strong>0.4% fraud</strong>. Train AUC = 0.62, val AUC = 0.61 — both low and close. Training set: 12M transactions from January-March 2026. Val set: 2M transactions from April 2026. Three people give different advice. Tech lead: "bias problem — train an XGBoost with 1000 trees." Product manager: "the labels are noisy — relabel and retrain LR." Staff engineer: "AUC is misleading on 0.4% positives — switch metrics." Which actions are correct first moves? Select all that apply.</>}
        options={[
          {key:"a", text:"Train XGBoost 1000 trees immediately to fix the bias."},
          {key:"b", text:"Have 2-3 experts independently label ~500 transactions; the inter-rater AUC bounds σ².", correct:true},
          {key:"c", text:"Switch primary metric from AUC to PR-AUC for the imbalanced setting.", correct:true},
          {key:"d", text:"Compare the fraud rate in Jan-Mar vs April; investigate any temporal distribution shift.", correct:true},
          {key:"e", text:"Add another 100 behavioral features to fix the bias."},
        ]}
        trap={<>(a) is the tech lead's instinct and the textbook reading — "train ≈ val, both high → bias problem." But it assumes σ² is small. At 0.4% positives, fraud labels are inherently ambiguous (two expert reviewers often disagree on the same transaction); if σ² ≈ 0.35 AUC, XGBoost won't beat the floor. (e) makes the same mistake — throwing features at a noise-limited problem. The PM was right that labels matter but jumped to "relabel everything"; the cheap version is just measuring σ² first. Three other things are also worth doing as PRIORITY checks before model surgery.</>}
        lens={<>Three correct first moves. <strong>(b)</strong> measure σ² — bias-variance decomposition assumes you know the noise floor. <strong>(c)</strong> use PR-AUC because AUC is rank-based and overstates performance at 0.4% positives. <strong>(d)</strong> check temporal distribution shift — Jan-Mar trained, April val, fraud patterns drift. Only AFTER these checks would picking a new model make sense.</>}
        stretch={<>If inter-rater agreement gives κ = 0.4 (moderate), what's a rough upper bound on achievable AUC?</>}
      />

      <VIS.TrapProblem
        id="bv-p3"
        difficulty="hard"
        title="P3 — You 10× the training data and val loss barely moves"
        scenario={<>Two-tower recommendation model for a streaming video service. 4-layer transformer encoder per tower, 256-dim embedding, InfoNCE loss with 32 in-batch negatives, AdamW <code>lr=1e-4</code>. You scale training from <strong>10M → 100M</strong> user-item interactions (same time window, same architecture, same loss, same hardware). Val NDCG@10: 0.41 → 0.43. Train NDCG@10: 0.42 → 0.44. <strong>Both moved together, barely.</strong> The interactions are binary clicks ("user watched this title"). User dwell-time is captured upstream but currently unused in training. Diagnose.</>}
        options={[
          {key:"a", text:"Variance problem — keep scaling; go to 1B interactions."},
          {key:"b", text:"Bias problem — model is too simple; double embedding dim 256→512."},
          {key:"c", text:"You're at the irreducible noise floor; binary clicks ≠ true preference. Move to dwell-time-weighted soft labels.", correct:true},
          {key:"d", text:"Distribution shift between train and val — investigate the temporal split."},
        ]}
        trap={<>(a) leans on scaling laws — "more data always helps." But scaling laws apply when you're NOT yet at the noise floor; when val AND train both refuse to move together as you add data, you're already at σ². (b) is the bigger-model textbook move — but bias-limited problems show train MOVING with capacity. Here both metrics are stuck. (d) is a sanity-check candidate but doesn't explain why TRAIN ALSO stopped improving.</>}
        lens={<>This is the irreducible noise floor σ². When you scale data and both train AND val plateau together, the labels themselves have inherent noise — binary clicks are notoriously noisy on streaming (accidental clicks, autoplay, partial watches). The fix is BETTER LABELS: use dwell-time as soft labels (or as a positive-weighting), or filter out interactions below a watch-time threshold. The dwell-time field mentioned in the scenario is the clue.</>}
        stretch={<>How would you discriminate this from distribution shift (option d)? What single experiment cleanly separates the two?</>}
      />

      <VIS.TrapProblem
        id="bv-p4"
        difficulty="hard"
        title="P4 — k-NN bias-variance arithmetic"
        scenario={<>k-NN regression on a noisy 2D task (mortgage default rate prediction). Empirically measured at the same input <code>x</code> across many bootstrap training sets: at <strong>k=1</strong>, bias² = 0.01, variance = 0.85. At <strong>k=100</strong>, bias² = 0.42, variance = 0.02. Irreducible noise σ² = 0.05 (estimated from repeat sales of identical properties). Test error = bias² + variance + σ². Which k minimizes test error?</>}
        options={[
          {key:"a", text:"k=1 — bias is lowest, and bias is what matters most for accuracy."},
          {key:"b", text:"k=100 — variance is lowest, and production needs stable predictions."},
          {key:"c", text:"Around k ≈ 15, near the interior minimum where bias and variance are balanced.", correct:true},
          {key:"d", text:"Depends on the loss function — no single k is optimal without specifying loss."},
        ]}
        trap={<>(a) and (b) both pick extremes. At k=1: total = 0.01 + 0.85 + 0.05 = 0.91. At k=100: total = 0.42 + 0.02 + 0.05 = 0.49. (a) is much worse than (b), but neither is the minimum. The classic U-curve has its minimum in the INTERIOR. (d) is a clever-sounding non-answer; squared error is the standard regression loss and the question specifies it via bias²+variance.</>}
        lens={<>Interpolating: at moderate k (around 15), bias² ≈ 0.10 and variance ≈ 0.18 — total ≈ 0.33. The minimum is where ∂(bias² + variance)/∂k = 0, in the interior. Extremes are almost never optimal. k acts as inverse capacity (higher k = simpler model) — this IS the bias-variance U-curve.</>}
        stretch={<>If σ² jumped from 0.05 to 0.50, would the optimal k shift, and which way?</>}
      />

      <VIS.TrapProblem
        id="bv-p5"
        difficulty="hard"
        title="P5 — Random forest: 100 → 1000 trees, variance barely drops"
        scenario={<>Random forest for customer-LTV regression. 100 trees, <code>max_depth=10</code>, <code>mtry=√p</code> (default for regression), bootstrap with replacement, training set fixed at 200k rows. You measure empirical prediction variance ≈ 0.12 across many test inputs. You scale to 1000 trees (10×, same config). Variance now ≈ 0.108 — only a 10% drop. Why such a small improvement?</>}
        options={[
          {key:"a", text:"Bug — more trees should always cut variance proportionally (variance / n)."},
          {key:"b", text:"Trees are highly correlated (ρ ≈ 0.9) because they share the same training data; ensemble variance asymptotes at σ²·ρ.", correct:true},
          {key:"c", text:"Bias dominates — adding trees can't fix bias."},
          {key:"d", text:"mtry is too low — trees are over-decorrelated."},
        ]}
        trap={<>(a) is the textbook ensemble-variance reading — "n trees give σ²/n." That's true ONLY when trees are uncorrelated. (c) confuses what variance tracks (single-tree noise across bootstrap samples) with the test-error implications. (d) reverses the math — mtry TOO LOW gives MORE diversity and LOWER ρ; the issue here is ρ TOO HIGH, which means mtry should go DOWN, not up.</>}
        lens={<>Ensemble variance: Var(avg of n correlated predictions) = σ²·(1-ρ)/n + σ²·ρ. As n → ∞, variance → σ²·ρ, not 0. With ρ ≈ 0.9 (typical for RF on a fixed 200k dataset because trees share most of their bootstrap samples), the floor is ~0.9·σ². 100 → 1000 trees moves you from ~0.901·σ² to ~0.9001·σ² — practically nothing. To actually reduce variance: lower ρ (decorrelate trees) by reducing mtry, deeper subsample fractions, or switch to extra-trees.</>}
        stretch={<>What's the lowest variance you can hope to reach with this ensemble if ρ = 0.9 is fixed by the data?</>}
      />

      <VIS.TrapProblem
        id="bv-p6"
        difficulty="hard"
        multiSelect
        title="P6 — Optuna 5-fold CV 0.92, test set 0.85: explain the 7-point gap"
        scenario={<>Churn prediction. XGBoost. 1M total rows split 80/20 (800k train, 200k test, random split, never touched during tuning). On the 800k train, you run 5-fold stratified CV with <strong>Optuna for 300 trials</strong> tuning (max_depth, learning_rate, min_child_weight, subsample, colsample_bytree). CV result: mean AUC = <strong>0.92</strong>, std across folds = 0.01 (very tight). You finally evaluate on the held-out 200k test set: AUC = <strong>0.85</strong>. A 7-point gap. Which factors plausibly explain it? Select all that apply.</>}
        options={[
          {key:"a", text:"Optuna's 300 trials overfit to the specific CV folds; Bayesian HPO concentrates samples near CV optima.", correct:true},
          {key:"b", text:"Model variance — XGBoost is too flexible; reduce max_depth."},
          {key:"c", text:"Train and test come from different distributions."},
          {key:"d", text:"The tight CV std (0.01) was misleadingly optimistic — feature correlation across folds inflated apparent stability.", correct:true},
          {key:"e", text:"200k test is too small to give a reliable AUC estimate."},
        ]}
        trap={<>(b) is tempting because "AUC gap = variance problem" is the reflex — but XGBoost variance shows up as fold-to-fold std differences, and the CV std was 0.01 (tight). (c) is wrong: random splits rule out distribution shift by construction. (e) is wrong: 200k is plenty for a stable AUC estimate (CI under 0.005). The real story is more subtle: when you tune HPO on CV scores 300 times, you're not measuring model quality — you're measuring "how well can a sampler exploit CV noise."</>}
        lens={<>Two correct: <strong>(a)</strong> HPO overfit to CV folds via Optuna's adaptive sampling, and <strong>(d)</strong> tight CV std masked the fact that fold scores were correlated (not independent draws). Together: CV AUC was optimistic by ~0.05-0.07. Fix: hold out a SECOND validation set just for the final HPO selection, or use nested CV (outer fold drives final score, inner fold drives HPO).</>}
        stretch={<>If you used random search instead of Optuna with the same 300 trials, would the gap shrink? Why?</>}
      />

      <VIS.TrapProblem
        id="bv-p7"
        difficulty="hard"
        multiSelect
        title="P7 — Same data, two seeds: 88% vs 79% test accuracy"
        scenario={<>You train the same DistilBERT architecture for sentiment classification on the same 50k-example labeled dataset with two different random seeds. Config identical: AdamW <code>lr=2e-5</code>, batch=16, max_len=512, 3 epochs, same hardware, same library versions. Result: <strong>Seed 1 = 88% test accuracy. Seed 2 = 79%</strong>. A 9-point gap purely from seed variation. Which of the following are valid diagnoses or fixes? Select all that apply.</>}
        options={[
          {key:"a", text:"Different seeds explored different local minima of the loss landscape — initialization variance.", correct:true},
          {key:"b", text:"Ensemble predictions across 5+ seeds (deep ensemble) — averages out initialization variance.", correct:true},
          {key:"c", text:"This IS the classical bias-variance decomposition acting on training-set resampling."},
          {key:"d", text:"Use SWA (Stochastic Weight Averaging) — average weights along the training trajectory of one seed.", correct:true},
          {key:"e", text:"Train longer (10 epochs instead of 3) — convergence will eliminate seed sensitivity."},
          {key:"f", text:"Switch optimizer to SGD with momentum — Adam-family optimizers are seed-sensitive."},
        ]}
        trap={<>(c) is the textbook bias-variance reflex but technically wrong here — the standard decomposition is over training-SET resampling, not seed. Same data, different seed = different OPTIMIZATION trajectory, not different sample. The framework still applies in spirit but the term "variance" is overloaded. (e) is naively reassuring but actually amplifies divergence in fine-tuning regimes — small datasets + many epochs makes each seed dive into deeper-but-different minima. (f) is unjustified speculation; SGD vs Adam-family doesn't reliably reduce seed variance for transformer fine-tuning.</>}
        lens={<>Three correct: <strong>(a)</strong> the diagnosis (initialization variance), <strong>(b)</strong> deep ensembling across seeds, <strong>(d)</strong> SWA. The 9-point gap is real for transformer fine-tuning on small data — Mosbach et al. (2021) document it as standard. The cure is averaging — across seeds (ensemble) or across the training trajectory (SWA).</>}
        stretch={<>If you only have budget for ONE final model, which is preferable: a single seed picked by val performance, or SWA over the trajectory of one seed?</>}
      />

      <VIS.TrapProblem
        id="bv-p8"
        difficulty="hard"
        title="P8 — Over-regularization U-curve"
        scenario={<>Ridge regression for housing-price prediction. You sweep L2 regularization strength λ over four orders of magnitude. Train and test MSE on the same fixed split: <strong>λ=0</strong> → train 0.10, test 0.85. <strong>λ=0.01</strong> → 0.18, 0.45. <strong>λ=1</strong> → 0.35, 0.40. <strong>λ=100</strong> → 0.80, 0.81. Why does λ=100 make BOTH train AND test worse than λ=1?</>}
        options={[
          {key:"a", text:"Bug — regularization should never make BOTH train and test worse than a smaller λ."},
          {key:"b", text:"High λ shrinks all weights toward zero; the model degenerates to predicting the mean. Bias dominates.", correct:true},
          {key:"c", text:"Test variance is so low at λ=100 you should ship it — production needs stability."},
          {key:"d", text:"Numerical instability at high λ inflates both errors."},
        ]}
        trap={<>(a) misreads the U-curve: bias rises monotonically with λ, but variance also falls — past the sweet spot, bias growth overtakes variance reduction. (c) is a clever-sounding production argument that ignores that test is WORSE at λ=100 than at λ=1. (d) blames math when math is fine.</>}
        lens={<>This is the right end of the bias-variance U-curve. At λ=100, weights are squished so hard the model predicts roughly the training mean for every input — high bias, very low variance, but the bias dominates by miles. Train MSE rising past λ=1 IS the diagnostic: regularization is no longer fixing variance, it's introducing bias. λ=1 is near the sweet spot.</>}
        stretch={<>If you plotted bias² and variance separately across λ, what would each curve look like?</>}
      />

      <VIS.TrapProblem
        id="bv-p9"
        difficulty="hard"
        multiSelect
        title="P9 — Imbalanced data: AUC 0.95 train / 0.91 val. Senior says ship it."
        scenario={<>Fraud detection model, 1% positive rate, 50M total transactions. XGBoost with class-weighting. <strong>Train AUC 0.95, val AUC 0.91, val PR-AUC 0.32</strong>. A senior eng says "tight AUC gap, low variance — ship it." You suspect this isn't the full story. Which additional checks should you do before agreeing to ship? Select all that apply.</>}
        options={[
          {key:"a", text:"Plot precision-recall curves on val — AUC is rank-based and overstates performance on imbalanced data.", correct:true},
          {key:"b", text:"Measure precision at the specific recall you'll deploy (e.g., precision @ recall=0.6).", correct:true},
          {key:"c", text:"Run a calibration check (reliability diagram) — well-ranked ≠ well-calibrated probabilities.", correct:true},
          {key:"d", text:"Switch the primary loss from CE to log-loss to fix the imbalance."},
          {key:"e", text:"Drop XGBoost in favor of logistic regression — XGBoost overfits on imbalanced classes."},
          {key:"f", text:"Increase the class-weight on positives from current value to 100×."},
        ]}
        trap={<>(d) is a category error: CE = log-loss for binary classification. They're the same thing. (e) is broad speculation — XGBoost can handle imbalance fine; the question isn't whether the model overfits, it's whether the metric is honest. (f) is a parameter knob without diagnosis. The trap on this question is mistaking "ship" for "test by which metric" — the senior is judging on AUC, but the relevant operational quality lives in precision-recall + calibration.</>}
        lens={<>Three correct: <strong>(a) PR curves</strong> reveal what AUC hides at 1% positives; <strong>(b) precision-at-deployment-recall</strong> is the business metric; <strong>(c) calibration</strong> matters when downstream decisions are threshold-based or use probabilities directly. The val PR-AUC of 0.32 is the real signal — much weaker than AUC 0.91 suggests, and the senior eng would catch this if they looked.</>}
        stretch={<>If calibration fails (predicted probability of fraud is systematically too high), what's the fix that DOESN'T require retraining?</>}
      />

      <VIS.TrapProblem
        id="bv-p10"
        difficulty="hard"
        multiSelect
        title="P10 — Diverging val: which actions actually help?"
        scenario={<>Transformer for sentiment classification (3-class: positive/neutral/negative). You fine-tune for 15 epochs. <strong>Train accuracy</strong> climbs monotonically: 75% (e1) → 90% (e8) → 99% (e15). <strong>Val accuracy</strong> peaks at epoch 8 at <strong>78%</strong>, then DROPS to <strong>74%</strong> by epoch 15. Gap widens. Config: AdamW <code>lr=3e-5</code>, batch=32, max_len=512, <strong>no warmup, no LR schedule</strong>. Training set: 8k labeled examples. Val set fixed across all epochs (same 1k held-out examples). Which actions would help close or prevent the val gap? Select all that apply.</>}
        options={[
          {key:"a", text:"Take the epoch-8 checkpoint (early stopping at peak val).", correct:true},
          {key:"b", text:"Add dropout 0.1-0.3 in the classification head.", correct:true},
          {key:"c", text:"Add weight decay 0.01 to AdamW.", correct:true},
          {key:"d", text:"Switch optimizer to SGD with momentum=0.9."},
          {key:"e", text:"Increase max_len from 512 to 1024."},
          {key:"f", text:"Reduce training data from 8k to 4k examples."},
          {key:"g", text:"Add LR warmup (500 steps) + linear decay schedule."},
        ]}
        trap={<>(d) and (e) are reflex tweaks that don't address the core issue. (d) SGD vs AdamW is unrelated to the variance gap; AdamW is the standard for transformer fine-tuning. (e) longer sequences don't fix overfit, they consume more compute. (f) is the OPPOSITE of correct — less data amplifies variance. (g) is interesting but actually orthogonal: LR schedule helps stability but a model that overfits at epoch 8 with no schedule will still overfit at epoch 8 with one. The schedule lets you train longer SAFELY but doesn't shrink the gap.</>}
        lens={<>Three correct: <strong>(a) early stopping</strong> is the cheapest fix and you already have the checkpoint. <strong>(b) dropout</strong> adds regularization to the classification head where overfit lives. <strong>(c) weight decay</strong> constrains weight magnitudes globally. These three are the bias-variance variance-reduction toolkit applied to fine-tuning.</>}
        stretch={<>If the val curve weren't diverging but instead was JUST PLATEAUED at 78% while train kept climbing, would the right action change?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <p style={{color: "#475569", marginBottom: 12}}>
        Ranked by what builds intuition fastest. Blog posts first — they often beat the original paper for working understanding.
      </p>
      <ul>
        <li>
          <a href="http://scott.fortmann-roe.com/docs/BiasVariance.html" target="_blank" rel="noopener">
            <strong>Scott Fortmann-Roe — Understanding the Bias-Variance Tradeoff</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(blog, interactive diagrams)</span>
          <br/>The most-cited bias-variance essay on the internet. The interactive bullseye + capacity slider made the concept click for a whole generation. <strong>Start here.</strong>
        </li>
        <li>
          <a href="https://karpathy.github.io/2019/04/25/recipe/" target="_blank" rel="noopener">
            <strong>Andrej Karpathy — A Recipe for Training Neural Networks</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(blog)</span>
          <br/>Practitioner field guide. Karpathy's "overfit first, then regularize" workflow IS the bias-variance tradeoff applied to deep nets — read the "Become one with the data" and "Set up the end-to-end training/evaluation skeleton" sections.
        </li>
        <li>
          <a href="https://www.deeplearningbook.org/contents/ml.html" target="_blank" rel="noopener">
            <strong>Goodfellow, Bengio, Courville — Deep Learning Book, Ch. 5.4</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(textbook, free online)</span>
          <br/>Tight derivation with the deep-learning lens. Reads in 20 min and pairs cleanly with the equation above.
        </li>
        <li>
          <a href="https://www.youtube.com/watch?v=EuBBz3bI-aA" target="_blank" rel="noopener">
            <strong>StatQuest — Bias and Variance, simply explained</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(video, ~6 min)</span>
          <br/>Josh Starmer's whiteboard walkthrough. Best 6 minutes if you have only 6 minutes. Watch at 1.25× speed.
        </li>
        <li>
          <a href="https://arxiv.org/abs/1812.11118" target="_blank" rel="noopener">
            <strong>Belkin, Hsu, Ma, Mandal — Reconciling modern ML practice with the classical bias-variance trade-off</strong>
          </a>{" "}
          <span style={{color:"#64748b", fontSize:14}}>(paper, arXiv / PNAS 2019)</span>

        </li>
      </ul>
    </VIS.Section>
