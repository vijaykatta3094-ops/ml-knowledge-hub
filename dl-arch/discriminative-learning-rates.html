<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Concept explainer: LAYER-WISE (DISCRIMINATIVE) LEARNING RATES.
// Delta: When fine-tuning a pretrained net, use DIFFERENT learning rates PER LAYER GROUP -- SMALL for the early/general
//   layers (to PRESERVE the broadly-useful low-level features) and LARGER for the later/task-specific layers (to ADAPT
//   them to the new task). This is one model trained with a PER-GROUP LR schedule, not one global LR. ULMFiT scales the
//   LR by ~2.6x per layer group (e.g. 1e-5 at the embedding block up to 1e-3 at the classifier head). Gradual unfreezing
//   applies the same idea over TIME (unfreeze top-down, low layers join late). The key, non-obvious bit: a SINGLE LARGE
//   global LR damages the pretrained early features (a form of catastrophic forgetting), while a single SMALL global LR
//   under-adapts the task layers -- discriminative LRs resolve the tension. It is NOT one LR for all layers, the SMALL LR
//   goes on the EARLY (general) layers (not the late ones), and the goal is preserve-vs-adapt, not just faster training.
//   Diagram shows the per-layer-group LR assignment SETUP only.

const App = () => (
  <main style={{ maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65 }}>
    <VIS.Hero
      pill="DL"
      title="Layer-wise (discriminative) learning rates"
      byline={[
        { label: "Topic", value: "Transfer Learning" },
        { label: "Subtopic", value: "Fine-tuning works better with smaller learning rates for early general layers and larger ones for later task-specific layers, preserving low-level features while adapting high-level ones; gradual unfreezing applies this over time" },
      ]} />

    <VIS.TLDR>
      <strong><VIS.Term def="Assigning a different learning rate to each layer group when fine-tuning, rather than one global rate for the whole network.">Discriminative learning rates</VIS.Term> use
      a smaller rate on the early, general layers to preserve their low-level features and a larger rate on the later, task-specific
      layers to adapt them.</strong>{" "}
      <VIS.Term def="ULMFiT: a transfer-learning recipe for text that introduced discriminative fine-tuning, slanted learning-rate schedules, and gradual unfreezing.">ULMFiT</VIS.Term> scales
      the rate by about 2.6 times per layer group &mdash; roughly 1e-5 at the embedding block up to 1e-3 at the classifier head &mdash;
      and <VIS.Term def="Unfreezing layers progressively from the top down over training, so the most task-specific layers adapt first and the general early layers join last.">gradual unfreezing</VIS.Term> applies
      the same idea over time. The failure modes: using one global rate for every layer, putting the small rate on the late layers
      instead of the early ones, thinking the goal is faster training rather than preserve-versus-adapt, and assuming a single large
      rate is safe for the pretrained early features.
    </VIS.TLDR>

    <VIS.Section id="sec-define" title="Beat 1 -- One rate for all, or a rate per layer">
      <p>
        A teammate fine-tunes a pretrained model with one large learning rate everywhere, sees the broadly-useful early features get
        wrecked, and the model end up worse than before. Before reading on, work out why the early and late layers might want different
        learning rates, and which of them should get the smaller one.
      </p>
      <pre style={{ background: "#0f172a", color: "#e2e8f0", padding: 14, borderRadius: 8, overflowX: "auto", fontSize: 13 }}>{`pretrained net, layers grouped early -> late

  EARLY layers  = general (edges, low-level) -> already good
  LATE  layers  = task-specific            -> need adapting

  discriminative LRs:
    early group : SMALL lr (e.g. 1e-5)   -> PRESERVE features
    late  group : LARGE lr (e.g. 1e-3)   -> ADAPT to the task
    ULMFiT: ~2.6x step per group between them

  one global lr: large -> wrecks early features
                 small -> under-adapts late layers

which layers should get the SMALL learning rate?`}</pre>
      <p>
        Contrast a single global rate (either too large for the early features or too small for the late ones) with a per-group
        schedule. Derive why the early general layers want a small rate to be preserved, why the late task-specific layers want a larger
        rate to adapt, and how gradual unfreezing applies the same preserve-versus-adapt idea across training time.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-worked" title="Beat 2 -- Worked example: ULMFiT's per-group schedule">
      <pre style={{ background: "#0f172a", color: "#e2e8f0", padding: 14, borderRadius: 8, overflowX: "auto", fontSize: 13 }}>{`ULMFiT-style schedule, scale ~2.6x per group:

  embedding block   lr = 1e-5    (most general, smallest)
  lower encoder     lr ~ 2.6e-5
  middle encoder    lr ~ 6.8e-5
  upper encoder     lr ~ 1.8e-4
  classifier head   lr = 1e-3    (most task-specific, largest)

gradual unfreezing (over time):
  step 1: unfreeze head only
  step 2: + upper layers
  ...     low layers join LAST

early features preserved (tiny lr) ; head adapts fast (big lr)`}</pre>
      <p>
        ULMFiT assigns each layer group its own rate, scaling by about 2.6 times from the embedding block (around 1e-5, the most
        general and so the smallest rate) up to the classifier head (around 1e-3, the most task-specific and so the largest). The early
        layers barely move, preserving their general features, while the head adapts quickly. Gradual unfreezing layers in the same
        spirit over time: unfreeze the head first, then progressively deeper, so the general early layers are the last to change.
        (Why a single global rate fails at both ends is unpacked in the lenses.)
      </p>
    </VIS.Section>

    <VIS.Section id="sec-contrast" title="Beat 3 -- Global rate vs discriminative rates">
      <table>
        <thead><tr><th>Aspect</th><th>How discriminative learning rates work</th></tr></thead>
        <tbody>
          <tr><td>Early (general) layers</td><td>small rate, to preserve low-level features</td></tr>
          <tr><td>Late (task-specific) layers</td><td>larger rate, to adapt to the new task</td></tr>
          <tr><td>One global large rate</td><td>damages the pretrained early features</td></tr>
          <tr><td>One global small rate</td><td>under-adapts the task-specific late layers</td></tr>
        </tbody>
      </table>
      <VIS.Callout kind="insight" title="Small rate to preserve, large rate to adapt">
        The early layers hold broadly-useful features that are already close to right, so a small learning rate keeps them roughly
        intact; the later layers must specialize to the new task, so a larger rate lets them move. A single global rate cannot serve
        both ends &mdash; large enough to adapt the head, it erodes the pretrained early features; small enough to protect them, it
        leaves the task layers under-adapted. Discriminative rates resolve this by scaling the rate up with depth (ULMFiT's roughly
        2.6 times per group), and gradual unfreezing enacts the same preserve-versus-adapt logic across time.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Drill -- trap problems">
      <p style={{ color: "#475569", marginBottom: 16 }}>
        Every problem hinges on this delta &mdash; <strong>fine-tuning uses a smaller learning rate on early general layers (to
        preserve them) and a larger rate on later task-specific layers (to adapt them); one global rate fails at one end, and gradual
        unfreezing applies the same idea over time.</strong> Commit before revealing the lens.
      </p>

      <h3 style={{ marginTop: 24, color: "#1f3a5f" }}>A. Identity</h3>

      <VIS.TrapProblem
        id="dlr-a1"
        difficulty="medium"
        axis="Identity"
        title="A1 -- What discriminative learning rates are"
        scenario={<>A teammate says "discriminative learning rates means lowering one global rate over the epochs." Pick the statement that correctly defines them.</>}
        diagram={<pre style={{ background: "#0f172a", color: "#e2e8f0", padding: 14, borderRadius: 8, overflowX: "auto", fontSize: 13 }}>{`one rate decayed over time, or a rate PER layer group?
which is "discriminative"?`}</pre>}
        options={[
          { key: "a", text: "A different learning rate per layer group at the same time, scaling up from early to late layers.", correct: true },
          { key: "b", text: "A single global learning rate decayed over the epochs, applied identically to every layer of the network.", correct: false },
          { key: "c", text: "A learning rate that adapts per parameter from its gradient history, the same as an Adam-style optimizer.", correct: false },
          { key: "d", text: "A higher learning rate for layers with more parameters, scaling the rate by each layer's size in weights.", correct: false },
        ]}
        trap={<>(b) that is a global schedule over time, not per-layer rates. (c) per-parameter adaptive rates are the optimizer, a different mechanism. (d) the rate scales with depth/specificity, not parameter count.</>}
        lens={<>Discriminative learning rates assign each layer group its own rate at the same time, scaling up from the early general layers to the later task-specific ones. That differs from decaying one global rate over epochs (a time schedule), from per-parameter adaptive rates inside the optimizer, and from sizing the rate by parameter count. The distinguishing feature is per-group rates that vary with depth.</>}
        stretch={<>How do discriminative rates combine with a global decay schedule, rather than replace it?</>}
      />

      <VIS.TrapProblem
        id="dlr-a2"
        difficulty="medium"
        axis="Identity"
        title="A2 -- Which layers get the small rate"
        scenario={<>A teammate sets the largest learning rate on the embedding block and the smallest on the head, reasoning "the deep general layers need the biggest updates." Pick the statement that correctly assigns the rates.</>}
        diagram={<pre style={{ background: "#0f172a", color: "#e2e8f0", padding: 14, borderRadius: 8, overflowX: "auto", fontSize: 13 }}>{`early/general layers vs late/task-specific layers
which group gets the SMALLER learning rate?`}</pre>}
        options={[
          { key: "a", text: "The early general layers get the smaller rate to preserve them; the late task layers get the larger one.", correct: true },
          { key: "b", text: "The early general layers get the larger rate to adapt them; the late task layers get the smaller one instead.", correct: false },
          { key: "c", text: "Every layer gets the same rate, since splitting the rate by layer adds tuning cost for no real benefit at all.", correct: false },
          { key: "d", text: "The widest layers get the smaller rate, since a bigger weight matrix needs gentler updates than a narrow one.", correct: false },
        ]}
        trap={<>(b) reverses it; the early general layers want the small rate to stay preserved. (c) per-layer rates do help by resolving the preserve-versus-adapt tension. (d) the rate tracks generality/depth, not layer width.</>}
        lens={<>The early, general layers hold broadly-useful features and so get the smaller rate to keep them roughly intact, while the later, task-specific layers get the larger rate to adapt to the new task. Reversing this erodes the general features and barely moves the task layers; one global rate cannot serve both ends; and width is not the criterion. Small rate early, larger rate late.</>}
        stretch={<>Why does the embedding block in particular deserve the very smallest rate?</>}
      />

      <h3 style={{ marginTop: 32, color: "#1f3a5f" }}>B. Application</h3>

      <VIS.TrapProblem
        id="dlr-b1"
        difficulty="medium"
        axis="Application"
        title="B1 -- Fine-tuning loses general features"
        scenario={<>Fine-tuning a pretrained model with one large global rate, you find it adapts the task but its general low-level features degrade. A teammate suggests just lowering the one global rate for every layer. Pick the soundest plan.</>}
        diagram={<pre style={{ background: "#0f172a", color: "#e2e8f0", padding: 14, borderRadius: 8, overflowX: "auto", fontSize: 13 }}>{`one large global lr: task adapts but early features erode
lower it everywhere, or split rates by layer group?`}</pre>}
        options={[
          { key: "a", text: "Use a small rate on early layers and a larger one on late layers, preserving features while still adapting.", correct: true },
          { key: "b", text: "Lower the one global rate for all layers, since a smaller rate everywhere both preserves and adapts fully.", correct: false },
          { key: "c", text: "Raise the one global rate further, since faster updates everywhere reach a better optimum for every layer.", correct: false },
          { key: "d", text: "Freeze every layer including the head, since any update at all is what degrades the pretrained features.", correct: false },
        ]}
        trap={<>(b) a small global rate protects the early features but under-adapts the task layers. (c) a larger global rate erodes the early features even more. (d) freezing the head too means no task adaptation at all.</>}
        lens={<>A single global rate forces one compromise: large enough to adapt the task layers, it erodes the early features; small enough to protect them, it under-adapts the task layers. Discriminative rates break the tie &mdash; small on the early general layers to preserve them, larger on the late layers to adapt them. Lowering or raising one global rate, or freezing everything, each fails at one of the two goals.</>}
        stretch={<>How would gradual unfreezing achieve a similar effect without setting per-group rates explicitly?</>}
      />

      <VIS.TrapProblem
        id="dlr-b2"
        difficulty="hard"
        axis="Application"
        title="B2 -- Setting the per-group rates"
        scenario={<>You adopt an ULMFiT-style schedule and must set rates for embedding, two encoder blocks, and a head. A teammate wants to pick four unrelated rates by hand for each. Pick the soundest plan.</>}
        diagram={<pre style={{ background: "#0f172a", color: "#e2e8f0", padding: 14, borderRadius: 8, overflowX: "auto", fontSize: 13 }}>{`head lr = base ; scale DOWN by ~2.6x per group toward early
embedding gets the smallest -- ad hoc, or a fixed ratio?`}</pre>}
        options={[
          { key: "a", text: "Anchor the head rate, then divide by a fixed factor (about 2.6) per group down to the embedding block.", correct: true },
          { key: "b", text: "Pick four independent rates by hand, since each layer group's rate is unrelated to its neighbours' rates.", correct: false },
          { key: "c", text: "Set the embedding rate highest and divide downward toward the head, since deep layers need the largest steps.", correct: false },
          { key: "d", text: "Give all four groups one shared rate, since once you unfreeze layers the per-group rate no longer matters.", correct: false },

        lens={<>The ULMFiT recipe anchors the rate at the task head and divides by a fixed factor (about 2.6) per group moving toward the embedding, so the general early layers get the smallest rate. This gives a principled monotone schedule rather than four hand-picked values, keeps the largest rate on the task-specific head (not the embedding), and the per-group rates remain essential even after layers are unfrozen.</>}
        stretch={<>Why a geometric (multiplicative) decay across groups rather than a linear one?</>}

      <h3 style={{ marginTop: 32, color: "#1f3a5f" }}>C. Mechanism</h3>

      <VIS.TrapProblem
        id="dlr-c1"

        diagram={<pre style={{ background: "#0f172a", color: "#e2e8f0", padding: 14, borderRadius: 8, overflowX: "auto", fontSize: 13 }}>{`early layers sit near a good pretrained optimum

what happens to the general features?`}</pre>}
        options={[
          { key: "a", text: "Large steps push the well-placed early weights off their good optimum, erasing the general features learned.", correct: true },

        lens={<>The early layers already sit near a good optimum from pretraining, so large update steps driven by noisy target gradients push their well-placed weights away from it, erasing the general features &mdash; a form of catastrophic forgetting. A large rate does not gently speed them to the same place, does not shrink their gradients, and the rate affects every layer's updates, not just the head's. That is why the early layers need a small rate.</>}
        stretch={<>How does this mechanism connect to the idea of catastrophic forgetting in continual learning?</>}
      />

      <h3 style={{ marginTop: 32, color: "#1f3a5f" }}>D. Intuition</h3>

      <VIS.TrapProblem
        id="dlr-d1"
        difficulty="hard"
        axis="Intuition"
        title="D1 -- Lowering one rate is not enough"
        scenario={<>Two teammates fix the eroded-features problem differently: one lowers the single global rate, the other puts a small rate early and a large rate late. The first expects to match the second. Predict the non-obvious outcome.</>}
        diagram={<pre style={{ background: "#0f172a", color: "#e2e8f0", padding: 14, borderRadius: 8, overflowX: "auto", fontSize: 13 }}>{`fix A: one small global lr ; fix B: small early + large late
which preserves features AND adapts the task layers?`}</pre>}
        options={[
          { key: "a", text: "The split-rate fix adapts the task layers better, since the small global rate under-trains those late layers.", correct: true },
          { key: "b", text: "The two fixes are equivalent, since lowering the global rate already protects every layer the same amount.", correct: false },
          { key: "c", text: "The small global rate wins, since one consistent rate across layers is always more stable than mixed rates.", correct: false },
          { key: "d", text: "Both fail equally, since once the early features erode no learning-rate scheme can recover the lost accuracy.", correct: false },
        ]}
        trap={<>(b) a small global rate protects the early layers but starves the task layers of adaptation; not equivalent. (c) mixed rates are stable and intentionally adapt the head faster. (d) the split-rate scheme does succeed; the premise is not unrecoverable.</>}
        lens={<>Lowering the single global rate does protect the early features, but it also under-trains the task-specific late layers, so the model adapts poorly. The split-rate scheme keeps the small rate on the early layers and a larger rate on the late ones, preserving features and adapting the task at once. The counterintuitive part is that the safer-looking uniform-small rate loses on the task layers; one rate cannot optimize both ends, which is exactly the gap discriminative rates close.</>}
        stretch={<>What symptom would distinguish under-adapted task layers from eroded early features?</>}
      />

      <h3 style={{ marginTop: 32, color: "#1f3a5f" }}>E. Operations</h3>

      <VIS.TrapProblem
        id="dlr-e1"
        difficulty="medium"
        axis="Operations"
        title="E1 -- Gradual unfreezing in practice"
        scenario={<>You apply gradual unfreezing and a teammate plans to unfreeze the earliest (embedding) layers first and the head last. Pick the soundest operational order.</>}
        diagram={<pre style={{ background: "#0f172a", color: "#e2e8f0", padding: 14, borderRadius: 8, overflowX: "auto", fontSize: 13 }}>{`gradual unfreezing order over training:
top-down (head first) or bottom-up (embedding first)?`}</pre>}
        options={[
          { key: "a", text: "Unfreeze the head first and add deeper layers over time, so the general early layers change last of all.", correct: true },
          { key: "b", text: "Unfreeze the embedding first and add later layers over time, so the general early layers change first of all.", correct: false },
          { key: "c", text: "Unfreeze every layer at once from the start, since staging the unfreezing only slows training for no benefit.", correct: false },
          { key: "d", text: "Unfreeze only the middle layers and leave both the head and the embedding frozen for the whole training run.", correct: false },
        ]}
        trap={<>(b) inverts the order; the general embedding should change last, not first. (c) unfreezing all at once risks eroding early features early, which staging avoids. (d) leaving the head frozen prevents task adaptation entirely.</>}
        lens={<>Gradual unfreezing goes top-down: unfreeze the task-specific head first, then progressively deeper layers, so the general early layers are the last to move and stay protected longest. Unfreezing the embedding first exposes the general features to disruption early, unfreezing everything at once discards the staging benefit, and leaving the head frozen blocks adaptation. The order mirrors the discriminative-rate logic across time.</>}
        stretch={<>How does the unfreezing order interact with the per-group learning rates you set?</>}
      />

      <h3 style={{ marginTop: 32, color: "#1f3a5f" }}>F. Failure modes</h3>

      <VIS.TrapProblem
        id="dlr-f1"
        difficulty="hard"
        axis="Failure modes"
        title="F1 -- Pretrained model ends up worse"
        scenario={<>A teammate fine-tuned a strong pretrained model with one large global rate and ended up below the from-scratch baseline on general inputs. They conclude pretraining did not help. Pick the correct diagnosis.</>}
        diagram={<pre style={{ background: "#0f172a", color: "#e2e8f0", padding: 14, borderRadius: 8, overflowX: "auto", fontSize: 13 }}>{`one large global lr on all layers
result: worse than from-scratch on general inputs
what did the large rate do to the early features?`}</pre>}
        options={[
          { key: "a", text: "The large global rate erased the pretrained early features, so the model lost its general-input advantage.", correct: true },
          { key: "b", text: "Pretraining genuinely did not help here, so any fine-tuning recipe would land below the from-scratch baseline.", correct: false },
          { key: "c", text: "The model needed more epochs, so longer training at the same large global rate would have recovered the edge.", correct: false },
          { key: "d", text: "The from-scratch baseline was overfit, so the pretrained model is actually better despite the lower score.", correct: false },
        ]}
        trap={<>(b) pretraining did help; the large rate destroyed the benefit, which discriminative rates would have kept. (c) more epochs at the same harmful rate keep eroding the early features. (d) the measured drop on general inputs reflects lost features, not a baseline artifact.</>}
        lens={<>A single large global rate drove big updates through the early layers, pushing their well-placed pretrained weights off their optimum and erasing the general features &mdash; so the model fell below the from-scratch baseline on general inputs. Pretraining did help; the recipe squandered it. More epochs at the same rate worsen the erosion, and the result is not a baseline artifact. The fix is discriminative rates: a small rate on the early layers preserves exactly those features.</>}
        stretch={<>What metric would you track per layer group to catch this erosion during training?</>}
      />
