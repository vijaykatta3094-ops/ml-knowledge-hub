<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// MCAR / MAR / MNAR — row 16 — fingerprint: mcar-mar-mnar-taxonomy
const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="ML Fund · Concept"
      title="MCAR / MAR / MNAR — missingness taxonomy"
      subtitle={<>Three regimes for <VIS.Term def="The pattern by which entries are absent from a dataset, modelled as a random indicator R that is 1 when a value is observed and 0 when it is missing.">missingness</VIS.Term>. The label you assign decides whether <VIS.Term def="Filling in absent entries with a model-derived guess so downstream estimators can use the row. Mean, median, KNN, MICE, and IterativeImputer are common choices.">imputation</VIS.Term> is honest or quietly biased.</>}
      byline={[
        {label: "L2", value: "Missing data"},
        {label: "L3", value: "MCAR/MAR/MNAR"},
        {label: "Origin", value: "Rubin 1976"},
      ]}/>

    <VIS.TLDR>
      <strong>MCAR</strong> — <VIS.Term def="Missing Completely At Random: the missingness indicator R is statistically independent of every variable in the dataset, observed or unobserved.">missingness independent of everything</VIS.Term> (a random row drop). Drop or mean-impute is fine; estimators stay unbiased.{" "}
      <strong>MAR</strong> — <VIS.Term def="Missing At Random: missingness depends on OTHER observed features but not on the missing value itself, after conditioning on what you can see.">depends only on observed features</VIS.Term> (e.g., older respondents skip income). Model-based imputation conditioned on those features recovers unbiased estimates.{" "}
      <strong>MNAR</strong> — <VIS.Term def="Missing Not At Random: missingness depends on the missing value itself, even after conditioning on every observed feature. No data-only fix exists.">depends on the missing value itself</VIS.Term> (high earners refuse to report income). <VIS.Term def="The systematic shift introduced when the imputed values do not reflect the true distribution of the missing values, e.g., a downward-biased income mean.">Imputation is biased</VIS.Term> no matter the method — fix the collection process or model the missingness explicitly.
    </VIS.TLDR>

    <VIS.Section id="sec-decide" title="The decision tree">
      <VIS.Mermaid chart={`
flowchart TD
  Q1{"Does missingness depend on anything in your data?"}
  Q1 -->|No, pure random| MCAR["MCAR — Missing Completely At Random. Drop or mean-impute is fine"]
  Q1 -->|Yes| Q2{"Does it depend on the MISSING value itself?"}
  Q2 -->|No, depends on OTHER observed features| MAR["MAR — Missing At Random. Use model-based imputation: KNN, MICE, IterativeImputer"]
  Q2 -->|Yes, biased away from certain values| MNAR["MNAR — Missing Not At Random. Imputation is biased. Fix collection or model the missingness"]
  style MCAR fill:#dcfce7,stroke:#16a34a
  style MAR fill:#fef9c3,stroke:#d97706
  style MNAR fill:#fee2e2,stroke:#dc2626
      `}/>
      <p>
        The split is about the conditioning set. MCAR conditions on nothing, MAR conditions on what you observe, MNAR requires conditioning on what you cannot see. <VIS.Term def="Donald Rubin's 1976 paper that formalized the MCAR/MAR/MNAR distinction in terms of the joint distribution of data and missingness indicators.">Rubin 1976</VIS.Term> defined this in terms of the joint distribution P(X, R); the label is a statement about that joint, not about the marginal rate of missingness.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-examples" title="Concrete examples — pin down the regime">
      <VIS.Callout kind="info" title="MCAR — survey skipped a page">
        Some respondents skipped page 3 due to a printing error. Missingness has nothing to do with the answers themselves nor any covariate. Drop those rows or impute the column mean — your estimators stay honest.
      </VIS.Callout>
      <VIS.Callout kind="info" title="MAR — older respondents skip income">
        Older people more often refuse to answer income. You DO observe age. So missing-income depends on age (observed) but not on income itself, conditional on age. <VIS.Term def="Multivariate Imputation by Chained Equations: iteratively regresses each missing column on the others, draws stochastic samples, and produces M completed datasets you average over.">MICE</VIS.Term> conditioned on age recovers unbiased estimates.
      </VIS.Callout>
      <VIS.Callout kind="gotcha" title="MNAR — high earners refuse to answer">
        Missingness is correlated with the value itself. The income mean computed from observed rows is biased downward. No data-only imputation fixes this — you need an outside reference (census tables) or an explicit <VIS.Term def="A joint model for both the data X and the missingness indicator R, e.g., a Heckman selection model or pattern-mixture model, that lets you correct for non-ignorable missingness.">selection model</VIS.Term>.
      </VIS.Callout>
      <VIS.Callout kind="info" title="Trick: missingness as a feature">
        Regardless of regime, adding <code>is_missing_X</code> as a binary feature often lifts model performance — the model learns directly that the missingness pattern itself is signal. This is a <VIS.Term def="An indicator engineered from the missingness pattern itself (e.g., is_income_missing = 1), exposing the pattern to the downstream model rather than hiding it inside imputation.">missingness flag</VIS.Term>, sometimes called the <em>indicator method</em>.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-mech" title="What each regime breaks">
      <p>
        Under MCAR, the observed sample is a <VIS.Term def="A subset that is statistically indistinguishable from the full dataset; the missingness mechanism does not select on any feature.">uniform random subsample</VIS.Term> of the population. Means, variances, and regression coefficients computed on observed rows are <VIS.Term def="An estimator whose expected value equals the true population quantity; the average over many random samples lands on the right answer.">unbiased</VIS.Term> — only variance grows because the effective sample shrinks.
      </p>
      <p>
        Under MAR, marginal estimators (e.g., the raw column mean) ARE biased — older people are over-represented among observed-income rows. But the conditional distribution P(income | age) is preserved, so you can <VIS.Term def="An estimator that, after adjustment for observed covariates, equals the population value despite differential missingness within strata.">condition</VIS.Term> on age and recover unbiased estimates. This is what model-based imputation actually does.
      </p>
      <p>
        Under MNAR, even the conditional distribution P(income | age, ...) on observed rows differs from the truth — high earners are missing within every age stratum. The joint P(income, R) cannot be recovered from observed data alone. This regime is also called <VIS.Term def="A missingness mechanism where R cannot be ignored when fitting models on X; you must jointly model X and R or supply external information about the missingness process.">non-ignorable missingness</VIS.Term>.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-tools" title="Which imputer matches which regime">
      <p>
        <strong>MCAR.</strong> <VIS.Term def="Replace each missing entry with the column mean, median, or mode computed on observed rows. Variance is understated downstream because every imputed value lies on a single point.">Mean / median imputation</VIS.Term>, <VIS.Term def="Drop every row that has any missing entry; the simplest analysis strategy. Unbiased under MCAR, biased under MAR or MNAR.">complete-case analysis</VIS.Term>, or simple deletion — all unbiased. Choose based on sample-size cost.
      </p>
      <p>
        <strong>MAR.</strong> <VIS.Term def="K-Nearest-Neighbors imputation: fill the missing entry with the average of the K closest observed rows in feature space. Captures local conditional structure but scales poorly.">KNN imputation</VIS.Term>, MICE, scikit-learn's <VIS.Term def="A sklearn imputer that models each feature with missing values as a function of the others in a round-robin fashion; the multi-output regression backbone for MICE-style imputation.">IterativeImputer</VIS.Term>, or any conditional-mean regression. The key is that the imputer's feature set must include every observed covariate the missingness depends on.
      </p>
      <p>
        <strong>MNAR.</strong> Data-only imputation is biased. You need a Heckman <VIS.Term def="A two-stage econometric model that fits a probit for the selection (missingness) and then corrects the outcome regression for the resulting selection bias.">selection model</VIS.Term>, a <VIS.Term def="A model class that factorizes P(X, R) by the missingness pattern R, fitting a different distribution of X in each pattern and then averaging by pattern weights.">pattern-mixture model</VIS.Term>, or external auxiliary data. <VIS.Term def="A controlled study of how your conclusions move as you vary the assumed strength of MNAR; cannot prove the regime but bounds how badly imputation could mislead you.">Sensitivity analysis</VIS.Term> over plausible missingness strengths is the honest fallback.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-tests" title="Can you test which regime you are in?">
      <p>
        Partially. <VIS.Term def="A chi-squared test (Little 1988) for the null that data are MCAR vs the alternative MAR. Rejects when observed-row means differ across missingness patterns.">Little's MCAR test</VIS.Term> can reject MCAR but cannot distinguish MAR from MNAR — the latter requires the very values you don't have. Practically, you stratify observed columns and look for differential rates of missingness in the target column; finding any reduces you to MAR-or-MNAR.
      </p>
      <p>
        The MAR-vs-MNAR boundary is fundamentally an <VIS.Term def="A modeling choice that the data cannot adjudicate — you must justify it with domain knowledge or an external reference. The MAR-vs-MNAR distinction is the canonical untestable assumption in missing-data theory.">untestable assumption</VIS.Term>. You argue for one based on domain knowledge: do you have reason to believe missingness depends only on what you see? If not, treat MNAR as live and plan a sensitivity analysis.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Test yourself — concept drill">
      <p style={{color:"#475569", marginBottom: 16}}>
        Twenty-five trap problems spanning identity, mechanism, diagnostics, imputation choice, downstream bias, and failure modes. Each wrong option is a real-but-wrong belief held by someone at about 80% understanding; the correct option is also a single belief. Reveal the lens to see the mechanism.
      </p>

      <VIS.TrapProblem
        id="mcar-q1"
        difficulty="medium"
        title="Q1 — What exactly is MCAR a statement about?"
        scenario={<><em>Discriminating insight:</em> what object in the joint distribution is required to be independent for the MCAR label to hold? You are reviewing a data audit memo that claims the dataset is MCAR.</>}
        options={[
          {key:"a", text:"MCAR means the missing values themselves are uniformly distributed across the column's support, so a uniform draw is a sensible imputer."},
          {key:"b", text:"MCAR means each row has the same rate of missingness, so the column-level proportion of nulls is constant across subgroups."},
          {key:"c", text:"MCAR means the missingness indicator R is statistically independent of every variable, observed and unobserved, in the dataset.", correct:true},
          {key:"d", text:"MCAR means the missing values are independent of one another across rows, so imputing each row separately is valid without joint modeling."},
        ]}
        trap={<>(a) confuses the distribution of values with the distribution of indicators. (b) describes a marginal symmetry but misses the conditional independence required. (d) describes row-wise independence, which is a different (and weaker) condition.</>}
        lens={<>MCAR is a statement about P(R | X) — the probability of being missing given the data. MCAR says P(R | X) = P(R), period. The missingness indicator R is independent of every variable in the dataset, observed or unobserved.</>}
        stretch={<>What weaker condition would let you call missingness "MAR" instead of MCAR?</>}
      />

      <VIS.TrapProblem
        id="mcar-q2"
        difficulty="medium"
        title="Q2 — Older respondents skip 'income' more often, age is fully observed. Regime?"
        scenario={<><em>Discriminating insight:</em> what determines whether missingness on income depends on income itself versus on observed covariates? You are classifying a survey dataset where age is fully observed.</>}
        options={[
          {key:"a", text:"MCAR, because the skipping behavior is consistent across the whole survey and there is no evidence that income values themselves drive the skip."},
          {key:"b", text:"MAR, because the missingness depends on age (observed) but not on income itself given age; conditioning on age recovers unbiased estimates.", correct:true},
          {key:"c", text:"MNAR, because the missingness depends on a demographic characteristic of the respondent rather than being purely random across rows."},
          {key:"d", text:"MAR only if age perfectly predicts income; otherwise the residual income-conditional-on-age dependence makes this MNAR."},
        ]}
        trap={<>(a) misses the age-driven dependence and is the classic MCAR over-claim. (c) confuses "depends on a covariate" with "depends on the missing value itself." (d) overstates MAR's requirement — MAR only requires independence GIVEN observed covariates.</>}
        lens={<>MAR's defining clause: P(R | X_obs, X_mis) = P(R | X_obs). Here R depends on age (observed) and is independent of income (missing) given age. Conditioning on age in your imputer is enough.</>}
        stretch={<>What would have to be true for the same scenario to flip to MNAR?</>}
      />

      <VIS.TrapProblem
        id="mcar-q3"
        difficulty="medium"
        title="Q3 — High earners refuse to answer income. Regime?"
        scenario={<><em>Discriminating insight:</em> what makes the missingness depend on the unobserved value? You are reviewing self-reported income data.</>}
        options={[
          {key:"a", text:"MAR, because refusal is a behavior that depends on personality characteristics, which a multivariate imputer can capture from other observed columns."},
          {key:"b", text:"MCAR, because refusal is voluntary and unpredictable from any observed feature; treat as random."},
          {key:"c", text:"MNAR, because missingness depends on the income value itself even after conditioning on every observed covariate; data-only imputation is biased.", correct:true},
          {key:"d", text:"MAR, because the income column has a fixed support and the imputer can model the truncation at the upper tail by adding a censoring indicator."},
        ]}
        trap={<>(a) confuses MAR (depends on observed) with MNAR (depends on unobserved). (b) is the naive MCAR claim. (d) describes Tobit-style censoring with an observed cutoff, which is a special MNAR you CAN model — but only with that extra structure.</>}
        lens={<>The defining clue: "high earners" — missingness is a function of the value of income itself. Even within every age, education, and occupation stratum, observed incomes are systematically lower than the truth. No covariate-conditional imputer can fix this from the data alone.</>}
        stretch={<>If a census tabulation of population income is available, how do you use it to debias your sample mean?</>}
      />

      <VIS.TrapProblem
        id="mcar-q4"
        difficulty="medium"
        title="Q4 — Mean imputation on an MCAR column. What is biased?"
        scenario={<><em>Discriminating insight:</em> which statistic is preserved versus distorted by mean imputation? You are running a quick descriptive stats pass.</>}
        options={[
          {key:"a", text:"Mean is biased downward and variance is preserved because each imputed value is replaced by the central tendency, leaving spread intact."},
          {key:"b", text:"Mean is preserved but variance and covariances are distorted downward because every imputed value sits on a single point with zero spread.", correct:true},
          {key:"c", text:"Both mean and variance are preserved because the column's missing rows were drawn uniformly at random and mean imputation matches that distribution."},
          {key:"d", text:"Mean is preserved and variance is inflated because imputed values cluster at the mean and create extra mass at one point that boosts second moments."},
        ]}
        trap={<>(a) inverts mean and variance. (c) is the over-strong MCAR claim — even under MCAR, mean imputation distorts second moments. (d) gets the variance direction wrong; clustering at the mean shrinks variance, doesn't grow it.</>}
        lens={<>Under MCAR, mean imputation preserves the column mean but understates variance (zero contribution from imputed rows) and biases covariances toward zero. This is why multiple imputation exists — to restore the second-moment variance.</>}
        stretch={<>How does multiple imputation restore the variance that mean imputation deletes?</>}
      />

      <VIS.TrapProblem
        id="mcar-q5"
        difficulty="hard"
        title="Q5 — Complete-case analysis under MAR. What goes wrong?"
        scenario={<><em>Discriminating insight:</em> what kind of estimator becomes biased when you drop incomplete rows under MAR? You are doing a quick "drop the nulls" pass before regression.</>}
        options={[
          {key:"a", text:"Nothing — complete-case analysis is unbiased under MAR because conditioning on the observed predictors removes the missingness dependence."},
          {key:"b", text:"Marginal means of the missing column are biased because the observed rows are over-represented by subgroups with lower missingness rates.", correct:true},
          {key:"c", text:"Variances are biased upward because complete-case analysis discards information and the remaining rows are no longer representative."},
          {key:"d", text:"Only the regression intercept is biased; the slope coefficients remain unbiased under MAR by the Gauss-Markov property."},
        ]}
        trap={<>(a) is a common over-claim — complete-case is unbiased under MCAR, not MAR. (c) confuses variance direction. (d) confuses MAR with a stronger Gauss-Markov-like guarantee that does not exist.</>}
        lens={<>Under MAR, observed rows have a different covariate distribution than the population. Marginal estimators (means, raw histograms) are biased. Conditional regression with the MAR-driver columns as predictors can still be unbiased — but you must include them.</>}
        stretch={<>If the MAR driver is omitted from your regression, what kind of bias emerges?</>}
      />

      <VIS.TrapProblem
        id="mcar-q6"
        difficulty="hard"
        title="Q6 — Little's MCAR test rejects. What can you conclude?"
        scenario={<><em>Discriminating insight:</em> what does rejecting the MCAR null actually tell you about MAR vs MNAR? You ran Little's test and p &lt; 0.001.</>}
        options={[
          {key:"a", text:"The data are MNAR because rejection of MCAR plus the lack of an alternative explanation forces the conclusion that missingness depends on unobserved values."},
          {key:"b", text:"The data are MAR because Little's test rejects MCAR and the alternative hypothesis is exactly MAR by construction of the test."},
          {key:"c", text:"You can only conclude that the data are not MCAR; the test cannot distinguish MAR from MNAR because MNAR depends on unobserved quantities.", correct:true},
          {key:"d", text:"The test is unreliable when sample size is small; with n &lt; 1000 the rejection should be discarded as a false positive."},
        ]}
        trap={<>(a) and (b) both jump from "not MCAR" to a specific alternative; the test cannot do that. (d) is a fabricated sample-size cutoff.</>}
        lens={<>Little's test compares means across missingness patterns. Rejection rules out MCAR but is consistent with both MAR and MNAR. The MAR-vs-MNAR question is fundamentally untestable from data alone; argue it from domain knowledge.</>}
        stretch={<>What domain evidence would you collect to argue for MAR rather than MNAR after a Little rejection?</>}
      />

      <VIS.TrapProblem
        id="mcar-q7"
        difficulty="medium"
        title="Q7 — Multiple imputation under MNAR. Does it fix the bias?"
        scenario={<><em>Discriminating insight:</em> what assumption does multiple imputation rely on that MNAR violates? You read a paper using MICE on a clearly MNAR column.</>}
        options={[
          {key:"a", text:"Yes — multiple imputation averages over uncertainty in the missing values, which corrects any bias regardless of the underlying missingness mechanism."},
          {key:"b", text:"No — multiple imputation conditions on observed covariates; under MNAR the missing values depend on themselves, so the imputation model is misspecified.", correct:true},
          {key:"c", text:"Yes — multiple imputation includes a missingness indicator by construction, which absorbs MNAR dependence and produces unbiased estimates."},
          {key:"d", text:"No — multiple imputation requires the dataset to be MCAR; MAR and MNAR both produce biased estimates from MICE."},
        ]}
        trap={<>(a) overstates what MI does — uncertainty quantification ≠ MNAR correction. (c) invents an automatic-MNAR fix that does not exist. (d) understates MI — it works fine under MAR.</>}
        lens={<>MI assumes MAR by default. Under MNAR, the conditional distribution it samples from is wrong (it lacks the dependence on the missing value itself). You need pattern-mixture or selection models — explicit MNAR specifications — for MI to be unbiased.</>}
        stretch={<>How does a pattern-mixture extension to MI specifically encode MNAR dependence?</>}
      />

      <VIS.TrapProblem
        id="mcar-q8"
        difficulty="medium"
        title="Q8 — KNN imputer with K=5 on an MAR column. What must you include?"
        scenario={<><em>Discriminating insight:</em> what feature set must the KNN distance metric include for the imputer to be unbiased? You are building a KNNImputer pipeline on a tabular dataset.</>}
        options={[
          {key:"a", text:"Only columns with no missing values themselves; otherwise the distance metric is undefined for some neighbor candidates."},
          {key:"b", text:"All observed columns that drive the missingness mechanism for the target column; missing those columns leaves residual MAR dependence unmodeled.", correct:true},
          {key:"c", text:"Only the target column's lagged or temporally adjacent observations because KNN should respect the order of the data."},
          {key:"d", text:"Every column in the dataset regardless of relevance because KNN's curse-of-dimensionality penalty is automatically handled by sklearn."},
        ]}
        trap={<>(a) confuses operational constraints with statistical requirements. (c) describes time-series-only intuition. (d) ignores the curse of dimensionality and adds irrelevant noise to the distance metric.</>}
        lens={<>For MAR-correct imputation you must include the columns that drive missingness in the imputer's feature set. Omitting them leaves a residual MNAR-like bias inside an MAR scenario. This is the imputer-feature-set rule that gets violated most often in practice.</>}
        stretch={<>What happens when you include a column that drives missingness AND is itself missing in many of the same rows?</>}
      />

      <VIS.TrapProblem
        id="mcar-q9"
        difficulty="hard"
        title="Q9 — Adding is_missing_X as a feature. When does this break under MAR?"
        scenario={<><em>Discriminating insight:</em> what assumption does the indicator-method trick make about the relationship between missingness and the outcome? You are debating whether to use the indicator method on an MAR column.</>}
        options={[
          {key:"a", text:"It never breaks because is_missing_X is just another feature and the model can learn any pattern it represents."},
          {key:"b", text:"It breaks when the missingness is uninformative about the outcome but correlated with another included predictor, creating spurious feature importance."},
          {key:"c", text:"It introduces bias in regression coefficients on the imputed column when missingness depends on other features that also affect the outcome — the indicator absorbs variance that belongs to those features.", correct:true},
          {key:"d", text:"It breaks only when the dataset is MNAR because the indicator cannot represent dependence on the unobserved value itself."},
        ]}
        trap={<>(a) is the naive "more features always helps" view. (b) gets the symptom direction wrong — collinearity, not spurious importance. (d) restricts the failure mode to MNAR, missing the MAR subtle case.</>}
        lens={<>Under MAR, the indicator is correlated with the MAR-driving covariates. If those covariates also affect the outcome, the indicator and the driver compete for the same explanatory variance, biasing both coefficients. For prediction this often still helps; for interpretation it doesn't.</>}
        stretch={<>For a pure prediction model where coefficients don't matter, is the indicator method always a win?</>}
      />

      <VIS.TrapProblem
        id="mcar-q10"
        difficulty="medium"
        title="Q10 — A column is 80% missing. Should you impute or drop the column?"
        scenario={<><em>Discriminating insight:</em> what considerations determine whether a high-missingness column has more signal than noise? You are pruning columns before a modeling pass.</>}
        options={[
          {key:"a", text:"Always drop columns above 50% missingness; imputation noise dominates any remaining signal beyond that threshold."},
          {key:"b", text:"Always keep and impute because dropping a column discards rows worth of information that could have helped predict the target."},
          {key:"c", text:"Depends on the missingness regime, the observed-row signal strength, and whether the missingness itself encodes useful information; no fixed threshold applies.", correct:true},
          {key:"d", text:"Drop unless the column is MCAR; the high missingness rate amplifies bias under MAR or MNAR to unusable levels."},
        ]}
        trap={<>(a) and (d) propose fixed thresholds that ignore signal strength. (b) ignores the noise cost of high imputation rates.</>}
        lens={<>No threshold applies universally. A 95%-missing column with strong signal in the observed rows plus a useful missingness indicator can still win. Conversely a 30%-missing column with no signal is dead weight. Decide on validation metric, not on a rule of thumb.</>}
        stretch={<>What validation procedure would you run to decide impute-vs-drop honestly?</>}
      />

      <VIS.TrapProblem
        id="mcar-q11"
        difficulty="hard"
        title="Q11 — IterativeImputer convergence. What does it converge to under MAR?"
        scenario={<><em>Discriminating insight:</em> what fixed point does the round-robin regression sequence approach? You are tuning the max_iter parameter of sklearn's IterativeImputer.</>}
        options={[
          {key:"a", text:"It converges to the maximum-likelihood completion of the dataset under the assumed conditional-regression model, which is unbiased under MAR if the model class is correct.", correct:true},
          {key:"b", text:"It converges to whatever stationary distribution the random initial seed lands in; multiple runs give different completions of equal validity."},
          {key:"c", text:"It does not converge in general; max_iter is a stopping rule rather than a convergence guarantee and the imputations should be averaged across iterations."},
          {key:"d", text:"It converges to the column means because the iterative regression effectively averages residuals around the mean of each column at every step."},
        ]}
        trap={<>(b) overstates initialization sensitivity. (c) is partly true (no strict guarantee) but misses the point that under correct specification it does converge in expectation. (d) is a fabricated mean-collapse story.</>}
        lens={<>Under correct model specification and MAR, IterativeImputer is a Gibbs-sampler-like iteration that converges to draws from the joint conditional distribution — equivalently, MICE. Under model misspecification (e.g., true relation is nonlinear, regressor is linear), the fixed point is biased even under MAR.</>}
        stretch={<>What sklearn knob lets you swap in a tree-based regressor for nonlinear MAR drivers?</>}
      />

      <VIS.TrapProblem
        id="mcar-q12"
        difficulty="medium"
        title="Q12 — MNAR-by-truncation: top earners report 'over $200k'. Which model?"
        scenario={<><em>Discriminating insight:</em> what model class handles right-censoring where the threshold is observed? You see a survey income column with explicit top-coded rows.</>}
        options={[
          {key:"a", text:"Mean imputation is fine because the top-coded indicator carries the information and the imputation choice doesn't affect downstream regression."},
          {key:"b", text:"Tobit regression or a censored-likelihood model uses the observed threshold to recover unbiased estimates; this is MNAR-but-tractable because the censoring rule is known.", correct:true},
          {key:"c", text:"Multiple imputation with MICE is sufficient because the threshold acts as an observed covariate that MICE conditions on automatically."},
          {key:"d", text:"You must drop the top-coded rows because the MNAR mechanism cannot be modeled without external income data from the census."},
        ]}
        trap={<>(a) ignores the structure. (c) overstates what MICE captures — MICE assumes MAR and doesn't naturally encode a known censoring threshold. (d) is too pessimistic — this is the case where MNAR IS tractable.</>}
        lens={<>This is MNAR-with-known-mechanism (top-coding/truncation). Tobit and other censored-likelihood models exploit the observed threshold to write down the correct likelihood. It's the textbook case of "MNAR you can fix" because you know the rule.</>}
        stretch={<>How does Tobit differ from a Heckman selection model for this case?</>}
      />

      <VIS.TrapProblem
        id="mcar-q13"
        difficulty="medium"
        title="Q13 — Train/test split with missingness. Where does the imputer fit?"
        scenario={<><em>Discriminating insight:</em> what leakage rule applies to imputers? You are setting up a sklearn pipeline with KNNImputer and a downstream classifier.</>}
        options={[
          {key:"a", text:"Fit the imputer on train+test combined to give it the most information; this is allowed because imputation is unsupervised."},
          {key:"b", text:"Fit the imputer on train only and transform train and test separately; fitting on test leaks test-distribution information into the training fold.", correct:true},
          {key:"c", text:"Fit a separate imputer on each fold of cross-validation and average the imputed values across folds to reduce variance."},
          {key:"d", text:"Fit the imputer on test only because the test distribution is the deployment distribution and the training imputer would otherwise drift."},
        ]}
        trap={<>(a) is the classic leakage mistake. (c) is over-engineered and biases imputations toward the average fold. (d) is backwards.</>}
        lens={<>Imputers are estimators with fit/transform semantics. Fit on train only — exactly the same rule as a StandardScaler or any preprocessor. sklearn Pipeline enforces this automatically; manual loops are where the leak appears.</>}
        stretch={<>How does sklearn's ColumnTransformer help avoid this kind of leakage when only some columns need imputation?</>}
      />

      <VIS.TrapProblem
        id="mcar-q14"
        difficulty="hard"
        title="Q14 — Tree models and missingness. Do you still need an imputer?"
        scenario={<><em>Discriminating insight:</em> what tree-model property makes some imputation unnecessary? You are choosing between XGBoost and a linear model for a high-missingness tabular task.</>}
        options={[
          {key:"a", text:"Yes, always — every model class requires imputed inputs and tree models simply throw an error when given NaNs."},
          {key:"b", text:"No — modern GBM implementations (XGBoost, LightGBM, CatBoost) handle NaNs natively by learning a default split direction at each node from the data.", correct:true},
          {key:"c", text:"No — tree models implicitly impute with the column median during fitting, so no preprocessing is needed but the median assumption may bias the result."},
          {key:"d", text:"Yes — although tree models accept NaNs syntactically, the resulting splits are biased toward the majority direction and produce unreliable feature importances."},
        ]}
        trap={<>(a) is factually wrong for modern GBMs. (c) fabricates an implicit-median story. (d) overstates the bias.</>}
        lens={<>XGBoost/LGBM/CatBoost learn a default direction at each split: when a feature is missing, the row is routed in whichever direction minimizes loss on the training set. This is a built-in MNAR-aware mechanism: the model can effectively learn missingness-as-feature for free. Imputing first often hurts.</>}
        stretch={<>Does this trick handle MNAR or only MAR? Why?</>}
      />

      <VIS.TrapProblem
        id="mcar-q15"
        difficulty="medium"
        title="Q15 — Variance estimation after multiple imputation. Rubin's rules give what?"
        scenario={<><em>Discriminating insight:</em> what variance is captured by averaging M completed datasets that single imputation misses? You are reporting standard errors from a MICE analysis with M=20.</>}
        options={[
          {key:"a", text:"The within-imputation variance averaged across the M datasets; between-imputation variance is implicit and need not be added separately."},
          {key:"b", text:"The total variance equals within-imputation variance plus a between-imputation variance correction that captures uncertainty in the imputations themselves.", correct:true},
          {key:"c", text:"The between-imputation variance only; the within-imputation variance is identical across M and can be computed from a single completed dataset."},
          {key:"d", text:"The square root of M times the within-imputation variance; the M scaling absorbs the imputation uncertainty by Jensen's inequality."},
        ]}
        trap={<>(a) misses the between-imputation correction — Rubin's whole point. (c) inverts the components. (d) fabricates a sqrt(M) law.</>}
        lens={<>Rubin's rules: total variance = average within-imputation variance + (1 + 1/M) × between-imputation variance. The between term captures uncertainty in WHICH imputations you drew. Single imputation reports only the within term and understates uncertainty.</>}
        stretch={<>How does M trade off against computational cost in practice — what value is typical?</>}
      />

      <VIS.TrapProblem
        id="mcar-q16"
        difficulty="hard"
        title="Q16 — Mean imputation under MCAR. Does it bias the regression slope?"
        scenario={<><em>Discriminating insight:</em> what happens to the OLS slope when you mean-impute a predictor under MCAR? You see a regression coefficient drop in magnitude after imputation.</>}
        options={[
          {key:"a", text:"No — mean imputation under MCAR preserves all moments and OLS slopes are unbiased and identical to the complete-case slope."},
          {key:"b", text:"Yes — the slope on the imputed predictor attenuates toward zero because mean imputation reduces its variance while leaving covariance with the outcome unchanged.", correct:true},
          {key:"c", text:"Yes — the slope on the imputed predictor inflates because the imputed values cluster at a single point, creating a high-leverage cluster."},
          {key:"d", text:"No — mean imputation has no effect on the slope direction; it only shifts the intercept by the imputation mean times the slope."},
        ]}
        trap={<>(a) is the over-strong MCAR claim. (c) gets the direction wrong. (d) is a related-but-different statement about the intercept.</>}
        lens={<>OLS slope on X = Cov(X,Y) / Var(X). Mean imputation shrinks Var(X) toward the complete-case variance scaled by the observed fraction, AND shrinks Cov(X,Y) since imputed rows contribute zero covariance. The net effect: attenuation toward zero — the classic attenuation bias.</>}
        stretch={<>How does MICE avoid this attenuation while single mean imputation cannot?</>}
      />

      <VIS.TrapProblem
        id="mcar-q17"
        difficulty="medium"
        title="Q17 — Survivorship in clinical trials. Which regime?"
        scenario={<><em>Discriminating insight:</em> patients who feel worse drop out of follow-up before the 12-month visit. What is the missingness regime for the 12-month outcome? You are designing the analysis plan for a clinical study.</>}
        options={[
          {key:"a", text:"MCAR, because dropout is a behavioral event that is approximately random across patients with respect to the outcome being measured."},
          {key:"b", text:"MAR, because the dropout depends on intermediate symptoms which can be measured at the 6-month visit and used as covariates."},
          {key:"c", text:"MNAR with respect to the 12-month outcome because dropout depends on how the patient is currently doing — which the 12-month outcome would measure.", correct:true},
          {key:"d", text:"MAR if randomization to treatment is preserved; treatment assignment as an observed covariate is sufficient to break the missingness dependence."},
        ]}
        trap={<>(a) is the textbook over-claim. (b) is true only if 6-month symptoms fully mediate the dropout — usually not. (d) overstates what randomization protects against post-baseline.</>}
        lens={<>If patients drop out because of how they are doing AT the missing visit, the missingness depends on the missing value itself. This is canonical MNAR. Trials use joint models (shared-parameter models) or sensitivity analyses; treating it as MAR understates treatment effect uncertainty.</>}
        stretch={<>What is a tipping-point sensitivity analysis and why is it the standard pharma response?</>}
      />

      <VIS.TrapProblem
        id="mcar-q18"
        difficulty="hard"
        title="Q18 — Categorical column missing. How does most-frequent imputation interact with MAR?"
        scenario={<><em>Discriminating insight:</em> what happens to the marginal distribution of a categorical column after mode imputation under MAR? You are imputing a country column where missingness correlates with another feature.</>}
        options={[
          {key:"a", text:"Mode imputation under MAR preserves the marginal distribution by construction because the mode is the most representative category."},
          {key:"b", text:"Mode imputation under MAR concentrates mass on the majority category, biasing the marginal distribution and any downstream classifier that uses the column as a feature.", correct:true},
          {key:"c", text:"Mode imputation under MAR is statistically identical to multiple imputation when M=1 and the imputation model is the empirical mode."},
          {key:"d", text:"Mode imputation under MAR introduces no bias in classification problems because trees and random forests are invariant to category proportions."},
        ]}
        trap={<>(a) overstates mode imputation. (c) confuses M=1 MI with mode imputation. (d) makes a false invariance claim — tree splits ARE affected by category proportions.</>}
        lens={<>Mode imputation collapses the missing-mass onto the single majority category. Under MAR (and even MCAR), this distorts the marginal AND collapses any signal carried by other categories that should have been imputed. Conditional-mode or stochastic-category imputation respects the conditional distribution.</>}
        stretch={<>How would you stochastically impute a category column to preserve its distribution under MAR?</>}
      />

      <VIS.TrapProblem
        id="mcar-q19"
        difficulty="medium"
        title="Q19 — Time-series with sensor dropouts. Forward-fill — what does it assume?"
        scenario={<><em>Discriminating insight:</em> what missingness story does forward-fill implicitly model? You are imputing a sensor stream with dropouts.</>}
        options={[
          {key:"a", text:"Forward-fill assumes the missing value equals the most recent observed value — appropriate when the signal is locally constant or the dropout duration is short.", correct:true},
          {key:"b", text:"Forward-fill assumes MCAR by construction because it doesn't condition on any covariate, only on the column's own history."},
          {key:"c", text:"Forward-fill assumes the missing value equals the time-series mean; it is equivalent to mean imputation with a windowed mean estimator."},
          {key:"d", text:"Forward-fill is unbiased under MAR if the time series is stationary, and biased only under MNAR or non-stationarity."},
        ]}
        trap={<>(b) confuses unconditional with MCAR. (c) misrepresents what forward-fill computes. (d) overclaims unbiasedness.</>}
        lens={<>Forward-fill is "last observation carried forward." It assumes local constancy of the signal — appropriate for slow-moving sensors with short gaps. For long gaps or fast-moving signals it imputes a stale value. The implicit model is a step function; smarter alternatives are linear interpolation or a Kalman filter.</>}
        stretch={<>When does a Kalman filter clearly beat forward-fill for sensor imputation?</>}
      />

      <VIS.TrapProblem
        id="mcar-q20"
        difficulty="hard"
        title="Q20 — Production drift: imputation strategy changes between train and serve. What breaks?"
        scenario={<><em>Discriminating insight:</em> what kind of train/serve skew is introduced when the serving pipeline uses live medians while training used train-set medians? You inherit a production system and notice an accuracy drop.</>}
        options={[
          {key:"a", text:"Nothing breaks if the serving distribution is stable; the imputer is a deterministic transform that doesn't propagate train/serve skew."},
          {key:"b", text:"Feature distributions shift between train and serve because the imputed values differ; downstream models built on training-time imputed features see out-of-distribution serving inputs.", correct:true},
          {key:"c", text:"The model overfits to the training imputation because the live imputer adds noise that regularizes serving but not training."},
          {key:"d", text:"Calibration of the model's predicted probabilities drifts but accuracy itself is preserved because imputation only affects the magnitude of features, not the rank order."},
        ]}
        trap={<>(a) is the naive "deterministic = safe" view. (c) gets the regularization direction backwards. (d) makes a false rank-preservation claim.</>}
        lens={<>The imputer is part of the model. Different imputers at train vs serve are train/serve skew. Fix: persist the fitted imputer (sklearn pickle, feature store) and reuse the same object in both pipelines. Recompute only on a retraining cadence.</>}
        stretch={<>How would a feature store help enforce this discipline across multiple downstream models?</>}
      />

      <VIS.TrapProblem
        id="mcar-q21"
        difficulty="medium"
        title="Q21 — Synthetic missingness for testing. Which mechanism mirrors MNAR?"
        scenario={<><em>Discriminating insight:</em> how do you synthetically drop values to mimic MNAR? You are running a robustness sweep on an imputer benchmark.</>}
        options={[
          {key:"a", text:"Drop each value with probability proportional to a Bernoulli draw independent of every column — this matches MCAR by construction."},
          {key:"b", text:"Drop values where another observed covariate exceeds a threshold — this matches MAR because missingness depends on observed features."},
          {key:"c", text:"Drop values where the target column itself exceeds a threshold — this matches MNAR because missingness depends on the value being dropped.", correct:true},
          {key:"d", text:"Drop entire rows uniformly at random — this matches MAR because rows are a function of all their features."},
        ]}
        trap={<>(a) and (b) describe MCAR and MAR correctly but aren't MNAR. (d) confuses row-wise dropping (MCAR) with MAR.</>}
        lens={<>The clean recipe: MCAR = drop independently of X; MAR = drop based on an observed column; MNAR = drop based on the column being dropped itself (or on a column you then hide). Standard imputer benchmarks (e.g., Rubin's original simulations) use exactly this taxonomy.</>}
        stretch={<>How would you simulate a "softly MNAR" regime where the dependence on the missing value is partial?</>}
      />

      <VIS.TrapProblem
        id="mcar-q22"
        difficulty="hard"
        title="Q22 — Heckman selection model. What does the inverse Mills ratio do?"
        scenario={<><em>Discriminating insight:</em> what term does the Heckman correction add to the outcome regression to debias under MNAR? You are reading an econometrics paper that applies Heckman to a wage-equation problem.</>}
        options={[
          {key:"a", text:"The inverse Mills ratio is a regularization penalty added to the outcome regression that shrinks coefficients toward zero in proportion to selection strength."},
          {key:"b", text:"The inverse Mills ratio is the ratio of the standard normal PDF to its CDF evaluated at the selection-equation linear predictor; added as a regressor, it absorbs the selection-induced bias.", correct:true},
          {key:"c", text:"The inverse Mills ratio is the reciprocal of the observed-row sample size, used to inflate standard errors in the second-stage regression."},
          {key:"d", text:"The inverse Mills ratio reweights observations by the inverse propensity of being observed; it is identical to inverse-probability weighting in spirit."},
        ]}
        trap={<>(a) and (c) fabricate roles. (d) confuses Heckman with inverse-probability weighting — both target selection bias but they're different mathematical objects.</>}
        lens={<>Heckman's two-stage: (1) probit for selection, (2) outcome regression with an added regressor λ = φ(Zγ)/Φ(Zγ) — the inverse Mills ratio at the probit's linear predictor. The new coefficient absorbs the conditional-mean-of-error-given-selection that creates MNAR bias.</>}
        stretch={<>What identification assumption (the exclusion restriction) does Heckman require to work?</>}
      />

      <VIS.TrapProblem
        id="mcar-q23"
        difficulty="medium"
        title="Q23 — Multiple imputation with M=3 vs M=50. What changes?"
        scenario={<><em>Discriminating insight:</em> what statistic stabilizes as M grows? You are choosing M for a MICE run with a tight compute budget.</>}
        options={[
          {key:"a", text:"Both the point estimate and the variance estimate stabilize linearly in M; M=50 is fifty-fold more accurate than M=1."},
          {key:"b", text:"Only the point estimate stabilizes with M; the variance estimate is exact at M=2 because Rubin's variance formula uses pairwise differences."},
          {key:"c", text:"Both stabilize but at different rates: the point estimate stabilizes quickly (M≈5 often suffices), the variance estimate needs larger M (often M≥20) for reliable standard errors.", correct:true},
          {key:"d", text:"Neither stabilizes — multiple imputation is inherently stochastic and arbitrary M gives arbitrary results; you should use single imputation with a deterministic seed."},
        ]}
        trap={<>(a) overstates linearity. (b) fabricates an exact-at-M=2 result. (d) is the conservative-but-wrong "don't use it" position.</>}
        lens={<>The point estimate is the average of M completed-data estimates — it stabilizes fast. The variance estimate combines within and between components; the between-component is itself a variance estimate over M draws and needs more samples to be reliable. M=20-50 is typical for inference; M=5 can be fine if you only need a point estimate.</>}
        stretch={<>How does Rubin's "relative efficiency" formula quantify the M-vs-precision tradeoff?</>}
      />

      <VIS.TrapProblem
        id="mcar-q24"
        difficulty="hard"
        title="Q24 — Auxiliary variables in MICE. Why include columns you don't need in the analysis?"
        scenario={<><em>Discriminating insight:</em> what role does an auxiliary variable play in the MICE imputation model that it does not play in the substantive analysis model? You are deciding whether to include extra columns in the MICE feature set.</>}
        options={[
          {key:"a", text:"Auxiliary variables stabilize convergence of the iterative imputation loop without affecting the imputed values themselves."},
          {key:"b", text:"Auxiliary variables strengthen the MAR assumption by capturing more drivers of missingness; if they correlate with both the missing values and the missingness indicator, they reduce residual MNAR-like bias.", correct:true},
          {key:"c", text:"Auxiliary variables increase sample size by allowing rows with missing analysis-model columns to still inform the imputation; this is the only role they play."},
          {key:"d", text:"Auxiliary variables decorrelate the imputation residuals with the analysis-model residuals; this is required for Rubin's variance formula to hold."},
        ]}
        trap={<>(a) understates their role. (c) gets one mechanism but misses the main one. (d) fabricates a decorrelation requirement.</>}
        lens={<>Auxiliary variables (predictors used in MICE but not in the final analysis) help make the MAR assumption more plausible by capturing more of the missingness mechanism. Even a weakly correlated auxiliary can move you from "borderline MNAR" toward "defensibly MAR." Including them is nearly always a free win.</>}
        stretch={<>How might you choose auxiliary variables when you have dozens of candidates? Any selection rule?</>}
      />

      <VIS.TrapProblem
        id="mcar-q25"
        difficulty="hard"
        title="Q25 — A senior engineer says 'the dataset is MAR.' What is the strongest pushback?"
        scenario={<><em>Discriminating insight:</em> what is the deepest epistemological gap in any MAR claim? A teammate confidently labels a production dataset as MAR after running Little's test.</>}
        options={[
          {key:"a", text:"Little's test cannot reject MCAR with high power on small samples; the MAR label is statistically unfounded without first ruling out MCAR with a larger sample."},
          {key:"b", text:"MAR vs MNAR is an untestable assumption from observed data alone; the claim must be defended by a domain argument that missingness depends only on what you see.", correct:true},
          {key:"c", text:"MAR is too strong a label for any real dataset because real missingness mechanisms always have some residual MNAR component."},
          {key:"d", text:"MAR is meaningful only in research datasets; production pipelines have ETL-driven missingness that violates the regime-classification framework."},
        ]}
        trap={<>(a) makes a power argument but doesn't reach the deeper untestability point. (c) is too philosophical and unhelpful. (d) gives up on the framework rather than using it.</>}
        lens={<>The MAR-vs-MNAR distinction depends on the joint of observed and unobserved values; you cannot test it from observed data. Defending an MAR label requires a causal/domain story: "we believe missingness is driven by these observed columns and nothing else." If you cannot articulate that, treat MNAR as live and plan a sensitivity analysis.</>}
        stretch={<>What does a tipping-point sensitivity analysis tell you about MNAR robustness?</>}
      />
    </VIS.Section>
  </main>
