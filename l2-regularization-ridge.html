<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// L2 regularization (Ridge) — row 6 — fingerprint: l2-regularization-ridge

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px"}}>
    <VIS.Hero pill="ML Fund" title="L2 regularization (Ridge)"
      subtitle={<>The default <VIS.Term def="A modification to the loss that discourages large weights, trading a bit of training fit for better generalization.">regularization</VIS.Term> penalty for linear and deep models — shrinks every{" "}
      <VIS.Term def="A learned scalar weight w_j that multiplies feature x_j inside a linear model; the vector of all coefficients is the parameter w.">coefficient</VIS.Term>{" "}
      smoothly toward zero without ever quite getting there. Common knobs include the strength α and whether the{" "}
      <VIS.Term def="Constant offset b in y = wᵀx + b. By convention not penalized by L2 (regularizing it would bias predictions away from the mean of y).">intercept</VIS.Term>{" "}
      is penalized.</>}
      byline={[{label:"L2",value:"Regularization"},{label:"L3",value:"L2"},{label:"Origin",value:"Tikhonov / Hoerl 1970"}]}/>
    <VIS.TLDR>
      L2 adds <code>α·Σw²</code> to the loss. The squared{" "}
      <VIS.Term def="A term added to the loss whose role is to discourage certain solutions (here: large weights).">penalty</VIS.Term>{" "}
      pulls every weight smoothly toward zero but almost never to exactly zero — distributed{" "}
      <VIS.Term def="Pulling estimated coefficients toward a baseline (usually zero), trading a little bias for a lot of variance reduction.">shrinkage</VIS.Term>{" "}
      rather than{" "}
      <VIS.Term def="Property that many coefficients are exactly zero, so the model implicitly drops those features.">sparsity</VIS.Term>.
      Equivalent under{" "}
      <VIS.Term def="Maximum a Posteriori estimation. Pick the parameters that maximize posterior probability under a chosen prior.">MAP estimation</VIS.Term>{" "}
      to a{" "}
      <VIS.Term def="A prior probability distribution over parameters expressing beliefs before seeing data; combined with the likelihood gives the posterior.">prior</VIS.Term>{" "}
      Gaussian on the weights.
    </VIS.TLDR>
    <VIS.Section id="sec-math" title="The penalty">
      <VIS.Equation display tex="\mathcal{L}_{\text{L2}}(w) \;=\; \mathcal{L}_{\text{fit}}(w) \;+\; \alpha \sum_{j=1}^{d} w_j^2"/>
      <p>
        The squared term penalizes large weights disproportionately more than small ones — so L2 spreads coefficient mass evenly across correlated columns rather than concentrating it on one. Geometrically the{" "}
        <VIS.Term def="The feasible region of weights with penalty bounded by t; bounds how large weights can grow. The shape of this region drives sparsity vs shrinkage.">constraint region</VIS.Term>{" "}
        <code>Σw² ≤ t</code> is a smooth ball with{" "}
        <VIS.Term def="Points on a constraint surface where one of the coordinates is zero. L1's diamond has corners on the axes; L2's ball has none.">no corners</VIS.Term>, so the optimum lands on its{" "}
        <VIS.Term def="A set of weights at which the loss takes a constant value; in 2D these are concentric ellipses around the OLS solution.">loss contour</VIS.Term>{" "}
        but rarely on an axis. Equivalent under{" "}
        <VIS.Term def="Statistical framing where each weight has a prior probability distribution, and learning updates that prior given data. Bayesian linear regression with a zero-mean Gaussian prior gives Ridge.">Bayesian framing</VIS.Term>{" "}
        to a zero-mean{" "}
        <VIS.Term def="The normal distribution. Acting as a prior on weights, it expresses 'small weights more likely than large'; mathematically equivalent to an L2 penalty.">Gaussian prior</VIS.Term>{" "}
        on weights — the negative log of which is exactly the <code>w²</code> term. The{" "}
        <VIS.Term def="A scalar that controls how strong the penalty is relative to the data-fit term. Larger means more shrinkage.">strength α</VIS.Term>{" "}
        is the lone hyperparameter; conventional practice picks it via{" "}
        <VIS.Term def="Holding out part of the training data K times to estimate generalization error before any final test-set evaluation.">cross-validation</VIS.Term>.
      </p>
    </VIS.Section>
    <VIS.Section id="sec-when" title="When to use L2">
      <VIS.Mermaid chart={`
flowchart TD
  Q{"Features mostly informative?"}
  Q -->|Yes — every column carries some signal| L2["Use L2<br/>(Ridge) — smooth shrinkage"]
  Q -->|No — most features are noise| L1["Use L1<br/>(Lasso) — drop the dead ones"]
  Q -->|Mixed / correlated| EN["Use Elastic Net<br/>(α·L1 + (1-α)·L2)"]
  style L2 fill:#dbeafe,stroke:#2563eb
  style L1 fill:#fef9c3,stroke:#d97706
  style EN fill:#dcfce7,stroke:#16a34a
      `}/>
      <p>L2 is the default in most{" "}
      <VIS.Term def="Frameworks like PyTorch, JAX, TensorFlow where optimizers expose a 'weight_decay' argument that implements an L2-style pull on parameters.">deep-learning frameworks</VIS.Term>{" "}
      under the alias{" "}
      <VIS.Term def="The deep-learning name for L2 regularization. Every step, weights are multiplied by (1 - α·η) before the gradient update — they 'decay' toward zero.">weight decay</VIS.Term>.
      It is especially well-suited when features are{" "}
      <VIS.Term def="Two or more input features are highly correlated. The design matrix becomes near-singular and OLS estimates explode in magnitude with opposite signs.">multicollinear</VIS.Term>{" "}
      because the squared penalty splits the shared signal across{" "}
      <VIS.Term def="Feature columns that are highly correlated (often near-linearly dependent). They inflate OLS variance and motivate Ridge or PCA.">collinear columns</VIS.Term>{" "}
      rather than arbitrarily picking one. Under{" "}
      <VIS.Term def="Adam optimizer with decoupled weight decay; default optimizer for transformer training.">AdamW</VIS.Term>{" "}
      the decay is applied directly to the parameter rather than via the loss gradient, which the original Adam paper conflated.</p>
    </VIS.Section>
    <VIS.Section id="sec-mechanics" title="Solver mechanics">
      <VIS.Callout kind="info" title="Closed-form for linear regression">
        Ridge has an exact{" "}
        <VIS.Term def="A solution expressible as a finite algebraic formula, with no iterative optimization required.">closed-form solution</VIS.Term>:{" "}
        <code>w* = (XᵀX + αI)⁻¹Xᵀy</code>. The <code>+αI</code> on the diagonal of the{" "}
        <VIS.Term def="The matrix XᵀX appearing in the OLS closed form. Its eigen-spectrum decides whether OLS is well-conditioned; multicollinear features make it near-singular.">normal-equation matrix</VIS.Term>{" "}
        is the same trick that makes Ridge numerically stable when ordinary{" "}
        <VIS.Term def="Ordinary Least Squares. Minimize squared residuals with no penalty; the closed form is (XᵀX)⁻¹Xᵀy, which fails when XᵀX is singular.">OLS</VIS.Term>{" "}
        would break (no inverse exists for near-singular <code>XᵀX</code>). Shrinkage acts per{" "}
        <VIS.Term def="A direction in feature space whose vectors are scaled (not rotated) by XᵀX; the corresponding scaling factor is the eigenvalue.">eigenvector</VIS.Term>{" "}
        of <code>XᵀX</code> by factor λᵢ/(λᵢ+α), so directions with large{" "}
        <VIS.Term def="The scaling factor associated with an eigenvector; large eigenvalue = strong signal in that direction.">eigenvalue</VIS.Term>{" "}
        barely move while low-signal directions get squeezed hard.
      </VIS.Callout>
      <VIS.Callout kind="gotcha" title="L2 ≠ feature selection">
        Coefficients shrink but stay nonzero, so L2 does not produce a feature shortlist. If you need a smaller deployed model for{" "}
        <VIS.Term def="The time between when an input arrives and when the model returns a prediction; usually budgeted at the p99 tail.">inference latency</VIS.Term>, reach for L1 — or train with L2 then prune small weights as a post-hoc step. The smooth{" "}
        <VIS.Term def="A function whose graph holds water — any line segment between two points on it stays above the graph. Has a unique global minimum (no local traps).">convex</VIS.Term>{" "}
        loss landscape of L2 is also its operational advantage: every optimizer converges to the same minimum regardless of init. Practically this means tools like{" "}
        <VIS.Term def="Generalized Cross-Validation. Closed-form approximation to leave-one-out CV using the trace of the influence (hat) matrix; cheap to evaluate per α.">GCV</VIS.Term>{" "}
        let you sweep α at near-zero cost.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-drill" title="Test yourself — concept drill">
      <p style={{color:"#475569", marginBottom: 16}}>
        Twenty-five interview-grade trap problems. Each decoy is a real-but-wrong belief held by someone with 80% understanding. Coverage skews toward mechanism (why the{" "}
        <VIS.Term def="Geometric region of an L2 budget Σw²≤t. Smooth, round, no axis-aligned corners — the root cause of L2's smooth-shrinkage behavior.">L2 ball</VIS.Term>{" "}
        has no corners) and application (when L2 beats{" "}
        <VIS.Term def="The L1 penalty α·Σ|w|. Produces sparse coefficients because its diamond-shaped constraint region has corners on the axes.">Lasso</VIS.Term>).
      </p>

      <VIS.TrapProblem
        id="l2-q1"
        difficulty="medium"
        title="Why does L2 shrink weights smoothly toward zero while almost always keeping them strictly positive?"
        scenario={<><em>Discriminating insight:</em> the shape of the constraint region. Imagine the L2 budget as a region in weight space and ask where the loss contour first touches it.</>}
        options={[
          {key:"a", text:"The region Σw²≤t is a smooth ball; the loss contour generically touches its surface at a non-axis point, so both weights stay nonzero.", correct:true},
          {key:"b", text:"L2 uses gradient descent with momentum, which physically prevents any weight from settling at exactly zero in finite time."},
          {key:"c", text:"The penalty α·Σw² has subgradients only at zero, trapping the optimizer arbitrarily close to but always above zero on each axis."},
          {key:"d", text:"L2 weights are floored at machine epsilon by the solver to avoid numerical division-by-zero downstream."},
        ]}
        trap={<>(b) confuses the optimizer with the geometry — the result is intrinsic to the penalty, not the solver. (c) is backwards: |w| has subgradient issues at zero, w² is smoothly differentiable everywhere. (d) is invented — real solvers do no such thing.</>}
        lens={<>The level set Σw²≤t is a Euclidean ball, perfectly round. The ellipsoidal loss contour touches the ball at the closest point — generically off the axes. With no corners on the ball, there is no geometric reason for an optimum coordinate to land at exactly zero. L1's diamond has corners on the axes; L2's circle does not.</>}
        stretch={<>What happens to the touch point as α→∞?</>}
      />

      <VIS.TrapProblem
        id="l2-q2"
        difficulty="medium"
        title="A team has 200 features, almost all weakly informative. Which regularizer is the natural first choice?"
        scenario={<><em>Discriminating insight:</em> match the regularizer to the signal-density assumption. Ask which penalty matches a 'most features carry some signal' world.</>}
        options={[
          {key:"a", text:"L1 alone — it will drop the weakest features and produce a deployable sparse model with minimal accuracy loss."},
          {key:"b", text:"Elastic Net with α=0.9 — almost-pure L1 gives the cleanest interpretable subset with a touch of L2 stability."},
          {key:"c", text:"Skip regularization — with 200 weakly-informative features the problem already has low variance."},
          {key:"d", text:"L2 — when most features carry signal, smooth shrinkage preserves all of them while controlling their magnitude.", correct:true},
        ]}
        trap={<>(a) is the L1 reflex applied to the wrong regime; killing weak-but-real features hurts when the signal is distributed. (b) inherits L1's selection behavior. (c) ignores that 'weak' features still produce variance when summed.</>}
        lens={<>L2 is the right default when the analyst believes most features contribute a little. It splits weight across them rather than picking one. L1 thrives in the opposite world: many features are pure noise and only a handful matter.</>}
        stretch={<>How does your answer shift if 195 of the 200 features are pure noise?</>}
      />

      <VIS.TrapProblem
        id="l2-q3"
        difficulty="hard"
        title="Why is the Ridge closed form (XᵀX + αI)⁻¹Xᵀy numerically stable when OLS fails?"
        scenario={<><em>Discriminating insight:</em> the eigenvalues of the matrix being inverted. Track what +αI does to the spectrum of XᵀX.</>}
        options={[
          {key:"a", text:"+αI shifts every eigenvalue of XᵀX up by α, so the smallest eigenvalue is bounded away from zero and the condition number falls.", correct:true},
          {key:"b", text:"+αI orthogonalizes the columns of X so the resulting matrix is diagonal and trivially invertible."},
          {key:"c", text:"+αI replaces the Moore-Penrose pseudoinverse with a true inverse only when X is square."},
          {key:"d", text:"+αI subtracts the rank-deficient component of XᵀX, restoring full rank by Gaussian elimination."},
        ]}
        trap={<>(b) is false: +αI does not orthogonalize columns, it shifts eigenvalues. (c) confuses the stability story with a square-vs-rectangular distinction that does not apply. (d) describes a different (and incorrect) intervention.</>}
        lens={<>If XᵀX has eigenvalues λᵢ, then XᵀX + αI has eigenvalues λᵢ + α. The smallest eigenvalue moves from possibly zero to at least α, so the condition number κ = λ_max/λ_min stays bounded. That bounded κ is what gives Ridge its numerical resilience against multicollinearity.</>}
        stretch={<>What is the condition number of Ridge in the limit α→∞?</>}
      />

      <VIS.TrapProblem
        id="l2-q4"
        difficulty="medium"
        title="Two features are nearly identical. What does L2 do with their coefficients?"
        scenario={<><em>Discriminating insight:</em> the squared penalty's preference between (1,0) and (0.5,0.5). Compute Σw² for each.</>}
        options={[
          {key:"a", text:"Picks one feature and zeros the other, since the second adds no marginal signal under a redundant column."},
          {key:"b", text:"Assigns the full weight to whichever feature has lower index, since ties are broken alphabetically by the solver."},
          {key:"c", text:"Returns NaN until one of the two collinear columns is dropped manually before re-running the fit."},
          {key:"d", text:"Splits the weight roughly equally across both, because (0.5,0.5) has lower Σw² than (1,0) for the same prediction.", correct:true},
        ]}
        trap={<>(a) is L1's behavior, attributed to L2. (b) is invented. (c) describes OLS without regularization; the +αI shift prevents that pathology under L2.</>}
        lens={<>For the same fitted output, Σw² = 0.5² + 0.5² = 0.5 beats 1² + 0² = 1. L2 prefers equal splits across correlated features — coefficient-sharing — while L1 picks one and zeros the other. This is the most important practical difference at inference time.</>}
        stretch={<>Why does this property make L2 unsuitable for feature selection?</>}
      />

      <VIS.TrapProblem
        id="l2-q5"
        difficulty="hard"
        title="The Bayesian view: which prior does the L2 penalty correspond to under MAP estimation?"
        scenario={<><em>Discriminating insight:</em> take the negative log of a prior and see which one yields α·Σw². The exponent of the prior IS the penalty term.</>}
        options={[
          {key:"a", text:"A Laplace prior with scale 1/α — its log-density is proportional to |w|."},
          {key:"b", text:"A uniform prior on a hypercube — its log-density is constant inside and -∞ outside."},
          {key:"c", text:"A zero-mean Gaussian prior with variance 1/(2α) — its log-density is proportional to -w².", correct:true},
          {key:"d", text:"A Cauchy prior with location 0 and scale α — heavy tails encourage shrinkage of small weights only."},
        ]}
        trap={<>(a) is L1's prior, not L2's. (b) does not depend on w so cannot produce a w² penalty. (d) is heavy-tailed and would give a non-quadratic penalty.</>}
        lens={<>Negative log of N(0, σ²) is proportional to w²/(2σ²). Setting σ² = 1/(2α) recovers α·w² exactly. L2 = MAP under a Gaussian prior; L1 = MAP under a Laplace prior. Different prior, different geometry, different selection behavior.</>}
        stretch={<>What would you call MAP under no prior at all?</>}
      />

      <VIS.TrapProblem
        id="l2-q6"
        difficulty="medium"
        title="A junior says 'with large enough α, L2 will set most weights to exactly zero — that is how it does selection.' Where does this claim break?"
        scenario={<><em>Discriminating insight:</em> what is the L2 solution at finite α vs in the limit α→∞? Examine the closed form coordinate by coordinate.</>}
        options={[
          {key:"a", text:"The claim is correct in practice — Ridge with cross-validated α does select features by zeroing out the weakest coefficients."},
          {key:"b", text:"L2 zeros weights only when α is exactly equal to the largest eigenvalue of XᵀX, which the CV grid usually skips by accident."},
          {key:"c", text:"The closed form w* = (XᵀX + αI)⁻¹Xᵀy shrinks every coordinate smoothly; weights only approach zero in the limit α→∞ and stay strictly positive at finite α.", correct:true},
          {key:"d", text:"L2 zeros only the intercept term at high α; the slope coefficients on the features stay nonzero across all α."},
        ]}
        trap={<>(a) attributes L1's behavior to L2 — the most common confusion this skill tests. (b) is invented. (d) is invented; α typically does not regularize the intercept at all.</>}
        lens={<>From (XᵀX + αI)⁻¹Xᵀy, as α grows each coordinate scales toward zero by roughly 1/(λᵢ + α), but stays nonzero at any finite α. 'Most weights exactly zero' is the geometric signature of L1's diamond corners, not L2's smooth ball.</>}
        stretch={<>What does the limit α→∞ look like in terms of the predicted ŷ?</>}
      />

      <VIS.TrapProblem
        id="l2-q7"
        difficulty="hard"
        title="Why is L2's optimization landscape friendlier than L1's at the origin?"
        scenario={<><em>Discriminating insight:</em> differentiability of the penalty term at zero. Compare ∂(w²)/∂w and ∂(|w|)/∂w around w=0.</>}
        options={[
          {key:"a", text:"L2 is convex while L1 is non-convex, so only L2 has a unique global minimum and a well-defined gradient direction."},
          {key:"b", text:"L2 uses second-order methods automatically; L1 is restricted to first-order solvers by construction of the |·| penalty."},
          {key:"c", text:"L1's diamond geometry makes its loss surface fractal at corners, requiring specialized fractal-aware solvers to converge."},
          {key:"d", text:"L2's penalty w² is smoothly differentiable everywhere including zero, so vanilla gradient descent converges with no subgradient handling.", correct:true},
        ]}
        trap={<>(a) is false — both penalties are convex. (b) is invented; solvers are a choice, not a constraint of the penalty. (c) is colorful nonsense — L1's corners are kinks, not fractals.</>}
        lens={<>The squared penalty has derivative 2w everywhere, including at w=0. The absolute-value penalty has a kink at zero with subgradient in [-1, 1], so gradient descent oscillates near zero unless you use subgradient or proximal methods. L2 stays friendly to any optimizer; L1 needs care at the origin.</>}
        stretch={<>Name one solver designed specifically for L1's kink.</>}
      />

      <VIS.TrapProblem
        id="l2-q8"
        difficulty="medium"
        title="When you double α in Ridge, what happens to every fitted coefficient (approximately)?"
        scenario={<><em>Discriminating insight:</em> the closed form (XᵀX + αI)⁻¹Xᵀy as a smooth function of α. Use eigendecomposition to track each coordinate.</>}
        options={[
          {key:"a", text:"Every coefficient halves exactly, by linearity of the Ridge closed-form solution."},
          {key:"b", text:"Coefficients in directions of large eigenvalues barely move; those in small-eigenvalue directions shrink the most.", correct:true},
          {key:"c", text:"All coefficients shift by the same additive amount, equal to α divided by the number of training rows."},
          {key:"d", text:"Half the coefficients drop to exactly zero on the doubled α; the other half stay unchanged as they were."},
        ]}
        trap={<>(a) is the naive 'doubling α doubles shrinkage' reflex but ignores that shrinkage acts per-eigenvalue: factor λᵢ/(λᵢ+α). (c) confuses additive with multiplicative shrinkage. (d) describes L1's behavior.</>}
        lens={<>In the principal-component basis of XᵀX, Ridge shrinks the i-th component by factor λᵢ/(λᵢ+α). High-signal directions (large λᵢ) shrink barely; low-signal directions (small λᵢ) shrink a lot. This is why L2 implicitly down-weights noisy directions without dropping them.</>}
        stretch={<>How does this connect to principal-component regression?</>}
      />

      <VIS.TrapProblem
        id="l2-q9"
        difficulty="medium"
        title="A claim: 'L2's closed-form solution only exists when features are normalized to unit variance.' True or false?"
        scenario={<><em>Discriminating insight:</em> what does (XᵀX + αI) need to be invertible — anything about feature scale?</>}
        options={[
          {key:"a", text:"True — without normalization XᵀX is singular and the inverse fails to exist for the closed form."},
          {key:"b", text:"True — α is defined as a fraction of feature variance and undefined when features are on arbitrary scales."},
          {key:"c", text:"False — the closed form always exists for α>0; feature scale only affects how α trades off across features.", correct:true},
          {key:"d", text:"False, but only because modern solvers silently re-normalize features internally before inverting the matrix."},
        ]}
        trap={<>(a) is the 'normalize-or-die' reflex applied to the wrong concept. (b) invents a definition of α. (d) makes the right conclusion for the wrong reason — solvers do not silently rescale.</>}
        lens={<>The +αI shift guarantees invertibility for any α>0 regardless of scale. Normalization matters for a practical reason — without it, a feature measured in meters and one in millimeters get wildly different effective penalties — but it is not a condition for the closed form to exist.</>}
        stretch={<>If you forgot to normalize, would Ridge still converge? Would the answer be sensible?</>}
      />

      <VIS.TrapProblem
        id="l2-q10"
        difficulty="hard"
        title="A linear model with ReLU activations and L2 weight decay: is the total loss still convex?"
        scenario={<><em>Discriminating insight:</em> separate the convexity of the penalty from the convexity of the data-fit term. ReLU enters via the data-fit term, well away from the penalty itself.</>}
        options={[
          {key:"a", text:"Yes — L2 weight decay is convex, and adding a convex term preserves convexity of any underlying training loss."},
          {key:"b", text:"It is the ReLU composition that makes the data-fit term non-convex; L2 itself remains a convex regularizer regardless of the architecture.", correct:true},
          {key:"c", text:"L2 becomes non-convex once any nonlinear activation is introduced, because the gradient of the penalty interacts with the activation gradient."},
          {key:"d", text:"Only if the network has more than one hidden layer; single-layer ReLU + L2 is provably convex by composition rules."},
        ]}
        trap={<>(a) is wrong in the direction the question tests — the sum is non-convex but for a different reason. (c) blames L2 for the non-convexity; the truth is the activation, not the penalty. (d) is invented.</>}
        lens={<>w² is convex in w forever; ReLU composed inside a multi-layer net is what breaks convexity of the data-fit term. The sum of convex + non-convex is non-convex, but attributing it to L2 is the trap. L2 stays a benign regularizer in any architecture.</>}
        stretch={<>Does this mean weight decay is unhelpful in deep nets? Why or why not?</>}
      />

      <VIS.TrapProblem
        id="l2-q11"
        difficulty="medium"
        title="The cheapest practical way to pick α in Ridge is:"
        scenario={<><em>Discriminating insight:</em> Ridge admits efficient α sweeps because it has a closed form. Which procedure exploits that?</>}
        options={[
          {key:"a", text:"Grid search with full retraining per α value — accurate, with unavoidable retraining cost per grid point."},
          {key:"b", text:"Bayesian optimization with 1000 trials — Ridge's smoothness rewards Bayesian methods over simple grid search."},
          {key:"c", text:"Generalized cross-validation (GCV) using the trace of the hat matrix — a closed-form approximation to leave-one-out CV.", correct:true},
          {key:"d", text:"A single train/val split with α chosen by visual inspection of the validation loss curve over a coarse log-grid."},
        ]}
        trap={<>(a) ignores that Ridge has a closed form that makes leave-one-out CV tractable analytically. (b) is overkill for a 1D hyperparameter on a smooth convex objective. (d) is the brittle baseline.</>}
        lens={<>GCV uses the influence matrix H = X(XᵀX + αI)⁻¹Xᵀ to compute leave-one-out CV error without re-fitting. Total cost is one eigendecomposition + cheap α sweeps. Ridge's structure rewards this trick uniquely; L1 does not admit a comparable closed-form CV.</>}
        stretch={<>Why does L1 not have a clean GCV analogue?</>}
      />

      <VIS.TrapProblem
        id="l2-q12"
        difficulty="hard"
        title="What is the geometric reason 'no corners' implies 'no sparsity' for L2?"
        scenario={<><em>Discriminating insight:</em> a level set of the penalty meets a generic loss contour at one point. Whether that point lies on an axis depends on the level set's shape.</>}
        options={[
          {key:"a", text:"Sparsity requires a discrete penalty term; L2 is continuous and therefore cannot produce zero weights at any α."},
          {key:"b", text:"On a smooth ball, the tangent plane at any axis point is not parallel to a generic ellipsoidal loss contour, so the touch point lies off-axis almost surely.", correct:true},
          {key:"c", text:"The L2 ball has constant curvature; constant-curvature surfaces by theorem cannot produce sparse intersections with linear contours."},
          {key:"d", text:"L2 penalizes the intercept along with the weights, which spreads the budget too thinly to drive any individual weight to zero."},
        ]}
        trap={<>(a) is a category confusion — L1 is also continuous but produces sparsity via geometry, not discreteness. (c) is invented theorem-naming. (d) is false — most implementations skip the intercept.</>}
        lens={<>L1's diamond has corners on the axes — sharp points where many ellipsoidal contours can be tangent. L2's ball has smooth tangent planes everywhere, and a generic ellipsoidal contour will touch the ball at exactly one non-axis point. The geometry is the whole story; the math just confirms it.</>}
        stretch={<>What is the L_p ball for p between 1 and 2? Does it produce sparsity?</>}
      />

      <VIS.TrapProblem
        id="l2-q13"
        difficulty="medium"
        title="A 50,000-feature gene-expression regression with only 500 patients: which regularizer typically wins?"
        scenario={<><em>Discriminating insight:</em> n &lt;&lt; p with a strong prior that only a few genes matter biologically.</>}
        options={[
          {key:"a", text:"L2 — it stabilizes the ill-conditioned XᵀX via the +αI shift and uses every gene's tiny signal in the prediction."},
          {key:"b", text:"OLS with pseudoinverse — works fine in n &lt;&lt; p settings when the design matrix X has full row rank."},
          {key:"c", text:"Skip regularization in favor of a deep neural network — the n &lt;&lt; p problem is unsolvable with linear models."},
          {key:"d", text:"L1 — when n &lt;&lt; p and the truth is sparse, picking a small subset of genes is both more accurate and interpretable.", correct:true},
        ]}
        trap={<>(a) is the 'L2 is the default' reflex applied to a regime where L1 is built. (b) ignores that pseudoinverse OLS overfits catastrophically with n &lt;&lt; p. (c) is the 'always reach for deep learning' fallacy.</>}
        lens={<>n &lt;&lt; p plus a sparse-truth prior is L1's home turf. L2 will spread weight across thousands of irrelevant genes and produce an uninterpretable model that does not generalize. L1's sparsity yields ~30 nonzero coefficients you can biologically validate.</>}
        stretch={<>When in genomics would you still prefer L2 (or Elastic Net) over L1?</>}
      />

      <VIS.TrapProblem
        id="l2-q14"
        difficulty="medium"
        title="In deep learning frameworks, 'weight decay' and 'L2 regularization' are:"
        scenario={<><em>Discriminating insight:</em> for SGD the two are equivalent; for adaptive optimizers like Adam they decouple. AdamW exists for exactly this reason.</>}
        options={[
          {key:"a", text:"Identical in all optimizers; they are simply two interchangeable names for the same gradient term added to the loss."},
          {key:"b", text:"Different by construction — weight decay multiplies, L2 adds, so the math fails to line up in any practical optimizer."},
          {key:"c", text:"Identical mathematically but differ in numerical implementation, with weight decay running about 10% slower than L2 in benchmarks."},
          {key:"d", text:"Equivalent under SGD; under Adam and other adaptive methods, decoupled weight decay applied to the parameter differs from L2 added to the loss.", correct:true},
        ]}
        trap={<>(a) is the common claim that AdamW was created to refute. (b) overstates the difference — they coincide for SGD. (c) is invented.</>}
        lens={<>For SGD: dw = -η∇L + 2αηw is the same whether α·w² was added to the loss or w was scaled by (1 - 2αη) each step. For Adam, the adaptive learning rates rescale the L2 gradient but not the direct weight-decay step, so AdamW (decoupled weight decay) regularizes more consistently across parameter scales.</>}
        stretch={<>Which one is the right default for transformer fine-tuning?</>}
      />

      <VIS.TrapProblem
        id="l2-q15"
        difficulty="hard"
        title="When you add L2 to a logistic regression, what changes about the gradient of the loss?"
        scenario={<><em>Discriminating insight:</em> the data-fit gradient is the standard logistic gradient; the penalty adds a linear pull toward the origin. Combine and inspect.</>}
        options={[
          {key:"a", text:"The data-fit gradient is replaced by a Gaussian likelihood gradient; the original logistic loss falls away."},
          {key:"b", text:"Each component gains an additive 2αw term — a linear pull toward zero whose magnitude grows with the weight itself.", correct:true},
          {key:"c", text:"The gradient becomes piecewise linear, with a discontinuity at each coordinate's zero crossing."},
          {key:"d", text:"The Hessian becomes diagonal, allowing per-parameter learning rates by construction of the L2 term."},
        ]}
        trap={<>(a) confuses linear regression's Ridge identity with what L2 means for logistic. (c) describes L1's gradient near zero. (d) is unrelated — the Hessian gains +2αI on its diagonal but stays non-diagonal overall.</>}
        lens={<>∇(L_fit + α·Σw²) = ∇L_fit + 2αw. The penalty contributes a per-weight linear force toward zero, proportional to the current magnitude. The Hessian gains +2αI, which is also why L2 makes the optimization landscape strongly convex and easier to optimize.</>}
        stretch={<>How does this 2αw term interact with very large gradients early in training?</>}
      />

      <VIS.TrapProblem
        id="l2-q16"
        difficulty="medium"
        title="Same predicted ŷ from a spread-out coefficient vector versus a concentrated one. Which does Ridge prefer?"
        scenario={<><em>Discriminating insight:</em> two fits produce the same ŷ. Fit P concentrates weight on a single coordinate; Fit Q spreads it equally across two coordinates with half the magnitude on each. Compute the squared-sum penalty for each.</>}
        options={[
          {key:"a", text:"The spread-out fit Q — for the same prediction, splitting weight halves the squared-norm relative to concentrating it on one coordinate.", correct:true},
          {key:"b", text:"The concentrated fit P — fewer nonzero weights means a smaller penalty by virtue of sparsity-friendly geometry under any L_p norm."},
          {key:"c", text:"Both equally — Ridge's penalty depends only on the sum of weights, and the two fits have identical sums by construction."},
          {key:"d", text:"The concentrated fit P — L2's preference for axis-aligned solutions favors sparse, single-coordinate representations of the signal."},
        ]}
        trap={<>(b) confuses L2 with L1's sparsity preference. (c) confuses squared-sum with sum-squared. (d) inverts L2's actual geometry.</>}
        lens={<>If Fit P has one weight of magnitude 4 and Fit Q has two weights of magnitude 2 each, Σw²(P) = 16 versus Σw²(Q) = 8. L2 systematically prefers spreading weight equally across coordinates — the squared term punishes concentration. This is also why L2 distributes coefficients across correlated features rather than picking one.</>}
        stretch={<>What does L1 prefer between these two solutions?</>}
      />

      <VIS.TrapProblem
        id="l2-q17"
        difficulty="hard"
        title="Why is the L2 coefficient ranking a fragile feature-importance shortlist even at high α?"
        scenario={<><em>Discriminating insight:</em> at high α every coefficient shrinks proportionally toward zero while staying strictly positive, so 'small' versus 'irrelevant' is a fuzzy threshold call by the analyst.</>}
        options={[
          {key:"a", text:"L2 leaves slope coefficients untouched and shrinks only the intercept, so feature importance is invariant under α."},
          {key:"b", text:"L2 randomizes coefficient signs at high α, destroying any interpretable ordering of the features for downstream readers."},
          {key:"c", text:"All coefficients shrink continuously toward zero; ranking them by magnitude requires a post-hoc threshold chosen by the analyst, with no help from the model itself.", correct:true},
          {key:"d", text:"L2 shrinkage is non-monotonic in α, so increasing the penalty can grow a small coefficient back toward its OLS value."},
        ]}
        trap={<>(a) inverts a common implementation detail. (b) is invented. (d) is false — shrinkage is monotone per eigenvalue direction.</>}
        lens={<>Because every coefficient survives at finite α, 'which features matter' requires you to pick a cutoff. L1 dodges this by giving exact zeros, producing a self-thresholding shortlist. L2 produces a smooth ranking that the analyst must hand-thresh — fine for prediction, awkward for interpretation.</>}
        stretch={<>How do you 'sparsify' a Ridge model post-hoc and what is lost?</>}
      />

      <VIS.TrapProblem
        id="l2-q18"
        difficulty="medium"
        title="A ReLU MLP is trained with weight decay λ=0.0001. The training loss plateaus high. The team raises weight decay to 0.1. What happens?"
        scenario={<><em>Discriminating insight:</em> the U-shape of regularization. Past the sweet spot, more penalty causes underfitting.</>}
        options={[
          {key:"a", text:"Training loss drops further as the network finally generalizes under the heavier penalty applied during training."},
          {key:"b", text:"Training loss stays flat; validation loss improves substantially due to the much stronger anti-overfitting pressure."},
          {key:"c", text:"Weight decay 0.1 triggers gradient explosion in the ReLU layers and the training run diverges within a few steps."},
          {key:"d", text:"Both training and validation loss rise as the penalty crushes weights toward zero and the network degenerates toward a mean predictor.", correct:true},
        ]}
        trap={<>(a) ignores the bias-variance U-shape. (b) is the 'regularization is free' fallacy. (c) is invented — weight decay reduces magnitudes, it does not blow them up.</>}
        lens={<>Past the sweet spot, L2 trades a small variance reduction for a large bias increase. Training and val both rise. The diagnostic is symmetric — train loss going UP with increased λ is the signal that you have over-regularized.</>}
        stretch={<>Sketch the bias and variance curves separately as λ sweeps from 0 to large.</>}
      />

      <VIS.TrapProblem
        id="l2-q19"
        difficulty="hard"
        title="Ridge applied to a sparse-truth regime (only 10 of 1000 features matter): what failure mode appears?"
        scenario={<><em>Discriminating insight:</em> L2 spreads weight across all features, including the 990 noise ones. Each carries a tiny coefficient, and the aggregate of those tiny coefficients summed at inference adds variance.</>}
        options={[
          {key:"a", text:"Ridge shrinks all 1000 coefficients but keeps every noise feature nonzero, accumulating small errors that lose to a sparse L1 fit on test loss.", correct:true},
          {key:"b", text:"Ridge perfectly identifies the 10 true features because their coefficients dominate the 990 spurious ones after enough shrinkage."},
          {key:"c", text:"Ridge becomes numerically unstable because most columns have zero true coefficient and the +αI shift overcorrects on a degenerate spectrum."},
          {key:"d", text:"Ridge diverges; only L1 has a well-defined optimum in sparse-truth regimes due to its corner geometry on the constraint."},
        ]}
        trap={<>(b) confuses 'small' with 'zero'. (c) is the wrong stability story — Ridge handles ill-conditioned X by design. (d) is invented; Ridge always has a unique optimum.</>}
        lens={<>Each of the 990 noise features contributes a small but nonzero coefficient. Summed at prediction time, the noise terms add variance to ŷ. L1 zeroes them outright, removing the noise. This is the canonical L1-beats-L2 regime: truly sparse truth.</>}
        stretch={<>At what sparsity level does L2 start to win again?</>}
      />

      <VIS.TrapProblem
        id="l2-q20"
        difficulty="medium"
        title="A practitioner says 'I tuned α with cross-validation and got α=0. So I will drop Ridge.' What is the right response?"
        scenario={<><em>Discriminating insight:</em> CV-selected α=0 is a legitimate finding that signals the data has enough rows relative to features that shrinkage offers little.</>}
        options={[
          {key:"a", text:"They are right — α=0 means OLS, which is preferable to Ridge in general because OLS gives unbiased estimates."},
          {key:"b", text:"They are wrong — CV cannot choose α=0; that result indicates a bug in the CV procedure or grid setup."},
          {key:"c", text:"They are right in spirit; worth checking the CV grid included small but nonzero α and that XᵀX is well-conditioned without the +αI shift.", correct:true},
          {key:"d", text:"They are wrong — Ridge always strictly improves over OLS in test error, so α=0 cannot be the genuine CV optimum."},
        ]}
        trap={<>(a) overclaims unbiasedness as a goal — Ridge trades bias for variance intentionally. (b) is false; α=0 is a valid CV outcome. (d) overstates the theoretical guarantee — Ridge dominates OLS in expectation but a particular CV draw can pick α=0.</>}
        lens={<>α=0 from CV is genuinely informative — it says 'on this data, the variance reduction from shrinkage costs more in bias than it saves.' Sanity-check that the grid extended to small nonzero values and that XᵀX is well-conditioned, then trust the result.</>}
        stretch={<>What does CV picking the largest α in your grid suggest?</>}
      />

      <VIS.TrapProblem
        id="l2-q21"
        difficulty="hard"
        title="A factory: 100 sensors, all measuring slightly noisy versions of the same underlying physical variable. Ridge fits coefficients. What pattern emerges?"
        scenario={<><em>Discriminating insight:</em> highly correlated features under L2 share the signal equally. Predict what 100 near-identical sensors will produce.</>}
        options={[
          {key:"a", text:"One sensor gets a large coefficient; the remaining 99 are zeroed out by Ridge as redundant under shrinkage."},
          {key:"b", text:"All 100 sensors receive roughly equal small coefficients, summing to the effective signal weight a single sensor would carry alone.", correct:true},
          {key:"c", text:"Coefficients alternate in sign across the 100 sensors, canceling pairwise and producing an unstable but technically valid fit."},
          {key:"d", text:"Ridge refuses to fit and raises a multicollinearity error before producing any coefficients on the near-redundant columns."},
        ]}
        trap={<>(a) describes L1's behavior. (c) describes unregularized OLS's pathology under near-collinearity. (d) is false; the +αI shift handles collinearity gracefully.</>}
        lens={<>L2 prefers (s/100, s/100, ..., s/100) over (s, 0, ..., 0) because Σw² = s²/100 versus s² — a hundred-fold reduction in penalty. The sensors share the signal evenly. This is the stability story: L2 averages over correlated columns; L1 picks one.</>}
        stretch={<>What does this imply for interpretability if you want to identify the 'most important' sensor?</>}
      />

      <VIS.TrapProblem
        id="l2-q22"
        difficulty="hard"
        title="Comparing Ridge to early stopping on a deep network: how are they related?"
        scenario={<><em>Discriminating insight:</em> both bound the effective magnitude of weights. The early-stopping connection is geometric.</>}
        options={[
          {key:"a", text:"They are unrelated — early stopping affects optimization time, Ridge affects loss shape, and the two operate on disjoint axes of the system."},
          {key:"b", text:"Early stopping is strictly stronger than L2 because it can produce sparse weights, an outcome L2 cannot generate by construction."},
          {key:"c", text:"Ridge is a hyperparameter while early stopping is a heuristic — the two share no formal mathematical relationship worth deriving."},
          {key:"d", text:"Early stopping under gradient descent is approximately equivalent to L2 with α inversely related to the number of training steps taken.", correct:true},
        ]}
        trap={<>(a) and (c) miss the well-known connection. (b) attributes sparsity to early stopping incorrectly.</>}
        lens={<>For quadratic losses, t gradient-descent steps from origin produce weights confined to a region whose radius scales with t·η. Stopping early caps weight magnitudes — the same job L2 does explicitly. The equivalence is approximate but tight in the linear regime and motivates 'why early stopping works.'</>}
        stretch={<>Which is preferred in practice when both are available, and why?</>}
      />

      <VIS.TrapProblem
        id="l2-q23"
        difficulty="medium"
        title="Why is Elastic Net (αL1 + (1-α)L2) often a safer default than pure L1 when features are correlated?"
        scenario={<><em>Discriminating insight:</em> pure L1 has a known instability under correlated features. L2 fixes it. Combining them gets both benefits.</>}
        options={[
          {key:"a", text:"L1 alone arbitrarily picks one of a correlated group and zeros the rest; the L2 term encourages sharing across the group while preserving some sparsity.", correct:true},
          {key:"b", text:"Elastic Net is mathematically equivalent to L1 with a rescaled α, so it produces the same fitted coefficients as pure Lasso under any dataset."},
          {key:"c", text:"The L2 term lets Elastic Net produce sparser solutions than pure L1 because it adds extra multiplicative pressure pulling coefficients toward zero."},
          {key:"d", text:"Elastic Net replaces L1's diamond with a square constraint region, producing axis-aligned fits that abandon sparsity in exchange for stability."},
        ]}
        trap={<>(b) is mathematically false. (c) is backwards — adding L2 makes solutions less sparse than pure L1. (d) is invented geometry.</>}
        lens={<>L1 alone is unstable across correlated columns — small data perturbations flip which column gets the weight. Adding L2 smooths that behavior: the squared term encourages weight-sharing across the group while L1's diamond still produces zeros for the irrelevant features. You get a sparse-but-stable solution.</>}
        stretch={<>How would you choose the mixing ratio between L1 and L2 in Elastic Net?</>}
      />

      <VIS.TrapProblem
        id="l2-q24"
        difficulty="hard"
        title="In Bayesian linear regression with a Gaussian prior, what does the MAP estimate equal?"
        scenario={<><em>Discriminating insight:</em> write the negative log posterior. Likelihood term + prior term. The prior term is what?</>}
        options={[
          {key:"a", text:"The OLS estimate (XᵀX)⁻¹Xᵀy, independent of the prior and unchanged by the choice of prior variance."},
          {key:"b", text:"The Ridge estimate, with the penalty strength α set by the ratio of the noise variance to the prior variance of the weights.", correct:true},
          {key:"c", text:"The Lasso estimate, because Gaussian priors induce sparsity in MAP solutions under linear-regression likelihoods."},
          {key:"d", text:"The posterior mean, which equals the prior mean of zero by symmetry of the Gaussian and the convexity of MAP estimation."},
        ]}
        trap={<>(a) ignores the prior entirely. (c) confuses Gaussian with Laplace priors. (d) confuses posterior MEAN with the MAP under a strong Gaussian prior — and even then the value would shift away from zero given any data.</>}
        lens={<>Negative log posterior = (1/2σ²) Σ(y - Xw)² + (1/2τ²) Σw² + const. Setting α = σ²/τ² gives exactly the Ridge objective. MAP under a zero-mean Gaussian prior IS Ridge regression — they are the same estimator viewed through two different lenses.</>}
        stretch={<>For a Gaussian prior, when does the MAP equal the posterior mean exactly?</>}
      />

      <VIS.TrapProblem
        id="l2-q25"
        difficulty="medium"
        title="A team adds L2 to fix overfitting. Train loss drops, val loss is flat. What is the most likely diagnosis?"
        scenario={<><em>Discriminating insight:</em> L2 is a variance-reduction tool. If val loss stays flat when L2 is added, the underlying gap came from somewhere other than variance.</>}
        options={[
          {key:"a", text:"The model was bias-limited, so L2 (which fights variance) addresses the wrong bottleneck. Reach for richer features or a bigger model instead.", correct:true},
          {key:"b", text:"L2 worked perfectly — train loss dropping is the canonical success signal and means the model is healthy."},
          {key:"c", text:"α is set too high; lower it gradually until val loss starts moving in the right direction."},
          {key:"d", text:"L2 broke the optimizer; switch over to L1 for a sparser fit and the val loss will follow train down."},
        ]}
        trap={<>(b) is the 'any change is good' fallacy. (c) confuses the failure mode — at high α train loss would rise, not drop. (d) confuses regularizers with optimizers.</>}
        lens={<>If train ≈ val and both are high, you have a bias problem; L2 fights variance and offers little. The signature 'train dropped, val flat' says L2 trimmed a few benign coefficients but missed the underfit. Bigger model, richer features, or different architecture is the move.</>}
        stretch={<>What would the same scenario look like if L2 actually addressed the gap?</>}
      />
    </VIS.Section>
  </main>
);
