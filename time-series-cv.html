<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Time-series CV — row 10 — fingerprint: time-series-cv
// G22 retrofit: 25 trap problems across 6 axes (identity, mechanism, intuition,
// application, operations, failure modes) + 30-50 prose VIS.Term hover-glosses.

const App = () => (
  <main style={{maxWidth: 880, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="ML Fund · Cross-Validation"
      title="Time-series cross-validation"
      subtitle={<>Train on the past, validate on the future — <em>never</em> the other way around. Random k-fold quietly leaks tomorrow's information into yesterday's training set.</>}
      byline={[
        {label: "L2", value: "Cross-Validation"},
        {label: "L3", value: "Time-series split"},
        {label: "Audience", value: "smart but new to ML"},
      ]}/>

    <VIS.TLDR>
      For any dataset with a time index — stocks, sensor logs, clicks, fraud, demand — random folds leak <VIS.Term def="When information not available at prediction time sneaks into the training set, inflating offline metrics. The model 'cheats' by seeing the future during training, then fails in production where the future is genuinely unknown.">future information</VIS.Term> into training via temporal correlation, autoregressive features, and shared regimes. Use{" "}
      <VIS.Term def="A CV scheme where each fold trains only on data older than its validation window. The training set's last timestamp must be strictly less than the validation set's first timestamp. Mimics deployment.">forward-chaining</VIS.Term> — every fold trains on a strict-past window and validates on a strict-future window — typically with a{" "}
      <VIS.Term def="A buffer of timestamps deliberately excluded between the end of the training window and the start of the validation window. Sized to ≥ the longest feature lookback so that recent training samples cannot share computation with the first validation sample.">purge gap</VIS.Term> when features use lookback windows.
    </VIS.TLDR>

    <VIS.Section id="sec-experiment" title="Beat 1 — A thought experiment: predict tomorrow's revenue">
      <p>
        Imagine you are forecasting <strong>tomorrow's daily revenue</strong> for an e-commerce site. You have <code>2,000</code> days of history. A junior teammate proposes the textbook move: shuffle the 2,000 rows, run{" "}
        <VIS.Term def="The default CV scheme that randomly partitions rows into k roughly-equal folds. Each row appears in exactly one validation fold; the other k−1 folds train. Order-agnostic by construction.">5-fold random CV</VIS.Term>, report mean MAPE. They get <strong>4.1% MAPE</strong> — beautiful. You ship the model. The first week in production, real-world{" "}
        <VIS.Term def="The absolute difference between predicted and actual value, divided by the actual value, averaged across predictions. The default forecasting metric; lower is better; symmetric to neither over- nor under-prediction.">MAPE</VIS.Term> is <strong>14%</strong>. The{" "}
        <VIS.Term def="The difference between your offline cross-validation score and the score the model actually achieves once deployed to live traffic. A large gap usually means CV measured a problem you weren't going to solve.">offline-to-online gap</VIS.Term>{" "}is a factor of 3.5×. What happened?
      </p>
      <p>
        Random folds put day 1,847 in training and day 1,846 in validation. The model learned that "the day BEFORE the val day had revenue X" and trivially looked up the val day's revenue, because daily revenue is strongly{" "}
        <VIS.Term def="The tendency for nearby-in-time observations to be similar — yesterday's value is the best baseline for today's. Quantified by autocorrelation at lag-k; for many business series it stays &gt; 0.7 out to lag-7.">autocorrelated</VIS.Term>. Worse: the moving-average features for day 1,846 share <strong>6 of their 7 days</strong> with day 1,847's training window. The val sample is a near-twin of a training sample — the model isn't{" "}
        <VIS.Term def="The ability of a model to perform well on data drawn from the same distribution it was trained on, but never seen during training. The whole point of held-out evaluation; the thing leakage silently defeats.">generalizing</VIS.Term>, it's interpolating between two adjacent points in the same chunk of time — closer to a{" "}
        <VIS.Term def="A model that essentially memorizes the training distribution and performs well on examples close to training points but poorly on novel ones. Often arises when a held-out set sits inside the training distribution's support rather than outside it.">memorization regime</VIS.Term>{" "}than to honest evaluation.
      </p>
      <p>
        In production, day 2,001 has no twin. The model is suddenly extrapolating across a{" "}
        <VIS.Term def="A change in the underlying data-generating process — new product launches, a recession, a competitor's price war, a marketing campaign. Treats the time axis as a sequence of stationary segments separated by regime breaks.">regime boundary</VIS.Term> it never saw during training. Random k-fold gave you a metric that measured a problem you were never going to solve: predicting interior points of a window you already had.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-split" title="Beat 2 — Two correct schemes: expanding window and rolling window">
      <p>The fix is to <em>respect time order</em>. Each fold's training data ends before its validation data begins. Two flavors of{" "}
        <VIS.Term def="Any CV scheme that produces (train, val) pairs where every train timestamp is strictly less than every val timestamp in the same fold. Encompasses expanding-window, rolling-window, and walk-forward variants.">time-aware splitting</VIS.Term>:</p>
      <VIS.Mermaid chart={`
flowchart LR
  T0["Time ->"]
  subgraph Fold1[" "]
    A1["TRAIN: m 1-3"] --- B1["VAL: m 4"]
  end
  subgraph Fold2[" "]
    A2["TRAIN: m 1-4"] --- B2["VAL: m 5"]
  end
  subgraph Fold3[" "]
    A3["TRAIN: m 1-5"] --- B3["VAL: m 6"]
  end
  T0 --> Fold1 --> Fold2 --> Fold3
  style B1 fill:#dbeafe,stroke:#2563eb
  style B2 fill:#dbeafe,stroke:#2563eb
  style B3 fill:#dbeafe,stroke:#2563eb
      `}/>
      <p>
        <strong>Expanding window</strong> (shown above): every fold keeps every prior month and adds the previous fold's validation slice to its training set. Training set grows monotonically. Use when the{" "}
        <VIS.Term def="The assumption that the joint distribution of features and target does not change over time. Strict stationarity is rare; weak stationarity (constant mean and autocovariance) is what most forecasters quietly assume.">stationarity assumption</VIS.Term> roughly holds — older data still carries signal.
      </p>
      <VIS.Mermaid chart={`
flowchart LR
  T0["Time ->"]
  subgraph FoldA[" "]
    AA["TRAIN: m 1-3"] --- BA["VAL: m 4"]
  end
  subgraph FoldB[" "]
    AB["TRAIN: m 2-4"] --- BB["VAL: m 5"]
  end
  subgraph FoldC[" "]
    AC["TRAIN: m 3-5"] --- BC["VAL: m 6"]
  end
  T0 --> FoldA --> FoldB --> FoldC
  style BA fill:#dbeafe,stroke:#2563eb
  style BB fill:#dbeafe,stroke:#2563eb
  style BC fill:#dbeafe,stroke:#2563eb
      `}/>
      <p>
        <strong>Rolling window</strong>: each fold drops the oldest slice and adds a new one — training-set size is constant. Use when old data is stale ({" "}
        <VIS.Term def="A persistent shift in the data-generating distribution that makes pre-shift data actively misleading. Examples: COVID-era retail demand, post-2008 credit defaults, a feature pipeline migration. The cure is windowing it out, not adding it in.">regime shift</VIS.Term>, market microstructure change, post-COVID consumer behavior) — old months <em>hurt</em>.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-gap" title="Beat 3 — The purge gap and the embargo">
      <p>
        Even with a strict past-future split, there is a subtler leak. Suppose your features include <code>moving_average_revenue_last_7d</code>. The training sample for day <em>t</em> uses days [<em>t-7, t-1</em>]; the immediately-adjacent validation sample on day <em>t+1</em> uses days [<em>t-6, t</em>]. They share six of seven inputs — a textbook case of{" "}
        <VIS.Term def="When two feature vectors are computed from heavily overlapping raw inputs, they encode largely the same information even if assigned to different rows. The leakage channel that defeats naive past-future splits when lookback features exist.">feature-window overlap</VIS.Term>. The val sample is mechanically tied to the training sample via the{" "}
        <VIS.Term def="A feature derived from a sliding window of past observations: rolling mean, rolling std, lag-k value, exponential moving average. Defines the minimum gap a leak-free split must enforce between the end of training and the start of validation.">lookback feature</VIS.Term>.
      </p>
      <VIS.Callout kind="info" title="Insert a gap >= feature lookback">
        Put a deliberate buffer of <code>L</code> unused timestamps between the last training row and the first validation row, where <code>L</code> is the longest lookback your feature pipeline uses. This is the{" "}
        <VIS.Term def="A buffer of timestamps deliberately excluded between training and validation. Eliminates the leak where a recent training row's lookback window overlaps with the first validation row. Mandatory when features include rolling means, EMAs, or lagged statistics.">purge</VIS.Term>.
      </VIS.Callout>
      <VIS.Callout kind="info" title="Add an embargo for label-side leakage">
        If your <em>label</em> is itself forward-looking — e.g. "did this loan default in the next 30 days?" — you also need an{" "}
        <VIS.Term def="An additional buffer AFTER the validation window where rows are excluded from the NEXT fold's training set. Prevents forward-looking labels from leaking backwards when their lookahead horizon overlaps with the next fold's training window. Lopez de Prado, Advances in Financial ML, 2018.">embargo</VIS.Term>{" "}of at least the label horizon between the end of validation and the start of the next training fold. Lopez de Prado popularized this in financial ML.
      </VIS.Callout>
      <VIS.Callout kind="gotcha" title="The classic disaster: stratified k-fold on time series">
        Random k-fold scrambles time order — training set includes tomorrow's observation, validation includes yesterday's — offline metric looks great, model dies in production. <em>Always ask:</em> "would this be available at prediction time?" before letting a feature into training.
      </VIS.Callout>
    </VIS.Section>

    <VIS.Section id="sec-related" title="Beat 4 — Related but distinct ideas">
      <p>
        Several CV variants address sibling concerns, easy to confuse. <VIS.Term def="A scheme where every (train, validation) pair has at least one identifier in common forbidden across the split — e.g. the same user, patient, or device cannot appear in both. Independent of time. Use GroupKFold or LeaveOneGroupOut in sklearn.">GroupKFold</VIS.Term>{" "}prevents leakage when the same{" "}
        <VIS.Term def="A natural cluster of rows that share information not visible in features alone — same user, same patient, same device, same trading session. Group-aware CV ensures the cluster never straddles train and val.">entity</VIS.Term>{" "}appears in many rows; it does not respect time. <VIS.Term def="A nested CV scheme where the outer fold picks the final score and the inner fold drives hyperparameter selection. Eliminates the bias of evaluating on the same data used for HPO.">Nested CV</VIS.Term>{" "}with time-aware inner and outer folds is the gold standard when you also tune hyperparameters. <VIS.Term def="A repeated forward-chained backtest: simulate the model's full lifecycle (train-predict-roll-retrain) along the time axis to estimate live performance. Standard in quantitative finance.">Walk-forward backtesting</VIS.Term>{" "}is essentially expanding-window CV plus a deployment harness: it answers "how would I have done if I'd shipped this on day X?" not "how well does my model fit?"
      </p>
      <p>
        Beware{" "}
        <VIS.Term def="A failure mode where seasonality (weekday-of-week, hour-of-day, monthly) is over-represented in some folds and under-represented in others, biasing per-fold scores. Cure: ensure each fold spans the same seasonal cycle, or report the per-fold MAPE distribution rather than the mean.">seasonality imbalance</VIS.Term>{" "}across folds — a 30-day val window starting on a Monday is not directly comparable to one starting on a Saturday. And do not confuse time-series CV with{" "}
        <VIS.Term def="A holdout strategy that uses the FINAL contiguous block of time as the test set, no folds. Common in production-style evaluation. Yields one score; CV variants yield k scores plus an estimate of run-to-run variance.">holdout split</VIS.Term>{" "}— holdout gives one score; CV gives k and a stability estimate. A related distinction:{" "}
        <VIS.Term def="A gradual, continuous change in the relationship between features and target — customer preferences shifting, sensor drift, inflation creeping. Distinct from a sudden regime break; usually addressed by recency-weighting or retraining cadence rather than by changing the CV scheme.">concept drift</VIS.Term>{" "}produces a slow worsening across forward folds, while a{" "}
        <VIS.Term def="A discrete, datable event that splits the time series into 'before' and 'after' regimes with different statistics. Examples: a product launch, a policy change, COVID-19. Demands the dataset be cut, not averaged.">structural break</VIS.Term>{" "}produces a step-function discontinuity at a single fold boundary.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-tools" title="Tools and library landscape">
      <p>
        <code>sklearn.model_selection.TimeSeriesSplit(n_splits=5)</code> gives expanding-window splits out of the box. As of sklearn 1.6 it also supports{" "}
        <code>gap=L</code> and a <code>max_train_size</code> parameter that turns expanding into rolling. For more control — rolling window plus embargo, multi-step horizon, grouped time-series — use{" "}
        <VIS.Term def="A Python library by Stefan Jansen aimed at quant-finance backtesting workflows; provides PurgedKFold and CombinatorialPurgedKFold implementations of the Lopez de Prado schemes. Source: github.com/stefan-jansen/machine-learning-for-asset-managers.">mlfinlab / asset-managers libraries</VIS.Term>{" "}or roll your own with explicit <code>train_end_date &lt; val_start_date - gap</code>. For deep-learning forecasting, the <code>pytorch-forecasting</code> and <code>darts</code> libraries provide time-aware dataloaders that handle the indexing for you. Wrap the whole stack in an{" "}
        <VIS.Term def="A scikit-learn object that chains a sequence of fit/transform steps and a final estimator. When passed to cross_val_score, every step is refit on each training fold separately — the canonical way to prevent preprocessing leakage in CV.">sklearn Pipeline</VIS.Term>{" "}so that{" "}
        <VIS.Term def="The fit-on-train, transform-val-with-train-fit pattern for every numeric preprocessor: scalers, imputers, target encoders, PCA, feature selection. Violating this rule is the most common leak in tabular CV pipelines.">preprocessor fitting</VIS.Term>{" "}happens per-fold rather than globally.
      </p>
    </VIS.Section>

    <VIS.Section id="sec-decision" title="Decision tree — which scheme do I pick?">
      <VIS.Mermaid chart={`
flowchart TB
  Q["Have a time index?"]
  Q -->|No| KF["Random k-fold OK"]
  Q -->|Yes| L["Has lookback features?"]
  L -->|No| TSS["TimeSeriesSplit"]
  L -->|Yes| G["TimeSeriesSplit + gap"]
  G --> E["Label is forward-looking?"]
  E -->|Yes| EM["Add embargo too"]
  E -->|No| OK["Done"]
  style KF fill:#dcfce7,stroke:#16a34a
  style TSS fill:#dcfce7,stroke:#16a34a
  style G fill:#dcfce7,stroke:#16a34a
  style EM fill:#dcfce7,stroke:#16a34a
  style OK fill:#dcfce7,stroke:#16a34a
      `}/>
    </VIS.Section>

    <VIS.Section id="sec-problems" title="Hard problems — 25 trap drills across 6 axes">
      <p style={{color:"#475569", marginBottom: 16}}>
        Twenty-five interview-grade trap problems probing time-series CV across six axes — <strong>A: identity</strong> (what counts as time-aware vs not), <strong>B: mechanism</strong> (how leakage actually flows), <strong>C: intuition</strong> (mapping symptoms to causes), <strong>D: application</strong> (picking the right scheme for a real scenario), <strong>E: operations</strong> (library and workflow details), <strong>F: failure modes</strong> (where the textbook recipe breaks). Each carries deliberate{" "}
        <VIS.Term def="Plausible-looking details deliberately included to test whether the candidate can distinguish what matters from what doesn't. Senior bar — juniors anchor on the most recent or most colorful detail; seniors triage.">red herrings</VIS.Term>{" "}and a confusingly-similar decoy — the{" "}
        <VIS.Term def="A wrong answer engineered to look right to a candidate with partial understanding. The standard for senior MLE interview design: every option should be defendable at first glance, with only ONE that survives mechanistic scrutiny.">trap-grade decoy</VIS.Term>{" "}— a candidate at ~80% understanding could plausibly defend. Problems are tagged{" "}
        <VIS.Term def="A difficulty label on each trap problem: 'medium' problems test recall and direct application; 'hard' problems require multi-step reasoning, math, or the explicit rejection of a popular myth. Drives interview-loop pacing.">medium or hard</VIS.Term>{" "}and many include a{" "}
        <VIS.Term def="A follow-up question revealed after the candidate answers, typically probing the boundary case the main question avoided. Used by senior interviewers to test depth without lengthening the main prompt.">stretch follow-up</VIS.Term>{" "}for depth probing.
      </p>

      <VIS.TrapProblem
        id="tscv-q1"
        difficulty="medium"
        title="Q1 [Axis A — identity] — Is daily revenue forecasting a 'time-series' problem in the CV sense?"
        scenario={<><em>Discriminating insight:</em> the question is not whether the data has timestamps. It is whether nearby-in-time rows are statistically dependent. A dataset with timestamps but i.i.d. rows can use random k-fold without issue.</>}
        options={[
          {key:"a", text:"Yes, because the rows have a date column — any dataset with dates needs TimeSeriesSplit by default."},
          {key:"b", text:"Yes, because consecutive days are strongly autocorrelated and share moving-average features; the rows are NOT i.i.d.", correct:true},
          {key:"c", text:"No, because aggregating daily revenue removes the second-by-second order information that defines a time series."},
          {key:"d", text:"Only if the model is a recurrent network (LSTM, transformer) — tabular models like XGBoost are immune to temporal leakage."},
        ]}
        trap={<>(a) is a surface-level identity check ("has a date → time-series"). It misses that the deciding criterion is non-i.i.d.-ness, not the presence of a timestamp. (c) confuses level of aggregation with whether time matters; daily aggregation does not erase autocorrelation. (d) is a popular myth — leakage flows through the FEATURES and LABELS, not through the model class.</>}
        lens={<>(b). Time-series CV is needed whenever rows are temporally dependent — autocorrelation, shared lookback features, regime shifts. Model class is irrelevant; XGBoost on leaky folds will exploit the leak just as eagerly as any LSTM.</>}
        stretch={<>If you A/B-shuffled rows at random and trained on rolling means, would the leak still appear?</>}
      />

      <VIS.TrapProblem
        id="tscv-q2"
        difficulty="medium"
        title="Q2 [Axis B — mechanism] — How does random k-fold leak the future into training?"
        scenario={<><em>Discriminating insight:</em> trace the path of information from a validation row back to a training row, through both the target and the features.</>}
        options={[
          {key:"a", text:"It cannot — sklearn ensures each row appears in exactly one fold, so by construction nothing leaks."},
          {key:"b", text:"Through SHUFFLING — the model sees the val row directly during training because shuffle=True copies it into train."},
          {key:"c", text:"Through TEMPORAL CORRELATION of the target plus SHARED LOOKBACK in features: a neighboring training row is a near-twin of the val row.", correct:true},
          {key:"d", text:"Through random seed instability across sklearn versions, which silently breaks the fold partition contract."},
        ]}
        trap={<>(a) misreads the contract: the contract is about row membership, not information flow. The same row can be absent from training and yet ITS INFORMATION can flow in via a neighboring row. (b) confuses 'shuffle' (reorder before partition) with copying; shuffle does not duplicate rows. (d) is library FUD.</>}
        lens={<>(c). Two channels: (1) the target is autocorrelated, so a neighboring row's target is a strong predictor of the val row's target, and that neighbor IS in training; (2) lookback features for adjacent days share most of their inputs, so the val row's features and the training row's features are computed from heavily overlapping data.</>}
        stretch={<>Which of the two channels is more catastrophic for a model that has no autoregressive features?</>}
      />

      <VIS.TrapProblem
        id="tscv-q3"
        difficulty="hard"
        title="Q3 [Axis C — intuition] — Train MAPE 3.8%, val MAPE 4.1%, prod MAPE 14%. What's the most likely culprit?"
        scenario={<>You forecast SKU-level weekly demand for a retailer. Features include 7-day and 28-day rolling means of sales, day-of-week one-hots, and a {`'lag_1_sales'`} column. CV scheme: 5-fold random k-fold on the rows. Train MAPE 3.8%, val MAPE 4.1%, prod MAPE 14% in the first month after launch. Pick the most likely single cause.</>}
        options={[
          {key:"a", text:"Model variance — XGBoost is overfitting; reduce max_depth from 8 to 4."},
          {key:"b", text:"Distribution shift — customer demand patterns changed after launch; retrain weekly."},
          {key:"c", text:"Random k-fold on time-series data — train and val are interleaved in time, so lookback features and lag_1 trivially leak the val target.", correct:true},
          {key:"d", text:"Concept drift specific to the SKU level — switch to per-SKU models."},
        ]}
        trap={<>(a) is the reflex 'big gap → overfit' move, but the train-val gap here is TINY (3.8 vs 4.1). The catastrophe is val-to-prod (4.1 → 14), not train-to-val. (b) and (d) are plausible candidates in many forecasting failures, but the structural smell — a tiny train-val gap that explodes only at deployment — almost always points to leakage that the val set ALSO suffers from.</>}
        lens={<>(c). When train and val both look great but prod tanks, the val set is contaminated the same way training is. Random k-fold + lag_1 + rolling means is the textbook setup for the val set being a near-twin of training. Switch to TimeSeriesSplit with gap ≥ 28 and you'll see val MAPE jump immediately toward the true prod number.</>}
        stretch={<>If you saw a LARGE train-val gap (e.g. 3.8 vs 9.0) AND a prod gap (9.0 vs 14.0), would the diagnosis change?</>}
      />

      <VIS.TrapProblem
        id="tscv-q4"
        difficulty="medium"
        title="Q4 [Axis B — mechanism] — Why does a gap of 0 still leak when features include rolling_mean_7?"
        scenario={<><em>Discriminating insight:</em> draw the inclusive-exclusive boundary of the lookback window for a training row at the edge of the training fold and the validation row at the start of the val fold.</>}
        options={[
          {key:"a", text:"It doesn't — gap=0 is fine because the val and train rows are different timestamps; sklearn enforces row disjointness."},
          {key:"b", text:"Because the rolling_mean_7 of the last training row uses days t-6..t, and the first val row's features use t-5..t+1 — they SHARE 6 of 7 days.", correct:true},
          {key:"c", text:"Because of floating-point error in pandas rolling-window aggregation when the window crosses a fold boundary."},
          {key:"d", text:"Because StandardScaler is fit on the full dataset before splitting, so val stats leak via the scaler."},
        ]}
        trap={<>(a) misses the lookback overlap entirely. (c) is fictional library FUD — pandas does not have boundary-specific floating-point bugs. (d) is a real source of leakage but separate from the gap question; it would still bite even with gap=infinity.</>}
        lens={<>(b). The leak is structural in the features themselves. Even with timestamps strictly past-vs-future, the rolling lookback of the last training row and the first val row's features compute over heavily-overlapping windows. The cure is gap ≥ longest lookback.</>}
      />

      <VIS.TrapProblem
        id="tscv-q5"
        difficulty="hard"
        title="Q5 [Axis D — application] — Fraud detection: same customer in 50 transactions/week. Which CV?"
        scenario={<>Credit-card fraud at a fintech. 200M transactions, 1.2M unique customers, 4 years of history. A bad-actor customer typically makes 20-50 transactions before getting caught. Positive rate 0.4%. You want to estimate generalization both across TIME and across CUSTOMERS unseen during training.</>}
        options={[
          {key:"a", text:"TimeSeriesSplit with gap=7 days — time is the only axis that matters for fraud."},
          {key:"b", text:"GroupKFold on customer_id — fraud generalizes by customer, not by time."},
          {key:"c", text:"TimeSeriesSplit ALONG TIME plus GroupKFold-style customer purging at fold boundaries (PurgedGroupTimeSeriesSplit).", correct:true},
          {key:"d", text:"5-fold stratified k-fold stratified on the fraud label — preserves class balance per fold."},
        ]}
        trap={<>(a) ignores that the SAME customer's transactions span the gap and contaminate folds via customer-level features. (b) ignores time — bad-actor patterns shift quarterly and a non-time-aware fold can train on Q4 2025 fraud and validate on Q1 2024 fraud. (d) is the textbook anti-pattern that ignores both axes.</>}
        lens={<>(c). When BOTH time and a grouping key are leakage axes, you need a combined scheme that respects both. The same customer appearing in train and val leaks behavioral features (avg-transaction-amount, time-since-signup, etc.) even with a strict time gap. Lopez de Prado's PurgedGroupTimeSeriesSplit is the canonical implementation.</>}
        stretch={<>If 99% of customers appear in only one week, does the grouping axis still matter?</>}
      />

      <VIS.TrapProblem
        id="tscv-q6"
        difficulty="medium"
        title="Q6 [Axis E — operations] — What does sklearn.TimeSeriesSplit(n_splits=5) actually produce?"
        scenario={<><em>Discriminating insight:</em> sklearn defaults to expanding-window, not rolling, and the first fold uses a small training set. Read the docstring carefully.</>}
        options={[
          {key:"a", text:"Five non-overlapping (train, val) pairs where each train fold has equal size, in chronological order."},
          {key:"b", text:"Five (train, val) pairs where the train set EXPANDS by a fixed step each fold and val is always the next contiguous block of equal size.", correct:true},
          {key:"c", text:"Five rolling-window pairs with constant train size and a built-in 7-day embargo by default."},
          {key:"d", text:"Five randomly-shuffled folds with a stratification-by-time constraint that forces equal class-balance across folds."},
        ]}
        trap={<>(a) reverses the contract — train fold size is NOT equal; it grows. (c) confuses the default with what you'd want for non-stationary data; sklearn's default is expanding, no embargo. (d) describes what TimeSeriesSplit explicitly is NOT.</>}
        lens={<>(b). Expanding-window: train fold k uses indices [0, k*step], val fold k uses [k*step, (k+1)*step]. To get rolling, pass max_train_size. To get a gap, pass gap=N (sklearn ≥1.0).</>}
      />

      <VIS.TrapProblem
        id="tscv-q7"
        difficulty="hard"
        title="Q7 [Axis F — failure] — Why might rolling-window CV report HIGHER variance than expanding?"
        scenario={<>You compare 5-fold expanding-window vs 5-fold rolling-window CV on the same demand-forecasting model. Rolling-window per-fold MAPE: [4.1, 5.8, 7.2, 4.3, 11.0]. Expanding-window per-fold MAPE: [4.1, 4.6, 5.0, 4.9, 5.2]. Why such different variance?</>}
        options={[
          {key:"a", text:"Rolling-window is broken — sklearn has a bug in max_train_size that produces non-uniform val sets."},
          {key:"b", text:"Rolling-window discards old data, so each fold has a smaller and less-diverse training set; the model is more sensitive to which specific window it sees.", correct:true},
          {key:"c", text:"Expanding-window is biased — it leaks information from the growing training set back into earlier folds."},
          {key:"d", text:"They will always have identical variance in expectation; the difference must be from random seed instability."},
        ]}
        trap={<>(a) is library FUD. (c) gets causation backwards — expanding can only use information that precedes the val window, not later folds. (d) ignores that the two schemes are deliberately measuring different things.</>}
        lens={<>(b). Rolling-window CV measures sensitivity to WHICH chunk of recent history you trained on; expanding measures generalization assuming all history is usable. High rolling variance is a SIGNAL that the model is regime-sensitive and you may need either more data or a regime-aware feature.</>}
        stretch={<>Which scheme's variance is closer to what you'd see in production for a model retrained monthly?</>}
      />

      <VIS.TrapProblem
        id="tscv-q8"
        difficulty="hard"
        title="Q8 [Axis B — mechanism] — Embargo vs purge: which prevents which leak?"
        scenario={<><em>Discriminating insight:</em> purge sits BEFORE val, embargo sits AFTER val. One stops feature leakage, the other stops label leakage. Map each name to its mechanism.</>}
        options={[
          {key:"a", text:"Purge stops the leak from training features overlapping with val features; embargo stops the leak from val labels (forward-looking) overlapping with the next training fold.", correct:true},
          {key:"b", text:"Purge and embargo are synonyms — both insert a buffer; the names are aesthetic preferences of different libraries."},
          {key:"c", text:"Purge stops label leakage; embargo stops feature leakage. They go in opposite positions for historical reasons."},
          {key:"d", text:"Embargo is for grouped CV (forbids the same entity across folds); purge is for time-series CV."},
        ]}
        trap={<>(b) and (c) swap or conflate the two. (d) conflates embargo with GroupKFold semantics — embargo is strictly about TIME and forward-looking LABELS.</>}
        lens={<>(a). Purge sits at the START of val and removes training rows whose lookback features touch val timestamps. Embargo sits at the END of val and removes rows from the NEXT training fold whose backward-looking labels (e.g. 'defaulted in next 30 days') would peek INTO the just-finished val window.</>}
        stretch={<>If your label is the value at t+0 (no forward horizon), do you still need an embargo?</>}
      />

      <VIS.TrapProblem
        id="tscv-q9"
        difficulty="medium"
        title="Q9 [Axis D — application] — Forecasting next-quarter revenue with 10 years of monthly data: how many folds?"
        scenario={<>You're forecasting quarterly revenue. Available: 10 years of monthly data (120 rows). Validation horizon: 1 quarter (3 months). Junior teammate proposes 20-fold TimeSeriesSplit ('more folds = better CV').</>}
        options={[
          {key:"a", text:"20 folds is right — more folds always reduce CV variance and 20 fits the standard sklearn default."},
          {key:"b", text:"5-8 folds is right — each fold needs a meaningful training window (1+ year) AND a 3-month val window; 20 folds shrinks training to absurdity.", correct:true},
          {key:"c", text:"3 folds is right — match the number of folds to the forecast horizon (3 months)."},
          {key:"d", text:"Use leave-one-out CV at the monthly level — 120 folds; bias-free."},
        ]}
        trap={<>(a) blindly applies the k-fold heuristic that 'more folds is better' without checking the sample-count consequence. (c) confuses fold count with horizon length — orthogonal concepts. (d) ignores both compute cost and the fact that 1-month val with 119 train rows tells you almost nothing about quarterly forecasting.</>}
        lens={<>(b). Pick fold count to satisfy two constraints: each train fold has enough seasonal cycles (≥ 1 year for monthly), and each val fold matches your forecast horizon. With 120 rows and a 3-month horizon, ~8 folds (12-month val step) hits the sweet spot.</>}
      />

      <VIS.TrapProblem
        id="tscv-q10"
        difficulty="hard"
        title="Q10 [Axis F — failure] — Why might TimeSeriesSplit overstate model quality during COVID-era backtests?"
        scenario={<><em>Discriminating insight:</em> TimeSeriesSplit assumes the future resembles the past. What happens when a structural break sits inside one of your folds?</>}
        options={[
          {key:"a", text:"It will UNDERSTATE quality — the COVID shock makes one fold look terrible and drags the mean down."},
          {key:"b", text:"It will OVERSTATE quality if folds straddle the break: the training side learns pre-COVID patterns and validates on the same regime, missing the post-break degradation.", correct:true},
          {key:"c", text:"TimeSeriesSplit is robust to structural breaks by construction; nothing changes."},
          {key:"d", text:"Only Bayesian CV variants handle structural breaks; classic TimeSeriesSplit cannot give meaningful results in this setting."},
        ]}
        trap={<>(a) is plausible-sounding and the OPPOSITE of the dominant effect: a fold that straddles the break sees the model trained MOSTLY on one regime and validated MOSTLY on the same regime, so it actually looks fine — and the per-fold variance hides the regime-transition failure. (c) is wishful thinking. (d) overclaims; classic schemes still help if you're explicit about regime-aware folds.</>}
        lens={<>(b). When a structural break sits in the MIDDLE of your dataset and you use expanding-window CV, most folds are 'pure regime' — pre-COVID train+val OR post-COVID train+val. The fold that straddles the break is a tiny minority and gets averaged away. Cure: cut the dataset at the regime break and treat pre- and post- as separate problems, or use rolling-window with a window short enough to be inside one regime.</>}
        stretch={<>Would using rolling-window with a 6-month window expose the break? Why?</>}
      />

      <VIS.TrapProblem
        id="tscv-q11"
        difficulty="medium"
        title="Q11 [Axis A — identity] — Is k-fold on shuffled month-of-year features 'time-series CV'?"
        scenario={<>A teammate proposes: 'Drop the date column, compute "month_of_year" as a feature, shuffle the rows, and run standard 5-fold CV. The model can learn seasonality from the month feature, and we get all the benefits of normal CV.'</>}
        options={[
          {key:"a", text:"Yes — once you encode seasonality as a feature, time-series CV is no longer necessary; classic CV is fine."},
          {key:"b", text:"No — autocorrelation, lookback features, and regime shifts persist regardless of how seasonality is encoded. Random folds still leak via these other channels.", correct:true},
          {key:"c", text:"Yes, but only if the data has no trend; in trending series you'd still need time-series CV."},
          {key:"d", text:"It depends on whether the model is linear or non-linear; tree models are immune to leak through month_of_year."},
        ]}
        trap={<>(a) is the most plausible-sounding wrong answer and a common mistake. (c) gets close to a real distinction (trend matters) but still misses autocorrelation and lookback features. (d) is the same 'tree models are immune' myth as in Q1.</>}
        lens={<>(b). Encoding month_of_year addresses SEASONALITY representation but does not change whether nearby-in-time rows are statistically dependent. Lookback features still overlap, autocorrelation still exists, and random folds still leak. Time-series CV is about respecting the DEPENDENCE structure, not about which features encode what.</>}
      />

      <VIS.TrapProblem
        id="tscv-q12"
        difficulty="hard"
        title="Q12 [Axis B — mechanism] — Why does target encoding leak especially badly in time-series settings?"
        scenario={<><em>Discriminating insight:</em> target encoding replaces a categorical with the mean target value. If computed across all rows globally, val labels participate. If computed per-fold, you also need to respect time.</>}
        options={[
          {key:"a", text:"It leaks the SAME amount as in tabular CV — there is nothing special about time-series."},
          {key:"b", text:"It leaks via the LABEL — the val row's target contributes to its own feature value when encoding is computed globally; plus the future leaks into the past when encoding is fit on the full timeline.", correct:true},
          {key:"c", text:"It leaks only when the categorical is also the time index — otherwise time-series target encoding is safe."},
          {key:"d", text:"Target encoding never leaks if you use a smoothing prior (e.g. m-estimate) because the prior dominates the signal."},
        ]}
        trap={<>(a) misses the second leak channel. (c) is a fictional carve-out. (d) confuses regularizing the encoding with preventing the leak — smoothing reduces variance, it does not stop information flow.</>}
        lens={<>(b). Two-channel leak: (1) the val row's own target enters its encoded feature if encoding is computed on the full dataset, and (2) future-fold targets enter past-fold features because target encoding has no time index by default. Cure: compute target encoding using ONLY rows STRICTLY earlier in time than the row being encoded — 'expanding-mean' encoding.</>}
        stretch={<>What does sklearn's category_encoders.TargetEncoder do by default w.r.t. time?</>}
      />

      <VIS.TrapProblem
        id="tscv-q13"
        difficulty="medium"
        title="Q13 [Axis D — application] — Equity returns forecasting at 1-minute frequency: which scheme?"
        scenario={<>High-frequency equity returns. 200,000 1-minute bars over 1 year. Features: lag returns at 1, 5, 30 minutes; rolling-vol over the last 60 minutes. Label: next-1-minute return. You want to estimate live trading performance.</>}
        options={[
          {key:"a", text:"5-fold random k-fold — at 1-minute frequency, autocorrelation is nearly zero and time-series CV is overkill."},
          {key:"b", text:"Walk-forward backtest with purge ≥ 60 minutes and a small embargo to handle overnight gaps.", correct:true},
          {key:"c", text:"Group k-fold on the trading day — ensures each day appears in exactly one fold."},
          {key:"d", text:"Holdout: take the last 20% of the year as test, ignore CV."},
        ]}
        trap={<>(a) is wrong; 1-minute returns have measurable autocorrelation at short lags. (c) blocks day-level group leakage but ignores the 60-minute rolling-vol leak within a day. (d) gives you one number with high variance — useless for assessing live performance stability.</>}
        lens={<>(b). HFT scenarios are textbook walk-forward: simulate retraining nightly, predicting next-day, rolling forward. Purge ≥ 60 min handles the rolling-vol overlap; an overnight embargo handles the discontinuity between trading sessions. This is the only scheme that mimics live trading.</>}
      />

      <VIS.TrapProblem
        id="tscv-q14"
        difficulty="hard"
        title="Q14 [Axis F — failure] — When does TimeSeriesSplit produce a misleadingly OPTIMISTIC val score?"
        scenario={<><em>Discriminating insight:</em> the val score depends on what the val window looks like. If the val window happens to be an easier regime than the production window, your offline number flatters.</>}
        options={[
          {key:"a", text:"Never — TimeSeriesSplit is conservative by design; it cannot overstate quality."},
          {key:"b", text:"When the val windows happen to fall on 'easy' regimes (calm volatility, stable demand) while production faces a structural break the CV never tested.", correct:true},
          {key:"c", text:"Only when n_splits is too small — go to n_splits=20 and the issue disappears."},
          {key:"d", text:"Only when the model is misspecified — a flexible-enough model is immune to this issue."},
        ]}
        trap={<>(a) is the textbook reassurance and wrong: 'no leak' doesn't mean 'predictive of prod.' (c) confuses fold count with regime coverage. (d) is unrelated.</>}
        lens={<>(b). TimeSeriesSplit gives you a leak-free estimate, but the val windows it picks are still a sample from your historical distribution. If history is mostly calm and prod hits a storm, CV will under-predict the storm error. Cure: report per-fold MAPE distribution, not just mean; explicitly include a 'stress-test' fold spanning the worst-known regime.</>}
      />

      <VIS.TrapProblem
        id="tscv-q15"
        difficulty="medium"
        title="Q15 [Axis E — operations] — How do you implement a rolling-window with embargo in sklearn?"
        scenario={<><em>Discriminating insight:</em> as of sklearn 1.6, TimeSeriesSplit supports max_train_size and gap. Embargo is the gap on the FAR side of val and requires custom logic.</>}
        options={[
          {key:"a", text:"TimeSeriesSplit(n_splits=5, max_train_size=100, gap=7) plus a custom wrapper that excludes the 7 rows after each val window from the next fold's training set.", correct:true},
          {key:"b", text:"TimeSeriesSplit(n_splits=5, gap=7, embargo=7) — sklearn supports both parameters natively."},
          {key:"c", text:"There is no way; you must use mlfinlab or implement from scratch."},
          {key:"d", text:"Use TimeSeriesSplit with shuffle=True; the shuffle randomizes embargo placement automatically."},
        ]}
        trap={<>(b) invents an embargo parameter that sklearn does not provide. (c) is overly defeatist — gap+max_train_size cover the common case; only embargo needs custom code. (d) is nonsensical — shuffle=True is incompatible with TimeSeriesSplit.</>}
        lens={<>(a). Build on TimeSeriesSplit for the train+gap+val partitioning, then post-process the splits in a small wrapper that walks them and excludes the embargo region from subsequent training folds. mlfinlab packages this; sklearn does not.</>}
      />

      <VIS.TrapProblem
        id="tscv-q16"
        difficulty="hard"
        title="Q16 [Axis C — intuition] — Per-fold MAPE: [3.8, 3.9, 4.0, 4.1, 4.2]. What does this MAINLY tell you?"
        scenario={<>You run 5-fold expanding-window CV on a forecasting model. Per-fold MAPE: [3.8, 3.9, 4.0, 4.1, 4.2]. Monotonically increasing across folds.</>}
        options={[
          {key:"a", text:"The model is overfitting more in later folds; reduce model capacity."},
          {key:"b", text:"There is concept drift — the prediction task is getting genuinely harder over time, or the model's pre-drift training data is becoming less representative.", correct:true},
          {key:"c", text:"There is leakage decreasing across folds — early folds are leakier than later folds."},
          {key:"d", text:"Random noise — the trend is meaningless with only 5 folds."},
        ]}
        trap={<>(a) confuses 'higher MAPE on later folds' with 'overfitting'. Overfitting would show up as train-val gap, not as a monotonic upward val trend across time. (c) reverses the leak direction — leaks make scores BETTER, so a monotonic worsening is the opposite of a fading leak. (d) gives up — a monotonic trend with std small relative to the slope is meaningful even at n=5.</>}
        lens={<>(b). Monotonic worsening across time is the textbook signature of concept drift — the recent regime is genuinely harder, the older training data is less representative, or both. Cure: switch to rolling-window with a recent training window, and consider retraining cadence.</>}
        stretch={<>What would you expect to see if the model were instead getting better with more data (expanding training helping)?</>}
      />

      <VIS.TrapProblem
        id="tscv-q17"
        difficulty="medium"
        title="Q17 [Axis A — identity] — Is 'leave-one-customer-out' CV time-series CV?"
        scenario={<><em>Discriminating insight:</em> leave-one-out-by-group eliminates one type of leak (customer) but says nothing about time order within or across customers.</>}
        options={[
          {key:"a", text:"Yes — leaving an entity out is a generalization of time-series CV."},
          {key:"b", text:"No — it prevents customer-level leakage but not time-level leakage; the held-out customer's history can still straddle the training window in time.", correct:true},
          {key:"c", text:"Yes, because each customer's data forms a mini time-series and excluding it respects time within each one."},
          {key:"d", text:"It depends on the loss function — only regression losses respect time; classification losses do not."},
        ]}
        trap={<>(a) inflates the scope of group CV. (c) sounds right but confuses 'has a time index per customer' with 'time-aware CV'. (d) is unrelated.</>}
        lens={<>(b). Group CV and time-series CV address ORTHOGONAL leakage axes. To handle both, combine them — PurgedGroupTimeSeriesSplit or its equivalents.</>}
      />

      <VIS.TrapProblem
        id="tscv-q18"
        difficulty="hard"
        title="Q18 [Axis F — failure] — When can random k-fold be UNBIASED on time-stamped data?"
        scenario={<><em>Discriminating insight:</em> the leak requires temporal DEPENDENCE between rows. If rows are conditionally i.i.d. given features, time order is irrelevant.</>}
        options={[
          {key:"a", text:"Never — any dataset with a timestamp must use TimeSeriesSplit; this is a hard rule."},
          {key:"b", text:"When rows are conditionally i.i.d. given features (no autocorrelation, no shared lookback, no autoregressive label, no shared entity); rare but possible.", correct:true},
          {key:"c", text:"Only when the timestamp column is removed from features before training."},
          {key:"d", text:"When the model is a simple linear regression with no interactions."},
        ]}
        trap={<>(a) is the overgeneralization that catches juniors. (c) and (d) are red herrings — removing the date column or simplifying the model does not affect whether rows are dependent.</>}
        lens={<>(b). Time-series CV is necessary IFF rows are temporally dependent. A dataset where each row is a fully-described independent draw — e.g. a one-shot snapshot per row with no rolling features and no autoregressive target — can use random k-fold even with timestamps. Concrete example: image-classification with metadata timestamps where labels do not depend on temporal context.</>}
        stretch={<>Name a real-world dataset that LOOKS time-series but is actually i.i.d. given features.</>}
      />

      <VIS.TrapProblem
        id="tscv-q19"
        difficulty="medium"
        title="Q19 [Axis E — operations] — Scaler placement in a TimeSeriesSplit pipeline"
        scenario={<>You have a forecasting pipeline: StandardScaler → XGBoost. You wrap them in sklearn.pipeline.Pipeline and run cross_val_score with TimeSeriesSplit. Is the scaler leak-safe?</>}
        options={[
          {key:"a", text:"No — Pipeline still fits the scaler on the full dataset before CV begins."},
          {key:"b", text:"Yes — Pipeline refits the scaler on EACH training fold separately during cross_val_score; the val fold is then transformed using train-only stats.", correct:true},
          {key:"c", text:"Only if you set Pipeline(memory=None) — memoization caches the global fit and leaks."},
          {key:"d", text:"Only if you wrap in a ColumnTransformer first; bare Pipeline always leaks."},
        ]}
        trap={<>(a) is the persistent myth that sklearn pre-fits transformers; it does not. (c) and (d) invent leakage knobs that do not exist.</>}
        lens={<>(b). Pipeline + cross_val_score is the canonical leak-safe pattern: every fold gets its own fit. The leak path most people fall into is fitting the scaler MANUALLY on the dataset before passing to cross_val_score — which is what (a) describes but is a user mistake, not a Pipeline default.</>}
      />

      <VIS.TrapProblem
        id="tscv-q20"
        difficulty="hard"
        title="Q20 [Axis D — application] — Patient hospital readmission within 30 days: pick the CV"
        scenario={<>Predict 30-day hospital readmission. 1M patients, 5M admissions, 10 years of data. Each patient may have 1-20 admissions. Features include patient history aggregates. Label horizon: 30 days forward from each admission.</>}
        options={[
          {key:"a", text:"5-fold stratified k-fold on the readmission label — preserves class balance."},
          {key:"b", text:"GroupKFold on patient_id only — prevents patient leakage; time leakage is minor for this label."},
          {key:"c", text:"Combined: GroupKFold-on-patient PLUS TimeSeriesSplit-on-admission-date PLUS 30-day embargo for the forward label.", correct:true},
          {key:"d", text:"TimeSeriesSplit on admission date only — patient history aggregates handle the patient axis automatically."},
        ]}
        trap={<>(a) is the textbook anti-pattern. (b) misses both the time axis and the 30-day forward-looking label. (d) ignores the patient-level grouping entirely; patient_aggregate features will leak across folds even with a perfect time split.</>}
        lens={<>(c). The 30-day forward-looking label demands an embargo. The patient appearing in many admissions demands a group axis. The time-series CV demands chronological folds. All three apply. This is the canonical 'all three leakage axes simultaneously' problem.</>}
        stretch={<>What goes wrong if you set the embargo to 7 days instead of 30?</>}
      />

      <VIS.TrapProblem
        id="tscv-q21"
        difficulty="medium"
        title="Q21 [Axis C — intuition] — Train MAPE 4.0%, val MAPE 9.0%, prod MAPE 9.5%. Diagnosis?"
        scenario={<>Forecasting model. Train MAPE 4.0%, val MAPE 9.0%, prod MAPE 9.5%. CV scheme: TimeSeriesSplit with gap=7. Pick the most likely single cause.</>}
        options={[
          {key:"a", text:"Severe overfitting — train-val gap is 5 points and the model is fitting train noise. Reduce capacity.", correct:true},
          {key:"b", text:"Time-series leakage — val is contaminated and the model is exploiting it."},
          {key:"c", text:"Distribution shift between val and prod — retrain immediately."},
          {key:"d", text:"Everything is fine — val ~= prod is the success criterion."},
        ]}
        trap={<>(b) reverses the usual leakage signature. With leakage, val would look ARTIFICIALLY GOOD (close to train), not artificially bad. Here val tracks prod, which is exactly what a leak-free CV looks like. (c) misreads the val/prod numbers — they MATCH, so no shift between them. (d) ignores the train-val gap.</>}
        lens={<>(a). Healthy CV diagnostic: val ≈ prod (CV is honest), but train ≪ val means classical overfitting. This is the GOOD outcome from the CV's perspective — it told you the truth about generalization — but the model still needs regularization, more data, or simpler structure.</>}
      />

      <VIS.TrapProblem
        id="tscv-q22"
        difficulty="hard"
        title="Q22 [Axis B — mechanism] — Why does Bayesian HPO overfit to TimeSeriesSplit folds even more than to random folds?"
        scenario={<><em>Discriminating insight:</em> Bayesian HPO adapts its sampling to past CV scores. The more correlated the folds, the more HPO can exploit that structure.</>}
        options={[
          {key:"a", text:"It doesn't — Bayesian HPO is unbiased w.r.t. CV scheme."},
          {key:"b", text:"TimeSeriesSplit folds are HIGHLY CORRELATED (they share the early training data), so Bayesian HPO can exploit shared idiosyncrasies more efficiently than with random folds.", correct:true},
          {key:"c", text:"TimeSeriesSplit folds are independent by construction; HPO cannot overfit them."},
          {key:"d", text:"Only for deep networks; Bayesian HPO on tree models cannot overfit TimeSeriesSplit folds."},
        ]}
        trap={<>(a) and (c) deny the issue. (d) carves out a model-specific exception that doesn't hold.</>}
        lens={<>(b). The shared training prefix across expanding-window folds creates strongly-correlated per-fold scores. Bayesian HPO (Optuna, Hyperopt) treats them as a structured surface and concentrates samples near apparent optima — which are actually optima for the shared idiosyncrasies, not for generalization. Cure: nested CV with an outer test fold the HPO never sees.</>}
        stretch={<>Would random search suffer less from this effect at the same trial count?</>}
      />

      <VIS.TrapProblem
        id="tscv-q23"
        difficulty="medium"
        title="Q23 [Axis A — identity] — Does cross-validation give a 'better' estimate than holdout for time-series?"
        scenario={<><em>Discriminating insight:</em> CV gives k estimates and a variance; holdout gives one estimate and no variance. The 'better' depends on what you want.</>}
        options={[
          {key:"a", text:"Yes, always — CV gives a tighter point estimate via averaging."},
          {key:"b", text:"It gives a different kind of estimate: k scores plus a variance, at higher compute cost. For final production sign-off, a single holdout on the latest window often matches production better.", correct:true},
          {key:"c", text:"No — holdout is always preferred for time-series because it best mimics deployment."},
          {key:"d", text:"They are equivalent — the central limit theorem ensures both converge to the true generalization error."},
        ]}
        trap={<>(a) overlooks that CV mean can be biased if all folds share a flaw. (c) overstates holdout. (d) ignores finite-sample effects entirely.</>}
        lens={<>(b). Two answers to two questions: 'how stable is my model across regimes?' → CV; 'what will I see if I ship next week?' → holdout on the most recent window. Mature practitioners report both.</>}
      />

      <VIS.TrapProblem
        id="tscv-q24"
        difficulty="hard"
        title="Q24 [Axis F — failure] — What goes wrong when train-fold sizes are vastly unequal?"
        scenario={<>You run TimeSeriesSplit(n_splits=10) on 1000 rows. Fold 1 trains on 100 rows; fold 10 trains on 1000 rows. Per-fold MAPE: [22.0, 14.0, 9.0, 7.0, 6.5, 6.0, 5.7, 5.5, 5.4, 5.3].</>}
        options={[
          {key:"a", text:"The mean MAPE (8.6) is the best honest estimate of generalization."},
          {key:"b", text:"The mean is misleading — early folds are training-set-size-limited and not representative of the final production model, which uses all data. Weight by fold or report only late folds.", correct:true},
          {key:"c", text:"Random fold variance — re-run with a different seed."},
          {key:"d", text:"There is a leak in the early folds; the late folds give the true number."},
        ]}
        trap={<>(a) takes the unweighted mean at face value. (c) confuses systematic train-size bias with random noise. (d) reverses the leak signature (leaks make scores BETTER, not worse).</>}
        lens={<>(b). The first folds measure 'model with 100 rows' which is not what you'll deploy. For final-model estimation, weight folds by training size or report only the steady-state late folds. For 'is more data still helping?', plot the per-fold curve — it shows the learning curve along time.</>}
      />

      <VIS.TrapProblem
        id="tscv-q25"
        difficulty="hard"
        title="Q25 [Axis E — operations] — In what order should you split, scale, target-encode, and impute?"
        scenario={<><em>Discriminating insight:</em> every preprocessing step that touches the label or summary statistics must be fit ONLY on the training fold. Order matters because some steps assume others have already happened.</>}
        options={[
          {key:"a", text:"Split first, then impute on train, then scale on train, then target-encode on train using train-only labels; transform val with each fitted step in the same order.", correct:true},
          {key:"b", text:"Impute and scale on the full dataset (so train and val are on the same numerical basis), then split, then target-encode per fold."},
          {key:"c", text:"Target-encode first on the full dataset (categorical features are stable across folds), then split, then scale and impute per fold."},
          {key:"d", text:"Order doesn't matter as long as each step is wrapped in sklearn.Pipeline — Pipeline handles ordering internally."},
        ]}
        trap={<>(b) and (c) both leak via 'we'll be careful with the dangerous step'. ANY global fit leaks; the safe rule is 'split first, fit everything per-fold'. (d) is wrong in spirit — Pipeline respects order, but the ORDER YOU SPECIFY still must be split-then-fit.</>}
        lens={<>(a). The split-first discipline is the only safe answer. Imputation values, scaler stats, target-encoding tables — all are summary statistics of the labels or features and all leak if fit globally. In sklearn: split via TimeSeriesSplit, then a Pipeline(impute → scale → target_encode → model) gets cross_val_scored, and every step refits per fold.</>}
        stretch={<>What goes wrong if you target-encode AFTER scaling instead of before?</>}
      />
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://www.fast.ai/posts/2017-11-13-validation-sets.html" target="_blank" rel="noopener">Rachel Thomas — <em>How (and why) to create a good validation set</em> (blog)</a> — the most-shared practitioner essay on why time-aware validation matters; worked examples from a Kaggle grocery-forecasting competition.</li>

        <li><a href="https://www.wiley.com/en-us/Advances+in+Financial+Machine+Learning-p-9781119482086" target="_blank" rel="noopener">Marcos Lopez de Prado — <em>Advances in Financial Machine Learning</em>, Ch. 7 (textbook)</a> — the canonical treatment of purge and embargo, with PurgedKFold derivations.</li>

      </ul>
    </VIS.Section>
