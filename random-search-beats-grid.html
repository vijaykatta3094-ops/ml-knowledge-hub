  // <VIS.TrapProblem
  //   id="bv-q1"
  //   difficulty="hard"
  //   title="..."
  //   scenario={<>...JSX...</>}
  //   diagram={<VIS.Mermaid chart={...} />}
  //   options={[
  //     {key:"a", text:"...", correct:false},
  //     {key:"b", text:"...", correct:true},
  //     ...

  //   lens={<>The right answer + reasoning</>}
  //   stretch="optional follow-up question"

  //
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  // Trap problem from the Idea Engine /learn template. MCQ with click-to-pick,
  // then click-to-reveal model answer. Each problem owns its own state.
  //
  // Three modes, chosen per-problem based on what the concept needs:
  //   mode="single"  (default): one option is correct (radio-style)
  //   mode="multi":  multiple options correct, user picks any subset
  //                  (set `multiSelect={true}` OR `mode="multi"`)
  //   mode="ordered": real-world priority test — options have an `order` field

  //                  User clicks in order; each pick gets a position badge.
  //                  Reveal shows correct rank, marks wrong-position picks and
  //                  wrong-move picks differently.
  function TrapProblem(props) {
    const { id, difficulty = "hard", title, scenario, diagram,
            options = [], trap, lens, stretch,
            multiSelect = false, mode } = props;
    const effectiveMode = mode || (multiSelect ? "multi" : "single");
    const isOrdered = effectiveMode === "ordered";
    const isMulti = effectiveMode === "multi";

    // Selection state shape varies by mode:
    //   single  → string | null
    //   multi   → Set<string>
    //   ordered → string[]  (in pick order)
    const [selected, setSelected] = React.useState(
      isOrdered ? [] : (isMulti ? new Set() : null)
    );
    const [revealed, setRevealed] = React.useState(false);

    function isSelected(key) {
      if (isOrdered) return selected.includes(key);
      if (isMulti) return selected.has(key);
      return selected === key;
    }
    function pickOrder(key) {
      if (isOrdered) {
        const idx = selected.indexOf(key);
        return idx >= 0 ? idx + 1 : null;
      }
      return null;
    }
    function pick(key) {
      if (revealed) return;
      if (isOrdered) {
        setSelected(
          selected.includes(key)
            ? selected.filter((k) => k !== key)
            : [...selected, key]
        );
      } else if (isMulti) {
        const next = new Set(selected);
        if (next.has(key)) next.delete(key); else next.add(key);
        setSelected(next);
      } else {
        setSelected(key);
      }
    }
    function reveal() { setRevealed(true); }
    function reset() {
      setSelected(isOrdered ? [] : (isMulti ? new Set() : null));
      setRevealed(false);
    }
    function optionClass(o) {
      if (!revealed) return "vis-trap-option" + (isSelected(o.key) ? " is-selected" : "");
      if (isOrdered) {
        // Right move at right rank → fully correct
        const userPos = pickOrder(o.key);
        const correctPos = o.order; // null = wrong move
        if (correctPos != null && userPos === correctPos) return "vis-trap-option is-correct";
        // Right move at wrong rank → partial credit (yellow)
        if (correctPos != null && userPos != null && userPos !== correctPos)
          return "vis-trap-option is-correct-wrong-pos";
        // Right move not picked → "you missed this"
        if (correctPos != null && userPos == null) return "vis-trap-option is-correct";
        // Wrong move picked → red
        if (correctPos == null && userPos != null) return "vis-trap-option is-wrong-selected";
        // Wrong move not picked → faded
        return "vis-trap-option is-disabled";
      }
      if (o.correct) return "vis-trap-option is-correct";
      if (isSelected(o.key)) return "vis-trap-option is-wrong-selected";
      return "vis-trap-option is-disabled";
    }
    const anyPicked = isOrdered ? selected.length > 0
                                : (isMulti ? selected.size > 0 : selected !== null);
    const correctCount = isOrdered
      ? options.filter((o) => o.order != null).length
      : options.filter((o) => o.correct).length;
    const modeBadge = isOrdered ? "Pick in correct ORDER"
                                : (isMulti ? "Select all that apply" : null);

    function optionPrefix(o) {
      if (isOrdered) {
        const pos = pickOrder(o.key);
        if (revealed) {
          // After reveal: show user pos vs correct pos
          if (o.order != null && pos != null)
            return pos === o.order ? `#${pos} ✓` : `you:#${pos} → correct:#${o.order}`;
          if (o.order != null) return `correct:#${o.order}`;
          if (pos != null) return `you:#${pos}`;
          return "—";
        }
        return pos != null ? `#${pos}` : "○";
      }
      if (isMulti) return isSelected(o.key) ? "☑" : "☐";
      return "○";
    }

    function pickSummary() {
      if (!anyPicked) return null;
      if (isOrdered) return `Your order: ${selected.map((k) => "(" + k + ")").join(" → ")}`;
      if (isMulti) return "You picked " + selected.size + " of " + correctCount + " correct option" + (correctCount === 1 ? "" : "s");
      return "You picked (" + selected + ")";
    }

    return h("section", { id, className: "vis-trap" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        modeBadge ? h("span", { className: "vis-trap-multi-badge" }, modeBadge) : null
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      diagram ? h("div", { className: "vis-trap-diagram" }, diagram) : null,
      h("div", { className: "vis-trap-options",
                 role: (isMulti || isOrdered) ? "group" : "radiogroup" },
        options.map((o) => h("button", {
          key: o.key,
          type: "button",
          className: optionClass(o),
          onClick: () => pick(o.key),
          disabled: revealed && (
            isOrdered
              ? (o.order == null && !isSelected(o.key))
              : (!o.correct && !isSelected(o.key))
          ),
          "aria-pressed": isSelected(o.key)
        },
          h("span", { className: "vis-trap-key" },
            optionPrefix(o) + " (" + o.key + ")"),
          " ",
          // NO autoGloss here. Glossing terms inside option text leaks the
          // answer mechanism via hover. Authors must keep options self-contained;
          // a candidate who needs a definition can scroll up to the prose where
          // the term is explicitly wrapped via <VIS.Term>.
          o.text
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", {
          type: "button",
          className: "vis-trap-reveal-btn",
          onClick: reveal
        }, anyPicked ? "Reveal model answer" : "Skip & reveal"),
        anyPicked ? h("span", { className: "vis-trap-hint" }, pickSummary()) : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"),
          h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The lens (model answer)"),
          h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button",
          className: "vis-trap-reset-btn",
          onClick: reset
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.SystemDesign> — pick-and-connect block-diagram problem for system
  // design questions. Palette of N pieces (some are distractors), user clicks
  // to add to canvas, then clicks pairs of placed pieces to draw directed
  // edges. Reveal compares both the picked SET and the edge TOPOLOGY against
  // expected. Pieces have categories that drive color coding.
  function SystemDesign(props) {
    const { id, difficulty = "hard", title, scenario,
            pieces = [], expectedPieces = [], expectedEdges = [],
            trap, lens, stretch } = props;
    const [placed, setPlaced] = React.useState([]);     // [pieceId]
    const [edges, setEdges] = React.useState([]);       // [[src, tgt]]
    const [connectMode, setConnectMode] = React.useState(null); // null | "waiting" | {src}
    const [revealed, setRevealed] = React.useState(false);

    const pieceById = Object.fromEntries(pieces.map((p) => [p.id, p]));
    function pieceLabel(id) { return pieceById[id]?.label || id; }

    function addPiece(pieceId) {
      if (revealed || placed.includes(pieceId)) return;
      setPlaced([...placed, pieceId]);
    }
    function removePiece(pieceId) {
      if (revealed) return;
      setPlaced(placed.filter((p) => p !== pieceId));
      setEdges(edges.filter(([s, t]) => s !== pieceId && t !== pieceId));
    }
    function startConnect() {
      if (revealed || placed.length < 2) return;
      setConnectMode("waiting");
    }
    function clickPlacedPiece(pieceId) {
      if (revealed) return;
      if (connectMode === "waiting") {
        setConnectMode({ src: pieceId });
      } else if (connectMode && connectMode.src) {
        if (connectMode.src === pieceId) {
          setConnectMode(null);
        } else {
          const edge = [connectMode.src, pieceId];
          if (!edges.some(([s, t]) => s === edge[0] && t === edge[1])) {
            setEdges([...edges, edge]);
          }
          setConnectMode(null);
        }
      }
    }
    function removeEdge(idx) {
      if (revealed) return;
      setEdges(edges.filter((_, i) => i !== idx));
    }
    function reveal() { setRevealed(true); setConnectMode(null); }
    function reset() {
      setPlaced([]); setEdges([]); setConnectMode(null); setRevealed(false);
    }

    function paletteClass(p) {
      const base = "vis-sd-piece" + (p.category ? " cat-" + p.category : "");
      return placed.includes(p.id) ? base + " is-placed" : base;
    }
    function placedClass(pieceId) {
      let cls = "vis-sd-placed";
      if (connectMode && connectMode.src === pieceId) cls += " is-connect-source";
      if (revealed) {
        cls += expectedPieces.includes(pieceId) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function edgeIsExpected(edge) {
      return expectedEdges.some(([s, t]) => s === edge[0] && t === edge[1]);
    }

    const correctPicks = placed.filter((id) => expectedPieces.includes(id)).length;
    const correctEdges = edges.filter((e) => edgeIsExpected(e)).length;
    const missingPieces = expectedPieces.filter((id) => !placed.includes(id));
    const missingEdges = expectedEdges.filter(([s, t]) =>
      !edges.some(([es, et]) => es === s && et === t)
    );
    const distractorPicks = placed.filter((id) => !expectedPieces.includes(id));
    const wrongEdges = edges.filter((e) => !edgeIsExpected(e));

    return h("section", { id, className: "vis-sd" },
      h("div", { className: "vis-sd-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-sd-mode-badge" }, "Pick & connect")
      ),
      scenario ? h("div", { className: "vis-sd-scenario" }, scenario) : null,
      h("div", { className: "vis-sd-label" },
        "Palette — click a piece to add it to your design"),
      h("div", { className: "vis-sd-palette" },
        pieces.map((p) => h("button", {
          key: p.id, type: "button",
          className: paletteClass(p),
          onClick: () => addPiece(p.id),
          disabled: revealed || placed.includes(p.id),
          title: p.description || p.label,
        }, p.label))
      ),
      h("div", { className: "vis-sd-label" },
        "Your design (" + placed.length + " piece" + (placed.length === 1 ? "" : "s") + ")"),
      h("div", { className: "vis-sd-canvas" },
        placed.length === 0
          ? h("div", { className: "vis-sd-canvas-empty" },
              "Click pieces above to start building your design.")
          : placed.map((pieceId) => h("button", {
              key: pieceId, type: "button",
              className: placedClass(pieceId),
              onClick: () => clickPlacedPiece(pieceId),
            },
              pieceLabel(pieceId),
              !revealed ? h("span", {
                className: "vis-sd-remove",
                onClick: (e) => { e.stopPropagation(); removePiece(pieceId); },
                role: "button", "aria-label": "Remove"
              }, " ✕") : null
            ))
      ),
      !revealed && placed.length >= 2 ? h("div", { className: "vis-sd-actions" },
        connectMode === null ? h("button", {
          type: "button", className: "vis-sd-connect-btn", onClick: startConnect,
        }, "+ Add connection") : null,
        connectMode === "waiting" ? h("span", { className: "vis-sd-connect-status" },
          "Click the SOURCE piece on the canvas...") : null,
        connectMode && connectMode.src ? h("span", { className: "vis-sd-connect-status" },
          "Source: " + pieceLabel(connectMode.src) + ". Click the TARGET piece.") : null,
        connectMode ? h("button", {
          type: "button", className: "vis-sd-connect-cancel",
          onClick: () => setConnectMode(null),
        }, "cancel") : null
      ) : null,
      edges.length > 0 ? h("div", { className: "vis-sd-edges" },
        h("div", { className: "vis-sd-label", style: { margin: "0 0 4px" } },
          "Connections (" + edges.length + ")"),
        h("ul", null,
          edges.map((edge, idx) => h("li", {
            key: idx, className: revealed ? (edgeIsExpected(edge) ? "is-correct" : "is-wrong") : ""
          },
            pieceLabel(edge[0]) + " → " + pieceLabel(edge[1]),
            revealed && edgeIsExpected(edge) ? h("span", null, " ✓") : null,
            revealed && !edgeIsExpected(edge) ? h("span", null, " ✗") : null,
            !revealed ? h("button", {
              type: "button", className: "vis-sd-edge-x",
              onClick: () => removeEdge(idx)
            }, "✕") : null
          ))
        )
      ) : null,
      !revealed ? h("button", {
        type: "button", className: "vis-sd-reveal-btn", onClick: reveal,
      }, "Reveal model design") : null,
      revealed ? h("div", null,
        h("div", { className: "vis-sd-score" },
          "Pieces correct: " + correctPicks + " / " + expectedPieces.length + ".  ",
          "Connections correct: " + correctEdges + " / " + expectedEdges.length + "."
        ),
        distractorPicks.length > 0 ? h("div", { className: "vis-sd-missing-block",
          style: { background: "#fee2e2", borderLeftColor: "#dc2626", color: "#7f1d1d" } },
          h("strong", null, "✗ You picked pieces that don't belong"),
          distractorPicks.map(pieceLabel).join(", ")
        ) : null,
        missingPieces.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ You missed these pieces"),
          missingPieces.map(pieceLabel).join(", ")
        ) : null,
        missingEdges.length > 0 ? h("div", { className: "vis-sd-missing-block" },
          h("strong", null, "⚠ Missing connections"),
          missingEdges.map(([s, t]) => pieceLabel(s) + " → " + pieceLabel(t)).join("; ")
        ) : null,
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)
        ) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The model design"), h("div", null, lens)
        ) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)
        ) : null,
        h("button", {
          type: "button", className: "vis-trap-reset-btn", onClick: reset,
        }, "↺ Try again")
      ) : null
    );
  }

  // <VIS.CodeFillin> — fill-in-the-blank code exercise.
  //   code: array of lines. Blanks are written as __N__ (e.g., __1__, __2__).
  //   options: pool of pickable answers. Each {key, text, fills: [blankN, ...]}
  //            where `fills` is the set of blanks this option is correct for.
  //            Options without `fills` (or with empty fills) are pure decoys.
  // Workflow: click option → it highlights. Click blank → it gets filled with
  //           the picked option's text. Click a filled blank → clears it.
  function CodeFillin(props) {
    const { id, difficulty = "hard", title, scenario,
            language = "python", code = [], options = [],
            trap, lens, stretch } = props;
    const [fills, setFills] = React.useState({}); // {blankN: optionKey}
    const [picked, setPicked] = React.useState(null);
    const [revealed, setRevealed] = React.useState(false);

    const optionByKey = Object.fromEntries(options.map((o) => [o.key, o]));
    function correctOptionsFor(blank) {
      return options.filter((o) => Array.isArray(o.fills) && o.fills.includes(blank));
    }
    function isOptionCorrectForBlank(optionKey, blank) {
      const o = optionByKey[optionKey];
      return o && Array.isArray(o.fills) && o.fills.includes(blank);
    }
    function clickOption(key) {
      if (revealed) return;
      setPicked(picked === key ? null : key);
    }
    function clickBlank(blank) {
      if (revealed) return;
      if (fills[blank]) {
        const next = { ...fills }; delete next[blank]; setFills(next);
        return;
      }
      if (!picked) return;
      setFills({ ...fills, [blank]: picked });
      setPicked(null);
    }
    function reveal() { setRevealed(true); setPicked(null); }
    function reset() { setFills({}); setPicked(null); setRevealed(false); }

    function blankClass(blank) {
      let cls = "vis-cf-blank";
      if (fills[blank]) cls += " is-filled";
      if (revealed) {
        cls += isOptionCorrectForBlank(fills[blank], blank) ? " is-correct" : " is-wrong";
      }
      return cls;
    }
    function optionClass(o) {
      let cls = "vis-cf-option";
      if (!revealed && picked === o.key) cls += " is-picked";
      const usedInBlank = Object.entries(fills).find(([, v]) => v === o.key);
      if (usedInBlank) cls += " is-used";
      if (revealed) {
        const correctSlots = Array.isArray(o.fills) ? o.fills : [];
        if (correctSlots.length > 0) cls += " is-correct-option";
      }
      return cls;
    }

    function renderLine(line, lineIdx) {
      const parts = []; let last = 0;
      const re = /__(\d+)__/g; let m;
      while ((m = re.exec(line)) !== null) {
        if (m.index > last)
          parts.push(h("span", { key: "t" + parts.length }, line.slice(last, m.index)));
        const n = parseInt(m[1], 10);
        const filled = fills[n];
        parts.push(h("button", {
          key: "b" + n,
          type: "button",
          className: blankClass(n),
          onClick: () => clickBlank(n),
          title: filled ? "Click to clear" : "Pick an option first, then click here",
          disabled: revealed,
        }, filled ? optionByKey[filled]?.text || filled : `␣${n}`));
        last = m.index + m[0].length;
      }
      if (last < line.length)
        parts.push(h("span", { key: "tail" }, line.slice(last)));
      return h("div", { key: lineIdx, className: "vis-cf-line" }, parts);
    }

    const blanksInCode = new Set();
    code.forEach((line) => {
      let m; const re = /__(\d+)__/g;
      while ((m = re.exec(line)) !== null) blanksInCode.add(parseInt(m[1], 10));
    });
    const totalBlanks = blanksInCode.size;
    const correctFills = Object.entries(fills).filter(([b, k]) =>
      isOptionCorrectForBlank(k, parseInt(b, 10))).length;

    return h("section", { id, className: "vis-trap vis-cf" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-cf-mode-badge" }, "Fill in the code")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("div", { className: "vis-cf-code-wrap" },
        h("div", { className: "vis-cf-code-lang" }, language),
        h("pre", { className: "vis-cf-code" },
          code.map((line, idx) => renderLine(line, idx))
        )
      ),
      h("div", { className: "vis-trap-scenario", style: { fontSize: 14, color: "#475569", margin: "12px 0 6px" } },
        "Pick an option below (it highlights), then click a blank in the code to fill it. Click a filled blank to clear it."),
      h("div", { className: "vis-cf-options" },
        options.map((o) => h("button", {
          key: o.key, type: "button",
          className: optionClass(o),
          onClick: () => clickOption(o.key),
          disabled: revealed,
        },
          h("code", null, o.text),
          revealed && Array.isArray(o.fills) && o.fills.length > 0
            ? h("span", { className: "vis-cf-correct-mark" }, " ✓ (fills " + o.fills.map((b) => "␣" + b).join(", ") + ")") : null
        ))
      ),
      !revealed ? h("div", { className: "vis-trap-actions" },
        h("button", { type: "button", className: "vis-trap-reveal-btn", onClick: reveal },
          Object.keys(fills).length > 0 ? "Reveal answer" : "Skip & reveal"),
        Object.keys(fills).length > 0 ? h("span", { className: "vis-trap-hint" },
          "Filled " + Object.keys(fills).length + " of " + totalBlanks + " blanks") : null
      ) : null,
      revealed ? h("div", { className: "vis-trap-reveal-block" },
        h("div", { className: "vis-sd-score" },
          "Correct blanks: " + correctFills + " / " + totalBlanks),
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The trap"), h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The reference implementation"), h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"), h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  // <VIS.MathDerivation> — step-by-step proof with click-to-reveal per step.
  //   steps: [{label, tex, decoyTex?, explain}]
  // Each step starts collapsed; "Show step N" reveals the equation + explanation.
  // If decoyTex is provided, the step becomes a 2-option MCQ first (right vs decoy).
  function MathDerivation(props) {
    const { id, difficulty = "hard", title, scenario, steps = [],
            trap, lens, stretch } = props;
    const [stepState, setStepState] = React.useState(
      steps.map(() => ({ shown: false, picked: null }))
    );
    const [revealedAll, setRevealedAll] = React.useState(false);

    function showStep(idx) {
      const next = stepState.map((s, i) => i === idx ? { ...s, shown: true } : s);
      setStepState(next);
    }
    function pickStep(idx, which) {
      const next = stepState.map((s, i) =>
        i === idx ? { ...s, shown: true, picked: which } : s);
      setStepState(next);
    }
    function revealAll() {
      setStepState(stepState.map((s) => ({ ...s, shown: true })));
      setRevealedAll(true);
    }
    function reset() {
      setStepState(steps.map(() => ({ shown: false, picked: null })));
      setRevealedAll(false);
    }

    return h("section", { id, className: "vis-trap vis-md" },
      h("div", { className: "vis-trap-header" },
        h("span", { className: "vis-trap-difficulty vis-trap-diff-" + difficulty },
          difficulty.toUpperCase()),
        h("strong", { className: "vis-trap-title" }, title),
        h("span", { className: "vis-md-mode-badge" }, "Step-by-step proof")
      ),
      // NO autoGloss on scenario either — scenario is part of the question;
      // glossing mechanism terms in it hints at the answer space.
      scenario ? h("div", { className: "vis-trap-scenario" }, scenario) : null,
      h("ol", { className: "vis-md-steps" },
        steps.map((step, idx) => {
          const st = stepState[idx];
          const hasDecoy = !!step.decoyTex;
          return h("li", { key: idx, className: "vis-md-step" },
            h("div", { className: "vis-md-step-label" },
              h("strong", null, "Step " + (idx + 1) + " — " + step.label)),
            !st.shown && hasDecoy ? h("div", { className: "vis-md-mcq" },
              h("p", { style: { margin: "4px 0", fontSize: 14, color: "#475569" } },
                "Which is correct for this step?"),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "right"),
              }, h(Equation, { tex: step.tex, display: true })),
              h("button", {
                type: "button", className: "vis-md-step-option",
                onClick: () => pickStep(idx, "decoy"),
              }, h(Equation, { tex: step.decoyTex, display: true }))
            ) : null,
            !st.shown && !hasDecoy ? h("button", {
              type: "button", className: "vis-md-show-btn",
              onClick: () => showStep(idx),
            }, "Show step " + (idx + 1)) : null,
            st.shown ? h("div", { className: "vis-md-step-body" },
              hasDecoy && st.picked ? h("div", {
                className: "vis-md-pick-feedback " +
                  (st.picked === "right" ? "is-correct" : "is-wrong")
              }, st.picked === "right" ? "✓ You picked correctly" : "✗ The other option is correct") : null,
              h(Equation, { tex: step.tex, display: true }),
              step.explain ? h("p", { className: "vis-md-explain" }, step.explain) : null
            ) : null
          );
        })
      ),
      !revealedAll ? h("button", {
        type: "button", className: "vis-trap-reveal-btn",
        onClick: revealAll,
        style: { marginTop: 12 },
      }, "Reveal full proof") : null,
      revealedAll ? h("div", { className: "vis-trap-reveal-block" },
        trap ? h("div", { className: "vis-trap-trap" },
          h("strong", null, "⚠ The common mistake"),
          h("div", null, trap)) : null,
        lens ? h("div", { className: "vis-trap-lens" },
          h("strong", null, "✓ The intuition"),
          h("div", null, lens)) : null,
        stretch ? h("div", { className: "vis-trap-stretch" },
          h("strong", null, "◯ Stretch"),
          h("div", null, stretch)) : null,
        h("button", { type: "button", className: "vis-trap-reset-btn", onClick: reset },
          "↺ Try again")
      ) : null
    );
  }

  window.VIS = { Hero, TLDR, Pill, Tag, Card, ByLine, Section, setTitle,
                 Mermaid, VegaLite, Equation, CodeBlock, Callout, Term,
                 TrapProblem, SystemDesign, CodeFillin, MathDerivation };
  // Back-compat: report-viewer downstream uses window.RV. Keep both bindings.
  window.RV = window.VIS;
  console.log("[vis-components] ready: window.VIS =", Object.keys(window.VIS));
})();

</script>

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Random search beats grid — Bergstra & Bengio 2012
// Four-beat pattern + 25 trap drills + 30+ Term wraps in prose.

const ScatterCompare = () => (
  <svg viewBox="0 0 720 360" width="100%" style={{maxWidth: 720, display:"block", margin:"0 auto"}}>
    <g transform="translate(20,20)">

    <VIS.Section id="sec-name" title="Why this matters: most axes are unimportant">

        <VIS.Term def="The slice of an axis where validation loss is within a tolerance of the best achievable value. Wider for forgiving knobs (dropout), narrower for sharp ones (learning rate).">good region</VIS.Term>{" "}

        Grid lands in the good region only if its{" "}
        <VIS.Term def="The choice of k specific values per axis that grid will visit. With k=3 on a log-uniform LR range, the only LRs ever tried are the three pre-chosen values; if none of them is good, grid never recovers.">discretization</VIS.Term>{" "}
        happens to include a good value — for k=3 and a good-region fraction of 0.1, the chance is roughly 27%, regardless of how many trials you spend on the{" "}
        <VIS.Term def="Axes that barely move validation loss. Grid wastes a factor of k per such axis; random wastes nothing, because each random trial gives a fresh draw on every other axis too.">unimportant axes</VIS.Term>.

        scales with the total budget <em>n</em>, while the grid-search hit rate scales with{" "}
        <VIS.Term def="The slice of the budget that lands at a grid coordinate on the important axes. For k values per important axis, only k of every k^d trials sit on a given important coordinate.">per-axis budget</VIS.Term>{" "}
        k = n<sup>1/d</sup>. The <VIS.Term def="The collapse of k from ~n down to n^(1/d) once you go from 1 axis to d axes. The mechanical reason grid loses; random's k stays at n by construction.">exponent collapse</VIS.Term> is what makes grid lose in high d.
      </p>

          {key:"b", text:"Sobol sequences are biased toward axis-aligned configurations, so they replicate grid's failure mode at moderate d."},
          {key:"c", text:"Quasi-random sequences eliminate the need for warm-up in Bayesian optimization because they are deterministic."},
          {key:"d", text:"Sobol is strictly worse than random in d > 2 because of the curse of dimensionality on low-discrepancy sequences."},
        ]}
        trap={<>(b), (c), (d) invent failure modes. The honest answer is: quasi-random is a mild upgrade in moderate d; it does not change the qualitative story.</>}
        lens={<>Low-discrepancy sequences fill space more evenly than i.i.d. uniform. For HPO they are a cheap upgrade — usually 5–20% better per-axis coverage at the same n.</>}
        stretch={<>Why does Sobol degrade past d≈20?</>}/>

      <VIS.TrapProblem id="rs-q13" difficulty="medium"
        title="Q13 — Categorical hyperparameters: how does random search handle 'optimizer ∈ {SGD, Adam, RMSprop}'?"
        scenario={<><em>Discriminating insight:</em> what does the sampler do, and what does the objective surface look like? You are coding a config.</>}
        options={[
          {key:"a", text:"Random search picks one categorical per trial uniformly; the objective is treated as 3 separate sub-surfaces glued together, one per category.", correct:true},
          {key:"b", text:"Random search interpolates between categorical values using a soft embedding, then rounds to the nearest category at evaluation time."},
          {key:"c", text:"Categoricals are converted to one-hot continuous axes and sampled uniformly on the simplex."},
          {key:"d", text:"Random search cannot handle categoricals; you must enumerate them as a discrete outer loop."},
        ]}
        trap={<>(b) invents interpolation. (c) overcomplicates one-hots. (d) is false — categoricals are first-class for random search.</>}
        lens={<>Sample categoricals from a multinomial prior. The cost is that "effective n per category" drops by the number of categories, so allocate accordingly.</>}
        stretch={<>How would you weight categories with prior beliefs?</>}/>

      <VIS.TrapProblem id="rs-q14" difficulty="medium"
        title="Q14 — Conditional hyperparameters: 'momentum' only exists when optimizer == SGD."
        scenario={<><em>Discriminating insight:</em> how should random search handle conditional axes? You are designing a config.</>}
        options={[
          {key:"a", text:"Sample optimizer first; if SGD, sample momentum from its prior; if Adam, skip momentum and sample beta1/beta2 instead. Inactive axes contribute zero trials.", correct:true},
          {key:"b", text:"Sample all axes unconditionally; pass momentum to Adam where it is silently ignored to keep the joint product space rectangular."},
          {key:"c", text:"Conditional axes break random search because the joint prior is no longer a product of independent marginals."},
          {key:"d", text:"Use a meta-config that enumerates all (optimizer, hp-subset) tuples and grid-search over them."},
        ]}
        trap={<>(b) wastes trials and pollutes the budget accounting. (c) overstates — conditional priors are fine. (d) regresses to grid.</>}
        lens={<>Conditional priors compose. Frameworks like Optuna, Ray Tune, and Hyperopt express them natively. The cost: conditioned axes get fewer effective samples.</>}
        stretch={<>What is the effective sample count for momentum if P(SGD) = 0.3 and n=100?</>}/>

      <VIS.TrapProblem id="rs-q15" difficulty="hard"
        title="Q15 — Interaction effects: when does random fail to find them?"
        scenario={<><em>Discriminating insight:</em> can random search find an interaction between two hyperparameters that only matters jointly? You are debugging a hard HPO landscape.</>}
        options={[
          {key:"a", text:"Random search finds interactions just fine as long as both axes are sampled in the good region within ONE trial; the probability is f1*f2, requiring n >= 1/(f1*f2) trials in expectation.", correct:true},
          {key:"b", text:"Random cannot find interactions because it samples each axis independently; only joint search like grid can resolve them."},
          {key:"c", text:"Interactions require Bayesian optimization with a structured kernel; random search converges to the marginal optimum but misses interaction valleys."},
          {key:"d", text:"Random search converges to interactions only asymptotically as n → ∞ at rate O(1/d!)."},
        ]}
        trap={<>(b) confuses independent SAMPLING with independent EVALUATION — the trial evaluates the joint configuration. (c), (d) invent convergence rates.</>}
        lens={<>Random does find interactions; the budget cost is the product of per-axis good-region fractions. If f1=f2=0.1, you need ~100 random trials to expect one hit.</>}
        stretch={<>How does BO speed this up?</>}/>

      <VIS.TrapProblem id="rs-q16" difficulty="medium"
        title="Q16 — Early stopping: how does it interact with random search?"
        scenario={<><em>Discriminating insight:</em> you can early-stop bad trials at 10% of full budget. How does this change the random-vs-grid story?</>}
        options={[
          {key:"a", text:"Early stopping helps random more than grid because random places more trials in obviously-bad regions; killing them early lets random ALLOCATE the saved budget to more samples.", correct:true},
          {key:"b", text:"Early stopping helps grid more than random because grid's predictable schedule is easier to early-stop deterministically."},
          {key:"c", text:"Early stopping is incompatible with random search because the validation loss curves of random configs are non-monotone."},
          {key:"d", text:"Early stopping is irrelevant — both methods see the same expected stopping rate per trial."},
        ]}
        trap={<>(b) gets the direction backward. (c) and (d) invent constraints.</>}
        lens={<>Multi-fidelity HPO (Hyperband, ASHA, BOHB) is built on this: kill the bottom half early, promote survivors, run many more random configs at low fidelity.</>}
        stretch={<>What is the rough budget multiplier from Hyperband over plain random?</>}/>

      <VIS.TrapProblem id="rs-q17" difficulty="medium"
        title="Q17 — Search-space design: which is the bigger lever, axes or priors?"
        scenario={<><em>Discriminating insight:</em> you can either add 2 more axes or fix the prior on LR from linear to log-uniform. Which wins? You are tuning a CV pipeline.</>}
        options={[
          {key:"a", text:"Adding more axes always wins because random search scales gracefully with dimension."},
          {key:"b", text:"Fixing the prior wins in the common case: a bad prior on an important axis wastes most of the budget; an extra unimportant axis costs only a constant factor.", correct:true},
          {key:"c", text:"They are equivalent — both change the effective dimension by 1."},
          {key:"d", text:"Adding axes is always cheaper because random search has zero marginal cost per axis."},
        ]}
        trap={<>(a), (d) misattribute the cost. (c) invents an equivalence.</>}
        lens={<>Prior quality on important axes dominates. A linear-uniform LR over [1e-5, 1e-1] wastes ~99% of trials in the top decade regardless of n.</>}
        stretch={<>Name three other knobs that need log-uniform priors.</>}/>

      <VIS.TrapProblem id="rs-q18" difficulty="hard"
        title="Q18 — Variance reporting: 'random search got 92% accuracy' — what is missing?"
        scenario={<><em>Discriminating insight:</em> what context must accompany a single random-search HPO result? You are reviewing a colleague's writeup.</>}
        options={[
          {key:"a", text:"The training data seed and the GPU model — accuracy is hardware-dependent on modern TF32 paths."},
          {key:"b", text:"The number of trials n AND the random-search SEED (or multiple seeds), because a single random run is one sample from a distribution over HPO outcomes.", correct:true},
          {key:"c", text:"Only the trial count matters; the seed is irrelevant because random search has no learned state."},
          {key:"d", text:"The dropout rate selected by the run, because it dominates final test accuracy."},
        ]}
        trap={<>(a), (d) are unrelated context. (c) ignores that "best of n random trials" is itself a noisy random variable.</>}
        lens={<>Always report n + sampler seed + at minimum a small bootstrap over HPO runs. Otherwise you are reporting one draw from the HPO outcome distribution.</>}
        stretch={<>How would you bootstrap the HPO outcome distribution from a single run?</>}/>

      <VIS.TrapProblem id="rs-q19" difficulty="medium"
        title="Q19 — Anytime property: which method gives you the best result if you stop early?"
        scenario={<><em>Discriminating insight:</em> you might cancel HPO at any point. Which method gives you the best 'partial answer' at any prefix? You are picking under time pressure.</>}
        options={[
          {key:"a", text:"Grid: predictable progress through the schedule means earlier coordinates always cover the most-likely-good region first."},
          {key:"b", text:"Random: every prefix of a random sequence is itself a random sample of size n', so 'best-so-far' is well-defined at every prefix.", correct:true},
          {key:"c", text:"Bayesian optimization: the surrogate is well-calibrated at any prefix and gives the strongest anytime guarantee."},
          {key:"d", text:"All three are equivalent in expectation under the anytime stopping criterion."},
        ]}
        trap={<>(a) is wrong — grid's schedule is arbitrary and an early prefix may cover one axis exhaustively before any other. (c) is partially true but the BO surrogate is poorly calibrated at small n.</>}
        lens={<>Anytime random search is its own valid stopping rule. Hyperband sharpens this further by giving cheap fidelity early.</>}
        stretch={<>What is the anytime guarantee in formal terms?</>}/>

      <VIS.TrapProblem id="rs-q20" difficulty="hard"
        title="Q20 — A reviewer claims random search is 'just luck' — what is the empirical defense?"
        scenario={<><em>Discriminating insight:</em> how do you defend random search as scientific, not lucky? You are writing the methodology section.</>}
        options={[
          {key:"a", text:"You can repeat the entire random search across multiple sampler seeds and report mean ± std of the best-of-n outcome; this measures HPO variance directly.", correct:true},
          {key:"b", text:"You can prove asymptotic optimality of random search under the no-free-lunch theorem."},
          {key:"c", text:"Random search is deterministic once you fix the seed, so reviewer concerns about luck are misplaced by definition."},
          {key:"d", text:"You can cite the Bergstra-Bengio paper, which proves random search is optimal in d ≥ 4."},
        ]}
        trap={<>(b), (d) misattribute proofs. (c) confuses reproducibility with the existence of randomness in the outcome distribution.</>}
        lens={<>The right answer is empirical: replicate the HPO process and report its outcome variance. Reproducibility ≠ low variance over seeds.</>}
        stretch={<>How many sampler seeds do you actually need to report?</>}/>

      <VIS.TrapProblem id="rs-q21" difficulty="medium"
        title="Q21 — Mixing random with manual: what is the right hybrid?"
        scenario={<><em>Discriminating insight:</em> your best researcher hand-picks 5 configs they trust. How do you compose this with random search?</>}
        options={[
          {key:"a", text:"Discard the manual configs; they bias the search and violate the random-search assumptions."},
          {key:"b", text:"Replace random search with grid search around each manual config to refine locally."},
          {key:"c", text:"Seed random search with the manual configs as initial trials, then continue sampling randomly; you get the best of both — expert knowledge as a warm start, exploration as backup.", correct:true},
          {key:"d", text:"Average the validation accuracy of the 5 manual configs and use it as a baseline; only keep random configs that beat it."},
        ]}
        trap={<>(a) wastes expert knowledge. (b) regresses to grid. (d) is a bad acceptance rule and ignores noise.</>}
        lens={<>Most modern frameworks (Optuna, Ray Tune) support 'enqueue_trial' to inject expert configs before random sampling. This is a strict improvement.</>}
        stretch={<>How does this interact with Bayesian warm starts?</>}/>

      <VIS.TrapProblem id="rs-q22" difficulty="hard"
        title="Q22 — 'Random search' vs 'random restart of gradient descent' — what is the difference?"
        scenario={<><em>Discriminating insight:</em> a paper says 'random restarts beat grid'. Is this the same claim? You are reading carefully.</>}
        options={[
          {key:"a", text:"Same thing — both refer to repeated training from a random starting point in hyperparameter space."},
          {key:"b", text:"Random search varies HYPERPARAMETERS across trials; random restart varies WEIGHT INITIALIZATIONS within a fixed hyperparameter configuration. Different axes entirely.", correct:true},
          {key:"c", text:"Random restart is a sub-case of random search where the hyperparameter is the random seed."},
          {key:"d", text:"They are complementary: random search picks hyperparameters, random restart picks the optimizer used for each."},
        ]}
        trap={<>(a) confuses the two. (c) misrepresents — seed is not the hyperparameter of interest. (d) invents a relationship.</>}
        lens={<>HPO (outer loop, over configs) and stochastic optimization (inner loop, over weights with one config) are separate. Random search is an HPO method; random restart is an inner-loop trick.</>}
        stretch={<>Can you have both at once?</>}/>

      <VIS.TrapProblem id="rs-q23" difficulty="medium"
        title="Q23 — Visualizing random-search results: which plot is most informative?"
        scenario={<><em>Discriminating insight:</em> you have 200 trial results. What plot do you make first? You are preparing a results section.</>}
        options={[
          {key:"a", text:"A heatmap of validation loss over (LR, dropout) at evenly-spaced grid points, with random results interpolated to the grid."},
          {key:"b", text:"A parallel-coordinates plot of all axes colored by validation loss — reveals which axes have steep gradients and where the good region lives in the joint space.", correct:true},
          {key:"c", text:"A bar chart of the top 10 trials' validation loss ordered by trial index."},
          {key:"d", text:"A line plot of validation loss vs trial number to show 'convergence' of the HPO."},
        ]}
        trap={<>(a) discards the random structure by snapping to a grid. (c) ignores axes. (d) is meaningless — random search has no notion of convergence in trial order.</>}
        lens={<>Parallel coordinates is the canonical HPO viz — supported by Optuna, W&B, Hyperopt. Reveals importance ranking by axis slope.</>}
        stretch={<>What does a flat axis in parallel coordinates indicate?</>}/>

      <VIS.TrapProblem id="rs-q24" difficulty="hard"
        title="Q24 — In which modern HPO method is 'random search' still the engine?"
        scenario={<><em>Discriminating insight:</em> which of these methods are essentially random search under the hood, just with a smarter outer wrapper?</>}
        options={[
          {key:"a", text:"Hyperband and ASHA: random-sample a population, train at low fidelity, promote survivors. The sampler is uniform random; the wrapper is the fidelity scheduler.", correct:true},
          {key:"b", text:"Bayesian optimization with GP surrogate: the acquisition function IS random sampling weighted by posterior variance."},
          {key:"c", text:"Genetic algorithms: the crossover step is random search over parent pairs."},
          {key:"d", text:"Gradient-based HPO: the meta-gradient is a Monte-Carlo random search over the inner-loop trajectory."},
        ]}
        trap={<>(b), (c), (d) misattribute the random component to the wrong layer of the method.</>}
        lens={<>Hyperband / ASHA literally call random sampling for new configs; the value-add is the fidelity scheduler, not a smarter sampler. This is why random search is the right baseline for almost every HPO paper.</>}
        stretch={<>What is the fidelity scheduler in ASHA?</>}/>

      <VIS.TrapProblem id="rs-q25" difficulty="medium"
        title="Q25 — One sentence: when do you reach for random search FIRST?"
        scenario={<><em>Discriminating insight:</em> in interview-style one-sentence framing, what is the trigger for picking random over alternatives? You are summarizing for a teammate.</>}
        options={[
          {key:"a", text:"When the budget is so large that grid is computationally infeasible and Bayesian optimization is overkill."},
          {key:"b", text:"When you have ≥4 hyperparameters, no strong prior over which matter most, and you want a strong baseline that is trivial to parallelize, reproducible, and that other HPO methods can be honestly compared against.", correct:true},
          {key:"c", text:"When the validation surface is known to be unimodal and Lipschitz."},
          {key:"d", text:"When you are constrained to a single GPU and cannot run trials in parallel."},
        ]}
        trap={<>(a) is partial — budget alone is not the trigger. (c) is unrelated. (d) inverts the parallelism advantage.</>}
        lens={<>The trigger is the conjunction: enough dimensions to break grid, no strong prior to drive BO, and the need for an honest baseline. Almost every real DL HPO satisfies this.</>}
        stretch={<>When would you escalate from random to Bayesian?</>}/>
    </VIS.Section>

    <VIS.Section id="sec-further" title="Further reading">
      <ul>
        <li><a href="https://www.jmlr.org/papers/v13/bergstra12a.html" target="_blank" rel="noopener">
          Bergstra & Bengio — <em>Random Search for Hyper-Parameter Optimization</em> (JMLR 2012, paper)</a>
          — the original. Worth opening for the 2-D scatter figure on page 3 and the effective-dimension experiments.</li>
        <li><a href="https://karpathy.github.io/2019/04/25/recipe/" target="_blank" rel="noopener">
          Andrej Karpathy — <em>A Recipe for Training Neural Networks</em> (blog)</a>
          — practitioner guide; the HPO section recommends random + log-uniform priors as defaults.</li>
        <li><a href="https://optuna.readthedocs.io/en/stable/tutorial/index.html" target="_blank" rel="noopener">
          Optuna tutorials (docs)</a>
          — concrete code for random sampling, conditional priors, parallel trials, and parallel-coordinates viz.</li>
        <li><a href="https://homes.cs.washington.edu/~jamieson/hyperband.html" target="_blank" rel="noopener">
          Li, Jamieson et al. — <em>Hyperband</em> (project page)</a>
          — how multi-fidelity HPO wraps random search to get a 5-30x speedup with no smarter sampler.</li>
        <li><a href="https://scikit-learn.org/stable/modules/grid_search.html" target="_blank" rel="noopener">
          scikit-learn user guide — Grid vs Randomized Search (docs)</a>
          — short, code-first reference for the API distinction and when each is appropriate.</li>
      </ul>
    </VIS.Section>
  </main>
);
