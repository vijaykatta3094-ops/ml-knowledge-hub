<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
// Question Generation Strategy — Reference Visual
// One-page strategy doc that captures every rule we've evolved for designing
// senior-MLE interview-prep problems. Read this before authoring a visual,
// before commenting on one, and when a visual feels weak.

const App = () => (
  <main style={{maxWidth: 920, margin: "2em auto", padding: "0 16px", fontSize: 16, lineHeight: 1.65}}>
    <VIS.Hero
      pill="Strategy · Reference"
      title="How we design interview-prep problems"
      subtitle="Every rule we've crystallized over the iterations. Apply to every new visual; use as a checklist when auditing an existing one."
      byline={[
        {label: "Audience", value: "Anyone authoring or reviewing a visual"},
        {label: "Use", value: "Read once; reference often"},
        {label: "Anti-pattern signal", value: "Visual feels generic / repetitive"},
      ]}/>

    <VIS.TLDR>
      The whole strategy is one sentence: <strong>every problem must hinge on the specific concept being taught, in a scenario rich enough that the discriminating answer requires reading the brief.</strong> Recipes are not enough at the senior bar — every option in every MCQ should be defensible in <em>some</em> world; the trap is identifying which world the scenario describes.
    </VIS.TLDR>

    {/* ============== Main mottos — pin to the top so they're impossible to miss ============== */}
    <VIS.Section id="sec-mottos" title="🪧 Main mottos (these override everything else)">
      <div style={{background:"#fef3c7", borderLeft:"6px solid #d97706", padding:"16px 20px", margin:"12px 0", borderRadius:"0 10px 10px 0"}}>
        <h3 style={{margin:"0 0 6px", color:"#78350f", fontSize:17}}>① Only ship problems that are <em>special to this concept</em></h3>
        <p style={{margin:"4px 0 8px"}}>
          Every problem in a visual MUST pass the <strong>redaction litmus test (§2a)</strong>: replace the concept name (HSTU, FraudGT, conformal prediction...) with "Model X." If the candidate can still answer correctly using generic ML knowledge, the problem is <strong>concept-as-costume</strong> — rewrite to hinge on the concept's unique mechanism, OR drop. <strong>No exceptions.</strong>
        </p>
        <p style={{margin:"4px 0 0", color:"#78350f"}}>
          <strong>Filler is the enemy.</strong> A 12-problem visual with every problem concept-specific beats a 30-problem visual with 15 generic-recsys fillers wearing the concept's name. Reviewers stop trusting the corpus the first time they hit a costume problem.
        </p>
      </div>

      <div style={{background:"#dbeafe", borderLeft:"6px solid #2563eb", padding:"16px 20px", margin:"12px 0", borderRadius:"0 10px 10px 0"}}>
        <h3 style={{margin:"0 0 6px", color:"#1e3a8a", fontSize:17}}>② Problem count = concept complexity, not a fixed number</h3>
        <p style={{margin:"4px 0 8px"}}>
          Range: <strong>10 to 100 problems per visual</strong>. Pick the count by how much there is genuinely to cover. Narrow technique → 10-15. Standard SOTA → 20-35. Deep concept with siblings + follow-ups + production reality → 40-60. Foundational / must-know-cold concept → up to 100. Detail in <a href="#sec-8">§8</a>.
        </p>
        <p style={{margin:"4px 0 0", color:"#1e3a8a"}}>
          <strong>If a concept needs 100 problems to cover it, ship 100.</strong> Don't artificially cap for tidiness. Don't artificially pad to hit a number.
        </p>
      </div>

      <div style={{background:"#dcfce7", borderLeft:"6px solid #16a34a", padding:"16px 20px", margin:"12px 0", borderRadius:"0 10px 10px 0"}}>
        <h3 style={{margin:"0 0 6px", color:"#14532d", fontSize:17}}>③ Validate before pushing — always</h3>
        <p style={{margin:"4px 0 8px"}}>
          Before any visual ships:
        </p>
        <ul style={{margin:"4px 0 0 20px", color:"#14532d"}}>
          <li>Every problem passes the redaction litmus test (motto ①)</li>
          <li>At least 4 of the 6 taxonomy categories (A-F in <a href="#sec-8b">§8b</a>) are represented</li>
          <li><code>see_web</code> at 1280 AND 390 (mobile) — both return <code>errors: []</code></li>
          <li>Option lengths normalized (no length leakage)</li>
          <li>No raw <code>&lt;N</code> JSX gotchas; no <code>{`{var}`}</code> template surprises</li>
          <li>Every jargon term wrapped in <code>&lt;VIS.Term&gt;</code></li>
          <li>Trap + lens + stretch revealed only after submit</li>
        </ul>
      </div>
    </VIS.Section>

    {/* ============== 0. Canonical format reference ============== */}
    <VIS.Section id="sec-0" title="0. Canonical format reference">
      <p>
        Before authoring anything, match the typography and sheet format of the gold-standard reference. <a href="https://docs.google.com/spreadsheets/d/17OTu1X0gzFXSSAoWZldCYVkT7OqVW14ixz0Vk419Y_k/edit?gid=103335091#gid=103335091" target="_blank" rel="noopener"><strong>📐 Idea Engine Tracker — Machine Learning tab</strong></a> sets the bar: <strong>Inter font, font size 13, navy header (#1f3a5f) on white text, alternating row banding (#e8f0fa), frozen header + L1 column, wide prose columns (340/320px), narrow numeric columns.</strong>
      </p>
      <VIS.Callout kind="info" title="Why this rule exists">
        The default Google Sheets look (Arial 10, no header style, OVERFLOW_CELL wrap) hides the content. We want a curated knowledge base feel, not raw ETL output. Apply via <code>mcp__gworkspace__format_sheet_range</code> + <code>resize_sheet_dimensions</code> + <code>manage_conditional_formatting</code> the moment a new tab is populated.
      </VIS.Callout>
    </VIS.Section>

    {/* ============== 1. Context IS the question ============== */}
    <VIS.Section id="sec-1" title="1. Context IS the question (rich onsite brief)">
      <p>
        A real onsite design <strong>hinges on the brief</strong>. Strip the brief and the "right answer" becomes arbitrary — the candidate guesses what you meant, not solves what you'd actually solve on the job.
      </p>
      <table style={{width:"100%", borderCollapse:"collapse", margin:"12px 0", fontSize:14}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left", width:"50%"}}>❌ Wrong (skeletal)</th>
            <th style={{padding:"8px 10px", textAlign:"left", width:"50%"}}>✅ Right (rich brief)</th>
          </tr>
        </thead>
        <tbody>
          <tr style={{background:"#fef2f2"}}>
            <td style={{padding:"10px", verticalAlign:"top", borderRight:"1px solid #e5e7eb"}}>"Design retrieval for Prime Video. 14 pieces, 12 belong, 2 don't."</td>
            <td style={{padding:"10px", verticalAlign:"top"}}>"Prime Video — 200M subs across US/EU/APAC, 10M catalog refreshed nightly, 100M home-page renders/day spiking 3× during evening prime-time, p99 100ms end-to-end, ~5B impression events/day. Existing infra: Kafka topics, S3 datalake, Spark batch, Flink streaming, model registry, CDN. Constraints: regional licensing, diversity guarantee, cold-start within 24h of release, plays today must influence tomorrow's recs."</td>
          </tr>
        </tbody>
      </table>
      <p><strong>Test:</strong> If you remove the scale numbers + existing infra + constraints, do multiple defensible designs collapse to one? If yes, your brief is too thin.</p>
    </VIS.Section>

    {/* ============== 2. No answer-key leakage ============== */}
    <VIS.Section id="sec-2" title="2. Never leak the answer key in the prompt">
      <p><strong>Forbidden phrasings</strong> — these tell the candidate the cardinality of the answer:</p>
      <ul style={{margin:"4px 0 12px 24px"}}>
        <li>"X belong, Y are distractors"</li>
        <li>"5 correct options + 4 decoys"</li>
        <li>"pick the 3 correct answers"</li>
        <li>"the diagram has 6 nodes"</li>
      </ul>
      <p>Mention that distractors exist; do not count them. <em>"Some of these don't belong"</em> is fine. <em>"Two of these don't belong"</em> is not. For multi-select MCQs, say "select all that apply" — never "select the 3 correct."</p>
      <VIS.Callout kind="warn" title="Text-length leakage (subtle variant)">
        Same family: if the <code>correct: true</code> option runs 3-4 lines and decoys run 2, a tired senior spots the right answer by length alone. <strong>Normalize option lengths (~2 lines each).</strong> The discriminating detail goes in the SCENARIO, not the option text.
      </VIS.Callout>
    </VIS.Section>

    {/* ============== 2a. Concept-specificity test — THE BIG ONE ============== */}
    <VIS.Section id="sec-2a" title="2a. Concept-specificity test (NEW — the big one)">
      <p>
        When a visual is anchored to a specific SOTA technique / concept (HSTU, FraudGT, conformal prediction, etc.), <strong>every trap problem must hinge on something distinctively true of THAT concept</strong> — not a generic recsys / fraud / ML question that mentions the concept's name in the scenario.
      </p>

      <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>Failure mode — "concept as costume"</h3>
      <div style={{background:"#fef2f2", borderLeft:"4px solid #dc2626", padding:"12px 16px", margin:"8px 0", borderRadius:"0 8px 8px 0"}}>
        <strong style={{color:"#991b1b"}}>❌ Generic question wearing HSTU's name</strong>
        <p style={{margin:"6px 0 0"}}>"You launched HSTU at p99 80ms and need to serve 500 candidates. Which of (a) precompute user encoding, (b) KV-cache attention, (c) FP4 quantization, (d) truncate history, (e) replace with DLRM are valid?"</p>
        <p style={{margin:"6px 0 0", color:"#7f1d1d"}}>The correct answers (a/b/c) apply to <strong>every</strong> large transformer. HSTU is scenery. A candidate could answer correctly without knowing what HSTU is.</p>
      </div>

      <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>Fix — the concept IS the discriminator</h3>
      <div style={{background:"#f0fdf4", borderLeft:"4px solid #16a34a", padding:"12px 16px", margin:"8px 0", borderRadius:"0 8px 8px 0"}}>
        <strong style={{color:"#14532d"}}>✅ Tied to HSTU's unique architecture</strong>
        <p style={{margin:"6px 0 0"}}>"HSTU's native loss is next-token cross-entropy over an action vocabulary. Your offline NDCG@10 looks great, but the model is unaware of the candidate set it scores against at serving time. Why does this matter, and what specific training-time change closes the offline–online gap?"</p>
        <p style={{margin:"6px 0 0", color:"#14532d"}}>The trap turns on HSTU's <strong>generative loss</strong> (not pointwise sigmoid), the <strong>action vocabulary</strong> (not item-ID embedding tables), and the candidate-set mismatch <em>induced by that loss shape</em>. A candidate who doesn't know HSTU's internals can't reason about this.</p>
      </div>

      <VIS.Callout kind="ok" title="Litmus test before shipping any trap problem">
        <ol style={{margin:"4px 0 0 20px"}}>
          <li>Read the problem with the concept name <strong>redacted</strong> (replace "HSTU" with "Model X").</li>
          <li>Can you still answer it correctly using only generic ML knowledge?</li>
          <li><strong>Yes → concept-as-costume.</strong> Rewrite to turn on the concept's unique property, or drop.</li>
          <li><strong>No → concept is genuinely the discriminator.</strong> Keep.</li>
        </ol>
      </VIS.Callout>

      <h3 style={{marginTop:18, marginBottom:6, fontSize:15, color:"#334155"}}>Where to find 20 concept-specific angles</h3>
      <p>Read the source paper / blog and look for the <em>surprising</em> claims. Every one of these is a problem seed:</p>
      <ul style={{margin:"4px 0 0 24px"}}>
        <li><strong>Architectural design choice</strong> — HSTU's pointwise+aggregated-norm attention; TIGER's RQ-VAE codebook collisions; FraudGT's k-hop attention vs MPNN over-smoothing</li>
        <li><strong>Loss / objective</strong> — HSTU's generative softmax vs pointwise; BISER's dual-model self-debias; TRADES's KL objective</li>
        <li><strong>What's gone vs the baseline</strong> — HSTU drops crosses → MTGR fixes; PC-GNN samples differently than CARE-GNN's RL filter</li>
        <li><strong>Scaling story</strong> — HSTU's power-law vs DLRM's plateau; OneRec's 10.6% cost claim</li>
        <li><strong>Failure modes named in the paper</strong> — DiffRec's "illusion of progress" critique; GADBench's "tuned GBDT rivals fraud-GNNs"</li>
        <li><strong>Production-specific gotcha</strong> — speculative-decoding's batch-size gotcha; ConFL's replay-buffer DP-epsilon composition</li>
      </ul>
      <p style={{marginTop:12}}><strong>Aim for 20 trap problems per visual.</strong> If you can't find 20 facets that pass the redaction test, you don't have 20 problems — you have N concept-specific problems + filler. Better to ship fewer real problems than to pad with generic ones.</p>
    </VIS.Section>

    {/* ============== 3. Hide signal in plausible noise ============== */}
    <VIS.Section id="sec-3" title="3. Hide the discriminating signal inside plausible noise">
      <p>A trap problem only works if the trap is <strong>buried</strong>. Decoys must be defensible in SOME context; the trap = the textbook-confident answer that misses the scenario detail.</p>
      <table style={{width:"100%", borderCollapse:"collapse", margin:"10px 0", fontSize:14}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Concept</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>What's buried in scenario</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Textbook trap candidates fall for</th>
          </tr>
        </thead>
        <tbody>
          <tr><td style={{padding:"8px 10px"}}>Fraud bias-vs-variance</td><td style={{padding:"8px 10px"}}>"75% label noise rate"</td><td style={{padding:"8px 10px"}}>Diagnose bias/variance without noticing noise dominates</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:"8px 10px"}}>Training divergence</td><td style={{padding:"8px 10px"}}>grad_norm 1.9 → 124 → 1842 → NaN AND missing warmup config</td><td style={{padding:"8px 10px"}}>Add gradient clipping (band-aid) instead of fixing the lr (root cause)</td></tr>
          <tr><td style={{padding:"8px 10px"}}>HSTU calibration</td><td style={{padding:"8px 10px"}}>"DLRM had Platt scaler trained nightly"</td><td style={{padding:"8px 10px"}}>Reuse Platt scaler; missing that generative softmax ≠ pointwise sigmoid</td></tr>
        </tbody>
      </table>
    </VIS.Section>

    {/* ============== 3a. Tradeoffs over recipes ============== */}
    <VIS.Section id="sec-3a" title="3a. Senior MLE = tradeoffs under scenario constraints, not recipes">
      <p>Most "ML systems" problems at the senior bar are not "draw the right architecture" — they are <em>"given THIS use case, THIS data shape, THIS constraint, which knob do you turn?"</em> The textbook answer is often wrong because the scenario violates one of its assumptions.</p>
      <ul style={{margin:"8px 0 0 24px"}}>
        <li><strong>Cache TTL:</strong> aggressive caching is right for stable catalog, wrong for flash-sale inventory.</li>
        <li><strong>Online vs batch features:</strong> online needed for recency-sensitive signals (last click), batch sufficient for slow-changing.</li>
        <li><strong>Recall vs precision in candidate gen:</strong> high recall when the ranker is strong, high precision when the ranker is weak or expensive.</li>
        <li><strong>Distillation vs quantization vs pruning:</strong> which compression wins depends on whether you're latency / memory / accuracy bound.</li>
        <li><strong>Fine-tune vs prompt vs adapter:</strong> depends on data volume, eval rigor, deployment cost.</li>
      </ul>
    </VIS.Section>

    {/* ============== 4. Match answer mode to question ============== */}
    <VIS.Section id="sec-4" title="4. Match answer mode to the question — don't force one variation everywhere">
      <table style={{width:"100%", borderCollapse:"collapse", margin:"10px 0", fontSize:14}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Answer mode</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Use when</th>
          </tr>
        </thead>
        <tbody>
          <tr><td style={{padding:"8px 10px"}}><strong>Single-correct MCQ</strong></td><td style={{padding:"8px 10px"}}>One tight answer; testing recognition</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:"8px 10px"}}><strong>Multi-select MCQ</strong></td><td style={{padding:"8px 10px"}}>Several causes / fixes legitimately co-apply</td></tr>
          <tr><td style={{padding:"8px 10px"}}><strong>Ordered ranking</strong></td><td style={{padding:"8px 10px"}}>Sequence matters (diagnostic order, rollout sequence, variance-reduction priority)</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:"8px 10px"}}><strong>Fill-in-blank + decoy pool</strong></td><td style={{padding:"8px 10px"}}>ML coding (Q @ K.T, math.sqrt(d_k), F.softmax(dim=-1))</td></tr>
          <tr><td style={{padding:"8px 10px"}}><strong>Step-by-step derivation pick</strong></td><td style={{padding:"8px 10px"}}>Math: each step shows correct TeX vs plausibly-wrong TeX</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:"8px 10px"}}><strong>Free-form canvas (Excalidraw)</strong></td><td style={{padding:"8px 10px"}}>System design where topology genuinely diverges</td></tr>
          <tr><td style={{padding:"8px 10px"}}><strong>Debug case study + multi-select</strong></td><td style={{padding:"8px 10px"}}>Log + config in &lt;pre&gt;, then "which of these are root cause + actual fix?"</td></tr>
        </tbody>
      </table>
      <p style={{marginTop:10}}><strong>Don't force variation per problem.</strong> Choose the mode that fits the question. Mixed shapes within a 20-problem visual is the natural state.</p>
    </VIS.Section>

    {/* ============== 5. Shape conventions for canvas ============== */}
    <VIS.Section id="sec-5" title="5. Shape conventions (when using the Excalidraw canvas)">
      <p>The visual primitive teaches the architecture. Don't use all rectangles. Print the legend above the canvas.</p>
      <table style={{width:"100%", borderCollapse:"collapse", margin:"10px 0", fontSize:14}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Architectural role</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Visual primitive</th>
          </tr>
        </thead>
        <tbody>
          <tr><td style={{padding:"8px 10px"}}>Stateless service / model</td><td style={{padding:"8px 10px"}}>Sharp solid rectangle</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:"8px 10px"}}>Stateful store</td><td style={{padding:"8px 10px"}}><strong>Cylinder</strong> (composite: 2 ellipses + body rectangle, grouped)</td></tr>
          <tr><td style={{padding:"8px 10px"}}>Static data source</td><td style={{padding:"8px 10px"}}>Solid ellipse</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:"8px 10px"}}>Streaming source</td><td style={{padding:"8px 10px"}}>Dashed ellipse, hachure fill</td></tr>
          <tr><td style={{padding:"8px 10px"}}>Queue / pipe</td><td style={{padding:"8px 10px"}}>Dashed rounded rect, hachure fill</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:"8px 10px"}}>Control / monitoring / decision</td><td style={{padding:"8px 10px"}}>Diamond, cross-hatch fill</td></tr>
        </tbody>
      </table>
    </VIS.Section>

    {/* ============== 6. Canvas-vs-MCQ gate ============== */}
    <VIS.Section id="sec-6" title="6. Canvas vs MCQ gate (Learning 14)">
      <p>
        <strong>When the senior test is</strong> <em>where</em> in the pipeline a constraint lives, <em>what order</em> operations run, or <em>which knob</em> under hardware/cost math <strong>→ MCQ</strong>.
      </p>
      <p>
        <strong>Canvas only when the topology itself diverges</strong> from the standard funnel — event-streaming, cascade+HITL, inline fast-path, multi-tenant federation, graph pre-materialization.
      </p>
      <VIS.Mermaid chart={`flowchart TB
  start[Concept needs a problem]
  q1{Is the architecture<br/>standard or divergent?}
  mcq[Tradeoff MCQ<br/>single/multi/ordered]
  q2{Is topology distinctly<br/>NEW or just standard funnel?}
  canvas[Excalidraw canvas]
  start --> q1
  q1 -->|Standard pipeline| mcq
  q1 -->|Divergent| q2
  q2 -->|Standard funnel rehash| mcq
  q2 -->|Genuinely new topology| canvas
  style mcq fill:#bae6fd,stroke:#0284c7
  style canvas fill:#bbf7d0,stroke:#16a34a`}/>
    </VIS.Section>

    {/* ============== 7. Trap-problem 6-beat structure ============== */}
    <VIS.Section id="sec-7" title="7. Trap-problem 6-beat structure">
      <p>Every trap problem exposes six beats, rendered in the order the candidate experiences them:</p>
      <ol style={{margin:"6px 0 0 24px"}}>
        <li><strong>Scenario</strong> — the brief, rich, with hidden signal</li>
        <li><strong>Diagram / artifact</strong> — log, config, code, chart that contains the trap</li>
        <li><strong>The question</strong> — single / multi / ordered / fill-in / canvas</li>
        <li><strong>Trap</strong> <span style={{color:"#64748b"}}>(revealed on submit)</span> — what catches careless candidates, named specifically</li>
        <li><strong>Lens</strong> <span style={{color:"#64748b"}}>(revealed on submit)</span> — the correct mental model, why the right answer is right</li>
        <li><strong>Stretch</strong> <span style={{color:"#64748b"}}>(optional)</span> — one follow-up question pushing toward the next concept</li>
      </ol>
      <VIS.Callout kind="info" title="Reveal discipline">
        Trap + lens + stretch are revealed only <strong>after the candidate commits</strong>. Pre-showing them defeats the entire format. The <code>&lt;VIS.TrapProblem&gt;</code> component handles this for you.
      </VIS.Callout>
    </VIS.Section>

    {/* ============== 8. Problem count = complexity, not a fixed number ============== */}
    <VIS.Section id="sec-8" title="8. Problem count = concept complexity, NOT a fixed floor">
      <p>
        No hard floor or ceiling. Range is <strong>10 to 100 problems per visual</strong>. Pick the count by <em>how much there is to genuinely cover</em>, not by hitting a target.
      </p>
      <table style={{width:"100%", borderCollapse:"collapse", margin:"10px 0", fontSize:14}}>
        <thead>
          <tr style={{background:"#1f3a5f", color:"#fff"}}>
            <th style={{padding:"8px 10px", textAlign:"left", width:"22%"}}>Problem count</th>
            <th style={{padding:"8px 10px", textAlign:"left", width:"32%"}}>When it's the right count</th>
            <th style={{padding:"8px 10px", textAlign:"left"}}>Example concept</th>
          </tr>
        </thead>
        <tbody>
          <tr><td style={{padding:"8px 10px"}}><strong>10-15</strong></td><td style={{padding:"8px 10px"}}>Narrow technique, one architectural surface, few production gotchas. The concept simply doesn't have more facets.</td><td style={{padding:"8px 10px"}}>SMMR (sampled MMR diversity reranker), DCN-V2's specific cross-layer.</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:"8px 10px"}}><strong>20-35</strong></td><td style={{padding:"8px 10px"}}>Standard SOTA technique with clear paper claims, identifiable failure modes, and 1-2 sibling techniques to compare against.</td><td style={{padding:"8px 10px"}}>TIGER, FraudGT, conformal prediction for ranker, CARE-GNN.</td></tr>
          <tr><td style={{padding:"8px 10px"}}><strong>40-60</strong></td><td style={{padding:"8px 10px"}}>Concept with deep mechanism + production reality + multiple sibling techniques + community-found failure modes + active research follow-ups.</td><td style={{padding:"8px 10px"}}>HSTU (architectural variant + dropped crosses + calibration delta + MTGR/OneRec follow-ups + scaling claims + speculative decoding interactions).</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:"8px 10px"}}><strong>60-100</strong></td><td style={{padding:"8px 10px"}}>Foundational concepts with broad surface — taught in many ways, attacked from many angles, prerequisite for ten other concepts. The "must-know cold" tier.</td><td style={{padding:"8px 10px"}}>Bias-variance, HSTU (if treated as the canonical generative-recs anchor), Stripe Radar v2 (the production exemplar), GADBench (the GBDT-baseline-rivals-GNN landmark).</td></tr>
        </tbody>
      </table>
      <VIS.Callout kind="ok" title="The rigor rule (non-negotiable)">
        <strong>Rigor &gt; volume.</strong> Better to ship 12 deep concept-specific problems than 30 with 15 of them being filler. Apply the §2a redaction litmus test to every problem. If it passes, keep. If not, rewrite or drop. <strong>Validate before pushing</strong> — run <code>see_web</code> at 1280 + 390 mobile widths, count <code>VIS.TrapProblem</code> instances, scan for option-length leakage, scan for <code>&lt;N</code> JSX gotchas, confirm at least 4 of the 6 taxonomy categories (A-F in §8b) are represented.
      </VIS.Callout>
      <VIS.Callout kind="info" title="Cover all important concepts, even if it takes 100 problems">
        If a concept genuinely has 100 facets worth interview-bar coverage (HSTU, two-stage retrieval, Stripe Radar at the company level), do the 100. Don't artificially cap. The corpus's value is in being the place to drill the concept exhaustively, not in being skimmable. Skimmability is a §1 (rich-context) concern; depth is a §8 concern.
      </VIS.Callout>
    </VIS.Section>

    {/* ============== 8b. The full question-pattern taxonomy ============== */}
    <VIS.Section id="sec-8b" title="8b. Question-pattern taxonomy (~25 patterns × 6 categories)">
      <p>
        Most prior visuals leaned on one pattern family — <em>"given this scenario, which knob do you turn?"</em> — and that's why they read repetitively. Below is the full taxonomy of question patterns. Mix freely across a 20-problem visual; the goal is at least one problem from each of categories A-F.
      </p>

      <h3 style={{marginTop:18, marginBottom:6, fontSize:16, color:"#1f3a5f"}}>A. Identity &amp; comparison <span style={{fontWeight:400, color:"#64748b", fontSize:14}}>— what makes this concept distinctive</span></h3>
      <table style={{width:"100%", borderCollapse:"collapse", margin:"6px 0 14px", fontSize:13.5}}>
        <thead><tr style={{background:"#1f3a5f", color:"#fff"}}><th style={{padding:"6px 8px", textAlign:"left", width:"32%"}}>Pattern</th><th style={{padding:"6px 8px", textAlign:"left"}}>Example seed</th></tr></thead>
        <tbody>
          <tr><td style={{padding:"7px 8px", verticalAlign:"top"}}><strong>A1. Distinguish from sibling</strong><br/><span style={{color:"#64748b"}}>What's the actual discriminator vs an adjacent technique?</span></td><td style={{padding:"7px 8px", verticalAlign:"top"}}>HSTU and TIGER are both generative recsys, but they make opposite choices on the retrieval index. Which is which, and why?</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:"7px 8px", verticalAlign:"top"}}><strong>A2. Definitional trap</strong><br/><span style={{color:"#64748b"}}>Easily-confused concept with similar name</span></td><td style={{padding:"7px 8px", verticalAlign:"top"}}>Conformal prediction vs Platt scaling vs isotonic regression — which guarantees finite-sample coverage at a chosen risk level?</td></tr>
          <tr><td style={{padding:"7px 8px", verticalAlign:"top"}}><strong>A3. Counterfactual</strong><br/><span style={{color:"#64748b"}}>What would you use without this? How much worse?</span></td><td style={{padding:"7px 8px", verticalAlign:"top"}}>If HSTU didn't exist, your fallback is DLRM + heavy cross feature engineering. Quantify the concrete cost in three dimensions (latency, calibration effort, dev cycle).</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:"7px 8px", verticalAlign:"top"}}><strong>A4. Composition</strong><br/><span style={{color:"#64748b"}}>What happens when you stack this with adjacent concept?</span></td><td style={{padding:"7px 8px", verticalAlign:"top"}}>Combine HSTU + RQ-VAE Semantic IDs. Which Semantic-ID property survives the action-token vocabulary? Which conflicts?</td></tr>
          <tr><td style={{padding:"7px 8px", verticalAlign:"top"}}><strong>A5. Boundary</strong><br/><span style={{color:"#64748b"}}>Where does this technique end and the next begin?</span></td><td style={{padding:"7px 8px", verticalAlign:"top"}}>At what user-history length does HSTU stop beating DLRM? Defend your number with the architectural reason.</td></tr>
        </tbody>
      </table>

      <h3 style={{marginTop:14, marginBottom:6, fontSize:16, color:"#1f3a5f"}}>B. Application <span style={{fontWeight:400, color:"#64748b", fontSize:14}}>— when to use, when not to, the scenario-driven family</span></h3>
      <table style={{width:"100%", borderCollapse:"collapse", margin:"6px 0 14px", fontSize:13.5}}>
        <thead><tr style={{background:"#1f3a5f", color:"#fff"}}><th style={{padding:"6px 8px", textAlign:"left", width:"32%"}}>Pattern</th><th style={{padding:"6px 8px", textAlign:"left"}}>Example seed</th></tr></thead>
        <tbody>
          <tr><td style={{padding:"7px 8px", verticalAlign:"top"}}><strong>B1. When to use over alternatives</strong><br/><span style={{color:"#64748b"}}>Pick the right tool given a concrete scenario</span></td><td style={{padding:"7px 8px", verticalAlign:"top"}}>You have 8B sequence tokens / day, GPU-rich infra, but only weak click signal. Pick HSTU, TIGER, or DLRM. Defend.</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:"7px 8px", verticalAlign:"top"}}><strong>B2. Sounds reasonable, isn't ⭐</strong><br/><span style={{color:"#64748b"}}>Belief that LOOKS prudent but fails for THIS concept</span></td><td style={{padding:"7px 8px", verticalAlign:"top"}}>"Bigger embedding dim solves cold-start for HSTU." Why is this wrong, and what IS the fix?</td></tr>
          <tr><td style={{padding:"7px 8px", verticalAlign:"top"}}><strong>B3. Customer/business framing</strong><br/><span style={{color:"#64748b"}}>Translate to the stakeholder</span></td><td style={{padding:"7px 8px", verticalAlign:"top"}}>Your PM asks why HSTU is worth a 6-month migration. Give a single sentence that captures the business case (NOT "scaling laws").</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:"7px 8px", verticalAlign:"top"}}><strong>B4. When NOT to use</strong><br/><span style={{color:"#64748b"}}>Forcing the candidate to articulate the limits</span></td><td style={{padding:"7px 8px", verticalAlign:"top"}}>You're scoring ads where cross features (advertiser ID × user country × time-of-day) carry 60% of signal. Pick HSTU or DLRM. Why?</td></tr>
        </tbody>
      </table>

      <h3 style={{marginTop:14, marginBottom:6, fontSize:16, color:"#1f3a5f"}}>C. Mechanism <span style={{fontWeight:400, color:"#64748b", fontSize:14}}>— how it works internally</span></h3>
      <table style={{width:"100%", borderCollapse:"collapse", margin:"6px 0 14px", fontSize:13.5}}>
        <thead><tr style={{background:"#1f3a5f", color:"#fff"}}><th style={{padding:"6px 8px", textAlign:"left", width:"32%"}}>Pattern</th><th style={{padding:"6px 8px", textAlign:"left"}}>Example seed</th></tr></thead>
        <tbody>
          <tr><td style={{padding:"7px 8px", verticalAlign:"top"}}><strong>C1. Architectural choice</strong><br/><span style={{color:"#64748b"}}>Why this specific design over the obvious alternative?</span></td><td style={{padding:"7px 8px", verticalAlign:"top"}}>Why does HSTU use pointwise + aggregated normalization instead of layer norm? What property would break with plain LN?</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:"7px 8px", verticalAlign:"top"}}><strong>C2. Loss / objective</strong><br/><span style={{color:"#64748b"}}>Why this loss? What does it forfeit?</span></td><td style={{padding:"7px 8px", verticalAlign:"top"}}>HSTU's next-action cross-entropy makes calibration harder than DLRM's pointwise sigmoid. Why does the loss shape itself break Platt scaling?</td></tr>
          <tr><td style={{padding:"7px 8px", verticalAlign:"top"}}><strong>C3. What's dropped vs baseline</strong><br/><span style={{color:"#64748b"}}>The deliberate sacrifice — and how the paper compensates</span></td><td style={{padding:"7px 8px", verticalAlign:"top"}}>HSTU drops engineered cross features. MTGR brings them back via Group-Layer Norm. What problem does MTGR solve that pure HSTU left on the table?</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:"7px 8px", verticalAlign:"top"}}><strong>C4. Hyperparameter sensitivity</strong><br/><span style={{color:"#64748b"}}>Which knob, if mis-set, catastrophically breaks it?</span></td><td style={{padding:"7px 8px", verticalAlign:"top"}}>For HSTU, rank one of: attention-head count, sequence length, calibration temperature, FP4 vs BF16. By "production breakage if mis-set."</td></tr>
          <tr><td style={{padding:"7px 8px", verticalAlign:"top"}}><strong>C5. Data assumption violations</strong><br/><span style={{color:"#64748b"}}>What input shape does the concept assume?</span></td><td style={{padding:"7px 8px", verticalAlign:"top"}}>HSTU assumes long user histories. Your domain has &lt;5 actions/user (luxury goods). What happens, and what specifically breaks?</td></tr>
        </tbody>
      </table>

      <h3 style={{marginTop:14, marginBottom:6, fontSize:16, color:"#1f3a5f"}}>D. Intuition traps <span style={{fontWeight:400, color:"#64748b", fontSize:14}}>— where the candidate's prior beliefs fail</span></h3>
      <table style={{width:"100%", borderCollapse:"collapse", margin:"6px 0 14px", fontSize:13.5}}>
        <thead><tr style={{background:"#1f3a5f", color:"#fff"}}><th style={{padding:"6px 8px", textAlign:"left", width:"32%"}}>Pattern</th><th style={{padding:"6px 8px", textAlign:"left"}}>Example seed</th></tr></thead>
        <tbody>
          <tr><td style={{padding:"7px 8px", verticalAlign:"top"}}><strong>D1. Intuitive but wrong ⭐</strong><br/><span style={{color:"#64748b"}}>Common-sense belief that betrays the candidate</span></td><td style={{padding:"7px 8px", verticalAlign:"top"}}>Intuition: "Generative is always better than discriminative if you have data." Wrong for HSTU on ads. Why does intuition fail here?</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:"7px 8px", verticalAlign:"top"}}><strong>D2. Wrong-assumption cascade ⭐</strong><br/><span style={{color:"#64748b"}}>Mis-assumption → 2-3 consequences</span></td><td style={{padding:"7px 8px", verticalAlign:"top"}}>You assume "HSTU is DLRM + attention." Therefore: feature pipeline same → wrong, calibration same → wrong, debug toolchain same → wrong. Where does each assumption explode?</td></tr>
          <tr><td style={{padding:"7px 8px", verticalAlign:"top"}}><strong>D3. Senior-vs-junior signal</strong><br/><span style={{color:"#64748b"}}>What a junior gets right that misses the senior point</span></td><td style={{padding:"7px 8px", verticalAlign:"top"}}>Junior fixes the HSTU regression by retraining with more data. Senior reaches for MTGR-style cross recovery first. Why is sequence less important than crosses here?</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:"7px 8px", verticalAlign:"top"}}><strong>D4. Plausible-misattribution</strong><br/><span style={{color:"#64748b"}}>The cause LOOKS like X; it's actually Y</span></td><td style={{padding:"7px 8px", verticalAlign:"top"}}>HSTU online watch-time drops 1.2%. Three plausible causes (calibration, candidate-gen, eval distribution). Which is most likely the real one?</td></tr>
        </tbody>
      </table>

      <h3 style={{marginTop:14, marginBottom:6, fontSize:16, color:"#1f3a5f"}}>E. Operations <span style={{fontWeight:400, color:"#64748b", fontSize:14}}>— production reality</span></h3>
      <table style={{width:"100%", borderCollapse:"collapse", margin:"6px 0 14px", fontSize:13.5}}>
        <thead><tr style={{background:"#1f3a5f", color:"#fff"}}><th style={{padding:"6px 8px", textAlign:"left", width:"32%"}}>Pattern</th><th style={{padding:"6px 8px", textAlign:"left"}}>Example seed</th></tr></thead>
        <tbody>
          <tr><td style={{padding:"7px 8px", verticalAlign:"top"}}><strong>E1. Production gotcha</strong><br/><span style={{color:"#64748b"}}>The specific thing that bites you post-launch</span></td><td style={{padding:"7px 8px", verticalAlign:"top"}}>HSTU's KV-cache reuse interacts badly with online learning. What's the exact failure mode when embeddings update mid-day?</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:"7px 8px", verticalAlign:"top"}}><strong>E2. Failure-on-Friday ⭐</strong><br/><span style={{color:"#64748b"}}>You ship, get paged at 3am — what happened?</span></td><td style={{padding:"7px 8px", verticalAlign:"top"}}>HSTU shipped Thursday. Friday 3am page: GPU OOM on the ads-team replicas only. What's the most likely root cause given they share the same fleet?</td></tr>
          <tr><td style={{padding:"7px 8px", verticalAlign:"top"}}><strong>E3. Implementation specifics</strong><br/><span style={{color:"#64748b"}}>API surface, default args, library gotchas</span></td><td style={{padding:"7px 8px", verticalAlign:"top"}}>When using the open-source HSTU implementation, what's the silent default in <code>HSTUConfig</code> that breaks calibration if left alone?</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:"7px 8px", verticalAlign:"top"}}><strong>E4. Rollout / migration</strong><br/><span style={{color:"#64748b"}}>Specific sequence to go from baseline to new</span></td><td style={{padding:"7px 8px", verticalAlign:"top"}}>Migrate DLRM → HSTU in 4 phases. Order the phases (shadow scoring, hybrid serving, traffic ramp, retire DLRM) and defend the ordering.</td></tr>
          <tr><td style={{padding:"7px 8px", verticalAlign:"top"}}><strong>E5. Reproducibility</strong><br/><span style={{color:"#64748b"}}>What's hard to reproduce from the paper?</span></td><td style={{padding:"7px 8px", verticalAlign:"top"}}>The HSTU paper claims 5.3-15.2× over FlashAttention2. Which experimental detail must you match to even attempt to reproduce, and which is hidden?</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:"7px 8px", verticalAlign:"top"}}><strong>E6. Eval contamination</strong><br/><span style={{color:"#64748b"}}>What experiment trick makes it look better than it is?</span></td><td style={{padding:"7px 8px", verticalAlign:"top"}}>You see HSTU beats DLRM by 4% NDCG on the public benchmark. What does the public benchmark do that hides HSTU's cold-start weakness?</td></tr>
        </tbody>
      </table>

      <h3 style={{marginTop:14, marginBottom:6, fontSize:16, color:"#1f3a5f"}}>F. Failure modes <span style={{fontWeight:400, color:"#64748b", fontSize:14}}>— what breaks, what attacks</span></h3>
      <table style={{width:"100%", borderCollapse:"collapse", margin:"6px 0 14px", fontSize:13.5}}>
        <thead><tr style={{background:"#1f3a5f", color:"#fff"}}><th style={{padding:"6px 8px", textAlign:"left", width:"32%"}}>Pattern</th><th style={{padding:"6px 8px", textAlign:"left"}}>Example seed</th></tr></thead>
        <tbody>
          <tr><td style={{padding:"7px 8px", verticalAlign:"top"}}><strong>F1. Edge-case generation</strong><br/><span style={{color:"#64748b"}}>Smallest input that breaks the technique's advantage</span></td><td style={{padding:"7px 8px", verticalAlign:"top"}}>Construct the shortest user history that makes HSTU regress below DLRM on offline metrics. Name the threshold and the architectural reason.</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:"7px 8px", verticalAlign:"top"}}><strong>F2. Adversarial test</strong><br/><span style={{color:"#64748b"}}>Design an attack that breaks the claimed advantage</span></td><td style={{padding:"7px 8px", verticalAlign:"top"}}>Design an adversarial action sequence that maximally degrades HSTU but leaves DLRM unaffected. What does the attack reveal about HSTU's assumptions?</td></tr>
          <tr><td style={{padding:"7px 8px", verticalAlign:"top"}}><strong>F3. Reverse engineering</strong><br/><span style={{color:"#64748b"}}>Symptom → which design choice caused it?</span></td><td style={{padding:"7px 8px", verticalAlign:"top"}}>Symptom: HSTU's loss curve goes flat after step 50k but eval keeps improving. Which design choice causes this?</td></tr>
          <tr style={{background:"#f8fafc"}}><td style={{padding:"7px 8px", verticalAlign:"top"}}><strong>F4. Paper-named failure modes</strong><br/><span style={{color:"#64748b"}}>What the authors themselves admit doesn't work</span></td><td style={{padding:"7px 8px", verticalAlign:"top"}}>The HSTU paper specifically calls out one regime where pure HSTU underperforms. Name it and explain the architectural reason.</td></tr>
          <tr><td style={{padding:"7px 8px", verticalAlign:"top"}}><strong>F5. Community-found failure</strong><br/><span style={{color:"#64748b"}}>What downstream researchers identified</span></td><td style={{padding:"7px 8px", verticalAlign:"top"}}>A 2025 reproducibility study showed HSTU's gains are smaller than claimed when [X]. What's X and why does it shrink the gap?</td></tr>
        </tbody>
      </table>

      <VIS.Callout kind="ok" title="How to use this taxonomy when authoring">
        For a 20-problem visual: pick at least one pattern from each of A-F (6 problems), then go back and pull additional patterns where the concept has more depth. The most concept-rich visuals will skew toward C (mechanism) and D (intuition traps); thin concepts skew toward B (application). If you can't fill at least 4-5 of the 6 categories, the concept may not warrant its own visual — fold into a sibling.
      </VIS.Callout>

      <VIS.Callout kind="info" title="The pattern signals — starred ⭐ patterns are the most under-used and highest-signal">
        The corpus pre-this-strategy was 60-70% B1 ("scenario-driven tradeoff") and 20-30% E1/F4 ("production gotcha" + "paper failure mode"). Almost zero D1/D2/D3 (intuition traps), almost zero F2/F3 (adversarial / reverse engineering). The starred patterns are where the next batch of quality improvements lives.
      </VIS.Callout>
    </VIS.Section>

    {/* ============== 9. Difficulty calibration ============== */}
    <VIS.Section id="sec-9" title="9. Difficulty calibration">
      <ul style={{margin:"4px 0 0 24px"}}>
        <li><strong>Easy:</strong> decoys are obviously wrong; the right answer is in the question stem.</li>
        <li><strong>Medium:</strong> one or two plausibly-wrong decoys; right answer requires reading the brief carefully.</li>
        <li><strong>Hard:</strong> every decoy is plausible; right answer requires <em>connecting two facts</em> spaced apart in the brief.</li>
      </ul>
      <p style={{marginTop:8}}><strong>Aim hard.</strong> A senior-MLE prep corpus that's mostly easy/medium teaches nothing. Distribution per visual: ~70% hard, ~25% medium, ~5% easy for warm-up.</p>
    </VIS.Section>

    {/* ============== 10. Implementation gotchas ============== */}
    <VIS.Section id="sec-10" title="10. Implementation gotchas (JSX + Excalidraw)">
      <ul style={{margin:"4px 0 0 24px"}}>
        <li><strong>JSX: <code>&lt;N</code> (less-than + digit) in text position</strong> reads as a JSX tag opener. Use <code>&amp;lt;N</code> or "under N" prose. Safe inside JS string literals.</li>
        <li><strong>JSX template strings: <code>{`{varname}`}</code></strong> inside JSX text is parsed as a JS expression. Use ALL-CAPS placeholders (<code>USER_ID</code>) or HTML entities.</li>
        <li><strong>Option-length leakage</strong> — see §2 warning above. Normalize.</li>
        <li><strong>Excalidraw <code>convertToExcalidrawElements</code></strong> for a labeled shape returns the shape AND a bound text element. Take the whole array, not <code>[0]</code>.</li>
        <li><strong>Composite shapes</strong> (cylinder = 3 grouped primitives): tag ONE primitive with <code>customData.pieceId</code>; walk <code>groupIds</code> in the grader.</li>
        <li><strong>GitHub Pages caches</strong> the file path aggressively — use <code>?cb=&lt;timestamp&gt;</code> query strings when iterating.</li>
        <li><strong>Mobile</strong> — every visual must work down to 360px viewport. Tables wrap to horizontal-scroll; SVGs bounded; tap targets ≥44px; jargon-glossed terms tap-toggle (not hover-only).</li>
      </ul>
    </VIS.Section>

    {/* ============== 11. Hover-gloss for jargon ============== */}
    <VIS.Section id="sec-11" title="11. Hover-gloss every jargon term">
      <p>
        Assume the reader knows English but not your domain. Wrap every jargon term on first appearance with <code>&lt;VIS.Term def="..."&gt;</code> — a 1-2 sentence plain-English definition shown on hover (desktop) or tap (mobile).
      </p>
      <p>
        Example: A <VIS.Term def="A statistical model that learns from data instead of being explicitly programmed.">machine-learning model</VIS.Term> turns examples into predictions. The dotted underline is the visual affordance — readers know it's hoverable / tappable.
      </p>
      <p>
        <strong>Definition rules:</strong> 1-2 short sentences; assume reader knows English but not your domain (smart business person, not engineer); don't use jargon inside the definition (or wrap that term too); a term not worth defining is not worth using — rephrase.
      </p>
    </VIS.Section>

    {/* ============== 12. Ship checklist ============== */}
    <VIS.Section id="sec-12" title="12. Ship checklist (before merging any visual)">
      <ul style={{margin:"4px 0 0 24px", lineHeight:1.85}}>
        <li>☐ Context rich enough that tradeoffs are visible without giving the answer</li>
        <li>☐ <strong>Concept-specificity test §2a passes</strong> on every problem (redact concept name → can't answer with generic ML)</li>
        <li>☐ No count of correct / incorrect items in any prompt</li>
        <li>☐ ≥20 trap problems (or fewer-but-honest if 20 concept-specific angles don't exist)</li>
        <li>☐ At least one decoy in each problem is plausible enough that a tired senior would pick it</li>
        <li>☐ Answer mode matches concept (no fill-in-blank for system design, no canvas for math derivation)</li>
        <li>☐ Option lengths normalized (~2 lines each, no length leakage)</li>
        <li>☐ If visual: shapes encode role; legend printed</li>
        <li>☐ Trap + lens + stretch revealed only after submit</li>
        <li>☐ Every jargon term wrapped in <code>&lt;VIS.Term def="..."&gt;</code></li>
        <li>☐ Mobile-validated at 390px width (no overflow, tap targets sized)</li>
        <li>☐ <code>see_web</code> returns <code>errors: []</code></li>
      </ul>
    </VIS.Section>

    {/* ============== Meta: a live trap problem demonstrating the rules ============== */}
    <VIS.Section id="sec-meta" title="Meta — a well-formed trap problem (live demo)">
      <p>
        Below is a trap problem about <strong>this very strategy</strong>. It follows all the rules: rich scenario, hidden signal, plausible decoys, concept-specific (the concept is "trap-problem design"), trap + lens + stretch revealed on submit.
      </p>
      <VIS.TrapProblem
        id="meta-1"
        difficulty="hard"
        multiSelect
        title="A reviewer flags a problem on the HSTU visual as 'too generic'"
        scenario={<>You're auditing HSTU's drill section. Problem P5 reads: <em>"You launched HSTU at p99 80ms scoring 500 candidates. Which of (a) precompute user encoding, (b) KV-cache attention, (c) FP4 quantization, (d) truncate history are valid?"</em> A reviewer says "this isn't really about HSTU." Which of the following are correct critiques (select all)?</>}
        options={[
          {key:"a", text:"The correct answers (a/b/c) apply to any large transformer; HSTU is scenery, not the discriminator.", correct:true},
          {key:"b", text:"Redacting 'HSTU' to 'Model X' doesn't reduce the candidate's ability to answer correctly.", correct:true},
          {key:"c", text:"The problem fails the concept-specificity test (§2a) — fix by anchoring on HSTU's generative loss, action vocabulary, or dropped crosses.", correct:true},
          {key:"d", text:"The problem is fine because it mentions HSTU and the scenario is detailed."},
          {key:"e", text:"Adding more options would solve it — push to 8 options for harder selection."},
        ]}
        trap={<>(d) is the seductive defense — the scenario IS detailed (p99 budget, candidate count, A100). But scenario detail doesn't equal concept anchoring. (e) confuses option count with concept specificity; adding more generic options just makes a generic question harder, not concept-specific.</>}
        lens={<>The redaction test is the cleanest filter. If "Model X" answers the same way as "HSTU," the concept isn't doing work. The fix is to find an HSTU-unique facet (generative loss vs pointwise sigmoid → calibration regression; dropped crosses → cold-start gap; MTGR motivation; action token vocabulary; power-law scaling claim) and rewrite around that.</>}
        stretch={<>Apply the redaction test to <a href="https://vijaykatta3094-ops.github.io/ml-knowledge-hub/recsys-sota/fraudgt.html" target="_blank" rel="noopener">FraudGT</a>'s drill section. Which problems pass? Which are graph-transformer-generic with FraudGT as scenery?</>}
      />
    </VIS.Section>

    window.addEventListener("error", function (e) {
      const pre = document.createElement("pre");
      pre.style.cssText = "position:fixed;top:0;left:0;right:0;max-height:35vh;"
        + "overflow:auto;background:#fee2e2;color:#7f1d1d;padding:8px;"
        + "margin:0;font:12px/1.4 monospace;z-index:10002;";
      pre.textContent = "[visualize] " + (e.error?.stack || e.message || e);
      document.body.appendChild(pre);
    }, true);
